---
site_name: "common-domain-model"
theme:
  # https://www.mkdocs.org/user-guide/configuration/#theme
  name: material
  icon:
    logo: material/book-open-page-variant
  # palette:
  #  scheme: slate
  #  primary: cyan
  features:
    - content.tabs.link
    - header.autohide      # maximum screen space during scrolling
    - navigation.expand    # optimize user experience
    - navigation.instant   # optimize user experience
    - navigation.instant.progress
    - navigation.tracking  # update address bar
    - search.suggest       # suggest good completions
    - content.code.copy    # enable copy to clipboard

# extra css/js see https://www.mkdocs.org/user-guide/customizing-your-theme/
extra_css: []
extra_javascript: []

plugins:
  - search
  - mknotebooks:
      execute: false
  - mermaid2:
      version: 11.4.1
  - mkdocs_pymdownx_material_extras:
    # https://pypi.org/project/mkdocs-pymdownx-material-extras

markdown_extensions:
  - pymdownx.superfences:
      # https://mkdocs-mermaid2.readthedocs.io/en/latest/superfences
      # custom code highlighting rules
      custom_fences:
        - name: mermaid
          # disable code highlighting to display diagrams
          format: !!python/name:pymdownx.superfences.fence_code_format
          class: mermaid
  # https://facelessuser.github.io/pymdown-extensions/extensions/magiclink/
  # auto-link HTML, FTP, and email links
  - pymdownx.magiclink
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#admonition
  # support for call-outs
  - admonition
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#tables
  # create tables
  - tables
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#attribute-lists
  # enables use of HTML attributes and CSS classes to applicable elements
  - attr_list
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#markdown-in-html
  # write markdown inside of HTML
  - md_in_html

  # TODO rebuild docs on schema change (https://github.com/linkml/linkml-project-copier/issues/39)
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

watch:
  - src/common_domain_model/schema

nav:
  - Home: index.md
  - Schema: elements/index.md
  - About: about.md
  - Resources:
    - CDM Overview: cdm-overview.md
    - Common Domain Model: common-domain-model.md
    - Design Principles: design-principles.md
    - Product Model: product-model.md
    - Event Model: event-model.md
    - Process Model: process-model.md
    - Reference Data Model: reference-data-model.md
    - Legal Agreements: legal-agreements.md
    - Standardized Functions: standardized-functions.md
    - Namespace: namespace.md
    - Mapping: mapping.md
    - Pre-Trade Processing: pre-trade-processing.md
    - Eligible Collateral: eligible-collateral-representation.md
    - Repurchase Agreements: repurchase-agreement-representation.md
    - Securities Lending: securities-lending.md
    - Use Cases: use-cases.md
    - Download: download.md
    - CDM Java Distribution: cdm-java-distribution.md
    - Development:
        - Development Approach: development-approach.md
        - Dev Guidelines: dev-guidelines.md
        - Documentation Style Guide: documentation-style-guide.md
        - Editing: editing.md
        - Versioning: versioning.md
        - Change Control Guidelines: change-control-guidelines.md
        - Maintenance & Release: maintenance-and-release.md
        - Major Release Scheduling: major-release-scheduling-guidelines.md
    - Governance:
        - Governance: governance.md
        - CDM Org Structure: cdm-org-structure.md
        - Maintainers: maintainers.md
        - Get Involved: get-involved.md
    - Working Groups:
        - Overview: working-groups.md
        - Steering: CDM-Steering-WG.md
        - Derivatives: CDM-Derivatives-WG.md
        - Collateral: CDM-Collateral-WG.md
        - Technology & Architecture: CDM-Technology-Architecture-WG.md
        - Contribution Review: CDM-Contribution-Review-WG.md
        - Physical Risk: CDM-Physical-Risk-WG.md
        - Tokenized Assets: CDM-Tokenized-Assets-WG.md
    - CDM Resources: cdm-resources.md
    - CDM Videos: cdm-videos.md
    - Training: training.md
    - Links Template: links-template.md

exclude_docs: |
  /templates-linkml/

site_url: https://lmodel.github.io/common-domain-model-ld
repo_url: https://github.com/lmodel/common-domain-model-ld

# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
