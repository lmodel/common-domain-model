# metamodel_version: 1.11.0id: CalculationPeriod
schema_generating: true
description: 'A data defining:  the parameters used in the calculation of a fixed
  or floating rate calculation period amount. This data forms:  part of cashflows
  representation of a swap stream.'
display_name: CalculationPeriod
document_category: CalculationPeriod
weight: 20
fields:
- id: adjustedStartDate
  description: The calculation period start date, adjusted according to any relevant
    business day convention.
  display_name: adjustedStartDate
- id: adjustedEndDate
  description: The calculation period end date, adjusted according to any relevant
    business day convention.
  display_name: adjustedEndDate
- id: unadjustedStartDate
  description: The calculation start date, unadjusted.
  display_name: unadjustedStartDate
- id: unadjustedEndDate
  description: The calculation end date, unadjusted.
  display_name: unadjustedEndDate
- id: calculationPeriodNumberOfDays
  description: The number of days from the adjusted effective / start date to the
    adjusted termination / end date calculated in accordance with the applicable day
    count fraction.
  display_name: CalculationPeriod_calculationPeriodNumberOfDays
- id: notionalAmount
  description: The amount that a cashflow will accrue interest on.
  display_name: notionalAmount
- id: fxLinkedNotionalAmount
  description: The amount that a cashflow will accrue interest on. This is the calculated
    amount of the FX linked - i.e. the other currency notional amount multiplied by
    the appropriate FX spot rate.
  display_name: fxLinkedNotionalAmount
- id: floatingRateDefinition
  description: The floating rate reset information for the calculation period.
  display_name: floatingRateDefinition
- id: fixedRate
  description: The calculation period fixed rate. A per annum rate, expressed as a
    decimal. A fixed rate of 5% would be represented as 0.05.
  display_name: CalculationPeriod_fixedRate
- id: dayCountYearFraction
  description: The year fraction value of the calculation period, result of applying
    the ISDA rules for day count fraction defined in the ISDA Annex.
  display_name: dayCountYearFraction
- id: forecastAmount
  description: The amount representing the forecast of the accrued value of the calculation
    period. An intermediate value used to generate the forecastPaymentAmount in the
    PaymentCalculationPeriod.
  display_name: forecastAmount
- id: forecastRate
  description: A value representing the forecast rate used to calculate the forecast
    future value of the accrual period. This is a calculated rate determined based
    on averaging the rates in the rateObservation elements, and incorporates all of
    the rate treatment and averaging rules. A value of 1% should be represented as
    0.01.
  display_name: CalculationPeriod_forecastRate
