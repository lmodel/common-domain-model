# metamodel_version: 1.11.0id: ValuationSource
schema_generating: true
description: A class describing the method for obtaining a settlement rate, specified
  through either an information source (page), a settlement rate option (fixing) or
  by using quotes from reference banks.
display_name: ValuationSource
document_category: ValuationSource
weight: 20
fields:
- id: quotedCurrencyPair
  description: Defines the two currencies for an FX trade and the quotation relationship
    between the two currencies.  This attribute was formerly part of 'fxSettlementTerms',
    which is now being harmonised into a common 'CashSettlementTerms' that includes
    a 'ValuationDate'.
  display_name: ValuationSource_quotedCurrencyPair
- id: informationSource
  description: The information source where a published or displayed market rate will
    be obtained, e.g. Telerate Page 3750.
  display_name: ValuationSource_informationSource
- id: settlementRateOption
  description: The rate option to use for the fixing. Currently only applicable to
    foreign exchange fixing in case of cross-currency settlement.
  display_name: ValuationSource_settlementRateOption
- id: referenceBanks
  description: A container for a set of reference institutions that may be called
    upon to provide rate quotations as part of the method to determine the applicable
    cash settlement amount. If institutions are not specified, it is assumed that
    reference institutions will be agreed between the parties on the exercise date,
    or in the case of swap transaction to which mandatory early termination is applicable,
    the cash settlement valuation date.
  display_name: referenceBanks
- id: dealerOrCCP
  description: 'Holds an identifier for the reference entity that is agreed by both
    parties as a basis for cash settlement calculations. This could be a dealer from
    whom quotations are obtained by the calculation agent on the reference obligation
    for purposes of cash settlement in a credit event. ISDA 2003 Term: Dealer. This
    could be the clearing organization (CCP, DCO) to which the trade should be cleared,
    as applicable for cash-settled swaptions.'
  display_name: dealerOrCCP
