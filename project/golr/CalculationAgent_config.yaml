# metamodel_version: 1.11.0id: CalculationAgent
schema_generating: true
description: A class defining the ISDA calculation agent responsible for performing
  duties as defined in the applicable product definitions.
display_name: CalculationAgent
document_category: CalculationAgent
weight: 20
fields:
- id: calculationAgentParty
  description: Specifies the party which is the ISDA Calculation Agent for the trade.
    If more than one party is referenced then the parties are assumed to be co-calculation
    agents, i.e. they have joint responsibility.
  display_name: calculationAgentParty
- id: calculationAgentPartyEnum
  description: Specifies the ISDA calculation agent responsible for performing duties
    as defined in the applicable product definitions. For example, the Calculation
    Agent may be defined as being the Non-exercising Party.
  display_name: calculationAgentPartyEnum
- id: calculationAgentBusinessCenter
  description: The city in which the office through which ISDA Calculation Agent is
    acting for purposes of the transaction is located The short-form confirm for a
    trade that is executed under a Sovereign or Asia Pacific Master Confirmation Agreement
    ( MCA ), does not need to specify the Calculation Agent. However, the confirm
    does need to specify the Calculation Agent City. This is due to the fact that
    the MCA sets the value for Calculation Agent but does not set the value for Calculation
    Agent City.
  display_name: calculationAgentBusinessCenter
