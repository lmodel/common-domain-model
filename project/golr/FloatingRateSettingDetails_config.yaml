  and the resulting rate to be returned.
display_name: FloatingRateSettingDetails
document_category: FloatingRateSettingDetails
weight: 20
fields:
- id: calculationDetails
  description: Calculated rate details (observation dates, values, and weights).
  display_name: calculationDetails
- id: observationDate
  description: The day upon which the rate was observed (for term rates).
  display_name: FloatingRateSettingDetails_observationDate
- id: resetDate
  description: The day for which the rate is needed (e.g. period beginning or end
    date).
  display_name: FloatingRateSettingDetails_resetDate
- id: floatingRate
  description: The resulting rate that was observed or calculated.
  display_name: FloatingRateSettingDetails_floatingRate
  cardinality: multi
