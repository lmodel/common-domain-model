- id: numberValuationDates
  description: 'Where multiple valuation dates are specified as being applicable for
    cash settlement, this element specifies (a) the number of applicable valuation
    dates, and (b) the number of business days after satisfaction of all conditions
    to settlement when the first such valuation date occurs, and (c) the number of
    business days thereafter of each successive valuation date. ISDA 2003 Term: Multiple
    Valuation Dates.'
