# metamodel_version: 1.11.0id: FloatingAmountEvents
schema_generating: true
description: A class to specify the ISDA terms relating to the floating rate payment
  events and the implied additional fixed payments, applicable to the credit derivatives
  transactions on mortgage-backed securities with pay-as-you-go or physical settlement.
display_name: FloatingAmountEvents
document_category: FloatingAmountEvents
weight: 20
fields:
- id: failureToPayPrincipal
  description: 'A floating rate payment event. Corresponds to the failure by the Reference
    Entity to pay an expected principal amount or the payment of an actual principal
    amount that is less than the expected principal amount. ISDA 2003 Term: Failure
    to Pay Principal.'
  display_name: FloatingAmountEvents_failureToPayPrincipal
- id: interestShortfall
  description: 'A floating rate payment event. With respect to any Reference Obligation
    Payment Date, either (a) the non-payment of an Expected Interest Amount or (b)
    the payment of an Actual Interest Amount that is less than the Expected Interest
    Amount. ISDA 2003 Term: Interest Shortfall.'
  display_name: interestShortfall
- id: writedown
  description: 'A floating rate payment event. Results from the fact that the underlier
    writes down its outstanding principal amount. ISDA 2003 Term: Writedown.'
  display_name: FloatingAmountEvents_writedown
- id: impliedWritedown
  description: A floating rate payment event. Results from the fact that losses occur
    to the underlying instruments that do not result in reductions of the outstanding
    principal of the reference obligation.
  display_name: FloatingAmountEvents_impliedWritedown
- id: floatingAmountProvisions
  description: Specifies the floating amount provisions associated with the floatingAmountEvents.
  display_name: floatingAmountProvisions
- id: additionalFixedPayments
  description: Specifies the events that will give rise to the payment additional
    fixed payments.
  display_name: additionalFixedPayments
