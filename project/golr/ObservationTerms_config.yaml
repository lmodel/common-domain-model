# metamodel_version: 1.11.0id: ObservationTerms
schema_generating: true
description: 'Class containing terms that are associated with observing a price/benchmark/index
  across either single or multiple observations. '
display_name: ObservationTerms
document_category: ObservationTerms
weight: 20
fields:
- id: observationTime
  description: Defines time in respect to a business calendar location that the price/benchmark/index
    is observed
  display_name: ObservationTerms_observationTime
- id: observationTimeType
  description: The enumerated values to specify points in the day when option exercise
    and valuation can occur.
  display_name: observationTimeType
- id: informationSource
  description: The information source where a published or displayed market rate will
    be obtained, e.g. Telerate Page 3750.
  display_name: ObservationTerms_informationSource
- id: precision
  description: Defines rounding rules and precision to be used in the rounding of
    observations.
  display_name: ObservationTerms_precision
- id: calculationPeriodDates
  description: Defines parameters used to generate the calculation period dates schedule,
    including the specification of any initial or final stub calculation periods.
    A calculation period schedule consists of an optional initial stub calculation
    period, one or more regular calculation periods and an optional final stub calculation
    period. In the absence of any initial or final stub calculation periods, the regular
    part of the calculation period schedule is assumed to be between the effective
    date and the termination date. No implicit stubs are allowed, i.e. stubs must
    be explicitly specified using an appropriate combination of firstPeriodStartDate,
    firstRegularPeriodStartDate and lastRegularPeriodEndDate.
  display_name: ObservationTerms_calculationPeriodDates
- id: observationDates
  description: Describes date details for a set of observation dates in parametric
    or non-parametric form.
  display_name: ObservationTerms_observationDates
  cardinality: multi
- id: numberOfObservationDates
  description: The number of observation dates between observation start date and
    observation end date.
  display_name: numberOfObservationDates
