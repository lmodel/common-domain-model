# metamodel_version: 1.11.0id: TransactedPrice
schema_generating: true
description: ' A class to represent the transacted price attributes that are positioned
  as part of the FpML FeeLeg.'
display_name: TransactedPrice
document_category: TransactedPrice
weight: 20
fields:
- id: marketFixedRate
  description: An optional element that only has meaning in a credit index trade.
    This element contains the credit spread ('fair value') at which the trade was
    executed. Unlike the fixedRate of an index, the marketFixedRate varies over the
    life of the index depending on market conditions. The marketFixedRate is the price
    of the index as quoted by trading desks.
  display_name: marketFixedRate
- id: initialPoints
  description: An optional element that contains the up-front points expressed as
    a percentage of the notional. An initialPoints value of 5% would be represented
    as 0.05. The initialPoints element is an alternative to marketFixedRate in quoting
    the traded level of a trade. When initialPoints is used, the traded level is the
    sum of fixedRate and initialPoints. The initialPoints is one of the items that
    are factored into the initialPayment calculation and is payable by the Buyer to
    the Seller. Note that initialPoints and marketFixedRate may both be present in
    the same document when both implied values are desired.
  display_name: initialPoints
- id: marketPrice
  description: An optional element that only has meaning in a credit index trade.
    This element contains the price at which the trade was executed and is used instead
    of marketFixedRate on credit trades on certain indicies which are quoted using
    a price rather than a spread.
  display_name: marketPrice
- id: quotationStyle
  description: An optional element that contains the up-front points expressed as
    a percentage of the notional. An initialPoints value of 5% would be represented
    as 0.05. The initialPoints element is an alternative to marketFixedRate in quoting
    the traded level of a trade. When initialPoints is used, the traded level is the
    sum of fixedRate and initialPoints. The initialPoints is one of the items that
    are factored into the initialPayment calculation and is payable by the Buyer to
    the Seller. Note that initialPoints and marketFixedRate may both be present in
    the same document when both implied values are desired.
  display_name: quotationStyle
