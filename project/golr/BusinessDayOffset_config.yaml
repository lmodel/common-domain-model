# metamodel_version: 1.11.0id: BusinessDayOffset
schema_generating: true
description: This allows an offset to be specified as, for instance, N business days,
  with a business centers specified as included.
display_name: BusinessDayOffset
document_category: BusinessDayOffset
weight: 20
fields:
- id: periodMultiplier
  description: A time period multiplier, e.g. 1, 2 or 3 etc. A negative value can
    be used when specifying an offset relative to another date, e.g. -2 days.
  display_name: Period_periodMultiplier
- id: period
  description: A time period, e.g. a day, week, month or year of the stream. If the
    periodMultiplier value is 0 (zero) then period must contain the value D (day).
  display_name: Period_period
- id: businessCenters
  description: The business centers for the offset.
  display_name: BusinessDayOffset_businessCenters
- id: fixingOffsetDefinition
  description: Legal text that underlies the Fixing Offset. ISDA Fixing Offset Definition.
    (e.g. One day that is either a Sydney Business Day or a Melbourne Business Day
    following the Reset Date)
  display_name: fixingOffsetDefinition
- id: fixingOffsetReason
  description: Fixing Offset Reason
  display_name: fixingOffsetReason
