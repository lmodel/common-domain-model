# metamodel_version: 1.11.0id: Schedule
schema_generating: true
description: A class defining a schedule of rates or amounts in terms of an initial
  value and then a series of step date and value pairs. On each step date the rate
  or amount changes to the new step value. The series of step date and value pairs
  are optional. If not specified, this implies that the initial value remains unchanged
  over time.
display_name: Schedule
document_category: Schedule
weight: 20
fields:
- id: value
  description: The initial rate or amount, as the case may be. An initial rate of
    5% would be represented as 0.05.
  display_name: Schedule_value
- id: datedValue
  description: The schedule of step date and value pairs. On each step date the associated
    step value becomes effective. A list of steps may be ordered in the document by
    ascending step date. An FpML document containing an unordered list of steps is
    still regarded as a conformant document.
  display_name: Schedule_datedValue
  cardinality: multi
