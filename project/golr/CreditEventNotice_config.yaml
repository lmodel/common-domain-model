fields:
- id: notifyingParty
  description: 'The notifying party is the party that notifies the other party when
    a credit event has occurred by means of a credit event notice. If more than one
    party is referenced as being the notifying party then either party may notify
    the other of a credit event occurring. ISDA 2003 Term: Notifying Party.'
  display_name: notifyingParty
  cardinality: multi
- id: businessCenter
  description: Inclusion of this business center element implies that Greenwich Mean
    Time in Section 3.3 of the 2003 ISDA Credit Derivatives Definitions is replaced
    by the local time of the city indicated by the businessCenter element value.
  display_name: CreditEventNotice_businessCenter
  cardinality: multi
- id: publiclyAvailableInformation
  description: 'A specified condition to settlement. Publicly available information
    means information that reasonably confirms any of the facts relevant to determining
    that a credit event or potential repudiation/moratorium, as applicable, has occurred.
    The ISDA defined list (2003) is the market standard and is considered comprehensive,
    and a minimum of two differing public sources must have published the relevant
    information, to declare a Credit Event. ISDA 2003 Term: Notice of Publicly Available
    Information Applicable.'
  display_name: CreditEventNotice_publiclyAvailableInformation
  cardinality: multi
