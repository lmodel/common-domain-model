# metamodel_version: 1.11.0id: ReferenceObligation
schema_generating: true
description: A class to specify the reference obligation that is associated with a
  credit derivative instrument.
display_name: ReferenceObligation
document_category: ReferenceObligation
weight: 20
fields:
- id: security
  description: Identifies the underlying asset when it is a security, such as a bond
    or convertible bond. The security data type requires one or more productIdentifiers,
    specificaiton of the security type (e.g. debt), and includes optional attributes
    to specify a debt class, such as asset-backed, as well as seniority.
  display_name: ReferenceObligation_security
- id: loan
  description: Identifies the underlying asset when it is a loan.
  display_name: loan
- id: primaryObligor
  description: 'The entity primarily responsible for repaying debt to a creditor as
    a result of borrowing or issuing bonds. ISDA 2003 Term: Primary Obligor.'
  display_name: primaryObligor
- id: primaryObligorReference
  description: A pointer style reference to a reference entity defined elsewhere in
    the document. Used when the reference entity is the primary obligor.
  display_name: primaryObligorReference
- id: guarantor
  description: 'The party that guarantees by way of a contractual arrangement to pay
    the debts of an obligor if the obligor is unable to make the required payments
    itself. ISDA 2003 Term: Guarantor.'
  display_name: guarantor
- id: guarantorReference
  description: A pointer style reference to a reference entity defined elsewhere in
    the document. Used when the reference entity is the guarantor.
  display_name: guarantorReference
- id: standardReferenceObligation
  description: 'Indicates if the reference obligation is a Standard Reference Obligation.
    ISDA 2014 Term: Standard Reference Obligation.'
  display_name: standardReferenceObligation
