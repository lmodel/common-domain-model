# metamodel_version: 1.11.0id: CollateralValuationTreatment
schema_generating: true
description: Specification of the valuation treatment for the specified collateral.
display_name: CollateralValuationTreatment
document_category: CollateralValuationTreatment
weight: 20
fields:
- id: haircutPercentage
  description: Specifies a haircut percentage to be applied to the value of asset
    and used as a discount factor to the value of the collateral asset,expressed as
    a percentage in decimal terms. As an example a 0.5% haircut would be represented
    as a decimal number 0.005.
  display_name: CollateralValuationTreatment_haircutPercentage
- id: marginPercentage
  description: Specifies a percentage value of transaction needing to be posted as
    collateral expressed as a valuation. As an example a 104% requirement would be
    represented as a decimal number 1.04.
  display_name: marginPercentage
- id: fxHaircutPercentage
  description: Specifies an FX haircut applied to a specific asset which is agreed
    between the parties (for example, if pledgor eligible collateral is not denominated
    in the termination currency or under other specified cases in collateral support
    documents both for initial margin and variation margin).The percentage value is
    expressed as the discount haircut to the value of the collateral- as an example
    an 8% FX haircut would be expressed as 0.08.
  display_name: CollateralValuationTreatment_fxHaircutPercentage
- id: additionalHaircutPercentage
  description: 'Specifies a percentage value of any additional haircut to be applied
    to a collateral asset,the percentage value is expressed as the discount haircut
    to the value of the collateral- as an example a 5% haircut would be expressed
    as 0.05. '
  display_name: CollateralValuationTreatment_additionalHaircutPercentage
