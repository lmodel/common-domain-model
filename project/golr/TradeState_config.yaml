# metamodel_version: 1.11.0id: TradeState
schema_generating: true
description: Defines the fundamental financial information that can be changed by
  a Primitive Event and by extension any business or life-cycle event. Each TradeState
  specifies where a Trade is in its life-cycle. TradeState is a root type and as such,
  can be created independently to any other CDM data type, but can also be used as
  part of the CDM Event Model.
display_name: TradeState
document_category: TradeState
weight: 20
fields:
- id: trade
  description: Represents the Trade that has been effected by a business or life-cycle
    event.
  display_name: trade
- id: state
  description: Represents the State of the Trade through its life-cycle.
  display_name: TradeState_state
- id: resetHistory
  description: Represents the updated Trade attributes which can change as the result
    of a reset event. Only the changed values are captured, leaving the remaining
    data attributes empty. See Create_Reset function for further details on how TradeState
    is used in the Reset event. The TradeState data type is used to maintain backwards
    compatibility with the current Reset mechanism.
  display_name: resetHistory
  cardinality: multi
- id: transferHistory
  description: Represents the updated Trade attributes which can change as the result
    of a transfer event.
  display_name: transferHistory
  cardinality: multi
- id: observationHistory
  description: Represents the observed events related to a particular product or process,
    such as credit events or corporate actions.
  display_name: observationHistory
  cardinality: multi
- id: valuationHistory
  display_name: valuationHistory
  cardinality: multi
