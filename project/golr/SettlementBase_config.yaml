description: A base class to be extended by the SettlementTerms class.
display_name: SettlementBase
document_category: SettlementBase
weight: 20
fields:
- id: settlementType
  description: Whether the settlement will be cash, physical, by election, ...
  display_name: settlementType
- id: transferSettlementType
  description: The qualification as to how the transfer will settle, e.g. a DvP settlement.
  display_name: transferSettlementType
- id: settlementCurrency
  description: The settlement currency is to be specified when the Settlement Amount
    cannot be known in advance. The list of valid currencies is not presently positioned
    as an enumeration as part of the CDM because that scope is limited to the values
    specified by ISDA and FpML. As a result, implementers have to make reference to
    the relevant standard, such as the ISO 4217 standard for currency codes.
  display_name: settlementCurrency
- id: settlementDate
  description: The date on which the settlement amount will be paid, subject to adjustment
    in accordance with any applicable business day convention. This component would
    not be present for a mandatory early termination provision where the cash settlement
    payment date is the mandatory early termination date.
  display_name: SettlementBase_settlementDate
- id: settlementCentre
  description: 'Optional settlement centre as an enumerated list: Euroclear, Clearstream.'
  display_name: settlementCentre
- id: settlementProvision
  description: Optionally defines the parameters that regulate a settlement.
  display_name: settlementProvision
- id: standardSettlementStyle
  description: Settlement Style.
  display_name: standardSettlementStyle
