# metamodel_version: 1.11.0id: Taxonomy
schema_generating: true
description: Defines the taxonomy of an object by combining a taxonomy source (i.e.
  the rules to classify the object) and a value (i.e. the output of those rules on
  the object).
display_name: Taxonomy
document_category: Taxonomy
weight: 20
fields:
- id: source
  description: The source of the taxonomy that defines the rules for classifying the
    object. The taxonomy source is taken from a enumerated list of taxonomy names.
    Optional as the taxonomy source may not be provided.
  display_name: Taxonomy_source
- id: value
  description: The value according to that taxonomy. Optional as it may not be possible
    to classify the object in that taxonomy.
  display_name: Taxonomy_value
