# metamodel_version: 1.11.0id: CreditSupportObligationsVariationMargin
schema_generating: true
description: Specification of the Credit Support Obligations applicable to the Variation
  Margin Credit Support Annex.
display_name: CreditSupportObligationsVariationMargin
document_category: CreditSupportObligationsVariationMargin
weight: 20
fields:
- id: deliveryAmount
  description: In respect of a Valuation Date, the amount of collateral which a party
    is entitled to demand to be transferred to it as a Delivery Amount.
  display_name: CreditSupportObligationsBase_deliveryAmount
- id: returnAmount
  description: In respect of a Valuation Date, the amount of collateral which a party
    is entitled to demand to be recalled to it as a Return Amount.
  display_name: CreditSupportObligationsBase_returnAmount
- id: minimumTransferAmount
  description: Represents the threshold specified in the agreement below which collateral
    need not be delivered, and represents the smallest incremental value of exposure
    that must be reached before the parties are obliged to transfer collateral.
  display_name: minimumTransferAmount
- id: collateralTransferTiming
  description: Specification of transfer / settlement timing for cash and securities
    collateral assuming that the notice is provided before the Notification Time (and
    with a 1LBD lag introduced if the notice is delivered after the Notification Time),
    and that securities allow for a further Local Business Day for transfer / settlement.
  display_name: collateralTransferTiming
- id: bespokeTransferTiming
  description: The time by which the transfer of collateral must take place when different
    from the Regular Settlement Day as a result of parties' election.
  display_name: bespokeTransferTiming
- id: ineligibleCreditSupport
  description: The parties to which the provisions of the Credit Support Annex for
    Variation Margin will apply to.
  display_name: ineligibleCreditSupport
- id: majorCurrency
  description: The additional currencies that are specified as Major Currency for
    the purpose of applying the FX Haircut Percentage.
  display_name: majorCurrency
  cardinality: multi
- id: fxHaircut
  description: The alternative definition for FX haircut percentage that applies to
    each party and item of Eligible Collateral unless this item is denominated in
    a Major Currency or in the Base Currency.
  display_name: fxHaircut
- id: rounding
  description: The rounding methodology applicable to the Delivery Amount and the
    Return Amount in terms of nearest integral multiple of Base Currency units.
  display_name: CreditSupportObligationsVariationMargin_rounding
- id: eligibleCreditSupport
  description: Specification of the Eligible Collateral or Credit Support applicable
    to the Agreement.
  display_name: eligibleCreditSupport
