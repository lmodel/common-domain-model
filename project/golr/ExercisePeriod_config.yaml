# metamodel_version: 1.11.0id: ExercisePeriod
schema_generating: true
description: This defines the time interval to the start of the exercise period, i.e.
  the earliest exercise date, and the frequency of subsequent exercise dates (if any).
display_name: ExercisePeriod
document_category: ExercisePeriod
weight: 20
fields:
- id: earliestExerciseDateTenor
  description: The time interval to the first (and possibly only) exercise date in
    the exercise period.
  display_name: earliestExerciseDateTenor
- id: exerciseFrequency
  description: The frequency of subsequent exercise dates in the exercise period following
    the earliest exercise date. An interval of 1 day should be used to indicate an
    American style exercise period.
  display_name: exerciseFrequency
