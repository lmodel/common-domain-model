# metamodel_version: 1.11.0id: FxFeature
schema_generating: true
description: A type for defining FX Features.
display_name: FxFeature
document_category: FxFeature
weight: 20
fields:
- id: referenceCurrency
  description: Specifies the reference currency of the trade.
  display_name: referenceCurrency
- id: composite
  description: "If 'Composite' is specified as the Settlement Type in the relevant\
    \ Transaction Supplement, an amount in the Settlement Currency, determined by\
    \ the Calculation Agent as being equal to the number of Options exercised or deemed\
    \ exercised, multiplied by: (Settlement Price \u2013 Strike Price) / (Strike Price\
    \ \u2013 Settlement Price) x Multiplier provided that if the above is equal to\
    \ a negative amount the Option Cash Settlement Amount shall be deemed to be zero."
  display_name: FxFeature_composite
- id: quanto
  description: If 'Quanto' is specified as the Settlement Type in the relevant Transaction
    Supplement, an amount, as determined by the Calculation Agent in accordance with
    the Section 8.2 of the Equity Definitions.
  display_name: quanto
- id: crossCurrency
  description: "If 'Cross-Currency' is specified as the Settlement Type in the relevant\
    \ Transaction Supplement, an amount in the Settlement Currency, determined by\
    \ the Calculation Agent as being equal to the number of Options exercised or deemed\
    \ exercised, multiplied by: (Settlement Price \u2013 Strike Price) / (Strike Price\
    \ \u2013 Settlement Price) x Multiplier x one unit of the Reference Currency converted\
    \ into an amount in the Settlement Currency using the rate of exchange of the\
    \ Settlement Currency as quoted on the Reference Price Source on the Valuation\
    \ Date, provided that if the above is equal to a negative amount the Option Cash\
    \ Settlement Amount shall be deemed to be zero."
  display_name: crossCurrency
