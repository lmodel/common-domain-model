# metamodel_version: 1.11.0id: DividendReturnTerms
schema_generating: true
description: A class describing the conditions governing the payment of dividends
  to the receiver of the equity return, with the exception of the dividend payout
  ratio, which is defined for each of the underlying components.
display_name: DividendReturnTerms
document_category: DividendReturnTerms
weight: 20
fields:
- id: dividendPayoutRatio
  description: Specifies the dividend payout ratio associated with each underlier.
    In FpML 5.10 the payout is positioned at the underlier level, although there is
    an intent to reconsider this approach and position it at the leg level. This is
    approach adopted by the CDM.
  display_name: dividendPayoutRatio
  cardinality: multi
- id: dividendReinvestment
  description: Boolean element that defines whether the dividend will be reinvested
    or not.
  display_name: dividendReinvestment
- id: dividendEntitlement
  description: Defines the date on which the receiver of the equity return is entitled
    to the dividend.
  display_name: dividendEntitlement
- id: dividendAmountType
  description: Specifies whether the dividend is paid with respect to the Dividend
    Period.
  display_name: dividendAmountType
- id: performance
  description: Performance calculation, in accordance with Part 1 Section 12 of the
    2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 75. 'Equity Performance'.
    Cumulative performance is used as a notional multiplier factor on both legs of
    an Equity Swap.
  display_name: performance
- id: firstOrSecondPeriod
  description: '2002 ISDA Equity Derivatives Definitions: Dividend Period as either
    the First Period or the Second Period. | '
  display_name: firstOrSecondPeriod
- id: extraordinaryDividendsParty
  description: Specifies the party which determines if dividends are extraordinary
    in relation to normal levels.
  display_name: extraordinaryDividendsParty
- id: excessDividendAmount
  description: Determination of Gross Cash Dividend per Share.
  display_name: excessDividendAmount
- id: dividendCurrency
  description: Specifies the currency in which the dividend will be denominated, e.g.
    the dividend currency, or a specified currency. This class is not specified as
    such in FpML, which makes use of the CurrencyAndDeterminationMethod.model to specify
    such terms.
  display_name: dividendCurrency
- id: nonCashDividendTreatment
  description: Specifies the treatment of Non-Cash Dividends.
  display_name: nonCashDividendTreatment
- id: dividendComposition
  description: Specifies how the composition of Dividends is to be determined.
  display_name: dividendComposition
- id: specialDividends
  description: Specifies the method according to which special dividends are determined.
  display_name: specialDividends
- id: materialDividend
  description: If present and true, then material non cash dividends are applicable.
  display_name: materialDividend
- id: dividendPeriod
  description: One to many time bounded dividend payment periods, each with a dividend
    payment date per period.
  display_name: dividendPeriod
  cardinality: multi
