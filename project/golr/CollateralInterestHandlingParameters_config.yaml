# metamodel_version: 1.11.0id: CollateralInterestHandlingParameters
schema_generating: true
description: Represents parameters that describe how calculated interest amounts are
  handled, i.e. are they transferred/distributed, or is the collateral balance adjusted,
  is netting done, and any other special handling.
display_name: CollateralInterestHandlingParameters
document_category: CollateralInterestHandlingParameters
weight: 20
fields:
- id: interestPaymentHandling
  description: Specifies how the collateral interest is to be handled.
  display_name: interestPaymentHandling
- id: paymentBusinessCenter
  description: Specifies applicable business centers for payments.
  display_name: paymentBusinessCenter
  cardinality: multi
- id: netPostedAndHeldInterest
  description: Indicates whether to net Held and Posted Interest Payments (i.e. whether
    interest payable for a period can be netted with interest receivable).
  display_name: netPostedAndHeldInterest
- id: netInterestWithMarginCalls
  description: Indicates whether the interest amount may be offset against any margin
    call deliver or return amounts?   (aka 'net payments' indicator).
  display_name: netInterestWithMarginCalls
- id: includeAccrualInMarginCalc
  description: Indicates whether or not to include the open interest accrual in the
    margin calculation.
  display_name: includeAccrualInMarginCalc
- id: accrueInterestOnUnsettledInterest
  description: Indicates whether interest accruing on unsettled interest amount is
    included (continues to be accrued) in the following period.
  display_name: accrueInterestOnUnsettledInterest
- id: onFullReturn
  description: Indicates the option that accrued interest should be calculated and
    distributed when a full return of collateral occurs.
  display_name: onFullReturn
- id: onPartialReturn
  description: Indicates the option that accrued interest should be calculated and
    distributed when a partial return collateral occurs.
  display_name: onPartialReturn
- id: interestAmountApplication
  description: The application of Interest Amount with respect to the Delivery Amount
    and the Return Amount.
  display_name: interestAmountApplication
- id: interestRolloverLimit
  description: Specifies the level below which the interest will be rolled over.
  display_name: interestRolloverLimit
- id: writeoffLimit
  description: Specifies the level below which the interest will be written off; if
    omitted write-off is not applicable.
  display_name: writeoffLimit
- id: alternativeToInterestAmount
  description: Specifies the alternative to interest amounts.
  display_name: alternativeToInterestAmount
- id: alternativeProvision
  description: Specifies an alternative to interest amount, when the alternative provision
    clause is specified.
  display_name: alternativeProvision
- id: cutoffTime
  description: Specifies the time of day that interest needs to be confirmed by.
  display_name: cutoffTime
- id: notification
  description: Specifies the terms describing notification requirements.
  display_name: notification
