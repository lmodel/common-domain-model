  decimal weight = 0
 }
// A collection of workflow steps which together make up an entire workflow sequence.
message Workflow
 {
 repeated  workflowStep steps = 0
 }
// A class to specify workflow information, which is conceptually applicable to all lifecycle events.
message WorkflowState
 {
  workflowStatusEnum workflowStatus = 0
  string comment = 0
 repeated  partyCustomisedWorkflow partyCustomisedWorkflow = 0
  warehouseIdentityEnum warehouseIdentity = 0
 }
// A workflow step represents the state of a business event. The workflow step contains a reference to a previous WorkflowStep in order to preserve lineage. A workflow step is accepted if it contains a business event, proposed if proposedEvent is present and is rejected if the rejected flag is set.
message WorkflowStep
 {
  businessEvent businessEvent = 0
  counterpartyPositionBusinessEvent counterpartyPositionBusinessEvent = 0
  eventInstruction proposedEvent = 0
  boolean rejected = 0
 repeated  workflowStepApproval approval = 0
  workflowStep previousWorkflowStep = 0
  eventInstruction nextEvent = 0
  messageInformation messageInformation = 0
 repeated  eventTimestamp timestamp = 0
 repeated  identifier eventIdentifier = 0
  actionEnum action = 0
 repeated  party party = 0
 repeated  account account = 0
  lineage lineage = 0
  creditLimitInformation creditLimitInformation = 0
  workflowState workflowState = 0
 }
// Party approvals associated to the current WorkflowStep. 
message WorkflowStepApproval
 {
  boolean approved = 0
  party party = 0
  string rejectedReason = 0
  eventTimestamp timestamp = 0
 }
