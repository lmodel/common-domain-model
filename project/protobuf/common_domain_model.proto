  aggregationSpecificationEnum aggregationType = 0
  boolean loansCanBeGrouped = 0
  string otherDetails = 0
 }
//  Parameters to be used to filter events that are relevant to a given portfolio in order to calculate the state of this portfolio. The attributes correspond to all the possible aggregation criteria that can be used and these criteria can be combined. All the attributes are optional.
message AggregationParameters
 {
 repeated  datetime dateTime = 0
  boolean totalPosition = 0
  positionStatusEnum positionStatus = 0
 repeated  party party = 0
 repeated  nonTransferableProduct product = 0
 repeated  string productQualifier = 0
 repeated  trade tradeReference = 0
 }
// Specification of the standard set of terms that define a legal agreement.
message Agreement
 {
  creditSupportAgreementElections creditSupportAgreementElections = 0
  collateralTransferAgreementElections collateralTransferAgreementElections = 0
  securityAgreementElections securityAgreementElections = 0
  masterAgreementSchedule masterAgreementSchedule = 0
  transactionAdditionalTerms transactionAdditionalTerms = 0
  masterAgreementElections masterAgreementElections = 0
 }
