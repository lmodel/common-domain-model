 syntax="proto3";
 package
// metamodel_version: 1.11.0
// A class to specify an account as an account number alongside, optionally. an account name, an account type, an account beneficiary and a servicing party.
message Account
 {
  party partyReference = 0
  string accountNumber = 0
  string accountName = 0
  accountTypeEnum accountType = 0
  party accountBeneficiary = 0
  party servicingParty = 0
 }
// The accrual rate and related terms, to adjust the price of an underlier impacted by a Corporate Action when economic impact consists in freezing the underlier price to the last fixing then applying accruals per each remaining underlier price fixing date required i.e. for each fixing date, adjustedPrice = lastFixingPrice x accrualFactor, where: accrualFactor = (1 + accrualRateValue x DCF).
message AccrualFactor
 {
  priceSchedule value = 0
  accrualFactorCalculationTerms calculationTerms = 0
 }
// Describes the input terms involved in the calculation of the accrual factor. Optionnally, long and short stub interpolation rates can be specified.
message AccrualFactorCalculationTerms
 {
  decimal tenorTillMaturity = 0
  dayCountFractionEnum dayCountFraction = 0
  stubValue interpolationTerms = 0
 }
message AcctOwnr
 {
  id id = 0
 }
// A type for defining the Additional Disruption Events.
message AdditionalDisruptionEvents
 {
  boolean changeInLaw = 0
  boolean failureToDeliver = 0
  boolean insolvencyFiling = 0
  boolean hedgingDisruption = 0
  boolean increasedCostOfHedging = 0
  boolean foreignOwnershipEvent = 0
  boolean lossOfStockBorrow = 0
  decimal maximumStockLoanRate = 0
  boolean increasedCostOfStockBorrow = 0
  decimal initialStockLoanRate = 0
  ancillaryRoleEnum determiningParty = 0
 repeated  clause additionalBespokeTerms = 0
 }
// A class to specify the events that will give rise to the payment additional fixed payments.
message AdditionalFixedPayments
 {
  boolean interestShortfallReimbursement = 0
  boolean principalShortfallReimbursement = 0
