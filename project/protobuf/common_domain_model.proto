message AgreementName
 {
  legalAgreementTypeEnum agreementType = 0
  creditSupportAgreementTypeEnum creditSupportAgreementType = 0
  collateralMarginTypeEnum creditSupportAgreementMarginType = 0
 repeated  contractualDefinitionsEnum contractualDefinitionsType = 0
 repeated  contractualTermsSupplement contractualTermsSupplement = 0
 repeated  contractualMatrix contractualMatrix = 0
  masterAgreementTypeEnum masterAgreementType = 0
  masterConfirmationTypeEnum masterConfirmationType = 0
  masterConfirmationAnnexTypeEnum masterConfirmationAnnexType = 0
  string otherAgreement = 0
  brokerConfirmationTypeEnum brokerConfirmationType = 0
 }
