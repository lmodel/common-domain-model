message AdditionalRepresentation
 {
 repeated  additionalRepresentationElection partyElection = 0
  string customElection = 0
 }
// A class to specify the parties' Additional Representation(s) election.
message AdditionalRepresentationElection
 {
  counterpartyRoleEnum party = 0
  boolean isApplicable = 0
  string additionalLanguage = 0
 }
// A class to specify Additional Representations that may be applicable to an agreement.
message AdditionalRepresentations
 {
  additionalRepresentation additionalRepresentation = 0
  boolean regulatoryComplianceRepresentation = 0
 }
// A class to specify the Pledgor/Obligor/Chargor Additional Rights Event election.
message AdditionalRightsEvent
 {
  boolean isApplicable = 0
  string qualification = 0
 }
// A class to specify an optional termination event, additional to the Termination Events that will be deemed an Access Condition (Initial Margin CSA) or a Specified Condition (Variation Margin CSA).
message AdditionalTerminationEvent
 {
  string name = 0
 repeated  counterpartyRoleEnum applicableParty = 0
 }
// The specification of the Additional Type of transaction that can require the collection or delivery of initial margin under a given regulatory regime for the purposes of Covered Transactions.
message AdditionalType
 {
  additionalTypeEnum standardValue = 0
  string customValue = 0
 }
// A class to specify a post or street address.
message Address
 {
 repeated  string street = 0
  string city = 0
  string state = 0
  string country = 0
  string postalCode = 0
 }
// Specifies the address for transfer as specified by the respective parties to the agreement.
message AddressesForTransfer
 {
 repeated  transferInformationElection partyElection = 0
 }
message AddtlAttrbts
 {
  string rskRdcgTx = 0
  string sctiesFincgTxInd = 0
 }
// A class for defining a date that shall be subject to adjustment if it would otherwise fall on a day that is not a business day in the specified business centers, together with the convention for adjusting the date.
message AdjustableDate
 {
  date unadjustedDate = 0
  businessDayAdjustments dateAdjustments = 0
  businessDayAdjustments dateAdjustmentsReference = 0
  date adjustedDate = 0
 }
// A class for defining a series of dates that shall be subject to adjustment if they would otherwise fall on a day that is not a business day in the specified business centers, together with the convention for adjusting the dates.
message AdjustableDates
 {
 repeated  date unadjustedDate = 0
  businessDayAdjustments dateAdjustments = 0
 repeated  date adjustedDate = 0
 }
// A class for defining a date that shall be subject to adjustment if it would otherwise fall on a day that is not a business day in the specified business centers, together with the convention for adjusting the date.
message AdjustableOrAdjustedDate
 {
  date unadjustedDate = 0
  businessDayAdjustments dateAdjustments = 0
  date adjustedDate = 0
 }
// This Rosetta class specifies the date as either an unadjusted, adjusted or relative date. It supplements the features of the AdjustableOrAdjustedDate to support the credit default swap option premium, which uses the relative date construct.
message AdjustableOrAdjustedOrRelativeDate
 {
  date unadjustedDate = 0
  businessDayAdjustments dateAdjustments = 0
  date adjustedDate = 0
  relativeDateOffset relativeDate = 0
 }
// A class giving the choice between defining a date as an explicit date together with applicable adjustments or as relative to some other (anchor) date.
message AdjustableOrRelativeDate
 {
  adjustableDate adjustableDate = 0
  adjustedRelativeDateOffset relativeDate = 0
 }
// A class giving the choice between defining a series of dates as an explicit list of dates together with applicable adjustments or as relative to some other series of (anchor) dates.
message AdjustableOrRelativeDates
 {
  adjustableDates adjustableDates = 0
  relativeDates relativeDates = 0
 }
// A class giving the choice between defining a series of dates as an explicit list of dates together with applicable adjustments or as relative to some other series of (anchor) dates, or as a calculation period schedule.
message AdjustableRelativeOrPeriodicDates
 {
  adjustableDates adjustableDates = 0
  relativeDates relativeDates = 0
  periodicDates periodicDates = 0
 }
// A type defining a date (referred to as the derived date) as a relative offset from another date (referred to as the anchor date) plus optional date adjustments.
message AdjustedRelativeDateOffset
 {
  integer periodMultiplier = 0
  periodEnum period = 0
  dayTypeEnum dayType = 0
  businessDayConventionEnum businessDayConvention = 0
  businessCenters businessCenters = 0
  businessCenters businessCentersReference = 0
  date dateRelativeTo = 0
  date adjustedDate = 0
  businessDayAdjustments relativeDateAdjustments = 0
 }
// Describes the terms involved for adjusting the price of the underlier impacted by a Corporate Action.
message AdjustmentFactor
 {
  decimal value = 0
  adjustmentFactorCalculationTerms calculationTerms = 0
 }
// Describes the input terms involved in the calculation of the adjustment factor applied to the price of the underlier impacted by a Corporate Action.
message AdjustmentFactorCalculationTerms
 {
  decimal shareForShareRatio = 0
  decimal shareForRightsRatio = 0
  price rightsSubscriptionPrice = 0
  decimal dividendRatio = 0
  spinOff spinOff = 0
  merger merger = 0
  accrualFactor accrualFactor = 0
  price lastFixingPriceBeforeAdjustment = 0
  priceSchedule dividendObservation = 0
  string bespokeCalculationFormula = 0
 }
// Represents a class to specify a credit notation.
message AgencyRatingCriteria
 {
  creditNotation creditNotation = 0
  creditNotationMismatchResolutionEnum mismatchResolution = 0
  creditRatingAgencyEnum referenceAgency = 0
  creditNotationBoundaryEnum boundary = 0
