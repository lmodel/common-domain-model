    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_InflationSwap_Basis_YearOn_Year
  description: 'Qualifies a product as a Basis (Float-Float) Annual Reset Inflation Swap based on the economic terms and the
    following criteria: 1) An interest rate product with one floating interest rate leg and one inflation rate leg and more
    than one payment, and 2) without cross-currency features or ''zero coupon'' features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_InflationSwap_Basis_ZeroCoupon
  description: 'Qualifies a product as a Basis (Float-Float) Inflation Swap based on the economic terms and the following
    criteria: 1) An interest rate product with one floating interest rate leg and one inflation interest rate leg, 2) where
    the floating leg is not based on an OIS index, 3) where the inflation leg features an inflation floating rate, 4) where
    an interest rate payout is made at maturity into a singular payment and 5) without cross-currency features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_Fra
  description: 'Qualifies the product as a Floating Rate Agreement based on the economic terms and the following criteria:
    1) An interest rate product with one fixed and one floating leg, each of which has a single payment, and 2) could include
    a cross-currency feature, and the floating rate leg could be based OIS index.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_CapFloor
  description: 'Qualifies a product as an interest rate cap, interest rate floor, or an interest rate collar based on the
    economic terms and the following criteria: 1) An interest rate product with one one leg that includes a cap and/or a floor.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_Option_Swaption
  description: Qualifies a product as a Swaption that can be exercised into an Interest Rate Swap, which could be any type
    of interest rate product with two legs based on the economic terms.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_Option_DebtOption
  description: Qualifies a product as a Option that can be exercised into an Debt Product based on the economic terms.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_Forward_Debt
  description: Qualifies a product as Interest Rate Bond Forward based on economic terms, which is defined as a transaction
    in which one party agrees to pay an agreed price for a specified amount of a bond of an issuer or a basket of bonds of
    several issuers at a future date and the other party agrees to pay a price for the same amount of the same bond to be
    set on a specified date in the future.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_Spot_Forward
  description: Qualifies a product as Foreign Exchange based on economic terms, which is defined as an agreement to buy one
    currency against the delivery of another currency at a rate set on the trade date for settlement on a specified date in
    the future.  Dependent on conventions specific to local markets the product could be considered either Spot or Forward.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_Swap
  description: Qualifies a product as Foreign Exchange Swap based on economic terms, which is defined as a contract in which
    one party borrows one currency from, and simultaneously lends another to, the second party. Each party uses the repayment
    obligation to its counterparty as collateral and the amount of repayment is fixed at the FX forward rate as of the start
    of the contract.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_NDF
  description: Qualifies a product as Foreign Exchange Non-Deliverable Forward based on economic terms, which is defined as
    a Forward transaction where the notional amount of one of the currencies (the reference currency) is converted into the
    other currency (the settlement currency) at a spot foreign exchange rate that is observed on a valuation date prior to
    the settlement date, and a single net payment in the settlement currency is made on the settlement date. No payment or
    account transfer takes place in the reference currency.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_NDS
  description: Qualifies a product as Foreign Exchange NDS based on economic terms, which is defined as a contract in which
    one party borrows one currency from, and simultaneously lends another to, the second party. Each party uses the repayment
    obligation to its counterparty as collateral and the amount of repayment is fixed at the FX forward rate as of the start
    of the contract.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_ParameterReturnVariance
  description: 'Qualifies a product as Foreign Exchange Swap for which the performance is based on the variance of a foreign
    exhange underlier.  The determination of the qualification is based on the economic terms and the following criteria:
    1) Is a Foreign Exchange product (the underlier is foreign exchange) 2) with only one performance leg 3) which has variance
    return terms, 4) there are no option features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_ParameterReturnVolatility
  description: 'Qualifies a product as Foreign Exchange Swap for which the performance is based on the volatility of a foreign
    exchange underlier.  The determination of the qualification is based on the economic terms and the following criteria:
    1) Is a Foreign Exchange product (the underlier is foreign exchange) 2) with only one performance leg 3) which has volatility
    return terms, 4) there are no option features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_ParameterReturnCorrelation
  description: 'Qualifies a product as Foreign Exchange Swap for which the performance is based on the correlation changes
    between the constituents of a basket.  The determination of the qualification is based on the economic terms and the following
    criteria: 1) Is a product with with only one performance leg 2) which has correlation return terms, 3) with a basket underlier
    4) which is exclusively constituted by foreign exchange constituents and 5) there are no option features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_VanillaOption
  description: Qualifies a product as FX Plain Vanilla Option based on economic terms, which is defined as one where 1) exercise
    style is American or European style only, and 2) does not contain any feature like Forward Starting Strike or Performance
    payout.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_ForeignExchange_NDO
  description: Qualifies a product as FX Non Deliverable Option based on economic terms, which is defined as one where exercise
    style is European only.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_RepurchaseAgreement
  description: Qualifies a product as a Repurchase Agreement based on the repo trate of the trade (ie the interest charges)
    being defined in an InterestRatePayout and the asset that is bought and sold being defined in an AssetPayout in a CollateralPosition.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_BuySellBack
  description: Qualifies a product as a Buy/Sell Back based on the repo trate of the trade (ie the interest charges) being
    defined in an InterestRatePayout and the asset that is bought and sold being defined in an AssetPayout in a CollateralPosition,
    along with an enumerator to distinguish ths product type from a traditional repurchase ageement.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_SecurityLending
  description: Qualifies a product as Securities Lending based on the asset to be lent (usually a security) being defined
    in a singular AssetPayout, with the collateral, which can be an asset (usually cash or securities), defined in a CollateralPortfolio.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_Commodity_Swap_FixedFloat
  description: 'Qualifies a product as a Fixed Float Commodity Swap.  The determination of the qualification is based on the
    economic terms and the following criteria: 1) One Floating Leg represented by the CommodityPayout, with an underlier that
    is a commodity, 2) One Fixed Leg represented by the FixedPricePayout, and 3) there are no other payout types.'
