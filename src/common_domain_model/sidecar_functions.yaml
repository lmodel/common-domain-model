- name: FixedAmount
  description: '2006 ISDA Definition Article 5 Section 5.1. Calculation of a Fixed Amount: The Fixed Amount payable by a party
    on a Payment Date will be: (a) if an amount is specified for the Swap Transaction as the Fixed Amount payable by that
    party for that Payment Date or for the related Calculation Period, that amount; or (b) if an amount is not specified for
    the Swap Transaction as the Fixed Amount payable by that party for that Payment Date or for the related Calculation Period,
    an amount calculated on a formula basis for that Payment Date or for the related Calculation Period as follows: Fixed
    Amount = Calculation Amount × Fixed Rate × Day Count Fraction.'
  inputs:
  - name: interestRatePayout
    type: InterestRatePayout
    cardinality: 1..1
  - name: notional
    type: number
    cardinality: 0..1
  - name: date
    type: date
    cardinality: 0..1
  - name: calculationPeriodData
    type: CalculationPeriodData
    cardinality: 0..1
  output:
    name: fixedAmount
    type: number
    cardinality: 1..1
  namespace: cdm.product.asset
  module: cdm_product_asset
  associated_classes:
  - InterestRatePayout
  - CalculationPeriodData
- name: FloatingAmount
  description: '2006 ISDA Definition Article 6 Section 6.1. Calculation of a Floating Amount: Subject to the provisions of
    Section 6.4 (Negative Interest Rates), the Floating Amount payable by a party on a Payment Date will be: (a) if Compounding
    is not specified for the Swap Transaction or that party, an amount calculated on a formula basis for that Payment Date
    or for the related Calculation Period as follows: Floating Amount = Calculation Amount × Floating Rate + Spread × Floating
    Rate Day Count Fraction (b) if ''Compounding'' is specified to be applicable to the Swap Transaction or that party and
    ''Flat Compounding'' is not specified, an amount equal to the sum of the Compounding Period Amounts for each of the Compounding
    Periods in the related Calculation Period; or (c) if ''Flat Compounding'' is specified to be applicable to the Swap Transaction
    or that party, an amount equal to the sum of the Basic Compounding Period Amounts for each of the Compounding Periods
    in the related Calculation Period plus the sum of the Additional Compounding Period Amounts for each such Compounding
    Period.'
  inputs:
  - name: interestRatePayout
    type: InterestRatePayout
    cardinality: 1..1
  - name: rate
    type: number
    cardinality: 0..1
  - name: notional
    type: number
    cardinality: 0..1
  - name: date
    type: date
    cardinality: 0..1
  - name: calculationPeriodData
    type: CalculationPeriodData
    cardinality: 0..1
  output:
    name: floatingAmount
