  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_IRSwap_FixedFloat_ZeroCoupon
  description: 'Qualifies a product as a Fixed-Float Zero Coupon Interest Rate Swap based on the economic terms and the following
    criteria: 1) An interest rate product with one fixed and one floating leg, 2) where the fixed leg represents one singular
    payment agreed upon execution and to be made at maturity, 3) where the floating leg is not based on an OIS index and 4)
    without any inflation features or cross-currency features.'
  inputs:
