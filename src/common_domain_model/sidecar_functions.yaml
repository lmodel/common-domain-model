- name: Qualify_InterestRate_IRSwap_FixedFixed
  description: 'Qualifies a product as a Fixed-Fixed Interest Rate Swap based on the economic terms and the following criteria:
    1) An interest rate product with two fixed legs and more than one payment and 2) without inflation features or cross-currency
    features but could have ''zero coupon'' features.'
