- name: PerformancePayoutAndInterestRatePayoutOnlyExists
  description: At least one PerformancePayout exists, and at least one InterestRatePayout exists, and no other payouts exist.
  inputs:
  - name: payouts
    type: Payout
    cardinality: 0..*
  output:
    name: result
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
- name: FilterTradeLot
  description: Filter list of TradeLot based on TradeLot->lotIdentifier.
  inputs:
  - name: tradeLots
    type: TradeLot
    cardinality: 0..*
  - name: lotIdentifier
    type: Identifier
    cardinality: 0..*
  output:
    name: filteredTradeLots
    type: TradeLot
    cardinality: 0..*
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradeLot
  - Identifier
- name: AddTradeLot
  description: Add a TradeLot to an existing list of TradeLots.
  inputs:
  - name: tradableProduct
    type: TradableProduct
    cardinality: 1..1
  - name: newTradeLot
    type: TradeLot
    cardinality: 1..1
  output:
    name: updatedTradableProduct
    type: TradableProduct
    cardinality: 1..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradableProduct
  - TradeLot
- name: ReplaceTradeLot
  description: Replace TradeLot in with matching TradeLot->lotIdentifier.
  inputs:
  - name: tradeLots
    type: TradeLot
    cardinality: 0..*
  - name: newTradeLot
    type: TradeLot
    cardinality: 1..1
  output:
    name: mergedTradeLots
    type: TradeLot
    cardinality: 0..*
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradeLot
- name: CompareTradeLot
  description: Compare the Quantity in TradeLot 1 to the Quantity (with the same unit of amount) in TradeLot 2, based on the
    CompareOp enum.
  inputs:
  - name: tradeLot1
    type: TradeLot
    cardinality: 1..1
  - name: op
    type: CompareOp
    cardinality: 1..1
  - name: tradeLot2
    type: TradeLot
    cardinality: 1..1
  output:
    name: result
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradeLot
- name: CompareTradeLotToAmount
  description: Compare the Quantity amount in TradeLot to the given amount (regardless of unit of amount), based on the CompareOp
    enum.
  inputs:
  - name: tradeLot
    type: TradeLot
    cardinality: 1..1
  - name: op
    type: CompareOp
    cardinality: 1..1
  - name: amount
    type: number
    cardinality: 1..1
  output:
    name: result
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradeLot
- name: PriceQuantityTriangulation
  description: Defines all the scenarios which triangulation can be helpful validation between Prices and Quantities.
  inputs:
  - name: tradeLots
    type: TradeLot
    cardinality: 0..*
  output:
    name: success
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - TradeLot
- name: FpmlIrd8
  description: FpML validation rule ird-8 - If the same party is specified as the payer and receiver, then different accounts
    must be specified.
  inputs:
  - name: trade
    type: Trade
    cardinality: 1..1
  - name: accounts
    type: Account
    cardinality: 0..*
  output:
    name: success
    type: boolean
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - Trade
  - Account
- name: Create_AssetFlowFromSettlementPayout
  description: Generates two opposite cashflows that correspond to a settlement payout. One leg is the asset leg, that settles
    the asset according to the quantity, direction and date defined in the settlement payout. The other is the price leg,
    that settles the price as a currency amount going in the opposite direction. The function's applicability is limited on
    purpose to a single asset with a single price and quantity specified.
  inputs:
  - name: payout
    type: SettlementPayout
    cardinality: 1..1
  output:
    name: cashflows
    type: AssetFlow
    cardinality: 2..2
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - SettlementPayout
  - AssetFlow
- name: UnderlierForOptionOrForwardProduct
  description: Extracts the underlier from an option or a forward.
  inputs:
  - name: product
    type: NonTransferableProduct
    cardinality: 1..1
  output:
    name: underlierProduct
    type: Underlier
    cardinality: 1..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - NonTransferableProduct
- name: FXFarLeg
  description: 'Extracts the far leg of an FX swap (deliverable or not) based on two criteria: the forward payout with the
    latest value date or the forward payout with the latest settlement date.'
  inputs:
  - name: product
    type: NonTransferableProduct
    cardinality: 1..1
  output:
    name: nearLegPayout
    type: SettlementPayout
    cardinality: 0..1
  namespace: cdm.product.template
  module: cdm_product_template
  associated_classes:
  - NonTransferableProduct
  - SettlementPayout
