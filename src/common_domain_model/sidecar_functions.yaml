_comment: 'Sidecar registry of all Rosetta function signatures in the CDM. Generated by rosetta_to_linkml.py — do not edit
  manually. Shape conforms to rosetta_metamodel.yaml (RosettaFunctionAnnotation). Complements per-class annotations: {rosetta_functions}
  in module schemas.'
functions:
- name: TimeZoneFromBusinessCenterTime
  description: Function to resolve a time passed as BusinessCenterTime into a TimeZone time.
  inputs:
  - name: time
    type: BusinessCenterTime
    cardinality: 1..1
  output:
    name: result
    type: TimeZone
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
  associated_classes:
