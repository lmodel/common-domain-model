  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_IRSwap_FixedFloat_OIS
  description: 'Qualifies a product as a Fixed-Float OIS Interest Rate Swap based on the economic terms and the following
    criteria: 1) An interest rate product with one fixed and one floating leg and more than one payment and where the floating
    leg is based on an OIS index, 2) without inflation features or cross-currency features, and 3) could include ''zero coupon''
    features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_IRSwap_Basis_OIS
