  namespace: cdm.base.math
  module: cdm_base_math
- name: Abs
  description: Returns the absolute value of a number. If the argument is not negative, the argument is returned. If the argument
    is negative, the negation of the argument is returned.
  inputs:
  - name: arg
    type: number
    cardinality: 1..1
