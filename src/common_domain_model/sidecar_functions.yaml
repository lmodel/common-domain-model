- name: Qualify_Commodity_Swaption
  description: Qualifies a product as a Swaption that can be exercised into a Commodity Swap, which could be any type of interest
    rate product with two legs based on the economic terms.
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_Commodity_Forward
  description: 'Qualifies a product as a Forward that will be settled with the physical delivery of a Commodity. The determination
    of the qualification is based on the economic terms and the following criteria: 1) One pricing Leg represented by either
    the FixedPricePayout or the CommodityPayout, 2) One physical Leg represented by the ForwardPayout, with an underlier that
