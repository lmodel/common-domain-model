- name: CalculationPeriod
  description: 2006 ISDA Definition Section 4.13. 'Calculation Period' means, in respect of a Swap Transaction and a party,
    each period from, and including, one Period End Date of that party to, but excluding, the next following applicable Period
    End Date during the Term of the Swap Transaction, except that (a) the initial Calculation Period for the party will commence
    on, and include, the Effective Date and (b) the final Calculation Period for the party will end on, but exclude, the Termination
    Date.
