  description: The qualification of a increase event from the fact that (i) the intent is Increase when specified, (ii) the
    associated primitives are the quantityChange and the cash transfer, the (iii) the quantity associated with the contract
    increases.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_IndexTransition
  description: The qualification of an index transition event based on (i) adjustment spread applied and (ii) floating rate
    index changed.
