- name: Create_TradeState
  description: 'Creates a single trade state by applying primitive instructions to an existing trade state (optional in case
    an execution instruction is included). The primitive instructions are applied in the following order: Always first: -
    execution, if it exists, otherwise a before state must be provided The following 3 can be executed in any order, because
    they touch separate components of the trade: - quantity change - terms change - party change Always last: - contract formation,
    otherwise the contract could be invalid.'
