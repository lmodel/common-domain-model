    and (ii) the associated primitives instructions are the TermsChange, QuantityChange and the cash transfer.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
