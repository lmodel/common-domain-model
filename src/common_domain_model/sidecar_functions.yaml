- name: Qualify_CreditDefaultSwap_SingleName
  description: 'Qualifies a product as a Credit Default Swap which provides protection relative to defaults of a reference
    entity that could be a corporate, municipal, sovereign, or special purpose vehicle issuer of publicly traded debt.  The
    determination of the qualification is based on the economic terms and the following criteria: 1) A product with one credit
    default leg and one interest leg, 2) the reference entity is corporate, municipal, or sovereign issuer of debt, 3) the
    reference obligation is not a loan, and 4) there are no option features.'
