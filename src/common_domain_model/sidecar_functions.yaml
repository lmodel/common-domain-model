- name: Create_WorkflowStep
  description: Function to create a workflow step with a business event and associated details about the message, identifiers,
    event timestamps, parties and accounts involved in the step. The function should be used when there is already a fully
    formed business event with the action set to signify that the step is new, or a correction/cancellation of a previous
    step. The action is constrained so that when a previous workflow step is specified, the valid actions are as follows;
    New -> New, New -> Correct, New -> Cancel, Correct -> Correct and Correct -> Cancel. When a previous workflow is not specified,
    the action must be New.
  inputs:
  - name: messageInformation
    type: MessageInformation
    cardinality: 0..1
  - name: timestamp
    type: EventTimestamp
    cardinality: 1..*
  - name: eventIdentifier
    type: Identifier
    cardinality: 1..*
  - name: party
    type: Party
    cardinality: 0..*
  - name: account
    type: Account
    cardinality: 0..*
  - name: previousWorkflowStep
    type: WorkflowStep
    cardinality: 0..1
  - name: action
    type: ActionEnum
    cardinality: 1..1
  - name: businessEvent
    type: BusinessEvent
    cardinality: 0..1
  output:
    name: workflowStep
    type: WorkflowStep
    cardinality: 1..1
  namespace: cdm.event.workflow
  module: cdm_event_workflow
  associated_classes:
  - MessageInformation
  - EventTimestamp
  - Identifier
  - Party
  - Account
  - WorkflowStep
  - BusinessEvent
- name: Create_AcceptedWorkflowStep
  description: Represents the acceptance of a proposed instruction that results in a workflow step containing a business event,
    message details, identifiers, event timestamps, parties and accounts. The previous workflow step input must exist to provide
    workflow lineage. The instruction from the previous workflow step should be used with a [creation BusinessEvent] function
    to create the input business event passed into this function e.g. PartyChangeInstruction from the previous step is used
    with Create_PartyChange to produce the business event which should used as an input to this step.
  inputs:
  - name: messageInformation
    type: MessageInformation
    cardinality: 0..1
  - name: timestamp
    type: EventTimestamp
    cardinality: 1..*
  - name: eventIdentifier
    type: Identifier
    cardinality: 1..*
  - name: party
    type: Party
    cardinality: 0..*
  - name: account
    type: Account
    cardinality: 0..*
  - name: proposedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: acceptedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  namespace: cdm.event.workflow
  module: cdm_event_workflow
  associated_classes:
  - MessageInformation
  - EventTimestamp
  - Identifier
  - Party
  - Account
  - WorkflowStep
  - BusinessEvent
- name: Create_AcceptedWorkflowStepFromInstruction
  description: Represents the acceptance of a proposed instruction that results in a workflow step containing a business event,
    message details, identifiers, event timestamps, parties and accounts. The previous workflow step input must exist to provide
    workflow lineage. The instruction from the previous workflow step should be used with a [creation BusinessEvent] function
    to create the input business event passed into this function e.g. PartyChangeInstruction from the previous step is used
    with Create_PartyChange to produce the business event which should used as an input to this step.
  inputs:
  - name: proposedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  output:
    name: acceptedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  namespace: cdm.event.workflow
  module: cdm_event_workflow
  associated_classes:
  - WorkflowStep
- name: Create_ProposedWorkflowStep
  description: Represents the proposal to create a business event that results in a workflow step containing an instruction,
    message details, identifiers, event timestamps, parties and accounts. The optional previous workflow step input provides
    workflow lineage to where there has been a correction or cancellation to the proposed step. The action is constrained
    so that when a previous workflow step is specified, the valid actions are as follows; New -> Correct and Correct -> Cancel.
    When a previous workflow is not specified, the action must be New.
  inputs:
  - name: messageInformation
    type: MessageInformation
    cardinality: 0..1
  - name: timestamp
    type: EventTimestamp
    cardinality: 1..*
  - name: eventIdentifier
    type: Identifier
    cardinality: 1..*
  - name: party
    type: Party
    cardinality: 0..*
  - name: account
    type: Account
    cardinality: 0..*
  - name: previousWorkflowStep
    type: WorkflowStep
    cardinality: 0..1
  - name: action
    type: ActionEnum
    cardinality: 1..1
  - name: proposedEvent
    type: EventInstruction
    cardinality: 1..1
  - name: approval
    type: WorkflowStepApproval
    cardinality: 0..*
  output:
    name: proposedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  namespace: cdm.event.workflow
  module: cdm_event_workflow
  associated_classes:
  - MessageInformation
  - EventTimestamp
  - Identifier
  - Party
  - Account
  - WorkflowStep
  - EventInstruction
  - WorkflowStepApproval
- name: Create_RejectedWorkflowStep
  description: Represents the rejection of a proposed instruction that results in a workflow step containing the rejection
    flag, message details, identifiers, event timestamps, parties and accounts involved in the step. The previous workflow
    step input must exist to provide workflow lineage. This function will be further developed to provide the reasons for
    rejection.
  inputs:
  - name: messageInformation
