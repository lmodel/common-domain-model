    type: date
    cardinality: 0..*
  - name: newDate
    type: date
    cardinality: 1..1
  output:
    name: newList
    type: date
    cardinality: 0..*
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: PopOffDateList
  description: Remove last element from a list of dates.
  inputs:
  - name: dates
    type: date
    cardinality: 0..*
  output:
    name: newList
    type: date
    cardinality: 0..*
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: IsWeekend
  description: returns whether the supplied date is a weekend. This assumes a 5 day week with Saturday and Sunday as holidays.
    A more sophisticated implementation might use the business centers to determine which days are weekends, but most jurisdictions
    where derivatives are traded follow this convention.
  inputs:
  - name: date
    type: date
    cardinality: 1..1
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: isWeekend
    type: boolean
    cardinality: 1..1
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: IsHoliday
  description: Returns whether a day is a holiday for the specified business centers
  inputs:
  - name: checkDate
    type: date
    cardinality: 1..1
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: isHoliday
    type: boolean
    cardinality: 1..1
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: IsBusinessDay
  description: returns an indicator of whether the supplied date is a good business date given the supplied business centers.
    True => good date, i.e. not a weekend or holiday. False means that it is either a weekend or a holiday
  inputs:
  - name: date
    type: date
    cardinality: 1..1
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: isGoodBusinessDay
    type: boolean
    cardinality: 1..1
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: AddBusinessDays
  description: Returns a good business date that has been offset by the given number of business days given the supplied business
    centers. A negative value implies an earlier date (before the supplied originalDate), and a positive value a later date
    (after the supplied date).
  inputs:
  - name: originalDate
    type: date
    cardinality: 1..1
  - name: offsetBusinessDays
    type: int
    cardinality: 1..1
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: shiftedDate
    type: date
    cardinality: 1..1
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: GenerateDateList
  description: Creates a list of good business days starting from the startDate and going to the end date, inclusive, omitting
    any days that are weekends or holidays according to the supplied business centers.
  inputs:
  - name: startDate
    type: date
    cardinality: 1..1
  - name: endDate
    type: date
    cardinality: 1..1
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: dateList
    type: date
    cardinality: 0..*
  namespace: cdm.base.datetime
  module: cdm_base_datetime
