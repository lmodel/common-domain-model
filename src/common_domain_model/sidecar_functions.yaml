  description: The qualification of a security settlement from the fact that (i) it is composed of a cashTransfer component
    and a securityTransfer component, and (ii) the cash and security move in opposite directions.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_SecurityTransfer
  description: The qualification of a security transfer from the fact that the only component is a securityTransfer.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Shaping
  description: The qualification of a shaping event from the fact that (i) the only primitive is a split where the original
    trade is closed, (ii) the parties before and after the split remain the same (by contrast with an allocation, for instance)
    and (iii) the split trades contain a package component in their execution details. This package ties together the resulting
    shapes trades' identifiers and must be the same across all shaped trades. Note that SplitPrimitive type has a condition
    to check that the post-split quantities sum to the pre-split quantity.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_StockSplit
