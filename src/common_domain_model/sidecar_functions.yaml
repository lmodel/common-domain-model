    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_Commodity_Option_Physical
  description: Qualifies a product as a Option that can be exercised into an Commodity.
