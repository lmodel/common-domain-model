    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_PartialDelivery
  description: Qualification of a partial delivery which constitutes a change in quantity and open with the remaining quantity
    and termination date.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_PartialNovation
  description: The qualification of a novation event from the fact that (i) the intent is Novation when specified, (ii) the
    primitives quantityChange and contractFormation exist, (iii) the contract quantity/notional has decreased as part of the
    quantityChange primitive, while (iv) there is a remaining quantity/notional, (v) the stepped-in contract has a different
    contract identifier than the original contract, (vi) the stepped-in contract has the novation event date and the novation
    event effective date, and (vii) the contract counterparties have changed.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
