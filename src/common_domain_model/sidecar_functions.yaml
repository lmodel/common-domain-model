  namespace: cdm.base.datetime
  module: cdm_base_datetime
  associated_classes:
  - BusinessCenters
- name: BusinessCenterHolidaysMultiple
  description: Returns a merged list of holidays for the supplied business centers.
  inputs:
  - name: businessCenters
    type: BusinessCenter
    cardinality: 0..*
  output:
    name: holidayDates
    type: date
    cardinality: 0..*
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: BusinessCenterHolidays
  inputs:
  - name: businessCenter
    type: BusinessCenter
    cardinality: 1..1
  output:
    name: holidayDates
    type: date
    cardinality: 0..*
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: DayOfWeek
  description: Returns the day of week corresponding to the supplied date.
  inputs:
  - name: date
    type: date
    cardinality: 1..1
  output:
    name: dayOfWeek
    type: DayOfWeekEnum
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: AddDays
  description: Adds the specified number of calendar days to the supplied date.  A negative number will generate a date before
    the supplied date.
  inputs:
  - name: inputDate
    type: date
    cardinality: 1..1
  - name: numDays
    type: int
    cardinality: 1..1
  output:
    name: resultDate
    type: date
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: DateDifference
  description: Subtracts the two supplied dates to return the number of calendar days between them.  A negative number implies
    first is after second.
  inputs:
  - name: firstDate
    type: date
    cardinality: 1..1
  - name: secondDate
    type: date
    cardinality: 1..1
  output:
    name: difference
    type: int
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: LeapYearDateDifference
  description: Subtracts the two supplied dates to return the number of leap year calendar days between them. A negative number
    implies firstDate is after secondDate.
  inputs:
  - name: firstDate
    type: date
    cardinality: 1..1
  - name: secondDate
    type: date
    cardinality: 1..1
  output:
    name: difference
    type: int
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: DateDifferenceYears
  description: Computes the difference in years between two dates. A negative number implies firstDate is after secondDate.
  inputs:
  - name: firstDate
    type: date
    cardinality: 1..1
  - name: secondDate
    type: date
    cardinality: 1..1
  output:
    name: difference
    type: number
    cardinality: 1..1
  namespace: cdm.base.datetime
  module: cdm_base_datetime
- name: AppendDateToList
  description: Add a date to a list of dates.
  inputs:
