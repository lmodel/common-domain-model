  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_CrossCurrency_Basis
  description: 'Qualifies a product as a Basis (Float-Float) Cross Currency Interest Rate Swap based on the economic terms
    and the following criteria: 1) An interest rate product with two floating legs, a cross-currency feature in one or both
    legs, and more than one payment, 2) but without inflation features, and 3) could be a ''zero coupon'' and floating leg
    index could be OIS or non-OIS.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_CrossCurrency_FixedFixed
  description: 'Qualifies a product as a Fixed-Fixed Cross-Currency Interest Rate Swap based on the economic terms and the
    following criteria: 1) An interest rate product with two fixed legs and a cross-currency feature and more than one payment,
    2) without inflation features and 3) could be a ''zero coupon'''
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_InflationSwap_FixedFloat_YearOn_Year
  description: 'Qualifies a product as a Fixed-Float Annual Reset Inflation Swap based on the economic terms and the following
    criteria: 1) An interest rate product with one fixed and one inflation rate leg and more than one payment, and 2) without
    cross-currency features or ''zero coupon'' features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
    name: is_product
    type: boolean
    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_InflationSwap_FixedFloat_ZeroCoupon
  description: 'Qualifies a product as a Fixed-Float Inflation Swap based on the economic terms and the following criteria:
    1) An interest rate product with one fixed and one inflation rate leg, 2) where the fixed leg represents one singular
    payment agreed upon execution and to be made at maturity, 3) where the inflation leg features an inflation floating rate
    and 4) without cross-currency features.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
