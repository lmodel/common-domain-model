  - name: proposedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  output:
    name: rejectedWorkflowStep
    type: WorkflowStep
    cardinality: 1..1
  namespace: cdm.event.workflow
  module: cdm_event_workflow
  associated_classes:
  - MessageInformation
  - EventTimestamp
  - Identifier
  - WorkflowStep
