- name: YearFraction
  description: The fraction of a year represented by a date range
  inputs:
  - name: dayCountFractionEnum
    type: DayCountFractionEnum
    cardinality: 1..1
  - name: startDate
    type: date
    cardinality: 1..1
  - name: endDate
    type: date
    cardinality: 1..1
  - name: terminationDate
    type: date
    cardinality: 0..1
  - name: periodsInYear
    type: int
    cardinality: 0..1
  output:
    name: result
    type: number
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime.daycount
  module: cdm_base_datetime_daycount
- name: YearFractionForOneDay
  description: Return the year fraction represented by a single day, i.e 1 / dayCountBasis, where daycountBasis represents
    the denominator of the day count fraction. This perhaps should take into account leap years, though the ISDA compounding
    formulas do not cover ACT basis at the moment.
  inputs:
  - name: dcf
    type: DayCountFractionEnum
    cardinality: 1..1
  output:
    name: yearFrac
    type: number
    cardinality: 1..1
  namespace: cdm.base.datetime.daycount
  module: cdm_base_datetime_daycount
- name: DayCountBasis
  description: Return the day count basis (the denominator of the day count fraction) for the day count fraction.
  inputs:
  - name: dcf
    type: DayCountFractionEnum
    cardinality: 1..1
  output:
    name: basis
    type: int
    cardinality: 1..1
  code_implementation: true
  namespace: cdm.base.datetime.daycount
  module: cdm_base_datetime_daycount
