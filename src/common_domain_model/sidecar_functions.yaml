    specified, (ii) the associated primitives are the quantityChange and the cash transfer, the (iii) the quantity associated
    with the contract decreases, and (iv) there is an actual remaining quantity.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
