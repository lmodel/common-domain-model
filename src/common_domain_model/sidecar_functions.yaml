  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_IRSwap_Basis
  description: 'Qualifies a product as a Basis (Float-Float) Interest Rate Swap based on the economic terms and the following
    criteria: 1) An interest rate product with two floating legs and more than one payment, 2) without inflation features
    or cross-currency features but could have ''zero coupon'' features, and 3) where neither floating leg is  based on an
    OIS index.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
  output:
