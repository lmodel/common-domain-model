  description: The qualification of a portfolio rebalancing event from the fact that (i) the intent is PortfolioRebalancing,
    and (ii) the execution primitive exists
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Reallocation
  description: The qualification of a reallocation event from the fact that (i) a quantity change primitive exists, (ii) a
    split primitive exists, and (iii) the intent is Reallocation.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
