  inputs:
  - name: a
    type: number
    cardinality: 1..1
  - name: b
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: RoundToNearest
  description: Round a number to the supplied nearest, using the supplied rounding mode.
  inputs:
  - name: value
    type: number
    cardinality: 1..1
  - name: nearest
    type: number
    cardinality: 1..1
  - name: roundingMode
    type: RoundingModeEnum
    cardinality: 1..1
  output:
