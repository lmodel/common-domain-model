    and assetPayout.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Repurchase
  description: The qualification of a repurchase event from the fact that (i) a quantityChange instruction exists, (ii) an
    assetPayout exists, (iii) the remaining quantity = 0, (iv) the closedState of the contract is Terminated, and (v) the
    intent of the event is 'Repurchase'.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Reset
  description: The qualification of a reset event from the fact that the only primitive is the reset.
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Roll
  description: 'Qualification of a roll event based on: (i) terminating a single existing trade, (ii) entering into a new
    trade with the same details as the old trade, except for the effective and termination date where the effective date.
    The roll qualification does not make any assumption on the resulting quantity which may change compared to the original
    trade (it may only be partially rolled). The price is also likely different as market conditions may have evolved.'
  inputs:
  - name: businessEvent
    type: BusinessEvent
    cardinality: 1..1
  output:
    name: is_event
    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
