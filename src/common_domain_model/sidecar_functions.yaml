    type: boolean
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: UpdateAmount
  description: Updates an amount based on the given QuantityChangeDirectionEnum.  If the direction is Increase, the old amount
    and change amount are summed, if the direction is Decrease, then the change amount is subtracted from the old amount,
    and if the direction is Replace then the change amount replaces the old amount.
  inputs:
  - name: oldAmount
    type: number
    cardinality: 0..1
  - name: changeAmount
    type: number
    cardinality: 0..1
  - name: direction
    type: QuantityChangeDirectionEnum
    cardinality: 1..1
  output:
    name: newAmount
    type: number
    cardinality: 0..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: UpdateDatedValues
  description: Updates the amounts of the dated values based on the given QuantityChangeDirectionEnum. For all periods after
    the effective date of the change, if the direction is Increase, the old amount and change amount are summed, if the direction
    is Decrease, then the change amount is subtracted from the old amount, and if the direction is Replace then the change
    amount replaces the old amount.
  inputs:
  - name: datedValues
    type: DatedValue
    cardinality: 0..*
  - name: changeAmount
    type: number
    cardinality: 0..1
  - name: direction
    type: QuantityChangeDirectionEnum
    cardinality: 1..1
  - name: effectiveDate
    type: date
    cardinality: 0..1
  output:
    name: newdatedValues
    type: DatedValue
    cardinality: 0..*
  namespace: cdm.base.math
  module: cdm_base_math
  associated_classes:
  - DatedValue
