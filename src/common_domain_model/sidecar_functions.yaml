    cardinality: 0..*
  namespace: cdm.base.math
  module: cdm_base_math
  associated_classes:
  - QuantitySchedule
- name: AppendToVector
  description: Append a single value to a vector (list of numbers).
  inputs:
  - name: vector
    type: number
    cardinality: 0..*
  - name: value
    type: number
    cardinality: 1..1
  output:
    name: resultVector
    type: number
    cardinality: 0..*
  namespace: cdm.base.math
  module: cdm_base_math
- name: VectorOperation
  description: Generates a result vector by applying the supplied arithmetic operation to each element of the supplied left
    and right vectors in turn.  i.e. result[n] = left[n] <op> right[n], where <op> is the arithmetic operation defined by
    ArithmeticOperationEnum.
  inputs:
  - name: arithmeticOp
    type: ArithmeticOperationEnum
    cardinality: 1..1
  - name: left
    type: number
    cardinality: 0..*
  - name: right
    type: number
    cardinality: 0..*
  output:
    name: result
    type: number
    cardinality: 0..*
  code_implementation: true
  namespace: cdm.base.math
  module: cdm_base_math
- name: VectorScalarOperation
  description: Generates a result vector by applying the supplied arithmetic operation and scalar right value to each element
    of the supplied left vector in turn. i.e. result[n] = left[n] <op> right, where <op> is the arithmetic operation defined
    by ArithmeticOperationEnum.
  inputs:
  - name: arithmeticOp
    type: ArithmeticOperationEnum
    cardinality: 1..1
  - name: left
    type: number
    cardinality: 0..*
  - name: right
    type: number
    cardinality: 0..1
  output:
    name: result
    type: number
    cardinality: 0..*
  namespace: cdm.base.math
  module: cdm_base_math
- name: VectorGrowthOperation
  description: Generates a result vector by starting with the supplied base value (typically 1), and then multiplying it in
    turn by each growth factor, which is typically a number just above 1. For instance, a growth factor of 1.1 reprsents a
    10% increase, and 0.9 a 10% decrease. The results will show the successive results of applying the successive growth factors,
    with the first value of the list being the supplied baseValue, and final value of the results list being the product of
    all of the supplied values.  i.e. result[1] = baseValue * factor[1], result[n] = result[n-1] * factor[n]. The resulting
    list will have the one more element than the supplied list of factors.
  inputs:
  - name: baseValue
    type: number
    cardinality: 1..1
  - name: factor
    type: number
    cardinality: 0..*
  output:
    name: result
    type: number
    cardinality: 0..*
  code_implementation: true
  namespace: cdm.base.math
  module: cdm_base_math
- name: ArithmeticOperation
  inputs:
  - name: n1
    type: number
    cardinality: 1..1
  - name: op
    type: ArithmeticOperationEnum
    cardinality: 1..1
  - name: n2
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Exp
  description: Calculates the exponential function e^x. Handles zero and negative inputs by utilizing the inverse property
    exp(-x) = 1/exp(x), and delegates positive inputs to an argument reduction router to ensure numerical stability.
  inputs:
  - name: x
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Sqrt
  description: Approximates the square root of a number using the Newton-Raphson method (Babylonian method). Utilizes a tiered
    initial guess strategy based on input magnitude followed by 10 unrolled iterations to ensure convergence to double precision.
  inputs:
  - name: x
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Log
  description: Calculates the natural logarithm ln(x). Uses argument scaling to shift inputs into the optimal series convergence
    range (0.5 to 2.0) by applying logarithmic identities (e.g., ln(x) = ln(x*C) - ln(C)) for small or large inputs.
  inputs:
  - name: x
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Exp_Squaring_Helper
  description: Reconstructs the exponential result by performing repeated squaring. Acts as the inverse operation to the argument
    reduction phase, calculating (val)^(2^count) to restore the original magnitude.
  inputs:
  - name: val
    type: number
    cardinality: 1..1
  - name: count_help
    type: number
    cardinality: 1..1
  output:
    name: result
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Exp_Pos_Router
  description: Routes positive inputs to the Taylor series core. Performs argument reduction by dividing large inputs by powers
    of 2 (2, 4, 8, or 16) to ensure the value passed to the series falls within the optimal convergence range (0.0 to 0.7).
  inputs:
  - name: val
    type: number
    cardinality: 1..1
  output:
    name: res
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Exp_Core_Taylor
  description: Calculates the exponential function using a 10th-degree Taylor-Maclaurin series expansion (1 + x + x^2/2! +
    ...). Optimized for small inputs using unrolled power calculations and pre-computed factorial constants to minimize computational
    cost.
  inputs:
  - name: val
    type: number
    cardinality: 1..1
  output:
    name: approx
    type: number
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
- name: Log_Internal_Series
  description: Calculates the natural logarithm using the Inverse Hyperbolic Tangent series expansion up to degree 19. Optimized
    for the interval (0.5, 2.0) using unrolled power calculations and direct term division.
  inputs:
  - name: x
    type: number
    cardinality: 1..1
  output:
