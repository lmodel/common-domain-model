    cardinality: 1..1
  namespace: cdm.product.qualification
  module: cdm_product_qualification
  associated_classes:
  - EconomicTerms
- name: Qualify_InterestRate_CrossCurrency_FixedFloat
  description: 'Qualifies a product as a Fixed-Float Cross-Currency Interest Rate Swap based on the economic terms and the
    following criteria: 1) An interest rate product with one fixed and one floating leg and a cross-currency feature and more
    than one payment, 2) without inflation features and 3) could be a ''zero coupon'' and the floating leg index could be
    OIS or non-OIS.'
  inputs:
  - name: economicTerms
    type: EconomicTerms
    cardinality: 1..1
