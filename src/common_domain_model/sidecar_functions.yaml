    type: boolean
    cardinality: 1..1
  namespace: cdm.event.qualification
  module: cdm_event_qualification
  associated_classes:
  - BusinessEvent
- name: Qualify_Novation
  description: The qualification of a novation event from the fact that (i) the intent is Novation when specified, (ii) the
    primitives quantityChange and a contract formation exist, (iii) the remaining quantity = 0, (iv) the closedState of the
    contract is Novated, (v) the stepped-in contract has a different contract identifier than the novated contract, (vi) the
    stepped-in contract has the novation event date and the novation event effective date, and (vii) the contract counterparties
    have changed.
