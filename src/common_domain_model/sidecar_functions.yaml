  inputs:
  - name: u1
    type: UnitType
    cardinality: 0..1
  - name: u2
    type: UnitType
    cardinality: 0..1
  output:
    name: result
    type: boolean
    cardinality: 1..1
  namespace: cdm.base.math
  module: cdm_base_math
  associated_classes:
