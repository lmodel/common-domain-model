    to a single rate price.","inputs":[{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"},{"name":"newRate","type":"number","cardinality":"1..1"}],"output":{"name":"quantityChangeInstruction","type":"QuantityChangeInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangeTermsChangeInstruction","description":"Creates
