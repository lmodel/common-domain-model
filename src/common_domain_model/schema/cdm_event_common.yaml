    Confirmation template.","inputs":[{"name":"masterConfirmation","type":"EquitySwapMasterConfirmation2018","cardinality":"0..1"}],"output":{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},"code_implementation":true},{"name":"Create_IndexTransitionTermsChange","description":"Function
