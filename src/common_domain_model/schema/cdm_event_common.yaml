    how to resolve the reset value for an InterestRatePayout.","inputs":[{"name":"payouts","type":"InterestRatePayout","cardinality":"1..*"},{"name":"observation","type":"Observation","cardinality":"1..1"},{"name":"resetDate","type":"date","cardinality":"1..1"},{"name":"rateRecordDate","type":"date","cardinality":"0..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"InterestCashSettlementAmount","description":"Defines
    the performance calculations relevant for a fixed or floating rate payout.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"payout","type":"Payout","cardinality":"1..1"},{"name":"resets","type":"Reset","cardinality":"1..*"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"interestCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveReset","description":"Defines
    the interface for adopters to resolve a reset, given a trade state and a date.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"},"code_implementation":true},{"name":"ResolvePerformanceObservationIdentifiers","description":"Defines
    which attributes on the PerformancePayout should be used to locate and resolve the underlier''s price, for example for
    the reset process.","inputs":[{"name":"payout","type":"PerformancePayout","cardinality":"1..1"},{"name":"adjustedDate","type":"date","cardinality":"1..1"}],"output":{"name":"identifiers","type":"ObservationIdentifier","cardinality":"1..1"}},{"name":"AdjustedValuationDates","inputs":[{"name":"valuationDates","type":"ValuationDates","cardinality":"1..1"}],"output":{"name":"adjustedValuationDates","type":"date","cardinality":"0..*"}},{"name":"ResolvePerformanceValuationTime","description":"Defines
    how to resolve the observation time from those specified in the Performance Valuation type.","inputs":[{"name":"valuationTime","type":"BusinessCenterTime","cardinality":"0..1"},{"name":"valuationTimeType","type":"TimeTypeEnum","cardinality":"0..1"},{"name":"assetIdentifier","type":"AssetIdentifier","cardinality":"1..1"},{"name":"determinationMethod","type":"DeterminationMethodEnum","cardinality":"1..1"}],"output":{"name":"time","type":"TimeZone","cardinality":"1..1"}},{"name":"ResolvePerformanceReset","description":"Defines
    how to resolve the reset value for a performance payout.","inputs":[{"name":"performancePayout","type":"PerformancePayout","cardinality":"1..1"},{"name":"observation","type":"Observation","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"EquityCashSettlementAmount","description":"Represents
    Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 72. ''Equity Cash Settlement
    Amount'' means, in respect of an Equity Cash Settlement Date, an amount in the Settlement Currency determined by the Calculation
    Agent as of the Equity Valuation Date to which the Equity Cash Settlement Amount relates, pursuant to the following formula:
    Equity Cash Settlement Amount = ABS(Rate Of Return) * Equity Notional Amount.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"equityCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"EquityPerformance","description":"Part
    1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 75. ''Equity Performance'' means,
    in respect of an Equity Cash Settlement Date, an amount in the Settlement Currency determined by the Calculation Agent
    as of the Equity Valuation Date to which the Equity Cash Settlement Amount relates, pursuant to the following formula:
    Equity Performance = (Rate Of Return)  Equity Notional Amount.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"},{"name":"observation","type":"Price","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"equityPerformance","type":"number","cardinality":"1..1"}},{"name":"RateOfReturn","description":"Part
    1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 139. ''Rate Of Return'' means, in
    respect of any Equity Valuation Date, the amount determined pursuant to the following formula: Rate Of Return = (Final
    Price - Initial Price) / Initial Price.","inputs":[{"name":"initialPrice","type":"PriceSchedule","cardinality":"1..1"},{"name":"finalPrice","type":"PriceSchedule","cardinality":"1..1"}],"output":{"name":"rateOfReturn","type":"number","cardinality":"1..1"}},{"name":"EquityNotionalAmount","description":"Part
    1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 74. ''Equity Notional Amount'' means
    the Number Of Securities times the Initial Price, adjusted, if applicable, as provided in Part 1 Section 2.2, ''Equity
    Notional Reset''. If ''With Reset'' is the Equity Notional Reset Election, then in respect of each Equity Cash Settlement
    Date: (i) the Equity Notional Amount applicable in respect of the first Equity Cash Settlement Date will be the amount
    specified as such in the definition of Equity Notional Amount; (ii) the Equity Notional Amount applicable in respect of
    each subsequent Equity Cash Settlement Date will be the sum of (a) the Equity Notional Amount in respect of the prior
    Equity Cash Settlement Date and (b) the Equity Performance, whether positive or negative, in respect of the prior Equity
    Cash Settlement Date; and (iii)\tthe Floating Notional Amount will be adjusted as provided in sub-clauses (i) and (ii)
    above as though it were an Equity Notional Amount.","inputs":[{"name":"numberOfSecurities","type":"number","cardinality":"1..1"},{"name":"price","type":"Price","cardinality":"1..1"}],"output":{"name":"equityNotionalAmount","type":"number","cardinality":"1..1"}},{"name":"Create_StockSplit","description":"Function
