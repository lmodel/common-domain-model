    for each billing instruction an individual billing record to be included in a Security Lending Billing Invoice","inputs":[{"name":"billingInstruction","type":"BillingRecordInstruction","cardinality":"1..*"}],"output":{"name":"billingRecord","type":"BillingRecord","cardinality":"1..*"}},{"name":"Create_BillingRecord","description":"Creates
    an individual billing record to be included in a Security Lending Billing Invoice","inputs":[{"name":"billingInstruction","type":"BillingRecordInstruction","cardinality":"1..1"}],"output":{"name":"billingRecord","type":"BillingRecord","cardinality":"1..1"}},{"name":"ResolveSecurityFinanceBillingAmount","description":"Calculates
    the billing amount for a Security Finance transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"reset","type":"Reset","cardinality":"1..1"},{"name":"recordStartDate","type":"date","cardinality":"1..1"},{"name":"recordEndDate","type":"date","cardinality":"1..1"},{"name":"transferDate","type":"date","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}},{"name":"ToMoney","inputs":[{"name":"quantity","type":"Quantity","cardinality":"1..1"}],"output":{"name":"money","type":"Money","cardinality":"1..1"}},{"name":"Create_BillingSummary","description":"Creates
