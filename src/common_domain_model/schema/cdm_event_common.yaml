        the function to compose an execution based on a minimum required set of inputs: product, quantity, parties, etc.","inputs":[{"name":"instruction","type":"ExecutionInstruction","cardinality":"1..1"}],"output":{"name":"execution","type":"TradeState","cardinality":"1..1"}},{"name":"Create_ContractFormation","description":"Function
        specification that represents an executed trade for a contractual product that has been affirmed (or confirmed) by
        the two parties. The formed contract can reference a legal agreement for instance a master agreement, by using the
        optional legalAgreement input.","inputs":[{"name":"instruction","type":"ContractFormationInstruction","cardinality":"1..1"},{"name":"execution","type":"TradeState","cardinality":"1..1"}],"output":{"name":"contractFormation","type":"TradeState","cardinality":"1..1"}},{"name":"Create_Exercise","description":"Defines
        the process of putting into effect the rights specified in an options contract, such as to buy or sell a security.  Once
        exercised the option contract is terminated.","inputs":[{"name":"exerciseInstruction","type":"ExerciseInstruction","cardinality":"1..1"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"exercise","type":"TradeState","cardinality":"1..*"}},{"name":"Create_Reset","description":"Defines
        how a Reset should be constructed.","inputs":[{"name":"instruction","type":"ResetInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"reset","type":"TradeState","cardinality":"1..1"}},{"name":"Create_Transfer","description":"Defines
        how a transfer should be constructed, when representing the exchange of cash between parties.","inputs":[{"name":"instruction","type":"TransferInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"transfer","type":"TradeState","cardinality":"1..1"}},{"name":"ResolveCashSettlementDate","description":"A
        product agnostic function that resolves the settlement date of the payout for the period in question","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"1..1"},"code_implementation":true},{"name":"SecurityFinanceCashSettlementAmount","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"},{"name":"quantity","type":"Quantity","cardinality":"0..1"},{"name":"payerReceiver","type":"PayerReceiver","cardinality":"0..1"}],"output":{"name":"cashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"Create_Split","description":"Defines
        the logic for splitting a trade into separate copies. The split instruction contains a breakdown into N set of primitive
        instructions. Each set contains the primitive instructions to be applied to each post-split trade, eventually producing
        N trades. The split function underpins a number of business events such as clearing or allocation.","inputs":[{"name":"breakdown","type":"PrimitiveInstruction","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"splitTrade","type":"TradeState","cardinality":"1..*"}},{"name":"Create_PartyChange","description":"Defines
        the logic for changing one of the counterparties on a trade. A new trade identifier must be specified as a change
