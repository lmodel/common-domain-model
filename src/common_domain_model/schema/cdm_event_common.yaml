  rosetta_functions: '[{"name":"QuantityIncreased","inputs":[{"name":"before","type":"TradeState","cardinality":"1..1"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"QuantityDecreased","inputs":[{"name":"before","type":"TradeState","cardinality":"1..1"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"QuantityDecreasedToZero","inputs":[{"name":"before","type":"TradeState","cardinality":"0..*"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"CompareTradeStatesToAmount","description":"For
