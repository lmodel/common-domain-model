  BillingRecord:
    description: Specifies individual records within a billing invoice.
    close_mappings:
    - fpml_5_10:BillingRecord
    comments:
    - 'Rosetta func: Create_BillingRecords — Creates for each billing instruction an individual billing record to be included
      in a Security Lending Billing Invoice'
    - 'Rosetta func: Create_BillingRecord — Creates an individual billing record to be included in a Security Lending Billing
      Invoice'
    - 'Rosetta func: Create_BillingSummary — Creates a billing summary to be included in a Security Lending Billing Invoice.'
    annotations:
      rosetta_functions: '[{"name":"Create_BillingRecords","description":"Creates for each billing instruction an individual
        billing record to be included in a Security Lending Billing Invoice","inputs":[{"name":"billingInstruction","type":"BillingRecordInstruction","cardinality":"1..*"}],"output":{"name":"billingRecord","type":"BillingRecord","cardinality":"1..*"}},{"name":"Create_BillingRecord","description":"Creates
        an individual billing record to be included in a Security Lending Billing Invoice","inputs":[{"name":"billingInstruction","type":"BillingRecordInstruction","cardinality":"1..1"}],"output":{"name":"billingRecord","type":"BillingRecord","cardinality":"1..1"}},{"name":"Create_BillingSummary","description":"Creates
        a billing summary to be included in a Security Lending Billing Invoice.","inputs":[{"name":"billingRecord","type":"BillingRecord","cardinality":"1..*"}],"output":{"name":"billingSummary","type":"BillingSummary","cardinality":"1..1"},"code_implementation":true}]'
    slots:
    - tradeState
    - recordTransfer
    - recordStartDate
    - recordEndDate
    - minimumFee
    slot_usage:
      tradeState:
        description: The trade for the individual billing record.
    in_subset:
    - cdm_event_common

  BillingSummary:
    description: Specifies individual summaries within a billing invoice.
    close_mappings:
    - fpml_5_10:BillingSummary
    comments:
    - 'Rosetta condition: GrandTotal — if summaryAmountType = RecordAmountTypeEnum -> GrandTotal then summaryTransfer exists
      and summaryTransfer ->> payerReceiver is absent'
    - 'Rosetta condition: ParentTotal — if summaryAmountType = RecordAmountTypeEnum -> ParentTotal then summaryTransfer ->>
      payerReceiver exists and summaryTransfer ->> payerReceiver -> payerAccountReference is absent and summaryTransfer ->>
      payerReceiver -> receiverAccountReference is absent'
    - 'Rosetta condition: AccountTotal — if summaryAmountType = RecordAmountTypeEnum -> AccountTotal then summaryTransfer
      ->> payerReceiver -> payerAccountReference exists and summaryTransfer ->> payerReceiver -> receiverAccountReference
      exists'
    - 'Rosetta func: Create_BillingSummary — Creates a billing summary to be included in a Security Lending Billing Invoice.'
    annotations:
      rosetta_functions: '[{"name":"Create_BillingSummary","description":"Creates a billing summary to be included in a Security
        Lending Billing Invoice.","inputs":[{"name":"billingRecord","type":"BillingRecord","cardinality":"1..*"}],"output":{"name":"billingSummary","type":"BillingSummary","cardinality":"1..1"},"code_implementation":true}]'
    slots:
    - summaryTransfer
    - summaryAmountType
    in_subset:
    - cdm_event_common

