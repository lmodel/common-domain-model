    specification to incorporate a new assessment of the valuation in the valuation history of a given trade state.","inputs":[{"name":"instruction","type":"ValuationInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}},{"name":"UpdateSpreadAdjustmentAndRateOptions","description":"For
    each of the trade state''s price quantity, find a matching price quantity instruction, and call the update function.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"instructions","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"updatedTradeState","type":"TradeState","cardinality":"1..1"}},{"name":"UpdateIndexTransitionPriceAndRateOption","inputs":[{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..1"},{"name":"instruction","type":"PriceQuantity","cardinality":"0..1"}],"output":{"name":"updatedPriceQuantity","type":"PriceQuantity","cardinality":"1..1"}},{"name":"FindMatchingIndexTransitionInstruction","inputs":[{"name":"instructions","type":"PriceQuantity","cardinality":"1..*"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..1"}],"output":{"name":"matchingInstruction","type":"PriceQuantity","cardinality":"0..1"}},{"name":"Create_SecurityLendingInvoice","description":"Defines
