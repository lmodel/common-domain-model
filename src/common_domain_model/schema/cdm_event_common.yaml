    rules:
    - description: Represents a condition to ensure that a visibility indicator is specifies then the call type must be an
        expected call.
      preconditions:
        slot_conditions:
          callType:
            equals_string: ExpectedCall
      postconditions:
        slot_conditions:
          visibilityIndicator:
            required: true
    comments:
    - 'Rosetta condition: CallTypeExpectedVisibility — if callType = CallTypeEnum -> ExpectedCall then visibilityIndicator
      exists'
    slots:
    - callType
    - visibilityIndicator
    in_subset:
    - cdm_event_common

