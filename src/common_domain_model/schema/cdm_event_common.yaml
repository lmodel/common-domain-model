id: https://w3id.org/finos/cdm/cdm_event_common
name: cdm_event_common
description: 'Business event concepts: primitives, contract state and associated state transition function specifications.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_datetime
- ./cdm_base_datetime_daycount
- ./cdm_base_math
- ./cdm_base_staticdata_asset_common
- ./cdm_base_staticdata_asset_rates
- ./cdm_base_staticdata_identifier
- ./cdm_base_staticdata_party
- ./cdm_event_position
- ./cdm_event_workflow
- ./cdm_legaldocumentation_common
- ./cdm_observable_asset
- ./cdm_observable_event
- ./cdm_product_asset
- ./cdm_product_collateral
- ./cdm_product_common
- ./cdm_product_common_settlement
- ./cdm_product_template
- ./cdm_base_staticdata_codelist

