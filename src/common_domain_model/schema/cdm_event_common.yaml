    results in a new trade. An ancillary party can also be specified, for instance to refer to the original executing party
    on the new trade.","inputs":[{"name":"counterparty","type":"Counterparty","cardinality":"1..1"},{"name":"ancillaryParty","type":"AncillaryParty","cardinality":"0..1"},{"name":"partyRole","type":"PartyRole","cardinality":"0..1"},{"name":"tradeId","type":"TradeIdentifier","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"newTrade","type":"TradeState","cardinality":"1..1"}},{"name":"EmptyTransferHistory","output":{"name":"emptyTransferHistory","type":"TransferState","cardinality":"0..*"},"code_implementation":true},{"name":"Create_QuantityChange","description":"A
