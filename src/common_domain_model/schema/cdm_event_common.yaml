- 'Rosetta func: ResolveInterestRateReset — Defines how to resolve the reset value for an InterestRatePayout. | inputs(payouts:
  InterestRatePayout (1..*), observation: Observation (1..1), resetDate: date (1..1), rateRecordDate: date (0..1)) | output(reset:
