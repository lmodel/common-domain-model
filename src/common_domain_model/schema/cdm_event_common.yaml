    set of inputs which can (optionally) include a Master Confirmation Agreement. The inputs represent the minimum set of
    inputs required to create an Equity Swap, either based on an existing Master Confirmation Agreement or as a stand-alone
    Equity Swap","inputs":[{"name":"security","type":"Security","cardinality":"1..1"},{"name":"masterConfirmation","type":"EquitySwapMasterConfirmation2018","cardinality":"0..1"}],"output":{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"}},{"name":"NewSingleNameEquityPerformancePayout","description":"Function
