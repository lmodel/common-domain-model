    an instruction for settlement of a Repurchase Event","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"repurchaseDate","type":"date","cardinality":"1..1"}],"output":{"name":"repurchaseInstruction","type":"EventInstruction","cardinality":"1..1"}},{"name":"Create_RollPrimitiveInstruction","description":"Creates
    the primitive instructions for a trade roll. A trade roll consists in closing an existing trade and entering into a new
    one which has the same characteristics as the old one, except with an extended termination date and (possibly) a different
    price.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_EffectiveOrTerminationDateTermChangeInstruction","description":"Creates
    the relevant terms change primitive instruction object for rolling a contractual product, which consists in the same terms
    as the original contractual product but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_RollTermChangeInstruction","description":"Creates
    the relevant terms change primitive instruction object for rolling a contractual product, which consists in the same terms
    as the original contractual product but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePrimitiveInstruction","description":"Creates
    a full primitive instruction for an on-demand rate change event. A rate change consists in closing the original trade
    and opening a new one with the same details as the original one, but with a new rate (price) and effective date. The business
    event logic checks that there is only 1 rate price in the original trade to be updated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"agreedRate","type":"number","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePriceChangeInstruction","description":"Creates
