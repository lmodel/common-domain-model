    slots:
    - trade
    - pricingTime
    - discountingIndex
    slot_usage:
      trade:
        description: Represents the cosensus based pricing parameters on a trade basis.
    in_subset:
    - cdm_event_common

  MarginCallBase:
    description: Represents common attributes required for Issuance and Response to a Margin Call action as a result of a
      demand for delivery or return of collateral determined under a legal agreement such as a credit support document or
      equivalent.
    comments:
    - 'Rosetta condition: RegIMRoleIMOnly — if regIMRole exists then regMarginType = RegMarginTypeEnum -> RegIM'
    slots:
    - instructionType
    - party
    - partyRole
    - clearingBroker
    - callIdentifier
    - callAgreementType
    - agreementMinimumTransferAmount
    - agreementThreshold
    - agreementRounding
    - regMarginType
    - regIMRole
    - baseCurrencyExposure
    - collateralPortfolio
    - independentAmountBalance
    slot_usage:
      party:
        range: Party
        description: Represents the parties to the margin call. The cardinality is optional to address the case where both
          parties of the event are specified and a third party if applicable.
        multivalued: true
      partyRole:
        description: Represents the role each specified party takes in the margin call. further to the principal roles, payer
          and receiver.
        multivalued: true
    in_subset:
    - cdm_event_common

  Exposure:
    description: Represents the current mark to market value or IM calculation value of the trade portfolio as recorded by
      the principle (in base currency).
    comments:
    - 'Rosetta func: Create_ExposureFromTrades — Builds an Exposure structure from a list of trades.'
    annotations:
      rosetta_functions: '[{"name":"Create_ExposureFromTrades","description":"Builds an Exposure structure from a list of
        trades.","inputs":[{"name":"trades","type":"TradeState","cardinality":"0..*"}],"output":{"name":"exposure","type":"Exposure","cardinality":"0..1"}}]'
    slots:
    - tradePortfolio
    - aggregateValue
    - calculationDateTime
    - valuationDateTime
    in_subset:
    - cdm_event_common

  MarginCallExposure:
    description: Represents attributes required for mark to market value or IM calculation value of the trade portfolio as
      recorded by the principle (in base currency).
    is_a: MarginCallBase
    comments:
    - 'Rosetta condition: OverallExposureSumOfSimmAndScheduleIM — if simmIMExposure exists and scheduleGridIMExposure exists
      then (overallExposure -> aggregateValue -> value = simmIMExposure -> aggregateValue -> value + scheduleGridIMExposure
      -> aggregateValue -> value) and (overallExposure -> aggregateValue -> unit -> currency = simmIMExposure -> aggregateValue
      -> unit -> currency) and (overallExposure -> aggregateValue -> unit -> currency = scheduleGridIMExposure -> aggregateValue
      -> unit -> currency)'
    - 'Rosetta condition: ExposureSimmAndScheduleIMOnly — if simmIMExposure exists and scheduleGridIMExposure exists then
      regMarginType = RegMarginTypeEnum -> RegIM'
    slots:
    - overallExposure
    - simmIMExposure
    - scheduleGridIMExposure
    in_subset:
    - cdm_event_common

  CollateralBalance:
    description: Represents common attributes to define a collateral balance recorded by the principal as held or posted.
    close_mappings:
    - fpml_5_10:CollateralBalance
    slots:
    - collateralBalanceStatus
    - haircutIndicator
    - amountBaseCurrency
    - payerReceiver
    slot_usage:
      payerReceiver:
        range: PartyReferencePayerReceiver
        description: Specifies each of the parties in the collateral balance and its perspective with regards to the direction
          of the collateral balance, posted or received.
        required: true
    in_subset:
    - cdm_event_common

  CollateralPortfolio:
    description: Represents common attributes to define the details of collateral assets, to be used in margin call messaging
      and contribute to collateral balances e.g securities in a collateral account.
    tree_root: true
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"Create_SubstitutionPrimitiveInstruction","description":"Creates the primitive instructions
        for a substitution of collateral by replacing the assetpayout of the trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionInstruction","description":"Creates
        the terms change instruction that updates the payout with the new substitution payout.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}}]'
    close_mappings:
    - fpml_5_10:CollateralPortfolio
    comments:
    - 'Rosetta func: Create_SubstitutionPrimitiveInstruction — Creates the primitive instructions for a substitution of collateral
      by replacing the assetpayout of the trade.'
    - 'Rosetta func: Create_SubstitutionInstruction — Creates the terms change instruction that updates the payout with the
      new substitution payout.'
    slots:
    - portfolioIdentifier
    - collateralPosition
    - collateralBalance
    - legalAgreement
    slot_usage:
      legalAgreement:
        description: ' The specification of a legal agreement between two parties governing the collateral relationship such
          as Credit Support Agreement or Collateral Transfer Agreement etc. (NB: this can be provided by reference to a global
          key for each LegalAgreement object).'
        multivalued: false
    in_subset:
    - cdm_event_common

  CollateralPosition:
