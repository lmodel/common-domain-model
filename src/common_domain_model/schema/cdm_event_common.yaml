    only updates the effective date but keeps other details of the trade unchanged.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_CancellationPrimitiveInstruction","description":"Creates
    a primitive instruction for early cancellation.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newRepurchasePrice","type":"number","cardinality":"0..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_CancellationTermChangeInstruction","description":"Create
    a terms change instruction for a cancellation that consists in bringing the termination date forward.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_PairOffInstruction","description":"Creates
    a set of instructions to pair-off a set of trades based on a pair reference. A package component is created based on that
    pair reference and the list of identifiers for the underlying trades. That package component is then added onto the execution
    details of every underlying trade. The existing trades are not terminated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"2..*"},{"name":"pairReference","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"Instruction","cardinality":"1..*"}},{"name":"Create_ShapingInstruction","description":"Creates
    a set of instructions to shape a trade based on shaped quantities and a package ID. The original trade is closed and split
    into (smaller) shaped trades based on a set of trade lots containing the shaped quantities and an identifier for each
    shaped trade. A package component is created based on the package ID and the list of identifiers for the shaped trades.
    That package component is then added onto the execution details of every shaped trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"tradeLots","type":"TradeLot","cardinality":"2..*"},{"name":"shapeIdentifier","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_PartialDeliveryPrimitiveInstruction","description":"Creates
    the primitive instruction for partial delivery of a repo transaction at settlement.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"deliveredPriceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_RepricePrimitiveInstruction","description":"Creates
    the primitive instructions for a repricing that alters the cash amount of the trade. Transaction value and variation margin
    are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newCashValue","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_AdjustmentPrimitiveInstruction","description":"Creates
    the primitive instructions for a repricing that alters the collateral quantity and value of the trade. Transaction value
    and variation margin are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newAssetQuantity","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionPrimitiveInstruction","description":"Creates
    the primitive instructions for a substitution of collateral by replacing the assetpayout of the trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionInstruction","description":"Creates
    the terms change instruction that updates the payout with the new substitution payout.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Qualify_Substitution","description":"Qualification
    of a collateral substitution event.","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"is_event","type":"boolean","cardinality":"1..1"}},{"name":"Create_PackageExecutionDetails","description":"Add
    a package component to an execution details object. This package component is constructed using an identifier for the
    package and the list of identifiers for its components.","inputs":[{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},{"name":"listId","type":"Identifier","cardinality":"1..1"},{"name":"componentId","type":"Identifier","cardinality":"2..*"}],"output":{"name":"newExecutionDetails","type":"ExecutionDetails","cardinality":"1..1"}},{"name":"NewTradeInstructionOnlyExists","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"TradeNoExecutionDetails","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"newTrade","type":"Trade","cardinality":"1..1"}},{"name":"EmptyExecutionDetails","output":{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},"code_implementation":true},{"name":"Create_OnDemandInterestPaymentPrimitiveInstruction","description":"An
    instruction to make a interium interest payment by adding a payout leg to the deal.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"interestAmount","type":"Money","cardinality":"1..1"},{"name":"settlementDate","type":"SettlementDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TerminationInstruction","description":"Creates
    the relevant primitive instruction for a termination, which consists in a quantity change to bring the quantity to zero.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_BusinessEvent","description":"Creates
    a business event from instructions containing primitive instructions and optionally a trade state.","inputs":[{"name":"instruction","type":"Instruction","cardinality":"1..*"},{"name":"intent","type":"EventIntentEnum","cardinality":"0..1"},{"name":"eventDate","type":"date","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"1..1"}],"output":{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"Create_TradeState","description":"Creates
    a single trade state by applying primitive instructions to an existing trade state (optional in case an execution instruction
    is included). The primitive instructions are applied in the following order: Always first: - execution, if it exists,
    otherwise a before state must be provided The following 3 can be executed in any order, because they touch separate components
    of the trade: - quantity change - terms change - party change Always last: - contract formation, otherwise the contract
    could be invalid.","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"0..1"},{"name":"before","type":"TradeState","cardinality":"0..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}},{"name":"ExtractBeforeEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractOpenEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractBeforeTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractAfterTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractTradePurchasePrice","inputs":[{"name":"tradableProduct","type":"TradableProduct","cardinality":"1..1"}],"output":{"name":"value","type":"number","cardinality":"0..*"}},{"name":"ExtractTradeCollateralQuantity","inputs":[{"name":"tradableProduct","type":"TradableProduct","cardinality":"1..1"}],"output":{"name":"value","type":"number","cardinality":"0..*"}},{"name":"ExtractTradeCollateralPrice","inputs":[{"name":"tradableProduct","type":"TradableProduct","cardinality":"1..1"}],"output":{"name":"value","type":"number","cardinality":"0..*"}},{"name":"Create_ExposureFromTrades","description":"Builds
    an Exposure structure from a list of trades.","inputs":[{"name":"trades","type":"TradeState","cardinality":"0..*"}],"output":{"name":"exposure","type":"Exposure","cardinality":"0..1"}},{"name":"PayoutObligationFulfillmentFromTrade","description":"Determines
    the payouts and collateral payouts in a trade and whether the obligations have been fulfilled for each of them.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"0..1"}],"output":{"name":"result","type":"boolean","cardinality":"0..1"}},{"name":"AssetPayoutObligationsFulfilled","description":"Determines
    whether the obligations defined by the AssetPayout have been fulfilled by checking that the quantity of shares required
    have been successfully transferred.","inputs":[{"name":"assetPayout","type":"AssetPayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}},{"name":"InterestPayoutObligationsFulfilled","description":"Determines
    whether the obligations defined by the InterestRatePayout have been fulfilled by checking that the total value of cash
    required has been successfully transferred.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}}]'

subsets:
  cdm_event_common:
    description: Classes defined in the cdm_event_common module.

enums:
  ConfirmationStatusEnum:
    description: Enumeration for the different types of confirmation status.
    permissible_values:
      Confirmed: {}
      Unconfirmed: {}

  AffirmationStatusEnum:
    description: Enumeration for the different types of affirmation status.
    permissible_values:
      Affirmed: {}
      Unaffirmed: {}

  ExecutionTypeEnum:
    description: The enumerated values to specify how a contract has been executed, e.g. electronically, verbally, ...
    exact_mappings:
    - http://www.fpml.org/coding-scheme/execution-type
    permissible_values:
      Electronic:
        description: Execution via electronic execution facility, derivatives contract market, or other electronic message
          such as an instant message.
        meaning: http://www.fpml.org/coding-scheme/execution-type-1-0#Electronic
      OffFacility:
        description: Bilateral execution between counterparties not pursuant to the rules of a SEF or DCM.
      OnVenue:
        description: Execution via a platform that may or may not be covered by a regulatory defintion. OnVenue is intended
          to distinguish trades executed on a trading platform from those executed via phone, email or messaging apps. The
          role and details of the venue are included in the party attribute of the trade. The general rule is that if the
          parties utilitzed the services of the platform to execute the trade then it would be considered OnVenue.

  ActionEnum:
    description: The enumeration values to specify the actions associated with transactions.
    permissible_values:
      New:
        description: A new instance of a transaction event, which is also characterized by the fact that the eventIdentifier
          has an associated version 1.
      Correct:
        description: A correction of a prior instance of the transaction event. The eventIdentifier has an associated version
          greater than 1.
      Cancel:
        description: A cancellation of a prior instance of the transaction event. The eventIdentifier has an associated version
          greater than 1.

  AssetTransferTypeEnum:
    description: The qualification of the type of asset transfer.
    permissible_values:
      FreeOfPayment:
        description: The transfer of assets takes place without a corresponding exchange of payment.

  EventIntentEnum:
    description: The enumeration values to qualify the intent associated with a transaction event.
    permissible_values:
      Allocation:
        description: The intent is to allocate one or more trades as part of an allocated block trade.
      CashFlow:
        description: The intent is to designate a stand-alone cash transfer as a result of Trade contracual terms e.g. incurred
          by payout for instance a Performance Amount or a Floating Rate Amount. The particular CashFlow at stake shall be
          further specified in priceTransferEnum or transferTypeEnum. For clarity, such intentEnum value shall not be used
          whenever a cash transfer is not stand-alone but is instead embedded in another Event as part of the composable modelling
          e.g. Decrease with Fees, Cross-Currency Notional Reset, etc. or any other Event whenever including a cash transfer
          with other features. For clarity, a principal payment related to a Principal Exhange is excluded as well, because
          a dedicated intentEnum value exists for this event i.e. PrincipalExchange value.
      Clearing:
        description: The intent is to clear the contract.
      Compression:
        description: The intent is to compress multiple trades as part of a netting or compression event.
      ContractFormation:
        description: The intent is to form a contract from an execution.
      ContractTermsAmendment:
        description: The intent is to amend the terms of the contract through renegotiation.
      CorporateActionAdjustment:
        description: The intent is to take into effect the occurrence of a Corporate Action and the particular Corporate Action
          at stake shall be further specified in CorporateActionTypeEnum.
      CreditEvent:
        description: The intent is to take into effect the occurrence of a Credit Event.
      Decrease:
        description: The intent is to Decrease the quantity or notional of the contract.
      EarlyTerminationProvision:
        description: The intent is to fully unwind the Trade, as a result of the application of Trade contractual terms (e.g.
          an obligation to do so before Termination Date as part of any kind of Early Termination terms) as defined within
          the CDM EarlyTerminationProvision data type. Accordingly, increase and decrease of positions which result from negotiation
          by the parties shall not be designated by such intentEnum. For clarity, partial exercise of an option before its
          expiration date is excluded as well, though related to Trade contract terms, because a dedicated intentEnum value
          exists for this event i.e. OptionExercise value.
      Increase:
        description: The intent is to Increase the quantity or notional of the contract.
      IndexTransition:
        description: 'The intent is to replace an interest rate index by another one during the life of a trade and add a
          transition spread on top of this index (and on top of the spreads already defined in the trade, if any). '
      NotionalReset:
        description: The intent is to increase or to decrease the notional of the Trade, in accordance with Notional Reset
          features e.g. could apply for Cross Currency Swaps, Equity Performance Swaps, etc.
      NotionalStep:
        description: The intent is to increase or to decrease the notional of the Trade, in accordance with Step features
          attached to a Payout Quantity.
      Novation:
        description: The intent is to novate the contract.
      ObservationRecord:
        description: The intent is to record any kind of stand-alone obervervations e.g. internal data recording, usage of
          CDM for recording and/or exchanging data as part of pricing 'consensus' processing, etc. For clarity, such intentEnum
          value shall not be used whenever an observation is not stand-alone but is instead embedded in another Event as part
          of the composable modelling e.g. CashFlow to which an observation of prices is associated, etc.
      OptionExercise:
        description: 'The intent is to Exercise a contract that is made of one or several option payout legs. For clarity,
          such intentEnum value shall not be used whenever an optional right is exercised in relation with a Trade which composition
          includes other types of payout legs e.g. right to call or to cancel before Termination Date as part of any kind
          of Early Termination terms other than genuine bermuda or american style features described in option payout. '
      OptionalExtension:
        description: The intent is to extend the trade through exercise of an optional right as defined within the CDM OptionProvision
          data type.
      OptionalCancellation:
        description: The intent is to cancel the trade through exercise of an optional right as defined within the CDM OptionProvision
          data type.
      PortfolioRebalancing:
        description: The intent is to rebalance a portfolio, by inserting new derivatives transactions into portfolios of
          participants to reduce risks linked to those trades. These are offsetting trades that rebalance relationships between
          different counterparties when it comes to exposure of portfolios to certain types of risk, such as interest rate
          risk.
      PrincipalExchange:
        description: The intent is to pay or to receive a cash transfer, in accordance with Principal Exchange features.
      Reallocation:
        description: The intent is to reallocate one or more trades as part of an allocated block trade.
      Repurchase:
        description: The intent is to close a repo transaction through repurchase.

  PositionEventIntentEnum:
    permissible_values:
      PositionCreation:
        description: The intent is to form a position from a fully formed contract.
      CorporateActionAdjustment:
        description: The intent is to take into effect the occurrence of a Corporate Action and the particular Corporate Action
          at stake shall be further specified in CorporateActionTypeEnum.
      Decrease:
        description: The intent is to Decrease the quantity of the position.
      Increase:
        description: The intent is to Increase the quantity of the position.
      Transfer:
        description: The intent is to transfer the position to another clearing member.
      OptionExercise:
        description: The intent is to Exercise a position or part of a position.
      Valuation:
        description: The intent is to update the valuation of the position.

  RecordAmountTypeEnum:
    description: The enumeration of the account level for the billing summary.
    permissible_values:
      AccountTotal: {}
      GrandTotal: {}
      ParentTotal: {}

  TransferStatusEnum:
    description: The enumeration values to specify the transfer status.
    permissible_values:
      Disputed:
        description: The transfer is disputed.
      Instructed:
        description: The transfer has been instructed.
      Pending:
        description: The transfer is pending instruction.
      Settled:
        description: The transfer has been settled.
      Netted:
        description: The transfer has been netted into a separate Transfer.

  InstructionFunctionEnum:
    description: The enumeration values indicating the BusinessEvent function associated input instructions.
    permissible_values:
      Execution: {}
      ContractFormation: {}
      QuantityChange: {}
      Renegotiation: {}
      Compression: {}

  CallTypeEnum:
    description: Represents the enumeration values that indicate the intended status of message type, such as expected call,
      notification of a call or a margin call.
    permissible_values:
      MarginCall:
        description: Identifies an actionable Margin Call.
      Notification:
        description: Identifies a notification of a Margin Call for legal obligation to notify other party to initiate a margin
          call when notifying party is calculation or valuation agent.
      ExpectedCall:
        description: Identifies an expected Margin Call instruction for either party to notify the other or their service
          provider of an expected margin call movement.

  MarginCallActionEnum:
    description: Represents the enumeration values to identify the collateral action instruction.
    permissible_values:
      Delivery:
        description: Indicates an instruction of a new collateral asset delivery.
      Return:
        description: Indicates an instruction for a return of a principals collateral asset delivery.

  CollateralStatusEnum:
    description: Represents the enumeration list to identify the settlement status of the collateral.
    permissible_values:
      FullAmount:
        description: Indicates the collateral balance amount in full, inclusive of any pre-agreed collateral positions in
          transit for settlement.
      SettledAmount:
        description: Indicates the collateral is settled and not an in transit pre-agreed collateral amount/s.
      InTransitAmount:
        description: Indicates collateral amount in transit settlement cycle only, excluding settled collateral amount/s.

  MarginCallResponseTypeEnum:
    description: Represents the enumeration values to define the response type to a margin call.
    permissible_values:
      AgreeinFull:
        description: Specifies a 'Full Agreement' to Margin Call.
      PartiallyAgree:
        description: Specifies a 'Partial agreement' to Margin Call.
      Dispute:
        description: Specifies a 'Full Dispute' to a Margin call.

  RegMarginTypeEnum:
    description: Represents the enumeration values to specify the margin type in relation to bilateral or regulatory obligation.
    permissible_values:
      VM:
        description: Indicates Variation Margin
      RegIM:
        description: Indicates Regulatory Initial Margin
      NonRegIM:
        description: Indicates Non Regulatory Initial margin or independent amount

  RegIMRoleEnum:
    description: Represents the enumeration values to specify the role of the party in relation to a regulatory initial margin
      call.
    permissible_values:
      Pledgor:
        description: Indicates 'Pledgor' party of initial margin call.
      Secured:
        description: Indicates 'Secured' party of initial margin call.

  HaircutIndicatorEnum:
    description: Represents the enumeration indicators to specify if an asset or group of assets valuation is based on any
      valuation treatment haircut.
    permissible_values:
      PreHaircut:
        description: Indicates Pre haircut value
      PostHaircut:
        description: Indicates Post haircut value

  PerformanceTransferTypeEnum:
    description: The enumerated values to specify the origin of a performance transfer
    permissible_values:
      Commodity: {}
      Correlation: {}
      Dividend: {}
      Equity: {}
      Interest: {}
      Volatility: {}
      Variance: {}

  CorporateActionTypeEnum:
    description: The enumerated values to specify the origin of a corporate action transfer.
    permissible_values:
      CashDividend:
        description: Corporate action triggered by the distribution of a cash dividend.
      StockDividend:
        description: Corporate action triggered by the distribution of a stock dividend.
      StockSplit:
        description: Corporate action triggered by a stock split. A stock split or stock divide increases the number of shares
          in a public company. The price is adjusted such that the before and after market capitalization of the company remains
          the same and dilutiondoes not occur. The value maps closely to the ISO code (SPLF) defined as a distribution of
          subsidiary stock to the shareholders of the parent company without a surrender of shares.
      ReverseStockSplit:
        description: Corporate action triggered by a reverse split. A reverse stock split or reverse split is a process by
          a company of issuing to each shareholder in that company a smaller number of new shares in proportion to that shareholder's
          original shares that are subsequently canceled. A reverse stock split is also called a stock merge. The reduction
          in the number of issued shares is accompanied by a proportional increase in the share price. The value maps closely
          to the ISO code (SPLR) defined as a decrease in a company's number of outstanding equities without any change in
          the shareholder's equity or the aggregate market value at the time of the split. Equity price and nominal value
          are increased accordingly.
      SpinOff:
        description: Corporate action triggered by a spin Off. A spin-out, also known as a spin-off or a starburst, refers
          to a type of corporate action where a company splits off sections of itself as a separate business. The value maps
          closely to the ISO code (SOFF) defined as a a distribution of subsidiary stock to the shareholders of the parent
          company without a surrender of shares. Spin-off represents a form of divestiture usually resulting in an independent
          company or in an existing company. For example, demerger, distribution, unbundling.
      Merger:
        description: Corporate action triggered by a merger. Mergers and acquisitions (abbreviated M&A) is an aspect of corporate
          strategy, corporate finance and management dealing with the buying, selling, dividing and combining of different
          companies and similar entities that can help an enterprise grow rapidly in its sector or location of origin, or
          a new field or new location, without creating a subsidiary, other child entity or using a joint venture. The distinction
          between a merger and an acquisition has become increasingly blurred in various respects (particularly in terms of
          the ultimate economic outcome), although it has not completely disappeared in all situations. The value maps closely
          to the ISO code (MRGR) defined as an offer made to shareholders, normally by a third party, requesting them to sell
          (tender) or exchange their equities.
      Delisting:
        description: Corporate action triggered by the removal of a security from a stock exchange.
      StockNameChange:
        description: Corporate action triggered by a change in the name used to trade the security.
      StockIdentifierChange:
        description: Corporate action triggered by a change in the code used to trade the security.
      RightsIssue:
        description: Corporate action triggered by an issuance to shareholders of rights to purchase additional shares at
          a discount.
      Takeover:
        description: Corporate action triggered by a takeover. A takeover is the purchase of onecompany (the target) by another
          (the acquirer, or bidder). The value maps to the ISO code (TEND) but is finer grained than TEND which emcompasses
          Tender/Acquisition/Takeover/Purchase Offer/Buyback. ISO defines the TEND code as an offer made to shareholders,
          normally by a third party, requesting them to sell (tender) or exchange their equities.
      StockReclassification:
        description: Corporate action triggered by a Stock Reclassification.
      BonusIssue:
        description: Corporate action triggered by a bonus issue. A bonus issue or bonus share is a free share of stock given
          to current shareholders in a company, based upon the number of shares that the shareholder already owns. While the
          issue of bonus shares increases the total number of shares issued and owned, it does not change the value of the
          company. The value maps closely to the ISO code (BONU) defined as a bonus, scrip or capitalisation issue. Security
          holders receive additional assets free of payment from the issuer, in proportion to their holding.
      ClassAction:
        description: Corporate action triggered by a Class Action. An action where an individual represents a group in a court
          claim. The judgment from the suit is for all the members of the group (class). The value maps closely to the ISO
          code (CLSA) defined as the situation where interested parties seek restitution for financial loss. The security
          holder may be offered the opportunity to join a class action proceeding and would need to respond with an instruction.
      EarlyRedemption:
        description: Corporate action triggered by an early redemption. The value maps closely to the ISO code (MCAL) defined
          as the redemption of an entire issue outstanding of securities, for example, bonds, preferred equity, funds, by
          the issuer or its agent, for example, asset manager, before final maturity.
      Liquidation:
        description: Corporate action triggered by a liquidation. When a business or firm is terminated or bankrupt, its assets
          are sold (liquidated) and the proceeds pay creditors. Any leftovers are distributed to shareholders. The value maps
          closely to the ISO code (LIQU) defined as a distribution of cash, assets or both. Debt may be paid in order of priority
          based on preferred claims to assets specified by the security.
      BankruptcyOrInsolvency:
        description: Corporate action triggered by bankruptcy, insolvency filing or insolvency of the issuer of the Security.
      IssuerNationalization:
        description: Corporate action triggered by the nationalization of the issuer of the Security.
      Relisting:
        description: Corporate action triggered by the relisting of a security from the original stock exchange to another
          exchange.
      BespokeEvent:
        description: Corporate Action which is separately agreed between the parties and/or described elsewhere in the document
          (for instance in bespoke term described in string type objects present in some root attributes of Agreement type).

  CreditEventTypeEnum:
    description: Represents the enumerated values to specify a credit event type.
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-event-type
    permissible_values:
      Bankruptcy:
        description: 'The reference entity has been dissolved or has become insolvent. It also covers events that may be a
          precursor to insolvency such as instigation of bankruptcy or insolvency proceedings. Sovereign trades are not subject
          to Bankruptcy as ''technically'' a Sovereign cannot become bankrupt. ISDA 2003 Term: Bankruptcy.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#Bankruptcy
      DistressedRatingsDowngrade:
        description: Results from the fact that the rating of the reference obligation is downgraded to a distressed rating
          level. From a usage standpoint, this credit event is typically not applicable in case of RMBS trades.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#DistressedRatingsDowngrade
      FailureToPay:
        description: 'This credit event triggers, after the expiration of any applicable grace period, if the reference entity
          fails to make due payments in an aggregrate amount of not less than the payment requirement on one or more obligations
          (e.g. a missed coupon payment). ISDA 2003 Term: Failure to Pay.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPay
      FailureToPayInterest:
        description: 'Corresponds to the failure by the Reference Entity to pay an expected interest amount or the payment
          of an actual interest amount that is less than the expected interest amount. ISDA 2003 Term: Failure to Pay Interest.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPayInterest
      FailureToPayPrincipal:
        description: 'Corresponds to the failure by the Reference Entity to pay an expected principal amount or the payment
          of an actual principal amount that is less than the expected principal amount. ISDA 2003 Term: Failure to Pay Principal.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPayPrincipal
      GovernmentalIntervention:
        description: 'A governmental intervention is an event resulting from an action by a governmental authority that materially
          impacts the reference entity''s obligations, such as an interest rate reduction, principal reduction, deferral of
          interest or principal, change in priority ranking, or change in currency or composition of payment. ISDA 2014 Term:
          Governmental Intervention.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#GovernmentalIntervention
      ImpliedWritedown:
        description: Results from the fact that losses occur to the underlying instruments that do not result in reductions
          of the outstanding principal of the reference obligation.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ImpliedWritedown
      MaturityExtension:
        description: Results from the fact that the underlier fails to make principal payments as expected.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#MaturityExtension
      ObligationAcceleration:
        description: 'One or more of the obligations have been declared due and payable before they would otherwise have been
          due and payable as a result of, or on the basis of, the occurrence of a default, event of default or other similar
          condition or event other than failure to pay (preferred by the market over Obligation Default, because more definitive
          and encompasses the definition of Obligation Default - this is more favorable to the Seller). Subject to the default
          requirement amount. ISDA 2003 Term: Obligation Acceleration.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ObligationAcceleration
      ObligationDefault:
        description: 'One or more of the obligations have become capable of being declared due and payable before they would
          otherwise have been due and payable as a result of, or on the basis of, the occurrence of a default, event of default
          or other similar condition or event other than failure to pay. ISDA 2003 Term: Obligation Default.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ObligationDefault
      RepudiationMoratorium:
        description: 'The reference entity, or a governmental authority, either refuses to recognise or challenges the validity
          of one or more obligations of the reference entity, or imposes a moratorium thereby postponing payments on one or
          more of the obligations of the reference entity. Subject to the default requirement amount. ISDA 2003 Term: Repudiation/Moratorium.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#RepudiationMoratorium
      Restructuring:
        description: 'A restructuring is an event that materially impacts the reference entity''s obligations, such as an
          interest rate reduction, principal reduction, deferral of interest or principal, change in priority ranking, or
          change in currency or composition of payment. ISDA 2003 Term: Restructuring.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#Restructuring
      Writedown:
        description: Results from the fact that the underlier writes down its outstanding principal amount.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#Writedown

  ValuationTypeEnum:
    description: Method used for the valuation of the transaction by the valuation party.
    permissible_values:
      MarkToMarket:
        description: Mark-to-Market
      MarkToModel:
        description: Mark-to-Model

  ValuationSourceEnum:
    description: Source for the valuation of the transaction by the valuation party.
    permissible_values:
      CentralCounterparty:
        description: Central Counterparty's Valuation

  ValuationScopeEnum:
    description: Scope of the valuation i.e. what it applies to.
    permissible_values:
      Collateral:
        description: Valuation of the collateral used against a trade.
      Trade:
        description: Valuation of the actual trade itself.

  PriceTimingEnum:
    permissible_values:
      ClosingPrice:
        description: The last price anyone paid for a share of a product during the business hours of the exchange where the
          product is traded on a business day.
      OpeningPrice:
        description: The first price anyone paid for a share of a product during the business hours of the exchange where
          the product is traded on a business day.

  ClosedStateEnum:
    description: The enumerated values to specify what led to the contract or execution closure.
    permissible_values:
      Allocated:
        description: The execution or contract has been allocated.
      Cancelled:
        description: The execution or contract has been cancelled.
      Exercised:
        description: The (option) contract has been exercised.
      Expired:
        description: The (option) contract has expired without being exercised.
      Matured:
        description: The contract has reached its contractual termination date.
      Novated:
        description: The contract has been novated. This state applies to the stepped-out contract component of the novation
          event.
      Terminated:
        description: The contract has been subject of an early termination event.

slots:
  legalAgreement:
    range: LegalAgreement
    description: Optional legal agreements associated to the contract being formed, for instance a master agreement.
    multivalued: true
    inlined_as_list: true

  primitiveInstruction:
    range: PrimitiveInstruction
    description: Specifies the primitive instructions that will be used to call primitive event functions.

  before:
    range: TradeState
    description: Specifies the trade state that will be acted on by the primitive event functions.
    annotations:
      metadata_reference: true

  contractFormation:
    range: ContractFormationInstruction
    description: Specifies instructions describing an contract formation primitive event.

  execution:
    range: ExecutionInstruction
    description: Specifies instructions describing an execution primitive event.

  exercise:
    range: ExerciseInstruction
    description: Specifies instructions describing an exercise primitive event.

  partyChange:
    range: PartyChangeInstruction
    description: Specifies instructions describing a party change primitive event.

  quantityChange:
    range: QuantityChangeInstruction
    description: Specifies instructions describing an quantity change primitive event.

  reset:
    range: ResetInstruction
    description: Specifies instructions describing a reset event.

  split:
    range: SplitInstruction
    description: Specifies instructions to split a trade into multiple branches.

  termsChange:
    range: TermsChangeInstruction
    description: Specifies instructions describing a terms change primitive event.

  transfer:
    range: TransferInstruction
    description: Specifies instructions describing a transfer primitive event.

  indexTransition:
    range: IndexTransitionInstruction
    description: Specifies inputs needed to process a Index Transition business event.

  stockSplit:
    range: StockSplitInstruction
    description: Specifies inputs needed to process a Stock Split business event.

  observation:
    range: ObservationInstruction
    description: Specifies inputs needed to process an observation.

  valuation:
    range: ValuationInstruction
    description: Specifies inputs needed to process an update of a valuation.

  eventQualifier:
    range: string
    description: The CDM event qualifier, which corresponds to the outcome of the isEvent qualification logic which qualifies
      the lifecycle event as a function of its features (e.g. PartialTermination, ClearingSubmission, Novation, ...).
    close_mappings:
    - fpml_5_10:BusinessEvent.eventQualifier

  after:
    range: TradeState
    description: Specifies the after trade state(s) created.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:BusinessEvent.after

  intent:
    range: PositionEventIntentEnum
    description: The intent attribute is meant to be specified when the event qualification cannot be programmatically inferred
      from the event features. As a result it is only associated with those primitives that can give way to such ambiguity,
      the quantityChange being one of those.
    required: true

  corporateActionIntent:
    range: CorporateActionTypeEnum
    description: The intent of a corporate action on the position.

  eventDate:
    range: date
    description: Specifies the date on which the event is taking place. This date is equal to the trade date in the case of
      a simple execution.  However it can be different from the trade date, for example in the case of a partial termination.

  packageInformation:
    range: IdentifiedList
    description: Specifies the package information in case the business event represents several trades executed as a package
      (hence this attribute is optional). The package information is only instantiated once at the business event level to
      preserve referential integrity, whereas individual trades make reference to it to identify that they are part of a package.

  observationEvent:
    range: ObservationEvent
    description: Contains all information related to an observation.
    required: true

  replace:
    range: boolean
    description: Specifies whether the previous valuation tracks in the valuation history are removed (True) or kept (False).
    required: true

  product:
    range: NonTransferableProduct
    description: Defines the financial product to be executed and contract formed.
    required: true

  priceQuantity:
    range: PriceQuantity
    description: Defines the prices (e.g. spread, equity price, FX rate), quantities (e.g. currency amount, no. shares) and
      settlement terms (e.g. initial fee, broker fee, up-front cds payment or option premium settlement) associated with the
      constituents of the transacted product.
    required: true
    multivalued: true
    inlined_as_list: true

  counterparty:
    range: Counterparty
    description: Maps two defined parties to counterparty enums for the transacted product.
    required: true
    multivalued: true

  parties:
    range: Party
    description: Defines all parties to that execution, including agents and brokers.
    required: true
    multivalued: true
    inlined_as_list: true

  partyRoles:
    range: PartyRole
    description: Defines the role(s) that party(ies) may have in relation to the execution.
    multivalued: true
    inlined_as_list: true

  executionDetails:
    range: ExecutionDetails
    description: Specifies the type and venue of execution, e.g. via voice, or electronically.
    required: true

  tradeDate:
    range: date
    description: Denotes the trade/execution date.
    required: true

  tradeTime:
    range: TimeZone
    description: Denotes the trade time and timezone as agreed by the parties to the trade.

  tradeIdentifier:
    range: TradeIdentifier
    description: Denotes one or more identifiers associated with the transaction.
    required: true
    multivalued: true
    inlined_as_list: true

  collateral:
    range: Collateral
    description: Detail the collateral requirement anticipated with the transaction.

  lotIdentifier:
    range: Identifier
    description: Lot Identifier associated with the transaction.

  exerciseQuantity:
    range: PrimitiveInstruction
    description: Contains instructions for exercising the option including a quantity change, and optionally a transfer.
    required: true

  exerciseOption:
    range: OptionPayout
    description: Specifies the Option Payout being exercised on the trade.
    annotations:
      metadata_reference: true

  exerciseDate:
    range: AdjustableOrAdjustedDate
    description: Specifies the date on which an option contained within the financial product would be exercised. The date
      may be omitted if the contractual product allows for only a single date of exercise (European exercise).

  exerciseTime:
    range: BusinessCenterTime
    description: 'Specifies the time at which an option contained within the financial product woulld be exercised. The time
      may be omitted if the contractual product allows for only a single time of exercise (European exercise). '

  replacementTradeIdentifier:
    range: TradeIdentifier
    description: Specifies the trade identifier to apply to the replacement trade for physical exercise.
    multivalued: true
    inlined_as_list: true

  payout:
    range: Payout
    any_of:
    - range: AssetPayout
    - range: CommodityPayout
    - range: CreditDefaultPayout
    - range: FixedPricePayout
    - range: InterestRatePayout
    - range: OptionPayout
    - range: PerformancePayout
    - range: SettlementPayout
    required: true
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  rateRecordDate:
    range: date
    description: Specifies the 'Rate Record Day' for a Fallback rate.  Fallback rate fixing processes typically set the fixing
      rate in arrears, i.e., the Fallback Rate corresponding to a Rate Record Date is set at the end of the interest accural
      period.  When this applies, Reset->resetDate occurs at the end of the interest period, and the Reset->rateRecordDate
      occurs near the start of the interest period.  The Reset->rateRecordDate and Reset->observations->observationIdentifier->observationDate
      will differ if a Fallback rate is unavailable on the Rate Record Date, and the latest previous available rate is used
      as the observation.

  resetDate:
    range: date
    description: Specifies the date on which the reset is occuring.
    required: true

  tradeState:
    range: TradeState
    required: true
    close_mappings:
    - fpml_5_10:CalculateTransferInstruction.tradeState

  resets:
    range: Reset
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:CalculateTransferInstruction.resets

  payerReceiver:
    range: PayerReceiver
    close_mappings:
    - fpml_5_10:CalculateTransferInstruction.payerReceiver

  quantity:
    range: Quantity
    description: Specifies quantity amount returned if not the full amount from the TradeState, e.g. partial return
    close_mappings:
    - fpml_5_10:CalculateTransferInstruction.quantity

  transferState:
    range: TransferState
    description: Specifies the terms and state of a transfers.
    multivalued: true
    inlined_as_list: true

  change:
    range: PriceQuantity
    description: Quantity by which the trade is being increased, decreased or replaced, and the price at which such quantity
      change is agreed. The quantity change should always be specified as a positive number, with the direction (increase/decrease/replacement)
      being specified by the direction enumeration. A fee can also be associated to the quantity change by specifying a Price
      component of type CashPrice, including the corresponding settlement date and direction.
    required: true
    multivalued: true
    inlined_as_list: true

  direction:
    range: QuantityChangeDirectionEnum
    description: Direction of the quantity change specified as either an increase, decrease or replacement.
    required: true

  cashTransfer:
    range: Transfer
    description: Specifies the cash transfer that can optionally be tied to an index transition event.
    any_of:
    - range: ScheduledTransfer
    - range: UnscheduledTransfer

  adjustment:
    range: NotionalAdjustmentEnum

  breakdown:
    range: PrimitiveInstruction
    description: Each split breakdown specifies the set of primitive instructions to be applied to a single branch of that
      split. N split breakdowns result in N output trades, which include the original trade. Instructions for how to handle
      the original trade (e.g. if it must be closed) must be specified in one of the breakdowns.
    required: true
    multivalued: true
    inlined_as_list: true

  partyRole:
    range: PartyRole
    description: Specifies an additional party roles to be added on to the new transaction.

  tradeId:
    range: TradeIdentifier
    description: The identifier to be assigned to the new trade post change of party.
    required: true
    multivalued: true
    inlined_as_list: true

  trade:
    range: Trade
    description: Represents the Trade that has been effected by a business or life-cycle event.
    required: true

  resetHistory:
    range: Reset
    description: Represents the updated Trade attributes which can change as the result of a reset event. Only the changed
      values are captured, leaving the remaining data attributes empty. See Create_Reset function for further details on how
      TradeState is used in the Reset event. The TradeState data type is used to maintain backwards compatibility with the
      current Reset mechanism.
    multivalued: true
    inlined_as_list: true

  transferHistory:
    range: TransferState
    description: Represents the updated Trade attributes which can change as the result of a transfer event.
    multivalued: true
    inlined_as_list: true

  observationHistory:
    range: ObservationEvent
    description: Represents the observed events related to a particular product or process, such as credit events or corporate
      actions.
    multivalued: true
    inlined_as_list: true

  valuationHistory:
    range: Valuation
    multivalued: true
    inlined_as_list: true

  counterpartyPosition:
    range: CounterpartyPosition
    description: Represents the Position that has been effected by a business or life-cycle event.
    required: true

  creditEvent:
    range: CreditEvent
    description: Specifies the necessary information to create a credit event.

  corporateAction:
    range: CorporateAction
    description: Specifies the necessary information to create a corporate action.

  resetValue:
    range: Price
    description: Specifies the reset or fixing value. The fixing value could be a cash price, interest rate, or other value.
    required: true

  observations:
    range: Observation
    description: Represents an audit of the observations used to produce the reset value. If multiple observations were necessary
      to produce the reset value, the aggregation method should be defined on the payout.
    required: true
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  averagingMethodology:
    range: AveragingCalculation
    description: Identifies the aggregation method to use in the case where multiple observations are used to compute the
      reset value and the method is not defined in a payout.

  closedState:
    range: ClosedState
    description: Represents the qualification of what led to the trade's closure alongside the dates on which this closure
      took effect.

  positionState:
    range: PositionStatusEnum
    description: Identifies the state of the position, to distinguish if just executed, formed, already settled, closed, etc.

  transferStatus:
    range: TransferStatusEnum
    description: Represents the State of the Transfer through its life-cycle.

  transferType:
    range: UnscheduledTransferEnum
    description: Specifies the type of unscheduled transfer.

  corporateActionTransferType:
    range: CorporateActionTypeEnum

  payoutReference:
    range: Payout
    description: Represents the origin to the transfer as a reference for lineage purposes, whether it originated from trade
      level settlement terms or from payment terms on an economic payout.
    any_of:
    - range: AssetPayout
    - range: CommodityPayout
    - range: CreditDefaultPayout
    - range: FixedPricePayout
    - range: InterestRatePayout
    - range: OptionPayout
    - range: PerformancePayout
    - range: SettlementPayout
    annotations:
      metadata_reference: true

  amount:
    range: Money
    description: Current value of the outstanding contract
    required: true

  timestamp:
    range: datetime
    description: Date and time of the last valuation marked to market, provided by the central counterparty (CCP) or calculated
      using the current or last available market price of the inputs.
    required: true

  method:
    range: ValuationTypeEnum
    description: Method used for the valuation of the transaction by the valuation party.

  scope:
    range: ValuationScopeEnum
    description: ' Defines the scope of the valuation, what it applies to e.g. the collateral or the trade'
    required: true

  delta:
    range: decimal
    description: The ratio of the change in the price of a derivative transaction to the change in the price of the underlying.
      This field is applicable only to options and swaptions.

  valuationTiming:
    range: PriceTimingEnum
    description: Denotes when the valuation was sourced during a business day.

  priceComponent:
    range: Price
    description: Denotes the price used to compute the valuation.

  contractDetails:
    range: ContractDetails
    description: Represents information specific to trades involving contractual products.

  clearedDate:
    range: date
    description: Specifies the date on which a trade is cleared (novated) through a central counterparty clearing service.
    deprecated: Deprecated in CDM

  executionType:
    range: ExecutionTypeEnum
    description: Identifies the type of execution, e.g. via voice, electronically...
    required: true

  executionVenue:
    range: LegalEntity
    description: Represents the venue on which a trade was executed.

  packageReference:
    range: IdentifiedList
    description: A reference to the package linking the trade with other trades, in case the trade was executed as part of
      a package (hence this attribute is optional).

  documentation:
    range: LegalAgreement
    description: Represents the legal document(s) that governs a trade and associated contractual product terms, either as
      a reference to such documents when specified as part of the CDM, or through identification of some of the key terms
      of those documents, such as the type of document, the document identifier, the publisher, the document vintage and the
      agreement date.
    multivalued: true
    inlined_as_list: true

  governingLaw:
    range: GoverningLawEnum
    description: Represents the law governing the trade and associated contractual product terms.
    annotations:
      metadata_scheme: true

  tradeReference:
    range: Trade
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  eventReference:
    range: WorkflowStep
    description: The reference to the instantiation of an Event object, either through a globalKey or an xml-derived id/href
      mechanism. The definition associated to the Lineage class provides more details with respect to those referencing approaches,
      their expected usage and available implementation.
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  portfolioStateReference:
    range: PortfolioState
    description: The reference to the previous state of a Portfolio, in a chain of Events leading up to a build of that Portfolio
      as the holding of Product(s) in specific Quantity(ies). As part of the PortfolioState object, a pointer to the previous
      PortfolioState is provided through a Lineage object, together with pointer(s) to the Event or set of Events leading
      up to the current (new) state.
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  adjustmentRatio:
    range: decimal
    description: The number that denotes the cumulative quantity of post-split shares issued to shareholders versus the quantity
      of pre-split shares previously issued to shareholders.  This number will be multiplied by existing shares in an equity
      derivative contract or other positions to determine the post-split number of shares.  With regard to any reference to
      price, the pre-split reference price will be divided by this number to determine the post-split reference price.
    required: true

  creditEventType:
    range: CreditEventTypeEnum
    description: The type of credit event taking place.
    required: true

  eventDeterminationDate:
    range: date
    description: The date in which the credit event is determined by the Credit Derivatives Determinations Comitee.
    required: true

  auctionDate:
    range: date
    description: The date on which the auction is scheduled to occur.

  finalPrice:
    range: Price
    description: The final price resulting from the auction.

  recoveryPercent:
    range: decimal
    description: The percentage of the original value of the asset affected by the credit event that can be recovered.

  publiclyAvailableInformation:
    range: Resource
    description: A public information source, e.g. a particular newspaper or electronic news service, that may publish relevant
      information used in the determination of whether or not a credit event has occurred.
    multivalued: true
    inlined_as_list: true

  referenceInformation:
    range: ReferenceInformation
    description: The reference entity, part of a credit basket, impacted by the credit event.
    required: true

  corporateActionType:
    range: CorporateActionTypeEnum
    description: The type of corporate action taking place.
    required: true

  exDate:
    range: date
    description: The date on which the corporate action is known to have taken place.
    required: true

  payDate:
    range: date
    description: The date on which resulting from the corporate action are delivered.
    required: true

  recordDate:
    range: date
    description: The date on which the account phyical balance and related underlier ownership is recorded by the custodian.

  announcementDate:
    range: date
    description: The date on which the corporate action is announced by the issuer.

  underlier:
    range: Underlier
    description: The underlier impacted by the corporate action.
    any_of:
    - range: Observable
    - range: Product
    required: true

  adjustmentFactor:
    range: AdjustmentFactor
    description: Specifies any additional details e.g. further descriptions depending on the particular type of Corporate
      Action, adjustmentFactor, calculations

  informationSource:
    range: InformationSource
    description: A class defining the source of data used in an Observation for any purposes. The data is either sourced from
      a Provider, or from a Party.

  dividendObservation:
    range: PriceSchedule
    description: To record observations of dividends.

  bespokeEventDescription:
    range: string
    description: Corporate action triggered by the occurrence of an event which description is seperatly agreed between the
      parties and/or described in any referenced agreement (for instance bespoke term described in any string type objects
      present in most root attributes of Agreement type).

  calculationTerms:
    range: AdjustmentFactorCalculationTerms
    description: Describes the input terms involved in the calculation of the adjustment factor applied to the price of the
      underlier impacted by a Corporate Action.
    close_mappings:
    - fpml_5_10:AdjustmentFactor.calculationTerms

  shareForShareRatio:
    range: decimal
    description: 'Multiple value, say ''M/N'' where ''M'' is the number of shares after the event and ''N'' is the number
      of shares prior to the event. '
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.shareForShareRatio

  shareForRightsRatio:
    range: decimal
    description: 'Multiple value, say ''M/N'' where ''M'' is the number of rights after the event, and ''N'' of shares prior
      to the event. '
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.shareForRightsRatio

  rightsSubscriptionPrice:
    range: Price
    description: The price to pay per each right.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.rightsSubscriptionPrice

  dividendRatio:
    range: decimal
    description: Multiplier value (e.g. 85 %, etc.) to calculate net dividend amount, given gross amount before taking into
      account the relevant fiscal features.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.dividendRatio

  spinOff:
    range: SpinOff
    description: Defines the underlier for both the Parent Company and the Child Compagny involved in Spin Off corporate action,
      as well as the respective price observation for each.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.spinOff

  merger:
    range: Merger
    description: Defines the underlier for both the Purchaser Company and the Acquired Compagny involved in Spin Off corporate
      action, as well as the respective price observation for each.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.merger

  accrualFactor:
    range: AccrualFactor
    description: The accrual rate and related terms, to adjust the price of an underlier impacted by a Corporate Action when
      economic impact consists in freezing the underlier price to last fixing and applying accruals for each remaining underlier
      price fixing date required i.e. for each, adjustedPrice = lastFixingPrice x (1 + accrualRate x DCF).
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.accrualFactor

  lastFixingPriceBeforeAdjustment:
    range: Price
    description: The last fixing price of the Underlier affected by the CorporateAction, before any adjustment with regards
      to the CorporateAction.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.lastFixingPriceBeforeAdjustment

  bespokeCalculationFormula:
    range: string
    description: To describe the formula used to calculate the Adjustment Factor.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms.bespokeCalculationFormula

  tenorTillMaturity:
    range: decimal
    description: The duration between last fixing date and the payment date of accruals, calculated in accordance with the
      appropriate DayCountFraction.
    required: true
    close_mappings:
    - fpml_5_10:AccrualFactorCalculationTerms.tenorTillMaturity

  dayCountFraction:
    range: DayCountFractionEnum
    description: The enumerated values to specify the day count fraction.
    required: true
    close_mappings:
    - fpml_5_10:AccrualFactorCalculationTerms.dayCountFraction

  interpolationTerms:
    range: StubValue
    description: Describes the rate, tenor, period duration for the short and long stubs, when the accrualRate optionnaly
      results from an interpolation method.
    close_mappings:
    - fpml_5_10:AccrualFactorCalculationTerms.interpolationTerms

  parentSecurity:
    range: Security
    description: Defines the underlier for the Parent Company involved in Spin Off corporate action.
    required: true

  parentSecurityPrice:
    range: Price
    description: The price observation that relates to underlier for the Parent Company.
    required: true

  childSecurity:
    range: Security
    description: Defines the underlier for the Child Company involved in Spin Off corporate action.
    required: true

  childSecurityPrice:
    range: Price
    description: The price observation that relates to underlier for the Child Company.
    required: true

  purchaserSecurity:
    range: Security
    description: Defines the underlier for the Purchaser Company involved in Merger corporate action.
    required: true

  purchaserSecurityPrice:
    range: Price
    description: The price observation that relates to underlier for the Purchaser Company.
    required: true

  acquiredSecurity:
    range: Security
    description: Defines the underlier for the Acquired Company involved in Merger corporate action.
    required: true

  acquiredSecurityPrice:
    range: Price
    description: The price observation that relates to underlier for the Acquired Company.
    required: true

  alphaContract:
    range: TradeState
    description: The contract that will be submitted to the clearing house for clearing. The contract should indicate that
      it should be cleared by assigning a clearing organisation as a party role.
    required: true
    close_mappings:
    - fpml_5_10:ClearingInstruction.alphaContract

  clearingParty:
    range: Party
    description: The Central Counter party (CCP) that the contract will be submitted to for clearing.
    required: true
    close_mappings:
    - fpml_5_10:ClearingInstruction.clearingParty

  party1:
    range: Party
    description: First party facing the CCP if it is clearing for its own account.
    required: true
    close_mappings:
    - fpml_5_10:ClearingInstruction.party1

  party2:
    range: Party
    description: Second party facing the CCP if it is clearing for its own account.
    required: true
    close_mappings:
    - fpml_5_10:ClearingInstruction.party2

  clearerParty1:
    range: Party
    description: Optional party facing the CCP, acting as clearing member for party1.
    close_mappings:
    - fpml_5_10:ClearingInstruction.clearerParty1

  clearerParty2:
    range: Party
    description: Optional party facing the CCP, acting as clearing member for party2.
    close_mappings:
    - fpml_5_10:ClearingInstruction.clearerParty2

  isOpenOffer:
    range: boolean
    description: Open Offer
    close_mappings:
    - fpml_5_10:ClearingInstruction.isOpenOffer

  adjustedExerciseDate:
    range: date
    description: The date on which the option exercise takes place. This date should already be adjusted for any applicable
      business day convention.
    required: true

  adjustedRelevantSwapEffectiveDate:
    range: date
    description: The effective date of the underlying swap associated with a given exercise date. This date should already
      be adjusted for any applicable business day convention.
    required: true

  adjustedCashSettlementValuationDate:
    range: date
    description: The date by which the cash settlement amount must be agreed. This date should already be adjusted for any
      applicable business day convention.

  adjustedCashSettlementPaymentDate:
    range: date
    description: The date on which the cash settlement amount is paid. This date should already be adjusted for any applicable
      business day convention.

  adjustedExerciseFeePaymentDate:
    range: date
    description: The date on which the exercise fee amount is paid. This date should already be adjusted for any applicable
      business day convention.

  sendingParty:
    range: Party
    description: The party issuing the invoice
    required: true

  receivingParty:
    range: Party
    description: The party receiving the invoice
    required: true

  billingStartDate:
    range: date
    description: The starting date of the period described by this invoice
    required: true

  billingEndDate:
    range: date
    description: The ending date of the period described by this invoice
    required: true

  billingRecord:
    range: BillingRecord
    description: The billing records contained within the invoice
    required: true
    multivalued: true
    inlined_as_list: true

  billingSummary:
    range: BillingSummary
    description: The billing summaries contained within the invoice
    required: true
    multivalued: true
    inlined_as_list: true

  billingRecordInstruction:
    range: BillingRecordInstruction
    description: Instructions for creating the billing records contained within the invoice
    required: true
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:BillingInstruction.billingRecordInstruction

  recordStartDate:
    range: date
    description: The starting date of the period described by this record
    required: true
    close_mappings:
    - fpml_5_10:BillingRecordInstruction.recordStartDate

  recordEndDate:
    range: date
    description: The ending date of the period described by this record
    required: true
    close_mappings:
    - fpml_5_10:BillingRecordInstruction.recordEndDate

  settlementDate:
    range: date
    description: The date for settlement of the transfer.
    required: true
    close_mappings:
    - fpml_5_10:BillingRecordInstruction.settlementDate

  summaryAmountType:
    range: RecordAmountTypeEnum
    description: The account level for the billing summary.
    required: true

  recordTransfer:
    range: Transfer
    description: The settlement terms for the billing record
    any_of:
    - range: ScheduledTransfer
    - range: UnscheduledTransfer
    required: true
    close_mappings:
    - fpml_5_10:BillingRecord.recordTransfer

  minimumFee:
    range: Money
    description: Indicates the minimum fee amount applied to the billing record, if any.
    close_mappings:
    - fpml_5_10:BillingRecord.minimumFee

  summaryTransfer:
    range: Transfer
    description: The settlement terms for the billing summary
    any_of:
    - range: ScheduledTransfer
    - range: UnscheduledTransfer
    close_mappings:
    - fpml_5_10:BillingSummary.summaryTransfer

  pricingTime:
    range: TimeZone
    description: The regional exchange close time for the underlying contract,including time zone, at which the trades should
      be priced. This provides an indication for which regional snapshot should be used for pricing primarily for Global markets
      where there are multiple regional close times.
    required: true

  discountingIndex:
    range: FloatingRateIndexEnum
    description: It specifies the interest payable on collateral delivered under a CSA covering the trade.

  instructionType:
    range: MarginCallInstructionType
    description: Identifies the enumeration values to specify the call notification type, direction, specific action type.
    required: true

  clearingBroker:
    range: Party
    description: Indicates the name of the Clearing Broker FCM/DCM.

  callIdentifier:
    range: Identifier
    description: Represents a unique Identifier for a margin call message, that can be referenced throughout all points of
      the process.

  callAgreementType:
    range: AgreementName
    description: Specifies the legal agreement type the margin call is generated from and governed by.
    required: true

  agreementMinimumTransferAmount:
    range: Money
    description: Specifies the collateral legal agreement minimum transfer amount in base currency.

  agreementThreshold:
    range: Money
    description: Specifies the collateral legal agreement threshold amount in base currency.

  agreementRounding:
    range: Money
    description: Specifies the collateral legal agreement rounding in base currency.

  regMarginType:
    range: RegMarginTypeEnum
    description: Identifies margin type and if related regulatory mandate
    required: true

  regIMRole:
    range: RegIMRoleEnum
    description: Indicates the role of the party in an regulatory initial margin call instruction (i.e Pledgor party or Secured
      party).

  baseCurrencyExposure:
    range: MarginCallExposure
    description: Represents the current mark to market value or IM calculation value of the trade portfolio as recorded by
      the principle (in base currency), to be referenced in a margin call.

  collateralPortfolio:
    range: CollateralPortfolio
    description: Represents attributes to define the details of collateral assets within a collateral portfolio to be used
      in margin call messaging and contribute to collateral balances e.g securities in a collateral account recorded by the
      principal as held or posted.
    annotations:
      metadata_reference: true

  independentAmountBalance:
    range: CollateralBalance
    description: Represents additional credit support amount over and above mark to market value.

  tradePortfolio:
    range: PortfolioState
    description: Represents a Portfolio that describes all the positions held at a given time, in various states which can
      be either traded, settled, etc., with lineage information to the previous state.
    required: true
    annotations:
      metadata_reference: true

  aggregateValue:
    range: Money
    description: Represents the aggregate value of the portfolio in base currency.
    required: true

  calculationDateTime:
    range: datetime
    description: Indicates the date when the exposure is calculated if different from valuation date.

  valuationDateTime:
    range: datetime
    description: Indicates the valuation date of the exposure underlying the calculation.
    required: true

  overallExposure:
    range: Exposure
    description: Represents the whole overall mark to market value or IM calculation value of the trade portfolio as recorded
      by the principle (in base currency).
    required: true

  simmIMExposure:
    range: Exposure
    description: Represents Initial Margin (IM) exposure derived from ISDA SIMM calculation.

  scheduleGridIMExposure:
    range: Exposure
    description: Represents Initial Margin (IM) exposure derived from schedule or Grid calculation.

  collateralBalanceStatus:
    range: CollateralStatusEnum
    description: Defines the collateral balance breakdown of settlement status.
    close_mappings:
    - fpml_5_10:CollateralBalance.collateralBalanceStatus

  haircutIndicator:
    range: HaircutIndicatorEnum
    description: Indicates if the collateral balance amount is based on pre or post haircut, if a haircut is associated with
      the collateral asset
    close_mappings:
    - fpml_5_10:CollateralBalance.haircutIndicator

  amountBaseCurrency:
    range: Money
    description: Specifies the collateral balance amount in base currency determined within a collateral legal agreement,
      or defined for reporting purposes.
    required: true
    close_mappings:
    - fpml_5_10:CollateralBalance.amountBaseCurrency

  portfolioIdentifier:
    range: Identifier
    description: Specifies a unique identifier for a set of collateral positions in a portfolio.
    close_mappings:
    - fpml_5_10:CollateralPortfolio.portfolioIdentifier

  collateralPosition:
    range: CollateralPosition
    description: Specifies the individual components of the collateral positions in the collateral portfolio.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:CollateralPortfolio.collateralPosition

  collateralBalance:
    range: CollateralBalance
    description: Represents the populated or calculated collateral aggregate balance amount for the collateral portfolio.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:CollateralPortfolio.collateralBalance

  treatment:
    range: CollateralTreatment
    description: Specifies if there is any treatment to be applied to collateral, such as percentage discount which will impact
      collateral value.
    close_mappings:
    - fpml_5_10:CollateralPosition.treatment

  collateralPositionStatus:
    range: CollateralStatusEnum
    description: Indicates the collateral positions settlement status.
    close_mappings:
    - fpml_5_10:CollateralPosition.collateralPositionStatus

  callAmountInBaseCurrency:
    range: Money
    description: Specifies the amount of margin being called for which accounts for margin calculation inclusive of exposure,
      independent amount,threshold,collateral balance, MTA, rounding increments (in base currency detailed in supporting collateral
      agreement).
    required: true

  recallNonCashCollateralDescription:
    range: EligibleCollateralCriteria
    description: Specifies the details to describe or identify non-cash collateral eligible assets for recall purposes.
    multivalued: true
    inlined_as_list: true

  callType:
    range: CallTypeEnum
    description: Indicates the status of the call message type, such as expected call, notification of a call or an actionable
      margin call.
    required: true

  visibilityIndicator:
    range: boolean
    description: Indicates the choice if the call instruction is visible or not to the other party.

  collateralPositionComponent:
    range: CollateralPosition
    description: Specifies the collateral to be moved and its direction.
    required: true
    multivalued: true
    inlined_as_list: true

  marginCallAction:
    range: MarginCallActionEnum
    description: Specifies the margin call action details, specified as either Delivery or Return.
    required: true

  marginCallResponseAction:
    range: MarginCallResponseAction
    description: Specifies the margin call action details, including collateral to be moved and direction.
    required: true
    multivalued: true
    inlined_as_list: true

  marginResponseType:
    range: MarginCallResponseTypeEnum
    description: Indicates the response type, such as, is the margin call response a 'full' 'part' agreement or 'dispute'.
    required: true

  agreedAmountBaseCurrency:
    range: Money
    description: Indicates the amount that posting entity agrees to remit in response to margin call (in base currency).
    required: true

  activityDate:
    range: date
    description: The activity date on which the closing state took place, i.e. either the event date of the closing event
      (e.g. option exercise, contract early termination) or the contractual termination date.
    required: true
    close_mappings:
    - fpml_5_10:ClosedState.activityDate

  lastPaymentDate:
    range: date
    description: The date associated with the last payment in relation to the artefact (e.g. contract) to which this closed
      state applies. As an example, in the case of an early termination event, it would be the settlement date of the associated
      fee, if applicable.
    close_mappings:
    - fpml_5_10:ClosedState.lastPaymentDate

classes:
  ContractFormationInstruction:
    description: Specifies instructions to create a fully formed contract, with optional legal agreements.
    comments:
    - 'Rosetta condition: ExecutedAgreements — if legalAgreement exists then legalAgreement -> agreementDate exists'
    - 'Rosetta func: Create_ContractFormationInstruction'
    - 'Rosetta func: Create_ContractFormation — Function specification that represents an executed trade for a contractual
      product that has been affirmed (or confirmed) by the two parties. The formed contract can reference a legal agreement
      for instance a master agreement, by using the optional legalAgreement input.'
    annotations:
      rosetta_functions: '[{"name":"Create_ContractFormationInstruction","inputs":[{"name":"legalAgreement","type":"LegalAgreement","cardinality":"0..*"}],"output":{"name":"instruction","type":"ContractFormationInstruction","cardinality":"1..1"}},{"name":"Create_ContractFormation","description":"Function
        specification that represents an executed trade for a contractual product that has been affirmed (or confirmed) by
        the two parties. The formed contract can reference a legal agreement for instance a master agreement, by using the
        optional legalAgreement input.","inputs":[{"name":"instruction","type":"ContractFormationInstruction","cardinality":"1..1"},{"name":"execution","type":"TradeState","cardinality":"1..1"}],"output":{"name":"contractFormation","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - legalAgreement
    in_subset:
    - cdm_event_common

  Instruction:
    description: Instruction to a function that will be used to perform a business event
    tree_root: true
    comments:
    - 'Rosetta condition: ExclusiveSplitPrimitive — if primitiveInstruction -> split exists then primitiveInstruction -> split
      only exists'
    - 'Rosetta condition: NewTrade — (if primitiveInstruction -> execution exists then before is absent else True) and (if
      before is absent then primitiveInstruction -> execution exists else True)'
    - 'Rosetta func: Create_PairOffInstruction — Creates a set of instructions to pair-off a set of trades based on a pair
      reference. A package component is created based on that pair reference and the list of identifiers for the underlying
      trades. That package component is then added onto the execution details of every underlying trade. The existing trades
      are not terminated.'
    - 'Rosetta func: Create_BusinessEvent — Creates a business event from instructions containing primitive instructions and
      optionally a trade state.'
    annotations:
      rosetta_functions: '[{"name":"Create_PairOffInstruction","description":"Creates a set of instructions to pair-off a
        set of trades based on a pair reference. A package component is created based on that pair reference and the list
        of identifiers for the underlying trades. That package component is then added onto the execution details of every
        underlying trade. The existing trades are not terminated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"2..*"},{"name":"pairReference","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"Instruction","cardinality":"1..*"}},{"name":"Create_BusinessEvent","description":"Creates
        a business event from instructions containing primitive instructions and optionally a trade state.","inputs":[{"name":"instruction","type":"Instruction","cardinality":"1..*"},{"name":"intent","type":"EventIntentEnum","cardinality":"0..1"},{"name":"eventDate","type":"date","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"1..1"}],"output":{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}}]'
    slots:
    - primitiveInstruction
    - before
    in_subset:
    - cdm_event_common

  PrimitiveInstruction:
    description: A Primitive Instruction describes the inputs required to pass into the corresponding PrimitiveEvent function.
    comments:
    - 'Rosetta func: Create_Split — Defines the logic for splitting a trade into separate copies. The split instruction contains
      a breakdown into N set of primitive instructions. Each set contains the primitive instructions to be applied to each
      post-split trade, eventually producing N trades. The split function underpins a number of business events such as clearing
      or allocation.'
    - 'Rosetta func: Create_RollPrimitiveInstruction — Creates the primitive instructions for a trade roll. A trade roll consists
      in closing an existing trade and entering into a new one which has the same characteristics as the old one, except with
      an extended termination date and (possibly) a different price.'
    - 'Rosetta func: Create_OnDemandRateChangePrimitiveInstruction — Creates a full primitive instruction for an on-demand
      rate change event. A rate change consists in closing the original trade and opening a new one with the same details
      as the original one, but with a new rate (price) and effective date. The business event logic checks that there is only
      1 rate price in the original trade to be updated.'
    - 'Rosetta func: Create_CancellationPrimitiveInstruction — Creates a primitive instruction for early cancellation.'
    - 'Rosetta func: Create_ShapingInstruction — Creates a set of instructions to shape a trade based on shaped quantities
      and a package ID. The original trade is closed and split into (smaller) shaped trades based on a set of trade lots containing
      the shaped quantities and an identifier for each shaped trade. A package component is created based on the package ID
      and the list of identifiers for the shaped trades. That package component is then added onto the execution details of
      every shaped trade.'
    - 'Rosetta func: Create_PartialDeliveryPrimitiveInstruction — Creates the primitive instruction for partial delivery of
      a repo transaction at settlement.'
    - 'Rosetta func: Create_RepricePrimitiveInstruction — Creates the primitive instructions for a repricing that alters the
      cash amount of the trade. Transaction value and variation margin are processed separately as are transfers of cash and
      securities.'
    - 'Rosetta func: Create_AdjustmentPrimitiveInstruction — Creates the primitive instructions for a repricing that alters
      the collateral quantity and value of the trade. Transaction value and variation margin are processed separately as are
      transfers of cash and securities.'
    - 'Rosetta func: Create_SubstitutionPrimitiveInstruction — Creates the primitive instructions for a substitution of collateral
      by replacing the assetpayout of the trade.'
    - 'Rosetta func: NewTradeInstructionOnlyExists'
    - 'Rosetta func: Create_OnDemandInterestPaymentPrimitiveInstruction — An instruction to make a interium interest payment
      by adding a payout leg to the deal.'
    - 'Rosetta func: Create_TerminationInstruction — Creates the relevant primitive instruction for a termination, which consists
      in a quantity change to bring the quantity to zero.'
    - 'Rosetta func: Create_TradeState — Creates a single trade state by applying primitive instructions to an existing trade
      state (optional in case an execution instruction is included). The primitive instructions are applied in the following
      order: Always first: - execution, if it exists, otherwise a before state must be provided The following 3 can be executed
      in any order, because they touch separate components of the trade: - quantity change - terms change - party change Always
      last: - contract formation, otherwise the contract could be invalid.'
    annotations:
      rosetta_functions: '[{"name":"Create_Split","description":"Defines the logic for splitting a trade into separate copies.
        The split instruction contains a breakdown into N set of primitive instructions. Each set contains the primitive instructions
        to be applied to each post-split trade, eventually producing N trades. The split function underpins a number of business
        events such as clearing or allocation.","inputs":[{"name":"breakdown","type":"PrimitiveInstruction","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"splitTrade","type":"TradeState","cardinality":"1..*"}},{"name":"Create_RollPrimitiveInstruction","description":"Creates
        the primitive instructions for a trade roll. A trade roll consists in closing an existing trade and entering into
        a new one which has the same characteristics as the old one, except with an extended termination date and (possibly)
        a different price.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePrimitiveInstruction","description":"Creates
        a full primitive instruction for an on-demand rate change event. A rate change consists in closing the original trade
        and opening a new one with the same details as the original one, but with a new rate (price) and effective date. The
        business event logic checks that there is only 1 rate price in the original trade to be updated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"agreedRate","type":"number","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_CancellationPrimitiveInstruction","description":"Creates
        a primitive instruction for early cancellation.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newRepurchasePrice","type":"number","cardinality":"0..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_ShapingInstruction","description":"Creates
        a set of instructions to shape a trade based on shaped quantities and a package ID. The original trade is closed and
        split into (smaller) shaped trades based on a set of trade lots containing the shaped quantities and an identifier
        for each shaped trade. A package component is created based on the package ID and the list of identifiers for the
        shaped trades. That package component is then added onto the execution details of every shaped trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"tradeLots","type":"TradeLot","cardinality":"2..*"},{"name":"shapeIdentifier","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_PartialDeliveryPrimitiveInstruction","description":"Creates
        the primitive instruction for partial delivery of a repo transaction at settlement.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"deliveredPriceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_RepricePrimitiveInstruction","description":"Creates
        the primitive instructions for a repricing that alters the cash amount of the trade. Transaction value and variation
        margin are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newCashValue","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_AdjustmentPrimitiveInstruction","description":"Creates
        the primitive instructions for a repricing that alters the collateral quantity and value of the trade. Transaction
        value and variation margin are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newAssetQuantity","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionPrimitiveInstruction","description":"Creates
        the primitive instructions for a substitution of collateral by replacing the assetpayout of the trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"NewTradeInstructionOnlyExists","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"Create_OnDemandInterestPaymentPrimitiveInstruction","description":"An
        instruction to make a interium interest payment by adding a payout leg to the deal.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"interestAmount","type":"Money","cardinality":"1..1"},{"name":"settlementDate","type":"SettlementDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TerminationInstruction","description":"Creates
        the relevant primitive instruction for a termination, which consists in a quantity change to bring the quantity to
        zero.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TradeState","description":"Creates
        a single trade state by applying primitive instructions to an existing trade state (optional in case an execution
        instruction is included). The primitive instructions are applied in the following order: Always first: - execution,
        if it exists, otherwise a before state must be provided The following 3 can be executed in any order, because they
        touch separate components of the trade: - quantity change - terms change - party change Always last: - contract formation,
        otherwise the contract could be invalid.","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"0..1"},{"name":"before","type":"TradeState","cardinality":"0..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - contractFormation
    - execution
    - exercise
    - partyChange
    - quantityChange
    - reset
    - split
    - termsChange
    - transfer
    - indexTransition
    - stockSplit
    - observation
    - valuation
    in_subset:
    - cdm_event_common

  BusinessEvent:
    description: A business event represents a life cycle event of a trade. The combination of the state changes results in
      a qualifiable life cycle event. An example of a Business Event is a PartialTermination which is a defined by a quantity
      change primitive event.
    is_a: EventInstruction
    tree_root: true
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"Create_Return","description":"Defines the process of partially or fully returning a Security
        Lending Transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"returnInstruction","type":"ReturnInstruction","cardinality":"1..1"},{"name":"returnDate","type":"date","cardinality":"1..1"}],"output":{"name":"returnEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"Qualify_Substitution","description":"Qualification
        of a collateral substitution event.","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"is_event","type":"boolean","cardinality":"1..1"}},{"name":"Create_BusinessEvent","description":"Creates
        a business event from instructions containing primitive instructions and optionally a trade state.","inputs":[{"name":"instruction","type":"Instruction","cardinality":"1..*"},{"name":"intent","type":"EventIntentEnum","cardinality":"0..1"},{"name":"eventDate","type":"date","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"1..1"}],"output":{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"ExtractBeforeEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractOpenEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractBeforeTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractAfterTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}}]'
    close_mappings:
    - fpml_5_10:BusinessEvent
    - gist:Event
    rules:
    - description: EventDate
      postconditions:
        slot_conditions:
          eventDate:
            required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: EventDate — eventDate exists'
    - 'Rosetta func: Create_Return — Defines the process of partially or fully returning a Security Lending Transaction.'
    - 'Rosetta func: Qualify_Substitution — Qualification of a collateral substitution event.'
    - 'Rosetta func: Create_BusinessEvent — Creates a business event from instructions containing primitive instructions and
      optionally a trade state.'
    - 'Rosetta func: ExtractBeforeEconomicTerms'
    - 'Rosetta func: ExtractOpenEconomicTerms'
    - 'Rosetta func: ExtractBeforeTrade'
    - 'Rosetta func: ExtractAfterTrade'
    slots:
    - eventQualifier
    - after
    in_subset:
    - cdm_event_common

  CounterpartyPositionBusinessEvent:
    description: A business event represents a life cycle event of a position. The combination of the state changes results
      in a qualifiable life cycle event.
    slots:
    - intent
    - corporateActionIntent
    - eventDate
    - effectiveDate
    - packageInformation
    - after
    slot_usage:
      effectiveDate:
        description: The date on which the event contractually takes effect, when different from the event date.
      after:
        range: CounterpartyPositionState
        description: Specifies the after position state(s) created.
    in_subset:
    - cdm_event_common

  ObservationInstruction:
    description: Specifies inputs needed to process an observation.
    comments:
    - 'Rosetta func: Create_Observation — Function specification to create an observation that incorporates an observation
      event into the observation history of a given trade state.'
    annotations:
      rosetta_functions: '[{"name":"Create_Observation","description":"Function specification to create an observation that
        incorporates an observation event into the observation history of a given trade state.","inputs":[{"name":"instruction","type":"ObservationInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - observationEvent
    in_subset:
    - cdm_event_common

  ValuationInstruction:
    description: Specifies inputs needed to process a valuation.
    comments:
    - 'Rosetta func: Create_Valuation — Function specification to incorporate a new assessment of the valuation in the valuation
      history of a given trade state.'
    annotations:
      rosetta_functions: '[{"name":"Create_Valuation","description":"Function specification to incorporate a new assessment
        of the valuation in the valuation history of a given trade state.","inputs":[{"name":"instruction","type":"ValuationInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - valuation
    - replace
    slot_usage:
      valuation:
        range: Valuation
        description: Contains all information related to a valuation.
        required: true
        multivalued: true
    in_subset:
    - cdm_event_common

  ExecutionInstruction:
    description: Specifies instructions for execution of a transaction, consisting of a product, price, quantity, parties,
      trade identifier, execution details, and settlement terms.
    comments:
    - 'Rosetta func: Create_Execution — Specifies the function to compose an execution based on a minimum required set of
      inputs: product, quantity, parties, etc.'
    annotations:
      rosetta_functions: '[{"name":"Create_Execution","description":"Specifies the function to compose an execution based
        on a minimum required set of inputs: product, quantity, parties, etc.","inputs":[{"name":"instruction","type":"ExecutionInstruction","cardinality":"1..1"}],"output":{"name":"execution","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - product
    - priceQuantity
    - counterparty
    - ancillaryParty
    - parties
    - partyRoles
    - executionDetails
    - tradeDate
    - tradeTime
    - tradeIdentifier
    - collateral
    - lotIdentifier
    slot_usage:
      ancillaryParty:
        range: AncillaryParty
        description: Maps any ancillary parties, e.g. parties involved in the transaction that are not one of the two principal
          parties.
        multivalued: true
    in_subset:
    - cdm_event_common

  ExerciseInstruction:
    description: Specifies the information required to communicate the choices made by the exercising party, in a financial
      product endowing the party with at least one option.
    comments:
    - 'Rosetta func: Create_Exercise — Defines the process of putting into effect the rights specified in an options contract,
      such as to buy or sell a security.  Once exercised the option contract is terminated.'
    annotations:
      rosetta_functions: '[{"name":"Create_Exercise","description":"Defines the process of putting into effect the rights
        specified in an options contract, such as to buy or sell a security.  Once exercised the option contract is terminated.","inputs":[{"name":"exerciseInstruction","type":"ExerciseInstruction","cardinality":"1..1"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"exercise","type":"TradeState","cardinality":"1..*"}}]'
    slots:
    - exerciseQuantity
    - exerciseOption
    - exerciseDate
    - exerciseTime
    - replacementTradeIdentifier
    in_subset:
    - cdm_event_common

  ResetInstruction:
    description: 'Defines the information needed to create a Reset Business Event. '
    comments:
    - 'Rosetta func: Create_Reset — Defines how a Reset should be constructed.'
    annotations:
      rosetta_functions: '[{"name":"Create_Reset","description":"Defines how a Reset should be constructed.","inputs":[{"name":"instruction","type":"ResetInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"reset","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - payout
    - rateRecordDate
    - resetDate
    in_subset:
    - cdm_event_common

  CalculateTransferInstruction:
    description: Defines the tradeState or payout on which to create a Transfer along with all necessary resets.
    close_mappings:
    - fpml_5_10:CalculateTransferInstruction
    comments:
    - 'Rosetta func: CalculateTransfer — Function specification to calculate a transfer, e.g. following a reset on a contract'
    - 'Rosetta func: Create_CashTransfer — Defines how Transfer that represents an exchange of cash, should be constructed.'
    - 'Rosetta func: Create_AssetTransfer — Defines how Transfer that represents an exchange of asset based on an asset payout,
      should be constructed.'
    - 'Rosetta func: ResolveTransfer — Defines how to calculate the amount due to be transferred after a Reset Event.'
    annotations:
      rosetta_functions: '[{"name":"CalculateTransfer","description":"Function specification to calculate a transfer, e.g.
        following a reset on a contract","inputs":[{"name":"instruction","type":"CalculateTransferInstruction","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"0..*"}},{"name":"Create_CashTransfer","description":"Defines
        how Transfer that represents an exchange of cash, should be constructed.","inputs":[{"name":"instruction","type":"CalculateTransferInstruction","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}},{"name":"Create_AssetTransfer","description":"Defines
        how Transfer that represents an exchange of asset based on an asset payout, should be constructed.","inputs":[{"name":"instruction","type":"CalculateTransferInstruction","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveTransfer","description":"Defines
        how to calculate the amount due to be transferred after a Reset Event.","inputs":[{"name":"instruction","type":"CalculateTransferInstruction","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}}]'
    slots:
    - tradeState
    - payout
    - resets
    - payerReceiver
    - quantity
    - date
    slot_usage:
      payout:
        multivalued: false
      date:
        required: false
        multivalued: false
    in_subset:
    - cdm_event_common

  TransferInstruction:
    description: Defines the payout on which to create a Transfer along with all necessary resets.
    comments:
    - 'Rosetta func: Create_Transfer — Defines how a transfer should be constructed, when representing the exchange of cash
      between parties.'
    annotations:
      rosetta_functions: '[{"name":"Create_Transfer","description":"Defines how a transfer should be constructed, when representing
        the exchange of cash between parties.","inputs":[{"name":"instruction","type":"TransferInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"transfer","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - transferState
    in_subset:
    - cdm_event_common

  QuantityChangeInstruction:
    description: Instructions required to create a Quantity Change Primitive Event, which can be either an increase, a decrease
      or a replacement. An increase adds a new trade lot to the original trade, whereas a decrease subtracts from an existing
      trade lot's quantity. A replacement updates the quantity of an existing trade lot to the new value.
    comments:
    - 'Rosetta func: Create_QuantityChange — A specification of the inputs, outputs and constraints when calculating the after
      state of a Quantity Change Primitive Event'
    - 'Rosetta func: Create_OnDemandRateChangePriceChangeInstruction — Creates a price change instruction for an on-demand
      rate change, based on a new rate provided as a single number by matching it to a single rate price.'
    annotations:
      rosetta_functions: '[{"name":"Create_QuantityChange","description":"A specification of the inputs, outputs and constraints
        when calculating the after state of a Quantity Change Primitive Event","inputs":[{"name":"instruction","type":"QuantityChangeInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"quantityChange","type":"TradeState","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePriceChangeInstruction","description":"Creates
        a price change instruction for an on-demand rate change, based on a new rate provided as a single number by matching
        it to a single rate price.","inputs":[{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"},{"name":"newRate","type":"number","cardinality":"1..1"}],"output":{"name":"quantityChangeInstruction","type":"QuantityChangeInstruction","cardinality":"1..1"}}]'
    slots:
    - change
    - direction
    - lotIdentifier
    slot_usage:
      lotIdentifier:
        description: Identifier for the new lot (in case of increase) or for the existing lot to be changed(in case of decrease
          or replacement). This optional attribute is mandatory in case of a decrease or replacement if the initial trade
          state contains multiple trade lots.
        multivalued: true
    in_subset:
    - cdm_event_common

  IndexTransitionInstruction:
    description: Defines the information needed to create a Index Transition Business Event.
    comments:
    - 'Rosetta condition: PriceQuantity — priceQuantity -> price -> priceType contains PriceTypeEnum -> InterestRate and priceQuantity
      -> observable -> Index -> InterestRateIndex exists and priceQuantity -> quantity is absent'
    - 'Rosetta func: Create_IndexTransitionTermsChange — Function specification to create a terms change that contains changes
      to the floating rate indexes and adds an adjustment spread to any existing spread.'
    annotations:
      rosetta_functions: '[{"name":"Create_IndexTransitionTermsChange","description":"Function specification to create a terms
        change that contains changes to the floating rate indexes and adds an adjustment spread to any existing spread.","inputs":[{"name":"instruction","type":"IndexTransitionInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"termsChange","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - priceQuantity
    - effectiveDate
    - cashTransfer
    slot_usage:
      priceQuantity:
        description: 'Specifies both new floating rate index and spread adjustment for each leg to be updated.  The spread
          adjustment accounts for the difference between the old floating rate index relative to the new one. This spread
          amount is added to the existing spread to determine the new spread, which is applied from the specified effective
          date forward. In the case of the IBOR Fallback Rate Adjustments, the adjustment spread (also known as the Fallback
          Adjustment) accounts for two distinctions: i) the fact that the replacement Risk-Free Rate is an overnight rate
          while IBORs have term structures (e.g., 1, 3, 6-month LIBOR); and (ii) the historical spread differential between
          IBORs and their term equivalent Overnight Risk-Free Rate compounded rates.'
      effectiveDate:
        description: Specifies the effective date of the index transition event. This is first date on which the floating
          rate calculation will use the new floating rate index and adjusted spread in the floating rate calculation.
        required: true
    in_subset:
    - cdm_event_common

  TermsChangeInstruction:
    description: Specifies instructions for terms change consisting of the new transaction terms, and the renegotiation fee.
    rules:
    - description: AtLeastOneOf
      postconditions:
        any_of:
        - slot_conditions:
            product:
              required: true
        - slot_conditions:
            ancillaryParty:
              required: true
        - slot_conditions:
            adjustment:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AtLeastOneOf — (product exists or ancillaryParty exists or adjustment exists)'
    - 'Rosetta func: Create_TermsChange — A specification of the inputs, outputs and constraints when calculating the after
      tradeState based Terms Change Primitive Instruction.'
    - 'Rosetta func: Create_EffectiveOrTerminationDateTermChangeInstruction — Creates the relevant terms change primitive
      instruction object for rolling a contractual product, which consists in the same terms as the original contractual product
      but with different effective and termination dates.'
    - 'Rosetta func: Create_RollTermChangeInstruction — Creates the relevant terms change primitive instruction object for
      rolling a contractual product, which consists in the same terms as the original contractual product but with different
      effective and termination dates.'
    - 'Rosetta func: Create_OnDemandRateChangeTermsChangeInstruction — Creates a terms change instruction for an on-demand
      rate change, based on a new rate provided as a single number. This instruction only updates the effective date but keeps
      other details of the trade unchanged.'
    - 'Rosetta func: Create_CancellationTermChangeInstruction — Create a terms change instruction for a cancellation that
      consists in bringing the termination date forward.'
    - 'Rosetta func: Create_SubstitutionInstruction — Creates the terms change instruction that updates the payout with the
      new substitution payout.'
    annotations:
      rosetta_functions: '[{"name":"Create_TermsChange","description":"A specification of the inputs, outputs and constraints
        when calculating the after tradeState based Terms Change Primitive Instruction.","inputs":[{"name":"termsChange","type":"TermsChangeInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"tradeState","type":"TradeState","cardinality":"1..1"}},{"name":"Create_EffectiveOrTerminationDateTermChangeInstruction","description":"Creates
        the relevant terms change primitive instruction object for rolling a contractual product, which consists in the same
        terms as the original contractual product but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_RollTermChangeInstruction","description":"Creates
        the relevant terms change primitive instruction object for rolling a contractual product, which consists in the same
        terms as the original contractual product but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangeTermsChangeInstruction","description":"Creates
        a terms change instruction for an on-demand rate change, based on a new rate provided as a single number. This instruction
        only updates the effective date but keeps other details of the trade unchanged.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_CancellationTermChangeInstruction","description":"Create
        a terms change instruction for a cancellation that consists in bringing the termination date forward.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionInstruction","description":"Creates
        the terms change instruction that updates the payout with the new substitution payout.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}}]'
    slots:
    - product
    - ancillaryParty
    - adjustment
    slot_usage:
      product:
        description: product to be changed
        required: false
      ancillaryParty:
        range: AncillaryParty
        description: ancillary party to be changed
        multivalued: true
    in_subset:
    - cdm_event_common

  SplitInstruction:
    description: Specifies instructions for a split, consisting of a breakdown of instructions to be applied to each branch
      of the split. This instruction can be used to duplicate a trade, as in a clearing scenario, or to split a trade into
      smaller quantities (in which case each breakdown instruction needs to include a quantity change), as in an allocation.
    slots:
    - breakdown
    in_subset:
    - cdm_event_common

  PartyChangeInstruction:
    description: 'Specifies instruction to change the party on a trade. This primitive instruction is used in a number of
      scenarios including: clearing, allocation and novation. The instrution must include a trade identifier, because a change
      of party effectively results in a different trade.'
    slots:
    - counterparty
    - ancillaryParty
    - partyRole
    - tradeId
    slot_usage:
      counterparty:
        description: The new counterparty who is stepping into the trade. The stepping out counterparty is inferred based
          on the counterparty role that is being updated.
        multivalued: false
      ancillaryParty:
        range: AncillaryParty
        description: Specifies an ancillary party to be added onto the new transaction, e.g. the original executing party
          in an allocation.
    in_subset:
    - cdm_event_common

  TradeState:
    description: Defines the fundamental financial information that can be changed by a Primitive Event and by extension any
      business or life-cycle event. Each TradeState specifies where a Trade is in its life-cycle. TradeState is a root type
      and as such, can be created independently to any other CDM data type, but can also be used as part of the CDM Event
      Model.
    tree_root: true
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"QuantityIncreased","inputs":[{"name":"before","type":"TradeState","cardinality":"1..1"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"QuantityDecreased","inputs":[{"name":"before","type":"TradeState","cardinality":"1..1"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"QuantityDecreasedToZero","inputs":[{"name":"before","type":"TradeState","cardinality":"0..*"},{"name":"after","type":"TradeState","cardinality":"0..*"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"CompareTradeStatesToAmount","description":"For
        each TradeState, compare the Quantity amounts in each TradeState to the given amount (regardless of unit of amount),
        based on the CompareOp enum.","inputs":[{"name":"tradeStates","type":"TradeState","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"amount","type":"number","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"InterestCashSettlementAmount","description":"Defines
        the performance calculations relevant for a fixed or floating rate payout.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"payout","type":"Payout","cardinality":"1..1"},{"name":"resets","type":"Reset","cardinality":"1..*"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"interestCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveReset","description":"Defines
        the interface for adopters to resolve a reset, given a trade state and a date.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"},"code_implementation":true},{"name":"EquityCashSettlementAmount","description":"Represents
        Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 72. ''Equity Cash Settlement
        Amount'' means, in respect of an Equity Cash Settlement Date, an amount in the Settlement Currency determined by the
