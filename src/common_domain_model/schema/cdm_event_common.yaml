    how a transfer should be constructed, when representing the exchange of cash between parties.","inputs":[{"name":"instruction","type":"TransferInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"transfer","type":"TradeState","cardinality":"1..1"}},{"name":"Create_CashTransfer","description":"Defines
