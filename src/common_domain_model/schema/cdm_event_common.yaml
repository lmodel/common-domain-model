    how Transfer that represents an exchange of asset based on an asset payout, should be constructed.","inputs":[{"name":"instruction","type":"CalculateTransferInstruction","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveTransfer","description":"Defines
