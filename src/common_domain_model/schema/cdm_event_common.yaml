        specification to create a terms change that contains changes to the floating rate indexes and adds an adjustment spread
        to any existing spread.","inputs":[{"name":"instruction","type":"IndexTransitionInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"termsChange","type":"TradeState","cardinality":"1..1"}},{"name":"Create_Observation","description":"Function
        specification to create an observation that incorporates an observation event into the observation history of a given
        trade state.","inputs":[{"name":"instruction","type":"ObservationInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}},{"name":"Create_Valuation","description":"Function
        specification to incorporate a new assessment of the valuation in the valuation history of a given trade state.","inputs":[{"name":"instruction","type":"ValuationInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}},{"name":"UpdateSpreadAdjustmentAndRateOptions","description":"For
        each of the trade state''s price quantity, find a matching price quantity instruction, and call the update function.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"instructions","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"updatedTradeState","type":"TradeState","cardinality":"1..1"}},{"name":"ResolveSecurityFinanceBillingAmount","description":"Calculates
        the billing amount for a Security Finance transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"reset","type":"Reset","cardinality":"1..1"},{"name":"recordStartDate","type":"date","cardinality":"1..1"},{"name":"recordEndDate","type":"date","cardinality":"1..1"},{"name":"transferDate","type":"date","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}},{"name":"Create_Return","description":"Defines
        the process of partially or fully returning a Security Lending Transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"returnInstruction","type":"ReturnInstruction","cardinality":"1..1"},{"name":"returnDate","type":"date","cardinality":"1..1"}],"output":{"name":"returnEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"ResolveRepurchaseTransferInstruction","description":"Resolves
        an instruction for settlement of a Repurchase Event","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"repurchaseDate","type":"date","cardinality":"1..1"}],"output":{"name":"repurchaseInstruction","type":"EventInstruction","cardinality":"1..1"}},{"name":"Create_RollPrimitiveInstruction","description":"Creates
        the primitive instructions for a trade roll. A trade roll consists in closing an existing trade and entering into
        a new one which has the same characteristics as the old one, except with an extended termination date and (possibly)
        a different price.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePrimitiveInstruction","description":"Creates
        a full primitive instruction for an on-demand rate change event. A rate change consists in closing the original trade
        and opening a new one with the same details as the original one, but with a new rate (price) and effective date. The
        business event logic checks that there is only 1 rate price in the original trade to be updated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"agreedRate","type":"number","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_CancellationPrimitiveInstruction","description":"Creates
        a primitive instruction for early cancellation.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newRepurchasePrice","type":"number","cardinality":"0..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_PairOffInstruction","description":"Creates
        a set of instructions to pair-off a set of trades based on a pair reference. A package component is created based
        on that pair reference and the list of identifiers for the underlying trades. That package component is then added
        onto the execution details of every underlying trade. The existing trades are not terminated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"2..*"},{"name":"pairReference","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"Instruction","cardinality":"1..*"}},{"name":"Create_ShapingInstruction","description":"Creates
        a set of instructions to shape a trade based on shaped quantities and a package ID. The original trade is closed and
        split into (smaller) shaped trades based on a set of trade lots containing the shaped quantities and an identifier
        for each shaped trade. A package component is created based on the package ID and the list of identifiers for the
        shaped trades. That package component is then added onto the execution details of every shaped trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"tradeLots","type":"TradeLot","cardinality":"2..*"},{"name":"shapeIdentifier","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_PartialDeliveryPrimitiveInstruction","description":"Creates
        the primitive instruction for partial delivery of a repo transaction at settlement.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"deliveredPriceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_RepricePrimitiveInstruction","description":"Creates
        the primitive instructions for a repricing that alters the cash amount of the trade. Transaction value and variation
        margin are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newCashValue","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_AdjustmentPrimitiveInstruction","description":"Creates
        the primitive instructions for a repricing that alters the collateral quantity and value of the trade. Transaction
        value and variation margin are processed separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newAssetQuantity","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionPrimitiveInstruction","description":"Creates
        the primitive instructions for a substitution of collateral by replacing the assetpayout of the trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandInterestPaymentPrimitiveInstruction","description":"An
        instruction to make a interium interest payment by adding a payout leg to the deal.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"interestAmount","type":"Money","cardinality":"1..1"},{"name":"settlementDate","type":"SettlementDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TerminationInstruction","description":"Creates
        the relevant primitive instruction for a termination, which consists in a quantity change to bring the quantity to
        zero.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TradeState","description":"Creates
        a single trade state by applying primitive instructions to an existing trade state (optional in case an execution
        instruction is included). The primitive instructions are applied in the following order: Always first: - execution,
        if it exists, otherwise a before state must be provided The following 3 can be executed in any order, because they
        touch separate components of the trade: - quantity change - terms change - party change Always last: - contract formation,
        otherwise the contract could be invalid.","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"0..1"},{"name":"before","type":"TradeState","cardinality":"0..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}},{"name":"Create_ExposureFromTrades","description":"Builds
        an Exposure structure from a list of trades.","inputs":[{"name":"trades","type":"TradeState","cardinality":"0..*"}],"output":{"name":"exposure","type":"Exposure","cardinality":"0..1"}},{"name":"PayoutObligationFulfillmentFromTrade","description":"Determines
        the payouts and collateral payouts in a trade and whether the obligations have been fulfilled for each of them.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"0..1"}],"output":{"name":"result","type":"boolean","cardinality":"0..1"}}]'
    related_mappings:
    - gist:Transaction
    comments:
    - 'Rosetta func: QuantityIncreased'
    - 'Rosetta func: QuantityDecreased'
    - 'Rosetta func: QuantityDecreasedToZero'
    - 'Rosetta func: CompareTradeStatesToAmount — For each TradeState, compare the Quantity amounts in each TradeState to
      the given amount (regardless of unit of amount), based on the CompareOp enum.'
    - 'Rosetta func: InterestCashSettlementAmount — Defines the performance calculations relevant for a fixed or floating
      rate payout.'
    - 'Rosetta func: ResolveReset — Defines the interface for adopters to resolve a reset, given a trade state and a date.'
    - 'Rosetta func: EquityCashSettlementAmount — Represents Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for
      Security Equity Swap, Para 72. ''Equity Cash Settlement Amount'' means, in respect of an Equity Cash Settlement Date,
      an amount in the Settlement Currency determined by the Calculation Agent as of the Equity Valuation Date to which the
      Equity Cash Settlement Amount relates, pursuant to the following formula: Equity Cash Settlement Amount = ABS(Rate Of
      Return) * Equity Notional Amount.'
    - 'Rosetta func: Create_StockSplit — Function specification to create the fully-formed business event which represents
      the impact of a stock split (or a reverse stock split) on an Equity Derivatives contract on a certain date.'
    - 'Rosetta func: Create_Execution — Specifies the function to compose an execution based on a minimum required set of
      inputs: product, quantity, parties, etc.'
    - 'Rosetta func: Create_ContractFormation — Function specification that represents an executed trade for a contractual
      product that has been affirmed (or confirmed) by the two parties. The formed contract can reference a legal agreement
      for instance a master agreement, by using the optional legalAgreement input.'
    - 'Rosetta func: Create_Exercise — Defines the process of putting into effect the rights specified in an options contract,
      such as to buy or sell a security.  Once exercised the option contract is terminated.'
    - 'Rosetta func: Create_Reset — Defines how a Reset should be constructed.'
    - 'Rosetta func: Create_Transfer — Defines how a transfer should be constructed, when representing the exchange of cash
      between parties.'
    - 'Rosetta func: ResolveCashSettlementDate — A product agnostic function that resolves the settlement date of the payout
      for the period in question'
    - 'Rosetta func: SecurityFinanceCashSettlementAmount'
    - 'Rosetta func: Create_Split — Defines the logic for splitting a trade into separate copies. The split instruction contains
      a breakdown into N set of primitive instructions. Each set contains the primitive instructions to be applied to each
      post-split trade, eventually producing N trades. The split function underpins a number of business events such as clearing
      or allocation.'
    - 'Rosetta func: Create_PartyChange — Defines the logic for changing one of the counterparties on a trade. A new trade
      identifier must be specified as a change of party results in a new trade. An ancillary party can also be specified,
      for instance to refer to the original executing party on the new trade.'
    - 'Rosetta func: Create_QuantityChange — A specification of the inputs, outputs and constraints when calculating the after
      state of a Quantity Change Primitive Event'
    - 'Rosetta func: Create_TermsChange — A specification of the inputs, outputs and constraints when calculating the after
      tradeState based Terms Change Primitive Instruction.'
    - 'Rosetta func: FilterOpenTradeStates — Filter to only ''open'' TradeState - where both the closedState and positionState
      are not set.'
    - 'Rosetta func: FilterClosedTradeStates — Filter to only ''closed'' TradeState - where either the closedState or positionState
      are set.'
    - 'Rosetta func: Create_IndexTransitionTermsChange — Function specification to create a terms change that contains changes
      to the floating rate indexes and adds an adjustment spread to any existing spread.'
    - 'Rosetta func: Create_Observation — Function specification to create an observation that incorporates an observation
      event into the observation history of a given trade state.'
    - 'Rosetta func: Create_Valuation — Function specification to incorporate a new assessment of the valuation in the valuation
      history of a given trade state.'
    - 'Rosetta func: UpdateSpreadAdjustmentAndRateOptions — For each of the trade state''s price quantity, find a matching
      price quantity instruction, and call the update function.'
    - 'Rosetta func: ResolveSecurityFinanceBillingAmount — Calculates the billing amount for a Security Finance transaction.'
    - 'Rosetta func: Create_Return — Defines the process of partially or fully returning a Security Lending Transaction.'
    - 'Rosetta func: ResolveRepurchaseTransferInstruction — Resolves an instruction for settlement of a Repurchase Event'
    - 'Rosetta func: Create_RollPrimitiveInstruction — Creates the primitive instructions for a trade roll. A trade roll consists
      in closing an existing trade and entering into a new one which has the same characteristics as the old one, except with
      an extended termination date and (possibly) a different price.'
    - 'Rosetta func: Create_OnDemandRateChangePrimitiveInstruction — Creates a full primitive instruction for an on-demand
      rate change event. A rate change consists in closing the original trade and opening a new one with the same details
      as the original one, but with a new rate (price) and effective date. The business event logic checks that there is only
      1 rate price in the original trade to be updated.'
    - 'Rosetta func: Create_CancellationPrimitiveInstruction — Creates a primitive instruction for early cancellation.'
    - 'Rosetta func: Create_PairOffInstruction — Creates a set of instructions to pair-off a set of trades based on a pair
      reference. A package component is created based on that pair reference and the list of identifiers for the underlying
      trades. That package component is then added onto the execution details of every underlying trade. The existing trades
      are not terminated.'
    - 'Rosetta func: Create_ShapingInstruction — Creates a set of instructions to shape a trade based on shaped quantities
      and a package ID. The original trade is closed and split into (smaller) shaped trades based on a set of trade lots containing
      the shaped quantities and an identifier for each shaped trade. A package component is created based on the package ID
      and the list of identifiers for the shaped trades. That package component is then added onto the execution details of
      every shaped trade.'
    - 'Rosetta func: Create_PartialDeliveryPrimitiveInstruction — Creates the primitive instruction for partial delivery of
      a repo transaction at settlement.'
    - 'Rosetta func: Create_RepricePrimitiveInstruction — Creates the primitive instructions for a repricing that alters the
      cash amount of the trade. Transaction value and variation margin are processed separately as are transfers of cash and
      securities.'
    - 'Rosetta func: Create_AdjustmentPrimitiveInstruction — Creates the primitive instructions for a repricing that alters
      the collateral quantity and value of the trade. Transaction value and variation margin are processed separately as are
      transfers of cash and securities.'
    - 'Rosetta func: Create_SubstitutionPrimitiveInstruction — Creates the primitive instructions for a substitution of collateral
      by replacing the assetpayout of the trade.'
    - 'Rosetta func: Create_OnDemandInterestPaymentPrimitiveInstruction — An instruction to make a interium interest payment
      by adding a payout leg to the deal.'
    - 'Rosetta func: Create_TerminationInstruction — Creates the relevant primitive instruction for a termination, which consists
      in a quantity change to bring the quantity to zero.'
    - 'Rosetta func: Create_TradeState — Creates a single trade state by applying primitive instructions to an existing trade
      state (optional in case an execution instruction is included). The primitive instructions are applied in the following
      order: Always first: - execution, if it exists, otherwise a before state must be provided The following 3 can be executed
      in any order, because they touch separate components of the trade: - quantity change - terms change - party change Always
      last: - contract formation, otherwise the contract could be invalid.'
    - 'Rosetta func: Create_ExposureFromTrades — Builds an Exposure structure from a list of trades.'
    - 'Rosetta func: PayoutObligationFulfillmentFromTrade — Determines the payouts and collateral payouts in a trade and whether
      the obligations have been fulfilled for each of them.'
    slots:
    - trade
    - state
    - resetHistory
    - transferHistory
    - observationHistory
    - valuationHistory
    slot_usage:
      state:
        range: State
        description: Represents the State of the Trade through its life-cycle.
    in_subset:
    - cdm_event_common

  CounterpartyPositionState:
    description: Defines the fundamental financial information that can be changed by a Primitive Event and by extension any
      business or life-cycle event. Each PositionState specifies where a Position is in its life-cycle. PositionState is a
      root type and as such, can be created independently to any other CDM data type, but can also be used as part of the
      CDM Event Model.
    tree_root: true
    annotations:
      metadata_key: true
    slots:
    - counterpartyPosition
    - state
    - observationHistory
    - valuationHistory
    slot_usage:
      state:
        range: State
        description: Represents the State of the Position through its life-cycle.
    in_subset:
    - cdm_event_common

  ObservationEvent:
    description: Specifies the necessary information to create any observation event.
    slots:
    - creditEvent
    - corporateAction
    in_subset:
    - cdm_event_common

  Reset:
    description: Defines the reset value or fixing value produced in cashflow calculations, during the life-cycle of a financial
      instrument. The reset process defined in Create_Reset function joins product definition details with observations to
      compute the reset value.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"ResolveInterestRateReset","description":"Defines how to resolve the reset value for an
        InterestRatePayout.","inputs":[{"name":"payouts","type":"InterestRatePayout","cardinality":"1..*"},{"name":"observation","type":"Observation","cardinality":"1..1"},{"name":"resetDate","type":"date","cardinality":"1..1"},{"name":"rateRecordDate","type":"date","cardinality":"0..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"InterestCashSettlementAmount","description":"Defines
        the performance calculations relevant for a fixed or floating rate payout.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"payout","type":"Payout","cardinality":"1..1"},{"name":"resets","type":"Reset","cardinality":"1..*"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"interestCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveReset","description":"Defines
        the interface for adopters to resolve a reset, given a trade state and a date.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"},"code_implementation":true},{"name":"ResolvePerformanceReset","description":"Defines
        how to resolve the reset value for a performance payout.","inputs":[{"name":"performancePayout","type":"PerformancePayout","cardinality":"1..1"},{"name":"observation","type":"Observation","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"ResolveSecurityFinanceBillingAmount","description":"Calculates
        the billing amount for a Security Finance transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"reset","type":"Reset","cardinality":"1..1"},{"name":"recordStartDate","type":"date","cardinality":"1..1"},{"name":"recordEndDate","type":"date","cardinality":"1..1"},{"name":"transferDate","type":"date","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}}]'
    comments:
    - 'Rosetta condition: AveragingMethodologyExists — if observations count > 1 then averagingMethodology exists'
    - 'Rosetta func: ResolveInterestRateReset — Defines how to resolve the reset value for an InterestRatePayout.'
    - 'Rosetta func: InterestCashSettlementAmount — Defines the performance calculations relevant for a fixed or floating
      rate payout.'
    - 'Rosetta func: ResolveReset — Defines the interface for adopters to resolve a reset, given a trade state and a date.'
    - 'Rosetta func: ResolvePerformanceReset — Defines how to resolve the reset value for a performance payout.'
    - 'Rosetta func: ResolveSecurityFinanceBillingAmount — Calculates the billing amount for a Security Finance transaction.'
    slots:
    - resetValue
    - resetDate
    - rateRecordDate
    - observations
    - averagingMethodology
    slot_usage:
      resetDate:
        description: Specifies the date on which the reset occurred.
    in_subset:
    - cdm_event_common

  State:
    description: Defines the state of a trade at a point in the Trade's life cycle. Trades have many state dimensions, all
      of which are represented here. For example, states useful for position keeping are represented alongside those needed
      for regulatory reporting.
    rules:
    - description: When the position state is identified as closed, the closed state must also be specified.
      preconditions:
        slot_conditions:
          positionState:
            equals_string: Closed
      postconditions:
        slot_conditions:
          closedState:
            required: true
    comments:
    - 'Rosetta condition: ClosedStateExists — if positionState = PositionStatusEnum -> Closed then closedState exists'
    slots:
    - closedState
    - positionState
    in_subset:
    - cdm_event_common

  TransferState:
    description: Defines the fundamental financial information associated with a Transfer event. Each TransferState specifies
      where a Transfer is in its life-cycle. TransferState is a root type and as such, can be created independently to any
      other CDM data type, but can also be used as part of the CDM Event Model.
    tree_root: true
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"EmptyTransferHistory","output":{"name":"emptyTransferHistory","type":"TransferState","cardinality":"0..*"},"code_implementation":true},{"name":"AssetPayoutObligationsFulfilled","description":"Determines
        whether the obligations defined by the AssetPayout have been fulfilled by checking that the quantity of shares required
        have been successfully transferred.","inputs":[{"name":"assetPayout","type":"AssetPayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}},{"name":"InterestPayoutObligationsFulfilled","description":"Determines
        whether the obligations defined by the InterestRatePayout have been fulfilled by checking that the total value of
        cash required has been successfully transferred.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}}]'
    comments:
    - 'Rosetta func: EmptyTransferHistory'
    - 'Rosetta func: AssetPayoutObligationsFulfilled — Determines whether the obligations defined by the AssetPayout have
      been fulfilled by checking that the quantity of shares required have been successfully transferred.'
    - 'Rosetta func: InterestPayoutObligationsFulfilled — Determines whether the obligations defined by the InterestRatePayout
      have been fulfilled by checking that the total value of cash required has been successfully transferred.'
    slots:
    - transfer
    - transferStatus
    slot_usage:
      transfer:
        range: Transfer
        description: Represents the Transfer that has been effected by a business or life-cycle event.
        required: true
    in_subset:
    - cdm_event_common

  UnscheduledTransfer:
    description: An ad-hoc transfer instigated by a party to the contract.
    is_a: TransferBase
    slots:
    - transferType
    in_subset:
    - cdm_event_common

  ScheduledTransfer:
    description: A scheduled transfer built into the contract.
    is_a: TransferBase
    rules:
    - description: When transfer type is Performance or Transfer then the type of event must be specified.
      preconditions:
        slot_conditions:
          transferType:
            equals_string: CorporateAction
      postconditions:
        slot_conditions:
          corporateActionTransferType:
            required: true
    comments:
    - 'Rosetta condition: CorporateActionTransferTypeExists — if transferType = ScheduledTransferEnum -> CorporateAction then
      corporateActionTransferType exists'
    slots:
    - transferType
    - corporateActionTransferType
    - payoutReference
    slot_usage:
      transferType:
        range: ScheduledTransferEnum
        description: Specifies the type of scheduled transfer.
        required: true
    in_subset:
    - cdm_event_common

  TransferBase:
    description: Defines the movement of an Asset (eg cash, securities or commodities) between two parties on a date.
    is_a: AssetFlowBase
    slots:
    - identifier
    - payerReceiver
    slot_usage:
      identifier:
        range: Identifier
        inlined_as_list: true
        description: Represents a unique reference to the transfer.
        required: false
      payerReceiver:
        range: PartyReferencePayerReceiver
        description: Represents the parties to the transfer and their role.
        required: true
    in_subset:
    - cdm_event_common

  TradeIdentifier:
    description: Defines a trade identifier as a special case of the generic identifier type, that also includes the trade
      identifier class.
    is_a: Identifier
    comments:
    - 'Rosetta func: Create_PartyChange — Defines the logic for changing one of the counterparties on a trade. A new trade
      identifier must be specified as a change of party results in a new trade. An ancillary party can also be specified,
      for instance to refer to the original executing party on the new trade.'
    annotations:
      rosetta_functions: '[{"name":"Create_PartyChange","description":"Defines the logic for changing one of the counterparties
        on a trade. A new trade identifier must be specified as a change of party results in a new trade. An ancillary party
        can also be specified, for instance to refer to the original executing party on the new trade.","inputs":[{"name":"counterparty","type":"Counterparty","cardinality":"1..1"},{"name":"ancillaryParty","type":"AncillaryParty","cardinality":"0..1"},{"name":"partyRole","type":"PartyRole","cardinality":"0..1"},{"name":"tradeId","type":"TradeIdentifier","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"newTrade","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - identifierType
    slot_usage:
      identifierType:
        range: TradeIdentifierTypeEnum
        description: The enumerated classification of the identifier. Optional as a trade identifier may be party-specific,
          in which case it may not correspond to any established classification.
        required: false
    in_subset:
    - cdm_event_common

  PositionIdentifier:
    description: Defines a position identifier as a special case of the generic identifier type, that also includes the position
      identifier class.
    is_a: Identifier
    slots:
    - identifierType
    slot_usage:
      identifierType:
        range: TradeIdentifierTypeEnum
        description: The enumerated classification of the identifier. Optional as a position identifier may be party-specific,
          in which case it may not correspond to any established classification.
        required: false
    in_subset:
    - cdm_event_common

  Valuation:
    description: Defines the value of an investment, asset, or security
    rules:
    - description: 'The below condition ensures one and only one of the two attributes: ''Valuation Method'' or ''Valuation
        Source'' is allowed. Valuation of a trade or a portfolio is either internally calculated (via M2Market or M2Model
        methods) or supplied from an external source (e.g Central Counterparty''s Valuation). Valuation cannot be based upon
        internal calculations and external source at the same time.'
      postconditions:
        exactly_one_of:
        - slot_conditions:
            method:
              required: true
        - slot_conditions:
            source:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: ValuationType — required choice method, source'
    slots:
    - amount
    - timestamp
    - method
    - source
    - scope
    - delta
    - valuationTiming
    - priceComponent
    slot_usage:
      source:
        range: ValuationSourceEnum
        description: Source of the valuation of the transaction by the valuation party.
        required: false
    in_subset:
    - cdm_event_common

  Trade:
    description: Defines the output of a financial transaction between parties - a Business Event. A Trade impacts the financial
      position (i.e. the balance sheet) of involved parties.
    is_a: TradableProduct
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"EquityPerformance","description":"Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation
        for Security Equity Swap, Para 75. ''Equity Performance'' means, in respect of an Equity Cash Settlement Date, an
        amount in the Settlement Currency determined by the Calculation Agent as of the Equity Valuation Date to which the
        Equity Cash Settlement Amount relates, pursuant to the following formula: Equity Performance = (Rate Of Return)  Equity
        Notional Amount.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"},{"name":"observation","type":"Price","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"equityPerformance","type":"number","cardinality":"1..1"}},{"name":"TradeNoExecutionDetails","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"newTrade","type":"Trade","cardinality":"1..1"}},{"name":"ExtractBeforeTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractAfterTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}}]'
    close_mappings:
    - gist:Transaction
    rules:
    - description: If the cleared date exists, it needs to be on or after the trade date.
      preconditions:
        slot_conditions:
          clearedDate:
            required: true
      comments:
      - 'Rosetta comparison: clearedDate >= tradeDate'
    comments:
    - 'Rosetta condition: SettlementPayout — if SettlementPayoutOnlyExists(product -> economicTerms -> payout) then partyRole
      -> role contains PartyRoleEnum -> Buyer and partyRole -> role contains PartyRoleEnum -> Seller and tradeLot -> priceQuantity
      -> price exists'
    - 'Rosetta condition: PackageTrade — if executionDetails -> packageReference exists then executionDetails -> packageReference
      -> componentId -> assignedIdentifier contains tradeIdentifier -> assignedIdentifier'
    - 'Rosetta condition: DeliverableObligationsPhysicalSettlementMatrix — if (contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualMatrix -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix
      or contractDetails -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix -> matrixType
      is absent) and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms
      -> deliverableObligations exists then (product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms
      -> physicalSettlementTerms -> deliverableObligations -> notSubordinated exists and product -> economicTerms -> payout
      -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations -> specifiedCurrency
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms ->
      deliverableObligations -> notSovereignLender exists and product -> economicTerms -> payout -> CreditDefaultPayout ->
      settlementTerms -> physicalSettlementTerms -> deliverableObligations -> notDomesticCurrency exists and product -> economicTerms
      -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations -> notDomesticLaw
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms ->
      deliverableObligations -> notContingent exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms
      -> physicalSettlementTerms -> deliverableObligations -> notDomesticIssuance exists and product -> economicTerms -> payout
      -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations -> assignableLoan exists
      and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations
      -> consentRequiredLoan exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms
      -> deliverableObligations -> transferable exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms
      -> physicalSettlementTerms -> deliverableObligations -> maximumMaturity exists and product -> economicTerms -> payout
      -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations -> notBearer exists)
      and (product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations
      -> fullFaithAndCreditObLiability exists or product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms
      -> physicalSettlementTerms -> deliverableObligations -> generalFundObligationLiability exists or product -> economicTerms
      -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations -> revenueObligationLiability
      exists)'
    - 'Rosetta condition: ObligationsPhysicalSettlementMatrix — if (contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualMatrix -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix
      or contractDetails -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix -> matrixType
      is absent) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations exists then
      (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> notSubordinated exists
      and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> notSovereignLender
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> notDomesticLaw
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> notDomesticIssuance
      exists) and (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> fullFaithAndCreditObLiability
      exists or product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> generalFundObligationLiability
      exists or product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> revenueObligationLiability
      exists)'
    - 'Rosetta condition: CreditEventsPhysicalSettlementMatrix — if (contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualMatrix -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix
      or contractDetails -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix -> matrixType
      is absent) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents exists then
      (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> bankruptcy exists and
      product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> obligationDefault exists
      and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> obligationAcceleration
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> repudiationMoratorium
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> governmentalIntervention
      exists)'
    - 'Rosetta condition: RestructuringPhysicalSettlementMatrix — if (contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualMatrix -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix
      or contractDetails -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix -> matrixType
      is absent) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring
      exists then product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring
      -> multipleHolderObligation exists'
    - 'Rosetta condition: AdditionalFixedPaymentsMortgages — if ((product -> economicTerms -> payout -> CreditDefaultPayout
      -> generalTerms -> referenceInformation -> referenceObligation -> security -> securityType any = Debt and product ->
      economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation -> referenceObligation -> security
      -> debtType -> debtEconomics -> secured -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType contains ContractualSupplementTypeEnum
      -> CDSonMBS) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents
      exists then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents ->
      additionalFixedPayments -> interestShortfallReimbursement exists and product -> economicTerms -> payout -> CreditDefaultPayout
      -> protectionTerms -> floatingAmountEvents -> additionalFixedPayments -> principalShortfallReimbursement exists and
      product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents -> additionalFixedPayments
      -> writedownReimbursement exists)'
    - 'Rosetta condition: FloatingAmountEventsMortgages — if ((product -> economicTerms -> payout -> CreditDefaultPayout ->
      generalTerms -> referenceInformation -> referenceObligation -> security -> securityType any = Debt and product -> economicTerms
      -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation -> referenceObligation -> security -> debtType
      -> debtEconomics -> secured -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType contains ContractualSupplementTypeEnum
      -> CDSonMBS) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents
      exists then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents ->
      failureToPayPrincipal exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents
      -> writedown exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents
      -> impliedWritedown exists)'
    - 'Rosetta condition: CreditEventsMortgages — if ((product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms
      -> referenceInformation -> referenceObligation -> security -> securityType any = Debt and product -> economicTerms ->
      payout -> CreditDefaultPayout -> generalTerms -> referenceInformation -> referenceObligation -> security -> debtType
      -> debtEconomics -> secured -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification
      -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType contains ContractualSupplementTypeEnum
      -> CDSonMBS) and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents exists
      then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> failureToPayPrincipal
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> failureToPayInterest
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> distressedRatingsDowngrade
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> maturityExtension
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> writedown
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> impliedWritedown
      exists)'
    - 'Rosetta condition: HedgingParty — if partyRole -> role contains PartyRoleEnum -> HedgingParty then FilterPartyRole(partyRole,
      PartyRoleEnum -> HedgingParty) count <= 2'
    - 'Rosetta condition: DeterminingParty — if partyRole -> role contains PartyRoleEnum -> DeterminingParty then FilterPartyRole(partyRole,
      PartyRoleEnum -> DeterminingParty) count <= 2'
    - 'Rosetta condition: BarrierDerterminationAgent — if partyRole -> role contains PartyRoleEnum -> BarrierDeterminationAgent
      then FilterPartyRole(partyRole, PartyRoleEnum -> BarrierDeterminationAgent) count <= 1'
    - 'Rosetta condition: ClearedDate — if clearedDate exists then clearedDate >= tradeDate'
    - 'Rosetta condition: FpML_cd_1 — if product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists then tradeDate < product -> economicTerms -> effectiveDate -> adjustableDate -> unadjustedDate or tradeDate <
      product -> economicTerms -> effectiveDate -> adjustableDate -> adjustedDate'
    - 'Rosetta condition: FpML_cd_7 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists then product -> economicTerms -> payout -> InterestRatePayout -> calculationPeriodDates -> effectiveDate -> adjustableDate
      -> dateAdjustments exists or tradeDate < product -> economicTerms -> effectiveDate -> adjustableDate -> adjustedDate'
    - 'Rosetta condition: FpML_cd_8 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists then product -> economicTerms -> terminationDate -> adjustableDate -> dateAdjustments exists'
    - 'Rosetta condition: FpML_cd_11 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists and contractDetails -> documentation -> legalAgreementIdentification -> agreementName -> contractualDefinitionsType
      any = ContractualDefinitionsEnum -> ISDA2003CreditDerivatives then product -> economicTerms -> payout -> CreditDefaultPayout
      -> generalTerms -> referenceInformation -> allGuarantees exists'
    - 'Rosetta condition: FpML_cd_19 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualDefinitionsType any = ContractualDefinitionsEnum -> ISDA1999CreditDerivatives then product -> economicTerms
      -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> creditEventNotice -> businessCenter is absent
      and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring ->
      multipleHolderObligation is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms
      -> creditEvents -> restructuring -> multipleCreditEventNotices is absent and product -> economicTerms -> payout -> CreditDefaultPayout
      -> generalTerms -> referenceInformation -> allGuarantees is absent and product -> economicTerms -> payout -> CreditDefaultPayout
      -> generalTerms -> indexReferenceInformation is absent and product -> economicTerms -> payout -> CreditDefaultPayout
      -> generalTerms -> substitution is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms
      -> modifiedEquityDelivery is absent'
    - 'Rosetta condition: FpML_cd_20 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualDefinitionsType any = ContractualDefinitionsEnum -> ISDA2003CreditDerivatives then product -> economicTerms
      -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> notContingent is absent'
    - 'Rosetta condition: FpML_cd_23 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists then product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> cashSettlementTerms exists
      or product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms exists'
    - 'Rosetta condition: FpML_cd_24 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists then product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> creditEventNotice
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations exists and product
      -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation -> referencePrice exists'
    - 'Rosetta condition: FpML_cd_25 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms exists
      then product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> settlementCurrency exists and product
      -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> physicalSettlementPeriod
      exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms ->
      escrow exists and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms
      -> deliverableObligations -> accruedInterest exists'
    - 'Rosetta condition: FpML_cd_32 — if contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> masterConfirmationType is absent and contractDetails -> documentation -> legalAgreementIdentification -> agreementName
      -> contractualMatrix is absent and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation
      exists and product -> economicTerms -> payout -> InterestRatePayout -> priceQuantity exists and tradeLot -> priceQuantity
      -> quantity -> value exists then product -> economicTerms -> payout -> InterestRatePayout -> dayCountFraction exists'
    - 'Rosetta condition: FpML_ird_8 — if product -> economicTerms -> payout -> InterestRatePayout exists then FpmlIrd8(item,
      account) = True'
    - 'Rosetta condition: ExtraordinaryEvents — if contractDetails -> documentation -> agreementTerms -> agreement -> transactionAdditionalTerms
      -> equityAdditionalTerms -> extraordinaryEvents exists then (product -> economicTerms -> payout -> PerformancePayout
      -> returnTerms -> priceReturnTerms exists or product -> economicTerms -> payout -> OptionPayout exists) and Qualify_AssetClass_Equity(product
      -> economicTerms)'
    - 'Rosetta condition: DisruptionEventsDeterminingParty — if contractDetails -> documentation -> agreementTerms -> agreement
      -> transactionAdditionalTerms -> equityAdditionalTerms -> extraordinaryEvents -> additionalDisruptionEvents -> determiningParty
      exists then ancillaryParty -> role contains AncillaryRoleEnum -> DisruptionEventsDeterminingParty and if ancillaryParty
      -> role contains AncillaryRoleEnum -> DisruptionEventsDeterminingParty then contractDetails -> documentation -> agreementTerms
      -> agreement -> transactionAdditionalTerms -> equityAdditionalTerms -> extraordinaryEvents -> additionalDisruptionEvents
      -> determiningParty exists'
    - 'Rosetta func: EquityPerformance — Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap,
      Para 75. ''Equity Performance'' means, in respect of an Equity Cash Settlement Date, an amount in the Settlement Currency
      determined by the Calculation Agent as of the Equity Valuation Date to which the Equity Cash Settlement Amount relates,
      pursuant to the following formula: Equity Performance = (Rate Of Return)  Equity Notional Amount.'
    - 'Rosetta func: TradeNoExecutionDetails'
    - 'Rosetta func: ExtractBeforeTrade'
    - 'Rosetta func: ExtractAfterTrade'
    slots:
    - tradeIdentifier
    - tradeDate
    - tradeTime
    - party
    - partyRole
    - executionDetails
    - contractDetails
    - clearedDate
    - collateral
    - account
    slot_usage:
      tradeIdentifier:
        description: Represents the identifier(s) that uniquely identify a trade for an identity issuer. A trade can include
          multiple identifiers, for example a trade that is reportable to both the CFTC and ESMA, and then has an associated
          USI (Unique Swap Identifier) UTI (Unique Trade Identifier).
      tradeDate:
        description: Specifies the date which the trade was agreed.
      party:
        range: Party
        description: Represents the parties to the trade. The cardinality is optional to address the case where the trade
          is defined within a BusinessEvent data type, in which case the party is specified in BusinessEvent.
        multivalued: true
      partyRole:
        description: Represents the role each specified party takes in the trade. further to the principal roles, payer and
          receiver.
        multivalued: true
      executionDetails:
        description: Represents information specific to trades that arose from executions.
        required: false
      collateral:
        description: Represents the collateral obligations of a party.
      account:
        description: Represents a party's granular account information, which may be used in subsequent internal processing.
        multivalued: true
        deprecated: Deprecated in CDM
    in_subset:
    - cdm_event_common

  ExecutionDetails:
    description: Defines specific attributes that relate to trade executions.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"Create_PackageExecutionDetails","description":"Add a package component to an execution
        details object. This package component is constructed using an identifier for the package and the list of identifiers
        for its components.","inputs":[{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},{"name":"listId","type":"Identifier","cardinality":"1..1"},{"name":"componentId","type":"Identifier","cardinality":"2..*"}],"output":{"name":"newExecutionDetails","type":"ExecutionDetails","cardinality":"1..1"}},{"name":"EmptyExecutionDetails","output":{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},"code_implementation":true}]'
    rules:
    - description: When the execution type is set to 'Electronically', the execution venue must be specified.
      preconditions:
        slot_conditions:
          executionType:
            equals_string: Electronic
      postconditions:
        slot_conditions:
          executionVenue:
            required: true
    comments:
    - 'Rosetta condition: ExecutionVenue — if executionType = ExecutionTypeEnum -> Electronic then executionVenue exists'
    - 'Rosetta func: Create_PackageExecutionDetails — Add a package component to an execution details object. This package
      component is constructed using an identifier for the package and the list of identifiers for its components.'
    - 'Rosetta func: EmptyExecutionDetails'
    slots:
    - executionType
    - executionVenue
    - packageReference
    in_subset:
    - cdm_event_common

  ContractDetails:
    description: Defines specific attributes that relate to contractual details of trades.
    annotations:
      metadata_key: true
    comments:
    - 'Rosetta condition: ExecutedAgreement — if documentation exists then documentation -> agreementDate exists'
    slots:
    - documentation
    - governingLaw
    in_subset:
    - cdm_event_common

  Lineage:
    description: 'A class to provide lineage information across lifecycle events through a pointer or set of pointers into
      the event(s), contract(s) and, possibly, payout components that the event is dependent on or relates to. As an example,
      if an contractFormation event is corrected, the correction event will have a lineage into the initial event, which takes
      the form of a globalKey into that initial contract formation event. Two referencing mechanisms are provided as part
      of the CDM: either the globalKey, which corresponds to the hash value of the CDM class which is referred to, or a reference
      qualifier which is meant to provide support for the ingestion of xml documents with id/href mechanisms. The CDM recommends
      the use of the globalKey and provides a default implementation which is accessible in the generated code through org.isda.cdm.globalKey.GlobalKeyHashCalculator.
      If implementers want to use an alternative hashing mechanism, the API in which they need to plug it is com.rosetta.model.lib.HashFunction.'
    slots:
    - tradeReference
    - eventReference
    - portfolioStateReference
    in_subset:
    - cdm_event_common

  StockSplitInstruction:
    description: Data required to perform a stock split business event.
    comments:
    - 'Rosetta func: Create_StockSplit — Function specification to create the fully-formed business event which represents
      the impact of a stock split (or a reverse stock split) on an Equity Derivatives contract on a certain date.'
    annotations:
      rosetta_functions: '[{"name":"Create_StockSplit","description":"Function specification to create the fully-formed business
        event which represents the impact of a stock split (or a reverse stock split) on an Equity Derivatives contract on
        a certain date.","inputs":[{"name":"stockSplitInstruction","type":"StockSplitInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    slots:
    - adjustmentRatio
    - effectiveDate
    slot_usage:
      effectiveDate:
        description: The effective date of the stock split, also known as the ex-date. This is the date on which the additional
          shares are paid to the shareholders, or in the case of a reverse stock split, the number shares held by each shareholder
          is proportionally reduced.  Equity derivative transactions can be amended in firms' internal systems on such date.   In
          most markets, the listed stock price is reduced (or increased for a reverse stock split) to account for the split
          on the same date, but in some markets the price adjustment occurs on a later date.  In either case, equity derivative
          transactions should be amended on the date that the stocks are paid to the shareholders (or consolidated).
        required: true
    in_subset:
    - cdm_event_common

  CreditEvent:
    description: Specifies the relevant data regarding a credit event.
    slots:
    - creditEventType
    - eventDeterminationDate
    - auctionDate
    - finalPrice
    - recoveryPercent
    - publiclyAvailableInformation
    - referenceInformation
    in_subset:
    - cdm_event_common

  CorporateAction:
    description: Specifies the relevant data regarding a corporate action
    rules:
    - description: When Enum value does not corresponds to standard terms, then bespoke description must be populated.
      preconditions:
        slot_conditions:
          corporateActionType:
            equals_string: BespokeEvent
      postconditions:
        slot_conditions:
          bespokeEventDescription:
            required: true
    comments:
    - 'Rosetta condition: DividendObservation — if dividendObservation exists then dividendObservation -> priceType = PriceTypeEnum
      -> Dividend'
    - 'Rosetta condition: CorporateActionTypeBespoke — if corporateActionType = CorporateActionTypeEnum -> BespokeEvent then
      bespokeEventDescription exists'
    slots:
    - corporateActionType
    - exDate
    - payDate
    - recordDate
    - announcementDate
    - underlier
    - adjustmentFactor
    - informationSource
    - dividendObservation
    - bespokeEventDescription
    in_subset:
    - cdm_event_common

  AdjustmentFactor:
    description: Describes the terms involved for adjusting the price of the underlier impacted by a Corporate Action.
    close_mappings:
    - fpml_5_10:AdjustmentFactor
    slots:
    - value
    - calculationTerms
    slot_usage:
      value:
        description: The multiplier value applied to the price of the underlier impacted by a Corporate Action.
        required: true
    in_subset:
    - cdm_event_common

  AdjustmentFactorCalculationTerms:
    description: Describes the input terms involved in the calculation of the adjustment factor applied to the price of the
      underlier impacted by a Corporate Action.
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms
    rules:
    - description: SpinOffOrMergerOrAccrual
      postconditions:
        any_of:
        - slot_conditions:
            spinOff:
              required: true
        - slot_conditions:
            merger:
              required: true
        - slot_conditions:
            accrualFactor:
              required: true
      preconditions: {}
    - description: ShareRatio
      postconditions:
        any_of:
        - slot_conditions:
            shareForShareRatio:
              required: true
        - slot_conditions:
            shareForRightsRatio:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: SpinOffOrMergerOrAccrual — optional choice spinOff, merger, accrualFactor'
    - 'Rosetta condition: DividendObservation — if dividendObservation exists then dividendObservation -> priceType = PriceTypeEnum
      -> Dividend'
    - 'Rosetta condition: ShareRatio — optional choice shareForShareRatio, shareForRightsRatio'
    slots:
    - shareForShareRatio
    - shareForRightsRatio
    - rightsSubscriptionPrice
    - dividendRatio
    - spinOff
    - merger
    - accrualFactor
    - lastFixingPriceBeforeAdjustment
    - dividendObservation
    - bespokeCalculationFormula
    in_subset:
    - cdm_event_common

  AccrualFactor:
    description: 'The accrual rate and related terms, to adjust the price of an underlier impacted by a Corporate Action when
      economic impact consists in freezing the underlier price to the last fixing then applying accruals per each remaining
      underlier price fixing date required i.e. for each fixing date, adjustedPrice = lastFixingPrice x accrualFactor, where:
      accrualFactor = (1 + accrualRateValue x DCF).'
    close_mappings:
    - fpml_5_10:AccrualFactor
    comments:
    - 'Rosetta condition: AccrualPriceIsRate — value -> priceType = PriceTypeEnum -> InterestRate'
    slots:
    - value
    - calculationTerms
    slot_usage:
      value:
        range: PriceSchedule
        description: The rate to be applied to the last fixing price, for price accrual calculation purposes. DatedValue may
          be used for the purpose of representing Price series if such calculation is required for multiple dates.
        required: true
      calculationTerms:
        range: AccrualFactorCalculationTerms
        description: Describes the input terms involved in the calculation of the accrual factor.
    in_subset:
    - cdm_event_common

  AccrualFactorCalculationTerms:
    description: Describes the input terms involved in the calculation of the accrual factor. Optionnally, long and short
      stub interpolation rates can be specified.
    close_mappings:
    - fpml_5_10:AccrualFactorCalculationTerms
    slots:
    - tenorTillMaturity
    - dayCountFraction
    - interpolationTerms
    in_subset:
    - cdm_event_common

  SpinOff:
    description: Defines the underlier for both the Parent Company and the Child Compagny involved in Spin Off corporate action,
      as well as th respective price observation for each.
    comments:
    - 'Rosetta condition: EquityPrice — parentSecurity -> securityType = Equity and childSecurity -> securityType = Equity'
    slots:
    - parentSecurity
    - parentSecurityPrice
    - childSecurity
    - childSecurityPrice
    in_subset:
    - cdm_event_common

  Merger:
    description: Defines the underlier for both the Purchaser Company and the Acquired Compagny involved in Merger corporate
      action, as well as th respective price observation for each.
    comments:
    - 'Rosetta condition: EquityPrice — purchaserSecurity -> securityType = Equity and acquiredSecurity -> securityType =
      Equity'
    slots:
    - purchaserSecurity
    - purchaserSecurityPrice
    - acquiredSecurity
    - acquiredSecurityPrice
    in_subset:
    - cdm_event_common

  ClearingInstruction:
    description: All information required to perform the clear life cycle event; the clearing party (CCP), the two parties
      facing each other on the alpha contract, and optionally the parties acting as clearing members.
    close_mappings:
    - fpml_5_10:ClearingInstruction
    slots:
    - alphaContract
    - clearingParty
    - party1
    - party2
    - clearerParty1
    - clearerParty2
    - isOpenOffer
