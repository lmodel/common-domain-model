- 'Rosetta func: InterestCashSettlementAmount — Defines the performance calculations relevant for a fixed or floating rate
  payout. | inputs(tradeState: TradeState (1..1), payout: Payout (1..1), resets: Reset (1..*), date: date (1..1)) | output(interestCashSettlementAmount:
  Transfer (1..1))'
- 'Rosetta func: ResolveReset — Defines the interface for adopters to resolve a reset, given a trade state and a date. | inputs(tradeState:
  TradeState (1..1), date: date (1..1)) | output(reset: Reset (1..1))'
- 'Rosetta func: ResolvePerformanceObservationIdentifiers — Defines which attributes on the PerformancePayout should be used
  to locate and resolve the underlier''s price, for example for the reset process. | inputs(payout: PerformancePayout (1..1),
  adjustedDate: date (1..1)) | output(identifiers: ObservationIdentifier (1..1))'
- 'Rosetta func: AdjustedValuationDates | inputs(valuationDates: ValuationDates (1..1)) | output(adjustedValuationDates: date
  (0..*))'
- 'Rosetta func: ResolvePerformanceValuationTime — Defines how to resolve the observation time from those specified in the
  Performance Valuation type. | inputs(valuationTime: BusinessCenterTime (0..1), valuationTimeType: TimeTypeEnum (0..1), assetIdentifier:
  AssetIdentifier (1..1), determinationMethod: DeterminationMethodEnum (1..1)) | output(time: TimeZone (1..1))'
- 'Rosetta func: ResolvePerformanceReset — Defines how to resolve the reset value for a performance payout. | inputs(performancePayout:
  PerformancePayout (1..1), observation: Observation (1..1), date: date (1..1)) | output(reset: Reset (1..1))'
- 'Rosetta func: EquityCashSettlementAmount — Represents Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security
  Equity Swap, Para 72. ''Equity Cash Settlement Amount'' means, in respect of an Equity Cash Settlement Date, an amount in
  the Settlement Currency determined by the Calculation Agent as of the Equity Valuation Date to which the Equity Cash Settlement
  Amount relates, pursuant to the following formula: Equity Cash Settlement Amount = ABS(Rate Of Return) * Equity Notional
  Amount. | inputs(tradeState: TradeState (1..1), date: date (1..1)) | output(equityCashSettlementAmount: Transfer (1..1))'
- 'Rosetta func: EquityPerformance — Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap,
  Para 75. ''Equity Performance'' means, in respect of an Equity Cash Settlement Date, an amount in the Settlement Currency
  determined by the Calculation Agent as of the Equity Valuation Date to which the Equity Cash Settlement Amount relates,
  pursuant to the following formula: Equity Performance = (Rate Of Return)  Equity Notional Amount. | inputs(trade: Trade
  (1..1), observation: Price (1..1), date: date (1..1)) | output(equityPerformance: number (1..1))'
- 'Rosetta func: RateOfReturn — Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para
  139. ''Rate Of Return'' means, in respect of any Equity Valuation Date, the amount determined pursuant to the following
  formula: Rate Of Return = (Final Price - Initial Price) / Initial Price. | inputs(initialPrice: PriceSchedule (1..1), finalPrice:
  PriceSchedule (1..1)) | output(rateOfReturn: number (1..1))'
- "Rosetta func: EquityNotionalAmount — Part 1 Section 12 of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap,\
  \ Para 74. 'Equity Notional Amount' means the Number Of Securities times the Initial Price, adjusted, if applicable, as\
  \ provided in Part 1 Section 2.2, 'Equity Notional Reset'. If 'With Reset' is the Equity Notional Reset Election, then in\
  \ respect of each Equity Cash Settlement Date: (i) the Equity Notional Amount applicable in respect of the first Equity\
  \ Cash Settlement Date will be the amount specified as such in the definition of Equity Notional Amount; (ii) the Equity\
  \ Notional Amount applicable in respect of each subsequent Equity Cash Settlement Date will be the sum of (a) the Equity\
  \ Notional Amount in respect of the prior Equity Cash Settlement Date and (b) the Equity Performance, whether positive or\
  \ negative, in respect of the prior Equity Cash Settlement Date; and (iii)\tthe Floating Notional Amount will be adjusted\
  \ as provided in sub-clauses (i) and (ii) above as though it were an Equity Notional Amount. | inputs(numberOfSecurities:\
  \ number (1..1), price: Price (1..1)) | output(equityNotionalAmount: number (1..1))"
- 'Rosetta func: Create_StockSplit — Function specification to create the fully-formed business event which represents the
  impact of a stock split (or a reverse stock split) on an Equity Derivatives contract on a certain date. | inputs(stockSplitInstruction:
  StockSplitInstruction (1..1), before: TradeState (1..1)) | output(after: TradeState (1..1))'
- 'Rosetta func: Create_Execution — Specifies the function to compose an execution based on a minimum required set of inputs:
  product, quantity, parties, etc. | inputs(instruction: ExecutionInstruction (1..1)) | output(execution: TradeState (1..1))'
- 'Rosetta func: Create_ContractFormationInstruction | inputs(legalAgreement: LegalAgreement (0..*)) | output(instruction:
  ContractFormationInstruction (1..1))'
- 'Rosetta func: Create_ContractFormation — Function specification that represents an executed trade for a contractual product
  that has been affirmed (or confirmed) by the two parties. The formed contract can reference a legal agreement for instance
  a master agreement, by using the optional legalAgreement input. | inputs(instruction: ContractFormationInstruction (1..1),
  execution: TradeState (1..1)) | output(contractFormation: TradeState (1..1))'
- 'Rosetta func: Create_Exercise — Defines the process of putting into effect the rights specified in an options contract,
  such as to buy or sell a security.  Once exercised the option contract is terminated. | inputs(exerciseInstruction: ExerciseInstruction
  (1..1), originalTrade: TradeState (1..1)) | output(exercise: TradeState (1..*))'
- 'Rosetta func: Update_ProductDirection — Flips the payer and receiver on a product (used when a Put Option is exercised).
  | inputs(before: NonTransferableProduct (1..1), originalPayer: CounterpartyRoleEnum (1..1), originalReceiver: CounterpartyRoleEnum
  (1..1)) | output(after: NonTransferableProduct (1..1))'
- 'Rosetta func: Create_NonTransferableProduct — Creates a NonTransferableProduct (ie EconomicTerms) from an underlier. |
  inputs(underlier: Underlier (1..1), payerReceiver: PayerReceiver (1..1)) | output(newProduct: NonTransferableProduct (1..1))'
- 'Rosetta func: Create_Reset — Defines how a Reset should be constructed. | inputs(instruction: ResetInstruction (1..1),
  tradeState: TradeState (1..1)) | output(reset: TradeState (1..1))'
- 'Rosetta func: CalculateTransfer — Function specification to calculate a transfer, e.g. following a reset on a contract
  | inputs(instruction: CalculateTransferInstruction (1..1)) | output(transfer: Transfer (0..*))'
- 'Rosetta func: Create_Transfer — Defines how a transfer should be constructed, when representing the exchange of cash between
  parties. | inputs(instruction: TransferInstruction (1..1), tradeState: TradeState (1..1)) | output(transfer: TradeState
  (1..1))'
- 'Rosetta func: Create_CashTransfer — Defines how Transfer that represents an exchange of cash, should be constructed. |
  inputs(instruction: CalculateTransferInstruction (1..1)) | output(transfer: Transfer (1..1))'
- 'Rosetta func: Create_AssetTransfer — Defines how Transfer that represents an exchange of asset based on an asset payout,
  should be constructed. | inputs(instruction: CalculateTransferInstruction (1..1)) | output(transfer: Transfer (1..1))'
- 'Rosetta func: ResolveTransfer — Defines how to calculate the amount due to be transferred after a Reset Event. | inputs(instruction:
  CalculateTransferInstruction (1..1)) | output(transfer: Transfer (1..1))'
- 'Rosetta func: ResolveCashSettlementDate — A product agnostic function that resolves the settlement date of the payout for
  the period in question | inputs(tradeState: TradeState (1..1)) | output(date: date (1..1))'
- 'Rosetta func: SecurityFinanceCashSettlementAmount | inputs(tradeState: TradeState (1..1), date: date (1..1), quantity:
  Quantity (0..1), payerReceiver: PayerReceiver (0..1)) | output(cashSettlementAmount: Transfer (1..1))'
- 'Rosetta func: Create_Split — Defines the logic for splitting a trade into separate copies. The split instruction contains
  a breakdown into N set of primitive instructions. Each set contains the primitive instructions to be applied to each post-split
  trade, eventually producing N trades. The split function underpins a number of business events such as clearing or allocation.
  | inputs(breakdown: PrimitiveInstruction (1..*), originalTrade: TradeState (1..1)) | output(splitTrade: TradeState (1..*))'
- 'Rosetta func: Create_PartyChange — Defines the logic for changing one of the counterparties on a trade. A new trade identifier
  must be specified as a change of party results in a new trade. An ancillary party can also be specified, for instance to
  refer to the original executing party on the new trade. | inputs(counterparty: Counterparty (1..1), ancillaryParty: AncillaryParty
  (0..1), partyRole: PartyRole (0..1), tradeId: TradeIdentifier (1..*), originalTrade: TradeState (1..1)) | output(newTrade:
  TradeState (1..1))'
- 'Rosetta func: EmptyTransferHistory | output(emptyTransferHistory: TransferState (0..*))'
- 'Rosetta func: Create_QuantityChange — A specification of the inputs, outputs and constraints when calculating the after
  state of a Quantity Change Primitive Event | inputs(instruction: QuantityChangeInstruction (1..1), tradeState: TradeState
  (1..1)) | output(quantityChange: TradeState (1..1))'
- 'Rosetta func: Create_TermsChange — A specification of the inputs, outputs and constraints when calculating the after tradeState
  based Terms Change Primitive Instruction. | inputs(termsChange: TermsChangeInstruction (1..1), before: TradeState (1..1))
  | output(tradeState: TradeState (1..1))'
- 'Rosetta func: FilterOpenTradeStates — Filter to only ''open'' TradeState - where both the closedState and positionState
  are not set. | inputs(tradeStates: TradeState (0..*)) | output(openTradeStates: TradeState (0..*))'
- 'Rosetta func: FilterClosedTradeStates — Filter to only ''closed'' TradeState - where either the closedState or positionState
  are set. | inputs(tradeStates: TradeState (0..*)) | output(closedTradeStates: TradeState (0..*))'
- 'Rosetta func: NewEquitySwapProduct — Function specification to create an Equity Swap according to the 2018 ISDA CDM Equity
  Confirmation Template, based on a minimum set of inputs which can (optionally) include a Master Confirmation Agreement.
  The inputs represent the minimum set of inputs required to create an Equity Swap, either based on an existing Master Confirmation
  Agreement or as a stand-alone Equity Swap | inputs(security: Security (1..1), masterConfirmation: EquitySwapMasterConfirmation2018
  (0..1)) | output(product: NonTransferableProduct (1..1))'
- 'Rosetta func: NewSingleNameEquityPerformancePayout — Function specification to create the equity payout part of an Equity
  Swap according to the 2018 ISDA CDM Equity Confirmation template. | inputs(security: Security (1..1), masterConfirmation:
  EquitySwapMasterConfirmation2018 (0..1)) | output(performancePayout: PerformancePayout (1..1))'
- 'Rosetta func: NewFloatingPayout — Function specification to create the interest rate (floating) payout part of an Equity
  Swap according to the 2018 ISDA CDM Equity Confirmation template. | inputs(masterConfirmation: EquitySwapMasterConfirmation2018
  (0..1)) | output(interestRatePayout: InterestRatePayout (1..1))'
- 'Rosetta func: Create_IndexTransitionTermsChange — Function specification to create a terms change that contains changes
  to the floating rate indexes and adds an adjustment spread to any existing spread. | inputs(instruction: IndexTransitionInstruction
  (1..1), tradeState: TradeState (1..1)) | output(termsChange: TradeState (1..1))'
- 'Rosetta func: Create_Observation — Function specification to create an observation that incorporates an observation event
  into the observation history of a given trade state. | inputs(instruction: ObservationInstruction (1..1), before: TradeState
  (1..1)) | output(after: TradeState (1..1))'
- 'Rosetta func: Create_Valuation — Function specification to incorporate a new assessment of the valuation in the valuation
  history of a given trade state. | inputs(instruction: ValuationInstruction (1..1), before: TradeState (1..1)) | output(after:
  TradeState (1..1))'
- 'Rosetta func: UpdateSpreadAdjustmentAndRateOptions — For each of the trade state''s price quantity, find a matching price
  quantity instruction, and call the update function. | inputs(tradeState: TradeState (1..1), instructions: PriceQuantity
  (1..*)) | output(updatedTradeState: TradeState (1..1))'
- 'Rosetta func: UpdateIndexTransitionPriceAndRateOption | inputs(priceQuantity: PriceQuantity (1..1), instruction: PriceQuantity
  (0..1)) | output(updatedPriceQuantity: PriceQuantity (1..1))'
- 'Rosetta func: FindMatchingIndexTransitionInstruction | inputs(instructions: PriceQuantity (1..*), priceQuantity: PriceQuantity
  (1..1)) | output(matchingInstruction: PriceQuantity (0..1))'
- 'Rosetta func: Create_SecurityLendingInvoice — Defines the process of calculating and creating a Security Lending Invoice.
  | inputs(instruction: BillingInstruction (1..1)) | output(invoice: SecurityLendingInvoice (1..1))'
- 'Rosetta func: Create_BillingRecords — Creates for each billing instruction an individual billing record to be included
  in a Security Lending Billing Invoice | inputs(billingInstruction: BillingRecordInstruction (1..*)) | output(billingRecord:
  BillingRecord (1..*))'
- 'Rosetta func: Create_BillingRecord — Creates an individual billing record to be included in a Security Lending Billing
  Invoice | inputs(billingInstruction: BillingRecordInstruction (1..1)) | output(billingRecord: BillingRecord (1..1))'
- 'Rosetta func: ResolveSecurityFinanceBillingAmount — Calculates the billing amount for a Security Finance transaction. |
  inputs(tradeState: TradeState (1..1), reset: Reset (1..1), recordStartDate: date (1..1), recordEndDate: date (1..1), transferDate:
  date (1..1)) | output(transfer: Transfer (1..1))'
- 'Rosetta func: ToMoney | inputs(quantity: Quantity (1..1)) | output(money: Money (1..1))'
- 'Rosetta func: Create_BillingSummary — Creates a billing summary to be included in a Security Lending Billing Invoice. |
  inputs(billingRecord: BillingRecord (1..*)) | output(billingSummary: BillingSummary (1..1))'
- 'Rosetta func: Create_Return — Defines the process of partially or fully returning a Security Lending Transaction. | inputs(tradeState:
  TradeState (1..1), returnInstruction: ReturnInstruction (1..1), returnDate: date (1..1)) | output(returnEvent: BusinessEvent
  (1..1))'
- 'Rosetta func: ResolveRepurchaseTransferInstruction — Resolves an instruction for settlement of a Repurchase Event | inputs(tradeState:
  TradeState (1..1), repurchaseDate: date (1..1)) | output(repurchaseInstruction: EventInstruction (1..1))'
- 'Rosetta func: Create_RollPrimitiveInstruction — Creates the primitive instructions for a trade roll. A trade roll consists
  in closing an existing trade and entering into a new one which has the same characteristics as the old one, except with
  an extended termination date and (possibly) a different price. | inputs(tradeState: TradeState (1..1), effectiveRollDate:
  AdjustableOrRelativeDate (1..1), terminationDate: AdjustableOrRelativeDate (1..1), priceQuantity: PriceQuantity (1..*))
  | output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_EffectiveOrTerminationDateTermChangeInstruction — Creates the relevant terms change primitive instruction
  object for rolling a contractual product, which consists in the same terms as the original contractual product but with
  different effective and termination dates. | inputs(product: NonTransferableProduct (1..1), effectiveRollDate: AdjustableOrRelativeDate
  (0..1), terminationDate: AdjustableOrRelativeDate (0..1)) | output(termsChangeInstruction: TermsChangeInstruction (1..1))'
- 'Rosetta func: Create_RollTermChangeInstruction — Creates the relevant terms change primitive instruction object for rolling
  a contractual product, which consists in the same terms as the original contractual product but with different effective
  and termination dates. | inputs(product: NonTransferableProduct (1..1), effectiveRollDate: AdjustableOrRelativeDate (1..1),
  terminationDate: AdjustableOrRelativeDate (1..1)) | output(termsChangeInstruction: TermsChangeInstruction (1..1))'
- 'Rosetta func: Create_OnDemandRateChangePrimitiveInstruction — Creates a full primitive instruction for an on-demand rate
  change event. A rate change consists in closing the original trade and opening a new one with the same details as the original
  one, but with a new rate (price) and effective date. The business event logic checks that there is only 1 rate price in
  the original trade to be updated. | inputs(tradeState: TradeState (1..1), effectiveDate: AdjustableOrRelativeDate (1..1),
  agreedRate: number (1..1)) | output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_OnDemandRateChangePriceChangeInstruction — Creates a price change instruction for an on-demand rate
  change, based on a new rate provided as a single number by matching it to a single rate price. | inputs(priceQuantity: PriceQuantity
  (1..*), newRate: number (1..1)) | output(quantityChangeInstruction: QuantityChangeInstruction (1..1))'
- 'Rosetta func: Create_OnDemandRateChangeTermsChangeInstruction — Creates a terms change instruction for an on-demand rate
  change, based on a new rate provided as a single number. This instruction only updates the effective date but keeps other
  details of the trade unchanged. | inputs(product: NonTransferableProduct (1..1), effectiveDate: AdjustableOrRelativeDate
  (1..1)) | output(termsChangeInstruction: TermsChangeInstruction (1..1))'
- 'Rosetta func: Create_CancellationPrimitiveInstruction — Creates a primitive instruction for early cancellation. | inputs(tradeState:
  TradeState (1..1), newRepurchasePrice: number (0..1), cancellationDate: AdjustableOrRelativeDate (1..1)) | output(instruction:
  PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_CancellationTermChangeInstruction — Create a terms change instruction for a cancellation that consists
  in bringing the termination date forward. | inputs(product: NonTransferableProduct (1..1), cancellationDate: AdjustableOrRelativeDate
  (1..1)) | output(termsChangeInstruction: TermsChangeInstruction (1..1))'
- 'Rosetta func: Create_PairOffInstruction — Creates a set of instructions to pair-off a set of trades based on a pair reference.
  A package component is created based on that pair reference and the list of identifiers for the underlying trades. That
  package component is then added onto the execution details of every underlying trade. The existing trades are not terminated.
  | inputs(tradeState: TradeState (2..*), pairReference: Identifier (1..1)) | output(instruction: Instruction (1..*))'
- 'Rosetta func: Create_ShapingInstruction — Creates a set of instructions to shape a trade based on shaped quantities and
  a package ID. The original trade is closed and split into (smaller) shaped trades based on a set of trade lots containing
  the shaped quantities and an identifier for each shaped trade. A package component is created based on the package ID and
  the list of identifiers for the shaped trades. That package component is then added onto the execution details of every
  shaped trade. | inputs(tradeState: TradeState (1..1), tradeLots: TradeLot (2..*), shapeIdentifier: Identifier (1..1)) |
  output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_PartialDeliveryPrimitiveInstruction — Creates the primitive instruction for partial delivery of a
  repo transaction at settlement. | inputs(tradeState: TradeState (1..1), deliveredPriceQuantity: PriceQuantity (1..*)) |
  output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_RepricePrimitiveInstruction — Creates the primitive instructions for a repricing that alters the cash
  amount of the trade. Transaction value and variation margin are processed separately as are transfers of cash and securities.
  | inputs(tradeState: TradeState (1..1), newAllinPrice: number (1..1), newCashValue: number (1..1), effectiveRepriceDate:
  AdjustableOrRelativeDate (1..1)) | output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_AdjustmentPrimitiveInstruction — Creates the primitive instructions for a repricing that alters the
  collateral quantity and value of the trade. Transaction value and variation margin are processed separately as are transfers
  of cash and securities. | inputs(tradeState: TradeState (1..1), newAllinPrice: number (1..1), newAssetQuantity: number (1..1),
  effectiveRepriceDate: AdjustableOrRelativeDate (1..1)) | output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_SubstitutionPrimitiveInstruction — Creates the primitive instructions for a substitution of collateral
  by replacing the assetpayout of the trade. | inputs(tradeState: TradeState (1..1), effectiveDate: AdjustableOrRelativeDate
  (1..1), newCollateralPortfolio: CollateralPortfolio (1..1), priceQuantity: PriceQuantity (1..*)) | output(instruction: PrimitiveInstruction
  (1..1))'
- 'Rosetta func: Create_SubstitutionInstruction — Creates the terms change instruction that updates the payout with the new
  substitution payout. | inputs(product: NonTransferableProduct (1..1), effectiveDate: AdjustableOrRelativeDate (1..1), newCollateralPortfolio:
  CollateralPortfolio (1..1)) | output(termsChangeInstruction: TermsChangeInstruction (1..1))'
- 'Rosetta func: Qualify_Substitution — Qualification of a collateral substitution event. | inputs(businessEvent: BusinessEvent
  (1..1)) | output(is_event: boolean (1..1))'
- 'Rosetta func: Create_PackageExecutionDetails — Add a package component to an execution details object. This package component
  is constructed using an identifier for the package and the list of identifiers for its components. | inputs(executionDetails:
  ExecutionDetails (0..1), listId: Identifier (1..1), componentId: Identifier (2..*)) | output(newExecutionDetails: ExecutionDetails
  (1..1))'
- 'Rosetta func: NewTradeInstructionOnlyExists | inputs(primitiveInstruction: PrimitiveInstruction (1..1)) | output(result:
  boolean (1..1))'
- 'Rosetta func: TradeNoExecutionDetails | inputs(trade: Trade (1..1)) | output(newTrade: Trade (1..1))'
- 'Rosetta func: EmptyExecutionDetails | output(executionDetails: ExecutionDetails (0..1))'
- 'Rosetta func: Create_OnDemandInterestPaymentPrimitiveInstruction — An instruction to make a interium interest payment by
  adding a payout leg to the deal. | inputs(tradeState: TradeState (1..1), interestAmount: Money (1..1), settlementDate: SettlementDate
  (1..1)) | output(instruction: PrimitiveInstruction (1..1))'
- 'Rosetta func: Create_TerminationInstruction — Creates the relevant primitive instruction for a termination, which consists
  in a quantity change to bring the quantity to zero. | inputs(tradeState: TradeState (1..1)) | output(instruction: PrimitiveInstruction
  (1..1))'
- 'Rosetta func: Create_BusinessEvent — Creates a business event from instructions containing primitive instructions and optionally
  a trade state. | inputs(instruction: Instruction (1..*), intent: EventIntentEnum (0..1), eventDate: date (1..1), effectiveDate:
  date (1..1)) | output(businessEvent: BusinessEvent (1..1))'
- 'Rosetta func: Create_TradeState — Creates a single trade state by applying primitive instructions to an existing trade
  state (optional in case an execution instruction is included). The primitive instructions are applied in the following order:
  Always first: - execution, if it exists, otherwise a before state must be provided The following 3 can be executed in any
  order, because they touch separate components of the trade: - quantity change - terms change - party change Always last:
  - contract formation, otherwise the contract could be invalid. | inputs(primitiveInstruction: PrimitiveInstruction (0..1),
  before: TradeState (0..1)) | output(after: TradeState (1..1))'
- 'Rosetta func: ExtractBeforeEconomicTerms | inputs(businessEvent: BusinessEvent (1..1)) | output(economicTerms: EconomicTerms
  (0..1))'
- 'Rosetta func: ExtractOpenEconomicTerms | inputs(businessEvent: BusinessEvent (1..1)) | output(economicTerms: EconomicTerms
  (0..1))'
- 'Rosetta func: ExtractBeforeTrade | inputs(businessEvent: BusinessEvent (1..1)) | output(trade: Trade (0..1))'
- 'Rosetta func: ExtractAfterTrade | inputs(businessEvent: BusinessEvent (1..1)) | output(trade: Trade (0..1))'
- 'Rosetta func: ExtractTradePurchasePrice | inputs(tradableProduct: TradableProduct (1..1)) | output(value: number (0..*))'
- 'Rosetta func: ExtractTradeCollateralQuantity | inputs(tradableProduct: TradableProduct (1..1)) | output(value: number (0..*))'
- 'Rosetta func: ExtractTradeCollateralPrice | inputs(tradableProduct: TradableProduct (1..1)) | output(value: number (0..*))'
- 'Rosetta func: Create_ExposureFromTrades — Builds an Exposure structure from a list of trades. | inputs(trades: TradeState
  (0..*)) | output(exposure: Exposure (0..1))'
- 'Rosetta func: PayoutObligationFulfillmentFromTrade — Determines the payouts and collateral payouts in a trade and whether
  the obligations have been fulfilled for each of them. | inputs(tradeState: TradeState (0..1)) | output(result: boolean (0..1))'
- 'Rosetta func: AssetPayoutObligationsFulfilled — Determines whether the obligations defined by the AssetPayout have been
  fulfilled by checking that the quantity of shares required have been successfully transferred. | inputs(assetPayout: AssetPayout
  (1..1), transferHistory: TransferState (0..*)) | output(isFulfilled: boolean (1..1))'
- 'Rosetta func: InterestPayoutObligationsFulfilled — Determines whether the obligations defined by the InterestRatePayout
  have been fulfilled by checking that the total value of cash required has been successfully transferred. | inputs(interestRatePayout:
  InterestRatePayout (1..1), transferHistory: TransferState (0..*)) | output(isFulfilled: boolean (1..1))'
