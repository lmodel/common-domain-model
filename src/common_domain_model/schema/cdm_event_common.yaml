    slots:
    - collateralPositionComponent
    - marginCallAction
    in_subset:
    - cdm_event_common

  MarginCallResponse:
    description: Represents common attributes required for a Margin Call Response under a legal agreement such as a credit
      support document or equivalent.
    is_a: MarginCallBase
    slots:
    - marginCallResponseAction
    - marginResponseType
    - agreedAmountBaseCurrency
    in_subset:
    - cdm_event_common

  ClosedState:
    description: ' A class to qualify the closed state of an execution or a contract through the combination or a state (e.g.
      terminated, novated) and a set of dates: activity date, effective date and, when relevant, last payment date.'
    close_mappings:
    - fpml_5_10:ClosedState
    slots:
    - state
    - activityDate
    - effectiveDate
    - lastPaymentDate
    slot_usage:
      state:
        range: ClosedStateEnum
        description: The qualification of what gave way to the contract or execution closure, e.g. allocation, termination,
          ...
        required: true
      effectiveDate:
        description: The date on which the closing event contractually takes effect, when different from the activity date.
          When an explicit event effective date attribute is associated with the closing event, it will be that date. In the
          case of a cancellation event, it will be the date on which the cancelled event took place.
    in_subset:
    - cdm_event_common

  Transfer:
    abstract: true
    description: The type of transfer.
    comments:
    - Generated from Rosetta 'choice' construct — represents a union/one-of type.
    union_of:
    - ScheduledTransfer
    - UnscheduledTransfer
    in_subset:
    - cdm_event_common
