    on the CompareOp enum.","inputs":[{"name":"tradeStates","type":"TradeState","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"amount","type":"number","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"TransfersForDate","inputs":[{"name":"transfers","type":"Transfer","cardinality":"0..*"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"transfersForDate","type":"Transfer","cardinality":"0..*"}},{"name":"FilterCashTransfers","inputs":[{"name":"transfers","type":"Transfer","cardinality":"0..*"}],"output":{"name":"cashTransfers","type":"Transfer","cardinality":"0..*"}},{"name":"FilterSecurityTransfers","inputs":[{"name":"transfers","type":"Transfer","cardinality":"0..*"}],"output":{"name":"securityTransfers","type":"Transfer","cardinality":"0..*"}},{"name":"ResolveInterestRateObservationIdentifiers","description":"Defines
