    is_a: PositionBase
    close_mappings:
    - fpml_5_10:CollateralPosition
    comments:
    - 'Rosetta condition: CollateralPositionStatusSettledOrInTransitOnly — if collateralPositionStatus exists then collateralPositionStatus
      = CollateralStatusEnum -> SettledAmount or collateralPositionStatus = CollateralStatusEnum -> InTransitAmount'
    slots:
    - treatment
    - collateralPositionStatus
    in_subset:
    - cdm_event_common

  MarginCallIssuance:
