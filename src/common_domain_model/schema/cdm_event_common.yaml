        the following formula: Equity Cash Settlement Amount = ABS(Rate Of Return) * Equity Notional Amount.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"equityCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"Create_StockSplit","description":"Function
        specification to create the fully-formed business event which represents the impact of a stock split (or a reverse
