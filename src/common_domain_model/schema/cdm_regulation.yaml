id: https://w3id.org/lmodel/common-domain-model/cdm_regulation
name: cdm_regulation
description: 'Regulatory reporting concepts: regulatory rules, report definitions, reporting formats.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
