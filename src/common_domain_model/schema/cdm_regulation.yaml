      unit:
        range: string
        required: true
    in_subset:
    - cdm_regulation

  FinInstrm:
    slots:
    - othr
    in_subset:
    - cdm_regulation

  Pric:
    slots:
    - pric
    - bsisPts
    in_subset:
    - cdm_regulation

  Prsn:
    slots:
    - ctryOfBrnch
    - othr
    in_subset:
    - cdm_regulation

  FinInstrmGnlAttrbts:
