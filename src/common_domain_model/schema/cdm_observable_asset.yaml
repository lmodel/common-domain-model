          website (www.emta.org) and on Thomson Reuters Page EMTAUAHFIX at approximately 11:30 am, Kiev time, on that Rate
          Calculation Date. The 'EMTA UAH Industry Survey Methodology' as used herein means the methodology dated as of March
          16, 2009, for a centralized industry wide survey of financial institutions in the Ukrainian Hryvnia/U.S. Dollar
          spot market for the purposes of determining the EMTA UAH Industry Survey Rate.
        aliases:
        - UAH.EMTA.INDUSTRY.SURVEY.RATE/UAH02
      UAH_GFI_UAH01:
        description: The Spot Rate for a Rate Calculation Date will be the Ukrainian Hryvnia/U.S. Dollar spot rate, expressed
          as the amount of Ukrainian Hryvnia per one U.S. Dollar, for settlement on the same Business Day reported by GFI
          Brokers on Thomson Reuters Page GFIU by 9:30 am, London time, on that Rate Calculation Date.
        aliases:
        - UAH.GFI/UAH01
      VEF_FIX_VEF01:
        description: The Spot Rate for a Rate Calculation Date will be the midpoint of the Venezuelan Bolivar /U.S. Dollar
          Tipo de Cambio De Referencia buying and selling rates, expressed as the amount of Venezuelan Bolivar per one U.S.
          Dollar, for settlement in two Business Days reported by the Banco Central de Venezuela (www.bcv.org.ve) at approximately
          5:00 p.m., Caracas time, on that Rate Calculation Date.
        aliases:
        - VEF.FIX/VEF01
      VND_ABS_VND01:
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese Dong/U.S. Dollar spot rate at 11:00
          a.m., Singapore time, expressed as the amount of Vietnamese Dong per one U.S. Dollar, for settlement in two Business
          Days reported by the Association of Banks in Singapore, which appears on the Reuters Screen ABSIRFIX01 Page to the
          right of the caption 'Spot' under the column 'VND' at approximately 11:30 a.m., Singapore time, on that Rate Calculation
          Date.
        aliases:
        - VND.ABS/VND01
      VND_FX_VND02:
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese Dong/U.S. Dollar spot rate expressed
          as the amount of Vietnamese Dong per one U.S. Dollar, for settlement in two Business Days which appears on Reuters
          Screen VNDFIX=VN Page under the caption 'Spot' and to the right of the caption 'Average' at approximately 11:00
          am, Hanoi time, on that Rate Calculation Date.
        aliases:
        - VND.FX/VND02
      VND_SFEMC_INDICATIVE_SURVEY_RATE_VND03:
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese Dong/U.S. Dollar Specified Rate for
          U.S. Dollars, expressed as the amount of Vietnamese Dong per one U.S. Dollar, for settlement in two Business Days,
          as published on SFEMC's website (www.sfemc.org) at approximately 3:30 p.m., Singapore time, or as soon as thereafter
          as practicable, on that Rate Calculation Date. The Spot Rate shall be calculated by SFEMC (or a service provider
          SFEMC may select in its sole discretion) pursuant to the SFEMC VND Indicative Survey Methodology (which means a
          methodology, dated as of July 14, 2008, as amended from time to time, for a centralized industry-wide survey of
          financial institutions that are active participants in the Vietnamese Dong/U.S. Dollar markets for the purpose of
          determining the SFEMC VND Indicative Survey Rate).
        aliases:
        - VND.SFEMC.INDICATIVE.SURVEY.RATE/VND03

  PartyDeterminationEnum:
    description: The enumerated values to specify how a calculation agent will be determined.
    permissible_values:
      ExercisingParty:
        description: The party that gives notice of exercise. Per 2000 ISDA Definitions, Section 11.1. Parties, paragraph
          (d).
      NonExercisingParty:
        description: The party that is given notice of exercise. Per 2000 ISDA Definitions, Section 11.1. Parties, paragraph
          (e).
      AsSpecifiedInMasterAgreement:
        description: The Calculation Agent is determined by reference to the relevant master agreement.
      AsSpecifiedInStandardTermsSupplement:
        description: The Calculation Agent is determined by reference to the relevant standard terms supplement.
      Both:
        description: Both parties with joined rights to be a calculation agent.

  PriceTypeEnum:
    description: Provides enumerated values for types of prices in the Price data type in order to explain how to interpret
      the amount and use it in calculations.
    permissible_values:
      AssetPrice:
        description: Denotes a price expressed as a cash amount in a given currency to purchase a unit of an asset (e.g. a
          security or a commodity).
      Premium:
        description: Denotes the amount payable by the buyer to the seller for an option. The premium is paid on the specified
          premium payment date or on each premium payment date if specified.
      Correlation:
        description: Denotes a price expressed as the weighted average of all pairwise correlation coefficients.
      Dividend:
        description: Denotes a price expressed as the dividend payment from a index or share.
      ExchangeRate:
        description: Denotes a rate to convert one currency or other measure of value to another. Foreign Exchange rates are
          represented in decimals, e.g. {amount, unitOfAmount, PerUnitOfAmount} = [1.23, USD, GBP] = USD 1.23 for every 1
          GBP.
      InterestRate:
        description: Denotes a price expressed as a rate to be applied to quantity/notional amount and represented as decimal,
          e.g. {amount, unitOfAmount, PerUnitOfAmount} = [0.08, EUR, EUR] = 8%  of the EUR notional quantity/amount or 8 cents
          for every EUR of notional amount.
      Variance:
        description: Denotes a price expressed as the the arithmetic average of the squared differences from the mean value
          of an observable price.
      Volatility:
        description: Denotes a price expressed as the the square root of the arithmetic average of the squared differences
          from the mean value of an observable price.

  PriceSubTypeEnum:
    description: Provides a list of possible sub types of the chosen price type, used in conjunction with the PriceTypeEnum.
    permissible_values:
      Fee:
        description: The lending fee associated with borrowing a security.
      Rebate:
        description: 'Denotes any rebate that is attributed to the cashflow. For example, where a lender will provide a rebate
          on the cash given to them by the borrower as collateral on a securities lending trade. '

  PremiumTypeEnum:
    description: The enumerated values to specify the premium type for forward start options.
    permissible_values:
      PrePaid: {}
      PostPaid: {}
      Variable: {}
      Fixed: {}

  PriceOperandEnum:
    permissible_values:
      AccruedInterest: {}
      Commission: {}
      ForwardPoint: {}

  CsaTypeEnum:
    description: 'How is the Creadit Support Annex defined for this transaction as defined in the 2021 ISDA Definitions, section
      18.2.1 '
    permissible_values:
      NoCSA:
        description: There is no CSA applicable
        aliases:
        - NoCSA
      ExistingCSA:
        description: Thre is an existing Credit Support Annex
        aliases:
        - ExistingCSA
      ReferenceVMCSA:
        description: There is a bilateral Credit Support Annex specific to the transaction
        aliases:
        - ReferenceVMCSA

slots:
  provider:
    range: LegalEntity
    description: The organisation that creates or maintains the Index.

  floatingRateIndex:
    range: FloatingRateIndexEnum
    description: The reference index that is used to specify the floating interest rate.
    required: true
    annotations:
      metadata_scheme: true

  indexTenor:
    range: Period
    description: The ISDA Designated Maturity, i.e. the floating rate tenor.

  quotedCurrencyPair:
    range: QuotedCurrencyPair
    description: Describes the composition of a rate that has been quoted or is to be quoted.
    required: true

  primaryFxSpotRateSource:
    range: InformationSource
    description: Specifies the primary source from which a rate should be observed.
    required: true

  secondaryFxSpotRateSource:
    range: InformationSource
    description: Specifies an alternative, or secondary, source from which a rate should be observed.

  inflationRateIndex:
    range: InflationRateIndexEnum
    description: The reference index that is used to specify the inflation interest rate.
    required: true
    annotations:
      metadata_scheme: true

  indexSeries:
    range: integer
    description: A CDS index series identifier, e.g. 1, 2, 3 etc.

  indexAnnexVersion:
    range: integer
    description: A CDS index series version identifier, e.g. 1, 2, 3 etc.

  indexAnnexDate:
    range: date
    description: A CDS index series annex date.

  indexAnnexSource:
    range: IndexAnnexSourceEnum
    description: A CDS index series annex source.
    annotations:
      metadata_scheme: true

  excludedReferenceEntity:
    range: ReferenceInformation
    description: Excluded reference entity.
    multivalued: true
    inlined_as_list: true

  settledEntityMatrix:
    range: SettledEntityMatrix
    description: Used to specify the Relevant Settled Entity Matrix when there are settled entities at the time of the trade.

  indexFactor:
    range: decimal
    description: Index Factor is the index version factor or percent, expressed as an absolute decimal value between 0 and
      1, that multiplied by the original notional amount yields the notional amount covered by the seller of protection.

  observable:
    range: Observable
    description: Specifies the object to be observed for a price, it could be an asset or an index. The cardinality is optional
      as some quantity / price cases have no observable (e.g. a fixed rate in a given currency).
    any_of:
    - range: Asset
    - range: Basket
    - range: Index

  baseValue:
    range: decimal
    description: 'The 1st value in the arithmetic operation, which may be non-commutative in some cases: Subtract, Divide).
      This 1st operand is called ''baseValue'' as it refers to the price anchor in the arithmetic operation: e.g. the clean
      price (Bond) or the spot rate (FX).'
    required: true

  operand:
    range: decimal
    description: 'The 2nd value in the arithmetic operation, which may be non-commutative in some cases: Subtract, Divide).
      The 2nd operand is called ''operand'' to distinguish it from the 1st one which is the price anchor.'
    required: true

  arithmeticOperator:
    range: ArithmeticOperationEnum
    description: Specifies the arithmetic operator via an enumeration.
    required: true

  operandType:
    range: PriceOperandEnum
    description: 'Optionally qualifies the type of operand: e.g. accrued or forward point.'

  perUnitOf:
    range: UnitType
    description: Provides an attribute to define the unit of the thing being priced. For example, {amount, unitOfAmount, PerUnitOfAmount}
      = [10, EUR, Shares] = (10.00 EUR/SHARE) * (300,000 SHARES) = EUR 3,000,000.00 (Shares cancel out in the calculation).

  priceType:
    range: PriceTypeEnum
    description: 'Specifies the price type as an enumeration: interest rate, exchange rate, asset price etc. This attribute
      is mandatory so that prices can always be clasiffied according to their type. The price type implies some constraints
      on the price''s units.'
    required: true

  priceSubType:
    range: PriceSubTypeEnum
    description: Allows further classification of the chosen price type.

  priceExpression:
    range: PriceExpressionEnum
    description: (Optionally) Specifies whether the price is expressed in absolute or percentage terms.

  composite:
    range: PriceComposite
    description: '(Optionally) Specifies the underlying price components if the price can be expressed as a composite: e.g.
      dirty price = clean price + accrued.'

  premiumType:
    range: PremiumTypeEnum
    description: (Optionally) Additional attribute that can further define any premium to the price.

  basketConstituent:
    range: BasketConstituent
    description: Identifies the constituents of the basket
    required: true
    multivalued: true
    inlined_as_list: true

  initialValuationPrice:
    range: PriceSchedule
    description: Specifies an initial price schedule to be associated to an individual underlier that is a basket constituent.
      The multiple cardinality is aligned to the one of the PriceQuantity->price that this price is referencing.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:BasketConstituent.initialValuationPrice

  interimValuationPrice:
    range: PriceSchedule
    description: Specifies an interim price schedule to be associated to an individual underlier that is a basket constituent.
      The multiple cardinality is aligned to the one of the PriceQuantity->price that this price is referencing.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:BasketConstituent.interimValuationPrice

  finalValuationPrice:
    range: PriceSchedule
    description: Specifies a final price schedule to be associated to an individual underlier that is a basket constituent.
      The multiple cardinality is aligned to the one of the PriceQuantity->price that this price is referencing.
    multivalued: true
    inlined_as_list: true
    close_mappings:
    - fpml_5_10:BasketConstituent.finalValuationPrice

  sourceProvider:
    range: InformationProviderEnum
    description: An information source for obtaining a market data point. For example Bloomberg, Reuters, Telerate, etc.
    required: true
    annotations:
      metadata_scheme: true

  sourcePage:
    range: string
    description: A specific page for the source for obtaining a market data point. In FpML, this is specified as a scheme,
      rateSourcePageScheme, for which no coding Scheme or URI is specified.
    annotations:
      metadata_scheme: true

  sourcePageHeading:
    range: string
    description: The heading for the source on a given source page.

  currency1:
    range: string
    description: The first currency specified when a pair of currencies is to be evaluated.
    required: true
    annotations:
      metadata_scheme: true

  currency2:
    range: string
    description: The second currency specified when a pair of currencies is to be evaluated.
    required: true
    annotations:
      metadata_scheme: true

  quoteBasis:
    range: QuoteBasisEnum
    description: The method by which the exchange rate is quoted.
    required: true

  interestRateCurve:
    range: InterestRateCurve

  commodityCurve:
    range: CommodityReferencePriceEnum
    annotations:
      metadata_scheme: true

  tenor:
    range: Period
    required: true

  marketFixedRate:
    range: decimal
    description: An optional element that only has meaning in a credit index trade. This element contains the credit spread
      ('fair value') at which the trade was executed. Unlike the fixedRate of an index, the marketFixedRate varies over the
      life of the index depending on market conditions. The marketFixedRate is the price of the index as quoted by trading
      desks.

  initialPoints:
    range: decimal
    description: An optional element that contains the up-front points expressed as a percentage of the notional. An initialPoints
      value of 5% would be represented as 0.05. The initialPoints element is an alternative to marketFixedRate in quoting
      the traded level of a trade. When initialPoints is used, the traded level is the sum of fixedRate and initialPoints.
      The initialPoints is one of the items that are factored into the initialPayment calculation and is payable by the Buyer
      to the Seller. Note that initialPoints and marketFixedRate may both be present in the same document when both implied
      values are desired.

  marketPrice:
    range: decimal
    description: An optional element that only has meaning in a credit index trade. This element contains the price at which
      the trade was executed and is used instead of marketFixedRate on credit trades on certain indicies which are quoted
      using a price rather than a spread.

  quotationStyle:
    range: QuotationStyleEnum
    description: An optional element that contains the up-front points expressed as a percentage of the notional. An initialPoints
      value of 5% would be represented as 0.05. The initialPoints element is an alternative to marketFixedRate in quoting
      the traded level of a trade. When initialPoints is used, the traded level is the sum of fixedRate and initialPoints.
      The initialPoints is one of the items that are factored into the initialPayment calculation and is payable by the Buyer
      to the Seller. Note that initialPoints and marketFixedRate may both be present in the same document when both implied
      values are desired.

  swapUnwindValue:
    range: SwapCurveValuation
    required: true

  makeWholeAmount:
    range: MakeWholeAmount
    description: Amount to be paid by the buyer of the option if the option is exercised prior to the Early Call Date. (The
      market practice in the convertible bond option space being that the buyer should be penalised if he/she exercises the
      option early on.)

  interpolationMethod:
    range: InterpolationMethodEnum
    description: The type of interpolation method that the calculation agent reserves the right to use.

  earlyCallDate:
    range: date
    description: Date prior to which the option buyer will have to pay a Make Whole Amount to the option seller if he/she
      exercises the option.
    required: true

  spread:
    range: decimal
    description: Spread in basis points over the floating rate index.
    required: true

  side:
    range: QuotationSideEnum
    description: The side (bid/mid/ask) of the measure.

  initialValuationDate:
    range: PerformanceValuationDates
    description: Specifies the initial valuation dates of the underlyer.

  interimValuationDate:
    range: PerformanceValuationDates
    description: Specifies the interim valuation dates of the underlyer.

  finalValuationDate:
    range: PerformanceValuationDates
    description: Specifies the final valuation dates of the underlyer.
    required: true

  determinationMethod:
    range: DeterminationMethodEnum
    description: Specifies the method according to which an amount or a date is determined.
    required: true

  valuationTimeType:
    range: TimeTypeEnum
    description: The time of day at which the calculation agent values the underlying, for example the official closing time
      of the exchange.

  settlementRateSource:
    range: FxSettlementRateSource
    required: true

  fixingDate:
    range: AdjustableDate
    description: The date on which the fixing is scheduled to occur.
    required: true

  fixingTime:
    range: BusinessCenterTime
    description: The time that the fixing will be taken along with a business center to define the time zone.

  valuationPostponement:
    range: ValuationPostponement
    description: Specifies how long to wait to get a quote from a settlement rate option upon a price source disruption.

  fallBackSettlementRateOption:
    range: SettlementRateOptionEnum
    description: This settlement rate option will be used in its place.
    multivalued: true
    annotations:
      metadata_scheme: true

  fallbackSurveyValuationPostponement:
    range: boolean
    description: Request rate quotes from the market. This element is set as type Empty in FpML. When present, the FpML synonym
      is mapped to a value True in the CDM.

  calculationAgentDetermination:
    range: CalculationAgent
    description: The calculation agent will decide the rate.

  maximumDaysOfPostponement:
    range: integer
    description: The maximum number of days to wait for a quote from the disrupted settlement rate option before proceeding
      to the next method.
    required: true

  rate:
    range: decimal
    description: The rate of exchange between the two currencies of the leg of a deal. Must be specified with a quote basis.

  primarySource:
    range: InformationSource
    description: The primary source for where the rate observation will occur. Will typically be either a page or a reference
      bank published rate.
    required: true

  secondarySource:
    range: InformationSource
    description: An alternative, or secondary, source for where the rate observation will occur. Will typically be either
      a page or a reference bank published rate.

  adjustedFixingDate:
    range: date
    description: The adjusted fixing date, i.e. the actual date the rate is observed. The date should already be adjusted
      for any applicable business day convention.

  observedRate:
    range: decimal
    description: The actual observed rate before any required rate treatment is applied, e.g. before converting a rate quoted
      on a discount basis to an equivalent yield. An observed rate of 5% would be represented as 0.05.

  treatedRate:
    range: decimal
    description: The observed rate after any required rate treatment is applied. A treated rate of 5% would be represented
      as 0.05.

  observationWeight:
    range: integer
    description: The number of days weighting to be associated with the rate observation, i.e. the number of days such rate
      is in effect. This is applicable in the case of a weighted average method of calculation where more than one reset date
      is established for a single calculation period.

  rateReference:
    range: RateObservation
    description: A pointer style reference to a floating rate component defined as part of a stub calculation period amount
      component. It is only required when it is necessary to distinguish two rate observations for the same fixing date which
      could occur when linear interpolation of two different rates occurs for a stub calculation period.
    annotations:
      metadata_reference: true

  forecastRate:
    range: decimal
    description: The value representing the forecast rate used to calculate the forecast future value of the accrual period.A
      value of 1% should be represented as 0.01.

  treatedForecastRate:
    range: decimal
    description: The value representing the forecast rate after applying rate treatment rules. A value of 1% should be represented
      as 0.01.

  agency:
    range: CreditRatingAgencyEnum
    description: Specifies The credit agency to which the other variables (notation, scale, debt type) refer to.
    required: true

  notation:
    range: string
    description: Specifies The credit rating notation. As it varies among credit rating agencies, FpML doesn't specify a default
      scheme.
    required: true
    annotations:
      metadata_scheme: true

  scale:
    range: string
    description: Specifies the credit rating scale, with a typical distinction between short term, long term. FpML doesn't
      specify a default scheme, which is hence not specified as an enumeration as part of the CDM.
    annotations:
      metadata_scheme: true

  debt:
    range: CreditRatingDebt
    description: Specifies the credit rating debt type (e.g. long term, high yield, deposits, ...) associated with the credit
      rating notation and scale.

  outlook:
    range: CreditRatingOutlookEnum
    description: Assesses the potential direction of a long-term credit rating over the intermediate term, which is generally
      up to two years for investment grade and generally up to one year for speculative grade.

  creditWatch:
    range: CreditRatingCreditWatchEnum
    description: Indicates the potential direction of a short-term or long-term rating. It focuses on identifiable events
      and short-term trends that cause ratings to be placed under special surveillance.

  creditNotation:
    range: CreditNotation
    description: Specifies only one credit notation is determined.

  creditNotations:
    range: MultipleCreditNotations
    description: Specifies if several credit notations exist, alongside an 'any' or 'all' or all condition.

  debtTypes:
    range: MultipleDebtTypes
    description: Specifies if there are several debt types, alongside an 'any' or 'all' or all condition. As an example, Baa1
      rating is required for any long term debt and deposit.

  condition:
    range: QuantifierEnum
    description: An enumerated element, to qualify whether All or Any credit notation applies.
    required: true

  mismatchResolution:
    range: CreditNotationMismatchResolutionEnum

  referenceAgency:
    range: CreditRatingAgencyEnum

  nonstandardSettlementRate:
    range: FxInformationSource
    description: Indicates that a non-standard rate source will be used for the fixing.

  calculationAgentParty:
    range: AncillaryRoleEnum
    description: Specifies the party which is the ISDA Calculation Agent for the trade. If more than one party is referenced
      then the parties are assumed to be co-calculation agents, i.e. they have joint responsibility.
    close_mappings:
    - fpml_5_10:CalculationAgent.calculationAgentParty

  calculationAgentPartyEnum:
    range: PartyDeterminationEnum
    description: Specifies the ISDA calculation agent responsible for performing duties as defined in the applicable product
      definitions. For example, the Calculation Agent may be defined as being the Non-exercising Party.
    close_mappings:
    - fpml_5_10:CalculationAgent.calculationAgentPartyEnum

  calculationAgentBusinessCenter:
    range: BusinessCenter
    description: The city in which the office through which ISDA Calculation Agent is acting for purposes of the transaction
      is located The short-form confirm for a trade that is executed under a Sovereign or Asia Pacific Master Confirmation
      Agreement ( MCA ), does not need to specify the Calculation Agent. However, the confirm does need to specify the Calculation
      Agent City. This is due to the fact that the MCA sets the value for Calculation Agent but does not set the value for
      Calculation Agent City.
    annotations:
      metadata_scheme: true
    close_mappings:
    - fpml_5_10:CalculationAgent.calculationAgentBusinessCenter

  businessDaysThereafter:
    range: integer
    description: 'The number of business days between successive valuation dates when multiple valuation dates are applicable
      for cash settlement. ISDA 2003 Term: Business Days thereafter.'

  numberValuationDates:
    range: integer
    description: 'Where multiple valuation dates are specified as being applicable for cash settlement, this element specifies
      (a) the number of applicable valuation dates, and (b) the number of business days after satisfaction of all conditions
      to settlement when the first such valuation date occurs, and (c) the number of business days thereafter of each successive
      valuation date. ISDA 2003 Term: Multiple Valuation Dates.'

  businessDays:
    range: integer
    description: 'A number of business days. Its precise meaning is dependant on the context in which this element is used.
      ISDA 2003 Term: Business Day.'

  referenceBanks:
    range: ReferenceBanks
    description: A container for a set of reference institutions that may be called upon to provide rate quotations as part
      of the method to determine the applicable cash settlement amount. If institutions are not specified, it is assumed that
      reference institutions will be agreed between the parties on the exercise date, or in the case of swap transaction to
      which mandatory early termination is applicable, the cash settlement valuation date.

  dealerOrCCP:
    range: AncillaryEntity
    description: 'Holds an identifier for the reference entity that is agreed by both parties as a basis for cash settlement
      calculations. This could be a dealer from whom quotations are obtained by the calculation agent on the reference obligation
      for purposes of cash settlement in a credit event. ISDA 2003 Term: Dealer. This could be the clearing organization (CCP,
      DCO) to which the trade should be cleared, as applicable for cash-settled swaptions.'

  valuationSource:
    range: ValuationSource
    description: The source for obtaining a valuation. This may come from some information source (e.g. Reuters), from a rate
      option fixing (e.g. FX fixing for cross-currency settlement), or from a set of reference banks. This is a mandatory
      attribute as the valuation method relies on one of those sources to be specified.
    required: true

  quotationMethod:
    range: QuotationRateTypeEnum
    description: 'The type of price quotations to be requested from dealers when determining the market value of the reference
      obligation for purposes of cash settlement, or which rate quote is to be observed for a fixing. For example, Bid, Offer,
      Mid-market or Exercising Party Pays. ISDA 2003 Term: Quotation Method. The meaning of Exercising Party Pays is defined
      in the 2000 ISDA Definitions, Section 17.2. Certain Definitions Relating to Cash Settlement, paragraph (j).'

  valuationMethod:
    range: ValuationMethodEnum
    description: 'The ISDA defined methodology for determining the final price of the reference obligation for purposes of
      cash settlement. (ISDA 2003 Term: Valuation Method). For example, Market, Highest etc.'

  quotationAmount:
    range: Money
    description: 'In the determination of a cash settlement amount, if weighted average quotations are to be obtained, the
      quotation amount specifies an upper limit to the outstanding principal balance of the reference obligation for which
      the quote should be obtained. If not specified, the ISDA definitions provide for a fallback amount equal to the floating
      rate payer calculation amount. ISDA 2003 Term: Quotation Amount.'

  minimumQuotationAmount:
    range: Money
    description: 'In the determination of a cash settlement amount, if weighted average quotations are to be obtained, the
      minimum quotation amount specifies a minimum intended threshold amount of outstanding principal balance of the reference
      obligation for which the quote should be obtained. If not specified, the ISDA definitions provide for a fallback amount
      of the lower of either USD 1,000,000 (or its equivalent in the relevant obligation currency) or the quotation amount.
      ISDA 2003 Term: Minimum Quotation Amount.'

  cashCollateralValuationMethod:
    range: CashCollateralValuationMethod
    description: Specifies the parameters representing several mid-market valuation and replacement value methods.

  applicableCsa:
    range: CsaTypeEnum
    description: This may be used to specify what type of CSA (credit support annex/agreement) is to be used for cash settlement
      purposes.
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.applicableCsa

  cashCollateralCurrency:
    range: string
    description: This may be used to indicate the currency of cash collateral for cash settlement purposes.
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.cashCollateralCurrency

  cashCollateralInterestRate:
    range: string
    description: This may be used to indicate the interest rate to be used for cash collateral for cash settlement purposes.
    annotations:
      metadata_scheme: true
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.cashCollateralInterestRate

  agreedDiscountRate:
    range: string
    description: This may be used to indicate the discount rate to be used for cash collateral for cash settlement purposes.
    annotations:
      metadata_scheme: true
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.agreedDiscountRate

  protectedParty:
    range: PartyDeterminationEnum
    description: This may be used to specify which party is protected (e.g. under Replacement Value cash settlement methods).
    multivalued: true
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.protectedParty

  prescribedDocumentationAdjustment:
    range: boolean
    description: This may be used to indicate that 'prescribed documentation adjustment' is applicable.
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod.prescribedDocumentationAdjustment

  optionsExchangeDividends:
    range: boolean
    description: If present and true, then options exchange dividends are applicable.

  additionalDividends:
    range: boolean
    description: If present and true, then additional dividends are applicable.

  allDividends:
    range: boolean
    description: Represents the European Master Confirmation value of 'All Dividends' which, when applicable, signifies that,
      for a given Ex-Date, the daily observed Share Price for that day is adjusted (reduced) by the cash dividend and/or the
      cash value of any non cash dividend per Share (including Extraordinary Dividends) declared by the Issuer. All Dividends
      in accordance with the ISDA 2002 Equity Derivatives Definitions.

classes:
  IndexBase:
    description: Identifies an index by referencing an identifier.
    is_a: AssetBase
    rules:
    - description: Asset type must be Other.
      postconditions:
        slot_conditions:
          assetType:
            equals_string: Other
      preconditions: {}
    comments:
    - 'Rosetta condition: AssetType — assetType = Other'
    slots:
    - name
    - provider
    - assetClass
    slot_usage:
      name:
        description: A description of the Index.
      assetClass:
        range: AssetClassEnum
        description: The Asset Class of the Index.
        required: false
    in_subset:
    - cdm_observable_asset

  FloatingRateIndex:
    description: Specification of an interest rate index which can change over time, e.g. the SONIA (Sterling Overnight Index
      Average) in the UK.
    is_a: IndexBase
    comments:
    - 'Rosetta condition: InterestRateAssetClass — assetClass = AssetClassEnum -> InterestRate'
    slots:
    - floatingRateIndex
    - indexTenor
    in_subset:
    - cdm_observable_asset

  ForeignExchangeRateIndex:
    description: Specification of a rate based on the exchange of a pair of cash assets in specific currencies, e.g. USD versus
      GBP.
    is_a: IndexBase
    comments:
    - 'Rosetta condition: FXAssetClass — assetClass = AssetClassEnum -> ForeignExchange'
    slots:
    - quotedCurrencyPair
    - primaryFxSpotRateSource
    - secondaryFxSpotRateSource
    in_subset:
    - cdm_observable_asset

  InflationIndex:
    description: Specification of an index that measures inflation in a specific market, e.g. the US Consumer Price Index.
    is_a: IndexBase
    comments:
    - 'Rosetta condition: InterestRateAssetClass — assetClass = AssetClassEnum -> InterestRate'
    slots:
    - inflationRateIndex
    - indexTenor
    in_subset:
    - cdm_observable_asset

  CreditIndex:
    description: Specification of an index based on credit risk, typically composed using corporate debt instruments in a
      region or industry sector, e.g. the iTraxx indices.
    is_a: IndexBase
    annotations:
      metadata_key: true
    rules:
    - description: FpML specifies the type associated to indexSeries as a positive integer.
      preconditions:
        slot_conditions:
          indexSeries:
            required: true
      postconditions:
        slot_conditions:
          indexSeries:
            minimum_value: 0
    - description: FpML specifies the type associated to indexVersion as a positive integer.
      preconditions:
        slot_conditions:
          indexAnnexVersion:
            required: true
      postconditions:
        slot_conditions:
          indexAnnexVersion:
            minimum_value: 0
    - description: Index factor is expressed as a decimal and should be a positive number between o and 1.
      preconditions:
        slot_conditions:
          indexFactor:
            required: true
      postconditions:
        slot_conditions:
          indexFactor:
            minimum_value: 0
            maximum_value: 1
    comments:
    - 'Rosetta condition: IndexSeries — if indexSeries exists then indexSeries >= 0'
    - 'Rosetta condition: IndexAnnexVersion — if indexAnnexVersion exists then indexAnnexVersion >= 0'
    - 'Rosetta condition: IndexFactor — if indexFactor exists then indexFactor >= 0 and indexFactor <= 1'
    - 'Rosetta condition: CreditAssetClass — assetClass = AssetClassEnum -> Credit'
    slots:
    - indexSeries
    - indexAnnexVersion
    - indexAnnexDate
    - indexAnnexSource
    - excludedReferenceEntity
    - tranche
    - settledEntityMatrix
    - indexFactor
    - seniority
    slot_usage:
      tranche:
        range: Tranche
        description: This element contains CDS tranche terms.
      seniority:
        range: CreditSeniorityEnum
        description: Seniority of debt instruments comprising the index.
    in_subset:
    - cdm_observable_asset

  EquityIndex:
    description: Specification of an index based on equity securities, e.g. the S&P 500.
    is_a: IndexBase
    comments:
    - 'Rosetta condition: EquityAssetClass — assetClass = AssetClassEnum -> Equity'
    in_subset:
    - cdm_observable_asset

  OtherIndex:
    description: Specification of a user-defined index that does not meet the criteria of other Index data types.
    is_a: IndexBase
    rules:
    - description: The asset class must be explicitly set.
      postconditions:
        slot_conditions:
          assetClass:
            required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AssetClassRequired — assetClass exists'
    slots:
    - description
    slot_usage:
      description:
        description: A description that defines the OtherIndex.
    in_subset:
    - cdm_observable_asset

  PriceQuantity:
    description: Defines a settlement as an exchange between two parties of a specified quantity of an asset (the quantity)
      against a specified quantity of another asset (the price). The settlement is optional and can be either cash or physical.
      The quantity can additionally be specified in terms of one or more currency amounts. In the case of non-cash products,
      the settlement of the price/quantity would not be specified here and instead would be delegated to the product mechanics,
      as parameterised by the price/quantity values.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"InterestRateObservableCondition","description":"Implementation for PriceQuantity.InterestRateObservable
        condition.","inputs":[{"name":"pq","type":"PriceQuantity","cardinality":"1..1"}],"output":{"name":"valid","type":"boolean","cardinality":"0..1"}}]'
    comments:
    - 'Rosetta condition: NonCurrencyQuantities — (quantity count - quantity -> unit -> currency count) <= 1 or (observable
      -> Asset -> Commodity exists and quantity -> unit -> capacityUnit exists and (quantity count - quantity -> unit -> currency
      count) <= 2)'
    - 'Rosetta condition: ArithmeticOperator — if observable -> Index -> InterestRateIndex exists and price exists then price
      -> arithmeticOperator exists'
    - 'Rosetta condition: InterestRateObservable — InterestRateObservableCondition'
    - 'Rosetta func: InterestRateObservableCondition — Implementation for PriceQuantity.InterestRateObservable condition.'
    slots:
    - price
    - quantity
    - observable
    - effectiveDate
    slot_usage:
      price:
        range: PriceSchedule
        description: Specifies a price to be used for trade amounts and other purposes.
        multivalued: true
      quantity:
        range: NonNegativeQuantitySchedule
        description: Specifies a quantity to be associated with an event, for example a trade amount.
        multivalued: true
      effectiveDate:
        range: AdjustableOrRelativeDate
        description: Specifies the date at which the price and quantity become effective. This day may be subject to adjustment
          in accordance with a business day convention, or could be specified as relative to a trade date, for instance. Optional
          cardinality, as the effective date is usually specified in the product definition, so it may only need to be specified
          as part of the PriceQuantity in an increase/decrease scenario for an existing trade.
    in_subset:
    - cdm_observable_asset

  PriceComposite:
    description: Defines the inputs required to calculate a price as a simple composite of 2 other values. The inputs consist
      of 2 numbers and a simple arithmetic operator. This generic data type applies to a variety of use cases where a price
      is obtained by simple composition, e.g. dirty = clean + accrued (Bond), forward rate = spot rate + forward point (FX)
      etc.
    comments:
    - 'Rosetta condition: ArithmeticOperator — if operandType = PriceOperandEnum -> ForwardPoint or operandType = PriceOperandEnum
      -> AccruedInterest then arithmeticOperator = ArithmeticOperationEnum -> Add or arithmeticOperator = ArithmeticOperationEnum
      -> Subtract'
    slots:
    - baseValue
    - operand
    - arithmeticOperator
    - operandType
    in_subset:
    - cdm_observable_asset

  PriceSchedule:
    description: 'Specifies the price of a financial instrument in a trade as a schedule of measures. A price generically
      expresses the value of an exchange as a ratio: it measures the amount of one thing needed to be exchanged for 1 unit
      of another thing (e.g. cash in a specific currency in exchange for a bond or share). This generic representation can
      be used to support any type of financial price beyond just cash price: e.g. an interest rate, a foreign exchange rate,
      etc. This data type is generically based on a schedule and can also be used to represent a price as a single value.'
    is_a: MeasureSchedule
    rules:
    - description: The price can be specified mutually exclusively as an operator (e.g. a spread or multiplier) or a composite.
      postconditions:
        any_of:
        - slot_conditions:
            arithmeticOperator:
              required: true
        - slot_conditions:
            composite:
              required: true
      preconditions: {}
    - description: If we are applying a premium to the price then we must define this as a premium in priceType.
      preconditions:
        slot_conditions:
          premiumType:
            required: true
      postconditions:
        slot_conditions:
          priceType:
            equals_string: Premium
    comments:
    - 'Rosetta condition: UnitOfAmountExists — if priceType = Variance or priceType = Volatility or priceType = Correlation
      then unit is absent and perUnitOf is absent else unit exists and perUnitOf exists'
    - 'Rosetta condition: PositiveAssetPrice — if (priceType = ExchangeRate or priceType = AssetPrice) and arithmeticOperator
      is absent then value > 0 or datedValue -> value all > 0'
    - 'Rosetta condition: PositiveSpotRate — if (priceType = ExchangeRate or priceType = AssetPrice) and composite -> baseValue
      exists then composite -> baseValue > 0'
    - 'Rosetta condition: PositivePremium — if priceType = Premium then value > 0'
    - 'Rosetta condition: CurrencyUnitForInterestRate — if priceType = PriceTypeEnum -> InterestRate then unit -> currency
      exists'
    - 'Rosetta condition: Choice — optional choice arithmeticOperator, composite'
    - 'Rosetta condition: Premium — if premiumType exists then priceType = Premium'
    - 'Rosetta condition: ArithmeticOperator — arithmeticOperator <> Subtract and arithmeticOperator <> Divide'
    - 'Rosetta condition: SpreadPrice — if arithmeticOperator = Add then priceType = AssetPrice or priceType = InterestRate'
    - 'Rosetta condition: ForwardPoint — if composite -> operandType = ForwardPoint then priceType = ExchangeRate'
    - 'Rosetta condition: AccruedInterest — if composite -> operandType = AccruedInterest then priceType = AssetPrice'
    - 'Rosetta condition: InterestRateFeeType — if priceSubType = Fee or priceSubType = Rebate then priceType = InterestRate'
    - 'Rosetta func: FilterPrice — Filter list of prices based on price type.'
    annotations:
      rosetta_functions: '[{"name":"FilterPrice","description":"Filter list of prices based on price type.","inputs":[{"name":"prices","type":"PriceSchedule","cardinality":"0..*"},{"name":"priceType","type":"PriceTypeEnum","cardinality":"1..1"},{"name":"arithmeticOperators","type":"ArithmeticOperationEnum","cardinality":"0..*"},{"name":"priceExpression","type":"PriceExpressionEnum","cardinality":"0..1"}],"output":{"name":"price","type":"PriceSchedule","cardinality":"0..1"}}]'
    slots:
    - perUnitOf
    - priceType
    - priceSubType
    - priceExpression
    - composite
    - arithmeticOperator
    - premiumType
    slot_usage:
      arithmeticOperator:
        description: (Optionally) When the price is to be understood as an operator to apply to an observable, i.e. a spread,
          multiplier or min/max.
        required: false
    in_subset:
    - cdm_observable_asset

  Price:
    description: Specifies a price as a single value to be associated to a financial product. This data type extends PriceSchedule
      and requires that only the amount value exists.
    is_a: PriceSchedule
    related_mappings:
    - gist:Magnitude
    rules:
    - description: The amount must exist when the price represents a single value, and steps must be absent.
      postconditions:
        slot_conditions:
          value:
            required: true
          datedValue:
            required: false
      preconditions: {}
    comments:
    - 'Rosetta condition: AmountOnlyExists — value exists and datedValue is absent'
    in_subset:
    - cdm_observable_asset

  Basket:
    description: Defines a custom basket by referencing an identifier and its constituents.
    is_a: AssetBase
    rules:
    - description: Asset type must be Security.
      postconditions:
        slot_conditions:
          assetType:
            equals_string: Security
      preconditions: {}
    comments:
    - 'Rosetta condition: AssetType — assetType = Security'
    slots:
    - basketConstituent
    in_subset:
    - cdm_observable_asset

  BasketConstituent:
    description: Identifies the constituents of the basket
    is_a: Observable
    close_mappings:
    - fpml_5_10:BasketConstituent
    rules:
    - description: To prevent endless looping, baskets of baskets are not supported.
      postconditions:
        slot_conditions:
          Basket:
            required: false
      preconditions: {}
    comments:
    - 'Rosetta condition: BasketsOfBaskets — Basket is absent'
    slots:
    - quantity
    - initialValuationPrice
    - interimValuationPrice
    - finalValuationPrice
    slot_usage:
      quantity:
        range: NonNegativeQuantitySchedule
        description: Specifies a quantity schedule to be associated to an individual underlier that is a basket constituent.
          The multiple cardinality is aligned to the one of the PriceQuantity->quantity that this quantity is referencing.
        multivalued: true
    in_subset:
    - cdm_observable_asset

  InformationSource:
    description: A class defining the source for a piece of information (e.g. a rate fix or an FX fixing). The attribute names
      have been adjusted from FpML to address the fact that the information is not limited to rates.
    slots:
    - sourceProvider
    - sourcePage
    - sourcePageHeading
    in_subset:
    - cdm_observable_asset

  Money:
    description: Defines a monetary amount in a specified currency.
    is_a: Quantity
    annotations:
      metadata_key: true
    close_mappings:
    - gist:Magnitude
    comments:
    - 'Rosetta condition: CurrencyUnitExists — unit -> currency exists'
    in_subset:
    - cdm_observable_asset

  QuotedCurrencyPair:
    description: A class that describes the composition of a rate that has been quoted or is to be quoted. This includes the
      two currencies and the quotation relationship between the two currencies and is used as a building block throughout
      the FX specification.
    slots:
    - currency1
    - currency2
    - quoteBasis
    in_subset:
    - cdm_observable_asset

  Curve:
    deprecated: Deprecated in CDM
    rules:
    - description: Curve
      comments:
      - 'Rosetta one-of: exactly one slot must be present.'
      preconditions: {}
    comments:
    - 'Rosetta condition: Curve — one-of'
    slots:
    - interestRateCurve
    - commodityCurve
    in_subset:
    - cdm_observable_asset

  InterestRateCurve:
    deprecated: Deprecated in CDM
    slots:
    - floatingRateIndex
    - tenor
    in_subset:
    - cdm_observable_asset

  TransactedPrice:
    description: ' A class to represent the transacted price attributes that are positioned as part of the FpML FeeLeg.'
    slots:
    - marketFixedRate
    - initialPoints
    - marketPrice
    - quotationStyle
    in_subset:
    - cdm_observable_asset

  ReferenceSwapCurve:
    description: A complex type used to specify the option and convertible bond option strike when expressed in reference
      to a swap curve.
    slots:
    - swapUnwindValue
    - makeWholeAmount
    in_subset:
    - cdm_observable_asset

  MakeWholeAmount:
    description: A class to specify the amount to be paid by the buyer of the option if the option is exercised prior to the
      Early Call Date (typically applicable to the convertible bond options).
    is_a: SwapCurveValuation
    slots:
    - interpolationMethod
    - earlyCallDate
    in_subset:
    - cdm_observable_asset

  SwapCurveValuation:
    description: A class to specify a valuation swap curve, which is used as part of the strike construct for the bond and
      convertible bond options.
    slots:
    - floatingRateIndex
    - indexTenor
    - spread
    - side
    slot_usage:
      indexTenor:
        description: The ISDA Designated Maturity, i.e. the tenor of the floating rate.
    in_subset:
    - cdm_observable_asset

  ValuationDates:
    description: Defines how and when a performance type option or performance type swap is to be valued, including initial,
      interim and final valuation dates.
    slots:
    - initialValuationDate
    - interimValuationDate
    - finalValuationDate
    in_subset:
    - cdm_observable_asset

  PerformanceValuationDates:
    description: Defines how and when a performance type option or performance type swap is to be valued.
    annotations:
      metadata_key: true
    slots:
    - determinationMethod
    - valuationDates
    - valuationDate
    - valuationTime
    - valuationTimeType
    slot_usage:
      valuationDates:
        range: AdjustableRelativeOrPeriodicDates
        description: '2018 ISDA CDM Equity Confirmation for Security Equity Swap: Pricing Date'
        required: false
      valuationDate:
        range: AdjustableOrRelativeDate
        description: '2018 ISDA CDM Equity Confirmation for Security Equity Swap: Pricing Date'
        required: false
      valuationTime:
        range: BusinessCenterTime
        description: The specific time of day at which the calculation agent values the underlying. The SpecificTime is the
          only case when the valuationTime (time + business center location  e.g. 10:00:00 USNY) should be provided. You should
          be able to provide just the valuationTime without valuationTimeType, which infer that this is a specific time.
        required: false
    in_subset:
    - cdm_observable_asset

  FxRateSourceFixing:
    description: Describes a rate source to be fixed and the date the fixing occurs
    slots:
    - settlementRateSource
    - fixingDate
    in_subset:
    - cdm_observable_asset

  FxInformationSource:
    description: Information source specific to Foreign Exchange products.
    is_a: InformationSource
    slots:
    - fixingTime
    in_subset:
    - cdm_observable_asset

  FallbackReferencePrice:
    description: The method, prioritised by the order it is listed in this element, to get a replacement rate for the disrupted
      settlement rate option.
    comments:
    - 'Rosetta condition: MaximumDaysOfPostponement — if valuationPostponement exists then valuationPostponement -> maximumDaysOfPostponement
      > 0'
    - 'Rosetta condition: FallbackCalculationAgent — if calculationAgentDetermination -> calculationAgentParty exists then
      calculationAgentDetermination -> calculationAgentParty = AncillaryRoleEnum -> CalculationAgentFallback'
    slots:
    - valuationPostponement
    - fallBackSettlementRateOption
    - fallbackSurveyValuationPostponement
    - calculationAgentDetermination
    in_subset:
    - cdm_observable_asset

  ValuationPostponement:
    description: Specifies how long to wait to get a quote from a settlement rate option upon a price source disruption.
    slots:
    - maximumDaysOfPostponement
    in_subset:
    - cdm_observable_asset

  FxRate:
    description: 'A class describing the rate of a currency conversion: pair of currency, quotation mode and exchange rate.'
    slots:
    - quotedCurrencyPair
    - rate
    slot_usage:
      quotedCurrencyPair:
        description: Defines the two currencies for an FX trade and the quotation relationship between the two currencies.
    in_subset:
    - cdm_observable_asset

  FxSpotRateSource:
    description: A class defining the rate source and fixing time for an FX rate.
    slots:
    - primarySource
    - secondarySource
    in_subset:
    - cdm_observable_asset

  RateObservation:
    description: A class defining parameters associated with an individual observation or fixing. This class forms part of
      the cashflow representation of a stream.
    annotations:
      metadata_key: true
    rules:
    - description: FpML specifies observationWeight as a positive integer.
      preconditions:
        slot_conditions:
          observationWeight:
            required: true
      postconditions:
        slot_conditions:
          observationWeight:
            minimum_value: 0
    comments:
    - 'Rosetta condition: PositiveObservationWeight — if observationWeight exists then observationWeight >= 0'
    slots:
    - resetDate
    - adjustedFixingDate
    - observedRate
    - treatedRate
    - observationWeight
    - rateReference
    - forecastRate
    - treatedForecastRate
    slot_usage:
      resetDate:
        description: The reset date.
        required: false
    in_subset:
    - cdm_observable_asset

  CreditNotation:
    description: Represents a class to specify the credit notation as the combination of agency, notation, scale and debt
      type qualifications.
    slots:
    - agency
    - notation
    - scale
    - debt
    - outlook
    - creditWatch
    in_subset:
    - cdm_observable_asset

  CreditNotations:
    description: Represents the credit rating notation higher level construct, which provides the ability to specify multiple
      rating notations.
    slots:
    - creditNotation
    - creditNotations
    in_subset:
    - cdm_observable_asset

  CreditRatingDebt:
    description: Specifies the credit rating debt type(s) associated with the credit rating notation and scale. When several
      debt types are specified, they must be qualified through an 'any' or 'all'.
    slots:
    - debtType
    - debtTypes
    slot_usage:
      debtType:
        range: string
        description: Specifies when there is only one debt type. FpML doesn't specify values in relation to the associated
          scheme, which is hence not specified as an enumeration as part of the CDM.
    in_subset:
    - cdm_observable_asset

  MultipleCreditNotations:
    description: Represetns a class to specify multiple credit notations alongside a conditional 'any' or 'all' qualifier.
    rules:
    - description: If the mismatch resolution is ReferenceAgency, ensure that the reference agency is specified.
      preconditions:
        slot_conditions:
          mismatchResolution:
            equals_string: ReferenceAgency
      postconditions:
        slot_conditions:
          referenceAgency:
            required: true
    comments:
    - 'Rosetta condition: ReferenceAgency — if mismatchResolution = CreditNotationMismatchResolutionEnum -> ReferenceAgency
      then referenceAgency exists'
    slots:
    - condition
    - creditNotation
    - mismatchResolution
    - referenceAgency
    slot_usage:
      creditNotation:
        description: At least two credit notations much be specified.
        required: true
        multivalued: true
    in_subset:
    - cdm_observable_asset

  MultipleDebtTypes:
    description: Represents a class to specify multiple credit debt types alongside a conditional 'any' or 'all' qualifier.
    slots:
    - condition
    - debtType
    slot_usage:
      condition:
        description: An enumerated attribute, to qualify whether All or Any debt type applies.
      debtType:
        range: string
        description: The type of debt, e.g. long term debt, deposit, ... FpML doesn't specific a scheme value, hence no enumeration
          is specified as part of the CDM. At least two debt types much be specified.
        required: true
        multivalued: true
    in_subset:
    - cdm_observable_asset

  FxSettlementRateSource:
    description: The source of the Foreign Exchange settlement rate.
    rules:
    - description: FxSettlementRateSourceChoice
      postconditions:
        exactly_one_of:
        - slot_conditions:
            settlementRateOption:
              required: true
        - slot_conditions:
            nonstandardSettlementRate:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: FxSettlementRateSourceChoice — required choice settlementRateOption, nonstandardSettlementRate'
    slots:
    - settlementRateOption
    - nonstandardSettlementRate
    slot_usage:
      settlementRateOption:
        range: string
        description: Indicates that an officially defined rate settlement rate option will be the used for the fixing.
    in_subset:
    - cdm_observable_asset

  CalculationAgent:
    description: A class defining the ISDA calculation agent responsible for performing duties as defined in the applicable
      product definitions.
    close_mappings:
    - fpml_5_10:CalculationAgent
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            calculationAgentParty:
              required: true
        - slot_conditions:
            calculationAgentPartyEnum:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: CalculationAgentChoice — optional choice calculationAgentParty, calculationAgentPartyEnum'
    slots:
    - calculationAgentParty
    - calculationAgentPartyEnum
    - calculationAgentBusinessCenter
    in_subset:
    - cdm_observable_asset

  SettlementRateOption:
    description: Defines the settlement rate option to use for fixing in case of cash settlement. Currently only applicable
      to foreign exchange fixing in case of cross-currency settlement.
    slots:
    - settlementRateOption
    - priceSourceDisruption
    slot_usage:
      settlementRateOption:
        range: SettlementRateOptionEnum
        description: The rate source for the conversion to the settlement currency. This source is specified through a scheme
          that reflects the terms of the Annex A to the 1998 FX and Currency Option Definitions.
        required: true
      priceSourceDisruption:
        range: PriceSourceDisruption
        description: An attribute defining the parameters to get a new quote when a settlement rate option is disrupted.
    in_subset:
    - cdm_observable_asset

  MultipleValuationDates:
    is_a: SingleValuationDate
    rules:
    - description: FpML specifies businessDaysThereafter as a PositiveInteger.
      preconditions:
        slot_conditions:
          businessDaysThereafter:
            required: true
      postconditions:
        slot_conditions:
          businessDaysThereafter:
            minimum_value: 0
    - description: FpML specifies numberValuationDates as a PositiveInteger.
      preconditions:
        slot_conditions:
          numberValuationDates:
            required: true
      postconditions:
        slot_conditions:
          numberValuationDates:
            minimum_value: 0
    comments:
    - 'Rosetta condition: BusinessDaysThereafter — if businessDaysThereafter exists then businessDaysThereafter >= 0'
    - 'Rosetta condition: NumberValuationDates — if numberValuationDates exists then numberValuationDates >= 0'
    slots:
    - businessDaysThereafter
    - numberValuationDates
    in_subset:
    - cdm_observable_asset

  SingleValuationDate:
    description: A class to specify the number of business days after satisfaction of all conditions to settlement.
    rules:
    - description: FpML specifies businessDays as a NonNegativeInteger.
      preconditions:
        slot_conditions:
          businessDays:
            required: true
      postconditions:
        slot_conditions:
          businessDays:
            minimum_value: 0
    comments:
    - 'Rosetta condition: NonNegativeBusinessDays — if businessDays exists then businessDays >= 0'
    slots:
    - businessDays
    in_subset:
    - cdm_observable_asset

  ValuationSource:
    description: A class describing the method for obtaining a settlement rate, specified through either an information source
      (page), a settlement rate option (fixing) or by using quotes from reference banks.
    rules:
    - description: An information source must be provided.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            informationSource:
              required: true
        - slot_conditions:
            settlementRateOption:
              required: true
        - slot_conditions:
            referenceBanks:
              required: true
        - slot_conditions:
            dealerOrCCP:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: InformationSource — required choice informationSource, settlementRateOption, referenceBanks, dealerOrCCP'
    slots:
    - quotedCurrencyPair
    - informationSource
    - settlementRateOption
    - referenceBanks
    - dealerOrCCP
    slot_usage:
      quotedCurrencyPair:
        description: Defines the two currencies for an FX trade and the quotation relationship between the two currencies.  This
          attribute was formerly part of 'fxSettlementTerms', which is now being harmonised into a common 'CashSettlementTerms'
          that includes a 'ValuationDate'.
        required: false
      informationSource:
        range: FxSpotRateSource
        description: The information source where a published or displayed market rate will be obtained, e.g. Telerate Page
          3750.
      settlementRateOption:
        description: The rate option to use for the fixing. Currently only applicable to foreign exchange fixing in case of
          cross-currency settlement.
    in_subset:
    - cdm_observable_asset

  PriceSourceDisruption:
    description: 'A data defining:  the parameters used to get a price quote to replace the settlement rate option that is
      disrupted.'
    slots:
    - fallbackReferencePrice
    slot_usage:
      fallbackReferencePrice:
        range: FallbackReferencePrice
        required: true
    in_subset:
    - cdm_observable_asset

  ValuationMethod:
    description: Specifies the parameters required to obtain a valuation, including the source, quotation method (bid, mid
      etc.) and any applicable quotation amount.
    comments:
    - 'Rosetta condition: FpML_cd_37 — if (quotationAmount -> unit -> currency exists and minimumQuotationAmount -> unit ->
      currency exists) and quotationAmount -> unit -> currency = minimumQuotationAmount -> unit -> currency then quotationAmount
      -> value > minimumQuotationAmount -> value'
    - 'Rosetta condition: Dealer — if quotationAmount exists or minimumQuotationAmount exists then valuationSource -> dealerOrCCP
      -> legalEntity exists'
    slots:
    - valuationSource
    - quotationMethod
    - valuationMethod
    - quotationAmount
    - minimumQuotationAmount
    - cashCollateralValuationMethod
    in_subset:
    - cdm_observable_asset

  CashCollateralValuationMethod:
    description: This type is a generic structure that can represent the parameters of several mid-market valuation and replacement
      value methods described in the 2021 ISDA Definitions.
    close_mappings:
    - fpml_5_10:CashCollateralValuationMethod
    slots:
    - applicableCsa
    - cashCollateralCurrency
    - cashCollateralInterestRate
    - agreedDiscountRate
    - protectedParty
    - prescribedDocumentationAdjustment
    in_subset:
    - cdm_observable_asset

  DividendApplicability:
    description: The parameters which define whether dividends are applicable
    slots:
    - optionsExchangeDividends
    - additionalDividends
    - allDividends
    in_subset:
    - cdm_observable_asset

  Index:
    abstract: true
    description: An Index is an Observable which is computed based on the prices, rates or valuations of a number of assets
      that are tracked in a standardized way.  Examples include equity market indices as well as indices on interest rates,
      inflation and credit instruments.
    comments:
    - Generated from Rosetta 'choice' construct — represents a union/one-of type.
    union_of:
    - CreditIndex
    - EquityIndex
    - InterestRateIndex
    - ForeignExchangeRateIndex
    - OtherIndex
    in_subset:
    - cdm_observable_asset

  InterestRateIndex:
    abstract: true
    description: An index based in interest rates or inflation rates in a certain market.
    comments:
    - Generated from Rosetta 'choice' construct — represents a union/one-of type.
    union_of:
    - FloatingRateIndex
    - InflationIndex
    in_subset:
    - cdm_observable_asset

  Observable:
    abstract: true
    description: Specifies the object to be observed for a price, it could be an asset or a reference.
    comments:
    - Generated from Rosetta 'choice' construct — represents a union/one-of type.
    union_of:
    - Asset
    - Basket
    - Index
    in_subset:
    - cdm_observable_asset
