      CURRENCY_IMPLIED_RATE__ADR__CURA1:
        description: the Spot Rate for a Rate Calculation Date will be the Reference Currency/U.S. Dollar exchange rate, expressed
          as the amount of Reference Currency per one U.S. Dollar, determined on the basis of quotations provided by Reference
          Dealers on that Rate Calculation Date of that day's price of a Specified Company's American Depositary Receipt or
          American Depositary Receipts (the 'ADR' or 'ADRs', as appropriate) and the price of the local share or shares of
          such Specified Company of the same type and in the same quantity represented by such ADR or ADRs, as the case may
          be (the 'Share' or 'Shares', as appropriate). The Calculation Agent will request each of the Reference Dealers to
          provide a firm quotation of (A) in the case where one ADR represents less than one Share, its bid and offer price
          (in the Reference Currency) for one Share and its bid and offer price (in U.S. Dollars) for the number of ADRs which
          represent such Share and (B) in all other cases, its bid and offer price (in the Reference Currency) for the Share
          or Shares, as the case may be, and its bid and offer price (in U.S. Dollars) for one ADR. If one or more quotations
          are provided, the rate for a Rate Calculation Date will equal the ratio of (1) the arithmetic mean of the midpoint
          of the bid and offer prices quoted in the Reference Currency by each Reference Dealer for such Share or Shares,
          as the case may be, and (2) the arithmetic mean of the midpoint of the bid and offer prices quoted in U.S. Dollars
          by each Reference Dealer for such ADR or ADRs, as the case may be, subject to an adjustment, if any, by the Calculation
          Agent to reduce the effect of momentary disparities in the prices of the Share or Shares and the ADR or ADRs, as
          appropriate. The quotations used to determine the Spot Rate for a Rate Calculation Date will be determined in each
          case at the Specified Time on the Rate Calculation Date or, if no such time is specified, the time chosen by the
          Calculation Agent.
        aliases:
        - CURRENCY-IMPLIED.RATE.(ADR)/CURA1
      CURRENCY_IMPLIED_RATE__LOCAL_ASSET__CURA2:
        description: The Spot Rate for a Rate Calculation Date will be the Reference Currency/Settlement Currency exchange
          rate, expressed as the amount of Reference Currency per one unit of Settlement Currency, determined on the basis
          of quotations provided by Reference Dealers on that Rate Calculation Date for that day's price of Local Assets.
          The Calculation Agent will request each of the Reference Dealers to provide a firm quotation of its bid and offer
          price (in both the Reference Currency and the Settlement Currency) for an amount of Local Assets whose face value
          equals the Specified Amount. If one or more quotations are provided, the rate for a Rate Calculation Date will equal
          the ratio of (A) the arithmetic mean of the midpoint of the bid and offer prices quoted in the Reference Currency
          by each Reference Dealer for such Local Assets and (B) the arithmetic mean of the midpoint of the bid and offer
          prices quoted in the Settlement Currency by each Reference Dealer for such Local Assets. The quotations used to
          determine the Spot Rate for a Rate Calculation Date will be determined in each case at the Specified Time on the
          Rate Calculation Date or, if no such time is specified, the time chosen by the Calculation Agent.
        aliases:
        - CURRENCY-IMPLIED.RATE.(LOCAL.ASSET)/CURA2
      CURRENCY_MUTUAL_AGREEMENT_CURA3:
        description: The Spot Rate for a Rate Calculation Date will be the Reference Currency/Settlement Currency Specified
          Rate, expressed as the amount of the Reference Currency per one unit of Settlement Currency, for settlement on the
          Settlement Date agreed upon by the parties on or prior to that Rate Calculation Date (or, if different, the day
          on which rates for that date would, in the ordinary course, be published or announced).
        aliases:
        - CURRENCY-MUTUAL.AGREEMENT/CURA3
      CURRENCY_REFERENCE_DEALERS_CURA4:
        description: The Spot Rate for a Rate Calculation Date will be determined on the basis of quotations provided by Reference
          Dealers on that Rate Calculation Date of that day's Specified Rate, expressed as the amount of Reference Currency
          per one unit of Settlement Currency, for settlement on the Settlement Date. The Calculation Agent will request the
          Specified Office of each of the Reference Dealers to provide a firm quotation of its Specified Rate for a transaction
          where the amount of Reference Currency equals the Specified Amount. If four quotations are provided, the rate for
          a Rate Calculation Date will be the arithmetic mean of the Specified Rates, without regard to the Specified Rates
          having the highest and lowest value. If exactly three quotations are provided, the rate for a Rate Calculation Date
          will be the Specified Rate provided by the Reference Dealer that remains after disregarding the Specified Rates
          having the highest and lowest values. For this purpose, if more than one quotation has the same highest value or
          lowest value, then the Specified Rate of one of such quotations shall be disregarded. If exactly two quotations
          are provided, the rate for a Rate Calculation Date will be the arithmetic mean of the Specified Rates. If only one
          quotation is provided, the rate for a Rate Calculation Date will be the Specified Rate quoted by that Reference
          Dealer. The quotations used to determine the Spot Rate for a Rate Calculation Date will be determined in each case
          at the Specified Time on that Rate Calculation Date or, if no such time is specified, the time chosen by the Calculation
          Agent.
        aliases:
        - CURRENCY-REFERENCE.DEALERS/CURA4
      CURRENCY_WHOLESALE_MARKET_CURA5:
