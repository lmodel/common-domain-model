    permissible_values:
      Linear:
        description: Linear Interpolation applicable.
        meaning: http://www.fpml.org/coding-scheme/interpolation-method-1-2#Linear
      LinearZeroYield:
        description: Linear Interpolation applicable.
        meaning: http://www.fpml.org/coding-scheme/interpolation-method-1-2#LinearZeroYield
      None:
        description: No Interpolation applicable.
        meaning: http://www.fpml.org/coding-scheme/interpolation-method-1-2#None

  SettlementRateOptionEnum:
    description: The enumerated values to specify the settlement rate options as specified in the Annex A to the 1998 FX and
      Currency Options Definitions.
    exact_mappings:
    - http://www.fpml.org/coding-scheme/settlement-rate-option
    permissible_values:
      ARS_BNAR_ARS01:
        description: The Spot Rate for a Rate Calculation Date will be the Argentine Peso/U.S. Dollar Specified Rate, expressed
          as the amount of Argentine Pesos per one U.S. Dollar, for settlement on the same day (or, if such day is not a Business
          Day in New York, for settlement on the first succeeding day that is a Business Day in both Buenos Aires and New
          York) which appears on the Reuters Screen BNAR Page at the close of business in Buenos Aires on that Rate Calculation
          Date.
        aliases:
        - ARS.BNAR/ARS01
      ARS_EMTA_INDICATIVE_SURVEY_RATE_ARS04:
        description: The Spot Rate for a Rate Calculation Date will be the Argentine Peso/U.S. Dollar Specified Rate for U.S.
          Dollars, expressed as the amount of Argentine Pesos per one U.S. Dollar, for settlement on the same day, as published
          on EMTA's web site (www.emta.org) at approximately 1:00 p.m. (Buenos Aires time), or as soon thereafter as practicable,
          on such Rate Calculation Date. The Spot Rate shall be calculated by EMTA (or a service provider EMTA may select
          in its sole discretion) pursuant to the EMTA ARS Indicative Survey Methodology (which means a methodology, dated
          as of January 2, 2003, as amended from time to time, for a centralized industry-wide survey of financial institutions
          that are active participants in the Argentine Peso/U.S. Dollar markets for the purpose of determining the EMTA ARS
          Indicative Survey Rate).
        aliases:
        - ARS.EMTA.INDICATIVE.SURVEY.RATE/ARS04
      ARS_EMTA_INDUSTRY_SURVEY_RATE_ARS03:
        description: The Spot Rate for a Rate Calculation Date will be the Argentine Peso/U.S. Dollar Specified Rate for U.S.
          Dollars, expressed as the amount of Argentine Pesos per one U.S. Dollar, for settlement on the same day, as published
          on EMTA's web site (www.emta.org) at approximately 1:00 p.m. (Buenos Aires time), or as soon thereafter as practicable,
          on such Rate Calculation Date. The Spot Rate shall be calculated by EMTA (or a service provider EMTA may select
          in its sole discretion) pursuant to the EMTA ARS Industry Survey Methodology (which means a methodology, dated as
          of January 2, 2003, as amended from time to time, for a centralized industry-wide survey of financial institutions
          in Buenos Aires that are active participants in the Argentine Peso/U.S. Dollar spot markets for the purpose of determining
          the EMTA ARS Industry Survey Rate).
        aliases:
        - ARS.EMTA.INDUSTRY.SURVEY.RATE/ARS03
      ARS_MAE_ARS05:
        description: The Spot Rate for a Rate Calculation Date will be the volume weighted average Argentine Peso/U.S. Dollar
          Rate of all trades executed in the electronic market for a Rate Calculation Day expressed as the amount of Argentine
          Pesos per one U.S. Dollar, for settlement on the same day, reported by the Mercado Abierto Electronico (the 'MAE')
          at approximately 3:00 pm, Buenos Aires time, and published on the FOREX-MAE Page as the 'PPN' rate ('Promedio Ponderado
          Noticiado') on www.mae.com.ar on that Rate Calculation Date.
        aliases:
        - ARS.MAE/ARS05
      ARS_OFFICIAL_RATE_ARS02:
        description: The Spot Rate for a Rate Calculation Date will be the Argentine Peso/U.S. Dollar offered rate for U.S.
          Dollars, expressed as the amount of Argentine Pesos per one U.S. Dollar, for settlement on the same day quoted by
          Banco de la Nacion (in accordance with the Convertibility Law of March 27, 1991 and Regulatory Decree No. 529/91
          of April 1, 1991, as may be amended from time to time) for that Rate Calculation Date.
        aliases:
        - ARS.OFFICIAL.RATE/ARS02
      BRL_BRBY_BRL01:
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian Real/U.S. Dollar Specified Rate, expressed
          as the amount of Brazilian Reais per one U.S. Dollar, for settlement in two Business Days (where such days are Business
          Days in both Sao Paulo and New York) which appears on the Reuters Screen BRBY Page under the caption 'INTBK FLTING
          (LAST)' at approximately 11:00 a.m., Sao Paulo time, on that Rate Calculation Date.
        aliases:
        - BRL.BRBY/BRL01
      BRL_EMTA_INDICATIVE_SURVEY_RATE_BRL13:
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian Real/U.S. Dollar Specified Rate for U.S.
          Dollars, expressed as the amount of Brazilian Reais per one U.S. Dollar, for settlement in two Business Days, as
          published on EMTA's web site (www.emta.org) at approximately 12:00 p.m. (Sao Paulo time), or as soon thereafter
