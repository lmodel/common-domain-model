  PriceExpressionEnum:
    description: Enumerated values to specify whether the price is expressed in absolute or relative terms.
    permissible_values:
      AbsoluteTerms:
        description: The price is expressed as an absolute amount.
      PercentageOfNotional:
        description: The price is expressed in percentage of the notional amount.
      ParValueFraction:
        description: Denotes a price expressed in percentage of face value with fractions which is used for quoting bonds,
          e.g. 101 3/8 indicates that the buyer will pay 101.375 of the face value.
      PerOption:
        description: Denotes a price expressed per number of options.

  QuotationSideEnum:
    description: The enumerated values to specify the side from which perspective a value is quoted.
    permissible_values:
      Afternoon:
        description: Denotes a value as the Afternoon fixing reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      Ask:
        description: Denotes a value 'asked' by a seller for an asset, i.e. the value at which a seller is willing to sell.
      Bid:
        description: Denotes a value 'bid' by a buyer for an asset, i.e. the value a buyer is willing to pay.
      Closing:
        description: Denotes a value as the Closing price reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      High:
        description: Denotes a value as the High price reported in or by the relevant Price Source as specified in the relevant
          Confirmation.
      Index:
        description: Denotes a value as the Index price reported in or by the relevant Price Source as specified in the relevant
          Confirmation.
      MeanOfBidAndAsk:
        description: Denotes a value as the Average of the Bid and Ask prices reported in or by the relevant Price Source
          as specified in the relevant Confirmation.
      LocationalMarginal:
        description: Denotes a value as the Locational Marginal price reported in or by the relevant Price Source as specified
          in the relevant Confirmation.
      Low:
        description: Denotes a value as the Low price reported in or by the relevant Price Source as specified in the relevant
          Confirmation.
      MarginalHourly:
        description: Denotes a value as the Marginal Hourly price reported in or by the relevant Price Source as specified
          in the relevant Confirmation.
      MarketClearing:
        description: Denotes a value as the Market Clearing price reported in or by the relevant Price Source as specified
          in the relevant Confirmation.
      MeanOfHighAndLow:
        description: Denotes a value as the Average of the High and Low prices reported in or by the relevant Price Source
          as specified in the relevant Confirmation.
      Morning:
        description: Denotes a value as the Morning fixing reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      Official:
        description: Denotes a value as the Official price reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      Opening:
        description: Denotes a value as the Opening price reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      OSP:
        description: Denotes a value as the Official Settlement Price reported in or by the relevant Price Source as specified
          in the relevant Confirmation.
      Settlement:
        description: Denotes a value as the Settlement price reported in or by the relevant Price Source as specified in the
          relevant Confirmation.
      Spot:
        description: Denotes a value as the Spot price reported in or by the relevant Price Source as specified in the relevant
          Confirmation.
      Mid:
        description: Denotes a value as the Average of the Midpoint of prices reported in or by the relevant Price Source
          as specified in the relevant Confirmation.
      NationalSingle:
        description: Denotes a value as the National Single price reported in or by the relevant Price Source as specified
          in the relevant Confirmation.
      WeightedAverage:
        description: Denotes a value as the Volume Weighted Average of prices effective on the Pricing Date.
      UnWeightedAverage:
        description: Denotes a value as the Non-volume Weighted Average of prices effective on the Pricing Date.

  QuotationStyleEnum:
    description: The enumerated values to specify the actual quotation style (e.g. PointsUpFront, TradedSpread) used to quote
      a credit default swap fee leg.
    permissible_values:
      PointsUpFront:
        description: When quotation style is 'PointsUpFront', the initialPoints element of the Credit Default Swap feeLeg
          should be populated
      TradedSpread:
        description: When quotation style is 'TradedSpread', the marketFixedRate element of the Credit Default Swap feeLeg
          should be populated
      Price:
        description: When quotation style is 'Price', the marketPrice element of the Credit Default Swap feeLeg should be
          populated

