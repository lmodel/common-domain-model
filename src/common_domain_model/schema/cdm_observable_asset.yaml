  QuoteBasisEnum:
    description: The enumerated values to specify how an exchange rate is quoted.
    permissible_values:
      Currency1PerCurrency2:
        description: The amount of currency1 for one unit of currency2
      Currency2PerCurrency1:
        description: The amount of currency2 for one unit of currency1

  QuotationRateTypeEnum:
    description: The enumerated values to specify the type of quotation rate to be obtained from each cash settlement reference
      bank.
    permissible_values:
      Bid:
        description: A bid rate.
      Ask:
        description: An ask rate.
      Mid:
        description: A mid-market rate.
      ExercisingPartyPays:
        description: If optional early termination is applicable to a swap transaction, the rate, which may be a bid or ask
          rate, which would result, if seller is in-the-money, in the higher absolute value of the cash settlement amount,
          or, is seller is out-of-the-money, in the lower absolute value of the cash settlement amount.

  CreditRatingAgencyEnum:
    description: Represents the enumerated values to specify the rating agencies.
    notes:
    - AcadiaSoft AM_1_0 namingConvention "AgencyEnum"
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-rating-agency
    permissible_values:
      AMBest:
        description: A. M. Best
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#AMBest
      CBRS:
        description: Canadian Bond Rating Service
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#CBRS
      DBRS:
        description: Dominion Bond Rating Service
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#DBRS
      Fitch:
        description: Fitch
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#Fitch
      Japanagency:
        description: Japan Credit Rating Agency, Ltd.
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#Japanagency
      Moodys:
        description: Moody's
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#Moodys
      RatingAndInvestmentInformation:
        description: Rating And Investment Information, Inc.
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#RatingAndInvestmentInformation
      StandardAndPoors:
        description: Standard And Poor's
        meaning: http://www.fpml.org/coding-scheme/credit-rating-agency-1-0#StandardAndPoors

  CreditRatingOutlookEnum:
    description: Represents the enumerated values to specify the credit rating outlook.
    permissible_values:
      Positive:
        description: Denotes a rating may be raised.
      Negative:
        description: Denotes a rating may be lowered.
      Stable:
        description: Denotes a rating is not likely to change.
      Developing:
        description: Denotes a rating may be raised, lowered, or affirmed.

  CreditRatingCreditWatchEnum:
    description: Represents the enumerated values to specify the credit watch rating.
    permissible_values:
      Positive:
        description: Denotes a rating may be raised.
      Negative:
        description: Denotes a rating may be lowered.
      Developing:
        description: Denotes a rating may be raised, lowered, or affirmed.

  CreditNotationMismatchResolutionEnum:
    description: Represents an enumeration list to identify the characteristics of the rating if there are several agency
      issue ratings but not equivalent, reference will be made to label characteristics of the rating such as the lowest/highest
      available.
    permissible_values:
      Lowest:
        description: Denotes the lowest credit notation if several notations are listed.
      Highest:
        description: Denotes the highest credit notation if several notations are listed.
      ReferenceAgency:
        description: Denotes that a credit notation issued from a defined reference agency is used if several notations are
          listed.
      Average:
        description: Denotes the average credit notation if several notations are listed.
      SecondBest:
        description: Denotes the second best credit notation if several notations are listed.
      Other:
        description: Utilised where bespoke language represents the label characteristics of the rating.

  CreditNotationBoundaryEnum:
    description: Identifies an agency rating as a simple scale boundary of minimum or maximum.
    permissible_values:
      Minimum:
        description: Denotes a minumum boundary
      Maximum:
        description: Denotes a maxiumum boundary

  InterpolationMethodEnum:
    description: The enumerated values to specify the interpolation method, e.g. linear.
    exact_mappings:
