id: https://w3id.org/finos/cdm/cdm_observable_asset
name: cdm_observable_asset
description: 'Observable asset concepts: schedule, settlement, price and quantity notation etc.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_datetime
- ./cdm_base_math
- ./cdm_base_staticdata_asset_common
- ./cdm_base_staticdata_asset_rates
- ./cdm_base_staticdata_codelist
- ./cdm_base_staticdata_party
- ./cdm_observable_common
- ./cdm_product_asset
- ./cdm_margin_schedule
- ./cdm_base_staticdata_identifier
- ./cdm_event_common
- ./cdm_legaldocumentation_transaction
- ./cdm_legaldocumentation_csa
- ./cdm_legaldocumentation_transaction_additionalterms

comments:
- 'Rosetta func: FilterPrice — Filter list of prices based on price type. | inputs(prices: PriceSchedule (0..*), priceType:
  PriceTypeEnum (1..1), arithmeticOperators: ArithmeticOperationEnum (0..*), priceExpression: PriceExpressionEnum (0..1))
  | output(price: PriceSchedule (0..1))'
- 'Rosetta func: InterestRateObservableCondition — Implementation for PriceQuantity.InterestRateObservable condition. | inputs(pq:
  PriceQuantity (1..1)) | output(valid: boolean (0..1))'
- 'Rosetta func: ObservableIsCommodity — Validates whether all of the constituents of an Observable are Commodities. | inputs(observable:
  Observable (0..1)) | output(valid: boolean (1..1))'
annotations:
  rosetta_functions: '[{"name":"FilterPrice","description":"Filter list of prices based on price type.","inputs":[{"name":"prices","type":"PriceSchedule","cardinality":"0..*"},{"name":"priceType","type":"PriceTypeEnum","cardinality":"1..1"},{"name":"arithmeticOperators","type":"ArithmeticOperationEnum","cardinality":"0..*"},{"name":"priceExpression","type":"PriceExpressionEnum","cardinality":"0..1"}],"output":{"name":"price","type":"PriceSchedule","cardinality":"0..1"}},{"name":"InterestRateObservableCondition","description":"Implementation
    for PriceQuantity.InterestRateObservable condition.","inputs":[{"name":"pq","type":"PriceQuantity","cardinality":"1..1"}],"output":{"name":"valid","type":"boolean","cardinality":"0..1"}},{"name":"ObservableIsCommodity","description":"Validates
    whether all of the constituents of an Observable are Commodities.","inputs":[{"name":"observable","type":"Observable","cardinality":"0..1"}],"output":{"name":"valid","type":"boolean","cardinality":"1..1"}}]'

subsets:
  cdm_observable_asset:
    description: Classes defined in the cdm_observable_asset module.

