        and style, as described in the 2021 ISDA Definitions, Section 6.6.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calcPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"floatingRate","type":"FloatingRateSettingDetails","cardinality":"1..1"}},{"name":"ProcessFloatingRateReset","description":"Entry
        point for the function that performs the floating rate resetting operation.  There are different variations depending
        on the processing type (e.g. screen rate, OIS, modular calculated rate. .","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calcPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"processingType","type":"FloatingRateIndexProcessingTypeEnum","cardinality":"1..1"}],"output":{"name":"floatingRate","type":"FloatingRateSettingDetails","cardinality":"1..1"},"code_implementation":true},{"name":"EvaluateScreenRate","description":"Evaluate/lookup
        the value of a screen rate.","inputs":[{"name":"rateDef","type":"FloatingRate","cardinality":"1..1"},{"name":"resetDates","type":"ResetDates","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"details","type":"FloatingRateSettingDetails","cardinality":"1..1"}}]'
    slots:
    - calculationDetails
    - observationDate
    - resetDate
    - floatingRate
    slot_usage:
      observationDate:
        description: The day upon which the rate was observed (for term rates).
        required: false
      resetDate:
        description: The day for which the rate is needed (e.g. period beginning or end date).
        required: false
      floatingRate:
        range: decimal
        description: The resulting rate that was observed or calculated.
        required: true
        multivalued: false
    in_subset:
    - cdm_product_asset_floatingrate

  FloatingRateProcessingDetails:
    description: Type for reporting the details of the rate treatment.  This could potentially be replaced by the existing
      FloatingRateDefinition type , but this is slightly more detailed.
    comments:
