id: https://w3id.org/finos/cdm/cdm_product_asset_floatingrate
name: cdm_product_asset_floatingrate
description: 'Product-related, asset class-specific floating-rate index concepts, such as rate definitions '
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_math
- ./cdm_observable_asset
- ./cdm_observable_asset_calculatedrate
- ./cdm_product_asset
- ./cdm_product_common_schedule
- ./cdm_observable_event
- ./cdm_event_common
- ./cdm_base_datetime

comments:
- 'Rosetta func: DetermineFloatingRateReset — Get the value of a floating rate by either observing it directly or performing
  a rate calculation.  This function works differently depending on the rate category and style, as described in the 2021
  ISDA Definitions, Section 6.6. | inputs(interestRatePayout: InterestRatePayout (1..1), calcPeriod: CalculationPeriodBase
  (1..1)) | output(floatingRate: FloatingRateSettingDetails (1..1))'
- 'Rosetta func: GetFloatingRateProcessingType — Get a classification of  the floating rate is processed. This is based on
  FRO category, style, and calculation method, as described in the 2021 ISDA Definitions Section 6.6.  The categorization
  information is obtained from the FRO metadata. . | inputs(rateDef: FloatingRateSpecification (1..1)) | output(processingType:
  FloatingRateIndexProcessingTypeEnum (1..1))'
- 'Rosetta func: ProcessFloatingRateReset — Entry point for the function that performs the floating rate resetting operation.  There
  are different variations depending on the processing type (e.g. screen rate, OIS, modular calculated rate. . | inputs(interestRatePayout:
  InterestRatePayout (1..1), calcPeriod: CalculationPeriodBase (1..1), processingType: FloatingRateIndexProcessingTypeEnum
  (1..1)) | output(floatingRate: FloatingRateSettingDetails (1..1))'
- 'Rosetta func: GetCalculatedFROCalculationParameters — Initialize a calculation parameters block for an OIS or a daily average
  rate. Used to support FROs that include an embedded calculation. | inputs(resetDates: ResetDates (1..1), calcMethod: CalculationMethodEnum
  (1..1)) | output(calcParams: FloatingRateCalculationParameters (1..1))'
- 'Rosetta func: EvaluateScreenRate — Evaluate/lookup the value of a screen rate. | inputs(rateDef: FloatingRate (1..1), resetDates:
  ResetDates (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(details: FloatingRateSettingDetails (1..1))'
- 'Rosetta func: DetermineResetDate — Determine the value of the reset date given a reset dates structure and a calculation
  paeriod for which it''s needed. Reset dates are defined in the 2021 ISDA Definition in Section 6.5.5. | inputs(resetDates:
  ResetDates (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(resetDate: date (1..1))'
- 'Rosetta func: DetermineFixingDate — Determine the observation (fixing) date needed given a reset dates structure and a
  reset date. | inputs(resetDates: ResetDates (1..1), resetDate: date (1..1)) | output(fixingDate: date (1..1))'
- 'Rosetta func: GetFloatingRateProcessingParameters — Determine the processing parameters to use from the InterestRatePayout
  by looking them up if necessary from the corresponding schedules in the interest rate stream. | inputs(interestRatePayout:
  InterestRatePayout (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(processingParameters: FloatingRateProcessingParameters
  (1..1))'
- 'Rosetta func: SpreadAmount — Look up the spread amount for a calculation period. | inputs(interestRatePayout: InterestRatePayout
  (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(spread: number (0..1))'
- 'Rosetta func: MultiplierAmount — Look up the multiplier amount for a calculation period. | inputs(interestRatePayout: InterestRatePayout
  (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(multiplier: number (0..1))'
- 'Rosetta func: CapRateAmount — Look up the cap rate amount for a calculation period. | inputs(interestRatePayout: InterestRatePayout
  (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(capRate: number (0..1))'
- 'Rosetta func: FloorRateAmount — Look up the floor rate amount for a calculation period. | inputs(interestRatePayout: InterestRatePayout
  (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(floorRate: number (0..1))'
- 'Rosetta func: GetRateScheduleAmount — Get the rate for the period start date. | inputs(schedule: RateSchedule (1..1), periodStartDate:
  date (1..1)) | output(amount: number (1..1))'
- 'Rosetta func: GetRateScheduleStepValues — Get all rate schedule step values whose stepDate is before or equal to the supplied
  periodStartDate.  Returns a list of step values starting from the initial rate. | inputs(schedule: RateSchedule (1..1),
  periodStartDate: date (1..1)) | output(stepValues: number (0..*))'
- 'Rosetta func: ApplyFloatingRateProcessing — Perform rate treatments on floating rates, such as applying spreads, multipliers,
  caps and floors, rounding, and negative interest treatment. TODO: initialRate needs to be supported.  Also, to support compounding
  methods, it may be necessary to split the before spread and after spread values and return both, so that cashflows can be
  computed both ways. This may require this function to be redesigned or split into pieces (e.g. factor out the post-spread
  processing).  Rate treatments are described in Section 6 of the 2021 ISDA Definitions.  Negative treatment does not correctly
  support the case where compounded periods are applicable and will need to be enhanced for that case when compounding calculations
  are developed. | inputs(processing: FloatingRateProcessingParameters (1..1), rawRate: number (1..1), calculationPeriod:
  CalculationPeriodBase (1..1), isInitialPeriod: boolean (1..1)) | output(details: FloatingRateProcessingDetails (1..1))'
- 'Rosetta func: ApplyFloatingRatePostSpreadProcessing — Perform post-spread rate treatments on floating rates, such as applying
  caps and floors, rounding, and negative interest treatment.  TODOO:  initialRate needs to be supported.  Also, to support
  compounding methods, it may be necessary to split the before spread and after spread values and return both, so that cashflows
  can be computed both ways.  This may require this function to be redesigned or split into pieces (e.g. factor out the post-spread
  processing). | inputs(inputRate: number (1..1), processing: FloatingRateProcessingParameters (1..1)) | output(processedRate:
  number (1..1))'
- 'Rosetta func: ApplyCapsAndFloors — Apply any cap or floor rate as a constraint on a regular swap rate, as discussed in
  the 2021 ISDA Definitions, section 6.5.8 and 6.5.9. | inputs(processing: FloatingRateProcessingParameters (1..1), inputRate:
  number (1..1)) | output(cappedAndFlooredRate: number (1..1))'
- 'Rosetta func: ApplyUSRateTreatment — Apply the US rate treatment logic where applicable (Bond Equivalent Yield, Money Market
  Yield, as described in the 2021 ISDA Definitions, section 6.9. | inputs(baseRate: number (1..1), rateTreatment: RateTreatmentEnum
  (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(treatedRate: number (1..1))'
- 'Rosetta func: ApplyFinalRateRounding — Apply the final rate rounding treatment logic as described in the 2021 ISDA Definitions,
  section 4.8.1. | inputs(baseRate: number (1..1), finalRateRounding: Rounding (0..1)) | output(roundedRate: number (1..1))'
