subsets:
  cdm_product_asset_floatingrate:
    description: Classes defined in the cdm_product_asset_floatingrate module.

enums:
  FloatingRateIndexProcessingTypeEnum:
    description: 'This enumeration provides guidance on how to process a given floating rate index.  It''s based on the ISDA
      Floating Rate Index information, but transforms it into the specific categories needed for calculation '
    permissible_values:
      Screen:
        description: These values are just looked up from the screen and applied.
      CompoundIndex:
        description: A published index calculated using compounding; the implied rate must be backed out.
      OIS:
        description: These are calculated by the calculation agent based on a standard OIS FRO definition.
      OvernightAvg:
        description: These are calculated by the calculation agent based on a standard overnight averaging FRO definition.
      Modular:
        description: These are calculated by the calculation agent based on deal-specific parameters (e.g. lookback compound
          based on an RFR).
      RefBanks:
        description: These must be looked up using a manual process

slots:
  processingDetails:
    range: FloatingRateProcessingDetails
    description: Details fo the floating rate treatment after the rate is observed or calculated.  This will include details
      of things like multipliers, spreads, caps and floors, and the raw and treated rates.

  appliedRate:
    range: decimal
    description: The rate that was actually applied, after all calculations and treatments.
    required: true

  spreadExclusiveCalculatedAMount:
    range: decimal
    description: The amount of the cash flow excluding any spread, for subsequent processing.
    required: true

  calculationDetails:
    range: CalculatedRateDetails
    description: Calculated rate details (observation dates, values, and weights).

  rawRate:
    range: decimal
    description: The raw or untreated rate, prior to any of the rate treatments.
    required: true

  processingParameters:
    range: FloatingRateProcessingParameters

  processedRate:
    range: decimal
    description: The value of the rate after processing.
    required: true

  spreadExclusiveRate:
    range: decimal
    description: The value of the processed rate without the spread applied, for subsequent compounding, etc.
    required: true

  negativeTreatment:
    range: NegativeInterestRateTreatmentEnum
    description: How to handle negative interest rates.

classes:
  FloatingAmountCalculationDetails:
    description: Type for reporting the detailed results of calculating a cash flow for a calculation period.  This is enhanced
      relative to the FpML-based cashflows structure to allow more information to be returned about daily compounded rates.
    slots:
    - calculationPeriod
    - calculationPeriodNotionalAmount
    - floatingRate
    - processingDetails
    - appliedRate
    - yearFraction
    - calculatedAmount
    - spreadExclusiveCalculatedAMount
    slot_usage:
      floatingRate:
        range: FloatingRateSettingDetails
        description: The details of the floating rate setting.  (If it is a calculated rate, details of that calculation will
          be inside that.
        multivalued: false
    in_subset:
    - cdm_product_asset_floatingrate

  FloatingRateSettingDetails:
    description: Type for reporting the raw (untreated) observed or calculated rate for a calculation period.  If this is
      a calculated rate, it allows details of the observations and the resulting rate to be returned.
    comments:
    - 'Rosetta func: DetermineFloatingRateReset — Get the value of a floating rate by either observing it directly or performing
      a rate calculation.  This function works differently depending on the rate category and style, as described in the 2021
      ISDA Definitions, Section 6.6.'
    - 'Rosetta func: ProcessFloatingRateReset — Entry point for the function that performs the floating rate resetting operation.  There
      are different variations depending on the processing type (e.g. screen rate, OIS, modular calculated rate. .'
    - 'Rosetta func: EvaluateScreenRate — Evaluate/lookup the value of a screen rate.'
