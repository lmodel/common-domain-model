id: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
name: cdm_observable_asset_calculatedrate
description: Support for calculated floating rates such as lookback compound or observation shift compound rates
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
default_prefix: common_domain_model
default_range: string

imports:
  - linkml:types
  - ./cdm_base_datetime
  - ./cdm_base_staticdata_asset_rates
  - ./cdm_base_math
  - ./cdm_observable_asset
  - ./cdm_base_staticdata_codelist
  - ./cdm_event_common

comments:
  - 'Rosetta func: EvaluateCalculatedRate — Evaluate a calculated rate as described in the 2021 ISDA Definitions. | inputs(interestRateIndex:
    InterestRateIndex (1..1), calculationParameters: FloatingRateCalculationParameters (1..1), resetDates: ResetDates (0..1),
    calculationPeriod: CalculationPeriodBase (1..1), priorCalculationPeriod: CalculationPeriodBase (0..1), dayCount: DayCountFractionEnum
    (1..1)) | output(results: FloatingRateSettingDetails (1..1))'
  - 'Rosetta func: GenerateObservationDatesAndWeights — Apply shifts to generate the list of observation dates and weights
    for each of those date. | inputs(calculationParams: FloatingRateCalculationParameters (1..1), resetDates: ResetDates (0..1),
    calculationPeriod: CalculationPeriodBase (1..1), priorCalculationPeriod: CalculationPeriodBase (0..1)) | output(results:
    CalculatedRateObservationDatesAndWeights (1..1))'
  - 'Rosetta func: ComputeCalculationPeriod — Determine the calculation period to use for computing the calculated rate (it
    may not be the same as the normal calculation period, for instance if the rate is set in advance. | inputs(calculationPeriod:
    CalculationPeriodBase (1..1), priorCalculationPeriod: CalculationPeriodBase (0..1), calculateRelativeTo: ObservationPeriodDatesEnum
    (0..1), resetDates: ResetDates (0..1)) | output(result: CalculationPeriodBase (1..1))'
  - 'Rosetta func: DetermineObservationPeriod — Determine any applicable offsets/shifts for the period for observing an index,
    and then generate the date range to be used for observing the index, based on the calculation period, plus any applicable
    offsets/shift. | inputs(adjustedCalculationPeriod: CalculationPeriodBase (1..1), calculationParams: FloatingRateCalculationParameters
    (1..1)) | output(observationPeriod: CalculationPeriodBase (1..1))'
  - 'Rosetta func: GenerateObservationPeriod — Generate the date range to be used for observing the index, based on the calculation
    period, plus any applicable offsets/shifts. | inputs(calculationPeriod: CalculationPeriodBase (1..1), businessCenters:
    BusinessCenter (0..*), shiftDays: int (0..1)) | output(observationPeriod: CalculationPeriodBase (1..1))'
  - 'Rosetta func: GenerateObservationDates — Generate the list of observation dates given an observation period. | inputs(observationPeriod:
    CalculationPeriodBase (1..1), businessCenters: BusinessCenter (0..*), lockoutDays: int (0..1)) | output(observationDates:
    date (0..*))'
  - 'Rosetta func: GenerateWeightings — Determine the weighting dates and the corresponding weights to be used for weighting
    observation. | inputs(calculationParams: FloatingRateCalculationParameters (1..1), observationDates: date (0..*), observationPeriod:
    CalculationPeriodBase (1..1), adjustedCalculationPeriod: CalculationPeriodBase (1..1), lockoutDays: int (1..1)) | output(weights:
    number (0..*))'
  - 'Rosetta func: DetermineWeightingDates — Determine the dates to be used for weighting observation. | inputs(calculationParams:
    FloatingRateCalculationParameters (1..1), observationDates: date (0..*), observationPeriod: CalculationPeriodBase (1..1),
    adjustedCalculationPeriod: CalculationPeriodBase (1..1), lockoutDays: int (1..1)) | output(weightingDates: date (0..*))'
  - 'Rosetta func: ProcessObservations — Apply daily observation parameters to rate observation.  These are discussed in the
    2021 ISDA Definitions, section 7.2.3 and 7.2.4. | inputs(calculationParameters: FloatingRateCalculationParameters (1..1),
    rawObservations: number (0..*)) | output(processedObservations: number (0..*))'
  - 'Rosetta func: GenerateWeights — Recursively creates a list of weights based on the date difference between successive
    days. | inputs(weightingDates: date (0..*)) | output(weights: number (0..*))'
  - 'Rosetta func: ApplyCompoundingFormula — Implements the compounding formula:   Product of ( 1 + (rate * weight) / basis),
    then backs out the final rate. This is used to support section 7.3 of the 2021 ISDA Definitions. | inputs(observations:
    number (0..*), weights: number (0..*), yearFrac: number (1..1)) | output(results: CalculatedRateDetails (1..1))'
  - 'Rosetta func: ApplyAveragingFormula — Implements the weighted arithmetic averaging formula.  Sums the weighted rates
    and divides by the total weight.  This is used to support section 7.4 of the 2021 ISDA Definitions. | inputs(observations:
    number (0..*), weights: number (0..*)) | output(results: CalculatedRateDetails (1..1))'
  - 'Rosetta func: IndexValueObservation — Retrieve the values of the supplied index on the specified observation date. |
    inputs(observationDate: date (1..1), interestRateIndex: InterestRateIndex (1..1)) | output(observedValue: number (1..1))'
  - 'Rosetta func: IndexValueObservationMultiple — Retrieve the values of the supplied index on the specified observation
    dates. | inputs(observationDate: date (0..*), interestRateIndex: InterestRateIndex (1..1)) | output(observedValues: number
    (0..*))'
