- linkml:types
- ./cdm_base_datetime
- ./cdm_base_math
- ./cdm_base_staticdata_asset_common
- ./cdm_base_staticdata_asset_credit
- ./cdm_base_staticdata_party
- ./cdm_observable_asset
- ./cdm_product_asset
- ./cdm_product_common_schedule
- ./cdm_event_common
- ./cdm_event_position
- ./cdm_legaldocumentation_transaction
- ./cdm_legaldocumentation_csa
- ./cdm_base_staticdata_identifier
- ./cdm_observable_event

comments:
- 'Rosetta func: UpdateAmountForEachMatchingQuantity — Updates any price or quantity from the list of PriceQuantity if the
  unit of amount matches. | inputs(priceQuantityList: PriceQuantity (1..*), change: PriceQuantity (1..*), direction: QuantityChangeDirectionEnum
  (1..1)) | output(updatedPriceQuantity: PriceQuantity (1..*))'
- 'Rosetta func: FilterChangePriceQuantity — Filter the change PriceQuantity list to match on Observable if present. | inputs(priceQuantity:
  PriceQuantity (0..1), change: PriceQuantity (0..*)) | output(filteredChange: PriceQuantity (0..*))'
- 'Rosetta func: UpdatePriceAmountForEachMatchingQuantity — Updates any price from the PriceSchedule list if the unit of amount
  matches. | inputs(price: PriceSchedule (0..1), change: PriceSchedule (0..*), direction: QuantityChangeDirectionEnum (1..1))
  | output(updatedPrice: PriceSchedule (0..1))'
- 'Rosetta func: UpdateQuantityAmountForEachMatchingQuantity — Updates any quantity from the NonNegativeQuantitySchedule list
  if the unit of amount matches. | inputs(quantity: NonNegativeQuantitySchedule (0..1), change: PriceQuantity (0..*), direction:
  QuantityChangeDirectionEnum (1..1)) | output(updatedQuantity: NonNegativeQuantitySchedule (0..1))'
- 'Rosetta func: PriceUnitEquals — Compares two PriceSchedule to check if all attributes match, except for the amount. | inputs(p1:
  PriceSchedule (0..1), p2: PriceSchedule (0..1)) | output(result: boolean (1..1))'
- 'Rosetta func: SplitQuantityChange — Splits a PriceQuantity list into separate elements, each containing a single quantity
  and its corresponding effective date, if multiple quantities exist. | inputs(changeList: PriceQuantity (1..*)) | output(splitChange:
  PriceQuantity (1..*))'
annotations:
  rosetta_functions: '[{"name":"UpdateAmountForEachMatchingQuantity","description":"Updates any price or quantity from the
    list of PriceQuantity if the unit of amount matches.","inputs":[{"name":"priceQuantityList","type":"PriceQuantity","cardinality":"1..*"},{"name":"change","type":"PriceQuantity","cardinality":"1..*"},{"name":"direction","type":"QuantityChangeDirectionEnum","cardinality":"1..1"}],"output":{"name":"updatedPriceQuantity","type":"PriceQuantity","cardinality":"1..*"}},{"name":"FilterChangePriceQuantity","description":"Filter
    the change PriceQuantity list to match on Observable if present.","inputs":[{"name":"priceQuantity","type":"PriceQuantity","cardinality":"0..1"},{"name":"change","type":"PriceQuantity","cardinality":"0..*"}],"output":{"name":"filteredChange","type":"PriceQuantity","cardinality":"0..*"}},{"name":"UpdatePriceAmountForEachMatchingQuantity","description":"Updates
    any price from the PriceSchedule list if the unit of amount matches.","inputs":[{"name":"price","type":"PriceSchedule","cardinality":"0..1"},{"name":"change","type":"PriceSchedule","cardinality":"0..*"},{"name":"direction","type":"QuantityChangeDirectionEnum","cardinality":"1..1"}],"output":{"name":"updatedPrice","type":"PriceSchedule","cardinality":"0..1"}},{"name":"UpdateQuantityAmountForEachMatchingQuantity","description":"Updates
    any quantity from the NonNegativeQuantitySchedule list if the unit of amount matches.","inputs":[{"name":"quantity","type":"NonNegativeQuantitySchedule","cardinality":"0..1"},{"name":"change","type":"PriceQuantity","cardinality":"0..*"},{"name":"direction","type":"QuantityChangeDirectionEnum","cardinality":"1..1"}],"output":{"name":"updatedQuantity","type":"NonNegativeQuantitySchedule","cardinality":"0..1"}},{"name":"PriceUnitEquals","description":"Compares
    two PriceSchedule to check if all attributes match, except for the amount.","inputs":[{"name":"p1","type":"PriceSchedule","cardinality":"0..1"},{"name":"p2","type":"PriceSchedule","cardinality":"0..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"SplitQuantityChange","description":"Splits
    a PriceQuantity list into separate elements, each containing a single quantity and its corresponding effective date, if
    multiple quantities exist.","inputs":[{"name":"changeList","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"splitChange","type":"PriceQuantity","cardinality":"1..*"}}]'

subsets:
  cdm_product_common_settlement:
    description: Classes defined in the cdm_product_common_settlement module.

enums:
  DeliveryMethodEnum:
    description: Specifies delivery methods for securities transactions. This coding-scheme defines the possible delivery
      methods for securities.
    exact_mappings:
    - http://www.fpml.org/coding-scheme/delivery-method
    permissible_values:
      DeliveryVersusPayment:
        description: Indicates that a securities delivery must be made against payment in simultaneous transmissions and stipulate
          each other.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#DeliveryVersusPayment
      FreeOfPayment:
        description: Indicates that a securities delivery can be made without a simultaneous cash payment in exchange and
          not depending on if payment obligations are fulfilled or not and vice versa.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#FreeOfPayment
      PreDelivery:
        description: Indicates that a securities delivery must be made in full before the payment for the securities; fulfillment
          of payment obligations depends on securities delivery obligations fulfillment.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#PreDelivery
      PrePayment:
        description: Indicates that a payment in full amount must be made before the securities delivery; fulfillment of securities
          delivery obligations depends on payment obligations fulfillment.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#PrePayment

  ScheduledTransferEnum:
    description: The qualification of the type of transfers and cash flows associated with contracts and their lifecycle events.
    permissible_values:
      CorporateAction:
        description: A cash flow corresponding to a corporate action event.
      Coupon:
        description: A cash flow corresponding to the periodic accrued interests.
      CreditEvent:
        description: A cashflow resulting from a credit event.
      DividendReturn:
        description: A cash flow corresponding to the synthetic dividend of an equity underlier asset traded through a derivative
          instrument.
      Exercise:
        description: A cash flow associated with an exercise lifecycle event.
      FixedRateReturn:
        description: A cash flow corresponding to the return of the fixed interest rate portion of a derivative instrument
          that has different types of underlying assets, such as a total return swap.
      FloatingRateReturn:
        description: A cash flow corresponding to the return of the floating interest rate portion of a derivative instrument
          that has different types of underlying assets, such as a total return swap.
      FractionalAmount:
        description: A cash flow corresponding to the compensation for missing assets due to the rounding of digits in the
          original number of assets to be delivered as per payout calculation.
      InterestReturn:
        description: A cash flow corresponding to the return of the interest rate portion of a derivative instrument that
          has different types of underlying assets, such as a total return swap.
      NetInterest:
        description: Net interest across payout components. Applicable to products such as interest rate swaps.
      Performance:
        description: A cash flow corresponding to a performance return.  The settlementOrigin attribute on the Transfer should
          point to the relevant Payout defining the performance calculation.
      Principal:
        description: An amount which corresponds to the notional of the contract for various business reasons. This could
          be associated to a cashflow (e.g. a principal payment) or a transfer (e.g. delivery of an asset).

  UnscheduledTransferEnum:
    description: The qualification of the type of ad-hoc transfers and cash flows that can be associated with contracts and
      their lifecycle events.
    permissible_values:
      Recall:
        description: A recall of securities by the lender who has lent them out.
      Return:
        description: A return by the borrower to the lender of the full or partial quantity of securities on the contract.
      Assignment:
        description: A transfer resulting from the assignment of a contract to a new counterparty.
      BrokerageCommission:
        description: The brokerage commission.
      Increase:
        description: A transfer associated with an increase lifecycle event.
      Novation:
        description: The novation fee.
      PartialTermination:
        description: A transfer associated with a partial termination lifecycle event.
      Premium:
        description: Denotes the amount payable by the buyer to the seller for an option. The premium is paid on the specified
          premium payment date or on each premium payment date if specified.
      Renegotiation:
        description: A transfer associated with a renegotiation lifecycle event.
      Termination:
        description: A transfer associated with a termination lifecycle event.
      Upfront:
        description: An upfront transfer associated to the swap to adjust for a difference between the swap price and the
          current market price.
      CreditEvent:
        description: A transfer associated with a credit event.
      CorporateAction:
        description: A transfer associated with a corporate action

  SettlementTypeEnum:
    description: The enumeration values to specify how the option is to be settled when exercised.
    permissible_values:
      Cash:
        description: The intrinsic value of the option will be delivered by way of a cash settlement amount determined, (i)
          by reference to the differential between the strike price and the settlement price; or (ii) in accordance with a
          bilateral agreement between the parties.
      Physical:
        description: The securities underlying the transaction will be delivered by (i) in the case of a call, the seller
          to the buyer, or (ii) in the case of a put, the buyer to the seller versus a settlement amount equivalent to the
          strike price per share.
      Election:
        description: Allow Election of either Cash or Physical settlement.
      CashOrPhysical:
        description: Allow use of either Cash or Physical settlement without prior Election.

  TransferSettlementEnum:
    description: The enumeration values to specify how the transfer will settle, e.g. DvP.
    permissible_values:
      DeliveryVersusDelivery:
        description: Simultaneous transfer of two assets, typically securities, as a way to avoid settlement risk.
      DeliveryVersusPayment:
        description: Settlement in which the transfer of the asset and the cash settlement are simultaneous.
      PaymentVersusPayment:
        description: Simultaneous transfer of cashflows.
      NotCentralSettlement:
        description: No central settlement.

  StandardSettlementStyleEnum:
    description: The enumerated values to specify whether a trade is settling using standard settlement instructions as well
      as whether it is a candidate for settlement netting.
    permissible_values:
      Standard:
        description: This trade will settle using standard predetermined funds settlement instructions.
      Net:
        description: This trade is a candidate for settlement netting.
      StandardAndNet:
        description: This trade will settle using standard predetermined funds settlement instructions and is a candidate
          for settlement netting.
      PairAndNet:
        description: These trades have been paired and are a candidate for settlement netting.

  CashSettlementMethodEnum:
    description: Defines the different cash settlement methods for a product where cash settlement is applicable.
    permissible_values:
      CashPriceMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (a).
      CashPriceAlternateMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (b).
      ParYieldCurveAdjustedMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (c).
      ZeroCouponYieldAdjustedMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (d).
      ParYieldCurveUnadjustedMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (e).
      CrossCurrencyMethod:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (f) (published
          in Supplement number 23).
      CollateralizedCashPriceMethod:
        description: An ISDA defined cash settlement method (yield curve) used for the determination of the applicable cash
          settlement amount. The method is defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph
          (g) (published in Supplement number 28). The method is defined in the 2021 ISDA Definitions, section 18.2.6.
      MidMarketIndicativeQuotations:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2021 ISDA Definitions, Section 18.2.1.
      MidMarketIndicativeQuotationsAlternate:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2021 ISDA Definitions, Section 18.2.2.
      MidMarketCalculationAgentDetermination:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2021 ISDA Definitions, Section 18.2.3.
      ReplacementValueFirmQuotations:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2021 ISDA Definitions, Section 18.2.4.
      ReplacementValueCalculationAgentDetermination:
        description: An ISDA defined cash settlement method used for the determination of the applicable cash settlement amount.
          The method is defined in the 2021 ISDA Definitions, Section 18.2.5

  SettlementCentreEnum:
    description: Defines the settlement centre for a securities transaction.
    permissible_values:
      EuroclearBank:
        description: Euroclear Bank
      ClearstreamBankingLuxembourg:
        description: ClearStream Banking Luxembourg

slots:
  callFunction:
    range: string
    required: true

  paymentDiscounting:
    range: PaymentDiscounting
    description: FpML specifies the FpML PaymentDiscounting.model group for representing the discounting elements that can
      be associated with a payment.
    close_mappings:
    - fpml_5_10:AssetFlowBase.paymentDiscounting

  assetFlowType:
    range: ScheduledTransferEnum
    description: Type of asset flow corresponding to a scheduled event.
    close_mappings:
    - fpml_5_10:AssetFlow.assetFlowType

  fxLinkedNotionalSchedule:
    range: FxLinkedNotionalSchedule
    description: Multiplier specified as an FX-linked schedule, e.g. for a resetting cross-currency swap..

  multiplierValue:
    range: decimal

  resolvedQuantity:
    range: Quantity
    description: A product's quantity as a single, non-negative amount.  When specified as part of a product definition, this
      quantity attribute would not be set.  Instead it is specified on the quantity notation along with an asset identifier
      matching this payout's asset identifier.  This allows the quantity to be resolved for a payout leg, which can then be
      specified here for convenience during data processing.  There needs to be at least one resolvable quantity across payout
      legs of a product to define an anchor that other payout quantities can refer to.  This attribute is ignored when mapping
      existing FpML messages.

  quantitySchedule:
    range: NonNegativeQuantitySchedule
    description: 'A payout''s quantity specified as a schedule, which may also contain a single value if that quantity is
      constant. There can only be a single quantity schedule applicable to a payout: e.g. the notional for an interest rate
      leg. The quantity must be specified outside of the payout in a PriceQuantity object and only referenced inside the payout
      using an address.'

  quantityReference:
    range: ResolvablePriceQuantity
    description: Reference quantity when resolvable quantity is defined as relative to another (resolvable) quantity. A resolvable
      quantity needs to contain either an absolute quantity or a reference to another (resolvable) quantity. This requirement
      is captured by a choice rule on the class.
    annotations:
      metadata_reference: true

  quantityMultiplier:
    range: QuantityMultiplier
    description: Quantity multiplier is specified on top of a reference quantity and is used as a multiplying factor when
      resolving the quantity. A quantity multiplier can only exist when the resolvable quantity specifies a reference quantity.

  futureValueNotional:
    range: FutureValueAmount
    description: 'The future value notional is specific to BRL CDI swaps, and is specified alongside the notional amount.
      The value is calculated as follows: Future Value Notional = Notional Amount * (1 + Fixed Rate) ^ (Fixed Rate Day Count
      Fraction). The currency should always match that expressed in the notional schedule. The value date should match the
      adjusted termination date.'

  priceSchedule:
    range: PriceSchedule
    description: 'A payout''s price specified as a schedule, which may also contain a single value if that price is constant.
      There may be multiple prices specified for a single payout: e.g. a floating interest rate leg may specify a spread,
      a cap and/or floor and a multiplier. The price must be specified outside of the payout in a PriceQuantity object and
      only referenced inside the payout using an address.'
    multivalued: true
    inlined_as_list: true

  principalPayment:
    range: PrincipalPayments
    description: The specification of the principal exchange. Optional as only applicable in the case of cross-currency or
      zero-coupon swaps with a final payment.

  rollFeature:
    range: RollFeature
    description: 'Used in conjunction with an exchange-based pricing source. Identifies a way in which the futures contracts
      referenced will roll between periods. '
    close_mappings:
    - fpml_5_10:CommodityPriceReturnTerms.rollFeature

  rollSourceCalendar:
    range: RollSourceCalendarEnum
    description: Used in conjunction with an exchange-based pricing source. Identifies a date source calendar from which the
      pricing dates and thus roll to the next contract will be based off (e.g. pricing is based on the NYMEX WTI First Nearby
      Futures Contract, if Future is chosen, the pricing will roll to the next futures contract on expiration, if ListedOption
      is chosen, the pricing will roll to the next futures contract on the Option expiration date which is three business
      days before the expiration of the NYMEX WTI futures contract.) Omitting this element will result in the default behavior
      expected with the pricing source described within the commodity element.

  deliveryDateRollConvention:
    range: Offset
    description: Specifies, for a Commodity Transaction that references a delivery date for a listed future, the day on which
      the specified future will roll to the next nearby month prior to the expiration of the referenced future. If the future
      will not roll at all - i.e. the price will be taken from the expiring contract, 0 should be specified here. If the future
      will roll to the next nearby on the last trading day - i.e. the price will be taken from the next nearby on the last
      trading day, then 1 should be specified and so on.

  specifiedDates:
    range: AdjustableDates
    description: Defines specified dates on which the price will be determined.
    multivalued: true
    inlined_as_list: true

  singleValuationDate:
    range: SingleValuationDate
    description: 'Where single valuation date is specified as being applicable for cash settlement, this element specifies
      the number of business days after satisfaction of all conditions to settlement when such valuation date occurs. ISDA
      2003 Term: Single Valuation Date.'

  multipleValuationDates:
    range: MultipleValuationDates
    description: 'Where multiple valuation dates are specified as being applicable for cash settlement, this element specifies
      (a) the number of applicable valuation dates, and (b) the number of business days after satisfaction of all conditions
      to settlement when the first such valuation date occurs, and (c) the number of business days thereafter of each successive
      valuation date. ISDA 2003 Term: Multiple Valuation Dates.'

  fxFixingDate:
    range: FxFixingDate
    description: The date on which the currency rate will be determined for the purpose of specifying the amount in deliverable
      currency. This attribute was formerly part of 'NonDeliverableSettlement', which is now being harmonised into a common
      'CashSettlementTerms' that includes a 'ValuationDate'.

  fxFixingSchedule:
    range: AdjustableDates
    description: The date, when expressed as a schedule of date(s), on which the currency rate will be determined for the
      purpose of specifying the amount in deliverable currency. This attribute was formerly part of 'NonDeliverableSettlement',
      which is now being harmonised into a common 'CashSettlementTerms' that includes a 'ValuationDate'.

  cashSettlementMethod:
    range: CashSettlementMethodEnum
    description: 'Specifies the type of cash settlement method: cash price, yield curve etc.'
    close_mappings:
    - fpml_5_10:CashSettlementTerms.cashSettlementMethod

  cashSettlementAmount:
    range: Money
    description: 'The amount paid by the seller to the buyer for cash settlement on the cash settlement date. If not otherwise
      specified, would typically be calculated as 100 (or the Reference Price) minus the price of the Reference Obligation
      (all expressed as a percentage) times Floating Rate Payer Calculation Amount. ISDA 2003 Term: Cash Settlement Amount.'
    close_mappings:
    - fpml_5_10:CashSettlementTerms.cashSettlementAmount

  recoveryFactor:
    range: decimal
    description: Used for fixed recovery, specifies the recovery level, determined at contract formation, to be applied on
      a default. Used to calculate the amount paid by the seller to the buyer for cash settlement on the cash settlement date.
      Amount calculation is (1 minus the Recovery Factor) multiplied by the Floating Rate Payer Calculation Amount. The currency
      will be derived from the Floating Rate Payer Calculation Amount.
    close_mappings:
    - fpml_5_10:CashSettlementTerms.recoveryFactor

  fixedSettlement:
    range: boolean
    description: 'Used for Recovery Lock, to indicate whether fixed Settlement is Applicable or Not Applicable. If Buyer fails
      to deliver an effective Notice of Physical Settlement on or before the Buyer NOPS Cut-off Date, and if Seller fails
      to deliver an effective Seller NOPS on or before the Seller NOPS Cut-off Date, then either: (a) if Fixed Settlement
      is specified in the related Confirmation as not applicable, then the Seller NOPS Cut-off Date shall be the Termination
      Date; or (b) if Fixed Settlement is specified in the related Confirmation as applicable, then: (i) if the Fixed Settlement
      Amount is a positive number, Seller shall, subject to Section 3.1 (except for the requirement of satisfaction of the
      Notice of Physical Settlement Condition to Settlement), pay the Fixed Settlement Amount to Buyer on the Fixed Settlement
      Payment Date; and (ii) if the Fixed Settlement Amount is a negative number, Buyer shall, subject to Section 3.1 (except
      for the requirement of satisfaction of the Notice of Physical Settlement Condition to Settlement), pay the absolute
      value of the Fixed Settlement Amount to Seller on the Fixed Settlement Payment Date.'
    close_mappings:
    - fpml_5_10:CashSettlementTerms.fixedSettlement

  accruedInterest:
    range: boolean
    description: 'Indicates whether accrued interest is included (true) or not (false). For cash settlement this specifies
      whether quotations should be obtained inclusive or not of accrued interest. For physical settlement this specifies whether
      the buyer should deliver the obligation with an outstanding principal balance that includes or excludes accrued interest.
      ISDA 2003 Term: Include/Exclude Accrued Interest.'
    close_mappings:
    - fpml_5_10:CashSettlementTerms.accruedInterest

  assignableLoan:
    range: PCDeliverableObligationCharac
    description: 'A deliverable obligation characteristic. A loan that is freely assignable to a bank or financial institution
      without the consent of the Reference Entity or the guarantor, if any, of the loan (or the consent of the applicable
      borrower if a Reference Entity is guaranteeing the loan) or any agent. ISDA 2003 Term: Assignable Loan.'

  consentRequiredLoan:
    range: PCDeliverableObligationCharac
    description: 'A deliverable obligation characteristic. A loan that is capable of being assigned with the consent of the
      Reference Entity or the guarantor, if any, of the loan or any agent. ISDA 2003 Term: Consent Required Loan.'

  directLoanParticipation:
    range: LoanParticipation
    description: 'A deliverable obligation characteristic. A loan with a participation agreement whereby the buyer is capable
      of creating, or procuring the creation of, a contractual right in favour of the seller that provides the seller with
      recourse to the participation seller for a specified share in any payments due under the relevant loan which are received
      by the participation seller. ISDA 2003 Term: Direct Loan Participation.'

  transferable:
    range: boolean
    description: 'A deliverable obligation characteristic. An obligation that is transferable to institutional investors without
      any contractual, statutory or regulatory restrictions. ISDA 2003 Term: Transferable.'

  maximumMaturity:
    range: Period
    description: 'A deliverable obligation characteristic. An obligation that has a remaining maturity from the Physical Settlement
      Date of not greater than the period specified. ISDA 2003 Term: Maximum Maturity.'

  acceleratedOrMatured:
    range: boolean
    description: 'A deliverable obligation characteristic. An obligation at time of default is due to mature and due to be
      repaid, or as a result of downgrade/bankruptcy is due to be repaid as a result of an acceleration clause. ISDA 2003
      Term: Accelerated or Matured.'

  notBearer:
    range: boolean
    description: 'A deliverable obligation characteristic. Any obligation that is not a bearer instrument. This applies to
      Bonds only and is meant to avoid tax, fraud and security/delivery provisions that can potentially be associated with
      Bearer Bonds. ISDA 2003 Term: Not Bearer.'

  indirectLoanParticipation:
    range: LoanParticipation
    description: 'ISDA 1999 Term: Indirect Loan Participation. NOTE: Only applicable as a deliverable obligation under ISDA
      Credit 1999.'

  qualifyingParticipationSeller:
    range: string
    description: 'If Direct Loan Participation is specified as a deliverable obligation characteristic, this specifies any
      requirements for the Qualifying Participation Seller. The requirements may be listed free-form. ISDA 2003 Term: Qualifying
      Participation Seller.'

  partialCashSettlement:
    range: boolean
    description: Specifies whether either 'Partial Cash Settlement of Assignable Loans', 'Partial Cash Settlement of Consent
      Required Loans' or 'Partial Cash Settlement of Participations' is applicable. If this element is specified and Assignable
      Loan is a Deliverable Obligation Characteristic, any Assignable Loan that is deliverable, but where a non-receipt of
      Consent by the Physical Settlement Date has occurred, the Loan can be cash settled rather than physically delivered.
      If this element is specified and Consent Required Loan is a Deliverable Obligation Characteristic, any Consent Required
      Loan that is deliverable, but where a non-receipt of Consent by the Physical Settlement Date has occurred, the Loan
      can be cash settled rather than physically delivered. If this element is specified and Direct Loan Participation is
      a Deliverable Obligation Characteristic, any Participation that is deliverable, but where this participation has not
      been effected (has not come into effect) by the Physical Settlement Date, the participation can be cash settled rather
      than physically delivered.

  businessDaysNotSpecified:
    range: boolean
    description: An explicit indication that a number of business days are not specified and therefore ISDA fallback provisions
      should apply.

  maximumBusinessDays:
    range: integer
    description: A maximum number of business days. Its precise meaning is dependant on the context in which this element
      is used. Intended to be used to limit a particular ISDA fallback provision.

  clearedPhysicalSettlement:
    range: boolean
    description: Specifies whether the swap resulting from physical settlement of the swaption transaction will clear through
      a clearing house. The meaning of Cleared Physical Settlement is defined in the 2006 ISDA Definitions, Section 15.2 (published
      in Supplement number 28).

  predeterminedClearingOrganizationParty:
    range: AncillaryRoleEnum
    description: Specifies the clearing organization (CCP, DCO) to which the trade should be cleared.

  physicalSettlementPeriod:
    range: PhysicalSettlementPeriod
    description: 'The number of business days used in the determination of the physical settlement date. The physical settlement
      date is this number of business days after all applicable conditions to settlement are satisfied. If a number of business
      days is not specified fallback provisions apply for determining the number of business days. If Section 8.5/8.6 of the
      1999/2003 ISDA Definitions are to apply the businessDaysNotSpecified element should be included. If a specified number
      of business days are to apply these should be specified in the businessDays element. If Section 8.5/8.6 of the 1999/2003
      ISDA Definitions are to apply but capped at a maximum number of business days then the maximum number should be specified
      in the maximumBusinessDays element. ISDA 2003 Term: Physical Settlement Period.'

  deliverableObligations:
    range: DeliverableObligations
    description: This element contains all the ISDA terms relevant to defining the deliverable obligations.

  escrow:
    range: boolean
    description: 'If this element is specified and set to ''true'', indicates that physical settlement must take place through
      the use of an escrow agent. (For Canadian counterparties this is always ''Not Applicable''. ISDA 2003 Term: Escrow.'

  sixtyBusinessDaySettlementCap:
    range: boolean
    description: 'If this element is specified and set to ''true'', for a transaction documented under the 2003 ISDA Credit
      Derivatives Definitions, has the effect of incorporating the language set forth below into the confirmation. The section
      references are to the 2003 ISDA Credit Derivatives Definitions. Notwithstanding Section 1.7 or any provisions of Sections
      9.9 or 9.10 to the contrary, but without prejudice to Section 9.3 and (where applicable) Sections 9.4, 9.5 and 9.6,
      if the Termination Date has not occurred on or prior to the date that is 60 Business Days following the Physical Settlement
      Date, such 60th Business Day shall be deemed to be the Termination Date with respect to this Transaction except in relation
      to any portion of the Transaction (an ''Affected Portion'') in respect of which: (1) a valid notice of Buy-in Price
      has been delivered that is effective fewer than three Business Days prior to such 60th Business Day, in which case the
      Termination Date for that Affected Portion shall be the third Business Day following the date on which such notice is
      effective; or (2) Buyer has purchased but not Delivered Deliverable Obligations validly specified by Seller pursuant
      to Section 9.10(b), in which case the Termination Date for that Affected Portion shall be the tenth Business Day following
      the date on which Seller validly specified such Deliverable Obligations to Buyer.'

  paymentPercent:
    range: decimal
    description: A percentage of the notional amount.
    required: true

  notionalAmountReference:
    range: Money
    description: A reference to the notional amount.
    required: true
    annotations:
      metadata_reference: true

  adjustableOrRelativeDate:
    range: AdjustableOrAdjustedOrRelativeDate
    description: A single settlement date subject to adjustment or specified as relative to another date (e.g. the trade date).
      This attribute was formerly part of 'SettlementTerms', which is now being harmonised to include a common 'SettlementDate',
      as inherited from 'SettlementBase'.

  businessDateRange:
    range: BusinessDateRange
    description: A range of contiguous business days. This attribute is meant to be merged with the 'settlementDate' at some
      future point once we refactor 'Date' to use a single complex type across the model. This attributes was formerly part
      of 'CashSettlementPaymentDate', as included into 'OptionCashSettlement' (which is now merged into a unique 'CashSettlementTerms'
      data type.

  cashSettlementBusinessDays:
    range: integer
    description: 'The number of business days used in the determination of the cash settlement payment date. If a cash settlement
      amount is specified, the cash settlement payment date will be this number of business days following the calculation
      of the final price. If a cash settlement amount is not specified, the cash settlement payment date will be this number
      of business days after all conditions to settlement are satisfied. ISDA 2003 Term: Cash Settlement Date. This attribute
      was formerly part of ''CashSettlementTerms'' as used for credit event settlement, which now includes a common ''SettlementDate''
      attribute.'

  dateRelativeToPaymentDates:
    range: DateRelativeToPaymentDates
    description: The payment date references on which settlements in non-deliverable currency are due and will then have to
      be converted according to the terms specified through the other parts of the nonDeliverableSettlement structure.

  dateRelativeToCalculationPeriodDates:
    range: DateRelativeToCalculationPeriodDates
    description: The calculation period references on which settlements in non-deliverable currency are due and will then
      have to be converted according to the terms specified through the other parts of the nonDeliverableSettlement structure.
      Implemented for Brazilian-CDI swaps where it will refer to the termination date of the appropriate leg.

  dateRelativeToValuationDates:
    range: DateRelativeToValuationDates
    description: The calculation period references on which settlements in non-deliverable currency are due and will then
      have to be converted according to the terms specified through the other parts of the nonDeliverableSettlement structure.
      Implemented for Brazilian-CDI swaps where it will refer to the termination date of the appropriate leg.

  cashSettlementTerms:
    range: CashSettlementTerms
    description: Specifies the parameters associated with the cash settlement procedure.
    multivalued: true
    inlined_as_list: true

  physicalSettlementTerms:
    range: PhysicalSettlementTerms
    description: Specifies the physical settlement terms which apply to the transaction.

  paymentRule:
    range: PaymentRule
    description: The calculation rule.
    required: true

  paymentAmount:
    range: Money
    description: A fixed payment amount.

  percentageRule:
    range: PercentageRule
    description: This attribute is not present as part of the FpML construct, as the payment rule is specialised by means
      of runtime type extension through the xsi:type.

  initialPayment:
    range: boolean
    description: A true/false flag to indicate whether there is an initial exchange of principal on the effective date.
    required: true

  finalPayment:
    range: boolean
    description: A true/false flag to indicate whether there is a final exchange of principal on the termination date.
    required: true

  intermediatePayment:
    range: boolean
    description: A true/false flag to indicate whether there are intermediate or interim exchanges of principal during the
      term of the swap.
    required: true

  varyingLegNotionalCurrency:
    range: string
    description: Indicate the Payout legs which nominal amount may vary in regards of FX Fixing dates as determined in the
      product terms.
    multivalued: true

  principalPaymentSchedule:
    range: PrincipalPaymentSchedule
    description: Describe dates schedules for Principal Exchanges and related role of the parties when known.

  initialPrincipalPayment:
    range: PrincipalPayment
    description: Principal Payment made at Trade inception.

  intermediatePrincipalPayment:
    range: AdjustableRelativeOrPeriodicDates
    description: Principal Payment as part of the Trade lifecycle e.g. as part of notional reset adjustements in a Cross Currency
      Swap with a varying notional leg.

  finalPrincipalPayment:
    range: PrincipalPayment
    description: Principal Payment at Trade maturity

  principalPaymentDate:
    range: AdjustableDate
    description: The date where the PrincipalPayment shall be settled.

  principalAmount:
    range: Money
    description: When known at the time the transaction is made, the cash amount to be paid.

  presentValuePrincipalAmount:
    range: Money
    description: The amount representing the present value of the principal payment.

  settlementType:
    range: SettlementTypeEnum
    description: Whether the settlement will be cash, physical, by election, ...
    required: true

  transferSettlementType:
    range: TransferSettlementEnum
    description: The qualification as to how the transfer will settle, e.g. a DvP settlement.

  settlementCurrency:
    range: string
    description: The settlement currency is to be specified when the Settlement Amount cannot be known in advance. The list
      of valid currencies is not presently positioned as an enumeration as part of the CDM because that scope is limited to
      the values specified by ISDA and FpML. As a result, implementers have to make reference to the relevant standard, such
      as the ISO 4217 standard for currency codes.
    annotations:
      metadata_scheme: true
    related_mappings:
    - icma:GMRA#Contractual_Currency

  settlementCentre:
    range: SettlementCentreEnum
    description: 'Optional settlement centre as an enumerated list: Euroclear, Clearstream.'

  settlementProvision:
    range: SettlementProvision
    description: Optionally defines the parameters that regulate a settlement.

  standardSettlementStyle:
    range: StandardSettlementStyleEnum
    description: Settlement Style.

  shapingProvisions:
    range: ShapingProvision
    description: Defines the parameters that are necessary to 'shape' a settlement, i.e. break it down into smaller amounts.

  shapeSchedule:
    range: Money
    description: Defines applicable settlement limits in each currency.
    required: true
    multivalued: true
    inlined_as_list: true

classes:
  ComputedAmount:
    description: A class to specify the outcome of a computed amount, for testing purposes.
    slots:
    - callFunction
    - amount
    - currency
    slot_usage:
      amount:
        range: decimal
      currency:
        description: The currency in which the computed amount is denominated. The list of valid currencies is not presently
          positioned as an enumeration as part of the CDM because that scope is limited to the values specified by ISDA and
          FpML. As a result, implementers have to make reference to the relevant standard, such as the ISO 4217 standard for
          currency codes.
    in_subset:
    - cdm_product_common_settlement

  AssetFlowBase:
    description: 'Defines the basic parameters of an asset transfer, e.g. a cashflow: what (the asset), how much (the quantity)
      and when (the settlement date).'
    close_mappings:
    - fpml_5_10:AssetFlowBase
    comments:
    - 'Rosetta condition: QuantityUnitExists — if asset -> Cash exists then quantity -> unit -> currency exists else if asset
      -> Commodity exists then quantity -> unit -> capacityUnit exists else if asset -> Instrument exists then quantity ->
      unit -> financialUnit exists'
    slots:
    - quantity
    - asset
    - settlementDate
    - paymentDiscounting
    slot_usage:
      quantity:
        range: NonNegativeQuantity
        description: Represents the amount of the asset to be transferred. The cashflow amount is always a positive number,
          as the cashflow direction is implied by the payer/receiver attribute.
        required: true
      asset:
        description: Represents the object that is subject to the transfer, it could be an asset or a reference.
        required: true
      settlementDate:
        range: AdjustableOrAdjustedOrRelativeDate
        description: Represents the date on which the transfer to due.
    in_subset:
    - cdm_product_common_settlement

  AssetFlow:
    description: Specifies an asset flow, i.e. the outcome of either of computation (e.g. interest accrual) or an assessment
      of some sort. The asset flow can then be turned into an asset transfer artefact to be used as the input to a payment
      system or the outcome of it. The associated globalKey denotes the ability to associate a hash value to the AssetFlow
      instantiations for the purpose of model cross-referencing, in support of functionality such as the event effect and
      the lineage.
    is_a: AssetFlowBase
    close_mappings:
    - fpml_5_10:AssetFlow
    slots:
    - payerReceiver
    - assetFlowType
    slot_usage:
      payerReceiver:
        description: Specifies who pays / receives the asset flow, through a normalised Party1 / Party2 enumerator.
        required: true
    in_subset:
    - cdm_product_common_settlement

  QuantityMultiplier:
    description: ' Class to specify a mechanism for a quantity to be set as a multiplier to another (reference) quantity,
      based on a price observation. At the moment this class only supports FX or Equity-linked notional and re-uses existing
      building blocks for those 2 cases, until such time when component can be made more generic. This captures the case of
      resetting cross-currency swaps and resetting equity swaps.'
    slots:
    - fxLinkedNotionalSchedule
    - multiplierValue
    in_subset:
    - cdm_product_common_settlement

  ResolvablePriceQuantity:
    description: 'Generic class to specify the quantity for different payout legs in a contractual product, when that quantity
      can vary across payout legs or across time. A resolvable quantity can always be resolved into a single quantity from
      the quantity notation which has a corresponding asset identifier. In addition to the base case, where quantity is directly
      specified as a number as part of the quantity notation, the other use cases are: (i) quantity based on some pre-defined
      schedule (eg amortising notional), (ii) quantity based on some pre-defined events (eg resetting cross-currency notional),
      or quantity set as reference to another quantity (eg equity notional as no. securities x price).'
    annotations:
      metadata_key: true
    comments:
    - 'Rosetta condition: QuantityMultiplier — if quantityMultiplier exists then quantityReference -> reference exists'
    slots:
    - resolvedQuantity
    - quantitySchedule
    - quantityReference
    - quantityMultiplier
    - reset
    - futureValueNotional
    - priceSchedule
    slot_usage:
      reset:
        range: boolean
        description: Whether the quantity is resettable
    in_subset:
    - cdm_product_common_settlement

  PayoutBase:
    description: A data type that contains the common attributes (e.g. payer and receiver parties) and validation conditions
      that apply across all payout types
    comments:
    - 'Rosetta condition: FinalPrincipalAmountExists — if principalPayment -> principalPaymentSchedule -> finalPrincipalPayment
      exists and priceQuantity -> quantitySchedule exists and priceQuantity -> reset is absent then principalPayment -> principalPaymentSchedule
      -> finalPrincipalPayment -> principalAmount exists or principalPayment -> principalPaymentSchedule -> finalPrincipalPayment
      -> presentValuePrincipalAmount exists'
    slots:
    - payerReceiver
    - priceQuantity
    - principalPayment
    - settlementTerms
    slot_usage:
      payerReceiver:
        description: Canonical representation of the payer and receiver parties applicable to each payout leg.
        required: true
      priceQuantity:
        range: ResolvablePriceQuantity
        description: Each payout leg must implement the quantity concept as a 'resolvable' type, which allows for different
          payout legs to be linked to each other (e.g. in the case of cross-curreny products).
        required: false
        multivalued: false
      settlementTerms:
        description: Each payout leg must specifies its settlement terms, including the delivery type (i.e. cash vs physical,
          and their respective terms), the transfer type (DvP etc.) and settlement date, if any.
        required: false
    in_subset:
    - cdm_product_common_settlement

  CommodityPriceReturnTerms:
    description: Defines parameters in which the commodity price is assessed.
    close_mappings:
    - fpml_5_10:CommodityPriceReturnTerms
    slots:
    - rounding
    - spread
    - rollFeature
    - conversionFactor
    slot_usage:
      rounding:
        range: Rounding
        description: Defines rounding rules and precision to be used in the rounding of a number.
      spread:
        range: SpreadSchedule
        description: Defines a spread value for one or more defined dates.
        required: false
    in_subset:
    - cdm_product_common_settlement

  RollFeature:
    description: 'Used in conjunction with an exchange-based pricing source. Identifies a way in which the futures contracts
      referenced will roll between periods. '
    slots:
    - rollSourceCalendar
    - deliveryDateRollConvention
    in_subset:
    - cdm_product_common_settlement

  PricingDates:
    description: Specifies specific dates or parametric rules for the dates on which the price will be determined
    slots:
    - specifiedDates
    - parametricDates
    slot_usage:
      parametricDates:
        description: Defines rules for the dates on which the price will be determined.
    in_subset:
    - cdm_product_common_settlement

  ValuationDate:
    description: A single object that represents the different methods to specify a valuation date, as used for cash settlement.
      The Single / Multiple ValuationDate is used for the determination of recovery in a credit event, the RelativeDateOffset
      is used for cash-settled option, and FxFixingDate is used for cross-currency settlement.
    slots:
    - singleValuationDate
    - multipleValuationDates
    - valuationDate
    - fxFixingDate
    - fxFixingSchedule
    slot_usage:
      valuationDate:
        range: RelativeDateOffset
        description: The date on which the cash settlement amount will be determined according to the cash settlement method
          if the parties have not otherwise been able to agree the cash settlement amount. This attribute was formerly part
          of 'OptionCashSettlement', which is now being harmonised into a common 'CashSettlementTerms' that includes a 'ValuationDate'.
        required: false
    in_subset:
    - cdm_product_common_settlement

  CashSettlementTerms:
    description: Defines the terms required to compute and settle a cash settlement amount according to a fixing value, including
      the fixing source, fixing method and fixing date. In FpML, PhysicalSettlementTerms and CashSettlementTerms extend SettlementTerms.
      In the CDM, this extension paradigm has not been used because SettlementTerms class has been used for purposes related
      to securities transactions, while it is not used as such in the FpML standard (i.e. only as an abstract construct.
    annotations:
      metadata_key: true
    close_mappings:
    - fpml_5_10:CashSettlementTerms
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            cashSettlementAmount:
              required: true
        - slot_conditions:
            recoveryFactor:
              required: true
      preconditions: {}
    - description: FpML specifies recoveryFactor as a RestrictedPercentage, meaning that it is a decimal which value is restricted
        between 0 and 1.
      preconditions:
        slot_conditions:
          recoveryFactor:
            required: true
      postconditions:
        slot_conditions:
          recoveryFactor:
            minimum_value: 0.0
            maximum_value: 1.0
    comments:
    - 'Rosetta condition: CashSettlementTermsChoice — optional choice cashSettlementAmount, recoveryFactor'
    - 'Rosetta condition: RecoveryFactor — if recoveryFactor exists then recoveryFactor >= 0.0 and recoveryFactor <= 1.0'
    - 'Rosetta condition: CashCollateralMethod — if valuationMethod -> cashCollateralValuationMethod exists then cashSettlementMethod
      = CashSettlementMethodEnum -> MidMarketIndicativeQuotations or cashSettlementMethod = CashSettlementMethodEnum -> MidMarketIndicativeQuotationsAlternate
      or cashSettlementMethod = CashSettlementMethodEnum -> MidMarketCalculationAgentDetermination or cashSettlementMethod
      = CashSettlementMethodEnum -> ReplacementValueFirmQuotations or cashSettlementMethod = CashSettlementMethodEnum -> ReplacementValueCalculationAgentDetermination'
    - 'Rosetta condition: MidMarketValuationMethod — if (valuationMethod -> cashCollateralValuationMethod -> applicableCsa
      exists or valuationMethod -> cashCollateralValuationMethod -> agreedDiscountRate exists or valuationMethod -> cashCollateralValuationMethod
      -> cashCollateralInterestRate exists) then cashSettlementMethod = CashSettlementMethodEnum -> MidMarketIndicativeQuotations
      or cashSettlementMethod = CashSettlementMethodEnum -> MidMarketIndicativeQuotationsAlternate or cashSettlementMethod
      = CashSettlementMethodEnum -> MidMarketCalculationAgentDetermination'
    - 'Rosetta condition: ReplacementValueMethod — if valuationMethod -> cashCollateralValuationMethod -> protectedParty exists
      then cashSettlementMethod = CashSettlementMethodEnum -> ReplacementValueFirmQuotations or cashSettlementMethod = CashSettlementMethodEnum
      -> ReplacementValueCalculationAgentDetermination'
    - 'Rosetta condition: FirmQuotationMethod — if valuationMethod -> cashCollateralValuationMethod -> prescribedDocumentationAdjustment
      exists then cashSettlementMethod = CashSettlementMethodEnum -> ReplacementValueFirmQuotations'
    slots:
    - cashSettlementMethod
    - valuationMethod
    - valuationDate
    - valuationTime
    - cashSettlementAmount
    - recoveryFactor
    - fixedSettlement
    - accruedInterest
    slot_usage:
      valuationMethod:
        range: ValuationMethod
        description: Specifies the parameters required to obtain a valuation, including the source, quotation method (bid,
          mid etc.) and any applicable quotation amount.
      valuationDate:
        range: ValuationDate
        description: Defines the different methods to specify a valuation date, as used for cash settlement. The Single /
          Multiple ValuationDate is used for the determination of recovery in a credit event, the RelativeDateOffset is used
          for cash-settled option, and FxFixingDate is used for cross-currency settlement.
        required: false
      valuationTime:
        range: BusinessCenterTime
        description: 'The time of the cash settlement valuation date when the cash settlement amount will be determined according
          to the cash settlement method, if the parties have not otherwise been able to agree the cash settlement amount.
          When using quations, this is the time of day in the specified business center when the calculation agent seeks quotations
          for an amount of the reference obligation for purposes of cash settlement. ISDA 2003 Term: Valuation Time.'
        required: false
    in_subset:
    - cdm_product_common_settlement

  DeliverableObligations:
    description: A class to specify all the ISDA terms relevant to defining the deliverable obligations.
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            fullFaithAndCreditObLiability:
              required: true
        - slot_conditions:
            generalFundObligationLiability:
              required: true
        - slot_conditions:
            revenueObligationLiability:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: DeliverableObligationsChoice — optional choice fullFaithAndCreditObLiability, generalFundObligationLiability,
      revenueObligationLiability'
    - 'Rosetta condition: FpML_cd_34 — if category exists and category = ObligationCategoryEnum -> ReferenceObligationsOnly
      then acceleratedOrMatured is absent and accruedInterest is absent and assignableLoan is absent and consentRequiredLoan
      is absent and directLoanParticipation is absent and excluded is absent and fullFaithAndCreditObLiability is absent and
      generalFundObligationLiability is absent and indirectLoanParticipation is absent and listed is absent and maximumMaturity
      is absent and notBearer is absent and notContingent is absent and notDomesticCurrency is absent and notDomesticIssuance
      is absent and notDomesticLaw is absent and notSovereignLender is absent and notSubordinated is absent and othReferenceEntityObligations
      is absent and revenueObligationLiability is absent and specifiedCurrency is absent and transferable is absent'
    slots:
    - accruedInterest
    - category
    - notSubordinated
    - specifiedCurrency
    - notSovereignLender
    - notDomesticCurrency
    - notDomesticLaw
    - listed
    - notContingent
    - notDomesticIssuance
    - assignableLoan
    - consentRequiredLoan
    - directLoanParticipation
    - transferable
    - maximumMaturity
    - acceleratedOrMatured
    - notBearer
    - fullFaithAndCreditObLiability
    - generalFundObligationLiability
    - revenueObligationLiability
    - indirectLoanParticipation
    - excluded
    - othReferenceEntityObligations
    slot_usage:
      category:
        required: false
      notContingent:
        description: 'A deliverable obligation characteristic. In essence Not Contingent means the repayment of principal
          cannot be dependant on a formula/index, i.e. to prevent the risk of being delivered an instrument that may never
          pay any element of principal, and to ensure that the obligation is interest bearing (on a regular schedule). ISDA
          2003 Term: Not Contingent.'
    in_subset:
    - cdm_product_common_settlement

  LoanParticipation:
    description: 'A class to specify loan with a participation agreement whereby the buyer is capable of creating, or procuring
      the creation of, a contractual right in favour of the seller that provides the seller with recourse to the participation
      seller for a specified share in any payments due under the relevant loan which are received by the participation seller.
      ISDA 2003 Term: Direct Loan Participation.'
    is_a: PCDeliverableObligationCharac
    slots:
    - qualifyingParticipationSeller
    in_subset:
    - cdm_product_common_settlement

  PCDeliverableObligationCharac:
    description: A class to specify the Partial Cash Deliverable Obligation Characteristic.
    slots:
    - applicable
    - partialCashSettlement
    slot_usage:
      applicable:
        description: Indicates whether the provision is applicable.
    in_subset:
    - cdm_product_common_settlement

  PhysicalSettlementPeriod:
    rules:
    - description: FpML specifies businessDays as a NonNegativeInteger.
      preconditions:
        slot_conditions:
          businessDays:
            required: true
      postconditions:
        slot_conditions:
          businessDays:
            minimum_value: 0
    - description: FpML specifies maximumBusinessDays as a NonNegativeInteger.
      preconditions:
        slot_conditions:
          maximumBusinessDays:
            required: true
      postconditions:
        slot_conditions:
          maximumBusinessDays:
            minimum_value: 0
    comments:
    - 'Rosetta condition: BusinessDays — if businessDays exists then businessDays >= 0'
    - 'Rosetta condition: MaximumBusinessDays — if maximumBusinessDays exists then maximumBusinessDays >= 0'
    slots:
    - businessDaysNotSpecified
    - businessDays
    - maximumBusinessDays
    in_subset:
    - cdm_product_common_settlement

  PhysicalSettlementTerms:
    description: Specifies Physical Settlement Terms characteristics for the settlement of a Credit Default Swap or Option.
    annotations:
      metadata_key: true
    comments:
    - 'Rosetta condition: PredeterminedClearingOrganizationParty — if predeterminedClearingOrganizationParty exists then predeterminedClearingOrganizationParty
      = AncillaryRoleEnum -> PredeterminedClearingOrganizationParty'
    slots:
    - clearedPhysicalSettlement
    - predeterminedClearingOrganizationParty
    - physicalSettlementPeriod
    - deliverableObligations
    - escrow
    - sixtyBusinessDaySettlementCap
    in_subset:
    - cdm_product_common_settlement

  PercentageRule:
    description: A class defining a content model for a calculation rule defined as percentage of the notional amount.
    slots:
    - paymentPercent
    - notionalAmountReference
    in_subset:
    - cdm_product_common_settlement

  SettlementDate:
    description: A data defining the settlement date(s) for cash or physical settlement as either a set of explicit dates,
      together with applicable adjustments, or as a date relative to some other (anchor) date, or as any date in a range of
      contiguous business days. This data type provides a level of abstraction on top of the different legacy methods used
      to specify a settlement / payment date, which vary across product types, asset classes and delivery types.
    annotations:
      metadata_key: true
    rules:
    - description: FpML specifies cashSettlementBusinessDays as a nonNegativeInteger. If cashSettlementBusinessDays is not
        specified, then another settlement date method must be specified.
      preconditions:
        slot_conditions:
          cashSettlementBusinessDays:
            required: true
      postconditions:
        slot_conditions:
          cashSettlementBusinessDays:
            minimum_value: 0
    - description: Settlement date must be specified either throught the 'settlementDate' or 'valueDate' attribute. This is
        a temporary work-around until such time when we can retire the 'valueDate' attribute.
      postconditions:
        any_of:
        - slot_conditions:
            adjustableOrRelativeDate:
              required: true
        - slot_conditions:
            valueDate:
              required: true
        - slot_conditions:
            adjustableDates:
              required: true
        - slot_conditions:
            businessDateRange:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: BusinessDays — if cashSettlementBusinessDays exists then cashSettlementBusinessDays >= 0 else adjustableOrRelativeDate
      exists or valueDate exists or adjustableDates exists or businessDateRange exists'
    - 'Rosetta condition: DateChoice — optional choice adjustableOrRelativeDate, valueDate, adjustableDates, businessDateRange'
    slots:
    - adjustableOrRelativeDate
    - valueDate
    - adjustableDates
    - businessDateRange
    - cashSettlementBusinessDays
    - paymentDelay
    slot_usage:
      valueDate:
        description: The settlement date for a forward settling product. For Foreign Exchange contracts, this represents a
          common settlement date between both currency legs. To specify different settlement dates for each currency leg,
          see the ForeignExchange class. This attribute was formerly part of 'SettlementTerms', which is now being harmonised
          to include a common 'SettlementDate', as inherited from 'SettlementBase'.
        required: false
      adjustableDates:
        description: A series of dates that shall be subject to adjustment if they would otherwise fall on a day that is not
          a business day in the specified business centers, together with the convention for adjusting the date. This attributes
          was formerly part of 'CashSettlementPaymentDate' as included into 'OptionCashSettlement' (which is now merged into
          a unique 'CashSettlementTerms' data type.
    in_subset:
    - cdm_product_common_settlement

  FxFixingDate:
    description: Extends the Offset structure to specify an FX fixing date as an offset to dates specified somewhere else
      in the document.
    is_a: Offset
    rules:
    - description: condition to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            businessCenters:
              required: true
        - slot_conditions:
            businessCentersReference:
              required: true
      preconditions: {}
    - description: condition to represent an FpML choice construct.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            dateRelativeToPaymentDates:
              required: true
        - slot_conditions:
            dateRelativeToCalculationPeriodDates:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: BusinessCentersChoice — optional choice businessCenters, businessCentersReference'
    - 'Rosetta condition: DateChoice — required choice dateRelativeToPaymentDates, dateRelativeToCalculationPeriodDates'
    slots:
    - businessDayConvention
    - businessCenters
    - businessCentersReference
    - dateRelativeToPaymentDates
    - dateRelativeToCalculationPeriodDates
    - dateRelativeToValuationDates
    - fxFixingDate
    slot_usage:
      businessDayConvention:
        required: false
      businessCentersReference:
        description: A reference to a set of financial business centers defined elsewhere in the document. This set of business
          centers is used to determine whether a particular day is a business day or not.
      fxFixingDate:
        range: AdjustableOrRelativeDate
        description: Describes the specific date when a non-deliverable forward or cash-settled option will 'fix' against
          a particular rate, which will be used to compute the ultimate cash settlement. This element should be omitted where
          a single, discrete fixing date cannot be identified e.g. on an american option, where fixing may occur at any date
          on a continuous range.  This attribute was formerly part of 'fxSettlementTerms', which is now being harmonised into
          a common 'CashSettlementTerms' that includes a 'ValuationDate'.
    in_subset:
    - cdm_product_common_settlement

  SettlementTerms:
    description: Specifies the settlement terms, which can either be cash, physical, or fx-based cash-settlement. This class
      can be used for the settlement of options and forwards, cash transactions (e.g. securities or foreign exchange), or
      in case of credit event.
    is_a: SettlementBase
    comments:
    - 'Rosetta condition: OptionSettlementChoice — if cashSettlementTerms exists and physicalSettlementTerms exists then settlementType
      = SettlementTypeEnum -> Election or settlementType = SettlementTypeEnum -> CashOrPhysical'
    - 'Rosetta condition: CashSettlementTerms — if cashSettlementTerms exists then settlementType <> SettlementTypeEnum ->
      Physical'
    - 'Rosetta condition: PhysicalSettlementTerms — if physicalSettlementTerms exists then settlementType <> SettlementTypeEnum
      -> Cash'
    slots:
    - cashSettlementTerms
    - physicalSettlementTerms
    in_subset:
    - cdm_product_common_settlement

  FixedPrice:
    description: A predefined price accorded by the counterparties.
    comments:
    - 'Rosetta condition: NonNegativePrice_amount — if price -> value exists then price -> value >= 0.0'
    - 'Rosetta condition: NonNegativePrice_datedValue — if price -> datedValue exists then price -> datedValue -> value all
      >= 0.0'
    slots:
    - price
    slot_usage:
      price:
        range: PriceSchedule
        description: Fixed price step schedule, including an initial price specified as an absolute number.
    in_subset:
    - cdm_product_common_settlement

  PaymentDetail:
    annotations:
      metadata_key: true
    slots:
    - paymentDate
    - paymentRule
    - paymentAmount
    in_subset:
    - cdm_product_common_settlement

  PaymentDiscounting:
    description: This class corresponds to the FpML PaymentDiscounting.model group for representing the discounting elements
      that can be associated with a payment.
    slots:
    - discountFactor
    - presentValueAmount
    slot_usage:
      discountFactor:
        description: The value representing the discount factor used to calculate the present value of the cash flow.
      presentValueAmount:
        description: The amount representing the present value of the forecast payment.
    in_subset:
    - cdm_product_common_settlement

  PaymentRule:
    description: A class defining the payment calculation rule. As of FpML 5.10, percentage rule is the only calculation rule
      that has been specified as part of the standard.
    slots:
    - percentageRule
    in_subset:
    - cdm_product_common_settlement

  PrincipalPayments:
    description: A class defining which principal exchanges occur for the stream.
    annotations:
      metadata_key: true
    slots:
    - initialPayment
    - finalPayment
    - intermediatePayment
    - varyingLegNotionalCurrency
    - principalPaymentSchedule
    in_subset:
    - cdm_product_common_settlement

  PrincipalPaymentSchedule:
    description: Describe dates schedules for Principal Exchanges and related role of the parties when known.
    comments:
    - 'Rosetta condition: InitialPrincipalAmountExists — if initialPrincipalPayment exists then initialPrincipalPayment ->
      principalAmount exists or initialPrincipalPayment -> presentValuePrincipalAmount exists'
    slots:
    - initialPrincipalPayment
    - intermediatePrincipalPayment
    - finalPrincipalPayment
    in_subset:
    - cdm_product_common_settlement

  PrincipalPayment:
    description: Any kind of principal payments when the amount is known and thus fixed.
    annotations:
      metadata_key: true
    rules:
    - description: PrincipalAmount
      postconditions:
        any_of:
        - slot_conditions:
            principalAmount:
              required: true
        - slot_conditions:
            presentValuePrincipalAmount:
              required: true
      preconditions: {}
    - description: DiscountFactor
      preconditions:
        slot_conditions:
          presentValuePrincipalAmount:
            required: true
      postconditions:
        slot_conditions:
          discountFactor:
            required: true
    comments:
    - 'Rosetta condition: PrincipalAmount — optional choice principalAmount, presentValuePrincipalAmount'
    - 'Rosetta condition: DiscountFactor — if presentValuePrincipalAmount exists then discountFactor exists'
    slots:
    - principalPaymentDate
    - payerReceiver
    - principalAmount
    - discountFactor
    - presentValuePrincipalAmount
    slot_usage:
      payerReceiver:
        description: Specifies the parties responsible for making and receiving payments defined by this structure.
      discountFactor:
        description: The value representing the discount factor used to calculate the present value of the principal payment
          amount.
    in_subset:
    - cdm_product_common_settlement

  SettlementBase:
    description: A base class to be extended by the SettlementTerms class.
    annotations:
      metadata_key: true
    slots:
    - settlementType
    - transferSettlementType
    - settlementCurrency
    - settlementDate
    - settlementCentre
    - settlementProvision
    - standardSettlementStyle
    slot_usage:
      settlementDate:
        range: SettlementDate
        description: The date on which the settlement amount will be paid, subject to adjustment in accordance with any applicable
          business day convention. This component would not be present for a mandatory early termination provision where the
          cash settlement payment date is the mandatory early termination date.
        required: false
    in_subset:
    - cdm_product_common_settlement

  SettlementProvision:
    description: Defines parameters that regulate a settlement, for instance whether this settlement should be netted with
      other ones or broken-down into smaller amounts.
    slots:
    - shapingProvisions
    in_subset:
    - cdm_product_common_settlement

  ShapingProvision:
    description: Defines the applicable settlement limits that may require a settlement to be 'shaped', i.e. broken-down into
      smaller amounts.
    slots:
    - shapeSchedule
    in_subset:
    - cdm_product_common_settlement
