id: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
name: cdm_product_common_settlement
description: 'Common product settlement concepts: cash vs physical, non-deliverable, money and cashflow, delivery vs payment.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common_domain_model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  icma: https://www.icmagroup.org/market-practice-and-regulatory-policy/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
default_prefix: common_domain_model
default_range: string

