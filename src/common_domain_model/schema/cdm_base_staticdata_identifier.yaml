id: https://w3id.org/finos/cdm/cdm_base_staticdata_identifier
name: cdm_base_staticdata_identifier
description: Basic identifier and assigned identifier concepts that are applicable across the model.
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
  oscal: https://w3id.org/lmodel/oscal/
  spdx: https://spdx.org/rdf/3.0.1/terms/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_staticdata_party
- ./cdm_observable_asset
- ./cdm_base_staticdata_asset_common
- ./cdm_base_staticdata_codelist

subsets:
  cdm_base_staticdata_identifier:
    description: Classes defined in the cdm_base_staticdata_identifier module.

enums:
  CommodityLocationIdentifierTypeEnum:
    description: Defines the enumerated values to specify the nature of a location identifier.
    permissible_values:
      DeliveryPoint:
        description: The physical or virtual point at which the commodity will be delivered.
      EntryPoint:
        description: The physical or virtual point at which the commodity enters a transportation system.
      InterconnectionPoint:
        description: Identification of the border(s) or border point(s) of a transportation contract.
      WithdrawalPoint:
        description: The physical or virtual point at which the commodity is withdrawn from a transportation system.
      DeliveryZone:
        description: The zone covering potential delivery points for the commodity
      BuyerHub:
        description: The hub code of the buyer.
      SellerHub:
        description: The hub code of the seller.

  TradeIdentifierTypeEnum:
    description: Defines the enumerated values to specify the nature of a trade identifier.
    permissible_values:
      UniqueTransactionIdentifier: {}
      UniqueSwapIdentifier: {}

slots:
  issuerReference:
    range: Party
    description: The identifier issuer, when specified by reference to a party specified as part of the transaction.
    annotations:
      metadata_reference: true

  issuer:
    range: string
    description: The identifier issuer, when specified explicitly alongside the identifier value (instead of being specified
      by reference to a party).
    annotations:
      metadata_scheme: true

  assignedIdentifier:
    range: AssignedIdentifier
    description: The identifier value. This level of indirection between the issuer and the identifier and its version provides
      the ability to associate multiple identifiers to one issuer, consistently with the FpML PartyTradeIdentifier.
    required: true
    multivalued: true
    inlined_as_list: true

  listId:
    range: Identifier
    description: The identifier for the list. In the case of a package transaction, this would be the package identifier.
      This attribute is mandatory to allow the list itself to be identified.
    required: true

  componentId:
    range: Identifier
    description: Identifiers for each component of the list. Since the data type is used to link multiple identified objects
      together, at least 2 components are required in the list. Creating an identified list with only 1 identified component
      has been deemed unnecessary, because it would just create a redundant identifier.
    required: true
    multivalued: true
    inlined_as_list: true

  price:
    range: Price
    description: The price of the package.

  locationIdentifierType:
    range: CommodityLocationIdentifierTypeEnum
    description: Specifies the nature of a location identifier.

classes:
  AssignedIdentifier:
    description: A class to specify the identifier value and its associated version.
    close_mappings:
    - fpml_5_10:AssignedIdentifier
    - gist:ID
    - spdx:ExternalIdentifier
    slots:
    - identifier
    - version
    slot_usage:
      identifier:
        range: string
        description: The identifier value.
        multivalued: false
      version:
        range: integer
        description: The identifier version, which is specified as an integer and is meant to be incremented each time the
          transaction terms (whether contract or event) change. This version is made option to support the use case where
          the identifier is referenced without the version. The constraint that a contract and a lifecycle event need to have
          an associated version is enforced through data rules.
        required: false
    in_subset:
    - cdm_base_staticdata_identifier

  Identifier:
    description: A class to specify a generic identifier, applicable to CDM artefacts such as executions, contracts, lifecycle
      events and legal documents. An issuer can be associated with the actual identifier value as a way to properly qualify
      it.
    annotations:
      metadata_key: true
    close_mappings:
    - gist:ID
    - oscal:PartyExternalId
    - spdx:ExternalIdentifier
    rules:
    - description: The identifier issuer is specified either explicitly or by reference to one of the parties.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            issuerReference:
              required: true
        - slot_conditions:
            issuer:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: IssuerChoice — required choice issuerReference, issuer'
    slots:
    - issuerReference
    - issuer
    - assignedIdentifier
    in_subset:
    - cdm_base_staticdata_identifier

  IdentifiedList:
    description: Attaches an identifier to a collection of objects, when those objects themselves can each be represented
      by an identifier. One use case is the representation of package transactions, where each component is a separate trade
      with its own identifier, and those trades are linked together as a package with its own identifier. The data type has
      been named generically rather than referring to 'packages' as it may have a number of other uses.
    annotations:
      metadata_key: true
    slots:
    - listId
    - componentId
    - price
    in_subset:
    - cdm_base_staticdata_identifier

  LocationIdentifier:
    description: Specifies a location identifier. An issuer and an identifier type can be associated with the actual identifier
      value as a way to properly qualify it.
    is_a: Identifier
    comments:
    - 'Rosetta condition: IdentifierType — if locationIdentifierType exists then assignedIdentifier count = 1'
    slots:
    - locationIdentifierType
    in_subset:
    - cdm_base_staticdata_identifier
