subsets:
  cdm_product_common_schedule:
    description: Classes defined in the cdm_product_common_schedule module.

enums:
  PayRelativeToEnum:
    description: The enumerated values to specify whether payments occur relative to the calculation period start date or
      end date, each reset date, valuation date or the last pricing date.
    permissible_values:
      CalculationPeriodStartDate:
        description: Payments will occur relative to the first day of each calculation period.
      CalculationPeriodEndDate:
        description: Payments will occur relative to the last day of each calculation period.
      LastPricingDate:
        description: Payments will occur relative to the last Pricing Date of each Calculation Period.
      ResetDate:
        description: Payments will occur relative to the reset date.
      ValuationDate:
        description: Payments will occur relative to the valuation date.

  ResetRelativeToEnum:
    description: The enumerated values to specify whether resets occur relative to the first or last day of a calculation
      period.
    permissible_values:
      CalculationPeriodStartDate:
        description: Resets occur relative to the first day of a calculation period.
      CalculationPeriodEndDate:
        description: Resets occur relative to the last day of a calculation period.

  StubPeriodTypeEnum:
    description: The enumerated values to specify how to deal with a non standard calculation period within a swap stream.
    permissible_values:
      ShortInitial:
        description: If there is a non regular period remaining it is left shorter than the streams calculation period frequency
          and placed at the start of the stream.
      ShortFinal:
        description: If there is a non regular period remaining it is left shorter than the streams calculation period frequency
          and placed at the end of the stream.
      LongInitial:
        description: If there is a non regular period remaining it is placed at the start of the stream and combined with
          the adjacent calculation period to give a long first calculation period.
      LongFinal:
        description: If there is a non regular period remaining it is placed at the end of the stream and combined with the
          adjacent calculation period to give a long last calculation period.

  WeeklyRollConventionEnum:
    description: The enumerated values to specify the weekly roll day.
    inherits:
      - DayOfWeekEnum
    permissible_values:
      TBILL:
        description: 13-week and 26-week U.S. Treasury Bill Auction Dates. Each Monday except for U.S. (New York) holidays
          when it will occur on a Tuesday

slots:
  daysInPeriod:
    range: integer
    required: true
    close_mappings:
      - fpml_5_10:CalculationPeriodData.daysInPeriod

  daysInLeapYearPeriod:
    range: integer
    required: true
    close_mappings:
      - fpml_5_10:CalculationPeriodData.daysInLeapYearPeriod

  isFirstPeriod:
    range: boolean
    required: true
    close_mappings:
      - fpml_5_10:CalculationPeriodData.isFirstPeriod

  isLastPeriod:
    range: boolean
    required: true
    close_mappings:
      - fpml_5_10:CalculationPeriodData.isLastPeriod

  calculationPeriodDatesReference:
    range: CalculationPeriodDates
    description: A pointer style reference to the associated calculation period dates component defined elsewhere in the document.
    required: true
    annotations:
      metadata_reference: true

  initialStub:
    range: StubValue
    description: Specifies how the initial stub amount is calculated. A single floating rate tenor different to that used
      for the regular part of the calculation periods schedule may be specified, or two floating tenors may be specified.
      If two floating rate tenors are specified then Linear Interpolation (in accordance with the 2000 ISDA Definitions, Section
      8.3. Interpolation) is assumed to apply. Alternatively, an actual known stub rate or stub amount may be specified.

  finalStub:
    range: StubValue
    description: Specifies how the final stub amount is calculated. A single floating rate tenor different to that used for
      the regular part of the calculation periods schedule may be specified, or two floating tenors may be specified. If two
      floating rate tenors are specified then Linear Interpolation (in accordance with the 2000 ISDA Definitions, Section
      8.3. Interpolation) is assumed to apply. Alternatively, an actual known stub rate or stub amount may be specified.

  adjustedStartDate:
    range: date
    description: The calculation period start date, adjusted according to any relevant business day convention.
    close_mappings:
      - fpml_5_10:CalculationPeriodBase.adjustedStartDate

  adjustedEndDate:
    range: date
    description: The calculation period end date, adjusted according to any relevant business day convention.
    close_mappings:
      - fpml_5_10:CalculationPeriodBase.adjustedEndDate

  unadjustedStartDate:
    range: date
    description: The calculation start date, unadjusted.
    close_mappings:
      - fpml_5_10:CalculationPeriod.unadjustedStartDate

  unadjustedEndDate:
    range: date
    description: The calculation end date, unadjusted.
    close_mappings:
      - fpml_5_10:CalculationPeriod.unadjustedEndDate

  notionalAmount:
    range: decimal
    description: The amount that a cashflow will accrue interest on.
    close_mappings:
      - fpml_5_10:CalculationPeriod.notionalAmount

  fxLinkedNotionalAmount:
    range: FxLinkedNotionalAmount
    description: The amount that a cashflow will accrue interest on. This is the calculated amount of the FX linked - i.e.
      the other currency notional amount multiplied by the appropriate FX spot rate.
    close_mappings:
      - fpml_5_10:CalculationPeriod.fxLinkedNotionalAmount

  floatingRateDefinition:
    range: FloatingRateDefinition
    description: The floating rate reset information for the calculation period.
    close_mappings:
      - fpml_5_10:CalculationPeriod.floatingRateDefinition

  dayCountYearFraction:
    range: decimal
    description: The year fraction value of the calculation period, result of applying the ISDA rules for day count fraction
      defined in the ISDA Annex.
    close_mappings:
      - fpml_5_10:CalculationPeriod.dayCountYearFraction

  forecastAmount:
    range: Money
    description: The amount representing the forecast of the accrued value of the calculation period. An intermediate value
      used to generate the forecastPaymentAmount in the PaymentCalculationPeriod.
    close_mappings:
      - fpml_5_10:CalculationPeriod.forecastAmount

  terminationDate:
    range: AdjustableOrRelativeDate
    description: The last day of the terms of the trade. This date may be subject to adjustments in accordance with the business
      day convention. It can also be specified in relation to another scheduled date (e.g. the last payment date).
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.terminationDate

  calculationPeriodDatesAdjustments:
    range: BusinessDayAdjustments
    description: The specification of the business day convention and financial business centers used for adjusting any calculation
      period date if it would otherwise fall on a day that is not a business day in the specified business center.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.calculationPeriodDatesAdjustments

  firstPeriodStartDate:
    range: AdjustableOrRelativeDate
    description: The start date of the calculation period. FpML specifies that for interest rate swaps this date must only
      be specified if it is not equal to the effective date. It is always specified in the case of equity swaps and credit
      default swaps with periodic payments. This date may be subject to adjustment in accordance with a business day convention.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.firstPeriodStartDate

  firstRegularPeriodStartDate:
    range: date
    description: The start date of the regular part of the calculation period schedule. It must only be specified if there
      is an initial stub calculation period. This day may be subject to adjustment in accordance with any adjustments specified
      in calculationPeriodDatesAdjustments.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.firstRegularPeriodStartDate

  firstCompoundingPeriodEndDate:
    range: date
    description: The end date of the initial compounding period when compounding is applicable. It must only be specified
      when the compoundingMethod element is present and not equal to a value of None. This date may be subject to adjustment
      in accordance with any adjustments specified in calculationPeriodDatesAdjustments.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.firstCompoundingPeriodEndDate

  lastRegularPeriodEndDate:
    range: date
    description: The end date of the regular part of the calculation period schedule. It must only be specified if there is
      a final stub calculation period. This day may be subject to adjustment in accordance with any adjustments specified
      in calculationPeriodDatesAdjustments.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.lastRegularPeriodEndDate

  stubPeriodType:
    range: StubPeriodTypeEnum
    description: Method to allocate any irregular period remaining after regular periods have been allocated between the effective
      and termination date. The multiplicity of 2 allows the possibility of expressing the type for both an initial and final
      stub at the same time.
    multivalued: true
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.stubPeriodType

  calculationPeriodFrequency:
    range: CalculationPeriodFrequency
    description: The frequency at which calculation period end dates occur with the regular part of the calculation period
      schedule and their roll date convention.
    close_mappings:
      - fpml_5_10:CalculationPeriodDates.calculationPeriodFrequency

  valuationDatesReference:
    range: PerformanceValuationDates
    description: A set of href pointers to valuation period dates defined somewhere else in the document.
    required: true
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  paymentDatesReference:
    range: PaymentDates
    description: A set of href pointers to payment dates defined somewhere else in the document.
    required: true
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  adjustedFxSpotFixingDate:
    range: date
    description: The date on which the FX spot rate is observed. This date should already be adjusted for any applicable business
      day convention.

  observedFxSpotRate:
    range: decimal
    description: The actual observed FX spot rate.

  varyingNotionalCurrency:
    range: string
    description: The currency of the varying notional amount, i.e. the notional amount being determined periodically based
      on observation of a spot currency exchange rate. The list of valid currencies is not presently positioned as an enumeration
      as part of the CDM because that scope is limited to the values specified by ISDA and FpML. As a result, implementers
      have to make reference to the relevant standard, such as the ISO 4217 standard for currency codes.
    required: true
    annotations:
      metadata_scheme: true

  varyingNotionalFixingDates:
    range: RelativeDateOffset
    description: The dates on which spot currency exchange rates are observed for purposes of determining the varying notional
      currency amount that will apply to a calculation period.
    required: true

  fxSpotRateSource:
    range: FxSpotRateSource
    description: The information source and time at which the spot currency exchange rate will be observed.
    required: true

  varyingNotionalInterimExchangePaymentDates:
    range: RelativeDateOffset
    description: The dates on which interim exchanges of notional are paid. Interim exchanges will arise as a result of changes
      in the spot currency exchange amount or changes in the constant notional schedule (e.g. amortisation).
    required: true

  unadjustedPaymentDate:
    range: date
    description: The unadjusted payment date.

  adjustedPaymentDate:
    range: date
    description: The adjusted payment date. This date should already be adjusted for any applicable business day convention.
      This component is not intended for use in trade confirmation but may be specified to allow the fee structure to also
      serve as a cashflow type component.

  fixedPaymentAmount:
    range: Money
    description: A known fixed payment amount.

  discountFactor:
    range: decimal
    description: A decimal value representing the discount factor used to calculate the present value of cash flow.

  forecastPaymentAmount:
    range: Money
    description: A monetary amount representing the forecast of the future value of the payment.

  presentValueAmount:
    range: Money
    description: A monetary amount representing the present value of the forecast payment.

  observationSchedule:
    range: ObservationSchedule
    description: Specifies a schedule of dates (non-parametric) on which market observations take place, and allows for the
      optional definition of weights where applicable.  When no weight is specified, then weight of each date is assumed to
      be 1.0

  periodicSchedule:
    range: PeriodicDates
    description: Specifies the date range and frequency on which market observations take place.  Weights can be assigned
      to dates in the schedule by assigning the weight and corresponding observationReference in the observationSchedule.

  parametricDates:
    range: ParametricDates
    description: 'Specifies parametric terms to determine which days within a given calculation period the price would be
      observed. Typically associated with Commodities. '

  weight:
    range: decimal
    description: Specifies the degree of importance of the observation.

  observationReference:
    range: string
    description: Specifies an identification key for the market observation. This attribute can be used as a reference to
      assign weights to a series of dates defined in a parametricSchedule.

  observationTimeType:
    range: TimeTypeEnum
    description: The enumerated values to specify points in the day when option exercise and valuation can occur.

  numberOfObservationDates:
    range: integer
    description: The number of observation dates between observation start date and observation end date.

  dayDistribution:
    range: DayDistributionEnum
    description: Denotes the method by which the pricing days are distributed across the pricing period.

  dayFrequency:
    range: decimal
    description: Defines the occurrence of the dayOfWeek within the pricing period on which pricing will take place, e.g.
      the 3rd Friday within each Calculation Period. If omitted, every dayOfWeek will be a pricing day.

  lag:
    range: Lag
    description: The pricing period per calculation period if the pricing days do not wholly fall within the respective calculation
      period.

  lagDuration:
    range: Offset
    description: Defines the offset of the series of pricing dates relative to the calculation period.
    required: true

  firstObservationDateOffset:
    range: Offset
    description: Defines the offset of the series of pricing dates relative to the calculation period.

  resetRelativeTo:
    range: ResetRelativeToEnum
    description: Specifies whether the reset dates are determined with respect to each adjusted calculation period start date
      or adjusted calculation period end date. If the reset frequency is specified as daily this element must not be included.

  initialFixingDate:
    range: InitialFixingDate
    description: The initial fixing date.

  fixingDates:
    range: RelativeDateOffset
    description: The fixing dates are the dates on which the index values are observed. The fixing dates are specified by
      reference to the reset date through business days offset and an associated set of financial business centers. Normally
      these offset calculation rules will be those specified in the ISDA definition for the relevant floating rate index (ISDA's
      Floating Rate Option). However, non-standard offset calculation rules may apply for a trade if mutually agreed by the
      principal parties to the transaction.

  finalFixingDate:
    range: AdjustableDate
    description: This attribute is not part of the FpML ResetDate, and has been added as part of the CDM to support the credit
      derivatives final fixing date.

  rateCutOffDaysOffset:
    range: Offset
    description: Specifies the number of business days before the period end date when the rate cut-off date is assumed to
      apply. The financial business centers associated with determining the rate cut-off date are those specified in the reset
      dates adjustments. The rate cut-off number of days must be a negative integer (a value of zero would imply no rate cut
      off applies in which case the rateCutOffDaysOffset element should not be included). The relevant rate for each reset
      date in the period from, and including, a rate cut-off date to, but excluding, the next applicable period end date (or,
      in the case of the last calculation period, the termination date) will (solely for purposes of calculating the floating
      amount payable on the next applicable payment date) be deemed to be the relevant rate in effect on that rate cut-off
      date. For example, if rate cut-off days for a daily averaging deal is -2 business days, then the refix rate applied
      on (period end date - 2 days) will also be applied as the reset on (period end date - 1 day), i.e. the actual number
      of reset dates remains the same but from the rate cut-off date until the period end date, the same refix rate is applied.
      Note that in the case of several calculation periods contributing to a single payment, the rate cut-off is assumed only
      to apply to the final calculation period contributing to that payment. The day type associated with the offset must
      imply a business days offset.

  resetFrequency:
    range: ResetFrequency
    description: The frequency at which the reset dates occur. In the case of a weekly reset frequency, also specifies the
      day of the week that the reset occurs. If the reset frequency is greater than the calculation period frequency then
      this implies that more than one reset is established for each calculation period and some form of rate averaging is
      applicable.

  resetDatesAdjustments:
    range: BusinessDayAdjustments
    description: The definition of the business day convention and financial business centers used for adjusting the reset
      date if it would otherwise fall on a day that is not a business day in the specified business center.

  averagingObservation:
    range: WeightedAveragingObservation
    description: A single weighted averaging observation.
    required: true
    multivalued: true
    inlined_as_list: true

  averagingDateTimes:
    range: DateTimeList
    description: An unweighted list of averaging observation date and times.
    close_mappings:
      - fpml_5_10:AveragingPeriod.averagingDateTimes

  averagingObservations:
    range: AveragingObservationList
    description: A weighted list of averaging observation date and times.
    close_mappings:
      - fpml_5_10:AveragingPeriod.averagingObservations

  marketDisruption:
    range: MarketDisruptionEnum
    description: The market disruption event as defined by ISDA 2002 Definitions.
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AveragingPeriod.marketDisruption

  observationNumber:
    range: integer
    description: Observation number, which should be unique, within a series generated by a date schedule.

  relativeDateOffset:
    range: RelativeDateOffset

  paymentFrequency:
    range: Frequency
    description: The frequency at which regular payment dates occur. If the payment frequency is equal to the frequency defined
      in the calculation period dates component then one calculation period contributes to each payment amount. If the payment
      frequency is less frequent than the frequency defined in the calculation period dates component then more than one calculation
      period will contribute to the payment amount. A payment frequency more frequent than the calculation period frequency
      or one that is not a multiple of the calculation period frequency is invalid. If the payment frequency is of value T
      (term), the period is defined by the effectiveDate and the terminationDate.

  firstPaymentDate:
    range: date
    description: The first unadjusted payment date. This day may be subject to adjustment in accordance with any business
      day convention specified in paymentDatesAdjustments. This element must only be included if there is an initial stub.
      This date will normally correspond to an unadjusted calculation period start or end date. This is true even if early
      or delayed payment is specified to be applicable since the actual first payment date will be the specified number of
      days before or after the applicable adjusted calculation period start or end date with the resulting payment date then
      being adjusted in accordance with any business day convention specified in paymentDatesAdjustments.

  lastRegularPaymentDate:
    range: date
    description: The last regular payment date when specified as a date, as in the FpML interest rate construct. FpML specifies
      that this date may be subject to adjustment in accordance with any business day convention specified in the paymentDatesAdjustments
      attribute.

  paymentDateSchedule:
    range: PaymentDateSchedule
    description: The payment dates when specified as relative to a set of dates specified somewhere else in the instance document/transaction,
      e.g. the valuation dates as typically the case for equity swaps, or when specified as a calculation period schedule.

  payRelativeTo:
    range: PayRelativeToEnum
    description: Specifies whether the payments occur relative to each adjusted calculation period start date or end date,
      each reset date, valuation date or the last pricing date. Calculation period start date means relative to the start
      of the first calculation period contributing to a given payment. Similarly, calculation period end date means the end
      of the last calculation period contributing to a given payment. The valuation date is applicable for Brazilian-CDI and
      equity swaps.

  paymentDaysOffset:
    range: Offset
    description: If early payment or delayed payment is required, specifies the number of days offset that the payment occurs
      relative to what would otherwise be the unadjusted payment date. The offset can be specified in terms of either calendar
      or business days. Even in the case of a calendar days offset, the resulting payment date, adjusted for the specified
      calendar days offset, will still be adjusted in accordance with the specified payment dates adjustments. This element
      should only be included if early or delayed payment is applicable, i.e. if the periodMultiplier element value is not
      equal to zero. An early payment would be indicated by a negative periodMultiplier element value and a delayed payment
      (or payment lag) would be indicated by a positive periodMultiplier element value.

  paymentDatesAdjustments:
    range: BusinessDayAdjustments
    description: The definition of the business day convention and financial business centers used for adjusting the payment
      date if it would otherwise fall on a day that is not a business day in the specified business center.

  interimPaymentDates:
    range: AdjustableRelativeOrPeriodicDates
    multivalued: true
    inlined_as_list: true

  finalPaymentDate:
    range: AdjustableOrRelativeDate
    description: The last payment when specified as an adjustable or relative date, as in the FpML total return construct.

  weeklyRollConvention:
    range: WeeklyRollConventionEnum
    description: The day of the week on which a weekly reset date occurs. This element must be included if the reset frequency
      is defined as weekly and not otherwise.

  relevantUnderlyingDateReference:
    range: AdjustableOrRelativeDates
    description: Reference to the unadjusted cancellation effective dates.
    required: true
    annotations:
      metadata_reference: true

  swapStreamReference:
    range: InterestRatePayout
    description: Reference to the leg, where date adjustments may apply.
    required: true
    annotations:
      metadata_reference: true

