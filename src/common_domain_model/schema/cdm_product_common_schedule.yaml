        on, and include, the Effective Date and (b) the final Calculation Period for the party will end on, but exclude, the
        Termination Date.","inputs":[{"name":"calculationPeriodDates","type":"CalculationPeriodDates","cardinality":"1..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"0..*"},"code_implementation":true},{"name":"CalculationPeriodRange","inputs":[{"name":"dateAdjustments","type":"BusinessDayAdjustments","cardinality":"0..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"1..1"},"code_implementation":true}]'
    slots:
      - startDate
      - endDate
      - daysInPeriod
      - daysInLeapYearPeriod
      - isFirstPeriod
      - isLastPeriod
    in_subset:
      - cdm_product_common_schedule

  StubPeriod:
    description: ' A class defining how the initial or final stub calculation period amounts is calculated. For example, the
      rate to be applied to the initial or final stub calculation period may be the linear interpolation of two different
      tenors for the floating rate index specified in the calculation period amount component, e.g. A two month stub period
      may used the linear interpolation of a one month and three month floating rate. The different rate tenors would be specified
      in this component. Note that a maximum of two rate tenors can be specified. If a stub period uses a single index tenor
      and this is the same as that specified in the calculation period amount component then the initial stub or final stub
      component, as the case may be, must not be included.'
    slots:
      - calculationPeriodDatesReference
      - initialStub
      - finalStub
    in_subset:
      - cdm_product_common_schedule

  CalculationPeriodBase:
    description: The calculation period adjusted start and end dates, which are the baseline arguments needed to compute an
      interest accrual calculation.
    annotations:
      metadata_key: true
    close_mappings:
      - fpml_5_10:CalculationPeriodBase
    slots:
      - adjustedStartDate
      - adjustedEndDate
    in_subset:
      - cdm_product_common_schedule

  CalculationPeriod:
    description: 'A data defining:  the parameters used in the calculation of a fixed or floating rate calculation period
      amount. This data forms:  part of cashflows representation of a swap stream.'
    is_a: CalculationPeriodBase
    close_mappings:
      - fpml_5_10:CalculationPeriod
    rules:
      - description: condition to represent an FpML choice construct.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                notionalAmount:
                  required: true
            - slot_conditions:
                fxLinkedNotionalAmount:
                  required: true
        preconditions: {}
      - description: condition to represent an FpML choice construct.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                floatingRateDefinition:
                  required: true
            - slot_conditions:
                fixedRate:
                  required: true
        preconditions: {}
      - description: 'FpML validation rule ird-30 - Context: CalculationPeriod (complex type). unadjustedStartDate exists
          or adjustedStartDate exists.'
        postconditions:
          exactly_one_of:
            - slot_conditions:
                adjustedStartDate:
                  required: true
            - slot_conditions:
                unadjustedStartDate:
                  required: true
        preconditions: {}
      - description: 'FpML validation rule ird-31 - Context: CalculationPeriod (complex type). unadjustedEndDate exists or
          adjustedEndDate exists.'
        postconditions:
          exactly_one_of:
            - slot_conditions:
                adjustedEndDate:
                  required: true
            - slot_conditions:
                unadjustedEndDate:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: NotionalChoice — required choice notionalAmount, fxLinkedNotionalAmount'
      - 'Rosetta condition: RateChoice — required choice floatingRateDefinition, fixedRate'
      - 'Rosetta condition: StartDateChoice — required choice adjustedStartDate, unadjustedStartDate'
      - 'Rosetta condition: EndDateChoice — required choice adjustedEndDate, unadjustedEndDate'
    slots:
      - unadjustedStartDate
      - unadjustedEndDate
      - calculationPeriodNumberOfDays
      - notionalAmount
      - fxLinkedNotionalAmount
      - floatingRateDefinition
      - fixedRate
      - dayCountYearFraction
      - forecastAmount
      - forecastRate
    slot_usage:
      calculationPeriodNumberOfDays:
        description: The number of days from the adjusted effective / start date to the adjusted termination / end date calculated
          in accordance with the applicable day count fraction.
        required: false
      fixedRate:
        description: The calculation period fixed rate. A per annum rate, expressed as a decimal. A fixed rate of 5% would
          be represented as 0.05.
        required: false
      forecastRate:
        description: A value representing the forecast rate used to calculate the forecast future value of the accrual period.
          This is a calculated rate determined based on averaging the rates in the rateObservation elements, and incorporates
          all of the rate treatment and averaging rules. A value of 1% should be represented as 0.01.
    in_subset:
      - cdm_product_common_schedule

  CalculationPeriodDates:
    description: 'A data for:  defining the parameters used to generate the calculation period dates schedule, including the
      specification of any initial or final stub calculation periods. A calculation period schedule consists of an optional
      initial stub calculation period, one or more regular calculation periods and an optional final stub calculation period.
      In the absence of any initial or final stub calculation periods, the regular part of the calculation period schedule
      is assumed to be between the effective date and the termination date. No implicit stubs are allowed, i.e. stubs must
      be explicitly specified using an appropriate combination of firstPeriodStartDate, firstRegularPeriodStartDate and lastRegularPeriodEndDate.'
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"CalculationPeriod","description":"2006 ISDA Definition Section 4.13. ''Calculation Period''
        means, in respect of a Swap Transaction and a party, each period from, and including, one Period End Date of that
        party to, but excluding, the next following applicable Period End Date during the Term of the Swap Transaction, except
        that (a) the initial Calculation Period for the party will commence on, and include, the Effective Date and (b) the
        final Calculation Period for the party will end on, but exclude, the Termination Date.","inputs":[{"name":"calculationPeriodDates","type":"CalculationPeriodDates","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"1..1"},"code_implementation":true},{"name":"CalculationPeriods","description":"2006
        ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of a Swap Transaction and a party, each period
        from, and including, one Period End Date of that party to, but excluding, the next following applicable Period End
        Date during the Term of the Swap Transaction, except that (a) the initial Calculation Period for the party will commence
        on, and include, the Effective Date and (b) the final Calculation Period for the party will end on, but exclude, the
        Termination Date.","inputs":[{"name":"calculationPeriodDates","type":"CalculationPeriodDates","cardinality":"1..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"0..*"},"code_implementation":true}]'
    close_mappings:
      - fpml_5_10:CalculationPeriodDates
    rules:
      - description: FpML validation rule ird-18 - If firstRegularPeriodStartDate exists, and if lastRegularPeriodEndDate
          exists, then lastRegularPeriodEndDate must be after firstRegularPeriodStartDate. This data rule applies within a
          given interest rate payout component.
        preconditions:
          slot_conditions:
            firstRegularPeriodStartDate:
              required: true
            lastRegularPeriodEndDate:
              required: true
        comments:
          - 'Rosetta comparison: lastRegularPeriodEndDate > firstRegularPeriodStartDate'
    comments:
      - 'Rosetta condition: FpML_ird_16 — if firstRegularPeriodStartDate exists then terminationDate -> adjustableDate ->
        unadjustedDate > firstRegularPeriodStartDate'
      - 'Rosetta condition: FpML_ird_17 — if lastRegularPeriodEndDate exists then terminationDate -> adjustableDate -> unadjustedDate
        > lastRegularPeriodEndDate'
      - 'Rosetta condition: FpML_ird_18 — if firstRegularPeriodStartDate exists and lastRegularPeriodEndDate exists then lastRegularPeriodEndDate
        > firstRegularPeriodStartDate'
      - 'Rosetta condition: FpML_ird_20 — if lastRegularPeriodEndDate exists then lastRegularPeriodEndDate > effectiveDate
        -> adjustableDate -> unadjustedDate'
      - 'Rosetta condition: FpML_ird_21 — if firstPeriodStartDate exists and effectiveDate exists then firstPeriodStartDate
        -> adjustableDate -> unadjustedDate < effectiveDate -> adjustableDate -> unadjustedDate'
      - 'Rosetta condition: FpML_ird_22 — if firstPeriodStartDate exists and firstRegularPeriodStartDate exists then firstPeriodStartDate
        -> adjustableDate -> unadjustedDate < firstRegularPeriodStartDate'
      - 'Rosetta func: CalculationPeriod — 2006 ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of
        a Swap Transaction and a party, each period from, and including, one Period End Date of that party to, but excluding,
        the next following applicable Period End Date during the Term of the Swap Transaction, except that (a) the initial
        Calculation Period for the party will commence on, and include, the Effective Date and (b) the final Calculation Period
        for the party will end on, but exclude, the Termination Date.'
      - 'Rosetta func: CalculationPeriods — 2006 ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of
        a Swap Transaction and a party, each period from, and including, one Period End Date of that party to, but excluding,
        the next following applicable Period End Date during the Term of the Swap Transaction, except that (a) the initial
        Calculation Period for the party will commence on, and include, the Effective Date and (b) the final Calculation Period
        for the party will end on, but exclude, the Termination Date.'
    slots:
      - effectiveDate
      - terminationDate
      - calculationPeriodDatesAdjustments
      - firstPeriodStartDate
      - firstRegularPeriodStartDate
      - firstCompoundingPeriodEndDate
      - lastRegularPeriodEndDate
      - stubPeriodType
      - calculationPeriodFrequency
    slot_usage:
      effectiveDate:
        range: AdjustableOrRelativeDate
        description: The first day of the terms of the trade. This day may be subject to adjustment in accordance with a business
          day convention.
    in_subset:
      - cdm_product_common_schedule

  DateRelativeToCalculationPeriodDates:
    description: 'A data to:  provide the ability to point to multiple payment nodes in the document through the unbounded
      paymentDatesReference.'
    slots:
      - calculationPeriodDatesReference
    slot_usage:
      calculationPeriodDatesReference:
        description: A set of href pointers to calculation period dates defined somewhere else in the document.
        multivalued: true
    in_subset:
      - cdm_product_common_schedule

  DateRelativeToValuationDates:
    description: 'A data to:  provide the ability to point to multiple payment nodes in the document through the unbounded
      paymentDatesReference.'
    slots:
      - valuationDatesReference
    in_subset:
      - cdm_product_common_schedule

  DateRelativeToPaymentDates:
    description: 'A data to:  provide the ability to point to multiple payment nodes in the document through the unbounded
      paymentDatesReference.'
    slots:
      - paymentDatesReference
    in_subset:
      - cdm_product_common_schedule

  FxLinkedNotionalAmount:
    description: 'A data to:  describe the cashflow representation for FX linked notionals.'
    slots:
      - resetDate
      - adjustedFxSpotFixingDate
      - observedFxSpotRate
      - notionalAmount
    slot_usage:
      resetDate:
        description: The reset date.
        required: false
      notionalAmount:
        description: The calculation period notional amount.
    in_subset:
      - cdm_product_common_schedule

  FxLinkedNotionalSchedule:
    description: 'A data to:  describe a notional schedule where each notional that applies to a calculation period is calculated
      with reference to a notional amount or notional amount schedule in a different currency by means of a spot currency
      exchange rate which is normally observed at the beginning of each period.'
    slots:
      - varyingNotionalCurrency
      - varyingNotionalFixingDates
      - fxSpotRateSource
      - fixingTime
      - varyingNotionalInterimExchangePaymentDates
    slot_usage:
      fixingTime:
        description: The time at which the spot currency exchange rate will be observed. It is specified as a time in a business
          day calendar location, e.g. 11:00am London time.
    in_subset:
      - cdm_product_common_schedule

  PaymentCalculationPeriod:
    description: 'A data defining:  the adjusted payment date and associated calculation period parameters required to calculate
      the actual or projected payment amount. This data forms:  part of the cashflow representation of a swap stream.'
    annotations:
      metadata_key: true
    rules:
      - description: condition to represent an FpML choice construct.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                calculationPeriod:
                  required: true
            - slot_conditions:
                fixedPaymentAmount:
                  required: true
        preconditions: {}
      - description: FpML validation rule ird-34 - Either unadjustedPaymentDate or adjustedPaymentDate must exist.
        postconditions:
          any_of:
            - slot_conditions:
                unadjustedPaymentDate:
                  required: true
            - slot_conditions:
                adjustedPaymentDate:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: CalculationPeriodNumberOfDays — if calculationPeriod -> calculationPeriodNumberOfDays exists then
        calculationPeriod -> calculationPeriodNumberOfDays all >= 0'
      - 'Rosetta condition: PaymentCalculationPeriodChoice — required choice calculationPeriod, fixedPaymentAmount'
      - 'Rosetta condition: FpML_ird_34 — unadjustedPaymentDate exists or adjustedPaymentDate exists'
    slots:
      - unadjustedPaymentDate
      - adjustedPaymentDate
      - calculationPeriod
      - fixedPaymentAmount
      - discountFactor
      - forecastPaymentAmount
      - presentValueAmount
    slot_usage:
      calculationPeriod:
        range: CalculationPeriod
        description: The parameters used in the calculation of a fixed or floating rate calculation period amount. A list
          of calculation period elements may be ordered in the document by ascending start date. An FpML document which contains
          an unordered list of calculation periods is still regarded as a conformant document.
        multivalued: true
    in_subset:
      - cdm_product_common_schedule

  RateSchedule:
    description: A class defining a schedule of rates or amounts in terms of an initial value and then a series of step date
      and value pairs. On each step date the rate or amount changes to the new step value. The series of step date and value
      pairs are optional. If not specified, this implies that the initial value remains unchanged over time.
    slots:
      - price
    slot_usage:
      price:
        range: PriceSchedule
        description: The initial rate. An initial rate of 5% would be represented as 0.05.
        required: true
    in_subset:
      - cdm_product_common_schedule

  ObservationDates:
    description: Describes date details for a set of observation dates in parametric or non-parametric form.
    slots:
      - observationSchedule
      - periodicSchedule
      - parametricDates
    in_subset:
      - cdm_product_common_schedule

  ObservationSchedule:
    description: Specifies a single date on which market observations take place and specifies optional associated weighting.
    comments:
      - 'Rosetta condition: AdjustedDate — if observationDate -> adjustedDate is absent then observationDate -> unadjustedDate
        exists and dateAdjustments exists'
    slots:
      - observationDate
      - dateAdjustments
    slot_usage:
      observationDate:
        range: ObservationDate
        description: Specifies an adjusted or unadjusted date for a market observation.
        required: false
        multivalued: true
    in_subset:
      - cdm_product_common_schedule

  ObservationDate:
    description: Specifies a single date on which market observations take place and specifies optional associated weighting.
    annotations:
      metadata_key: true
    rules:
      - description: Either an unadjusted date or an adjusted date needs to be specified.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                unadjustedDate:
                  required: true
            - slot_conditions:
                adjustedDate:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ObservationDate — required choice unadjustedDate, adjustedDate'
    slots:
      - unadjustedDate
      - adjustedDate
      - weight
      - observationReference
    slot_usage:
      unadjustedDate:
        description: A date subject to adjustment.
    in_subset:
      - cdm_product_common_schedule

  ObservationTerms:
    description: 'Class containing terms that are associated with observing a price/benchmark/index across either single or
      multiple observations. '
    rules:
      - description: Checks that an observation time is specified either explicitly (through the observation time) or implicitly
          (through a observation time type different to Specific Time). If Specific Time is defined as observation time type
          (i.e. no implicit time value), the condition checks that an explicit observation time is provided.
        preconditions:
          slot_conditions:
            observationTimeType:
              equals_string: SpecificTime
        postconditions:
          slot_conditions:
            observationTime:
              required: true
    comments:
      - 'Rosetta condition: ObservationTime — if observationTimeType = TimeTypeEnum -> SpecificTime then observationTime exists'
    slots:
      - observationTime
      - observationTimeType
      - informationSource
      - precision
      - calculationPeriodDates
      - observationDates
      - numberOfObservationDates
    slot_usage:
      observationTime:
        range: BusinessCenterTime
        description: Defines time in respect to a business calendar location that the price/benchmark/index is observed
      informationSource:
        range: FxSpotRateSource
        description: The information source where a published or displayed market rate will be obtained, e.g. Telerate Page
          3750.
      precision:
        range: Rounding
        description: Defines rounding rules and precision to be used in the rounding of observations.
      calculationPeriodDates:
        description: Defines parameters used to generate the calculation period dates schedule, including the specification
          of any initial or final stub calculation periods. A calculation period schedule consists of an optional initial
          stub calculation period, one or more regular calculation periods and an optional final stub calculation period.
          In the absence of any initial or final stub calculation periods, the regular part of the calculation period schedule
          is assumed to be between the effective date and the termination date. No implicit stubs are allowed, i.e. stubs
          must be explicitly specified using an appropriate combination of firstPeriodStartDate, firstRegularPeriodStartDate
          and lastRegularPeriodEndDate.
      observationDates:
        range: ObservationDates
        inlined_as_list: true
        description: Describes date details for a set of observation dates in parametric or non-parametric form.
        required: true
        multivalued: false
    in_subset:
      - cdm_product_common_schedule

  ParametricDates:
    description: Defines rules for the dates on which the price will be determined.
    rules:
      - description: ParametricDatesChoice
        postconditions:
          exactly_one_of:
            - slot_conditions:
                dayDistribution:
                  required: true
            - slot_conditions:
                dayOfWeek:
                  required: true
        preconditions: {}
      - description: DayOfWeekMethod
        preconditions:
          slot_conditions:
            dayOfWeek:
              required: true
        postconditions:
          slot_conditions:
            dayFrequency:
              required: true
    comments:
      - 'Rosetta condition: ParametricDatesChoice — required choice dayDistribution, dayOfWeek'
      - 'Rosetta condition: DayOfWeekMethod — if dayOfWeek exists then dayFrequency exists'
    slots:
      - dayType
      - dayDistribution
      - dayOfWeek
      - dayFrequency
      - lag
      - businessCenters
    slot_usage:
      dayType:
        description: Denotes the enumerated values to specify the day type classification used in counting the number of days
          between two dates.
        required: true
      dayOfWeek:
        description: Indicates the days of the week on which the price will be determined.
        multivalued: true
      businessCenters:
        description: The enumerated values to specify the business centers.
        required: true
    in_subset:
      - cdm_product_common_schedule

  Lag:
    description: The pricing period per calculation period if the pricing days do not wholly fall within the respective calculation
      period.
    slots:
      - lagDuration
      - firstObservationDateOffset
    in_subset:
      - cdm_product_common_schedule

  ResetDates:
    description: 'A data defining:  the parameters used to generate the reset dates schedule and associated fixing dates.
      The reset dates are the dates on which the new index value (which is observed on the fixing date) is applied for each
      period and on which the interest rate hence begins to accrue.'
    annotations:
      metadata_key: true
    comments:
      - 'Rosetta condition: RateCutOffDaysOffset — if rateCutOffDaysOffset exists then rateCutOffDaysOffset -> periodMultiplier
        < 0'
      - 'Rosetta condition: WeeklyPeriod — if resetFrequency -> period = PeriodExtendedEnum -> W then resetFrequency -> weeklyRollConvention
        exists'
      - 'Rosetta condition: NonWeeklyPeriod — if resetFrequency -> period <> PeriodExtendedEnum -> W then resetFrequency ->
        weeklyRollConvention is absent'
    slots:
      - calculationPeriodDatesReference
      - resetRelativeTo
      - initialFixingDate
      - fixingDates
      - finalFixingDate
      - rateCutOffDaysOffset
      - resetFrequency
      - resetDatesAdjustments
    slot_usage:
      calculationPeriodDatesReference:
        required: false
    in_subset:
      - cdm_product_common_schedule

  StubCalculationPeriodAmount:
    description: 'A data defining:  how the initial or final stub calculation period amounts is calculated. For example, the
      rate to be applied to the initial or final stub calculation period may be the linear interpolation of two different
      tenors for the floating rate index specified in the calculation period amount component, e.g. A two month stub period
      may used the linear interpolation of a one month and three month floating rate. The different rate tenors would be specified
      in this component. Note that a maximum of two rate tenors can be specified. If a stub period uses a single index tenor
      and this is the same as that specified in the calculation period amount component then the initial stub or final stub
      component, as the case may be, must not be included.'
    slots:
      - calculationPeriodDatesReference
      - initialStub
      - finalStub
    in_subset:
      - cdm_product_common_schedule

  AveragingObservationList:
    description: An unordered list of weighted averaging observations.
    slots:
      - averagingObservation
    in_subset:
      - cdm_product_common_schedule

  AveragingPeriod:
    description: Period over which an average value is taken.
    close_mappings:
      - fpml_5_10:AveragingPeriod
    rules:
      - description: ' Choice rule to represent an FpML choice construct between unweighted and weighted averaging date and
          times.'
        postconditions:
          any_of:
            - slot_conditions:
                averagingDateTimes:
                  required: true
            - slot_conditions:
                averagingObservations:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: AveragingPeriodChoice — optional choice averagingDateTimes, averagingObservations'
    slots:
      - schedule
      - averagingDateTimes
      - averagingObservations
      - marketDisruption
    slot_usage:
      schedule:
        description: A schedule for generating averaging observation dates.
    in_subset:
      - cdm_product_common_schedule

  WeightedAveragingObservation:
    description: A single weighted averaging observation.
    rules:
      - description: ' Choice rule to represent an FpML choice construct between date times for literal date values, and observation
          numbers for schedule generated observations.'
        postconditions:
          exactly_one_of:
            - slot_conditions:
                dateTime:
                  required: true
            - slot_conditions:
                observationNumber:
                  required: true
        preconditions: {}
      - description: ' FpML specifies observationNumber as a positive integer.'
        preconditions:
          slot_conditions:
            observationNumber:
              required: true
        postconditions:
          slot_conditions:
            observationNumber:
              minimum_value: 0
      - description: ' FpML specifies observationNumber as a non-negative decimal.'
        postconditions:
          slot_conditions:
            weight:
              minimum_value: 0.0
        preconditions: {}
    comments:
      - 'Rosetta condition: WeightedAveragingObservationChoice — required choice dateTime, observationNumber'
      - 'Rosetta condition: PositiveObservationNumber — if observationNumber exists then observationNumber >= 0'
      - 'Rosetta condition: PositiveWeight — weight >= 0.0'
    slots:
      - dateTime
      - observationNumber
      - weight
    slot_usage:
      dateTime:
        description: Observation date time, which should be used when literal observation dates are required. The CDM specifies
          that the zoned date time is to be expressed in accordance with ISO 8601, either as UTC as an offset to UTC.
        required: false
        multivalued: false
      weight:
        description: Observation weight, which is used as a multiplier for the observation value.
        required: true
    in_subset:
      - cdm_product_common_schedule

  AmountSchedule:
    description: A class to specify a currency amount or a currency amount schedule.
    is_a: Schedule
    slots:
      - currency
    slot_usage:
      currency:
        description: The currency in which the amount schedule is denominated. The currency is specified outside of the actual
          schedule in order to be applied uniformly to it. The list of valid currencies is not presently positioned as an
          enumeration as part of the CDM because that scope is limited to the values specified by ISDA and FpML. As a result,
          implementers have to make reference to the relevant standard, such as the ISO 4217 standard for currency codes.
        required: true
        multivalued: true
    in_subset:
      - cdm_product_common_schedule

  InitialFixingDate:
    description: A CDM class which purpose is to specify the initial fixing date either alongside the FpML interest rate specification
      as an offset of another date, or alongside the credit derivative specification as an unadjusted date.
    slots:
      - relativeDateOffset
      - initialFixingDate
    slot_usage:
      initialFixingDate:
        range: date
    in_subset:
      - cdm_product_common_schedule

  PaymentDates:
    description: Specifies the parameters to generate the payment date schedule, either through a parametric representation
      or by reference to specified dates.
    annotations:
      metadata_key: true
    rules:
      - description: FpML validation rule ird-35 & cd-31- If firstPaymentDate exists, and if lastRegularPaymentDate exists,
          then firstPaymentDate must be before lastRegularPaymentDate.
        preconditions:
          slot_conditions:
            firstPaymentDate:
              required: true
            lastRegularPaymentDate:
              required: true
        comments:
          - 'Rosetta comparison: firstPaymentDate < lastRegularPaymentDate'
    comments:
      - 'Rosetta condition: FpML_ird_35_cd_31 — if firstPaymentDate exists and lastRegularPaymentDate exists then firstPaymentDate
        < lastRegularPaymentDate'
      - 'Rosetta condition: NonZeroPeriodMultiplier — if paymentDaysOffset exists then paymentDaysOffset -> periodMultiplier
        <> 0'
    slots:
      - paymentFrequency
      - firstPaymentDate
      - lastRegularPaymentDate
      - paymentDateSchedule
      - payRelativeTo
      - paymentDaysOffset
      - paymentDatesAdjustments
    in_subset:
      - cdm_product_common_schedule

  PaymentDateSchedule:
    description: The payment dates when specified as relative to a set of dates specified somewhere else in the instance document/transaction,
      e.g. the valuation dates as typically the case for equity swaps, or when specified as a calculation period schedule.
    slots:
      - interimPaymentDates
      - finalPaymentDate
    in_subset:
      - cdm_product_common_schedule

  ResetFrequency:
    description: A class defining the reset frequency. In the case of a weekly reset, also specifies the day of the week that
      the reset occurs. If the reset frequency is greater than the calculation period frequency the this implies that more
      or more reset dates is established for each calculation period and some form of rate averaging is applicable. The specific
      averaging method of calculation is specified in FloatingRateCalculation. In case the reset frequency is of value T (term),
      the period is defined by the swap/swapStream/calculationPerioDates/effectiveDate and the swap/swapStream/calculationPerioDates/terminationDate.
    is_a: Frequency
    comments:
      - 'Rosetta condition: FpML_ird_49 — if weeklyRollConvention exists then period = PeriodExtendedEnum -> W'
    slots:
      - weeklyRollConvention
    in_subset:
      - cdm_product_common_schedule

  FinalCalculationPeriodDateAdjustment:
    description: 'A data to:  define business date convention adjustment to final payment period per leg.'
    slots:
      - relevantUnderlyingDateReference
      - swapStreamReference
      - businessDayConvention
