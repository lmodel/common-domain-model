id: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
name: cdm_product_common_schedule
description: 'Common product schedule concepts: calculation period, reset, fixing and payment dates, stub, notional schedule,
  roll convention.'
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
default_prefix: common_domain_model
default_range: string

imports:
  - linkml:types
  - ./cdm_base_datetime
  - ./cdm_base_math
  - ./cdm_observable_asset
  - ./cdm_observable_common
  - ./cdm_observable_event
  - ./cdm_product_asset
  - ./cdm_base_staticdata_codelist
  - ./cdm_event_common
  - ./cdm_base_staticdata_identifier
  - ./cdm_observable_asset_calculatedrate

comments:
  - 'Rosetta func: PaymentDate | inputs(economicTerms: EconomicTerms (1..1)) | output(result: date (0..1))'
  - 'Rosetta func: PeriodsInYear | inputs(frequency: CalculationPeriodFrequency (1..1)) | output(numberOfPeriods: int (1..1))'
  - 'Rosetta func: CalculationPeriod — 2006 ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of a Swap
    Transaction and a party, each period from, and including, one Period End Date of that party to, but excluding, the next
    following applicable Period End Date during the Term of the Swap Transaction, except that (a) the initial Calculation
    Period for the party will commence on, and include, the Effective Date and (b) the final Calculation Period for the party
    will end on, but exclude, the Termination Date. | inputs(calculationPeriodDates: CalculationPeriodDates (1..1), date:
    date (1..1)) | output(result: CalculationPeriodData (1..1))'
  - 'Rosetta func: CalculationPeriods — 2006 ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of a Swap
    Transaction and a party, each period from, and including, one Period End Date of that party to, but excluding, the next
    following applicable Period End Date during the Term of the Swap Transaction, except that (a) the initial Calculation
    Period for the party will commence on, and include, the Effective Date and (b) the final Calculation Period for the party
    will end on, but exclude, the Termination Date. | inputs(calculationPeriodDates: CalculationPeriodDates (1..1)) | output(result:
    CalculationPeriodData (0..*))'
  - 'Rosetta func: CalculationPeriodRange | inputs(dateAdjustments: BusinessDayAdjustments (0..1)) | output(result: CalculationPeriodData
    (1..1))'
