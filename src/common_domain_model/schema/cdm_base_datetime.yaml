      WED:
        description: Rolling weekly on a Wednesday
      THU:
        description: Rolling weekly on a Thursday
      FRI:
        description: Rolling weekly on a Friday
      SAT:
        description: Rolling weekly on a Saturday
      SUN:
        description: Rolling weekly on a Sunday

  CompoundingTypeEnum:
    description: The enumerated values to specify how the compounding calculation is done
    permissible_values:
      None:
        description: Compounding is not applicable
      Business:
        description: Compounding is done only on business days, i.e. not compounded each day on weekends or holidays.
      Calendar:
        description: Compounding is done on each calendar day.

  RoundingFrequencyEnum:
    description: How often is rounding performed
    permissible_values:
      Daily:
        description: Rounding is done on each day
      PeriodEnd:
        description: Rounding is done only at the end of the period

slots:
  unadjustedDate:
    range: date
    description: A date subject to adjustment. While in FpML this date is required, this cardinality constraint has been relaxed
      as part of the CDM in order to support the FRA representation, which effective and termination dates are specified in
      FpML as adjusted dates.
    close_mappings:
    - fpml_5_10:AdjustableDate.unadjustedDate

  dateAdjustments:
    range: BusinessDayAdjustments
    description: The business day convention and financial business centers used for adjusting the date if it would otherwise
      fall on a day that is not a business date in the specified business centers.
    close_mappings:
    - fpml_5_10:AdjustableDate.dateAdjustments

  dateAdjustmentsReference:
    range: BusinessDayAdjustments
    description: A pointer style reference to date adjustments defined elsewhere in the document.
    annotations:
      metadata_reference: true
    close_mappings:
    - fpml_5_10:AdjustableDate.dateAdjustmentsReference

  adjustedDate:
    range: date
    description: The date once the adjustment has been performed. (Note that this date may change if the business center holidays
      change).
    close_mappings:
    - fpml_5_10:AdjustableDate.adjustedDate

  relativeDate:
    range: RelativeDateOffset
    description: A date specified as some offset to another date (the anchor date).
    close_mappings:
    - fpml_5_10:AdjustableOrAdjustedOrRelativeDate.relativeDate

  adjustableDate:
    range: AdjustableDate
    description: A date that shall be subject to adjustment if it would otherwise fall on a day that is not a business day
      in the specified business centers, together with the convention for adjusting the date.
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDate.adjustableDate

  adjustableDates:
    range: AdjustableDates
    description: A series of dates that shall be subject to adjustment if they would otherwise fall on a day that is not a
      business day in the specified business centers, together with the convention for adjusting the date.
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDates.adjustableDates

  relativeDates:
    range: RelativeDates
    description: A series of dates specified as some offset to another series of dates (the anchor dates).
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDates.relativeDates

  relativeDateAdjustments:
    range: BusinessDayAdjustments
    description: The business day convention and financial business centers used for adjusting the relative date if it would
      otherwise fall on a day that is not a business date in the specified business centers.

  businessCenter:
    range: BusinessCenter
    description: A code identifying one or several business day calendar location(s). The set of business day calendar locations
      are specified by the business day calendar location enumeration which is maintained by the FpML standard.
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_scheme: true
    close_mappings:
    - fpml_5_10:BusinessCenters.businessCenter

  commodityBusinessCalendar:
    range: CommodityBusinessCalendarEnum
    multivalued: true
    annotations:
      metadata_scheme: true
    close_mappings:
    - fpml_5_10:BusinessCenters.commodityBusinessCalendar

  businessCentersReference:
    range: BusinessCenters
    description: A reference to a financial business center location specified elsewhere in the instance document.
    annotations:
      metadata_reference: true
    close_mappings:
    - fpml_5_10:BusinessCenters.businessCentersReference

  hourMinuteTime:
    range: time
    description: A time specified in hh:mm:ss format where the second component must be '00', e.g. 11am would be represented
      as 11:00:00.
    required: true
    close_mappings:
    - fpml_5_10:BusinessCenterTime.hourMinuteTime

  businessDayConvention:
    range: BusinessDayConventionEnum
    description: The convention for adjusting a date if it would otherwise fall on a day that is not a business day, as specified
      by an ISDA convention (e.g. Following, Precedent).
    required: true
    close_mappings:
    - fpml_5_10:BusinessDateRange.businessDayConvention

  businessCenters:
    range: BusinessCenters
    description: The business center(s), specified either explicitly or by reference to those specified somewhere else in
      the instance document.
    close_mappings:
    - fpml_5_10:BusinessDateRange.businessCenters

  startDate:
    range: date
    description: The first date of a date range.
    required: true

  endDate:
    range: date
    description: The last date of a date range.
    required: true

  date:
    range: date
    required: true
    multivalued: true

  dateTime:
    range: datetime
    description: The CDM specifies that the zoned date time is to be expressed in accordance with ISO 8601, either as UTC
      as an offset to UTC.
    required: true
    multivalued: true

  periodMultiplier:
    range: integer
    description: A time period multiplier, e.g. 1, 2, or 3. If the period value is T (Term) then period multiplier must contain
      the value 1.
    required: true

  period:
    range: PeriodExtendedEnum
    description: A time period, e.g. a day, week, month, year or term of the stream.
    required: true

  dayType:
    range: DayTypeEnum
    description: In the case of an offset specified as a number of days, this element defines whether consideration is given
      as to whether a day is a good business day or not. If a day type of business days is specified then non-business days
      are ignored when calculating the offset. The financial business centers to use for determination of business days are
      implied by the context in which this element is used. This element must only be included when the offset is specified
      as a number of days. If the offset is zero days then the dayType element should not be included.

  offset:
    range: Offset

  customProvision:
    range: string

  periodSkip:
    range: integer
    description: The number of periods in the referenced date schedule that are between each date in the relative date schedule.
      Thus a skip of 2 would mean that dates are relative to every second date in the referenced schedule. If present this
      should have a value greater than 1.

  scheduleBounds:
    range: DateRange
    description: The first and last dates of a schedule. This can be used to restrict the range of values in a reference series
      of dates.

  dateRelativeTo:
    range: date
    description: Specifies the anchor as an href attribute. The href attribute value is a pointer style reference to the element
      or component elsewhere in the document where the anchor date is defined.
    annotations:
      metadata_reference: true

  time:
    range: time
    description: The observation time.
    required: true

  location:
    range: string
    description: FpML specifies the timezoneLocationScheme by reference to the Time Zone Database (a.k.a. tz database) maintained
      by IANA, the Internet Assigned Numbers Authority.
    annotations:
      metadata_scheme: true

  directTime:
    range: TimeZone
    description: An absolute time value expressed in a specific time zone.

  relativeTime:
    range: RelativeTime
    description: A time value calculated relative to another reference time.

  timeRelativeTo:
    range: TimeZone
    description: The reference time zone or base time from which the relative time is calculated.
    annotations:
      metadata_reference: true

  offsetTimeUnit:
    range: TimeUnitEnum
    description: 'The unit of time for the offset (e.g., seconds, minutes, hours, days). '

  offsetMultiplier:
    range: integer
    description: A time offset multiplier, e.g. 1, 2 or 3 etc. A negative value can be used when specifying a negative offset,
      e.g. -2 hours.

  rounding:
    range: TimeRounding
    description: Optional rules that define how the calculated time should be rounded after the offset has been applied.

  roundingDirection:
    range: RoundingDirectionEnum
    description: The direction in which rounding is performed (e.g., up, down, or to the nearest value).
    required: true

  roundToUnit:
    range: TimeUnitEnum
    description: The time unit to which the value should be rounded (e.g., minute, hour, day).

  lowerBound:
    range: PeriodBound
    description: Specifies the lower bound of a period range, e.g. greater than or equal to 5Y.

  upperBound:
    range: PeriodBound
    description: Specifies the upper bound of a period range, e.g. less than to 10Y.

  inclusive:
    range: boolean
    description: Specifies whether the period bound is inclusive, e.g. for a lower bound, false would indicate greater than,
      whereas true would indicate greater than or equal to.
    required: true

  averagingPeriodFrequency:
    range: CalculationPeriodFrequency
    description: The frequency at which averaging period occurs with the regular part of the valuation schedule and their
      roll date convention.
    required: true
    close_mappings:
    - fpml_5_10:AveragingSchedule.averagingPeriodFrequency

  periodicDates:
    range: PeriodicDates
    description: A calculation period schedule.
    close_mappings:
    - fpml_5_10:AdjustableRelativeOrPeriodicDates.periodicDates

  periodFrequency:
    range: CalculationPeriodFrequency
    description: The frequency at which calculation period end dates occur with the regular part of the calculation period
      schedule and their roll date convention.

  periodDatesAdjustments:
    range: BusinessDayAdjustments
    description: The specification of the business day convention and financial business centers used for adjusting any calculation
      period date if it would otherwise fall on a day that is not a business day in the specified business center.

  rollConvention:
    range: RollConventionEnum
    description: The roll convention specifies the period term as part of a periodic schedule, i.e. the calculation period
      end date within the regular part of the calculation period. The value could be a rule, e.g. IMM Settlement Dates, which
      is the 3rd Wednesday of the month, or it could be a specific day of the month, such as the first day of the applicable
      month. It is used in conjunction with a frequency and the regular period start date of a calculation period.
    required: true
    close_mappings:
    - fpml_5_10:CalculationPeriodFrequency.rollConvention

  balanceOfFirstPeriod:
    range: boolean
    description: Indicates, when true, that that the first Calculation Period should run from the Effective Date to the end
      of the calendar period in which the Effective Date falls, e.g. Jan 15 - Jan 31 if the calculation periods are one month
      long and Effective Date is Jan 15. If false, the first Calculation Period should run from the Effective Date for one
      whole period, e.g. Jan 15 to Feb 14 if the calculation periods are one month long and Effective Date is Jan 15. Mostly
      used in Commmodity Swaps.
    close_mappings:
    - fpml_5_10:CalculationPeriodFrequency.balanceOfFirstPeriod

  monthOfYear:
    range: decimal
    description: Specifies the month of the year if used.
    close_mappings:
    - fpml_5_10:CalculationFrequency.monthOfYear

  dayOfMonth:
    range: decimal
    description: Specifies the day of the month if used.
    close_mappings:
    - fpml_5_10:CalculationFrequency.dayOfMonth

  dayOfWeek:
    range: DayOfWeekEnum
    description: Specifies the day of the week if used.
    close_mappings:
    - fpml_5_10:CalculationFrequency.dayOfWeek

  weekOfMonth:
    range: decimal
    description: Specifies the week of the month if used.
    close_mappings:
    - fpml_5_10:CalculationFrequency.weekOfMonth

  offsetDays:
    range: decimal
    description: Specifies how many days from the trigger event should the payment occur.
    required: true
    close_mappings:
    - fpml_5_10:CalculationFrequency.offsetDays

  dateLocation:
    range: BusinessCenterTime
    description: Specifies where is the time measured.
    required: true
    close_mappings:
    - fpml_5_10:CalculationFrequency.dateLocation

classes:
  AdjustableDate:
    description: A class for defining a date that shall be subject to adjustment if it would otherwise fall on a day that
      is not a business day in the specified business centers, together with the convention for adjusting the date.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"AdjustableDateResolution","description":"Prioritization of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDate","type":"AdjustableDate","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..1"}}]'
    close_mappings:
    - fpml_5_10:AdjustableDate
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            dateAdjustments:
              required: true
        - slot_conditions:
            dateAdjustmentsReference:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AdjustableDateChoice — optional choice dateAdjustments, dateAdjustmentsReference'
    - 'Rosetta func: AdjustableDateResolution — Prioritization of unadjustedDate over adjustedDate.'
    slots:
    - unadjustedDate
    - dateAdjustments
    - dateAdjustmentsReference
    - adjustedDate
    in_subset:
    - cdm_base_datetime

  AdjustableDates:
    description: A class for defining a series of dates that shall be subject to adjustment if they would otherwise fall on
      a day that is not a business day in the specified business centers, together with the convention for adjusting the dates.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"AdjustableDatesResolution","description":"Prioritization of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDates","type":"AdjustableDates","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..*"}}]'
    close_mappings:
    - fpml_5_10:AdjustableDates
    rules:
    - description: FpML specifies a choice between adjustedDate and [unadjustedDate (required), dateAdjutsments (required),
        adjustedDate (optional)].
      preconditions:
        slot_conditions:
          adjustedDate:
            required: false
      postconditions:
        slot_conditions:
          unadjustedDate:
            required: true
          dateAdjustments:
            required: true
    comments:
    - 'Rosetta condition: AdjustedDate — if adjustedDate is absent then unadjustedDate exists and dateAdjustments exists'
    - 'Rosetta func: AdjustableDatesResolution — Prioritization of unadjustedDate over adjustedDate.'
    slots:
    - unadjustedDate
    - dateAdjustments
    - adjustedDate
    slot_usage:
      unadjustedDate:
        description: A date subject to adjustment.
        multivalued: true
      adjustedDate:
        description: The date(s) once the adjustment has been performed. (Note that this date may change if the business center
          holidays change).
        multivalued: true
    in_subset:
    - cdm_base_datetime

  AdjustableOrAdjustedDate:
    description: A class for defining a date that shall be subject to adjustment if it would otherwise fall on a day that
      is not a business day in the specified business centers, together with the convention for adjusting the date.
    annotations:
      metadata_key: true
    close_mappings:
    - fpml_5_10:AdjustableOrAdjustedDate
    rules:
    - description: FpML specifies a choice between adjustedDate and [unadjustedDate (required), dateAdjutsments (required),
        adjustedDate (optional)].
      preconditions:
        slot_conditions:
          adjustedDate:
            required: false
      postconditions:
        slot_conditions:
          unadjustedDate:
            required: true
          dateAdjustments:
            required: true
    comments:
    - 'Rosetta condition: AdjustedDate — if adjustedDate is absent then unadjustedDate exists and dateAdjustments exists'
    slots:
    - unadjustedDate
    - dateAdjustments
    - adjustedDate
    slot_usage:
      unadjustedDate:
        description: A date subject to adjustment.
    in_subset:
    - cdm_base_datetime

  AdjustableOrAdjustedOrRelativeDate:
    description: This Rosetta class specifies the date as either an unadjusted, adjusted or relative date. It supplements
      the features of the AdjustableOrAdjustedDate to support the credit default swap option premium, which uses the relative
      date construct.
    close_mappings:
    - fpml_5_10:AdjustableOrAdjustedOrRelativeDate
    rules:
    - description: This data rule extends the data rule AdjustableOrAdjustedDate_adjustedDate by specifying logic applicable
        to the relative date.
      postconditions:
        any_of:
        - slot_conditions:
            adjustedDate:
              required: true
        - slot_conditions:
            relativeDate:
              required: true
        - slot_conditions:
            unadjustedDate:
              required: true
        - slot_conditions:
            unadjustedDate:
              required: true
            dateAdjustments:
              required: true
            adjustedDate:
              required: false
      preconditions: {}
    comments:
    - 'Rosetta condition: AdjustedDate — adjustedDate exists or relativeDate exists or unadjustedDate exists or (unadjustedDate
      exists and dateAdjustments exists and adjustedDate is absent)'
    - 'Rosetta func: ConvertToAdjustableOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate
      to AdjustableOrRelativeDate'
    - 'Rosetta func: ConvertToAdjustableOrAdjustedOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate
      to AdjustableOrAdjustedOrRelativeDate'
    - 'Rosetta func: AdjustableOrAdjustedOrRelativeDateResolution — Prioritization of unadjustedDate over adjustedDate.'
    annotations:
      rosetta_functions: '[{"name":"ConvertToAdjustableOrRelativeDate","description":"Utility function to convert from AdjustableOrAdjustedOrRelativeDate
        to AdjustableOrRelativeDate","inputs":[{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}},{"name":"ConvertToAdjustableOrAdjustedOrRelativeDate","description":"Utility
        function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}},{"name":"AdjustableOrAdjustedOrRelativeDateResolution","description":"Prioritization
        of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..1"}}]'
    slots:
    - unadjustedDate
    - dateAdjustments
    - adjustedDate
    - relativeDate
    slot_usage:
      unadjustedDate:
        description: A date subject to adjustment.
    in_subset:
    - cdm_base_datetime

  AdjustableOrRelativeDate:
    description: A class giving the choice between defining a date as an explicit date together with applicable adjustments
      or as relative to some other (anchor) date.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"ResolveAdjustableDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"adjustedDate","type":"date","cardinality":"0..1"},"code_implementation":true},{"name":"ConvertToAdjustableOrRelativeDate","description":"Utility
        function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrRelativeDate","inputs":[{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}},{"name":"ConvertToAdjustableOrAdjustedOrRelativeDate","description":"Utility
        function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}}]'
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDate
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDate:
              required: true
        - slot_conditions:
            relativeDate:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AdjustableOrRelativeDateChoice — required choice adjustableDate, relativeDate'
    - 'Rosetta func: ResolveAdjustableDate'
    - 'Rosetta func: ConvertToAdjustableOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate
      to AdjustableOrRelativeDate'
    - 'Rosetta func: ConvertToAdjustableOrAdjustedOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate
      to AdjustableOrAdjustedOrRelativeDate'
    slots:
    - adjustableDate
    - relativeDate
    slot_usage:
      relativeDate:
        range: AdjustedRelativeDateOffset
    in_subset:
    - cdm_base_datetime

  AdjustableOrRelativeDates:
    description: A class giving the choice between defining a series of dates as an explicit list of dates together with applicable
      adjustments or as relative to some other series of (anchor) dates.
    annotations:
      metadata_key: true
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDates
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDates:
              required: true
        - slot_conditions:
            relativeDates:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AdjustableOrRelativeDatesChoice — required choice adjustableDates, relativeDates'
    slots:
    - adjustableDates
    - relativeDates
    in_subset:
    - cdm_base_datetime

  AdjustedRelativeDateOffset:
    description: A type defining a date (referred to as the derived date) as a relative offset from another date (referred
      to as the anchor date) plus optional date adjustments.
    is_a: RelativeDateOffset
    slots:
    - relativeDateAdjustments
    in_subset:
    - cdm_base_datetime

  BusinessCenters:
    description: A class for specifying the business day calendar location used in determining whether a day is a business
      day or not, either by specifying this business center by reference to an enumerated list that is maintained by the FpML
      standard, or by reference to such specification when it exists elsewhere as part of the instance document. This class
      corresponds to the FpML BusinessCentersOrReference.model.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"GetAllBusinessCenters","description":"Returns a merged list of BusinessCenter codes for
        the supplied BusinessCenters.","inputs":[{"name":"businessCenters","type":"BusinessCenters","cardinality":"1..1"}],"output":{"name":"businessCenterCodes","type":"BusinessCenter","cardinality":"0..*"}}]'
    close_mappings:
    - fpml_5_10:BusinessCenters
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            businessCenter:
              required: true
        - slot_conditions:
            businessCentersReference:
              required: true
        - slot_conditions:
            commodityBusinessCalendar:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: BusinessCentersChoice — required choice businessCenter, businessCentersReference, commodityBusinessCalendar'
    - 'Rosetta func: GetAllBusinessCenters — Returns a merged list of BusinessCenter codes for the supplied BusinessCenters.'
    slots:
    - businessCenter
    - commodityBusinessCalendar
    - businessCentersReference
    in_subset:
    - cdm_base_datetime

  BusinessCenterTime:
    description: A class for defining a time with respect to a business day calendar location. For example, 11:00:00 GBLO.
    close_mappings:
    - fpml_5_10:BusinessCenterTime
    comments:
    - 'Rosetta func: TimeZoneFromBusinessCenterTime — Function to resolve a time passed as BusinessCenterTime into a TimeZone
      time.'
    annotations:
      rosetta_functions: '[{"name":"TimeZoneFromBusinessCenterTime","description":"Function to resolve a time passed as BusinessCenterTime
        into a TimeZone time.","inputs":[{"name":"time","type":"BusinessCenterTime","cardinality":"1..1"}],"output":{"name":"result","type":"TimeZone","cardinality":"1..1"},"code_implementation":true}]'
    slots:
    - hourMinuteTime
    - businessCenter
    slot_usage:
      businessCenter:
        description: A code identifying a business day calendar location. A business day calendar location is drawn from the
          list identified by the business day calendar location enumeration.
        required: true
        multivalued: false
    in_subset:
    - cdm_base_datetime

  BusinessDateRange:
    description: A class defining a range of contiguous business days by defining an unadjusted first date, an unadjusted
      last date and a business day convention and business centers for adjusting the first and last dates if they would otherwise
      fall on a non business day in the specified business centers. The days between the first and last date must also be
      good business days in the specified centers to be counted in the range.
    is_a: DateRange
    close_mappings:
    - fpml_5_10:BusinessDateRange
    slots:
    - businessDayConvention
    - businessCenters
    in_subset:
    - cdm_base_datetime

  BusinessDayAdjustments:
    description: A class defining the business day convention and financial business centers used for adjusting any relevant
      date if it would otherwise fall on a day that is not a business day in the specified business center.
    annotations:
      metadata_key: true
    close_mappings:
    - fpml_5_10:BusinessDayAdjustments
    slots:
    - businessDayConvention
    - businessCenters
    slot_usage:
      businessDayConvention:
        description: The convention for adjusting a date if it would otherwise fall on a day that is not a business day.
    in_subset:
    - cdm_base_datetime

  DateRange:
    description: A class defining a contiguous series of calendar dates. The date range is defined as all the dates between
      and including the start and the end date. The start date must fall on or before the end date.
    rules:
    - description: The start date must fall on or before the end date (a date range of only one date is allowed).
      comments:
      - 'Rosetta comparison: startDate <= endDate'
      preconditions: {}
    comments:
    - 'Rosetta condition: DatesOrdered — startDate <= endDate'
    slots:
    - startDate
    - endDate
    in_subset:
    - cdm_base_datetime

  DateList:
    description: List of dates.
    slots:
    - date
    in_subset:
    - cdm_base_datetime

  DateTimeList:
    description: List of dateTimes.
    slots:
    - dateTime
    in_subset:
    - cdm_base_datetime

  Frequency:
    description: A class for defining a date frequency, e.g. one day, three months, through the combination of an integer
      value and a standardized period value that is specified as part of an enumeration.
    annotations:
      metadata_key: true
    rules:
    - description: FpML specifies that if period value is T (Term) then periodMultiplier must contain the value 1.
      preconditions:
        slot_conditions:
          period:
            equals_string: PeriodExtendedEnum.T
      postconditions:
        slot_conditions:
          periodMultiplier:
            equals_string: '1'
    - description: FpML specifies periodMultiplier as a positive integer.
      postconditions:
        slot_conditions:
          periodMultiplier:
            minimum_value: 0
            comments:
            - 'Rosetta: strictly greater than'
      preconditions: {}
    comments:
    - 'Rosetta condition: TermPeriod — if period = PeriodExtendedEnum -> T then periodMultiplier = 1'
    - 'Rosetta condition: PositivePeriodMultiplier — periodMultiplier > 0'
    slots:
    - periodMultiplier
    - period
    in_subset:
    - cdm_base_datetime

  Offset:
    description: A class defining an offset used in calculating a new date relative to a reference date, e.g. calendar days,
      business days, commodity Business days, etc.
    is_a: Period
    comments:
    - 'Rosetta condition: DayType — if period <> PeriodEnum -> D or periodMultiplier = 0 then dayType is absent'
    slots:
    - dayType
    in_subset:
    - cdm_base_datetime

  CustomisableOffset:
    description: A class to specify an offset either as a normalized [multiplier, period, dayType] or as a custom provision
      of type string.
    slots:
    - offset
    - customProvision
    in_subset:
    - cdm_base_datetime

  Period:
    description: A class to define recurring periods or time offsets.
    annotations:
      metadata_key: true
    close_mappings:
    - gist:TimeInterval
    comments:
    - 'Rosetta condition: DayPeriod — if periodMultiplier = 0 then period = PeriodEnum -> D'
    slots:
    - periodMultiplier
    - period
    slot_usage:
      periodMultiplier:
        description: A time period multiplier, e.g. 1, 2 or 3 etc. A negative value can be used when specifying an offset
          relative to another date, e.g. -2 days.
      period:
        range: PeriodEnum
        description: A time period, e.g. a day, week, month or year of the stream. If the periodMultiplier value is 0 (zero)
          then period must contain the value D (day).
    in_subset:
    - cdm_base_datetime

  RelativeDates:
    description: A class describing a set of dates defined as relative to another set of dates.
    is_a: RelativeDateOffset
    rules:
    - description: FpML specifies that, if present, the period skip should have a value greater than 1.
      preconditions:
        slot_conditions:
          periodSkip:
            required: true
      postconditions:
        slot_conditions:
          periodSkip:
            minimum_value: 1
            comments:
            - 'Rosetta: strictly greater than'
    comments:
    - 'Rosetta condition: PeriodSkipGreaterThanOne — if periodSkip exists then periodSkip > 1'
    slots:
    - periodSkip
    - scheduleBounds
    in_subset:
    - cdm_base_datetime

  RelativeDateOffset:
    description: A class defining a date (referred to as the derived date) as a relative offset from another date (referred
      to as the anchor date). If the anchor date is itself an adjustable date then the offset is assumed to be calculated
      from the adjusted anchor date. A number of different scenarios can be supported, namely; 1) the derived date may simply
      be a number of calendar periods (days, weeks, months or years) preceding or following the anchor date; 2) the unadjusted
      derived date may be a number of calendar periods (days, weeks, months or years) preceding or following the anchor date
      with the resulting unadjusted derived date subject to adjustment in accordance with a specified business day convention,
      i.e. the derived date must fall on a good business day; 3) the derived date may be a number of business days preceding
      or following the anchor date. Note that the businessDayConvention specifies any required adjustment to the unadjusted
      derived date. A negative or positive value in the periodMultiplier indicates whether the unadjusted derived precedes
      or follows the anchor date. The businessDayConvention should contain a value NONE if the day type element contains a
      value of Business (since specifying a negative or positive business days offset would already guarantee that the derived
      date would fall on a good business day in the specified business centers).
    is_a: Offset
    slots:
    - businessDayConvention
    - businessCenters
    - businessCentersReference
    - dateRelativeTo
    - adjustedDate
    slot_usage:
      businessCentersReference:
        description: A pointer style reference to a set of financial business centers defined elsewhere in the document. This
          set of business centers is used to determine whether a particular day is a business day or not.
    in_subset:
    - cdm_base_datetime

  TimeZone:
    description: The time alongside with the timezone location information. This class makes use of the FpML TimezoneLocation
      construct.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"TimeZoneFromBusinessCenterTime","description":"Function to resolve a time passed as BusinessCenterTime
        into a TimeZone time.","inputs":[{"name":"time","type":"BusinessCenterTime","cardinality":"1..1"}],"output":{"name":"result","type":"TimeZone","cardinality":"1..1"},"code_implementation":true}]'
    comments:
    - 'Rosetta func: TimeZoneFromBusinessCenterTime — Function to resolve a time passed as BusinessCenterTime into a TimeZone
      time.'
    slots:
    - time
    - location
    in_subset:
    - cdm_base_datetime

  DirectOrRelativeTime:
    description: Represents a time definition that can be either an absolute (direct) time or a time calculated relative to
      another referenced time. Either one directTime or one relativeTime should be provided
    slots:
    - directTime
    - relativeTime
    in_subset:
    - cdm_base_datetime

  RelativeTime:
    description: Defines a time value calculated relative to a reference time. The final value is derived by applying any
      offset and rounding rules inherited from RelativeTimeOffset to the reference time.
    is_a: RelativeTimeOffset
    slots:
    - timeRelativeTo
    in_subset:
    - cdm_base_datetime

  RelativeTimeOffset:
    description: Describes how a time is offset from a reference point, including the unit, magnitude, and rounding behavior.
    slots:
    - offsetTimeUnit
    - offsetMultiplier
    - rounding
    in_subset:
    - cdm_base_datetime

  TimeRounding:
    description: Specifies how a calculated time should be rounded, including both the direction of rounding and the unit
      to which the time is rounded. Rounding is applied after all offsets have been calculated.
    slots:
    - roundingDirection
    - roundToUnit
    in_subset:
    - cdm_base_datetime

  PeriodRange:
    description: Indicates The period range defined as either a lower and upper period bound, or both.
    rules:
    - description: AtLeastOneOf
      postconditions:
        any_of:
        - slot_conditions:
            lowerBound:
              required: true
        - slot_conditions:
            upperBound:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AtLeastOneOf — lowerBound exists or upperBound exists'
    slots:
    - lowerBound
    - upperBound
    in_subset:
    - cdm_base_datetime

  PeriodBound:
    description: Indicator to specify if the period bound is defined as a period and whether the bound is inclusive.
    slots:
    - period
    - inclusive
    slot_usage:
      period:
        range: Period
        description: Specifies the period is to be used as the bound, e.g. 5Y.
    in_subset:
    - cdm_base_datetime

  AveragingSchedule:
    description: Class to representing a method for generating a series of dates.
    close_mappings:
    - fpml_5_10:AveragingSchedule
    slots:
    - startDate
    - endDate
    - averagingPeriodFrequency
    slot_usage:
      startDate:
        description: Date on which this period begins.
      endDate:
        description: Date on which this period ends.
    in_subset:
    - cdm_base_datetime

  AdjustableRelativeOrPeriodicDates:
    description: A class giving the choice between defining a series of dates as an explicit list of dates together with applicable
      adjustments or as relative to some other series of (anchor) dates, or as a calculation period schedule.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"ResolveAdjustableDates","inputs":[{"name":"adjustableRelativeOrPeriodicDates","type":"AdjustableRelativeOrPeriodicDates","cardinality":"1..1"}],"output":{"name":"adjustedDates","type":"date","cardinality":"0..*"},"code_implementation":true}]'
    close_mappings:
    - fpml_5_10:AdjustableRelativeOrPeriodicDates
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDates:
              required: true
        - slot_conditions:
            relativeDates:
              required: true
        - slot_conditions:
            periodicDates:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: AdjustableRelativeOrPeriodicDatesChoice — required choice adjustableDates, relativeDates, periodicDates'
    - 'Rosetta func: ResolveAdjustableDates'
    slots:
    - adjustableDates
    - relativeDates
    - periodicDates
    in_subset:
    - cdm_base_datetime

  PeriodicDates:
    description: A class for specifying a calculation period schedule.
    slots:
    - startDate
    - endDate
    - periodFrequency
    - periodDatesAdjustments
    - dayType
    slot_usage:
      startDate:
        range: AdjustableOrRelativeDate
        description: The start date of the calculation period. FpML specifies that for interest rate swaps this date must
          only be specified if it is not equal to the effective date. It is always specified in the case of equity swaps and
          credit default swaps with periodic payments. This date may be subject to adjustment in accordance with a business
          day convention.
        required: false
      endDate:
        range: AdjustableOrRelativeDate
        description: The end date of the calculation period. FpML specifies that for interest rate swaps this date must only
          be specified if it is not equal to the termination date. It is always specified in the case of equity swaps with
          periodic payments. This date may be subject to adjustment in accordance with a business day convention.
        required: false
      dayType:
        description: Denotes the enumerated values to specify the day type classification used in counting the number of days
          between two dates.
    in_subset:
    - cdm_base_datetime

  CalculationPeriodFrequency:
    description: A class to specify the frequency at which calculation period end dates occur within the regular part of the
      calculation period schedule and their roll date convention.
    is_a: Frequency
    close_mappings:
    - fpml_5_10:CalculationPeriodFrequency
    comments:
    - 'Rosetta condition: FpML_ird_57 — if period = PeriodExtendedEnum -> M or period = PeriodExtendedEnum -> Y then rollConvention
      <> RollConventionEnum -> NONE and rollConvention <> RollConventionEnum -> SFE and rollConvention <> RollConventionEnum
      -> MON and rollConvention <> RollConventionEnum -> TUE and rollConvention <> RollConventionEnum -> WED and rollConvention
      <> RollConventionEnum -> THU and rollConvention <> RollConventionEnum -> FRI and rollConvention <> RollConventionEnum
      -> SAT and rollConvention <> RollConventionEnum -> SUN'
    - 'Rosetta condition: FpML_ird_58 — if period = PeriodExtendedEnum -> W then rollConvention = RollConventionEnum -> NONE
      or rollConvention = RollConventionEnum -> SFE or rollConvention = RollConventionEnum -> MON or rollConvention = RollConventionEnum
      -> TUE or rollConvention = RollConventionEnum -> WED or rollConvention = RollConventionEnum -> THU or rollConvention
      = RollConventionEnum -> FRI or rollConvention = RollConventionEnum -> SAT or rollConvention = RollConventionEnum ->
      SUN'
    - 'Rosetta condition: FpML_ird_60 — if period = PeriodExtendedEnum -> T then rollConvention = RollConventionEnum -> NONE'
    slots:
    - rollConvention
    - balanceOfFirstPeriod
    in_subset:
    - cdm_base_datetime

  CalculationFrequency:
    description: Represents the parameters for describing how often something (such as collateral interest) is to be calculated.
    close_mappings:
    - fpml_5_10:CalculationFrequency
    rules:
    - description: Moy
      preconditions:
        slot_conditions:
          monthOfYear:
            required: true
      postconditions:
        slot_conditions:
          monthOfYear:
            maximum_value: 12
    - description: Dom
      preconditions:
        slot_conditions:
          dayOfMonth:
            required: true
      postconditions:
        slot_conditions:
          dayOfMonth:
            maximum_value: 31
    - description: Wom
      preconditions:
        slot_conditions:
          weekOfMonth:
            required: true
      postconditions:
        slot_conditions:
          weekOfMonth:
            maximum_value: 5
    comments:
    - 'Rosetta condition: Moy — if monthOfYear exists then monthOfYear <= 12'
    - 'Rosetta condition: Dom — if dayOfMonth exists then dayOfMonth <= 31'
    - 'Rosetta condition: Wom — if weekOfMonth exists then weekOfMonth <= 5'
    - 'Rosetta condition: MoyTerm — if monthOfYear exists then (period -> period = PeriodEnum -> Y)'
    - 'Rosetta condition: DomTerm — if dayOfMonth exists then (period -> period = PeriodEnum -> M)'
    - 'Rosetta condition: DowTerm — if dayOfWeek exists then (period -> period = PeriodEnum -> W)'
    - 'Rosetta condition: WomTerm — if weekOfMonth exists then (period -> period = PeriodEnum -> M)'
    slots:
    - period
    - monthOfYear
    - dayOfMonth
    - dayOfWeek
    - weekOfMonth
    - offsetDays
    - dateLocation
    - businessCenter
    slot_usage:
      period:
        range: Period
        description: Specifies the time period at which calculation is performed, e.g. 1 month.
      businessCenter:
        description: Specifies the business center for adjustment of calculation period.
    in_subset:
    - cdm_base_datetime
