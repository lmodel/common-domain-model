  BusinessDayConventionEnum:
    description: The enumerated values to specify the convention for adjusting any relevant date if it would otherwise fall
      on a day that is not a valid business day.
    permissible_values:
      FOLLOWING:
        description: The non-business date will be adjusted to the first following day that is a business day
      FRN:
        description: Per 2000 ISDA Definitions, Section 4.11. FRN Convention; Eurodollar Convention. FRN is included here
          as a type of business day convention although it does not strictly fall within ISDA's definition of a Business Day
          Convention and does not conform to the simple definition given above.
      MODFOLLOWING:
        description: The non-business date will be adjusted to the first following day that is a business day unless that
          day falls in the next calendar month, in which case that date will be the first preceding day that is a business
          day.
      PRECEDING:
        description: The non-business day will be adjusted to the first preceding day that is a business day.
      MODPRECEDING:
        description: The non-business date will be adjusted to the first preceding day that is a business day unless that
          day falls in the previous calendar month, in which case that date will be the first following day that us a business
          day.
      NEAREST:
        description: The non-business date will be adjusted to the nearest day that is a business day - i.e. if the non-business
          day falls on any day other than a Sunday or a Monday, it will be the first preceding day that is a business day,
          and will be the first following business day if it falls on a Sunday or a Monday.
      NONE:
        description: The date will not be adjusted if it falls on a day that is not a business day.
      NotApplicable:
        description: The date adjustments conventions are defined elsewhere, so it is not required to specify them here.

  DayOfWeekEnum:
    description: The enumerated values to specify a day of the seven-day week.
    permissible_values:
      MON:
        description: Monday
      TUE:
        description: Tuesday
      WED:
        description: Wednesday
      THU:
        description: Thursday
      FRI:
        description: Friday
      SAT:
        description: Saturday
      SUN:
        description: Sunday

  DayTypeEnum:
    description: Lists the enumerated values to specify the day type classification used in counting the number of days between
      two dates.
    permissible_values:
      Business:
        description: Applies when calculating the number of days between two dates the count includes only business days.
      Calendar:
        description: Applies when calculating the number of days between two dates the count includes all calendar days.
      CurrencyBusiness:
        description: Applies when calculating the number of days between two dates the count includes only currency business
          days.
      ExchangeBusiness:
        description: Applies when calculating the number of days between two dates the count includes only stock exchange
          business days.
      ScheduledTradingDay:
        description: Applies when calculating the number of days between two dates the count includes only scheduled trading
          days.

  PeriodEnum:
    description: The enumerated values to specify the period, e.g. day, week.
    permissible_values:
      D:
        description: Day
      W:
        description: Week
      M:
        description: Month
      Y:
        description: Year

  PeriodExtendedEnum:
    description: The enumerated values to specify a time period containing the additional value of Term.
    permissible_values:
      H:
        description: Hour
      D:
        description: Day
      W:
        description: Week
      M:
        description: Month
      Y:
        description: Year
      T:
        description: Term. The period commencing on the effective date and ending on the termination date. The T period always
          appears in association with periodMultiplier = 1, and the notation is intended for use in contexts where the interval
          thus qualified (e.g. accrual period, payment period, reset period, ...) spans the entire term of the trade.
      C:
        description: CalculationPeriod - the period corresponds to the calculation period   For example, used in the Commodity
          Markets to indicate that a reference contract is the one that corresponds to the period of the calculation period.

  PeriodTimeEnum:
    description: The enumeration values to specify a time period containing additional values such as Term.
    permissible_values:
      Hour:
        description: Period measured in hours.
      Minute:
        description: Period measured in minutes.
      Second:
        description: Period measured in seconds.

  TimeUnitEnum:
    description: The enumeration values to qualify the allowed units of time.
    permissible_values:
      Second:
        description: Second
      Minute:
        description: Minute
      Hour:
        description: Hour
      Day:
        description: Day
      Week:
        description: Week
      Month:
        description: Month
      Year:
        description: Year

  RollConventionEnum:
    description: The enumerated values to specify the period term as part of a periodic schedule, i.e. the calculation period
      end date within the regular part of the calculation period. The value could be a rule, e.g. IMM Settlement Dates, which
      is the 3rd Wednesday of the month, or it could be a specific day of the month, such as the first day of the applicable
      month.
    permissible_values:
      EOM:
        description: Rolls on month end dates irrespective of the length of the month and the previous roll day.
      FRN:
        description: Roll days are determined according to the FRN Convention or Euro-dollar Convention as described in ISDA
          2000 definitions.
      IMM:
        description: IMM Settlement Dates. The third Wednesday of the (delivery) month.
      IMMCAD:
        description: The last trading day/expiration day of the Canadian Derivatives Exchange (Bourse de Montreal Inc) Three-month
          Canadian Bankers' Acceptance Futures (Ticker Symbol BAX). The second London banking day prior to the third Wednesday
          of the contract month. If the determined day is a Bourse or bank holiday in Montreal or Toronto, the last trading
          day shall be the previous bank business day. Per Canadian Derivatives Exchange BAX contract specification.
      IMMAUD:
        description: The last trading day of the Sydney Futures Exchange 90 Day Bank Accepted Bills Futures contract (see
          http://www.sfe.com.au/content/sfe/trading/con_specs.pdf). One Sydney business day preceding the second Friday of
          the relevant settlement.
      IMMNZD:
        description: The last trading day of the Sydney Futures Exchange NZ 90 Day Bank Bill Futures contract (see http://www.sfe.com.au/content/sfe/trading/con_specs.pdf).
          The first Wednesday after the ninth day of the relevant settlement month.
      SFE:
        description: Sydney Futures Exchange 90-Day Bank Accepted Bill Futures Settlement Dates. The second Friday of the
          (delivery) month
      NONE:
        description: The roll convention is not required. For example, in the case of a daily calculation frequency.
      TBILL:
        description: 13-week and 26-week U.S. Treasury Bill Auction Dates. Each Monday except for U.S. (New York) holidays
          when it will occur on a Tuesday.
