id: https://w3id.org/finos/cdm/cdm_base_datetime
name: cdm_base_datetime
description: 'Basic date and time concepts: relative date, date range, offset, business centre etc.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_math
- ./cdm_base_staticdata_codelist

comments:
- 'Rosetta func: TimeZoneFromBusinessCenterTime — Function to resolve a time passed as BusinessCenterTime into a TimeZone
  time. | inputs(time: BusinessCenterTime (1..1)) | output(result: TimeZone (1..1))'
- 'Rosetta func: ResolveAdjustableDate | inputs(adjustableOrRelativeDate: AdjustableOrRelativeDate (1..1)) | output(adjustedDate:
  date (0..1))'
- 'Rosetta func: ResolveAdjustableDates | inputs(adjustableRelativeOrPeriodicDates: AdjustableRelativeOrPeriodicDates (1..1))
  | output(adjustedDates: date (0..*))'
- 'Rosetta func: ToDateTime — Creates a ZonedDateTime from the provided Date, and defaults the time to 00:00:00 and timezone
  to UTC. | inputs(date: date (0..1)) | output(zonedDateTime: zonedDateTime (0..1))'
- 'Rosetta func: ToTime — Implemented by Java function. | inputs(hours: int (1..1), minutes: int (1..1), seconds: int (1..1))
  | output(time: time (1..1))'
- 'Rosetta func: ConvertToAdjustableOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate to
  AdjustableOrRelativeDate | inputs(adjustableOrAdjustedOrRelativeDate: AdjustableOrAdjustedOrRelativeDate (0..1)) | output(adjustableOrRelativeDate:
  AdjustableOrRelativeDate (0..1))'
- 'Rosetta func: ConvertToAdjustableOrAdjustedOrRelativeDate — Utility function to convert from AdjustableOrAdjustedOrRelativeDate
  to AdjustableOrAdjustedOrRelativeDate | inputs(adjustableOrRelativeDate: AdjustableOrRelativeDate (0..1)) | output(adjustableOrAdjustedOrRelativeDate:
  AdjustableOrAdjustedOrRelativeDate (0..1))'
- 'Rosetta func: Now — Current date time. | output(now: zonedDateTime (1..1))'
- 'Rosetta func: Today — Current date. | output(today: date (1..1))'
- 'Rosetta func: GetAllBusinessCenters — Returns a merged list of BusinessCenter codes for the supplied BusinessCenters. |
  inputs(businessCenters: BusinessCenters (1..1)) | output(businessCenterCodes: BusinessCenter (0..*))'
- 'Rosetta func: BusinessCenterHolidaysMultiple — Returns a merged list of holidays for the supplied business centers. | inputs(businessCenters:
  BusinessCenter (0..*)) | output(holidayDates: date (0..*))'
- 'Rosetta func: BusinessCenterHolidays | inputs(businessCenter: BusinessCenter (1..1)) | output(holidayDates: date (0..*))'
- 'Rosetta func: DayOfWeek — Returns the day of week corresponding to the supplied date. | inputs(date: date (1..1)) | output(dayOfWeek:
  DayOfWeekEnum (1..1))'
- 'Rosetta func: AddDays — Adds the specified number of calendar days to the supplied date.  A negative number will generate
  a date before the supplied date. | inputs(inputDate: date (1..1), numDays: int (1..1)) | output(resultDate: date (1..1))'
- 'Rosetta func: DateDifference — Subtracts the two supplied dates to return the number of calendar days between them.  A
  negative number implies first is after second. | inputs(firstDate: date (1..1), secondDate: date (1..1)) | output(difference:
  int (1..1))'
- 'Rosetta func: LeapYearDateDifference — Subtracts the two supplied dates to return the number of leap year calendar days
  between them. A negative number implies firstDate is after secondDate. | inputs(firstDate: date (1..1), secondDate: date
  (1..1)) | output(difference: int (1..1))'
- 'Rosetta func: DateDifferenceYears — Computes the difference in years between two dates. A negative number implies firstDate
  is after secondDate. | inputs(firstDate: date (1..1), secondDate: date (1..1)) | output(difference: number (1..1))'
- 'Rosetta func: AppendDateToList — Add a date to a list of dates. | inputs(origDates: date (0..*), newDate: date (1..1))
  | output(newList: date (0..*))'
- 'Rosetta func: PopOffDateList — Remove last element from a list of dates. | inputs(dates: date (0..*)) | output(newList:
  date (0..*))'
- 'Rosetta func: IsWeekend — returns whether the supplied date is a weekend. This assumes a 5 day week with Saturday and Sunday
  as holidays. A more sophisticated implementation might use the business centers to determine which days are weekends, but
  most jurisdictions where derivatives are traded follow this convention. | inputs(date: date (1..1), businessCenters: BusinessCenter
  (0..*)) | output(isWeekend: boolean (1..1))'
- 'Rosetta func: IsHoliday — Returns whether a day is a holiday for the specified business centers | inputs(checkDate: date
  (1..1), businessCenters: BusinessCenter (0..*)) | output(isHoliday: boolean (1..1))'
- 'Rosetta func: IsBusinessDay — returns an indicator of whether the supplied date is a good business date given the supplied
  business centers. True => good date, i.e. not a weekend or holiday. False means that it is either a weekend or a holiday
  | inputs(date: date (1..1), businessCenters: BusinessCenter (0..*)) | output(isGoodBusinessDay: boolean (1..1))'
- 'Rosetta func: AddBusinessDays — Returns a good business date that has been offset by the given number of business days
  given the supplied business centers. A negative value implies an earlier date (before the supplied originalDate), and a
  positive value a later date (after the supplied date). | inputs(originalDate: date (1..1), offsetBusinessDays: int (1..1),
  businessCenters: BusinessCenter (0..*)) | output(shiftedDate: date (1..1))'
- 'Rosetta func: GenerateDateList — Creates a list of good business days starting from the startDate and going to the end
  date, inclusive, omitting any days that are weekends or holidays according to the supplied business centers. | inputs(startDate:
  date (1..1), endDate: date (1..1), businessCenters: BusinessCenter (0..*)) | output(dateList: date (0..*))'
- 'Rosetta func: AdjustableOrAdjustedOrRelativeDateResolution — Prioritization of unadjustedDate over adjustedDate. | inputs(adjustableDate:
  AdjustableOrAdjustedOrRelativeDate (1..1)) | output(date: date (0..1))'
- 'Rosetta func: AdjustableDateResolution — Prioritization of unadjustedDate over adjustedDate. | inputs(adjustableDate: AdjustableDate
  (1..1)) | output(date: date (0..1))'
- 'Rosetta func: AdjustableDatesResolution — Prioritization of unadjustedDate over adjustedDate. | inputs(adjustableDates:
  AdjustableDates (1..1)) | output(date: date (0..*))'
