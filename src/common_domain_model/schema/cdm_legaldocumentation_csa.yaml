      - customElection
    slot_usage:
      customElection:
        description: The Interest Adjustment periodicity when specified through a custom election.
    in_subset:
      - cdm_legaldocumentation_csa

  InterestAmount:
    description: A class to specify the application of Interest Amount with respect to the Delivery Amount and the Return
      Amount.
    notes:
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(n)(ii)"
    see_also:
      - isda:CSA_IM_Japanese_2016
    slots:
      - returnAmount
      - deliveryAmount
    slot_usage:
      returnAmount:
        range: ReturnAmount
        description: The application of Interest Amount with respect the Return Amount.
      deliveryAmount:
        range: DeliveryAmount
        description: The application of Interest Amount with respect the Delivery Amount.
    in_subset:
      - cdm_legaldocumentation_csa

  JapaneseSecuritiesProvisions:
    description: A class to specify Japanese Securities Provision elections.
    rules:
      - description: A data rule to enforce that the specific terms applicable to Recommended Japanese Securities Provisions
          should be specified when required.
        preconditions:
          slot_conditions:
            relevantProvisionsElection:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            relevantProvisionsTerms:
              required: false
      - description: A data rule to enforce that the specific terms applicable to Additional Amendments to Japanese Securities
          Provisions should be specified when required.
        preconditions:
          slot_conditions:
            amendmentsToJapaneseProvisions:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            amendmentsToJapaneseProvisionsTerms:
              required: false
    comments:
      - 'Rosetta condition: RelevantProvisionsElection — if relevantProvisionsElection = True then relevantProvisionsTerms
        is absent'
      - 'Rosetta condition: AmendmentsToJapaneseProvisions — if amendmentsToJapaneseProvisions = False then amendmentsToJapaneseProvisionsTerms
        is absent'
    slots:
      - isApplicable
      - relevantProvisionsElection
      - relevantProvisionsTerms
      - amendmentsToJapaneseProvisions
      - amendmentsToJapaneseProvisionsTerms
      - clearstreamAmendmentToJapaneseProvisions
    slot_usage:
      isApplicable:
        description: Japanese Securities Provisions are applicable when True and Not Applicable when False.
    in_subset:
      - cdm_legaldocumentation_csa

  JurisdictionRelatedTerms:
    description: A class to specify terms jurisdiction related terms.
    slots:
      - japaneseSecuritiesProvisions
      - exclusiveJurisdiction
      - juryWaiver
      - frenchLawAddendum
      - belgianLawSecurityAgreement
    in_subset:
      - cdm_legaldocumentation_csa

  MarginApproach:
    description: A class for selection of Margin Approach.
    slots:
      - marginApproach
    in_subset:
      - cdm_legaldocumentation_csa

  MinimumTransferAmountAmendment:
    description: ' A class to specify whether Amendment to Minimum Transfer Amount language is applicable or not.'
    rules:
      - description: A data rule to enforce that the Effective Date and Party Elections should be absent when the Minimum
          Transfer Amount Amendment is stated as not specified for the agreement.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            effectiveDate:
              required: false
            partyElections:
              required: false
    comments:
      - 'Rosetta condition: AmendmentNotApplicable — if isApplicable = False then effectiveDate is absent and partyElections
        is absent'
    slots:
      - isApplicable
      - effectiveDate
      - partyElections
    slot_usage:
      isApplicable:
        description: The definition of Minimum Transfer Amount in any Other Regulatory CSA will be amended when applicable.
      effectiveDate:
        range: AmendmentEffectiveDate
        description: The effective date of the Amendment to Termination Currency.
    in_subset:
      - cdm_legaldocumentation_csa

  NotificationTime:
    description: Specifies the time by which a demand for the Transfer of Eligible Credit Support or Posted Credit Support
      needs to be made in order for the transfer to take place in accordance with the Transfer Timing provisions.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(d)(iii)" name "Notification Time"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(e)(iii)" name "Notification Time"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(iii)" name "Notification Time"
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(c)(iv)" name "Notification Time"
      - ISDA CSA_English_1995 paragraph "11" clause "(c)(iv)" name "Notification Time"
      - ISDA CSD_English_1995 paragraph "13" clause "(d)(iv)" name "Notification Time"
      - ISDA CSA_VM_English_2016 paragraph "11" clause "(d)(iv)" name "Notification Time"
      - ISDA CSA_VM_NewYork_2016 paragraph "13" clause "(d)(iv)" name "Notification Time"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
      - isda:CSA_NewYork_1994
      - isda:CSA_English_1995
      - isda:CSD_English_1995
      - isda:CSA_VM_English_2016
      - isda:CSA_VM_NewYork_2016
    slots:
      - partyElections
      - disputeNotificationReference
      - transferTimingProviso
    slot_usage:
      partyElections:
        range: NotificationTimeElection
        description: The parties' Notification Time election.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  NotificationTimeElection:
    description: A class to specify the notification time election by the respective parties to the agreement.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(d)(iii)" name "Notification Time"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(e)(iii)" name "Notification Time"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(iii)" name "Notification Time"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    rules:
      - description: The Notification Time is specified either as a time that is qualified by a standard business center or
          as a custom election.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                notificationTime:
                  required: true
            - slot_conditions:
                customNotification:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: NotificationTimeElectionChoice — required choice notificationTime, customNotification'
    slots:
      - party
      - notificationTime
      - customNotification
      - localBusinessDay
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      notificationTime:
        range: BusinessCenterTime
        description: The Notification Time as a time that is qualified as a standard business center.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  OneWayProvisions:
    description: A class to specify whether One Way Provisions apply.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(aa)" name "One Way Provisions"
    see_also:
      - isda:CSA_IM_2016
    rules:
      - description: A data rule to enforce that the Posting Party must be specified in the case where the One Way Provision
          is deemed applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            postingParty:
              required: true
      - description: A data rule to enforce that the Posting Party must not be specified in the case where the One Way Provision
          is not deemed applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            postingParty:
              required: false
    comments:
      - 'Rosetta condition: PostingPartyExists — if isApplicable = True then postingParty exists'
      - 'Rosetta condition: PostingPartyAbsent — if isApplicable = False then postingParty is absent'
    slots:
      - isApplicable
      - postingParty
    slot_usage:
      isApplicable:
        description: The determination of whether the One Way Provisions are applicable (true) or not applicable (false).
    in_subset:
      - cdm_legaldocumentation_csa

  OtherAgreements:
    description: The bespoke definition of other agreements or other credit support annex terms as specified by the parties
      to the agreement.
    slots:
      - otherCSA
      - japaneseLawCsa
    in_subset:
      - cdm_legaldocumentation_csa

  OtherEligibleAndPostedSupport:
    description: Specifies the Other Eligible Support elections.
