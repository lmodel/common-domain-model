  CSASpecifiedOrAccessConditionEnum:
    description: Specifies the types of events in the related Master Agreement that, when triggered, could temporarily or
      permanently suspend rights to rehypothecate, transfer or substitute collateral.
    permissible_values:
      Illegality:
        description: Specifies an event where a party is unable to comply with its obligations under the Master Agreement
          because to do so would be unlawful.
      TaxEvent:
        description: Specifies an event where a party experiences changes in tax laws incurring further tax liability.
      TaxEventUponMerger:
        description: Specifies an event where a party incurs tax liability due to a merger.
      CreditEventUponMerger:
        description: Specifies an event where a party merges and the new entity becomes materially less creditworthy than
          the original.
      AdditionalTerminationEvents:
        description: Specifies events which could trigger rights to early termination.
      ForceMajeureEvent:
        description: Specifies an event beyond the control of one or both of the parties which prevents or renders it impossible
          to fulfill their obligations to the other party.
      PotentialTerminationEvents:
        description: Specifies a potential event that could trigger rights to early termination.

  AdditionalTerminationEventEnum:
    description: Specifies the types of events found in the related Master Agreement that may lead to the early termination
      of the Master Agreement, including suspension of the affected party's rights to rehypothecate, transfer, or substitute
      collateral.
    permissible_values:
      FailureToNotifyNAV:
        description: Specifies an event where a party fails to notify the other of a decline in Net Asset Value by a specified
          amount over a specified period of time.
      InvestmentAdvisor:
        description: Specifies an event where the investment advisor of a party ceases to act for the party.
      KeyPersons:
        description: Specifies an event where a person deemed important to a party has departed.
      NAVDeclineTrigger:
        description: Specifies an event in which a partys Net Asset Value (NAV) has declined beyond a specified percentage
          or amount within a defined time period.
      NAVFloor:
        description: Specifies an event in which a partys Net Asset Value (NAV) falls below a predetermined absolute value,
          regardless of the timeframe over which the decline occurs. This value sets a minimum acceptable NAV threshold expressed
          as either a percentage or amount.
      OperativeDocs:
        description: Specifies an event where a party delivers operative documents that are invalid, untrue or unenforceable.
      RatingsDowngradeOrWithdrawalParty1:
        description: Specifies an event where Party 1 experiences a downgrade beyond a predetermined level, or has their credit
          rating withdrawn or suspended.
      RatingsDowngradeOrWithdrawalParty2:
        description: Specifies an event where Party 2 experiences a downgrade beyond a predetermined level, or has their credit
          rating withdrawn or suspended.
      AsApplicable:
        description: Represents the Additional Termination Event(s) in the related Master Agreement.
      AsSpecified:
        description: Represents any bespoke Additional Termination Event(s) that are set out in the related Specified Condition
          clause.

  IndependentAmountCompareEnum:
    description: Specifies how multiple credit ratings are compared when determining the applicable Independent Amount, and
      whether that measure is highest, lowest, or a comparison of the ratings.
    inherits:
      - CreditNotationMismatchResolutionEnum
    permissible_values:
      Compare:
        description: Represents that the credit ratings across multiple credit rating agencies will be compared against one
          another.

  RatedPartyEnum:
    description: The enumerated values applicable where a Rated Party is defined within the relevant clause.
    permissible_values:
      Party:
        description: Party.
      CreditSupportProvider:
        description: Credit Support Provider.
      NamedEntity:
        description: A Named Entity.
      PartyOrCreditSupportProvider:
        description: The Party or Credit Support Provider.
      NamedAffiliate:
        description: A Named Affiliate of the Party.
      AllAffiliates:
        description: All Affiliates to the Party.
        aliases:
          - All Affiliates to the Party

  ZeroEventEnum:
    description: The enumerated values for defining the relevant trigger(s) for the Minimum Transfer Amount (MTA) to fall
      to zero.
    permissible_values:
      EventOfDefault:
        description: An Event of Default.
      TerminationEvent:
        description: A Termination Event.
      TerminationEventAllAffectedTransactions:
        description: A Termination Event in respect of which all Transactions are Affected Transactions.
        aliases:
          - A Termination Event in respect of which all Transactions are Affected Transactions
      PotentialEventOfDefault:
        description: A Potential Event of Default.
      AdditionalTerminationEvent:
        description: An Additional Termination Event (ATE).
      Other:
        description: Utilised where the clause data structure is not able to capture a material aspect of the clause.

slots:
  regime:
    range: Regime
    description: The Regime Table provision , which determines the regulatory regime(s) applicable to each of the parties
      to the agreement.
    required: true

  oneWayProvisions:
    range: OneWayProvisions
    description: The determination of whether the One Way Provisions are applicable (true) or not applicable (false).
    required: true

  generalSimmElections:
    range: GeneralSimmElections
    description: The specification of the ISDA SIMM Method for all Covered Transactions with respect to all Regimes.

  identifiedCrossCurrencySwap:
    range: boolean
    description: The qualification of whether cross-currency swaps need to be identified in the Confirmation so that the obligations
      to exchange principal be disregarded for the purpose of determining the Delivery Amount or Return Amount.

  sensitivityMethodologies:
    range: SensitivityMethodologies
    description: The specification of methodologies to compute sensitivities specific to the agreement.
    required: true

  fxHaircutCurrency:
    range: FxHaircutCurrency
    description: The reference currency for the purpose of specifying the FX Haircut relating to a posting obligation, as
      being either the Termination Currency or an FX Designated Currency.

  postingObligations:
    range: PostingObligations
    description: The security providers posting obligations.
    required: true

  substitutedRegime:
    range: SubstitutedRegime
    description: The specification of Additional regimes for purposes of determining whether a Regulatory Event has occurred.
    multivalued: true
    inlined_as_list: true

  coveredTransactions:
    range: CoveredTransactions
    description: The specification of transactions covered by the terms of the agreement.

  rightsEvents:
    range: RightsEvents
    description: The bespoke provisions that might be specified by the parties to the agreement to specify the rights of Security
      Taker and/or Security Provider when an Early Termination or Access Condition event has occurred.
    required: true

  custodyArrangements:
    range: CustodyArrangements
    description: The Custodian and Segregated Account details in respect of each party to the agreement.

  otherAgreements:
    range: OtherAgreements
    description: The bespoke definition of other agreement terms as specified by the parties to the agreement.

  terminationCurrencyAmendment:
    range: TerminationCurrencyAmendment
    description: The bespoke provision that might be specified by the parties to the agreement applicable to Termination Currency.  Unless
      specified the definition of Termination Currency has the meaning specified in the Schedule to the ISDA Master Agreement.
    required: true

  minimumTransferAmountAmendment:
    range: MinimumTransferAmountAmendment
    description: The bespoke provision that might be specified by the parties to the agreement applicable to Minimum Transfer
      Amount.  Unless specified the definition of Minimum Transfer Amount in any Other Regulatory CSA has the meaning specified
      in such Other Regulatory CSA.
    required: true

  interpretationTerms:
    range: string
    description: The bespoke provision that might be specified by the parties to the agreement applicable to Interpretations.

  processAgent:
    range: ProcessAgent
    description: The Process Agent that might be appointed by the parties to the agreement.
    required: true

  appropriatedCollateralValuation:
    range: AppropriatedCollateralValuation
    description: The election for the Valuation of Appropriate Collateral.

  jurisdictionRelatedTerms:
    range: JurisdictionRelatedTerms
    description: The jurisdiction specific terms relevant to the agreement.

  additionalAmendments:
    range: string
    description: Any additional amendments that might be specified by the parties to the agreement.

  additionalBespokeTerms:
    range: string
    description: Any additional terms that might be specified applicable.

  trustSchemeAddendum:
    range: boolean
    description: The qualification of whether Trust Scheme Addendum is applicable (True) or not applicable (False).
    required: true

  clientAssetSourcebookAdditionalLanguage:
    range: string
    description: Details of language relating to Client Asset and Money Rules (CASS).

  creditSupportObligations:
    range: CreditSupportObligationsInitialMargin
    description: The Credit Support Obligations applicable to the agreement.
    required: true

  calculationAndTiming:
    range: CalculationAndTimingInitialMargin
    description: The set of elections for determining Valuation and Timing terms specific to the agreement.
    required: true

  exchangeDate:
    range: string
    description: The bespoke exchange date terms that might be specified by the parties to the agreement.

  creditSupportOffsets:
    range: boolean
    description: The specification of whether the standard Credit Support Offset provisions are applicable (true) or not applicable
      (false).
    required: true

  addressesForTransfer:
    range: AddressesForTransfer
    description: The optional specification of address for transfer as specified by the respective parties to the agreement.

  securityInterestForObligations:
    range: SecurityInterestForObligations
    description: The party to whom obligations under the Master Agreement are owed and secured by the credit support arrangements.
      Applicable to 1994 NY CSA, 1995 English Law CSD and 2016 New York Law VM CSA.
    required: true

  singlePostingParty:
    range: SinglePostingParty
    description: Where only a single  party is explicitly designated to post collateral, the party which is specified as the
      sole poster of collateral.

  baseAndEligibleCurrency:
    range: BaseAndEligibleCurrency
    description: The base and eligible currency(ies) for the document as specified by the parties to the agreement.
    required: true

  conditionsPrecedent:
    range: ConditionsPrecedent
    description: The set of elections that may overwrite the default Condition Precedent provision, and the set of provisions
      that are deemed Access Condition.

  substitution:
    range: Substitution
    description: The conditions under which the Security Provider can substitute posted collateral.

  disputeResolution:
    range: DisputeResolution
    description: The election terms under which a party disputes (i) the Calculation Agents calculation of a Delivery Amount
      or a Return Amount, or (ii) the Value of any Transfer of Eligible Credit Support or Posted Credit Support.
    required: true

  holdingAndUsingPostedCollateral:
    range: HoldingAndUsingPostedCollateral
    description: The elections for the holding and using of posted collateral by the respective parties to the Credit Support
      Annex for Variation Margin.

  distributionAndInterestPayment:
    range: DistributionAndInterestPayment
    description: The Distributions and Interest Payment terms specified as part of the agreement.

  otherEligibleAndPostedSupport:
    range: OtherEligibleAndPostedSupport
    description: The Other Eligible Support elections associated with margin agreements.

  demandsAndNotices:
    range: DemandsAndNotices
    description: The optional specification of address where the demands, specifications and notices will be communicated
      to for each of the parties to the agreement.

  additionalRepresentations:
    range: AdditionalRepresentations
    description: The specification Additional Representations that may be applicable to the agreement.

  masterAgreementDatedAsOfDate:
    range: MasterAgreementDatedAsOfDate
    description: Defines the dates agreed by the parties as the date of the Credit Support Annex or Credit Support Deed.

  finalReturns:
    range: FinalReturns
    description: A clause providing that final return collateral is to be provided without consideration of any Minimum Transfer
      Amount and collateral haircut.
    required: true

  pledgeeRepresentativeRider:
    range: PledgeeRepresentativeRider
    description: The terms of the Rider for the ISDA Euroclear 2019 Collateral Transfer Agreement with respect to the use
      of a Pledgee Representative attached to this Agreement.
    close_mappings:
      - fpml_5_10:CollateralTransferAgreementElections.pledgeeRepresentativeRider

  pledgedAccount:
    range: Account
    description: The pledged account associated with the agreement.

  enforcementEvent:
    range: EnforcementEvent
    description: Enforcement Events specific to the agreement.

  deliveryInLieuRight:
    range: boolean
    description: Delivery In Lieu rights.

  fullDischarge:
    range: boolean
    description: Full Discharge condition.

  executionTerms:
    range: ExecutionTerms
    description: The location and language of execution to determine duty to be paid.

  cashOrSecurityValue:
    range: Money
    description: The Base Currency Equivalent of Cash or Security.
    required: true

  haircutPercentage:
    range: decimal
    description: Valuation Percentage means, for any item of Eligible Collateral (IM), the percentage specified in accordance
      with Paragraph 13.
    required: true

  fxHaircutPercentage:
    range: decimal
    description: FX Haircut Percentage means, for any item of Eligible Collateral (IM), the percentage specified in accordance
      with Paragraph 13.

  additionalHaircutPercentage:
    range: decimal
    description: Percentage value of any additional haircut to be applied to a collateral asset,the percentage value is expressed
      as the discount haircut to the value of the collateral- as an example a 5% haircut would be expressed as 0.05.

  disputedCashOrSecurityValue:
    range: Money
    description: Paragraph 5. If a party (a 'Disputing Party') disputes the Value of any Posted Credit Support (IM).
    required: true

  partyElection:
    range: AdditionalRepresentationElection
    description: A qualification as to whether the Additional Representation is applicable.
    required: true
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:AdditionalRepresentation.partyElection

  customElection:
    range: string
    description: A supplemental custom election that might be specified by the parties for the purpose of specifying the Additional
      Representation.
    close_mappings:
      - fpml_5_10:AdditionalRepresentation.customElection

  isApplicable:
    range: boolean
    description: The Additional Representation is applicable when True, and not applicable when False.
    required: true
    close_mappings:
      - fpml_5_10:AdditionalRepresentationElection.isApplicable

  additionalRepresentation:
    range: AdditionalRepresentation
    description: The specification of the Additional Representation that may be applicable to the agreement.
    close_mappings:
      - fpml_5_10:AdditionalRepresentations.additionalRepresentation

  regulatoryComplianceRepresentation:
    range: boolean
    description: The qualification of whether Additional Information related to Regulatory Compliance and Concentration Limits
      is applicable or not.
    close_mappings:
      - fpml_5_10:AdditionalRepresentations.regulatoryComplianceRepresentation

  applicableParty:
    range: CounterpartyRoleEnum
