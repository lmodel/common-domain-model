      - party
      - rightsEvent
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      rightsEvent:
        description: If True, the Rights Event language applies for the specified Party.
    in_subset:
      - cdm_legaldocumentation_csa

  SensitivityMethodologies:
