      can hold and use posted collateral.
    notes:
      - ISDA CSA_VM_2016 paragraph "13" clause " (h)" name "Holding and Using Posted Collateral (VM)"
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(g)"
      - ISDA CSD_English_1995 paragraph "13" clause "(h)"
    see_also:
      - isda:CSA_VM_2016
      - isda:CSA_NewYork_1994
      - isda:CSD_English_1995
    slots:
      - partyElection
      - additionalLanguage
    slot_usage:
      partyElection:
        range: HoldingAndUsingPostedCollateralElection
        description: The parties' elections for the holding and using of posted collateral.
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  HoldingAndUsingPostedCollateralElection:
    description: Specifies the parties' elections related to the holding and using of posted collateral.
    notes:
      - ISDA CSA_VM_2016 paragraph "13" clause " (h)" name "Holding and Using Posted Collateral (VM)"
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(g)"
      - ISDA CSD_English_1995 paragraph "13" clause "(h)"
    see_also:
