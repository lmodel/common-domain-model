    close_mappings:
      - fpml_5_10:CalculationCurrencyElection.isBaseCurrency

  customLocation:
    range: string
    description: The Calculation Date Location when specified a location which doesn't correspond to the FpML list of business
      centers or cannot be mapped to it.

  cabEndDateElection:
    range: boolean
    description: Determination of whether the Collateral Access Breach end date is a number of days (True) or specified (False).
    close_mappings:
