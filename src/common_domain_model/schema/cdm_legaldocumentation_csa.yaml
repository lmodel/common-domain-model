      - applicableValue
      - applicableTransfer
      - value
    slot_usage:
      value:
        range: CollateralValueMethod
        description: Details how particular types of collateral are valued (other than in respect of a default).
    in_subset:
      - cdm_legaldocumentation_csa

  PartyAgreementIdentifier:
    description: A class defining a legal agreement identifier issued by the indicated party.
