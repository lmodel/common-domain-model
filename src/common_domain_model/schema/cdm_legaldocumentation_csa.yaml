    notes:
      - ISDA CSA_IM_Japanese_2016 paragraph "12"
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.securitiesSettlementDay

  notificationTime:
    range: NotificationTime
    description: The time by which a demand for the Transfer of Eligible Credit Support (IM) or Posted Credit Support (IM)
      needs to be made in order for the transfer to take place in accordance with the Transfer Timing provisions.
    required: true

  isBaseCurrency:
    range: boolean
    description: The SIMM Calculation Currency (also known as SIMM Reporting Currency) means the Base Currency when True.
      It means a different currency when False. In that latter case, the SIMM Calculation Currency is specified as part of
