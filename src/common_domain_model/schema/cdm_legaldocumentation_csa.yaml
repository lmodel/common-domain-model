    multivalued: true
    inlined_as_list: true

  creditSupportDocumentTerms:
    range: CreditSupportDocumentTermsEnum
    description: Specification of the Credit Support Document terms.
    required: true

  creditSupportDocumentTypes:
    range: LegalAgreementIdentification
    description: If a Credit Support Document is specified but not yet in CDM representation, it can still be captured. This
      argument should be used if the creditSupportDocument argument cannot be used due to not being able to represent the
      document fully in CDM format.
    multivalued: true
    inlined_as_list: true

  creditSupportDocument:
    range: LegalAgreement
    description: The specified Credit Support Document(s), if any.
    multivalued: true
    inlined_as_list: true

  bespokeCreditSuppportDocument:
    range: string
    description: Specification of a document when not captured under RelatedAgreement.

  creditSupportProviderElection:
    range: CreditSupportProviderElection
    description: The party election of Credit Support Provider(s), if any.
    required: true
    multivalued: true
    inlined_as_list: true

  creditSupportProviderTerms:
    range: CreditSupportProviderTermsEnum
    description: Specification of the Credit Support Provider terms.
    required: true

  creditSupportProvider:
    range: LegalEntity
    description: The specified Credit Support Provider(s), if any.
    multivalued: true
    inlined_as_list: true

  bespokeCreditSuppportProvider:
    range: string
    description: '...'

  specifiedOrAccessCondition:
    range: CSASpecifiedOrAccessConditionEnum
    description: Specifies events that may temporarily or permanently suspend a partys rights to rehypothecate, transfer,
      or substitute collateral.
    multivalued: true

  additionalTerminationEvent:
    range: AdditionalTerminationEventEnum
    description: Specifies events that may lead to the early termination of the Master Agreement, including suspension of
      the affected party's rights to rehypothecate, transfer, or substitute collateral.
    multivalued: true

  specifiedAdditionalTerminationEvent:
    range: string
    description: Specifies any bespoke Additional Termination Event(s) that are set out in the related Specified Condition
      clause.
    multivalued: true

  ratingsXExposure:
    range: LegacyIndependentAmountRatingsXExposure
    description: Indicates the Independent Amount is determined using both credit rating and exposure metrics.

  ratingVariableSet:
    range: CreditNotation
    description: Allows a grouping of Rating agencies and Rating values.
    required: true
    multivalued: true
    inlined_as_list: true

  highestLowestVariableSet:
    range: RatingMultiplier
    description: A logical container to hold a defined set of related data. In this case the collation of Ratings Information
      and associated exposure multiplier where highest or lowest of the associated credit ratings are used when determining
      the applicable Independent Amount.
    multivalued: true
    inlined_as_list: true

  compareVariableSet:
    range: DirectionRatingMultiplier
    description: A logical container to hold a defined set of related data. In this case the collation of Ratings Information
      and associated exposure multiplier where multiple credit ratings are compared when determining the applicable Independent
      Amount.
    multivalued: true
    inlined_as_list: true

  exposureMultiplier:
    range: decimal
    description: Specifies the multiplier applied to exposure based on the credit rating of the rated party.
    required: true

  allDirectionRating:
    range: DirectionRatingSet
    any_of:
      - range: AllDirectionRating
      - range: AnyDirectionRating
      - range: DirectionRating
    required: true
    multivalued: true
    inlined_as_list: true

  anyDirectionRating:
    range: DirectionRatingSet
    any_of:
      - range: AllDirectionRating
      - range: AnyDirectionRating
      - range: DirectionRating
    required: true
    multivalued: true
    inlined_as_list: true

  custodianEligibility:
    range: boolean
    description: Specifies whether the party's custodian is eligible to hold the other party's posted collateral. If 'True'
      then the custodian is eligible to hold the Posted Collateral given that the specified criteria are met.
    required: true

  initialCustodian:
    range: LegalEntity
    description: Election to specify the initial custodian.
    notes:
      - ISDA CSA_VM_2016

  criteria:
    range: EligibilityToHoldCollateralCriteria
    description: A logical container to hold a defined set of related data. In this case the collation of criteria required
      by the party and its custodian to Hold the other party's Posted Collateral.
    any_of:
      - range: AllEligibilityToHoldCollateralCriteria
      - range: AnyEligibilityToHoldCollateralCriteria
      - range: RatingAgencyValue
      - range: AmountOfNetCapital

  eligibleCountry:
    range: string
    description: The restrictions that might be required by a party and its custodian in terms of country(ies) where the other
      party's collateral can be held.
    multivalued: true
    annotations:
      metadata_scheme: true

  custodianCondition:
    range: string
    description: Specifies any additional conditions relevant to the Custodian of the respective parties as set out in the
      Holding and Using Posted Collateral clause.

  allCriteria:
    range: EligibilityToHoldCollateralCriteria
    any_of:
      - range: AllEligibilityToHoldCollateralCriteria
      - range: AnyEligibilityToHoldCollateralCriteria
      - range: RatingAgencyValue
      - range: AmountOfNetCapital
    required: true
    multivalued: true
    inlined_as_list: true

  anyCriteria:
    range: EligibilityToHoldCollateralCriteria
    any_of:
      - range: AllEligibilityToHoldCollateralCriteria
      - range: AnyEligibilityToHoldCollateralCriteria
      - range: RatingAgencyValue
      - range: AmountOfNetCapital
    required: true
    multivalued: true
    inlined_as_list: true

  amountOfNetCapital:
    range: Money
    description: The amount of net capital.

  deemedEffectiveNextLBD:
    range: boolean
    description: Specifies if notice shall be deemed to be effective at the time such notice is actually received unless such
      notice is received on a day which is not a Local Business Day or after the Notification Time on any Local Business Day
      in which event such notice shall be deemed to be effective on the next succeeding Local Business Day. If deemed effective,'True'.
      If not deemed effective, or not stated,'False'.
    required: true

classes:
