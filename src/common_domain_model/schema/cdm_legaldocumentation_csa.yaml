comments:
  - 'Rosetta func: PostedCreditSupportItemAmount — Calculates the Value for the given Posted Credit Support item. | inputs(postedItem:
    PostedCreditSupportItem (1..1), baseCurrency: string (1..1)) | output(result: Money (1..1))'
  - 'Rosetta func: UndisputedAdjustedPostedCreditSupportAmount — Calculates the value for Undisputed Adjusted Posted Credit
    Support Item. | inputs(postedCreditSupportItems: PostedCreditSupportItem (0..*), priorDeliveryAmountAdjustment: Money
    (1..1), priorReturnAmountAdjustment: Money (1..1), disputedTransferredPostedCreditSupportAmount: Money (1..1), baseCurrency:
    string (1..1)) | output(result: Money (1..1))'
  - 'Rosetta func: CreditSupportAmount — Calculates the Credit Support Amount. | inputs(marginAmount: Money (1..1), threshold:
    Money (1..1), marginApproach: MarginApproachEnum (1..1), marginAmountIA: Money (0..1), baseCurrency: string (1..1)) |
    output(result: Money (1..1))'
  - 'Rosetta func: ReturnAmount | inputs(postedCreditSupportItems: PostedCreditSupportItem (0..*), priorDeliveryAmountAdjustment:
    Money (1..1), priorReturnAmountAdjustment: Money (1..1), disputedTransferredPostedCreditSupportAmount: Money (1..1), marginAmount:
    Money (1..1), threshold: Money (1..1), marginApproach: MarginApproachEnum (1..1), marginAmountIA: Money (0..1), minimumTransferAmount:
    Money (1..1), rounding: CollateralRounding (1..1), disputedReturnAmount: Money (1..1), baseCurrency: string (1..1)) |
    output(result: Money (1..1))'
  - 'Rosetta func: DeliveryAmount | inputs(postedCreditSupportItems: PostedCreditSupportItem (0..*), priorDeliveryAmountAdjustment:
    Money (1..1), priorReturnAmountAdjustment: Money (1..1), disputedTransferredPostedCreditSupportAmount: Money (1..1), marginAmount:
    Money (1..1), threshold: Money (1..1), marginApproach: MarginApproachEnum (1..1), marginAmountIA: Money (0..1), minimumTransferAmount:
    Money (1..1), rounding: CollateralRounding (1..1), disputedDeliveryAmount: Money (1..1), baseCurrency: string (1..1))
    | output(result: Money (1..1))'
