    slots:
      - sensitivityToIndices
      - sensitivityToFunds
      - sensitivityToETFs
    in_subset:
      - cdm_legaldocumentation_csa

  SensitivityMethodology:
    description: A class to specify the methodology according to which sensitivities are computed.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(gg)(2)"
    see_also:
      - isda:CSA_IM_2016
    slots:
      - specifiedMethodology
      - customMethodology
    in_subset:
      - cdm_legaldocumentation_csa

  SimmCalculationCurrency:
    description: A class to specify the SIMM Calculation Currency elections by each party to the agreement.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: CalculationCurrencyElection
        description: The parties' SIMM Calculation Currency election.
    in_subset:
      - cdm_legaldocumentation_csa

  SimmException:
    description: A class to specify the SIMM exception to the regulatory regime clause.
    notes:
      - 'ISDA CSA_IM_2016 paragraph "13 General Principles" name "Regime: SIMM Exception."'
    see_also:
      - isda:CSA_IM_2016
    slots:
      - standardisedException
      - simmExceptionApplicable
      - asSpecified
    slot_usage:
      asSpecified:
        description: The Standard Initial Margin Model exception when specified as a customized approach by the party.
    in_subset:
      - cdm_legaldocumentation_csa

  SimmVersion:
    description: A class to specify the ISDA SIMM version that applies to the ISDA 2018 CSA for Initial Margin.
    notes:
      - ISDA CSA_IM_2018 paragraph "13 General Principles" clause "(ee)(1)"
    see_also:
      - isda:CSA_IM_2018
    rules:
      - description: A data rule to enforce that the version attribute should be absent when the SIMM version is stated as
          not specified for the CSA.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            partyVersion:
              required: false
      - description: A data rule to enforce that the version attribute should be specified when the SIMM version is stated
          as specified for the CSA.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            partyVersion:
              required: true
    comments:
      - 'Rosetta condition: VersionNotSpecified — if isSpecified = False then partyVersion is absent'
      - 'Rosetta condition: VersionSpecified — if isSpecified = True then partyVersion exists'
    slots:
      - isSpecified
      - partyVersion
      - asSpecified
    slot_usage:
      isSpecified:
        description: A boolean attribute to determine whether the SIMM version is specified for the purpose of the legal agreement.
        required: false
      asSpecified:
        description: The SIMM version exception when specified as a customized approach by the party.
    in_subset:
      - cdm_legaldocumentation_csa

  SubstitutedRegime:
    description: A class to specify each party's election with respect to the Substituted Regimes that will be applicable...
    rules:
      - description: The applicable regime should be specified either as an enumeration or as an additional regime specified
          by the parties.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                regime:
                  required: true
            - slot_conditions:
                additionalRegime:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: SubstitutedRegimeChoice — required choice regime, additionalRegime'
    slots:
      - regime
      - additionalRegime
      - regimeTerms
    slot_usage:
      regime:
        range: RegulatoryRegimeEnum
        description: The applicable regulatory regime, as specified through an enumeration.
        required: false
      regimeTerms:
        range: SubstitutedRegimeTerms
        description: Specifies the applicability of the Substituted Regime as denoted in the Substituted Regime Table as part
          of certain legal agreements, such as the ISDA 2016 and 2018 CSA for Initial Margin.
    in_subset:
      - cdm_legaldocumentation_csa

  SubstitutedRegimeTerms:
    description: Specifies the applicability of the Substituted Regime as denoted in the Substituted Regime Table as part
      of certain legal agreements, such as such as the ISDA 2016 and 2018 CSA for Initial Margin.
    slots:
      - party
      - isApplicable
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party for which the regime terms are being specified when acting as collateral taker.
        required: true
      isApplicable:
        description: The specification of whether the regime is elected as applicable to the party when acting as collateral
          taker.
    in_subset:
      - cdm_legaldocumentation_csa

  Substitution:
    description: A class to specify the conditions under which the Security Provider can substitute posted collateral. The
      details required for 'Legacy' agreements are substantially different to those required for newer agreements; where the
      agreement is a 1994 or 1995 CSA, or 1995 CSD, the legacyConsent attribute needs to be used which contains additional
      values beyond a simple true/false value.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: SubstitutionPartyElection
        description: Party specific elections for substitution of posted collateral.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  SubstitutionPartyElection:
    description: Party specific elections for substitution of posted collateral.
    slots:
      - party
      - needsConsent
      - substitutionDateLanguage
      - specificConsentLanguage
      - legacyConsent
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party that is acting as the Pledgor/Obligor/Chargor/Security Provider.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  TerminationCurrencyAmendment:
    description: A class to specify the Amendment to Termination Currency elections by the parties to the agreement.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(t)" name "Amendment to Termination Currency."
    see_also:
      - isda:CSA_IM_2016
    rules:
      - description: The Amendment to Termination Currency elections only apply when the Amendment to Termination Currency
          is deemed applicable by the parties.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            effectiveDate:
              required: false
            partyElection:
              required: false
    comments:
      - 'Rosetta condition: Applicability — if isApplicable = False then effectiveDate is absent and partyElection is absent'
    slots:
      - isApplicable
      - effectiveDate
      - partyElection
    slot_usage:
      isApplicable:
        description: The qualification of whether the Amendment to Termination Currency is deemed applicable by the parties
          (True) or not (False).
      effectiveDate:
        range: AmendmentEffectiveDate
        description: The effective date of the Amendment to Termination Currency. This date can be specified as either an
          actual date, a specific date (e.g. the annex date) or as a custom provision.
      partyElection:
        range: TerminationCurrencyElection
        description: The parties' Amendment Currency election.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  TerminationCurrencyElection:
    description: A class to specify the Amendment to Termination Currency election by the parties to the agreement.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(t)(A) & (B)"
    see_also:
      - isda:CSA_IM_2016
    rules:
      - description: A Termination Currency election should only exist when required by the affected parties election.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            currency:
              required: false
    comments:
      - 'Rosetta condition: CurrencyElection — if isSpecified = False then currency is absent'
    slots:
      - party
      - isSpecified
      - currency
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
        multivalued: true
      isSpecified:
        description: The qualification of whether the Termination Currency is specified in this document (True) or in an Eligible
          Support Credit Support (IM) Schedule (False).
      currency:
        description: The Termination Currency associated with the party that referenced as part of this class. The list of
          valid currencies is not presently positioned as an enumeration as part of the CDM because that scope is limited
          to the values specified by ISDA and FpML. As a result, implementers have to make reference to the relevant standard,
          such as the ISO 4217 standard for currency codes.
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalObligations:
    description: The election of party specific additional obligations applicable to the agreement.
    close_mappings:
      - fpml_5_10:AdditionalObligations
    slots:
      - party
      - additionalObligations
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party that the additional obligations apply to.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  BaseAndEligibleCurrency:
    description: The base and eligible currency(ies) for the document as specified by the parties to the agreement.
    close_mappings:
      - fpml_5_10:BaseAndEligibleCurrency
    slots:
      - baseCurrency
      - baseCurrencyTerminationCurrency
      - baseCurrencyOther
      - eligibleCurrency
      - eligibleCurrencyInclBaseCurrency
      - eligibleCurrencyOther
    in_subset:
      - cdm_legaldocumentation_csa

  CoveredTransactions:
    description: Specification of Transactions covered by the legal agreement.
    slots:
      - inclusionDate
      - coveredTransactions
      - bespokeCoveredTransactions
      - additionalObligations
      - exposure
    slot_usage:
      coveredTransactions:
        range: ProductTaxonomy
        description: Covered Transactions when expressed using the ISDA taxonomy.
        multivalued: true
      additionalObligations:
        range: AdditionalObligations
        description: The party specific additional obligations applicable to the document.
        required: false
        multivalued: true
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportObligationsBase:
    description: A logical container designed to hold a set of related data. In this case, designed to hold a set of clauses
      that are common amongst Legacy (1994/95), Variation Margin and Initial Margin Credit Support Documents in regards to
      Credit Support Obligations.
    slots:
      - deliveryAmount
      - returnAmount
      - minimumTransferAmount
      - collateralTransferTiming
      - bespokeTransferTiming
    slot_usage:
      deliveryAmount:
        range: CSADeliveryAmount
        description: In respect of a Valuation Date, the amount of collateral which a party is entitled to demand to be transferred
          to it as a Delivery Amount.
      returnAmount:
        range: CSAReturnAmount
        description: In respect of a Valuation Date, the amount of collateral which a party is entitled to demand to be recalled
          to it as a Return Amount.
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportObligationsLegacy:
    description: Specification of the Credit Support Obligations applicable to the Legacy (1994/95) Credit Support Annex.
    is_a: CreditSupportObligationsBase
    slots:
      - threshold
      - rounding
      - independentAmount
      - creditSupportAmount
      - eligibleCreditSupport
    slot_usage:
      rounding:
        range: CollateralRounding
        description: The rounding methodology applicable to the Delivery Amount and the Return Amount in terms of nearest
          integral multiple of Base Currency units.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportObligationsInitialMargin:
    description: Specification of the Credit Support Obligations applicable to the Initial Margin Credit Support Annex.
    is_a: CreditSupportObligationsBase
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(c)" name "Credit Support Obligations"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(d)" name "Credit Support Obligations"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(c) " name "Credit Support Obligations"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - marginApproach
      - otherEligibleSupportIM
      - rounding
      - threshold
      - creditSupportAmount
    slot_usage:
      marginApproach:
        range: MarginApproach
        description: The selection of Margin Approach applicable to the agreement.
      rounding:
        range: CollateralRounding
        description: The rounding methodology applicable to the Delivery Amount and the Return Amount in terms of nearest
          integral multiple of Base Currency units.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportObligationsCollateralTransferAgreement:
    description: Specification of the Credit Support Obligations applicable to the Initial Margin Credit Support Annex.
    is_a: CreditSupportObligationsBase
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(c)" name "Credit Support Obligations"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(d)" name "Credit Support Obligations"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(c) " name "Credit Support Obligations"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - marginApproach
      - otherEligibleSupportIM
      - threshold
      - creditSupportAmount
      - rounding
    slot_usage:
      marginApproach:
        range: MarginApproach
        description: The selection of Margin Approach applicable to the agreement.
      rounding:
        range: CollateralRounding
        description: The rounding methodology applicable to the Delivery Amount and the Return Amount in terms of nearest
          integral multiple of Base Currency units.
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportObligationsVariationMargin:
    description: Specification of the Credit Support Obligations applicable to the Variation Margin Credit Support Annex.
    is_a: CreditSupportObligationsBase
    notes:
      - ISDA CSA_VM_2016 paragraph "13" clause "(c) " name "Credit Support Obligations"
    see_also:
      - isda:CSA_VM_2016
    slots:
      - ineligibleCreditSupport
      - majorCurrency
      - fxHaircut
      - rounding
      - eligibleCreditSupport
    slot_usage:
      rounding:
        range: CollateralRounding
        description: The rounding methodology applicable to the Delivery Amount and the Return Amount in terms of nearest
          integral multiple of Base Currency units.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  EligibleCreditSupport:
    description: Specifies the collateral posting obligations of the security provider or security providers as specified
      in the corresponding agreement
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: EligibleCollateralElection
        description: The specification of the collateral posting obligations for the security provider party(ies)
    in_subset:
      - cdm_legaldocumentation_csa

  EligibleCollateralElection:
    description: Specifies the collateral posting obligations for the security provider party(ies).
    is_a: PostingObligationsElection
    slots:
      - otherEligibleSupport
    in_subset:
      - cdm_legaldocumentation_csa

  SecurityInterestForObligations:
    description: Security Interest for Obligations clause applicable to 1994 NY CSA, 1995 English Law CSA, 1995 English Law
      Credit Support Deed, 2016 English Law VM CSA and 2016 New York Law VM CSA.
    notes:
      - ISDA CSA_NewYork_1994 name "Security Interest for Obligations"
    see_also:
      - isda:CSA_NewYork_1994
    slots:
      - party
      - obligations
      - obligee
      - other
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party to which the Security Interest for Obligations is applicable.
        required: true
        multivalued: true
      other:
        description: Exception value.
    in_subset:
      - cdm_legaldocumentation_csa

  SinglePostingParty:
    description: Where only a single  party is explicitly designated to post collateral, the party which is specified as the
      sole poster of collateral.
    slots:
      - party
      - other
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party acting as the Single Posting Party.
    in_subset:
      - cdm_legaldocumentation_csa

  Threshold:
    description: Represents the amount of unsecured risk that a party is willing to tolerate without holding any posted collateral
      provided by the other party.
    notes:
      - ISDA CSA_NewYork_1994 name "Threshold"
    see_also:
      - isda:CSA_NewYork_1994
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: ThresholdElection
        description: The party specific election for the threshold clause.
    in_subset:
      - cdm_legaldocumentation_csa

  ThresholdMinimumTransferAmountBase:
    description: A logical container designed to hold a set of related data. In this case, designed to hold a set of information
      required to specify conditions under which Threshold or Minimum Transfer Amount can fall to zero.
    rules:
      - description: If zero event exists then boolean must be set to 'True' and event must be specified.
        preconditions:
          slot_conditions:
            zeroEvent:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            event:
              required: true
    comments:
      - 'Rosetta condition: ZeroEvent — if zeroEvent = True then event exists'
    slots:
      - zeroEvent
      - event
    in_subset:
      - cdm_legaldocumentation_csa

  ThresholdElection:
    description: Specifies whether the threshold is rating based, a fixed amount, or infinity.
    rules:
      - description: Ensures that threshold is specified as one-of fixedAmount, ratingsBased, infinity, or other.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                fixedAmount:
                  required: true
            - slot_conditions:
                ratingsBased:
                  required: true
            - slot_conditions:
                infinity:
                  required: true
            - slot_conditions:
                other:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ThresholdOneOf — required choice fixedAmount, ratingsBased, infinity, other'
    slots:
      - party
      - fixedAmount
      - ratingsBased
      - infinity
      - other
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party to which the threshold applies.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  ThresholdRatingsBased:
    description: Defines that the Threshold is based on Ratings condition(s).
    is_a: ThresholdMinimumTransferAmountBase
    rules:
      - description: If the rated party is NamedEntity then the entity must be specified.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedEntity
        postconditions:
          slot_conditions:
            namedEntity:
              required: true
      - description: If rated party is NamedAffilite then the affiliate must be specified.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedAffiliate
        postconditions:
          slot_conditions:
            namedAffiliate:
              required: true
    comments:
      - 'Rosetta condition: NamedEntity — if ratedParty = RatedPartyEnum -> NamedEntity then namedEntity exists'
      - 'Rosetta condition: NamedAffiliate — if ratedParty = RatedPartyEnum -> NamedAffiliate then namedAffiliate exists'
    slots:
      - currency
      - ratingType
      - variableSet
      - ratedParty
      - namedEntity
      - namedAffiliate
      - compare
      - noRating
      - notRatedBy
      - numberOfRatingAgencies
    slot_usage:
      currency:
        range: ISOCurrencyCodeEnum
        description: The threshold currency code.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CSAThresholdVariableSet:
    description: Defines a combination of Rating Agency, Rating Value, Threshold amount and Currency code.
    close_mappings:
      - fpml_5_10:CSAThresholdVariableSet
    rules:
      - description: If we have a name then we must also have a value.
        preconditions:
          slot_conditions:
            name:
              required: true
        postconditions:
          slot_conditions:
            value:
              required: true
      - description: If we have a value then we must also have a name.
        preconditions:
          slot_conditions:
            value:
              required: true
        postconditions:
          slot_conditions:
            name:
              required: true
    comments:
      - 'Rosetta condition: NameMustExist — if name exists then value exists'
      - 'Rosetta condition: ValueMustExist — if value exists then name exists'
    slots:
      - name
      - value
      - amount
    slot_usage:
      name:
        range: CreditRatingAgencyEnum
        description: The relevant rating agency.
      value:
        range: string
        description: Rating applicable to the party from a given rating agency.
      amount:
        range: integer
        description: The amount value applicable to the Threshold.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  MinimumTransferAmount:
    description: Represents the threshold specified in the agreement below which collateral need not be delivered, and represents
      the smallest incremental value of exposure that must be reached before the parties are obliged to transfer collateral.
    notes:
      - ISDA CSA_NewYork_1994 name "Minimum Transfer Amount"
      - ISDA CSA_English_1995 name "Minimum Transfer Amount"
      - ISDA CSD_English_1995 name "Minimum Transfer Amount"
      - ISDA CSA_VM_English_2016 name "Minimum Transfer Amount"
      - ISDA CSA_VM_NewYork_2016 name "Minimum Transfer Amount"
    see_also:
      - isda:CSA_NewYork_1994
      - isda:CSA_English_1995
      - isda:CSD_English_1995
      - isda:CSA_VM_English_2016
      - isda:CSA_VM_NewYork_2016
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: MinimumTransferAmountElection
        description: The party specific elections for the Minimum Transfer Amount clause.
    in_subset:
      - cdm_legaldocumentation_csa

  MinimumTransferAmountElection:
    description: Specifies the method by which the minimum transfer amount is defined, such as a fixed amount, ratings based,
      or an alternative basis set out in the agreement.
    rules:
      - description: Ensures that Minimum Transfer Amount is specified as one-of fixedAmount, ratingsBased, or other.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                fixedAmount:
                  required: true
            - slot_conditions:
                ratingsBased:
                  required: true
            - slot_conditions:
                other:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: MinimumTransferAmountOneOf — required choice fixedAmount, ratingsBased, other'
    slots:
      - party
      - fixedAmount
      - ratingsBased
      - other
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party to which the minimum transfer amount applies.
        required: true
      fixedAmount:
        description: Defines that the Minimum Transfer Amount (MTA) is a Fixed Amount.
      ratingsBased:
        range: MinimumTransferAmountRatingsBased
        description: Defines that the Minimum Transfer Amount (MTA) is based on a Ratings condition(s).
    in_subset:
      - cdm_legaldocumentation_csa

  ThresholdMinimumTransferAmountFixedAmount:
    description: Defines the Threshold or the Minimum Transfer Amount (MTA) as a fixed amount.
    is_a: ThresholdMinimumTransferAmountBase
    slots:
      - amount
    slot_usage:
      amount:
        description: Specifies the monetary value of the Threshold or the Minimum Transfer Amount (MTA) applicable to collateral
          transfer obligations.
    in_subset:
      - cdm_legaldocumentation_csa

  MinimumTransferAmountRatingsBased:
    description: Defines that the Minimum Transfer Amount (MTA) is based on a Ratings condition(s).
    is_a: ThresholdMinimumTransferAmountBase
    rules:
      - description: If the rated party is NamedEntity then the entity must be specified.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedEntity
        postconditions:
          slot_conditions:
            namedEntity:
              required: true
      - description: If rated party is NamedAffilite then the affiliate must be specified.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedAffiliate
        postconditions:
          slot_conditions:
            namedAffiliate:
              required: true
    comments:
      - 'Rosetta condition: NamedEntity — if ratedParty = RatedPartyEnum -> NamedEntity then namedEntity exists'
      - 'Rosetta condition: NamedAffiliate — if ratedParty = RatedPartyEnum -> NamedAffiliate then namedAffiliate exists'
    slots:
      - currency
      - ratingType
      - variableSet
      - ratedParty
      - namedEntity
      - namedAffiliate
      - compare
      - noRating
      - notRatedBy
      - numberOfRatingAgencies
    slot_usage:
      currency:
        range: ISOCurrencyCodeEnum
        description: The minimum transfer amount currency code.
        required: true
      variableSet:
        range: CSAMinimumTransferAmountVariableSet
        description: Defines a combination of Rating Agency, Rating Value, amount and Currency code.
    in_subset:
      - cdm_legaldocumentation_csa

  CSAMinimumTransferAmountVariableSet:
    description: Defines a combination of Rating Agency, Rating Value, amount and Currency code.
    close_mappings:
      - fpml_5_10:CSAMinimumTransferAmountVariableSet
    rules:
      - description: If we have a name then we must also have a value.
        preconditions:
          slot_conditions:
            name:
              required: true
        postconditions:
          slot_conditions:
            value:
              required: true
      - description: If we have a value then we must also have a name.
        preconditions:
          slot_conditions:
            value:
              required: true
        postconditions:
          slot_conditions:
            name:
              required: true
    comments:
      - 'Rosetta condition: NameMustExist — if name exists then value exists'
      - 'Rosetta condition: ValueMustExist — if value exists then name exists'
    slots:
      - name
      - value
      - amount
      - amountIsInfinity
    slot_usage:
      name:
        range: CreditRatingAgencyEnum
        description: The name of the Rating Agency.
      value:
        range: string
        description: The value assigned to the rating.
      amount:
        range: integer
        description: The Minimum Transfer Amount (MTA) applicable to the Rating.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  MasterAgreementDatedAsOfDate:
    description: Defines the dates agreed by the parties as the date of the Credit Support Annex or Credit Support Deed.
    slots:
      - masterAgreementDatedAsOfDate
      - additionalLanguage
    slot_usage:
      masterAgreementDatedAsOfDate:
        range: date
        description: The date agreed by the parties as the Dated as of Date for the Master Agreement.
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CSADeliveryAmount:
    description: In respect of a Valuation Date, the amount of collateral which a party is entitled to demand to be transferred
      to it as a Delivery Amount.
    close_mappings:
      - fpml_5_10:CSADeliveryAmount
    slots:
      - deliveryAmount
      - additionalLanguage
    slot_usage:
      deliveryAmount:
        range: DeliveryReturnAmountEnum
        description: Specifies whether the meaning of Delivery Amount follows the pre-print definition or deviates from this
          (either based on a rating or some other methodology).
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CSAReturnAmount:
    description: In respect of a Valuation Date, the amount of collateral which a party is entitled to demand to be recalled
      to it as a Return Amount.
    slots:
      - returnAmount
    slot_usage:
      returnAmount:
        range: DeliveryReturnAmountEnum
        description: Specifies whether the meaning of Return Amount follows the pre-print definition or deviates from this
          (either based on a rating or some other methodology).
    in_subset:
      - cdm_legaldocumentation_csa

  ValuationTime:
    description: Specifies the time by which the value of the collateral and obligations to transfer or return collateral
      are to be calculated relative to the Valuation Date.
    rules:
      - description: If no Day valuation methodology is defined, additional language must be specified.
        preconditions:
          slot_conditions:
            day:
              required: false
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: AdditionalLanguage — if day is absent then additionalLanguage exists'
      - 'Rosetta condition: DayAndTime — if day exists then time exists else time is absent and item -> location is absent
        and hourminutetime is absent and timezone is absent'
    slots:
      - day
      - location
      - time
      - hourminutetime
      - timezone
      - additionalLanguage
    slot_usage:
      location:
        range: BusinessCenter
        description: The location relevant to the timezone for the Valuation Time.
        multivalued: true
      time:
        range: ValuationTimeEnum
        description: The type of time specified for the Valuation Time.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  FinalReturns:
    description: A clause providing that final return collateral is to be provided without consideration of any Minimum Transfer
      Amount and collateral haircut.
    rules:
      - description: The additional language should be qualified only if the clause is specified as applicable.
        preconditions:
          slot_conditions:
            applicable:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: AdditionalLanguage — if applicable then additionalLanguage exists'
    slots:
      - applicable
      - additionalLanguage
    slot_usage:
      applicable:
        description: Defines if the clause is applicable to this agreement or any other exceptions.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CSAValuationDate:
    description: Specifies the date on which the value of collateral or exposure are calculated in accordance with the agreement.
    close_mappings:
      - fpml_5_10:CSAValuationDate
    rules:
      - description: If a specific calendar day is specified, it must be defined.
        preconditions:
          slot_conditions:
            date:
              equals_string: CalendarDay
        postconditions:
          slot_conditions:
            calendarDay:
              required: true
      - description: If no methodology is defined, additional language must be specified.
        preconditions:
          any_of:
            - slot_conditions:
                date:
                  required: false
            - slot_conditions:
                frequency:
                  required: false
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: CalendarDay — if date = ValuationDateDateEnum -> CalendarDay then calendarDay exists else calendarDay
        is absent'
      - 'Rosetta condition: AdditionalLanguage — if date is absent or frequency is absent then additionalLanguage exists'
    slots:
      - date
      - day
      - calendarDay
      - frequency
      - additionalLanguage
    slot_usage:
      date:
        range: ValuationDateDateEnum
        description: Defines whether a date is defined by a certain day of the week or a particular date in the month. If
          not specified here, then additional language must be used.
        required: false
        multivalued: false
      day:
        range: ValuationDateDayEnum
        description: Specific day(s) or day of the week, if any, specified for Valuation Time.
      frequency:
        range: ValuationDateFrequencyEnum
        description: Defines the regularity of the date specified for the Valuation Date.
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  ValuationAgent:
    description: Details of the party valuating the collateral to be delivered or returned.
    rules:
      - description: If no party is defined, additional language must be used to specify the elective party.
        preconditions:
          slot_conditions:
            party:
              required: false
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: AdditionalLanguage — if party is absent then additionalLanguage exists'
    slots:
      - party
      - valuationAgent
      - additionalLanguage
    slot_usage:
      party:
        range: CalculationValuationAgentPartyEnum
        description: Specification of which party calculating the value of collateral to be delivered or returned.
      valuationAgent:
        range: ValuationAgentDeterminationEnum
        description: Specifies how the Valuation Agent is determined.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  ExposureScope:
    description: Optionally, for each party, specifies the amendments to the included coverage in the calculation of Exposure.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: LegacyExposureScopeElection
        description: Defines the electice scope for a specific party.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyExposureScopeElection:
    description: Specification of amendments to the calculation of Exposure in terms of the Transactions and Products covered.
    slots:
      - party
      - excludedTransactions
      - excludedProducts
      - additionalLanguage
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      additionalLanguage:
        description: The bespoke/additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  ExcludedProducts:
    description: Description of the relevant derivative transactions excluded from the calculation of exposure.
    slots:
      - product
      - branch
      - excluded
    slot_usage:
      product:
        range: ExposureScopeProductEnum
        description: Description of the relevant derivative transactions excluded from the calculation of exposure.
        required: false
        multivalued: true
      excluded:
        range: boolean
        description: A flag to indicate whether transactions entered into by a specific branch with respect to the relevant
          party are excluded; set to True if excluded, false if included.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportAmount:
    description: 'The total amount one counterparty must deliver to the other at any time: the combination of the Exposure
      to that party and the net Independent Amounts it must post, minus any agreed Threshold.'
    rules:
      - description: If a Non Standard Other definition is defined, additional language must be specified.
        preconditions:
          slot_conditions:
            creditSupportAmount:
              equals_string: NonStandardOther
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: AdditionalLanguage — if creditSupportAmount = CreditSupportAmountEnum -> NonStandardOther then
        additionalLanguage exists'
    slots:
      - creditSupportAmount
      - additionalLanguage
    slot_usage:
      creditSupportAmount:
        range: CreditSupportAmountEnum
        description: Specifies whether the meaning of credit support amount follows the pre-print definition or deviates from
          the standard (either based on a rating or some other methodology).
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyResolutionAlternative:
    description: Alternative procedures to those in the pre-print for resolving collateral related disputes.
    rules:
      - description: If no resolution alternative procedure is defined, additional language must be specified.
        preconditions:
          slot_conditions:
            resolutionAlternative:
              required: false
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
      - description: If the resolution is to split the difference, then the amount concerned should be specified.
        preconditions:
          slot_conditions:
            resolutionAlternative:
              equals_string: SplitDifference
        postconditions:
          slot_conditions:
            amount:
              required: true
    comments:
      - 'Rosetta condition: AdditionalLanguage — if resolutionAlternative is absent then additionalLanguage exists'
      - 'Rosetta condition: SplitDifferenceAmount — if resolutionAlternative = LegacyResolutionAlternativeEnum -> SplitDifference
        then amount exists'
    slots:
      - resolutionAlternative
      - amount
      - additionalLanguage
    slot_usage:
      amount:
        description: The maximum amount to which the difference between the calculations by the valuation agent and disputing
          party can be split, where Split the Difference is elected.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  ResolutionValue:
    description: Methodology for resolving disputes in respect of the determination of the value of collateral.
    comments:
      - 'Rosetta condition: OtherValues — if cash = ValueCashEnum -> Other or securities = ValueSecuritiesEnum -> Other then
        additionalLanguage exists'
    slots:
      - cash
      - securities
      - fallback
      - additionalLanguage
    slot_usage:
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralTransferTiming:
    description: Specification of transfer / settlement timing for cash and securities collateral assuming that the notice
      is provided before the Notification Time (and with a 1LBD lag introduced if the notice is delivered after the Notification
      Time), and that securities allow for a further Local Business Day for transfer / settlement.
    close_mappings:
      - fpml_5_10:CollateralTransferTiming
    slots:
      - transferSettlementTiming
      - collateralTransferTimingDefinition
    in_subset:
      - cdm_legaldocumentation_csa

  TransferSettlementTiming:
    description: Specification of transfer / settlement timing for cash and securities collateral assuming that the notice
      is provided before the Notification Time (and with a 1LBD lag introduced if the notice is delivered after the Notification
      Time), and that securities allow for a further Local Business Day for transfer / settlement.
    comments:
      - 'Rosetta condition: OtherValues — if cashCollateralTransferSettlementTime = CashCTSTimeEnum -> Other or securititesCollateralTransferSettlementTime
        = SecuritiesCTSTimeEnum -> Other then additionalLanguage exists'
    slots:
      - cashCollateralTransferSettlementTime
      - securititesCollateralTransferSettlementTime
      - additionalLanguage
    slot_usage:
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralTransferTimingDefinition:
    description: Bespoke language removing the pre-print requirement to transfer legal title of securities collateral through
      written instructions to the relevant depository institution or other securities intermediaries solely for the purposes
      of the 1994 New York Law Credit Support Annex.
    close_mappings:
      - fpml_5_10:CollateralTransferTimingDefinition
    rules:
      - description: Additional language is required when a bespoke amendment is used.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: ApplicableLanguage — if isApplicable = False then additionalLanguage exists'
    slots:
      - isApplicable
      - additionalLanguage
    slot_usage:
      isApplicable:
        description: A boolean flag to represent bespoke amendment to the pre-print definition of Transfer.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralValueMethod:
    description: Details how particular types of collateral are valued (other than in respect of a default).
    close_mappings:
      - fpml_5_10:CollateralValueMethod
    comments:
      - 'Rosetta condition: OtherValues — if cashCollateral = ValueCashEnum -> Other or securitiesCollateral = ValueSecuritiesEnum
        -> Other then additionalLanguage exists'
    slots:
      - cashCollateral
      - securitiesCollateral
      - additionalLanguage
    slot_usage:
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportDocument:
    description: Identification of party specific Credit Support Documents applicable to the document.
    slots:
      - creditSupportDocumentElection
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportDocumentElection:
    description: The party election of Credit Support Provider(s), if any.
    comments:
      - 'Rosetta condition: CreditSupportDocument — if creditSupportDocumentTerms = CreditSupportDocumentTermsEnum -> Specified
        then (creditSupportDocument exists and creditSupportDocumentTypes is absent) or (creditSupportDocument is absent and
        creditSupportDocumentTypes exists)'
    slots:
      - party
      - creditSupportDocumentTerms
      - creditSupportDocumentTypes
      - creditSupportDocument
      - bespokeCreditSuppportDocument
    slot_usage:
      party:
        range: Party
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportProvider:
    description: Identification of party specific Credit Support Providers applicable to the document.
    slots:
      - creditSupportProviderElection
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportProviderElection:
    description: The party election of Credit Support Provider(s), if any.
    rules:
      - description: A validation rule to ensure that a Credit Support Provider is specified when required.
        preconditions:
          slot_conditions:
            creditSupportProviderTerms:
              equals_string: Specified
        postconditions:
          slot_conditions:
            creditSupportProvider:
              required: true
    comments:
      - 'Rosetta condition: CreditSupportProvider — if creditSupportProviderTerms = CreditSupportProviderTermsEnum -> Specified
        then creditSupportProvider exists'
    slots:
      - party
      - creditSupportProviderTerms
      - creditSupportProvider
      - bespokeCreditSuppportProvider
    slot_usage:
      party:
        range: Party
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  SpecifiedConditionOrAccessCondition:
    description: Specifies the events elected by the parties that are deemed an Access Condition (for Initial Margin CSA)
      or a Specified Condition (for Variation Margin and Legacy CSA), which, if triggered, may temporarily or permanently
      suspend rights to rehypothecate, transfer, or substitute collateral.
    notes:
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(d)"
    see_also:
      - isda:CSA_NewYork_1994
    slots:
      - isApplicable
      - partyElection
      - additionalLanguage
    slot_usage:
      isApplicable:
        description: Indicates whether events that could temporarily or permanently suspend rights to rehypothecate, transfer
          or substitute collateral are applicable. If applicable,'True'. If not applicable,'False'.
      partyElection:
        range: SpecifiedOrAccessConditionPartyElection
        description: The party specific elections.
        required: false
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  SpecifiedOrAccessConditionPartyElection:
    description: The party specific elections in respect to the Specified Condition and Access Condition clause.
    comments:
      - 'Rosetta condition: AdditionalTerminationEvent — if specifiedOrAccessCondition any = CSASpecifiedOrAccessConditionEnum
        -> AdditionalTerminationEvents then additionalTerminationEvent exists else additionalTerminationEvent is absent'
      - 'Rosetta condition: SpecifiedAdditionalTerminationEvent — if additionalTerminationEvent any = AdditionalTerminationEventEnum
        -> AsSpecified then specifiedAdditionalTerminationEvent exists else specifiedAdditionalTerminationEvent is absent'
    slots:
      - party
      - specifiedOrAccessCondition
      - additionalTerminationEvent
      - specifiedAdditionalTerminationEvent
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: Identifies the party making the election.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyIndependentAmount:
    description: Sets out the additional amount of collateral that is required to be delivered by that party irrespective
      of the mark-to-market exposure under the related Transactions. It may take the form of a fixed amount, or be determined
      using credit ratings.
    notes:
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(b)(iv)(A)"
    see_also:
      - isda:CSA_NewYork_1994
    slots:
      - partyElection
      - additionalLanguage
    slot_usage:
      partyElection:
        range: LegacyIndependentAmountParty
        description: The party specific elections for the Independent Amount clause.
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyIndependentAmountParty:
    description: The party specific elections for the Independent Amount clause.
    rules:
      - description: Ensures that the Independent Amount is specified as only one of Fixed Amount, Ratings Based or RatingsXExposure.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                fixedAmount:
                  required: true
            - slot_conditions:
                ratingsBased:
                  required: true
            - slot_conditions:
                ratingsXExposure:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: LegacyIAMethod — required choice fixedAmount, ratingsBased, ratingsXExposure'
    slots:
      - party
      - isApplicable
      - fixedAmount
      - ratingsBased
      - ratingsXExposure
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: Identifies the Party making the election.
        required: true
      isApplicable:
        description: Specifies whether Independent Amount is applicable to the elected party. If applicable, 'True', and if
          not applicable then 'False'.
      fixedAmount:
        range: Money
        description: Indicates the Independent Amount is specified as a fixed amount.
      ratingsBased:
        range: LegacyIndependentAmountRatingsBased
        description: Indicates the Independent Amount is determined using a credit rating.
    in_subset:
      - cdm_legaldocumentation_csa

  IndependentAmountRatings:
    description: A logical container designed to hold a set of related data. In this case, designed to hold a set of information
      required when Independent Amount is determined using credit ratings.
    rules:
      - description: Ensures Named Affiliate is provided where the Rated Party is Named Affiliate.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedAffiliate
        postconditions:
          slot_conditions:
            namedAffiliate:
              required: true
      - description: Ensures Named Entity is provided where the Rated Party is Named Entity.
        preconditions:
          slot_conditions:
            ratedParty:
              equals_string: NamedEntity
        postconditions:
          slot_conditions:
            namedEntity:
              required: true
    comments:
      - 'Rosetta condition: RestrictCompare — if compare exists then compare = IndependentAmountCompareEnum -> Compare or
        compare = IndependentAmountCompareEnum -> Lowest or compare = IndependentAmountCompareEnum -> Highest'
      - 'Rosetta condition: NamedAffiliate — if ratedParty = RatedPartyEnum -> NamedAffiliate then namedAffiliate exists else
        namedAffiliate is absent'
      - 'Rosetta condition: NamedEntity — if ratedParty = RatedPartyEnum -> NamedEntity then namedEntity exists else namedEntity
        is absent'
    slots:
      - compare
      - ratedParty
      - namedAffiliate
      - namedEntity
      - ratingType
    slot_usage:
      compare:
        range: IndependentAmountCompareEnum
        description: Specifies how multiple credit ratings are compared when determining the applicable Independent Amount,
          and whether that measure is highest, lowest, or a comparison of either.
        required: true
      ratedParty:
        description: Specifies the party to whom the rating agency rating applies to for the purposes of determining the Independent
          Amount.
        required: true
      namedAffiliate:
        range: LegalEntity
      namedEntity:
        range: LegalEntity
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyIndependentAmountRatingsBased:
    description: Specifies that the Independent Amount is determined using a credit rating.
    is_a: IndependentAmountRatings
    comments:
      - 'Rosetta condition: RestrictCompare — if compare exists then compare = IndependentAmountCompareEnum -> Lowest or compare
        = IndependentAmountCompareEnum -> Highest'
    slots:
      - variableSet
      - currency
    slot_usage:
      variableSet:
        range: RatingAgencyAmount
        description: A logical container designed to hold a defined set of related data. In this case the collation of Rating
          Information and an associated Independent Amount.
        required: true
      currency:
        description: Specifies the currency applicable to the relevant Independent Amount.
    in_subset:
      - cdm_legaldocumentation_csa

  RatingAgencyAmount:
    description: A logical container to hold a defined set of related data. In this case the collation of Rating Information
      and an associated Independent Amount.
    comments:
      - 'Rosetta condition: RestrictingCreditNotation — ratingVariableSet -> scale is absent and ratingVariableSet -> outlook
        is absent and ratingVariableSet -> debt is absent and ratingVariableSet -> creditWatch is absent and ratingVariableSet
        -> agency exists and ratingVariableSet -> notation exists'
    slots:
      - ratingVariableSet
      - amount
    slot_usage:
      amount:
        range: decimal
        description: Specifies the notional or collateral Independent Amount.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  LegacyIndependentAmountRatingsXExposure:
    description: Specifies that the Independent Amount is determined using both credit rating and exposure metrics.
    is_a: IndependentAmountRatings
    rules:
      - description: Ensures the appropriate variable set is populated based on how the Ratings are compared.
        preconditions:
          slot_conditions:
            compare:
              equals_string: Compare
        postconditions:
          slot_conditions:
            compareVariableSet:
              required: true
            highestLowestVariableSet:
              required: false
      - description: Ensures the appropriate variable set is populated based on how the Ratings are compared.
        preconditions:
          slot_conditions:
            compare:
              equals_string: Lowest
        postconditions:
          slot_conditions:
            highestLowestVariableSet:
              required: true
            compareVariableSet:
              required: false
      - description: Ensures the appropriate variable set is populated based on how the Ratings are compared.
        preconditions:
          slot_conditions:
            compare:
              equals_string: Highest
        postconditions:
          slot_conditions:
            highestLowestVariableSet:
              required: true
            compareVariableSet:
              required: false
    comments:
      - 'Rosetta condition: CompareIA — if compare = IndependentAmountCompareEnum -> Compare then compareVariableSet exists
        and highestLowestVariableSet is absent'
      - 'Rosetta condition: LowestIA — if compare = IndependentAmountCompareEnum -> Lowest then highestLowestVariableSet exists
        and compareVariableSet is absent'
      - 'Rosetta condition: HighestIA — if compare = IndependentAmountCompareEnum -> Highest then highestLowestVariableSet
        exists and compareVariableSet is absent'
    slots:
      - highestLowestVariableSet
      - compareVariableSet
    in_subset:
      - cdm_legaldocumentation_csa

  RatingMultiplier:
    description: A logical container to hold a defined set of related data. In this case the collation of Ratings Information
      and associated exposure multiplier.
    comments:
      - 'Rosetta condition: RestrictingCreditNotation — ratingVariableSet -> scale is absent and ratingVariableSet -> outlook
        is absent and ratingVariableSet -> debt is absent and ratingVariableSet -> creditWatch is absent and ratingVariableSet
        -> agency exists and ratingVariableSet -> notation exists'
    slots:
      - ratingVariableSet
      - exposureMultiplier
    in_subset:
      - cdm_legaldocumentation_csa

  DirectionRatingMultiplier:
    description: A logical container to hold a defined set of related data. In this case the collation of Ratings Information
      and associated exposure multiplier.
    slots:
      - variableSet
      - exposureMultiplier
    slot_usage:
      variableSet:
        range: DirectionRatingSet
        description: A logical container to hold a defined set of related data. In this case the collation of Ratings Agency,
          Rating value and an associated direction.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  AllDirectionRating:
    description: Used to combine two or more Ratings and associated direction using AND logic.
    slots:
      - allDirectionRating
    in_subset:
      - cdm_legaldocumentation_csa

  AnyDirectionRating:
    description: Used to combine two or more Ratings and associated direction using OR logic.
    slots:
      - anyDirectionRating
    in_subset:
      - cdm_legaldocumentation_csa

  DirectionRating:
    description: A logical container to hold a defined set of related data. In this case the collation of Ratings Agency,
      Rating value and an associated direction.
    is_a: CreditNotation
    comments:
      - 'Rosetta condition: RestrictingCreditNotation — (scale is absent and debt is absent and outlook is absent and creditWatch
        is absent) and (agency exists and notation exists)'
    slots:
      - direction
    slot_usage:
      direction:
        range: CompareOp
        description: Specifies the direction of measurement for the rated party.
    in_subset:
      - cdm_legaldocumentation_csa

  EligibilityToHoldCollateral:
    description: Specifies the conditions under which a party and its custodian(s) are entitled to hold collateral.
    notes:
      - ISDA CSA_VM_2016 paragraph "13" clause " (h)(i)" name "Eligibility to Hold Posted Collateral (VM) Custodians (VM)"
    see_also:
      - isda:CSA_VM_2016
    rules:
      - description: A condition to ensure that if a Custodian is eligible to hold collateral, the Initial Custodian must
          be specified.
        preconditions:
          slot_conditions:
            custodianEligibility:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            initialCustodian:
              required: true
    comments:
      - 'Rosetta condition: Custodian — if custodianEligibility = True then initialCustodian exists else initialCustodian
        is absent and custodianCondition is absent'
    slots:
      - custodianEligibility
      - initialCustodian
      - criteria
      - eligibleCountry
      - custodianCondition
    in_subset:
      - cdm_legaldocumentation_csa

  AllEligibilityToHoldCollateralCriteria:
    description: Used to combine two or more Criteria using AND logic.
    slots:
      - allCriteria
    in_subset:
      - cdm_legaldocumentation_csa

  AnyEligibilityToHoldCollateralCriteria:
    description: Used to combine two or more Criteria using OR logic.
    slots:
      - anyCriteria
    in_subset:
      - cdm_legaldocumentation_csa

  AmountOfNetCapital:
    description: The amount of net capital.
    slots:
      - amountOfNetCapital
    in_subset:
      - cdm_legaldocumentation_csa

  RatingAgencyValue:
    description: A logical container designed to hold a set of related data. In this case the Rating Agency, Rating Value
      and Rating Type.
    is_a: CreditNotation
    comments:
      - 'Rosetta condition: AgencyValueType — ((agency exists and notation exists and ratingType exists) or (agency is absent
        and notation is absent and ratingType is absent)) and (scale is absent and debt is absent and outlook is absent and
        creditWatch is absent)'
    slots:
      - ratingType
    in_subset:
      - cdm_legaldocumentation_csa

  DemandsAndNotices:
    description: Specifies the address where the demands, specifications and notices will be communicated to for each of the
      parties to the agreement.
    notes:
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(k)"
    see_also:
      - isda:CSA_NewYork_1994
    slots:
      - partyElection
