    slot_usage:
      partyReference:
        description: Party that issued the document identifier.
    in_subset:
      - cdm_legaldocumentation_csa

  PostingObligations:
    description: A class to specify the collateral posting obligations of the security provider or security providers as specified
      in the corresponding agreement.
    notes:
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(ii)"
    see_also:
      - isda:CSA_IM_NewYork_2016
    slots:
      - securityProvider
      - partyElection
    slot_usage:
      partyElection:
        range: PostingObligationsElection
        description: The specification of the collateral posting obligations for the security provider party(ies).
    in_subset:
      - cdm_legaldocumentation_csa

  PostingObligationsElection:
    description: Specifies the collateral posting obligations for the security provider party(ies).
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(ii)"
    see_also:
      - isda:CSA_IM_2016
    rules:
      - description: A data rule to enforce that the eligible collateral should be specified when the Control Agreement is
          a Credit Support Document with respect to the party(ies).
        preconditions:
          slot_conditions:
            asPermitted:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            eligibleCollateral:
              required: false
      - description: A data rule to enforce that the eligible collateral shouldn't be specified when the Control Agreement
          isn't deemed a Credit Support Document with respect to the party(ies).
        preconditions:
          slot_conditions:
            asPermitted:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            eligibleCollateral:
              required: true
    comments:
      - 'Rosetta condition: AsPermitted — if asPermitted = True then eligibleCollateral is absent'
      - 'Rosetta condition: EligibleCollateral — if asPermitted = False then eligibleCollateral exists'
      - 'Rosetta condition: ConsistentParty — if eligibleCollateral exists then eligibleCollateral -> appliesTo count = 0'
    slots:
      - party
      - asPermitted
      - eligibleCollateral
      - excludedCollateral
      - additionalLanguage
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: Specifies the party providing the security.
        required: true
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  ProcessAgent:
    description: Specifies the Process Agent that might be appointed by the parties as part of a Credit Support Annex/Deed
      or Collateral Transfer Agreement.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: ProcessAgentElection
        description: The parties' Process Agent election.
    in_subset:
      - cdm_legaldocumentation_csa

  ProcessAgentElection:
    description: Specifies the parties' respective elections with respect to the Process Agent.
    is_a: ContactInformationElection
    rules:
      - description: A data rule to enforce that the Process Agent details must be specified when it is applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            primaryContactInformation:
              required: true
            entity:
              required: true
            partyReference:
              required: true
      - description: A data rule to enforce that the Process Agent details cannot be specified if deemed not applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            primaryContactInformation:
              required: false
            entity:
              required: false
            partyReference:
              required: false
    comments:
      - 'Rosetta condition: Applicable — if isApplicable = True then primaryContactInformation exists and entity exists and
        partyReference exists'
      - 'Rosetta condition: NotApplicable — if isApplicable = False then primaryContactInformation is absent and entity is
        absent and partyReference is absent'
    slots:
      - isApplicable
      - entity
      - additionalInformation
    slot_usage:
      isApplicable:
        description: The qualification of whether the Process Agent is applicable (True) or not applicable (False).
      additionalInformation:
        description: Additional information relating to the Process Agent.
    in_subset:
      - cdm_legaldocumentation_csa

  RecalculationOfValue:
