    notes:
      - ISDA CSA_IM_2016 paragraph "3 General Principles" clause "(g)(i)" name "Resolution Time"
      - ISDA CSA_VM_2016 paragraph "13" clause "(g)(i)" name "Resolution Time"

  otherTerms:
    range: string
