    required: true
    multivalued: true
    close_mappings:
      - fpml_5_10:AdditionalTerminationEvent.applicableParty

  standardValue:
    range: AdditionalTypeEnum
    description: The qualification of the Additional Type of transaction that can require the collection or delivery of initial
      margin when specified as a standard value.
    required: true
    close_mappings:
      - fpml_5_10:AdditionalType.standardValue

  customValue:
    range: string
    description: The qualification of the Additional Type of transaction that can require the collection or delivery of initial
      margin when specified as a custom value by the parties to the legal agreement.
    close_mappings:
      - fpml_5_10:AdditionalType.customValue

  specificDate:
    range: AmendmentEffectiveDateEnum
    description: The effective date of the Amendment to Termination Currency when specified as relative to another date (e.g.
      the annex date).
    close_mappings:
      - fpml_5_10:AmendmentEffectiveDate.specificDate

  additionalRegime:
