      - fpml_5_10:BespokeCalculationTime.asCalculationAgent

  bespokeCalculationTimeTerms:
    range: string
    description: Additional Terms applicable to Calculation Time for Initial Margin.
    close_mappings:
      - fpml_5_10:BespokeCalculationTime.bespokeCalculationTimeTerms

  bespokeTransferTimingTerms:
    range: string
    description: The bespoke transfer timing terms applicable to the agreement.
    close_mappings:
      - fpml_5_10:BespokeTransferTiming.bespokeTransferTimingTerms

  bespokeCalculationAgentTerms:
    range: string
    description: The Calculation Agent (IM) terms when specified.
    close_mappings:
      - fpml_5_10:CalculationAgentTerms.bespokeCalculationAgentTerms

  valuationDate:
    range: CSAValuationDate
    description: Details of the days on which calculations are to be made to determine the Delivery Amount and/or Return Amount.
    required: true
    close_mappings:
      - fpml_5_10:CalculationAndTimingLegacy.valuationDate

  valuationTime:
