    required: true
    close_mappings:
      - fpml_5_10:CalculationAndTimingVariationMargin.valuationDateLocation

  calculationAgentTerms:
    range: CalculationAgentTerms
    description: Details of the party calculating the value of collateral to be delivered or returned.
    required: true
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.calculationAgentTerms

  bespokeCalculationDate:
    range: BespokeCalculationDate
    description: The specification of bespoke Calculation Date terms for the purposes of Initial or Variation Margin by the
      parties to the agreement.
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.bespokeCalculationDate

  bespokeCalculationTime:
    range: BespokeCalculationTime
    description: Bespoke terms to describe the time as of which such party (or the Calculation Agent (IM) (if applicale))
      computes its end of day valuations of derivatives transactions.
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.bespokeCalculationTime

  calculationDateLocation:
    range: ValuationCalculationDateLocation
    description: The specified location where the credit exposure will be calculated by the respective parties.
    required: true
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.calculationDateLocation

  cashSettlementDay:
    range: string
    notes:
      - ISDA CSA_IM_Japanese_2016 paragraph "4" clause "(b)(i)"
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin.cashSettlementDay

  securitiesSettlementDay:
