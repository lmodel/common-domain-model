      - description: A data rule to enforce that the applicability of Failure to Pay language is only applied when Early Termination
          language is included.
        preconditions:
          slot_conditions:
            earlyTerminationDateOptionalLanguage:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            failureToPayEarlyTermination:
              required: false
    comments:
      - 'Rosetta condition: FailureToPayLanguage — if earlyTerminationDateOptionalLanguage = False then failureToPayEarlyTermination
        is absent'
    slots:
      - securedPartyRightsEventElection
      - earlyTerminationDateOptionalLanguage
      - failureToPayEarlyTermination
    in_subset:
      - cdm_legaldocumentation_csa

  SecuredPartyRightsEventElection:
    description: A class to specify party specific Secured Party Rights Event language.
    slots:
      - party
      - rightsEvent
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  SecurityProviderRightsEvent:
    description: A class to specify the Pledgor/Obligor/Chargor Rights Event election.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(j)" name "Chargor Rights Event"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(j)" name "Obligor Rights Event"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(j)" name "Pledgor Rights Event."
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    rules:
      - description: A data rule to enforce that, when the Rights Event election includes cooling off language, no custom
          election should be specified.
        preconditions:
          slot_conditions:
            includeCoolingOffLanguage:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            customElection:
              required: false
      - description: A data rule to enforce that, when the Rights Event is specified through a custom election, no standard
          cooling off language should be specified.
        preconditions:
          slot_conditions:
            customElection:
              required: true
        postconditions:
          slot_conditions:
            includeCoolingOffLanguage:
              equals_string: 'False'
    comments:
      - 'Rosetta condition: RightsEvent_includeCoolingOffLanguage — if includeCoolingOffLanguage = True then customElection
        is absent'
      - 'Rosetta condition: RightsEvent_customElection — if customElection exists then includeCoolingOffLanguage = False'
    slots:
      - partyElection
      - includeCoolingOffLanguage
      - fullDischarge
      - automaticSetOff
      - customElection
    slot_usage:
      partyElection:
        range: SecurityProviderRightsEventElection
        required: false
      fullDischarge:
        description: If specified as applicable here, a Pledgor/Obligor/Chargor Rights Event will not occur unless the Pledgor/Obligor/Chargor
          (A) has provided a statement to the Secured Party in respect of such Early Termination Date.
      customElection:
        description: A custom Pledgor/Obligor/Chargor Rights Event election might be specified by the parties.
    in_subset:
      - cdm_legaldocumentation_csa

  SecurityProviderRightsEventElection:
    description: A class to specify party specific Secured Party Rights Event language.
