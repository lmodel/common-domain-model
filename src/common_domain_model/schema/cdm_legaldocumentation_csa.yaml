  SecurityAgreementElections:
    description: The set of elections which specify a Security Agremeent.
    slots:
      - pledgedAccount
      - enforcementEvent
      - deliveryInLieuRight
      - fullDischarge
      - appropriatedCollateralValuation
      - processAgent
      - jurisdictionRelatedTerms
      - additionalAmendments
      - additionalBespokeTerms
      - executionTerms
    slot_usage:
      processAgent:
        required: false
      jurisdictionRelatedTerms:
        description: The jurisdiction specific terms.
    in_subset:
      - cdm_legaldocumentation_csa

  PostedCreditSupportItem:
    description: Posted Credit Support item with corresponding Valuation Percentage, FX Haircut Percentage and any related
      disputed Posted Credit Support valuation.
    comments:
      - 'Rosetta func: PostedCreditSupportItemAmount — Calculates the Value for the given Posted Credit Support item.'
      - 'Rosetta func: UndisputedAdjustedPostedCreditSupportAmount — Calculates the value for Undisputed Adjusted Posted Credit
        Support Item.'
      - 'Rosetta func: ReturnAmount'
      - 'Rosetta func: DeliveryAmount'
    annotations:
      rosetta_functions: '[{"name":"PostedCreditSupportItemAmount","description":"Calculates the Value for the given Posted
        Credit Support item.","inputs":[{"name":"postedItem","type":"PostedCreditSupportItem","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}},{"name":"UndisputedAdjustedPostedCreditSupportAmount","description":"Calculates
        the value for Undisputed Adjusted Posted Credit Support Item.","inputs":[{"name":"postedCreditSupportItems","type":"PostedCreditSupportItem","cardinality":"0..*"},{"name":"priorDeliveryAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"priorReturnAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"disputedTransferredPostedCreditSupportAmount","type":"Money","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}},{"name":"ReturnAmount","inputs":[{"name":"postedCreditSupportItems","type":"PostedCreditSupportItem","cardinality":"0..*"},{"name":"priorDeliveryAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"priorReturnAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"disputedTransferredPostedCreditSupportAmount","type":"Money","cardinality":"1..1"},{"name":"marginAmount","type":"Money","cardinality":"1..1"},{"name":"threshold","type":"Money","cardinality":"1..1"},{"name":"marginApproach","type":"MarginApproachEnum","cardinality":"1..1"},{"name":"marginAmountIA","type":"Money","cardinality":"0..1"},{"name":"minimumTransferAmount","type":"Money","cardinality":"1..1"},{"name":"rounding","type":"CollateralRounding","cardinality":"1..1"},{"name":"disputedReturnAmount","type":"Money","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}},{"name":"DeliveryAmount","inputs":[{"name":"postedCreditSupportItems","type":"PostedCreditSupportItem","cardinality":"0..*"},{"name":"priorDeliveryAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"priorReturnAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"disputedTransferredPostedCreditSupportAmount","type":"Money","cardinality":"1..1"},{"name":"marginAmount","type":"Money","cardinality":"1..1"},{"name":"threshold","type":"Money","cardinality":"1..1"},{"name":"marginApproach","type":"MarginApproachEnum","cardinality":"1..1"},{"name":"marginAmountIA","type":"Money","cardinality":"0..1"},{"name":"minimumTransferAmount","type":"Money","cardinality":"1..1"},{"name":"rounding","type":"CollateralRounding","cardinality":"1..1"},{"name":"disputedDeliveryAmount","type":"Money","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}}]'
    slots:
      - cashOrSecurityValue
      - haircutPercentage
      - fxHaircutPercentage
      - additionalHaircutPercentage
      - disputedCashOrSecurityValue
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalRepresentation:
    description: A class to specify the Additional Representation.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(o)" name "Additional Representations(s)"
    see_also:
      - isda:CSA_IM_2016
    close_mappings:
      - fpml_5_10:AdditionalRepresentation
    slots:
      - partyElection
      - customElection
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalRepresentationElection:
    description: A class to specify the parties' Additional Representation(s) election.
    close_mappings:
      - fpml_5_10:AdditionalRepresentationElection
    slots:
      - party
      - isApplicable
      - additionalLanguage
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      additionalLanguage:
        description: Details of any Additional Representations given by the relevant parties in relation to the collateral
          arrangement.
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalRepresentations:
    description: A class to specify Additional Representations that may be applicable to an agreement.
    close_mappings:
      - fpml_5_10:AdditionalRepresentations
    slots:
      - additionalRepresentation
      - regulatoryComplianceRepresentation
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalRightsEvent:
    description: A class to specify the Pledgor/Obligor/Chargor Additional Rights Event election.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(k)" name "Chargor Additional Rights Event"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(k)" name "Obligor Additional Rights Event"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(k)" name "Pledgor Additional Rights Event"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    close_mappings:
      - fpml_5_10:AdditionalRightsEvent
    rules:
      - description: The Pledgor/Obligor/Chargor Additional Rights should be qualified only when the Pledgor Additional Rights
          Event election is specified as applicable.
        preconditions:
          slot_conditions:
            qualification:
              required: true
        postconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'True'
    comments:
      - 'Rosetta condition: Qualification — if qualification exists then isApplicable = True'
    slots:
      - isApplicable
      - qualification
    slot_usage:
      isApplicable:
        description: The Pledgor Additional Rights Event election is applicable when True, and not applicable when False.
      qualification:
        range: string
        description: The qualification of the Pledgor Additional Rights Event election, when specified.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalTerminationEvent:
    description: A class to specify an optional termination event, additional to the Termination Events that will be deemed
      an Access Condition (Initial Margin CSA) or a Specified Condition (Variation Margin CSA).
    close_mappings:
      - fpml_5_10:AdditionalTerminationEvent
    slots:
      - name
      - applicableParty
    slot_usage:
      name:
        description: The name of the additional termination event.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  AdditionalType:
    description: The specification of the Additional Type of transaction that can require the collection or delivery of initial
      margin under a given regulatory regime for the purposes of Covered Transactions.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(b)(B)"
    see_also:
      - isda:CSA_IM_2016
    close_mappings:
      - fpml_5_10:AdditionalType
    rules:
      - description: The specification of a custom value by the parties to the legal agreement takes place alongside the qualification
          of the `Other` value as part of the AdditionalTypeEnum.
        preconditions:
          slot_conditions:
            standardValue:
              equals_string: Other
        postconditions:
          slot_conditions:
            customValue:
              required: true
      - description: The specification of a standard value by the parties to the legal agreement is done through the qualification
          of a value distinct than `Other` as part of the AdditionalTypeEnum, and implies that the customerValue is not being
          qualified.
        comments:
          - 'Rosetta negation: standardValue <> AdditionalTypeEnum -> Other'
        preconditions:
          slot_conditions:
            standardValue:
              none_of:
                - equals_string_in:
                    - Other
        postconditions:
          slot_conditions:
            customValue:
              required: false
    comments:
      - 'Rosetta condition: CustomValue — if standardValue = AdditionalTypeEnum -> Other then customValue exists'
      - 'Rosetta condition: StandardValue — if standardValue <> AdditionalTypeEnum -> Other then customValue is absent'
    slots:
      - standardValue
      - customValue
    in_subset:
      - cdm_legaldocumentation_csa

  AmendmentEffectiveDate:
    description: A class to specify the effective date of the Amendment to Termination Currency. This date can be specified
      as either an actual date, a specific date (e.g. the annex date) or as a custom provision.
    close_mappings:
      - fpml_5_10:AmendmentEffectiveDate
    slots:
      - date
      - specificDate
      - customProvision
    slot_usage:
      date:
        description: The effective date of the Amendment to Termination Currency when specified as an actual date.
        required: false
        multivalued: false
      customProvision:
        description: The effective date of the Amendment to Termination Currency when specified as a non normalized custom
          provision.
    in_subset:
      - cdm_legaldocumentation_csa

  ApplicableRegime:
    description: A class to specify the applicable regulatory regime(s) that parties to a legal agreement, such as the ISDA
      2016 and 2018 CSA for Initial Margin, might be subject to.
    close_mappings:
      - fpml_5_10:ApplicableRegime
    rules:
      - description: The applicable regime should be specified either as an enumeration or as an additional regime specified
          by the parties.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                regime:
                  required: true
            - slot_conditions:
                additionalRegime:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ApplicableRegimeChoice — required choice regime, additionalRegime'
    slots:
      - regime
      - additionalRegime
      - regimeTerms
      - additionalType
      - additionalTerms
    slot_usage:
      regime:
        range: RegulatoryRegimeEnum
        description: The applicable regulatory regime, as specified through an enumeration.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  AppropriatedCollateralValuation:
    description: A class to specify the Valuation of Appropriated Collateral.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(u)" name "Valuation of Appropriated Collateral"
    see_also:
      - isda:CSD_IM_English_2016
    close_mappings:
      - fpml_5_10:AppropriatedCollateralValuation
    rules:
      - description: The Valuation of Appropriate Collateral election must be specified when it is applicable.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            election:
              required: true
      - description: The Valuation of Appropriate Collateral election cannot be specified when it is not applicable.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            election:
              required: false
    comments:
      - 'Rosetta condition: Specified — if isSpecified = True then election exists'
      - 'Rosetta condition: NotSpecified — if isSpecified = False then election is absent'
    slots:
      - isSpecified
      - election
    slot_usage:
      isSpecified:
        description: The qualification of whether the Valuation of Appropriate Collateral provision is applicable (True) or
          not applicable (False).
    in_subset:
      - cdm_legaldocumentation_csa

  BespokeCalculationDate:
    description: A class to specify bespoke Calculation Date terms for the purposes of Initial Margin.
    close_mappings:
      - fpml_5_10:BespokeCalculationDate
    rules:
      - description: A data rule to enforce that Additional Calculation Date Terms should be absent when not applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            calculationDateImTerms:
              required: false
    comments:
      - 'Rosetta condition: CalculationDateImTerms — if isApplicable = False then calculationDateImTerms is absent'
    slots:
      - isApplicable
      - calculationDateImTerms
    slot_usage:
      isApplicable:
        description: Additional Calculation Date terms are applicable when True and not applicable when False.
    in_subset:
      - cdm_legaldocumentation_csa

  BespokeCalculationTime:
    description: A class to specify additional Calculation Time terms for the purposes of Initial Margin.
    close_mappings:
      - fpml_5_10:BespokeCalculationTime
    rules:
      - description: A data rule to enforce that the terms applicable to Calculation Time for Initial Margin should be specified
          when the computation time is not as per Calculation Agent.
        preconditions:
          slot_conditions:
            asCalculationAgent:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            bespokeCalculationTimeTerms:
              required: false
      - description: A data rule to enforce that the Calculation Time for Initial Margin shouldn't be specified when the Control
          Agreement isn't deemed a Credit Support Document with respect to the party(ies).
        preconditions:
          slot_conditions:
            asCalculationAgent:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            bespokeCalculationTimeTerms:
              required: true
    comments:
      - 'Rosetta condition: AsCalculationAgentIm — if asCalculationAgent = True then bespokeCalculationTimeTerms is absent'
      - 'Rosetta condition: BespokeCalculationTimeTerms — if asCalculationAgent = False then bespokeCalculationTimeTerms exists'
    slots:
      - asCalculationAgent
      - bespokeCalculationTimeTerms
    in_subset:
      - cdm_legaldocumentation_csa

  BespokeTransferTiming:
    description: A class to specify any bespoke Transfer Timing language by each party to the agreement.
    close_mappings:
      - fpml_5_10:BespokeTransferTiming
    slots:
      - isApplicable
      - bespokeTransferTimingTerms
    slot_usage:
      isApplicable:
        description: A boolean flag to specify whether bespoke transfer terms are applicable or not.
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAgentTerms:
    description: Details of the party calculating the value of collateral to be delivered or returned.
    close_mappings:
      - fpml_5_10:CalculationAgentTerms
    slots:
      - party
      - bespokeCalculationAgentTerms
    slot_usage:
      party:
        range: CalculationValuationAgentPartyEnum
        description: The party which is specified as Calculation Agent for Initial Margin.
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAndTimingLegacy:
    description: Specification of the Calculation, Valuation and Timing terms specific to the Legacy (1994/95) Credit Support
      Annex.
    is_a: CalculationAndTimingBase
    close_mappings:
      - fpml_5_10:CalculationAndTimingLegacy
    slots:
      - valuationDate
      - valuationTime
      - valuationAgent
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAndTimingVariationMargin:
    description: Specification of the Calculation, Valuation and Timing terms specific to the Variation Margin Credit Support
      Annex.
    is_a: CalculationAndTimingBase
    close_mappings:
      - fpml_5_10:CalculationAndTimingVariationMargin
    slots:
      - valuationDate
      - valuationTime
      - valuationAgent
      - valuationDateLocation
    slot_usage:
      valuationAgent:
        description: Details of the party valuating the collateral to be delivered or returned.
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAndTimingInitialMargin:
    description: Specification of the Calculation, Valuation and Timing terms specific to the Initial Margin Credit Support
      Annex.
    is_a: CalculationAndTimingBase
    close_mappings:
      - fpml_5_10:CalculationAndTimingInitialMargin
    slots:
      - calculationAgentTerms
      - bespokeCalculationDate
      - bespokeCalculationTime
      - calculationDateLocation
      - cashSettlementDay
      - securitiesSettlementDay
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAndTimingCollateralTransferAgreement:
    description: Specification of the Calculation, Valuation and Timing terms specific to the Initial Margin Credit Support
      Annex.
    is_a: CalculationAndTimingBase
    close_mappings:
      - fpml_5_10:CalculationAndTimingCollateralTransferAgreement
    slots:
      - calculationAgentTerms
      - bespokeCalculationDate
      - bespokeCalculationTime
      - calculationDateLocation
      - cashSettlementDay
      - securitiesSettlementDay
    slot_usage:
      calculationAgentTerms:
        required: false
      calculationDateLocation:
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationAndTimingBase:
    description: A logical container designed to hold a set of related data. In this case, designed to hold a set of clauses
      that are common amongst Legacy (1994/95), Variation Margin and Initial Margin Credit Support Documents in regards to
      Calculation, Valuation and Timing terms.
    slots:
      - notificationTime
    in_subset:
      - cdm_legaldocumentation_csa

  CalculationCurrencyElection:
    description: A class to specify the ISDA SIMM Calculation Currency.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(ee)(3"
    see_also:
      - isda:CSA_IM_2016
    close_mappings:
      - fpml_5_10:CalculationCurrencyElection
    rules:
      - description: A data rule to enforce that, when the SIMM calculation currency is specified as the Base Currency and
          vice versa.
        preconditions:
          slot_conditions:
            isBaseCurrency:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            currency:
              required: false
    comments:
      - 'Rosetta condition: BaseCurrency — if isBaseCurrency = True then currency is absent else currency exists'
    slots:
      - party
      - isBaseCurrency
      - currency
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party which the SIMM Calculation Currency qualification applies to.
        required: true
      currency:
        description: The currency in which the ISDA SIMM Calculation is denominated, when different from the Base Currency.
          The list of valid currencies is not presently positioned as an enumeration as part of the CDM because that scope
          is limited to the values specified by ISDA and FpML. As a result, implementers have to make reference to the relevant
          standard, such as the ISO 4217 standard for currency codes.
    in_subset:
      - cdm_legaldocumentation_csa

  ValuationCalculationDateLocation:
    description: Specification of the Calculation Date Location for the respective parties to the legal agreement.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(d)(i)" name "Calculation Date Location"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(e)(i)" name "Calculation Date Location"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(i)" name "Calculation Date Location"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: ValuationCalculationDateLocationElection
        description: The parties' calculation date location election.
    in_subset:
      - cdm_legaldocumentation_csa

  ValuationCalculationDateLocationElection:
    description: A class to specify each of the party elections with respect to the Calculation Date Location.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(d)(i)" name "Calculation Date Location"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(e)(i)" name "Calculation Date Location"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(i)" name "Calculation Date Location"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    rules:
      - description: The Calculation Date Location is specified either as a standard business center or as a custom location.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                businessCenter:
                  required: true
            - slot_conditions:
                customLocation:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: Choice — required choice businessCenter, customLocation'
    slots:
      - party
      - businessCenter
      - customLocation
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      businessCenter:
        description: The Calculation Date Location when specified as a business center which corresponds to the FpML list
          of business centers or can be mapped to it.
        multivalued: false
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralAccessBreach:
    description: A class to specify Collateral Access Breach language.
    close_mappings:
      - fpml_5_10:CollateralAccessBreach
    rules:
      - description: A condition to require Collateral Access Breach End Date Terms when a specification is required.
        preconditions:
          slot_conditions:
            cabEndDateElection:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            cabEndDateTerms:
              required: false
    comments:
      - 'Rosetta condition: CabEndDateTerms — if cabEndDateElection = True then cabEndDateTerms is absent'
    slots:
      - isApplicable
      - cabEndDateElection
      - cabEndDate
      - cabEndDateTerms
    slot_usage:
      isApplicable:
        description: Collateral Access Breach terms are applicable when True and not applicable when False.
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralManagementAgreement:
    description: A class to specify the Collateral Management Agreement election.
    notes:
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(b)(i)" name "Collateral Management Agreement"
    see_also:
      - isda:CSA_IM_Japanese_2016
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: CollateralManagementAgreementElection
        description: The parties' Collateral Management Agreement election.
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralManagementAgreementElection:
    description: A class to specify the Collateral Management Agreement election.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(b(i)" name "Collateral Management Agreement"
    see_also:
      - isda:CSA_IM_2016
    close_mappings:
      - fpml_5_10:CollateralManagementAgreementElection
    slots:
      - party
      - collateralManagementAgreement
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralRounding:
    description: A class to specify the rounding methodology applicable to the Delivery Amount and the Return Amount.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(c)(vi)( C )" name "Rounding"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(d)(vi)( C )" name "Rounding"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(c)(vi)( C )" name "Rounding"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    close_mappings:
      - fpml_5_10:CollateralRounding
    comments:
      - 'Rosetta func: ReturnAmount'
      - 'Rosetta func: DeliveryAmount'
    annotations:
      rosetta_functions: '[{"name":"ReturnAmount","inputs":[{"name":"postedCreditSupportItems","type":"PostedCreditSupportItem","cardinality":"0..*"},{"name":"priorDeliveryAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"priorReturnAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"disputedTransferredPostedCreditSupportAmount","type":"Money","cardinality":"1..1"},{"name":"marginAmount","type":"Money","cardinality":"1..1"},{"name":"threshold","type":"Money","cardinality":"1..1"},{"name":"marginApproach","type":"MarginApproachEnum","cardinality":"1..1"},{"name":"marginAmountIA","type":"Money","cardinality":"0..1"},{"name":"minimumTransferAmount","type":"Money","cardinality":"1..1"},{"name":"rounding","type":"CollateralRounding","cardinality":"1..1"},{"name":"disputedReturnAmount","type":"Money","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}},{"name":"DeliveryAmount","inputs":[{"name":"postedCreditSupportItems","type":"PostedCreditSupportItem","cardinality":"0..*"},{"name":"priorDeliveryAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"priorReturnAmountAdjustment","type":"Money","cardinality":"1..1"},{"name":"disputedTransferredPostedCreditSupportAmount","type":"Money","cardinality":"1..1"},{"name":"marginAmount","type":"Money","cardinality":"1..1"},{"name":"threshold","type":"Money","cardinality":"1..1"},{"name":"marginApproach","type":"MarginApproachEnum","cardinality":"1..1"},{"name":"marginAmountIA","type":"Money","cardinality":"0..1"},{"name":"minimumTransferAmount","type":"Money","cardinality":"1..1"},{"name":"rounding","type":"CollateralRounding","cardinality":"1..1"},{"name":"disputedDeliveryAmount","type":"Money","cardinality":"1..1"},{"name":"baseCurrency","type":"string","cardinality":"1..1"}],"output":{"name":"result","type":"Money","cardinality":"1..1"}}]'
    slots:
      - deliveryAmount
      - deliveryDirection
      - returnAmount
      - returnDirection
      - currency
      - other
    slot_usage:
      currency:
        range: ISOCurrencyCodeEnum
        description: The currency in which the Delivery Amount and Return Amount rounding amounts are specified.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  ConditionsPrecedent:
    description: A class to specify the two set of elections that may overwrite the default Condition Precedent provision.
    notes:
      - ISDA CSA_IM_2016 paragraph "4" clause "(a)"
      - ISDA CSA_VM_2016 paragraph "4" clause "(a)"
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(e)" name " Conditions Precedent"
      - ISDA CSD_IM_English_2018 paragraph "13 General Principles" clause "(e)" name " Conditions Precedent"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(f)" name " Conditions Precedent"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(e)" name " Conditions Precedent"
      - ISDA CSA_VM_2016 paragraph "13" clause "(e)" name "Conditions Precedent and Secured Partys Rights and Remedies"
      - ISDA CSD_English_1995 paragraph "13" clause "(e)" name "Conditions Precedent and Secured Partys Rights and Remedies."
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(d)" name "Conditions Precedent and Secured Partys Rights and Remedies."
    see_also:
      - isda:CSA_IM_2016
      - isda:CSA_VM_2016
      - isda:CSD_IM_English_2016
      - isda:CSD_IM_English_2018
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
      - isda:CSD_English_1995
      - isda:CSA_NewYork_1994
    comments:
      - 'Rosetta condition: CustomProvision — if customProvision exists then conditionsPrecedentElection = ExceptionEnum ->
        Other'
    slots:
      - conditionsPrecedentElection
      - customProvision
      - specifiedConditionOrAccessCondition
    slot_usage:
      customProvision:
        description: The custom provisions that might be specified by the parties to the agreement for the purpose of overwriting
          the default Condition Precedent provision specified in the CSA.
    in_subset:
      - cdm_legaldocumentation_csa

  ControlAgreement:
    description: A class to specify the relationship between the Control Agreement and the Credit Support Agreement.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: ControlAgreementElections
        description: The party specific elections.
    in_subset:
      - cdm_legaldocumentation_csa

  ControlAgreementElections:
    description: A class to specify the Control Agreement election sby each party to the agreement.
    slots:
      - party
      - controlAgreementAsCsd
      - consistencyWithControlAgreement
      - relationshipWithControlAgreement
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  ControlAgreementNecEvent:
    description: A class to specify Control Agreement language related to delivery of a Notice of Exclusive Control.
    slots:
      - controlAgreementNecEventElection
    in_subset:
      - cdm_legaldocumentation_csa

  ControlAgreementNecEventElection:
    description: A class to specify party specific Control Agreement language related to delivery of a Notice of Exclusive
      Control.
    slots:
      - party
      - necEvent
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  Custodian:
    description: A class to specify the custodian and custody account details for each party to the agreement.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: CustodianElection
        description: The party specific elections.
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianElection:
    description: A class to specify the custodian and custody account details for each party to the agreement.
    rules:
      - description: The entity should be named if this is specified in the determination.
        preconditions:
          slot_conditions:
            legacyVMCustodian:
              equals_string: NamedEntity
        postconditions:
          slot_conditions:
            legacyNamedEntity:
              required: true
      - description: If no Custodian determination methodology is defined, additional language must be specified.
        preconditions:
          slot_conditions:
            legacyVMCustodian:
              required: false
        postconditions:
          slot_conditions:
            additionalLanguage:
              required: true
    comments:
      - 'Rosetta condition: NamedEntity — if legacyVMCustodian = LegacyVMCustodianEnum -> NamedEntity then legacyNamedEntity
        exists'
      - 'Rosetta condition: AdditionalLanguage — if legacyVMCustodian is absent then additionalLanguage exists'
    slots:
      - party
      - custodian
      - segregatedCashAccount
      - segregatedSecurityAccount
      - legacyVMCustodian
      - legacyNamedEntity
      - additionalLanguage
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      additionalLanguage:
        description: The additional language that might be specified by the parties to the legal agreement.
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianEvent:
    description: A class to specify the Custodian Event.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(n)(iii)" name " Custodian Event"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(m)(ii)" name "Collateral Manager Event"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(n)(iii)" name "Custodian Event"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - isApplicable
      - endDate
    slot_usage:
      isApplicable:
        description: The qualification as to whether the Custodian Event (English Law & New York Law ISDA CSA) or the Collateral
          Manager Event (Japanese Law ISDA CSA) is applicable.
      endDate:
        range: CustodianEventEndDate
        description: The qualification of the Custodian Event (English Law & New York Law ISDA CSA) or Collateral Manager
          Event (Japanese Law ISDA CSA) End Date.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianEventEndDate:
    description: A class to specify the Custodian Event.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(n)(iii)" name "CE End Date"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(m)(ii)" name "CME End Date"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(n)(iii)" name "CE End Date"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - daysAfterCustodianEvent
      - releaseDate
      - safekeepingPeriodExpiry
      - dateOfTimelyStatement
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianRisk:
    description: A class to specify the Custodian Risk elections specific to a Credit Support Agreement.
    slots:
      - partyElection
    slot_usage:
      partyElection:
        range: CustodianRiskElection
        description: The party specific elections.
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianRiskElection:
    description: A class to specify the Custodian Risk.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(n)(ii)" name "Custodian (IM) Risk"
      - ISDA CSD_IM_English_2018 paragraph "13 General Principles" clause "(n)(ii)" name "Custodian (IM) Risk"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(m)(ii)" name "Collateral Manager Risk"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(n)(ii)" name "Custodian (IM) Risk"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSD_IM_English_2018
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    rules:
      - description: The Custodian Risk (English Law and New York Law ISDA CSA) or Collateral Manager Risk (Japanese Law ISDA
          CSA) should only be qualified if that risk is deemed 'specified'.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            qualification:
              required: false
    comments:
      - 'Rosetta condition: Specified — if isSpecified = False then qualification is absent'
    slots:
      - party
      - isSpecified
      - qualification
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
      isSpecified:
        description: The qualification as to whether the risk is deemed as Specified.
      qualification:
        range: string
        description: The Custodian Risk or Collateral Manager Risk qualification.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  CustodianTerms:
    description: A class to specify the requirements applicable to the custodian with respect to the holding of posted collateral.
    notes:
      - ISDA CSA_VM_2016 paragraph "13" clause " (h)(i)" name "Eligibility to Hold Posted Collateral (VM) Custodians (VM)"
    see_also:
      - isda:CSA_VM_2016
    slots:
      - minimumAssets
      - minimumRating
      - initialDesignation
    in_subset:
      - cdm_legaldocumentation_csa

  CustodyArrangements:
    description: Describes how posted collateral is held, maintained, and safeguarded by a custodian or third-party agent,
      in accordance with the terms of the governing agreement.
    slots:
      - isCreditSupportDocument
      - hasControlAgreementLanguage
      - otherProvisions
      - collateralAccessBreach
      - custodianRisk
      - controlAgreement
      - custodianEvent
      - custodian
      - collateralManagementAgreement
    slot_usage:
      custodian:
        range: Custodian
        description: The custodian and segregated account details for each party to the agreement.
      collateralManagementAgreement:
        range: CollateralManagementAgreement
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  DisputeResolution:
    description: A class to specify the election terms under which a party disputes the Value of any Transfer of Eligible
      Credit Support or Posted Credit Support.
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(g)" name "Dispute Resolution"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(h)" name "Dispute Resolution"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(g)" name "Dispute Resolution"
    see_also:
      - isda:CSD_IM_English_2016
      - isda:CSA_IM_Japanese_2016
      - isda:CSA_IM_NewYork_2016
    slots:
      - resolutionTime
      - otherTerms
      - alternativeTerms
      - recalculationOfValue
      - legacyAlternative
      - value
    slot_usage:
      value:
        range: ResolutionValue
        description: Methodology for resolving disputes in respect of the determination of the value of collateral.
    in_subset:
      - cdm_legaldocumentation_csa

  ElectiveAmountElection:
    description: A class to specify the party elective amounts which can be used for the purpose of specifying elections such
      as the ISDA CSA Threshold and Minimum Transfer Amount.
    rules:
      - description: When the elective amount is not zero either a currency amount or a custom election must exist.
        preconditions:
          slot_conditions:
            electiveAmount:
              required: false
        postconditions:
          any_of:
            - slot_conditions:
                amount:
                  required: true
            - slot_conditions:
                customElection:
                  required: true
    comments:
      - 'Rosetta condition: NonZeroAmount — if electiveAmount is absent then amount exists or customElection exists'
    slots:
      - party
      - electiveAmount
      - amount
      - customElection
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      amount:
        description: The elective amount when expressed as a currency amount. The associated PartyElectiveAmount_amount data
          rule enforces that the currency amount is actually greater than 0.
        required: false
      customElection:
        description: The elective amount when expressed as a custom election by the party.
    in_subset:
      - cdm_legaldocumentation_csa

  EnforcementEvent:
    description: A class to specify Enforcement Events specific to Security Agreements.
    slots:
      - earlyTerminationDate
      - failureToPay
    in_subset:
      - cdm_legaldocumentation_csa

  ExecutionLanguage:
    description: A class to specify execution language terms of a Security Agreement.
    rules:
      - description: A data rule to enforce that the number of original documents should only be specified when standard execution
          language is used.
        preconditions:
          slot_conditions:
            standardLanguage:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            numberOfOriginals:
              required: false
      - description: A data rule to enforce that bespoke execution language must be included if non-standard execution language
          is specified.
        preconditions:
          slot_conditions:
            standardLanguage:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            otherLanguage:
              required: true
    comments:
      - 'Rosetta condition: NumberOfOriginals — if standardLanguage = False then numberOfOriginals is absent'
      - 'Rosetta condition: OtherLanguage — if standardLanguage = False then otherLanguage exists'
    slots:
      - standardLanguage
      - numberOfOriginals
      - otherLanguage
    in_subset:
      - cdm_legaldocumentation_csa

  ExecutionLocation:
    description: A class to specify execution location terms of a Security Agreement.
    rules:
      - description: A data rule to enforce that Duty Payer Language should only be specified when required.
        preconditions:
          slot_conditions:
            dutyPayer:
              equals_string: Specify
        postconditions:
          slot_conditions:
            dutyPayerLanguage:
              required: true
      - description: A data rule to enforce that Duty Payment Language should be absent when a Duty Payment date is provided.
        preconditions:
          slot_conditions:
            dutyPaymentDate:
              required: true
        postconditions:
          slot_conditions:
            dutyPaymentLanguage:
              required: false
      - description: A data rule to enforce that bespoke execution language must be included if non-standard execution language
          is specified.
        preconditions:
          slot_conditions:
            executionLocation:
              equals_string: OtherLocation
        postconditions:
          slot_conditions:
            otherLanguage:
              required: true
    comments:
      - 'Rosetta condition: DutyPayerLanguage — if dutyPayer = "Specify" then dutyPayerLanguage exists'
      - 'Rosetta condition: DutyPaymentLanguage — if dutyPaymentDate exists then dutyPaymentLanguage is absent'
      - 'Rosetta condition: OtherLanguage — if executionLocation = ExecutionLocationEnum -> OtherLocation then otherLanguage
        exists'
    slots:
      - executionLocation
      - otherLanguage
      - dutyPayer
      - dutyPayerLanguage
      - dutyPaymentDate
      - dutyPaymentLanguage
    slot_usage:
      otherLanguage:
        description: Bespoke execution location language to be included when specified.
    in_subset:
      - cdm_legaldocumentation_csa

  ExecutionTerms:
    description: A class to specify execution location and language of execution to determine duty to be paid.
    slots:
      - executionLanguage
      - executionLocation
    slot_usage:
      executionLocation:
        range: ExecutionLocation
        description: The bespoke execution location election.
    in_subset:
      - cdm_legaldocumentation_csa

  FrenchLawAddendum:
    description: A class to specify party specific elections when a Collateral Transfer Agreement is governed by French Law.
    comments:
      - 'Rosetta condition: Applicable — if isApplicable = True then partyElection count = 2'
    slots:
      - isApplicable
      - partyElection
    slot_usage:
      isApplicable:
        description: The qualification of whether the French Law Addendum is deemed applicable by the parties (True) or not
          (False).
      partyElection:
        range: FrenchLawAddendumElection
        description: The parties French Law Addendum Elections.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  FrenchLawAddendumElection:
    description: A class to specify party specific French Law Addendum language.
    rules:
      - description: A data rule to enforce that the French Law Addendum party language must be specified when applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            addendumLanguage:
              required: true
    comments:
      - 'Rosetta condition: AddendumLanguage — if isApplicable = True then addendumLanguage exists else if isApplicable =
        False then addendumLanguage is absent'
    slots:
      - party
      - isApplicable
      - addendumLanguage
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
      isApplicable:
        description: The qualification of whether the party elects specific language.
    in_subset:
      - cdm_legaldocumentation_csa

  FxHaircutCurrency:
    description: A class to specify the reference currency for the purpose of specifying the FX Haircut relating to a posting
      obligation, as being either the Termination Currency or an FX Designated Currency.
    rules:
      - description: The FX Designated Currency shouldn't be specified when the reference currency for the purpose of specifying
          the FX Haircut relating to a posting obligation is specified as the Termination Currency.
        preconditions:
          slot_conditions:
            isTerminationCurrency:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            fxDesignatedCurrency:
              required: false
      - description: The FX Designated Currency should be specified when the reference currency for the purpose of specifying
          the FX Haircut relating to a posting obligation is specified as not being the Termination Currency.
        preconditions:
          slot_conditions:
            isTerminationCurrency:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            fxDesignatedCurrency:
              required: true
    comments:
      - 'Rosetta condition: TerminationCurrency — if isTerminationCurrency = True then fxDesignatedCurrency is absent'
      - 'Rosetta condition: FxDesignatedCurrency — if isTerminationCurrency = False then fxDesignatedCurrency exists'
    slots:
      - isTerminationCurrency
      - fxDesignatedCurrency
    in_subset:
      - cdm_legaldocumentation_csa

  GeneralSimmElections:
