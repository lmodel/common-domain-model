      securityInterestForObligations:
        required: false
      creditSupportObligations:
        range: CreditSupportObligationsLegacy
      calculationAndTiming:
        range: CalculationAndTimingLegacy
    in_subset:
      - cdm_legaldocumentation_csa

  CreditSupportAgreementElectionsBase:
    description: A logical container designed to hold a set of related data. In this case, designed to hold a set of clauses
      that are common amongst Legacy (1994/95), Variation Margin and Initial Margin Credit Support Documents.
    slots:
      - baseAndEligibleCurrency
      - conditionsPrecedent
      - substitution
      - disputeResolution
      - holdingAndUsingPostedCollateral
      - distributionAndInterestPayment
      - otherEligibleAndPostedSupport
      - demandsAndNotices
      - additionalRepresentations
      - masterAgreementDatedAsOfDate
      - finalReturns
    in_subset:
      - cdm_legaldocumentation_csa

  CollateralTransferAgreementElections:
    description: The set of elections which specify a Collateral Transfer Agreement.
    close_mappings:
      - fpml_5_10:CollateralTransferAgreementElections
    slots:
      - regime
      - oneWayProvisions
      - generalSimmElections
      - identifiedCrossCurrencySwap
      - sensitivityMethodologies
      - fxHaircutCurrency
      - postingObligations
      - substitutedRegime
      - baseAndEligibleCurrency
      - creditSupportObligations
      - calculationAndTiming
      - conditionsPrecedent
      - substitution
      - disputeResolution
      - rightsEvents
      - custodyArrangements
      - additionalRepresentations
      - demandsAndNotices
      - addressesForTransfer
      - otherAgreements
      - terminationCurrencyAmendment
      - minimumTransferAmountAmendment
      - interpretationTerms
      - processAgent
      - jurisdictionRelatedTerms
      - additionalAmendments
      - additionalBespokeTerms
      - pledgeeRepresentativeRider
      - finalReturns
    slot_usage:
      creditSupportObligations:
        range: CreditSupportObligationsCollateralTransferAgreement
      calculationAndTiming:
        range: CalculationAndTimingCollateralTransferAgreement
      rightsEvents:
