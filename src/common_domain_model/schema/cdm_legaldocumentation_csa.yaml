      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(d)(vi)(C)" name "Rounding"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(c)(vi)(C)" name "Rounding"

