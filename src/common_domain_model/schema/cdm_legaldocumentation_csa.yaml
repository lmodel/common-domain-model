  returnAmount:
    range: decimal
    description: The nearest integral multiple of Base Currency units to which the Return Amount will be rounded in accordance
      with the specified rounding direction.
    required: true
    close_mappings:
      - fpml_5_10:CollateralRounding.returnAmount

  returnDirection:
    range: RoundingModeEnum
    description: The rounding rule applicable to the Return Amount (which can be (i) up to nearest; (ii) down to nearest).
    required: true
    close_mappings:
      - fpml_5_10:CollateralRounding.returnDirection

  other:
    range: string
    description: Utilised where the clause data structure is not able to capture a material aspect of the clause.
    close_mappings:
      - fpml_5_10:CollateralRounding.other

  conditionsPrecedentElection:
    range: ExceptionEnum
    description: The election to specify whether the standard Conditions Precedent apply.

  specifiedConditionOrAccessCondition:
    range: SpecifiedConditionOrAccessCondition
    description: Specifies the events elected by the parties that are deemed an Access Condition (for Initial Margin CSA)
      or a Specified Condition (for Variation Margin and Legacy CSA), which, if triggered, may temporarily or permanently
      suspend rights to rehypothecate, transfer, or substitute collateral.
    notes:
      - ISDA CSD_English_1995 paragraph "13" clause "(e)" name "Conditions Precedent and Secured Partys Rights and Remedies."
      - ISDA CSA_NewYork_1994 paragraph "13" clause "(d)" name "Conditions Precedent and Secured Partys Rights and Remedies."
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(e)(ii)"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(f)(ii)"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(e)(ii)"
      - ISDA CSA_VM_2016 paragraph "13" clause "(e)" name "Conditions Precedent and Secured Partys Rights and Remedies."

  controlAgreementAsCsd:
    range: boolean
    description: The identification of whether the Control Agreement is a Credit Support Document with respect to each party.
    required: true

  consistencyWithControlAgreement:
    range: boolean
    description: Unless specified as inapplicable in the event of any inconsistency between this Deed and the Control Agreement,
      this Deed will prevail over the Control Agreement.

  relationshipWithControlAgreement:
    range: boolean
    description: Unless specified as inapplicable the parties recognise that the Control Agreement is a means by which the
      parties can perform their obligations.

  controlAgreementNecEventElection:
    range: ControlAgreementNecEventElection
    description: Indicates party specific Control Agreement language related to delivery of a Notice of Exclusive Control.
    required: true
    multivalued: true
    inlined_as_list: true

  necEvent:
    range: boolean
    description: Indicates Control Agreement language related to delivery of a Notice of Exclusive Control.
    required: true

  custodian:
    range: LegalEntity
    description: The custody agent. While CreateiQ only specifies the custodian's name, specifying the legal entity as part
      of the CDM is deemed more appropriate, while this will still provide the ability to accommodate situations where only
      the entity name is available, as the entityId attribute is optional as part of the LegalEntity class.

  segregatedCashAccount:
    range: Account
    description: The identification of the segregated cash account for the purpose of holding cash collateral.

  segregatedSecurityAccount:
    range: Account
    description: The identification of the segregated security account for the purpose of holding security collateral.

  legacyVMCustodian:
    range: LegacyVMCustodianEnum
    description: Details how the Custodian is determined.

  legacyNamedEntity:
    range: LegalEntity
    description: The identity of the relevant custodian where Named Entity is elected.

  daysAfterCustodianEvent:
    range: CustomisableOffset
    description: Election to specify the number of days after the occurrence of the Custodian Event/Collateral Management
      Event for the purpose of qualifying the CE/CME End Date.
    required: true
    notes:
      - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(n)(iii)" name " Custodian Event"
      - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(m)(ii)" name "Collateral Manager Event"
      - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(n)(iii)" name " Custodian Event"

  releaseDate:
    range: CustomisableOffset
    description: Election to specify the number of days prior to the termination of the Control Agreement /Collateral Management
      Event for the purpose of qualifying the CE/CME End Date, in the case where advance notice is given.
    required: true
    notes:
      - ISDA CSD_IM_English_2016
      - ISDA CSA_IM_Japanese_2016
      - ISDA CSA_IM_NewYork_2016

  safekeepingPeriodExpiry:
    range: CustomisableOffset
    description: The parties' election to specify the number of days prior to the end of the safekeeping period (Clearstream
      CTA) purpose of qualifying the CE/CME End Date, in the case where advance notice is given.

  dateOfTimelyStatement:
    range: CustomisableOffset
    description: The parties' election to specify the number of days one party has effectively provided the Timely Statement
      to the other party.
    required: true

  minimumAssets:
    range: Money
    description: The minimal level of assets requirement with respect to the custody agent.

  minimumRating:
    range: CreditNotation
    description: The minimal rating requirement with respect to the custody agent.

  initialDesignation:
    range: LegalEntity
    description: Election to specify the initial custodian.
    notes:
      - ISDA CSA_VM_2016

  isCreditSupportDocument:
    range: boolean
    description: Unless specified as True, the Control Agreement is not a Credit Support Document under the agreement with
      respect to a party.
    notes:
      - ISDA CSA_VM_2016 paragraph "Paragraph 6" clause " (e) " name "The Control Agreement as a Credit Support Document"

  hasControlAgreementLanguage:
    range: boolean
    description: Control Agreement language is specified when True.

  otherProvisions:
    range: string
    description: Other Custom Provisions of Custody Arrangements.
    notes:
      - ISDA CSA_IM_2016 paragraph "3 General Principles" clause "(n)(vii)" name "Other Provisions"

  collateralAccessBreach:
    range: CollateralAccessBreach
    description: The elections specific to Collateral Access Breach language.

  custodianRisk:
    range: CustodianRisk
    description: The qualification of the Custodian Risk.
    notes:
      - ISDA CSA_IM_2016 paragraph "3 General Principles" clause "(n)(ii)" name "Custodian (IM) Risk"

  controlAgreement:
    range: ControlAgreement
    description: The party-specific election with respect to the control agreement.

  custodianEvent:
    range: CustodianEvent
    description: Specifies if and until when a Custodian Event clause applies.
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(m)(iii)" name "Custodian Event"

  resolutionTime:
