      - recalculationOfValueTerms
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The elective party.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  Regime:
    description: A class to specify one or more regimes that may be specified as relevant to a legal agreement.
    notes:
      - ISDA CSA_IM_2016 name "Regime"
      - ISDA CSA_IM_2018 name "Regime"
    see_also:
      - isda:CSA_IM_2016
      - isda:CSA_IM_2018
    slots:
      - applicableRegime
      - fallbackToMandatoryMethodDays
    in_subset:
      - cdm_legaldocumentation_csa

  RegimeTerms:
    description: A class that is used by the ApplicableRegime and the AdditionalRegime classes to specify the regulatory regime
      terms.
    notes:
      - ISDA CSA_IM_2016 name "Regime"
      - ISDA CSA_IM_2018 name "Regime"
    see_also:
      - isda:CSA_IM_2016
      - isda:CSA_IM_2018
    slots:
      - party
      - isApplicable
      - asSpecified
      - simmException
      - retrospectiveEffect
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party for which the regime terms are being specified when acting as collateral taker.
        required: true
      isApplicable:
        range: ExceptionEnum
        description: The specification of whether the regime is elected as applicable to the party when acting as collateral
          taker.
        required: false
    in_subset:
      - cdm_legaldocumentation_csa

  PledgeeRepresentativeRider:
    description: The terms of the Rider for the ISDA Euroclear 2019 Collateral Transfer Agreement with respect to the use
      of a Pledgee Representative attached to this Agreement.
    rules:
      - description: A data rule to enforce that representative terms and a represented party are specified when representative
          provisions are applicable.
        preconditions:
          slot_conditions:
            isApplicable:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            party:
              required: true
            representativeTerms:
              required: true
            representativeEvent:
              required: true
            representativeEndDate:
              required: true
      - description: A data rule to enforce that representative event terms are specified when applicable.
        preconditions:
          slot_conditions:
            representativeEvent:
              equals_string: Other
        postconditions:
          slot_conditions:
            representativeEventTerms:
              required: true
    comments:
      - 'Rosetta condition: RepresentativeParty — if isApplicable = True then party exists and representativeTerms exists
        and representativeEvent exists and representativeEndDate exists'
      - 'Rosetta condition: RepresentativeEventTerms — if representativeEvent = ExceptionEnum -> Other then representativeEventTerms
        exists'
    slots:
      - isApplicable
      - party
      - representativeTerms
      - representativeEvent
      - representativeEventTerms
      - representativeEndDate
    slot_usage:
      isApplicable:
        description: Identification of whether the representative CTA provisions are applicable (True) or not applicable (False).
      party:
        range: CounterpartyRoleEnum
        description: Identification of the represented party.
    in_subset:
      - cdm_legaldocumentation_csa

  RetrospectiveEffect:
    description: A class to specify the retrospective effect exception to the regulatory regime clause of Initial Margin documents
      as either a normalized value specified as part of an enumeration or a customized value specified of type string.
    slots:
      - standardisedException
      - asSpecified
    slot_usage:
      asSpecified:
        description: The Standard Initial Margin Model exception when specified as a customized approach by the party.
    in_subset:
      - cdm_legaldocumentation_csa

  RightsEvents:
    description: A class to specify the rights of Security Taker and/or Security Provider when an Early Termination or Access
      Condition event has occurred.
    slots:
      - securityTakerRightsEvent
      - controlAgreementNecEvent
      - securityProviderRightsEvent
      - deliveryInLieuRight
      - additionalRightsEvent
    slot_usage:
      deliveryInLieuRight:
        description: The specification of whether Delivery In Lieu language is applicable to the agreement (true) or not (false).
    in_subset:
      - cdm_legaldocumentation_csa

  SecuredPartyRightsEvent:
    description: A class to specify Secured Party Rights Event language.
