      - partyElection
    slot_usage:
      partyElection:
        range: SensitivityMethodologiesPartyElection
        description: Party specific elections for Sensitivity Methodology for Equity and Commodities.
    in_subset:
      - cdm_legaldocumentation_csa

  SensitivityMethodologiesPartyElection:
    description: A class to specificy methodologies to compute sensitivities specific to the agreement.
    slots:
      - party
      - sensitivityToEquity
      - sensitivityToCommodity
    slot_usage:
      party:
        range: CounterpartyRoleEnum
        description: The party to which the election applies.
        required: true
    in_subset:
      - cdm_legaldocumentation_csa

  SensitivityToEquity:
