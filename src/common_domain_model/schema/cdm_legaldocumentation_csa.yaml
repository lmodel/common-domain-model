    close_mappings:
      - fpml_5_10:ApplicableRegime.additionalRegime

  regimeTerms:
    range: RegimeTerms
    description: A class that is used by the ApplicableRegime and the AdditionalRegime classes to specify the terms that are
      specific to each party and regime which are referred to in the Regime Table as part of certain legal agreements, such
      as the ISDA 2016 and 2018 CSA for Initial Margin.
    required: true
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:ApplicableRegime.regimeTerms

  additionalType:
    range: AdditionalTypeEnum
    notes:
      - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(b)(B)"
    close_mappings:
      - fpml_5_10:ApplicableRegime.additionalType

  additionalTerms:
    range: string
    description: The bespoke Additional Type for the purposes of Covered Transactions (IM).
    close_mappings:
      - fpml_5_10:ApplicableRegime.additionalTerms

  election:
