    slot_usage:
      isApplicable:
        description: The Interest Adjustment is applicable when True and not applicable when False.
    in_subset:
      - cdm_legaldocumentation_csa

  InterestAdjustmentPeriodicity:
    description: A class to specify the Interest Adjustment periodicity.
    notes:
