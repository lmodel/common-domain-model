id: https://w3id.org/finos/cdm/cdm_margin_schedule
name: cdm_margin_schedule
description: LinkML schema for cdm.margin.schedule
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_observable_asset

comments:
- 'Rosetta func: BuildStandardizedSchedule — Takes a trade and uses qualification to extract the relevant information to populate
  the grid that will be used to calculate the gross initial margin. | inputs(trade: Trade (1..1)) | output(standardizedSchedule:
  StandardizedSchedule (1..1))'
- 'Rosetta func: GetGrossInitialMarginFromStandardizedSchedule — Takes the grid information from an specific trade and calculates
  the gross initial margin. | inputs(standardizedSchedule: StandardizedSchedule (1..1)) | output(grossInitialMargin: Money
  (0..1))'
- 'Rosetta func: StandardizedScheduleAssetClass — Identifies the asset class of a trade from qualifying functions, according
  to the standardized schedule classification. | inputs(trade: Trade (1..1)) | output(assetClass: StandardizedScheduleAssetClassEnum
  (0..1))'
- 'Rosetta func: StandardizedScheduleProductClass — Identifies the product class of a trade from qualifying functions, according
  to the standardized schedule classification. | inputs(trade: Trade (1..1)) | output(productClass: StandardizedScheduleProductClassEnum
  (0..1))'
- 'Rosetta func: StandardizedScheduleNotional — Extracts the notional amount of a trade, according to the product class-depending
  extraction method defined in the ISDA industry survey. | inputs(trade: Trade (1..1), assetClass: StandardizedScheduleAssetClassEnum
  (1..1), productClass: StandardizedScheduleProductClassEnum (1..1)) | output(notional: number (0..1))'
- 'Rosetta func: StandardizedScheduleNotionalCurrency — Extracts the notional currency of a trade, according to the product
  class-depending extraction method defined in the ISDA industry survey. | inputs(trade: Trade (1..1), assetClass: StandardizedScheduleAssetClassEnum
  (1..1), productClass: StandardizedScheduleProductClassEnum (1..1)) | output(notionalCurrency: string (0..1))'
- 'Rosetta func: AuxiliarEffectiveDate — Extracts the effective date of specific products such as interest rate swaps and
  swaptions. | inputs(trade: Trade (1..1)) | output(effectiveDate: date (0..1))'
- 'Rosetta func: AuxiliarTerminationDate — Extracts the termination date of specific products such as interest rate swaps
  and swaptions. | inputs(trade: Trade (1..1)) | output(terminationDate: date (0..1))'
- 'Rosetta func: StandardizedScheduleDuration — Extracts the duration of a trade, according to the product class-depending
  extraction method defined in the ISDA industry survey. | inputs(trade: Trade (1..1), assetClass: StandardizedScheduleAssetClassEnum
  (1..1), productClass: StandardizedScheduleProductClassEnum (1..1)) | output(durationInYears: number (0..1))'
- 'Rosetta func: GetStandardizedScheduleMarginRate — Computes the margin rate, which is required in the calculation of the
  gross initial margin. It depends exclusively on the asset class of the trade and, in some cases, on the duration as well.
  | inputs(assetClass: StandardizedScheduleAssetClassEnum (1..1), durationInYears: number (1..1)) | output(percentage: number
  (1..1))'
- 'Rosetta func: StandardizedScheduleMonetaryNotionalFromResolvablePQ — Extracts the notional amount for all products that
  have it populated in the resolvable priceQuantity. | inputs(priceQuantity: ResolvablePriceQuantity (0..1)) | output(notional:
  number (0..1))'
- 'Rosetta func: StandardizedScheduleMonetaryNotionalCurrencyFromResolvablePQ — Extracts the notional currency for all products
  that have it populated in the resolvable priceQuantity. | inputs(priceQuantity: ResolvablePriceQuantity (0..1)) | output(notionalCurrency:
  string (0..1))'
- 'Rosetta func: StandardizedScheduleFXSwapNotional — Extracts the notional amount and currency of an FX swap. | inputs(farLeg:
  SettlementPayout (0..1), tradeLot: TradeLot (0..1)) | output(quantity: NonNegativeQuantitySchedule (0..1))'
- 'Rosetta func: StandardizedScheduleFXVarianceNotionalAmount — Extracts the notional amount of an FX variance swap. | inputs(performancePayout:
  PerformancePayout (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: StandardizedScheduleOptionNotionalAmount — Extracts the notional amount of a CO or EQ option. | inputs(optionPayout:
  OptionPayout (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: StandardizedScheduleEquityForwardNotionalAmount — Extracts the notional amount of an EQ forward. | inputs(settlementPayout:
  SettlementPayout (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: StandardizedScheduleVarianceSwapNotionalAmount — Extracts the notional amount of an EQ variance swap. | inputs(performancePayout:
  PerformancePayout (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: StandardizedScheduleCommodityForwardNotionalAmount — Extracts the notional amount of a CO forward. Floating
  price forwards not supported. | inputs(economicTerms: EconomicTerms (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: StandardizedScheduleCommoditySwapFixedFloatNotionalAmount — Extracts the notional amount of a CO fixed float
  swap. | inputs(economicTerms: EconomicTerms (0..1)) | output(amount: number (0..1))'
- 'Rosetta func: Qualify_Credit_NthToDefault — Qualifies a product as a CR basket Nth to default by checking that 1) it is
  a credit product with a basket underlier and 2) nth to default information is populated. | inputs(economicTerms: EconomicTerms
  (1..1)) | output(is_Product: boolean (1..1))'
- 'Rosetta func: Qualify_InterestRate_Swaption_Straddle — Qualifies a product as an IR swaption straddle by checking that
  it is indeed an IR swaption with the option type populated as Straddle. | inputs(economicTerms: EconomicTerms (1..1)) |
  output(is_Product: boolean (1..1))'
- 'Rosetta func: Qualify_InterestRate_SwapWithCallableBermudanRightToEnterExitSwaps — Qualifies a product as an IR swap with
  bermudan/callable right to enter/exit swaps, by checking it is an IR swap that has an optional early termination with Bermudan
  style. | inputs(economicTerms: EconomicTerms (1..1)) | output(is_Product: boolean (1..1))'
- 'Rosetta func: GetNetInitialMarginFromExposure — Computes the net initial margin, taking the gross initial margin result
  and the mark to market value for each trade in the portfolio. | inputs(exposure: Exposure (0..1)) | output(initialMargin:
  StandardizedScheduleInitialMargin (0..1))'
