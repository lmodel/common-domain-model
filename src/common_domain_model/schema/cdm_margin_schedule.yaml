subsets:
  cdm_margin_schedule:
    description: Classes defined in the cdm_margin_schedule module.

enums:
  StandardizedScheduleAssetClassEnum:
    permissible_values:
      InterestRates: {}
      Credit: {}
      ForeignExchange: {}
      Equity: {}
      Commodity: {}

  StandardizedScheduleProductClassEnum:
    permissible_values:
      Swap: {}
      CrossCurrencySwap: {}
      Swaption: {}
      SwaptionStraddle: {}
      SwapWithCallableBermudanRightToEnterExitSwaps: {}
      IRExoticSwapWithAnExoticCouponAgainstAFloatingLeg: {}
      Option: {}
      ForwardRateAgreement: {}
      SingleNameCreditDefaultSwap: {}
      IndexCDS: {}
      IndexTranche: {}
      CreditNthToDefault: {}
      CreditTotalReturnSwapOnABond: {}
      DeliverableSwap: {}
      NonDeliverableCrossCurrencySwap: {}
      DeliverableForward: {}
      NonDeliverableForward: {}
      DeliverableOption: {}
      NonDeliverableOption: {}
      VarianceSwap: {}
      VolatilitySwap: {}
      CorrelationSwap: {}
      Forward: {}
      DividendSwap: {}
      DeliverableOptionF: {}
      ContractForDifference: {}
      SwapsAndPortfolioSwaps: {}
      FixedFloatSwap: {}
      BasisSwap: {}

slots:
  assetClass:
    range: StandardizedScheduleAssetClassEnum
    required: true

  productClass:
    range: StandardizedScheduleProductClassEnum
    required: true

  notional:
    range: decimal
    required: true

  notionalCurrency:
    range: string
    required: true

  durationInYears:
    range: decimal

  grossInitialMargin:
    range: Money

  markToMarketValue:
    range: Money

  tradeInfo:
    range: StandardizedScheduleTradeInfo
    multivalued: true
    inlined_as_list: true

  netInitialMargin:
    range: Money
    required: true

classes:
  StandardizedSchedule:
    rules:
    - description: Ensure notional is greater than 0
      postconditions:
        slot_conditions:
          notional:
            minimum_value: 0
            comments:
            - 'Rosetta: strictly greater than'
      preconditions: {}
    - description: Ensure duration is greater than 0.
      preconditions:
        slot_conditions:
          durationInYears:
            required: true
      postconditions:
        slot_conditions:
          durationInYears:
            minimum_value: 0
            comments:
            - 'Rosetta: strictly greater than'
    comments:
    - 'Rosetta condition: PositiveNotional — notional > 0'
    - 'Rosetta condition: ValidCurrency — notionalCurrency to-enum ISOCurrencyCodeEnum exists'
    - 'Rosetta condition: PositiveDuration — if durationInYears exists then durationInYears > 0'
    - 'Rosetta func: BuildStandardizedSchedule — Takes a trade and uses qualification to extract the relevant information
      to populate the grid that will be used to calculate the gross initial margin.'
    - 'Rosetta func: GetGrossInitialMarginFromStandardizedSchedule — Takes the grid information from an specific trade and
      calculates the gross initial margin.'
    annotations:
      rosetta_functions: '[{"name":"BuildStandardizedSchedule","description":"Takes a trade and uses qualification to extract
        the relevant information to populate the grid that will be used to calculate the gross initial margin.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}},{"name":"GetGrossInitialMarginFromStandardizedSchedule","description":"Takes
        the grid information from an specific trade and calculates the gross initial margin.","inputs":[{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}],"output":{"name":"grossInitialMargin","type":"Money","cardinality":"0..1"}}]'
    slots:
    - assetClass
    - productClass
    - notional
    - notionalCurrency
    - durationInYears
    in_subset:
    - cdm_margin_schedule

  StandardizedScheduleTradeInfo:
    comments:
    - 'Rosetta condition: PositiveGrossInitialMargin — grossInitialMargin -> value > 0'
    - 'Rosetta condition: SameCurrencies — grossInitialMargin -> unit -> currency = markToMarketValue -> unit -> currency'
    slots:
    - assetClass
    - productClass
    - grossInitialMargin
    - markToMarketValue
    slot_usage:
      assetClass:
        required: false
      productClass:
        required: false
    in_subset:
    - cdm_margin_schedule

  StandardizedScheduleInitialMargin:
    comments:
    - 'Rosetta condition: NonNegativeNetInitialMargin — netInitialMargin -> value >= 0'
    - 'Rosetta func: GetNetInitialMarginFromExposure — Computes the net initial margin, taking the gross initial margin result
      and the mark to market value for each trade in the portfolio.'
    annotations:
      rosetta_functions: '[{"name":"GetNetInitialMarginFromExposure","description":"Computes the net initial margin, taking
        the gross initial margin result and the mark to market value for each trade in the portfolio.","inputs":[{"name":"exposure","type":"Exposure","cardinality":"0..1"}],"output":{"name":"initialMargin","type":"StandardizedScheduleInitialMargin","cardinality":"0..1"}}]'
    slots:
    - tradeInfo
    - netInitialMargin
    in_subset:
    - cdm_margin_schedule
