  rosetta_functions: '[{"name":"BuildStandardizedSchedule","description":"Takes a trade and uses qualification to extract
    the relevant information to populate the grid that will be used to calculate the gross initial margin.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}},{"name":"GetGrossInitialMarginFromStandardizedSchedule","description":"Takes
    the grid information from an specific trade and calculates the gross initial margin.","inputs":[{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}],"output":{"name":"grossInitialMargin","type":"Money","cardinality":"0..1"}},{"name":"StandardizedScheduleAssetClass","description":"Identifies
    the asset class of a trade from qualifying functions, according to the standardized schedule classification.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"assetClass","type":"StandardizedScheduleAssetClassEnum","cardinality":"0..1"}},{"name":"StandardizedScheduleProductClass","description":"Identifies
    the product class of a trade from qualifying functions, according to the standardized schedule classification.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"productClass","type":"StandardizedScheduleProductClassEnum","cardinality":"0..1"}},{"name":"StandardizedScheduleNotional","description":"Extracts
