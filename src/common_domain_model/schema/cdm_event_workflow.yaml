  PartyCustomisedWorkflow:
    description: A class to specify a party-related, non-standardized data in a generic form.
    rules:
    - description: The identification of the party to which the PartyCustomisedWorkflow pertains to can be done through either
        a party reference or the party name.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            partyName:
              required: true
        - slot_conditions:
            partyReference:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: PartyCustomisedWorkflowChoice — required choice partyName, partyReference'
    slots:
    - partyReference
    - partyName
    - customisedWorkflow
    slot_usage:
      partyReference:
        description: Reference to the party to which the workflow pertains to.
        required: false
    in_subset:
    - cdm_event_workflow

