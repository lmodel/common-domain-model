  LimitApplicable:
    rules:
    - description: Choice rule to represent an FpML choice construct.
      postconditions:
        any_of:
        - slot_conditions:
            amountUtilized:
              required: true
        - slot_conditions:
            utilization:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: LimitApplicableChoice — optional choice amountUtilized, utilization'
    slots:
    - limitType
    - clipSize
    - amountUtilized
    - utilization
    - amountRemaining
    - currency
    - velocity
    slot_usage:
      currency:
        description: The currency in which the applicable limit is denominated. The list of valid currencies is not presently
          positioned as an enumeration as part of the CDM because that scope is limited to the values specified by ISDA and
          FpML. As a result, implementers have to make reference to the relevant standard, such as the ISO 4217 standard for
          currency codes.
    in_subset:
    - cdm_event_workflow

  LimitApplicableExtended:
    description: A class to represent the CDM attributes that are not part of the FpML standard. Once broader usage is confirmed,
      it is expected that those two classes can be collapsed.
    is_a: LimitApplicable
    slots:
    - limitLevel
    - limitAmount
    - limitImpactDueToTrade
    in_subset:
    - cdm_event_workflow

