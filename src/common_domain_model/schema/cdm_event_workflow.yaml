id: https://w3id.org/finos/cdm/cdm_event_workflow
name: cdm_event_workflow
description: 'Workflow concepts (orthogonal to business event): time stamp, credit limit, trade warehouse info and associated
  function specifications.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_datetime
- ./cdm_base_staticdata_identifier
- ./cdm_base_staticdata_party
- ./cdm_event_common
- ./cdm_base_staticdata_asset_common
- ./cdm_event_position
- ./cdm_base_staticdata_codelist
- ./cdm_base_math

comments:
- 'Rosetta func: Create_WorkflowStep — Function to create a workflow step with a business event and associated details about
  the message, identifiers, event timestamps, parties and accounts involved in the step. The function should be used when
  there is already a fully formed business event with the action set to signify that the step is new, or a correction/cancellation
  of a previous step. The action is constrained so that when a previous workflow step is specified, the valid actions are
  as follows; New -> New, New -> Correct, New -> Cancel, Correct -> Correct and Correct -> Cancel. When a previous workflow
  is not specified, the action must be New. | inputs(messageInformation: MessageInformation (0..1), timestamp: EventTimestamp
  (1..*), eventIdentifier: Identifier (1..*), party: Party (0..*), account: Account (0..*), previousWorkflowStep: WorkflowStep
  (0..1), action: ActionEnum (1..1), businessEvent: BusinessEvent (0..1)) | output(workflowStep: WorkflowStep (1..1))'
- 'Rosetta func: Create_AcceptedWorkflowStep — Represents the acceptance of a proposed instruction that results in a workflow
  step containing a business event, message details, identifiers, event timestamps, parties and accounts. The previous workflow
  step input must exist to provide workflow lineage. The instruction from the previous workflow step should be used with a
  [creation BusinessEvent] function to create the input business event passed into this function e.g. PartyChangeInstruction
  from the previous step is used with Create_PartyChange to produce the business event which should used as an input to this
  step. | inputs(messageInformation: MessageInformation (0..1), timestamp: EventTimestamp (1..*), eventIdentifier: Identifier
  (1..*), party: Party (0..*), account: Account (0..*), proposedWorkflowStep: WorkflowStep (1..1), businessEvent: BusinessEvent
  (1..1)) | output(acceptedWorkflowStep: WorkflowStep (1..1))'
- 'Rosetta func: Create_AcceptedWorkflowStepFromInstruction — Represents the acceptance of a proposed instruction that results
  in a workflow step containing a business event, message details, identifiers, event timestamps, parties and accounts. The
  previous workflow step input must exist to provide workflow lineage. The instruction from the previous workflow step should
  be used with a [creation BusinessEvent] function to create the input business event passed into this function e.g. PartyChangeInstruction
  from the previous step is used with Create_PartyChange to produce the business event which should used as an input to this
  step. | inputs(proposedWorkflowStep: WorkflowStep (1..1)) | output(acceptedWorkflowStep: WorkflowStep (1..1))'
- 'Rosetta func: Create_ProposedWorkflowStep — Represents the proposal to create a business event that results in a workflow
  step containing an instruction, message details, identifiers, event timestamps, parties and accounts. The optional previous
  workflow step input provides workflow lineage to where there has been a correction or cancellation to the proposed step.
  The action is constrained so that when a previous workflow step is specified, the valid actions are as follows; New -> Correct
  and Correct -> Cancel. When a previous workflow is not specified, the action must be New. | inputs(messageInformation: MessageInformation
  (0..1), timestamp: EventTimestamp (1..*), eventIdentifier: Identifier (1..*), party: Party (0..*), account: Account (0..*),
  previousWorkflowStep: WorkflowStep (0..1), action: ActionEnum (1..1), proposedEvent: EventInstruction (1..1), approval:
  WorkflowStepApproval (0..*)) | output(proposedWorkflowStep: WorkflowStep (1..1))'
- 'Rosetta func: Create_RejectedWorkflowStep — Represents the rejection of a proposed instruction that results in a workflow
  step containing the rejection flag, message details, identifiers, event timestamps, parties and accounts involved in the
  step. The previous workflow step input must exist to provide workflow lineage. This function will be further developed to
  provide the reasons for rejection. | inputs(messageInformation: MessageInformation (0..1), timestamp: EventTimestamp (1..*),
  eventIdentifier: Identifier (1..*), proposedWorkflowStep: WorkflowStep (1..1)) | output(rejectedWorkflowStep: WorkflowStep
  (1..1))'
- 'Rosetta func: Create_Workflow — Function to create a Workflow from a list of WorkflowStep. | inputs(steps: WorkflowStep
  (1..*)) | output(workflow: Workflow (1..1))'
