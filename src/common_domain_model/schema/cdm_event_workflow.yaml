    to create a Workflow from a list of WorkflowStep.","inputs":[{"name":"steps","type":"WorkflowStep","cardinality":"1..*"}],"output":{"name":"workflow","type":"Workflow","cardinality":"1..1"}}]'

subsets:
  cdm_event_workflow:
    description: Classes defined in the cdm_event_workflow module.

enums:
  CreditLimitTypeEnum:
    description: The enumeration values to qualify the type of credit limits.
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-limit-type
    permissible_values:
      CS01:
        description: The type of credit line expressed in CS01. The sensitivity with respect to changes in the CDS spread.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#CS01
      DV01:
        description: The type of credit line expressed in DV01. The dollar value of a one basis point decrease in interest
          rates. It shows the change in a bond's price compared to a decrease in the bond's yield.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#DV01
      IM:
        description: The type of credit line expressed in Initial Margin value.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#IM
      Notional:
        description: The type of credit line expressed in Notional amount.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#Notional
      NPV:
        description: The type of credit line expressed as a Net Present Value.
      PV01:
        description: The type of credit line expressed in PV01. The value of a one dollar or one basis point annuity.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#PV01

  EventTimestampQualificationEnum:
    description: The enumeration values to qualify the timestamps that can be associated with a lifecycle event. The reason
      for such approach is that the experience of integrating the DTCC and CME data representations suggests that a wide set
      of timestamps are currently utilized among service providers, while there is not at present an objective set of criteria
      that could help suggest a defined set of timestamps as part of the CDM. Implementers are expected to evaluate the current
      enumeration values to determine whether those meet their requirements. If not, they are expected to engage with the
      CDM team to evaluate the addition of further value(s) to this enumeration, which will then participate to the development
      of a compendium for further evaluation at a later point in order to determine whether this modeling is appropriate.
    permissible_values:
      clearingDateTime:
        description: The date and time on the trade was cleared.
      clearingConfirmationDateTime:
        description: The date and time on which trade was confirmed as cleared.
      clearingReceiptDateTime:
        description: The date and time on which trade was received by Clearing Body.
      clearingSubmissionDateTime:
        description: The date and time on which the event was submitted for clearing.
      confirmationDateTime:
        description: The date and time on which the event was confirmed.
      eventCreationDateTime:
        description: The date and time on which the event was created.
      eventExpirationDateTime:
        description: The date and time on which the event will be considered expired.
      eventProcessingDateTime:
        description: The date and time on which the event was processed.
      eventSentDateTime:
        description: The date and time on which the event was sent.
      eventSubmittedDateTime:
        description: The date and time on which the event was submitted.
      executionDateTime:
        description: The date and time on which the trade execution was performed.
      transactionCreationDateTime:
        description: 'The date and time on which the transaction has been created. This timestamp is specified as such by
          the CME ClearPort Matched IRS Trade submission API specification: ''The transaction date time of the trade. Represents
          the date & time on which the trade was initially generated either by CME Clearing or firm. The transaction date
          time may be assigned by CME Clearing at the point the trade is reported as cleared. Transaction date time can also
          be provided by an external submitter of the trade at the point the trade is submitted.'''

  LimitLevelEnum:
    description: 'The enumeration values to specify the level at which the limit is set: customer business, proprietary business
      or account level. This is part of the CME specification for clearing credit limits, although not specified as a set
      of enumerated values as part of the clearing confirmation specification.'
    permissible_values:
      Account:
        description: The limit is set in relation to the proprietary business undertaken by the clearing counterparty.
      Customer:
        description: The limit is set in relation to the customer business undertaken by the clearing counterparty.
      House:
        description: The limit is set at the account level in relation to the clearing counterparty.

  WarehouseIdentityEnum:
    permissible_values:
      DTCC_TIW_Gold:
        description: The DTCC Trade Information Warehouse Gold service

  WorkflowStatusEnum:
    permissible_values:
      Accepted: {}
      Alleged: {}
      Amended: {}
      Cancelled: {}
      Certain: {}
      Cleared: {}
      Pending: {}
      Rejected: {}
      Submitted: {}
      Terminated: {}
      Uncertain: {}
      Unconfirmed: {}
      Affirmed: {}
      Confirmed: {}

slots:
  limitApplicable:
    range: LimitApplicableExtended
    required: true
    multivalued: true
    inlined_as_list: true

  executed:
    range: CreditLimitUtilisationPosition
    description: Credit limit utilisation attributable to executed trades.

  pending:
    range: CreditLimitUtilisationPosition
    description: Credit limit utilisation attributable to pending unexecuted orders.

  shortPosition:
    range: decimal
    description: Credit limit utilisation attributable to short positions.

  longPosition:
    range: decimal
    description: Credit limit utilisation attributable to long positions.

  global_:
    range: decimal
    description: Global credit limit utilisation amount, agnostic of long/short position direction.

  itemName:
    range: string
    description: In this initial iteration, this corresponds to the DTCC TIW element name.
    required: true

  itemValue:
    range: string
    description: In this initial iteration, this corresponds to the DTCC value.
    required: true

  approved:
    range: boolean
    description: Flag denoting whether the workflow step is approved or not
    required: true

  rejectedReason:
    range: string
    description: Optional reason for rejecting the workflow step

  businessEvent:
    range: BusinessEvent
    description: Life cycle event for the step.

  counterpartyPositionBusinessEvent:
    range: CounterpartyPositionBusinessEvent
    description: Documents the life cycle event for a position.

  proposedEvent:
    range: EventInstruction
    description: The proposed event for a workflow step.

  rejected:
    range: boolean
    description: Flags this step as rejected.

  approval:
    range: WorkflowStepApproval
    description: Optional party approvals for the current workflow step. A workflow step can have any number of parties associated
      to it, thus this object is represented as a list. All parties that are expected to provide approval should have an item
      in this list that references them.
    multivalued: true
    inlined_as_list: true

  previousWorkflowStep:
    range: WorkflowStep
    description: Optional previous workflow step that provides lineage to workflow steps that precedes it.
    annotations:
      metadata_reference: true

  nextEvent:
    range: EventInstruction
    description: The intended next event can be specified, even if the instructions are not known yet.

  eventIdentifier:
    range: Identifier
    description: The identifier(s) that uniquely identify a lifecycle event. The unbounded cardinality is meant to provide
      the ability to associate identifiers that are issued by distinct parties. As an example, each of the parties to the
      event may choose to associate their own identifiers to the event.
    required: true
    multivalued: true
    inlined_as_list: true

  action:
    range: ActionEnum
    description: Specifies whether the event is a new, a correction or a cancellation.

  creditLimitInformation:
    range: CreditLimitInformation

  workflowState:
    range: WorkflowState
    description: The event workflow information, i.e. the workflow status, the associated comment and the partyCustomisedWorkflow
      which purpose is to provide the ability to associate custom workflow information to the CDM.

  steps:
    range: WorkflowStep
    required: true
    multivalued: true
    inlined_as_list: true

  eventTime:
    range: TimeZone
    description: The time and zone of the date in which the event is taking place.

  effectiveTime:
    range: TimeZone
    description: The time and zone of the date in which the event contractually takes effect.

  instruction:
    range: Instruction
    description: Specifies the instructions to create the Business Event.
    multivalued: true
    inlined_as_list: true

  qualification:
    range: EventTimestampQualificationEnum
    description: The timestamp qualifier is specified through an enumeration because the experience of integrating the DTCC
      and CME data representations suggests that a wide set of timestamps are currently utilized among service providers,
      while there is not at present an objective set of criteria that could help suggest a defined set of timestamps as part
      of the CDM. At some future point, one possible baseline could be developed from the review of the set of timestamps
      specified across regulatory regimes and regulations (incl. regulations such as high frequency trading). Also, the integration
      with a further set of implementations and the specification of business workflows such as clearing as part of the CDM
      development should help confirm the implementation approach in this respect.
    required: true

  workflowStatus:
    range: WorkflowStatusEnum
    description: The workflow status indicator, e.g. Accepted, Rejected, ...
    required: true

  comment:
    range: string
    description: A comment field to be associated with the workflow, e.g. to specify why a transaction event was rejected
      by a party.

  partyCustomisedWorkflow:
    range: PartyCustomisedWorkflow
    description: Workflow data that is specific to certain market participants and is expressed as part of the CDM in a very
      generic manner, which can be party-specific. The initial use cases have been derived from the CME clearing and the DTCC
      TIW submissions.
    multivalued: true
    inlined_as_list: true

  warehouseIdentity:
    range: WarehouseIdentityEnum
    description: The identity of the warehouse, if any, that is executing that workflow step.

  limitType:
    range: CreditLimitTypeEnum
    description: Standard code to indicate which type of credit line is being referred to - i.e. IM, DV01, PV01, CS01, Notional,
      Clip Size, Notional, maximumOrderQuantity.
    annotations:
      metadata_scheme: true

  clipSize:
    range: integer
    description: This element is required in FpML, optional in CDM for the purpose of accommodating the CME data representation
      while making reference to the FpML one.

  amountUtilized:
    range: decimal
    description: The limit utilised by all the cleared trades for the limit level and limit type. While the attribute is of
      type integer in FpML and the CME schema, it has been specified to be of type number in the CDM to take into consideration
      java size limits as well as for consistency purposes with the way most monetary amounts are expressed.

  utilization:
    range: CreditLimitUtilisation

  amountRemaining:
    range: decimal
    description: The limit remaining for the limit level and limit type. This does not take into account any pending trades.
      While the attribute is of type integer in FpML and the CME schema, it has been specified to be of type number in the
      CDM to take into consideration java size limits as well as for consistency purposes with the way most monetary amounts
      are expressed.

  velocity:
    range: Velocity

  limitLevel:
    range: LimitLevelEnum
    description: 'The level at which the limit is set: customer business, proprietary business or account level. This attribute
      is specified as a string as part of the CME clearing confirmation specification.'
    annotations:
      metadata_scheme: true

  limitAmount:
    range: decimal
    description: The total limit available for the limit level and limit type. While the attribute is of type integer in the
      CME schema, it has been specified to be of type number in the CDM to take into consideration java size limits as well
      as for consistency purposes with the way most monetary amounts are expressed.

  limitImpactDueToTrade:
    range: decimal
    description: The limit utilized by this specific trade. While the attribute is of type integer in the CME schema, it has
      been specified to be of type number in the CDM to take into consideration java size limits as well as for consistency
      purposes with the way most monetary amounts are expressed.

  messageId:
    range: string
    description: A unique identifier assigned to the message.
    required: true
    annotations:
      metadata_scheme: true

  sentBy:
    range: string
    description: The identifier for the originator of a message instance.
    annotations:
      metadata_scheme: true

  sentTo:
    range: string
    description: The identifier(s) for the recipient(s) of a message instance.
    multivalued: true
    annotations:
      metadata_scheme: true

  copyTo:
    range: string
    description: A unique identifier (within the specified coding scheme) giving the details of some party to whom a copy
      of this message will be sent for reference.
    multivalued: true
    annotations:
      metadata_scheme: true

  partyName:
    range: string
    description: The party name to which the workflow pertains to.

  customisedWorkflow:
    range: CustomisedWorkflow
    description: Non-standardized data in a generic form.
    required: true
    multivalued: true
    inlined_as_list: true

classes:
  CreditLimitInformation:
    description: A class to represent the credit limit utilisation information.
    slots:
    - limitApplicable
    in_subset:
    - cdm_event_workflow

  CreditLimitUtilisation:
    description: Credit limit utilisation breakdown by executed trades and pending orders.
    slots:
    - executed
    - pending
    in_subset:
    - cdm_event_workflow

  CreditLimitUtilisationPosition:
    slots:
    - shortPosition
    - longPosition
    - global_
    in_subset:
    - cdm_event_workflow

  CustomisedWorkflow:
    description: In its initial iteration, this class is meant to support the DTCC TIW workflow information.
    slots:
    - itemName
    - itemValue
    in_subset:
    - cdm_event_workflow

  WorkflowStepApproval:
    description: 'Party approvals associated to the current WorkflowStep. '
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"Create_ProposedWorkflowStep","description":"Represents the proposal to create a business
        event that results in a workflow step containing an instruction, message details, identifiers, event timestamps, parties
        and accounts. The optional previous workflow step input provides workflow lineage to where there has been a correction
        or cancellation to the proposed step. The action is constrained so that when a previous workflow step is specified,
        the valid actions are as follows; New -> Correct and Correct -> Cancel. When a previous workflow is not specified,
        the action must be New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"proposedEvent","type":"EventInstruction","cardinality":"1..1"},{"name":"approval","type":"WorkflowStepApproval","cardinality":"0..*"}],"output":{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}}]'
    comments:
    - 'Rosetta func: Create_ProposedWorkflowStep — Represents the proposal to create a business event that results in a workflow
      step containing an instruction, message details, identifiers, event timestamps, parties and accounts. The optional previous
      workflow step input provides workflow lineage to where there has been a correction or cancellation to the proposed step.
      The action is constrained so that when a previous workflow step is specified, the valid actions are as follows; New
      -> Correct and Correct -> Cancel. When a previous workflow is not specified, the action must be New.'
    slots:
    - approved
    - party
    - rejectedReason
    - timestamp
    slot_usage:
      party:
        range: Party
        description: Reference to the Party who is approving/rejecting this workflow step
        required: true
      timestamp:
        range: EventTimestamp
        description: Timestamp of the approval
    in_subset:
    - cdm_event_workflow

  WorkflowStep:
    description: A workflow step represents the state of a business event. The workflow step contains a reference to a previous
      WorkflowStep in order to preserve lineage. A workflow step is accepted if it contains a business event, proposed if
      proposedEvent is present and is rejected if the rejected flag is set.
