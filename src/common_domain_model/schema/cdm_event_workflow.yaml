    slots:
    - intent
    - corporateActionIntent
    - eventDate
    - eventTime
    - effectiveDate
    - effectiveTime
    - packageInformation
    - instruction
    slot_usage:
      intent:
        range: EventIntentEnum
        description: The intent attribute is meant to be specified when the event qualification cannot be programmatically
          inferred from the event features. As a result it is only associated with those primitives that can give way to such
          ambiguity, the quantityChange being one of those. An example of such is a reduction in the trade notional, which
          could be interpreted as either a trade correction (unless a maximum period of time post-event is specified as part
          of the qualification), a partial termination or a portfolio rebalancing in the case of an equity swap. On the other
          hand, an event such as the exercise is not expected to have an associated intent as there should not be ambiguity.
        required: false
      effectiveDate:
        description: The date on which the event contractually takes effect, when different from the event date.
    in_subset:
    - cdm_event_workflow

