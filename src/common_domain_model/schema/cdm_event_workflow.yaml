    rules:
    - description: Choice rule to control that either positionBusinessEvent is present, businessEvent is present or proposedEvent
        is present, but not more than one at the same time.
      postconditions:
        exactly_one_of:
        - slot_conditions:
            counterpartyPositionBusinessEvent:
              required: true
        - slot_conditions:
            businessEvent:
              required: true
        - slot_conditions:
            proposedEvent:
              required: true
      preconditions: {}
    comments:
    - 'Rosetta condition: WorkflowStepStatus — (businessEvent exists and nextEvent -> instruction is absent and rejected is
      absent) or (nextEvent -> instruction exists and businessEvent is absent and rejected is absent) or (rejected exists
      and businessEvent is absent and nextEvent is absent) or (proposedEvent exists and nextEvent is absent and rejected is
      absent) or (previousWorkflowStep exists and action = ActionEnum -> Cancel)'
    - 'Rosetta condition: CounterpartyPositionBusinessEventOrBusinessEventOrProposedEventChoice — required choice counterpartyPositionBusinessEvent,
      businessEvent, proposedEvent'
    - 'Rosetta func: Create_WorkflowStep — Function to create a workflow step with a business event and associated details
      about the message, identifiers, event timestamps, parties and accounts involved in the step. The function should be
      used when there is already a fully formed business event with the action set to signify that the step is new, or a correction/cancellation
      of a previous step. The action is constrained so that when a previous workflow step is specified, the valid actions
      are as follows; New -> New, New -> Correct, New -> Cancel, Correct -> Correct and Correct -> Cancel. When a previous
      workflow is not specified, the action must be New.'
    - 'Rosetta func: Create_AcceptedWorkflowStep — Represents the acceptance of a proposed instruction that results in a workflow
      step containing a business event, message details, identifiers, event timestamps, parties and accounts. The previous
      workflow step input must exist to provide workflow lineage. The instruction from the previous workflow step should be
      used with a [creation BusinessEvent] function to create the input business event passed into this function e.g. PartyChangeInstruction
      from the previous step is used with Create_PartyChange to produce the business event which should used as an input to
      this step.'
    - 'Rosetta func: Create_AcceptedWorkflowStepFromInstruction — Represents the acceptance of a proposed instruction that
      results in a workflow step containing a business event, message details, identifiers, event timestamps, parties and
      accounts. The previous workflow step input must exist to provide workflow lineage. The instruction from the previous
      workflow step should be used with a [creation BusinessEvent] function to create the input business event passed into
      this function e.g. PartyChangeInstruction from the previous step is used with Create_PartyChange to produce the business
      event which should used as an input to this step.'
    - 'Rosetta func: Create_ProposedWorkflowStep — Represents the proposal to create a business event that results in a workflow
      step containing an instruction, message details, identifiers, event timestamps, parties and accounts. The optional previous
      workflow step input provides workflow lineage to where there has been a correction or cancellation to the proposed step.
      The action is constrained so that when a previous workflow step is specified, the valid actions are as follows; New
      -> Correct and Correct -> Cancel. When a previous workflow is not specified, the action must be New.'
    - 'Rosetta func: Create_RejectedWorkflowStep — Represents the rejection of a proposed instruction that results in a workflow
      step containing the rejection flag, message details, identifiers, event timestamps, parties and accounts involved in
      the step. The previous workflow step input must exist to provide workflow lineage. This function will be further developed
      to provide the reasons for rejection.'
    - 'Rosetta func: Create_Workflow — Function to create a Workflow from a list of WorkflowStep.'
    slots:
    - businessEvent
    - counterpartyPositionBusinessEvent
    - proposedEvent
    - rejected
    - approval
    - previousWorkflowStep
    - nextEvent
    - messageInformation
    - timestamp
    - eventIdentifier
    - action
    - party
    - account
    - lineage
    - creditLimitInformation
    - workflowState
    slot_usage:
      messageInformation:
        description: 'Contains all information pertaining the FpML messaging header '
      timestamp:
        range: EventTimestamp
        description: The set of timestamp(s) associated with the event as a collection of [dateTime, qualifier].
        multivalued: true
      party:
        range: Party
        description: The specification of the event parties. This attribute is optional, as not applicable to certain events
          (e.g. most of the observations).
        multivalued: true
      account:
        description: Optional account information that could be associated to the event.
        multivalued: true
      lineage:
        description: The lineage attribute provides a linkage among lifecycle events through the globalKey hash value. One
          example is when a given lifecycle event is being corrected or cancelled. In such case, each subsequent event will
          have lineage into the prior version of that event. The second broad use case is when an event has a dependency upon
          either another event (e.g. the regular payment associated with a fix/float swap will have a lineage into the reset
          event, which will in turn have a lineage into the observation event for the floating rate and the contract) or a
          contract (e.g. the exercise of an option has a lineage into that option).
        required: false
        deprecated: Deprecated in CDM
    in_subset:
    - cdm_event_workflow

  Workflow:
    description: A collection of workflow steps which together make up an entire workflow sequence.
    related_mappings:
    - gist:Task
    comments:
    - 'Rosetta func: Create_Workflow — Function to create a Workflow from a list of WorkflowStep.'
    annotations:
      rosetta_functions: '[{"name":"Create_Workflow","description":"Function to create a Workflow from a list of WorkflowStep.","inputs":[{"name":"steps","type":"WorkflowStep","cardinality":"1..*"}],"output":{"name":"workflow","type":"Workflow","cardinality":"1..1"}}]'
    slots:
    - steps
    in_subset:
    - cdm_event_workflow

  EventInstruction:
    description: Specifies instructions to create a BusinessEvent.
    comments:
    - 'Rosetta condition: CorporateAction — if corporateActionIntent exists then intent = EventIntentEnum -> CorporateActionAdjustment'
    - 'Rosetta func: Create_ProposedWorkflowStep — Represents the proposal to create a business event that results in a workflow
      step containing an instruction, message details, identifiers, event timestamps, parties and accounts. The optional previous
      workflow step input provides workflow lineage to where there has been a correction or cancellation to the proposed step.
      The action is constrained so that when a previous workflow step is specified, the valid actions are as follows; New
      -> Correct and Correct -> Cancel. When a previous workflow is not specified, the action must be New.'
    annotations:
      rosetta_functions: '[{"name":"Create_ProposedWorkflowStep","description":"Represents the proposal to create a business
