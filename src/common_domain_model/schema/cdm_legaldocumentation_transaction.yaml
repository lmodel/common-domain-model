id: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
name: cdm_legaldocumentation_transaction
description: LinkML schema for cdm.legaldocumentation.transaction
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  isda: https://www.isda.org/specifications/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
default_prefix: common_domain_model
default_range: string

imports:
