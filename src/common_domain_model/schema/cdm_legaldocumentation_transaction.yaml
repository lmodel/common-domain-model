slots:
  equityAdditionalTerms:
    range: EquityAdditionalTerms

  foreignExchangeAdditionalTerms:
    range: FxAdditionalTerms

  commoditiesAdditionalTerms:
    range: string

  creditAdditionalTerms:
    range: string

  interestRateAdditionalTerms:
    range: string

  digitalAssetAdditionalTerms:
    range: string

  extraordinaryEvents:
    range: ExtraordinaryEvents

  determinationTerms:
    range: DeterminationRolesAndTerms
    required: true
    multivalued: true
    inlined_as_list: true

  substitutionProvision:
    range: UnderlierSubstitutionProvision

  whoMaySubstitute:
    range: CounterpartyRoleEnum
    description: Designates which Counterparty to the transaction who has the right to trigger a substitution or to provide
      related determination e.g. for instance to qualify the effectiveness of an Event which may be a trigger for substitution,
      determine the replacement Share to substitute, etc. ; cardinality of this object is 2, in case parties jointly have
      this role.
    required: true
    multivalued: true

  substitutionBeSpokeTerms:
    range: Clause
    description: Where parties describe any substitution terms e.g. for instance the election criteria for an Asset to be
      eligible as the Substitute Asset to the prior Affected Asset in terms of sector of activity, currency, market capitalisation,
      liquidity, volatility, or any additional features that parties would agree to take into considerations, etc.
    multivalued: true
    inlined_as_list: true

  substitutionTriggerEvents:
    range: ExtraordinaryEvents
    description: Where the parties may optionnally explictly specify the list of Events to be considered as a trigger for
      a Substitution.
    multivalued: true
    inlined_as_list: true

  disputingParty:
    range: CounterpartyRoleEnum
    description: Where the party who is not granted with the substitution role at least has a right to dispute the determination
      given by the counterparty with such role. As an example, a given PartyA is the unique Counterparty with the Role of
      WhoMaySubstitute, yet PartyB could be Disputing Party in regard of such Role.

  mergerEvents:
    range: EquityCorporateEvents

  tenderOfferEvents:
    range: EquityCorporateEvents

  compositionOfCombinedConsideration:
    range: boolean

  indexAdjustmentEvents:
    range: IndexAdjustmentEvents
    notes:
      - ISDA EquityDerivativesDefinitions_2002 section "Adjustment to Indices"

  additionalDisruptionEvents:
    range: AdditionalDisruptionEvents

  failureToDeliver:
    range: boolean
    description: If true, failure to deliver is applicable.

  representations:
    range: Representations

  nationalizationOrInsolvency:
    range: NationalizationOrInsolvencyOrDelistingEventEnum

  delisting:
    range: NationalizationOrInsolvencyOrDelistingEventEnum

  changeInLaw:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.changeInLaw

  insolvencyFiling:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.insolvencyFiling

  hedgingDisruption:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.hedgingDisruption

  increasedCostOfHedging:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.increasedCostOfHedging

  foreignOwnershipEvent:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.foreignOwnershipEvent

  lossOfStockBorrow:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.lossOfStockBorrow

  maximumStockLoanRate:
    range: decimal
    description: Specifies the maximum stock loan rate for Loss of Stock Borrow. A percentage of 5% is represented as 0.05.
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.maximumStockLoanRate

  increasedCostOfStockBorrow:
    range: boolean
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.increasedCostOfStockBorrow

  initialStockLoanRate:
    range: decimal
    description: Specifies the initial stock loan per ISDA Def. A percentage of 5% is represented as 0.05.
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.initialStockLoanRate

  determiningParty:
    range: AncillaryRoleEnum
    description: Specifies the party which determines additional disruption events.
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents.determiningParty

  terms:
    range: string
    description: Content of this bespoke clause.
    close_mappings:
      - fpml_5_10:Clause.terms

  subcomponents:
    range: Clause
    description: Additional hierarchical components of the clause if relevant.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:Clause.subcomponents

  typeOfSwapElection:
    range: ReturnTypeEnum
    description: Per Part 1 Section 4, 'Dividend Obligations', of the 2018 ISDA CDM Equity Confirmation, Para 4.2 'Dividend
      Returns'.
    required: true

  pricingMethodElection:
    range: PriceReturnTerms
    description: Per Part 1 Section 5, 'Pricing', of the 2018 ISDA CDM Equity Confirmation, Para 5.1.
    required: true

  linearInterpolationElection:
    range: InterpolationMethodEnum
    description: Per Part 1 Section 3, 'Floating Obligations', of the 2018 ISDA CDM Equity Confirmation. Para 3.3.
    required: true

  settlementTerms:
    range: SettlementTerms
    description: Per Part 1 Section 8, 'Settlement', of the 2018 ISDA CDM Equity Confirmation for Security Equity Swap.
    required: true

  valuationDates:
    range: ValuationDates
    description: The parameters used to generate the 'Equity Valuation Dates' schedule, including the Effective Date and Termination
      Date for the Swap.
    required: true

  equityCashSettlementDates:
    range: PaymentDates
    description: The parameters used to generate the payment date schedule, relative to the equityCalculationPeriod. Per Part
      1 Section 12, 'Definitions', of the 2018 ISDA CDM Equity Confirmation. Para 73.
    required: true

classes:
  TransactionAdditionalTerms:
    description: Additional specification for the extraordinary events that may affect a trade and the related contractual
      rights and obligation of the parties when this happens. Such terms are typically required to extend the economics terms,
      for the purpose of producing the final legal contractual form of the Transaction.
    slots:
      - equityAdditionalTerms
      - foreignExchangeAdditionalTerms
      - commoditiesAdditionalTerms
      - creditAdditionalTerms
      - interestRateAdditionalTerms
      - digitalAssetAdditionalTerms
    in_subset:
      - cdm_legaldocumentation_transaction

  EquityAdditionalTerms:
    description: Transaction AdditionalTerms that apply to Equity asset class.
    slots:
      - extraordinaryEvents
      - determinationTerms
      - substitutionProvision
    in_subset:
      - cdm_legaldocumentation_transaction

  UnderlierSubstitutionProvision:
    description: Where parties describe any substitution terms.
    comments:
      - 'Rosetta condition: DisputingPartyCannotHaveOriginalRole — whoMaySubstitute all <> disputingParty'
    slots:
      - whoMaySubstitute
      - substitutionBeSpokeTerms
      - substitutionTriggerEvents
      - disputingParty
    in_subset:
      - cdm_legaldocumentation_transaction

  ExtraordinaryEvents:
    description: Where the underlying is shares, defines market events affecting the issuer of those shares that may require
      the terms of the transaction to be adjusted.
    notes:
      - ISDA SecurityEquitySwapConfirmation_2018
      - ISDA EquityDerivativesDefinitions_2002
    see_also:
      - isda:SecurityEquitySwapConfirmation_2018
      - isda:EquityDerivativesDefinitions_2002
    rules:
      - description: condition to represent an FpML choice construct.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                additionalDisruptionEvents:
                  required: true
            - slot_conditions:
                failureToDeliver:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ExtraordinaryEventsChoice — required choice additionalDisruptionEvents, failureToDeliver'
    slots:
      - additionalBespokeTerms
      - mergerEvents
      - tenderOfferEvents
      - compositionOfCombinedConsideration
      - indexAdjustmentEvents
      - additionalDisruptionEvents
      - failureToDeliver
      - representations
      - nationalizationOrInsolvency
      - delisting
    slot_usage:
      additionalBespokeTerms:
        range: Clause
        description: Where parties may optionnaly describe any extra bespoke agreements, in regards of the standardized Extraordinary
          Events.
        multivalued: true
    in_subset:
      - cdm_legaldocumentation_transaction

  AdditionalDisruptionEvents:
    description: A type for defining the Additional Disruption Events.
    notes:
      - ISDA EquityDerivativesDefinitions_2002
    see_also:
      - isda:EquityDerivativesDefinitions_2002
    close_mappings:
      - fpml_5_10:AdditionalDisruptionEvents
    rules:
      - description: ' FpML specifies the maximumStockLoanRate as a RestrictedPercentage, meaning that its value is comprised
          between 0 and 1.'
        preconditions:
          slot_conditions:
            maximumStockLoanRate:
              required: true
        postconditions:
          slot_conditions:
            maximumStockLoanRate:
              minimum_value: 0
              maximum_value: 1
      - description: ' FpML specifies the initialStockLoanRate as a RestrictedPercentage, meaning that its value is comprised
          between 0 and 1.'
        preconditions:
          slot_conditions:
            initialStockLoanRate:
              required: true
        postconditions:
          slot_conditions:
            initialStockLoanRate:
              minimum_value: 0
              maximum_value: 1
    comments:
      - 'Rosetta condition: MaximumStockLoanRate — if maximumStockLoanRate exists then maximumStockLoanRate >= 0 and maximumStockLoanRate
        <= 1'
      - 'Rosetta condition: InitialStockLoanRate — if initialStockLoanRate exists then initialStockLoanRate >= 0 and initialStockLoanRate
        <= 1'
      - 'Rosetta condition: DisruptionEventsDeterminingParty — if determiningParty exists then determiningParty = AncillaryRoleEnum
        -> DisruptionEventsDeterminingParty'
    slots:
      - changeInLaw
      - failureToDeliver
      - insolvencyFiling
      - hedgingDisruption
      - increasedCostOfHedging
      - foreignOwnershipEvent
      - lossOfStockBorrow
      - maximumStockLoanRate
      - increasedCostOfStockBorrow
      - initialStockLoanRate
      - determiningParty
      - additionalBespokeTerms
    slot_usage:
      additionalBespokeTerms:
        range: Clause
        description: Where parties may optionnaly describe any extra bespoke agreements, in regards of the standardized Extraordinary
          Events.
        multivalued: true
    in_subset:
      - cdm_legaldocumentation_transaction

  Clause:
    description: A type for documenting additional clause that cannot yet be represented with the model and yet needed for
      a digital representation of the agreement.
    close_mappings:
      - fpml_5_10:Clause
    slots:
      - identifier
      - terms
      - subcomponents
    slot_usage:
      identifier:
        range: string
        description: The  name or identifier associated to this clause.
        required: false
        multivalued: false
    in_subset:
      - cdm_legaldocumentation_transaction

  MasterConfirmationBase:
    description: Legal agreement specification for General Terms and Elections that are applicable across multiple confirmations
      and are referenced by these confirmations.
    in_subset:
      - cdm_legaldocumentation_transaction

  BrokerConfirmation:
    description: Identifies the market sector in which the trade has been arranged.
    slots:
      - brokerConfirmationType
    slot_usage:
      brokerConfirmationType:
        description: The type of broker confirmation executed between the parties.
        required: true
    in_subset:
      - cdm_legaldocumentation_transaction

  EquitySwapMasterConfirmation2018:
    description: Specification for the General Terms and Relationship Supplement Elections as provided in the 2018 ISDA CDM
      Equity Confirmation for Security Equity Swap.
    is_a: EquityMasterConfirmation
    slots:
      - typeOfSwapElection
      - pricingMethodElection
      - linearInterpolationElection
      - settlementTerms
      - valuationDates
      - equityCashSettlementDates
    in_subset:
      - cdm_legaldocumentation_transaction

  EquityMasterConfirmation:
    description: Specification for General Terms and Elections of an Equity Master Confirmation that is applicable across
      multiple Equity confirmations and is referenced by each of these confirmations, an example of which being the 2018 ISDA
      CDM Equity Confirmation for Security Equity Swap.
    is_a: MasterConfirmationBase
    in_subset:
      - cdm_legaldocumentation_transaction
