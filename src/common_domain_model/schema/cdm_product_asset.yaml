id: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
name: cdm_product_asset
description: Product concepts applicable to specific asset classes.
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
