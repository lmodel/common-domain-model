  - ./cdm_base_staticdata_asset_commodity
  - ./cdm_base_staticdata_asset_common
  - ./cdm_base_staticdata_asset_credit
  - ./cdm_base_staticdata_asset_rates
  - ./cdm_base_staticdata_identifier
  - ./cdm_base_staticdata_party
  - ./cdm_observable_asset
  - ./cdm_observable_asset_calculatedrate
  - ./cdm_observable_common
  - ./cdm_observable_event
  - ./cdm_product_common_schedule
  - ./cdm_product_common_settlement
  - ./cdm_product_template
  - ./cdm_event_common
  - ./cdm_legaldocumentation_csa
  - ./cdm_event_position
  - ./cdm_base_staticdata_codelist

comments:
  - 'Rosetta func: FixedAmount — 2006 ISDA Definition Article 5 Section 5.1. Calculation of a Fixed Amount: The Fixed Amount
    payable by a party on a Payment Date will be: (a) if an amount is specified for the Swap Transaction as the Fixed Amount
    payable by that party for that Payment Date or for the related Calculation Period, that amount; or (b) if an amount is
    not specified for the Swap Transaction as the Fixed Amount payable by that party for that Payment Date or for the related
    Calculation Period, an amount calculated on a formula basis for that Payment Date or for the related Calculation Period
    as follows: Fixed Amount = Calculation Amount × Fixed Rate × Day Count Fraction. | inputs(interestRatePayout: InterestRatePayout
    (1..1), notional: number (0..1), date: date (0..1), calculationPeriodData: CalculationPeriodData (0..1)) | output(fixedAmount:
    number (1..1))'
  - 'Rosetta func: FloatingAmount — 2006 ISDA Definition Article 6 Section 6.1. Calculation of a Floating Amount: Subject
    to the provisions of Section 6.4 (Negative Interest Rates), the Floating Amount payable by a party on a Payment Date will
    be: (a) if Compounding is not specified for the Swap Transaction or that party, an amount calculated on a formula basis
    for that Payment Date or for the related Calculation Period as follows: Floating Amount = Calculation Amount × Floating
    Rate + Spread × Floating Rate Day Count Fraction (b) if ''Compounding'' is specified to be applicable to the Swap Transaction
    or that party and ''Flat Compounding'' is not specified, an amount equal to the sum of the Compounding Period Amounts
    for each of the Compounding Periods in the related Calculation Period; or (c) if ''Flat Compounding'' is specified to
    be applicable to the Swap Transaction or that party, an amount equal to the sum of the Basic Compounding Period Amounts
    for each of the Compounding Periods in the related Calculation Period plus the sum of the Additional Compounding Period
    Amounts for each such Compounding Period. | inputs(interestRatePayout: InterestRatePayout (1..1), rate: number (0..1),
    notional: number (0..1), date: date (0..1), calculationPeriodData: CalculationPeriodData (0..1)) | output(floatingAmount:
    number (1..1))'
  - 'Rosetta func: ResolveRateIndex — The function to specify that the floating rate index enumeration will be expressed as
    a number once the rate is observed. | inputs(index: FloatingRateIndexEnum (1..1)) | output(rate: number (1..1))'
  - 'Rosetta func: ResolvePerformancePeriodStartPrice — Resolves the price from the end of the previous period. If first period,
    then take the initial price. | inputs(performancePayout: PerformancePayout (1..1), price: PriceSchedule (0..*), observable:
    Observable (0..1), adjustedDate: date (1..1)) | output(startPrice: PriceSchedule (1..1))'
  - 'Rosetta func: ResolveEquityInitialPrice — To be replaced by full resolve price function implementation. | inputs(price:
    PriceSchedule (0..*)) | output(initialPrice: PriceSchedule (0..1))'
  - 'Rosetta func: DividendCashSettlementAmount — Based on the following legal text: means, in respect of a Dividend Period
    and the related Dividend Cash Settlement Date, an amount in the Settlement Currency determined by the Calculation Agent
    for such Dividend Period to which the Dividend Cash Settlement Amount relates, pursuant to the following formula: Dividend
    Cash Settlement Amount = Record Amount × Number Of Securities. | inputs(numberOfSecurities: number (1..1), declaredDividend:
    number (1..1)) | output(dividendCashSettlementAmount: number (1..1))'
  - 'Rosetta func: ExtractFixedLeg — Extract interest rate payout containing fix rate specification. | inputs(interestRatePayouts:
    InterestRatePayout (0..*)) | output(fixedRatePayout: InterestRatePayout (0..1))'
  - 'Rosetta func: FixedAmountCalculation — Calculates the fixed amount for a calculation period by looking up the notional
    and the fixed rate and multiplying by the year fraction. | inputs(interestRatePayout: InterestRatePayout (1..1), calculationPeriod:
    CalculationPeriodBase (1..1), notional: number (0..1)) | output(fixedAmountDetails: FixedAmountCalculationDetails (1..1))'
  - 'Rosetta func: GetFixedRate — Look up the fixed rate for a calculation period. | inputs(interestRatePayout: InterestRatePayout
    (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(fixedRate: number (0..1))'
  - 'Rosetta func: FloatingAmountCalculation — Calculate a floating amount for a calculation period by determining the raw
    floating rate, applying any rate treatments, looking up the calculation period notional, then performing the multiplication
    of the notional, rate, and year fraction.  Floating amount calculations are described in the 2021 ISDA Definitions in
    Section 6 and 7. | inputs(interestRatePayout: InterestRatePayout (1..1), calculationPeriod: CalculationPeriodBase (1..1),
    isInitialPeriod: boolean (1..1), suppliedNotional: number (0..1), suppliedRate: number (0..1)) | output(result: FloatingAmountCalculationDetails
    (1..1))'
  - 'Rosetta func: ApplyFloatingRateSetting — Calculate a floating amount for a calculation period by determining the raw
    floating rate, applying any rate treatments, looking up the calculation period notional, then performing the multiplication
    of the notional, rate, and year fraction.  Floating amount calculations are described in the 2021 ISDA Definitions in
    Section 6 and 7. | inputs(interestRatePayout: InterestRatePayout (1..1), calculationPeriod: CalculationPeriodBase (1..1),
    isInitialPeriod: boolean (1..1), suppliedNotional: number (0..1), suppliedRate: number (0..1), floatingRateSetting: FloatingRateSettingDetails
    (0..1)) | output(result: FloatingAmountCalculationDetails (1..1))'
  - 'Rosetta func: DefaultFloatingRate | inputs(suppliedRate: number (1..1)) | output(processedRateDetails: FloatingRateProcessingDetails
    (1..1))'
  - 'Rosetta func: CalculateFloatingCashFlow | inputs(interestRatePayout: InterestRatePayout (1..1), calculationPeriod: CalculationPeriodBase
    (1..1), notional: number (0..1), currency: string (0..1), floatingRateSetting: FloatingRateSettingDetails (0..1), processedRateDetails:
    FloatingRateProcessingDetails (1..1)) | output(result: FloatingAmountCalculationDetails (1..1))'
  - 'Rosetta func: Create_CalculationPeriodBase — Create a CalculationPeriodBase type from CalculationPeriodData type. | inputs(calcPeriodData:
    CalculationPeriodData (1..1)) | output(calcPeriod: CalculationPeriodBase (1..1))'
  - 'Rosetta func: GetNotionalAmount — Look up the notional amount in effect for a calculation period. | inputs(interestRatePayout:
    InterestRatePayout (1..1), calculationPeriod: CalculationPeriodBase (1..1)) | output(notional: Money (1..1))'
  - 'Rosetta func: GetQuantityScheduleStepValues — Find all schedule step values whose stepDate is before or equal to the
    supplied periodStartDate.  Returns a list of step values starting from the initial quantity value, to the last step value
    before the periodStartDate. | inputs(schedule: NonNegativeQuantitySchedule (1..1), periodStartDate: date (1..1)) | output(stepValues:
    number (0..*))'
  - 'Rosetta func: CalculateYearFraction — Calculate the year fraction for a single calculation period, by invoking the base
    year fraction logic | inputs(interestRatePayout: InterestRatePayout (1..1), dcf: DayCountFractionEnum (1..1), calculationPeriod:
    CalculationPeriodBase (1..1)) | output(yearFrac: number (1..1))'
