id: https://w3id.org/finos/cdm/cdm_legaldocumentation_master_isda
name: cdm_legaldocumentation_master_isda
description: LinkML schema for cdm.legaldocumentation.master.isda
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/finos/cdm/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  isda: https://www.isda.org/specifications/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_staticdata_party
- ./cdm_legaldocumentation_common
- ./cdm_legaldocumentation_csa
- ./cdm_legaldocumentation_master
- ./cdm_base_staticdata_asset_common

subsets:
  cdm_legaldocumentation_master_isda:
    description: Classes defined in the cdm_legaldocumentation_master_isda module.

slots:
  automaticEarlyTermination:
    range: AutomaticEarlyTermination
    description: The specification of whether there is an automatic occurrence of an Early Termination Date in respect of
      Transactions upon the occurrence of certain bankruptcy / insolvency related events.
    required: true

  terminationCurrency:
    range: TerminationCurrency
    description: Specification of the currency in which the termination payment is made (including the process by which such
      currency is determined).
    required: true

  addressForNotices:
    range: DemandsAndNotices
    description: Specification of the address and other details for notices.
    required: true

  nonContractualObligations:
    range: boolean
    description: Specification of whether the Governing Law clause extends to Non-Contractual Obligations (True) or does not
      extend to Non-Contractual Obligations (False).
    required: true

  specifiedEntities:
    range: SpecifiedEntities
    description: A provision that allows each party to specify its Specified Entities for certain Events of Default and Termination
      Events.
    required: true
    multivalued: true
    inlined_as_list: true

  fallbackAET:
    range: boolean
    description: Specifies whether automatic termination applies in the event of certain bankruptcy events.
    required: true
    close_mappings:
    - fpml_5_10:AutomaticEarlyTermination.fallbackAET

  indemnity:
    range: boolean
    description: Specifies whether indemnity applies in the event AET is applicable to one or both of the parties.
    required: true
    close_mappings:
    - fpml_5_10:AutomaticEarlyTermination.indemnity

  statedTerminationCurrency:
    range: TerminationCurrencySelection
    description: Allows for specific Termination Currency(ies) and a fallback Termination Currency to be selected.

  partyOptionTerminationCurrency:
    range: PartyOptionTerminationCurrency
    description: Provides that the Termination Currency will be determined by reference to a contractual mechanism when closing
      out the Agreement.

  statedCurrency:
    range: string
    description: Specifies a single Termination Currency for the agreement.

  fallbackCurrency:
    range: string
    description: Specifies a single fallback Termination Currency should the stated currency not be freely available.

  bothAffected:
    range: string
    description: Specifies fallback Termination Currency where both parties are Affected Parties.

  bothAffectedTermCurrencyOption:
    range: string
    description: Specifies termination currency where there are two Affected Parties and they cannot agree on the termination
      currency.

  terminationCurrencySpecifiedCondition:
    range: string
    description: Specifies alternative conditions for selection of the termination currency.

  terminationCurrencyCondition:
    range: TerminationCurrencyConditionEnum
    description: Specifies the enumerated conditions for selection of the termination currency.
    required: true

  statedPartyCurrency:
    range: string
    description: Specifies termination Currency.
    required: true

  specifiedEntityClause:
    range: SpecifiedEntityClauseEnum
    description: The Event of Default or Termination event for which Specified Entities terms are being defined.
    required: true

  specifiedEntity:
    range: SpecifiedEntity
    description: The party specific election of Specified Entities for the Event of Default or Termination Event specified.
    required: true
    multivalued: true
    inlined_as_list: true

  specifiedEntityTerms:
    range: SpecifiedEntityTermsEnum
    description: The specified entity terms for the Event of Default or Termination Event specified.
    required: true

  materialSubsidiaryTerms:
    range: string
    description: The meaning of Material Subsidiary for the Event of Default or Termination Event specified.

  otherSpecifiedEntityTerms:
    range: string
    description: The non standard terms for the Event of Default or Termination Event specified.

classes:
  MasterAgreement:
    description: The set of elections that define an ISDA Master Agreement.
    is_a: MasterAgreementBase
    narrow_mappings:
    - gist:Agreement
    slots:
    - automaticEarlyTermination
    - terminationCurrency
    - addressForNotices
    - nonContractualObligations
    - creditSupportDocument
    - creditSupportProvider
    - specifiedEntities
    slot_usage:
      creditSupportDocument:
        range: CreditSupportDocument
        description: Identification of party specific Credit Support Documents applicable to the document.
        required: true
        multivalued: false
      creditSupportProvider:
        range: CreditSupportProvider
        description: Identification of party specific Credit Support Providers applicable to the document.
        required: true
        multivalued: false
    in_subset:
    - cdm_legaldocumentation_master_isda

  AutomaticEarlyTermination:
    description: A class to specify the Automatic Early Termination provision applicable to a Master Agreement.
    notes:
    - ISDA ISDA_MA_1998 section "6(a)"
    - ISDA ISDA_MA_2002 section "6(a)"
    see_also:
    - isda:ISDA_MA_1998
    - isda:ISDA_MA_2002
    close_mappings:
    - fpml_5_10:AutomaticEarlyTermination
    comments:
    - 'Rosetta condition: FallbackAET — if fallbackAET = True then partyElection -> isApplicable all = False'
    - 'Rosetta condition: Indemnity — if fallbackAET = False and partyElection -> isApplicable all = False then indemnity
      = False'
    slots:
    - fallbackAET
    - indemnity
    - partyElection
    slot_usage:
      partyElection:
        range: AutomaticEarlyTerminationElection
        description: The party election specific to the Automatic Early Termination Clause.
        required: false
    in_subset:
    - cdm_legaldocumentation_master_isda

  AutomaticEarlyTerminationElection:
    description: A class to specify the party elections specific to the Automatic Early Termination Clause.
    close_mappings:
    - fpml_5_10:AutomaticEarlyTerminationElection
    slots:
    - party
    - isApplicable
    slot_usage:
      party:
        range: Party
        description: The party for which the Automatic Early Termination provisions are being specified.
        required: true
      isApplicable:
        description: A boolean election to specify whether the Automatic Early Termination provisions of Section 6(a) are
          applicable (True) or not applicable (False).
    in_subset:
    - cdm_legaldocumentation_master_isda

  TerminationCurrency:
    description: Specifies how the Termination Currency for the agreement will be determined.
    slots:
    - statedTerminationCurrency
    - partyOptionTerminationCurrency
    in_subset:
    - cdm_legaldocumentation_master_isda

  TerminationCurrencySelection:
    description: Specifies Termination Currency where a currency is stated at the time the agreement is entered into.
    slots:
    - statedCurrency
    - fallbackCurrency
    - partyElection
    - bothAffected
    slot_usage:
      partyElection:
        range: PartyTerminationCurrencySelection
        description: Specifies different termination currencies to apply depending on which party or parties are the Defaulting
          Party Affected Party(ies).
        required: false
    in_subset:
    - cdm_legaldocumentation_master_isda

  PartyOptionTerminationCurrency:
    description: Specifies mechanism for Termination currency to be selected by the Non-defaulting Party/party which is not
      the Affected Party.
    rules:
    - description: A validation rule to ensure that Termination Currency alternative conditions are specified when required.
      preconditions:
        slot_conditions:
          terminationCurrencyCondition:
            equals_string: Specified
      postconditions:
        slot_conditions:
          terminationCurrencySpecifiedCondition:
            required: true
    comments:
    - 'Rosetta condition: TerminationCurrencyCondition — if terminationCurrencyCondition = TerminationCurrencyConditionEnum
      -> Specified then terminationCurrencySpecifiedCondition exists'
    slots:
    - bothAffectedTermCurrencyOption
    - terminationCurrencySpecifiedCondition
    - terminationCurrencyCondition
    in_subset:
    - cdm_legaldocumentation_master_isda

  PartyTerminationCurrencySelection:
    description: Specifies the termination currency to be used by a party when it is the Non-Defaulting Party or the Party
      which is not the Affected Party.
    slots:
    - party
    - statedPartyCurrency
    slot_usage:
      party:
        range: Party
        description: The elective party.
        required: true
    in_subset:
    - cdm_legaldocumentation_master_isda

  SpecifiedEntities:
    description: A provision that allows each party to specify its Specified Entities for certain Events of Default and Termination
      Events.
    slots:
    - specifiedEntityClause
    - specifiedEntity
    in_subset:
    - cdm_legaldocumentation_master_isda

  SpecifiedEntity:
    description: The party specific election of Specified Entities for the Event of Default or Termination Event specified.
    rules:
    - description: A validation rule to ensure that a SpecifiedEntity is specified when required.
      preconditions:
        slot_conditions:
          specifiedEntityTerms:
            equals_string: NamedSpecifiedEntity
      postconditions:
        slot_conditions:
          specifiedEntity:
            required: true
    - description: A validation rule to ensure that Material Subsidiary terms are specified when required.
      preconditions:
        slot_conditions:
          specifiedEntityTerms:
            equals_string: MaterialSubsidiary
      postconditions:
        slot_conditions:
          materialSubsidiaryTerms:
            required: true
    - description: A validation rule to ensure that non standard Specified Entity terms are provided when required.
      preconditions:
        slot_conditions:
          specifiedEntityTerms:
            equals_string: OtherSpecifiedEntity
      postconditions:
        slot_conditions:
          otherSpecifiedEntityTerms:
            required: true
    comments:
    - 'Rosetta condition: SpecifiedEntity — if specifiedEntityTerms = SpecifiedEntityTermsEnum -> NamedSpecifiedEntity then
      specifiedEntity exists'
    - 'Rosetta condition: MaterialSubsidiary — if specifiedEntityTerms = SpecifiedEntityTermsEnum -> MaterialSubsidiary then
      materialSubsidiaryTerms exists'
    - 'Rosetta condition: OtherSpecifiedEntity — if specifiedEntityTerms = SpecifiedEntityTermsEnum -> OtherSpecifiedEntity
      then otherSpecifiedEntityTerms exists'
    slots:
    - party
    - specifiedEntityTerms
    - specifiedEntity
    - materialSubsidiaryTerms
    - otherSpecifiedEntityTerms
    slot_usage:
      party:
        range: Party
        description: The elective party.
        required: true
      specifiedEntity:
        range: LegalEntity
        description: The specified entities for the Event of Default or Termination Event specified.
        required: false
    in_subset:
    - cdm_legaldocumentation_master_isda
