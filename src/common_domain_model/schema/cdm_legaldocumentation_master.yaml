id: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
name: cdm_legaldocumentation_master
description: Master agreement concepts.
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
default_prefix: common_domain_model
default_range: string

imports:
