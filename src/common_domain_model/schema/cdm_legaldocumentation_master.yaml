  NationalizationOrInsolvencyOrDelistingEventEnum:
    description: Defines the consequences of nationalization, insolvency and delisting events relating to the underlying.
    permissible_values:
      NegotiatedCloseout:
        description: The parties may, but are not obliged, to terminate the transaction on mutually acceptable terms and if
          the terms are not agreed then the transaction continues.
      CancellationAndPayment:
        description: The trade is terminated.

  MasterConfirmationTypeEnum:
    description: The enumerated values to specify the type of master confirmation agreement governing the transaction. While
      FpML positions the date a prefix, the CDM positions it as the suffix to handle grammar type constraints.
    exact_mappings:
