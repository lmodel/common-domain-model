    permissible_values:
      _2003CreditIndex:
        description: Used for CDS Index trades. Relevant Master Confirmation determined by the contents of the creditDefaultSwap
          element. Best practice is to use the most specific code that applies.
        aliases:
          - 2003CreditIndex
      _2004EquityEuropeanInterdealer:
        description: A privately negotiated European Interdealer Master Confirmation Agreement applies.
        aliases:
          - 2004EquityEuropeanInterdealer
      _2005VarianceSwapEuropeanInterdealer:
        description: A privately negotiated European Interdealer Master Confirmation Agreement applies.
        aliases:
          - 2005VarianceSwapEuropeanInterdealer
