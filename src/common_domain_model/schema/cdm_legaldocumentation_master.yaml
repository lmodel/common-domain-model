slots:
  clause:
    range: MasterAgreementClause
    description: Clauses that have had elections made against them in this Master Agreement. There must be at least one clause
      defined in the agreement.
    required: true
    multivalued: true
    inlined_as_list: true

  variant:
    range: MasterAgreementClauseVariant
    description: Allows multiple variants to be defined for a clause. This needs to be an array as some clauses can specify
      different variants for different parties. At least one variant must be specified for a clause.
    required: true
    multivalued: true
    inlined_as_list: true

classes:
  MasterAgreementSchedule:
    description: The set of elections which specify a Master Agreement.
    slots:
      - clause
    in_subset:
      - cdm_legaldocumentation_master

  MasterAgreementClause:
    description: Defines clauses that make up a Master Agreement.
    slots:
      - identifer
      - name
      - counterparty
      - otherParty
      - variant
    slot_usage:
      identifer:
        range: MasterAgreementClauseIdentifierEnum
        description: Unique identifier for the clause.
      name:
        description: Optional textual description of the clause.
      counterparty:
        range: CounterpartyRoleEnum
        description: Optional counterparty role. This can be used where a clause needs to be assigned to a specific party
          on the agreement based upon their role i.e. Party A or Party B.
        required: false
      otherParty:
        range: PartyRoleEnum
        description: Optional party. This can be required for umbrella agreements where a clause may need to be assigned to
          a specific party who may or may not be on the agreement.
    in_subset:
      - cdm_legaldocumentation_master

  MasterAgreementClauseVariant:
    description: Sets the details for a specific variant associated to a clause in a Master Agreement.
    slots:
      - identifier
      - name
      - counterparty
      - otherParty
      - variableSet
    slot_usage:
      identifier:
        range: MasterAgreementVariantIdentifierEnum
        description: Unique identifier for this variant.
        multivalued: false
      name:
        description: Optional textual description of the variant.
      counterparty:
        range: CounterpartyRoleEnum
        description: Optional counterparty role. This can be used where a clause needs to assign a different variant to the
          different parties on the agreement based upon their role i.e. Party A or Party B.
        required: false
      otherParty:
        range: PartyRoleEnum
        description: Optional party. This can be used where a clause needs to assign different variants to different parties
          who may or may not be on the agreement.
      variableSet:
        range: MasterAgreementVariableSet
        description: For some variants of some clauses additional details are required to work out what has been elected.
          This array can be used to define the name and value of these variables. Please refer to the agreement documentation
          for more details of the variables that are available for any clause.
    in_subset:
      - cdm_legaldocumentation_master

  MasterAgreementVariableSet:
    description: Defines a type where additional variables associated to clauses and their variants can be described.
    rules:
      - description: If we have a variableSet then we must not have any name/value pairs at this level.
        preconditions:
          slot_conditions:
            variableSet:
              required: true
        postconditions:
          slot_conditions:
            name:
              required: false
            value:
              required: false
      - description: If we have a name then we must also have a value.
        preconditions:
          slot_conditions:
            name:
              required: true
        postconditions:
          slot_conditions:
            value:
              required: true
      - description: If we have a value then we must also have a name.
        preconditions:
          slot_conditions:
            value:
              required: true
        postconditions:
          slot_conditions:
            name:
              required: true
    comments:
      - 'Rosetta condition: VariableSetExists — if variableSet exists then name is absent and value is absent'
      - 'Rosetta condition: VariableSetNesting — if variableSet -> variableSet exists then variableSet -> variableSet -> variableSet
        is absent'
      - 'Rosetta condition: NameMustExist — if name exists then value exists'
      - 'Rosetta condition: ValueMustExist — if value exists then name exists'
    slots:
      - variableSet
      - name
      - value
    slot_usage:
      variableSet:
        range: MasterAgreementVariableSet
        description: For some variants a table of variables is required. To support this use case we need to be able to specify
          variables within variables. Including a variable set here gives us infinite nesting opportunities - realistically
          we are only ever expecting that a table would need to be defined for any particular clause, so we would expect two
          levels of nesting as a maximum i.e. variableSet->variableSet->name/value.
      name:
        description: The name of the variable.
      value:
        range: string
        description: The value for this variable.
    in_subset:
      - cdm_legaldocumentation_master

  MasterAgreementBase:
    description: A set of elections that can be shared across master agreement types - this should be built upon for specific
      contracts.
    in_subset:
      - cdm_legaldocumentation_master

  MasterAgreementElections:
    description: A representation of a master agreement extended from a base agreement of shared elections.
    in_subset:
      - cdm_legaldocumentation_master
