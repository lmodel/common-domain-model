        description: No Credit Support Document is specified.

  CreditSupportProviderTermsEnum:
    description: The enumerated values to specify the Credit Support Provider Terms
    permissible_values:
      Specified:
        description: A specified Credit Support Provider is provided
      Any:
        description: Any party or parties who now or in the future may provide a Credit Support Document or other form of
          credit support.
      None:
        description: No Credit Support Provider is specified.

  SpecifiedEntityClauseEnum:
    description: The enumerated values to specify the Event of Default or Termination event for which Specified Entities terms
      are being defined.
    permissible_values:
      DefaultUnderSpecifiedTransaction: {}
      CrossDefault: {}
      Bankruptcy: {}
      CreditEventUponMerger: {}

  SpecifiedEntityTermsEnum:
    description: The enumerated values to specify the specified entity terms for the Event of Default or Termination Event
      specified.
    permissible_values:
      None:
        description: No Specified Entity is provided
      AnyAffiliate:
        description: Any Affiliate is a Specified Entity.
      NamedSpecifiedEntity:
        description: The Specified Entity is provided.
      MaterialSubsidiary:
        description: Any Material Subsidiary.
      OtherSpecifiedEntity:
        description: Non standard Specified Entity terms are provided.

  TerminationCurrencyConditionEnum:
    permissible_values:
      PaymentsDue:
        description: A currency in which payments would be due under one or more Transactions.
      FreelyAvailable:
        description: A currency that is freely available.
      PaymentsDueAndFreelyAvailable:
        description: A currency in which payments would be due under one or more Transactions and that is freely available.
      Specified:
        description: Termination Currency Conditions are specified.

  UmbrellaPartyRoleEnum:
    permissible_values:
      Agent:
        description: Represents a Contractual Party who has authority to negotiate, execute and deliver confirmations on behalf
          of each unique party to the agreement that is linked to the Agent.
      InvestmentManager:
        description: Represents a Contractual Party who has been authorised to act as a centralised authority empowered to
          negotiate, execute and manage transactions on behalf of multiple affiliated funds or accounts.
      Principal:
        description: Represents a Contractual Party that enters into and assumes direct responsibility for transactions.
      SubAccount:
        description: Represents an individual trading party, fund, portfolio or managed account associated to a principal,
          Investment Manager or Agent Contractual Party.
      Sleeve:
        description: Represents a distinct trading strategy, portfolio, or sub account managed within a broader legal entity
          or fund. It is not a legal party to the agreement.

slots:
  matrixType:
    range: MatrixTypeEnum
    description: Identifies the form of applicable matrix.
    required: true
    annotations:
      metadata_scheme: true

  matrixTerm:
    range: MatrixTermEnum
    description: Defines any applicable key into the relevant matrix. For example, the Transaction Type would be the single
      term required for the Credit Derivatives Physical Settlement Matrix. This element should be omitted in the case of the
      2000 ISDA Definitions Settlement Matrix for Early Termination and Swaptions.
    annotations:
      metadata_scheme: true

  contractualTermsSupplementType:
    range: ContractualSupplementTypeEnum
    description: Identifies the form of applicable contractual supplement.
    required: true
    annotations:
      metadata_scheme: true

  otherAgreementType:
    range: string
    description: The agreement executed between the parties and intended to govern product-specific derivatives transactions
      between those parties.
    required: true
    annotations:
      metadata_scheme: true

  resourceId:
    range: string
    description: The unique identifier of the resource within the event. FpML specifies this element of type resourceIdScheme
      but with no specified value.
    required: true
    annotations:
      metadata_scheme: true

  resourceType:
    range: ResourceTypeEnum
    description: A description of the type of the resource, e.g. a confirmation.
    annotations:
      metadata_scheme: true

  language:
    range: string
    description: Indicates the language of the resource, described using the ISO 639-2/T Code.
    annotations:
      metadata_scheme: true

  sizeInBytes:
    range: decimal
    description: Indicates the size of the resource in bytes. It could be used by the end user to estimate the download time
      and storage needs.

  length:
    range: ResourceLength
    description: Indicates the length of the resource. For example, if the resource were a PDF file, the length would be in
      pages.

  mimeType:
    range: string
    description: Indicates the type of media used to store the content. mimeType is used to determine the software product(s)
      that can read the content. MIME Types are described in RFC 2046.
    annotations:
      metadata_scheme: true

  comments:
    range: string
    description: Any additional comments that are deemed necessary. For example, which software version is required to open
      the document? Or, how does this resource relate to the others for this event?

  string:
    range: string
    description: Provides extra information as string. In case the extra information is in XML format, a CDATA section must
      be placed around the source message to prevent its interpretation as XML content.

  url:
    range: string
    description: Indicates where the resource can be found, as a URL that references the information on a web server accessible
      to the message recipient.

  lengthUnit:
    range: LengthUnitEnum
    description: The length unit of the resource. For example, pages (pdf, text documents) or time (audio, video files).
    required: true

  lengthValue:
    range: decimal
    description: The length value of the resource.
    required: true

  agreement:
    range: Agreement
    description: Specification of the standard set of terms that define a legal agreement.
    required: true
    close_mappings:
      - fpml_5_10:AgreementTerms.agreement

  clauseLibrary:
    range: boolean
    description: Specification of whether the agreement terms have been negotiated using the clause library methodology.
    close_mappings:
      - fpml_5_10:AgreementTerms.clauseLibrary

  agreementTerms:
    range: AgreementTerms
    description: Specification of the content of the legal agreement.

  relatedAgreements:
    range: LegalAgreement
    description: Specifies the agreement(s) that govern the agreement, either as a reference to such agreements when specified
      as part of the CDM, or through identification of some of the key terms of those agreements, such as the type of agreement,
      the publisher, the vintage, the agreement identifier and the agreement date.
    multivalued: true
    inlined_as_list: true

  umbrellaAgreement:
    range: UmbrellaAgreement
    description: Specifies a set of legal entities which are part of a legal agreement beyond the two contracting parties
      to that agreement.

  agreementDate:
    range: date
    description: The date on which the legal agreement has been agreed between the parties. This corresponds to the Date of
      Deed in an English Law document.

  legalAgreementIdentification:
    range: LegalAgreementIdentification
    description: 'The type of legal agreement, identified via a set of composable attributes: agreementName, publisher, governing
      law and version, e.g. ISDA 2013 Standard Credit Support Annex English Law.'
    required: true

  contractualParty:
    range: Party
    description: The two contractual parties to the legal agreement, which reference information is positioned as part of
      the partyInformation attribute.
    required: true
    multivalued: true
    inlined_as_list: true
    annotations:
      metadata_reference: true

  otherParty:
    range: PartyRole
    description: The role(s) that other party(ies) may have in relation to the legal agreement, further to the contractual
      parties.
    multivalued: true

  attachment:
    range: Resource
    description: A human readable document, for example a confirmation.
    multivalued: true
    inlined_as_list: true

  agreementName:
    range: AgreementName
    description: The legal agreement name, e.g. Credit Support Annex for Variation Margin.
    required: true
    related_mappings:
      - icma:AM_1_0#documentName

  publisher:
    range: LegalAgreementPublisherEnum
    description: The legal agreement publisher, e.g. ISDA.
    related_mappings:
      - icma:AM_1_0#publisher

  vintage:
    range: integer
    description: In the case where successive definitions of the legal agreement have been developed, the vintage identification.
      This is typically (but not necessarily) done by referencing the year, e.g. 2013 in the case of the ISDA 2013 Standard
      Credit Support Annex.
    related_mappings:
      - icma:AM_1_0#csaVersion

  agreementType:
    range: LegalAgreementTypeEnum
    description: Specification of the legal agreement type.
    required: true
    close_mappings:
      - fpml_5_10:AgreementName.agreementType

  creditSupportAgreementType:
    range: CreditSupportAgreementTypeEnum
    description: Specification of the credit support agreement type.
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AgreementName.creditSupportAgreementType

  creditSupportAgreementMarginType:
    range: CollateralMarginTypeEnum
    description: specifies the type of margin for which a legal agreement is named.
    close_mappings:
      - fpml_5_10:AgreementName.creditSupportAgreementMarginType

  contractualDefinitionsType:
    range: ContractualDefinitionsEnum
    description: The definitions such as those published by ISDA that will define the terms of the trade.
    multivalued: true
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AgreementName.contractualDefinitionsType

  contractualTermsSupplement:
    range: ContractualTermsSupplement
    description: A contractual supplement (such as those published by ISDA) that will apply to the trade.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:AgreementName.contractualTermsSupplement

  contractualMatrix:
    range: ContractualMatrix
    description: A reference to a contractual matrix of elected terms/values (such as those published by ISDA) that shall
      be deemed to apply to the trade. The applicable matrix is identified by reference to a name and optionally a publication
      date. Depending on the structure of the matrix, an additional term (specified in the matrixTerm element) may be required
      to further identify a subset of applicable terms/values within the matrix.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:AgreementName.contractualMatrix

  masterAgreementType:
    range: MasterAgreementTypeEnum
    description: Specification of the master agreement type.
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AgreementName.masterAgreementType

  masterConfirmationType:
    range: MasterConfirmationTypeEnum
    description: The type of master confirmation executed between the parties.
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AgreementName.masterConfirmationType

  masterConfirmationAnnexType:
    range: MasterConfirmationAnnexTypeEnum
    description: The type of master confirmation annex executed between the parties.
    annotations:
      metadata_scheme: true
    close_mappings:
      - fpml_5_10:AgreementName.masterConfirmationAnnexType

  otherAgreement:
    range: string
    description: Definition of an agreement that is not enumerated in the CDM.
    close_mappings:
      - fpml_5_10:AgreementName.otherAgreement

  brokerConfirmationType:
    range: BrokerConfirmationTypeEnum
    close_mappings:
      - fpml_5_10:AgreementName.brokerConfirmationType

  agreementSet:
    range: UmbrellaAgreementSet
    description: The language associated with the umbrella agreement, and which applies to all the parties to the umbrella
      agreement.
    required: true
    multivalued: true
    inlined_as_list: true

  actingAs:
    range: CounterpartyRoleEnum
    description: Specifies the CounterpartyRoleEnum, e.g. either Party1 or Party2, that is associated to the party.

  nonLegalEntity:
    range: NonLegalEntity
    description: Specifies a non-legal entity that exists in the agreement with a defined relationship to a Legal entity to
      the agreement.

  parentParty:
    range: Party
    description: Represents the identification of a parent child relationship between two entities in the Umbrella agreement,
      allowing non-legal entities to be linked to the appropriate legal entity and allowing funds, portfolio or managed accounts
      to be linked to their applicable Investment Manager or Agent within the agreement.

  additionalLanguage:
    range: string
    description: Represents any additional language that may need to be captured regarding the structure or application of
      terms that may exist for the agreement.

  primaryContactInformation:
    range: ContactInformation
    description: The main notice/address information of the party.

  additionalContactInformation:
    range: NoticeContactInformation
    description: Additional notice/address information of the party.
    multivalued: true
    inlined_as_list: true

  naturalPerson:
    range: NaturalPerson
    description: Optional information about people involved in a transaction or business process.
    multivalued: true
    inlined_as_list: true

  additionalInformation:
    range: string
    description: Additional information on the recipient.

  isSpecified:
    range: boolean
    description: The qualification of whether some other related agreement is specified (True) or not (False).
    required: true

  legalDocument:
    range: string
    description: The specification of this other agreement, when the qualification is True.

  creditSupportAgreementElections:
    range: CreditSupportAgreementElections
    description: Elections to specify a Credit Support Annex or Credit Support Deed for Intial or Variation Margin.
    any_of:
      - range: CreditSupportAgreementInitialMarginElections
      - range: CreditSupportAgreementVariationMarginElections
      - range: CreditSupportAgreementLegacyElections
    close_mappings:
      - fpml_5_10:Agreement.creditSupportAgreementElections

  collateralTransferAgreementElections:
    range: CollateralTransferAgreementElections
    description: Elections to specify a Collateral Transfer Agreement.
    close_mappings:
      - fpml_5_10:Agreement.collateralTransferAgreementElections

  securityAgreementElections:
    range: SecurityAgreementElections
    description: Elections to specify a Security agreement.
    close_mappings:
      - fpml_5_10:Agreement.securityAgreementElections

  masterAgreementSchedule:
    range: MasterAgreementSchedule
    description: Elections to specify a Master Agreement Schedule.
    close_mappings:
      - fpml_5_10:Agreement.masterAgreementSchedule

  transactionAdditionalTerms:
    range: TransactionAdditionalTerms
    description: Any additional terms which mainly intend to specify the extraordinary events that may affect a trade and
      the related contractual rights and obligation of the parties when this happens
    close_mappings:
      - fpml_5_10:Agreement.transactionAdditionalTerms

  masterAgreementElections:
    range: MasterAgreementElections
    description: A legal representation of the different possible master agreements
    close_mappings:
      - fpml_5_10:Agreement.masterAgreementElections

classes:
  ContractualMatrix:
    slots:
      - matrixType
      - matrixTerm
    in_subset:
      - cdm_legaldocumentation_common

  ContractualTermsSupplement:
    description: A contractual supplement (such as those published by ISDA) and its publication date that will apply to the
      trade.
    slots:
      - contractualTermsSupplementType
      - publicationDate
    slot_usage:
      publicationDate:
        range: date
        description: Specifies the publication date of the applicable version of the contractual supplement.
    in_subset:
      - cdm_legaldocumentation_common

  OtherAgreement:
    description: A class for defining an agreement executed between parties.
    slots:
      - identifier
      - otherAgreementType
      - version
      - date
    slot_usage:
      identifier:
        range: string
        description: An identifier that has been created to identify the agreement.
        required: false
        multivalued: false
      version:
        description: The version of the agreement.
        required: false
      date:
        description: The date on which the agreement was signed.
        required: false
        multivalued: false
    in_subset:
      - cdm_legaldocumentation_common

  Resource:
    description: Describes the resource that contains the media representation of a business event (i.e used for stating the
      Publicly Available Information). For example, can describe a file or a URL that represents the event. This type is an
      extended version of a type defined by RIXML (www.rixml.org).  Rosetta restricts the FpML implementation by not providing
      the ability to associated a document in hexadecimalBinary or base64Binary until such time that actual use cases will
      come up.
    rules:
      - description: Choice rule to represent an FpML choice construct. Note that FpML also provides the ability to have hexadecimalBinary
          or base64Binary, which have not been implemented in Rosetta until we see actual use cases.
        postconditions:
          any_of:
            - slot_conditions:
                string:
                  required: true
            - slot_conditions:
                url:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ResourceChoice — optional choice string, url'
    slots:
      - resourceId
      - resourceType
      - language
      - sizeInBytes
      - length
      - mimeType
      - name
      - comments
      - string
      - url
    slot_usage:
      name:
        description: The name of the resource.  It is specified as a NormalizedString in FpML.
    in_subset:
      - cdm_legaldocumentation_common

  ResourceLength:
    description: A class to indicate the length of the resource.
    slots:
      - lengthUnit
      - lengthValue
    in_subset:
      - cdm_legaldocumentation_common

  AgreementTerms:
    description: Specification of the content of a legal agreement.
    close_mappings:
      - fpml_5_10:AgreementTerms
    slots:
      - agreement
      - clauseLibrary
      - counterparty
    slot_usage:
      counterparty:
        description: Specification of the roles of the counterparties to the agreement.
    in_subset:
      - cdm_legaldocumentation_common

  LegalAgreement:
    description: The specification of a legal agreement between two parties, being negotiated or having been executed. This
      includes the baseline information and the optional specialised elections
    is_a: LegalAgreementBase
    tree_root: true
    annotations:
      metadata_key: true
    rules:
      - description: Either the Agreement Terms (i.e. a bilateral or one way agreement) or an Umbrella Agreement (i.e. an
          agreement where multiple parties and variations of terms are described within a single document but represent multiple
          agreements for operational purposes) should be included, but not both.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                agreementTerms:
                  required: true
            - slot_conditions:
                umbrellaAgreement:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ConsistentlyExecutedAgreements — if relatedAgreements exists and agreementDate exists then relatedAgreements
        -> agreementDate exists'
      - 'Rosetta condition: AgreementVerification — if agreementTerms -> agreement -> securityAgreementElections exists then
        legalAgreementIdentification -> agreementName -> agreementType = LegalAgreementTypeEnum -> SecurityAgreement else
        if agreementTerms -> agreement -> creditSupportAgreementElections exists then legalAgreementIdentification -> agreementName
        -> creditSupportAgreementType = CreditSupportAgreementTypeEnum -> CreditSupportAnnex or legalAgreementIdentification
        -> agreementName -> creditSupportAgreementType = CreditSupportAgreementTypeEnum -> CreditSupportDeed else if agreementTerms
        -> agreement -> collateralTransferAgreementElections exists then legalAgreementIdentification -> agreementName ->
        creditSupportAgreementType = CreditSupportAgreementTypeEnum -> CollateralTransferAgreement else if agreementTerms
        -> agreement -> masterAgreementSchedule exists then legalAgreementIdentification -> agreementName -> agreementType
        = LegalAgreementTypeEnum -> MasterAgreement'
      - 'Rosetta condition: AgreementType — required choice agreementTerms, umbrellaAgreement'
    slots:
      - agreementTerms
      - relatedAgreements
      - umbrellaAgreement
    in_subset:
      - cdm_legaldocumentation_common

  LegalAgreementBase:
    description: Specifies the legal agreement baseline information, being negotiated or having been executed. It excludes
      specialized elections
    slots:
      - agreementDate
      - effectiveDate
      - identifier
      - legalAgreementIdentification
      - contractualParty
      - otherParty
      - attachment
    slot_usage:
      effectiveDate:
        description: The date on which, or as of which, the agreement is effective, if different from the agreement date.
          It is expected that it will most often correspond to the agreement date, although there could be situations where
          the parties will explicitly agree on a distinct effective date.
      identifier:
        range: Identifier
        inlined_as_list: true
        description: The legal agreement identifier. Several identifiers can be specified.
        required: false
    in_subset:
      - cdm_legaldocumentation_common

  LegalAgreementIdentification:
    description: 'Specifies the type of legal agreement, identified via a set of composable attributes: agreementName, publisher,
      governing law and version, e.g. ISDA 2013 Standard Credit Support Annex English Law.'
    comments:
      - 'Rosetta condition: CSAMarginType — if agreementName -> creditSupportAgreementMarginType exists then agreementName
        -> creditSupportAgreementType exists and vintage >= 2016'
    slots:
      - governingLaw
      - agreementName
      - publisher
      - vintage
    slot_usage:
      governingLaw:
        description: The law governing the legal agreement, e.g. English Law, New York Law or Japanese Law.
    in_subset:
      - cdm_legaldocumentation_common

  AgreementName:
    description: Specifies the agreement name through an agreement type and optional detailed sub agreement type.
    close_mappings:
      - fpml_5_10:AgreementName
    rules:
      - description: A condition to ensure that the credit supoort agreement type is specified when required.
        preconditions:
          slot_conditions:
            agreementType:
              equals_string: CreditSupportAgreement
        postconditions:
          slot_conditions:
            creditSupportAgreementType:
              required: true
      - description: If a master confirmation annex type is specified a master confirmation type must exist.
        preconditions:
          slot_conditions:
            masterConfirmationAnnexType:
              required: true
        postconditions:
          slot_conditions:
            masterConfirmationType:
              required: true
      - description: A condition to ensure that CSA margin type is only specified if a credit support agreemnt type is specified.
        preconditions:
          slot_conditions:
            creditSupportAgreementMarginType:
              required: true
        postconditions:
          slot_conditions:
            creditSupportAgreementType:
              required: true
    comments:
      - 'Rosetta condition: AgreementType — if agreementType <> LegalAgreementTypeEnum -> Other then otherAgreement is absent
        else if agreementType <> LegalAgreementTypeEnum -> MasterAgreement then masterAgreementType is absent else if agreementType
        <> LegalAgreementTypeEnum -> MasterConfirmation then masterConfirmationType is absent and masterConfirmationAnnexType
        is absent else if agreementType <> LegalAgreementTypeEnum -> Confirmation then contractualDefinitionsType is absent
        and contractualTermsSupplement is absent and contractualMatrix is absent'
      - 'Rosetta condition: CreditSupportAgreement — if agreementType = LegalAgreementTypeEnum -> CreditSupportAgreement then
        creditSupportAgreementType exists'
      - 'Rosetta condition: MasterConfirmation — if masterConfirmationAnnexType exists then masterConfirmationType exists'
      - 'Rosetta condition: CSAMarginType — if creditSupportAgreementMarginType exists then creditSupportAgreementType exists'
    slots:
      - agreementType
      - creditSupportAgreementType
      - creditSupportAgreementMarginType
      - contractualDefinitionsType
      - contractualTermsSupplement
      - contractualMatrix
      - masterAgreementType
      - masterConfirmationType
      - masterConfirmationAnnexType
      - otherAgreement
      - brokerConfirmationType
    in_subset:
      - cdm_legaldocumentation_common

  UmbrellaAgreement:
    description: Specifies the set of agreements, the parties of which are set within UmbrellaAgreementSet, beyond the two
      contracting parties to that agreement.
    slots:
      - agreementSet
    in_subset:
      - cdm_legaldocumentation_common

  UmbrellaAgreementParty:
    description: Specifies the entities that are part of the umbrella agreement.
    rules:
      - description: Specifies that certain defined roles require that a parent party is identified.
        preconditions:
          slot_conditions:
            partyRole:
              equals_string: Sleeve
        postconditions:
          slot_conditions:
            parentParty:
              required: true
      - description: Only a Party or a non-Legal entity can be set.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                party:
                  required: true
            - slot_conditions:
                nonLegalEntity:
                  required: true
        preconditions: {}
      - description: Non-Legal entity must have a Parent Party.
        preconditions:
          slot_conditions:
            nonLegalEntity:
              required: true
        postconditions:
          slot_conditions:
            parentParty:
              required: true
    comments:
      - 'Rosetta condition: ParentParty — if partyRole = UmbrellaPartyRoleEnum -> Sleeve then parentParty exists'
      - 'Rosetta condition: UmbrellaParty — required choice party, nonLegalEntity'
      - 'Rosetta condition: NonLegalEntityParent — if nonLegalEntity exists then parentParty exists'
    slots:
      - party
      - actingAs
      - partyRole
      - nonLegalEntity
      - parentParty
    slot_usage:
      party:
        range: Party
        description: Specifies the party to the umbrella agreement
      partyRole:
        range: UmbrellaPartyRoleEnum
        description: Represents the legal role that each defined entity to the agreement performs within the structure of
          that agreement.
    in_subset:
      - cdm_legaldocumentation_common

  NonLegalEntity:
    description: Specifies a non-legal entity that exists in the agreement with a defined relationship to a Legal entity to
      the agreement
    slots:
      - identifier
      - identifierType
    slot_usage:
      identifier:
        range: string
        description: Specifies the unique identifier value for a non-legal entity such as a sleeve, or sub account, that is
          a party to the agreement and has a relationship with a legal entity defined on the agreement.
        multivalued: false
      identifierType:
        range: string
        description: Specifies the Identifier type for a non-Legal entity to the agreement, for example the use of an alert
          code to uniquely identify a non-Legal entity.
    in_subset:
      - cdm_legaldocumentation_common

  UmbrellaAgreementSet:
    description: Represents the groups of agreement term elections that exist within the agreement and to which entities that
      particular group of elections apply. Where all entities under the umbrella have the same set of elections only one agreement
      set will exist. At least one agreement set must be defined for an Umbrella agreement
    comments:
      - 'Rosetta condition: ExcludeGMSLA — agreement -> masterAgreementElections -> islaGmsla is absent'
    slots:
      - agreement
      - party
      - additionalLanguage
    slot_usage:
      party:
        range: UmbrellaAgreementParty
        description: Specifies the underlying parties to the agreement that either act as legal parties to the agreement or
          represent legal constructs that are managed by a party to the agreement but do not represent a Legal Entity as of
          themselves.
        required: true
        multivalued: true
    in_subset:
      - cdm_legaldocumentation_common

  ContactInformationElection:
    description: Specifies the party reference and the associated contact information.
    slots:
      - partyReference
      - primaryContactInformation
    slot_usage:
      partyReference:
        range: CounterpartyRoleEnum
        description: The party to which the election and details apply.
    in_subset:
      - cdm_legaldocumentation_common

  NoticeInformationElection:
    description: Specifies the party reference and the associated notice and contact information.
    is_a: ContactInformationElection
    slots:
      - additionalContactInformation
    in_subset:
      - cdm_legaldocumentation_common

  NoticeContactInformation:
    description: Specifies notice information including address and, optionally, an associated person. This type also supports
      the ISDA CSA representation as a single string, through the address attribute in Contact Information.
    is_a: ContactInformation
    slots:
      - naturalPerson
      - additionalInformation
    in_subset:
      - cdm_legaldocumentation_common

  TransferInformationElection:
    description: Specifies the party reference and the associated transfer & contact information.
    is_a: ContactInformationElection
    in_subset:
      - cdm_legaldocumentation_common

  TransferContactInformation:
    description: Specifies transfer information including address and, optionally, an associated account. This type also supports
      the ISDA CSA representation as a single string, through the address attribute in Contact Information.
    is_a: ContactInformation
    slots:
      - account
      - additionalInformation
    slot_usage:
      account:
        description: Specifies the account infomation for transfers to a party.
        multivalued: true
      additionalInformation:
        description: Additional transfer information.
    in_subset:
      - cdm_legaldocumentation_common

  OtherAgreementTerms:
    description: 'A class to specify a related legal agreement. For example, ISDA 2016 Credit Support Annex for Initial Margin,
      paragraph 13, General Principles, (s): Other CSA and Japanese Law CSA (VM). | ISDA 2016 Credit Support Annex for Variation
      Margin, paragraph 13, (o): Other CSA.'
    rules:
      - description: A data rule to enforce that the related legal agreement should not be referenced if it is deemed as not
          specified as part of the boolean attribute.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'False'
        postconditions:
          slot_conditions:
            legalDocument:
              required: false
      - description: A data rule to enforce that the related legal agreement should be referenced if it is deemed as specified
          as part of the boolean attribute.
        preconditions:
          slot_conditions:
            isSpecified:
              equals_string: 'True'
        postconditions:
          slot_conditions:
            legalDocument:
              required: true
    comments:
      - 'Rosetta condition: LegalDocumentNotSpecified — if isSpecified = False then legalDocument is absent'
      - 'Rosetta condition: LegalDocumentSpecified — if isSpecified = True then legalDocument exists'
    slots:
      - isSpecified
      - legalDocument
    in_subset:
      - cdm_legaldocumentation_common

  Agreement:
    description: Specification of the standard set of terms that define a legal agreement.
    close_mappings:
