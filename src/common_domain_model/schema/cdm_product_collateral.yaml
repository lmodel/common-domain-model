comments:
  - 'Rosetta func: CloneEligibleCollateralWithChangedTreatment — Creates a new Eligible Collateral Specification based on
    an input specification but with one changed criteria and with one changed treatment. | inputs(inputSpecification: EligibleCollateralSpecification
    (1..1), changedCriteria: CollateralCriteria (1..1), changedTreatment: CollateralTreatment (1..1)) | output(outputSpecification:
    EligibleCollateralSpecification (1..1))'
  - 'Rosetta func: CreateAndCriteria — Combines multiple CollateralCriteria together using AND logic. | inputs(inputCriteria:
    CollateralCriteria (2..*)) | output(outputCriteria: CollateralCriteria (1..1))'
  - 'Rosetta func: CreateOrCriteria — Combines multiple CollateralCriteria together using OR logic. | inputs(inputCriteria:
    CollateralCriteria (2..*)) | output(outputCriteria: CollateralCriteria (1..1))'
  - 'Rosetta func: CheckEligibilityForProduct | inputs(specifications: EligibleCollateralSpecification (1..*), product: TransferableProduct
    (0..1)) | output(eligibilityResult: CheckEligibilityResult (0..1))'
  - 'Rosetta func: CheckEligibilityByDetails — This function when presented with a set of Asset and Issuer details to be potentially
    posted as collateral, will check against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification)
    to determine which collateral meets the eligibility and can be used/posted for delivery. | inputs(specification: EligibleCollateralSpecification
    (1..1), query: EligibilityQuery (1..1)) | output(eligibilityResult: CheckEligibilityResult (1..1))'
  - 'Rosetta func: CheckCriteria — This function takes a single criteria and evaluates it against the criteria.  This function
    handles the recursive use of AND and OR logic. | inputs(inputCriteria: CollateralCriteria (1..1), query: EligibilityQuery
    (1..1)) | output(isEligible: boolean (1..1))'
  - 'Rosetta func: CheckCountryOfOrigin | inputs(countryOfOrigin: ISOCountryCodeEnum (0..1), query: EligibilityQuery (1..1))
    | output(isEqual: boolean (1..1))'
  - 'Rosetta func: CheckAgencyRating | inputs(agencyRatings: AgencyRatingCriteria (0..1), query: EligibilityQuery (1..1))
    | output(isEqual: boolean (1..1))'
  - 'Rosetta func: CheckAssetType | inputs(collateralAssetTypes: AssetType (0..1), query: EligibilityQuery (1..1)) | output(isEqual:
    boolean (1..1))'
  - 'Rosetta func: CheckDebtType | inputs(collateralDebtTypes: DebtType (0..1), query: EligibilityQuery (1..1)) | output(isEqual:
    boolean (1..1))'
  - 'Rosetta func: CheckDenominatedCurrency | inputs(denominatedCurrency: CurrencyCodeEnum (0..1), query: EligibilityQuery
    (1..1)) | output(isEqual: boolean (1..1))'
  - 'Rosetta func: CheckMaturity | inputs(maturityRange: AssetMaturity (0..1), query: EligibilityQuery (1..1)) | output(isEqual:
    boolean (1..1))'
  - 'Rosetta func: CheckIssuerName | inputs(issuerName: IssuerName (0..1), query: EligibilityQuery (1..1)) | output(isEqual:
    boolean (1..1))'
  - 'Rosetta func: CheckIssuerType | inputs(issuerType: CollateralIssuerType (0..1), query: EligibilityQuery (1..1)) | output(isEqual:
    boolean (1..1))'
  - 'Rosetta func: CriteriaMatchesSecurityType | inputs(inputCriteria: CollateralCriteria (0..1), securityType: SecurityTypeEnum
    (0..1)) | output(matches: boolean (1..1))'
annotations:
  rosetta_functions: '[{"name":"CloneEligibleCollateralWithChangedTreatment","description":"Creates a new Eligible Collateral
    Specification based on an input specification but with one changed criteria and with one changed treatment.","inputs":[{"name":"inputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"changedCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"changedTreatment","type":"CollateralTreatment","cardinality":"1..1"}],"output":{"name":"outputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"}},{"name":"CreateAndCriteria","description":"Combines
    multiple CollateralCriteria together using AND logic.","inputs":[{"name":"inputCriteria","type":"CollateralCriteria","cardinality":"2..*"}],"output":{"name":"outputCriteria","type":"CollateralCriteria","cardinality":"1..1"}},{"name":"CreateOrCriteria","description":"Combines
    multiple CollateralCriteria together using OR logic.","inputs":[{"name":"inputCriteria","type":"CollateralCriteria","cardinality":"2..*"}],"output":{"name":"outputCriteria","type":"CollateralCriteria","cardinality":"1..1"}},{"name":"CheckEligibilityForProduct","inputs":[{"name":"specifications","type":"EligibleCollateralSpecification","cardinality":"1..*"},{"name":"product","type":"TransferableProduct","cardinality":"0..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"0..1"},"code_implementation":true},{"name":"CheckEligibilityByDetails","description":"This
    function when presented with a set of Asset and Issuer details to be potentially posted as collateral, will check against
    a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification) to determine which collateral meets the
    eligibility and can be used/posted for delivery.","inputs":[{"name":"specification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"1..1"}},{"name":"CheckCriteria","description":"This
    function takes a single criteria and evaluates it against the criteria.  This function handles the recursive use of AND
    and OR logic.","inputs":[{"name":"inputCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEligible","type":"boolean","cardinality":"1..1"}},{"name":"CheckCountryOfOrigin","inputs":[{"name":"countryOfOrigin","type":"ISOCountryCodeEnum","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckAgencyRating","inputs":[{"name":"agencyRatings","type":"AgencyRatingCriteria","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckAssetType","inputs":[{"name":"collateralAssetTypes","type":"AssetType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckDebtType","inputs":[{"name":"collateralDebtTypes","type":"DebtType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckDenominatedCurrency","inputs":[{"name":"denominatedCurrency","type":"CurrencyCodeEnum","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckMaturity","inputs":[{"name":"maturityRange","type":"AssetMaturity","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckIssuerName","inputs":[{"name":"issuerName","type":"IssuerName","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckIssuerType","inputs":[{"name":"issuerType","type":"CollateralIssuerType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CriteriaMatchesSecurityType","inputs":[{"name":"inputCriteria","type":"CollateralCriteria","cardinality":"0..1"},{"name":"securityType","type":"SecurityTypeEnum","cardinality":"0..1"}],"output":{"name":"matches","type":"boolean","cardinality":"1..1"}}]'

subsets:
  cdm_product_collateral:
    description: Classes defined in the cdm_product_collateral module.

enums:
  CollateralTypeEnum:
    description: Specifies the types of collateral that are accepted by the Lender
    exact_mappings:
      - http://www.fpml.org/coding-scheme/collateral-type
    permissible_values:
      Cash:
        description: Security Lending Trades against Cash collateral
      NonCash:
        description: Security Lending Trades against NonCash collateral
      CashPool:
        description: Security Lending Trades against CashPool collateral

  ConcentrationLimitTypeEnum:
    description: Represents the enumerated values to identify where a concentration limit is applied in the eligible collateral
      schedule.
    permissible_values:
      Asset:
        description: Specifies a limit on a single asset in the eligible collateral schedule
      BaseCurrencyEquivalent:
        description: Specifies a limit on all cash valued in the base currency of the eligible collateral schedule.
      Issuer:
        description: Specifies a limit on a single issuer in the eligible collateral schedule.
      PrimaryExchange:
        description: Specifies a limit on a single exchange in the eligible collateral schedule.
      IndustrySector:
        description: Specifies a limit on a single industry sector in the eligible collateral schedule.
      UltimateParentInstitution:
        description: Specifies a limit on a single issuer in the eligible collateral schedule at the ultimate parent institution
          level.
      IssueOutstandingAmount:
        description: Specifies a limit of the issue compared to the outstanding amount of the asset on the market.
      MarketCapitalisation:
        description: Specifies a limit of the issue calculated as a percentage of the market capitalisation of the asset on
          the market.
      OutstandingBalance:
        description: Specifies a limit on the total outstanding balance for an asset in the portfolio.

  AverageTradingVolumeMethodologyEnum:
    description: Indicates the type of equity average trading volume (single) the highest amount on one exchange, or (consolidated)
      volumes across more than one exchange.
    permissible_values:
      Single:
        description: Single, the highest amount on one exchange.
      Consolidated:
        description: Consolidated volume across more than one exchange.

  CreditSupportAgreementTypeEnum:
    description: The enumerated values to specify the type of Credit Support Agreement governing the transaction.
    exact_mappings:
      - http://www.fpml.org/coding-scheme/credit-support-agreement-type
    permissible_values:
      CreditSupportDeed:
        description: A Credit Support Deed legal agreement.
      CreditSupportAnnex:
        description: A Credit Support Annex legal agreement.
      CollateralTransferAgreement:
        description: A Collateral Transfer Agreement

  AlternativeToInterestAmountEnum:
    description: If there is an alternative to interest amounts, how is it specified?
    permissible_values:
      Standard:
        description: Interest amount is not transferred if transfer would create or increase a delivery amount.
      ActualAmountReceived:
        description: The standard calculation of the Interest Amount is replaced with the amount of interest the secured party
          actually receives in relation to the Cash collateral.
      TransferIfDeliveryAmountBelowMTA:
        description: Interest amount is not transferred if transfer would create or increase a delivery amount. (This is the
          'Standard' provision). However, interest Amount will be transferred if Delivery Amount is below Minimum Transfer
          Amount.
      Other:
        description: An other alternative option outside these choices that can be described as an alternative provision.

  CollateralInterestHandlingEnum:
    description: How is collateral interest to be handled?
    permissible_values:
      Transfer:
        description: ' Transfer the interest each period '
      Adjust:
        description: ' Adjust the collateral balance to include the interest amount '
      Transfer_or_Adjust:
        description: ' Transfer the interest if it meets certain criteria, or otherwise adjust the collateral balance to reflect
          the interest amount  '

  DeliveryAmountElectionEnum:
    description: The enumerated values to specify the application of Interest Amount with respect to the Delivery Amount through
      standard language.
    permissible_values:
      LastLocalBusinessDay:
        description: The delivery only includes `Transfer on last Local Business Day.
      LastAndAnyLocalBusinessDay:
        description: The delivery includes both `Transfer on last Local Business Day` and `Transfer a Delivery Amount (IM)
          consisting of cash on any Local Business Day.`

  CollateralMarginTypeEnum:
    description: The enumerated values to specify the type of margin for which a legal agreement is named.
    permissible_values:
      VariationMargin:
        description: Denotes a margin agreement that is identified for use with Variation Margin/VM.
      InitialMargin:
        description: Denotes a margin agreement that is identified for use with Initial Margin/IM.

  RatingPriorityResolutionEnum:
    description: Represents an enumeration list to identify which Collateral Criteria type should have priority over others.
      If set to 'Issuer', the rating in the  Issuer Criteria has priority or is used if there is no Asset criteria. If set
      to 'Asset', the rating in the Asset Criteria has priority or is used if there is no Issuer rating.
    permissible_values:
      Issuer:
        description: Denotes that the Issuer Criteria has priority.
      Asset:
        description: Denotes that the Asset Criteria has priority.
      Lowest:
        description: Denotes that lowest rating should be used if several criteria apply.
      Highest:
        description: Denotes that highest rating should be used if several criteria apply.
      Average:
        description: Denotes that average rating should be used if several criteria apply.

  CollateralEquityIndexEnum:
    description: The enumerated values to specify an Equity index.
