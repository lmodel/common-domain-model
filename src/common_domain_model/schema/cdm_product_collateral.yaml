slots:
  maturity:
    range: decimal
    description: Maturity in years
    required: true

  collateralAssetType:
    range: AssetType
    description: The asset product type.
    required: true

  assetCountryOfOrigin:
    range: ISOCountryCodeEnum
    description: The asset country of origin.
    required: true

  denominatedCurrency:
    range: CurrencyCodeEnum
    description: The underlying asset denominated currency.
    required: true

  agencyRating:
    range: AgencyRatingCriteria
    description: The agency rating based on default risk and creditors claim in event of default associated with specific
      instrument.
    required: true

  issuerName:
    range: LegalEntity
    description: Specifies the issuing entity name or LEI.
    required: true

  isEligible:
    range: boolean
    description: a simple boolean which is set to true if the asset described in the EligibilityQuery input is eligible
    required: true

  matchingEligibleCriteria:
    range: EligibleCollateralCriteria
    description: if there was a match, this will be the one or more criteria that were supplied in the EligbilityCollateralSpecification
      which matched with the query input
    multivalued: true
    inlined_as_list: true

  eligibilityQuery:
    range: EligibilityQuery
    description: a copy of the input query that was checked against the eligible collateral specification
    required: true

  specification:
    range: EligibleCollateralSpecification
    description: a copy of the input EligbilityCollateralSpecification that was checked against the query
    required: true

  collateralProvisions:
    range: CollateralProvisions
    description: specifies the collateral provisions of the product.
    close_mappings:
      - fpml_5_10:Collateral.collateralProvisions

  collateralType:
    range: CollateralTypeEnum
    description: Enumerates the collateral types which are accepted by the Seller.
    required: true
    related_mappings:
      - icma:GMRA#marginType
    close_mappings:
      - fpml_5_10:CollateralProvisions.collateralType

  substitutionProvisions:
    range: SubstitutionProvisions
    description: The provisions for collateral substitutions such as how many and when they are allowed.
    close_mappings:
      - fpml_5_10:CollateralProvisions.substitutionProvisions

  numberOfSubstitutionsAllowed:
    range: integer
    description: Specifies if 1 or more substitutions are allowed.

  noticeDeadlinePeriod:
    range: Period
    description: Defines the min period for notify of a substitution.

  noticeDeadlineDateTime:
    range: datetime
    description: A specific date and time for the notice deadline

  paymentDetail:
    range: PaymentDetail
    description: An attribute that specifies a payment as the combination of a payment amount, a payment date and an associated
      payment calculation rule.
    required: true
    multivalued: true
    inlined_as_list: true

  boundary:
    range: CreditNotationBoundaryEnum
    description: Indicates the boundary of a credit agency rating i.e minimum or maximum.
    close_mappings:
      - fpml_5_10:AgencyRatingCriteria.boundary

  marginPercentage:
    range: decimal
    description: Specifies a percentage value of transaction needing to be posted as collateral expressed as a valuation.
      As an example a 104% requirement would be represented as a decimal number 1.04.
    related_mappings:
      - icma:GMRA#Margin_Ratio
      - icma:ERCCBestPractice#Margin_Ratio
    close_mappings:
      - fpml_5_10:CollateralValuationTreatment.marginPercentage

  collateralCriteria:
    range: CollateralCriteria
    description: The specific criteria that applies. It can be created using AND, OR and NOT logic, and both asset and issuer
      characteristics.
    any_of:
      - range: AllCriteria
      - range: AnyCriteria
      - range: NegativeCriteria
      - range: CollateralIssuerType
      - range: CollateralGuarantorType
      - range: AssetType
      - range: IssuerCountryOfOrigin
      - range: AssetCountryOfOrigin
      - range: CurrencyCodeEnum
      - range: IssuerName
      - range: IssuerAgencyRating
      - range: SovereignAgencyRating
      - range: AssetAgencyRating
      - range: AssetMaturity
      - range: SpecificAsset
      - range: CollateralTaxonomy
      - range: ListingExchange
      - range: ListingSector
      - range: IndexType
      - range: CounterpartyOwnIssuePermitted
      - range: DomesticCurrencyIssued
    close_mappings:
      - fpml_5_10:CollateralCriteriaBase.collateralCriteria

  appliesTo:
    range: CounterpartyRoleEnum
    description: Specifies which of the two counterparties the criteria applies to (either one or both counterparties). This
      attribute is optional, in case the applicable party is already specified elsewhere within a party election.
    multivalued: true
    close_mappings:
      - fpml_5_10:CollateralCriteriaBase.appliesTo

  restrictTo:
    range: CollateralMarginTypeEnum
    description: Restrict the criteria to only apply to a specific type of margin, ie IM or VM.
    close_mappings:
      - fpml_5_10:CollateralCriteriaBase.restrictTo

  ratingPriorityResolution:
    range: RatingPriorityResolutionEnum
    description: Denotes which Criteria has priority if more than one agency rating applies.
    close_mappings:
      - fpml_5_10:CollateralCriteriaBase.ratingPriorityResolution

  valuationTreatment:
    range: CollateralValuationTreatment
    description: Specification of the valuation treatment for the specified collateral.
    related_mappings:
      - icma:GMRA#marginRatio
    close_mappings:
      - fpml_5_10:CollateralTreatment.valuationTreatment

  concentrationLimit:
    range: ConcentrationLimit
    description: Specification of concentration limits applicable to the collateral criteria.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:CollateralTreatment.concentrationLimit

  isIncluded:
    range: boolean
    description: A boolean attribute to specify whether collateral critieria are inclusion (True) or exclusion (False) criteria.
    required: true
    close_mappings:
      - fpml_5_10:CollateralTreatment.isIncluded

  concentrationLimitCriteria:
    range: ConcentrationLimitCriteria
    description: Specifies a set of criteria to describe the assets that the concentration limits apply to.

  valueLimit:
    range: MoneyRange
    description: Specifies the value of collateral limit represented as a range.

  percentageLimit:
    range: NumberRange
    description: Specifies the perecentage of collateral limit represented as a decimal number - example 25% is 0.25.

  concentrationLimitType:
    range: ConcentrationLimitTypeEnum
    description: Specifies the type of concentration limit to be applied.

  averageTradingVolume:
    range: AverageTradingVolume
    description: Specifies an average trading volume on an exchange in relation to Equity products.

  methodology:
    range: AverageTradingVolumeMethodologyEnum
    description: Indicates the type of equity average trading volume being stated (single) the highest amount on one exchange,
      or (consolidated) volumes across multiple exchanges.
    required: true
    close_mappings:
      - fpml_5_10:AverageTradingVolume.methodology

  issuerCountryOfOrigin:
    range: ISOCountryCodeEnum
    description: Represents a filter on the issuing entity country of origin based on the ISO Standard 3166, which is the
      same as filtering by eligible Sovereigns.
    required: true

  issuerAgencyRating:
    range: AgencyRatingCriteria
    description: Represents an agency rating based on default risk and creditors claim in event of default associated with
      asset issuer.
    required: true

  sovereignAgencyRating:
    range: AgencyRatingCriteria
    description: Represents an agency rating based on default risk of the country of the issuer.
    required: true

  assetAgencyRating:
    range: AgencyRatingCriteria
    description: Represents an agency rating based on default risk and creditors claim in event of default associated with
      specific instrument.
    required: true

  maturityType:
    range: MaturityTypeEnum
    description: Specifies whether the maturity range is the remaining or original maturity.
    required: true
    close_mappings:
      - fpml_5_10:AssetMaturity.maturityType

  maturityRange:
    range: PeriodRange
    description: Represents a filter based on the underlying asset maturity.
    required: true
    close_mappings:
      - fpml_5_10:AssetMaturity.maturityRange

  sector:
    range: string
    description: Represents a filter based on an industry sector defined under a system for classifying industry types such
      as Global Industry Classification Standard (GICS) and North American Industry Classification System (NAICS)
    required: true
    multivalued: true
    annotations:
      metadata_scheme: true

  domesticCurrencyIssued:
    range: boolean
    description: Identifies that the Security must be denominated in the domestic currency of the issuer.
    required: true

  counterpartyOwnIssuePermitted:
    range: boolean
    description: Represents a filter based on whether it is permitted for the underlying asset to be issued by the posting
      entity or part of their corporate family.
    required: true

  negativeCriteria:
    range: CollateralCriteria
    any_of:
      - range: AllCriteria
      - range: AnyCriteria
      - range: NegativeCriteria
      - range: CollateralIssuerType
      - range: CollateralGuarantorType
      - range: AssetType
      - range: IssuerCountryOfOrigin
      - range: AssetCountryOfOrigin
      - range: CurrencyCodeEnum
      - range: IssuerName
      - range: IssuerAgencyRating
      - range: SovereignAgencyRating
      - range: AssetAgencyRating
      - range: AssetMaturity
      - range: SpecificAsset
      - range: CollateralTaxonomy
      - range: ListingExchange
      - range: ListingSector
      - range: IndexType
      - range: CounterpartyOwnIssuePermitted
      - range: DomesticCurrencyIssued
    required: true

  interestParameters:
    range: CollateralInterestParameters
    description: Represents the interest parameters for the various currencies, margin types, posting parties.
    multivalued: true
    inlined_as_list: true

  marginType:
    range: CollateralMarginTypeEnum
    description: Specifies the type of margin for which interest is being calculated, if the parameters are different depending
      on type of margin (initial or variation).
    close_mappings:
      - fpml_5_10:CollateralInterestParameters.marginType

  interestCalculationParameters:
    range: CollateralInterestCalculationParameters
    description: Represents the basic interest calculation parameters.
    close_mappings:
      - fpml_5_10:CollateralInterestParameters.interestCalculationParameters

  interestCalculationFrequency:
    range: CalculationFrequency
    description: Represents how often and when interest is calculated.
    close_mappings:
      - fpml_5_10:CollateralInterestParameters.interestCalculationFrequency

  interestHandlingParameters:
    range: CollateralInterestHandlingParameters
    description: Represents the parameters describing how and when interest transfer occurs.
    close_mappings:
      - fpml_5_10:CollateralInterestParameters.interestHandlingParameters

  inBaseCurrency:
    range: boolean
    description: If True, specifies that the interest transfers should be converted to base currency equivalent, or if False
      specifies that the transfer should be in the currency of the collateral.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters.inBaseCurrency

  compoundingType:
    range: CompoundingTypeEnum
    description: Specifies the type of compounding to be applied (None, Business, Calendar).
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters.compoundingType

  compoundingBusinessCenter:
    range: BusinessCenter
    description: Specifies the applicable business centers for compounding.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters.compoundingBusinessCenter

  roundingFrequency:
    range: RoundingFrequencyEnum
    description: Specifies when/how often is rounding applied?
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters.roundingFrequency

  withholdingTaxRate:
    range: decimal
    description: Specifies the withholding tax rate if a withholding tax is applicable.
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters.withholdingTaxRate

  negativeInterest:
    range: boolean
    description: Specifies how negative rates should be applied.  If rates go negative, should the payment be reversed (true)
      or zeroed out (false)?
    required: true
    close_mappings:
      - fpml_5_10:CollateralAgreementFloatingRate.negativeInterest

  compressibleSpread:
    range: boolean
    description: Specifies how spreads should be applied in a low/negative rate environment.  If true, spread is applied only
      if rate is positive.
    required: true
    close_mappings:
      - fpml_5_10:CollateralAgreementFloatingRate.compressibleSpread

  interestPaymentHandling:
    range: CollateralInterestHandlingEnum
    description: Specifies how the collateral interest is to be handled.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.interestPaymentHandling

  paymentBusinessCenter:
    range: BusinessCenter
    description: Specifies applicable business centers for payments.
    multivalued: true
    inlined_as_list: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.paymentBusinessCenter

  netPostedAndHeldInterest:
    range: boolean
    description: Indicates whether to net Held and Posted Interest Payments (i.e. whether interest payable for a period can
      be netted with interest receivable).
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.netPostedAndHeldInterest

  netInterestWithMarginCalls:
    range: boolean
    description: Indicates whether the interest amount may be offset against any margin call deliver or return amounts?   (aka
      'net payments' indicator).
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.netInterestWithMarginCalls

  includeAccrualInMarginCalc:
    range: boolean
    description: Indicates whether or not to include the open interest accrual in the margin calculation.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.includeAccrualInMarginCalc

  accrueInterestOnUnsettledInterest:
    range: boolean
    description: Indicates whether interest accruing on unsettled interest amount is included (continues to be accrued) in
      the following period.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.accrueInterestOnUnsettledInterest

  onFullReturn:
    range: boolean
    description: Indicates the option that accrued interest should be calculated and distributed when a full return of collateral
      occurs.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.onFullReturn

  onPartialReturn:
    range: boolean
    description: Indicates the option that accrued interest should be calculated and distributed when a partial return collateral
      occurs.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.onPartialReturn

  interestAmountApplication:
    range: InterestAmountApplication
    description: The application of Interest Amount with respect to the Delivery Amount and the Return Amount.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.interestAmountApplication

  interestRolloverLimit:
    range: NumberBound
    description: Specifies the level below which the interest will be rolled over.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.interestRolloverLimit

  writeoffLimit:
    range: NumberBound
    description: Specifies the level below which the interest will be written off; if omitted write-off is not applicable.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.writeoffLimit

  alternativeToInterestAmount:
    range: AlternativeToInterestAmountEnum
    description: Specifies the alternative to interest amounts.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.alternativeToInterestAmount

  alternativeProvision:
    range: string
    description: Specifies an alternative to interest amount, when the alternative provision clause is specified.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.alternativeProvision

  cutoffTime:
    range: time
    description: Specifies the time of day that interest needs to be confirmed by.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.cutoffTime

  notification:
    range: CollateralInterestNotification
    description: Specifies the terms describing notification requirements.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters.notification

  notificationDayType:
    range: DayTypeEnum
    description: The type of days on which notification should occur.
    required: true
    close_mappings:
      - fpml_5_10:CollateralInterestNotification.notificationDayType

  includesDefaultLanguage:
    range: boolean
    description: Default language is included when True, and excluded when False.

  equityIndex:
    range: CollateralEquityIndexEnum
    description: An enumerated list for equity indices.

classes:
  EligibilityQuery:
    description: Query to check against an EligibleCollateralSpecification
    comments:
      - 'Rosetta func: CheckEligibilityByDetails — This function when presented with a set of Asset and Issuer details to
        be potentially posted as collateral, will check against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification)
        to determine which collateral meets the eligibility and can be used/posted for delivery.'
      - 'Rosetta func: CheckCriteria — This function takes a single criteria and evaluates it against the criteria.  This
        function handles the recursive use of AND and OR logic.'
      - 'Rosetta func: CheckCountryOfOrigin'
      - 'Rosetta func: CheckAgencyRating'
      - 'Rosetta func: CheckAssetType'
      - 'Rosetta func: CheckDebtType'
      - 'Rosetta func: CheckDenominatedCurrency'
      - 'Rosetta func: CheckMaturity'
      - 'Rosetta func: CheckIssuerName'
      - 'Rosetta func: CheckIssuerType'
    annotations:
      rosetta_functions: '[{"name":"CheckEligibilityByDetails","description":"This function when presented with a set of Asset
        and Issuer details to be potentially posted as collateral, will check against a set of given Eligibility Criteria
        or Basket (EligibleCollateralSpecification) to determine which collateral meets the eligibility and can be used/posted
        for delivery.","inputs":[{"name":"specification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"1..1"}},{"name":"CheckCriteria","description":"This
        function takes a single criteria and evaluates it against the criteria.  This function handles the recursive use of
        AND and OR logic.","inputs":[{"name":"inputCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEligible","type":"boolean","cardinality":"1..1"}},{"name":"CheckCountryOfOrigin","inputs":[{"name":"countryOfOrigin","type":"ISOCountryCodeEnum","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckAgencyRating","inputs":[{"name":"agencyRatings","type":"AgencyRatingCriteria","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckAssetType","inputs":[{"name":"collateralAssetTypes","type":"AssetType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckDebtType","inputs":[{"name":"collateralDebtTypes","type":"DebtType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckDenominatedCurrency","inputs":[{"name":"denominatedCurrency","type":"CurrencyCodeEnum","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckMaturity","inputs":[{"name":"maturityRange","type":"AssetMaturity","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckIssuerName","inputs":[{"name":"issuerName","type":"IssuerName","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}},{"name":"CheckIssuerType","inputs":[{"name":"issuerType","type":"CollateralIssuerType","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}}]'
    slots:
      - maturity
      - collateralAssetType
      - assetCountryOfOrigin
      - denominatedCurrency
      - agencyRating
      - issuerType
      - issuerName
    slot_usage:
      issuerType:
        range: CollateralIssuerType
        description: Represents a filter based on the type of entity issuing the asset.
    in_subset:
      - cdm_product_collateral

  CheckEligibilityResult:
    description: Result for the CheckEligibilityByDetails and CheckEligibilityForProduct functions
    comments:
      - 'Rosetta func: CheckEligibilityForProduct'
      - 'Rosetta func: CheckEligibilityByDetails — This function when presented with a set of Asset and Issuer details to
        be potentially posted as collateral, will check against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification)
        to determine which collateral meets the eligibility and can be used/posted for delivery.'
    annotations:
      rosetta_functions: '[{"name":"CheckEligibilityForProduct","inputs":[{"name":"specifications","type":"EligibleCollateralSpecification","cardinality":"1..*"},{"name":"product","type":"TransferableProduct","cardinality":"0..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"0..1"},"code_implementation":true},{"name":"CheckEligibilityByDetails","description":"This
        function when presented with a set of Asset and Issuer details to be potentially posted as collateral, will check
        against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification) to determine which collateral
        meets the eligibility and can be used/posted for delivery.","inputs":[{"name":"specification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"1..1"}}]'
    slots:
      - isEligible
      - matchingEligibleCriteria
      - eligibilityQuery
      - specification
    in_subset:
      - cdm_product_collateral

  Collateral:
    description: A type for defining the obligations of the counterparty subject to credit support requirements.
    annotations:
      metadata_key: true
    close_mappings:
      - fpml_5_10:Collateral
    rules:
      - description: Collateral must represent either a simple independent amount or full collateral portfolio.
        postconditions:
          any_of:
            - slot_conditions:
                independentAmount:
                  required: true
            - slot_conditions:
                collateralPortfolio:
                  required: true
        preconditions: {}
      - description: When a collateral portfolio is provided, collateral provisions must exists that govern this collateral.
        preconditions:
          slot_conditions:
            collateralPortfolio:
              required: true
        postconditions:
          slot_conditions:
            collateralProvisions:
              required: true
      - description: Collateralchoice
        postconditions:
          any_of:
            - slot_conditions:
                independentAmount:
                  required: true
            - slot_conditions:
                portfolioIdentifier:
                  required: true
            - slot_conditions:
                collateralPortfolio:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: CollateralExists — independentAmount exists or collateralPortfolio exists'
      - 'Rosetta condition: CollateralProvisions — if collateralPortfolio exists then collateralProvisions exists'
      - 'Rosetta condition: Collateralchoice — optional choice independentAmount, portfolioIdentifier, collateralPortfolio'
    slots:
      - independentAmount
      - portfolioIdentifier
      - collateralPortfolio
      - collateralProvisions
    slot_usage:
      independentAmount:
        range: IndependentAmount
        description: 'Independent Amount is an amount that usually less creditworthy counterparties are asked to provide.
          It can either be a fixed amount or a percentage of the Transaction''s value. The Independent Amount can be: (i)
          transferred before any trading between the parties occurs (as a deposit at a third party''s account or with the
          counterparty) or (ii) callable after trading has occurred (typically because a downgrade has occurred). In situation
          (i), the Independent Amount is not included in the calculation of Exposure, but in situation (ii), it is included
          in the calculation of Exposure. Thus, for situation (ii), the Independent Amount may be transferred along with any
          collateral call. Independent Amount is a defined term in the ISDA Credit Support Annex. (''with respect to a party,
          the amount specified as such for that party in Paragraph 13; if no amount is specified, zero'').'
        required: false
      portfolioIdentifier:
        description: A list of identifiers pointing to the collateral portfolios which contain the collateral which covers
          a trade.
        multivalued: true
      collateralPortfolio:
        description: 'The collateral portfolios which contain the collateral which covers a trade. (NB: this can be provided
          by reference to a global key for each CollateralPortfolio object)'
        multivalued: true
    in_subset:
      - cdm_product_collateral

  CollateralProvisions:
    description: Contains collateral attributes which can also inherit information from a GMRA
    close_mappings:
      - fpml_5_10:CollateralProvisions
    related_mappings:
      - gist:ContractTerm
    slots:
      - collateralType
      - eligibleCollateral
      - substitutionProvisions
    slot_usage:
      eligibleCollateral:
        description: The eligible collateral as specified in relation to the transaction.
    in_subset:
      - cdm_product_collateral

  SubstitutionProvisions:
    description: Defines collateral substitution provisions such as how many and with how much notice are substitutions allowed.
    slots:
      - numberOfSubstitutionsAllowed
      - noticeDeadlinePeriod
      - noticeDeadlineDateTime
    in_subset:
      - cdm_product_collateral

  IndependentAmount:
    description: A class specifying the Independent Amount as the combination of a payer/receiver, a payment amount, a payment
      date and an associated payment calculation rule.
    is_a: PartyReferencePayerReceiver
    slots:
      - paymentDetail
    in_subset:
      - cdm_product_collateral

  AgencyRatingCriteria:
    description: Represents a class to specify a credit notation.
    close_mappings:
      - fpml_5_10:AgencyRatingCriteria
    rules:
      - description: If the mismatch resolution is ReferenceAgency, ensure that the reference agency is specified.
        preconditions:
          slot_conditions:
            mismatchResolution:
              equals_string: ReferenceAgency
        postconditions:
          slot_conditions:
            referenceAgency:
              required: true
    comments:
      - 'Rosetta condition: ReferenceAgency — if mismatchResolution = CreditNotationMismatchResolutionEnum -> ReferenceAgency
        then referenceAgency exists'
      - 'Rosetta func: CheckAgencyRating'
    annotations:
      rosetta_functions: '[{"name":"CheckAgencyRating","inputs":[{"name":"agencyRatings","type":"AgencyRatingCriteria","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}}]'
    slots:
      - creditNotation
      - mismatchResolution
      - referenceAgency
      - boundary
    slot_usage:
      creditNotation:
        description: Indicates the agency rating criteria specified for the asset or issuer.
        required: true
      mismatchResolution:
        description: Indicator for options to be used if several agency ratings (>1) are specified and its necessary to identify
          specific charateristics. i.e (lowest or highest).
      referenceAgency:
        description: identifies the dominant reference agency if there is a missmatch and several reference agencies exsist.
    in_subset:
      - cdm_product_collateral

  CollateralValuationTreatment:
    description: Specification of the valuation treatment for the specified collateral.
    close_mappings:
      - fpml_5_10:CollateralValuationTreatment
    rules:
      - description: A data rule to validate that if a Valuation Percentage is specified it should be greater than or equal
          to 0 and less than 1.
        preconditions:
          slot_conditions:
            haircutPercentage:
              required: true
        postconditions:
          slot_conditions:
            haircutPercentage:
              minimum_value: 0
              maximum_value: 1
      - description: A data rule to validate that if a Margin Percentage is specified it should be greater than 1.
        preconditions:
          slot_conditions:
            marginPercentage:
              required: true
        postconditions:
          slot_conditions:
            marginPercentage:
              minimum_value: 1
      - description: A data rule to validate that if an FX Haircut Percentage is specified it should be between 0 and less
          than 1.
        preconditions:
          slot_conditions:
            fxHaircutPercentage:
              required: true
        postconditions:
          slot_conditions:
            fxHaircutPercentage:
              minimum_value: 0
              maximum_value: 1
      - description: A data rule to validate that if an FX Haircut Percentage is specified it should be between 0 and  less
          than 1.
        preconditions:
          slot_conditions:
            additionalHaircutPercentage:
              required: true
        postconditions:
          slot_conditions:
            additionalHaircutPercentage:
              minimum_value: 0
              maximum_value: 1
      - description: Choice rule requiring that either a haircut percentage or margin percentage is specified.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                haircutPercentage:
                  required: true
            - slot_conditions:
                marginPercentage:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: HaircutPercentage — if haircutPercentage exists then haircutPercentage >= 0 and haircutPercentage
        < 1'
      - 'Rosetta condition: MarginPercentage — if marginPercentage exists then marginPercentage >= 1'
      - 'Rosetta condition: FxHaircutPercentage — if fxHaircutPercentage exists then fxHaircutPercentage > 0 and fxHaircutPercentage
        < 1'
      - 'Rosetta condition: AdditionalHaircutPercentage — if additionalHaircutPercentage exists then additionalHaircutPercentage
        > 0 and additionalHaircutPercentage < 1'
      - 'Rosetta condition: HaircutPercentageOrMarginPercentage — required choice haircutPercentage, marginPercentage'
    slots:
      - haircutPercentage
      - marginPercentage
      - fxHaircutPercentage
      - additionalHaircutPercentage
    slot_usage:
      haircutPercentage:
        description: Specifies a haircut percentage to be applied to the value of asset and used as a discount factor to the
          value of the collateral asset,expressed as a percentage in decimal terms. As an example a 0.5% haircut would be
          represented as a decimal number 0.005.
        required: false
      fxHaircutPercentage:
        description: Specifies an FX haircut applied to a specific asset which is agreed between the parties (for example,
          if pledgor eligible collateral is not denominated in the termination currency or under other specified cases in
          collateral support documents both for initial margin and variation margin).The percentage value is expressed as
          the discount haircut to the value of the collateral- as an example an 8% FX haircut would be expressed as 0.08.
      additionalHaircutPercentage:
        description: 'Specifies a percentage value of any additional haircut to be applied to a collateral asset,the percentage
          value is expressed as the discount haircut to the value of the collateral- as an example a 5% haircut would be expressed
          as 0.05. '
    in_subset:
      - cdm_product_collateral

  EligibleCollateralSpecification:
    description: Represents a set of criteria used to specify eligible collateral.
    tree_root: true
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"CloneEligibleCollateralWithChangedTreatment","description":"Creates a new Eligible Collateral
        Specification based on an input specification but with one changed criteria and with one changed treatment.","inputs":[{"name":"inputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"changedCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"changedTreatment","type":"CollateralTreatment","cardinality":"1..1"}],"output":{"name":"outputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"}},{"name":"CheckEligibilityForProduct","inputs":[{"name":"specifications","type":"EligibleCollateralSpecification","cardinality":"1..*"},{"name":"product","type":"TransferableProduct","cardinality":"0..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"0..1"},"code_implementation":true},{"name":"CheckEligibilityByDetails","description":"This
        function when presented with a set of Asset and Issuer details to be potentially posted as collateral, will check
        against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification) to determine which collateral
        meets the eligibility and can be used/posted for delivery.","inputs":[{"name":"specification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"1..1"}}]'
    comments:
      - 'Rosetta func: CloneEligibleCollateralWithChangedTreatment — Creates a new Eligible Collateral Specification based
        on an input specification but with one changed criteria and with one changed treatment.'
      - 'Rosetta func: CheckEligibilityForProduct'
      - 'Rosetta func: CheckEligibilityByDetails — This function when presented with a set of Asset and Issuer details to
        be potentially posted as collateral, will check against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification)
        to determine which collateral meets the eligibility and can be used/posted for delivery.'
    slots:
      - identifier
      - party
      - counterparty
      - criteria
      - partyRole
    slot_usage:
      identifier:
        range: Identifier
        inlined_as_list: true
        description: Specifies the identifier(s) to uniquely identify eligible collateral or a set of eligible collateral,
          such as a schedule or equivalant for an identity issuer.
        required: false
      party:
        range: Party
        description: The parties associated with the specification.
        multivalued: true
      counterparty:
        description: Specification of the roles of the counterparties to the specification.
        required: false
      criteria:
        range: EligibleCollateralCriteria
        description: Represents a set of criteria used to specify eligible collateral.
        required: true
        multivalued: true
      partyRole:
        description: Specifies the role(s) that each of the party(s) is playing in the context of the specification, eg Payor
          or Receiver.
        multivalued: true
    in_subset:
      - cdm_product_collateral

  CollateralCriteriaBase:
    description: Represents a set of criteria used to specify and describe collateral.
    close_mappings:
      - fpml_5_10:CollateralCriteriaBase
    slots:
      - collateralCriteria
      - appliesTo
      - restrictTo
      - ratingPriorityResolution
    in_subset:
      - cdm_product_collateral

  EligibleCollateralCriteria:
    description: Represents a set of criteria used to specify eligible collateral.
    is_a: CollateralCriteriaBase
    related_mappings:
      - gist:Specification
    comments:
      - 'Rosetta condition: ConcentrationLimitTypeIssueOSAmountDebtOnly — if treatment -> concentrationLimit -> concentrationLimitCriteria
        -> concentrationLimitType only-element = ConcentrationLimitTypeEnum -> IssueOutstandingAmount then CriteriaMatchesSecurityType(collateralCriteria,
        Debt) or (treatment -> concentrationLimit extract CriteriaMatchesSecurityType( item -> concentrationLimitCriteria
        -> collateralCriteria, Debt )) all = True'
      - 'Rosetta condition: ConcentrationLimitTypeMarketCapEquityOnly — if treatment -> concentrationLimit -> concentrationLimitCriteria
        -> concentrationLimitType only-element = ConcentrationLimitTypeEnum -> MarketCapitalisation then CriteriaMatchesSecurityType(collateralCriteria,
        Equity) or (treatment -> concentrationLimit extract CriteriaMatchesSecurityType( item -> concentrationLimitCriteria
        -> collateralCriteria, Equity )) all = True'
      - 'Rosetta condition: AverageTradingVolumeEquityOnly — if treatment -> concentrationLimit -> concentrationLimitCriteria
        -> averageTradingVolume exists then CriteriaMatchesSecurityType(collateralCriteria, Equity) or (treatment -> concentrationLimit
        extract CriteriaMatchesSecurityType( item -> concentrationLimitCriteria -> collateralCriteria, Equity )) all = True'
    slots:
      - treatment
    slot_usage:
      treatment:
        description: Identifies the treatment of specified collateral, e.g., haircuts,holding limits or exclusions.
        required: true
    in_subset:
      - cdm_product_collateral

  CollateralTreatment:
    description: Specifies the treatment terms for the eligible collateral criteria specified.
    close_mappings:
      - fpml_5_10:CollateralTreatment
    comments:
      - 'Rosetta func: CloneEligibleCollateralWithChangedTreatment — Creates a new Eligible Collateral Specification based
        on an input specification but with one changed criteria and with one changed treatment.'
    annotations:
      rosetta_functions: '[{"name":"CloneEligibleCollateralWithChangedTreatment","description":"Creates a new Eligible Collateral
        Specification based on an input specification but with one changed criteria and with one changed treatment.","inputs":[{"name":"inputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"changedCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"changedTreatment","type":"CollateralTreatment","cardinality":"1..1"}],"output":{"name":"outputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"}}]'
    slots:
      - valuationTreatment
      - concentrationLimit
      - isIncluded
    in_subset:
      - cdm_product_collateral

  ConcentrationLimit:
    description: Represents a class to describe concentration limits that may be applicable to eligible collateral criteria.
    rules:
      - description: Either a value or percentage concentration limit must be specified.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                valueLimit:
                  required: true
            - slot_conditions:
                percentageLimit:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ConcentrationLimitValueChoice — required choice valueLimit, percentageLimit'
      - 'Rosetta condition: PercentageConcentrationLimit — if concentrationLimitCriteria -> concentrationLimitType = ConcentrationLimitTypeEnum
        -> MarketCapitalisation then percentageLimit exists'
    slots:
      - concentrationLimitCriteria
      - valueLimit
      - percentageLimit
    in_subset:
      - cdm_product_collateral

  ConcentrationLimitCriteria:
    description: Respresents a class to describe a set of criteria to describe specific assets that the concentration limits
      apply to.
    is_a: CollateralCriteriaBase
    rules:
      - description: Either a limit type or limit criteria must be specified.
        postconditions:
          exactly_one_of:
            - slot_conditions:
                concentrationLimitType:
                  required: true
            - slot_conditions:
                averageTradingVolume:
                  required: true
            - slot_conditions:
                collateralCriteria:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ConcentrationLimitTypeChoice — required choice concentrationLimitType, averageTradingVolume, collateralCriteria'
    slots:
      - concentrationLimitType
      - averageTradingVolume
    in_subset:
      - cdm_product_collateral

  AverageTradingVolume:
    description: Represents the average trading volume of an Equity product upon an exchange or set of exchanges.
    close_mappings:
      - fpml_5_10:AverageTradingVolume
    slots:
      - period
      - methodology
    slot_usage:
      period:
        range: Period
        description: Represents the period of the equities average trading volume on the exchange/s.
    in_subset:
      - cdm_product_collateral

  IssuerCountryOfOrigin:
    slots:
      - issuerCountryOfOrigin
    in_subset:
      - cdm_product_collateral

  AssetCountryOfOrigin:
    slots:
      - assetCountryOfOrigin
    slot_usage:
      assetCountryOfOrigin:
        description: Represents a filter on the asset country of origin based on the ISO Standard 3166.
    in_subset:
      - cdm_product_collateral

  IssuerName:
    comments:
      - 'Rosetta func: CheckIssuerName'
    annotations:
      rosetta_functions: '[{"name":"CheckIssuerName","inputs":[{"name":"issuerName","type":"IssuerName","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}}]'
    slots:
      - issuerName
    in_subset:
      - cdm_product_collateral

  IssuerAgencyRating:
    slots:
      - issuerAgencyRating
    in_subset:
      - cdm_product_collateral

  SovereignAgencyRating:
    slots:
      - sovereignAgencyRating
    in_subset:
      - cdm_product_collateral

  AssetAgencyRating:
    slots:
      - assetAgencyRating
    in_subset:
      - cdm_product_collateral

  AssetMaturity:
    close_mappings:
      - fpml_5_10:AssetMaturity
    comments:
      - 'Rosetta func: CheckMaturity'
    annotations:
      rosetta_functions: '[{"name":"CheckMaturity","inputs":[{"name":"maturityRange","type":"AssetMaturity","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}}]'
    slots:
      - maturityType
      - maturityRange
    in_subset:
      - cdm_product_collateral

  ListingExchange:
    description: Specifies a filter based on a stock exchange.
    slots:
      - exchange
    slot_usage:
      exchange:
        range: string
        description: Represents a filter based on the Primary Stock Exchange facilitating the listing of companies, exchange
          of Stocks, Exchange traded Derivatives, Bonds, and other Securities expressed in ISO standard 10383.
        required: true
        multivalued: true
    in_subset:
      - cdm_product_collateral

  ListingSector:
    description: Specifies a filter based on an industry sector.
    slots:
      - sector
    in_subset:
      - cdm_product_collateral

  DomesticCurrencyIssued:
    slots:
      - domesticCurrencyIssued
    in_subset:
      - cdm_product_collateral

  CounterpartyOwnIssuePermitted:
    slots:
      - counterpartyOwnIssuePermitted
    in_subset:
      - cdm_product_collateral

  AllCriteria:
    description: Used to combine two or more Collateral Criteria using AND logic.
    slots:
      - allCriteria
    slot_usage:
      allCriteria:
        range: CollateralCriteria
    in_subset:
      - cdm_product_collateral

  AnyCriteria:
    description: Used to combine two or more Collateral Criteria using OR logic.
    slots:
      - anyCriteria
    slot_usage:
      anyCriteria:
        range: CollateralCriteria
    in_subset:
      - cdm_product_collateral

  NegativeCriteria:
    description: Used to apply a NOT logic condition to a single Collateral Criteria.
    slots:
      - negativeCriteria
    in_subset:
      - cdm_product_collateral

  DistributionAndInterestPayment:
    description: A class to specify the Distributions and Interest Payment provisions applicable to the collateral agreement.
    slots:
      - interestParameters
    in_subset:
      - cdm_product_collateral

  CollateralInterestParameters:
    description: Represents the floating interest calculation and distribution parameters for a single currency.
    close_mappings:
      - fpml_5_10:CollateralInterestParameters
    slots:
      - postingParty
      - marginType
      - currency
      - interestCalculationParameters
      - interestCalculationFrequency
      - interestHandlingParameters
    slot_usage:
      postingParty:
        description: Represents the party to which these parameters apply (the applicable party).  In other words, if the
          parameters are different depending on which party is posting/holding the collateral, for which party to the Collateral
          Agreement (Party 1 or Party 2) that is posting the collateral do these parameters apply?
      currency:
        description: Specifies the currency for which the parameters are captured.
    in_subset:
      - cdm_product_collateral

  CollateralInterestCalculationParameters:
    description: Represents parameters for calculating the amount the floating interest calculation, e.g.  for a single currency
      or defaults for all currencies.
    close_mappings:
      - fpml_5_10:CollateralInterestCalculationParameters
    rules:
      - description: InterestRate
        postconditions:
          exactly_one_of:
            - slot_conditions:
                fixedRate:
                  required: true
            - slot_conditions:
                floatingRate:
                  required: true
        preconditions: {}
      - description: CompoundingBC1
        preconditions:
          slot_conditions:
            compoundingType:
              equals_string: Business
        postconditions:
          slot_conditions:
            compoundingBusinessCenter:
              required: true
      - description: CompoundingBC2
        comments:
          - 'Rosetta negation: compoundingType <> CompoundingTypeEnum -> Business'
        preconditions:
          slot_conditions:
            compoundingType:
              none_of:
                - equals_string_in:
                    - Business
        postconditions:
          slot_conditions:
            compoundingBusinessCenter:
              required: false
    comments:
      - 'Rosetta condition: InterestRate — required choice fixedRate, floatingRate'
      - 'Rosetta condition: DCF — dayCountFraction = DayCountFractionEnum -> ACT_360 or dayCountFraction = DayCountFractionEnum
        -> ACT_365_FIXED'
      - 'Rosetta condition: CompoundingBC1 — if compoundingType = CompoundingTypeEnum -> Business then compoundingBusinessCenter
        exists'
      - 'Rosetta condition: CompoundingBC2 — if compoundingType <> CompoundingTypeEnum -> Business then compoundingBusinessCenter
        is absent'
    slots:
      - fixedRate
      - floatingRate
      - inBaseCurrency
      - compoundingType
      - compoundingBusinessCenter
      - dayCountFraction
      - rounding
      - roundingFrequency
      - withholdingTaxRate
    slot_usage:
      fixedRate:
        description: Specifies the applicable fixed rate  if used.
        required: false
      floatingRate:
        range: CollateralAgreementFloatingRate
        description: Specifies the floating interest rate to be used.
        multivalued: false
      dayCountFraction:
        description: Specifies the day count fraction to use for that currency.
      rounding:
        range: Rounding
        description: Specifies the rounding rules for settling in that currency.
    in_subset:
      - cdm_product_collateral

  CollateralAgreementFloatingRate:
    description: Represents the parameters needed to calculate the floating rate paid on collateral holdings.
    is_a: FloatingRateBase
    close_mappings:
      - fpml_5_10:CollateralAgreementFloatingRate
    slots:
      - negativeInterest
      - compressibleSpread
    in_subset:
      - cdm_product_collateral

  CollateralInterestHandlingParameters:
    description: Represents parameters that describe how calculated interest amounts are handled, i.e. are they transferred/distributed,
      or is the collateral balance adjusted, is netting done, and any other special handling.
    close_mappings:
      - fpml_5_10:CollateralInterestHandlingParameters
    rules:
      - description: Alternative
        preconditions:
          slot_conditions:
            alternativeToInterestAmount:
              equals_string: Other
        postconditions:
          slot_conditions:
            alternativeProvision:
              required: true
      - description: Alternative2
        comments:
          - 'Rosetta negation: alternativeToInterestAmount <> AlternativeToInterestAmountEnum -> Other'
        preconditions:
          slot_conditions:
            alternativeToInterestAmount:
              none_of:
                - equals_string_in:
                    - Other
        postconditions:
          slot_conditions:
            alternativeProvision:
              required: false
    comments:
      - 'Rosetta condition: Alternative — if alternativeToInterestAmount = AlternativeToInterestAmountEnum -> Other then alternativeProvision
        exists'
      - 'Rosetta condition: Alternative2 — if alternativeToInterestAmount <> AlternativeToInterestAmountEnum -> Other then
        alternativeProvision is absent'
    slots:
      - interestPaymentHandling
      - paymentBusinessCenter
      - netPostedAndHeldInterest
      - netInterestWithMarginCalls
      - includeAccrualInMarginCalc
      - accrueInterestOnUnsettledInterest
      - onFullReturn
      - onPartialReturn
      - interestAmountApplication
      - interestRolloverLimit
      - writeoffLimit
      - alternativeToInterestAmount
      - alternativeProvision
      - cutoffTime
      - notification
    in_subset:
      - cdm_product_collateral

  CollateralInterestNotification:
    description: Represents the parameters describing when notifications should be made for required collateral interest transfers.
    close_mappings:
      - fpml_5_10:CollateralInterestNotification
    slots:
      - trigger
      - offset
      - notificationTime
      - notificationDayType
    slot_usage:
      trigger:
        range: string
        description: Specifies what triggers notification (should be enum) Interest Statement Frequency, Period End Date.
      offset:
        range: decimal
        description: Specifies the number of days before (negative) or after (positive) the trigger event.
        required: true
      notificationTime:
        range: time
        description: Specifies the time of day that the notification should occur.
    in_subset:
      - cdm_product_collateral

  InterestAmountApplication:
    description: A class to specify the application of Interest Amount with respect to the Delivery Amount and the Return
      Amount.
    slots:
      - returnAmount
      - deliveryAmount
    slot_usage:
      returnAmount:
        range: ReturnAmount
        description: The application of Interest Amount with respect the Return Amount.
      deliveryAmount:
        range: DeliveryAmount
        description: The application of Interest Amount with respect the Delivery Amount.
    in_subset:
      - cdm_product_collateral

  ReturnAmount:
    description: A class to specify the application of Interest Amount with respect the Return Amount.
    rules:
      - description: A data rule to specify that when a custom election exists then default language should not be included.
        preconditions:
          slot_conditions:
            customElection:
              required: true
        postconditions:
          slot_conditions:
            includesDefaultLanguage:
              equals_string: 'False'
    comments:
      - 'Rosetta condition: CustomElection — if customElection exists then includesDefaultLanguage = False'
    slots:
      - includesDefaultLanguage
      - customElection
    slot_usage:
      customElection:
        description: Custom election that might be specified by the parties to the agreement.
    in_subset:
      - cdm_product_collateral

  DeliveryAmount:
    description: A class to specify the application of Interest Amount with respect the Delivery Amount.
    slots:
      - standardElection
      - customElection
    slot_usage:
      standardElection:
        range: DeliveryAmountElectionEnum
        description: The standard election as specified by an enumeration.
      customElection:
        description: The custom election that might be specified by the parties to the agreement.
    in_subset:
      - cdm_product_collateral

  SpecificAsset:
    description: A single, specifically identified Asset chosen from the Asset data type
    is_a: Asset
    in_subset:
      - cdm_product_collateral

  IndexType:
    description: Specification of an index.
    slots:
      - equityIndex
    in_subset:
      - cdm_product_collateral

  CollateralCriteria:
    abstract: true
    description: The possible different terms that can be combined, using AND, OR and NOT logic, to define the issuers and/or
      assets that meet a given criteria for collateral.
    comments:
      - Generated from Rosetta 'choice' construct — represents a union/one-of type.
    union_of:
      - AllCriteria
      - AnyCriteria
      - NegativeCriteria
      - CollateralIssuerType
      - CollateralGuarantorType
      - AssetType
      - IssuerCountryOfOrigin
      - AssetCountryOfOrigin
      - CurrencyCodeEnum
      - IssuerName
      - IssuerAgencyRating
      - SovereignAgencyRating
      - AssetAgencyRating
      - AssetMaturity
      - SpecificAsset
      - CollateralTaxonomy
      - ListingExchange
      - ListingSector
      - IndexType
      - CounterpartyOwnIssuePermitted
      - DomesticCurrencyIssued
    in_subset:
      - cdm_product_collateral
