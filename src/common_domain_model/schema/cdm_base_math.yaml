subsets:
  cdm_base_math:
    description: Classes defined in the cdm_base_math module.

enums:
  AveragingWeightingMethodEnum:
    description: The enumerated values to specify the method of calculation to be used when averaging rates. Per ISDA 2000
      Definitions, Section 6.2. Certain Definitions Relating to Floating Amounts.
    permissible_values:
      Unweighted:
        description: The arithmetic mean of the relevant rates for each reset date.
      Weighted:
        description: The arithmetic mean of the relevant rates in effect for each day in a calculation period calculated by
          multiplying each relevant rate by the number of days such relevant rate is in effect, determining the sum of such
          products and dividing such sum by the number of days in the calculation period.

  AveragingCalculationMethodEnum:
    description: Specifies enumerations for the type of averaging calculation.
    permissible_values:
      Arithmetic:
        description: Refers to the calculation of an average by taking the sum of observations divided by the count of observations.
      Geometric:
        description: Refers to the calculation of an average by taking the nth root of the product of n observations.
      Harmonic:
        description: Refers to the calculation of an average by taking the reciprocal of the arithmetic mean of the reciprocals
          of the observations.

  RoundingDirectionEnum:
    description: The enumerated values to specify the rounding direction and precision to be used in the rounding of a number.  Used
      by function cdm.base.math.RoundToPrecision.
    permissible_values:
      Up:
        description: A fractional number will be rounded up to the specified number of decimal places (the precision). For
          example, 5.21 and 5.25 rounded up to 1 decimal place are 5.3 and 5.3 respectively.
      Down:
        description: A fractional number will be rounded down to the specified number of decimal places (the precision). For
          example, 5.29 and 5.25 rounded down to 1 decimal place are 5.2 and 5.2 respectively.
      Nearest:
        description: A fractional number will be rounded either up or down to the specified number of decimal places (the
          precision) depending on its value. For example, 5.24 would be rounded down to 5.2 and 5.25 would be rounded up to
          5.3 if a precision of 1 decimal place were specified.

  RoundingModeEnum:
    description: The enumerated values to specify the rounding direction when rounding of a number to nearest.  Used by function
      cdm.base.math.RoundToNearest.
    permissible_values:
      Down:
        description: A number will be rounded down to the specified nearest number. For example, 529 rounded down to the nearest
          10 is 520.
      Up:
        description: A number will be rounded up to the specified nearest number. For example, 521 rounded up to the nearest
          10 is 530.

  QuantifierEnum:
    description: Represents the enumerated values to specify a logical quantification, i.e. either All or Any.
    permissible_values:
      All:
        description: Specifies that the condition in the scope of the quantifier is true of every member of the domain i.e.
          every one of the elements in scope.
      Any:
        description: Specifies that the condition in the scope of the quantifier is true of at least one member of the domain
          i.e. one or more of the elements in scope.

  CompareOp:
    permissible_values:
      GreaterThan: {}
      GreaterThanOrEquals: {}
      Equals: {}
      LessThanOrEquals: {}
      LessThan: {}

  CapacityUnitEnum:
    description: Provides enumerated values for capacity units, generally used in the context of defining quantities for commodities.
    permissible_values:
      ALW:
        description: Denotes Allowances as standard unit.
      BBL:
