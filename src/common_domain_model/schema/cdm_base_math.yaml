        description: Denotes a Troy Ounce as a standard unit.
      SGB:
        description: Denotes a Standard Gold Bar as a standard unit.
      TEU:
        description: Denotes a 20 ft. Equivalent Unit container as a standard unit.
      USBSH:
        description: Denotes a US Bushel as a standard unit.
      USBTU:
        description: Denotes a US British Thermal Unit as a standard unit.
      USCWT:
        description: Denotes US Hundredweight unit as a standard unit.
      USGAL:
        description: Denotes a US Gallon unit as a standard unit.
      USMBTU:
        description: Denotes a Thousand US British Thermal Units as a standard unit.
      USMMBTU:
        description: Denotes a Million US British Thermal Units as a standard unit.
      UST:
        description: Denotes a US Ton as a standard unit.
      USTHM:
        description: Denotes a US Thermal Unit as a standard unit.

  WeatherUnitEnum:
    description: Provides enumerated values for weather units, generally used in the context of defining quantities for commodities.
    permissible_values:
      CDD:
        description: Denotes Cooling Degree Days as a standard unit.
      CPD:
        description: Denotes Critical Precipitation Day as a standard unit.
      HDD:
        description: Heating Degree Day as a standard unit.

  FinancialUnitEnum:
    description: Provides enumerated values for financial units, generally used in the context of defining quantities for
      securities.
    permissible_values:
      Contract:
        description: Denotes financial contracts, such as listed futures and options.
      ContractualProduct:
        description: Denotes a Contractual Product as defined in the CDM.  This unit type would be used when the price applies
          to the whole product, for example, in the case of a premium expressed as a cash amount.
      IndexUnit:
        description: Denotes a price expressed in index points, e.g. for a stock index.
      LogNormalVolatility:
        description: Denotes a log normal volatility, expressed in %/month, where the percentage is represented as a decimal.
          For example, 0.15 means a log-normal volatility of 15% per month.
      Share:
        description: Denotes the number of units of financial stock shares.
      ValuePerDay:
        description: Denotes a value (expressed in currency units) for a one day change in a valuation date, which is typically
          used for expressing sensitivity to the passage of time, also known as theta risk, or carry, or other names.
      ValuePerPercent:
        description: Denotes a value (expressed in currency units) per percent change in the underlying rate which is typically
          used for expressing sensitivity to volatility changes, also known as vega risk.
      Weight:
        description: Denotes a quantity (expressed as a decimal value) represented the weight of a component in a basket.

  ArithmeticOperationEnum:
    description: An arithmetic operator that can be passed to a function
    permissible_values:
      Add:
        description: Addition of 2 values
      Subtract:
        description: Subtraction of 2nd value from 1st value
      Multiply:
        description: Multiplication of 2 values
      Divide:
        description: Division of 1st value by 2nd value
      Max:
        description: Maximum of 2 values
      Min:
        description: Minimum of 2 values

  QuantityChangeDirectionEnum:
    description: Specifies whether a quantity change is an increase, a decrease or a replacement, whereby the quantity is
      always specified as a positive number.
    permissible_values:
      Increase:
        description: When the quantity should go up by the specified amount.
      Decrease:
        description: When the quantity should go down by the specified amount.
      Replace:
        description: When the quantity should be replaced by the specified amount.

slots:
  capacityUnit:
    range: CapacityUnitEnum
    description: Provides an enumerated value for a capacity unit, generally used in the context of defining quantities for
      commodities.

  weatherUnit:
    range: WeatherUnitEnum
    description: Provides an enumerated values for a weather unit, generally used in the context of defining quantities for
      commodities.

  financialUnit:
    range: FinancialUnitEnum
    description: Provides an enumerated value for financial units, generally used in the context of defining quantities for
      securities.

  currency:
    range: string
    description: Defines the currency to be used as a unit for a price, quantity, or other purpose.
    annotations:
      metadata_scheme: true

  value:
    range: decimal
    description: Specifies the value of the measure as a number. Optional because in a measure vector or schedule, this single
      value may be omitted.

  unit:
    range: UnitType
    description: Qualifies the unit by which the amount is measured. Optional because a measure may be unit-less (e.g. when
      representing a ratio between amounts in the same unit).

  datedValue:
    range: DatedValue
    description: A schedule of step date and value pairs. On each step date the associated step value becomes effective. The
      step dates are used to order the steps by ascending order. This attribute is optional so the data type may be used to
      define a schedule with a single value.
    multivalued: true
    inlined_as_list: true

  multiplier:
    range: Measure
    description: Defines an optional number that the quantity should be multiplied by to derive a total quantity. This number
      is associated to a unit. For example in the case of the Coal (API2) CIF ARA (ARGUS-McCloskey) Futures Contract on the
      CME, where the unit would be contracts, the multiplier value would 1,000 and the mulitiplier unit would be 1,000 MT
      (Metric Tons).

  frequency:
    range: Frequency
    description: Defines the frequency to be used when defining a quantity. For example a quantity may be specified as a number
      of barrels of oil per day, which needs multiplying by the number of days in the relevant period to get the total quantity
      as a number of barrels.

  stepDate:
    range: date
    description: The date on which the associated stepValue becomes effective. This day may be subject to adjustment in accordance
      with a business day convention.
    required: true

  stepValue:
    range: decimal
    description: The non-negative rate or amount which becomes effective on the associated stepDate. A rate of 5% would be
      represented as 0.05.
    required: true

  precision:
    range: integer
    description: Specifies the rounding precision in terms of a number of decimal places when the number is evaluated in decimal
      form (not percentage), e.g. 0.09876543 rounded to the nearest 5 decimal places is  0.0987654.

  number:
    range: decimal
    description: The number to be used as the bound, e.g. 5.
    required: true

  money:
    range: Money
    description: The money amount to be used as the bound, e.g. 1,000 USD.
    required: true

  isWeighted:
    range: boolean
    description: Identifies whether the average values will be weighted or unweighted.
    required: true
    close_mappings:
      - fpml_5_10:AveragingCalculationMethod.isWeighted

  calculationMethod:
    range: AveragingCalculationMethodEnum
    description: Identifies which of the Pythagorean means is being used to compute an average value.
    required: true
    close_mappings:
      - fpml_5_10:AveragingCalculationMethod.calculationMethod

classes:
  UnitType:
    description: Defines the unit to be used for price, quantity, or other purposes
    close_mappings:
      - gist:UnitOfMeasure
    rules:
      - description: Requires that a unit type must be set.
        comments:
          - 'Rosetta one-of: exactly one slot must be present.'
        preconditions: {}
    comments:
      - 'Rosetta condition: UnitType — one-of'
      - 'Rosetta func: CompareQuantityByUnitOfAmount'
      - 'Rosetta func: UnitEquals — Compares two UnitType to check if all attributes match.'
      - 'Rosetta func: FilterQuantity — Filter list of quantities based on unit type.'
    annotations:
      rosetta_functions: '[{"name":"CompareQuantityByUnitOfAmount","inputs":[{"name":"quantity1","type":"Quantity","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"quantity2","type":"Quantity","cardinality":"0..*"},{"name":"unitOfAmount","type":"UnitType","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"UnitEquals","description":"Compares
        two UnitType to check if all attributes match.","inputs":[{"name":"u1","type":"UnitType","cardinality":"0..1"},{"name":"u2","type":"UnitType","cardinality":"0..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"FilterQuantity","description":"Filter
        list of quantities based on unit type.","inputs":[{"name":"quantities","type":"Quantity","cardinality":"0..*"},{"name":"unit","type":"UnitType","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"Quantity","cardinality":"0..*"}}]'
    slots:
      - capacityUnit
      - weatherUnit
      - financialUnit
      - currency
    in_subset:
      - cdm_base_math

  MeasureBase:
    description: Provides an abstract type to define a measure as a number associated to a unit. This type is abstract because
      all its attributes are optional. The types that extend it can specify further existence constraints.
    slots:
      - value
      - unit
    in_subset:
      - cdm_base_math

  Measure:
    description: Defines a concrete measure as a number associated to a unit. It extends MeasureBase by requiring the value
      attribute to be present. A measure may be unit-less so the unit attribute is still optional.
    is_a: MeasureBase
    close_mappings:
      - gist:Magnitude
    rules:
      - description: The value attribute must be present in a concrete measure.
        postconditions:
          slot_conditions:
            value:
              required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ValueExists — value exists'
    in_subset:
      - cdm_base_math

  MeasureSchedule:
    description: A set of measures, all in the same unit, where the values are defined through a schedule of steps. The initial
      value may be defined either as part of the steps, or using the single amount attribute.
    is_a: MeasureBase
    rules:
      - description: A schedule may be specified as a single value or as a set of date-value pairs. Both attributes may be
          specified, in which case the single amount number is the initial value.
        postconditions:
          any_of:
            - slot_conditions:
                value:
                  required: true
            - slot_conditions:
                datedValue:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: ValueExists — value exists or datedValue exists'
    slots:
      - datedValue
    in_subset:
      - cdm_base_math

  QuantitySchedule:
    description: Specifies a quantity schedule to be associated to a financial product to represent a trade amount. This data
      type extends MeasureSchedule with several unit or multiplier attributes that are used to define financial quantities.
      This data type is generically based on a schedule and can also be used to represent a quantity as a single value.
    is_a: MeasureSchedule
    rules:
      - description: Requires that a unit of amount must be specified for any quantity.
        postconditions:
          slot_conditions:
            unit:
              required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: Quantity_multiplier — if multiplier exists then multiplier -> value >= 0.0'
      - 'Rosetta condition: UnitOfAmountExists — unit exists'
      - 'Rosetta func: FilterQuantityByCurrency — Filter list of quantities based on unit type.'
      - 'Rosetta func: FilterQuantityByCurrencyExists — Filter list of quantities based on unit type.'
      - 'Rosetta func: FilterQuantityByFinancialUnit — Filter list of quantities based on unit type.'
    annotations:
      rosetta_functions: '[{"name":"FilterQuantityByCurrency","description":"Filter list of quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"},{"name":"currency","type":"string","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}},{"name":"FilterQuantityByCurrencyExists","description":"Filter
        list of quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}},{"name":"FilterQuantityByFinancialUnit","description":"Filter
        list of quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"},{"name":"financialUnit","type":"FinancialUnitEnum","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}}]'
    slots:
      - multiplier
      - frequency
    in_subset:
      - cdm_base_math

  Quantity:
    description: Specifies a quantity as a single value to be associated to a financial product, for example a transfer amount
      resulting from a trade. This data type extends QuantitySchedule and requires that only the single amount value exists.
    is_a: QuantitySchedule
    close_mappings:
      - gist:Magnitude
    rules:
      - description: The amount must exist when the quantity represents a single value, and the steps must be absent.
        postconditions:
          slot_conditions:
            value:
              required: true
            datedValue:
              required: false
        preconditions: {}
    comments:
      - 'Rosetta condition: AmountOnlyExists — value exists and datedValue is absent'
      - 'Rosetta func: CompareQuantityByUnitOfAmount'
      - 'Rosetta func: FilterQuantity — Filter list of quantities based on unit type.'
    annotations:
      rosetta_functions: '[{"name":"CompareQuantityByUnitOfAmount","inputs":[{"name":"quantity1","type":"Quantity","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"quantity2","type":"Quantity","cardinality":"0..*"},{"name":"unitOfAmount","type":"UnitType","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"FilterQuantity","description":"Filter
        list of quantities based on unit type.","inputs":[{"name":"quantities","type":"Quantity","cardinality":"0..*"},{"name":"unit","type":"UnitType","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"Quantity","cardinality":"0..*"}}]'
    in_subset:
      - cdm_base_math

  NonNegativeQuantity:
    description: Specifies a quantity as a non-negative number, which condition is enforced through a data rule that only
      applies to the extending class.
    is_a: Quantity
    rules:
      - description: For a non-negative quantity, the amount attribute must be positive.
        postconditions:
          slot_conditions:
            value:
              minimum_value: 0.0
        preconditions: {}
    comments:
      - 'Rosetta condition: NonNegativeQuantity_amount — value >= 0.0'
    in_subset:
      - cdm_base_math

  NonNegativeStep:
    description: A class defining a step date and non-negative step value pair. This step definitions are used to define varying
      rate or amount schedules, e.g. a notional amortisation or a step-up coupon schedule.
    annotations:
      metadata_key: true
    rules:
      - description: FpML specified stepValue as a NonNegativeDecimal.
        postconditions:
          slot_conditions:
            stepValue:
              minimum_value: 0.0
        preconditions: {}
    comments:
      - 'Rosetta condition: StepValue — stepValue >= 0.0'
    slots:
      - stepDate
      - stepValue
    in_subset:
      - cdm_base_math

  NonNegativeQuantitySchedule:
    is_a: QuantitySchedule
    rules:
      - description: For a non-negative quantity, all amount attribute must be positive.
        preconditions:
          slot_conditions:
            value:
              required: true
        postconditions:
          slot_conditions:
            value:
              minimum_value: 0.0
    comments:
      - 'Rosetta condition: NonNegativeQuantity_value — if value exists then value >= 0.0'
      - 'Rosetta condition: NonNegativeQuantity_datedValue — if datedValue exists then datedValue -> value all >= 0.0'
    in_subset:
      - cdm_base_math

  Rounding:
    description: Defines rounding rules and precision to be used in the rounding of a number.
    slots:
      - roundingDirection
      - precision
    slot_usage:
      roundingDirection:
        description: Specifies the rounding rounding rule as up, down, or nearest.
    in_subset:
      - cdm_base_math

  Schedule:
    description: A class defining a schedule of rates or amounts in terms of an initial value and then a series of step date
      and value pairs. On each step date the rate or amount changes to the new step value. The series of step date and value
      pairs are optional. If not specified, this implies that the initial value remains unchanged over time.
    related_mappings:
      - gist:ScheduledEvent
    slots:
      - value
      - datedValue
    slot_usage:
      value:
        description: The initial rate or amount, as the case may be. An initial rate of 5% would be represented as 0.05.
        required: true
      datedValue:
        description: The schedule of step date and value pairs. On each step date the associated step value becomes effective.
          A list of steps may be ordered in the document by ascending step date. An FpML document containing an unordered
          list of steps is still regarded as a conformant document.
    in_subset:
      - cdm_base_math

  DatedValue:
    description: Defines a date and value pair. This definition is used for varying rate or amount schedules, e.g. a notional
      amortisation or a step-up coupon schedule.
    annotations:
      metadata_key: true
      rosetta_functions: '[{"name":"UpdateDatedValues","description":"Updates the amounts of the dated values based on the
        given QuantityChangeDirectionEnum. For all periods after the effective date of the change, if the direction is Increase,
        the old amount and change amount are summed, if the direction is Decrease, then the change amount is subtracted from
        the old amount, and if the direction is Replace then the change amount replaces the old amount.","inputs":[{"name":"datedValues","type":"DatedValue","cardinality":"0..*"},{"name":"changeAmount","type":"number","cardinality":"0..1"},{"name":"direction","type":"QuantityChangeDirectionEnum","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"0..1"}],"output":{"name":"newdatedValues","type":"DatedValue","cardinality":"0..*"}}]'
    comments:
      - 'Rosetta func: UpdateDatedValues — Updates the amounts of the dated values based on the given QuantityChangeDirectionEnum.
        For all periods after the effective date of the change, if the direction is Increase, the old amount and change amount
        are summed, if the direction is Decrease, then the change amount is subtracted from the old amount, and if the direction
        is Replace then the change amount replaces the old amount.'
    slots:
      - date
      - value
    slot_usage:
      date:
        description: The date on which the associated step value becomes effective. This day may be subject to adjustment
          in accordance with a business day convention.
        multivalued: false
      value:
        description: The rate of amount which becomes effective on the associated step date. A rate of 5% would be represented
          as 0.05.
        required: true
    in_subset:
      - cdm_base_math

  NumberRange:
    description: The number range defined as either a lower and upper number bound, or both.
    rules:
      - description: AtLeastOneOf
        postconditions:
          any_of:
            - slot_conditions:
                lowerBound:
                  required: true
            - slot_conditions:
                upperBound:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: AtLeastOneOf — lowerBound exists or upperBound exists'
    slots:
      - lowerBound
      - upperBound
    slot_usage:
      lowerBound:
        range: NumberBound
        description: The lower bound of a number range, e.g. greater than or equal to 5.
      upperBound:
        range: NumberBound
        description: The upper bound of a number range, e.g. less than 10.
    in_subset:
      - cdm_base_math

  NumberBound:
    description: The number bound is defined as a number and whether the bound is inclusive.
    slots:
      - number
      - inclusive
    slot_usage:
      inclusive:
        description: Whether the number bound is inclusive, e.g. for a lower bound, false would indicate greater than, whereas
          true would indicate greater than or equal to.
    in_subset:
      - cdm_base_math

  MoneyRange:
    description: The money range defined as either a lower and upper money bound, or both.
    rules:
      - description: AtLeastOneOf
        postconditions:
          any_of:
            - slot_conditions:
                lowerBound:
                  required: true
            - slot_conditions:
                upperBound:
                  required: true
        preconditions: {}
    comments:
      - 'Rosetta condition: AtLeastOneOf — lowerBound exists or upperBound exists'
    slots:
      - lowerBound
      - upperBound
    slot_usage:
      lowerBound:
        range: MoneyBound
        description: The lower bound of a money range, e.g. greater than or equal to 1,000 USD.
      upperBound:
        range: MoneyBound
        description: The upper bound of a money range, e.g. less than 10,000 USD.
    in_subset:
      - cdm_base_math

  MoneyBound:
    description: The money bound is defined as a money amount and whether the bound is inclusive.
    slots:
      - money
      - inclusive
    slot_usage:
      inclusive:
        description: Whether the money amount bound is inclusive, e.g. for a lower bound, false would indicate greater than,
          whereas true would indicate greater than or equal to.
    in_subset:
      - cdm_base_math

  AveragingCalculationMethod:
    description: Defines the ways in which multiple values can be aggregated into a single value.
    close_mappings:
      - fpml_5_10:AveragingCalculationMethod
    slots:
      - isWeighted
      - calculationMethod
    in_subset:
      - cdm_base_math
