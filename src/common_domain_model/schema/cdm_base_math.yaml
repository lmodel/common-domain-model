id: https://w3id.org/lmodel/common-domain-model/cdm_base_math
name: cdm_base_math
description: 'Basic maths concepts: quantity and unit, rounding, curve / schedule, non-negativity constraint etc.'
license: Apache-2.0
see_also:
  - https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
  - linkml:types
  - ./cdm_base_datetime
  - ./cdm_observable_asset

comments:
  - 'Rosetta func: CompareNumbers | inputs(n1: number (1..1), op: CompareOp (1..1), n2: number (1..1)) | output(result: boolean
    (1..1))'
  - 'Rosetta func: Abs — Returns the absolute value of a number. If the argument is not negative, the argument is returned.
    If the argument is negative, the negation of the argument is returned. | inputs(arg: number (1..1)) | output(result: number
    (1..1))'
  - 'Rosetta func: Max — Returns the greater number of two supplied numbers. | inputs(a: number (1..1), b: number (1..1))
    | output(result: number (1..1))'
  - 'Rosetta func: Min — Returns the lesser number of two supplied numbers. | inputs(a: number (1..1), b: number (1..1)) |
    output(result: number (1..1))'
  - 'Rosetta func: RoundToNearest — Round a number to the supplied nearest, using the supplied rounding mode. | inputs(value:
    number (1..1), nearest: number (1..1), roundingMode: RoundingModeEnum (1..1)) | output(roundedValue: number (1..1))'
  - 'Rosetta func: RoundToPrecision — Round a number to the supplied precision, using the supplied rounding direction. | inputs(value:
    number (1..1), precision: int (1..1), roundingMode: RoundingDirectionEnum (1..1), removeTrailingZeros: boolean (1..1))
    | output(roundedValue: number (1..1))'
  - 'Rosetta func: RoundToSignificantFigures — Round a number to the supplied significant figures, using the supplied rounding
    direction. | inputs(value: number (1..1), significantFigures: int (1..1), roundingMode: RoundingDirectionEnum (1..1))
    | output(roundedValue: number (1..1))'
  - 'Rosetta func: CompareQuantityByUnitOfAmount | inputs(quantity1: Quantity (0..*), op: CompareOp (1..1), quantity2: Quantity
    (0..*), unitOfAmount: UnitType (1..1)) | output(result: boolean (1..1))'
  - 'Rosetta func: UnitEquals — Compares two UnitType to check if all attributes match. | inputs(u1: UnitType (0..1), u2:
    UnitType (0..1)) | output(result: boolean (1..1))'
  - 'Rosetta func: StringEquals — Used by UnitEquals to compare two strings while ignoring the scheme. | inputs(s1: string
    (0..1), s2: string (0..1)) | output(result: boolean (1..1))'
  - 'Rosetta func: UpdateAmount — Updates an amount based on the given QuantityChangeDirectionEnum.  If the direction is Increase,
    the old amount and change amount are summed, if the direction is Decrease, then the change amount is subtracted from the
    old amount, and if the direction is Replace then the change amount replaces the old amount. | inputs(oldAmount: number
    (0..1), changeAmount: number (0..1), direction: QuantityChangeDirectionEnum (1..1)) | output(newAmount: number (0..1))'
  - 'Rosetta func: UpdateDatedValues — Updates the amounts of the dated values based on the given QuantityChangeDirectionEnum.
    For all periods after the effective date of the change, if the direction is Increase, the old amount and change amount
    are summed, if the direction is Decrease, then the change amount is subtracted from the old amount, and if the direction
    is Replace then the change amount replaces the old amount. | inputs(datedValues: DatedValue (0..*), changeAmount: number
    (0..1), direction: QuantityChangeDirectionEnum (1..1), effectiveDate: date (0..1)) | output(newdatedValues: DatedValue
    (0..*))'
  - 'Rosetta func: FilterQuantity — Filter list of quantities based on unit type. | inputs(quantities: Quantity (0..*), unit:
    UnitType (1..1)) | output(filteredQuantities: Quantity (0..*))'
  - 'Rosetta func: FilterQuantityByCurrency — Filter list of quantities based on unit type. | inputs(quantities: QuantitySchedule
    (0..*), currency: string (1..1)) | output(filteredQuantities: QuantitySchedule (0..*))'
  - 'Rosetta func: FilterQuantityByCurrencyExists — Filter list of quantities based on unit type. | inputs(quantities: QuantitySchedule
    (0..*)) | output(filteredQuantities: QuantitySchedule (0..*))'
  - 'Rosetta func: FilterQuantityByFinancialUnit — Filter list of quantities based on unit type. | inputs(quantities: QuantitySchedule
    (0..*), financialUnit: FinancialUnitEnum (1..1)) | output(filteredQuantities: QuantitySchedule (0..*))'
  - 'Rosetta func: AppendToVector — Append a single value to a vector (list of numbers). | inputs(vector: number (0..*), value:
    number (1..1)) | output(resultVector: number (0..*))'
  - 'Rosetta func: VectorOperation — Generates a result vector by applying the supplied arithmetic operation to each element
    of the supplied left and right vectors in turn.  i.e. result[n] = left[n] <op> right[n], where <op> is the arithmetic
    operation defined by ArithmeticOperationEnum. | inputs(arithmeticOp: ArithmeticOperationEnum (1..1), left: number (0..*),
    right: number (0..*)) | output(result: number (0..*))'
  - 'Rosetta func: VectorScalarOperation — Generates a result vector by applying the supplied arithmetic operation and scalar
    right value to each element of the supplied left vector in turn. i.e. result[n] = left[n] <op> right, where <op> is the
    arithmetic operation defined by ArithmeticOperationEnum. | inputs(arithmeticOp: ArithmeticOperationEnum (1..1), left:
    number (0..*), right: number (0..1)) | output(result: number (0..*))'
  - 'Rosetta func: VectorGrowthOperation — Generates a result vector by starting with the supplied base value (typically 1),
    and then multiplying it in turn by each growth factor, which is typically a number just above 1. For instance, a growth
    factor of 1.1 reprsents a 10% increase, and 0.9 a 10% decrease. The results will show the successive results of applying
    the successive growth factors, with the first value of the list being the supplied baseValue, and final value of the results
    list being the product of all of the supplied values.  i.e. result[1] = baseValue * factor[1], result[n] = result[n-1]
    * factor[n]. The resulting list will have the one more element than the supplied list of factors. | inputs(baseValue:
    number (1..1), factor: number (0..*)) | output(result: number (0..*))'
  - 'Rosetta func: ArithmeticOperation | inputs(n1: number (1..1), op: ArithmeticOperationEnum (1..1), n2: number (1..1))
    | output(result: number (1..1))'
  - 'Rosetta func: Exp — Calculates the exponential function e^x. Handles zero and negative inputs by utilizing the inverse
    property exp(-x) = 1/exp(x), and delegates positive inputs to an argument reduction router to ensure numerical stability.
    | inputs(x: number (1..1)) | output(result: number (1..1))'
  - 'Rosetta func: Sqrt — Approximates the square root of a number using the Newton-Raphson method (Babylonian method). Utilizes
    a tiered initial guess strategy based on input magnitude followed by 10 unrolled iterations to ensure convergence to double
    precision. | inputs(x: number (1..1)) | output(result: number (1..1))'
  - 'Rosetta func: Log — Calculates the natural logarithm ln(x). Uses argument scaling to shift inputs into the optimal series
    convergence range (0.5 to 2.0) by applying logarithmic identities (e.g., ln(x) = ln(x*C) - ln(C)) for small or large inputs.
    | inputs(x: number (1..1)) | output(result: number (1..1))'
  - 'Rosetta func: Exp_Squaring_Helper — Reconstructs the exponential result by performing repeated squaring. Acts as the
    inverse operation to the argument reduction phase, calculating (val)^(2^count) to restore the original magnitude. | inputs(val:
    number (1..1), count_help: number (1..1)) | output(result: number (1..1))'
  - 'Rosetta func: Exp_Pos_Router — Routes positive inputs to the Taylor series core. Performs argument reduction by dividing
    large inputs by powers of 2 (2, 4, 8, or 16) to ensure the value passed to the series falls within the optimal convergence
    range (0.0 to 0.7). | inputs(val: number (1..1)) | output(res: number (1..1))'
  - 'Rosetta func: Exp_Core_Taylor — Calculates the exponential function using a 10th-degree Taylor-Maclaurin series expansion
    (1 + x + x^2/2! + ...). Optimized for small inputs using unrolled power calculations and pre-computed factorial constants
    to minimize computational cost. | inputs(val: number (1..1)) | output(approx: number (1..1))'
  - 'Rosetta func: Log_Internal_Series — Calculates the natural logarithm using the Inverse Hyperbolic Tangent series expansion
    up to degree 19. Optimized for the interval (0.5, 2.0) using unrolled power calculations and direct term division. | inputs(x:
    number (1..1)) | output(res: number (1..1))'
