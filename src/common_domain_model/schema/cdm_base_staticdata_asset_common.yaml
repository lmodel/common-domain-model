  EU_EMIR_EligibleCollateralEnum:
    description: 'Identifies European Union Eligible Collateral Assets classification categories based on EMIR Uncleared Margin
      Rules. Eligible Collateral asset classes for both initial margin (IM) and variation margin (VM) posted and collected
      between specified entities. Please note: EMIR regulation will detail which eligible collateral assets classes apply
      to each type of entity pairing (counterparty) and which apply to posting of IM and VM.'
    permissible_values:
      EU_EMIRTypeA:
        description: Denotes Cash in the form of money credited to an account in any currency, or similar claims for the repayment
          of money, such as money market deposits.
      EU_EMIRTypeB:
        description: ' Denotes gold in the form of allocated pure gold bullion of recognised good delivery.'
      EU_EMIRTypeC:
        description: ' Denotes debt securities issued by Member States'' central governments or central banks.'
      EU_EMIRTypeD:
        description: ' Denotes debt securities issued by Member States'' regional governments or local authorities whose exposures
          are treated as exposures to the central government of that Member State in accordance with Article 115(2) of Regulation
          (EU) No 575/2013.'
      EU_EMIRTypeE:
        description: ' Denotes debt securities issued by Member States'' public sector entities whose exposures are treated
          as exposures to the central government, regional government or local authority of that Member State in accordance
          with Article 116(4) of Regulation (EU) No 575/2013.'
      EU_EMIRTypeF:
        description: ' Denotes debt securities issued by Member States'' regional governments or local authorities other than
          those referred to in (TypeD.)'
      EU_EMIRTypeG:
        description: ' Denotes debt securities issued by Member States'' public sector entities other than those referred
          to in (TypeE).'
      EU_EMIRTypeH:
        description: ' Denotes debt securities issued by multilateral development banks listed in Article 117(2) of Regulation
          (EU) No 575/2013.'
      EU_EMIRTypeI:
        description: ' Denotes debt securities issued by the international organisations listed in Article 118 of Regulation
          (EU) No 575/2013.'
      EU_EMIRTypeJ:
        description: ' Denotes debt securities issued by third countries'' governments or central banks.'
      EU_EMIRTypeK:
        description: ' Denotes debt securities issued by third countries'' regional governments or local authorities that
          meet the requirements of (TypeD) and (TypeE).'
      EU_EMIRTypeL:
        description: ' Denotes debt securities issued by third countries'' regional governments or local authorities other
          than those referred to in (TypeD) and (TypeE).'
      EU_EMIRTypeM:
        description: ' Denotes debt securities issued by credit institutions or investment firms including bonds referred
          to in Article 52(4) of Directive 2009/65/EC of the European Parliament and of the Council.'
      EU_EMIRTypeN:
        description: ' Denotes corporate bonds.'
      EU_EMIRTypeO:
        description: ' Denotes the most senior tranche of a securitisation, as defined in Article 4(61) of Regulation (EU)
          No 575/2013, that is not a re-securitisation as defined in Article 4(63) of that Regulation.'
      EU_EMIRTypeP:
        description: ' Denotes convertible bonds provided that they can be converted only into equities which are included
          in an index specified pursuant to point (a) of Article 197 (8) of Regulation (EU) No 575/2013.'
      EU_EMIRTypeQ:
        description: ' Denotes equities included in an index specified pursuant to point (a) of Article 197(8) of Regulation
          (EU) No 575/2013.'
      EU_EMIRTypeR:
        description: ' Denotes shares or units in undertakings for collective investments in transferable securities (UCITS),
          provided that the conditions set out in Article 5 of EU Regulation 2016/2251 are met.'

  UK_EMIR_EligibleCollateralEnum:
    description: 'Identifies United Kingdom Eligible Collateral Assets classification categories based on UK Onshored EMIR
      Uncleared Margin Rules. Eligible Collateral asset classes for both initial margin (IM) and variation margin (VM) posted
      and collected between specified entities. Please note: UK EMIR regulation will detail which eligible collateral assets
      classes apply to each type of entity pairing (counterparty) and which apply to posting of IM and VM.'
    permissible_values:
      UK_EMIRTypeA:
        description: Denotes cash in the form of money credited to an account in any currency, or similar claims for the repayment
          of money, such as money market deposits.
      UK_EMIRTypeB:
        description: Denotes gold in the form of allocated pure gold bullion of recognised good delivery.
      UK_EMIRTypeC:
        description: Denotes debt securities issued by the central government of the United Kingdom or the Bank of England.
      UK_EMIRTypeD:
        description: Denotes debt securities issued by United Kingdom regional governments or local authorities whose exposures
          are treated as exposures to the central government of the United Kingdom in accordance with Article 115(2) of Regulation
          (EU) No 575/2013.
      UK_EMIRTypeE:
        description: Denotes debt securities issued by United Kingdom public sector entities whose exposures are treated as
          exposures to the central government, regional government or local authority of the United Kingdom in accordance
          with Article 116(4) of Regulation (EU) No 575/2013.
      UK_EMIRTypeF:
        description: Denotes debt securities issued by United Kingdom regional governments or local authorities other than
          those referred to in (TypeD).
      UK_EMIRTypeG:
        description: Denotes debt securities issued by United Kingdom public sector entities other than those referred to
          in (TypeE).
      UK_EMIRTypeH:
        description: Denotes debt securities issued by multilateral development banks listed in Article 117(2) of Regulation
          (EU) No 575/2013.
      UK_EMIRTypeI:
        description: Denotes debt securities issued by the international organisations listed in Article 118 of Regulation
          (EU) No 575/2013.
      UK_EMIRTypeJ:
        description: Denotes debt securities issued by third countries' governments or central banks.
      UK_EMIRTypeK:
        description: Denotes debt securities issued by third countries' regional governments or local authorities that meet
          the requirements of (TypeD) and (TypeE).
      UK_EMIRTypeL:
        description: Denotes debt securities issued by third countries' regional governments or local authorities other than
          those referred to in (TypeD) and (TypeE).
      UK_EMIRTypeM:
        description: Denotes debt securities issued by credit institutions or investment firms including bonds admitted to
          the register of regulated covered bonds maintained under Regulation 7(1)(b) of the Regulated Covered Bonds Regulations
          2008 (SI 2008/346).
      UK_EMIRTypeN:
        description: Denotes corporate bonds.
      UK_EMIRTypeO:
        description: Denotes the most senior tranche of a securitisation, as defined in Article 4(61) of Regulation (EU) No
          575/2013, that is not a re-securitisation as defined in Article 4(63) of that Regulation.
      UK_EMIRTypeP:
        description: Denotes convertible bonds provided that they can be converted only into equities which are included in
          an index specified pursuant to point (a) of Article 197 (8) of Regulation (EU) No 575/2013.
      UK_EMIRTypeQ:
        description: Denotes equities included in an index specified pursuant to point (a) of Article 197(8) of Regulation
          (EU) No 575/2013.
      UK_EMIRTypeR:
        description: Denotes shares or units in undertakings for UK UCITS, provided that the conditions set out in Article
          5 of EU Regulation 2016/2251 (as modified by the Technical Standards (European Market Infrastructure) (EU Exit)
          (No. 3) Instrument 2019) are met.

  US_CFTC_PR_EligibleCollateralEnum:
    description: 'Identifies US Eligible Collateral Assets classification categories based on Uncleared Margin Rules published
      by the CFTC and the US Prudential Regulator. Note: While the same basic categories exist in the CFTC and US Prudential
      Regulators margin rules, the precise definitions or application of those rules could differ between the two rules.'
    permissible_values:
      US_CFTC_PRType1:
        description: Denotes immediately available cash funds denominated in USD, a major currency, a currency of settlement
          for the uncleared swap.
      US_CFTC_PRType2:
        description: Denotes a security that is issued by, or unconditionally guaranteed as to the timely payment of principal
          and interest by, the U.S. Department of the Treasury.
      US_CFTC_PRType3:
        description: Denotes a security that is issued by, or unconditionally guaranteed as to the timely payment of principal
          and interest by, a U.S. government agency (other than the U.S. Department of Treasury) whose obligations are fully
          guaranteed by the full faith and credit of the United States government.
      US_CFTC_PRType4:
        description: Denotes a security that is issued by, or fully guaranteed as to the payment of principal and interest
          by, the European Central Bank or a sovereign entity that is assigned no higher than a 20 percent risk weight under
          the capital rules applicable to swap dealers subject to regulation by a prudential regulator.
      US_CFTC_PRType5A:
        description: Denotes a publicly traded debt security issued by, or an asset-backed security fully guaranteed as to
          the timely payment of principal and interest by, a U.S. Government-sponsored enterprise that is operating with capital
          support or another form of direct financial assistance received from the U.S. government that enables the repayments
          of the U.S. Government-sponsored enterprise's eligible securities.
      US_CFTC_PRType5B:
        description: Denotes a publicly traded debt security, but not an asset backed security, that is investment grade and
          issued by a U.S. Government-sponsored enterprise that is not operating with capital support or another form of direct
          financial assistance received from the U.S. government.
      US_CFTC_PRType6:
        description: Denotes a security that is issued by, or fully guaranteed as to the payment of principal and interest
          by, the Bank for International Settlements, the International Monetary Fund, or a multilateral development bank.
      US_CFTC_PRType7:
        description: 'Denotes publicly-traded debt, but not an asset backed security, that is investment grade and is not
          a debt security issued by a  U.S. Government-sponsored enterprise. This category excludes a security issued by a
          non-bank financial institution supervised by the board of governors of the Federal Reserve System under Title I
          of the Dodd-Frank Wall Street Reform and Consumer Protection Act. This category also excludes a security issued
          by any of the following entities, by a company that would be any of the following entities if it were the organized
          under the laws of the United States or any State, or in either case by an affiliate of such an entity: the party
          posting the collateral, a bank holding company, a savings and loan holding company, a U.S. intermediate holding
          company, a foreign bank, a depositary institution, a securities holding company, a broker, a dealer, a futures commission
          merchant, a swap dealer, or a security-based swap dealer.'
      US_CFTC_PRType8A:
        description: 'Denotes a publicly traded common equity security that is included in the Standard & Poor''s Composite
          500 Index or related indexes. This category excludes a security issued by a non-bank financial institution supervised
          by the board of governors of the Federal Reserve System under Title I of the Dodd-Frank Wall Street Reform and Consumer
          Protection Act. This category also excludes a security issued by any of the following entities, by a company that
          would be any of the following entities if it were the organized under the laws of the United States or any State,
          or in either case by an affiliate of such an entity: the party posting the collateral, a bank holding company, a
          savings and loan holding company, a U.S. intermediate holding company, a foreign bank, a depositary institution,
          a securities holding company, a broker, a dealer, a futures commission merchant, a swap dealer, or a security-based
          swap dealer.'
      US_CFTC_PRType8B:
        description: ' Denotes a publicly traded common equity security that is included in the Standard & Poor''s Composite
          1500 Index or related indexes. This category excludes a security issued by a non-bank financial institution supervised
          by the board of governors of the Federal Reserve System under Title I of the Dodd-Frank Wall Street Reform and Consumer
          Protection Act. This category also excludes a security issued by any of the following entities, by a company that
          would be any of the following entities if it were the organized under the laws of the United States or any State,
          or in either case by an affiliate of such an entity: the party posting the collateral, a bank holding company, a
          savings and loan holding company, a U.S. intermediate holding company, a foreign bank, a depositary institution,
          a securities holding company, a broker, a dealer, a futures commission merchant, a swap dealer, or a security-based
          swap dealer.'
      US_CFTC_PRType8C:
        description: 'Denotes a publicly traded common equity security that is included in an index that a regulated swap
          entity''s supervisor in a foreign jurisdiction recognizes for purposes of including publicly traded common equity
          as initial margin under applicable regulatory policy, if held in that foreign jurisdiction. This category excludes
          a security issued by a non-bank financial institution supervised by the board of governors of the Federal Reserve
          System under Title I of the Dodd-Frank Wall Street Reform and Consumer Protection Act. This category also excludes
          a security issued by any of the following entities, by a company that would be any of the following entities if
          it were the organized under the laws of the United States or any State, or in either case by an affiliate of such
          an entity: the party posting the collateral, a bank holding company, a savings and loan holding company, a U.S.
          intermediate holding company, a foreign bank, a depositary institution, a securities holding company, a broker,
          a dealer, a futures commission merchant, a swap dealer, or a security-based swap dealer.'
      US_CFTC_PRType9:
        description: 'Denotes securities in the form of redeemable securities in a pooled investment fund representing the
          security-holder''s proportional interest in the fund''s net assets and that are issued and redeemed only on the
          basis of the market value of the fund''s net assets prepared each business day after the security-holder makes its
          investment commitment or redemption request to the fund, if the fund''s investments are limited to the following:
          (A) securities that are issued by, or unconditionally guaranteed as to the timely payment of principal and interest
          by, the U.S. Department of the Treasury, and immediately-available cash funds denominated in U.S. dollars; or (B)
          securities denominated in a common currency and issued by, or fully guaranteed as to the payment of principal and
          interest by, the European Central Bank or a sovereign entity that is assigned no higher than a 20 percent risk weight
          under the capital rules applicable to swap dealers subject to regulation by a prudential regulator, and immediately-available
          cash funds denominated in the same currency; and (C) assets of the fund may not be transferred through securities
          lending, securities borrowing, repurchase agreements, reverse repurchase agreements, or other means that involve
          the fund having rights to acquire the same or similar assets from the transferee.'
      US_CTFC_PRType10:
        description: Denotes Gold.

