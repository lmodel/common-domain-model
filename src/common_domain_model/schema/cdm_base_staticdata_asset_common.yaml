id: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
name: cdm_base_staticdata_asset_common
description: 'Basic static asset concepts that apply across asset classes: taxonomy etc.'
license: Apache-2.0
see_also:
- https://cdm.finos.org/

prefixes:
  common_domain_model: https://w3id.org/lmodel/common_domain_model/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fpml: http://www.fpml.org/coding-scheme/
  icma: https://www.icmagroup.org/market-practice-and-regulatory-policy/
  fpml_5_10: https://www.fpml.org/spec/fpml-5-10#
  gist: https://w3id.org/lmodel/gist/
default_prefix: common_domain_model
default_range: string

imports:
- linkml:types
- ./cdm_base_math
- ./cdm_base_staticdata_party
- ./cdm_observable_asset

comments:
- 'Rosetta func: AssetIdentifierByType — Returns all the Asset Identifiers of a certain Identifier Type. | inputs(identifiers:
  AssetIdentifier (0..*), idType: AssetIdTypeEnum (1..1)) | output(filteredIdentifier: AssetIdentifier (0..*))'
- 'Rosetta func: GetCashCurrency — Returns the enumerated Currency Code of a Cash asset. | inputs(cash: Cash (1..1)) | output(currencyEnum:
  CurrencyCodeEnum (1..1))'
- 'Rosetta func: SetCashCurrency — Sets (or updates) the string identifier of a Cash asset using an enumerated Currency Code.
  | inputs(cash: Cash (0..1), currency: CurrencyCodeEnum (1..1)) | output(cashOutput: Cash (1..1))'
annotations:
  rosetta_functions: '[{"name":"AssetIdentifierByType","description":"Returns all the Asset Identifiers of a certain Identifier
    Type.","inputs":[{"name":"identifiers","type":"AssetIdentifier","cardinality":"0..*"},{"name":"idType","type":"AssetIdTypeEnum","cardinality":"1..1"}],"output":{"name":"filteredIdentifier","type":"AssetIdentifier","cardinality":"0..*"}},{"name":"GetCashCurrency","description":"Returns
    the enumerated Currency Code of a Cash asset.","inputs":[{"name":"cash","type":"Cash","cardinality":"1..1"}],"output":{"name":"currencyEnum","type":"CurrencyCodeEnum","cardinality":"1..1"}},{"name":"SetCashCurrency","description":"Sets
    (or updates) the string identifier of a Cash asset using an enumerated Currency Code.","inputs":[{"name":"cash","type":"Cash","cardinality":"0..1"},{"name":"currency","type":"CurrencyCodeEnum","cardinality":"1..1"}],"output":{"name":"cashOutput","type":"Cash","cardinality":"1..1"}}]'

subsets:
  cdm_base_staticdata_asset_common:
    description: Classes defined in the cdm_base_staticdata_asset_common module.

enums:
  AssetClassEnum:
    description: The enumerated values to specify the FpML asset class categorization.
    exact_mappings:
    - http://www.fpml.org/coding-scheme/asset-class
    permissible_values:
      Commodity:
        description: Commodity.
        meaning: http://www.fpml.org/coding-scheme/asset-class-2-1#Commodity
      Credit:
        description: Credit.
        meaning: http://www.fpml.org/coding-scheme/asset-class-2-1#Credit
      Equity:
        description: Equity.
        meaning: http://www.fpml.org/coding-scheme/asset-class-2-1#Equity
      ForeignExchange:
        description: ForeignExchange.
        meaning: http://www.fpml.org/coding-scheme/asset-class-2-1#ForeignExchange
      InterestRate:
        description: InterestRate.
        meaning: http://www.fpml.org/coding-scheme/asset-class-2-1#InterestRate
      MoneyMarket:
        description: Money Market Assets like CP and CD.

  AssetIdTypeEnum:
    description: Extends product identifiers with additional identifier sources for Assets.
    inherits:
    - ProductIdTypeEnum
    permissible_values:
      CurrencyCode:
        description: Used to identify the currency of a Cash Asset.
      ExchangeCode:
        description: The identifier follows the symbology set by the exchange which lists the asset.
      ClearingCode:
        description: The identifier follows the symbology set by the clearing house which clears the asset.

  ProductIdTypeEnum:
    description: Provides the enumerated values to specify the product identifier source.
    permissible_values:
      BBGID:
        description: Published by Bloomberg, the BBGID is a 12-digit alphanumeric randomly generated ID covering active and
          non-active securities.
      BBGTICKER:
        description: Published by Bloomberg as a short code to identify publicly trades shares of a particular stock on a
          specific exchange.
      CUSIP:
        description: Derived from the Committee on Uniform Security Identification Procedures, CUSIPs are 9-character identifiers
          that capture an issue’s important differentiating characteristics for issuers and their financial instruments in
          the U.S. and Canada.
      FIGI:
        description: Issued under the guidelines of the Object Management Group, the Financial Instrument Global Identifier
          (FIGI) is a 12 character, alphanumeric, randomly generated ID covering hundreds of millions of active and inactive
          instruments. The identifier acts as a Uniform Resource Identifier (URI) to link to a set of metadata that uniquely
          and clearly describes the instrument.
      ISDACRP:
        description: Issued by the International Swaps Dealers Association as a string representing a Commodity Reference
          Price used for purposes of determining a relevant price for an underlying commodity in an OTC derivatives contract.
      ISIN:
        description: Issued by The International Securities Identification Number (ISIN) Organization, the ISIN is a 12-character
          alpha-numerical code used to uniformly identify a security for trading and settlement purposes. Securities with
          which ISINs can be used include debt securities, such as notes or bonds as well shares, such as common stock or
          shares of a fund, options, derivatives, and futures. The ISIN structure is defined in ISO 6166.
      Name:
        description: The name of the product.
      REDID:
        description: Assigned by S&P Global Market Intelligence, REDID (Reference Entity Data Identifier) is a unique alphanumeric
          code to reference entities, primarily utilized within the credit derivatives market for the standardized identification
          of underlying entities.
      RIC:
        description: Issued by Refinitiv (formerly Reuters), the Reuters Instrument Codes(RIC) uniquely identifies financial
          instruments, including where they are traded.
      Other:
        description: Used when the source is not otherwise in this enumerated list because it is internal or other reasons.  The
          source can be identified in the scheme which is part of the identifier attribute.
      Sicovam:
        description: Issued by the French Société Interprofessionnelle pour la Compensation des Valeurs Mobilières (SICOVAM)
          to identify French securities listed on French stock exchanges.
      SEDOL:
        description: Assigned by the London Stock Exchange, the Stock Exchange Daily Official List (SEDOL) is a list of security
          identifiers used in the United Kingdom and Ireland for clearing purposes.  SEDOLs serve as the National Securities
          Identifying Number for all securities issued in the United Kingdom and are therefore part of the security's ISIN
          as well.
      UPI:
        description: Assigned by the Derivatives Service Bureau Ltd (DSB), the Unique Product Identifier (UPI) is a unique
          code to describe an over-the-counter (OTC) derivatives product.  The UPI is used for identifying the product in
          transaction reporting data.
      Valoren:
        description: Assigned by SIX Financial Information, Valoren is a unique numerical identification number typically
          ranging from six to nine digits primarily traded in Switzerland, Liechtenstein, and Belgium. This code enables the
          identification of securities such as stocks, bonds, and investment funds within these markets.
      Wertpapier:
        description: Issued by the Institute for the Issuance and Administration of Securities in Germany (Securities Information),
          the Wertpapierkennnummer (WKN, WPKN, WPK or simply Wert) consists of six digits or capital letters (excluding I
          and O), and no check digit. It is used to identify German securities.

  TaxonomySourceEnum:
    description: Represents the enumerated values to specify taxonomy sources.
    permissible_values:
      CFI:
        description: Represents the ISO 10962 Classification of Financial Instruments code.
      ISDA:
        description: Represents the ISDA product taxonomy.
      ICAD:
        description: Represents the ISDA Collateral Asset Definition Identifier code.
      EMIR:
        description: Represents the EMIR Article 9 Asset Definition Identifier code.
      EU_EMIR_EligibleCollateralAssetClass:
        description: Identifies European Union Eligible Collateral Assets classification categories based on EMIR Uncleared
          Margin Rules.
      UK_EMIR_EligibleCollateralAssetClass:
        description: 'Identifies United Kingdom Eligible Collateral Assets classification categories based on UK Onshored
          EMIR Uncleared Margin Rules Eligible Collateral asset classes for both initial margin (IM) and variation margin
          (VM) posted and collected between specified entities.Please note: UK EMIR regulation will detail which eligible
          collateral assets classes apply to each type of entity pairing (counterparty) and which apply to posting of IM and
          VM.'
      CFTC:
        description: Represents the Commodity Futures Trading Commission (CFTC) as a taxonomy source.
      US_CFTC_PR_EligibleCollateralAssetClass:
        description: 'Identifies US Eligible Collateral Assets classification categories based on Uncleared Margin Rules published
          by the CFTC and the US Prudential Regulator. Note: While the same basic categories exist in the CFTC and US Prudential
          Regulators margin rules, the precise definitions or application of those rules could differ between the two rules.'
      MAS:
        description: Represents the Monetary Authority of Singapore (MAS) as a taxonomy source.
      CSA:
        description: Represents the Canadian Securities Administrators (CSA) as a taxonomy source.
      Other:
        description: Denotes a user-specific scheme or taxonomy or other external sources not listed here.

