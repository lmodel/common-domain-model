  CurrencyCodeEnum:
    description: Union of the enumerated values defined by the International Standards Organization (ISO) and the FpML nonISOCurrencyScheme
      which consists of offshore and historical currencies (https://www.fpml.org/coding-scheme/non-iso-currency), as of 28-Oct-2016.
    inherits:
    - ISOCurrencyCodeEnum
    permissible_values:
      CNH:
        description: Offshore Chinese Yuan traded in Hong Kong.
      CNT:
        description: Offshore Chinese Yuan traded in Taiwan.
      GGP:
        description: Guernsey Pound.
      IMP:
        description: Isle of Man Pound.
      JEP:
        description: Jersey Pound.
      KID:
        description: Tuvaluan Dollar.
      MCF:
        description: Monegasque Franc.
      SML:
        description: Sammarinese Lira.
      VAL:
        description: Vatican Lira.

  CollateralEntityTypeEnum:
    description: Represents an enumeration list to identify the type of entity issuing or guaranteeing the collateral asset.
    permissible_values:
      SupraNational:
        description: Specifies international organisations and multilateral banks, entities constituted by treaties or with
          multiple sovereign members includes Multilateral development Banks.
      SovereignCentralBank:
        description: Specifies Sovereign, Government Debt Securities including Central Banks.
      QuasiGovernment:
        description: Specifies institutions or bodies, typically constituted by statute, with a function mandated by the government
          and subject to government supervision inclusive of profit- and non-profit making bodies. Includes the US Agencies
          and GSEs and the EU concept of public sector entities. Excluding any entities which are also Regional Government.
      RegionalGovernment:
        description: Specifies Regional Governments including states within countries, local authorities and municipalities.
      Corporate:
        description: Specifies corporate bodies including Banks.
      Fund:
        description: Specifies a vehicle (with or without separate legal personality) designed for the purposes of collective
          investment towards a defined investment goal.
      SpecialPurposeVehicle:
        description: Specifies a vehicle setup for the purpose of acquisition and financing of specific assets on a limited
          recourse basis. E.g. asset backed securities, including securitisations.

  SupraNationalIssuerTypeEnum:
    description: Represents an enumeration list to identify the type of supranational entity issuing the asset.
    permissible_values:
      InternationalOrganisation:
        description: Specifies International Financial Institution.
      MultilateralBank:
        description: Specifies Multilateral Bank or Multilateral Development Bank.

  CreditRiskEnum:
    description: Represents an enumeration list to identify tranched or untranched credit risk.
    permissible_values:
      TranchedCreditRisk:
        description: Indicates tranched credit risk, including securitizations.
      UntranchedCreditRisk:
        description: Indicates tranched credit risk, including repackagings.

  SecurityTypeEnum:
    description: Represents an enumeration list to indentify the type of a security.
    permissible_values:
      Debt:
        description: Identifies a security as a fixed income security of debt issued and securitized as a tradable asset.
      Equity:
        description: Identifies a security as an Equity value of holding of shares in listed company.
      Fund:
        description: Identifies a security as representing holding in an investment fund.
      Warrant:
        description: Identifies a security as a Warrant that give the right, but not the obligation, to buy or sell a security
          — most commonly an equity — at a certain price before expiration, or to receive the cash equivalent.
      Certificate:
        description: Identifies a security as one that that offers a derivative-based economic return which is not structured
          as a bond, an equity or a warrant. Note that this security type is not a Certificate of Deposit (aka CD).

  PutCallEnum:
    description: The enumerated values to specify the types of listed derivative options.
    permissible_values:
      Put:
        description: A put option gives the holder the right to sell the underlying asset by a certain date for a certain
          price.
      Call:
        description: A call option gives the holder the right to buy the underlying asset by a certain date for a certain
          price.

  EquityTypeEnum:
    description: Represents an enumeration list to identify the type of Equity.
    permissible_values:
      Ordinary:
        description: Identifies an Equity of Common stocks and shares.
      NonConvertiblePreference:
        description: Identifies an Equity of Non-Convertible Preference, Shares which hold priority to receive capital return
          in event of issuer liquidation.
      DepositaryReceipt:
        description: Identifies a negotiable depositary receipt certificate issued by a bank representing shares in a foreign
          company traded on a local stock exchange.
      ConvertiblePreference:
        description: Identifies an Equity of Convertible Preference, a stock which can be converted into a predetermined number
          of common shares and holds priority to receive capital return in event of issuer liquidation.

  DepositaryReceiptTypeEnum:
    permissible_values:
      ADR:
        description: American Depositary Receipts. Identifies a depositary receipt that are issued only by U.S. banks for
          foreign stocks that are traded on a U.S. exchange.
      GDR:
        description: Global Depositary Receipts. Identifies a depositary receipt that is listed on European and other international
          exchanges.
      IDR:
        description: Indian Depositary Receipts. Identifies a depositary receipt that are issued only by domestic depositories
          for foreign stocks that are traded on an Indian exchange.
      EDR:
        description: European Depositary Receipts. Identifies a depositary receipt that are issued only by European banks
          for foreign stocks that are traded on a European exchange.

  FundProductTypeEnum:
    description: Represents an enumeration list to identify the fund product type.
    permissible_values:
      MoneyMarketFund:
        description: Denotes a fund that invests only in highly liquid near-term instruments such as cash, cash equivalent
          securities, and high credit rating debt instruments with a short-term maturity.
      ExchangeTradedFund:
        description: Denotes an investment fund consisting of stocks, bonds, and/or other assets that is passively managed
          and traded on a stock exchange.
      MutualFund:
        description: Denotes an investment fund consisting of stocks, bonds, and/or other assets that is actively managed
          and can only be purchased or sold through the investment manager.
      OtherFund:
        description: Denotes a fund that is not an Exchange Traded Fund, Money Market Fund or Mutual Fund.

  MaturityTypeEnum:
    description: Represents an enumeration list to identify the Maturity.
    permissible_values:
      RemainingMaturity:
        description: Denotes a period from now until maturity date.
      OriginalMaturity:
        description: Denotes a period from issuance until maturity date.
      FromIssuance:
        description: Denotes a period from issuance date until now.

  SecuredTypeEnum:
    description: Specifies the type of secured debt.
    permissible_values:
      AssetBacked:
        description: Debt instrument with periodic income payments and value derived from or backed by a specified pool of
          underlying assets.
      CollateralizedObligation:
        description: Complex product that is backed by a pool of loans and other assets and sold to institutional investors.
      CoveredBonds:
        description: Specifies a debt obligations issued by credit institutions which offer a so-called double-recourse protection
          to bondholders.

  AssetBackedEnum:
    description: Specifies the underlying asset or asset pool securing an Asset Backed debt instrument.
    permissible_values:
      HomeEquity:
        description: When the asset(s) backing the debt are home equity loans, in which the borrower uses the equity of their
          home as collateral.
      AutoLoan:
        description: When the asset(s) backing the debt are auto loans.
      StudentLoan:
        description: When the asset(s) backing the debt are student loans.
      CreditCard:
        description: When the asset(s) backing the debt are credit card loans.
      Property:
        description: When the asset(s) backing the debt are property, typically when the debt is a mortgage loan.
      Mortgage:
        description: When the asset(s) backing the debt instrument is a pool of mortgage loans, e.g. for a mortgage backed
          security.
      Other:
        description: Any other asset which generates receivables for an Asset Backed Security.

  PropertyTypeEnum:
    description: Specifies different types of property.
    permissible_values:
      Commercial:
        description: Commercial property.
      Residential:
        description: Residential property.

  CollateralizedObligationEnum:
    description: Specifies the type of Collateralized Obligation.
    permissible_values:
      CDO:
        description: Collateralized Debt Obligation.
      CMO:
        description: Collateralized Mortgage Obligation.
      CLO:
        description: Collateralized Loan Obligation.
      CBO:
        description: Collateralized Bond Obligation.

  CoveredBondEnum:
    description: Specifies the type of Covered Bond.
    permissible_values:
      Pfandbriefe:
        description: German bank debenture collateralized by long-term assets.
      JumboPfandbriefe:
        description: Pfandbriefe with an issuing syndicate and a minimum issuance volume of EUR 1 billion.

  DebtSeniorityEnum:
    description: Specifies the order of repayment in the event of a sale or bankruptcy of the issuer or a related party (eg
      guarantor).
    permissible_values:
      Secured:
        description: Denotes debt which is secured over assets of the issuer or a related party (eg guarantor).
      Senior:
        description: Denotes debt  which ranks pari passu with all other unsecured creditors of the issuer.
      Subordinated:
        description: Denotes debt  owed to an unsecured creditor that in the event of a liquidation can only be paid after
          the claims of secured and senior creditors have been met.

  DebtInterestEnum:
    description: Represents an enumeration list that specifies the general rule for periodic interest rate payment.
    permissible_values:
      Fixed:
        description: Denotes payment calculated with reference to a fixed interest rate.
      Floating:
        description: Denotes payment calculated with reference to a floating interest rate.
      InflationLinked:
        description: Denotes payment calculated with reference to one or more specified inflation rates.
      IndexLinked:
        description: Denotes payment calculated with reference to one or more price or other indices (other than inflation
          rates).
      InterestOnly:
        description: Denotes a stripped bond representing only the interest component.
      OtherStructured:
        description: Denotes payment calculated with reference to other underlyings (not being floating interest rates, inflation
          rates or indices) or with a non-linear relationship to floating interest rates, inflation rates or indices.
      InverseFloating:
        description: Denotes payment calculated with reference to the inverse of a floating interest rate.
      ZeroCoupon:
        description: Denotes a zero coupon bond that does not pay intetrest.

  DebtPrincipalEnum:
    description: Represents an enumeration list that specifies the general rule for repayment of principal.
    permissible_values:
      Bullet:
        description: Denotes that the principal is paid all at once on maturity of the debt insrument. Bullet debt instruments
          cannot be redeemed early by an issuer, which means they are non-callable.
      Callable:
        description: Denotes that the principal on the debt can be repaid early, in whole or in part, at the option of the
          issuer.
      Puttable:
        description: Denotes that the principal on the debt can be repaid early, in whole or in part, at the option of the
          holder.
      Amortising:
        description: Denotes that the principal on the debt is paid down regularly, along with its interest expense over the
          life of the debt instrument.  Includes amortising instruments with a bullet balance repayment at maturity.
      InflationLinked:
        description: Denotes that the principal on the debt is calculated with reference to one or more specified inflation
          rates.
      IndexLinked:
        description: Denotes that the  principal on the debt is calculated with reference to one or more price or other indices
          (other than inflation rates).
      OtherStructured:
        description: Denotes that the  principal on the debt is calculated with reference to other underlyings (not being
          floating interest rates, inflation rates or indices) or with a non-linear relationship to floating interest rates,
          inflation rates or indices.
      PrincipalOnly:
        description: Denotes a stripped bond representing only the principal component.

  RedemptionTypeEnum:
    description: Specifies the contractual redemption or conversion features associated with a debt security.
    permissible_values:
      Convertible:
        description: Specifies a debt instrument that can be converted into common shares.
      Exchangeable:
        description: Specifies a debt security that can be converted to equity in a company other than the issuing company.
      ContingentConvertible:
        description: Specifies a debt security that can be converted into equity if a pre-defined trigger event occurs.
      Sinkable:
        description: Specifies a debt security that requires the issuer to periodically set aside money to buy back portions
          of the debt.
      Extraordinary:
        description: Specifies a debt security that can be redeemed early if certain extraordinary events occur.

  RedemptionPartyEnum:
    description: Specifies the redeeming party of a debt security.
    permissible_values:
      Holder:
        description: Specifies the holder of a debt security.
      Issuer:
        description: Specifies the issuer of a debt security.

  AssetTypeEnum:
    description: Represents an enumeration list to identify the asset type.
    permissible_values:
      Security:
        description: Identifies negotiable financial instrument of monetary value with an issue ownership position.
      Cash:
        description: Identifies cash in a currency form.
      Commodity:
        description: Identifies basic good used in commerce that is interchangeable with other goods of the same type.
      ListedDerivative:
        description: Identifies an asset as a listed derivative on an exchange.
      Loan:
        description: An asset that represents a loan or borrow obligation.
      LetterOfCredit:
        description: Identifies an asset as a letter of credit or documentary credit/ bankers commercial credit.  A payment
          mechanism used in international trade to provide economic guarantee of payment by a creditworthy issuer for payment
          of exported goods.
      Other:
        description: Identifies other asset types.

  MoneyMarketTypeEnum:
    permissible_values:
      CommercialPaper: {}
      CertificateOfDeposit: {}

  DeliveryNearbyTypeEnum:
    permissible_values:
      CalculationPeriod:
        description: Describes the reference contract as the one that pertains to the month-year of the calculation period.
          If used, the nearby count is expected to be 0.
      NearbyMonth:
        description: Specifies that the reference delivery date of the underlying Commodity shall be the expiration date of
          the futures contract in the nth nearby month.
      NearbyWeek:
        description: Specifies that the reference delivery date of the underlying Commodity shall be the expiration date of
          the futures contract in the nth nearby week.

