  CSASpecifiedOrAccessConditionEnum:
    name: CSASpecifiedOrAccessConditionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CSASpecifiedOrAccessConditionEnum
    description: Specifies the types of events in the related Master Agreement that,
      when triggered, could temporarily or permanently suspend rights to rehypothecate,
      transfer or substitute collateral.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    permissible_values:
      Illegality:
        text: Illegality
        description: Specifies an event where a party is unable to comply with its
          obligations under the Master Agreement because to do so would be unlawful.
      TaxEvent:
        text: TaxEvent
        description: Specifies an event where a party experiences changes in tax laws
          incurring further tax liability.
      TaxEventUponMerger:
        text: TaxEventUponMerger
        description: Specifies an event where a party incurs tax liability due to
          a merger.
      CreditEventUponMerger:
        text: CreditEventUponMerger
        description: Specifies an event where a party merges and the new entity becomes
          materially less creditworthy than the original.
      AdditionalTerminationEvents:
        text: AdditionalTerminationEvents
        description: Specifies events which could trigger rights to early termination.
      ForceMajeureEvent:
        text: ForceMajeureEvent
        description: Specifies an event beyond the control of one or both of the parties
          which prevents or renders it impossible to fulfill their obligations to
          the other party.
      PotentialTerminationEvents:
        text: PotentialTerminationEvents
        description: Specifies a potential event that could trigger rights to early
          termination.
  AdditionalTerminationEventEnum:
    name: AdditionalTerminationEventEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdditionalTerminationEventEnum
    description: Specifies the types of events found in the related Master Agreement
      that may lead to the early termination of the Master Agreement, including suspension
      of the affected party's rights to rehypothecate, transfer, or substitute collateral.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    permissible_values:
      FailureToNotifyNAV:
        text: FailureToNotifyNAV
        description: Specifies an event where a party fails to notify the other of
          a decline in Net Asset Value by a specified amount over a specified period
          of time.
      InvestmentAdvisor:
        text: InvestmentAdvisor
        description: Specifies an event where the investment advisor of a party ceases
          to act for the party.
      KeyPersons:
        text: KeyPersons
        description: Specifies an event where a person deemed important to a party
          has departed.
      NAVDeclineTrigger:
        text: NAVDeclineTrigger
        description: Specifies an event in which a partys Net Asset Value (NAV) has
          declined beyond a specified percentage or amount within a defined time period.
      NAVFloor:
        text: NAVFloor
        description: Specifies an event in which a partys Net Asset Value (NAV) falls
          below a predetermined absolute value, regardless of the timeframe over which
          the decline occurs. This value sets a minimum acceptable NAV threshold expressed
          as either a percentage or amount.
      OperativeDocs:
        text: OperativeDocs
        description: Specifies an event where a party delivers operative documents
          that are invalid, untrue or unenforceable.
      RatingsDowngradeOrWithdrawalParty1:
        text: RatingsDowngradeOrWithdrawalParty1
        description: Specifies an event where Party 1 experiences a downgrade beyond
          a predetermined level, or has their credit rating withdrawn or suspended.
      RatingsDowngradeOrWithdrawalParty2:
        text: RatingsDowngradeOrWithdrawalParty2
        description: Specifies an event where Party 2 experiences a downgrade beyond
          a predetermined level, or has their credit rating withdrawn or suspended.
      AsApplicable:
        text: AsApplicable
        description: Represents the Additional Termination Event(s) in the related
          Master Agreement.
      AsSpecified:
        text: AsSpecified
        description: Represents any bespoke Additional Termination Event(s) that are
          set out in the related Specified Condition clause.
