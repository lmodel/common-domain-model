    definition_uri: https://w3id.org/lmodel/common_domain_model/QuantityChangeInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_QuantityChange","description":"A specification of
          the inputs, outputs and constraints when calculating the after state of
          a Quantity Change Primitive Event","inputs":[{"name":"instruction","type":"QuantityChangeInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"quantityChange","type":"TradeState","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePriceChangeInstruction","description":"Creates
          a price change instruction for an on-demand rate change, based on a new
          rate provided as a single number by matching it to a single rate price.","inputs":[{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"},{"name":"newRate","type":"number","cardinality":"1..1"}],"output":{"name":"quantityChangeInstruction","type":"QuantityChangeInstruction","cardinality":"1..1"}}]'
    description: Instructions required to create a Quantity Change Primitive Event,
      which can be either an increase, a decrease or a replacement. An increase adds
      a new trade lot to the original trade, whereas a decrease subtracts from an
      existing trade lot's quantity. A replacement updates the quantity of an existing
      trade lot to the new value.
    comments:
    - "Rosetta func: Create_QuantityChange \u2014 A specification of the inputs, outputs\
      \ and constraints when calculating the after state of a Quantity Change Primitive\
      \ Event"
    - "Rosetta func: Create_OnDemandRateChangePriceChangeInstruction \u2014 Creates\
      \ a price change instruction for an on-demand rate change, based on a new rate\
      \ provided as a single number by matching it to a single rate price."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:QuantityChangeInstruction
    slots:
    - change
    - direction
    - QuantityChangeInstruction_lotIdentifier
    slot_usage:
      lotIdentifier:
        name: lotIdentifier
        description: Identifier for the new lot (in case of increase) or for the existing
          lot to be changed(in case of decrease or replacement). This optional attribute
          is mandatory in case of a decrease or replacement if the initial trade state
          contains multiple trade lots.
        multivalued: true
    class_uri: common_domain_model:QuantityChangeInstruction
  IndexTransitionInstruction:
    name: IndexTransitionInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/IndexTransitionInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_IndexTransitionTermsChange","description":"Function
          specification to create a terms change that contains changes to the floating
          rate indexes and adds an adjustment spread to any existing spread.","inputs":[{"name":"instruction","type":"IndexTransitionInstruction","cardinality":"1..1"},{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"termsChange","type":"TradeState","cardinality":"1..1"}}]'
    description: Defines the information needed to create a Index Transition Business
      Event.
    comments:
    - "Rosetta condition: PriceQuantity \u2014 priceQuantity -> price -> priceType\
      \ contains PriceTypeEnum -> InterestRate and priceQuantity -> observable ->\
      \ Index -> InterestRateIndex exists and priceQuantity -> quantity is absent"
    - "Rosetta func: Create_IndexTransitionTermsChange \u2014 Function specification\
      \ to create a terms change that contains changes to the floating rate indexes\
      \ and adds an adjustment spread to any existing spread."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:IndexTransitionInstruction
    slots:
    - IndexTransitionInstruction_priceQuantity
    - IndexTransitionInstruction_effectiveDate
    - cashTransfer
    slot_usage:
      priceQuantity:
        name: priceQuantity
        description: 'Specifies both new floating rate index and spread adjustment
          for each leg to be updated.  The spread adjustment accounts for the difference
          between the old floating rate index relative to the new one. This spread
          amount is added to the existing spread to determine the new spread, which
          is applied from the specified effective date forward. In the case of the
          IBOR Fallback Rate Adjustments, the adjustment spread (also known as the
          Fallback Adjustment) accounts for two distinctions: i) the fact that the
          replacement Risk-Free Rate is an overnight rate while IBORs have term structures
          (e.g., 1, 3, 6-month LIBOR); and (ii) the historical spread differential
          between IBORs and their term equivalent Overnight Risk-Free Rate compounded
          rates.'
      effectiveDate:
        name: effectiveDate
        description: Specifies the effective date of the index transition event. This
          is first date on which the floating rate calculation will use the new floating
          rate index and adjusted spread in the floating rate calculation.
        required: true
    class_uri: common_domain_model:IndexTransitionInstruction
  TermsChangeInstruction:
    name: TermsChangeInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/TermsChangeInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_TermsChange","description":"A specification of the
          inputs, outputs and constraints when calculating the after tradeState based
          Terms Change Primitive Instruction.","inputs":[{"name":"termsChange","type":"TermsChangeInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"tradeState","type":"TradeState","cardinality":"1..1"}},{"name":"Create_EffectiveOrTerminationDateTermChangeInstruction","description":"Creates
          the relevant terms change primitive instruction object for rolling a contractual
          product, which consists in the same terms as the original contractual product
          but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_RollTermChangeInstruction","description":"Creates
          the relevant terms change primitive instruction object for rolling a contractual
          product, which consists in the same terms as the original contractual product
          but with different effective and termination dates.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangeTermsChangeInstruction","description":"Creates
          a terms change instruction for an on-demand rate change, based on a new
          rate provided as a single number. This instruction only updates the effective
          date but keeps other details of the trade unchanged.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_CancellationTermChangeInstruction","description":"Create
          a terms change instruction for a cancellation that consists in bringing
          the termination date forward.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionInstruction","description":"Creates
          the terms change instruction that updates the payout with the new substitution
          payout.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}}]'
    description: Specifies instructions for terms change consisting of the new transaction
      terms, and the renegotiation fee.
    comments:
    - "Rosetta condition: AtLeastOneOf \u2014 (product exists or ancillaryParty exists\
      \ or adjustment exists)"
    - "Rosetta func: Create_TermsChange \u2014 A specification of the inputs, outputs\
      \ and constraints when calculating the after tradeState based Terms Change Primitive\
      \ Instruction."
    - "Rosetta func: Create_EffectiveOrTerminationDateTermChangeInstruction \u2014\
      \ Creates the relevant terms change primitive instruction object for rolling\
      \ a contractual product, which consists in the same terms as the original contractual\
      \ product but with different effective and termination dates."
    - "Rosetta func: Create_RollTermChangeInstruction \u2014 Creates the relevant\
      \ terms change primitive instruction object for rolling a contractual product,\
      \ which consists in the same terms as the original contractual product but with\
      \ different effective and termination dates."
    - "Rosetta func: Create_OnDemandRateChangeTermsChangeInstruction \u2014 Creates\
      \ a terms change instruction for an on-demand rate change, based on a new rate\
      \ provided as a single number. This instruction only updates the effective date\
      \ but keeps other details of the trade unchanged."
    - "Rosetta func: Create_CancellationTermChangeInstruction \u2014 Create a terms\
      \ change instruction for a cancellation that consists in bringing the termination\
      \ date forward."
    - "Rosetta func: Create_SubstitutionInstruction \u2014 Creates the terms change\
      \ instruction that updates the payout with the new substitution payout."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:TermsChangeInstruction
    slots:
    - TermsChangeInstruction_product
    - TermsChangeInstruction_ancillaryParty
    - adjustment
    slot_usage:
      product:
        name: product
        description: product to be changed
        required: false
      ancillaryParty:
        name: ancillaryParty
        description: ancillary party to be changed
        range: AncillaryParty
        multivalued: true
    class_uri: common_domain_model:TermsChangeInstruction
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            product:
              name: product
              required: true
        - slot_conditions:
            ancillaryParty:
              name: ancillaryParty
              required: true
        - slot_conditions:
            adjustment:
              name: adjustment
              required: true
      description: AtLeastOneOf
  SplitInstruction:
    name: SplitInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/SplitInstruction
    description: Specifies instructions for a split, consisting of a breakdown of
      instructions to be applied to each branch of the split. This instruction can
