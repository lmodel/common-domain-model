          business center.
        range: BusinessCenterTime
        required: false
    class_uri: common_domain_model:NotificationTimeElection
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            notificationTime:
              name: notificationTime
              required: true
        - slot_conditions:
            customNotification:
              name: customNotification
              required: true
      description: The Notification Time is specified either as a time that is qualified
        by a standard business center or as a custom election.
  OneWayProvisions:
    name: OneWayProvisions
    definition_uri: https://w3id.org/lmodel/common_domain_model/OneWayProvisions
    description: A class to specify whether One Way Provisions apply.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(aa)" name "One Way
      Provisions"
    comments:
    - "Rosetta condition: PostingPartyExists \u2014 if isApplicable = True then postingParty\
      \ exists"
    - "Rosetta condition: PostingPartyAbsent \u2014 if isApplicable = False then postingParty\
      \ is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:OneWayProvisions
    slots:
    - OneWayProvisions_isApplicable
    - postingParty
    slot_usage:
      isApplicable:
        name: isApplicable
        description: The determination of whether the One Way Provisions are applicable
          (true) or not applicable (false).
    class_uri: common_domain_model:OneWayProvisions
    rules:
    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'True'
      postconditions:
        slot_conditions:
          postingParty:
            name: postingParty
            required: true
      description: A data rule to enforce that the Posting Party must be specified
        in the case where the One Way Provision is deemed applicable.
    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'False'
      postconditions:
        slot_conditions:
          postingParty:
            name: postingParty
            required: false
      description: A data rule to enforce that the Posting Party must not be specified
        in the case where the One Way Provision is not deemed applicable.
