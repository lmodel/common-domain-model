    - common_domain_model:Asset
    abstract: true
    class_uri: common_domain_model:Asset
    union_of:
    - Cash
    - Commodity
    - DigitalAsset
    - Instrument
  Instrument:
    name: Instrument
    definition_uri: https://w3id.org/lmodel/common_domain_model/Instrument
    description: A type of Asset that is issued by one party to one or more others.
    comments:
    - "Generated from Rosetta 'choice' construct \u2014 represents a union/one-of\
      \ type."
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:Instrument
    abstract: true
    class_uri: common_domain_model:Instrument
    union_of:
    - ListedDerivative
    - Loan
    - Security
  NotDomesticCurrency:
    name: NotDomesticCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/NotDomesticCurrency
    description: 'A class to specify the ISDA 2003 Term: Not Domestic Currency.'
    in_subset:
    - cdm_base_staticdata_asset_credit
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_credit
    exact_mappings:
    - common_domain_model:NotDomesticCurrency
    slots:
    - applicable
    - NotDomesticCurrency_currency
    slot_usage:
      currency:
        name: currency
        description: An explicit specification of the domestic currency. The list
          of valid currencies is not presently positioned as an enumeration as part
          of the CDM because that scope is limited to the values specified by ISDA
          and FpML. As a result, implementers have to make reference to the relevant
          standard, such as the ISO 4217 standard for currency codes.
    class_uri: common_domain_model:NotDomesticCurrency
  Obligations:
    name: Obligations
    definition_uri: https://w3id.org/lmodel/common_domain_model/Obligations
    description: A class to specify the underlying obligations of the reference entity
      on which protection is purchased or sold through the Credit Default Swap.
    comments:
    - "Rosetta condition: ObligationsChoice \u2014 optional choice fullFaithAndCreditObLiability,\
      \ generalFundObligationLiability, revenueObligationLiability"
    in_subset:
    - cdm_base_staticdata_asset_credit
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_credit
    exact_mappings:
    - common_domain_model:Obligations
    slots:
    - category
    - notSubordinated
    - specifiedCurrency
    - notSovereignLender
    - notDomesticCurrency
    - notDomesticLaw
    - listed
    - notDomesticIssuance
    - fullFaithAndCreditObLiability
    - generalFundObligationLiability
    - revenueObligationLiability
    - notContingent
    - excluded
    - othReferenceEntityObligations
    - designatedPriority
    - cashSettlementOnly
    - deliveryOfCommitments
    - continuity
    class_uri: common_domain_model:Obligations
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            fullFaithAndCreditObLiability:
              name: fullFaithAndCreditObLiability
              required: true
        - slot_conditions:
            generalFundObligationLiability:
              name: generalFundObligationLiability
              required: true
        - slot_conditions:
            revenueObligationLiability:
              name: revenueObligationLiability
              required: true
      description: Choice rule to represent an FpML choice construct.
  SpecifiedCurrency:
    name: SpecifiedCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpecifiedCurrency
    in_subset:
    - cdm_base_staticdata_asset_credit
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_credit
    exact_mappings:
    - common_domain_model:SpecifiedCurrency
    slots:
    - SpecifiedCurrency_applicable
    - SpecifiedCurrency_currency
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the specified currency provision is applicable.
      currency:
        name: currency
        description: The currency in which the specified currency is denominated.
          The list of valid currencies is not presently positioned as an enumeration
          as part of the CDM because that scope is limited to the values specified
          by ISDA and FpML. As a result, implementers have to make reference to the
          relevant standard, such as the ISO 4217 standard for currency codes.
    class_uri: common_domain_model:SpecifiedCurrency
  CodeList:
    name: CodeList
    definition_uri: https://w3id.org/lmodel/common_domain_model/CodeList
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"LoadCodeList","description":"Loads a code list JSON resource
          into memory in the form of cdm.base.staticdata.codelist.CodeList Rune object","inputs":[{"name":"domain","type":"string","cardinality":"1..1"}],"output":{"name":"codelist","type":"CodeList","cardinality":"0..1"},"code_implementation":true}]'
    description: A type hold a list of codes for business data validation
    comments:
    - "Rosetta func: LoadCodeList \u2014 Loads a code list JSON resource into memory\
      \ in the form of cdm.base.staticdata.codelist.CodeList Rune object"
    in_subset:
    - cdm_base_staticdata_codelist
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_codelist
    exact_mappings:
    - common_domain_model:CodeList
    close_mappings:
    - fpml_5_10:CodeList
    slots:
    - identification
    - codes
    class_uri: common_domain_model:CodeList
  CodeListIdentification:
    name: CodeListIdentification
    definition_uri: https://w3id.org/lmodel/common_domain_model/CodeListIdentification
    description: A type to identify the version of a codelist
    in_subset:
    - cdm_base_staticdata_codelist
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_codelist
    exact_mappings:
    - common_domain_model:CodeListIdentification
    close_mappings:
    - fpml_5_10:CodeListIdentification
    slots:
    - CodeListIdentification_description
    - publicationDate
    - shortName
    - version
    - codeShortId
    - canonicalUri
    - canonicalVersionUri
    - locationUri
    slot_usage:
      description:
        name: description
        description: A description  of the code list, e.g. A list of codes identifying
          business centers
    class_uri: common_domain_model:CodeListIdentification
  CodeValue:
    name: CodeValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/CodeValue
    description: A type to hold the value of the code in a codelist
    in_subset:
    - cdm_base_staticdata_codelist
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_codelist
    exact_mappings:
    - common_domain_model:CodeValue
    close_mappings:
    - fpml_5_10:CodeValue
    slots:
    - CodeValue_value
    - CodeValue_description
    - CodeValue_source
    - effectiveDate
    - deprecatedDate
    slot_usage:
      value:
        name: value
        description: The value of the code, e.g. USNY
        range: string
        required: true
      description:
        name: description
        description: A description of the meaning of the code, e.g. New York City,
          USA
      source:
        name: source
        description: Where the code was defined,e.g. ISDA, FpML, Bloomberg
        range: string
        required: false
    class_uri: common_domain_model:CodeValue
  AssignedIdentifier:
    name: AssignedIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssignedIdentifier
    description: A class to specify the identifier value and its associated version.
    in_subset:
    - cdm_base_staticdata_identifier
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_identifier
    exact_mappings:
    - common_domain_model:AssignedIdentifier
    close_mappings:
    - fpml_5_10:AssignedIdentifier
    - gist:ID
    - spdx:ExternalIdentifier
    slots:
    - AssignedIdentifier_identifier
    - AssignedIdentifier_version
    slot_usage:
      identifier:
        name: identifier
        description: The identifier value.
        range: string
        multivalued: false
      version:
        name: version
        description: The identifier version, which is specified as an integer and
          is meant to be incremented each time the transaction terms (whether contract
          or event) change. This version is made option to support the use case where
          the identifier is referenced without the version. The constraint that a
          contract and a lifecycle event need to have an associated version is enforced
          through data rules.
        range: integer
        required: false
    class_uri: common_domain_model:AssignedIdentifier
  Identifier:
    name: Identifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/Identifier
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify a generic identifier, applicable to CDM artefacts
      such as executions, contracts, lifecycle events and legal documents. An issuer
      can be associated with the actual identifier value as a way to properly qualify
      it.
    comments:
    - "Rosetta condition: IssuerChoice \u2014 required choice issuerReference, issuer"
    in_subset:
    - cdm_base_staticdata_identifier
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_identifier
    exact_mappings:
    - common_domain_model:Identifier
    close_mappings:
    - gist:ID
    - oscal:PartyExternalId
    - spdx:ExternalIdentifier
    slots:
    - issuerReference
    - issuer
    - assignedIdentifier
    class_uri: common_domain_model:Identifier
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            issuerReference:
              name: issuerReference
              required: true
        - slot_conditions:
            issuer:
              name: issuer
              required: true
      description: The identifier issuer is specified either explicitly or by reference
        to one of the parties.
  IdentifiedList:
    name: IdentifiedList
    definition_uri: https://w3id.org/lmodel/common_domain_model/IdentifiedList
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Attaches an identifier to a collection of objects, when those objects
      themselves can each be represented by an identifier. One use case is the representation
      of package transactions, where each component is a separate trade with its own
      identifier, and those trades are linked together as a package with its own identifier.
      The data type has been named generically rather than referring to 'packages'
      as it may have a number of other uses.
    in_subset:
    - cdm_base_staticdata_identifier
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_identifier
    exact_mappings:
    - common_domain_model:IdentifiedList
    slots:
    - listId
    - componentId
    - price
    class_uri: common_domain_model:IdentifiedList
  LocationIdentifier:
    name: LocationIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/LocationIdentifier
    description: Specifies a location identifier. An issuer and an identifier type
      can be associated with the actual identifier value as a way to properly qualify
      it.
    comments:
    - "Rosetta condition: IdentifierType \u2014 if locationIdentifierType exists then\
      \ assignedIdentifier count = 1"
    in_subset:
    - cdm_base_staticdata_identifier
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_identifier
    exact_mappings:
    - common_domain_model:LocationIdentifier
    is_a: Identifier
    slots:
    - issuerReference
    - issuer
    - assignedIdentifier
    - locationIdentifierType
    class_uri: common_domain_model:LocationIdentifier
  Counterparty:
    name: Counterparty
    definition_uri: https://w3id.org/lmodel/common_domain_model/Counterparty
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ExtractCounterpartyByRole","description":"Extracts from
          a list of Counterparty data types, the Counterparty that corresponds to
          the role i.e. Party1 or Party2.","inputs":[{"name":"counterparties","type":"Counterparty","cardinality":"1..*"},{"name":"roleEnumToExtract","type":"CounterpartyRoleEnum","cardinality":"1..1"}],"output":{"name":"counterparty","type":"Counterparty","cardinality":"0..1"}}]'
    description: Defines a counterparty enumerated value, e.g. Party1 or Party2, with
      an associated party reference. The product is agnostic to the actual parties
      to the transaction, with the party references abstracted away from the product
      definition and replaced by the CounterpartyEnum (e.g. values Party1 or Party2).
      The CounterpartyEnum can then be positioned in the product (e.g. to specify
      which counterparty is the payer, receiver etc) and this Counterparty type, which
      is positioned outside of the product definition, allows the CounterpartyEnum
      to be associated with an actual party reference.
    comments:
    - "Rosetta func: ExtractCounterpartyByRole \u2014 Extracts from a list of Counterparty\
      \ data types, the Counterparty that corresponds to the role i.e. Party1 or Party2."
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:Counterparty
    close_mappings:
    - gist:Assignment
    - oscal:ResponsibleParty
    related_mappings:
    - iso29100:ThirdParty
    slots:
    - role
    - partyReference
    class_uri: common_domain_model:Counterparty
  AncillaryParty:
    name: AncillaryParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/AncillaryParty
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ExtractAncillaryPartyByRole","description":"Extracts from
          a list of AncillaryParty data types, the AncillaryParty that corresponds
          to the AncillaryRoleEnum.","inputs":[{"name":"ancillaryParties","type":"AncillaryParty","cardinality":"1..*"},{"name":"roleEnumToExtract","type":"AncillaryRoleEnum","cardinality":"1..1"}],"output":{"name":"ancillaryParty","type":"AncillaryParty","cardinality":"0..1"}}]'
    description: Defines an ancillary role enumerated value with an associated party
      reference. The product is agnostic to the actual parties involved in the transaction,
      with the party references abstracted away from the product definition and replaced
      by the AncillaryRoleEnum. The AncillaryRoleEnum can then be positioned in the
      product and this AncillaryParty type, which is positioned outside of the product
      definition, allows the AncillaryRoleEnum to be associated with an actual party
      reference.
    comments:
    - "Rosetta func: ExtractAncillaryPartyByRole \u2014 Extracts from a list of AncillaryParty\
      \ data types, the AncillaryParty that corresponds to the AncillaryRoleEnum."
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:AncillaryParty
    close_mappings:
    - fpml_5_10:AncillaryParty
    slots:
    - AncillaryParty_role
    - AncillaryParty_partyReference
    - onBehalfOf
    slot_usage:
      role:
        name: role
        description: Specifies the AncillaryRoleEnum that is associated to the party
          reference. An ancillary party is any involved party that is not one of the
          two principal parties to the transaction.
        range: AncillaryRoleEnum
      partyReference:
        name: partyReference
        description: Specifies the party, or parties, associated to the ancillary
          role.
        multivalued: true
    class_uri: common_domain_model:AncillaryParty
  BuyerSeller:
    name: BuyerSeller
    definition_uri: https://w3id.org/lmodel/common_domain_model/BuyerSeller
    description: This class corresponds to the FpML BuyerSeller.model construct.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:BuyerSeller
    close_mappings:
    - fpml_5_10:BuyerSeller
    slots:
    - buyer
    - seller
    class_uri: common_domain_model:BuyerSeller
  PayerReceiver:
    name: PayerReceiver
    definition_uri: https://w3id.org/lmodel/common_domain_model/PayerReceiver
    description: Specifies the parties responsible for making and receiving payments
      defined by this structure.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:PayerReceiver
    slots:
    - payer
    - receiver
    class_uri: common_domain_model:PayerReceiver
  PartyReferencePayerReceiver:
    name: PartyReferencePayerReceiver
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyReferencePayerReceiver
    description: Specifies the parties responsible for making and receiving payments
      defined by this structure.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:PartyReferencePayerReceiver
    slots:
    - payerPartyReference
    - payerAccountReference
    - receiverPartyReference
    - receiverAccountReference
    class_uri: common_domain_model:PartyReferencePayerReceiver
  ReferenceBank:
    name: ReferenceBank
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferenceBank
    description: A class to describe an institution (party) identified by means of
      a coding scheme and an optional name.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:ReferenceBank
    slots:
    - referenceBankId
    - referenceBankName
    class_uri: common_domain_model:ReferenceBank
  ReferenceBanks:
    name: ReferenceBanks
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferenceBanks
    description: A class defining the list of reference institutions polled for relevant
      rates or prices when determining the cash settlement amount for a product where
      cash settlement is applicable.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:ReferenceBanks
    slots:
    - referenceBank
    class_uri: common_domain_model:ReferenceBanks
  RelatedParty:
    name: RelatedParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/RelatedParty
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FilterRelatedPartyByRole","description":"Filters the list
          of RelatedParty based on the provided partyRoleEnum.","inputs":[{"name":"relatedParties","type":"RelatedParty","cardinality":"0..*"},{"name":"partyRoleEnum","type":"PartyRoleEnum","cardinality":"1..1"}],"output":{"name":"filteredRelatedParties","type":"RelatedParty","cardinality":"0..*"}}]'
    comments:
    - "Rosetta func: FilterRelatedPartyByRole \u2014 Filters the list of RelatedParty\
      \ based on the provided partyRoleEnum."
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:RelatedParty
    close_mappings:
    - gist:Assignment
    - oscal:ResponsibleParty
    related_mappings:
    - iso29100:ThirdParty
    slots:
    - RelatedParty_partyReference
    - accountReference
    - RelatedParty_role
    slot_usage:
      partyReference:
        name: partyReference
        description: Reference to a party.
      role:
        name: role
        description: The category of the relationship. The related party performs
          the role specified in this field for the base party. For example, if the
          role is ,Guarantor, the related party acts as a guarantor for the base party.
        range: PartyRoleEnum
    class_uri: common_domain_model:RelatedParty
  Account:
    name: Account
    definition_uri: https://w3id.org/lmodel/common_domain_model/Account
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify an account as an account number alongside, optionally.
      an account name, an account type, an account beneficiary and a servicing party.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:Account
    close_mappings:
    - fpml_5_10:Account
    - gist:Account
    slots:
    - Account_partyReference
    - accountNumber
    - accountName
    - accountType
    - accountBeneficiary
    - servicingParty
    slot_usage:
      partyReference:
        name: partyReference
        description: A reference to the party to which the account refers to.
        required: false
    class_uri: common_domain_model:Account
  Address:
    name: Address
    definition_uri: https://w3id.org/lmodel/common_domain_model/Address
    description: A class to specify a post or street address.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:Address
    close_mappings:
    - fpml_5_10:Address
    - gist:Address
    - oscal:Address
    related_mappings:
    - gist:PhysicalAddress
    - iso29100:PersonallyIdentifiableInformation
    slots:
    - street
    - city
    - state
    - country
    - postalCode
    class_uri: common_domain_model:Address
  BusinessUnit:
    name: BusinessUnit
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessUnit
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify an organizational unit.
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:BusinessUnit
    close_mappings:
    - fpml_5_10:BusinessUnit
    - gist:Organization
    - spdx:Organization
    related_mappings:
    - oscal:Location
    slots:
    - BusinessUnit_name
    - BusinessUnit_identifier
    - contactInformation
    slot_usage:
      name:
        name: name
        description: A name used to describe the organizational unit
        required: true
      identifier:
        name: identifier
        description: An identifier used to uniquely identify the organizational unit
        range: Identifier
        required: false
        multivalued: false
        inlined_as_list: true
    class_uri: common_domain_model:BusinessUnit
  ContactInformation:
    name: ContactInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/ContactInformation
    description: 'A class to specify contact information associated with a party:
      telephone, postal/street address, email and web page.'
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:ContactInformation
    close_mappings:
    - gist:ElectronicAddress
    - oscal:Location
    related_mappings:
    - iso29100:PersonallyIdentifiableInformation
    slots:
    - telephone
    - address
    - email
    - webPage
    class_uri: common_domain_model:ContactInformation
  LegalEntity:
    name: LegalEntity
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegalEntity
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify a legal entity, with a required name and an optional
      entity identifier (such as the LEI).
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:LegalEntity
    close_mappings:
    - gist:Organization
    - oscal:Party
    - spdx:Organization
    related_mappings:
    - iso29100:PIIController
    - iso29100:PIIProcessor
    narrow_mappings:
    - gist:GovernmentOrganization
    slots:
    - LegalEntity_name
    - entityIdentifier
    slot_usage:
      name:
        name: name
        description: The legal entity name.
        required: true
    class_uri: common_domain_model:LegalEntity
  NaturalPerson:
    name: NaturalPerson
    definition_uri: https://w3id.org/lmodel/common_domain_model/NaturalPerson
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to represent the attributes that are specific to a natural
      person.
    comments:
    - "Rosetta condition: NameOrIdChoice \u2014 (firstName exists and surname exists)\
      \ or personId exists"
    - "Rosetta condition: NaturalPersonChoice \u2014 optional choice middleName, initial"
    in_subset:
    - cdm_base_staticdata_party
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - common_domain_model:NaturalPerson
    close_mappings:
    - gist:Person
    - iso29100:PIIPrincipal
    - oscal:Party
    - spdx:Person
    slots:
    - personId
    - honorific
    - firstName
    - middleName
    - initial
    - surname
    - suffix
    - dateOfBirth
    - NaturalPerson_contactInformation
    slot_usage:
      contactInformation:
        name: contactInformation
        description: The contact information for such person, when different from
          the contact information associated with the party.
    class_uri: common_domain_model:NaturalPerson
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            firstName:
              name: firstName
              required: true
            surname:
              name: surname
              required: true
        - slot_conditions:
