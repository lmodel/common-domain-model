  MarginCallBase:
    name: MarginCallBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarginCallBase
    description: Represents common attributes required for Issuance and Response to
      a Margin Call action as a result of a demand for delivery or return of collateral
      determined under a legal agreement such as a credit support document or equivalent.
    comments:
    - "Rosetta condition: RegIMRoleIMOnly \u2014 if regIMRole exists then regMarginType\
      \ = RegMarginTypeEnum -> RegIM"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:MarginCallBase
    slots:
    - instructionType
    - MarginCallBase_party
    - MarginCallBase_partyRole
    - clearingBroker
    - callIdentifier
    - callAgreementType
    - agreementMinimumTransferAmount
    - agreementThreshold
    - agreementRounding
    - regMarginType
    - regIMRole
    - baseCurrencyExposure
    - collateralPortfolio
    - independentAmountBalance
    slot_usage:
      party:
        name: party
        description: Represents the parties to the margin call. The cardinality is
          optional to address the case where both parties of the event are specified
          and a third party if applicable.
        range: Party
        multivalued: true
      partyRole:
        name: partyRole
        description: Represents the role each specified party takes in the margin
          call. further to the principal roles, payer and receiver.
        multivalued: true
    class_uri: common_domain_model:MarginCallBase
  Exposure:
    name: Exposure
    definition_uri: https://w3id.org/lmodel/common_domain_model/Exposure
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_ExposureFromTrades","description":"Builds an Exposure
          structure from a list of trades.","inputs":[{"name":"trades","type":"TradeState","cardinality":"0..*"}],"output":{"name":"exposure","type":"Exposure","cardinality":"0..1"}}]'
    description: Represents the current mark to market value or IM calculation value
      of the trade portfolio as recorded by the principle (in base currency).
    comments:
    - "Rosetta func: Create_ExposureFromTrades \u2014 Builds an Exposure structure\
      \ from a list of trades."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Exposure
    slots:
    - tradePortfolio
    - aggregateValue
    - calculationDateTime
    - valuationDateTime
    class_uri: common_domain_model:Exposure
  MarginCallExposure:
    name: MarginCallExposure
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarginCallExposure
    description: Represents attributes required for mark to market value or IM calculation
      value of the trade portfolio as recorded by the principle (in base currency).
    comments:
    - "Rosetta condition: OverallExposureSumOfSimmAndScheduleIM \u2014 if simmIMExposure\
      \ exists and scheduleGridIMExposure exists then (overallExposure -> aggregateValue\
      \ -> value = simmIMExposure -> aggregateValue -> value + scheduleGridIMExposure\
      \ -> aggregateValue -> value) and (overallExposure -> aggregateValue -> unit\
      \ -> currency = simmIMExposure -> aggregateValue -> unit -> currency) and (overallExposure\
      \ -> aggregateValue -> unit -> currency = scheduleGridIMExposure -> aggregateValue\
      \ -> unit -> currency)"
    - "Rosetta condition: ExposureSimmAndScheduleIMOnly \u2014 if simmIMExposure exists\
      \ and scheduleGridIMExposure exists then regMarginType = RegMarginTypeEnum ->\
      \ RegIM"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:MarginCallExposure
    is_a: MarginCallBase
    slots:
    - instructionType
    - MarginCallBase_party
    - MarginCallBase_partyRole
    - clearingBroker
    - callIdentifier
    - callAgreementType
    - agreementMinimumTransferAmount
    - agreementThreshold
    - agreementRounding
    - regMarginType
    - regIMRole
    - baseCurrencyExposure
    - collateralPortfolio
    - independentAmountBalance
    - overallExposure
    - simmIMExposure
    - scheduleGridIMExposure
    class_uri: common_domain_model:MarginCallExposure
  CollateralBalance:
