      centers, together with the convention for adjusting the date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDates.adjustableDates
    slot_uri: common_domain_model:adjustableDates
    owner: SettlementDate
    domain_of:
    - AdjustableOrRelativeDates
