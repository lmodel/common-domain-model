    inlined_as_list: true
  appliedRate:
    name: appliedRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/appliedRate
    description: The rate that was actually applied, after all calculations and treatments.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset_floatingrate
    slot_uri: common_domain_model:appliedRate
