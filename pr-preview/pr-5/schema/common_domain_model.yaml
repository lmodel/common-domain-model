  CalculatedRateDetails:
    name: CalculatedRateDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculatedRateDetails
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ApplyCompoundingFormula","description":"Implements the compounding
          formula:   Product of ( 1 + (rate * weight) / basis), then backs out the
          final rate. This is used to support section 7.3 of the 2021 ISDA Definitions.","inputs":[{"name":"observations","type":"number","cardinality":"0..*"},{"name":"weights","type":"number","cardinality":"0..*"},{"name":"yearFrac","type":"number","cardinality":"1..1"}],"output":{"name":"results","type":"CalculatedRateDetails","cardinality":"1..1"}},{"name":"ApplyAveragingFormula","description":"Implements
          the weighted arithmetic averaging formula.  Sums the weighted rates and
          divides by the total weight.  This is used to support section 7.4 of the
          2021 ISDA Definitions.","inputs":[{"name":"observations","type":"number","cardinality":"0..*"},{"name":"weights","type":"number","cardinality":"0..*"}],"output":{"name":"results","type":"CalculatedRateDetails","cardinality":"1..1"}}]'
    description: Type for reporting details of calculated rates, including the observations
      that went into the final reported rate.
    comments:
    - "Rosetta func: ApplyCompoundingFormula \u2014 Implements the compounding formula:\
      \   Product of ( 1 + (rate * weight) / basis), then backs out the final rate.\
      \ This is used to support section 7.3 of the 2021 ISDA Definitions."
    - "Rosetta func: ApplyAveragingFormula \u2014 Implements the weighted arithmetic\
      \ averaging formula.  Sums the weighted rates and divides by the total weight.\
      \  This is used to support section 7.4 of the 2021 ISDA Definitions."
    in_subset:
    - cdm_observable_asset_calculatedrate
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    exact_mappings:
    - common_domain_model:CalculatedRateDetails
    close_mappings:
    - fpml_5_10:CalculatedRateDetails
    slots:
    - CalculatedRateDetails_observations
    - weightedRates
    - growthFactor
    - compoundedGrowth
    - CalculatedRateDetails_aggregateValue
    - aggregateWeight
    - calculatedRate
    slot_usage:
      observations:
        name: observations
        description: The observation dates and weights for each observation date.
        range: CalculatedRateObservations
        required: false
        multivalued: false
      aggregateValue:
        name: aggregateValue
        description: The total sum or product of all the individual terms that went
          into the calculated rate.
        range: decimal
        required: false
    class_uri: common_domain_model:CalculatedRateDetails
  CalculatedRateObservations:
    name: CalculatedRateObservations
