        description: Tuesday
      WED:
        text: WED
        description: Wednesday
      THU:
        text: THU
        description: Thursday
      FRI:
        text: FRI
        description: Friday
      SAT:
        text: SAT
        description: Saturday
      SUN:
        text: SUN
        description: Sunday
  DayTypeEnum:
    name: DayTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DayTypeEnum
    description: Lists the enumerated values to specify the day type classification
      used in counting the number of days between two dates.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      Business:
        text: Business
        description: Applies when calculating the number of days between two dates
          the count includes only business days.
      Calendar:
        text: Calendar
        description: Applies when calculating the number of days between two dates
          the count includes all calendar days.
      CurrencyBusiness:
        text: CurrencyBusiness
        description: Applies when calculating the number of days between two dates
          the count includes only currency business days.
      ExchangeBusiness:
        text: ExchangeBusiness
        description: Applies when calculating the number of days between two dates
          the count includes only stock exchange business days.
      ScheduledTradingDay:
        text: ScheduledTradingDay
        description: Applies when calculating the number of days between two dates
          the count includes only scheduled trading days.
