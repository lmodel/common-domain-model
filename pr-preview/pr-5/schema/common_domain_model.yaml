  AdditionalRightsEvent:
    name: AdditionalRightsEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdditionalRightsEvent
    description: A class to specify the Pledgor/Obligor/Chargor Additional Rights
      Event election.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(k)" name
      "Chargor Additional Rights Event"
    - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(k)" name
      "Obligor Additional Rights Event"
    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(k)" name
      "Pledgor Additional Rights Event"
    comments:
    - "Rosetta condition: Qualification \u2014 if qualification exists then isApplicable\
      \ = True"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    - isda:CSA_IM_Japanese_2016
    - isda:CSA_IM_NewYork_2016
    exact_mappings:
    - common_domain_model:AdditionalRightsEvent
    close_mappings:
    - fpml_5_10:AdditionalRightsEvent
    slots:
    - AdditionalRightsEvent_isApplicable
    - AdditionalRightsEvent_qualification
    slot_usage:
      isApplicable:
        name: isApplicable
        description: The Pledgor Additional Rights Event election is applicable when
          True, and not applicable when False.
      qualification:
        name: qualification
        description: The qualification of the Pledgor Additional Rights Event election,
          when specified.
        range: string
        required: false
    class_uri: common_domain_model:AdditionalRightsEvent
    rules:
    - preconditions:
        slot_conditions:
          qualification:
            name: qualification
            required: true
      postconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'True'
      description: The Pledgor/Obligor/Chargor Additional Rights should be qualified
        only when the Pledgor Additional Rights Event election is specified as applicable.
  AdditionalTerminationEvent:
    name: AdditionalTerminationEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdditionalTerminationEvent
    description: A class to specify an optional termination event, additional to the
      Termination Events that will be deemed an Access Condition (Initial Margin CSA)
      or a Specified Condition (Variation Margin CSA).
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:AdditionalTerminationEvent
    close_mappings:
    - fpml_5_10:AdditionalTerminationEvent
    slots:
    - AdditionalTerminationEvent_name
    - applicableParty
    slot_usage:
      name:
        name: name
        description: The name of the additional termination event.
        required: true
    class_uri: common_domain_model:AdditionalTerminationEvent
  AdditionalType:
    name: AdditionalType
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdditionalType
    description: The specification of the Additional Type of transaction that can
      require the collection or delivery of initial margin under a given regulatory
      regime for the purposes of Covered Transactions.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(b)(B)"
    comments:
    - "Rosetta condition: CustomValue \u2014 if standardValue = AdditionalTypeEnum\
      \ -> Other then customValue exists"
    - "Rosetta condition: StandardValue \u2014 if standardValue <> AdditionalTypeEnum\
      \ -> Other then customValue is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:AdditionalType
    close_mappings:
    - fpml_5_10:AdditionalType
    slots:
    - standardValue
    - customValue
    class_uri: common_domain_model:AdditionalType
    rules:
    - preconditions:
        slot_conditions:
          standardValue:
            name: standardValue
            equals_string: Other
      postconditions:
        slot_conditions:
          customValue:
            name: customValue
            required: true
      description: The specification of a custom value by the parties to the legal
        agreement takes place alongside the qualification of the `Other` value as
        part of the AdditionalTypeEnum.
    - preconditions:
        slot_conditions:
          standardValue:
            name: standardValue
            none_of:
            - equals_string_in:
              - Other
      postconditions:
        slot_conditions:
          customValue:
            name: customValue
            required: false
      description: The specification of a standard value by the parties to the legal
        agreement is done through the qualification of a value distinct than `Other`
        as part of the AdditionalTypeEnum, and implies that the customerValue is not
        being qualified.
      comments:
      - 'Rosetta negation: standardValue <> AdditionalTypeEnum -> Other'
