    - fpml_5_10:AveragingPeriod.averagingObservations
    slot_uri: common_domain_model:averagingObservations
    owner: AveragingPeriod
    domain_of:
    - AveragingPeriod
    range: AveragingObservationList
    inlined: true
    inlined_as_list: true
  marketDisruption:
    name: marketDisruption
    definition_uri: https://w3id.org/lmodel/common_domain_model/marketDisruption
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: The market disruption event as defined by ISDA 2002 Definitions.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    close_mappings:
    - fpml_5_10:AveragingPeriod.marketDisruption
    slot_uri: common_domain_model:marketDisruption
    owner: AveragingPeriod
    domain_of:
    - AveragingPeriod
    range: MarketDisruptionEnum
  observationNumber:
    name: observationNumber
    definition_uri: https://w3id.org/lmodel/common_domain_model/observationNumber
    description: Observation number, which should be unique, within a series generated
      by a date schedule.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:observationNumber
    owner: WeightedAveragingObservation
    domain_of:
    - WeightedAveragingObservation
    range: integer
  relativeDateOffset:
    name: relativeDateOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/relativeDateOffset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:relativeDateOffset
    owner: InitialFixingDate
    domain_of:
    - InitialFixingDate
    range: RelativeDateOffset
    inlined: true
    inlined_as_list: true
  paymentFrequency:
    name: paymentFrequency
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentFrequency
    description: The frequency at which regular payment dates occur. If the payment
      frequency is equal to the frequency defined in the calculation period dates
      component then one calculation period contributes to each payment amount. If
      the payment frequency is less frequent than the frequency defined in the calculation
      period dates component then more than one calculation period will contribute
      to the payment amount. A payment frequency more frequent than the calculation
      period frequency or one that is not a multiple of the calculation period frequency
      is invalid. If the payment frequency is of value T (term), the period is defined
      by the effectiveDate and the terminationDate.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:paymentFrequency
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: Frequency
    inlined: true
    inlined_as_list: true
  firstPaymentDate:
    name: firstPaymentDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/firstPaymentDate
    description: The first unadjusted payment date. This day may be subject to adjustment
      in accordance with any business day convention specified in paymentDatesAdjustments.
      This element must only be included if there is an initial stub. This date will
      normally correspond to an unadjusted calculation period start or end date. This
      is true even if early or delayed payment is specified to be applicable since
      the actual first payment date will be the specified number of days before or
      after the applicable adjusted calculation period start or end date with the
      resulting payment date then being adjusted in accordance with any business day
      convention specified in paymentDatesAdjustments.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:firstPaymentDate
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: date
  lastRegularPaymentDate:
    name: lastRegularPaymentDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/lastRegularPaymentDate
    description: The last regular payment date when specified as a date, as in the
      FpML interest rate construct. FpML specifies that this date may be subject to
      adjustment in accordance with any business day convention specified in the paymentDatesAdjustments
      attribute.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:lastRegularPaymentDate
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: date
  paymentDateSchedule:
    name: paymentDateSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentDateSchedule
    description: The payment dates when specified as relative to a set of dates specified
      somewhere else in the instance document/transaction, e.g. the valuation dates
      as typically the case for equity swaps, or when specified as a calculation period
      schedule.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:paymentDateSchedule
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: PaymentDateSchedule
    inlined: true
    inlined_as_list: true
  payRelativeTo:
    name: payRelativeTo
    definition_uri: https://w3id.org/lmodel/common_domain_model/payRelativeTo
    description: Specifies whether the payments occur relative to each adjusted calculation
      period start date or end date, each reset date, valuation date or the last pricing
      date. Calculation period start date means relative to the start of the first
      calculation period contributing to a given payment. Similarly, calculation period
      end date means the end of the last calculation period contributing to a given
      payment. The valuation date is applicable for Brazilian-CDI and equity swaps.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:payRelativeTo
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: PayRelativeToEnum
  paymentDaysOffset:
    name: paymentDaysOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentDaysOffset
    description: If early payment or delayed payment is required, specifies the number
      of days offset that the payment occurs relative to what would otherwise be the
      unadjusted payment date. The offset can be specified in terms of either calendar
      or business days. Even in the case of a calendar days offset, the resulting
      payment date, adjusted for the specified calendar days offset, will still be
      adjusted in accordance with the specified payment dates adjustments. This element
      should only be included if early or delayed payment is applicable, i.e. if the
      periodMultiplier element value is not equal to zero. An early payment would
      be indicated by a negative periodMultiplier element value and a delayed payment
      (or payment lag) would be indicated by a positive periodMultiplier element value.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:paymentDaysOffset
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: Offset
    inlined: true
    inlined_as_list: true
  paymentDatesAdjustments:
    name: paymentDatesAdjustments
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentDatesAdjustments
    description: The definition of the business day convention and financial business
      centers used for adjusting the payment date if it would otherwise fall on a
      day that is not a business day in the specified business center.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:paymentDatesAdjustments
    owner: PaymentDates
    domain_of:
    - PaymentDates
    range: BusinessDayAdjustments
    inlined: true
    inlined_as_list: true
  interimPaymentDates:
    name: interimPaymentDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/interimPaymentDates
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:interimPaymentDates
    owner: PaymentDateSchedule
    domain_of:
    - PaymentDateSchedule
    range: AdjustableRelativeOrPeriodicDates
    multivalued: true
    inlined: true
    inlined_as_list: true
  finalPaymentDate:
    name: finalPaymentDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/finalPaymentDate
    description: The last payment when specified as an adjustable or relative date,
      as in the FpML total return construct.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:finalPaymentDate
    owner: PaymentDateSchedule
    domain_of:
    - PaymentDateSchedule
    range: AdjustableOrRelativeDate
    inlined: true
    inlined_as_list: true
  weeklyRollConvention:
    name: weeklyRollConvention
    definition_uri: https://w3id.org/lmodel/common_domain_model/weeklyRollConvention
    description: The day of the week on which a weekly reset date occurs. This element
      must be included if the reset frequency is defined as weekly and not otherwise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:weeklyRollConvention
    owner: ResetFrequency
    domain_of:
    - ResetFrequency
    range: WeeklyRollConventionEnum
  relevantUnderlyingDateReference:
    name: relevantUnderlyingDateReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/relevantUnderlyingDateReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: Reference to the unadjusted cancellation effective dates.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:relevantUnderlyingDateReference
    owner: FinalCalculationPeriodDateAdjustment
    domain_of:
    - FinalCalculationPeriodDateAdjustment
    range: AdjustableOrRelativeDates
    required: true
    inlined: true
    inlined_as_list: true
  swapStreamReference:
    name: swapStreamReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/swapStreamReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: Reference to the leg, where date adjustments may apply.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    slot_uri: common_domain_model:swapStreamReference
    owner: FinalCalculationPeriodDateAdjustment
    domain_of:
    - FinalCalculationPeriodDateAdjustment
    range: InterestRatePayout
    required: true
    inlined: true
    inlined_as_list: true
  callFunction:
    name: callFunction
    definition_uri: https://w3id.org/lmodel/common_domain_model/callFunction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:callFunction
    owner: ComputedAmount
    domain_of:
    - ComputedAmount
    range: string
    required: true
  paymentDiscounting:
    name: paymentDiscounting
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentDiscounting
    description: FpML specifies the FpML PaymentDiscounting.model group for representing
      the discounting elements that can be associated with a payment.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:AssetFlowBase.paymentDiscounting
    slot_uri: common_domain_model:paymentDiscounting
    owner: AssetFlowBase
    domain_of:
    - AssetFlowBase
    range: PaymentDiscounting
    inlined: true
    inlined_as_list: true
  assetFlowType:
    name: assetFlowType
    definition_uri: https://w3id.org/lmodel/common_domain_model/assetFlowType
    description: Type of asset flow corresponding to a scheduled event.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:AssetFlow.assetFlowType
    slot_uri: common_domain_model:assetFlowType
    owner: AssetFlow
    domain_of:
    - AssetFlow
    range: ScheduledTransferEnum
  fxLinkedNotionalSchedule:
    name: fxLinkedNotionalSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/fxLinkedNotionalSchedule
    description: Multiplier specified as an FX-linked schedule, e.g. for a resetting
      cross-currency swap..
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:fxLinkedNotionalSchedule
    owner: QuantityMultiplier
    domain_of:
    - QuantityMultiplier
    range: FxLinkedNotionalSchedule
    inlined: true
    inlined_as_list: true
  multiplierValue:
    name: multiplierValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/multiplierValue
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:multiplierValue
    owner: QuantityMultiplier
    domain_of:
    - QuantityMultiplier
    range: decimal
  resolvedQuantity:
    name: resolvedQuantity
    definition_uri: https://w3id.org/lmodel/common_domain_model/resolvedQuantity
    description: A product's quantity as a single, non-negative amount.  When specified
      as part of a product definition, this quantity attribute would not be set.  Instead
      it is specified on the quantity notation along with an asset identifier matching
      this payout's asset identifier.  This allows the quantity to be resolved for
      a payout leg, which can then be specified here for convenience during data processing.  There
      needs to be at least one resolvable quantity across payout legs of a product
      to define an anchor that other payout quantities can refer to.  This attribute
      is ignored when mapping existing FpML messages.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:resolvedQuantity
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: Quantity
    inlined: true
    inlined_as_list: true
  quantitySchedule:
    name: quantitySchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/quantitySchedule
    description: 'A payout''s quantity specified as a schedule, which may also contain
      a single value if that quantity is constant. There can only be a single quantity
      schedule applicable to a payout: e.g. the notional for an interest rate leg.
      The quantity must be specified outside of the payout in a PriceQuantity object
      and only referenced inside the payout using an address.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:quantitySchedule
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: NonNegativeQuantitySchedule
    inlined: true
    inlined_as_list: true
  quantityReference:
    name: quantityReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/quantityReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: Reference quantity when resolvable quantity is defined as relative
      to another (resolvable) quantity. A resolvable quantity needs to contain either
      an absolute quantity or a reference to another (resolvable) quantity. This requirement
      is captured by a choice rule on the class.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:quantityReference
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: ResolvablePriceQuantity
    inlined: true
    inlined_as_list: true
  quantityMultiplier:
    name: quantityMultiplier
    definition_uri: https://w3id.org/lmodel/common_domain_model/quantityMultiplier
    description: Quantity multiplier is specified on top of a reference quantity and
      is used as a multiplying factor when resolving the quantity. A quantity multiplier
      can only exist when the resolvable quantity specifies a reference quantity.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:quantityMultiplier
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: QuantityMultiplier
    inlined: true
    inlined_as_list: true
  futureValueNotional:
    name: futureValueNotional
    definition_uri: https://w3id.org/lmodel/common_domain_model/futureValueNotional
    description: 'The future value notional is specific to BRL CDI swaps, and is specified
      alongside the notional amount. The value is calculated as follows: Future Value
      Notional = Notional Amount * (1 + Fixed Rate) ^ (Fixed Rate Day Count Fraction).
      The currency should always match that expressed in the notional schedule. The
      value date should match the adjusted termination date.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:futureValueNotional
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: FutureValueAmount
    inlined: true
    inlined_as_list: true
  priceSchedule:
    name: priceSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/priceSchedule
    description: 'A payout''s price specified as a schedule, which may also contain
      a single value if that price is constant. There may be multiple prices specified
      for a single payout: e.g. a floating interest rate leg may specify a spread,
      a cap and/or floor and a multiplier. The price must be specified outside of
      the payout in a PriceQuantity object and only referenced inside the payout using
      an address.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:priceSchedule
    owner: ResolvablePriceQuantity
    domain_of:
    - ResolvablePriceQuantity
    range: PriceSchedule
    multivalued: true
    inlined: true
    inlined_as_list: true
  principalPayment:
    name: principalPayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/principalPayment
    description: The specification of the principal exchange. Optional as only applicable
      in the case of cross-currency or zero-coupon swaps with a final payment.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:principalPayment
    owner: PayoutBase
    domain_of:
    - PayoutBase
    range: PrincipalPayments
    inlined: true
    inlined_as_list: true
  rollFeature:
    name: rollFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/rollFeature
    description: 'Used in conjunction with an exchange-based pricing source. Identifies
      a way in which the futures contracts referenced will roll between periods. '
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CommodityPriceReturnTerms.rollFeature
    slot_uri: common_domain_model:rollFeature
    owner: CommodityPriceReturnTerms
    domain_of:
    - CommodityPriceReturnTerms
    range: RollFeature
    inlined: true
    inlined_as_list: true
  rollSourceCalendar:
    name: rollSourceCalendar
    definition_uri: https://w3id.org/lmodel/common_domain_model/rollSourceCalendar
    description: Used in conjunction with an exchange-based pricing source. Identifies
      a date source calendar from which the pricing dates and thus roll to the next
      contract will be based off (e.g. pricing is based on the NYMEX WTI First Nearby
      Futures Contract, if Future is chosen, the pricing will roll to the next futures
      contract on expiration, if ListedOption is chosen, the pricing will roll to
      the next futures contract on the Option expiration date which is three business
      days before the expiration of the NYMEX WTI futures contract.) Omitting this
      element will result in the default behavior expected with the pricing source
      described within the commodity element.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:rollSourceCalendar
    owner: RollFeature
    domain_of:
    - RollFeature
    range: RollSourceCalendarEnum
  deliveryDateRollConvention:
    name: deliveryDateRollConvention
    definition_uri: https://w3id.org/lmodel/common_domain_model/deliveryDateRollConvention
    description: Specifies, for a Commodity Transaction that references a delivery
      date for a listed future, the day on which the specified future will roll to
      the next nearby month prior to the expiration of the referenced future. If the
      future will not roll at all - i.e. the price will be taken from the expiring
      contract, 0 should be specified here. If the future will roll to the next nearby
      on the last trading day - i.e. the price will be taken from the next nearby
      on the last trading day, then 1 should be specified and so on.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:deliveryDateRollConvention
    owner: RollFeature
    domain_of:
    - RollFeature
    range: Offset
    inlined: true
    inlined_as_list: true
  specifiedDates:
    name: specifiedDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/specifiedDates
    description: Defines specified dates on which the price will be determined.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:specifiedDates
    owner: PricingDates
    domain_of:
    - PricingDates
    range: AdjustableDates
    multivalued: true
    inlined: true
    inlined_as_list: true
  singleValuationDate:
    name: singleValuationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/singleValuationDate
    description: 'Where single valuation date is specified as being applicable for
      cash settlement, this element specifies the number of business days after satisfaction
      of all conditions to settlement when such valuation date occurs. ISDA 2003 Term:
      Single Valuation Date.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:singleValuationDate
    owner: ValuationDate
    domain_of:
    - ValuationDate
    range: SingleValuationDate
    inlined: true
    inlined_as_list: true
  multipleValuationDates:
    name: multipleValuationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/multipleValuationDates
    description: 'Where multiple valuation dates are specified as being applicable
      for cash settlement, this element specifies (a) the number of applicable valuation
      dates, and (b) the number of business days after satisfaction of all conditions
      to settlement when the first such valuation date occurs, and (c) the number
      of business days thereafter of each successive valuation date. ISDA 2003 Term:
      Multiple Valuation Dates.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:multipleValuationDates
    owner: ValuationDate
    domain_of:
    - ValuationDate
    range: MultipleValuationDates
    inlined: true
    inlined_as_list: true
  fxFixingDate:
    name: fxFixingDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/fxFixingDate
    description: The date on which the currency rate will be determined for the purpose
      of specifying the amount in deliverable currency. This attribute was formerly
      part of 'NonDeliverableSettlement', which is now being harmonised into a common
      'CashSettlementTerms' that includes a 'ValuationDate'.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:fxFixingDate
    owner: FxFixingDate
    domain_of:
    - ValuationDate
    - FxFixingDate
    range: FxFixingDate
    inlined: true
    inlined_as_list: true
  fxFixingSchedule:
    name: fxFixingSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/fxFixingSchedule
    description: The date, when expressed as a schedule of date(s), on which the currency
      rate will be determined for the purpose of specifying the amount in deliverable
      currency. This attribute was formerly part of 'NonDeliverableSettlement', which
      is now being harmonised into a common 'CashSettlementTerms' that includes a
      'ValuationDate'.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:fxFixingSchedule
    owner: ValuationDate
    domain_of:
    - ValuationDate
    range: AdjustableDates
    inlined: true
    inlined_as_list: true
  cashSettlementMethod:
    name: cashSettlementMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashSettlementMethod
    description: 'Specifies the type of cash settlement method: cash price, yield
      curve etc.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CashSettlementTerms.cashSettlementMethod
    slot_uri: common_domain_model:cashSettlementMethod
    owner: CashSettlementTerms
    domain_of:
    - CashSettlementTerms
    range: CashSettlementMethodEnum
  cashSettlementAmount:
    name: cashSettlementAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashSettlementAmount
    description: 'The amount paid by the seller to the buyer for cash settlement on
      the cash settlement date. If not otherwise specified, would typically be calculated
      as 100 (or the Reference Price) minus the price of the Reference Obligation
      (all expressed as a percentage) times Floating Rate Payer Calculation Amount.
      ISDA 2003 Term: Cash Settlement Amount.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CashSettlementTerms.cashSettlementAmount
    slot_uri: common_domain_model:cashSettlementAmount
    owner: CashSettlementTerms
    domain_of:
    - CashSettlementTerms
    range: Money
    inlined: true
    inlined_as_list: true
  recoveryFactor:
    name: recoveryFactor
    definition_uri: https://w3id.org/lmodel/common_domain_model/recoveryFactor
    description: Used for fixed recovery, specifies the recovery level, determined
      at contract formation, to be applied on a default. Used to calculate the amount
      paid by the seller to the buyer for cash settlement on the cash settlement date.
      Amount calculation is (1 minus the Recovery Factor) multiplied by the Floating
      Rate Payer Calculation Amount. The currency will be derived from the Floating
      Rate Payer Calculation Amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CashSettlementTerms.recoveryFactor
    slot_uri: common_domain_model:recoveryFactor
    owner: CashSettlementTerms
    domain_of:
    - CashSettlementTerms
    range: decimal
  fixedSettlement:
    name: fixedSettlement
    definition_uri: https://w3id.org/lmodel/common_domain_model/fixedSettlement
    description: 'Used for Recovery Lock, to indicate whether fixed Settlement is
      Applicable or Not Applicable. If Buyer fails to deliver an effective Notice
      of Physical Settlement on or before the Buyer NOPS Cut-off Date, and if Seller
      fails to deliver an effective Seller NOPS on or before the Seller NOPS Cut-off
      Date, then either: (a) if Fixed Settlement is specified in the related Confirmation
      as not applicable, then the Seller NOPS Cut-off Date shall be the Termination
      Date; or (b) if Fixed Settlement is specified in the related Confirmation as
      applicable, then: (i) if the Fixed Settlement Amount is a positive number, Seller
      shall, subject to Section 3.1 (except for the requirement of satisfaction of
      the Notice of Physical Settlement Condition to Settlement), pay the Fixed Settlement
      Amount to Buyer on the Fixed Settlement Payment Date; and (ii) if the Fixed
      Settlement Amount is a negative number, Buyer shall, subject to Section 3.1
      (except for the requirement of satisfaction of the Notice of Physical Settlement
      Condition to Settlement), pay the absolute value of the Fixed Settlement Amount
      to Seller on the Fixed Settlement Payment Date.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CashSettlementTerms.fixedSettlement
    slot_uri: common_domain_model:fixedSettlement
    owner: CashSettlementTerms
    domain_of:
    - CashSettlementTerms
    range: boolean
  accruedInterest:
    name: accruedInterest
    definition_uri: https://w3id.org/lmodel/common_domain_model/accruedInterest
    description: 'Indicates whether accrued interest is included (true) or not (false).
      For cash settlement this specifies whether quotations should be obtained inclusive
      or not of accrued interest. For physical settlement this specifies whether the
      buyer should deliver the obligation with an outstanding principal balance that
      includes or excludes accrued interest. ISDA 2003 Term: Include/Exclude Accrued
      Interest.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    close_mappings:
    - fpml_5_10:CashSettlementTerms.accruedInterest
    slot_uri: common_domain_model:accruedInterest
    owner: DeliverableObligations
    domain_of:
    - CashSettlementTerms
    - DeliverableObligations
    range: boolean
  assignableLoan:
    name: assignableLoan
    definition_uri: https://w3id.org/lmodel/common_domain_model/assignableLoan
    description: 'A deliverable obligation characteristic. A loan that is freely assignable
      to a bank or financial institution without the consent of the Reference Entity
      or the guarantor, if any, of the loan (or the consent of the applicable borrower
      if a Reference Entity is guaranteeing the loan) or any agent. ISDA 2003 Term:
      Assignable Loan.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:assignableLoan
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: PCDeliverableObligationCharac
    inlined: true
    inlined_as_list: true
  consentRequiredLoan:
    name: consentRequiredLoan
    definition_uri: https://w3id.org/lmodel/common_domain_model/consentRequiredLoan
    description: 'A deliverable obligation characteristic. A loan that is capable
      of being assigned with the consent of the Reference Entity or the guarantor,
      if any, of the loan or any agent. ISDA 2003 Term: Consent Required Loan.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:consentRequiredLoan
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: PCDeliverableObligationCharac
    inlined: true
    inlined_as_list: true
  directLoanParticipation:
    name: directLoanParticipation
    definition_uri: https://w3id.org/lmodel/common_domain_model/directLoanParticipation
    description: 'A deliverable obligation characteristic. A loan with a participation
      agreement whereby the buyer is capable of creating, or procuring the creation
      of, a contractual right in favour of the seller that provides the seller with
      recourse to the participation seller for a specified share in any payments due
      under the relevant loan which are received by the participation seller. ISDA
      2003 Term: Direct Loan Participation.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:directLoanParticipation
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: LoanParticipation
    inlined: true
    inlined_as_list: true
  transferable:
    name: transferable
    definition_uri: https://w3id.org/lmodel/common_domain_model/transferable
    description: 'A deliverable obligation characteristic. An obligation that is transferable
      to institutional investors without any contractual, statutory or regulatory
      restrictions. ISDA 2003 Term: Transferable.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:transferable
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: boolean
  maximumMaturity:
    name: maximumMaturity
    definition_uri: https://w3id.org/lmodel/common_domain_model/maximumMaturity
    description: 'A deliverable obligation characteristic. An obligation that has
      a remaining maturity from the Physical Settlement Date of not greater than the
      period specified. ISDA 2003 Term: Maximum Maturity.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:maximumMaturity
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: Period
    inlined: true
    inlined_as_list: true
  acceleratedOrMatured:
    name: acceleratedOrMatured
    definition_uri: https://w3id.org/lmodel/common_domain_model/acceleratedOrMatured
    description: 'A deliverable obligation characteristic. An obligation at time of
      default is due to mature and due to be repaid, or as a result of downgrade/bankruptcy
      is due to be repaid as a result of an acceleration clause. ISDA 2003 Term: Accelerated
      or Matured.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:acceleratedOrMatured
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: boolean
  notBearer:
    name: notBearer
    definition_uri: https://w3id.org/lmodel/common_domain_model/notBearer
    description: 'A deliverable obligation characteristic. Any obligation that is
      not a bearer instrument. This applies to Bonds only and is meant to avoid tax,
      fraud and security/delivery provisions that can potentially be associated with
      Bearer Bonds. ISDA 2003 Term: Not Bearer.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:notBearer
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: boolean
  indirectLoanParticipation:
    name: indirectLoanParticipation
    definition_uri: https://w3id.org/lmodel/common_domain_model/indirectLoanParticipation
    description: 'ISDA 1999 Term: Indirect Loan Participation. NOTE: Only applicable
      as a deliverable obligation under ISDA Credit 1999.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:indirectLoanParticipation
    owner: DeliverableObligations
    domain_of:
    - DeliverableObligations
    range: LoanParticipation
    inlined: true
    inlined_as_list: true
  qualifyingParticipationSeller:
    name: qualifyingParticipationSeller
    definition_uri: https://w3id.org/lmodel/common_domain_model/qualifyingParticipationSeller
    description: 'If Direct Loan Participation is specified as a deliverable obligation
      characteristic, this specifies any requirements for the Qualifying Participation
      Seller. The requirements may be listed free-form. ISDA 2003 Term: Qualifying
      Participation Seller.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:qualifyingParticipationSeller
    owner: LoanParticipation
    domain_of:
    - LoanParticipation
    range: string
  partialCashSettlement:
    name: partialCashSettlement
    definition_uri: https://w3id.org/lmodel/common_domain_model/partialCashSettlement
    description: Specifies whether either 'Partial Cash Settlement of Assignable Loans',
      'Partial Cash Settlement of Consent Required Loans' or 'Partial Cash Settlement
      of Participations' is applicable. If this element is specified and Assignable
      Loan is a Deliverable Obligation Characteristic, any Assignable Loan that is
      deliverable, but where a non-receipt of Consent by the Physical Settlement Date
      has occurred, the Loan can be cash settled rather than physically delivered.
      If this element is specified and Consent Required Loan is a Deliverable Obligation
      Characteristic, any Consent Required Loan that is deliverable, but where a non-receipt
      of Consent by the Physical Settlement Date has occurred, the Loan can be cash
      settled rather than physically delivered. If this element is specified and Direct
      Loan Participation is a Deliverable Obligation Characteristic, any Participation
      that is deliverable, but where this participation has not been effected (has
      not come into effect) by the Physical Settlement Date, the participation can
      be cash settled rather than physically delivered.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:partialCashSettlement
    owner: PCDeliverableObligationCharac
    domain_of:
    - PCDeliverableObligationCharac
    range: boolean
  businessDaysNotSpecified:
    name: businessDaysNotSpecified
    definition_uri: https://w3id.org/lmodel/common_domain_model/businessDaysNotSpecified
    description: An explicit indication that a number of business days are not specified
      and therefore ISDA fallback provisions should apply.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:businessDaysNotSpecified
    owner: PhysicalSettlementPeriod
    domain_of:
    - PhysicalSettlementPeriod
    range: boolean
  maximumBusinessDays:
    name: maximumBusinessDays
    definition_uri: https://w3id.org/lmodel/common_domain_model/maximumBusinessDays
    description: A maximum number of business days. Its precise meaning is dependant
      on the context in which this element is used. Intended to be used to limit a
      particular ISDA fallback provision.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:maximumBusinessDays
    owner: PhysicalSettlementPeriod
    domain_of:
    - PhysicalSettlementPeriod
    range: integer
  clearedPhysicalSettlement:
    name: clearedPhysicalSettlement
    definition_uri: https://w3id.org/lmodel/common_domain_model/clearedPhysicalSettlement
    description: Specifies whether the swap resulting from physical settlement of
      the swaption transaction will clear through a clearing house. The meaning of
      Cleared Physical Settlement is defined in the 2006 ISDA Definitions, Section
      15.2 (published in Supplement number 28).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:clearedPhysicalSettlement
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: boolean
  predeterminedClearingOrganizationParty:
    name: predeterminedClearingOrganizationParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/predeterminedClearingOrganizationParty
    description: Specifies the clearing organization (CCP, DCO) to which the trade
      should be cleared.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:predeterminedClearingOrganizationParty
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: AncillaryRoleEnum
  physicalSettlementPeriod:
    name: physicalSettlementPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/physicalSettlementPeriod
    description: 'The number of business days used in the determination of the physical
      settlement date. The physical settlement date is this number of business days
      after all applicable conditions to settlement are satisfied. If a number of
      business days is not specified fallback provisions apply for determining the
      number of business days. If Section 8.5/8.6 of the 1999/2003 ISDA Definitions
      are to apply the businessDaysNotSpecified element should be included. If a specified
      number of business days are to apply these should be specified in the businessDays
      element. If Section 8.5/8.6 of the 1999/2003 ISDA Definitions are to apply but
      capped at a maximum number of business days then the maximum number should be
      specified in the maximumBusinessDays element. ISDA 2003 Term: Physical Settlement
      Period.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:physicalSettlementPeriod
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: PhysicalSettlementPeriod
    inlined: true
    inlined_as_list: true
  deliverableObligations:
    name: deliverableObligations
    definition_uri: https://w3id.org/lmodel/common_domain_model/deliverableObligations
    description: This element contains all the ISDA terms relevant to defining the
      deliverable obligations.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:deliverableObligations
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: DeliverableObligations
    inlined: true
    inlined_as_list: true
  escrow:
    name: escrow
    definition_uri: https://w3id.org/lmodel/common_domain_model/escrow
    description: 'If this element is specified and set to ''true'', indicates that
      physical settlement must take place through the use of an escrow agent. (For
      Canadian counterparties this is always ''Not Applicable''. ISDA 2003 Term: Escrow.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:escrow
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: boolean
  sixtyBusinessDaySettlementCap:
    name: sixtyBusinessDaySettlementCap
    definition_uri: https://w3id.org/lmodel/common_domain_model/sixtyBusinessDaySettlementCap
    description: 'If this element is specified and set to ''true'', for a transaction
      documented under the 2003 ISDA Credit Derivatives Definitions, has the effect
      of incorporating the language set forth below into the confirmation. The section
      references are to the 2003 ISDA Credit Derivatives Definitions. Notwithstanding
      Section 1.7 or any provisions of Sections 9.9 or 9.10 to the contrary, but without
      prejudice to Section 9.3 and (where applicable) Sections 9.4, 9.5 and 9.6, if
      the Termination Date has not occurred on or prior to the date that is 60 Business
      Days following the Physical Settlement Date, such 60th Business Day shall be
      deemed to be the Termination Date with respect to this Transaction except in
      relation to any portion of the Transaction (an ''Affected Portion'') in respect
      of which: (1) a valid notice of Buy-in Price has been delivered that is effective
      fewer than three Business Days prior to such 60th Business Day, in which case
      the Termination Date for that Affected Portion shall be the third Business Day
      following the date on which such notice is effective; or (2) Buyer has purchased
      but not Delivered Deliverable Obligations validly specified by Seller pursuant
      to Section 9.10(b), in which case the Termination Date for that Affected Portion
      shall be the tenth Business Day following the date on which Seller validly specified
      such Deliverable Obligations to Buyer.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:sixtyBusinessDaySettlementCap
    owner: PhysicalSettlementTerms
    domain_of:
    - PhysicalSettlementTerms
    range: boolean
  paymentPercent:
    name: paymentPercent
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentPercent
    description: A percentage of the notional amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:paymentPercent
    owner: PercentageRule
    domain_of:
    - PercentageRule
    range: decimal
    required: true
  notionalAmountReference:
    name: notionalAmountReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/notionalAmountReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: A reference to the notional amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:notionalAmountReference
    owner: PercentageRule
    domain_of:
    - PercentageRule
    range: Money
    required: true
    inlined: true
    inlined_as_list: true
  adjustableOrRelativeDate:
    name: adjustableOrRelativeDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/adjustableOrRelativeDate
    description: A single settlement date subject to adjustment or specified as relative
      to another date (e.g. the trade date). This attribute was formerly part of 'SettlementTerms',
      which is now being harmonised to include a common 'SettlementDate', as inherited
      from 'SettlementBase'.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:adjustableOrRelativeDate
    owner: SettlementDate
    domain_of:
    - SettlementDate
    range: AdjustableOrAdjustedOrRelativeDate
    inlined: true
    inlined_as_list: true
  businessDateRange:
    name: businessDateRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/businessDateRange
    description: A range of contiguous business days. This attribute is meant to be
      merged with the 'settlementDate' at some future point once we refactor 'Date'
      to use a single complex type across the model. This attributes was formerly
      part of 'CashSettlementPaymentDate', as included into 'OptionCashSettlement'
      (which is now merged into a unique 'CashSettlementTerms' data type.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:businessDateRange
    owner: SettlementDate
    domain_of:
    - SettlementDate
    range: BusinessDateRange
    inlined: true
    inlined_as_list: true
  cashSettlementBusinessDays:
    name: cashSettlementBusinessDays
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashSettlementBusinessDays
    description: 'The number of business days used in the determination of the cash
      settlement payment date. If a cash settlement amount is specified, the cash
      settlement payment date will be this number of business days following the calculation
      of the final price. If a cash settlement amount is not specified, the cash settlement
      payment date will be this number of business days after all conditions to settlement
      are satisfied. ISDA 2003 Term: Cash Settlement Date. This attribute was formerly
      part of ''CashSettlementTerms'' as used for credit event settlement, which now
      includes a common ''SettlementDate'' attribute.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:cashSettlementBusinessDays
    owner: SettlementDate
    domain_of:
    - SettlementDate
    range: integer
  dateRelativeToPaymentDates:
    name: dateRelativeToPaymentDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/dateRelativeToPaymentDates
    description: The payment date references on which settlements in non-deliverable
      currency are due and will then have to be converted according to the terms specified
      through the other parts of the nonDeliverableSettlement structure.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:dateRelativeToPaymentDates
    owner: FxFixingDate
    domain_of:
    - FxFixingDate
    range: DateRelativeToPaymentDates
    inlined: true
    inlined_as_list: true
  dateRelativeToCalculationPeriodDates:
    name: dateRelativeToCalculationPeriodDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/dateRelativeToCalculationPeriodDates
    description: The calculation period references on which settlements in non-deliverable
      currency are due and will then have to be converted according to the terms specified
      through the other parts of the nonDeliverableSettlement structure. Implemented
      for Brazilian-CDI swaps where it will refer to the termination date of the appropriate
      leg.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:dateRelativeToCalculationPeriodDates
    owner: FxFixingDate
    domain_of:
    - FxFixingDate
    range: DateRelativeToCalculationPeriodDates
    inlined: true
    inlined_as_list: true
  dateRelativeToValuationDates:
    name: dateRelativeToValuationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/dateRelativeToValuationDates
    description: The calculation period references on which settlements in non-deliverable
      currency are due and will then have to be converted according to the terms specified
      through the other parts of the nonDeliverableSettlement structure. Implemented
      for Brazilian-CDI swaps where it will refer to the termination date of the appropriate
      leg.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:dateRelativeToValuationDates
    owner: FxFixingDate
    domain_of:
    - FxFixingDate
    range: DateRelativeToValuationDates
    inlined: true
    inlined_as_list: true
  cashSettlementTerms:
    name: cashSettlementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashSettlementTerms
    description: Specifies the parameters associated with the cash settlement procedure.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:cashSettlementTerms
    owner: SettlementTerms
    domain_of:
    - SettlementTerms
    range: CashSettlementTerms
    multivalued: true
    inlined: true
    inlined_as_list: true
  physicalSettlementTerms:
    name: physicalSettlementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/physicalSettlementTerms
    description: Specifies the physical settlement terms which apply to the transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:physicalSettlementTerms
    owner: SettlementTerms
    domain_of:
    - SettlementTerms
    range: PhysicalSettlementTerms
    inlined: true
    inlined_as_list: true
  paymentRule:
    name: paymentRule
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentRule
    description: The calculation rule.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:paymentRule
    owner: PaymentDetail
    domain_of:
    - PaymentDetail
    range: PaymentRule
    required: true
    inlined: true
    inlined_as_list: true
  paymentAmount:
    name: paymentAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentAmount
    description: A fixed payment amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:paymentAmount
    owner: PaymentDetail
    domain_of:
    - PaymentDetail
    range: Money
    inlined: true
    inlined_as_list: true
  percentageRule:
    name: percentageRule
    definition_uri: https://w3id.org/lmodel/common_domain_model/percentageRule
    description: This attribute is not present as part of the FpML construct, as the
      payment rule is specialised by means of runtime type extension through the xsi:type.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:percentageRule
    owner: PaymentRule
    domain_of:
    - PaymentRule
    range: PercentageRule
    inlined: true
    inlined_as_list: true
  initialPayment:
    name: initialPayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/initialPayment
    description: A true/false flag to indicate whether there is an initial exchange
      of principal on the effective date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:initialPayment
    owner: PrincipalPayments
    domain_of:
    - PrincipalPayments
    range: boolean
    required: true
  finalPayment:
    name: finalPayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/finalPayment
    description: A true/false flag to indicate whether there is a final exchange of
      principal on the termination date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:finalPayment
    owner: PrincipalPayments
    domain_of:
    - PrincipalPayments
    range: boolean
    required: true
  intermediatePayment:
    name: intermediatePayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/intermediatePayment
    description: A true/false flag to indicate whether there are intermediate or interim
      exchanges of principal during the term of the swap.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:intermediatePayment
    owner: PrincipalPayments
    domain_of:
    - PrincipalPayments
    range: boolean
    required: true
  varyingLegNotionalCurrency:
    name: varyingLegNotionalCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/varyingLegNotionalCurrency
    description: Indicate the Payout legs which nominal amount may vary in regards
      of FX Fixing dates as determined in the product terms.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    slot_uri: common_domain_model:varyingLegNotionalCurrency
    owner: PrincipalPayments
    domain_of:
    - PrincipalPayments
    range: string
