    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(iii)"
      name "Notification Time"
    - ISDA CSA_NewYork_1994 paragraph "13" clause "(c)(iv)" name "Notification Time"
    - ISDA CSA_English_1995 paragraph "11" clause "(c)(iv)" name "Notification Time"
    - ISDA CSD_English_1995 paragraph "13" clause "(d)(iv)" name "Notification Time"
    - ISDA CSA_VM_English_2016 paragraph "11" clause "(d)(iv)" name "Notification
      Time"
    - ISDA CSA_VM_NewYork_2016 paragraph "13" clause "(d)(iv)" name "Notification
      Time"
