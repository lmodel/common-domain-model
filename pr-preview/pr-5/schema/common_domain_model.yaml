    name: SecurityProviderRightsEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/SecurityProviderRightsEvent
    description: A class to specify the Pledgor/Obligor/Chargor Rights Event election.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(j)" name
      "Chargor Rights Event"
    - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(j)" name
      "Obligor Rights Event"
    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(j)" name
      "Pledgor Rights Event."
    comments:
    - "Rosetta condition: RightsEvent_includeCoolingOffLanguage \u2014 if includeCoolingOffLanguage\
      \ = True then customElection is absent"
    - "Rosetta condition: RightsEvent_customElection \u2014 if customElection exists\
      \ then includeCoolingOffLanguage = False"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    - isda:CSA_IM_Japanese_2016
    - isda:CSA_IM_NewYork_2016
    exact_mappings:
    - common_domain_model:SecurityProviderRightsEvent
    slots:
    - SecurityProviderRightsEvent_partyElection
    - includeCoolingOffLanguage
    - SecurityProviderRightsEvent_fullDischarge
    - automaticSetOff
    - SecurityProviderRightsEvent_customElection
    slot_usage:
      partyElection:
        name: partyElection
        range: SecurityProviderRightsEventElection
        required: false
      fullDischarge:
        name: fullDischarge
        description: If specified as applicable here, a Pledgor/Obligor/Chargor Rights
          Event will not occur unless the Pledgor/Obligor/Chargor (A) has provided
          a statement to the Secured Party in respect of such Early Termination Date.
      customElection:
        name: customElection
        description: A custom Pledgor/Obligor/Chargor Rights Event election might
          be specified by the parties.
    class_uri: common_domain_model:SecurityProviderRightsEvent
    rules:
    - preconditions:
        slot_conditions:
          includeCoolingOffLanguage:
            name: includeCoolingOffLanguage
            equals_string: 'True'
      postconditions:
        slot_conditions:
          customElection:
            name: customElection
            required: false
      description: A data rule to enforce that, when the Rights Event election includes
        cooling off language, no custom election should be specified.
    - preconditions:
        slot_conditions:
          customElection:
            name: customElection
            required: true
      postconditions:
        slot_conditions:
          includeCoolingOffLanguage:
            name: includeCoolingOffLanguage
            equals_string: 'False'
      description: A data rule to enforce that, when the Rights Event is specified
        through a custom election, no standard cooling off language should be specified.
  SecurityProviderRightsEventElection:
    name: SecurityProviderRightsEventElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/SecurityProviderRightsEventElection
