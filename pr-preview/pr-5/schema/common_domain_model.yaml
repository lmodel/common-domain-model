            notionalAmount:
              name: notionalAmount
              required: true
        - slot_conditions:
            fxLinkedNotionalAmount:
              name: fxLinkedNotionalAmount
              required: true
      description: condition to represent an FpML choice construct.
    - preconditions: {}
