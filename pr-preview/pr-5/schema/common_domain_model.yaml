      \ -> uk_EMIR_EligibleCollateral exists"
    - "Rosetta condition: UsEligibleCollateralTaxonomy \u2014 if taxonomySource =\
      \ TaxonomySourceEnum -> US_CFTC_PR_EligibleCollateralAssetClass then taxonomyValue\
      \ -> us_CFTC_PR_EligibleCollateral exists"
    - "Rosetta condition: TaxonomyValue \u2014 if taxonomyValue -> nonEnumeratedTaxonomyValue\
      \ exists then taxonomySource <> TaxonomySourceEnum -> EU_EMIR_EligibleCollateralAssetClass\
      \ and taxonomySource <> TaxonomySourceEnum -> UK_EMIR_EligibleCollateralAssetClass\
      \ and taxonomySource <> TaxonomySourceEnum -> US_CFTC_PR_EligibleCollateralAssetClass"
