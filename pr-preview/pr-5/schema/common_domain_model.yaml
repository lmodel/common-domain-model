    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'False'
      postconditions:
        slot_conditions:
          primaryContactInformation:
            name: primaryContactInformation
            required: false
          entity:
            name: entity
            required: false
          partyReference:
            name: partyReference
            required: false
      description: A data rule to enforce that the Process Agent details cannot be
        specified if deemed not applicable.
