    comments:
    - "Rosetta condition: RelevantProvisionsElection \u2014 if relevantProvisionsElection\
      \ = True then relevantProvisionsTerms is absent"
    - "Rosetta condition: AmendmentsToJapaneseProvisions \u2014 if amendmentsToJapaneseProvisions\
      \ = False then amendmentsToJapaneseProvisionsTerms is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:JapaneseSecuritiesProvisions
