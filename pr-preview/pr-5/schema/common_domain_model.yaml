  AssetIdTypeEnum:
    name: AssetIdTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetIdTypeEnum
    description: Extends product identifiers with additional identifier sources for
      Assets.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CurrencyCode:
        text: CurrencyCode
        description: Used to identify the currency of a Cash Asset.
      ExchangeCode:
        text: ExchangeCode
        description: The identifier follows the symbology set by the exchange which
          lists the asset.
      ClearingCode:
        text: ClearingCode
        description: The identifier follows the symbology set by the clearing house
          which clears the asset.
    inherits:
