        range: CustodianRiskElection
    class_uri: common_domain_model:CustodianRisk
  CustodianRiskElection:
    name: CustodianRiskElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/CustodianRiskElection
    description: A class to specify the Custodian Risk.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(n)(ii)"
      name "Custodian (IM) Risk"
    - ISDA CSD_IM_English_2018 paragraph "13 General Principles" clause "(n)(ii)"
      name "Custodian (IM) Risk"
    - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(m)(ii)"
      name "Collateral Manager Risk"
    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(n)(ii)"
      name "Custodian (IM) Risk"
    comments:
    - "Rosetta condition: Specified \u2014 if isSpecified = False then qualification\
      \ is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    - isda:CSD_IM_English_2018
    - isda:CSA_IM_Japanese_2016
    - isda:CSA_IM_NewYork_2016
    exact_mappings:
    - common_domain_model:CustodianRiskElection
    slots:
    - CustodianRiskElection_party
    - CustodianRiskElection_isSpecified
    - CustodianRiskElection_qualification
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: CounterpartyRoleEnum
      isSpecified:
        name: isSpecified
        description: The qualification as to whether the risk is deemed as Specified.
      qualification:
        name: qualification
        description: The Custodian Risk or Collateral Manager Risk qualification.
        range: string
        required: false
    class_uri: common_domain_model:CustodianRiskElection
    rules:
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'False'
      postconditions:
        slot_conditions:
          qualification:
            name: qualification
            required: false
      description: The Custodian Risk (English Law and New York Law ISDA CSA) or Collateral
        Manager Risk (Japanese Law ISDA CSA) should only be qualified if that risk
        is deemed 'specified'.
  CustodianTerms:
    name: CustodianTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/CustodianTerms
    description: A class to specify the requirements applicable to the custodian with
      respect to the holding of posted collateral.
    notes:
    - ISDA CSA_VM_2016 paragraph "13" clause " (h)(i)" name "Eligibility to Hold Posted
      Collateral (VM) Custodians (VM)"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_VM_2016
    exact_mappings:
    - common_domain_model:CustodianTerms
    slots:
    - minimumAssets
    - minimumRating
    - initialDesignation
    class_uri: common_domain_model:CustodianTerms
  CustodyArrangements:
    name: CustodyArrangements
    definition_uri: https://w3id.org/lmodel/common_domain_model/CustodyArrangements
    description: Describes how posted collateral is held, maintained, and safeguarded
      by a custodian or third-party agent, in accordance with the terms of the governing
      agreement.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CustodyArrangements
    slots:
    - isCreditSupportDocument
    - hasControlAgreementLanguage
    - otherProvisions
    - collateralAccessBreach
    - custodianRisk
    - controlAgreement
    - custodianEvent
    - CustodyArrangements_custodian
    - CustodyArrangements_collateralManagementAgreement
    slot_usage:
      custodian:
        name: custodian
        description: The custodian and segregated account details for each party to
          the agreement.
        range: Custodian
      collateralManagementAgreement:
        name: collateralManagementAgreement
        range: CollateralManagementAgreement
        required: false
    class_uri: common_domain_model:CustodyArrangements
  DisputeResolution:
    name: DisputeResolution
    definition_uri: https://w3id.org/lmodel/common_domain_model/DisputeResolution
    description: A class to specify the election terms under which a party disputes
      the Value of any Transfer of Eligible Credit Support or Posted Credit Support.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(g)" name
      "Dispute Resolution"
    - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(h)" name
      "Dispute Resolution"
    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(g)" name
      "Dispute Resolution"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    - isda:CSA_IM_Japanese_2016
    - isda:CSA_IM_NewYork_2016
    exact_mappings:
    - common_domain_model:DisputeResolution
    slots:
    - resolutionTime
    - otherTerms
    - alternativeTerms
    - recalculationOfValue
    - legacyAlternative
    - DisputeResolution_value
    slot_usage:
      value:
        name: value
        description: Methodology for resolving disputes in respect of the determination
          of the value of collateral.
        range: ResolutionValue
    class_uri: common_domain_model:DisputeResolution
  ElectiveAmountElection:
    name: ElectiveAmountElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/ElectiveAmountElection
    description: A class to specify the party elective amounts which can be used for
      the purpose of specifying elections such as the ISDA CSA Threshold and Minimum
      Transfer Amount.
    comments:
    - "Rosetta condition: NonZeroAmount \u2014 if electiveAmount is absent then amount\
      \ exists or customElection exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ElectiveAmountElection
    slots:
    - ElectiveAmountElection_party
    - electiveAmount
    - ElectiveAmountElection_amount
    - ElectiveAmountElection_customElection
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: CounterpartyRoleEnum
        required: true
      amount:
        name: amount
        description: The elective amount when expressed as a currency amount. The
          associated PartyElectiveAmount_amount data rule enforces that the currency
          amount is actually greater than 0.
        required: false
      customElection:
        name: customElection
        description: The elective amount when expressed as a custom election by the
          party.
    class_uri: common_domain_model:ElectiveAmountElection
    rules:
    - preconditions:
        slot_conditions:
          electiveAmount:
            name: electiveAmount
            required: false
      postconditions:
        any_of:
        - slot_conditions:
            amount:
              name: amount
              required: true
        - slot_conditions:
            customElection:
              name: customElection
              required: true
      description: When the elective amount is not zero either a currency amount or
        a custom election must exist.
  EnforcementEvent:
    name: EnforcementEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/EnforcementEvent
    description: A class to specify Enforcement Events specific to Security Agreements.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:EnforcementEvent
    slots:
    - earlyTerminationDate
    - failureToPay
    class_uri: common_domain_model:EnforcementEvent
  ExecutionLanguage:
    name: ExecutionLanguage
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExecutionLanguage
    description: A class to specify execution language terms of a Security Agreement.
    comments:
    - "Rosetta condition: NumberOfOriginals \u2014 if standardLanguage = False then\
      \ numberOfOriginals is absent"
    - "Rosetta condition: OtherLanguage \u2014 if standardLanguage = False then otherLanguage\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ExecutionLanguage
    slots:
    - standardLanguage
    - numberOfOriginals
    - otherLanguage
    class_uri: common_domain_model:ExecutionLanguage
    rules:
    - preconditions:
        slot_conditions:
          standardLanguage:
            name: standardLanguage
            equals_string: 'False'
      postconditions:
        slot_conditions:
          numberOfOriginals:
            name: numberOfOriginals
            required: false
      description: A data rule to enforce that the number of original documents should
        only be specified when standard execution language is used.
    - preconditions:
        slot_conditions:
          standardLanguage:
            name: standardLanguage
            equals_string: 'False'
      postconditions:
        slot_conditions:
          otherLanguage:
            name: otherLanguage
            required: true
      description: A data rule to enforce that bespoke execution language must be
        included if non-standard execution language is specified.
  ExecutionLocation:
    name: ExecutionLocation
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExecutionLocation
    description: A class to specify execution location terms of a Security Agreement.
    comments:
    - "Rosetta condition: DutyPayerLanguage \u2014 if dutyPayer = \"Specify\" then\
      \ dutyPayerLanguage exists"
    - "Rosetta condition: DutyPaymentLanguage \u2014 if dutyPaymentDate exists then\
      \ dutyPaymentLanguage is absent"
    - "Rosetta condition: OtherLanguage \u2014 if executionLocation = ExecutionLocationEnum\
      \ -> OtherLocation then otherLanguage exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ExecutionLocation
    slots:
    - executionLocation
    - ExecutionLocation_otherLanguage
    - dutyPayer
    - dutyPayerLanguage
    - dutyPaymentDate
    - dutyPaymentLanguage
    slot_usage:
      otherLanguage:
        name: otherLanguage
        description: Bespoke execution location language to be included when specified.
    class_uri: common_domain_model:ExecutionLocation
    rules:
    - preconditions:
        slot_conditions:
          dutyPayer:
            name: dutyPayer
            equals_string: Specify
      postconditions:
        slot_conditions:
          dutyPayerLanguage:
            name: dutyPayerLanguage
            required: true
      description: A data rule to enforce that Duty Payer Language should only be
        specified when required.
    - preconditions:
        slot_conditions:
          dutyPaymentDate:
            name: dutyPaymentDate
            required: true
      postconditions:
        slot_conditions:
          dutyPaymentLanguage:
            name: dutyPaymentLanguage
            required: false
      description: A data rule to enforce that Duty Payment Language should be absent
        when a Duty Payment date is provided.
    - preconditions:
        slot_conditions:
          executionLocation:
            name: executionLocation
            equals_string: OtherLocation
      postconditions:
        slot_conditions:
          otherLanguage:
            name: otherLanguage
            required: true
      description: A data rule to enforce that bespoke execution language must be
        included if non-standard execution language is specified.
  ExecutionTerms:
    name: ExecutionTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExecutionTerms
    description: A class to specify execution location and language of execution to
      determine duty to be paid.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ExecutionTerms
    slots:
    - executionLanguage
    - ExecutionTerms_executionLocation
    slot_usage:
      executionLocation:
        name: executionLocation
        description: The bespoke execution location election.
        range: ExecutionLocation
    class_uri: common_domain_model:ExecutionTerms
  FrenchLawAddendum:
    name: FrenchLawAddendum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FrenchLawAddendum
    description: A class to specify party specific elections when a Collateral Transfer
      Agreement is governed by French Law.
    comments:
    - "Rosetta condition: Applicable \u2014 if isApplicable = True then partyElection\
      \ count = 2"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:FrenchLawAddendum
    slots:
    - FrenchLawAddendum_isApplicable
    - FrenchLawAddendum_partyElection
    slot_usage:
      isApplicable:
        name: isApplicable
        description: The qualification of whether the French Law Addendum is deemed
          applicable by the parties (True) or not (False).
      partyElection:
        name: partyElection
        description: The parties French Law Addendum Elections.
        range: FrenchLawAddendumElection
        required: false
    class_uri: common_domain_model:FrenchLawAddendum
  FrenchLawAddendumElection:
    name: FrenchLawAddendumElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/FrenchLawAddendumElection
    description: A class to specify party specific French Law Addendum language.
    comments:
    - "Rosetta condition: AddendumLanguage \u2014 if isApplicable = True then addendumLanguage\
      \ exists else if isApplicable = False then addendumLanguage is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:FrenchLawAddendumElection
    slots:
    - FrenchLawAddendumElection_party
    - FrenchLawAddendumElection_isApplicable
    - addendumLanguage
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: CounterpartyRoleEnum
        required: true
      isApplicable:
        name: isApplicable
        description: The qualification of whether the party elects specific language.
    class_uri: common_domain_model:FrenchLawAddendumElection
    rules:
    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'True'
      postconditions:
        slot_conditions:
          addendumLanguage:
            name: addendumLanguage
            required: true
      description: A data rule to enforce that the French Law Addendum party language
        must be specified when applicable.
  FxHaircutCurrency:
    name: FxHaircutCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxHaircutCurrency
    description: A class to specify the reference currency for the purpose of specifying
      the FX Haircut relating to a posting obligation, as being either the Termination
      Currency or an FX Designated Currency.
    comments:
    - "Rosetta condition: TerminationCurrency \u2014 if isTerminationCurrency = True\
      \ then fxDesignatedCurrency is absent"
    - "Rosetta condition: FxDesignatedCurrency \u2014 if isTerminationCurrency = False\
      \ then fxDesignatedCurrency exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:FxHaircutCurrency
    slots:
    - isTerminationCurrency
    - fxDesignatedCurrency
    class_uri: common_domain_model:FxHaircutCurrency
    rules:
    - preconditions:
        slot_conditions:
          isTerminationCurrency:
            name: isTerminationCurrency
            equals_string: 'True'
      postconditions:
        slot_conditions:
          fxDesignatedCurrency:
            name: fxDesignatedCurrency
            required: false
      description: The FX Designated Currency shouldn't be specified when the reference
        currency for the purpose of specifying the FX Haircut relating to a posting
        obligation is specified as the Termination Currency.
    - preconditions:
        slot_conditions:
          isTerminationCurrency:
            name: isTerminationCurrency
            equals_string: 'False'
      postconditions:
        slot_conditions:
          fxDesignatedCurrency:
            name: fxDesignatedCurrency
            required: true
      description: The FX Designated Currency should be specified when the reference
        currency for the purpose of specifying the FX Haircut relating to a posting
        obligation is specified as not being the Termination Currency.
  GeneralSimmElections:
    name: GeneralSimmElections
