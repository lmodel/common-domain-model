          grid that will be used to calculate the gross initial margin.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}},{"name":"GetGrossInitialMarginFromStandardizedSchedule","description":"Takes
          the grid information from an specific trade and calculates the gross initial
          margin.","inputs":[{"name":"standardizedSchedule","type":"StandardizedSchedule","cardinality":"1..1"}],"output":{"name":"grossInitialMargin","type":"Money","cardinality":"0..1"}}]'
    comments:
    - "Rosetta condition: PositiveNotional \u2014 notional > 0"
    - "Rosetta condition: ValidCurrency \u2014 notionalCurrency to-enum ISOCurrencyCodeEnum\
      \ exists"
    - "Rosetta condition: PositiveDuration \u2014 if durationInYears exists then durationInYears\
      \ > 0"
    - "Rosetta func: BuildStandardizedSchedule \u2014 Takes a trade and uses qualification\
      \ to extract the relevant information to populate the grid that will be used\
      \ to calculate the gross initial margin."
    - "Rosetta func: GetGrossInitialMarginFromStandardizedSchedule \u2014 Takes the\
      \ grid information from an specific trade and calculates the gross initial margin."
    in_subset:
    - cdm_margin_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_margin_schedule
    exact_mappings:
    - common_domain_model:StandardizedSchedule
    slots:
    - assetClass
    - productClass
    - notional
    - notionalCurrency
    - durationInYears
    class_uri: common_domain_model:StandardizedSchedule
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          notional:
            name: notional
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: Ensure notional is greater than 0
    - preconditions:
        slot_conditions:
          durationInYears:
            name: durationInYears
            required: true
      postconditions:
        slot_conditions:
          durationInYears:
            name: durationInYears
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: Ensure duration is greater than 0.
  StandardizedScheduleTradeInfo:
    name: StandardizedScheduleTradeInfo
    definition_uri: https://w3id.org/lmodel/common_domain_model/StandardizedScheduleTradeInfo
    comments:
    - "Rosetta condition: PositiveGrossInitialMargin \u2014 grossInitialMargin ->\
      \ value > 0"
    - "Rosetta condition: SameCurrencies \u2014 grossInitialMargin -> unit -> currency\
      \ = markToMarketValue -> unit -> currency"
    in_subset:
    - cdm_margin_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_margin_schedule
    exact_mappings:
