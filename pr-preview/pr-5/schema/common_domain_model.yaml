classes:
  AdjustableDate:
    name: AdjustableDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableDate
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"AdjustableDateResolution","description":"Prioritization
          of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDate","type":"AdjustableDate","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..1"}}]'
    description: A class for defining a date that shall be subject to adjustment if
      it would otherwise fall on a day that is not a business day in the specified
      business centers, together with the convention for adjusting the date.
    comments:
    - "Rosetta condition: AdjustableDateChoice \u2014 optional choice dateAdjustments,\
      \ dateAdjustmentsReference"
    - "Rosetta func: AdjustableDateResolution \u2014 Prioritization of unadjustedDate\
      \ over adjustedDate."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableDate
    close_mappings:
    - fpml_5_10:AdjustableDate
    slots:
    - unadjustedDate
    - dateAdjustments
    - dateAdjustmentsReference
    - adjustedDate
    class_uri: common_domain_model:AdjustableDate
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            dateAdjustments:
              name: dateAdjustments
              required: true
        - slot_conditions:
            dateAdjustmentsReference:
              name: dateAdjustmentsReference
              required: true
      description: Choice rule to represent an FpML choice construct.
  AdjustableDates:
    name: AdjustableDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"AdjustableDatesResolution","description":"Prioritization
          of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDates","type":"AdjustableDates","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..*"}}]'
    description: A class for defining a series of dates that shall be subject to adjustment
      if they would otherwise fall on a day that is not a business day in the specified
      business centers, together with the convention for adjusting the dates.
    comments:
    - "Rosetta condition: AdjustedDate \u2014 if adjustedDate is absent then unadjustedDate\
      \ exists and dateAdjustments exists"
    - "Rosetta func: AdjustableDatesResolution \u2014 Prioritization of unadjustedDate\
      \ over adjustedDate."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableDates
    close_mappings:
    - fpml_5_10:AdjustableDates
    slots:
    - AdjustableDates_unadjustedDate
    - dateAdjustments
    - AdjustableDates_adjustedDate
    slot_usage:
      unadjustedDate:
        name: unadjustedDate
        description: A date subject to adjustment.
        multivalued: true
      adjustedDate:
        name: adjustedDate
        description: The date(s) once the adjustment has been performed. (Note that
          this date may change if the business center holidays change).
        multivalued: true
    class_uri: common_domain_model:AdjustableDates
    rules:
    - preconditions:
        slot_conditions:
          adjustedDate:
            name: adjustedDate
            required: false
      postconditions:
        slot_conditions:
          unadjustedDate:
            name: unadjustedDate
            required: true
          dateAdjustments:
            name: dateAdjustments
            required: true
      description: FpML specifies a choice between adjustedDate and [unadjustedDate
        (required), dateAdjutsments (required), adjustedDate (optional)].
  AdjustableOrAdjustedDate:
    name: AdjustableOrAdjustedDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableOrAdjustedDate
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class for defining a date that shall be subject to adjustment if
      it would otherwise fall on a day that is not a business day in the specified
      business centers, together with the convention for adjusting the date.
    comments:
    - "Rosetta condition: AdjustedDate \u2014 if adjustedDate is absent then unadjustedDate\
      \ exists and dateAdjustments exists"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableOrAdjustedDate
    close_mappings:
    - fpml_5_10:AdjustableOrAdjustedDate
    slots:
    - AdjustableOrAdjustedDate_unadjustedDate
    - dateAdjustments
    - adjustedDate
    slot_usage:
      unadjustedDate:
        name: unadjustedDate
        description: A date subject to adjustment.
    class_uri: common_domain_model:AdjustableOrAdjustedDate
    rules:
    - preconditions:
        slot_conditions:
          adjustedDate:
            name: adjustedDate
            required: false
      postconditions:
        slot_conditions:
          unadjustedDate:
            name: unadjustedDate
            required: true
          dateAdjustments:
            name: dateAdjustments
            required: true
      description: FpML specifies a choice between adjustedDate and [unadjustedDate
        (required), dateAdjutsments (required), adjustedDate (optional)].
  AdjustableOrAdjustedOrRelativeDate:
    name: AdjustableOrAdjustedOrRelativeDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableOrAdjustedOrRelativeDate
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ConvertToAdjustableOrRelativeDate","description":"Utility
          function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrRelativeDate","inputs":[{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}},{"name":"ConvertToAdjustableOrAdjustedOrRelativeDate","description":"Utility
          function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}},{"name":"AdjustableOrAdjustedOrRelativeDateResolution","description":"Prioritization
          of unadjustedDate over adjustedDate.","inputs":[{"name":"adjustableDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"1..1"}],"output":{"name":"date","type":"date","cardinality":"0..1"}}]'
    description: This Rosetta class specifies the date as either an unadjusted, adjusted
      or relative date. It supplements the features of the AdjustableOrAdjustedDate
      to support the credit default swap option premium, which uses the relative date
      construct.
    comments:
    - "Rosetta condition: AdjustedDate \u2014 adjustedDate exists or relativeDate\
      \ exists or unadjustedDate exists or (unadjustedDate exists and dateAdjustments\
      \ exists and adjustedDate is absent)"
    - "Rosetta func: ConvertToAdjustableOrRelativeDate \u2014 Utility function to\
      \ convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrRelativeDate"
    - "Rosetta func: ConvertToAdjustableOrAdjustedOrRelativeDate \u2014 Utility function\
      \ to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate"
    - "Rosetta func: AdjustableOrAdjustedOrRelativeDateResolution \u2014 Prioritization\
      \ of unadjustedDate over adjustedDate."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableOrAdjustedOrRelativeDate
    close_mappings:
    - fpml_5_10:AdjustableOrAdjustedOrRelativeDate
    slots:
    - AdjustableOrAdjustedOrRelativeDate_unadjustedDate
    - dateAdjustments
    - adjustedDate
    - relativeDate
    slot_usage:
      unadjustedDate:
        name: unadjustedDate
        description: A date subject to adjustment.
    class_uri: common_domain_model:AdjustableOrAdjustedOrRelativeDate
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            adjustedDate:
              name: adjustedDate
              required: true
        - slot_conditions:
            relativeDate:
              name: relativeDate
              required: true
        - slot_conditions:
            unadjustedDate:
              name: unadjustedDate
              required: true
        - slot_conditions:
            unadjustedDate:
              name: unadjustedDate
              required: true
            dateAdjustments:
              name: dateAdjustments
              required: true
            adjustedDate:
              name: adjustedDate
              required: false
      description: This data rule extends the data rule AdjustableOrAdjustedDate_adjustedDate
        by specifying logic applicable to the relative date.
  AdjustableOrRelativeDate:
    name: AdjustableOrRelativeDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableOrRelativeDate
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ResolveAdjustableDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"adjustedDate","type":"date","cardinality":"0..1"},"code_implementation":true},{"name":"ConvertToAdjustableOrRelativeDate","description":"Utility
          function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrRelativeDate","inputs":[{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}},{"name":"ConvertToAdjustableOrAdjustedOrRelativeDate","description":"Utility
          function to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate","inputs":[{"name":"adjustableOrRelativeDate","type":"AdjustableOrRelativeDate","cardinality":"0..1"}],"output":{"name":"adjustableOrAdjustedOrRelativeDate","type":"AdjustableOrAdjustedOrRelativeDate","cardinality":"0..1"}}]'
    description: A class giving the choice between defining a date as an explicit
      date together with applicable adjustments or as relative to some other (anchor)
      date.
    comments:
    - "Rosetta condition: AdjustableOrRelativeDateChoice \u2014 required choice adjustableDate,\
      \ relativeDate"
    - 'Rosetta func: ResolveAdjustableDate'
    - "Rosetta func: ConvertToAdjustableOrRelativeDate \u2014 Utility function to\
      \ convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrRelativeDate"
    - "Rosetta func: ConvertToAdjustableOrAdjustedOrRelativeDate \u2014 Utility function\
      \ to convert from AdjustableOrAdjustedOrRelativeDate to AdjustableOrAdjustedOrRelativeDate"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableOrRelativeDate
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDate
    slots:
    - adjustableDate
    - AdjustableOrRelativeDate_relativeDate
    slot_usage:
      relativeDate:
        name: relativeDate
        range: AdjustedRelativeDateOffset
    class_uri: common_domain_model:AdjustableOrRelativeDate
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDate:
              name: adjustableDate
              required: true
        - slot_conditions:
            relativeDate:
              name: relativeDate
              required: true
      description: Choice rule to represent an FpML choice construct.
  AdjustableOrRelativeDates:
    name: AdjustableOrRelativeDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableOrRelativeDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class giving the choice between defining a series of dates as an
      explicit list of dates together with applicable adjustments or as relative to
      some other series of (anchor) dates.
    comments:
    - "Rosetta condition: AdjustableOrRelativeDatesChoice \u2014 required choice adjustableDates,\
      \ relativeDates"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableOrRelativeDates
    close_mappings:
    - fpml_5_10:AdjustableOrRelativeDates
    slots:
    - adjustableDates
    - relativeDates
    class_uri: common_domain_model:AdjustableOrRelativeDates
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDates:
              name: adjustableDates
              required: true
        - slot_conditions:
            relativeDates:
              name: relativeDates
              required: true
      description: Choice rule to represent an FpML choice construct.
  AdjustedRelativeDateOffset:
    name: AdjustedRelativeDateOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustedRelativeDateOffset
    description: A type defining a date (referred to as the derived date) as a relative
      offset from another date (referred to as the anchor date) plus optional date
      adjustments.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustedRelativeDateOffset
    is_a: RelativeDateOffset
    slots:
    - Period_periodMultiplier
    - Period_period
    - dayType
    - businessDayConvention
    - businessCenters
    - RelativeDateOffset_businessCentersReference
    - dateRelativeTo
    - adjustedDate
    - relativeDateAdjustments
    class_uri: common_domain_model:AdjustedRelativeDateOffset
  BusinessCenters:
    name: BusinessCenters
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessCenters
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"GetAllBusinessCenters","description":"Returns a merged list
          of BusinessCenter codes for the supplied BusinessCenters.","inputs":[{"name":"businessCenters","type":"BusinessCenters","cardinality":"1..1"}],"output":{"name":"businessCenterCodes","type":"BusinessCenter","cardinality":"0..*"}}]'
    description: A class for specifying the business day calendar location used in
      determining whether a day is a business day or not, either by specifying this
      business center by reference to an enumerated list that is maintained by the
      FpML standard, or by reference to such specification when it exists elsewhere
      as part of the instance document. This class corresponds to the FpML BusinessCentersOrReference.model.
    comments:
    - "Rosetta condition: BusinessCentersChoice \u2014 required choice businessCenter,\
      \ businessCentersReference, commodityBusinessCalendar"
    - "Rosetta func: GetAllBusinessCenters \u2014 Returns a merged list of BusinessCenter\
      \ codes for the supplied BusinessCenters."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:BusinessCenters
    close_mappings:
    - fpml_5_10:BusinessCenters
    slots:
    - businessCenter
    - commodityBusinessCalendar
    - businessCentersReference
    class_uri: common_domain_model:BusinessCenters
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            businessCenter:
              name: businessCenter
              required: true
        - slot_conditions:
            businessCentersReference:
              name: businessCentersReference
              required: true
        - slot_conditions:
            commodityBusinessCalendar:
              name: commodityBusinessCalendar
              required: true
      description: Choice rule to represent an FpML choice construct.
  BusinessCenterTime:
    name: BusinessCenterTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessCenterTime
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"TimeZoneFromBusinessCenterTime","description":"Function
          to resolve a time passed as BusinessCenterTime into a TimeZone time.","inputs":[{"name":"time","type":"BusinessCenterTime","cardinality":"1..1"}],"output":{"name":"result","type":"TimeZone","cardinality":"1..1"},"code_implementation":true}]'
    description: A class for defining a time with respect to a business day calendar
      location. For example, 11:00:00 GBLO.
    comments:
    - "Rosetta func: TimeZoneFromBusinessCenterTime \u2014 Function to resolve a time\
      \ passed as BusinessCenterTime into a TimeZone time."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:BusinessCenterTime
    close_mappings:
    - fpml_5_10:BusinessCenterTime
    slots:
    - hourMinuteTime
    - BusinessCenterTime_businessCenter
    slot_usage:
      businessCenter:
        name: businessCenter
        description: A code identifying a business day calendar location. A business
          day calendar location is drawn from the list identified by the business
          day calendar location enumeration.
        required: true
        multivalued: false
    class_uri: common_domain_model:BusinessCenterTime
  BusinessDateRange:
    name: BusinessDateRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessDateRange
    description: A class defining a range of contiguous business days by defining
      an unadjusted first date, an unadjusted last date and a business day convention
      and business centers for adjusting the first and last dates if they would otherwise
      fall on a non business day in the specified business centers. The days between
      the first and last date must also be good business days in the specified centers
      to be counted in the range.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:BusinessDateRange
    close_mappings:
    - fpml_5_10:BusinessDateRange
    is_a: DateRange
    slots:
    - startDate
    - endDate
    - businessDayConvention
    - businessCenters
    class_uri: common_domain_model:BusinessDateRange
  BusinessDayAdjustments:
    name: BusinessDayAdjustments
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessDayAdjustments
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining the business day convention and financial business
      centers used for adjusting any relevant date if it would otherwise fall on a
      day that is not a business day in the specified business center.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:BusinessDayAdjustments
    close_mappings:
    - fpml_5_10:BusinessDayAdjustments
    slots:
    - BusinessDayAdjustments_businessDayConvention
    - businessCenters
    slot_usage:
      businessDayConvention:
        name: businessDayConvention
        description: The convention for adjusting a date if it would otherwise fall
          on a day that is not a business day.
    class_uri: common_domain_model:BusinessDayAdjustments
  DateRange:
    name: DateRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/DateRange
    description: A class defining a contiguous series of calendar dates. The date
      range is defined as all the dates between and including the start and the end
      date. The start date must fall on or before the end date.
    comments:
    - "Rosetta condition: DatesOrdered \u2014 startDate <= endDate"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:DateRange
    slots:
    - startDate
    - endDate
    class_uri: common_domain_model:DateRange
    rules:
    - preconditions: {}
      description: The start date must fall on or before the end date (a date range
        of only one date is allowed).
      comments:
      - 'Rosetta comparison: startDate <= endDate'
  DateList:
    name: DateList
    definition_uri: https://w3id.org/lmodel/common_domain_model/DateList
    description: List of dates.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:DateList
    slots:
    - date
    class_uri: common_domain_model:DateList
  DateTimeList:
    name: DateTimeList
    definition_uri: https://w3id.org/lmodel/common_domain_model/DateTimeList
    description: List of dateTimes.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:DateTimeList
    slots:
    - dateTime
    class_uri: common_domain_model:DateTimeList
  Frequency:
    name: Frequency
    definition_uri: https://w3id.org/lmodel/common_domain_model/Frequency
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class for defining a date frequency, e.g. one day, three months,
      through the combination of an integer value and a standardized period value
      that is specified as part of an enumeration.
    comments:
    - "Rosetta condition: TermPeriod \u2014 if period = PeriodExtendedEnum -> T then\
      \ periodMultiplier = 1"
    - "Rosetta condition: PositivePeriodMultiplier \u2014 periodMultiplier > 0"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:Frequency
    slots:
    - periodMultiplier
    - period
    class_uri: common_domain_model:Frequency
    rules:
    - preconditions:
        slot_conditions:
          period:
            name: period
            equals_string: PeriodExtendedEnum.T
      postconditions:
        slot_conditions:
          periodMultiplier:
            name: periodMultiplier
            equals_string: '1'
      description: FpML specifies that if period value is T (Term) then periodMultiplier
        must contain the value 1.
    - preconditions: {}
      postconditions:
        slot_conditions:
          periodMultiplier:
            name: periodMultiplier
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: FpML specifies periodMultiplier as a positive integer.
  Offset:
    name: Offset
    definition_uri: https://w3id.org/lmodel/common_domain_model/Offset
    description: A class defining an offset used in calculating a new date relative
      to a reference date, e.g. calendar days, business days, commodity Business days,
      etc.
    comments:
    - "Rosetta condition: DayType \u2014 if period <> PeriodEnum -> D or periodMultiplier\
      \ = 0 then dayType is absent"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:Offset
    is_a: Period
    slots:
    - Period_periodMultiplier
    - Period_period
    - dayType
    class_uri: common_domain_model:Offset
  CustomisableOffset:
    name: CustomisableOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/CustomisableOffset
    description: A class to specify an offset either as a normalized [multiplier,
      period, dayType] or as a custom provision of type string.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:CustomisableOffset
    slots:
    - offset
    - customProvision
    class_uri: common_domain_model:CustomisableOffset
  Period:
    name: Period
    definition_uri: https://w3id.org/lmodel/common_domain_model/Period
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to define recurring periods or time offsets.
    comments:
    - "Rosetta condition: DayPeriod \u2014 if periodMultiplier = 0 then period = PeriodEnum\
      \ -> D"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:Period
    close_mappings:
    - gist:TimeInterval
    slots:
    - Period_periodMultiplier
    - Period_period
    slot_usage:
      periodMultiplier:
        name: periodMultiplier
        description: A time period multiplier, e.g. 1, 2 or 3 etc. A negative value
          can be used when specifying an offset relative to another date, e.g. -2
          days.
      period:
        name: period
        description: A time period, e.g. a day, week, month or year of the stream.
          If the periodMultiplier value is 0 (zero) then period must contain the value
          D (day).
        range: PeriodEnum
    class_uri: common_domain_model:Period
  RelativeDates:
    name: RelativeDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/RelativeDates
    description: A class describing a set of dates defined as relative to another
      set of dates.
    comments:
    - "Rosetta condition: PeriodSkipGreaterThanOne \u2014 if periodSkip exists then\
      \ periodSkip > 1"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:RelativeDates
    is_a: RelativeDateOffset
    slots:
    - Period_periodMultiplier
    - Period_period
    - dayType
    - businessDayConvention
    - businessCenters
    - RelativeDateOffset_businessCentersReference
    - dateRelativeTo
    - adjustedDate
    - periodSkip
    - scheduleBounds
    class_uri: common_domain_model:RelativeDates
    rules:
    - preconditions:
        slot_conditions:
          periodSkip:
            name: periodSkip
            required: true
      postconditions:
        slot_conditions:
          periodSkip:
            name: periodSkip
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 1
      description: FpML specifies that, if present, the period skip should have a
        value greater than 1.
  RelativeDateOffset:
    name: RelativeDateOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/RelativeDateOffset
    description: A class defining a date (referred to as the derived date) as a relative
      offset from another date (referred to as the anchor date). If the anchor date
      is itself an adjustable date then the offset is assumed to be calculated from
      the adjusted anchor date. A number of different scenarios can be supported,
      namely; 1) the derived date may simply be a number of calendar periods (days,
      weeks, months or years) preceding or following the anchor date; 2) the unadjusted
      derived date may be a number of calendar periods (days, weeks, months or years)
      preceding or following the anchor date with the resulting unadjusted derived
      date subject to adjustment in accordance with a specified business day convention,
      i.e. the derived date must fall on a good business day; 3) the derived date
      may be a number of business days preceding or following the anchor date. Note
      that the businessDayConvention specifies any required adjustment to the unadjusted
      derived date. A negative or positive value in the periodMultiplier indicates
      whether the unadjusted derived precedes or follows the anchor date. The businessDayConvention
      should contain a value NONE if the day type element contains a value of Business
      (since specifying a negative or positive business days offset would already
      guarantee that the derived date would fall on a good business day in the specified
      business centers).
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:RelativeDateOffset
    is_a: Offset
    slots:
    - Period_periodMultiplier
    - Period_period
    - dayType
    - businessDayConvention
    - businessCenters
    - RelativeDateOffset_businessCentersReference
    - dateRelativeTo
    - adjustedDate
    slot_usage:
      businessCentersReference:
        name: businessCentersReference
        description: A pointer style reference to a set of financial business centers
          defined elsewhere in the document. This set of business centers is used
          to determine whether a particular day is a business day or not.
    class_uri: common_domain_model:RelativeDateOffset
  TimeZone:
    name: TimeZone
    definition_uri: https://w3id.org/lmodel/common_domain_model/TimeZone
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"TimeZoneFromBusinessCenterTime","description":"Function
          to resolve a time passed as BusinessCenterTime into a TimeZone time.","inputs":[{"name":"time","type":"BusinessCenterTime","cardinality":"1..1"}],"output":{"name":"result","type":"TimeZone","cardinality":"1..1"},"code_implementation":true}]'
    description: The time alongside with the timezone location information. This class
      makes use of the FpML TimezoneLocation construct.
    comments:
    - "Rosetta func: TimeZoneFromBusinessCenterTime \u2014 Function to resolve a time\
      \ passed as BusinessCenterTime into a TimeZone time."
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:TimeZone
    slots:
    - time
    - location
    class_uri: common_domain_model:TimeZone
  DirectOrRelativeTime:
    name: DirectOrRelativeTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/DirectOrRelativeTime
    description: Represents a time definition that can be either an absolute (direct)
      time or a time calculated relative to another referenced time. Either one directTime
      or one relativeTime should be provided
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:DirectOrRelativeTime
    slots:
    - directTime
    - relativeTime
    class_uri: common_domain_model:DirectOrRelativeTime
  RelativeTime:
    name: RelativeTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/RelativeTime
    description: Defines a time value calculated relative to a reference time. The
      final value is derived by applying any offset and rounding rules inherited from
      RelativeTimeOffset to the reference time.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:RelativeTime
    is_a: RelativeTimeOffset
    slots:
    - offsetTimeUnit
    - offsetMultiplier
    - rounding
    - timeRelativeTo
    class_uri: common_domain_model:RelativeTime
  RelativeTimeOffset:
    name: RelativeTimeOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/RelativeTimeOffset
    description: Describes how a time is offset from a reference point, including
      the unit, magnitude, and rounding behavior.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:RelativeTimeOffset
    slots:
    - offsetTimeUnit
    - offsetMultiplier
    - rounding
    class_uri: common_domain_model:RelativeTimeOffset
  TimeRounding:
    name: TimeRounding
    definition_uri: https://w3id.org/lmodel/common_domain_model/TimeRounding
    description: Specifies how a calculated time should be rounded, including both
      the direction of rounding and the unit to which the time is rounded. Rounding
      is applied after all offsets have been calculated.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:TimeRounding
    slots:
    - roundingDirection
    - roundToUnit
    class_uri: common_domain_model:TimeRounding
  PeriodRange:
    name: PeriodRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/PeriodRange
    description: Indicates The period range defined as either a lower and upper period
      bound, or both.
    comments:
    - "Rosetta condition: AtLeastOneOf \u2014 lowerBound exists or upperBound exists"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:PeriodRange
    slots:
    - lowerBound
    - upperBound
    class_uri: common_domain_model:PeriodRange
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            lowerBound:
              name: lowerBound
              required: true
        - slot_conditions:
            upperBound:
              name: upperBound
              required: true
      description: AtLeastOneOf
  PeriodBound:
    name: PeriodBound
    definition_uri: https://w3id.org/lmodel/common_domain_model/PeriodBound
    description: Indicator to specify if the period bound is defined as a period and
      whether the bound is inclusive.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:PeriodBound
    slots:
    - PeriodBound_period
    - inclusive
    slot_usage:
      period:
        name: period
        description: Specifies the period is to be used as the bound, e.g. 5Y.
        range: Period
    class_uri: common_domain_model:PeriodBound
  AveragingSchedule:
    name: AveragingSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingSchedule
    description: Class to representing a method for generating a series of dates.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AveragingSchedule
    close_mappings:
    - fpml_5_10:AveragingSchedule
    slots:
    - AveragingSchedule_startDate
    - AveragingSchedule_endDate
    - averagingPeriodFrequency
    slot_usage:
      startDate:
        name: startDate
        description: Date on which this period begins.
      endDate:
        name: endDate
        description: Date on which this period ends.
    class_uri: common_domain_model:AveragingSchedule
  AdjustableRelativeOrPeriodicDates:
    name: AdjustableRelativeOrPeriodicDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustableRelativeOrPeriodicDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ResolveAdjustableDates","inputs":[{"name":"adjustableRelativeOrPeriodicDates","type":"AdjustableRelativeOrPeriodicDates","cardinality":"1..1"}],"output":{"name":"adjustedDates","type":"date","cardinality":"0..*"},"code_implementation":true}]'
    description: A class giving the choice between defining a series of dates as an
      explicit list of dates together with applicable adjustments or as relative to
      some other series of (anchor) dates, or as a calculation period schedule.
    comments:
    - "Rosetta condition: AdjustableRelativeOrPeriodicDatesChoice \u2014 required\
      \ choice adjustableDates, relativeDates, periodicDates"
    - 'Rosetta func: ResolveAdjustableDates'
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:AdjustableRelativeOrPeriodicDates
    close_mappings:
    - fpml_5_10:AdjustableRelativeOrPeriodicDates
    slots:
    - adjustableDates
    - relativeDates
    - periodicDates
    class_uri: common_domain_model:AdjustableRelativeOrPeriodicDates
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            adjustableDates:
              name: adjustableDates
              required: true
        - slot_conditions:
            relativeDates:
              name: relativeDates
              required: true
        - slot_conditions:
            periodicDates:
              name: periodicDates
              required: true
      description: Choice rule to represent an FpML choice construct.
  PeriodicDates:
    name: PeriodicDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/PeriodicDates
    description: A class for specifying a calculation period schedule.
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:PeriodicDates
    slots:
    - PeriodicDates_startDate
    - PeriodicDates_endDate
    - periodFrequency
    - periodDatesAdjustments
    - PeriodicDates_dayType
    slot_usage:
      startDate:
        name: startDate
        description: The start date of the calculation period. FpML specifies that
          for interest rate swaps this date must only be specified if it is not equal
          to the effective date. It is always specified in the case of equity swaps
          and credit default swaps with periodic payments. This date may be subject
          to adjustment in accordance with a business day convention.
        range: AdjustableOrRelativeDate
        required: false
      endDate:
        name: endDate
        description: The end date of the calculation period. FpML specifies that for
          interest rate swaps this date must only be specified if it is not equal
          to the termination date. It is always specified in the case of equity swaps
          with periodic payments. This date may be subject to adjustment in accordance
          with a business day convention.
        range: AdjustableOrRelativeDate
        required: false
      dayType:
        name: dayType
        description: Denotes the enumerated values to specify the day type classification
          used in counting the number of days between two dates.
    class_uri: common_domain_model:PeriodicDates
  CalculationPeriodFrequency:
    name: CalculationPeriodFrequency
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationPeriodFrequency
    description: A class to specify the frequency at which calculation period end
      dates occur within the regular part of the calculation period schedule and their
      roll date convention.
    comments:
    - "Rosetta condition: FpML_ird_57 \u2014 if period = PeriodExtendedEnum -> M or\
      \ period = PeriodExtendedEnum -> Y then rollConvention <> RollConventionEnum\
      \ -> NONE and rollConvention <> RollConventionEnum -> SFE and rollConvention\
      \ <> RollConventionEnum -> MON and rollConvention <> RollConventionEnum -> TUE\
      \ and rollConvention <> RollConventionEnum -> WED and rollConvention <> RollConventionEnum\
      \ -> THU and rollConvention <> RollConventionEnum -> FRI and rollConvention\
      \ <> RollConventionEnum -> SAT and rollConvention <> RollConventionEnum -> SUN"
    - "Rosetta condition: FpML_ird_58 \u2014 if period = PeriodExtendedEnum -> W then\
      \ rollConvention = RollConventionEnum -> NONE or rollConvention = RollConventionEnum\
      \ -> SFE or rollConvention = RollConventionEnum -> MON or rollConvention = RollConventionEnum\
      \ -> TUE or rollConvention = RollConventionEnum -> WED or rollConvention = RollConventionEnum\
      \ -> THU or rollConvention = RollConventionEnum -> FRI or rollConvention = RollConventionEnum\
      \ -> SAT or rollConvention = RollConventionEnum -> SUN"
    - "Rosetta condition: FpML_ird_60 \u2014 if period = PeriodExtendedEnum -> T then\
      \ rollConvention = RollConventionEnum -> NONE"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:CalculationPeriodFrequency
    close_mappings:
    - fpml_5_10:CalculationPeriodFrequency
    is_a: Frequency
    slots:
    - periodMultiplier
    - period
    - rollConvention
    - balanceOfFirstPeriod
    class_uri: common_domain_model:CalculationPeriodFrequency
  CalculationFrequency:
    name: CalculationFrequency
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationFrequency
    description: Represents the parameters for describing how often something (such
      as collateral interest) is to be calculated.
    comments:
    - "Rosetta condition: Moy \u2014 if monthOfYear exists then monthOfYear <= 12"
    - "Rosetta condition: Dom \u2014 if dayOfMonth exists then dayOfMonth <= 31"
    - "Rosetta condition: Wom \u2014 if weekOfMonth exists then weekOfMonth <= 5"
    - "Rosetta condition: MoyTerm \u2014 if monthOfYear exists then (period -> period\
      \ = PeriodEnum -> Y)"
    - "Rosetta condition: DomTerm \u2014 if dayOfMonth exists then (period -> period\
      \ = PeriodEnum -> M)"
    - "Rosetta condition: DowTerm \u2014 if dayOfWeek exists then (period -> period\
      \ = PeriodEnum -> W)"
    - "Rosetta condition: WomTerm \u2014 if weekOfMonth exists then (period -> period\
      \ = PeriodEnum -> M)"
    in_subset:
    - cdm_base_datetime
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    exact_mappings:
    - common_domain_model:CalculationFrequency
    close_mappings:
    - fpml_5_10:CalculationFrequency
    slots:
    - CalculationFrequency_period
    - monthOfYear
    - dayOfMonth
    - dayOfWeek
    - weekOfMonth
    - offsetDays
    - dateLocation
    - CalculationFrequency_businessCenter
    slot_usage:
      period:
        name: period
        description: Specifies the time period at which calculation is performed,
          e.g. 1 month.
        range: Period
      businessCenter:
        name: businessCenter
        description: Specifies the business center for adjustment of calculation period.
    class_uri: common_domain_model:CalculationFrequency
    rules:
    - preconditions:
        slot_conditions:
          monthOfYear:
            name: monthOfYear
            required: true
      postconditions:
        slot_conditions:
          monthOfYear:
            name: monthOfYear
            maximum_value: 12
      description: Moy
    - preconditions:
        slot_conditions:
          dayOfMonth:
            name: dayOfMonth
            required: true
      postconditions:
        slot_conditions:
          dayOfMonth:
            name: dayOfMonth
            maximum_value: 31
      description: Dom
    - preconditions:
        slot_conditions:
          weekOfMonth:
            name: weekOfMonth
            required: true
      postconditions:
        slot_conditions:
          weekOfMonth:
            name: weekOfMonth
            maximum_value: 5
      description: Wom
  UnitType:
    name: UnitType
    definition_uri: https://w3id.org/lmodel/common_domain_model/UnitType
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"CompareQuantityByUnitOfAmount","inputs":[{"name":"quantity1","type":"Quantity","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"quantity2","type":"Quantity","cardinality":"0..*"},{"name":"unitOfAmount","type":"UnitType","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"UnitEquals","description":"Compares
          two UnitType to check if all attributes match.","inputs":[{"name":"u1","type":"UnitType","cardinality":"0..1"},{"name":"u2","type":"UnitType","cardinality":"0..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"FilterQuantity","description":"Filter
          list of quantities based on unit type.","inputs":[{"name":"quantities","type":"Quantity","cardinality":"0..*"},{"name":"unit","type":"UnitType","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"Quantity","cardinality":"0..*"}}]'
    description: Defines the unit to be used for price, quantity, or other purposes
    comments:
    - "Rosetta condition: UnitType \u2014 one-of"
    - 'Rosetta func: CompareQuantityByUnitOfAmount'
    - "Rosetta func: UnitEquals \u2014 Compares two UnitType to check if all attributes\
      \ match."
    - "Rosetta func: FilterQuantity \u2014 Filter list of quantities based on unit\
      \ type."
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:UnitType
    close_mappings:
    - gist:UnitOfMeasure
    slots:
    - capacityUnit
    - weatherUnit
    - financialUnit
    - currency
    class_uri: common_domain_model:UnitType
    rules:
    - preconditions: {}
      description: Requires that a unit type must be set.
      comments:
      - 'Rosetta one-of: exactly one slot must be present.'
  MeasureBase:
    name: MeasureBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/MeasureBase
    description: Provides an abstract type to define a measure as a number associated
      to a unit. This type is abstract because all its attributes are optional. The
      types that extend it can specify further existence constraints.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:MeasureBase
    slots:
    - value
    - unit
    class_uri: common_domain_model:MeasureBase
  Measure:
    name: Measure
    definition_uri: https://w3id.org/lmodel/common_domain_model/Measure
    description: Defines a concrete measure as a number associated to a unit. It extends
      MeasureBase by requiring the value attribute to be present. A measure may be
      unit-less so the unit attribute is still optional.
    comments:
    - "Rosetta condition: ValueExists \u2014 value exists"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:Measure
    close_mappings:
    - gist:Magnitude
    is_a: MeasureBase
    slots:
    - value
    - unit
    class_uri: common_domain_model:Measure
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          value:
            name: value
            required: true
      description: The value attribute must be present in a concrete measure.
  MeasureSchedule:
    name: MeasureSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/MeasureSchedule
    description: A set of measures, all in the same unit, where the values are defined
      through a schedule of steps. The initial value may be defined either as part
      of the steps, or using the single amount attribute.
    comments:
    - "Rosetta condition: ValueExists \u2014 value exists or datedValue exists"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:MeasureSchedule
    is_a: MeasureBase
    slots:
    - value
    - unit
    - datedValue
    class_uri: common_domain_model:MeasureSchedule
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            value:
              name: value
              required: true
        - slot_conditions:
            datedValue:
              name: datedValue
              required: true
      description: A schedule may be specified as a single value or as a set of date-value
        pairs. Both attributes may be specified, in which case the single amount number
        is the initial value.
  QuantitySchedule:
    name: QuantitySchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/QuantitySchedule
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FilterQuantityByCurrency","description":"Filter list of
          quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"},{"name":"currency","type":"string","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}},{"name":"FilterQuantityByCurrencyExists","description":"Filter
          list of quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}},{"name":"FilterQuantityByFinancialUnit","description":"Filter
          list of quantities based on unit type.","inputs":[{"name":"quantities","type":"QuantitySchedule","cardinality":"0..*"},{"name":"financialUnit","type":"FinancialUnitEnum","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"QuantitySchedule","cardinality":"0..*"}}]'
    description: Specifies a quantity schedule to be associated to a financial product
      to represent a trade amount. This data type extends MeasureSchedule with several
      unit or multiplier attributes that are used to define financial quantities.
      This data type is generically based on a schedule and can also be used to represent
      a quantity as a single value.
    comments:
    - "Rosetta condition: Quantity_multiplier \u2014 if multiplier exists then multiplier\
      \ -> value >= 0.0"
    - "Rosetta condition: UnitOfAmountExists \u2014 unit exists"
    - "Rosetta func: FilterQuantityByCurrency \u2014 Filter list of quantities based\
      \ on unit type."
    - "Rosetta func: FilterQuantityByCurrencyExists \u2014 Filter list of quantities\
      \ based on unit type."
    - "Rosetta func: FilterQuantityByFinancialUnit \u2014 Filter list of quantities\
      \ based on unit type."
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:QuantitySchedule
    is_a: MeasureSchedule
    slots:
    - value
    - unit
    - datedValue
    - multiplier
    - frequency
    class_uri: common_domain_model:QuantitySchedule
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          unit:
            name: unit
            required: true
      description: Requires that a unit of amount must be specified for any quantity.
  Quantity:
    name: Quantity
    definition_uri: https://w3id.org/lmodel/common_domain_model/Quantity
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"CompareQuantityByUnitOfAmount","inputs":[{"name":"quantity1","type":"Quantity","cardinality":"0..*"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"quantity2","type":"Quantity","cardinality":"0..*"},{"name":"unitOfAmount","type":"UnitType","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"FilterQuantity","description":"Filter
          list of quantities based on unit type.","inputs":[{"name":"quantities","type":"Quantity","cardinality":"0..*"},{"name":"unit","type":"UnitType","cardinality":"1..1"}],"output":{"name":"filteredQuantities","type":"Quantity","cardinality":"0..*"}}]'
    description: Specifies a quantity as a single value to be associated to a financial
      product, for example a transfer amount resulting from a trade. This data type
      extends QuantitySchedule and requires that only the single amount value exists.
    comments:
    - "Rosetta condition: AmountOnlyExists \u2014 value exists and datedValue is absent"
    - 'Rosetta func: CompareQuantityByUnitOfAmount'
    - "Rosetta func: FilterQuantity \u2014 Filter list of quantities based on unit\
      \ type."
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:Quantity
    close_mappings:
    - gist:Magnitude
    is_a: QuantitySchedule
    slots:
    - value
    - unit
    - datedValue
    - multiplier
    - frequency
    class_uri: common_domain_model:Quantity
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          value:
            name: value
            required: true
          datedValue:
            name: datedValue
            required: false
      description: The amount must exist when the quantity represents a single value,
        and the steps must be absent.
  NonNegativeQuantity:
    name: NonNegativeQuantity
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonNegativeQuantity
    description: Specifies a quantity as a non-negative number, which condition is
      enforced through a data rule that only applies to the extending class.
    comments:
    - "Rosetta condition: NonNegativeQuantity_amount \u2014 value >= 0.0"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:NonNegativeQuantity
    is_a: Quantity
    slots:
    - value
    - unit
    - datedValue
    - multiplier
    - frequency
    class_uri: common_domain_model:NonNegativeQuantity
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          value:
            name: value
            minimum_value: 0.0
      description: For a non-negative quantity, the amount attribute must be positive.
  NonNegativeStep:
    name: NonNegativeStep
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonNegativeStep
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining a step date and non-negative step value pair. This
      step definitions are used to define varying rate or amount schedules, e.g. a
      notional amortisation or a step-up coupon schedule.
    comments:
    - "Rosetta condition: StepValue \u2014 stepValue >= 0.0"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:NonNegativeStep
    slots:
    - stepDate
    - stepValue
    class_uri: common_domain_model:NonNegativeStep
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          stepValue:
            name: stepValue
            minimum_value: 0.0
      description: FpML specified stepValue as a NonNegativeDecimal.
  NonNegativeQuantitySchedule:
    name: NonNegativeQuantitySchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonNegativeQuantitySchedule
    comments:
    - "Rosetta condition: NonNegativeQuantity_value \u2014 if value exists then value\
      \ >= 0.0"
    - "Rosetta condition: NonNegativeQuantity_datedValue \u2014 if datedValue exists\
      \ then datedValue -> value all >= 0.0"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:NonNegativeQuantitySchedule
    is_a: QuantitySchedule
    slots:
    - value
    - unit
    - datedValue
    - multiplier
    - frequency
    class_uri: common_domain_model:NonNegativeQuantitySchedule
    rules:
    - preconditions:
        slot_conditions:
          value:
            name: value
            required: true
      postconditions:
        slot_conditions:
          value:
            name: value
            minimum_value: 0.0
      description: For a non-negative quantity, all amount attribute must be positive.
  Rounding:
    name: Rounding
    definition_uri: https://w3id.org/lmodel/common_domain_model/Rounding
    description: Defines rounding rules and precision to be used in the rounding of
      a number.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:Rounding
    slots:
    - Rounding_roundingDirection
    - precision
    slot_usage:
      roundingDirection:
        name: roundingDirection
        description: Specifies the rounding rounding rule as up, down, or nearest.
    class_uri: common_domain_model:Rounding
  Schedule:
    name: Schedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/Schedule
    description: A class defining a schedule of rates or amounts in terms of an initial
      value and then a series of step date and value pairs. On each step date the
      rate or amount changes to the new step value. The series of step date and value
      pairs are optional. If not specified, this implies that the initial value remains
      unchanged over time.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:Schedule
    related_mappings:
    - gist:ScheduledEvent
    slots:
    - Schedule_value
    - Schedule_datedValue
    slot_usage:
      value:
        name: value
        description: The initial rate or amount, as the case may be. An initial rate
          of 5% would be represented as 0.05.
        required: true
      datedValue:
        name: datedValue
        description: The schedule of step date and value pairs. On each step date
          the associated step value becomes effective. A list of steps may be ordered
          in the document by ascending step date. An FpML document containing an unordered
          list of steps is still regarded as a conformant document.
    class_uri: common_domain_model:Schedule
  DatedValue:
    name: DatedValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/DatedValue
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"UpdateDatedValues","description":"Updates the amounts of
          the dated values based on the given QuantityChangeDirectionEnum. For all
          periods after the effective date of the change, if the direction is Increase,
          the old amount and change amount are summed, if the direction is Decrease,
          then the change amount is subtracted from the old amount, and if the direction
          is Replace then the change amount replaces the old amount.","inputs":[{"name":"datedValues","type":"DatedValue","cardinality":"0..*"},{"name":"changeAmount","type":"number","cardinality":"0..1"},{"name":"direction","type":"QuantityChangeDirectionEnum","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"0..1"}],"output":{"name":"newdatedValues","type":"DatedValue","cardinality":"0..*"}}]'
    description: Defines a date and value pair. This definition is used for varying
      rate or amount schedules, e.g. a notional amortisation or a step-up coupon schedule.
    comments:
    - "Rosetta func: UpdateDatedValues \u2014 Updates the amounts of the dated values\
      \ based on the given QuantityChangeDirectionEnum. For all periods after the\
      \ effective date of the change, if the direction is Increase, the old amount\
      \ and change amount are summed, if the direction is Decrease, then the change\
      \ amount is subtracted from the old amount, and if the direction is Replace\
      \ then the change amount replaces the old amount."
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:DatedValue
    slots:
    - DatedValue_date
    - DatedValue_value
    slot_usage:
      date:
        name: date
        description: The date on which the associated step value becomes effective.
          This day may be subject to adjustment in accordance with a business day
          convention.
        multivalued: false
      value:
        name: value
        description: The rate of amount which becomes effective on the associated
          step date. A rate of 5% would be represented as 0.05.
        required: true
    class_uri: common_domain_model:DatedValue
  NumberRange:
    name: NumberRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/NumberRange
    description: The number range defined as either a lower and upper number bound,
      or both.
    comments:
    - "Rosetta condition: AtLeastOneOf \u2014 lowerBound exists or upperBound exists"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:NumberRange
    slots:
    - NumberRange_lowerBound
    - NumberRange_upperBound
    slot_usage:
      lowerBound:
        name: lowerBound
        description: The lower bound of a number range, e.g. greater than or equal
          to 5.
        range: NumberBound
      upperBound:
        name: upperBound
        description: The upper bound of a number range, e.g. less than 10.
        range: NumberBound
    class_uri: common_domain_model:NumberRange
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            lowerBound:
              name: lowerBound
              required: true
        - slot_conditions:
            upperBound:
              name: upperBound
              required: true
      description: AtLeastOneOf
  NumberBound:
    name: NumberBound
    definition_uri: https://w3id.org/lmodel/common_domain_model/NumberBound
    description: The number bound is defined as a number and whether the bound is
      inclusive.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:NumberBound
    slots:
    - number
    - NumberBound_inclusive
    slot_usage:
      inclusive:
        name: inclusive
        description: Whether the number bound is inclusive, e.g. for a lower bound,
          false would indicate greater than, whereas true would indicate greater than
          or equal to.
    class_uri: common_domain_model:NumberBound
  MoneyRange:
    name: MoneyRange
    definition_uri: https://w3id.org/lmodel/common_domain_model/MoneyRange
    description: The money range defined as either a lower and upper money bound,
      or both.
    comments:
    - "Rosetta condition: AtLeastOneOf \u2014 lowerBound exists or upperBound exists"
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:MoneyRange
    slots:
    - MoneyRange_lowerBound
    - MoneyRange_upperBound
    slot_usage:
      lowerBound:
        name: lowerBound
        description: The lower bound of a money range, e.g. greater than or equal
          to 1,000 USD.
        range: MoneyBound
      upperBound:
        name: upperBound
        description: The upper bound of a money range, e.g. less than 10,000 USD.
        range: MoneyBound
    class_uri: common_domain_model:MoneyRange
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            lowerBound:
              name: lowerBound
              required: true
        - slot_conditions:
            upperBound:
              name: upperBound
              required: true
      description: AtLeastOneOf
  MoneyBound:
    name: MoneyBound
    definition_uri: https://w3id.org/lmodel/common_domain_model/MoneyBound
    description: The money bound is defined as a money amount and whether the bound
      is inclusive.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:MoneyBound
    slots:
    - money
    - MoneyBound_inclusive
    slot_usage:
      inclusive:
        name: inclusive
        description: Whether the money amount bound is inclusive, e.g. for a lower
          bound, false would indicate greater than, whereas true would indicate greater
          than or equal to.
    class_uri: common_domain_model:MoneyBound
  AveragingCalculationMethod:
    name: AveragingCalculationMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingCalculationMethod
    description: Defines the ways in which multiple values can be aggregated into
      a single value.
    in_subset:
    - cdm_base_math
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    exact_mappings:
    - common_domain_model:AveragingCalculationMethod
    close_mappings:
    - fpml_5_10:AveragingCalculationMethod
    slots:
    - isWeighted
    - calculationMethod
    class_uri: common_domain_model:AveragingCalculationMethod
  AssetBase:
    name: AssetBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetBase
    description: The base data type to specify common attributes for all Assets.
    comments:
    - "Rosetta condition: ExchangeListed \u2014 if exchange exists then isExchangeListed"
    - "Rosetta condition: RelatedExchange \u2014 if exchange is absent then relatedExchange\
      \ is absent"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:AssetBase
    close_mappings:
    - fpml_5_10:AssetBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    class_uri: common_domain_model:AssetBase
    rules:
    - preconditions:
        slot_conditions:
          exchange:
            name: exchange
            required: true
      postconditions:
        slot_conditions:
          isExchangeListed:
            name: isExchangeListed
            equals_string: 'True'
      description: If Exchange is specified, it must be an exchange-listed Instrument.
    - preconditions:
        slot_conditions:
          exchange:
            name: exchange
            required: false
      postconditions:
        slot_conditions:
          relatedExchange:
            name: relatedExchange
            required: false
      description: Related Exchange should only be specified if an Exchange is also
        specified.
  AssetIdentifier:
    name: AssetIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetIdentifier
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"AssetIdentifierByType","description":"Returns all the Asset
          Identifiers of a certain Identifier Type.","inputs":[{"name":"identifiers","type":"AssetIdentifier","cardinality":"0..*"},{"name":"idType","type":"AssetIdTypeEnum","cardinality":"1..1"}],"output":{"name":"filteredIdentifier","type":"AssetIdentifier","cardinality":"0..*"}}]'
    description: The unique identifier for an Asset, specified using an Asset Identifier
      Type enumerator.
    comments:
    - "Rosetta func: AssetIdentifierByType \u2014 Returns all the Asset Identifiers\
      \ of a certain Identifier Type."
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:AssetIdentifier
    close_mappings:
    - fpml_5_10:AssetIdentifier
    slots:
    - AssetIdentifier_identifier
    - identifierType
    slot_usage:
      identifier:
        name: identifier
        description: The identifier value.
        range: string
        multivalued: false
    class_uri: common_domain_model:AssetIdentifier
  InstrumentBase:
    name: InstrumentBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/InstrumentBase
    description: Defines the common attributes for all Instrument data types.
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:InstrumentBase
    is_a: AssetBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    class_uri: common_domain_model:InstrumentBase
  ProductIdentifier:
    name: ProductIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/ProductIdentifier
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Comprises an identifier and a source. The associated metadata key
      denotes the ability to associate a hash value to the ProductIdentifier instantiations
      for the purpose of model cross-referencing, in support of functionality such
      as the event effect and the lineage.
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:ProductIdentifier
    slots:
    - ProductIdentifier_identifier
    - source
    slot_usage:
      identifier:
        name: identifier
        description: Provides an identifier associated with a specific product.  The
          identifier is unique within the public source specified in the source attribute.
        range: string
        multivalued: false
    class_uri: common_domain_model:ProductIdentifier
  TaxonomyValue:
    name: TaxonomyValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/TaxonomyValue
    description: Defines a taxonomy value as either a simple string or a more granular
      expression with class names and values for each class.
    comments:
    - "Rosetta condition: ValueExists \u2014 name exists or classification exists"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:TaxonomyValue
    slots:
    - name
    - classification
    class_uri: common_domain_model:TaxonomyValue
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            classification:
              name: classification
              required: true
      description: ValueExists
  Taxonomy:
    name: Taxonomy
    definition_uri: https://w3id.org/lmodel/common_domain_model/Taxonomy
    description: Defines the taxonomy of an object by combining a taxonomy source
      (i.e. the rules to classify the object) and a value (i.e. the output of those
      rules on the object).
    comments:
    - "Rosetta condition: OrdinalExists \u2014 if value -> classification count >\
      \ 1 then value -> classification -> ordinal count = value -> classification\
      \ count"
    - "Rosetta condition: DifferentOrdinals \u2014 if value -> classification -> ordinal\
      \ exists then value -> classification -> ordinal count = value -> classification\
      \ -> ordinal distinct count"
    - "Rosetta condition: SequentialOrdinals \u2014 if value -> classification count\
      \ > 1 then value -> classification -> ordinal count = value -> classification\
      \ -> ordinal max"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:Taxonomy
    slots:
    - Taxonomy_source
    - Taxonomy_value
    slot_usage:
      source:
        name: source
        description: The source of the taxonomy that defines the rules for classifying
          the object. The taxonomy source is taken from a enumerated list of taxonomy
          names. Optional as the taxonomy source may not be provided.
        range: TaxonomySourceEnum
        required: false
      value:
        name: value
        description: The value according to that taxonomy. Optional as it may not
          be possible to classify the object in that taxonomy.
        range: TaxonomyValue
    class_uri: common_domain_model:Taxonomy
  ProductTaxonomy:
    name: ProductTaxonomy
    definition_uri: https://w3id.org/lmodel/common_domain_model/ProductTaxonomy
    description: Specifies the product taxonomy, which is composed of a taxonomy value
      and a taxonomy source.
    comments:
    - "Rosetta condition: TaxonomyType \u2014 required choice source, primaryAssetClass,\
      \ secondaryAssetClass"
    - "Rosetta condition: TaxonomySource \u2014 if source exists then (value exists\
      \ or productQualifier exists)"
    - "Rosetta condition: TaxonomyValue \u2014 optional choice value, productQualifier"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:ProductTaxonomy
    is_a: Taxonomy
    slots:
    - Taxonomy_source
    - Taxonomy_value
    - primaryAssetClass
    - secondaryAssetClass
    - productQualifier
    class_uri: common_domain_model:ProductTaxonomy
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            source:
              name: source
              required: true
        - slot_conditions:
            primaryAssetClass:
              name: primaryAssetClass
              required: true
        - slot_conditions:
            secondaryAssetClass:
              name: secondaryAssetClass
              required: true
      description: Requires a taxonomy type to be chosen, either from a taxonomy source
        or using asset classes.
    - preconditions:
        slot_conditions:
          source:
            name: source
            required: true
      postconditions:
        any_of:
        - slot_conditions:
            value:
              name: value
              required: true
        - slot_conditions:
            productQualifier:
              name: productQualifier
              required: true
      description: A taxonomy source can only be associated with a taxonomy value
        or productQualifier
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            value:
              name: value
              required: true
        - slot_conditions:
            productQualifier:
              name: productQualifier
              required: true
      description: A taxonomy value and product qualifier are mutually exclusive.
        Choice is optional as it only applies when source exists.
  Cash:
    name: Cash
    definition_uri: https://w3id.org/lmodel/common_domain_model/Cash
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"GetCashCurrency","description":"Returns the enumerated Currency
          Code of a Cash asset.","inputs":[{"name":"cash","type":"Cash","cardinality":"1..1"}],"output":{"name":"currencyEnum","type":"CurrencyCodeEnum","cardinality":"1..1"}},{"name":"SetCashCurrency","description":"Sets
          (or updates) the string identifier of a Cash asset using an enumerated Currency
          Code.","inputs":[{"name":"cash","type":"Cash","cardinality":"0..1"},{"name":"currency","type":"CurrencyCodeEnum","cardinality":"1..1"}],"output":{"name":"cashOutput","type":"Cash","cardinality":"1..1"}}]'
    description: An Asset that consists solely of a monetary holding in a currency.
      The currency of the Cash asset is held in the string Identifier (from AssetBase)
      and the AssetIdTypeEnum must be set to define that a CurrencyCode is set.  The
      function SetCashCurrency can be used to create (or update) a Cash object and
      the function GetCashCurrency can be used to retrieve the currency of a Cash
      object.
    comments:
    - "Rosetta condition: CurrencyExists \u2014 AssetIdentifierByType(identifier,\
      \ AssetIdTypeEnum -> CurrencyCode) count = 1 and AssetIdentifierByType(identifier,\
      \ AssetIdTypeEnum -> CurrencyCode) -> identifier first to-enum CurrencyCodeEnum\
      \ exists"
    - "Rosetta condition: NoTaxonomy \u2014 taxonomy is absent"
    - "Rosetta condition: NoExchange \u2014 exchange is absent and isExchangeListed\
      \ is absent"
    - "Rosetta condition: AssetType \u2014 assetType = Cash"
    - "Rosetta func: GetCashCurrency \u2014 Returns the enumerated Currency Code of\
      \ a Cash asset."
    - "Rosetta func: SetCashCurrency \u2014 Sets (or updates) the string identifier\
      \ of a Cash asset using an enumerated Currency Code."
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:Cash
    close_mappings:
    - gist:Magnitude
    is_a: AssetBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    class_uri: common_domain_model:Cash
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          taxonomy:
            name: taxonomy
            required: false
      description: Taxonomy is not applicable for a Cash asset.
    - preconditions: {}
      postconditions:
        slot_conditions:
          exchange:
            name: exchange
            required: false
          isExchangeListed:
            name: isExchangeListed
            required: false
      description: Cash cannot be a listed Asset.
    - preconditions: {}
      postconditions:
        slot_conditions:
          assetType:
            name: assetType
            equals_string: Cash
      description: AssetType must be cash.
  Commodity:
    name: Commodity
    definition_uri: https://w3id.org/lmodel/common_domain_model/Commodity
    description: Identifies a specific commodity by referencing a product identifier
      or by a product definition.
    comments:
    - "Rosetta condition: ValueSource \u2014 if taxonomy exists then (taxonomy ->\
      \ source exists and taxonomy -> value exists)"
    - "Rosetta condition: AssetType \u2014 assetType = Commodity"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:Commodity
    close_mappings:
    - fpml_5_10:Commodity
    is_a: AssetBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    - commodityProductDefinition
    - priceQuoteType
    - deliveryDateReference
    - description
    class_uri: common_domain_model:Commodity
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          assetType:
            name: assetType
            equals_string: Commodity
      description: AssetType must be commodity.
  CommodityProductDefinition:
    name: CommodityProductDefinition
    definition_uri: https://w3id.org/lmodel/common_domain_model/CommodityProductDefinition
    description: Specifies the commodity underlier in the event that no ISDA Commodity
      Reference Price exists.
    comments:
    - "Rosetta condition: CommodityProductDefinitionChoice \u2014 optional choice\
      \ exchangeId, priceSource"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:CommodityProductDefinition
    close_mappings:
    - fpml_5_10:CommodityProductDefinition
    slots:
    - referenceFramework
    - priceSource
    - commodityInfoPublisher
    - exchangeId
    class_uri: common_domain_model:CommodityProductDefinition
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            exchangeId:
              name: exchangeId
              required: true
        - slot_conditions:
            priceSource:
              name: priceSource
              required: true
      description: Requires the definition of either delivery date parameters or non-exchange
        price source.
  DeliveryDateParameters:
    name: DeliveryDateParameters
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeliveryDateParameters
    description: Specifies a specific date or the parameters for identifying the relevant
      contract date when the commodity reference price is a futures contract.
    comments:
    - "Rosetta condition: DeliveryDateParametersChoice \u2014 optional choice deliveryNearby,\
      \ deliveryDate"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:DeliveryDateParameters
    class_uri: common_domain_model:DeliveryDateParameters
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            deliveryNearby:
              name: deliveryNearby
              required: true
        - slot_conditions:
            deliveryDate:
              name: deliveryDate
              required: true
      description: Requires definition of a delivery date or delieryNearby parameters.
  CommodityReferenceFramework:
    name: CommodityReferenceFramework
    definition_uri: https://w3id.org/lmodel/common_domain_model/CommodityReferenceFramework
    description: Specifies the type of commodity.
    comments:
    - "Rosetta condition: CommodityReferenceFrameworkChoice \u2014 optional choice\
      \ capacityUnit, weatherUnit"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    exact_mappings:
    - common_domain_model:CommodityReferenceFramework
    close_mappings:
    - fpml_5_10:CommodityReferenceFramework
    slots:
    - commodityName
    - capacityUnit
    - weatherUnit
    - CommodityReferenceFramework_currency
    slot_usage:
      currency:
        name: currency
        description: Defines the currency in which the commodity is priced.
        required: true
    class_uri: common_domain_model:CommodityReferenceFramework
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            capacityUnit:
              name: capacityUnit
              required: true
        - slot_conditions:
            weatherUnit:
              name: weatherUnit
              required: true
      description: Requires that either the capacity unit or weather unit is populated.
  DigitalAsset:
    name: DigitalAsset
    definition_uri: https://w3id.org/lmodel/common_domain_model/DigitalAsset
    description: An Asset that exists only in digital form, eg Bitcoin or Ethereum,
      that is not backed by other Assets; excludes the digital representation of other
      Assets, eg coins or Tokenised assets.
    comments:
    - "Rosetta condition: AssetType \u2014 assetType = Other"
    in_subset:
