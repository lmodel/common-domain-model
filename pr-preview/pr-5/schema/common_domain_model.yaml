  BasketReferenceInformation:
    name: BasketReferenceInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/BasketReferenceInformation
    description: CDS Basket Reference Information.
    comments:
    - "Rosetta condition: BasketReferenceInformationChoice \u2014 required choice\
      \ nthToDefault, tranche"
    - "Rosetta condition: NthToDefault \u2014 if mthToDefault exists then nthToDefault\
      \ exists"
    - "Rosetta condition: MthToDefault \u2014 if (nthToDefault exists and mthToDefault\
      \ exists) then nthToDefault < mthToDefault"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:BasketReferenceInformation
    close_mappings:
    - fpml_5_10:BasketReferenceInformation
    slots:
    - basketName
    - basketId
    - referencePool
    - nthToDefault
    - mthToDefault
    - BasketReferenceInformation_tranche
    slot_usage:
      tranche:
        name: tranche
        description: This element contains CDS tranche terms.
        range: Tranche
    class_uri: common_domain_model:BasketReferenceInformation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            nthToDefault:
              name: nthToDefault
              required: true
        - slot_conditions:
            tranche:
              name: tranche
              required: true
      description: Choice rule to represent an FpML choice construct. This choice
        rule is complemented by the data rule BasketReferenceInformation_nthToDefault
        to represent the FpML construct where there is a choice between a tranche
        element and a [required nthToDefault, optional mthToDefault] branch.
    - preconditions:
        slot_conditions:
          mthToDefault:
            name: mthToDefault
            required: true
      postconditions:
        slot_conditions:
          nthToDefault:
            name: nthToDefault
            required: true
      description: As part of the branch of the choice node, FpML requires the nthToDefault
        element to be present, while the mthToDefault one is optional.
    - preconditions:
        slot_conditions:
          nthToDefault:
            name: nthToDefault
            required: true
          mthToDefault:
            name: mthToDefault
            required: true
      description: 'FpML validation rule cd-39 - Context: BasketReferenceInformation
        (complex type). If nthToDefault exists, and if mthToDefault exists, then nthToDefault
        must be less than mthToDefault.'
      comments:
      - 'Rosetta comparison: nthToDefault < mthToDefault'
