    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:FxLinkedNotionalAmount
    slots:
    - FxLinkedNotionalAmount_resetDate
    - adjustedFxSpotFixingDate
    - observedFxSpotRate
    - FxLinkedNotionalAmount_notionalAmount
    slot_usage:
      resetDate:
        name: resetDate
        description: The reset date.
        required: false
      notionalAmount:
        name: notionalAmount
        description: The calculation period notional amount.
    class_uri: common_domain_model:FxLinkedNotionalAmount
  FxLinkedNotionalSchedule:
    name: FxLinkedNotionalSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxLinkedNotionalSchedule
    description: 'A data to:  describe a notional schedule where each notional that
      applies to a calculation period is calculated with reference to a notional amount
      or notional amount schedule in a different currency by means of a spot currency
      exchange rate which is normally observed at the beginning of each period.'
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:FxLinkedNotionalSchedule
    slots:
    - varyingNotionalCurrency
    - varyingNotionalFixingDates
    - fxSpotRateSource
    - FxLinkedNotionalSchedule_fixingTime
    - varyingNotionalInterimExchangePaymentDates
    slot_usage:
      fixingTime:
        name: fixingTime
        description: The time at which the spot currency exchange rate will be observed.
          It is specified as a time in a business day calendar location, e.g. 11:00am
          London time.
    class_uri: common_domain_model:FxLinkedNotionalSchedule
  PaymentCalculationPeriod:
    name: PaymentCalculationPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentCalculationPeriod
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data defining:  the adjusted payment date and associated calculation
      period parameters required to calculate the actual or projected payment amount.
      This data forms:  part of the cashflow representation of a swap stream.'
    comments:
    - "Rosetta condition: CalculationPeriodNumberOfDays \u2014 if calculationPeriod\
      \ -> calculationPeriodNumberOfDays exists then calculationPeriod -> calculationPeriodNumberOfDays\
      \ all >= 0"
    - "Rosetta condition: PaymentCalculationPeriodChoice \u2014 required choice calculationPeriod,\
      \ fixedPaymentAmount"
    - "Rosetta condition: FpML_ird_34 \u2014 unadjustedPaymentDate exists or adjustedPaymentDate\
      \ exists"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:PaymentCalculationPeriod
    slots:
    - unadjustedPaymentDate
    - adjustedPaymentDate
    - PaymentCalculationPeriod_calculationPeriod
    - fixedPaymentAmount
    - discountFactor
    - forecastPaymentAmount
    - presentValueAmount
    slot_usage:
      calculationPeriod:
        name: calculationPeriod
        description: The parameters used in the calculation of a fixed or floating
          rate calculation period amount. A list of calculation period elements may
          be ordered in the document by ascending start date. An FpML document which
          contains an unordered list of calculation periods is still regarded as a
          conformant document.
        range: CalculationPeriod
        multivalued: true
    class_uri: common_domain_model:PaymentCalculationPeriod
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            calculationPeriod:
              name: calculationPeriod
              required: true
        - slot_conditions:
            fixedPaymentAmount:
              name: fixedPaymentAmount
              required: true
      description: condition to represent an FpML choice construct.
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            unadjustedPaymentDate:
              name: unadjustedPaymentDate
              required: true
        - slot_conditions:
            adjustedPaymentDate:
              name: adjustedPaymentDate
              required: true
      description: FpML validation rule ird-34 - Either unadjustedPaymentDate or adjustedPaymentDate
        must exist.
  RateSchedule:
    name: RateSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/RateSchedule
    description: A class defining a schedule of rates or amounts in terms of an initial
      value and then a series of step date and value pairs. On each step date the
      rate or amount changes to the new step value. The series of step date and value
      pairs are optional. If not specified, this implies that the initial value remains
      unchanged over time.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:RateSchedule
    slots:
    - RateSchedule_price
    slot_usage:
      price:
        name: price
        description: The initial rate. An initial rate of 5% would be represented
          as 0.05.
        range: PriceSchedule
        required: true
    class_uri: common_domain_model:RateSchedule
  ObservationDates:
    name: ObservationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationDates
    description: Describes date details for a set of observation dates in parametric
      or non-parametric form.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ObservationDates
    slots:
    - observationSchedule
    - periodicSchedule
    - parametricDates
    class_uri: common_domain_model:ObservationDates
  ObservationSchedule:
    name: ObservationSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationSchedule
    description: Specifies a single date on which market observations take place and
      specifies optional associated weighting.
    comments:
    - "Rosetta condition: AdjustedDate \u2014 if observationDate -> adjustedDate is\
      \ absent then observationDate -> unadjustedDate exists and dateAdjustments exists"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ObservationSchedule
    slots:
    - ObservationSchedule_observationDate
    - dateAdjustments
    slot_usage:
      observationDate:
        name: observationDate
        description: Specifies an adjusted or unadjusted date for a market observation.
        range: ObservationDate
        required: false
        multivalued: true
    class_uri: common_domain_model:ObservationSchedule
  ObservationDate:
    name: ObservationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationDate
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Specifies a single date on which market observations take place and
      specifies optional associated weighting.
    comments:
    - "Rosetta condition: ObservationDate \u2014 required choice unadjustedDate, adjustedDate"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ObservationDate
    slots:
    - ObservationDate_unadjustedDate
    - adjustedDate
    - weight
    - observationReference
    slot_usage:
      unadjustedDate:
        name: unadjustedDate
        description: A date subject to adjustment.
    class_uri: common_domain_model:ObservationDate
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            unadjustedDate:
              name: unadjustedDate
              required: true
        - slot_conditions:
            adjustedDate:
              name: adjustedDate
              required: true
      description: Either an unadjusted date or an adjusted date needs to be specified.
  ObservationTerms:
    name: ObservationTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationTerms
    description: 'Class containing terms that are associated with observing a price/benchmark/index
      across either single or multiple observations. '
    comments:
    - "Rosetta condition: ObservationTime \u2014 if observationTimeType = TimeTypeEnum\
      \ -> SpecificTime then observationTime exists"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ObservationTerms
    slots:
    - ObservationTerms_observationTime
    - observationTimeType
    - ObservationTerms_informationSource
    - ObservationTerms_precision
    - ObservationTerms_calculationPeriodDates
    - ObservationTerms_observationDates
    - numberOfObservationDates
    slot_usage:
      observationTime:
        name: observationTime
        description: Defines time in respect to a business calendar location that
          the price/benchmark/index is observed
        range: BusinessCenterTime
      informationSource:
        name: informationSource
        description: The information source where a published or displayed market
          rate will be obtained, e.g. Telerate Page 3750.
        range: FxSpotRateSource
      precision:
        name: precision
        description: Defines rounding rules and precision to be used in the rounding
          of observations.
        range: Rounding
      calculationPeriodDates:
        name: calculationPeriodDates
        description: Defines parameters used to generate the calculation period dates
          schedule, including the specification of any initial or final stub calculation
          periods. A calculation period schedule consists of an optional initial stub
          calculation period, one or more regular calculation periods and an optional
          final stub calculation period. In the absence of any initial or final stub
          calculation periods, the regular part of the calculation period schedule
          is assumed to be between the effective date and the termination date. No
          implicit stubs are allowed, i.e. stubs must be explicitly specified using
          an appropriate combination of firstPeriodStartDate, firstRegularPeriodStartDate
          and lastRegularPeriodEndDate.
      observationDates:
        name: observationDates
        description: Describes date details for a set of observation dates in parametric
          or non-parametric form.
        range: ObservationDates
        required: true
        multivalued: false
        inlined_as_list: true
    class_uri: common_domain_model:ObservationTerms
    rules:
    - preconditions:
        slot_conditions:
          observationTimeType:
            name: observationTimeType
            equals_string: SpecificTime
      postconditions:
        slot_conditions:
          observationTime:
            name: observationTime
            required: true
      description: Checks that an observation time is specified either explicitly
        (through the observation time) or implicitly (through a observation time type
        different to Specific Time). If Specific Time is defined as observation time
        type (i.e. no implicit time value), the condition checks that an explicit
        observation time is provided.
  ParametricDates:
    name: ParametricDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/ParametricDates
    description: Defines rules for the dates on which the price will be determined.
    comments:
    - "Rosetta condition: ParametricDatesChoice \u2014 required choice dayDistribution,\
      \ dayOfWeek"
    - "Rosetta condition: DayOfWeekMethod \u2014 if dayOfWeek exists then dayFrequency\
      \ exists"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ParametricDates
    slots:
    - ParametricDates_dayType
    - dayDistribution
    - ParametricDates_dayOfWeek
    - dayFrequency
    - lag
    - ParametricDates_businessCenters
    slot_usage:
      dayType:
        name: dayType
        description: Denotes the enumerated values to specify the day type classification
          used in counting the number of days between two dates.
        required: true
      dayOfWeek:
        name: dayOfWeek
        description: Indicates the days of the week on which the price will be determined.
        multivalued: true
      businessCenters:
        name: businessCenters
        description: The enumerated values to specify the business centers.
        required: true
    class_uri: common_domain_model:ParametricDates
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            dayDistribution:
              name: dayDistribution
              required: true
        - slot_conditions:
            dayOfWeek:
              name: dayOfWeek
              required: true
      description: ParametricDatesChoice
    - preconditions:
        slot_conditions:
          dayOfWeek:
            name: dayOfWeek
            required: true
      postconditions:
        slot_conditions:
          dayFrequency:
            name: dayFrequency
            required: true
      description: DayOfWeekMethod
  Lag:
    name: Lag
    definition_uri: https://w3id.org/lmodel/common_domain_model/Lag
    description: The pricing period per calculation period if the pricing days do
      not wholly fall within the respective calculation period.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:Lag
    slots:
    - lagDuration
    - firstObservationDateOffset
    class_uri: common_domain_model:Lag
  ResetDates:
    name: ResetDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResetDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data defining:  the parameters used to generate the reset dates
      schedule and associated fixing dates. The reset dates are the dates on which
      the new index value (which is observed on the fixing date) is applied for each
      period and on which the interest rate hence begins to accrue.'
    comments:
    - "Rosetta condition: RateCutOffDaysOffset \u2014 if rateCutOffDaysOffset exists\
      \ then rateCutOffDaysOffset -> periodMultiplier < 0"
    - "Rosetta condition: WeeklyPeriod \u2014 if resetFrequency -> period = PeriodExtendedEnum\
      \ -> W then resetFrequency -> weeklyRollConvention exists"
    - "Rosetta condition: NonWeeklyPeriod \u2014 if resetFrequency -> period <> PeriodExtendedEnum\
      \ -> W then resetFrequency -> weeklyRollConvention is absent"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ResetDates
    slots:
    - ResetDates_calculationPeriodDatesReference
    - resetRelativeTo
    - initialFixingDate
    - fixingDates
    - finalFixingDate
    - rateCutOffDaysOffset
    - resetFrequency
    - resetDatesAdjustments
    slot_usage:
      calculationPeriodDatesReference:
        name: calculationPeriodDatesReference
        required: false
    class_uri: common_domain_model:ResetDates
  StubCalculationPeriodAmount:
    name: StubCalculationPeriodAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/StubCalculationPeriodAmount
    description: 'A data defining:  how the initial or final stub calculation period
      amounts is calculated. For example, the rate to be applied to the initial or
      final stub calculation period may be the linear interpolation of two different
      tenors for the floating rate index specified in the calculation period amount
      component, e.g. A two month stub period may used the linear interpolation of
      a one month and three month floating rate. The different rate tenors would be
      specified in this component. Note that a maximum of two rate tenors can be specified.
      If a stub period uses a single index tenor and this is the same as that specified
      in the calculation period amount component then the initial stub or final stub
      component, as the case may be, must not be included.'
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:StubCalculationPeriodAmount
    slots:
    - calculationPeriodDatesReference
    - initialStub
    - finalStub
    class_uri: common_domain_model:StubCalculationPeriodAmount
  AveragingObservationList:
    name: AveragingObservationList
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingObservationList
    description: An unordered list of weighted averaging observations.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:AveragingObservationList
    slots:
    - averagingObservation
    class_uri: common_domain_model:AveragingObservationList
  AveragingPeriod:
    name: AveragingPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingPeriod
    description: Period over which an average value is taken.
    comments:
    - "Rosetta condition: AveragingPeriodChoice \u2014 optional choice averagingDateTimes,\
      \ averagingObservations"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:AveragingPeriod
    close_mappings:
    - fpml_5_10:AveragingPeriod
    slots:
    - AveragingPeriod_schedule
    - averagingDateTimes
    - averagingObservations
    - marketDisruption
    slot_usage:
      schedule:
        name: schedule
        description: A schedule for generating averaging observation dates.
    class_uri: common_domain_model:AveragingPeriod
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            averagingDateTimes:
              name: averagingDateTimes
              required: true
        - slot_conditions:
            averagingObservations:
              name: averagingObservations
              required: true
      description: ' Choice rule to represent an FpML choice construct between unweighted
        and weighted averaging date and times.'
  WeightedAveragingObservation:
    name: WeightedAveragingObservation
    definition_uri: https://w3id.org/lmodel/common_domain_model/WeightedAveragingObservation
    description: A single weighted averaging observation.
    comments:
    - "Rosetta condition: WeightedAveragingObservationChoice \u2014 required choice\
      \ dateTime, observationNumber"
    - "Rosetta condition: PositiveObservationNumber \u2014 if observationNumber exists\
      \ then observationNumber >= 0"
    - "Rosetta condition: PositiveWeight \u2014 weight >= 0.0"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:WeightedAveragingObservation
    slots:
    - WeightedAveragingObservation_dateTime
    - observationNumber
    - WeightedAveragingObservation_weight
    slot_usage:
      dateTime:
        name: dateTime
        description: Observation date time, which should be used when literal observation
          dates are required. The CDM specifies that the zoned date time is to be
          expressed in accordance with ISO 8601, either as UTC as an offset to UTC.
        required: false
        multivalued: false
      weight:
        name: weight
        description: Observation weight, which is used as a multiplier for the observation
          value.
        required: true
    class_uri: common_domain_model:WeightedAveragingObservation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            dateTime:
              name: dateTime
              required: true
        - slot_conditions:
            observationNumber:
              name: observationNumber
              required: true
      description: ' Choice rule to represent an FpML choice construct between date
        times for literal date values, and observation numbers for schedule generated
        observations.'
    - preconditions:
        slot_conditions:
          observationNumber:
            name: observationNumber
            required: true
      postconditions:
        slot_conditions:
          observationNumber:
            name: observationNumber
            minimum_value: 0
      description: ' FpML specifies observationNumber as a positive integer.'
    - preconditions: {}
      postconditions:
        slot_conditions:
          weight:
            name: weight
            minimum_value: 0.0
      description: ' FpML specifies observationNumber as a non-negative decimal.'
  AmountSchedule:
    name: AmountSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/AmountSchedule
    description: A class to specify a currency amount or a currency amount schedule.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:AmountSchedule
    is_a: Schedule
    slots:
    - Schedule_value
    - Schedule_datedValue
    - AmountSchedule_currency
    slot_usage:
      currency:
        name: currency
        description: The currency in which the amount schedule is denominated. The
          currency is specified outside of the actual schedule in order to be applied
          uniformly to it. The list of valid currencies is not presently positioned
          as an enumeration as part of the CDM because that scope is limited to the
          values specified by ISDA and FpML. As a result, implementers have to make
          reference to the relevant standard, such as the ISO 4217 standard for currency
          codes.
        required: true
        multivalued: true
    class_uri: common_domain_model:AmountSchedule
  InitialFixingDate:
    name: InitialFixingDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/InitialFixingDate
    description: A CDM class which purpose is to specify the initial fixing date either
      alongside the FpML interest rate specification as an offset of another date,
      or alongside the credit derivative specification as an unadjusted date.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:InitialFixingDate
    slots:
    - relativeDateOffset
    - InitialFixingDate_initialFixingDate
    slot_usage:
      initialFixingDate:
        name: initialFixingDate
        range: date
    class_uri: common_domain_model:InitialFixingDate
  PaymentDates:
    name: PaymentDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Specifies the parameters to generate the payment date schedule, either
      through a parametric representation or by reference to specified dates.
    comments:
    - "Rosetta condition: FpML_ird_35_cd_31 \u2014 if firstPaymentDate exists and\
      \ lastRegularPaymentDate exists then firstPaymentDate < lastRegularPaymentDate"
    - "Rosetta condition: NonZeroPeriodMultiplier \u2014 if paymentDaysOffset exists\
      \ then paymentDaysOffset -> periodMultiplier <> 0"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:PaymentDates
    slots:
    - paymentFrequency
    - firstPaymentDate
    - lastRegularPaymentDate
    - paymentDateSchedule
    - payRelativeTo
    - paymentDaysOffset
    - paymentDatesAdjustments
    class_uri: common_domain_model:PaymentDates
    rules:
    - preconditions:
        slot_conditions:
          firstPaymentDate:
            name: firstPaymentDate
            required: true
          lastRegularPaymentDate:
            name: lastRegularPaymentDate
            required: true
      description: FpML validation rule ird-35 & cd-31- If firstPaymentDate exists,
        and if lastRegularPaymentDate exists, then firstPaymentDate must be before
        lastRegularPaymentDate.
      comments:
      - 'Rosetta comparison: firstPaymentDate < lastRegularPaymentDate'
  PaymentDateSchedule:
    name: PaymentDateSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentDateSchedule
    description: The payment dates when specified as relative to a set of dates specified
      somewhere else in the instance document/transaction, e.g. the valuation dates
      as typically the case for equity swaps, or when specified as a calculation period
      schedule.
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:PaymentDateSchedule
    slots:
    - interimPaymentDates
    - finalPaymentDate
    class_uri: common_domain_model:PaymentDateSchedule
  ResetFrequency:
    name: ResetFrequency
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResetFrequency
    description: A class defining the reset frequency. In the case of a weekly reset,
      also specifies the day of the week that the reset occurs. If the reset frequency
      is greater than the calculation period frequency the this implies that more
      or more reset dates is established for each calculation period and some form
      of rate averaging is applicable. The specific averaging method of calculation
      is specified in FloatingRateCalculation. In case the reset frequency is of value
      T (term), the period is defined by the swap/swapStream/calculationPerioDates/effectiveDate
      and the swap/swapStream/calculationPerioDates/terminationDate.
    comments:
    - "Rosetta condition: FpML_ird_49 \u2014 if weeklyRollConvention exists then period\
      \ = PeriodExtendedEnum -> W"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:ResetFrequency
    is_a: Frequency
    slots:
    - periodMultiplier
    - period
    - weeklyRollConvention
    class_uri: common_domain_model:ResetFrequency
  FinalCalculationPeriodDateAdjustment:
    name: FinalCalculationPeriodDateAdjustment
    definition_uri: https://w3id.org/lmodel/common_domain_model/FinalCalculationPeriodDateAdjustment
    description: 'A data to:  define business date convention adjustment to final
      payment period per leg.'
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:FinalCalculationPeriodDateAdjustment
    slots:
    - relevantUnderlyingDateReference
    - swapStreamReference
    - FinalCalculationPeriodDateAdjustment_businessDayConvention
    slot_usage:
      businessDayConvention:
        name: businessDayConvention
        description: Override business date convention. This takes precedence over
          leg level information.
    class_uri: common_domain_model:FinalCalculationPeriodDateAdjustment
  ComputedAmount:
    name: ComputedAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/ComputedAmount
    description: A class to specify the outcome of a computed amount, for testing
      purposes.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:ComputedAmount
    slots:
    - callFunction
    - ComputedAmount_amount
    - ComputedAmount_currency
    slot_usage:
      amount:
        name: amount
        range: decimal
      currency:
        name: currency
        description: The currency in which the computed amount is denominated. The
          list of valid currencies is not presently positioned as an enumeration as
          part of the CDM because that scope is limited to the values specified by
          ISDA and FpML. As a result, implementers have to make reference to the relevant
          standard, such as the ISO 4217 standard for currency codes.
    class_uri: common_domain_model:ComputedAmount
  AssetFlowBase:
    name: AssetFlowBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetFlowBase
    description: 'Defines the basic parameters of an asset transfer, e.g. a cashflow:
      what (the asset), how much (the quantity) and when (the settlement date).'
    comments:
    - "Rosetta condition: QuantityUnitExists \u2014 if asset -> Cash exists then quantity\
      \ -> unit -> currency exists else if asset -> Commodity exists then quantity\
      \ -> unit -> capacityUnit exists else if asset -> Instrument exists then quantity\
      \ -> unit -> financialUnit exists"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:AssetFlowBase
    close_mappings:
    - fpml_5_10:AssetFlowBase
    slots:
    - AssetFlowBase_quantity
    - AssetFlowBase_asset
    - AssetFlowBase_settlementDate
    - paymentDiscounting
    slot_usage:
      quantity:
        name: quantity
        description: Represents the amount of the asset to be transferred. The cashflow
          amount is always a positive number, as the cashflow direction is implied
          by the payer/receiver attribute.
        range: NonNegativeQuantity
        required: true
      asset:
        name: asset
        description: Represents the object that is subject to the transfer, it could
          be an asset or a reference.
        required: true
      settlementDate:
        name: settlementDate
        description: Represents the date on which the transfer to due.
        range: AdjustableOrAdjustedOrRelativeDate
    class_uri: common_domain_model:AssetFlowBase
  AssetFlow:
    name: AssetFlow
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetFlow
    description: Specifies an asset flow, i.e. the outcome of either of computation
      (e.g. interest accrual) or an assessment of some sort. The asset flow can then
      be turned into an asset transfer artefact to be used as the input to a payment
      system or the outcome of it. The associated globalKey denotes the ability to
      associate a hash value to the AssetFlow instantiations for the purpose of model
      cross-referencing, in support of functionality such as the event effect and
      the lineage.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:AssetFlow
    close_mappings:
    - fpml_5_10:AssetFlow
    is_a: AssetFlowBase
    slots:
    - AssetFlowBase_quantity
    - AssetFlowBase_asset
    - AssetFlowBase_settlementDate
    - paymentDiscounting
    - AssetFlow_payerReceiver
    - assetFlowType
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: Specifies who pays / receives the asset flow, through a normalised
          Party1 / Party2 enumerator.
        required: true
    class_uri: common_domain_model:AssetFlow
  QuantityMultiplier:
    name: QuantityMultiplier
    definition_uri: https://w3id.org/lmodel/common_domain_model/QuantityMultiplier
    description: ' Class to specify a mechanism for a quantity to be set as a multiplier
      to another (reference) quantity, based on a price observation. At the moment
      this class only supports FX or Equity-linked notional and re-uses existing building
      blocks for those 2 cases, until such time when component can be made more generic.
      This captures the case of resetting cross-currency swaps and resetting equity
      swaps.'
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:QuantityMultiplier
    slots:
    - fxLinkedNotionalSchedule
    - multiplierValue
    class_uri: common_domain_model:QuantityMultiplier
  ResolvablePriceQuantity:
    name: ResolvablePriceQuantity
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResolvablePriceQuantity
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'Generic class to specify the quantity for different payout legs
      in a contractual product, when that quantity can vary across payout legs or
      across time. A resolvable quantity can always be resolved into a single quantity
      from the quantity notation which has a corresponding asset identifier. In addition
      to the base case, where quantity is directly specified as a number as part of
      the quantity notation, the other use cases are: (i) quantity based on some pre-defined
      schedule (eg amortising notional), (ii) quantity based on some pre-defined events
      (eg resetting cross-currency notional), or quantity set as reference to another
      quantity (eg equity notional as no. securities x price).'
    comments:
    - "Rosetta condition: QuantityMultiplier \u2014 if quantityMultiplier exists then\
      \ quantityReference -> reference exists"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:ResolvablePriceQuantity
    slots:
    - resolvedQuantity
    - quantitySchedule
    - quantityReference
    - quantityMultiplier
    - ResolvablePriceQuantity_reset
    - futureValueNotional
    - priceSchedule
    slot_usage:
      reset:
        name: reset
        description: Whether the quantity is resettable
        range: boolean
    class_uri: common_domain_model:ResolvablePriceQuantity
  PayoutBase:
    name: PayoutBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/PayoutBase
    description: A data type that contains the common attributes (e.g. payer and receiver
      parties) and validation conditions that apply across all payout types
    comments:
    - "Rosetta condition: FinalPrincipalAmountExists \u2014 if principalPayment ->\
      \ principalPaymentSchedule -> finalPrincipalPayment exists and priceQuantity\
      \ -> quantitySchedule exists and priceQuantity -> reset is absent then principalPayment\
      \ -> principalPaymentSchedule -> finalPrincipalPayment -> principalAmount exists\
      \ or principalPayment -> principalPaymentSchedule -> finalPrincipalPayment ->\
      \ presentValuePrincipalAmount exists"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: Canonical representation of the payer and receiver parties applicable
          to each payout leg.
        required: true
      priceQuantity:
        name: priceQuantity
        description: Each payout leg must implement the quantity concept as a 'resolvable'
          type, which allows for different payout legs to be linked to each other
          (e.g. in the case of cross-curreny products).
        range: ResolvablePriceQuantity
        required: false
        multivalued: false
      settlementTerms:
        name: settlementTerms
        description: Each payout leg must specifies its settlement terms, including
          the delivery type (i.e. cash vs physical, and their respective terms), the
          transfer type (DvP etc.) and settlement date, if any.
        required: false
    class_uri: common_domain_model:PayoutBase
  CommodityPriceReturnTerms:
    name: CommodityPriceReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/CommodityPriceReturnTerms
    description: Defines parameters in which the commodity price is assessed.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:CommodityPriceReturnTerms
    close_mappings:
    - fpml_5_10:CommodityPriceReturnTerms
    slots:
    - CommodityPriceReturnTerms_rounding
    - CommodityPriceReturnTerms_spread
    - rollFeature
    - conversionFactor
    slot_usage:
      rounding:
        name: rounding
        description: Defines rounding rules and precision to be used in the rounding
          of a number.
        range: Rounding
      spread:
        name: spread
        description: Defines a spread value for one or more defined dates.
        range: SpreadSchedule
        required: false
    class_uri: common_domain_model:CommodityPriceReturnTerms
  RollFeature:
    name: RollFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/RollFeature
    description: 'Used in conjunction with an exchange-based pricing source. Identifies
      a way in which the futures contracts referenced will roll between periods. '
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:RollFeature
    slots:
    - rollSourceCalendar
    - deliveryDateRollConvention
    class_uri: common_domain_model:RollFeature
  PricingDates:
    name: PricingDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/PricingDates
    description: Specifies specific dates or parametric rules for the dates on which
      the price will be determined
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PricingDates
    slots:
    - specifiedDates
    - PricingDates_parametricDates
    slot_usage:
      parametricDates:
        name: parametricDates
        description: Defines rules for the dates on which the price will be determined.
    class_uri: common_domain_model:PricingDates
  ValuationDate:
    name: ValuationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationDate
    description: A single object that represents the different methods to specify
      a valuation date, as used for cash settlement. The Single / Multiple ValuationDate
      is used for the determination of recovery in a credit event, the RelativeDateOffset
      is used for cash-settled option, and FxFixingDate is used for cross-currency
      settlement.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:ValuationDate
    slots:
    - singleValuationDate
    - multipleValuationDates
    - ValuationDate_valuationDate
    - fxFixingDate
    - fxFixingSchedule
    slot_usage:
      valuationDate:
        name: valuationDate
        description: The date on which the cash settlement amount will be determined
          according to the cash settlement method if the parties have not otherwise
          been able to agree the cash settlement amount. This attribute was formerly
          part of 'OptionCashSettlement', which is now being harmonised into a common
          'CashSettlementTerms' that includes a 'ValuationDate'.
        range: RelativeDateOffset
        required: false
    class_uri: common_domain_model:ValuationDate
  CashSettlementTerms:
    name: CashSettlementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/CashSettlementTerms
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Defines the terms required to compute and settle a cash settlement
      amount according to a fixing value, including the fixing source, fixing method
      and fixing date. In FpML, PhysicalSettlementTerms and CashSettlementTerms extend
      SettlementTerms. In the CDM, this extension paradigm has not been used because
      SettlementTerms class has been used for purposes related to securities transactions,
      while it is not used as such in the FpML standard (i.e. only as an abstract
      construct.
    comments:
    - "Rosetta condition: CashSettlementTermsChoice \u2014 optional choice cashSettlementAmount,\
      \ recoveryFactor"
    - "Rosetta condition: RecoveryFactor \u2014 if recoveryFactor exists then recoveryFactor\
      \ >= 0.0 and recoveryFactor <= 1.0"
    - "Rosetta condition: CashCollateralMethod \u2014 if valuationMethod -> cashCollateralValuationMethod\
      \ exists then cashSettlementMethod = CashSettlementMethodEnum -> MidMarketIndicativeQuotations\
      \ or cashSettlementMethod = CashSettlementMethodEnum -> MidMarketIndicativeQuotationsAlternate\
      \ or cashSettlementMethod = CashSettlementMethodEnum -> MidMarketCalculationAgentDetermination\
      \ or cashSettlementMethod = CashSettlementMethodEnum -> ReplacementValueFirmQuotations\
      \ or cashSettlementMethod = CashSettlementMethodEnum -> ReplacementValueCalculationAgentDetermination"
    - "Rosetta condition: MidMarketValuationMethod \u2014 if (valuationMethod -> cashCollateralValuationMethod\
      \ -> applicableCsa exists or valuationMethod -> cashCollateralValuationMethod\
      \ -> agreedDiscountRate exists or valuationMethod -> cashCollateralValuationMethod\
      \ -> cashCollateralInterestRate exists) then cashSettlementMethod = CashSettlementMethodEnum\
      \ -> MidMarketIndicativeQuotations or cashSettlementMethod = CashSettlementMethodEnum\
      \ -> MidMarketIndicativeQuotationsAlternate or cashSettlementMethod = CashSettlementMethodEnum\
      \ -> MidMarketCalculationAgentDetermination"
    - "Rosetta condition: ReplacementValueMethod \u2014 if valuationMethod -> cashCollateralValuationMethod\
      \ -> protectedParty exists then cashSettlementMethod = CashSettlementMethodEnum\
      \ -> ReplacementValueFirmQuotations or cashSettlementMethod = CashSettlementMethodEnum\
      \ -> ReplacementValueCalculationAgentDetermination"
    - "Rosetta condition: FirmQuotationMethod \u2014 if valuationMethod -> cashCollateralValuationMethod\
      \ -> prescribedDocumentationAdjustment exists then cashSettlementMethod = CashSettlementMethodEnum\
      \ -> ReplacementValueFirmQuotations"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:CashSettlementTerms
    close_mappings:
    - fpml_5_10:CashSettlementTerms
    slots:
    - cashSettlementMethod
    - CashSettlementTerms_valuationMethod
    - CashSettlementTerms_valuationDate
    - CashSettlementTerms_valuationTime
    - cashSettlementAmount
    - recoveryFactor
    - fixedSettlement
    - accruedInterest
    slot_usage:
      valuationMethod:
        name: valuationMethod
        description: Specifies the parameters required to obtain a valuation, including
          the source, quotation method (bid, mid etc.) and any applicable quotation
          amount.
        range: ValuationMethod
      valuationDate:
        name: valuationDate
        description: Defines the different methods to specify a valuation date, as
          used for cash settlement. The Single / Multiple ValuationDate is used for
          the determination of recovery in a credit event, the RelativeDateOffset
          is used for cash-settled option, and FxFixingDate is used for cross-currency
          settlement.
        range: ValuationDate
        required: false
      valuationTime:
        name: valuationTime
        description: 'The time of the cash settlement valuation date when the cash
          settlement amount will be determined according to the cash settlement method,
          if the parties have not otherwise been able to agree the cash settlement
          amount. When using quations, this is the time of day in the specified business
          center when the calculation agent seeks quotations for an amount of the
          reference obligation for purposes of cash settlement. ISDA 2003 Term: Valuation
          Time.'
        range: BusinessCenterTime
        required: false
    class_uri: common_domain_model:CashSettlementTerms
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            cashSettlementAmount:
              name: cashSettlementAmount
              required: true
        - slot_conditions:
            recoveryFactor:
              name: recoveryFactor
              required: true
      description: Choice rule to represent an FpML choice construct.
    - preconditions:
        slot_conditions:
          recoveryFactor:
            name: recoveryFactor
            required: true
      postconditions:
        slot_conditions:
          recoveryFactor:
            name: recoveryFactor
            minimum_value: 0.0
            maximum_value: 1.0
      description: FpML specifies recoveryFactor as a RestrictedPercentage, meaning
        that it is a decimal which value is restricted between 0 and 1.
  DeliverableObligations:
    name: DeliverableObligations
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeliverableObligations
    description: A class to specify all the ISDA terms relevant to defining the deliverable
      obligations.
    comments:
    - "Rosetta condition: DeliverableObligationsChoice \u2014 optional choice fullFaithAndCreditObLiability,\
      \ generalFundObligationLiability, revenueObligationLiability"
    - "Rosetta condition: FpML_cd_34 \u2014 if category exists and category = ObligationCategoryEnum\
      \ -> ReferenceObligationsOnly then acceleratedOrMatured is absent and accruedInterest\
      \ is absent and assignableLoan is absent and consentRequiredLoan is absent and\
      \ directLoanParticipation is absent and excluded is absent and fullFaithAndCreditObLiability\
      \ is absent and generalFundObligationLiability is absent and indirectLoanParticipation\
      \ is absent and listed is absent and maximumMaturity is absent and notBearer\
      \ is absent and notContingent is absent and notDomesticCurrency is absent and\
      \ notDomesticIssuance is absent and notDomesticLaw is absent and notSovereignLender\
      \ is absent and notSubordinated is absent and othReferenceEntityObligations\
      \ is absent and revenueObligationLiability is absent and specifiedCurrency is\
      \ absent and transferable is absent"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:DeliverableObligations
    slots:
    - accruedInterest
    - DeliverableObligations_category
    - notSubordinated
    - specifiedCurrency
    - notSovereignLender
    - notDomesticCurrency
    - notDomesticLaw
    - listed
    - DeliverableObligations_notContingent
    - notDomesticIssuance
    - assignableLoan
    - consentRequiredLoan
    - directLoanParticipation
    - transferable
    - maximumMaturity
    - acceleratedOrMatured
    - notBearer
    - fullFaithAndCreditObLiability
    - generalFundObligationLiability
    - revenueObligationLiability
    - indirectLoanParticipation
    - excluded
    - othReferenceEntityObligations
    slot_usage:
      category:
        name: category
        required: false
      notContingent:
        name: notContingent
        description: 'A deliverable obligation characteristic. In essence Not Contingent
          means the repayment of principal cannot be dependant on a formula/index,
          i.e. to prevent the risk of being delivered an instrument that may never
          pay any element of principal, and to ensure that the obligation is interest
          bearing (on a regular schedule). ISDA 2003 Term: Not Contingent.'
    class_uri: common_domain_model:DeliverableObligations
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            fullFaithAndCreditObLiability:
              name: fullFaithAndCreditObLiability
              required: true
        - slot_conditions:
            generalFundObligationLiability:
              name: generalFundObligationLiability
              required: true
        - slot_conditions:
            revenueObligationLiability:
              name: revenueObligationLiability
              required: true
      description: Choice rule to represent an FpML choice construct.
  LoanParticipation:
    name: LoanParticipation
    definition_uri: https://w3id.org/lmodel/common_domain_model/LoanParticipation
    description: 'A class to specify loan with a participation agreement whereby the
      buyer is capable of creating, or procuring the creation of, a contractual right
      in favour of the seller that provides the seller with recourse to the participation
      seller for a specified share in any payments due under the relevant loan which
      are received by the participation seller. ISDA 2003 Term: Direct Loan Participation.'
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:LoanParticipation
    is_a: PCDeliverableObligationCharac
    slots:
    - PCDeliverableObligationCharac_applicable
    - partialCashSettlement
    - qualifyingParticipationSeller
    class_uri: common_domain_model:LoanParticipation
  PCDeliverableObligationCharac:
    name: PCDeliverableObligationCharac
    definition_uri: https://w3id.org/lmodel/common_domain_model/PCDeliverableObligationCharac
    description: A class to specify the Partial Cash Deliverable Obligation Characteristic.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PCDeliverableObligationCharac
    slots:
    - PCDeliverableObligationCharac_applicable
    - partialCashSettlement
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the provision is applicable.
    class_uri: common_domain_model:PCDeliverableObligationCharac
  PhysicalSettlementPeriod:
    name: PhysicalSettlementPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/PhysicalSettlementPeriod
    comments:
    - "Rosetta condition: BusinessDays \u2014 if businessDays exists then businessDays\
      \ >= 0"
    - "Rosetta condition: MaximumBusinessDays \u2014 if maximumBusinessDays exists\
      \ then maximumBusinessDays >= 0"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PhysicalSettlementPeriod
    slots:
    - businessDaysNotSpecified
    - businessDays
    - maximumBusinessDays
    class_uri: common_domain_model:PhysicalSettlementPeriod
    rules:
    - preconditions:
        slot_conditions:
          businessDays:
            name: businessDays
            required: true
      postconditions:
        slot_conditions:
          businessDays:
            name: businessDays
            minimum_value: 0
      description: FpML specifies businessDays as a NonNegativeInteger.
    - preconditions:
        slot_conditions:
          maximumBusinessDays:
            name: maximumBusinessDays
            required: true
      postconditions:
        slot_conditions:
          maximumBusinessDays:
            name: maximumBusinessDays
            minimum_value: 0
      description: FpML specifies maximumBusinessDays as a NonNegativeInteger.
  PhysicalSettlementTerms:
    name: PhysicalSettlementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/PhysicalSettlementTerms
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Specifies Physical Settlement Terms characteristics for the settlement
      of a Credit Default Swap or Option.
    comments:
    - "Rosetta condition: PredeterminedClearingOrganizationParty \u2014 if predeterminedClearingOrganizationParty\
      \ exists then predeterminedClearingOrganizationParty = AncillaryRoleEnum ->\
      \ PredeterminedClearingOrganizationParty"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PhysicalSettlementTerms
    slots:
    - clearedPhysicalSettlement
    - predeterminedClearingOrganizationParty
    - physicalSettlementPeriod
    - deliverableObligations
    - escrow
    - sixtyBusinessDaySettlementCap
    class_uri: common_domain_model:PhysicalSettlementTerms
  PercentageRule:
    name: PercentageRule
    definition_uri: https://w3id.org/lmodel/common_domain_model/PercentageRule
    description: A class defining a content model for a calculation rule defined as
      percentage of the notional amount.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PercentageRule
    slots:
    - paymentPercent
    - notionalAmountReference
    class_uri: common_domain_model:PercentageRule
  SettlementDate:
    name: SettlementDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementDate
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A data defining the settlement date(s) for cash or physical settlement
      as either a set of explicit dates, together with applicable adjustments, or
      as a date relative to some other (anchor) date, or as any date in a range of
      contiguous business days. This data type provides a level of abstraction on
      top of the different legacy methods used to specify a settlement / payment date,
      which vary across product types, asset classes and delivery types.
    comments:
    - "Rosetta condition: BusinessDays \u2014 if cashSettlementBusinessDays exists\
      \ then cashSettlementBusinessDays >= 0 else adjustableOrRelativeDate exists\
      \ or valueDate exists or adjustableDates exists or businessDateRange exists"
    - "Rosetta condition: DateChoice \u2014 optional choice adjustableOrRelativeDate,\
      \ valueDate, adjustableDates, businessDateRange"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:SettlementDate
    slots:
    - adjustableOrRelativeDate
    - SettlementDate_valueDate
    - SettlementDate_adjustableDates
    - businessDateRange
    - cashSettlementBusinessDays
    - paymentDelay
    slot_usage:
      valueDate:
        name: valueDate
        description: The settlement date for a forward settling product. For Foreign
          Exchange contracts, this represents a common settlement date between both
          currency legs. To specify different settlement dates for each currency leg,
          see the ForeignExchange class. This attribute was formerly part of 'SettlementTerms',
          which is now being harmonised to include a common 'SettlementDate', as inherited
          from 'SettlementBase'.
        required: false
      adjustableDates:
        name: adjustableDates
        description: A series of dates that shall be subject to adjustment if they
          would otherwise fall on a day that is not a business day in the specified
          business centers, together with the convention for adjusting the date. This
          attributes was formerly part of 'CashSettlementPaymentDate' as included
          into 'OptionCashSettlement' (which is now merged into a unique 'CashSettlementTerms'
          data type.
    class_uri: common_domain_model:SettlementDate
    rules:
    - preconditions:
        slot_conditions:
          cashSettlementBusinessDays:
            name: cashSettlementBusinessDays
            required: true
      postconditions:
        slot_conditions:
          cashSettlementBusinessDays:
            name: cashSettlementBusinessDays
            minimum_value: 0
      description: FpML specifies cashSettlementBusinessDays as a nonNegativeInteger.
        If cashSettlementBusinessDays is not specified, then another settlement date
        method must be specified.
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            adjustableOrRelativeDate:
              name: adjustableOrRelativeDate
              required: true
        - slot_conditions:
            valueDate:
              name: valueDate
              required: true
        - slot_conditions:
            adjustableDates:
              name: adjustableDates
              required: true
        - slot_conditions:
            businessDateRange:
              name: businessDateRange
              required: true
      description: Settlement date must be specified either throught the 'settlementDate'
        or 'valueDate' attribute. This is a temporary work-around until such time
        when we can retire the 'valueDate' attribute.
  FxFixingDate:
    name: FxFixingDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxFixingDate
    description: Extends the Offset structure to specify an FX fixing date as an offset
      to dates specified somewhere else in the document.
    comments:
    - "Rosetta condition: BusinessCentersChoice \u2014 optional choice businessCenters,\
      \ businessCentersReference"
    - "Rosetta condition: DateChoice \u2014 required choice dateRelativeToPaymentDates,\
      \ dateRelativeToCalculationPeriodDates"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:FxFixingDate
    is_a: Offset
    slots:
    - Period_periodMultiplier
    - Period_period
    - dayType
    - FxFixingDate_businessDayConvention
    - businessCenters
    - FxFixingDate_businessCentersReference
    - dateRelativeToPaymentDates
    - dateRelativeToCalculationPeriodDates
    - dateRelativeToValuationDates
    - FxFixingDate_fxFixingDate
    slot_usage:
      businessDayConvention:
        name: businessDayConvention
        required: false
      businessCentersReference:
        name: businessCentersReference
        description: A reference to a set of financial business centers defined elsewhere
          in the document. This set of business centers is used to determine whether
          a particular day is a business day or not.
      fxFixingDate:
        name: fxFixingDate
        description: Describes the specific date when a non-deliverable forward or
          cash-settled option will 'fix' against a particular rate, which will be
          used to compute the ultimate cash settlement. This element should be omitted
          where a single, discrete fixing date cannot be identified e.g. on an american
          option, where fixing may occur at any date on a continuous range.  This
          attribute was formerly part of 'fxSettlementTerms', which is now being harmonised
          into a common 'CashSettlementTerms' that includes a 'ValuationDate'.
        range: AdjustableOrRelativeDate
    class_uri: common_domain_model:FxFixingDate
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            businessCenters:
              name: businessCenters
              required: true
        - slot_conditions:
            businessCentersReference:
              name: businessCentersReference
              required: true
      description: condition to represent an FpML choice construct.
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            dateRelativeToPaymentDates:
              name: dateRelativeToPaymentDates
              required: true
        - slot_conditions:
            dateRelativeToCalculationPeriodDates:
              name: dateRelativeToCalculationPeriodDates
              required: true
      description: condition to represent an FpML choice construct.
  SettlementTerms:
    name: SettlementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementTerms
    description: Specifies the settlement terms, which can either be cash, physical,
      or fx-based cash-settlement. This class can be used for the settlement of options
      and forwards, cash transactions (e.g. securities or foreign exchange), or in
      case of credit event.
    comments:
    - "Rosetta condition: OptionSettlementChoice \u2014 if cashSettlementTerms exists\
      \ and physicalSettlementTerms exists then settlementType = SettlementTypeEnum\
      \ -> Election or settlementType = SettlementTypeEnum -> CashOrPhysical"
    - "Rosetta condition: CashSettlementTerms \u2014 if cashSettlementTerms exists\
      \ then settlementType <> SettlementTypeEnum -> Physical"
    - "Rosetta condition: PhysicalSettlementTerms \u2014 if physicalSettlementTerms\
      \ exists then settlementType <> SettlementTypeEnum -> Cash"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:SettlementTerms
    is_a: SettlementBase
    slots:
    - settlementType
    - transferSettlementType
    - settlementCurrency
    - SettlementBase_settlementDate
    - settlementCentre
    - settlementProvision
    - standardSettlementStyle
    - cashSettlementTerms
    - physicalSettlementTerms
    class_uri: common_domain_model:SettlementTerms
  FixedPrice:
    name: FixedPrice
    definition_uri: https://w3id.org/lmodel/common_domain_model/FixedPrice
    description: A predefined price accorded by the counterparties.
    comments:
    - "Rosetta condition: NonNegativePrice_amount \u2014 if price -> value exists\
      \ then price -> value >= 0.0"
    - "Rosetta condition: NonNegativePrice_datedValue \u2014 if price -> datedValue\
      \ exists then price -> datedValue -> value all >= 0.0"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:FixedPrice
    slots:
    - FixedPrice_price
    slot_usage:
      price:
        name: price
        description: Fixed price step schedule, including an initial price specified
          as an absolute number.
        range: PriceSchedule
    class_uri: common_domain_model:FixedPrice
  PaymentDetail:
    name: PaymentDetail
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentDetail
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PaymentDetail
    slots:
    - paymentDate
    - paymentRule
    - paymentAmount
    class_uri: common_domain_model:PaymentDetail
  PaymentDiscounting:
    name: PaymentDiscounting
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentDiscounting
    description: This class corresponds to the FpML PaymentDiscounting.model group
      for representing the discounting elements that can be associated with a payment.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PaymentDiscounting
    slots:
    - PaymentDiscounting_discountFactor
    - PaymentDiscounting_presentValueAmount
    slot_usage:
      discountFactor:
        name: discountFactor
        description: The value representing the discount factor used to calculate
          the present value of the cash flow.
      presentValueAmount:
        name: presentValueAmount
        description: The amount representing the present value of the forecast payment.
    class_uri: common_domain_model:PaymentDiscounting
  PaymentRule:
    name: PaymentRule
    definition_uri: https://w3id.org/lmodel/common_domain_model/PaymentRule
    description: A class defining the payment calculation rule. As of FpML 5.10, percentage
      rule is the only calculation rule that has been specified as part of the standard.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PaymentRule
    slots:
    - percentageRule
    class_uri: common_domain_model:PaymentRule
  PrincipalPayments:
    name: PrincipalPayments
    definition_uri: https://w3id.org/lmodel/common_domain_model/PrincipalPayments
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining which principal exchanges occur for the stream.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PrincipalPayments
    slots:
    - initialPayment
    - finalPayment
    - intermediatePayment
    - varyingLegNotionalCurrency
    - principalPaymentSchedule
    class_uri: common_domain_model:PrincipalPayments
  PrincipalPaymentSchedule:
    name: PrincipalPaymentSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/PrincipalPaymentSchedule
    description: Describe dates schedules for Principal Exchanges and related role
      of the parties when known.
    comments:
    - "Rosetta condition: InitialPrincipalAmountExists \u2014 if initialPrincipalPayment\
      \ exists then initialPrincipalPayment -> principalAmount exists or initialPrincipalPayment\
      \ -> presentValuePrincipalAmount exists"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PrincipalPaymentSchedule
    slots:
    - initialPrincipalPayment
    - intermediatePrincipalPayment
    - finalPrincipalPayment
    class_uri: common_domain_model:PrincipalPaymentSchedule
  PrincipalPayment:
    name: PrincipalPayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/PrincipalPayment
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Any kind of principal payments when the amount is known and thus
      fixed.
    comments:
    - "Rosetta condition: PrincipalAmount \u2014 optional choice principalAmount,\
      \ presentValuePrincipalAmount"
    - "Rosetta condition: DiscountFactor \u2014 if presentValuePrincipalAmount exists\
      \ then discountFactor exists"
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:PrincipalPayment
    slots:
    - principalPaymentDate
    - PrincipalPayment_payerReceiver
    - principalAmount
    - PrincipalPayment_discountFactor
    - presentValuePrincipalAmount
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: Specifies the parties responsible for making and receiving payments
          defined by this structure.
      discountFactor:
        name: discountFactor
        description: The value representing the discount factor used to calculate
          the present value of the principal payment amount.
    class_uri: common_domain_model:PrincipalPayment
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            principalAmount:
              name: principalAmount
              required: true
        - slot_conditions:
            presentValuePrincipalAmount:
              name: presentValuePrincipalAmount
              required: true
      description: PrincipalAmount
    - preconditions:
        slot_conditions:
          presentValuePrincipalAmount:
            name: presentValuePrincipalAmount
            required: true
      postconditions:
        slot_conditions:
          discountFactor:
            name: discountFactor
            required: true
      description: DiscountFactor
  SettlementBase:
    name: SettlementBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementBase
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A base class to be extended by the SettlementTerms class.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:SettlementBase
    slots:
    - settlementType
    - transferSettlementType
    - settlementCurrency
    - SettlementBase_settlementDate
    - settlementCentre
    - settlementProvision
    - standardSettlementStyle
    slot_usage:
      settlementDate:
        name: settlementDate
        description: The date on which the settlement amount will be paid, subject
          to adjustment in accordance with any applicable business day convention.
          This component would not be present for a mandatory early termination provision
          where the cash settlement payment date is the mandatory early termination
          date.
        range: SettlementDate
        required: false
    class_uri: common_domain_model:SettlementBase
  SettlementProvision:
    name: SettlementProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementProvision
    description: Defines parameters that regulate a settlement, for instance whether
      this settlement should be netted with other ones or broken-down into smaller
      amounts.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:SettlementProvision
    slots:
    - shapingProvisions
    class_uri: common_domain_model:SettlementProvision
  ShapingProvision:
    name: ShapingProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/ShapingProvision
    description: Defines the applicable settlement limits that may require a settlement
      to be 'shaped', i.e. broken-down into smaller amounts.
    in_subset:
    - cdm_product_common_settlement
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - common_domain_model:ShapingProvision
    slots:
    - shapeSchedule
    class_uri: common_domain_model:ShapingProvision
  TransferableProduct:
    name: TransferableProduct
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferableProduct
    description: A TransferableProduct is a type of financial product which can be
      held or transferred, represented as an Asset with the addition of specific EconomicTerms.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:TransferableProduct
    is_a: Asset
    slots:
    - economicTerms
    class_uri: common_domain_model:TransferableProduct
  EconomicTerms:
    name: EconomicTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/EconomicTerms
    description: ' This class represents the full set of price-forming features associated
      with a contractual product: the payout component, the notional/quantity, the
      effective and termination date and the date adjustment provisions when applying
      uniformily across the payout components. This class also includes the legal
      provisions which have valuation implications: cancelable provision, extendible
      provision, early termination provision and extraordinary events specification.'
    comments:
    - "Rosetta condition: ReturnType_Total_Requires_Dividends \u2014 if payout ->\
      \ PerformancePayout -> returnTerms -> priceReturnTerms -> returnType all = ReturnTypeEnum\
      \ -> Total then payout -> PerformancePayout -> returnTerms -> dividendReturnTerms\
      \ exists"
    - "Rosetta condition: LastRegularPaymentDate \u2014 if payout -> InterestRatePayout\
      \ -> paymentDates -> lastRegularPaymentDate exists and payout -> InterestRatePayout\
      \ -> stubPeriod -> finalStub exists then payout -> InterestRatePayout count\
      \ = 2"
    - "Rosetta condition: PayRelativeTo \u2014 if payout -> InterestRatePayout count\
      \ = 2 and payout -> InterestRatePayout -> paymentDates exists then payout ->\
      \ InterestRatePayout -> paymentDates -> payRelativeTo exists"
    - "Rosetta condition: PaymentDatesAdjustments \u2014 if payout -> InterestRatePayout\
      \ count = 2 and payout -> InterestRatePayout -> paymentDates exists then payout\
      \ -> InterestRatePayout -> paymentDates -> paymentDatesAdjustments exists"
    - "Rosetta condition: PaymentFrequency \u2014 if payout -> InterestRatePayout\
      \ count = 2 and payout -> InterestRatePayout -> paymentDates exists then payout\
      \ -> InterestRatePayout -> paymentDates -> paymentFrequency exists"
    - "Rosetta condition: Quantity \u2014 if payout -> OptionPayout exists then payout\
      \ -> OptionPayout -> priceQuantity exists or payout -> OptionPayout -> underlier\
      \ -> Product ->> economicTerms -> payout -> InterestRatePayout count = 2"
    - "Rosetta condition: DayCountFraction \u2014 if payout -> InterestRatePayout\
      \ count = 2 then payout -> InterestRatePayout -> dayCountFraction exists"
    - "Rosetta condition: PaymentDates \u2014 if payout -> InterestRatePayout count\
      \ = 2 then payout -> InterestRatePayout -> dayCountFraction exists"
    - "Rosetta condition: MarketPrice \u2014 if payout -> CreditDefaultPayout -> generalTerms\
      \ -> indexReferenceInformation is absent then payout -> CreditDefaultPayout\
      \ -> transactedPrice -> marketFixedRate is absent and payout -> CreditDefaultPayout\
      \ -> transactedPrice -> marketPrice is absent"
    - "Rosetta condition: NotionalResetOnPerformancePayout \u2014 payout -> CreditDefaultPayout\
      \ -> priceQuantity -> reset is absent and payout -> AssetPayout -> priceQuantity\
      \ -> reset is absent and payout -> CommodityPayout -> priceQuantity -> reset\
      \ is absent and payout -> FixedPricePayout -> priceQuantity -> reset is absent\
      \ and payout -> SettlementPayout -> priceQuantity -> reset is absent and payout\
      \ -> OptionPayout -> priceQuantity -> reset is absent"
    - "Rosetta condition: NotionalResetInterestRatePayoutExists \u2014 if payout ->\
      \ PerformancePayout -> priceQuantity -> reset contains True then payout -> InterestRatePayout\
      \ exists"
    - "Rosetta condition: FpML_cd_26_28 \u2014 // Cashflow is no longer part of the\
      \ product so this condition cannot be tested at the economic terms level. //\
      \ Consider adding a generic validation at the trade state level that any cashflow\
      \ must be between effective and termination dates. True"
    - "Rosetta condition: FpML_cd_27 \u2014 // Cashflow is no longer part of the product\
      \ so this condition cannot be tested at the economic terms level. // Consider\
      \ adding a generic validation at the trade state level that any cashflow must\
      \ be between effective and termination dates. True"
    - "Rosetta condition: FpML_cd_30 \u2014 if payout -> InterestRatePayout -> paymentDates\
      \ -> lastRegularPaymentDate exists and terminationDate exists then payout ->\
      \ InterestRatePayout -> paymentDates -> lastRegularPaymentDate all < terminationDate\
      \ -> adjustableDate -> unadjustedDate or payout -> InterestRatePayout -> paymentDates\
      \ -> lastRegularPaymentDate all < terminationDate -> adjustableDate -> adjustedDate"
    - "Rosetta condition: IndependentCalculationAgent \u2014 if calculationAgent ->\
      \ calculationAgentParty exists then calculationAgent -> calculationAgentParty\
      \ = AncillaryRoleEnum -> CalculationAgentIndependent"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:EconomicTerms
    slots:
    - EconomicTerms_effectiveDate
    - EconomicTerms_effectiveTime
    - terminationDate
    - terminationTime
    - EconomicTerms_dateAdjustments
    - EconomicTerms_payout
    - terminationProvision
    - calculationAgent
    - nonStandardisedTerms
    - EconomicTerms_collateral
    slot_usage:
      effectiveDate:
        name: effectiveDate
        description: The first day of the terms of the trade. This day may be subject
          to adjustment in accordance with a business day convention.
        range: AdjustableOrRelativeDate
      effectiveTime:
        name: effectiveTime
        description: The time and zone of the first day of the terms of the trade.
          It can also be specified in relation to another time.
        range: DirectOrRelativeTime
      dateAdjustments:
        name: dateAdjustments
        description: The business day adjustment convention when it applies across
          all the payout components. This specification of the business day convention
          and financial business centers is used for adjusting any calculation period
          date if it would otherwise fall on a day that is not a business day in the
          specified business center.
      payout:
        name: payout
        description: The payout specifies the future cashflow computation methodology
          which characterizes a financial product.
      collateral:
        name: collateral
        description: Represents the collateral obligations of a party.
    class_uri: common_domain_model:EconomicTerms
  OptionPayout:
    name: OptionPayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionPayout
    description: ' The option payout specification terms. The associated globalKey
      denotes the ability to associate a hash value to the respective OptionPayout
      instantiation for the purpose of model cross-referencing, in support of functionality
      such as the event effect and the lineage.'
    comments:
    - "Rosetta condition: AsianOptionChoice_averagingStrikeFeature \u2014 if strike\
      \ -> averagingStrikeFeature exists then feature -> averagingFeature is absent"
    - "Rosetta condition: AsianOptionChoice_averagingFeature \u2014 if feature ->\
      \ averagingFeature exists then strike -> averagingStrikeFeature is absent"
    - "Rosetta condition: ClearedPhysicalSettlementExists \u2014 if settlementTerms\
      \ -> physicalSettlementTerms exists and underlier -> Product ->> economicTerms\
      \ -> payout -> InterestRatePayout exists and underlier -> Product ->> economicTerms\
      \ -> payout -> InterestRatePayout count = 2 then settlementTerms -> physicalSettlementTerms\
      \ -> clearedPhysicalSettlement exists"
    - "Rosetta condition: DeliveryCapacity \u2014 if delivery -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> deliveryCapacity exists then delivery -> deliveryCapacity is absent and\
      \ delivery -> periods -> profile -> block -> deliveryCapacity is absent and\
      \ schedule -> schedulePeriod -> deliveryPeriod -> profile -> block -> deliveryCapacity\
      \ is absent else if delivery -> periods -> profile -> block -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> profile -> block -> deliveryCapacity exists then delivery -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent"
    - "Rosetta condition: PriceTimeIntervalQuantity \u2014 if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> priceTimeIntervalQuantity exists then delivery -> periods\
      \ -> profile -> block -> priceTimeIntervalQuantity is absent and schedule ->\
      \ schedulePeriod -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent else if delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> priceTimeIntervalQuantity is absent else if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity exists\
      \ then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent"
    - "Rosetta condition: OptionStylePresent \u2014 exerciseTerms -> style exists"
    - "Rosetta condition: OptionTypePresent \u2014 if underlier -> Product -> NonTransferableProduct\
      \ is absent then optionType exists"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:OptionPayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - buyerSeller
    - feature
    - observationTerms
    - OptionPayout_schedule
    - delivery
    - OptionPayout_underlier
    - OptionPayout_optionType
    - exerciseTerms
    - OptionPayout_strike
    slot_usage:
      schedule:
        name: schedule
        description: Allows the full representation of a payout by defining a set
          of schedule periods. It supports standard schedule customization by expressing
          all the dates, quantities, and pricing data in a non-parametric way.
        range: CalculationSchedule
        multivalued: false
      underlier:
        name: underlier
        description: The financial product underlying the option, which can be of
          any type including an Asset, Basket, Index or a NonTransferableProduct.
      optionType:
        name: optionType
        description: The type of option transaction. From a usage standpoint, put/call
          is the default option type, while payer/receiver indicator is used for options
          on index credit default swaps, consistently with the industry practice.
          Straddle is used for the case of straddle strategy, that combine a call
          and a put with the same strike.
        range: OptionTypeEnum
      strike:
        name: strike
        description: Specifies the strike of the option
        range: OptionStrike
    class_uri: common_domain_model:OptionPayout
  ReturnTerms:
    name: ReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReturnTerms
    description: Specifies the type of return of a performance payout.
    comments:
    - "Rosetta condition: ReturnTermsExists \u2014 if priceReturnTerms -> returnType\
      \ = ReturnTypeEnum -> Total then (priceReturnTerms, dividendReturnTerms) only\
      \ exists else if priceReturnTerms -> returnType = ReturnTypeEnum -> Price then\
      \ priceReturnTerms only exists else priceReturnTerms only exists or dividendReturnTerms\
      \ only exists or varianceReturnTerms only exists or volatilityReturnTerms only\
      \ exists or correlationReturnTerms only exists"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ReturnTerms
    slots:
    - priceReturnTerms
    - dividendReturnTerms
    - varianceReturnTerms
    - volatilityReturnTerms
    - correlationReturnTerms
    class_uri: common_domain_model:ReturnTerms
  PerformancePayout:
    name: PerformancePayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/PerformancePayout
    description: Contains the necessary specifications for all performance payouts,
      encompassing equity return, dividend, variance, volatility and correlation products.
    comments:
    - "Rosetta condition: Underlier \u2014 underlier -> Observable exists"
    - "Rosetta condition: PortfolioOrStraightReturn \u2014 required choice returnTerms,\
      \ portfolioReturnTerms"
    - "Rosetta condition: PortfolioReturnIsMultipleReturns \u2014 if portfolioReturnTerms\
      \ exists then portfolioReturnTerms count > 1"
    - "Rosetta condition: UnderlierOfPortfolioIsBasket \u2014 if portfolioReturnTerms\
      \ -> priceReturnTerms exists then underlier -> Observable -> Basket exists"
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    - "Rosetta condition: NoSharePriceDividendAdjustmentIndex \u2014 if underlier\
      \ -> Observable -> Index exists then returnTerms -> varianceReturnTerms -> sharePriceDividendAdjustment\
      \ is absent and returnTerms -> volatilityReturnTerms -> sharePriceDividendAdjustment\
      \ is absent"
    - "Rosetta condition: NoSharePriceDividendAdjustmentForeignExchange \u2014 if\
      \ underlier -> Observable -> Index -> ForeignExchangeRateIndex exists then returnTerms\
      \ -> varianceReturnTerms -> sharePriceDividendAdjustment is absent and returnTerms\
      \ -> volatilityReturnTerms -> sharePriceDividendAdjustment is absent"
    - "Rosetta condition: CorrelationUnderlierOnlyBasket \u2014 if returnTerms ->\
      \ correlationReturnTerms exists then underlier -> Observable -> Basket exists"
    - "Rosetta condition: EquitySpecificAttributes \u2014 if Qualify_UnderlierObservable_Equity(underlier\
      \ -> Observable) = False then returnTerms -> varianceReturnTerms -> dividendApplicability\
      \ is absent and returnTerms -> varianceReturnTerms -> equityUnderlierProvisions\
      \ is absent and returnTerms -> varianceReturnTerms -> sharePriceDividendAdjustment\
      \ is absent and returnTerms -> volatilityReturnTerms -> dividendApplicability\
      \ is absent and returnTerms -> volatilityReturnTerms -> equityUnderlierProvisions\
      \ is absent and returnTerms -> volatilityReturnTerms -> sharePriceDividendAdjustment\
      \ is absent and returnTerms -> correlationReturnTerms -> dividendApplicability\
      \ is absent and returnTerms -> correlationReturnTerms -> equityUnderlierProvisions\
      \ is absent and returnTerms -> correlationReturnTerms -> sharePriceDividendAdjustment\
      \ is absent"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:PerformancePayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - PerformancePayout_observationTerms
    - PerformancePayout_valuationDates
    - paymentDates
    - PerformancePayout_underlier
    - PerformancePayout_fxFeature
    - returnTerms
    - portfolioReturnTerms
    - PerformancePayout_initialValuationPrice
    - PerformancePayout_interimValuationPrice
    - PerformancePayout_finalValuationPrice
    slot_usage:
      observationTerms:
        name: observationTerms
        description: Defines how and when a performance type option or performance
          type swap is to be observed.
      valuationDates:
        name: valuationDates
        description: Defines how and when a performance type option or performance
          type swap is to be valued, including both interim and final valuation.
      underlier:
        name: underlier
        description: Identifies the underlying product that is referenced for pricing
          of the applicable leg in a swap.  Referenced in the '2018 ISDA CDM Equity
          Confirmation for Security Equity Swap' as Security.
        required: false
      fxFeature:
        name: fxFeature
        multivalued: true
      initialValuationPrice:
        name: initialValuationPrice
        description: Specifies the net initial valuation price(s) of the underlier
          at Performance Payout level. This price can be expressed either as an actual
          amount/currency, as a determination method, or by reference to another value
          specified in the swap document.
      interimValuationPrice:
        name: interimValuationPrice
        description: Specifies the net initial valuation price(s) of the underlier
          at Performance Payout level. This price can be expressed either as an actual
          amount/currency, as a determination method, or by reference to another value
          specified in the swap document.
      finalValuationPrice:
        name: finalValuationPrice
        description: Specifies the net final valuation price(s) of the underlier at
          Performance Payout level. This price can be expressed either as an actual
          amount/currency, as a determination method, or by reference to another value
          specified in the swap document.
    class_uri: common_domain_model:PerformancePayout
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            returnTerms:
              name: returnTerms
              required: true
        - slot_conditions:
            portfolioReturnTerms:
              name: portfolioReturnTerms
              required: true
      description: PortfolioOrStraightReturn
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
  PortfolioReturnTerms:
    name: PortfolioReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/PortfolioReturnTerms
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Specifies an individual type of return of a Performance Payout, when
      such individual return is part of an aggregation of multiple similar returns,
      at Performance Payout level.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:PortfolioReturnTerms
    is_a: ReturnTerms
    slots:
    - priceReturnTerms
    - dividendReturnTerms
    - varianceReturnTerms
    - volatilityReturnTerms
    - correlationReturnTerms
    - PortfolioReturnTerms_payerReceiver
    - PortfolioReturnTerms_underlier
    - PortfolioReturnTerms_quantity
    - PortfolioReturnTerms_initialValuationPrice
    - PortfolioReturnTerms_interimValuationPrice
    - PortfolioReturnTerms_finalValuationPrice
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: Canonical representation of the payer and receiver parties applicable
          to each individual return leg.
        required: true
      underlier:
        name: underlier
        description: Defines the product that is the subject of a tradable product
          definition, an underlying product definition, a physical exercise, a position,
          or other purposes.
        range: Observable
      quantity:
        name: quantity
        description: Specifies a quantity schedule for the underlier, which applies
          to each individual return leg.
        range: NonNegativeQuantitySchedule
      initialValuationPrice:
        name: initialValuationPrice
        description: Specifies the initial valuation price(s) of the underlier. This
          price can be expressed either as an actual amount/currency, as a determination
          method, or by reference to another value specified in the swap document.
      interimValuationPrice:
        name: interimValuationPrice
        description: Specifies the initial valuation price(s) of the underlier. This
          price can be expressed either as an actual amount/currency, as a determination
          method, or by reference to another value specified in the swap document.
      finalValuationPrice:
        name: finalValuationPrice
        description: '2018 ISDA CDM Equity Confirmation for Security Equity Swap:
          Final Price | Specifies the final valuation price of the underlier. This
          price can be expressed either as an actual amount/currency, as a determination
          method, or by reference to another value specified in the swap document.'
    class_uri: common_domain_model:PortfolioReturnTerms
  NonTransferableProduct:
    name: NonTransferableProduct
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonTransferableProduct
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"UnderlierForOptionOrForwardProduct","description":"Extracts
          the underlier from an option or a forward.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"}],"output":{"name":"underlierProduct","type":"Underlier","cardinality":"1..1"}},{"name":"FXFarLeg","description":"Extracts
          the far leg of an FX swap (deliverable or not) based on two criteria: the
          forward payout with the latest value date or the forward payout with the
          latest settlement date.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"}],"output":{"name":"nearLegPayout","type":"SettlementPayout","cardinality":"0..1"}}]'
    description: A data type to specify the financial product's economic terms, alongside
      the product identification and product taxonomy. The non-transferable product
      data type represents a product that can be traded (as part of a TradableProduct)
      but cannot be transferred to others.  It is meant to be used across the pre-execution,
      execution and (as part of the Contract) post-execution lifecycle contexts.
    comments:
    - "Rosetta condition: PrimaryAssetClass \u2014 if economicTerms -> nonStandardisedTerms\
      \ = True then taxonomy -> primaryAssetClass exists"
    - "Rosetta func: UnderlierForOptionOrForwardProduct \u2014 Extracts the underlier\
      \ from an option or a forward."
    - "Rosetta func: FXFarLeg \u2014 Extracts the far leg of an FX swap (deliverable\
      \ or not) based on two criteria: the forward payout with the latest value date\
      \ or the forward payout with the latest settlement date."
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:NonTransferableProduct
    slots:
    - NonTransferableProduct_identifier
    - NonTransferableProduct_taxonomy
    - economicTerms
    slot_usage:
      identifier:
        name: identifier
        description: 'Comprises a identifier and a source to uniquely identify the
          nonTransferableProduct. '
        range: ProductIdentifier
        required: false
        inlined_as_list: true
      taxonomy:
        name: taxonomy
        description: Specifies the product taxonomy, which is composed of a taxonomy
          value and a taxonomy source.
        range: ProductTaxonomy
    class_uri: common_domain_model:NonTransferableProduct
  TradeLot:
    name: TradeLot
    definition_uri: https://w3id.org/lmodel/common_domain_model/TradeLot
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FilterTradeLot","description":"Filter list of TradeLot based
          on TradeLot->lotIdentifier.","inputs":[{"name":"tradeLots","type":"TradeLot","cardinality":"0..*"},{"name":"lotIdentifier","type":"Identifier","cardinality":"0..*"}],"output":{"name":"filteredTradeLots","type":"TradeLot","cardinality":"0..*"}},{"name":"AddTradeLot","description":"Add
          a TradeLot to an existing list of TradeLots.","inputs":[{"name":"tradableProduct","type":"TradableProduct","cardinality":"1..1"},{"name":"newTradeLot","type":"TradeLot","cardinality":"1..1"}],"output":{"name":"updatedTradableProduct","type":"TradableProduct","cardinality":"1..1"}},{"name":"ReplaceTradeLot","description":"Replace
          TradeLot in with matching TradeLot->lotIdentifier.","inputs":[{"name":"tradeLots","type":"TradeLot","cardinality":"0..*"},{"name":"newTradeLot","type":"TradeLot","cardinality":"1..1"}],"output":{"name":"mergedTradeLots","type":"TradeLot","cardinality":"0..*"}},{"name":"CompareTradeLot","description":"Compare
          the Quantity in TradeLot 1 to the Quantity (with the same unit of amount)
          in TradeLot 2, based on the CompareOp enum.","inputs":[{"name":"tradeLot1","type":"TradeLot","cardinality":"1..1"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"tradeLot2","type":"TradeLot","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"CompareTradeLotToAmount","description":"Compare
          the Quantity amount in TradeLot to the given amount (regardless of unit
          of amount), based on the CompareOp enum.","inputs":[{"name":"tradeLot","type":"TradeLot","cardinality":"1..1"},{"name":"op","type":"CompareOp","cardinality":"1..1"},{"name":"amount","type":"number","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"PriceQuantityTriangulation","description":"Defines
          all the scenarios which triangulation can be helpful validation between
          Prices and Quantities.","inputs":[{"name":"tradeLots","type":"TradeLot","cardinality":"0..*"}],"output":{"name":"success","type":"boolean","cardinality":"1..1"}}]'
    description: Specifies the price and quantity of a trade lot, where the same product
      could be traded multiple times with the same counterparty but in different lots
      (at a different date, in a different quantity and at a different price). One
      trade lot combined with a product definition specifies the entire economics
      of a trade. The lifecycle mechanics of each such trade lot (e.g. cashflow payments)
      is independent of the other lots.
    comments:
    - "Rosetta func: FilterTradeLot \u2014 Filter list of TradeLot based on TradeLot->lotIdentifier."
    - "Rosetta func: AddTradeLot \u2014 Add a TradeLot to an existing list of TradeLots."
    - "Rosetta func: ReplaceTradeLot \u2014 Replace TradeLot in with matching TradeLot->lotIdentifier."
    - "Rosetta func: CompareTradeLot \u2014 Compare the Quantity in TradeLot 1 to\
      \ the Quantity (with the same unit of amount) in TradeLot 2, based on the CompareOp\
      \ enum."
    - "Rosetta func: CompareTradeLotToAmount \u2014 Compare the Quantity amount in\
      \ TradeLot to the given amount (regardless of unit of amount), based on the\
      \ CompareOp enum."
    - "Rosetta func: PriceQuantityTriangulation \u2014 Defines all the scenarios which\
      \ triangulation can be helpful validation between Prices and Quantities."
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:TradeLot
    slots:
    - TradeLot_lotIdentifier
    - TradeLot_priceQuantity
    slot_usage:
      lotIdentifier:
        name: lotIdentifier
        description: Specifies one or more identifiers for the lot, if any.
        multivalued: true
      priceQuantity:
        name: priceQuantity
        description: 'Specifies the settlement characteristics of a trade lot: price,
          quantity, observable (optionally) and the settlement terms. This attribute
          has a multiple cardinality to allow to specify the price, quantity and observable
          of different legs in a single, composite product (e.g. a Swap).'
    class_uri: common_domain_model:TradeLot
  TradableProduct:
    name: TradableProduct
    definition_uri: https://w3id.org/lmodel/common_domain_model/TradableProduct
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"AddTradeLot","description":"Add a TradeLot to an existing
          list of TradeLots.","inputs":[{"name":"tradableProduct","type":"TradableProduct","cardinality":"1..1"},{"name":"newTradeLot","type":"TradeLot","cardinality":"1..1"}],"output":{"name":"updatedTradableProduct","type":"TradableProduct","cardinality":"1..1"}}]'
    description: Definition of a product as ready to be traded, i.e. included in an
      execution or contract, by associating a specific price and quantity to this
      product plus an (optional) mechanism for any potential future quantity adjustment.
    comments:
    - "Rosetta condition: PriceQuantityTriangulation \u2014 PriceQuantityTriangulation(tradeLot)\
      \ = True"
    - "Rosetta condition: NotionalAdjustment \u2014 if adjustment exists then product\
      \ -> economicTerms -> payout -> PerformancePayout -> returnTerms -> priceReturnTerms\
      \ exists or product -> economicTerms -> payout -> PerformancePayout exists"
    - "Rosetta condition: PerformancePayout_ExtraordinaryDividendsParty \u2014 if\
      \ product -> economicTerms -> payout -> PerformancePayout -> returnTerms ->\
      \ dividendReturnTerms -> extraordinaryDividendsParty exists then ancillaryParty\
      \ -> role contains AncillaryRoleEnum -> ExtraordinaryDividendsParty and if ancillaryParty\
      \ -> role contains AncillaryRoleEnum -> ExtraordinaryDividendsParty then product\
      \ -> economicTerms -> payout -> PerformancePayout -> returnTerms -> dividendReturnTerms\
      \ -> extraordinaryDividendsParty exists"
    - "Rosetta condition: OptionPayout_PredeterminedClearingOrganizationParty \u2014\
      \ if product -> economicTerms -> payout -> OptionPayout -> settlementTerms ->\
      \ physicalSettlementTerms -> predeterminedClearingOrganizationParty exists then\
      \ ancillaryParty -> role contains AncillaryRoleEnum -> PredeterminedClearingOrganizationParty"
    - "Rosetta condition: ForwardPayout_PredeterminedClearingOrganizationParty \u2014\
      \ if product -> economicTerms -> payout -> SettlementPayout -> settlementTerms\
      \ -> physicalSettlementTerms -> predeterminedClearingOrganizationParty exists\
      \ then ancillaryParty -> role contains AncillaryRoleEnum -> PredeterminedClearingOrganizationParty"
    - "Rosetta condition: PredeterminedClearingOrganizationParty \u2014 if ancillaryParty\
      \ -> role contains AncillaryRoleEnum -> PredeterminedClearingOrganizationParty\
      \ then product -> economicTerms -> payout -> SettlementPayout -> settlementTerms\
      \ -> physicalSettlementTerms -> predeterminedClearingOrganizationParty exists\
      \ or product -> economicTerms -> payout -> OptionPayout -> settlementTerms ->\
      \ physicalSettlementTerms -> predeterminedClearingOrganizationParty exists"
    - "Rosetta condition: ExerciseNoticeReceiverPartyManual \u2014 if product -> economicTerms\
      \ -> payout -> OptionPayout -> exerciseTerms -> exerciseProcedure -> manualExercise\
      \ -> exerciseNotice -> exerciseNoticeReceiver exists then ancillaryParty ->\
      \ role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyManual and if\
      \ ancillaryParty -> role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyManual\
      \ then product -> economicTerms -> payout -> OptionPayout -> exerciseTerms ->\
      \ exerciseProcedure -> manualExercise -> exerciseNotice -> exerciseNoticeReceiver\
      \ exists"
    - "Rosetta condition: ExerciseNoticeReceiverPartyOptionalEarlyTermination \u2014\
      \ if product -> economicTerms -> terminationProvision -> earlyTerminationProvision\
      \ -> optionalEarlyTermination -> exerciseNotice -> exerciseNoticeReceiver exists\
      \ then ancillaryParty -> role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyOptionalEarlyTermination\
      \ and if ancillaryParty -> role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyOptionalEarlyTermination\
      \ then product -> economicTerms -> terminationProvision -> earlyTerminationProvision\
      \ -> optionalEarlyTermination -> exerciseNotice -> exerciseNoticeReceiver exists"
    - "Rosetta condition: ExerciseNoticeReceiverPartyCancelableProvision \u2014 if\
      \ product -> economicTerms -> terminationProvision -> cancelableProvision ->\
      \ exerciseNotice -> exerciseNoticeReceiver exists then ancillaryParty -> role\
      \ contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyCancelableProvision\
      \ and if ancillaryParty -> role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyCancelableProvision\
      \ then product -> economicTerms -> terminationProvision -> cancelableProvision\
      \ -> exerciseNotice -> exerciseNoticeReceiver exists"
    - "Rosetta condition: ExerciseNoticeReceiverPartyExtendibleProvision \u2014 if\
      \ product -> economicTerms -> terminationProvision -> extendibleProvision ->\
      \ exerciseNotice -> exerciseNoticeReceiver exists then ancillaryParty -> role\
      \ contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyExtendibleProvision\
      \ and if ancillaryParty -> role contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyExtendibleProvision\
      \ then product -> economicTerms -> terminationProvision -> extendibleProvision\
      \ -> exerciseNotice -> exerciseNoticeReceiver exists"
    - "Rosetta condition: CalculationAgentIndependent \u2014 if product -> economicTerms\
      \ -> calculationAgent -> calculationAgentParty exists then ancillaryParty ->\
      \ role contains AncillaryRoleEnum -> CalculationAgentIndependent and if ancillaryParty\
      \ -> role contains AncillaryRoleEnum -> CalculationAgentIndependent then product\
      \ -> economicTerms -> calculationAgent -> calculationAgentParty exists"
    - "Rosetta condition: CalculationAgentOptionalEarlyTermination \u2014 if product\
      \ -> economicTerms -> terminationProvision -> earlyTerminationProvision -> optionalEarlyTermination\
      \ -> calculationAgent -> calculationAgentParty exists then ancillaryParty ->\
      \ role contains AncillaryRoleEnum -> CalculationAgentOptionalEarlyTermination\
      \ and if ancillaryParty -> role contains AncillaryRoleEnum -> CalculationAgentOptionalEarlyTermination\
      \ then product -> economicTerms -> terminationProvision -> earlyTerminationProvision\
      \ -> optionalEarlyTermination -> calculationAgent -> calculationAgentParty exists"
    - "Rosetta condition: CalculationAgentMandatoryEarlyTermination \u2014 if product\
      \ -> economicTerms -> terminationProvision -> earlyTerminationProvision -> mandatoryEarlyTermination\
      \ -> calculationAgent -> calculationAgentParty exists then ancillaryParty ->\
      \ role contains AncillaryRoleEnum -> CalculationAgentMandatoryEarlyTermination\
      \ and if ancillaryParty -> role contains AncillaryRoleEnum -> CalculationAgentMandatoryEarlyTermination\
      \ then product -> economicTerms -> terminationProvision -> earlyTerminationProvision\
      \ -> mandatoryEarlyTermination -> calculationAgent -> calculationAgentParty\
      \ exists"
    - "Rosetta func: AddTradeLot \u2014 Add a TradeLot to an existing list of TradeLots."
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:TradableProduct
    close_mappings:
    - gist:ProductSpecification
    slots:
    - TradableProduct_product
    - tradeLot
    - TradableProduct_counterparty
    - TradableProduct_ancillaryParty
    - TradableProduct_adjustment
    slot_usage:
      product:
        name: product
        description: The underlying product to be included in a contract or execution.
      counterparty:
        name: counterparty
        description: Specifies the parties which are the two counterparties to the
          transaction.  The product is agnostic to the actual parties to the transaction,
          with the party references abstracted away from the product definition and
          replaced by the counterparty enum (e.g. CounterpartyEnum values Party1 or
          Party2). The counterparty enum can then be positioned in the product (e.g.
          to specify which counterparty is the payer, receiver etc) and this counterparties
          attribute, which is positioned outside of the product definition, allows
          the counterparty enum to be associated with an actual party reference.
      ancillaryParty:
        name: ancillaryParty
        description: Specifies the parties with ancillary roles in the transaction.
          The product is agnostic to the actual parties involved in the transaction,
          with the party references abstracted away from the product definition and
          replaced by the AncillaryRoleEnum. The AncillaryRoleEnum can then be positioned
          in the product and this AncillaryParty type, which is positioned outside
          of the product definition, allows the AncillaryRoleEnum to be associated
          with an actual party reference.
        range: AncillaryParty
        multivalued: true
      adjustment:
        name: adjustment
        description: 'Specifies the conditions that govern the adjustment to the quantity
          of a product being traded: e.g. execution, portfolio rebalancing etc. It
          is typically used in the context of Equity Swaps.'
    class_uri: common_domain_model:TradableProduct
  ConstituentWeight:
    name: ConstituentWeight
    definition_uri: https://w3id.org/lmodel/common_domain_model/ConstituentWeight
    description: A class describing the weight of each of the underlier constituent
      within the basket, either in absolute or relative terms.
    comments:
    - "Rosetta condition: BasketPercentage \u2014 if basketPercentage exists then\
      \ basketPercentage >= 0.0 and basketPercentage <= 1.0"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ConstituentWeight
    slots:
    - openUnits
    - basketPercentage
    class_uri: common_domain_model:ConstituentWeight
    rules:
    - preconditions:
        slot_conditions:
          basketPercentage:
            name: basketPercentage
            required: true
      postconditions:
        slot_conditions:
          basketPercentage:
            name: basketPercentage
            minimum_value: 0.0
            maximum_value: 1.0
      description: FpML specifies basketPercentage as a RestrictedPercentage type,
        meaning that the value needs to be comprised between 0 and 1.
  SettlementPayout:
    name: SettlementPayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementPayout
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_AssetFlowFromSettlementPayout","description":"Generates
          two opposite cashflows that correspond to a settlement payout. One leg is
          the asset leg, that settles the asset according to the quantity, direction
          and date defined in the settlement payout. The other is the price leg, that
          settles the price as a currency amount going in the opposite direction.
          The function''s applicability is limited on purpose to a single asset with
          a single price and quantity specified.","inputs":[{"name":"payout","type":"SettlementPayout","cardinality":"1..1"}],"output":{"name":"cashflows","type":"AssetFlow","cardinality":"2..2"}},{"name":"FXFarLeg","description":"Extracts
          the far leg of an FX swap (deliverable or not) based on two criteria: the
          forward payout with the latest value date or the forward payout with the
          latest settlement date.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"}],"output":{"name":"nearLegPayout","type":"SettlementPayout","cardinality":"0..1"}}]'
    description: Represents a forward settling payout. The underlier attribute captures
      the underlying payout, which is settled according to the settlementTerms attribute
      (which is part of PayoutBase). Both FX Spot and FX Forward should use this component.
    comments:
    - "Rosetta condition: Underlier \u2014 underlier -> Product -> NonTransferableProduct\
      \ is absent"
    - "Rosetta condition: Basket \u2014 if underlier -> Observable -> Basket exists\
      \ then (underlier -> Observable -> Basket -> basketConstituent extract Asset\
      \ exists ) all = True"
    - "Rosetta condition: Index \u2014 if underlier -> Observable -> Index exists\
      \ then settlementTerms -> cashSettlementTerms exists"
    - "Rosetta condition: SettlementTerms \u2014 if underlier -> Observable -> Asset\
      \ -> Cash exists then settlementTerms exists"
    - "Rosetta condition: DeliveryCapacity \u2014 if delivery -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> deliveryCapacity exists then delivery -> deliveryCapacity is absent and\
      \ delivery -> periods -> profile -> block -> deliveryCapacity is absent and\
      \ schedule -> schedulePeriod -> deliveryPeriod -> profile -> block -> deliveryCapacity\
      \ is absent else if delivery -> periods -> profile -> block -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> profile -> block -> deliveryCapacity exists then delivery -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent"
    - "Rosetta condition: PriceTimeIntervalQuantity \u2014 if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> priceTimeIntervalQuantity exists then delivery -> periods\
      \ -> profile -> block -> priceTimeIntervalQuantity is absent and schedule ->\
      \ schedulePeriod -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent else if delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> priceTimeIntervalQuantity is absent else if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity exists\
      \ then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent"
    - "Rosetta func: Create_AssetFlowFromSettlementPayout \u2014 Generates two opposite\
      \ cashflows that correspond to a settlement payout. One leg is the asset leg,\
      \ that settles the asset according to the quantity, direction and date defined\
      \ in the settlement payout. The other is the price leg, that settles the price\
      \ as a currency amount going in the opposite direction. The function's applicability\
      \ is limited on purpose to a single asset with a single price and quantity specified."
    - "Rosetta func: FXFarLeg \u2014 Extracts the far leg of an FX swap (deliverable\
      \ or not) based on two criteria: the forward payout with the latest value date\
      \ or the forward payout with the latest settlement date."
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:SettlementPayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - SettlementPayout_underlier
    - SettlementPayout_deliveryTerm
    - delivery
    - SettlementPayout_schedule
    slot_usage:
      underlier:
        name: underlier
        description: The underlying financial product that will be physically or cash
          settled, which can be of any type, eg an asset such as cash or a security,
          or the cash settlement of an index rate.
      deliveryTerm:
        name: deliveryTerm
        description: Also called contract month or delivery month. However, it's not
          always a month. It is usually expressed using a code, e.g. Z23 would be
          the Dec 2023 contract, (Z = December). For crude oil, the corresponding
          contract might be called CLZ23.
      schedule:
        name: schedule
        description: Allows the full representation of a payout by defining a set
          of schedule periods. It supports standard schedule customization by expressing
          all the dates, quantities, and pricing data in a non-parametric way.
        range: CalculationSchedule
        multivalued: false
    class_uri: common_domain_model:SettlementPayout
  CalculationSchedule:
    name: CalculationSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationSchedule
    description: A class that allows the full representation of a payout by defining
      a set of schedule periods. It supports standard schedule customization by expressing
      all the dates, quantities, and pricing data in a non-parametric way.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:CalculationSchedule
    slots:
    - schedulePeriod
    class_uri: common_domain_model:CalculationSchedule
  SchedulePeriod:
    name: SchedulePeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/SchedulePeriod
    description: A class that defines the period of a schedule. The period contains
      a set of start and end dates, quantities, fixing, and pricing data.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:SchedulePeriod
    slots:
    - SchedulePeriod_calculationPeriod
    - SchedulePeriod_paymentDate
    - fixingPeriod
    - deliveryPeriod
    slot_usage:
      calculationPeriod:
        name: calculationPeriod
        description: Period for which the payment is generated.
        range: DateRange
      paymentDate:
        name: paymentDate
        description: Adjusted payment date.
        range: date
        required: true
    class_uri: common_domain_model:SchedulePeriod
  FixedPricePayout:
    name: FixedPricePayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/FixedPricePayout
    description: Represents a fixed price payout. There is no underlier associated
      with this payout type and is based on fixed pricing per a given unit (e.g. in
      commodities price per barrel)
    comments:
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:FixedPricePayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - FixedPricePayout_paymentDates
    - fixedPrice
    - FixedPricePayout_schedule
    slot_usage:
      paymentDates:
        name: paymentDates
        description: Specifies the parameters to generate the payment date schedule,
          either through a parametric representation or by reference to specified
          dates.
      schedule:
        name: schedule
        description: Allows the full representation of a payout by defining a set
          of schedule periods. It supports standard schedule customization by expressing
          all the dates, quantities, and pricing data in a non-parametric way.
        range: CalculationSchedule
        multivalued: false
    class_uri: common_domain_model:FixedPricePayout
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
  CancelableProvision:
    name: CancelableProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/CancelableProvision
    description: 'A data defining:  the right of a party to cancel a swap transaction
      on the specified exercise dates. The provision is for ''walk-away'' cancellation
      (i.e. the fair value of the swap is not paid). A fee payable on exercise can
      be specified. As a difference from the FpML construct, the canonical model extends
      the BuyerSeller class.'
    comments:
    - "Rosetta condition: EffectiveDate \u2014 optional choice effectiveDate, effectivePeriod"
    - "Rosetta condition: CancelableProvisionExerciseNoticeReceiverParty \u2014 if\
      \ exerciseNotice -> exerciseNoticeReceiver exists then exerciseNotice -> exerciseNoticeReceiver\
      \ = AncillaryRoleEnum -> ExerciseNoticeReceiverPartyCancelableProvision"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:CancelableProvision
    close_mappings:
    - fpml_5_10:CancelableProvision
    is_a: BuyerSeller
    slots:
    - buyer
    - seller
    - exerciseNotice
    - followUpConfirmation
    - cancelableProvisionAdjustedDates
    - finalCalculationPeriodDateAdjustment
    - initialFee
    - callingParty
    - earliestDate
    - expirationDate
    - CancelableProvision_effectiveDate
    - effectivePeriod
    - earliestCancellationTime
    - latestCancelationTime
    - CancelableProvision_exerciseTerms
    slot_usage:
      effectiveDate:
        name: effectiveDate
        description: The effective date if cancelation is invoked otherwise the cancellation
          period defines the cancellation date.
        range: AdjustableOrRelativeDates
      exerciseTerms:
        name: exerciseTerms
        description: The exercise terms associated with the cancelable provision,
          including details such as exercise style, exercise fees, and any other relevant
          conditions or terms governing the cancellation of the swap transaction.
    class_uri: common_domain_model:CancelableProvision
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            effectiveDate:
              name: effectiveDate
              required: true
        - slot_conditions:
            effectivePeriod:
              name: effectivePeriod
              required: true
      description: Must select one of predefined cancellation types of effectiveDate
        or effectivePeriod.
  CancelableProvisionAdjustedDates:
    name: CancelableProvisionAdjustedDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/CancelableProvisionAdjustedDates
    description: 'A data to:  define the adjusted dates for a cancelable provision
      on a swap transaction.'
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:CancelableProvisionAdjustedDates
    slots:
    - cancellationEvent
    class_uri: common_domain_model:CancelableProvisionAdjustedDates
  CancellationEvent:
    name: CancellationEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/CancellationEvent
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: The adjusted dates for a specific cancellation date, including the
      adjusted exercise date and adjusted termination date.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:CancellationEvent
    close_mappings:
    - fpml_5_10:CancellationEvent
    slots:
    - CancellationEvent_adjustedExerciseDate
    - adjustedEarlyTerminationDate
    slot_usage:
      adjustedExerciseDate:
        name: adjustedExerciseDate
        description: The date on which option exercise takes place. This date should
          already be adjusted for any applicable business day convention.
    class_uri: common_domain_model:CancellationEvent
  EarlyTerminationEvent:
    name: EarlyTerminationEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/EarlyTerminationEvent
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data to:  define the adjusted dates associated with an early termination
      provision.'
    comments:
    - "Rosetta condition: FpML_ird_39 \u2014 adjustedExerciseDate <= adjustedEarlyTerminationDate"
    - "Rosetta condition: FpML_ird_40 \u2014 adjustedExerciseDate <= adjustedCashSettlementValuationDate"
    - "Rosetta condition: FpML_ird_41 \u2014 adjustedCashSettlementValuationDate <=\
      \ adjustedCashSettlementPaymentDate"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:EarlyTerminationEvent
    slots:
    - EarlyTerminationEvent_adjustedExerciseDate
    - adjustedEarlyTerminationDate
    - EarlyTerminationEvent_adjustedCashSettlementValuationDate
    - EarlyTerminationEvent_adjustedCashSettlementPaymentDate
    - adjustedExerciseFeePaymentDate
    slot_usage:
      adjustedExerciseDate:
        name: adjustedExerciseDate
        description: The date on which option exercise takes place. This date should
          already be adjusted for any applicable business day convention.
      adjustedCashSettlementValuationDate:
        name: adjustedCashSettlementValuationDate
        required: true
      adjustedCashSettlementPaymentDate:
        name: adjustedCashSettlementPaymentDate
        description: The date on which the cash settlement amount is paid. This date
          should already be adjusted for any applicable business date convention.
        required: true
    class_uri: common_domain_model:EarlyTerminationEvent
    rules:
    - preconditions: {}
      description: FpML validation rule ird-39 - AdjustedExerciseDate must be before
        or equal to adjustedEarlyTerminationDate.
      comments:
      - 'Rosetta comparison: adjustedExerciseDate <= adjustedEarlyTerminationDate'
    - preconditions: {}
      description: FpML validation rule ird-40 - AdjustedExerciseDate must be before
        or equal to adjustedCashSettlementValuationDate.
      comments:
      - 'Rosetta comparison: adjustedExerciseDate <= adjustedCashSettlementValuationDate'
    - preconditions: {}
      description: FpML validation rule ird-41 - AdjustedCashSettlementValuationDate
        must be before or equal to adjustedCashSettlementPaymentDate.
      comments:
      - 'Rosetta comparison: adjustedCashSettlementValuationDate <= adjustedCashSettlementPaymentDate'
  EarlyTerminationProvision:
    name: EarlyTerminationProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/EarlyTerminationProvision
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data defining:  an early termination provision for a swap. This
      early termination is at fair value, i.e. on termination the fair value of the
      product must be settled between the parties.'
    comments:
    - "Rosetta condition: MandatoryEarlyTermination \u2014 (mandatoryEarlyTermination\
      \ exists or optionalEarlyTermination exists) or (mandatoryEarlyTermination exists\
      \ and optionalEarlyTermination exists)"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:EarlyTerminationProvision
    slots:
    - mandatoryEarlyTermination
    - mandatoryEarlyTerminationDateTenor
    - optionalEarlyTermination
    - optionalEarlyTerminationParameters
    class_uri: common_domain_model:EarlyTerminationProvision
  ExercisePeriod:
    name: ExercisePeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExercisePeriod
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: This defines the time interval to the start of the exercise period,
      i.e. the earliest exercise date, and the frequency of subsequent exercise dates
      (if any).
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExercisePeriod
    slots:
    - earliestExerciseDateTenor
    - exerciseFrequency
    class_uri: common_domain_model:ExercisePeriod
  ExtendibleProvision:
    name: ExtendibleProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExtendibleProvision
    description: 'A data defining:  an option to extend an existing swap transaction
      on the specified exercise dates for a term ending on the specified new termination
      date. As a difference from FpML, it extends the BuyerSeller class, which represents
      the BuyerSeller.model.'
    comments:
    - "Rosetta condition: ExtendibleProvisionExerciseNoticeReceiverParty \u2014 if\
      \ exerciseNotice -> exerciseNoticeReceiver exists then exerciseNotice -> exerciseNoticeReceiver\
      \ = AncillaryRoleEnum -> ExerciseNoticeReceiverPartyExtendibleProvision"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExtendibleProvision
    is_a: BuyerSeller
    slots:
    - buyer
    - seller
    - exerciseNotice
    - ExtendibleProvision_followUpConfirmation
    - extendibleProvisionAdjustedDates
    - callingParty
    - singlePartyOption
    - ExtendibleProvision_noticeDeadlinePeriod
    - noticeDeadlineDateTime
    - extensionTerm
    - extensionPeriod
    - ExtendibleProvision_exerciseTerms
    slot_usage:
      followUpConfirmation:
        name: followUpConfirmation
        required: false
      noticeDeadlinePeriod:
        name: noticeDeadlinePeriod
        description: Defines the minimum period before a contract is scheduled to
          terminate that notice can be given that it will terminate beyond the scheduled
          termination date.
        range: RelativeDateOffset
      exerciseTerms:
        name: exerciseTerms
        description: The exercise terms associated with the extendible provision,
          including details such as exercise style, exercise fees, and any other relevant
          conditions or terms governing the extension of the swap transaction.
    class_uri: common_domain_model:ExtendibleProvision
  ExtendibleProvisionAdjustedDates:
    name: ExtendibleProvisionAdjustedDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExtendibleProvisionAdjustedDates
    description: 'A data defining:  the adjusted dates associated with a provision
      to extend a swap.'
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExtendibleProvisionAdjustedDates
    slots:
    - extensionEvent
    class_uri: common_domain_model:ExtendibleProvisionAdjustedDates
  ExtensionEvent:
    name: ExtensionEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExtensionEvent
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data to:  define the adjusted dates associated with an individual
      extension event.'
    comments:
    - "Rosetta condition: FpML_ird_42 \u2014 adjustedExerciseDate < adjustedExtendedTerminationDate"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExtensionEvent
    slots:
    - ExtensionEvent_adjustedExerciseDate
    - adjustedExtendedTerminationDate
    slot_usage:
      adjustedExerciseDate:
        name: adjustedExerciseDate
        description: The date on which option exercise takes place. This date should
          already be adjusted for any applicable business day convention.
    class_uri: common_domain_model:ExtensionEvent
    rules:
    - preconditions: {}
      description: FpML validation rule ird-42 - adjustedExerciseDate must be before
        adjustedExtendedTerminationDate.
      comments:
      - 'Rosetta comparison: adjustedExerciseDate < adjustedExtendedTerminationDate'
  MandatoryEarlyTermination:
    name: MandatoryEarlyTermination
    definition_uri: https://w3id.org/lmodel/common_domain_model/MandatoryEarlyTermination
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data to:  define an early termination provision for which exercise
      is mandatory.'
    comments:
    - "Rosetta condition: MandatoryEarlyTerminationCalculationAgent \u2014 if calculationAgent\
      \ -> calculationAgentParty exists then calculationAgent -> calculationAgentParty\
      \ = AncillaryRoleEnum -> CalculationAgentMandatoryEarlyTermination"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:MandatoryEarlyTermination
    slots:
    - mandatoryEarlyTerminationDate
    - MandatoryEarlyTermination_calculationAgent
    - cashSettlement
    - mandatoryEarlyTerminationAdjustedDates
    slot_usage:
      calculationAgent:
        name: calculationAgent
        description: The ISDA Calculation Agent responsible for performing duties
          associated with an optional early termination.
        required: true
    class_uri: common_domain_model:MandatoryEarlyTermination
  MandatoryEarlyTerminationAdjustedDates:
    name: MandatoryEarlyTerminationAdjustedDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/MandatoryEarlyTerminationAdjustedDates
    description: 'A data defining:  the adjusted dates associated with a mandatory
      early termination provision.'
    comments:
    - "Rosetta condition: FpML_ird_44 \u2014 adjustedEarlyTerminationDate <= adjustedCashSettlementValuationDate\
      \ and adjustedCashSettlementValuationDate <= adjustedCashSettlementPaymentDate"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:MandatoryEarlyTerminationAdjustedDates
    slots:
    - adjustedEarlyTerminationDate
    - MandatoryEarlyTerminationAdjustedDates_adjustedCashSettlementValuationDate
    - MandatoryEarlyTerminationAdjustedDates_adjustedCashSettlementPaymentDate
    slot_usage:
      adjustedCashSettlementValuationDate:
        name: adjustedCashSettlementValuationDate
        required: true
      adjustedCashSettlementPaymentDate:
        name: adjustedCashSettlementPaymentDate
        description: The date on which the cash settlement amount is paid. This date
          should already be adjusted for any applicable business date convention.
        required: true
    class_uri: common_domain_model:MandatoryEarlyTerminationAdjustedDates
    rules:
    - preconditions: {}
      description: FpML validation rule ird-44 - AdjustedEarlyTerminationDate must
        be before or equal to adjustedCashSettlementValuationDate must be before or
        the same as adjustedCashSettlementPaymentDate
      comments:
      - 'Rosetta comparison: adjustedEarlyTerminationDate <= adjustedCashSettlementValuationDate'
      - 'Rosetta comparison: adjustedCashSettlementValuationDate <= adjustedCashSettlementPaymentDate'
  OptionalEarlyTermination:
    name: OptionalEarlyTermination
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionalEarlyTermination
    description: 'A data defining:  an early termination provision where either or
      both parties have the right to exercise.'
    comments:
    - "Rosetta condition: OptionalEarlyTerminationExerciseNoticeReceiverParty \u2014\
      \ if exerciseNotice -> exerciseNoticeReceiver exists then exerciseNotice ->\
      \ exerciseNoticeReceiver contains AncillaryRoleEnum -> ExerciseNoticeReceiverPartyOptionalEarlyTermination"
    - "Rosetta condition: MandatoryEarlyTerminationCalculationAgent \u2014 if calculationAgent\
      \ -> calculationAgentParty exists then calculationAgent -> calculationAgentParty\
      \ = AncillaryRoleEnum -> CalculationAgentOptionalEarlyTermination"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:OptionalEarlyTermination
    slots:
    - OptionalEarlyTermination_singlePartyOption
    - mutualEarlyTermination
    - OptionalEarlyTermination_exerciseNotice
    - OptionalEarlyTermination_followUpConfirmation
    - OptionalEarlyTermination_calculationAgent
    - OptionalEarlyTermination_cashSettlement
    - optionalEarlyTerminationAdjustedDates
    - OptionalEarlyTermination_exerciseTerms
    slot_usage:
      singlePartyOption:
        name: singlePartyOption
        description: If optional early termination is not available to both parties
          then this component specifies the buyer and seller of the option. In FpML,
          this attribute is of type SinglePsrtyOption, which actually consists of
          the BuyerSeller.model.
        range: BuyerSeller
      exerciseNotice:
        name: exerciseNotice
        multivalued: true
      followUpConfirmation:
        name: followUpConfirmation
        required: false
      calculationAgent:
        name: calculationAgent
        description: The ISDA Calculation Agent responsible for performing duties
          associated with an optional early termination.
      cashSettlement:
        name: cashSettlement
        required: false
      exerciseTerms:
        name: exerciseTerms
        description: The exercise terms associated with the optional early termination,
          including details such as exercise style, exercise fees, and any other relevant
          conditions or terms.
    class_uri: common_domain_model:OptionalEarlyTermination
  OptionalEarlyTerminationAdjustedDates:
    name: OptionalEarlyTerminationAdjustedDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionalEarlyTerminationAdjustedDates
    description: 'A data defining:  the adjusted dates associated with an optional
      early termination provision.'
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:OptionalEarlyTerminationAdjustedDates
    slots:
    - earlyTerminationEvent
    class_uri: common_domain_model:OptionalEarlyTerminationAdjustedDates
  AveragingFeature:
    name: AveragingFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingFeature
    description: As per ISDA 2002 Definitions.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:AveragingFeature
    close_mappings:
    - fpml_5_10:AveragingFeature
    slots:
    - averagingCalculation
    - averagingInOut
    - strikeFactor
    - averagingPeriodIn
    - averagingPeriodOut
    class_uri: common_domain_model:AveragingFeature
  AveragingCalculation:
    name: AveragingCalculation
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingCalculation
    description: Defines parameters for use in cases when a valuation or other term
      is based on an average of market observations.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:AveragingCalculation
    close_mappings:
    - fpml_5_10:AveragingCalculation
    slots:
    - AveragingCalculation_averagingMethod
    - AveragingCalculation_precision
    slot_usage:
      averagingMethod:
        name: averagingMethod
        range: AveragingCalculationMethod
        required: true
      precision:
        name: precision
        description: 'Rounding applied to the average calculation. '
        range: Rounding
        required: true
    class_uri: common_domain_model:AveragingCalculation
  AveragingStrikeFeature:
    name: AveragingStrikeFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingStrikeFeature
    description: Defines the terms required to calculate the average observations
      associated with an averaging strike.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:AveragingStrikeFeature
    close_mappings:
    - fpml_5_10:AveragingStrikeFeature
    slots:
    - averagingCalculation
    - AveragingStrikeFeature_observationTerms
    slot_usage:
      observationTerms:
        name: observationTerms
        description: 'Class containing terms that are associated with observing a
          price/benchmark/index across either single or multple observations. '
        required: true
    class_uri: common_domain_model:AveragingStrikeFeature
  Barrier:
    name: Barrier
    definition_uri: https://w3id.org/lmodel/common_domain_model/Barrier
    description: As per ISDA 2002 Definitions.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:Barrier
    close_mappings:
    - fpml_5_10:Barrier
    slots:
    - knockIn
    - knockOut
    class_uri: common_domain_model:Barrier
  CalendarSpread:
    name: CalendarSpread
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalendarSpread
    description: A type for defining a calendar spread feature.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:CalendarSpread
    slots:
    - expirationDateTwo
    class_uri: common_domain_model:CalendarSpread
  Composite:
    name: Composite
    definition_uri: https://w3id.org/lmodel/common_domain_model/Composite
    description: Specifies the conditions to be applied for converting into a reference
      currency when the actual currency rate is not determined upfront.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:Composite
    slots:
    - Composite_determinationMethod
    - relativeDate
    - Composite_fxSpotRateSource
    - Composite_fixingTime
    slot_usage:
      determinationMethod:
        name: determinationMethod
        required: false
      fxSpotRateSource:
        name: fxSpotRateSource
        description: Specifies the methodology (reference source and, optionally,
          fixing time) to be used for determining a currency conversion rate.
        required: false
      fixingTime:
        name: fixingTime
        description: The time at which the spot currency exchange rate will be observed.
          It is specified as a time in a business day calendar location, e.g. 11:00am
          London time.
    class_uri: common_domain_model:Composite
  FxFeature:
    name: FxFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxFeature
    description: A type for defining FX Features.
    comments:
    - "Rosetta condition: FxFeatureChoice \u2014 required choice composite, quanto,\
      \ crossCurrency"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:FxFeature
    slots:
    - referenceCurrency
    - FxFeature_composite
    - quanto
    - crossCurrency
    slot_usage:
      composite:
        name: composite
        description: "If 'Composite' is specified as the Settlement Type in the relevant\
          \ Transaction Supplement, an amount in the Settlement Currency, determined\
          \ by the Calculation Agent as being equal to the number of Options exercised\
          \ or deemed exercised, multiplied by: (Settlement Price \u2013 Strike Price)\
          \ / (Strike Price \u2013 Settlement Price) x Multiplier provided that if\
          \ the above is equal to a negative amount the Option Cash Settlement Amount\
          \ shall be deemed to be zero."
        range: Composite
    class_uri: common_domain_model:FxFeature
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            composite:
              name: composite
              required: true
        - slot_conditions:
            quanto:
              name: quanto
              required: true
        - slot_conditions:
            crossCurrency:
              name: crossCurrency
              required: true
      description: ' Choice rule to represent an FpML choice construct.'
  OptionFeature:
    name: OptionFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionFeature
    description: Defines additional optional features that can be included in an option
      contract.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:OptionFeature
    slots:
    - OptionFeature_fxFeature
    - strategyFeature
    - OptionFeature_averagingFeature
    - barrier
    - passThrough
    slot_usage:
      fxFeature:
        name: fxFeature
        description: Describes a quanto or composite FX feature.
        multivalued: true
      averagingFeature:
        name: averagingFeature
        description: Defines an option feature in which an average market observation
          price is determined on valuation and compared to the strike to determine
          a settlement amount.
        range: AveragingFeature
    class_uri: common_domain_model:OptionFeature
  TerminationProvision:
    name: TerminationProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/TerminationProvision
    description: A class for defining option provisions.
    comments:
    - "Rosetta condition: TerminationProvisionChoice \u2014 required choice cancelableProvision,\
      \ extendibleProvision, evergreenProvision, earlyTerminationProvision, recallProvision"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:TerminationProvision
    slots:
    - cancelableProvision
    - earlyTerminationProvision
    - evergreenProvision
    - extendibleProvision
    - recallProvision
    class_uri: common_domain_model:TerminationProvision
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            cancelableProvision:
              name: cancelableProvision
              required: true
        - slot_conditions:
            extendibleProvision:
              name: extendibleProvision
              required: true
        - slot_conditions:
            evergreenProvision:
              name: evergreenProvision
              required: true
        - slot_conditions:
            earlyTerminationProvision:
              name: earlyTerminationProvision
              required: true
        - slot_conditions:
            recallProvision:
              name: recallProvision
              required: true
      description: TerminationProvisionChoice
  RecallProvision:
    name: RecallProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/RecallProvision
    description: Defines the additional features that allow securities to be recalled
      by the lender before the term of the loan. A recall is not the same as an early
      termination, but may result in the early termination of a loan.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:RecallProvision
    slots:
    - isRecallable
    - issuanceCutoffTime
    - RecallProvision_notificationTime
    - intendedSettlementDate
    slot_usage:
      notificationTime:
        name: notificationTime
        description: The time on the day of intended settlement by which the borrower
          must notify the lender that they will be returning the requested security.
          For the UK, best practice recommends that this would be 30 minutes before
          the CREST DVP cut-off time i.e. 15:15:00 GMT
        range: TimeZone
        required: false
    class_uri: common_domain_model:RecallProvision
  OptionStrike:
    name: OptionStrike
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionStrike
    description: Defines the strike price of an option.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:OptionStrike
    slots:
    - strikePrice
    - strikeReference
    - referenceSwapCurve
    - averagingStrikeFeature
    class_uri: common_domain_model:OptionStrike
  PassThrough:
    name: PassThrough
    definition_uri: https://w3id.org/lmodel/common_domain_model/PassThrough
    description: Type which contains pass through payments.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:PassThrough
    slots:
    - passThroughItem
    class_uri: common_domain_model:PassThrough
  PassThroughItem:
    name: PassThroughItem
    definition_uri: https://w3id.org/lmodel/common_domain_model/PassThroughItem
    description: Class to represent a single pass through payment.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:PassThroughItem
    slots:
    - PassThroughItem_payerReceiver
    - passThroughPercentage
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: This attribute doesn't exists in the FpML construct, which makes
          use of the PayerReceiver.model group.
        required: true
    class_uri: common_domain_model:PassThroughItem
  Quanto:
    name: Quanto
    definition_uri: https://w3id.org/lmodel/common_domain_model/Quanto
    description: Determines the currency rate that the seller of the equity amounts
      will apply at each valuation date for converting the respective amounts into
      a currency that is different from the currency denomination of the underlier.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:Quanto
    slots:
    - fxRate
    - Quanto_fxSpotRateSource
    - Quanto_fixingTime
    slot_usage:
      fxSpotRateSource:
        name: fxSpotRateSource
        description: Specifies the methodology (reference source and, optionally,
          fixing time) to be used for determining a currency conversion rate.
        required: false
      fixingTime:
        name: fixingTime
        description: The time at which the spot currency exchange rate will be observed.
          It is specified as a time in a business day calendar location, e.g. 11:00am
          London time.
    class_uri: common_domain_model:Quanto
  StrategyFeature:
    name: StrategyFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/StrategyFeature
    description: A class for defining option strategy features.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:StrategyFeature
    slots:
    - strikeSpread
    - calendarSpread
    class_uri: common_domain_model:StrategyFeature
  StrikeSpread:
    name: StrikeSpread
    definition_uri: https://w3id.org/lmodel/common_domain_model/StrikeSpread
    description: A class for defining a strike spread feature.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:StrikeSpread
    slots:
    - upperStrike
    - upperStrikeNumberOfOptions
    class_uri: common_domain_model:StrikeSpread
  ExerciseTerms:
    name: ExerciseTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseTerms
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining the exercise period for an option together with
      any rules governing the notional amount of the underlying which can be exercised
      on any given exercise date and any associated exercise fees.
    comments:
    - "Rosetta condition: ExerciseDateExpirationDateChoice \u2014 required choice\
      \ exerciseDates, expirationDate"
    - "Rosetta condition: CommencementAndExpirationDate \u2014 if commencementDate\
      \ exists then expirationDate exists"
    - "Rosetta condition: AmericanExercise \u2014 if style = OptionExerciseStyleEnum\
      \ -> American then commencementDate exists and exerciseFee is absent and partialExercise\
      \ is absent and expirationDate count = 1"
    - "Rosetta condition: EuropeanExercise \u2014 if style = OptionExerciseStyleEnum\
      \ -> European then expirationDate exists and exerciseFeeSchedule is absent and\
      \ multipleExercise is absent and latestExerciseTime is absent and commencementDate\
      \ is absent"
    - "Rosetta condition: BermudaExercise \u2014 if style = OptionExerciseStyleEnum\
      \ -> Bermuda then exerciseDates exists and earliestExerciseTime exists and partialExercise\
      \ is absent and exerciseFee is absent"
    - "Rosetta condition: ExpirationTimeChoice \u2014 (if expirationTime exists then\
      \ expirationTimeType = ExpirationTimeTypeEnum -> SpecificTime and if expirationTimeType\
      \ = ExpirationTimeTypeEnum -> SpecificTime then expirationTime exists)"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExerciseTerms
    slots:
    - style
    - commencementDate
    - exerciseDates
    - ExerciseTerms_expirationDate
    - relevantUnderlyingDate
    - earliestExerciseTime
    - latestExerciseTime
    - expirationTime
    - expirationTimeType
    - multipleExercise
    - exerciseFeeSchedule
    - exerciseProcedure
    - exerciseFee
    - partialExercise
    slot_usage:
      expirationDate:
        name: expirationDate
        description: The last day within an exercise period for an American style
          option. For a European style option it is the only day within the exercise
          period.
        multivalued: true
    class_uri: common_domain_model:ExerciseTerms
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            exerciseDates:
              name: exerciseDates
              required: true
        - slot_conditions:
            expirationDate:
              name: expirationDate
              required: true
      description: Required choice rule between exercise dates and expiration date.
        The exerciseDates field can be used to extract the expiration date of a bermuda
        option, while the expirationDate field refers to the expiration date of an
        american or european option.
    - preconditions:
        slot_conditions:
          commencementDate:
            name: commencementDate
            required: true
      postconditions:
        slot_conditions:
          expirationDate:
            name: expirationDate
            required: true
      description: Condition to check that expiration date is present when commencement
        date is present.
    - preconditions:
        slot_conditions:
          style:
            name: style
            equals_string: European
      postconditions:
        slot_conditions:
          expirationDate:
            name: expirationDate
            required: true
          exerciseFeeSchedule:
            name: exerciseFeeSchedule
            required: false
          multipleExercise:
            name: multipleExercise
            required: false
          latestExerciseTime:
            name: latestExerciseTime
            required: false
          commencementDate:
            name: commencementDate
            required: false
      description: Condition to check that only fields expected for a european option
        are present.
    - preconditions:
        slot_conditions:
          style:
            name: style
            equals_string: Bermuda
      postconditions:
        slot_conditions:
          exerciseDates:
            name: exerciseDates
            required: true
          earliestExerciseTime:
            name: earliestExerciseTime
            required: true
          partialExercise:
            name: partialExercise
            required: false
          exerciseFee:
            name: exerciseFee
            required: false
      description: Condition to check that only fields expected for a bermuda option
        are present.
  AutomaticExercise:
    name: AutomaticExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/AutomaticExercise
    description: A type to define automatic exercise of a swaption. With automatic
      exercise the option is deemed to have exercised if it is in the money by more
      than the threshold amount on the exercise date.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:AutomaticExercise
    close_mappings:
    - fpml_5_10:AutomaticExercise
    slots:
    - thresholdRate
    - AutomaticExercise_isApplicable
    slot_usage:
      isApplicable:
        name: isApplicable
        description: Boolean that indicates if it has an automaticExercise
        required: false
    class_uri: common_domain_model:AutomaticExercise
  ExerciseFee:
    name: ExerciseFee
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseFee
    description: A class defining the fee payable on exercise of an option. This fee
      may be defined as an amount or a percentage of the notional exercised. As a
      difference with FpML, it extends the BuyerSeller class.
    comments:
    - "Rosetta condition: ExerciseFeeChoice \u2014 required choice feeAmount, feeRate"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExerciseFee
    is_a: PayerReceiver
    slots:
    - payer
    - receiver
    - notionalReference
    - feeAmount
    - feeRate
    - feePaymentDate
    class_uri: common_domain_model:ExerciseFee
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            feeAmount:
              name: feeAmount
              required: true
        - slot_conditions:
            feeRate:
              name: feeRate
              required: true
      description: Choice rule to represent an FpML choice construct.
  ExerciseFeeSchedule:
    name: ExerciseFeeSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseFeeSchedule
    description: A class to define a fee or schedule of fees to be payable on the
      exercise of an option. This fee may be defined as an amount or a percentage
      of the notional exercised. As a difference with FpML, it extends the BuyerSeller
      class.
    comments:
    - "Rosetta condition: ExerciseFeeScheduleChoice \u2014 required choice feeAmountSchedule,\
      \ feeRateSchedule"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExerciseFeeSchedule
    is_a: PayerReceiver
    slots:
    - payer
    - receiver
    - notionalReference
    - feeAmountSchedule
    - feeRateSchedule
    - feePaymentDate
    class_uri: common_domain_model:ExerciseFeeSchedule
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            feeAmountSchedule:
              name: feeAmountSchedule
              required: true
        - slot_conditions:
            feeRateSchedule:
              name: feeRateSchedule
              required: true
      description: Choice rule to represent an FpML choice construct.
  ExerciseNotice:
    name: ExerciseNotice
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseNotice
    description: Defines to whom and where notice of execution should be given. The
      exerciseNoticeGiver refers to one or both of the principal parties of the trade.
      If present the exerciseNoticeReceiver refers to a party, other than the principal
      party, to whom notice should be given.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExerciseNotice
    slots:
    - exerciseNoticeGiver
    - exerciseNoticeReceiver
    - ExerciseNotice_businessCenter
    slot_usage:
      businessCenter:
        name: businessCenter
        description: Specifies the location where the exercise must be reported, e.g.
          where the exercise notice receiver is based.
        required: true
        multivalued: false
    class_uri: common_domain_model:ExerciseNotice
  ExerciseProcedure:
    name: ExerciseProcedure
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseProcedure
    description: A class describing how notice of exercise should be given. This can
      be either manual or automatic.
    comments:
    - "Rosetta condition: ExerciseProcedureChoice \u2014 required choice manualExercise,\
      \ automaticExercise"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ExerciseProcedure
    slots:
    - manualExercise
    - automaticExercise
    - followUpConfirmation
    - limitedRightToConfirm
    - splitTicket
    class_uri: common_domain_model:ExerciseProcedure
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            manualExercise:
              name: manualExercise
              required: true
        - slot_conditions:
            automaticExercise:
              name: automaticExercise
              required: true
      description: Choice rule to represent an FpML choice construct.
  ManualExercise:
    name: ManualExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/ManualExercise
    description: A class defining manual exercise, i.e. that the option buyer counterparty
      must give notice to the option seller of exercise.
    comments:
    - "Rosetta condition: ManualExerciseNoticeReceiverParty \u2014 if exerciseNotice\
      \ -> exerciseNoticeReceiver exists then exerciseNotice -> exerciseNoticeReceiver\
      \ = AncillaryRoleEnum -> ExerciseNoticeReceiverPartyManual"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:ManualExercise
    slots:
    - exerciseNotice
    - fallbackExercise
    class_uri: common_domain_model:ManualExercise
  MultipleExercise:
    name: MultipleExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/MultipleExercise
    description: A class defining multiple exercises. As defined in the 2000 ISDA
      Definitions, Section 12.4. Multiple Exercise, the buyer of the option has the
      right to exercise all or less than all the unexercised notional amount of the
      underlying swap on one or more days in the exercise period, but on any such
      day may not exercise less than the minimum notional amount or more than the
      maximum notional amount, and if an integral multiple amount is specified, the
      notional exercised must be equal to or, be an integral multiple of, the integral
      multiple amount. In FpML, MultipleExercise is built upon the PartialExercise.model.
    comments:
    - "Rosetta condition: MaximumChoice \u2014 required choice maximumNotionalAmount,\
      \ maximumNumberOfOptions"
    - "Rosetta condition: MaximumNumberOfOptions \u2014 if maximumNumberOfOptions\
      \ exists then maximumNotionalAmount >= 0"
    - "Rosetta condition: MinimumNumberOfOptions \u2014 if minimumNumberOfOptions\
      \ exists then minimumNumberOfOptions >= 0"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:MultipleExercise
    is_a: PartialExercise
    slots:
    - PartialExercise_notionalReference
    - integralMultipleAmount
    - minimumNotionalAmount
    - minimumNumberOfOptions
    - maximumNotionalAmount
    - maximumNumberOfOptions
    class_uri: common_domain_model:MultipleExercise
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            maximumNotionalAmount:
              name: maximumNotionalAmount
              required: true
        - slot_conditions:
            maximumNumberOfOptions:
              name: maximumNumberOfOptions
              required: true
      description: Choice rule to represent an FpML choice construct.
    - preconditions:
        slot_conditions:
          maximumNumberOfOptions:
            name: maximumNumberOfOptions
            required: true
      postconditions:
        slot_conditions:
          maximumNotionalAmount:
            name: maximumNotionalAmount
            minimum_value: 0
      description: FpML MultipleExercise construct specifies the maximumNumberOfOptions
        as a positive integer.
    - preconditions:
        slot_conditions:
          minimumNumberOfOptions:
            name: minimumNumberOfOptions
            required: true
      postconditions:
        slot_conditions:
          minimumNumberOfOptions:
            name: minimumNumberOfOptions
            minimum_value: 0
      description: FpML MultipleExercise construct specifies the minimumNumberOfOptions
        as a positive integer.
  PartialExercise:
    name: PartialExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartialExercise
    description: A class defining partial exercise. As defined in the 2000 ISDA Definitions,
      Section 12.3 Partial Exercise, the buyer of the option may exercise all or less
      than all the notional amount of the underlying swap but may not be less than
      the minimum notional amount (if specified) and must be an integral multiple
      of the integral multiple amount if specified.
    comments:
    - "Rosetta condition: MinimumChoice \u2014 required choice minimumNotionalAmount,\
      \ minimumNumberOfOptions"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:PartialExercise
    slots:
    - PartialExercise_notionalReference
    - integralMultipleAmount
    - minimumNotionalAmount
    - minimumNumberOfOptions
    slot_usage:
      notionalReference:
        name: notionalReference
        description: A pointer style reference to the associated notional schedule
          defined elsewhere in the document. This element has been made optional as
          part of its integration in the OptionBaseExtended, because not required
          for the options on securities.
        required: false
    class_uri: common_domain_model:PartialExercise
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            minimumNotionalAmount:
              name: minimumNotionalAmount
              required: true
        - slot_conditions:
            minimumNumberOfOptions:
              name: minimumNumberOfOptions
              required: true
      description: Choice rule to represent an FpML choice construct.
  Strike:
    name: Strike
    definition_uri: https://w3id.org/lmodel/common_domain_model/Strike
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class describing a single cap or floor rate.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:Strike
    slots:
    - strikeRate
    - Strike_buyer
    - Strike_seller
    slot_usage:
      buyer:
        name: buyer
        description: The buyer of the option.
        range: PayerReceiverEnum
        required: false
      seller:
        name: seller
        description: The party that has sold.
        range: PayerReceiverEnum
        required: false
    class_uri: common_domain_model:Strike
  StrikeSchedule:
    name: StrikeSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/StrikeSchedule
    description: A class describing a schedule of cap or floor rates.
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:StrikeSchedule
    is_a: RateSchedule
    slots:
    - RateSchedule_price
    - StrikeSchedule_buyer
    - StrikeSchedule_seller
    slot_usage:
      buyer:
        name: buyer
        description: The buyer of the option.
        range: PayerReceiverEnum
        required: false
      seller:
        name: seller
        description: The party that has sold.
        range: PayerReceiverEnum
        required: false
    class_uri: common_domain_model:StrikeSchedule
  AssetPayout:
    name: AssetPayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetPayout
    description: Security finance payout specification in case the product payout
      involves some form of security collateral, as in a securities financing transaction.
      Plus additional description for ICMA.
    comments:
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    - "Rosetta condition: UnderlierNotCash \u2014 underlier -> Cash is absent"
    in_subset:
    - cdm_product_template
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - common_domain_model:AssetPayout
    close_mappings:
    - fpml_5_10:AssetPayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - assetLeg
    - AssetPayout_underlier
    - AssetPayout_minimumFee
    - AssetPayout_dividendTerms
    - tradeType
    slot_usage:
      underlier:
        name: underlier
        description: Specifies the Purchased Asset, usually a Security.
        range: Asset
      minimumFee:
        name: minimumFee
        description: A contractual minimum amount which the borrower will pay, regardless
          of the duration of the loan. A mechanism for making sure that a trade generates
          enough income.
      dividendTerms:
        name: dividendTerms
        description: Specifies the terms under which dividends received by the borrower
          are passed through to the lender.
    class_uri: common_domain_model:AssetPayout
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
  DividendTerms:
