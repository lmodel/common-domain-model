          the performance calculations relevant for a fixed or floating rate payout.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"payout","type":"Payout","cardinality":"1..1"},{"name":"resets","type":"Reset","cardinality":"1..*"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"interestCashSettlementAmount","type":"Transfer","cardinality":"1..1"}},{"name":"ResolveReset","description":"Defines
          the interface for adopters to resolve a reset, given a trade state and a
          date.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"},"code_implementation":true},{"name":"ResolvePerformanceReset","description":"Defines
          how to resolve the reset value for a performance payout.","inputs":[{"name":"performancePayout","type":"PerformancePayout","cardinality":"1..1"},{"name":"observation","type":"Observation","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"ResolveSecurityFinanceBillingAmount","description":"Calculates
          the billing amount for a Security Finance transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"reset","type":"Reset","cardinality":"1..1"},{"name":"recordStartDate","type":"date","cardinality":"1..1"},{"name":"recordEndDate","type":"date","cardinality":"1..1"},{"name":"transferDate","type":"date","cardinality":"1..1"}],"output":{"name":"transfer","type":"Transfer","cardinality":"1..1"}}]'
    description: Defines the reset value or fixing value produced in cashflow calculations,
      during the life-cycle of a financial instrument. The reset process defined in
      Create_Reset function joins product definition details with observations to
      compute the reset value.
    comments:
    - "Rosetta condition: AveragingMethodologyExists \u2014 if observations count\
      \ > 1 then averagingMethodology exists"
    - "Rosetta func: ResolveInterestRateReset \u2014 Defines how to resolve the reset\
      \ value for an InterestRatePayout."
    - "Rosetta func: InterestCashSettlementAmount \u2014 Defines the performance calculations\
      \ relevant for a fixed or floating rate payout."
    - "Rosetta func: ResolveReset \u2014 Defines the interface for adopters to resolve\
      \ a reset, given a trade state and a date."
    - "Rosetta func: ResolvePerformanceReset \u2014 Defines how to resolve the reset\
      \ value for a performance payout."
    - "Rosetta func: ResolveSecurityFinanceBillingAmount \u2014 Calculates the billing\
      \ amount for a Security Finance transaction."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Reset
    slots:
    - resetValue
    - Reset_resetDate
    - rateRecordDate
    - observations
    - averagingMethodology
    slot_usage:
      resetDate:
        name: resetDate
        description: Specifies the date on which the reset occurred.
    class_uri: common_domain_model:Reset
  State:
    name: State
    definition_uri: https://w3id.org/lmodel/common_domain_model/State
    description: Defines the state of a trade at a point in the Trade's life cycle.
      Trades have many state dimensions, all of which are represented here. For example,
      states useful for position keeping are represented alongside those needed for
      regulatory reporting.
    comments:
    - "Rosetta condition: ClosedStateExists \u2014 if positionState = PositionStatusEnum\
      \ -> Closed then closedState exists"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:State
    slots:
    - closedState
    - positionState
    class_uri: common_domain_model:State
    rules:
    - preconditions:
        slot_conditions:
          positionState:
            name: positionState
            equals_string: Closed
      postconditions:
        slot_conditions:
          closedState:
            name: closedState
            required: true
      description: When the position state is identified as closed, the closed state
        must also be specified.
  TransferState:
    name: TransferState
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferState
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"EmptyTransferHistory","output":{"name":"emptyTransferHistory","type":"TransferState","cardinality":"0..*"},"code_implementation":true},{"name":"AssetPayoutObligationsFulfilled","description":"Determines
          whether the obligations defined by the AssetPayout have been fulfilled by
          checking that the quantity of shares required have been successfully transferred.","inputs":[{"name":"assetPayout","type":"AssetPayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}},{"name":"InterestPayoutObligationsFulfilled","description":"Determines
          whether the obligations defined by the InterestRatePayout have been fulfilled
          by checking that the total value of cash required has been successfully
          transferred.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"transferHistory","type":"TransferState","cardinality":"0..*"}],"output":{"name":"isFulfilled","type":"boolean","cardinality":"1..1"}}]'
    description: Defines the fundamental financial information associated with a Transfer
      event. Each TransferState specifies where a Transfer is in its life-cycle. TransferState
      is a root type and as such, can be created independently to any other CDM data
      type, but can also be used as part of the CDM Event Model.
    comments:
    - 'Rosetta func: EmptyTransferHistory'
    - "Rosetta func: AssetPayoutObligationsFulfilled \u2014 Determines whether the\
      \ obligations defined by the AssetPayout have been fulfilled by checking that\
      \ the quantity of shares required have been successfully transferred."
    - "Rosetta func: InterestPayoutObligationsFulfilled \u2014 Determines whether\
      \ the obligations defined by the InterestRatePayout have been fulfilled by checking\
      \ that the total value of cash required has been successfully transferred."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:TransferState
    slots:
    - TransferState_transfer
    - transferStatus
    slot_usage:
      transfer:
        name: transfer
        description: Represents the Transfer that has been effected by a business
          or life-cycle event.
        range: Transfer
        required: true
    class_uri: common_domain_model:TransferState
    tree_root: true
  UnscheduledTransfer:
    name: UnscheduledTransfer
    definition_uri: https://w3id.org/lmodel/common_domain_model/UnscheduledTransfer
    description: An ad-hoc transfer instigated by a party to the contract.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:UnscheduledTransfer
    is_a: TransferBase
    slots:
    - AssetFlowBase_quantity
    - AssetFlowBase_asset
    - AssetFlowBase_settlementDate
    - paymentDiscounting
    - TransferBase_identifier
    - TransferBase_payerReceiver
    - transferType
    class_uri: common_domain_model:UnscheduledTransfer
  ScheduledTransfer:
    name: ScheduledTransfer
    definition_uri: https://w3id.org/lmodel/common_domain_model/ScheduledTransfer
    description: A scheduled transfer built into the contract.
    comments:
    - "Rosetta condition: CorporateActionTransferTypeExists \u2014 if transferType\
      \ = ScheduledTransferEnum -> CorporateAction then corporateActionTransferType\
      \ exists"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ScheduledTransfer
    is_a: TransferBase
    slots:
    - AssetFlowBase_quantity
    - AssetFlowBase_asset
    - AssetFlowBase_settlementDate
    - paymentDiscounting
    - TransferBase_identifier
    - TransferBase_payerReceiver
    - ScheduledTransfer_transferType
    - corporateActionTransferType
    - payoutReference
    slot_usage:
      transferType:
        name: transferType
        description: Specifies the type of scheduled transfer.
        range: ScheduledTransferEnum
        required: true
    class_uri: common_domain_model:ScheduledTransfer
    rules:
    - preconditions:
        slot_conditions:
          transferType:
            name: transferType
            equals_string: CorporateAction
      postconditions:
        slot_conditions:
          corporateActionTransferType:
            name: corporateActionTransferType
            required: true
      description: When transfer type is Performance or Transfer then the type of
        event must be specified.
  TransferBase:
    name: TransferBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferBase
    description: Defines the movement of an Asset (eg cash, securities or commodities)
      between two parties on a date.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:TransferBase
    is_a: AssetFlowBase
    slots:
    - AssetFlowBase_quantity
    - AssetFlowBase_asset
    - AssetFlowBase_settlementDate
    - paymentDiscounting
    - TransferBase_identifier
    - TransferBase_payerReceiver
    slot_usage:
      identifier:
        name: identifier
        description: Represents a unique reference to the transfer.
        range: Identifier
        required: false
        inlined_as_list: true
      payerReceiver:
        name: payerReceiver
        description: Represents the parties to the transfer and their role.
        range: PartyReferencePayerReceiver
        required: true
    class_uri: common_domain_model:TransferBase
  TradeIdentifier:
    name: TradeIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/TradeIdentifier
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_PartyChange","description":"Defines the logic for
          changing one of the counterparties on a trade. A new trade identifier must
          be specified as a change of party results in a new trade. An ancillary party
          can also be specified, for instance to refer to the original executing party
          on the new trade.","inputs":[{"name":"counterparty","type":"Counterparty","cardinality":"1..1"},{"name":"ancillaryParty","type":"AncillaryParty","cardinality":"0..1"},{"name":"partyRole","type":"PartyRole","cardinality":"0..1"},{"name":"tradeId","type":"TradeIdentifier","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"newTrade","type":"TradeState","cardinality":"1..1"}}]'
    description: Defines a trade identifier as a special case of the generic identifier
      type, that also includes the trade identifier class.
    comments:
    - "Rosetta func: Create_PartyChange \u2014 Defines the logic for changing one\
      \ of the counterparties on a trade. A new trade identifier must be specified\
      \ as a change of party results in a new trade. An ancillary party can also be\
      \ specified, for instance to refer to the original executing party on the new\
      \ trade."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:TradeIdentifier
    is_a: Identifier
    slots:
    - issuerReference
    - issuer
    - assignedIdentifier
    - TradeIdentifier_identifierType
    slot_usage:
      identifierType:
        name: identifierType
        description: The enumerated classification of the identifier. Optional as
          a trade identifier may be party-specific, in which case it may not correspond
          to any established classification.
        range: TradeIdentifierTypeEnum
        required: false
    class_uri: common_domain_model:TradeIdentifier
  PositionIdentifier:
    name: PositionIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/PositionIdentifier
    description: Defines a position identifier as a special case of the generic identifier
      type, that also includes the position identifier class.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:PositionIdentifier
    is_a: Identifier
    slots:
    - issuerReference
    - issuer
    - assignedIdentifier
    - PositionIdentifier_identifierType
    slot_usage:
      identifierType:
        name: identifierType
        description: The enumerated classification of the identifier. Optional as
          a position identifier may be party-specific, in which case it may not correspond
          to any established classification.
        range: TradeIdentifierTypeEnum
        required: false
    class_uri: common_domain_model:PositionIdentifier
  Valuation:
    name: Valuation
    definition_uri: https://w3id.org/lmodel/common_domain_model/Valuation
    description: Defines the value of an investment, asset, or security
    comments:
    - "Rosetta condition: ValuationType \u2014 required choice method, source"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Valuation
    slots:
    - amount
    - timestamp
    - method
    - Valuation_source
    - scope
    - delta
    - valuationTiming
    - priceComponent
    slot_usage:
      source:
        name: source
        description: Source of the valuation of the transaction by the valuation party.
        range: ValuationSourceEnum
        required: false
    class_uri: common_domain_model:Valuation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            method:
              name: method
              required: true
        - slot_conditions:
            source:
              name: source
              required: true
      description: 'The below condition ensures one and only one of the two attributes:
        ''Valuation Method'' or ''Valuation Source'' is allowed. Valuation of a trade
        or a portfolio is either internally calculated (via M2Market or M2Model methods)
        or supplied from an external source (e.g Central Counterparty''s Valuation).
        Valuation cannot be based upon internal calculations and external source at
        the same time.'
  Trade:
    name: Trade
    definition_uri: https://w3id.org/lmodel/common_domain_model/Trade
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"EquityPerformance","description":"Part 1 Section 12 of the
          2018 ISDA CDM Equity Confirmation for Security Equity Swap, Para 75. ''Equity
          Performance'' means, in respect of an Equity Cash Settlement Date, an amount
          in the Settlement Currency determined by the Calculation Agent as of the
          Equity Valuation Date to which the Equity Cash Settlement Amount relates,
          pursuant to the following formula: Equity Performance = (Rate Of Return)  Equity
          Notional Amount.","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"},{"name":"observation","type":"Price","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"equityPerformance","type":"number","cardinality":"1..1"}},{"name":"TradeNoExecutionDetails","inputs":[{"name":"trade","type":"Trade","cardinality":"1..1"}],"output":{"name":"newTrade","type":"Trade","cardinality":"1..1"}},{"name":"ExtractBeforeTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractAfterTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}}]'
    description: Defines the output of a financial transaction between parties - a
      Business Event. A Trade impacts the financial position (i.e. the balance sheet)
      of involved parties.
    comments:
    - "Rosetta condition: SettlementPayout \u2014 if SettlementPayoutOnlyExists(product\
      \ -> economicTerms -> payout) then partyRole -> role contains PartyRoleEnum\
      \ -> Buyer and partyRole -> role contains PartyRoleEnum -> Seller and tradeLot\
      \ -> priceQuantity -> price exists"
    - "Rosetta condition: PackageTrade \u2014 if executionDetails -> packageReference\
      \ exists then executionDetails -> packageReference -> componentId -> assignedIdentifier\
      \ contains tradeIdentifier -> assignedIdentifier"
    - "Rosetta condition: DeliverableObligationsPhysicalSettlementMatrix \u2014 if\
      \ (contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualMatrix -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix\
      \ or contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualMatrix -> matrixType is absent) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms\
      \ -> deliverableObligations exists then (product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations\
      \ -> notSubordinated exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ specifiedCurrency exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notSovereignLender exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notDomesticCurrency exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notDomesticLaw exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notContingent exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notDomesticIssuance exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ assignableLoan exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ consentRequiredLoan exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ transferable exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ maximumMaturity exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ notBearer exists) and (product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ fullFaithAndCreditObLiability exists or product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations\
      \ -> generalFundObligationLiability exists or product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms -> deliverableObligations\
      \ -> revenueObligationLiability exists)"
    - "Rosetta condition: ObligationsPhysicalSettlementMatrix \u2014 if (contractDetails\
      \ -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix\
      \ -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix\
      \ or contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualMatrix -> matrixType is absent) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> obligations exists\
      \ then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> obligations -> notSubordinated exists and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> protectionTerms -> obligations -> notSovereignLender\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> obligations -> notDomesticLaw exists and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> protectionTerms -> obligations -> notDomesticIssuance\
      \ exists) and (product -> economicTerms -> payout -> CreditDefaultPayout ->\
      \ protectionTerms -> obligations -> fullFaithAndCreditObLiability exists or\
      \ product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> obligations -> generalFundObligationLiability exists or product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> obligations -> revenueObligationLiability\
      \ exists)"
    - "Rosetta condition: CreditEventsPhysicalSettlementMatrix \u2014 if (contractDetails\
      \ -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix\
      \ -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix\
      \ or contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualMatrix -> matrixType is absent) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents exists\
      \ then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> bankruptcy exists and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> protectionTerms -> creditEvents -> obligationDefault\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> obligationAcceleration exists and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> repudiationMoratorium\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> governmentalIntervention exists)"
    - "Rosetta condition: RestructuringPhysicalSettlementMatrix \u2014 if (contractDetails\
      \ -> documentation -> legalAgreementIdentification -> agreementName -> contractualMatrix\
      \ -> matrixType all <> MatrixTypeEnum -> CreditDerivativesPhysicalSettlementMatrix\
      \ or contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualMatrix -> matrixType is absent) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring\
      \ exists then product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> restructuring -> multipleHolderObligation exists"
    - "Rosetta condition: AdditionalFixedPaymentsMortgages \u2014 if ((product ->\
      \ economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation\
      \ -> referenceObligation -> security -> securityType any = Debt and product\
      \ -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation\
      \ -> referenceObligation -> security -> debtType -> debtEconomics -> secured\
      \ -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType\
      \ contains ContractualSupplementTypeEnum -> CDSonMBS) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents\
      \ exists then (product -> economicTerms -> payout -> CreditDefaultPayout ->\
      \ protectionTerms -> floatingAmountEvents -> additionalFixedPayments -> interestShortfallReimbursement\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> floatingAmountEvents -> additionalFixedPayments -> principalShortfallReimbursement\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> floatingAmountEvents -> additionalFixedPayments -> writedownReimbursement\
      \ exists)"
    - "Rosetta condition: FloatingAmountEventsMortgages \u2014 if ((product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation ->\
      \ referenceObligation -> security -> securityType any = Debt and product ->\
      \ economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation\
      \ -> referenceObligation -> security -> debtType -> debtEconomics -> secured\
      \ -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType\
      \ contains ContractualSupplementTypeEnum -> CDSonMBS) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents\
      \ exists then (product -> economicTerms -> payout -> CreditDefaultPayout ->\
      \ protectionTerms -> floatingAmountEvents -> failureToPayPrincipal exists and\
      \ product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> floatingAmountEvents -> writedown exists and product -> economicTerms ->\
      \ payout -> CreditDefaultPayout -> protectionTerms -> floatingAmountEvents ->\
      \ impliedWritedown exists)"
    - "Rosetta condition: CreditEventsMortgages \u2014 if ((product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation ->\
      \ referenceObligation -> security -> securityType any = Debt and product ->\
      \ economicTerms -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation\
      \ -> referenceObligation -> security -> debtType -> debtEconomics -> secured\
      \ -> securedType any = AssetBacked) or contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualTermsSupplement -> contractualTermsSupplementType\
      \ contains ContractualSupplementTypeEnum -> CDSonMBS) and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents exists\
      \ then (product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> failureToPayPrincipal exists and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> failureToPayInterest\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> distressedRatingsDowngrade exists and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> maturityExtension\
      \ exists and product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> writedown exists and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> protectionTerms -> creditEvents -> impliedWritedown\
      \ exists)"
    - "Rosetta condition: HedgingParty \u2014 if partyRole -> role contains PartyRoleEnum\
      \ -> HedgingParty then FilterPartyRole(partyRole, PartyRoleEnum -> HedgingParty)\
      \ count <= 2"
    - "Rosetta condition: DeterminingParty \u2014 if partyRole -> role contains PartyRoleEnum\
      \ -> DeterminingParty then FilterPartyRole(partyRole, PartyRoleEnum -> DeterminingParty)\
      \ count <= 2"
    - "Rosetta condition: BarrierDerterminationAgent \u2014 if partyRole -> role contains\
      \ PartyRoleEnum -> BarrierDeterminationAgent then FilterPartyRole(partyRole,\
      \ PartyRoleEnum -> BarrierDeterminationAgent) count <= 1"
    - "Rosetta condition: ClearedDate \u2014 if clearedDate exists then clearedDate\
      \ >= tradeDate"
    - "Rosetta condition: FpML_cd_1 \u2014 if product -> economicTerms -> payout ->\
      \ CreditDefaultPayout -> generalTerms -> referenceInformation exists then tradeDate\
      \ < product -> economicTerms -> effectiveDate -> adjustableDate -> unadjustedDate\
      \ or tradeDate < product -> economicTerms -> effectiveDate -> adjustableDate\
      \ -> adjustedDate"
    - "Rosetta condition: FpML_cd_7 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ then product -> economicTerms -> payout -> InterestRatePayout -> calculationPeriodDates\
      \ -> effectiveDate -> adjustableDate -> dateAdjustments exists or tradeDate\
      \ < product -> economicTerms -> effectiveDate -> adjustableDate -> adjustedDate"
    - "Rosetta condition: FpML_cd_8 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ then product -> economicTerms -> terminationDate -> adjustableDate -> dateAdjustments\
      \ exists"
    - "Rosetta condition: FpML_cd_11 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ and contractDetails -> documentation -> legalAgreementIdentification -> agreementName\
      \ -> contractualDefinitionsType any = ContractualDefinitionsEnum -> ISDA2003CreditDerivatives\
      \ then product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms\
      \ -> referenceInformation -> allGuarantees exists"
    - "Rosetta condition: FpML_cd_19 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> contractualDefinitionsType\
      \ any = ContractualDefinitionsEnum -> ISDA1999CreditDerivatives then product\
      \ -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents\
      \ -> creditEventNotice -> businessCenter is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring\
      \ -> multipleHolderObligation is absent and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> protectionTerms -> creditEvents -> restructuring\
      \ -> multipleCreditEventNotices is absent and product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> generalTerms -> referenceInformation -> allGuarantees\
      \ is absent and product -> economicTerms -> payout -> CreditDefaultPayout ->\
      \ generalTerms -> indexReferenceInformation is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> substitution is absent\
      \ and product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms\
      \ -> modifiedEquityDelivery is absent"
    - "Rosetta condition: FpML_cd_20 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> contractualDefinitionsType\
      \ any = ContractualDefinitionsEnum -> ISDA2003CreditDerivatives then product\
      \ -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms -> obligations\
      \ -> notContingent is absent"
    - "Rosetta condition: FpML_cd_23 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ then product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms\
      \ -> cashSettlementTerms exists or product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms exists"
    - "Rosetta condition: FpML_cd_24 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ then product -> economicTerms -> payout -> CreditDefaultPayout -> protectionTerms\
      \ -> creditEvents -> creditEventNotice exists and product -> economicTerms ->\
      \ payout -> CreditDefaultPayout -> protectionTerms -> obligations exists and\
      \ product -> economicTerms -> payout -> CreditDefaultPayout -> generalTerms\
      \ -> referenceInformation -> referencePrice exists"
    - "Rosetta condition: FpML_cd_25 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ and product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms\
      \ -> physicalSettlementTerms exists then product -> economicTerms -> payout\
      \ -> CreditDefaultPayout -> settlementTerms -> settlementCurrency exists and\
      \ product -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms\
      \ -> physicalSettlementTerms -> physicalSettlementPeriod exists and product\
      \ -> economicTerms -> payout -> CreditDefaultPayout -> settlementTerms -> physicalSettlementTerms\
      \ -> escrow exists and product -> economicTerms -> payout -> CreditDefaultPayout\
      \ -> settlementTerms -> physicalSettlementTerms -> deliverableObligations ->\
      \ accruedInterest exists"
    - "Rosetta condition: FpML_cd_32 \u2014 if contractDetails -> documentation ->\
      \ legalAgreementIdentification -> agreementName -> masterConfirmationType is\
      \ absent and contractDetails -> documentation -> legalAgreementIdentification\
      \ -> agreementName -> contractualMatrix is absent and product -> economicTerms\
      \ -> payout -> CreditDefaultPayout -> generalTerms -> referenceInformation exists\
      \ and product -> economicTerms -> payout -> InterestRatePayout -> priceQuantity\
      \ exists and tradeLot -> priceQuantity -> quantity -> value exists then product\
      \ -> economicTerms -> payout -> InterestRatePayout -> dayCountFraction exists"
    - "Rosetta condition: FpML_ird_8 \u2014 if product -> economicTerms -> payout\
      \ -> InterestRatePayout exists then FpmlIrd8(item, account) = True"
    - "Rosetta condition: ExtraordinaryEvents \u2014 if contractDetails -> documentation\
      \ -> agreementTerms -> agreement -> transactionAdditionalTerms -> equityAdditionalTerms\
      \ -> extraordinaryEvents exists then (product -> economicTerms -> payout ->\
      \ PerformancePayout -> returnTerms -> priceReturnTerms exists or product ->\
      \ economicTerms -> payout -> OptionPayout exists) and Qualify_AssetClass_Equity(product\
      \ -> economicTerms)"
    - "Rosetta condition: DisruptionEventsDeterminingParty \u2014 if contractDetails\
      \ -> documentation -> agreementTerms -> agreement -> transactionAdditionalTerms\
      \ -> equityAdditionalTerms -> extraordinaryEvents -> additionalDisruptionEvents\
      \ -> determiningParty exists then ancillaryParty -> role contains AncillaryRoleEnum\
      \ -> DisruptionEventsDeterminingParty and if ancillaryParty -> role contains\
      \ AncillaryRoleEnum -> DisruptionEventsDeterminingParty then contractDetails\
      \ -> documentation -> agreementTerms -> agreement -> transactionAdditionalTerms\
      \ -> equityAdditionalTerms -> extraordinaryEvents -> additionalDisruptionEvents\
      \ -> determiningParty exists"
    - "Rosetta func: EquityPerformance \u2014 Part 1 Section 12 of the 2018 ISDA CDM\
      \ Equity Confirmation for Security Equity Swap, Para 75. 'Equity Performance'\
      \ means, in respect of an Equity Cash Settlement Date, an amount in the Settlement\
      \ Currency determined by the Calculation Agent as of the Equity Valuation Date\
      \ to which the Equity Cash Settlement Amount relates, pursuant to the following\
      \ formula: Equity Performance = (Rate Of Return)  Equity Notional Amount."
    - 'Rosetta func: TradeNoExecutionDetails'
    - 'Rosetta func: ExtractBeforeTrade'
    - 'Rosetta func: ExtractAfterTrade'
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Trade
    close_mappings:
    - gist:Transaction
    is_a: TradableProduct
    slots:
    - TradableProduct_product
    - tradeLot
    - TradableProduct_counterparty
    - TradableProduct_ancillaryParty
    - TradableProduct_adjustment
    - Trade_tradeIdentifier
    - Trade_tradeDate
    - tradeTime
    - Trade_party
    - Trade_partyRole
    - Trade_executionDetails
    - contractDetails
    - clearedDate
    - Trade_collateral
    - Trade_account
    slot_usage:
      tradeIdentifier:
        name: tradeIdentifier
        description: Represents the identifier(s) that uniquely identify a trade for
          an identity issuer. A trade can include multiple identifiers, for example
          a trade that is reportable to both the CFTC and ESMA, and then has an associated
          USI (Unique Swap Identifier) UTI (Unique Trade Identifier).
      tradeDate:
        name: tradeDate
        description: Specifies the date which the trade was agreed.
      party:
        name: party
        description: Represents the parties to the trade. The cardinality is optional
          to address the case where the trade is defined within a BusinessEvent data
          type, in which case the party is specified in BusinessEvent.
        range: Party
        multivalued: true
      partyRole:
        name: partyRole
        description: Represents the role each specified party takes in the trade.
          further to the principal roles, payer and receiver.
        multivalued: true
      executionDetails:
        name: executionDetails
        description: Represents information specific to trades that arose from executions.
        required: false
      collateral:
        name: collateral
        description: Represents the collateral obligations of a party.
      account:
        name: account
        description: Represents a party's granular account information, which may
          be used in subsequent internal processing.
        deprecated: Deprecated in CDM
        multivalued: true
    class_uri: common_domain_model:Trade
    rules:
    - preconditions:
        slot_conditions:
          clearedDate:
            name: clearedDate
            required: true
      description: If the cleared date exists, it needs to be on or after the trade
        date.
      comments:
      - 'Rosetta comparison: clearedDate >= tradeDate'
  ExecutionDetails:
    name: ExecutionDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExecutionDetails
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_PackageExecutionDetails","description":"Add a package
          component to an execution details object. This package component is constructed
          using an identifier for the package and the list of identifiers for its
          components.","inputs":[{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},{"name":"listId","type":"Identifier","cardinality":"1..1"},{"name":"componentId","type":"Identifier","cardinality":"2..*"}],"output":{"name":"newExecutionDetails","type":"ExecutionDetails","cardinality":"1..1"}},{"name":"EmptyExecutionDetails","output":{"name":"executionDetails","type":"ExecutionDetails","cardinality":"0..1"},"code_implementation":true}]'
    description: Defines specific attributes that relate to trade executions.
    comments:
    - "Rosetta condition: ExecutionVenue \u2014 if executionType = ExecutionTypeEnum\
      \ -> Electronic then executionVenue exists"
    - "Rosetta func: Create_PackageExecutionDetails \u2014 Add a package component\
      \ to an execution details object. This package component is constructed using\
      \ an identifier for the package and the list of identifiers for its components."
    - 'Rosetta func: EmptyExecutionDetails'
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ExecutionDetails
    slots:
    - executionType
    - executionVenue
    - packageReference
    class_uri: common_domain_model:ExecutionDetails
    rules:
    - preconditions:
        slot_conditions:
          executionType:
            name: executionType
            equals_string: Electronic
      postconditions:
        slot_conditions:
          executionVenue:
            name: executionVenue
            required: true
      description: When the execution type is set to 'Electronically', the execution
        venue must be specified.
  ContractDetails:
    name: ContractDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/ContractDetails
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Defines specific attributes that relate to contractual details of
      trades.
    comments:
    - "Rosetta condition: ExecutedAgreement \u2014 if documentation exists then documentation\
      \ -> agreementDate exists"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ContractDetails
    slots:
    - documentation
    - governingLaw
    class_uri: common_domain_model:ContractDetails
  Lineage:
    name: Lineage
    definition_uri: https://w3id.org/lmodel/common_domain_model/Lineage
    description: 'A class to provide lineage information across lifecycle events through
      a pointer or set of pointers into the event(s), contract(s) and, possibly, payout
      components that the event is dependent on or relates to. As an example, if an
      contractFormation event is corrected, the correction event will have a lineage
      into the initial event, which takes the form of a globalKey into that initial
      contract formation event. Two referencing mechanisms are provided as part of
      the CDM: either the globalKey, which corresponds to the hash value of the CDM
      class which is referred to, or a reference qualifier which is meant to provide
      support for the ingestion of xml documents with id/href mechanisms. The CDM
      recommends the use of the globalKey and provides a default implementation which
      is accessible in the generated code through org.isda.cdm.globalKey.GlobalKeyHashCalculator.
      If implementers want to use an alternative hashing mechanism, the API in which
      they need to plug it is com.rosetta.model.lib.HashFunction.'
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Lineage
    slots:
    - tradeReference
    - eventReference
    - portfolioStateReference
    class_uri: common_domain_model:Lineage
  StockSplitInstruction:
    name: StockSplitInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/StockSplitInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_StockSplit","description":"Function specification
          to create the fully-formed business event which represents the impact of
          a stock split (or a reverse stock split) on an Equity Derivatives contract
          on a certain date.","inputs":[{"name":"stockSplitInstruction","type":"StockSplitInstruction","cardinality":"1..1"},{"name":"before","type":"TradeState","cardinality":"1..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    description: Data required to perform a stock split business event.
    comments:
    - "Rosetta func: Create_StockSplit \u2014 Function specification to create the\
      \ fully-formed business event which represents the impact of a stock split (or\
      \ a reverse stock split) on an Equity Derivatives contract on a certain date."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:StockSplitInstruction
    slots:
    - adjustmentRatio
    - StockSplitInstruction_effectiveDate
    slot_usage:
      effectiveDate:
        name: effectiveDate
        description: The effective date of the stock split, also known as the ex-date.
          This is the date on which the additional shares are paid to the shareholders,
          or in the case of a reverse stock split, the number shares held by each
          shareholder is proportionally reduced.  Equity derivative transactions can
          be amended in firms' internal systems on such date.   In most markets, the
          listed stock price is reduced (or increased for a reverse stock split) to
          account for the split on the same date, but in some markets the price adjustment
          occurs on a later date.  In either case, equity derivative transactions
          should be amended on the date that the stocks are paid to the shareholders
          (or consolidated).
        required: true
    class_uri: common_domain_model:StockSplitInstruction
  CreditEvent:
    name: CreditEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditEvent
    description: Specifies the relevant data regarding a credit event.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:CreditEvent
    slots:
    - creditEventType
    - eventDeterminationDate
    - auctionDate
    - finalPrice
    - recoveryPercent
    - publiclyAvailableInformation
    - referenceInformation
    class_uri: common_domain_model:CreditEvent
  CorporateAction:
    name: CorporateAction
    definition_uri: https://w3id.org/lmodel/common_domain_model/CorporateAction
    description: Specifies the relevant data regarding a corporate action
    comments:
    - "Rosetta condition: DividendObservation \u2014 if dividendObservation exists\
      \ then dividendObservation -> priceType = PriceTypeEnum -> Dividend"
    - "Rosetta condition: CorporateActionTypeBespoke \u2014 if corporateActionType\
      \ = CorporateActionTypeEnum -> BespokeEvent then bespokeEventDescription exists"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:CorporateAction
    slots:
    - corporateActionType
    - exDate
    - payDate
    - recordDate
    - announcementDate
    - underlier
    - adjustmentFactor
    - informationSource
    - dividendObservation
    - bespokeEventDescription
    class_uri: common_domain_model:CorporateAction
    rules:
    - preconditions:
        slot_conditions:
          corporateActionType:
            name: corporateActionType
            equals_string: BespokeEvent
      postconditions:
        slot_conditions:
          bespokeEventDescription:
            name: bespokeEventDescription
            required: true
      description: When Enum value does not corresponds to standard terms, then bespoke
        description must be populated.
  AdjustmentFactor:
    name: AdjustmentFactor
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustmentFactor
    description: Describes the terms involved for adjusting the price of the underlier
      impacted by a Corporate Action.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:AdjustmentFactor
    close_mappings:
    - fpml_5_10:AdjustmentFactor
    slots:
    - AdjustmentFactor_value
    - calculationTerms
    slot_usage:
      value:
        name: value
        description: The multiplier value applied to the price of the underlier impacted
          by a Corporate Action.
        required: true
    class_uri: common_domain_model:AdjustmentFactor
  AdjustmentFactorCalculationTerms:
    name: AdjustmentFactorCalculationTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdjustmentFactorCalculationTerms
    description: Describes the input terms involved in the calculation of the adjustment
      factor applied to the price of the underlier impacted by a Corporate Action.
    comments:
    - "Rosetta condition: SpinOffOrMergerOrAccrual \u2014 optional choice spinOff,\
      \ merger, accrualFactor"
    - "Rosetta condition: DividendObservation \u2014 if dividendObservation exists\
      \ then dividendObservation -> priceType = PriceTypeEnum -> Dividend"
    - "Rosetta condition: ShareRatio \u2014 optional choice shareForShareRatio, shareForRightsRatio"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:AdjustmentFactorCalculationTerms
    close_mappings:
    - fpml_5_10:AdjustmentFactorCalculationTerms
    slots:
    - shareForShareRatio
    - shareForRightsRatio
    - rightsSubscriptionPrice
    - dividendRatio
    - spinOff
    - merger
    - accrualFactor
    - lastFixingPriceBeforeAdjustment
    - dividendObservation
    - bespokeCalculationFormula
    class_uri: common_domain_model:AdjustmentFactorCalculationTerms
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            spinOff:
              name: spinOff
              required: true
        - slot_conditions:
            merger:
              name: merger
              required: true
        - slot_conditions:
            accrualFactor:
              name: accrualFactor
              required: true
      description: SpinOffOrMergerOrAccrual
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            shareForShareRatio:
              name: shareForShareRatio
              required: true
        - slot_conditions:
            shareForRightsRatio:
              name: shareForRightsRatio
              required: true
      description: ShareRatio
  AccrualFactor:
    name: AccrualFactor
    definition_uri: https://w3id.org/lmodel/common_domain_model/AccrualFactor
    description: 'The accrual rate and related terms, to adjust the price of an underlier
      impacted by a Corporate Action when economic impact consists in freezing the
      underlier price to the last fixing then applying accruals per each remaining
      underlier price fixing date required i.e. for each fixing date, adjustedPrice
      = lastFixingPrice x accrualFactor, where: accrualFactor = (1 + accrualRateValue
      x DCF).'
    comments:
    - "Rosetta condition: AccrualPriceIsRate \u2014 value -> priceType = PriceTypeEnum\
      \ -> InterestRate"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:AccrualFactor
    close_mappings:
    - fpml_5_10:AccrualFactor
    slots:
    - AccrualFactor_value
    - AccrualFactor_calculationTerms
    slot_usage:
      value:
        name: value
        description: The rate to be applied to the last fixing price, for price accrual
          calculation purposes. DatedValue may be used for the purpose of representing
          Price series if such calculation is required for multiple dates.
        range: PriceSchedule
        required: true
      calculationTerms:
        name: calculationTerms
        description: Describes the input terms involved in the calculation of the
          accrual factor.
        range: AccrualFactorCalculationTerms
    class_uri: common_domain_model:AccrualFactor
  AccrualFactorCalculationTerms:
    name: AccrualFactorCalculationTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/AccrualFactorCalculationTerms
    description: Describes the input terms involved in the calculation of the accrual
      factor. Optionnally, long and short stub interpolation rates can be specified.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:AccrualFactorCalculationTerms
    close_mappings:
    - fpml_5_10:AccrualFactorCalculationTerms
    slots:
    - tenorTillMaturity
    - dayCountFraction
    - interpolationTerms
    class_uri: common_domain_model:AccrualFactorCalculationTerms
  SpinOff:
    name: SpinOff
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpinOff
    description: Defines the underlier for both the Parent Company and the Child Compagny
      involved in Spin Off corporate action, as well as th respective price observation
      for each.
    comments:
    - "Rosetta condition: EquityPrice \u2014 parentSecurity -> securityType = Equity\
      \ and childSecurity -> securityType = Equity"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:SpinOff
    slots:
    - parentSecurity
    - parentSecurityPrice
    - childSecurity
    - childSecurityPrice
    class_uri: common_domain_model:SpinOff
  Merger:
    name: Merger
    definition_uri: https://w3id.org/lmodel/common_domain_model/Merger
    description: Defines the underlier for both the Purchaser Company and the Acquired
      Compagny involved in Merger corporate action, as well as th respective price
      observation for each.
    comments:
    - "Rosetta condition: EquityPrice \u2014 purchaserSecurity -> securityType = Equity\
      \ and acquiredSecurity -> securityType = Equity"
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Merger
    slots:
    - purchaserSecurity
    - purchaserSecurityPrice
    - acquiredSecurity
    - acquiredSecurityPrice
    class_uri: common_domain_model:Merger
  ClearingInstruction:
    name: ClearingInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/ClearingInstruction
    description: All information required to perform the clear life cycle event; the
      clearing party (CCP), the two parties facing each other on the alpha contract,
      and optionally the parties acting as clearing members.
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ClearingInstruction
    close_mappings:
    - fpml_5_10:ClearingInstruction
    slots:
    - alphaContract
    - clearingParty
    - party1
    - party2
    - clearerParty1
    - clearerParty2
    - isOpenOffer
    class_uri: common_domain_model:ClearingInstruction
  ExerciseEvent:
    name: ExerciseEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseEvent
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: 'A data defining:  the adjusted dates associated with a particular
      exercise event.'
    deprecated: Deprecated in CDM
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ExerciseEvent
    slots:
    - adjustedExerciseDate
    - adjustedRelevantSwapEffectiveDate
    - adjustedCashSettlementValuationDate
    - adjustedCashSettlementPaymentDate
    - adjustedExerciseFeePaymentDate
    class_uri: common_domain_model:ExerciseEvent
  ReturnInstruction:
    name: ReturnInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReturnInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_Return","description":"Defines the process of partially
          or fully returning a Security Lending Transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"returnInstruction","type":"ReturnInstruction","cardinality":"1..1"},{"name":"returnDate","type":"date","cardinality":"1..1"}],"output":{"name":"returnEvent","type":"BusinessEvent","cardinality":"1..1"}}]'
    description: Specifies the information required to create the return of a Security
      Finance Transaction.
    comments:
    - "Rosetta func: Create_Return \u2014 Defines the process of partially or fully\
      \ returning a Security Lending Transaction."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ReturnInstruction
    slots:
    - ReturnInstruction_quantity
    slot_usage:
