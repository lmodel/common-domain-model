        required: false
    class_uri: common_domain_model:FroHistory
  FloatingRateIndexFixingDetails:
    name: FloatingRateIndexFixingDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexFixingDetails
    description: This type holds parameters defining the fixingt time and offset for
      a floating rate index.
    in_subset:
    - cdm_observable_asset_fro
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    exact_mappings:
    - common_domain_model:FloatingRateIndexFixingDetails
    slots:
    - FloatingRateIndexFixingDetails_fixingTime
    - fixingOffset
    slot_usage:
      fixingTime:
        name: fixingTime
        description: Parameters defining the normal fixing time (can vary by index
          tenor / designated maturity).
        range: FloatingRateIndexFixingTime
    class_uri: common_domain_model:FloatingRateIndexFixingDetails
  FloatingRateIndexFixingTime:
    name: FloatingRateIndexFixingTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexFixingTime
    description: This type holds parameters defining the normal fixing time for a
      floating rate index.
    in_subset:
    - cdm_observable_asset_fro
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    exact_mappings:
    - common_domain_model:FloatingRateIndexFixingTime
    is_a: BusinessCenterTime
    slots:
    - hourMinuteTime
    - BusinessCenterTime_businessCenter
    - designatedMaturity
    - fixingTimeDefinition
    - fixingReason
    class_uri: common_domain_model:FloatingRateIndexFixingTime
  FloatingRateIndexFixingOffset:
    name: FloatingRateIndexFixingOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexFixingOffset
    description: This type holds parameters defining the normal fixing offset for
      a floating rate index.
    in_subset:
    - cdm_observable_asset_fro
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    exact_mappings:
    - common_domain_model:FloatingRateIndexFixingOffset
    is_a: BusinessDayOffset
    slots:
    - Period_periodMultiplier
    - Period_period
    - BusinessDayOffset_businessCenters
    - fixingOffsetDefinition
    - fixingOffsetReason
    - FloatingRateIndexFixingOffset_designatedMaturity
    slot_usage:
      designatedMaturity:
        name: designatedMaturity
        description: Allows a reason to be specified for using the alternative fixing
          offset.
    class_uri: common_domain_model:FloatingRateIndexFixingOffset
  BusinessDayOffset:
    name: BusinessDayOffset
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessDayOffset
    description: This allows an offset to be specified as, for instance, N business
      days, with a business centers specified as included.
    in_subset:
    - cdm_observable_asset_fro
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    exact_mappings:
    - common_domain_model:BusinessDayOffset
    close_mappings:
    - fpml_5_10:BusinessDayOffset
    is_a: Period
    slots:
    - Period_periodMultiplier
    - Period_period
    - BusinessDayOffset_businessCenters
    - fixingOffsetDefinition
    - fixingOffsetReason
    slot_usage:
      businessCenters:
        name: businessCenters
        description: The business centers for the offset.
    class_uri: common_domain_model:BusinessDayOffset
  Trigger:
    name: Trigger
    definition_uri: https://w3id.org/lmodel/common_domain_model/Trigger
    description: Trigger point at which feature is effective.
    comments:
    - "Rosetta condition: Choice1 \u2014 required choice level, creditEvents , creditEventsReference"
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:Trigger
    slots:
    - level
    - creditEvents
    - creditEventsReference
    - triggerType
    - triggerTimeType
    class_uri: common_domain_model:Trigger
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            level:
              name: level
              required: true
        - slot_conditions:
            creditEvents:
              name: creditEvents
              required: true
        - slot_conditions:
            creditEventsReference:
              name: creditEventsReference
              required: true
      description: ' Choice rule to represent an FpML choice construct.'
  TriggerEvent:
    name: TriggerEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/TriggerEvent
    description: Observation point for trigger.
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:TriggerEvent
    slots:
    - schedule
    - triggerDates
    - trigger
    - featurePayment
    class_uri: common_domain_model:TriggerEvent
  CreditEvents:
    name: CreditEvents
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditEvents
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify the applicable Credit Events that would trigger
      a settlement, as specified in the related Confirmation and defined in the ISDA
      2014 Credit Definition article IV section 4.1.
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:CreditEvents
    slots:
    - bankruptcy
    - CreditEvents_failureToPay
    - failureToPayPrincipal
    - failureToPayInterest
    - obligationDefault
    - obligationAcceleration
    - repudiationMoratorium
    - restructuring
    - governmentalIntervention
    - distressedRatingsDowngrade
    - maturityExtension
    - writedown
    - impliedWritedown
    - defaultRequirement
    - creditEventNotice
    slot_usage:
      failureToPay:
        name: failureToPay
        description: 'A credit event. This credit event triggers, after the expiration
          of any applicable grace period, if the reference entity fails to make due
          payments in an aggregate amount of not less than the payment requirement
          on one or more obligations (e.g. a missed coupon payment). ISDA 2003 Term:
          Failure to Pay.'
        range: FailureToPay
    class_uri: common_domain_model:CreditEvents
  CreditEventNotice:
    name: CreditEventNotice
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditEventNotice
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:CreditEventNotice
    slots:
    - notifyingParty
    - CreditEventNotice_businessCenter
    - CreditEventNotice_publiclyAvailableInformation
    slot_usage:
      businessCenter:
        name: businessCenter
        description: Inclusion of this business center element implies that Greenwich
          Mean Time in Section 3.3 of the 2003 ISDA Credit Derivatives Definitions
          is replaced by the local time of the city indicated by the businessCenter
          element value.
        multivalued: false
      publiclyAvailableInformation:
        name: publiclyAvailableInformation
        description: 'A specified condition to settlement. Publicly available information
          means information that reasonably confirms any of the facts relevant to
          determining that a credit event or potential repudiation/moratorium, as
          applicable, has occurred. The ISDA defined list (2003) is the market standard
          and is considered comprehensive, and a minimum of two differing public sources
          must have published the relevant information, to declare a Credit Event.
          ISDA 2003 Term: Notice of Publicly Available Information Applicable.'
        range: PubliclyAvailableInformation
        multivalued: false
    class_uri: common_domain_model:CreditEventNotice
  FailureToPay:
    name: FailureToPay
    definition_uri: https://w3id.org/lmodel/common_domain_model/FailureToPay
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:FailureToPay
    slots:
    - FailureToPay_applicable
    - gracePeriodExtension
    - paymentRequirement
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the failure to pay provision is applicable.
    class_uri: common_domain_model:FailureToPay
  GracePeriodExtension:
    name: GracePeriodExtension
    definition_uri: https://w3id.org/lmodel/common_domain_model/GracePeriodExtension
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:GracePeriodExtension
    slots:
    - GracePeriodExtension_applicable
    - gracePeriod
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the grace period extension provision is applicable.
    class_uri: common_domain_model:GracePeriodExtension
  PubliclyAvailableInformation:
    name: PubliclyAvailableInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/PubliclyAvailableInformation
    comments:
    - "Rosetta condition: SourceChoice \u2014 required choice standardPublicSources,\
      \ publicSource"
    - "Rosetta condition: PositiveSpecifiedNumber \u2014 if specifiedNumber exists\
      \ then specifiedNumber >= 0"
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:PubliclyAvailableInformation
    slots:
    - standardPublicSources
    - publicSource
    - specifiedNumber
    class_uri: common_domain_model:PubliclyAvailableInformation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            standardPublicSources:
              name: standardPublicSources
              required: true
        - slot_conditions:
            publicSource:
              name: publicSource
              required: true
      description: ' FpML validation rule cd-36 - Context: PubliclyAvailableInformation
        (complex type). Either standardPublicSources or at least one publicSource
        element must exist.'
    - preconditions:
        slot_conditions:
          specifiedNumber:
            name: specifiedNumber
            required: true
      postconditions:
        slot_conditions:
          specifiedNumber:
            name: specifiedNumber
            minimum_value: 0
      description: ' FpML specifies specifiedNumber as a positiveInteger.'
  Restructuring:
    name: Restructuring
    definition_uri: https://w3id.org/lmodel/common_domain_model/Restructuring
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:Restructuring
    slots:
    - Restructuring_applicable
    - restructuringType
    - multipleHolderObligation
    - multipleCreditEventNotices
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the restructuring provision is applicable.
    class_uri: common_domain_model:Restructuring
  FeaturePayment:
    name: FeaturePayment
    definition_uri: https://w3id.org/lmodel/common_domain_model/FeaturePayment
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Payment made following trigger occurrence.
    comments:
    - "Rosetta condition: FeaturePaymentChoice \u2014 required choice levelPercentage,\
      \ amount"
    - "Rosetta condition: Amount \u2014 if amount exists then amount >= 0.0"
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:FeaturePayment
    slots:
    - FeaturePayment_payerReceiver
    - levelPercentage
    - FeaturePayment_amount
    - FeaturePayment_time
    - FeaturePayment_currency
    - paymentDate
    slot_usage:
      payerReceiver:
        name: payerReceiver
        description: This attribute doesn't exist as part of the FpML construct, which
          makes use of the PayerReceiver.model group.
        range: PartyReferencePayerReceiver
        required: true
      amount:
        name: amount
        description: The monetary quantity in currency units.
        range: decimal
        required: false
      time:
        name: time
        description: The feature payment time.
        range: TimeTypeEnum
        required: false
      currency:
        name: currency
        description: The currency in which an amount is denominated.
    class_uri: common_domain_model:FeaturePayment
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            levelPercentage:
              name: levelPercentage
              required: true
        - slot_conditions:
            amount:
              name: amount
              required: true
      description: ' Choice rule to represent an FpML choice construct.'
    - preconditions:
        slot_conditions:
          amount:
            name: amount
            required: true
      postconditions:
        slot_conditions:
          amount:
            name: amount
            minimum_value: 0.0
      description: ' The amount attribute is specified in FpML as non-negative decimal.'
  Observation:
    name: Observation
    definition_uri: https://w3id.org/lmodel/common_domain_model/Observation
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_AssetReset","description":"Defines how to resolve
          the reset value for an equity payout.","inputs":[{"name":"assetPayout","type":"AssetPayout","cardinality":"1..1"},{"name":"observation","type":"Observation","cardinality":"1..*"},{"name":"resetDate","type":"date","cardinality":"1..1"}],"output":{"name":"reset","type":"Reset","cardinality":"1..1"}},{"name":"ResolveObservationAverage","description":"Specifies
          the interface that should be used by implementors to resolve a single observation
          when provided many, applying the averaging method, if one is provided.","inputs":[{"name":"observations","type":"Observation","cardinality":"1..*"}],"output":{"name":"resetValue","type":"Price","cardinality":"1..1"}},{"name":"ResolveObservation","description":"Specifies
          the interface that should be used by implementors to resolve a single observation
          when provided many, applying the averaging method, if one is provided.","inputs":[{"name":"identifiers","type":"ObservationIdentifier","cardinality":"1..*"},{"name":"averagingMethod","type":"AveragingCalculationMethod","cardinality":"0..1"}],"output":{"name":"observation","type":"Observation","cardinality":"1..1"},"code_implementation":true}]'
    description: Defines a single, numerical value that was observed in the marketplace.
      Observations of market data are made independently to business events or trade
      life-cycle events, so data instances of Observation can be created independently
      of any other model type, hence it is annotated as a root type. Observations
      will be broadly reused in many situations, so references to Observation are
      supported via the 'key' annotation.
    comments:
    - "Rosetta func: Create_AssetReset \u2014 Defines how to resolve the reset value\
      \ for an equity payout."
    - "Rosetta func: ResolveObservationAverage \u2014 Specifies the interface that\
      \ should be used by implementors to resolve a single observation when provided\
      \ many, applying the averaging method, if one is provided."
    - "Rosetta func: ResolveObservation \u2014 Specifies the interface that should\
      \ be used by implementors to resolve a single observation when provided many,\
      \ applying the averaging method, if one is provided."
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:Observation
    slots:
    - observedValue
    - observationIdentifier
    class_uri: common_domain_model:Observation
    tree_root: true
  ObservationIdentifier:
    name: ObservationIdentifier
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationIdentifier
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"ResolveObservation","description":"Specifies the interface
          that should be used by implementors to resolve a single observation when
          provided many, applying the averaging method, if one is provided.","inputs":[{"name":"identifiers","type":"ObservationIdentifier","cardinality":"1..*"},{"name":"averagingMethod","type":"AveragingCalculationMethod","cardinality":"0..1"}],"output":{"name":"observation","type":"Observation","cardinality":"1..1"},"code_implementation":true}]'
    description: Defines the parameters needed to uniquely identify a piece of data
      among the population of all available market data.
    comments:
    - "Rosetta func: ResolveObservation \u2014 Specifies the interface that should\
      \ be used by implementors to resolve a single observation when provided many,\
      \ applying the averaging method, if one is provided."
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:ObservationIdentifier
    slots:
    - ObservationIdentifier_observable
    - observationDate
    - observationTime
    - ObservationIdentifier_informationSource
    - determinationMethodology
    slot_usage:
      observable:
        name: observable
        description: Represents the asset or rate to which the observation relates.
        required: true
      informationSource:
        name: informationSource
        description: Represents where the market data published and should be observed.
    class_uri: common_domain_model:ObservationIdentifier
  DeterminationMethodology:
    name: DeterminationMethodology
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeterminationMethodology
    description: Specifies the method according to which an amount or a date is determined.
    in_subset:
    - cdm_observable_event
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - common_domain_model:DeterminationMethodology
    slots:
    - DeterminationMethodology_determinationMethod
    - averagingMethod
    slot_usage:
      determinationMethod:
        name: determinationMethod
        description: Represents a more granular dimention of observation. Typically
          relevent for resolving a unique equity price, which can be expressed as
          trade-weighted or volume-weighted averages.
        required: false
    class_uri: common_domain_model:DeterminationMethodology
  CommodityPayout:
    name: CommodityPayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/CommodityPayout
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Payout based on the averaged price of a referenced underlier. (e.g.
      Commodities). Can represent both average (average of many) & bullet (average
      of 1) pricing
    comments:
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    - "Rosetta condition: CalculationPeriod \u2014 required choice schedule, calculationPeriodDates"
    - "Rosetta condition: CommodityUnderlier \u2014 if underlier -> Observable exists\
      \ then ObservableIsCommodity(underlier -> Observable) else if underlier -> Product\
      \ -> TransferableProduct -> economicTerms -> payout only-element -> OptionPayout\
      \ exists then ObservableIsCommodity( underlier -> Product -> TransferableProduct\
      \ -> economicTerms -> payout only-element -> OptionPayout -> underlier -> Observable\
      \ ) // Commodity Option else if underlier -> Product -> TransferableProduct\
      \ -> economicTerms -> payout only-element -> SettlementPayout exists then ObservableIsCommodity(\
      \ underlier -> Product -> TransferableProduct -> economicTerms -> payout only-element\
      \ -> SettlementPayout -> underlier -> Observable ) // Commodity Future else\
      \ False"
    - "Rosetta condition: DeliveryCapacity \u2014 if delivery -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> deliveryCapacity exists then delivery -> deliveryCapacity is absent and\
      \ delivery -> periods -> profile -> block -> deliveryCapacity is absent and\
      \ schedule -> schedulePeriod -> deliveryPeriod -> profile -> block -> deliveryCapacity\
      \ is absent else if delivery -> periods -> profile -> block -> deliveryCapacity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> deliveryCapacity is absent else if schedule -> schedulePeriod -> deliveryPeriod\
      \ -> profile -> block -> deliveryCapacity exists then delivery -> deliveryCapacity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> deliveryCapacity\
      \ is absent and delivery -> periods -> profile -> block -> deliveryCapacity\
      \ is absent"
    - "Rosetta condition: PriceTimeIntervalQuantity \u2014 if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> priceTimeIntervalQuantity exists then delivery -> periods\
      \ -> profile -> block -> priceTimeIntervalQuantity is absent and schedule ->\
      \ schedulePeriod -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent else if delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ exists then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and schedule -> schedulePeriod -> deliveryPeriod -> profile -> block\
      \ -> priceTimeIntervalQuantity is absent else if schedule -> schedulePeriod\
      \ -> deliveryPeriod -> profile -> block -> priceTimeIntervalQuantity exists\
      \ then schedule -> schedulePeriod -> deliveryPeriod -> priceTimeIntervalQuantity\
      \ is absent and delivery -> periods -> profile -> block -> priceTimeIntervalQuantity\
      \ is absent"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:CommodityPayout
    close_mappings:
    - fpml_5_10:CommodityPayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - averagingFeature
    - commodityPriceReturnTerms
    - pricingDates
    - CommodityPayout_schedule
    - calculationPeriodDates
    - paymentDates
    - CommodityPayout_underlier
    - fxFeature
    - delivery
    slot_usage:
      schedule:
        name: schedule
        description: Allows the full representation of a payout by defining a set
          of schedule periods. It supports standard schedule customization by expressing
          all the dates, quantities, and pricing data in a non-parametric way.
        range: CalculationSchedule
        multivalued: false
      underlier:
        name: underlier
        description: Identifies the underlying product that is referenced for pricing
          of the applicable leg in a swap. Referenced in the '2018 ISDA CDM Equity
          Confirmation for Security Equity Swap' as Security.
    class_uri: common_domain_model:CommodityPayout
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            schedule:
              name: schedule
              required: true
        - slot_conditions:
            calculationPeriodDates:
              name: calculationPeriodDates
              required: true
      description: The calculation periods are either specified parametrically via
        CalculationPeriodDates or non-parametrically via SchedulePeriod.
  AssetDeliveryInformation:
    name: AssetDeliveryInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetDeliveryInformation
    description: Contains the information relative to the delivery of the asset.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:AssetDeliveryInformation
    close_mappings:
    - fpml_5_10:AssetDeliveryInformation
    slots:
    - periods
    - AssetDeliveryInformation_location
    - deliveryCapacity
    - commodityGrade
    slot_usage:
      location:
        name: location
        description: Defines the location of the delivery of the commodity.
        range: LocationIdentifier
        multivalued: true
    class_uri: common_domain_model:AssetDeliveryInformation
  AssetDeliveryPeriods:
    name: AssetDeliveryPeriods
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetDeliveryPeriods
    description: Defines the periods of delivery, including the delivery profile.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:AssetDeliveryPeriods
    close_mappings:
    - fpml_5_10:AssetDeliveryPeriods
    slots:
    - profile
    - AssetDeliveryPeriods_startDate
    - AssetDeliveryPeriods_endDate
    slot_usage:
      startDate:
        name: startDate
        description: Delivery start date
        required: false
      endDate:
        name: endDate
        description: Delivery end date
        required: false
    class_uri: common_domain_model:AssetDeliveryPeriods
  CalculationScheduleDeliveryPeriods:
    name: CalculationScheduleDeliveryPeriods
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationScheduleDeliveryPeriods
    description: Period and time profile over which the delivery takes place.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:CalculationScheduleDeliveryPeriods
    close_mappings:
    - fpml_5_10:CalculationScheduleDeliveryPeriods
    is_a: AssetDeliveryPeriods
    slots:
    - profile
    - AssetDeliveryPeriods_startDate
    - AssetDeliveryPeriods_endDate
    - deliveryCapacity
    - priceTimeIntervalQuantity
    class_uri: common_domain_model:CalculationScheduleDeliveryPeriods
  AssetDeliveryProfile:
    name: AssetDeliveryProfile
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetDeliveryProfile
    description: Defines the delivery profile of the asset, including the load type
      and the delivery intervals.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:AssetDeliveryProfile
    close_mappings:
    - fpml_5_10:AssetDeliveryProfile
    slots:
    - loadType
    - block
    - bankHolidaysTreatment
    class_uri: common_domain_model:AssetDeliveryProfile
  AssetDeliveryProfileBlock:
    name: AssetDeliveryProfileBlock
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetDeliveryProfileBlock
    description: Defines a delivery profile block, including start and end time, days
      of the week, duration, delivery capacity and price time interval quantity.
    in_subset:
    - cdm_product_asset
