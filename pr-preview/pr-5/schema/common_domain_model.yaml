    - SubstitutedRegimeTerms_party
    - SubstitutedRegimeTerms_isApplicable
    slot_usage:
      party:
        name: party
        description: The party for which the regime terms are being specified when
          acting as collateral taker.
        range: CounterpartyRoleEnum
        required: true
      isApplicable:
        name: isApplicable
        description: The specification of whether the regime is elected as applicable
          to the party when acting as collateral taker.
    class_uri: common_domain_model:SubstitutedRegimeTerms
  Substitution:
