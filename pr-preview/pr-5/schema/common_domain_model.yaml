      productClass:
        name: productClass
        required: false
    class_uri: common_domain_model:StandardizedScheduleTradeInfo
  StandardizedScheduleInitialMargin:
    name: StandardizedScheduleInitialMargin
    definition_uri: https://w3id.org/lmodel/common_domain_model/StandardizedScheduleInitialMargin
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"GetNetInitialMarginFromExposure","description":"Computes
          the net initial margin, taking the gross initial margin result and the mark
          to market value for each trade in the portfolio.","inputs":[{"name":"exposure","type":"Exposure","cardinality":"0..1"}],"output":{"name":"initialMargin","type":"StandardizedScheduleInitialMargin","cardinality":"0..1"}}]'
    comments:
    - "Rosetta condition: NonNegativeNetInitialMargin \u2014 netInitialMargin -> value\
      \ >= 0"
    - "Rosetta func: GetNetInitialMarginFromExposure \u2014 Computes the net initial\
      \ margin, taking the gross initial margin result and the mark to market value\
      \ for each trade in the portfolio."
    in_subset:
    - cdm_margin_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_margin_schedule
    exact_mappings:
    - common_domain_model:StandardizedScheduleInitialMargin
    slots:
    - tradeInfo
    - netInitialMargin
    class_uri: common_domain_model:StandardizedScheduleInitialMargin
  IndexBase:
