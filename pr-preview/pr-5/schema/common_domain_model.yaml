    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingAmountEvents
    description: A class to specify the ISDA terms relating to the floating rate payment
      events and the implied additional fixed payments, applicable to the credit derivatives
      transactions on mortgage-backed securities with pay-as-you-go or physical settlement.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingAmountEvents
    slots:
    - FloatingAmountEvents_failureToPayPrincipal
    - interestShortfall
    - FloatingAmountEvents_writedown
    - FloatingAmountEvents_impliedWritedown
    - floatingAmountProvisions
    - additionalFixedPayments
    slot_usage:
      failureToPayPrincipal:
        name: failureToPayPrincipal
        description: 'A floating rate payment event. Corresponds to the failure by
          the Reference Entity to pay an expected principal amount or the payment
          of an actual principal amount that is less than the expected principal amount.
          ISDA 2003 Term: Failure to Pay Principal.'
      writedown:
        name: writedown
        description: 'A floating rate payment event. Results from the fact that the
          underlier writes down its outstanding principal amount. ISDA 2003 Term:
          Writedown.'
      impliedWritedown:
        name: impliedWritedown
        description: A floating rate payment event. Results from the fact that losses
          occur to the underlying instruments that do not result in reductions of
          the outstanding principal of the reference obligation.
    class_uri: common_domain_model:FloatingAmountEvents
  FloatingAmountProvisions:
    name: FloatingAmountProvisions
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingAmountProvisions
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingAmountProvisions
    slots:
    - wacCapInterestProvision
    - stepUpProvision
    class_uri: common_domain_model:FloatingAmountProvisions
  InterestShortFall:
    name: InterestShortFall
    definition_uri: https://w3id.org/lmodel/common_domain_model/InterestShortFall
    description: A class to specify the interest shortfall floating rate payment event.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:InterestShortFall
    slots:
    - interestShortfallCap
    - compounding
    - rateSource
    class_uri: common_domain_model:InterestShortFall
  ProtectionTerms:
    name: ProtectionTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ProtectionTerms
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class to specify the terms for calculating a payout to protect
      the buyer of the swap in the case of a qualified credit event. These terms include
      the applicable credit events, the reference obligation, and in the case of a
      CDS on mortgage-backed securities, the floatingAmountEvents.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ProtectionTerms
    slots:
    - ProtectionTerms_creditEvents
    - ProtectionTerms_obligations
    - floatingAmountEvents
    slot_usage:
      creditEvents:
        name: creditEvents
        description: Specifies the applicable Credit Events that would trigger a settlement,
          as specified in the related Confirmation and defined in the ISDA 2014 Credit
          Definition article IV section 4.1.
      obligations:
        name: obligations
        description: The underlying obligations of the reference entity on which you
          are buying or selling protection. The credit events Failure to Pay, Obligation
          Acceleration, Obligation Default, Restructuring, Repudiation/Moratorium
          are defined with respect to these obligations.
        range: Obligations
        required: false
    class_uri: common_domain_model:ProtectionTerms
  ReferenceInformation:
    name: ReferenceInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferenceInformation
    description: A class specifying the Credit Default Swap Reference Information.
    comments:
    - "Rosetta condition: ReferenceInformationChoice \u2014 required choice referenceObligation,\
      \ noReferenceObligation , unknownReferenceObligation"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReferenceInformation
    slots:
    - referenceEntity
    - referenceObligation
    - noReferenceObligation
    - unknownReferenceObligation
    - allGuarantees
    - referencePrice
    - referencePolicy
    - securedList
    class_uri: common_domain_model:ReferenceInformation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            referenceObligation:
              name: referenceObligation
              required: true
        - slot_conditions:
            noReferenceObligation:
              name: noReferenceObligation
              required: true
        - slot_conditions:
            unknownReferenceObligation:
              name: unknownReferenceObligation
              required: true
      description: Choice rule to represent an FpML choice construct.
  ReferenceObligation:
    name: ReferenceObligation
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferenceObligation
    description: A class to specify the reference obligation that is associated with
      a credit derivative instrument.
    comments:
    - "Rosetta condition: AssetChoice \u2014 required choice security, loan"
    - "Rosetta condition: MustBeDebtSecurity \u2014 if security exists then security\
      \ -> securityType = Debt"
    - "Rosetta condition: LegalEntityChoice \u2014 optional choice primaryObligor,\
      \ primaryObligorReference"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReferenceObligation
    slots:
    - ReferenceObligation_security
    - loan
    - primaryObligor
    - primaryObligorReference
    - guarantor
    - guarantorReference
    - standardReferenceObligation
    slot_usage:
      security:
        name: security
        description: Identifies the underlying asset when it is a security, such as
          a bond or convertible bond. The security data type requires one or more
          productIdentifiers, specificaiton of the security type (e.g. debt), and
          includes optional attributes to specify a debt class, such as asset-backed,
          as well as seniority.
        required: false
    class_uri: common_domain_model:ReferenceObligation
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            security:
              name: security
              required: true
        - slot_conditions:
            loan:
              name: loan
              required: true
      description: Represents the choice in a CDS contract.
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            primaryObligor:
              name: primaryObligor
              required: true
        - slot_conditions:
            primaryObligorReference:
              name: primaryObligorReference
              required: true
      description: Represents the choice in a CDS contract..
  ReferencePair:
    name: ReferencePair
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferencePair
    comments:
    - "Rosetta condition: ReferenceChoice \u2014 required choice referenceObligation,\
      \ noReferenceObligation"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReferencePair
    slots:
    - ReferencePair_referenceEntity
    - ReferencePair_referenceObligation
    - noReferenceObligation
    - entityType
    slot_usage:
      referenceEntity:
        name: referenceEntity
        description: 'The corporate or sovereign entity on which you are buying or
          selling protection and any successor that assumes all or substantially all
          of its contractual and other obligations. It is vital to use the correct
          legal name of the entity and to be careful not to choose a subsidiary if
          you really want to trade protection on a parent company. Please note, Reference
          Entities cannot be senior or subordinated. It is the obligations of the
          Reference Entities that can be senior or subordinated. ISDA 2003 Term: Reference
          Entity.'
      referenceObligation:
        name: referenceObligation
        multivalued: false
    class_uri: common_domain_model:ReferencePair
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            referenceObligation:
              name: referenceObligation
              required: true
        - slot_conditions:
            noReferenceObligation:
              name: noReferenceObligation
              required: true
      description: Choice rule to represent an FpML choice construct.
  ReferencePool:
    name: ReferencePool
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferencePool
    description: This type contains all the reference pool items to define the reference
      entity and reference obligation(s) in the basket.
    comments:
    - "Rosetta condition: FpML_cd_44_openUnits \u2014 if referencePoolItem -> constituentWeight\
      \ -> openUnits exists then referencePoolItem -> constituentWeight -> basketPercentage\
      \ is absent"
    - "Rosetta condition: FpML_cd_44_basketPercentage \u2014 if referencePoolItem\
      \ -> constituentWeight -> basketPercentage exists then referencePoolItem ->\
      \ constituentWeight -> openUnits is absent"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReferencePool
    slots:
    - referencePoolItem
    class_uri: common_domain_model:ReferencePool
  ReferencePoolItem:
    name: ReferencePoolItem
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferencePoolItem
    description: This type contains all the constituent weight and reference information.
    comments:
    - "Rosetta condition: SettlementChoice \u2014 optional choice cashSettlementTermsReference,\
      \ physicalSettlementTermsReference"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReferencePoolItem
    slots:
    - constituentWeight
    - referencePair
    - protectionTermsReference
    - cashSettlementTermsReference
    - physicalSettlementTermsReference
    class_uri: common_domain_model:ReferencePoolItem
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            cashSettlementTermsReference:
              name: cashSettlementTermsReference
              required: true
        - slot_conditions:
            physicalSettlementTermsReference:
              name: physicalSettlementTermsReference
              required: true
      description: A choice rule between a reference to the cash or physical settlement
        terms.
  SettledEntityMatrix:
    name: SettledEntityMatrix
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettledEntityMatrix
    description: A class to specify the Relevant Settled Entity Matrix.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:SettledEntityMatrix
    slots:
    - matrixSource
    - SettledEntityMatrix_publicationDate
    slot_usage:
      publicationDate:
        name: publicationDate
        description: Specifies the publication date of the applicable version of the
          matrix. When this element is omitted, the Standard Terms Supplement defines
          rules for which version of the matrix is applicable.
        range: date
    class_uri: common_domain_model:SettledEntityMatrix
  Tranche:
    name: Tranche
    definition_uri: https://w3id.org/lmodel/common_domain_model/Tranche
    description: The class to represent a CDS Tranche.
    comments:
    - "Rosetta condition: AttachmentPoint \u2014 attachmentPoint >= 0.0 and attachmentPoint\
      \ <= 1.0"
    - "Rosetta condition: ExhaustionPoint \u2014 exhaustionPoint >= 0.0 and exhaustionPoint\
      \ <= 1.0"
    - "Rosetta condition: AttachmentPointLessThanExhaustionPoint \u2014 attachmentPoint\
      \ <= exhaustionPoint"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:Tranche
    slots:
    - attachmentPoint
    - exhaustionPoint
    - incurredRecoveryApplicable
    class_uri: common_domain_model:Tranche
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          attachmentPoint:
            name: attachmentPoint
            minimum_value: 0.0
            maximum_value: 1.0
      description: FpML definition associated with the attachmentPoint element specifies
        that a schema facet to constraint the value between 0 to 1 will be introduced
        in FpML 4.3.
    - preconditions: {}
      postconditions:
        slot_conditions:
          exhaustionPoint:
            name: exhaustionPoint
            minimum_value: 0.0
            maximum_value: 1.0
      description: FpML definition associated with the exhaustionPoint element specifies
        that a schema facet to constraint the value between 0 to 1 will be introduced
        in FpML 4.3.
    - preconditions: {}
      description: 'FpML validation rule cd-40 - Context: Tranche (complex type) attachmentPoint
        must be less or equal to exhaustionPoint.'
      comments:
      - 'Rosetta comparison: attachmentPoint <= exhaustionPoint'
  DividendCurrency:
    name: DividendCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendCurrency
    description: A class to specify the currency in which the dividends will be denominated,
      i.e. either in the dividend currency or in a currency specified as part of the
      contract.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DividendCurrency
    slots:
    - DividendCurrency_currency
    - DividendCurrency_determinationMethod
    - currencyReference
    slot_usage:
      currency:
        name: currency
        description: The currency in which the dividend is denominated. The list of
          valid currencies is not presently positioned as an enumeration as part of
          the CDM because that scope is limited to the values specified by ISDA and
          FpML. As a result, implementers have to make reference to the relevant standard,
          such as the ISO 4217 standard for currency codes.
      determinationMethod:
        name: determinationMethod
        description: Specifies the method according to which the dividend is determined,
          e.g. the dividend currency.
        required: false
    class_uri: common_domain_model:DividendCurrency
  DividendDateReference:
    name: DividendDateReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendDateReference
    description: A class to specify the dividend date by reference to another date,
      with the ability to apply and offset. This class doesn't exist in FpML and is
      meant to simplify the choice constraint associated with the DividendPaymentDate
      class.
    comments:
    - "Rosetta condition: PaymentDateOffset \u2014 if paymentDateOffset exists then\
      \ dateReference = DividendDateReferenceEnum -> SharePayment"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DividendDateReference
    slots:
    - dateReference
    - paymentDateOffset
    class_uri: common_domain_model:DividendDateReference
  DividendPaymentDate:
    name: DividendPaymentDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendPaymentDate
    description: A class describing the date on which the dividend will be paid/received.
      This class is also used to specify the date on which the FX rate will be determined,
      when applicable.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DividendPaymentDate
    slots:
    - dividendDateReference
    - dividendDate
    class_uri: common_domain_model:DividendPaymentDate
  DividendReturnTerms:
    name: DividendReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendReturnTerms
    description: A class describing the conditions governing the payment of dividends
      to the receiver of the equity return, with the exception of the dividend payout
      ratio, which is defined for each of the underlying components.
    comments:
    - "Rosetta condition: DividendPeriod \u2014 if firstOrSecondPeriod exists then\
      \ dividendPeriod -> startDate is absent and dividendPeriod -> endDate is absent"
    - "Rosetta condition: ExtraordinaryDividendsParty \u2014 if extraordinaryDividendsParty\
      \ exists then extraordinaryDividendsParty = AncillaryRoleEnum -> ExtraordinaryDividendsParty"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DividendReturnTerms
    slots:
    - dividendPayoutRatio
    - dividendReinvestment
    - dividendEntitlement
    - dividendAmountType
    - performance
    - firstOrSecondPeriod
    - extraordinaryDividendsParty
    - excessDividendAmount
    - dividendCurrency
    - nonCashDividendTreatment
    - dividendComposition
    - specialDividends
    - materialDividend
    - dividendPeriod
    class_uri: common_domain_model:DividendReturnTerms
  DividendPeriod:
    name: DividendPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendPeriod
    description: Time bounded dividend payment periods, each with a dividend payment
      date per period.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DividendPeriod
    slots:
    - DividendPeriod_startDate
    - DividendPeriod_endDate
    - DividendPeriod_dateAdjustments
    - DividendPeriod_basketConstituent
    - dividendPaymentDate
    - dividendValuationDate
    slot_usage:
      startDate:
        name: startDate
        description: Dividend period start date.
        range: DividendPaymentDate
        required: false
      endDate:
        name: endDate
        description: Dividend period end date.
        range: DividendPaymentDate
        required: false
      dateAdjustments:
        name: dateAdjustments
        description: Date adjustments for all unadjusted dates in this dividend period.
        required: true
      basketConstituent:
        name: basketConstituent
        description: For basket underliers, reference to the basket component which
          is paying dividends in the specified period.
        required: false
        multivalued: false
    class_uri: common_domain_model:DividendPeriod
  PriceReturnTerms:
    name: PriceReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceReturnTerms
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:PriceReturnTerms
    slots:
    - returnType
    - conversionFactor
    - performance
    class_uri: common_domain_model:PriceReturnTerms
  ReturnTermsBase:
    name: ReturnTermsBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReturnTermsBase
    description: Contains all common elements in variance, volatility and correlation
      return Terms.
    comments:
    - "Rosetta condition: InitialLevelOrInitialLevelSource \u2014 if initialLevel\
      \ is absent then initialLevelSource exists and if initialLevelSource is absent\
      \ then initialLevel exists"
    - "Rosetta condition: PositiveExpectedN \u2014 expectedN > 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ReturnTermsBase
    slots:
    - valuationTerms
    - annualizationFactor
    - dividendApplicability
    - equityUnderlierProvisions
    - sharePriceDividendAdjustment
    - expectedN
    - initialLevel
    - initialLevelSource
    - meanAdjustment
    - performance
    class_uri: common_domain_model:ReturnTermsBase
    rules:
    - preconditions:
        slot_conditions:
          initialLevel:
            name: initialLevel
            required: false
      postconditions:
        slot_conditions:
          initialLevelSource:
            name: initialLevelSource
            required: true
      description: At least one of initialLevel and initialLevelSource must be present,
        or both
    - preconditions: {}
      postconditions:
        slot_conditions:
          expectedN:
            name: expectedN
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: The number of expected trading dates must be positive
  VarianceReturnTerms:
    name: VarianceReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/VarianceReturnTerms
    comments:
    - "Rosetta condition: Positive_VegaNotionalAmount \u2014 if vegaNotionalAmount\
      \ -> value exists then vegaNotionalAmount -> value > 0"
    - "Rosetta condition: UnderlierMustBeListedDerivative \u2014 if exchangeTradedContractNearest\
      \ exists then exchangeTradedContractNearest -> Asset -> Instrument -> ListedDerivative\
      \ exists"
    - "Rosetta condition: ReferenceContract \u2014 if valuationTerms -> futuresPriceValuation\
      \ = True then exchangeTradedContractNearest exists"
    - "Rosetta condition: StrikePriceMustExist \u2014 required choice volatilityStrikePrice,\
      \ varianceStrikePrice"
    - "Rosetta condition: NonNegativeStrikePrice \u2014 if volatilityStrikePrice ->\
      \ value exists then volatilityStrikePrice -> value >= 0 and if varianceStrikePrice\
      \ -> value exists then varianceStrikePrice -> value >= 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:VarianceReturnTerms
    is_a: ReturnTermsBase
    slots:
    - valuationTerms
    - annualizationFactor
    - dividendApplicability
    - equityUnderlierProvisions
    - sharePriceDividendAdjustment
    - expectedN
    - initialLevel
    - initialLevelSource
    - meanAdjustment
    - performance
    - varianceStrikePrice
    - volatilityStrikePrice
    - varianceCapFloor
    - volatilityCapFloor
    - vegaNotionalAmount
    - exchangeTradedContractNearest
    class_uri: common_domain_model:VarianceReturnTerms
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            volatilityStrikePrice:
              name: volatilityStrikePrice
              required: true
        - slot_conditions:
            varianceStrikePrice:
              name: varianceStrikePrice
              required: true
      description: The strike price must be present, but it can be expressed in either
        variance or volatility terms
  VolatilityReturnTerms:
    name: VolatilityReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/VolatilityReturnTerms
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:VolatilityReturnTerms
    is_a: ReturnTermsBase
    slots:
    - valuationTerms
    - annualizationFactor
    - dividendApplicability
    - equityUnderlierProvisions
    - sharePriceDividendAdjustment
    - expectedN
    - initialLevel
    - initialLevelSource
    - meanAdjustment
    - performance
    - VolatilityReturnTerms_volatilityStrikePrice
    - VolatilityReturnTerms_volatilityCapFloor
    - VolatilityReturnTerms_exchangeTradedContractNearest
    slot_usage:
      volatilityStrikePrice:
        name: volatilityStrikePrice
        required: true
      volatilityCapFloor:
        name: volatilityCapFloor
        description: Contains volatility-based barriers
      exchangeTradedContractNearest:
        name: exchangeTradedContractNearest
        range: ListedDerivative
    class_uri: common_domain_model:VolatilityReturnTerms
  CorrelationReturnTerms:
    name: CorrelationReturnTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/CorrelationReturnTerms
    comments:
    - "Rosetta condition: PositiveNumberOfDataSeries \u2014 if numberOfDataSeries\
      \ exists then numberOfDataSeries > 0"
    - "Rosetta condition: CorrelationValue \u2014 correlationStrikePrice -> value\
      \ > -1 and correlationStrikePrice -> value < 1"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:CorrelationReturnTerms
    is_a: ReturnTermsBase
    slots:
    - valuationTerms
    - annualizationFactor
    - dividendApplicability
    - equityUnderlierProvisions
    - sharePriceDividendAdjustment
    - expectedN
    - initialLevel
    - initialLevelSource
    - meanAdjustment
    - performance
    - correlationStrikePrice
    - boundedCorrelation
    - numberOfDataSeries
    class_uri: common_domain_model:CorrelationReturnTerms
    rules:
    - preconditions:
        slot_conditions:
          numberOfDataSeries:
            name: numberOfDataSeries
            required: true
      postconditions:
        slot_conditions:
          numberOfDataSeries:
            name: numberOfDataSeries
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: The number of data series must be positive
  ValuationTerms:
    name: ValuationTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationTerms
    comments:
    - "Rosetta condition: PositiveNumberOfValuationDates \u2014 if numberOfValuationDates\
      \ exists then numberOfValuationDates > 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:ValuationTerms
    slots:
    - futuresPriceValuation
    - optionsPriceValuation
    - numberOfValuationDates
    - dividendValuationDates
    - fPVFinalPriceElectionFallback
    - multipleExchangeIndexAnnexFallback
    - componentSecurityIndexAnnexFallback
    class_uri: common_domain_model:ValuationTerms
    rules:
    - preconditions:
        slot_conditions:
          numberOfValuationDates:
            name: numberOfValuationDates
            required: true
      postconditions:
        slot_conditions:
          numberOfValuationDates:
            name: numberOfValuationDates
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: The number of valuation dates must be positive.
  EquityUnderlierProvisions:
    name: EquityUnderlierProvisions
    definition_uri: https://w3id.org/lmodel/common_domain_model/EquityUnderlierProvisions
    comments:
    - "Rosetta condition: ComponentSecurityOrMultipleExchange \u2014 optional choice\
      \ multipleExchangeIndexAnnexFallback, componentSecurityIndexAnnexFallback"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:EquityUnderlierProvisions
    slots:
    - EquityUnderlierProvisions_multipleExchangeIndexAnnexFallback
    - EquityUnderlierProvisions_componentSecurityIndexAnnexFallback
    - localJurisdiction
    - relevantJurisdiction
    slot_usage:
      multipleExchangeIndexAnnexFallback:
        name: multipleExchangeIndexAnnexFallback
        description: For an index option or swap transaction, a flag to indicate whether
          a relevant Multiple Exchange Index Annex is applicable to the transaction.
          This annex defines additional provisions which are applicable where an index
          is comprised of component securities that are traded on multiple exchanges.
      componentSecurityIndexAnnexFallback:
        name: componentSecurityIndexAnnexFallback
        description: For an index option or swap transaction, a flag to indicate whether
          a relevant Component Security Index Annex is applicable to the transaction.
    class_uri: common_domain_model:EquityUnderlierProvisions
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            multipleExchangeIndexAnnexFallback:
              name: multipleExchangeIndexAnnexFallback
              required: true
        - slot_conditions:
            componentSecurityIndexAnnexFallback:
              name: componentSecurityIndexAnnexFallback
              required: true
      description: If multipleExchangeIndexAnnexFallback is present then componentSecurityIndexAnnexFallback
        must be absent and vice versa.
  VarianceCapFloor:
    name: VarianceCapFloor
    definition_uri: https://w3id.org/lmodel/common_domain_model/VarianceCapFloor
    comments:
    - "Rosetta condition: PositiveUnadjustedVarianceCap \u2014 if unadjustedVarianceCap\
      \ exists then unadjustedVarianceCap > 0"
    - "Rosetta condition: CapFloorApplicability \u2014 if varianceCap = True then\
      \ unadjustedVarianceCap exists or boundedVariance exists // If CapFloor is applicable\
      \ at least one cap expression must exist else unadjustedVarianceCap is absent\
      \ and boundedVariance is absent // If CapFloor is not applicable, then there\
      \ cannot be any volatility caps"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:VarianceCapFloor
    slots:
    - varianceCap
    - unadjustedVarianceCap
    - boundedVariance
    class_uri: common_domain_model:VarianceCapFloor
    rules:
    - preconditions:
        slot_conditions:
          unadjustedVarianceCap:
            name: unadjustedVarianceCap
            required: true
      postconditions:
        slot_conditions:
          unadjustedVarianceCap:
            name: unadjustedVarianceCap
            comments:
            - 'Rosetta: strictly greater than'
            minimum_value: 0
      description: Unadjusted variance cap must be positive
    - preconditions:
        slot_conditions:
          varianceCap:
            name: varianceCap
            equals_string: 'True'
      postconditions:
        any_of:
        - slot_conditions:
            unadjustedVarianceCap:
              name: unadjustedVarianceCap
              required: true
        - slot_conditions:
            boundedVariance:
              name: boundedVariance
              required: true
      description: Caps/floors can and must be specified if varianceCap is set to
        true. If false, barriers cannot be established
  BoundedVariance:
    name: BoundedVariance
    definition_uri: https://w3id.org/lmodel/common_domain_model/BoundedVariance
    comments:
    - "Rosetta condition: NonNegativeBarriers \u2014 if upperBarrier exists then upperBarrier\
      \ >= 0 and if lowerBarrier exists then lowerBarrier >= 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:BoundedVariance
    close_mappings:
    - fpml_5_10:BoundedVariance
    slots:
    - realisedVarianceMethod
    - daysInRangeAdjustment
    - upperBarrier
    - lowerBarrier
    class_uri: common_domain_model:BoundedVariance
    rules:
    - preconditions:
        slot_conditions:
          upperBarrier:
            name: upperBarrier
            required: true
      postconditions:
        slot_conditions:
          upperBarrier:
            name: upperBarrier
            minimum_value: 0
      description: Barriers cannot be set to negative values
  VolatilityCapFloor:
    name: VolatilityCapFloor
    definition_uri: https://w3id.org/lmodel/common_domain_model/VolatilityCapFloor
    description: Contains volatility-based barriers. Volatility Cap needs to be specified
      in accordance with the ISDA 2011 Equity Derivatives Definitions.
    comments:
    - "Rosetta condition: CapFloorApplicability \u2014 if applicable = True then totalVolatilityCap\
      \ exists or volatilityCapFactor exists // If CapFloor is applicable at least\
      \ one cap expression must exist else totalVolatilityCap is absent and volatilityCapFactor\
      \ is absent // If CapFloor is not applicable, then there cannot be any volatility\
      \ caps"
    - "Rosetta condition: PositiveCaps \u2014 if totalVolatilityCap exists then totalVolatilityCap\
      \ >= 0 and if volatilityCapFactor exists then volatilityCapFactor >= 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:VolatilityCapFloor
    slots:
    - VolatilityCapFloor_applicable
    - totalVolatilityCap
    - volatilityCapFactor
    slot_usage:
      applicable:
        name: applicable
        description: Indicates whether the volatility cap is applicable in accordance
          with the ISDA 2011 Equity Derivatives Definitions. Setting the element 'applicable'
          to 'False' - means No Volatility Cap and no 'totalVolatilityCap' or 'volatilityCapFactor'
          should be provided. Setting the element 'applicable' to 'True' - means Volatility
          Cap election, then 'totalVolatilityCap' or 'volatilityCapFactor' should
          be provided, otherwise it defaults to volatilityCapFactor=2.5.
    class_uri: common_domain_model:VolatilityCapFloor
    rules:
    - preconditions:
        slot_conditions:
          applicable:
            name: applicable
            equals_string: 'True'
      postconditions:
        any_of:
        - slot_conditions:
            totalVolatilityCap:
              name: totalVolatilityCap
              required: true
        - slot_conditions:
            volatilityCapFactor:
              name: volatilityCapFactor
              required: true
      description: Caps/floors can and must be specified if applicable is set to true.
        If false, barriers cannot be established
    - preconditions:
        slot_conditions:
          totalVolatilityCap:
            name: totalVolatilityCap
            required: true
      postconditions:
        slot_conditions:
          totalVolatilityCap:
            name: totalVolatilityCap
            minimum_value: 0
      description: Barriers must be set to positive values
  BoundedCorrelation:
    name: BoundedCorrelation
    definition_uri: https://w3id.org/lmodel/common_domain_model/BoundedCorrelation
    description: Describes correlation bounds, which form a cap and a floor on the
      realized correlation.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:BoundedCorrelation
    close_mappings:
    - fpml_5_10:BoundedCorrelation
    slots:
    - minimumBoundaryPercent
    - maximumBoundaryPercent
    class_uri: common_domain_model:BoundedCorrelation
  BondReference:
    name: BondReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/BondReference
    description: Reference to a bond underlier to represent an asset swap or Condition
      Precedent Bond.
    comments:
    - "Rosetta condition: BondUnderlier \u2014 bond -> securityType = Debt"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:BondReference
    close_mappings:
    - fpml_5_10:BondReference
    slots:
    - bond
    - conditionPrecedentBond
    - discrepancyClause
    - couponRate
    class_uri: common_domain_model:BondReference
  CashflowRepresentation:
    name: CashflowRepresentation
    definition_uri: https://w3id.org/lmodel/common_domain_model/CashflowRepresentation
    description: 'A data defining:  the cashflow representation of a swap trade.'
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:CashflowRepresentation
    close_mappings:
    - fpml_5_10:CashflowRepresentation
    slots:
    - cashflowsMatchParameters
    - paymentCalculationPeriod
    class_uri: common_domain_model:CashflowRepresentation
  DiscountingMethod:
    name: DiscountingMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/DiscountingMethod
    description: 'A data defining:  discounting information. The 2000 ISDA definitions,
      section 8.4. discounting (related to the calculation of a discounted fixed amount
      or floating amount) apply. This type must only be included if discounting applies.'
    comments:
    - "Rosetta condition: DiscountRate \u2014 if discountRateDayCountFraction exists\
      \ then discountRate exists"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:DiscountingMethod
    slots:
    - discountingType
    - discountRate
    - discountRateDayCountFraction
    class_uri: common_domain_model:DiscountingMethod
    rules:
    - preconditions:
        slot_conditions:
          discountRateDayCountFraction:
            name: discountRateDayCountFraction
            required: true
      postconditions:
        slot_conditions:
          discountRate:
            name: discountRate
            required: true
      description: In FpML discountingRate and discountRateDayCountFraction are part
        of an optional node, with discountingRate as the required element as part
        of that node.
  FloatingRateDefinition:
    name: FloatingRateDefinition
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateDefinition
    description: 'A data defining:  parameters associated with a floating rate reset.
      This data forms:  part of the cashflows representation of a stream.'
    comments:
    - "Rosetta condition: FloatingRateMultiplier \u2014 if floatingRateMultiplier\
      \ exists then floatingRateMultiplier <> 1"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingRateDefinition
    slots:
    - FloatingRateDefinition_calculatedRate
    - rateObservation
    - floatingRateMultiplier
    - FloatingRateDefinition_spread
    - capRate
    - floorRate
    slot_usage:
      calculatedRate:
        name: calculatedRate
        description: The final calculated rate for a calculation period after any
          required averaging of rates A calculated rate of 5% would be represented
          as 0.05.
      spread:
        name: spread
        description: The ISDA Spread, if any, which applies for the calculation period.
          The spread is a per annum rate, expressed as a decimal. For purposes of
          determining a calculation period amount, if positive the spread will be
          added to the floating rate and if negative the spread will be subtracted
          from the floating rate. A positive 10 basis point (0.1%) spread would be
          represented as 0.001.
        required: false
    class_uri: common_domain_model:FloatingRateDefinition
    rules:
    - preconditions:
        slot_conditions:
          floatingRateMultiplier:
            name: floatingRateMultiplier
            required: true
      postconditions:
        slot_conditions:
          floatingRateMultiplier:
            name: floatingRateMultiplier
            none_of:
            - equals_string_in:
              - '1'
      description: FpML specifies that the floatingRateMultiplier should only be included
        if different from 1.
  InflationRateSpecification:
    name: InflationRateSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/InflationRateSpecification
    description: 'A data to:  specify the inflation rate.'
    comments:
    - "Rosetta condition: InflationIndex \u2014 rateOption -> InflationIndex exists"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:InflationRateSpecification
    is_a: FloatingRateSpecification
    slots:
    - rateOption
    - spreadSchedule
    - capRateSchedule
    - floorRateSchedule
    - floatingRateMultiplierSchedule
    - rateTreatment
    - calculationParameters
    - fallbackRate
    - initialRate
    - finalRateRounding
    - FloatingRateSpecification_averagingMethod
    - negativeInterestRateTreatment
    - inflationLag
    - indexSource
    - mainPublication
    - InflationRateSpecification_interpolationMethod
    - initialIndexLevel
    - fallbackBondApplicable
    - InflationRateSpecification_calculationMethod
    - calculationStyle
    - finalPrincipalExchangeCalculation
    slot_usage:
      interpolationMethod:
        name: interpolationMethod
        description: The method used when calculating the Inflation Index Level from
          multiple points. The most common is Linear.
        required: true
      calculationMethod:
        name: calculationMethod
        description: Indicates how to use the inflation index to calculate the payment
          (e.g. Ratio, Return, Spread). Added for Inflation Asset Swap
        range: InflationCalculationMethodEnum
        required: false
    class_uri: common_domain_model:InflationRateSpecification
  FloatingRateBase:
    name: FloatingRateBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateBase
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining a floating interest rate through the specification
      of the floating rate index, the tenor, the multiplier schedule, the spread,
      the qualification of whether a specific rate treatment and/or a cap or floor
      apply.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingRateBase
    slots:
    - rateOption
    - spreadSchedule
    - capRateSchedule
    - floorRateSchedule
    class_uri: common_domain_model:FloatingRateBase
  FloatingRate:
    name: FloatingRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRate
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingRate
    is_a: FloatingRateBase
    slots:
    - rateOption
    - spreadSchedule
    - capRateSchedule
    - floorRateSchedule
    - floatingRateMultiplierSchedule
    - rateTreatment
    - calculationParameters
    - fallbackRate
    class_uri: common_domain_model:FloatingRate
  FloatingRateSpecification:
    name: FloatingRateSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateSpecification
    description: 'A class to specify the floating interest rate by extending the floating
      rate definition with a set of attributes that specify such rate: the initial
      value specified as part of the trade, the rounding convention, the averaging
      method and the negative interest rate treatment.'
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FloatingRateSpecification
    is_a: FloatingRate
    slots:
    - rateOption
    - spreadSchedule
    - capRateSchedule
    - floorRateSchedule
    - floatingRateMultiplierSchedule
    - rateTreatment
    - calculationParameters
    - fallbackRate
    - initialRate
    - finalRateRounding
    - FloatingRateSpecification_averagingMethod
    - negativeInterestRateTreatment
    slot_usage:
      averagingMethod:
        name: averagingMethod
        description: If averaging is applicable, this component specifies whether
          a weighted or unweighted average method of calculation is to be used. The
          component must only be included when averaging applies.
        range: AveragingWeightingMethodEnum
    class_uri: common_domain_model:FloatingRateSpecification
  FixedRateSpecification:
    name: FixedRateSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/FixedRateSpecification
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Type defining the specification for a fixed rate.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FixedRateSpecification
    slots:
    - rateSchedule
    class_uri: common_domain_model:FixedRateSpecification
  FutureValueAmount:
    name: FutureValueAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/FutureValueAmount
    description: A class defining a currency and a future value date.
    comments:
    - "Rosetta condition: PositiveCalculationPeriodNumberOfDays \u2014 calculationPeriodNumberOfDays\
      \ >= 0"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FutureValueAmount
    slots:
    - FutureValueAmount_quantity
    - FutureValueAmount_currency
    - calculationPeriodNumberOfDays
    - valueDate
    slot_usage:
      quantity:
        name: quantity
        range: NonNegativeQuantitySchedule
      currency:
        name: currency
        description: The currency in which the an amount is denominated. The list
          of valid currencies is not presently positioned as an enumeration as part
          of the CDM because that scope is limited to the values specified by ISDA
          and FpML. As a result, implementers have to make reference to the relevant
          standard, such as the ISO 4217 standard for currency codes.
        required: true
    class_uri: common_domain_model:FutureValueAmount
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          calculationPeriodNumberOfDays:
            name: calculationPeriodNumberOfDays
            minimum_value: 0
      description: FpML specifies calculationPeriodNumberOfDays as a positiveInteger.
  SpreadSchedule:
    name: SpreadSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpreadSchedule
    description: Adds an optional spread type element to the Schedule to identify
      a long or short spread value.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:SpreadSchedule
    is_a: RateSchedule
    slots:
    - RateSchedule_price
    - spreadScheduleType
    class_uri: common_domain_model:SpreadSchedule
  StubFloatingRate:
    name: StubFloatingRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/StubFloatingRate
    description: A class defining a floating rate.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:StubFloatingRate
    slots:
    - StubFloatingRate_floatingRateIndex
    - StubFloatingRate_indexTenor
    - StubFloatingRate_floatingRateMultiplierSchedule
    - StubFloatingRate_spreadSchedule
    - rateTreatment
    - StubFloatingRate_capRateSchedule
    - StubFloatingRate_floorRateSchedule
    slot_usage:
      floatingRateIndex:
        name: floatingRateIndex
        description: The floating rate index.
      indexTenor:
        name: indexTenor
        description: The ISDA Designated Maturity, i.e. the tenor of the floating
          rate.
      floatingRateMultiplierSchedule:
        name: floatingRateMultiplierSchedule
        range: Schedule
      spreadSchedule:
        name: spreadSchedule
        multivalued: true
      capRateSchedule:
        name: capRateSchedule
        multivalued: true
      floorRateSchedule:
        name: floorRateSchedule
        multivalued: true
    class_uri: common_domain_model:StubFloatingRate
  StubValue:
    name: StubValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/StubValue
    description: A type defining how a stub calculation period amount is calculated.
      A single floating rate tenor different to that used for the regular part of
      the calculation periods schedule may be specified, or two floating rate tenors
      many be specified. If two floating rate tenors are specified then Linear Interpolation
      (in accordance with the 2000 ISDA Definitions, Section 8.3 Interpolation) is
      assumed to apply. Alternatively, an actual known stub rate or stub amount may
      be specified.
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:StubValue
    slots:
    - floatingRate
    - stubRate
    - stubAmount
    class_uri: common_domain_model:StubValue
  FixedAmountCalculationDetails:
    name: FixedAmountCalculationDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/FixedAmountCalculationDetails
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FixedAmountCalculation","description":"Calculates the fixed
          amount for a calculation period by looking up the notional and the fixed
          rate and multiplying by the year fraction.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"notional","type":"number","cardinality":"0..1"}],"output":{"name":"fixedAmountDetails","type":"FixedAmountCalculationDetails","cardinality":"1..1"}}]'
    description: Type for reporting the detailed results of calculating a cash flow
      for a calculation period.  This is enhanced relative to the FpML-based cashflows
      structure to allow more information to be returned about daily compounded rates.
    comments:
    - "Rosetta func: FixedAmountCalculation \u2014 Calculates the fixed amount for\
      \ a calculation period by looking up the notional and the fixed rate and multiplying\
      \ by the year fraction."
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:FixedAmountCalculationDetails
    slots:
    - calculationPeriod
    - calculationPeriodNotionalAmount
    - fixedRate
    - yearFraction
    - calculatedAmount
    class_uri: common_domain_model:FixedAmountCalculationDetails
  RateSpecification:
    name: RateSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/RateSpecification
    description: ' A data type to specify the fixed interest rate, floating interest
      rate or inflation rate.'
    comments:
    - "Generated from Rosetta 'choice' construct \u2014 represents a union/one-of\
      \ type."
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:RateSpecification
    abstract: true
    class_uri: common_domain_model:RateSpecification
    union_of:
    - FixedRateSpecification
    - FloatingRateSpecification
    - InflationRateSpecification
  FloatingAmountCalculationDetails:
    name: FloatingAmountCalculationDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingAmountCalculationDetails
    description: Type for reporting the detailed results of calculating a cash flow
      for a calculation period.  This is enhanced relative to the FpML-based cashflows
      structure to allow more information to be returned about daily compounded rates.
    in_subset:
    - cdm_product_asset_floatingrate
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset_floatingrate
    exact_mappings:
    - common_domain_model:FloatingAmountCalculationDetails
    slots:
    - calculationPeriod
    - calculationPeriodNotionalAmount
    - FloatingAmountCalculationDetails_floatingRate
    - processingDetails
    - appliedRate
    - yearFraction
    - calculatedAmount
    - spreadExclusiveCalculatedAMount
    slot_usage:
      floatingRate:
        name: floatingRate
        description: The details of the floating rate setting.  (If it is a calculated
          rate, details of that calculation will be inside that.
        range: FloatingRateSettingDetails
        multivalued: false
    class_uri: common_domain_model:FloatingAmountCalculationDetails
  FloatingRateSettingDetails:
    name: FloatingRateSettingDetails
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateSettingDetails
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"DetermineFloatingRateReset","description":"Get the value
          of a floating rate by either observing it directly or performing a rate
          calculation.  This function works differently depending on the rate category
          and style, as described in the 2021 ISDA Definitions, Section 6.6.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calcPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"floatingRate","type":"FloatingRateSettingDetails","cardinality":"1..1"}},{"name":"ProcessFloatingRateReset","description":"Entry
          point for the function that performs the floating rate resetting operation.  There
          are different variations depending on the processing type (e.g. screen rate,
          OIS, modular calculated rate. .","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calcPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"processingType","type":"FloatingRateIndexProcessingTypeEnum","cardinality":"1..1"}],"output":{"name":"floatingRate","type":"FloatingRateSettingDetails","cardinality":"1..1"},"code_implementation":true},{"name":"EvaluateScreenRate","description":"Evaluate/lookup
          the value of a screen rate.","inputs":[{"name":"rateDef","type":"FloatingRate","cardinality":"1..1"},{"name":"resetDates","type":"ResetDates","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"details","type":"FloatingRateSettingDetails","cardinality":"1..1"}}]'
    description: Type for reporting the raw (untreated) observed or calculated rate
