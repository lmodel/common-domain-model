  NotionalAdjustmentEnum:
    name: NotionalAdjustmentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/NotionalAdjustmentEnum
    description: The enumerated values to specify the conditions that govern the adjustment
      to the number of units of the return swap.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common
    permissible_values:
      Execution:
        text: Execution
        description: The adjustments to the number of units are governed by an execution
          clause.
      PortfolioRebalancing:
        text: PortfolioRebalancing
        description: The adjustments to the number of units are governed by a portfolio
          rebalancing clause.
      Standard:
        text: Standard
        description: The adjustments to the number of units are not governed by any
          specific clause.
  PayRelativeToEnum:
    name: PayRelativeToEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PayRelativeToEnum
    description: The enumerated values to specify whether payments occur relative
      to the calculation period start date or end date, each reset date, valuation
      date or the last pricing date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    permissible_values:
      CalculationPeriodStartDate:
        text: CalculationPeriodStartDate
        description: Payments will occur relative to the first day of each calculation
          period.
      CalculationPeriodEndDate:
        text: CalculationPeriodEndDate
        description: Payments will occur relative to the last day of each calculation
          period.
      LastPricingDate:
        text: LastPricingDate
        description: Payments will occur relative to the last Pricing Date of each
          Calculation Period.
      ResetDate:
        text: ResetDate
        description: Payments will occur relative to the reset date.
      ValuationDate:
        text: ValuationDate
        description: Payments will occur relative to the valuation date.
  ResetRelativeToEnum:
    name: ResetRelativeToEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResetRelativeToEnum
    description: The enumerated values to specify whether resets occur relative to
      the first or last day of a calculation period.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    permissible_values:
      CalculationPeriodStartDate:
        text: CalculationPeriodStartDate
        description: Resets occur relative to the first day of a calculation period.
      CalculationPeriodEndDate:
        text: CalculationPeriodEndDate
        description: Resets occur relative to the last day of a calculation period.
  StubPeriodTypeEnum:
    name: StubPeriodTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/StubPeriodTypeEnum
    description: The enumerated values to specify how to deal with a non standard
      calculation period within a swap stream.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    permissible_values:
      ShortInitial:
        text: ShortInitial
        description: If there is a non regular period remaining it is left shorter
          than the streams calculation period frequency and placed at the start of
          the stream.
      ShortFinal:
        text: ShortFinal
        description: If there is a non regular period remaining it is left shorter
          than the streams calculation period frequency and placed at the end of the
          stream.
      LongInitial:
        text: LongInitial
        description: If there is a non regular period remaining it is placed at the
          start of the stream and combined with the adjacent calculation period to
          give a long first calculation period.
      LongFinal:
        text: LongFinal
        description: If there is a non regular period remaining it is placed at the
          end of the stream and combined with the adjacent calculation period to give
          a long last calculation period.
  WeeklyRollConventionEnum:
    name: WeeklyRollConventionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/WeeklyRollConventionEnum
    description: The enumerated values to specify the weekly roll day.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    permissible_values:
      TBILL:
        text: TBILL
        description: 13-week and 26-week U.S. Treasury Bill Auction Dates. Each Monday
          except for U.S. (New York) holidays when it will occur on a Tuesday
    inherits:
    - DayOfWeekEnum
  DeliveryMethodEnum:
    name: DeliveryMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeliveryMethodEnum
    description: Specifies delivery methods for securities transactions. This coding-scheme
      defines the possible delivery methods for securities.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    exact_mappings:
    - http://www.fpml.org/coding-scheme/delivery-method
    permissible_values:
      DeliveryVersusPayment:
        text: DeliveryVersusPayment
        description: Indicates that a securities delivery must be made against payment
          in simultaneous transmissions and stipulate each other.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#DeliveryVersusPayment
      FreeOfPayment:
        text: FreeOfPayment
        description: Indicates that a securities delivery can be made without a simultaneous
          cash payment in exchange and not depending on if payment obligations are
          fulfilled or not and vice versa.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#FreeOfPayment
      PreDelivery:
        text: PreDelivery
        description: Indicates that a securities delivery must be made in full before
          the payment for the securities; fulfillment of payment obligations depends
          on securities delivery obligations fulfillment.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#PreDelivery
      PrePayment:
        text: PrePayment
        description: Indicates that a payment in full amount must be made before the
          securities delivery; fulfillment of securities delivery obligations depends
          on payment obligations fulfillment.
        meaning: http://www.fpml.org/coding-scheme/delivery-method-1-0#PrePayment
  ScheduledTransferEnum:
    name: ScheduledTransferEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ScheduledTransferEnum
    description: The qualification of the type of transfers and cash flows associated
      with contracts and their lifecycle events.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      CorporateAction:
        text: CorporateAction
        description: A cash flow corresponding to a corporate action event.
      Coupon:
        text: Coupon
        description: A cash flow corresponding to the periodic accrued interests.
      CreditEvent:
        text: CreditEvent
        description: A cashflow resulting from a credit event.
      DividendReturn:
        text: DividendReturn
        description: A cash flow corresponding to the synthetic dividend of an equity
          underlier asset traded through a derivative instrument.
      Exercise:
        text: Exercise
        description: A cash flow associated with an exercise lifecycle event.
      FixedRateReturn:
        text: FixedRateReturn
        description: A cash flow corresponding to the return of the fixed interest
          rate portion of a derivative instrument that has different types of underlying
          assets, such as a total return swap.
      FloatingRateReturn:
        text: FloatingRateReturn
        description: A cash flow corresponding to the return of the floating interest
          rate portion of a derivative instrument that has different types of underlying
          assets, such as a total return swap.
      FractionalAmount:
        text: FractionalAmount
        description: A cash flow corresponding to the compensation for missing assets
          due to the rounding of digits in the original number of assets to be delivered
          as per payout calculation.
      InterestReturn:
        text: InterestReturn
        description: A cash flow corresponding to the return of the interest rate
          portion of a derivative instrument that has different types of underlying
          assets, such as a total return swap.
      NetInterest:
        text: NetInterest
        description: Net interest across payout components. Applicable to products
          such as interest rate swaps.
      Performance:
        text: Performance
        description: A cash flow corresponding to a performance return.  The settlementOrigin
          attribute on the Transfer should point to the relevant Payout defining the
          performance calculation.
      Principal:
        text: Principal
        description: An amount which corresponds to the notional of the contract for
          various business reasons. This could be associated to a cashflow (e.g. a
          principal payment) or a transfer (e.g. delivery of an asset).
  UnscheduledTransferEnum:
    name: UnscheduledTransferEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/UnscheduledTransferEnum
    description: The qualification of the type of ad-hoc transfers and cash flows
      that can be associated with contracts and their lifecycle events.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      Recall:
        text: Recall
        description: A recall of securities by the lender who has lent them out.
      Return:
        text: Return
        description: A return by the borrower to the lender of the full or partial
          quantity of securities on the contract.
      Assignment:
        text: Assignment
        description: A transfer resulting from the assignment of a contract to a new
          counterparty.
      BrokerageCommission:
        text: BrokerageCommission
        description: The brokerage commission.
      Increase:
        text: Increase
        description: A transfer associated with an increase lifecycle event.
      Novation:
        text: Novation
        description: The novation fee.
      PartialTermination:
        text: PartialTermination
        description: A transfer associated with a partial termination lifecycle event.
      Premium:
        text: Premium
        description: Denotes the amount payable by the buyer to the seller for an
          option. The premium is paid on the specified premium payment date or on
          each premium payment date if specified.
      Renegotiation:
        text: Renegotiation
        description: A transfer associated with a renegotiation lifecycle event.
      Termination:
        text: Termination
        description: A transfer associated with a termination lifecycle event.
      Upfront:
        text: Upfront
        description: An upfront transfer associated to the swap to adjust for a difference
          between the swap price and the current market price.
      CreditEvent:
        text: CreditEvent
        description: A transfer associated with a credit event.
      CorporateAction:
        text: CorporateAction
        description: A transfer associated with a corporate action
  SettlementTypeEnum:
    name: SettlementTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementTypeEnum
    description: The enumeration values to specify how the option is to be settled
      when exercised.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      Cash:
        text: Cash
        description: The intrinsic value of the option will be delivered by way of
          a cash settlement amount determined, (i) by reference to the differential
          between the strike price and the settlement price; or (ii) in accordance
          with a bilateral agreement between the parties.
      Physical:
        text: Physical
        description: The securities underlying the transaction will be delivered by
          (i) in the case of a call, the seller to the buyer, or (ii) in the case
          of a put, the buyer to the seller versus a settlement amount equivalent
          to the strike price per share.
      Election:
        text: Election
        description: Allow Election of either Cash or Physical settlement.
      CashOrPhysical:
        text: CashOrPhysical
        description: Allow use of either Cash or Physical settlement without prior
          Election.
  TransferSettlementEnum:
    name: TransferSettlementEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferSettlementEnum
    description: The enumeration values to specify how the transfer will settle, e.g.
      DvP.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      DeliveryVersusDelivery:
        text: DeliveryVersusDelivery
        description: Simultaneous transfer of two assets, typically securities, as
          a way to avoid settlement risk.
      DeliveryVersusPayment:
        text: DeliveryVersusPayment
        description: Settlement in which the transfer of the asset and the cash settlement
          are simultaneous.
      PaymentVersusPayment:
        text: PaymentVersusPayment
        description: Simultaneous transfer of cashflows.
      NotCentralSettlement:
        text: NotCentralSettlement
        description: No central settlement.
  StandardSettlementStyleEnum:
    name: StandardSettlementStyleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/StandardSettlementStyleEnum
    description: The enumerated values to specify whether a trade is settling using
      standard settlement instructions as well as whether it is a candidate for settlement
      netting.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      Standard:
        text: Standard
        description: This trade will settle using standard predetermined funds settlement
          instructions.
      Net:
        text: Net
        description: This trade is a candidate for settlement netting.
      StandardAndNet:
        text: StandardAndNet
        description: This trade will settle using standard predetermined funds settlement
          instructions and is a candidate for settlement netting.
      PairAndNet:
        text: PairAndNet
        description: These trades have been paired and are a candidate for settlement
          netting.
  CashSettlementMethodEnum:
    name: CashSettlementMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CashSettlementMethodEnum
    description: Defines the different cash settlement methods for a product where
      cash settlement is applicable.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      CashPriceMethod:
        text: CashPriceMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (a).
      CashPriceAlternateMethod:
        text: CashPriceAlternateMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (b).
      ParYieldCurveAdjustedMethod:
        text: ParYieldCurveAdjustedMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (c).
      ZeroCouponYieldAdjustedMethod:
        text: ZeroCouponYieldAdjustedMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (d).
      ParYieldCurveUnadjustedMethod:
        text: ParYieldCurveUnadjustedMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (e).
      CrossCurrencyMethod:
        text: CrossCurrencyMethod
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2006
          ISDA Definitions, Section 18.3. Cash Settlement Methods, paragraph (f) (published
          in Supplement number 23).
      CollateralizedCashPriceMethod:
        text: CollateralizedCashPriceMethod
        description: An ISDA defined cash settlement method (yield curve) used for
          the determination of the applicable cash settlement amount. The method is
          defined in the 2006 ISDA Definitions, Section 18.3. Cash Settlement Methods,
          paragraph (g) (published in Supplement number 28). The method is defined
          in the 2021 ISDA Definitions, section 18.2.6.
      MidMarketIndicativeQuotations:
        text: MidMarketIndicativeQuotations
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2021
          ISDA Definitions, Section 18.2.1.
      MidMarketIndicativeQuotationsAlternate:
        text: MidMarketIndicativeQuotationsAlternate
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2021
          ISDA Definitions, Section 18.2.2.
      MidMarketCalculationAgentDetermination:
        text: MidMarketCalculationAgentDetermination
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2021
          ISDA Definitions, Section 18.2.3.
      ReplacementValueFirmQuotations:
        text: ReplacementValueFirmQuotations
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2021
          ISDA Definitions, Section 18.2.4.
      ReplacementValueCalculationAgentDetermination:
        text: ReplacementValueCalculationAgentDetermination
        description: An ISDA defined cash settlement method used for the determination
          of the applicable cash settlement amount. The method is defined in the 2021
          ISDA Definitions, Section 18.2.5
  SettlementCentreEnum:
    name: SettlementCentreEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementCentreEnum
    description: Defines the settlement centre for a securities transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_settlement
    permissible_values:
      EuroclearBank:
        text: EuroclearBank
        description: Euroclear Bank
      ClearstreamBankingLuxembourg:
        text: ClearstreamBankingLuxembourg
        description: ClearStream Banking Luxembourg
  AveragingInOutEnum:
    name: AveragingInOutEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingInOutEnum
    description: The enumerated values to specify the type of averaging used in an
      Asian option.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      In:
        text: In
        description: The average price is used to derive the strike price. Also known
          as 'Asian strike' style option.
      Out:
        text: Out
        description: The average price is used to derive the expiration price. Also
          known as 'Asian price' style option.
      Both:
        text: Both
        description: The average price is used to derive both the strike and the expiration
          price.
  OptionTypeEnum:
    name: OptionTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionTypeEnum
    description: The enumerated values to specify the type or strategy of the option.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    exact_mappings:
    - http://www.fpml.org/coding-scheme/option-type
    permissible_values:
      Payer:
        text: Payer
        description: 'A ''payer'' option: If you buy a ''payer'' option you have the
          right but not the obligation to enter into the underlying swap transaction
          as the ''fixed'' rate/price payer and receive float.'
      Receiver:
        text: Receiver
        description: 'A ''receiver'' option: If you buy a ''receiver'' option you
          have the right but not the obligation to enter into the underlying swap
          transaction as the ''fixed'' rate/price receiver and pay float.'
      Straddle:
        text: Straddle
        description: A straddle strategy, which involves the simultaneous buying of
          a put and a call of the same underlier, at the same strike and same expiration
          date
        meaning: http://www.fpml.org/coding-scheme/option-type-1-0#Straddle
    inherits:
    - PutCallEnum
  OptionExerciseStyleEnum:
    name: OptionExerciseStyleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/OptionExerciseStyleEnum
    description: The enumerated values to specify the option exercise style. i.e.,
      European, Bermuda or American.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      European:
        text: European
        description: Single Exercise
      Bermuda:
        text: Bermuda
        description: Multiple specified exercise dates
      American:
        text: American
        description: Continuous exercise over a range of dates
  CallingPartyEnum:
    name: CallingPartyEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CallingPartyEnum
    description: Identifies a party to the on-demand repo transaction that has a right
      to demand for termination of the Security Finance transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      InitialBuyer:
        text: InitialBuyer
        description: Initial buyer to the repo transaction.
      InitialSeller:
        text: InitialSeller
        description: Initial seller to the repo transaction.
      Either:
        text: Either
        description: Either, Buyer or Seller to the repo transaction.
      AsDefinedInMasterAgreement:
        text: AsDefinedInMasterAgreement
        description: As defined in Master Agreement.
  ExerciseNoticeGiverEnum:
    name: ExerciseNoticeGiverEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExerciseNoticeGiverEnum
    description: Defines the principal party to the trade that has the right to exercise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      Buyer:
        text: Buyer
        description: Specifies that only the option buyer has the right to exercise.
      Seller:
        text: Seller
        description: Specifies that only the option seller has the right to exercise.
      Both:
        text: Both
        description: Specifies that both the option buyer and option seller has the
          right to exercise.
      AsSpecifiedInMasterAgreement:
        text: AsSpecifiedInMasterAgreement
        description: Specifies that the Master Agreement defines the principal party
          to the trade that has the right to exercise.
  MarginTypeEnum:
    name: MarginTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarginTypeEnum
    description: This indicator defines which type of assets (cash or securities)
      is specified to apply as margin to the repo transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      Cash:
        text: Cash
        description: When the margin type is Cash, the margin factor is applied to
          the cash value of the transaction.
      Instrument:
        text: Instrument
        description: When the margin type is Instrument, the margin factor is applied
          to the instrument value for the transaction. In the 'instrument' case, the
          haircut would be applied to the securities.
  RepoDurationEnum:
    name: RepoDurationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RepoDurationEnum
    description: A duration code for a Repo (or Securities Lending) transaction. There
      are many business and market rules that are derived from the duration of the
      transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      Overnight:
        text: Overnight
        description: 'Indicates that a contract is classified as overnight, meaning
          that there is one business day difference between the start and end date
          of the contract. Business rule: When the repo is overnight, the number of
          business days between the spot and forward value dates must be one. Forward
          leg must be specified.'
      Term:
        text: Term
        description: 'Indicates that a contract is a regular term contract, with a
          start date and an end date. Business rule: When the repo is ''Term'', both
          spot and forward legs must be specified.'
  AssetPayoutTradeTypeEnum:
    name: AssetPayoutTradeTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetPayoutTradeTypeEnum
    description: An enumerator to differentiate the different trade types used in
      securities finance and modelled on an AssetPayout.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      Repo:
        text: Repo
        description: In the case of a repurchase transaction, an immediate and equal
          income payment (often call a manufactured payment) is made by the buyer
          to the seller.
      BuySellBack:
        text: BuySellBack
        description: In the case of a buy/sell-back, there is no income payment between
          buyer and seller. Instead, the repurchase price to be paid on the repurchase
          date is reduced by the amount of the income payment on the collateral plus
          some extra interest to compensate the seller for the delay between the income
          payment date on the collateral and the repurchase date of the repo.
        aliases:
        - Buy/Sell-Back
      SecurityLending:
        text: SecurityLending
        description: Denotes this payout as being associated to the security being
          lent as part of a securities lending contract.
  ExpirationTimeTypeEnum:
    name: ExpirationTimeTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExpirationTimeTypeEnum
    description: The time of day at which the equity option expires, for example the
      official closing time of the exchange.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    permissible_values:
      Close:
        text: Close
        description: The official closing time of the exchange on the valuation date.
      Open:
        text: Open
        description: The official opening time of the exchange on the valuation date.
      OSP:
        text: OSP
        description: The time at which the official settlement price is determined.
      SpecificTime:
        text: SpecificTime
        description: The time specified in the element equityExpirationTime or valuationTime
          (as appropriate)
      XETRA:
        text: XETRA
        description: The time at which the official settlement price (following the
          auction by the exchange) is determined by the exchange.
      DerivativesClose:
        text: DerivativesClose
        description: The official closing time of the derivatives exchange on which
          a derivative contract is listed on that security underlyer.
      AsSpecifiedInMasterConfirmation:
        text: AsSpecifiedInMasterConfirmation
        description: The time is determined as provided in the relevant Master Confirmation.
slots:
  unadjustedDate:
    name: unadjustedDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/unadjustedDate
    description: A date subject to adjustment. While in FpML this date is required,
      this cardinality constraint has been relaxed as part of the CDM in order to
      support the FRA representation, which effective and termination dates are specified
      in FpML as adjusted dates.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:AdjustableDate.unadjustedDate
    slot_uri: common_domain_model:unadjustedDate
