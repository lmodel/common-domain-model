  ThresholdMinimumTransferAmountBase:
    name: ThresholdMinimumTransferAmountBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/ThresholdMinimumTransferAmountBase
    description: A logical container designed to hold a set of related data. In this
      case, designed to hold a set of information required to specify conditions under
      which Threshold or Minimum Transfer Amount can fall to zero.
    comments:
    - "Rosetta condition: ZeroEvent \u2014 if zeroEvent = True then event exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ThresholdMinimumTransferAmountBase
    slots:
    - zeroEvent
    - event
    class_uri: common_domain_model:ThresholdMinimumTransferAmountBase
    rules:
    - preconditions:
        slot_conditions:
          zeroEvent:
            name: zeroEvent
            equals_string: 'True'
      postconditions:
        slot_conditions:
          event:
            name: event
            required: true
      description: If zero event exists then boolean must be set to 'True' and event
        must be specified.
  ThresholdElection:
    name: ThresholdElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/ThresholdElection
    description: Specifies whether the threshold is rating based, a fixed amount,
      or infinity.
    comments:
    - "Rosetta condition: ThresholdOneOf \u2014 required choice fixedAmount, ratingsBased,\
      \ infinity, other"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ThresholdElection
    slots:
    - ThresholdElection_party
    - fixedAmount
    - ratingsBased
    - infinity
    - other
    slot_usage:
      party:
        name: party
        description: The party to which the threshold applies.
        range: CounterpartyRoleEnum
        required: true
    class_uri: common_domain_model:ThresholdElection
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            fixedAmount:
              name: fixedAmount
              required: true
        - slot_conditions:
            ratingsBased:
              name: ratingsBased
              required: true
        - slot_conditions:
            infinity:
              name: infinity
              required: true
        - slot_conditions:
            other:
              name: other
              required: true
      description: Ensures that threshold is specified as one-of fixedAmount, ratingsBased,
        infinity, or other.
  ThresholdRatingsBased:
    name: ThresholdRatingsBased
    definition_uri: https://w3id.org/lmodel/common_domain_model/ThresholdRatingsBased
    description: Defines that the Threshold is based on Ratings condition(s).
    comments:
    - "Rosetta condition: NamedEntity \u2014 if ratedParty = RatedPartyEnum -> NamedEntity\
      \ then namedEntity exists"
    - "Rosetta condition: NamedAffiliate \u2014 if ratedParty = RatedPartyEnum ->\
      \ NamedAffiliate then namedAffiliate exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ThresholdRatingsBased
    is_a: ThresholdMinimumTransferAmountBase
    slots:
    - zeroEvent
    - event
    - ThresholdRatingsBased_currency
    - ratingType
    - variableSet
    - ratedParty
    - namedEntity
    - namedAffiliate
    - compare
    - noRating
    - notRatedBy
    - numberOfRatingAgencies
    slot_usage:
      currency:
        name: currency
        description: The threshold currency code.
        range: ISOCurrencyCodeEnum
        required: true
    class_uri: common_domain_model:ThresholdRatingsBased
    rules:
    - preconditions:
        slot_conditions:
          ratedParty:
            name: ratedParty
            equals_string: NamedEntity
      postconditions:
        slot_conditions:
          namedEntity:
            name: namedEntity
            required: true
      description: If the rated party is NamedEntity then the entity must be specified.
    - preconditions:
        slot_conditions:
          ratedParty:
            name: ratedParty
            equals_string: NamedAffiliate
      postconditions:
        slot_conditions:
          namedAffiliate:
            name: namedAffiliate
            required: true
      description: If rated party is NamedAffilite then the affiliate must be specified.
