      comment:
        name: comment
        description: A comment field to be associated with the workflow, e.g. to specify
          why a transaction event was rejected by a party.
    class_uri: common_domain_model:WorkflowState
  LimitApplicable:
    name: LimitApplicable
    definition_uri: https://w3id.org/lmodel/common_domain_model/LimitApplicable
    comments:
    - "Rosetta condition: LimitApplicableChoice \u2014 optional choice amountUtilized,\
      \ utilization"
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
