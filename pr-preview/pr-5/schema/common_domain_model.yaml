      \ fixedRate"
    - "Rosetta condition: StartDateChoice \u2014 required choice adjustedStartDate,\
      \ unadjustedStartDate"
    - "Rosetta condition: EndDateChoice \u2014 required choice adjustedEndDate, unadjustedEndDate"
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:CalculationPeriod
    close_mappings:
    - fpml_5_10:CalculationPeriod
    is_a: CalculationPeriodBase
    slots:
    - adjustedStartDate
    - adjustedEndDate
    - unadjustedStartDate
    - unadjustedEndDate
    - CalculationPeriod_calculationPeriodNumberOfDays
    - notionalAmount
    - fxLinkedNotionalAmount
    - floatingRateDefinition
    - CalculationPeriod_fixedRate
    - dayCountYearFraction
    - forecastAmount
    - CalculationPeriod_forecastRate
    slot_usage:
      calculationPeriodNumberOfDays:
        name: calculationPeriodNumberOfDays
        description: The number of days from the adjusted effective / start date to
          the adjusted termination / end date calculated in accordance with the applicable
          day count fraction.
        required: false
      fixedRate:
        name: fixedRate
        description: The calculation period fixed rate. A per annum rate, expressed
          as a decimal. A fixed rate of 5% would be represented as 0.05.
        required: false
      forecastRate:
        name: forecastRate
        description: A value representing the forecast rate used to calculate the
          forecast future value of the accrual period. This is a calculated rate determined
