  PostingObligationsElection:
    name: PostingObligationsElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/PostingObligationsElection
    description: Specifies the collateral posting obligations for the security provider
      party(ies).
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(ii)"
    comments:
    - "Rosetta condition: AsPermitted \u2014 if asPermitted = True then eligibleCollateral\
      \ is absent"
    - "Rosetta condition: EligibleCollateral \u2014 if asPermitted = False then eligibleCollateral\
      \ exists"
    - "Rosetta condition: ConsistentParty \u2014 if eligibleCollateral exists then\
      \ eligibleCollateral -> appliesTo count = 0"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:PostingObligationsElection
    slots:
    - PostingObligationsElection_party
    - asPermitted
    - eligibleCollateral
    - excludedCollateral
    - PostingObligationsElection_additionalLanguage
    slot_usage:
      party:
        name: party
        description: Specifies the party providing the security.
        range: CounterpartyRoleEnum
        required: true
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:PostingObligationsElection
    rules:
    - preconditions:
        slot_conditions:
          asPermitted:
            name: asPermitted
            equals_string: 'True'
      postconditions:
        slot_conditions:
          eligibleCollateral:
            name: eligibleCollateral
            required: false
      description: A data rule to enforce that the eligible collateral should be specified
        when the Control Agreement is a Credit Support Document with respect to the
        party(ies).
    - preconditions:
        slot_conditions:
          asPermitted:
            name: asPermitted
            equals_string: 'False'
      postconditions:
        slot_conditions:
          eligibleCollateral:
            name: eligibleCollateral
            required: true
      description: A data rule to enforce that the eligible collateral shouldn't be
        specified when the Control Agreement isn't deemed a Credit Support Document
        with respect to the party(ies).
