        text: Afternoon
        description: Denotes a value as the Afternoon fixing reported in or by the
          relevant Price Source as specified in the relevant Confirmation.
      Ask:
        text: Ask
        description: Denotes a value 'asked' by a seller for an asset, i.e. the value
          at which a seller is willing to sell.
      Bid:
        text: Bid
        description: Denotes a value 'bid' by a buyer for an asset, i.e. the value
          a buyer is willing to pay.
      Closing:
        text: Closing
        description: Denotes a value as the Closing price reported in or by the relevant
          Price Source as specified in the relevant Confirmation.
      High:
        text: High
        description: Denotes a value as the High price reported in or by the relevant
          Price Source as specified in the relevant Confirmation.
      Index:
