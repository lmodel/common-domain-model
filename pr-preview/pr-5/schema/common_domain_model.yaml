    - IndexBase_name
    - provider
    - IndexBase_assetClass
    class_uri: common_domain_model:EquityIndex
  OtherIndex:
    name: OtherIndex
    definition_uri: https://w3id.org/lmodel/common_domain_model/OtherIndex
    description: Specification of a user-defined index that does not meet the criteria
      of other Index data types.
    comments:
    - "Rosetta condition: AssetClassRequired \u2014 assetClass exists"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
