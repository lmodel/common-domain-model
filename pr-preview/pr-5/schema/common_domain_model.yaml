          contractual products.
      executionDetails:
        name: executionDetails
        description: Defines specific attributes that relate to trade or position
          executions.
        required: false
      collateral:
        name: collateral
        description: Represents the collateral obligations of a party.
    class_uri: common_domain_model:ContractBase
  CounterpartyPosition:
    name: CounterpartyPosition
    definition_uri: https://w3id.org/lmodel/common_domain_model/CounterpartyPosition
    description: A Position describes the accumulated effect of a set of securities
      or financial transactions.
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
