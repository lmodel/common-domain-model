    - IndependentAmountRatings_ratedParty
    - IndependentAmountRatings_namedAffiliate
    - IndependentAmountRatings_namedEntity
    - ratingType
    - LegacyIndependentAmountRatingsBased_variableSet
    - LegacyIndependentAmountRatingsBased_currency
    slot_usage:
      variableSet:
        name: variableSet
        description: A logical container designed to hold a defined set of related
          data. In this case the collation of Rating Information and an associated
          Independent Amount.
        range: RatingAgencyAmount
        required: true
      currency:
        name: currency
        description: Specifies the currency applicable to the relevant Independent
          Amount.
    class_uri: common_domain_model:LegacyIndependentAmountRatingsBased
  RatingAgencyAmount:
    name: RatingAgencyAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/RatingAgencyAmount
    description: A logical container to hold a defined set of related data. In this
      case the collation of Rating Information and an associated Independent Amount.
    comments:
    - "Rosetta condition: RestrictingCreditNotation \u2014 ratingVariableSet -> scale\
      \ is absent and ratingVariableSet -> outlook is absent and ratingVariableSet\
      \ -> debt is absent and ratingVariableSet -> creditWatch is absent and ratingVariableSet\
      \ -> agency exists and ratingVariableSet -> notation exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:RatingAgencyAmount
    slots:
    - ratingVariableSet
    - RatingAgencyAmount_amount
    slot_usage:
      amount:
        name: amount
        description: Specifies the notional or collateral Independent Amount.
        range: decimal
        required: false
    class_uri: common_domain_model:RatingAgencyAmount
  LegacyIndependentAmountRatingsXExposure:
    name: LegacyIndependentAmountRatingsXExposure
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyIndependentAmountRatingsXExposure
    description: Specifies that the Independent Amount is determined using both credit
      rating and exposure metrics.
    comments:
    - "Rosetta condition: CompareIA \u2014 if compare = IndependentAmountCompareEnum\
      \ -> Compare then compareVariableSet exists and highestLowestVariableSet is\
      \ absent"
    - "Rosetta condition: LowestIA \u2014 if compare = IndependentAmountCompareEnum\
      \ -> Lowest then highestLowestVariableSet exists and compareVariableSet is absent"
    - "Rosetta condition: HighestIA \u2014 if compare = IndependentAmountCompareEnum\
      \ -> Highest then highestLowestVariableSet exists and compareVariableSet is\
      \ absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:LegacyIndependentAmountRatingsXExposure
    is_a: IndependentAmountRatings
    slots:
    - IndependentAmountRatings_compare
    - IndependentAmountRatings_ratedParty
    - IndependentAmountRatings_namedAffiliate
    - IndependentAmountRatings_namedEntity
    - ratingType
    - highestLowestVariableSet
    - compareVariableSet
    class_uri: common_domain_model:LegacyIndependentAmountRatingsXExposure
    rules:
    - preconditions:
        slot_conditions:
          compare:
            name: compare
            equals_string: Compare
      postconditions:
        slot_conditions:
          compareVariableSet:
            name: compareVariableSet
            required: true
          highestLowestVariableSet:
            name: highestLowestVariableSet
            required: false
      description: Ensures the appropriate variable set is populated based on how
        the Ratings are compared.
    - preconditions:
        slot_conditions:
          compare:
            name: compare
            equals_string: Lowest
      postconditions:
        slot_conditions:
          highestLowestVariableSet:
            name: highestLowestVariableSet
            required: true
          compareVariableSet:
            name: compareVariableSet
            required: false
      description: Ensures the appropriate variable set is populated based on how
        the Ratings are compared.
    - preconditions:
        slot_conditions:
          compare:
            name: compare
            equals_string: Highest
      postconditions:
        slot_conditions:
          highestLowestVariableSet:
            name: highestLowestVariableSet
            required: true
          compareVariableSet:
            name: compareVariableSet
            required: false
      description: Ensures the appropriate variable set is populated based on how
        the Ratings are compared.
