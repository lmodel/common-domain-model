  RollConventionEnum:
    name: RollConventionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RollConventionEnum
    description: The enumerated values to specify the period term as part of a periodic
      schedule, i.e. the calculation period end date within the regular part of the
      calculation period. The value could be a rule, e.g. IMM Settlement Dates, which
      is the 3rd Wednesday of the month, or it could be a specific day of the month,
      such as the first day of the applicable month.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      EOM:
        text: EOM
        description: Rolls on month end dates irrespective of the length of the month
          and the previous roll day.
      FRN:
        text: FRN
        description: Roll days are determined according to the FRN Convention or Euro-dollar
          Convention as described in ISDA 2000 definitions.
      IMM:
        text: IMM
        description: IMM Settlement Dates. The third Wednesday of the (delivery) month.
      IMMCAD:
        text: IMMCAD
        description: The last trading day/expiration day of the Canadian Derivatives
          Exchange (Bourse de Montreal Inc) Three-month Canadian Bankers' Acceptance
          Futures (Ticker Symbol BAX). The second London banking day prior to the
          third Wednesday of the contract month. If the determined day is a Bourse
          or bank holiday in Montreal or Toronto, the last trading day shall be the
          previous bank business day. Per Canadian Derivatives Exchange BAX contract
          specification.
      IMMAUD:
        text: IMMAUD
        description: The last trading day of the Sydney Futures Exchange 90 Day Bank
          Accepted Bills Futures contract (see http://www.sfe.com.au/content/sfe/trading/con_specs.pdf).
          One Sydney business day preceding the second Friday of the relevant settlement.
      IMMNZD:
        text: IMMNZD
        description: The last trading day of the Sydney Futures Exchange NZ 90 Day
          Bank Bill Futures contract (see http://www.sfe.com.au/content/sfe/trading/con_specs.pdf).
          The first Wednesday after the ninth day of the relevant settlement month.
      SFE:
        text: SFE
        description: Sydney Futures Exchange 90-Day Bank Accepted Bill Futures Settlement
          Dates. The second Friday of the (delivery) month
      NONE:
        text: NONE
        description: The roll convention is not required. For example, in the case
          of a daily calculation frequency.
      TBILL:
        text: TBILL
        description: 13-week and 26-week U.S. Treasury Bill Auction Dates. Each Monday
          except for U.S. (New York) holidays when it will occur on a Tuesday.
      _1:
        text: _1
        description: Rolls on the 1st day of the month.
        aliases:
        - '1'
      _2:
        text: _2
        description: Rolls on the 2nd day of the month.
        aliases:
        - '2'
      _3:
