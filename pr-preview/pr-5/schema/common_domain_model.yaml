        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#Other
      SeniorLossAbsorbingCapacity:
        text: SeniorLossAbsorbingCapacity
        description: 'Senior Loss Absorbing Capacity (RED Tier Code: SNRLAC).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SeniorLossAbsorbingCapacity
      SeniorSec:
        text: SeniorSec
        description: 'Senior domestic (RED Tier Code: SECDOM).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SeniorSec
      SeniorUnSec:
        text: SeniorUnSec
        description: 'Senior foreign (RED Tier Code: SNRFOR).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SeniorUnSec
      SubLowerTier2:
        text: SubLowerTier2
        description: 'Subordinate, Lower Tier 2 (RED Tier Code: SUBLT2).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SubLowerTier2
      SubTier1:
        text: SubTier1
        description: 'Subordinate Tier 1 (RED Tier Code: PREFT1).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SubTier1
      SubTier3:
        text: SubTier3
        description: Subordinate, Tier 3.
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SubTier3
      SubUpperTier2:
        text: SubUpperTier2
        description: 'Subordinate, Upper Tier 2 (RED Tier Code: JRSUBUT2).'
        meaning: http://www.fpml.org/coding-scheme/credit-seniority-2-3#SubUpperTier2
  RealisedVarianceMethodEnum:
    name: RealisedVarianceMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RealisedVarianceMethodEnum
    description: The contract specifies which price must satisfy the boundary condition.  Used
      for variance, volatility and correlation caps and floors.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Previous:
        text: Previous
        description: For a return on day T, the observed price on T-1 must be in range.
      Last:
        text: Last
        description: For a return on day T, the observed price on T must be in range.
      Both:
        text: Both
        description: For a return on day T, the observed prices on both T and T-1
          must be in range
  FPVFinalPriceElectionFallbackEnum:
    name: FPVFinalPriceElectionFallbackEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FPVFinalPriceElectionFallbackEnum
    description: Specifies the fallback provisions in respect to the applicable Futures
      Price Valuation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      FPVClose:
        text: FPVClose
        description: In respect of the Early Final Valuation Date, the provisions
          for FPV Close shall apply.
      FPVHedgeExecution:
        text: FPVHedgeExecution
        description: In respect of the Early Final Valuation Date, the provisions
          for FPV Hedge Execution shall apply.
  FinalPrincipalExchangeCalculationEnum:
    name: FinalPrincipalExchangeCalculationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FinalPrincipalExchangeCalculationEnum
    description: To be specified only for products that embed a redemption payment.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Floored:
        text: Floored
        description: 'If Floored is set then Principal Exchange takes the form: Notional
          Amount * Max(1, Index Final/ Index Base).'
      NonFloored:
        text: NonFloored
        description: 'If NonFloored is set then the Principal Exchange takes the form:
          Notional Amount * Index Final / Index Base.'
  SpreadCalculationMethodEnum:
    name: SpreadCalculationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpreadCalculationMethodEnum
    description: 'Method by which spread is calculated. For example on an asset swap:
      ''ParPar'' or ''Proceeds'' may be the method indicated.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      ParPar:
        text: ParPar
      Proceeds:
        text: Proceeds
  FloatingRateIndexProcessingTypeEnum:
    name: FloatingRateIndexProcessingTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexProcessingTypeEnum
    description: 'This enumeration provides guidance on how to process a given floating
      rate index.  It''s based on the ISDA Floating Rate Index information, but transforms
      it into the specific categories needed for calculation '
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset_floatingrate
    permissible_values:
      Screen:
        text: Screen
        description: These values are just looked up from the screen and applied.
      CompoundIndex:
        text: CompoundIndex
        description: A published index calculated using compounding; the implied rate
          must be backed out.
      OIS:
        text: OIS
        description: These are calculated by the calculation agent based on a standard
          OIS FRO definition.
      OvernightAvg:
        text: OvernightAvg
        description: These are calculated by the calculation agent based on a standard
          overnight averaging FRO definition.
      Modular:
        text: Modular
        description: These are calculated by the calculation agent based on deal-specific
          parameters (e.g. lookback compound based on an RFR).
      RefBanks:
        text: RefBanks
        description: These must be looked up using a manual process
  CollateralTypeEnum:
    name: CollateralTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralTypeEnum
    description: Specifies the types of collateral that are accepted by the Lender
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - http://www.fpml.org/coding-scheme/collateral-type
    permissible_values:
      Cash:
        text: Cash
        description: Security Lending Trades against Cash collateral
      NonCash:
        text: NonCash
        description: Security Lending Trades against NonCash collateral
      CashPool:
        text: CashPool
        description: Security Lending Trades against CashPool collateral
  ConcentrationLimitTypeEnum:
    name: ConcentrationLimitTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ConcentrationLimitTypeEnum
    description: Represents the enumerated values to identify where a concentration
      limit is applied in the eligible collateral schedule.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    permissible_values:
      Asset:
        text: Asset
        description: Specifies a limit on a single asset in the eligible collateral
          schedule
      BaseCurrencyEquivalent:
        text: BaseCurrencyEquivalent
        description: Specifies a limit on all cash valued in the base currency of
          the eligible collateral schedule.
      Issuer:
        text: Issuer
        description: Specifies a limit on a single issuer in the eligible collateral
          schedule.
      PrimaryExchange:
        text: PrimaryExchange
        description: Specifies a limit on a single exchange in the eligible collateral
          schedule.
      IndustrySector:
        text: IndustrySector
        description: Specifies a limit on a single industry sector in the eligible
          collateral schedule.
      UltimateParentInstitution:
        text: UltimateParentInstitution
        description: Specifies a limit on a single issuer in the eligible collateral
          schedule at the ultimate parent institution level.
      IssueOutstandingAmount:
        text: IssueOutstandingAmount
        description: Specifies a limit of the issue compared to the outstanding amount
          of the asset on the market.
      MarketCapitalisation:
        text: MarketCapitalisation
        description: Specifies a limit of the issue calculated as a percentage of
          the market capitalisation of the asset on the market.
      OutstandingBalance:
        text: OutstandingBalance
        description: Specifies a limit on the total outstanding balance for an asset
          in the portfolio.
  AverageTradingVolumeMethodologyEnum:
    name: AverageTradingVolumeMethodologyEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AverageTradingVolumeMethodologyEnum
    description: Indicates the type of equity average trading volume (single) the
      highest amount on one exchange, or (consolidated) volumes across more than one
      exchange.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    permissible_values:
      Single:
        text: Single
        description: Single, the highest amount on one exchange.
      Consolidated:
        text: Consolidated
        description: Consolidated volume across more than one exchange.
  CreditSupportAgreementTypeEnum:
    name: CreditSupportAgreementTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportAgreementTypeEnum
    description: The enumerated values to specify the type of Credit Support Agreement
      governing the transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-support-agreement-type
    permissible_values:
      CreditSupportDeed:
        text: CreditSupportDeed
        description: A Credit Support Deed legal agreement.
      CreditSupportAnnex:
        text: CreditSupportAnnex
        description: A Credit Support Annex legal agreement.
      CollateralTransferAgreement:
        text: CollateralTransferAgreement
        description: A Collateral Transfer Agreement
  AlternativeToInterestAmountEnum:
    name: AlternativeToInterestAmountEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AlternativeToInterestAmountEnum
    description: If there is an alternative to interest amounts, how is it specified?
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    permissible_values:
      Standard:
        text: Standard
        description: Interest amount is not transferred if transfer would create or
          increase a delivery amount.
      ActualAmountReceived:
        text: ActualAmountReceived
        description: The standard calculation of the Interest Amount is replaced with
          the amount of interest the secured party actually receives in relation to
          the Cash collateral.
      TransferIfDeliveryAmountBelowMTA:
        text: TransferIfDeliveryAmountBelowMTA
        description: Interest amount is not transferred if transfer would create or
          increase a delivery amount. (This is the 'Standard' provision). However,
          interest Amount will be transferred if Delivery Amount is below Minimum
          Transfer Amount.
      Other:
        text: Other
        description: An other alternative option outside these choices that can be
          described as an alternative provision.
  CollateralInterestHandlingEnum:
    name: CollateralInterestHandlingEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralInterestHandlingEnum
    description: How is collateral interest to be handled?
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    permissible_values:
      Transfer:
        text: Transfer
        description: ' Transfer the interest each period '
      Adjust:
        text: Adjust
        description: ' Adjust the collateral balance to include the interest amount '
      Transfer_or_Adjust:
        text: Transfer_or_Adjust
        description: ' Transfer the interest if it meets certain criteria, or otherwise
          adjust the collateral balance to reflect the interest amount  '
  DeliveryAmountElectionEnum:
    name: DeliveryAmountElectionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeliveryAmountElectionEnum
    description: The enumerated values to specify the application of Interest Amount
      with respect to the Delivery Amount through standard language.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    permissible_values:
      LastLocalBusinessDay:
        text: LastLocalBusinessDay
        description: The delivery only includes `Transfer on last Local Business Day.
      LastAndAnyLocalBusinessDay:
        text: LastAndAnyLocalBusinessDay
        description: The delivery includes both `Transfer on last Local Business Day`
          and `Transfer a Delivery Amount (IM) consisting of cash on any Local Business
          Day.`
  CollateralMarginTypeEnum:
    name: CollateralMarginTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralMarginTypeEnum
