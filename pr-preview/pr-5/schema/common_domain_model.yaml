  CalculationCurrencyElection:
    name: CalculationCurrencyElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationCurrencyElection
    description: A class to specify the ISDA SIMM Calculation Currency.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(ee)(3"
    comments:
    - "Rosetta condition: BaseCurrency \u2014 if isBaseCurrency = True then currency\
      \ is absent else currency exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:CalculationCurrencyElection
    close_mappings:
    - fpml_5_10:CalculationCurrencyElection
    slots:
    - CalculationCurrencyElection_party
    - isBaseCurrency
    - CalculationCurrencyElection_currency
    slot_usage:
      party:
        name: party
        description: The party which the SIMM Calculation Currency qualification applies
          to.
        range: CounterpartyRoleEnum
        required: true
      currency:
        name: currency
        description: The currency in which the ISDA SIMM Calculation is denominated,
          when different from the Base Currency. The list of valid currencies is not
          presently positioned as an enumeration as part of the CDM because that scope
          is limited to the values specified by ISDA and FpML. As a result, implementers
          have to make reference to the relevant standard, such as the ISO 4217 standard
          for currency codes.
    class_uri: common_domain_model:CalculationCurrencyElection
    rules:
    - preconditions:
        slot_conditions:
          isBaseCurrency:
            name: isBaseCurrency
            equals_string: 'True'
      postconditions:
        slot_conditions:
          currency:
            name: currency
            required: false
      description: A data rule to enforce that, when the SIMM calculation currency
        is specified as the Base Currency and vice versa.
