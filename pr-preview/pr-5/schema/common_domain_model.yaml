        aliases:
        - BRL.PCOT-FLOATING/BRL04
      BRL_PTAX_BRL09:
        text: BRL_PTAX_BRL09
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian
          Real/U.S. Dollar offered rate for U.S. Dollars, expressed as the amount
          of Brazilian Reais per one U.S. Dollar, for settlement in two Business Days
