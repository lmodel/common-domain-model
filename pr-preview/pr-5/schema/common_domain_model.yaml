    slots:
    - AmendmentEffectiveDate_date
    - specificDate
    - AmendmentEffectiveDate_customProvision
    slot_usage:
      date:
        name: date
        description: The effective date of the Amendment to Termination Currency when
          specified as an actual date.
        required: false
        multivalued: false
      customProvision:
        name: customProvision
        description: The effective date of the Amendment to Termination Currency when
          specified as a non normalized custom provision.
    class_uri: common_domain_model:AmendmentEffectiveDate
  ApplicableRegime:
    name: ApplicableRegime
    definition_uri: https://w3id.org/lmodel/common_domain_model/ApplicableRegime
    description: A class to specify the applicable regulatory regime(s) that parties
      to a legal agreement, such as the ISDA 2016 and 2018 CSA for Initial Margin,
      might be subject to.
    comments:
    - "Rosetta condition: ApplicableRegimeChoice \u2014 required choice regime, additionalRegime"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ApplicableRegime
    close_mappings:
    - fpml_5_10:ApplicableRegime
    slots:
    - ApplicableRegime_regime
    - additionalRegime
    - regimeTerms
    - additionalType
    - additionalTerms
    slot_usage:
      regime:
        name: regime
        description: The applicable regulatory regime, as specified through an enumeration.
        range: RegulatoryRegimeEnum
        required: false
    class_uri: common_domain_model:ApplicableRegime
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            regime:
              name: regime
              required: true
        - slot_conditions:
            additionalRegime:
              name: additionalRegime
              required: true
      description: The applicable regime should be specified either as an enumeration
        or as an additional regime specified by the parties.
  AppropriatedCollateralValuation:
    name: AppropriatedCollateralValuation
    definition_uri: https://w3id.org/lmodel/common_domain_model/AppropriatedCollateralValuation
    description: A class to specify the Valuation of Appropriated Collateral.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(u)" name
      "Valuation of Appropriated Collateral"
    comments:
    - "Rosetta condition: Specified \u2014 if isSpecified = True then election exists"
    - "Rosetta condition: NotSpecified \u2014 if isSpecified = False then election\
      \ is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    exact_mappings:
    - common_domain_model:AppropriatedCollateralValuation
    close_mappings:
    - fpml_5_10:AppropriatedCollateralValuation
    slots:
    - AppropriatedCollateralValuation_isSpecified
    - election
    slot_usage:
      isSpecified:
        name: isSpecified
        description: The qualification of whether the Valuation of Appropriate Collateral
          provision is applicable (True) or not applicable (False).
    class_uri: common_domain_model:AppropriatedCollateralValuation
    rules:
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'True'
      postconditions:
        slot_conditions:
          election:
            name: election
            required: true
      description: The Valuation of Appropriate Collateral election must be specified
        when it is applicable.
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'False'
      postconditions:
        slot_conditions:
          election:
            name: election
            required: false
      description: The Valuation of Appropriate Collateral election cannot be specified
        when it is not applicable.
  BespokeCalculationDate:
    name: BespokeCalculationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/BespokeCalculationDate
