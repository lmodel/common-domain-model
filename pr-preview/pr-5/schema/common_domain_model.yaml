  ProductIdTypeEnum:
    name: ProductIdTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ProductIdTypeEnum
    description: Provides the enumerated values to specify the product identifier
      source.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      BBGID:
        text: BBGID
        description: Published by Bloomberg, the BBGID is a 12-digit alphanumeric
          randomly generated ID covering active and non-active securities.
      BBGTICKER:
        text: BBGTICKER
        description: Published by Bloomberg as a short code to identify publicly trades
          shares of a particular stock on a specific exchange.
      CUSIP:
        text: CUSIP
        description: "Derived from the Committee on Uniform Security Identification\
          \ Procedures, CUSIPs are 9-character identifiers that capture an issue\u2019\
          s important differentiating characteristics for issuers and their financial\
          \ instruments in the U.S. and Canada."
      FIGI:
        text: FIGI
        description: Issued under the guidelines of the Object Management Group, the
          Financial Instrument Global Identifier (FIGI) is a 12 character, alphanumeric,
          randomly generated ID covering hundreds of millions of active and inactive
          instruments. The identifier acts as a Uniform Resource Identifier (URI)
          to link to a set of metadata that uniquely and clearly describes the instrument.
      ISDACRP:
        text: ISDACRP
        description: Issued by the International Swaps Dealers Association as a string
          representing a Commodity Reference Price used for purposes of determining
          a relevant price for an underlying commodity in an OTC derivatives contract.
      ISIN:
        text: ISIN
        description: Issued by The International Securities Identification Number
          (ISIN) Organization, the ISIN is a 12-character alpha-numerical code used
          to uniformly identify a security for trading and settlement purposes. Securities
          with which ISINs can be used include debt securities, such as notes or bonds
          as well shares, such as common stock or shares of a fund, options, derivatives,
          and futures. The ISIN structure is defined in ISO 6166.
      Name:
        text: Name
        description: The name of the product.
      REDID:
        text: REDID
        description: Assigned by S&P Global Market Intelligence, REDID (Reference
          Entity Data Identifier) is a unique alphanumeric code to reference entities,
          primarily utilized within the credit derivatives market for the standardized
          identification of underlying entities.
      RIC:
        text: RIC
        description: Issued by Refinitiv (formerly Reuters), the Reuters Instrument
          Codes(RIC) uniquely identifies financial instruments, including where they
          are traded.
      Other:
        text: Other
        description: Used when the source is not otherwise in this enumerated list
          because it is internal or other reasons.  The source can be identified in
          the scheme which is part of the identifier attribute.
      Sicovam:
        text: Sicovam
        description: "Issued by the French Soci\xE9t\xE9 Interprofessionnelle pour\
          \ la Compensation des Valeurs Mobili\xE8res (SICOVAM) to identify French\
          \ securities listed on French stock exchanges."
      SEDOL:
        text: SEDOL
        description: Assigned by the London Stock Exchange, the Stock Exchange Daily
          Official List (SEDOL) is a list of security identifiers used in the United
          Kingdom and Ireland for clearing purposes.  SEDOLs serve as the National
          Securities Identifying Number for all securities issued in the United Kingdom
          and are therefore part of the security's ISIN as well.
      UPI:
        text: UPI
        description: Assigned by the Derivatives Service Bureau Ltd (DSB), the Unique
          Product Identifier (UPI) is a unique code to describe an over-the-counter
          (OTC) derivatives product.  The UPI is used for identifying the product
          in transaction reporting data.
      Valoren:
        text: Valoren
        description: Assigned by SIX Financial Information, Valoren is a unique numerical
          identification number typically ranging from six to nine digits primarily
          traded in Switzerland, Liechtenstein, and Belgium. This code enables the
          identification of securities such as stocks, bonds, and investment funds
          within these markets.
      Wertpapier:
        text: Wertpapier
        description: Issued by the Institute for the Issuance and Administration of
          Securities in Germany (Securities Information), the Wertpapierkennnummer
          (WKN, WPKN, WPK or simply Wert) consists of six digits or capital letters
          (excluding I and O), and no check digit. It is used to identify German securities.
  TaxonomySourceEnum:
    name: TaxonomySourceEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TaxonomySourceEnum
    description: Represents the enumerated values to specify taxonomy sources.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CFI:
        text: CFI
        description: Represents the ISO 10962 Classification of Financial Instruments
          code.
      ISDA:
        text: ISDA
        description: Represents the ISDA product taxonomy.
      ICAD:
        text: ICAD
        description: Represents the ISDA Collateral Asset Definition Identifier code.
      EMIR:
        text: EMIR
        description: Represents the EMIR Article 9 Asset Definition Identifier code.
      EU_EMIR_EligibleCollateralAssetClass:
        text: EU_EMIR_EligibleCollateralAssetClass
        description: Identifies European Union Eligible Collateral Assets classification
          categories based on EMIR Uncleared Margin Rules.
      UK_EMIR_EligibleCollateralAssetClass:
        text: UK_EMIR_EligibleCollateralAssetClass
        description: 'Identifies United Kingdom Eligible Collateral Assets classification
          categories based on UK Onshored EMIR Uncleared Margin Rules Eligible Collateral
          asset classes for both initial margin (IM) and variation margin (VM) posted
          and collected between specified entities.Please note: UK EMIR regulation
          will detail which eligible collateral assets classes apply to each type
          of entity pairing (counterparty) and which apply to posting of IM and VM.'
      CFTC:
        text: CFTC
        description: Represents the Commodity Futures Trading Commission (CFTC) as
          a taxonomy source.
      US_CFTC_PR_EligibleCollateralAssetClass:
        text: US_CFTC_PR_EligibleCollateralAssetClass
        description: 'Identifies US Eligible Collateral Assets classification categories
          based on Uncleared Margin Rules published by the CFTC and the US Prudential
          Regulator. Note: While the same basic categories exist in the CFTC and US
          Prudential Regulators margin rules, the precise definitions or application
          of those rules could differ between the two rules.'
      MAS:
        text: MAS
        description: Represents the Monetary Authority of Singapore (MAS) as a taxonomy
          source.
      CSA:
        text: CSA
        description: Represents the Canadian Securities Administrators (CSA) as a
          taxonomy source.
      Other:
        text: Other
        description: Denotes a user-specific scheme or taxonomy or other external
          sources not listed here.
