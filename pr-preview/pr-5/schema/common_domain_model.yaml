        text: Issuer
        description: Denotes that the Issuer Criteria has priority.
      Asset:
        text: Asset
        description: Denotes that the Asset Criteria has priority.
      Lowest:
        text: Lowest
        description: Denotes that lowest rating should be used if several criteria
          apply.
      Highest:
        text: Highest
        description: Denotes that highest rating should be used if several criteria
          apply.
      Average:
        text: Average
        description: Denotes that average rating should be used if several criteria
          apply.
