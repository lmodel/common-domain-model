    range: integer
    required: true
  valueDate:
    name: valueDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/valueDate
    description: Adjusted value date of the future value amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:valueDate
