    - breakdown
    class_uri: common_domain_model:SplitInstruction
  PartyChangeInstruction:
    name: PartyChangeInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyChangeInstruction
    description: 'Specifies instruction to change the party on a trade. This primitive
      instruction is used in a number of scenarios including: clearing, allocation
      and novation. The instrution must include a trade identifier, because a change
      of party effectively results in a different trade.'
    in_subset:
