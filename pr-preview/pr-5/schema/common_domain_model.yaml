  CreditDefaultPayout:
    name: CreditDefaultPayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditDefaultPayout
    description: ' The credit default payout specification provides the details necessary
      for determining when a credit payout will be triggered as well as the parameters
      for calculating the payout and the settlement terms. The associated globalKey
      denotes the ability to associate a hash value to the CreditDefaultPayout instantiations
      for the purpose of model cross-referencing, in support of functionality such
      as the event effect and the lineage.'
    comments:
    - "Rosetta condition: FpML_cd_12 \u2014 if generalTerms -> referenceInformation\
      \ -> referencePrice exists then generalTerms -> referenceInformation -> referencePrice\
      \ -> value >= 0"
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:CreditDefaultPayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - generalTerms
    - protectionTerms
    - transactedPrice
    class_uri: common_domain_model:CreditDefaultPayout
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
  GeneralTerms:
    name: GeneralTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/GeneralTerms
    description: ' A class specifying a set of non-monetary terms for the Credit Derivative
      Transaction, including the buyer and seller and selected items from the ISDA
      2014 Credit Definition article II, such as the reference obligation and related
      terms. The CDM GeneralTerms class corresponds to the FpML GeneralTerms complex
      type, except that the effectiveDate and scheduledTerminationDate have been positioned
      as part of the InterestRatePayout class in the CDM instead of in GeneralTerms.'
    comments:
    - "Rosetta condition: GeneralTermsChoice \u2014 required choice referenceInformation,\
      \ indexReferenceInformation, basketReferenceInformation"
    - "Rosetta condition: FpML_cd_41 \u2014 if indexReferenceInformation -> tranche\
      \ is absent then modifiedEquityDelivery is absent"
    - "Rosetta condition: FpML_cd_42 \u2014 if basketReferenceInformation is absent\
      \ then substitution is absent"
    - "Rosetta condition: BasketReferenceInformationNameOrId \u2014 if basketReferenceInformation\
      \ exists then basketReferenceInformation -> basketName exists or basketReferenceInformation\
      \ -> basketId exists"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:GeneralTerms
    slots:
    - GeneralTerms_referenceInformation
    - indexReferenceInformation
    - basketReferenceInformation
    - additionalTerm
    - GeneralTerms_substitution
    - modifiedEquityDelivery
    slot_usage:
      referenceInformation:
        name: referenceInformation
        description: This attribute contains all the terms relevant to defining the
          reference entity and reference obligation(s).
        required: false
      substitution:
        name: substitution
        description: Value of this attribute set to 'true' indicates that substitution
          is applicable.
        range: boolean
    class_uri: common_domain_model:GeneralTerms
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            referenceInformation:
              name: referenceInformation
              required: true
        - slot_conditions:
            indexReferenceInformation:
              name: indexReferenceInformation
              required: true
        - slot_conditions:
            basketReferenceInformation:
              name: basketReferenceInformation
              required: true
      description: Choice rule to represent an FpML choice construct.
    - preconditions:
        slot_conditions:
          basketReferenceInformation:
            name: basketReferenceInformation
            required: false
      postconditions:
        slot_conditions:
          substitution:
            name: substitution
            required: false
      description: FpML validation rule cd-42 - If basketReferenceInformation does
        not exist, then substitution must not exist.
  InterestRatePayout:
    name: InterestRatePayout
    definition_uri: https://w3id.org/lmodel/common_domain_model/InterestRatePayout
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FixedAmount","description":"2006 ISDA Definition Article
          5 Section 5.1. Calculation of a Fixed Amount: The Fixed Amount payable by
          a party on a Payment Date will be: (a) if an amount is specified for the
          Swap Transaction as the Fixed Amount payable by that party for that Payment
          Date or for the related Calculation Period, that amount; or (b) if an amount
          is not specified for the Swap Transaction as the Fixed Amount payable by
          that party for that Payment Date or for the related Calculation Period,
          an amount calculated on a formula basis for that Payment Date or for the
          related Calculation Period as follows: Fixed Amount = Calculation Amount
          \u00d7 Fixed Rate \u00d7 Day Count Fraction.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"notional","type":"number","cardinality":"0..1"},{"name":"date","type":"date","cardinality":"0..1"},{"name":"calculationPeriodData","type":"CalculationPeriodData","cardinality":"0..1"}],"output":{"name":"fixedAmount","type":"number","cardinality":"1..1"}},{"name":"FloatingAmount","description":"2006
          ISDA Definition Article 6 Section 6.1. Calculation of a Floating Amount:
          Subject to the provisions of Section 6.4 (Negative Interest Rates), the
          Floating Amount payable by a party on a Payment Date will be: (a) if Compounding
          is not specified for the Swap Transaction or that party, an amount calculated
          on a formula basis for that Payment Date or for the related Calculation
          Period as follows: Floating Amount = Calculation Amount \u00d7 Floating
          Rate + Spread \u00d7 Floating Rate Day Count Fraction (b) if ''Compounding''
          is specified to be applicable to the Swap Transaction or that party and
          ''Flat Compounding'' is not specified, an amount equal to the sum of the
          Compounding Period Amounts for each of the Compounding Periods in the related
          Calculation Period; or (c) if ''Flat Compounding'' is specified to be applicable
          to the Swap Transaction or that party, an amount equal to the sum of the
          Basic Compounding Period Amounts for each of the Compounding Periods in
          the related Calculation Period plus the sum of the Additional Compounding
          Period Amounts for each such Compounding Period.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"rate","type":"number","cardinality":"0..1"},{"name":"notional","type":"number","cardinality":"0..1"},{"name":"date","type":"date","cardinality":"0..1"},{"name":"calculationPeriodData","type":"CalculationPeriodData","cardinality":"0..1"}],"output":{"name":"floatingAmount","type":"number","cardinality":"1..1"}},{"name":"ExtractFixedLeg","description":"Extract
          interest rate payout containing fix rate specification.","inputs":[{"name":"interestRatePayouts","type":"InterestRatePayout","cardinality":"0..*"}],"output":{"name":"fixedRatePayout","type":"InterestRatePayout","cardinality":"0..1"}},{"name":"FixedAmountCalculation","description":"Calculates
          the fixed amount for a calculation period by looking up the notional and
          the fixed rate and multiplying by the year fraction.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"notional","type":"number","cardinality":"0..1"}],"output":{"name":"fixedAmountDetails","type":"FixedAmountCalculationDetails","cardinality":"1..1"}},{"name":"GetFixedRate","description":"Look
          up the fixed rate for a calculation period.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"fixedRate","type":"number","cardinality":"0..1"}},{"name":"FloatingAmountCalculation","description":"Calculate
          a floating amount for a calculation period by determining the raw floating
          rate, applying any rate treatments, looking up the calculation period notional,
          then performing the multiplication of the notional, rate, and year fraction.  Floating
          amount calculations are described in the 2021 ISDA Definitions in Section
          6 and 7.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"isInitialPeriod","type":"boolean","cardinality":"1..1"},{"name":"suppliedNotional","type":"number","cardinality":"0..1"},{"name":"suppliedRate","type":"number","cardinality":"0..1"}],"output":{"name":"result","type":"FloatingAmountCalculationDetails","cardinality":"1..1"}},{"name":"ApplyFloatingRateSetting","description":"Calculate
          a floating amount for a calculation period by determining the raw floating
          rate, applying any rate treatments, looking up the calculation period notional,
          then performing the multiplication of the notional, rate, and year fraction.  Floating
          amount calculations are described in the 2021 ISDA Definitions in Section
          6 and 7.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"isInitialPeriod","type":"boolean","cardinality":"1..1"},{"name":"suppliedNotional","type":"number","cardinality":"0..1"},{"name":"suppliedRate","type":"number","cardinality":"0..1"},{"name":"floatingRateSetting","type":"FloatingRateSettingDetails","cardinality":"0..1"}],"output":{"name":"result","type":"FloatingAmountCalculationDetails","cardinality":"1..1"}},{"name":"CalculateFloatingCashFlow","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"notional","type":"number","cardinality":"0..1"},{"name":"currency","type":"string","cardinality":"0..1"},{"name":"floatingRateSetting","type":"FloatingRateSettingDetails","cardinality":"0..1"},{"name":"processedRateDetails","type":"FloatingRateProcessingDetails","cardinality":"1..1"}],"output":{"name":"result","type":"FloatingAmountCalculationDetails","cardinality":"1..1"}},{"name":"GetNotionalAmount","description":"Look
          up the notional amount in effect for a calculation period.","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"notional","type":"Money","cardinality":"1..1"}},{"name":"CalculateYearFraction","description":"Calculate
          the year fraction for a single calculation period, by invoking the base
          year fraction logic","inputs":[{"name":"interestRatePayout","type":"InterestRatePayout","cardinality":"1..1"},{"name":"dcf","type":"DayCountFractionEnum","cardinality":"1..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}],"output":{"name":"yearFrac","type":"number","cardinality":"1..1"}}]'
    description: ' A class to specify all of the terms necessary to define and calculate
      a cash flow based on a fixed, a floating or an inflation index rate. The interest
      rate payout can be applied to interest rate swaps and FRA (which both have two
      associated interest rate payouts), credit default swaps (to represent the fee
      leg when subject to periodic payments) and equity swaps (to represent the funding
      leg). The associated globalKey denotes the ability to associate a hash value
      to the InterestRatePayout instantiations for the purpose of model cross-referencing,
      in support of functionality such as the event effect and the lineage.'
    comments:
    - "Rosetta condition: Quantity \u2014 priceQuantity exists"
    - "Rosetta condition: InterestRatePayoutChoice \u2014 optional choice paymentDates,\
      \ paymentDate"
    - "Rosetta condition: FutureValueNotional \u2014 if rateSpecification -> FixedRateSpecification\
      \ is absent then priceQuantity -> futureValueNotional is absent"
    - "Rosetta condition: TerminationDate \u2014 if priceQuantity -> futureValueNotional\
      \ exists then priceQuantity -> futureValueNotional -> valueDate = calculationPeriodDates\
      \ -> terminationDate -> adjustableDate -> adjustedDate"
    - "Rosetta condition: RateSpecification \u2014 if rateSpecification is absent\
      \ then priceQuantity -> priceSchedule exists"
    - "Rosetta condition: FpML_ird_6 \u2014 if paymentDates -> firstPaymentDate exists\
      \ and calculationPeriodDates -> effectiveDate exists then paymentDates -> firstPaymentDate\
      \ > calculationPeriodDates -> effectiveDate -> adjustableDate -> unadjustedDate"
    - "Rosetta condition: FpML_ird_23 \u2014 if stubPeriod -> initialStub exists then\
      \ calculationPeriodDates -> firstRegularPeriodStartDate exists"
    - "Rosetta condition: FpML_ird_24 \u2014 if stubPeriod -> finalStub exists then\
      \ calculationPeriodDates -> lastRegularPeriodEndDate exists"
    - "Rosetta condition: InitialStubFinalStub \u2014 if stubPeriod exists then stubPeriod\
      \ -> initialStub exists or stubPeriod -> finalStub exists"
    - "Rosetta condition: CashSettlementTerms \u2014 if settlementTerms -> settlementCurrency\
      \ exists and (settlementTerms -> settlementCurrency <> priceQuantity -> quantitySchedule\
      \ -> unit -> currency or settlementTerms -> settlementCurrency <> priceQuantity\
      \ -> quantityMultiplier -> fxLinkedNotionalSchedule -> varyingNotionalCurrency)\
      \ then (settlementTerms -> cashSettlementTerms -> valuationMethod exists and\
      \ settlementTerms -> cashSettlementTerms -> valuationDate exists) or priceQuantity\
      \ -> quantityMultiplier -> fxLinkedNotionalSchedule -> fxSpotRateSource exists"
    - "Rosetta condition: FpML_ird_7_1 \u2014 if paymentDates -> paymentFrequency\
      \ -> period = calculationPeriodDates -> calculationPeriodFrequency -> period\
      \ and paymentDates -> paymentFrequency -> periodMultiplier = calculationPeriodDates\
      \ -> calculationPeriodFrequency -> periodMultiplier then (compoundingMethod\
      \ is absent or compoundingMethod = CompoundingMethodEnum -> None)"
    - "Rosetta condition: FpML_ird_7_2 \u2014 if (paymentDates -> paymentFrequency\
      \ -> period exists and calculationPeriodDates -> calculationPeriodFrequency\
      \ -> period exists and paymentDates -> paymentFrequency -> period <> calculationPeriodDates\
      \ -> calculationPeriodFrequency -> period) or (paymentDates -> paymentFrequency\
      \ -> periodMultiplier exists and calculationPeriodDates -> calculationPeriodFrequency\
      \ -> periodMultiplier exists and paymentDates -> paymentFrequency -> periodMultiplier\
      \ <> calculationPeriodDates -> calculationPeriodFrequency -> periodMultiplier)\
      \ then compoundingMethod exists"
    - "Rosetta condition: FpML_ird_9 \u2014 if compoundingMethod exists and compoundingMethod\
      \ <> CompoundingMethodEnum -> None then resetDates exists"
    - "Rosetta condition: FpML_ird_29 \u2014 if compoundingMethod exists and compoundingMethod\
      \ <> CompoundingMethodEnum -> None then rateSpecification -> FixedRateSpecification\
      \ is absent"
    - "Rosetta condition: CalculationPeriodDatesFirstCompoundingPeriodEndDate \u2014\
      \ if compoundingMethod is absent or compoundingMethod = CompoundingMethodEnum\
      \ -> None then calculationPeriodDates -> firstCompoundingPeriodEndDate is absent"
    - "Rosetta func: FixedAmount \u2014 2006 ISDA Definition Article 5 Section 5.1.\
      \ Calculation of a Fixed Amount: The Fixed Amount payable by a party on a Payment\
      \ Date will be: (a) if an amount is specified for the Swap Transaction as the\
      \ Fixed Amount payable by that party for that Payment Date or for the related\
      \ Calculation Period, that amount; or (b) if an amount is not specified for\
      \ the Swap Transaction as the Fixed Amount payable by that party for that Payment\
      \ Date or for the related Calculation Period, an amount calculated on a formula\
      \ basis for that Payment Date or for the related Calculation Period as follows:\
      \ Fixed Amount = Calculation Amount \xD7 Fixed Rate \xD7 Day Count Fraction."
    - "Rosetta func: FloatingAmount \u2014 2006 ISDA Definition Article 6 Section\
      \ 6.1. Calculation of a Floating Amount: Subject to the provisions of Section\
      \ 6.4 (Negative Interest Rates), the Floating Amount payable by a party on a\
      \ Payment Date will be: (a) if Compounding is not specified for the Swap Transaction\
      \ or that party, an amount calculated on a formula basis for that Payment Date\
      \ or for the related Calculation Period as follows: Floating Amount = Calculation\
      \ Amount \xD7 Floating Rate + Spread \xD7 Floating Rate Day Count Fraction (b)\
      \ if 'Compounding' is specified to be applicable to the Swap Transaction or\
      \ that party and 'Flat Compounding' is not specified, an amount equal to the\
      \ sum of the Compounding Period Amounts for each of the Compounding Periods\
      \ in the related Calculation Period; or (c) if 'Flat Compounding' is specified\
      \ to be applicable to the Swap Transaction or that party, an amount equal to\
      \ the sum of the Basic Compounding Period Amounts for each of the Compounding\
      \ Periods in the related Calculation Period plus the sum of the Additional Compounding\
      \ Period Amounts for each such Compounding Period."
    - "Rosetta func: ExtractFixedLeg \u2014 Extract interest rate payout containing\
      \ fix rate specification."
    - "Rosetta func: FixedAmountCalculation \u2014 Calculates the fixed amount for\
      \ a calculation period by looking up the notional and the fixed rate and multiplying\
      \ by the year fraction."
    - "Rosetta func: GetFixedRate \u2014 Look up the fixed rate for a calculation\
      \ period."
    - "Rosetta func: FloatingAmountCalculation \u2014 Calculate a floating amount\
      \ for a calculation period by determining the raw floating rate, applying any\
      \ rate treatments, looking up the calculation period notional, then performing\
      \ the multiplication of the notional, rate, and year fraction.  Floating amount\
      \ calculations are described in the 2021 ISDA Definitions in Section 6 and 7."
    - "Rosetta func: ApplyFloatingRateSetting \u2014 Calculate a floating amount for\
      \ a calculation period by determining the raw floating rate, applying any rate\
      \ treatments, looking up the calculation period notional, then performing the\
      \ multiplication of the notional, rate, and year fraction.  Floating amount\
      \ calculations are described in the 2021 ISDA Definitions in Section 6 and 7."
    - 'Rosetta func: CalculateFloatingCashFlow'
    - "Rosetta func: GetNotionalAmount \u2014 Look up the notional amount in effect\
      \ for a calculation period."
    - "Rosetta func: CalculateYearFraction \u2014 Calculate the year fraction for\
      \ a single calculation period, by invoking the base year fraction logic"
    in_subset:
    - cdm_product_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - common_domain_model:InterestRatePayout
    is_a: PayoutBase
    slots:
    - PayoutBase_payerReceiver
    - PayoutBase_priceQuantity
    - principalPayment
    - PayoutBase_settlementTerms
    - rateSpecification
    - InterestRatePayout_dayCountFraction
    - InterestRatePayout_calculationPeriodDates
    - InterestRatePayout_paymentDates
    - InterestRatePayout_paymentDate
    - paymentDelay
    - resetDates
    - discountingMethod
    - compoundingMethod
    - cashflowRepresentation
    - stubPeriod
    - bondReference
    - InterestRatePayout_fixedAmount
    - floatingAmount
    - spreadCalculationMethod
    slot_usage:
      dayCountFraction:
        name: dayCountFraction
        description: The day count fraction. The cardinality has been relaxed when
          compared with the FpML interest rate swap for the purpose of accommodating
          standardized credit default swaps which DCF is not explicitly stated as
          part of the economic terms. The data rule InterestRatePayout_dayCountFraction
          requires that the DCF be stated for interest rate products.
        required: false
      calculationPeriodDates:
        name: calculationPeriodDates
        description: The parameters used to generate the calculation period dates
          schedule, including the specification of any initial or final stub calculation
          periods.
      paymentDates:
        name: paymentDates
        description: The payment date schedule, as defined by the parameters that
          are needed to specify it, either in a parametric way or by reference to
          another schedule of dates (e.g. the reset dates).
        required: false
      paymentDate:
        name: paymentDate
        description: The payment date, where only one date is specified, as for the
          FRA product.
        range: AdjustableDate
      fixedAmount:
        name: fixedAmount
        description: Fixed Amount Calculation
        range: string
    class_uri: common_domain_model:InterestRatePayout
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          priceQuantity:
            name: priceQuantity
            required: true
      description: When there is an OptionPayout the quantity can be expressed as
        part of the payoutQuantity, or as part of the underlier in the case of a Swaption.  For
        all other payouts that extend PayoutBase the payoutQuantity is a mandatory
        attribute.
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            paymentDates:
              name: paymentDates
              required: true
        - slot_conditions:
            paymentDate:
              name: paymentDate
              required: true
      description: The paymentDates attributes is applicable to interest rate payouts
        with periodic payments, while the paymentDate reflects the FpML FRA implementation
        where one specific date is specified.
  DividendPayoutRatio:
