    - CollateralValuationTreatment_fxHaircutPercentage
    - CollateralValuationTreatment_additionalHaircutPercentage
    slot_usage:
      haircutPercentage:
        name: haircutPercentage
        description: Specifies a haircut percentage to be applied to the value of
          asset and used as a discount factor to the value of the collateral asset,expressed
          as a percentage in decimal terms. As an example a 0.5% haircut would be
          represented as a decimal number 0.005.
