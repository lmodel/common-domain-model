      currency:
        name: currency
        description: The currency in which the applicable limit is denominated. The
          list of valid currencies is not presently positioned as an enumeration as
          part of the CDM because that scope is limited to the values specified by
          ISDA and FpML. As a result, implementers have to make reference to the relevant
          standard, such as the ISO 4217 standard for currency codes.
    class_uri: common_domain_model:LimitApplicable
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            amountUtilized:
              name: amountUtilized
              required: true
        - slot_conditions:
            utilization:
              name: utilization
              required: true
      description: Choice rule to represent an FpML choice construct.
  LimitApplicableExtended:
    name: LimitApplicableExtended
    definition_uri: https://w3id.org/lmodel/common_domain_model/LimitApplicableExtended
