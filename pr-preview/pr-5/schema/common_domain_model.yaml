    description: Defines the strike of an option in the form of a price that could
      be a cash price, interestRate, or other types.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:strikePrice
    owner: OptionStrike
    domain_of:
    - OptionStrike
    range: Price
    inlined: true
    inlined_as_list: true
  strikeReference:
    name: strikeReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/strikeReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: Defines the strike of an option in reference to the spread of the
      underlying swap (typical practice in the case of an option on a credit single
      name swaps).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:strikeReference
    owner: OptionStrike
    domain_of:
    - OptionStrike
    range: FixedRateSpecification
    inlined: true
    inlined_as_list: true
  referenceSwapCurve:
    name: referenceSwapCurve
    definition_uri: https://w3id.org/lmodel/common_domain_model/referenceSwapCurve
    description: Defines the strike of an option when expressed by reference to a
      swap curve (Typically the case for a convertible bond option).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:referenceSwapCurve
    owner: OptionStrike
    domain_of:
    - OptionStrike
    range: ReferenceSwapCurve
    inlined: true
    inlined_as_list: true
  averagingStrikeFeature:
    name: averagingStrikeFeature
    definition_uri: https://w3id.org/lmodel/common_domain_model/averagingStrikeFeature
    description: Defines an  option strike that is calculated from an average of observed
      market prices.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:averagingStrikeFeature
    owner: OptionStrike
    domain_of:
    - OptionStrike
    range: AveragingStrikeFeature
    inlined: true
    inlined_as_list: true
  passThroughItem:
    name: passThroughItem
    definition_uri: https://w3id.org/lmodel/common_domain_model/passThroughItem
    description: One to many pass through payment items.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:passThroughItem
    owner: PassThrough
    domain_of:
    - PassThrough
    range: PassThroughItem
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  passThroughPercentage:
    name: passThroughPercentage
    definition_uri: https://w3id.org/lmodel/common_domain_model/passThroughPercentage
    description: Percentage of payments from the underlier which are passed through.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:passThroughPercentage
    owner: PassThroughItem
    domain_of:
    - PassThroughItem
    range: decimal
    required: true
  fxRate:
    name: fxRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/fxRate
    description: Specifies a currency conversion rate.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:fxRate
    owner: Quanto
    domain_of:
    - Quanto
    range: FxRate
    multivalued: true
    inlined: true
    inlined_as_list: true
  strikeSpread:
    name: strikeSpread
    definition_uri: https://w3id.org/lmodel/common_domain_model/strikeSpread
    description: Definition of the upper strike in a strike spread.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:strikeSpread
    owner: StrategyFeature
    domain_of:
    - StrategyFeature
    range: StrikeSpread
    inlined: true
    inlined_as_list: true
  calendarSpread:
    name: calendarSpread
    definition_uri: https://w3id.org/lmodel/common_domain_model/calendarSpread
    description: Definition of the later expiration date in a calendar spread.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:calendarSpread
    owner: StrategyFeature
    domain_of:
    - StrategyFeature
    range: CalendarSpread
    inlined: true
    inlined_as_list: true
  upperStrike:
    name: upperStrike
    definition_uri: https://w3id.org/lmodel/common_domain_model/upperStrike
    description: Upper strike in a strike spread.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:upperStrike
    owner: StrikeSpread
    domain_of:
    - StrikeSpread
    range: OptionStrike
    required: true
    inlined: true
    inlined_as_list: true
  upperStrikeNumberOfOptions:
    name: upperStrikeNumberOfOptions
    definition_uri: https://w3id.org/lmodel/common_domain_model/upperStrikeNumberOfOptions
    description: Number of options at the upper strike price in a strike spread.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:upperStrikeNumberOfOptions
    owner: StrikeSpread
    domain_of:
    - StrikeSpread
    range: decimal
    required: true
  style:
    name: style
    definition_uri: https://w3id.org/lmodel/common_domain_model/style
    description: Whether the option has a single exercise (european), multiple exercise
      dates (bermuda), or a continuous range of exercise (american).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:style
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: OptionExerciseStyleEnum
  commencementDate:
    name: commencementDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/commencementDate
    description: The first day of the exercise period for an American style option.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:commencementDate
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: AdjustableOrRelativeDate
    inlined: true
    inlined_as_list: true
  exerciseDates:
    name: exerciseDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseDates
    description: The dates that define the Bermuda option exercise dates and the expiration
      date. The last specified date is assumed to be the expiration date. The dates
      can either be specified as a series of explicit dates and associated adjustments
      or as a series of dates defined relative to another schedule of dates, for example,
      the calculation period start dates. Where a relative series of dates are defined
      the first and last possible exercise dates can be separately specified.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseDates
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: AdjustableOrRelativeDates
    inlined: true
    inlined_as_list: true
  relevantUnderlyingDate:
    name: relevantUnderlyingDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/relevantUnderlyingDate
    description: The effective date on the underlying product if the option is exercised.  For
      example, for a swaption it is the swap effective date, for an option on an FX
      spot or forward it is the value date for settlement, and in an extendible/cancelable
      provision it is the swap termination date, which is the date on which the termination
      is effective.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:relevantUnderlyingDate
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: AdjustableOrRelativeDates
    inlined: true
    inlined_as_list: true
  earliestExerciseTime:
    name: earliestExerciseTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/earliestExerciseTime
    description: The earliest time at which notice of exercise can be given by the
      buyer to the seller (or seller's agent) to, and including, the expiration date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:earliestExerciseTime
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: BusinessCenterTime
    inlined: true
    inlined_as_list: true
  latestExerciseTime:
    name: latestExerciseTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/latestExerciseTime
    description: For a Bermuda or American style option, the latest time on an exercise
      business day (excluding the expiration date) within the exercise period that
      notice can be given by the buyer to the seller or seller's agent. Notice of
      exercise given after this time will be deemed to have been given on the next
      exercise business day.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:latestExerciseTime
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: BusinessCenterTime
    inlined: true
    inlined_as_list: true
  expirationTime:
    name: expirationTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/expirationTime
    description: The latest time for exercise on expirationDate. It is made mandatory
      given that for all option styles, this field is required.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:expirationTime
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: BusinessCenterTime
    inlined: true
    inlined_as_list: true
  expirationTimeType:
    name: expirationTimeType
    definition_uri: https://w3id.org/lmodel/common_domain_model/expirationTimeType
    description: The time of day at which the equity option expires, for example the
      official closing time of the exchange.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:expirationTimeType
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: ExpirationTimeTypeEnum
    required: true
  multipleExercise:
    name: multipleExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/multipleExercise
    description: As defined in the 2000 ISDA Definitions, Section 12.4. Multiple Exercise,
      the buyer of the option has the right to exercise all or less than all the unexercised
      notional amount of the underlying swap on one or more days in the exercise period,
      but on any such day may not exercise less than the minimum notional amount or
      more that the maximum notional amount, and if an integral multiple amount is
      specified, the notional amount exercised must be equal to, or be an integral
      multiple of, the integral multiple amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:multipleExercise
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: MultipleExercise
    inlined: true
    inlined_as_list: true
  exerciseFeeSchedule:
    name: exerciseFeeSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseFeeSchedule
    description: The fees associated with an exercise date. The fees are conditional
      on the exercise occurring. The fees can be specified as actual currency amounts
      or as percentages of the notional amount being exercised.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseFeeSchedule
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: ExerciseFeeSchedule
    inlined: true
    inlined_as_list: true
  exerciseProcedure:
    name: exerciseProcedure
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseProcedure
    description: The set of parameters defining the procedure associated with the
      exercise, e.g. manual exercise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseProcedure
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: ExerciseProcedure
    inlined: true
    inlined_as_list: true
  exerciseFee:
    name: exerciseFee
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseFee
    description: A fee to be paid on exercise. This could be represented as an amount
      or a rate and notional reference on which to apply the rate.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseFee
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: ExerciseFee
    inlined: true
    inlined_as_list: true
  partialExercise:
    name: partialExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/partialExercise
    description: As defined in the 2000 ISDA Definitions, Section 12.3. Partial Exercise,
      the buyer of the option has the right to exercise all or less than all the notional
      amount of the underlying swap on the expiration date, but may not exercise less
      than the minimum notional amount, and if an integral multiple amount is specified,
      the notional amount exercised must be equal to, or be an integral multiple of,
      the integral multiple amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:partialExercise
    owner: ExerciseTerms
    domain_of:
    - ExerciseTerms
    range: PartialExercise
    inlined: true
    inlined_as_list: true
  thresholdRate:
    name: thresholdRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/thresholdRate
    description: A threshold rate. The threshold of 0.10% would be represented as
      0.001
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    close_mappings:
    - fpml_5_10:AutomaticExercise.thresholdRate
    slot_uri: common_domain_model:thresholdRate
    owner: AutomaticExercise
    domain_of:
    - AutomaticExercise
    range: decimal
  notionalReference:
    name: notionalReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/notionalReference
    annotations:
      metadata_reference:
        tag: metadata_reference
        value: true
    description: A pointer style reference to the associated notional schedule defined
      elsewhere in the document.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:notionalReference
    owner: PartialExercise
    domain_of:
    - ExerciseFee
    - ExerciseFeeSchedule
    - PartialExercise
    range: Money
    required: true
    inlined: true
    inlined_as_list: true
  feeAmount:
    name: feeAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/feeAmount
    description: The amount of fee to be paid on exercise. The fee currency is that
      of the referenced notional.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:feeAmount
    owner: ExerciseFee
    domain_of:
    - ExerciseFee
    range: decimal
  feeRate:
    name: feeRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/feeRate
    description: A fee represented as a percentage of some referenced notional. A
      percentage of 5% would be represented as 0.05.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:feeRate
    owner: ExerciseFee
    domain_of:
    - ExerciseFee
    range: decimal
  feePaymentDate:
    name: feePaymentDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/feePaymentDate
    description: The date on which exercise fee(s) will be paid. It is specified as
      a relative date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:feePaymentDate
    owner: ExerciseFeeSchedule
    domain_of:
    - ExerciseFee
    - ExerciseFeeSchedule
    range: RelativeDateOffset
    required: true
    inlined: true
    inlined_as_list: true
  feeAmountSchedule:
    name: feeAmountSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/feeAmountSchedule
    description: The exercise fee amount schedule. The fees are expressed as currency
      amounts. The currency of the fee is assumed to be that of the notional schedule
      referenced.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:feeAmountSchedule
    owner: ExerciseFeeSchedule
    domain_of:
    - ExerciseFeeSchedule
    range: AmountSchedule
    inlined: true
    inlined_as_list: true
  feeRateSchedule:
    name: feeRateSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/feeRateSchedule
    description: The exercise free rate schedule. The fees are expressed as percentage
      rates of the notional being exercised. The currency of the fee is assumed to
      be that of the notional schedule referenced.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:feeRateSchedule
    owner: ExerciseFeeSchedule
    domain_of:
    - ExerciseFeeSchedule
    range: Schedule
    inlined: true
    inlined_as_list: true
  exerciseNoticeGiver:
    name: exerciseNoticeGiver
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseNoticeGiver
    description: Specifies the principal party of the trade that has the right to
      exercise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseNoticeGiver
    owner: ExerciseNotice
    domain_of:
    - ExerciseNotice
    range: ExerciseNoticeGiverEnum
    required: true
  exerciseNoticeReceiver:
    name: exerciseNoticeReceiver
    definition_uri: https://w3id.org/lmodel/common_domain_model/exerciseNoticeReceiver
    description: Specifies the party to which notice of exercise should be given,
      e.g. by the buyer of the option. Although in many cases it is the buyer of the
      option who sends the exercise notice to the seller of the option, this component
      is reused, e.g. in case of OptionEarlyTermination, either or both parties have
      the right to exercise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:exerciseNoticeReceiver
    owner: ExerciseNotice
    domain_of:
    - ExerciseNotice
    range: AncillaryRoleEnum
  manualExercise:
    name: manualExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/manualExercise
    description: Specifies that the notice of exercise must be given by the buyer
      to the seller or seller's agent.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:manualExercise
    owner: ExerciseProcedure
    domain_of:
    - ExerciseProcedure
    range: ManualExercise
    inlined: true
    inlined_as_list: true
  automaticExercise:
    name: automaticExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/automaticExercise
    description: If automatic is specified, then the notional amount of the underlying
      swap not previously exercised under the swaption will be automatically exercised
      at the expiration time on the expiration date if at such time the buyer is in-the-money,
      provided that the difference between the settlement rate and the fixed rate
      under the relevant underlying swap is not less than the specified threshold
      rate. The term in-the-money is assumed to have the meaning defining in the 2000
      ISDA Definitions, Section 17.4 In-the-money.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:automaticExercise
    owner: ExerciseProcedure
    domain_of:
    - ExerciseProcedure
    range: AutomaticExercise
    inlined: true
    inlined_as_list: true
  limitedRightToConfirm:
    name: limitedRightToConfirm
    definition_uri: https://w3id.org/lmodel/common_domain_model/limitedRightToConfirm
    description: Has the meaning defined as part of the 1997 ISDA Government Bond
      Option Definitions, section 4.5 Limited Right to Confirm Exercise. If present,
      (i) the Seller may request the Buyer to confirm its intent if not done on or
      before the expiration time on the Expiration date (ii) specific rules will apply
      in relation to the settlement mode.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:limitedRightToConfirm
    owner: ExerciseProcedure
    domain_of:
    - ExerciseProcedure
    range: boolean
  splitTicket:
    name: splitTicket
    definition_uri: https://w3id.org/lmodel/common_domain_model/splitTicket
    description: Typically applicable to the physical settlement of bond and convertible
      bond options. If present, means that the party required to deliver the bonds
      will divide those to be delivered as notifying party desires to facilitate delivery
      obligations.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:splitTicket
    owner: ExerciseProcedure
    domain_of:
    - ExerciseProcedure
    range: boolean
  fallbackExercise:
    name: fallbackExercise
    definition_uri: https://w3id.org/lmodel/common_domain_model/fallbackExercise
    description: If fallback exercise is specified then the notional amount of the
      underlying swap, not previously exercised under the swaption, will be automatically
      exercised at the expiration time on the expiration date if at such time the
      buyer is in-the-money, provided that the difference between the settlement rate
      and the fixed rate under the relevant underlying swap is not less than one tenth
      of a percentage point (0.10% or 0.001). The term in-the-money is assumed to
      have the meaning defined in the 2000 ISDA Definitions, Section 17.4. In-the-money.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:fallbackExercise
    owner: ManualExercise
    domain_of:
    - ManualExercise
    range: boolean
  maximumNotionalAmount:
    name: maximumNotionalAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/maximumNotionalAmount
    description: The maximum notional amount that can be exercised on a given exercise
      date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:maximumNotionalAmount
    owner: MultipleExercise
    domain_of:
    - MultipleExercise
    range: decimal
  maximumNumberOfOptions:
    name: maximumNumberOfOptions
    definition_uri: https://w3id.org/lmodel/common_domain_model/maximumNumberOfOptions
    description: The maximum number of options that can be exercised on a given exercise
      date. If the number is not specified, it means that the maximum number of options
      corresponds to the remaining unexercised options.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:maximumNumberOfOptions
    owner: MultipleExercise
    domain_of:
    - MultipleExercise
    range: integer
  integralMultipleAmount:
    name: integralMultipleAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/integralMultipleAmount
    description: A notional amount which restricts the amount of notional that can
      be exercised when partial exercise or multiple exercise is applicable. The integral
      multiple amount defines a lower limit of notional that can be exercised and
      also defines a unit multiple of notional that can be exercised, i.e. only integer
      multiples of this amount can be exercised.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:integralMultipleAmount
    owner: PartialExercise
    domain_of:
    - PartialExercise
    range: decimal
  minimumNotionalAmount:
    name: minimumNotionalAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/minimumNotionalAmount
    description: The minimum notional amount that can be exercised on a given exercise
      date. See multipleExercise.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:minimumNotionalAmount
    owner: PartialExercise
    domain_of:
    - PartialExercise
    range: decimal
  minimumNumberOfOptions:
    name: minimumNumberOfOptions
    definition_uri: https://w3id.org/lmodel/common_domain_model/minimumNumberOfOptions
    description: The minimum number of options that can be exercised on a given exercise
      date.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:minimumNumberOfOptions
    owner: PartialExercise
    domain_of:
    - PartialExercise
    range: integer
  strikeRate:
    name: strikeRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/strikeRate
    description: The rate for a cap or floor.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    slot_uri: common_domain_model:strikeRate
    owner: Strike
    domain_of:
    - Strike
    range: decimal
    required: true
  assetLeg:
    name: assetLeg
    definition_uri: https://w3id.org/lmodel/common_domain_model/assetLeg
    description: Defines each asset movement as a buy/sell at different dates, typically
      1 near leg and 1 far leg in a securities financing transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_template
    close_mappings:
    - fpml_5_10:AssetPayout.assetLeg
    slot_uri: common_domain_model:assetLeg
    owner: AssetPayout
    domain_of:
    - AssetPayout
    range: AssetLeg
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  tradeType:
