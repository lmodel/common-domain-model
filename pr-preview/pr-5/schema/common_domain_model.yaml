    - "Rosetta condition: FxHaircutPercentage \u2014 if fxHaircutPercentage exists\
      \ then fxHaircutPercentage > 0 and fxHaircutPercentage < 1"
    - "Rosetta condition: AdditionalHaircutPercentage \u2014 if additionalHaircutPercentage\
