    - collateralBalance
    - CollateralPortfolio_legalAgreement
    slot_usage:
      legalAgreement:
        name: legalAgreement
        description: ' The specification of a legal agreement between two parties
          governing the collateral relationship such as Credit Support Agreement or
          Collateral Transfer Agreement etc. (NB: this can be provided by reference
          to a global key for each LegalAgreement object).'
        multivalued: false
    class_uri: common_domain_model:CollateralPortfolio
    tree_root: true
  CollateralPosition:
