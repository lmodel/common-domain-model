    is_a: LimitApplicable
    slots:
    - limitType
    - clipSize
    - amountUtilized
    - utilization
    - amountRemaining
    - LimitApplicable_currency
    - velocity
    - limitLevel
    - limitAmount
    - limitImpactDueToTrade
    class_uri: common_domain_model:LimitApplicableExtended
