  FloatingRateCalculationParameters:
    name: FloatingRateCalculationParameters
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateCalculationParameters
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"EvaluateCalculatedRate","description":"Evaluate a calculated
          rate as described in the 2021 ISDA Definitions.","inputs":[{"name":"interestRateIndex","type":"InterestRateIndex","cardinality":"1..1"},{"name":"calculationParameters","type":"FloatingRateCalculationParameters","cardinality":"1..1"},{"name":"resetDates","type":"ResetDates","cardinality":"0..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"priorCalculationPeriod","type":"CalculationPeriodBase","cardinality":"0..1"},{"name":"dayCount","type":"DayCountFractionEnum","cardinality":"1..1"}],"output":{"name":"results","type":"FloatingRateSettingDetails","cardinality":"1..1"}},{"name":"GenerateObservationDatesAndWeights","description":"Apply
          shifts to generate the list of observation dates and weights for each of
          those date.","inputs":[{"name":"calculationParams","type":"FloatingRateCalculationParameters","cardinality":"1..1"},{"name":"resetDates","type":"ResetDates","cardinality":"0..1"},{"name":"calculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"priorCalculationPeriod","type":"CalculationPeriodBase","cardinality":"0..1"}],"output":{"name":"results","type":"CalculatedRateObservationDatesAndWeights","cardinality":"1..1"}},{"name":"DetermineObservationPeriod","description":"Determine
          any applicable offsets/shifts for the period for observing an index, and
          then generate the date range to be used for observing the index, based on
          the calculation period, plus any applicable offsets/shift.","inputs":[{"name":"adjustedCalculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"calculationParams","type":"FloatingRateCalculationParameters","cardinality":"1..1"}],"output":{"name":"observationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"}},{"name":"GenerateWeightings","description":"Determine
          the weighting dates and the corresponding weights to be used for weighting
          observation.","inputs":[{"name":"calculationParams","type":"FloatingRateCalculationParameters","cardinality":"1..1"},{"name":"observationDates","type":"date","cardinality":"0..*"},{"name":"observationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"adjustedCalculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"lockoutDays","type":"int","cardinality":"1..1"}],"output":{"name":"weights","type":"number","cardinality":"0..*"}},{"name":"DetermineWeightingDates","description":"Determine
          the dates to be used for weighting observation.","inputs":[{"name":"calculationParams","type":"FloatingRateCalculationParameters","cardinality":"1..1"},{"name":"observationDates","type":"date","cardinality":"0..*"},{"name":"observationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"adjustedCalculationPeriod","type":"CalculationPeriodBase","cardinality":"1..1"},{"name":"lockoutDays","type":"int","cardinality":"1..1"}],"output":{"name":"weightingDates","type":"date","cardinality":"0..*"}},{"name":"ProcessObservations","description":"Apply
          daily observation parameters to rate observation.  These are discussed in
          the 2021 ISDA Definitions, section 7.2.3 and 7.2.4.","inputs":[{"name":"calculationParameters","type":"FloatingRateCalculationParameters","cardinality":"1..1"},{"name":"rawObservations","type":"number","cardinality":"0..*"}],"output":{"name":"processedObservations","type":"number","cardinality":"0..*"}}]'
    description: Defines the structures needed to represent the calculation parameters
      for daily averaged and compounded modular rates as defined in the 2021 ISDA
      Definitions in Section 7. This type is used to represent modular computed rates
      in interestRatePayouts.
    comments:
    - "Rosetta func: EvaluateCalculatedRate \u2014 Evaluate a calculated rate as described\
      \ in the 2021 ISDA Definitions."
    - "Rosetta func: GenerateObservationDatesAndWeights \u2014 Apply shifts to generate\
      \ the list of observation dates and weights for each of those date."
    - "Rosetta func: DetermineObservationPeriod \u2014 Determine any applicable offsets/shifts\
      \ for the period for observing an index, and then generate the date range to\
      \ be used for observing the index, based on the calculation period, plus any\
      \ applicable offsets/shift."
    - "Rosetta func: GenerateWeightings \u2014 Determine the weighting dates and the\
      \ corresponding weights to be used for weighting observation."
    - "Rosetta func: DetermineWeightingDates \u2014 Determine the dates to be used\
      \ for weighting observation."
    - "Rosetta func: ProcessObservations \u2014 Apply daily observation parameters\
      \ to rate observation.  These are discussed in the 2021 ISDA Definitions, section\
      \ 7.2.3 and 7.2.4."
    in_subset:
    - cdm_observable_asset_calculatedrate
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    exact_mappings:
    - common_domain_model:FloatingRateCalculationParameters
    slots:
    - FloatingRateCalculationParameters_calculationMethod
    - observationShiftCalculation
    - lookbackCalculation
    - lockoutCalculation
    - applicableBusinessDays
    - observationParameters
    slot_usage:
      calculationMethod:
        name: calculationMethod
        description: calculation type (averaging or compounding).
        range: CalculationMethodEnum
    class_uri: common_domain_model:FloatingRateCalculationParameters
  FallbackRateParameters:
