  CollateralValuationTreatment:
    name: CollateralValuationTreatment
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralValuationTreatment
    description: Specification of the valuation treatment for the specified collateral.
    comments:
    - "Rosetta condition: HaircutPercentage \u2014 if haircutPercentage exists then\
      \ haircutPercentage >= 0 and haircutPercentage < 1"
    - "Rosetta condition: MarginPercentage \u2014 if marginPercentage exists then\
