    - fpml_5_10:AssetDeliveryProfileBlock.endTime
    slot_uri: common_domain_model:endTime
    owner: AssetDeliveryProfileBlock
    domain_of:
    - AssetDeliveryProfileBlock
    range: time
  generalTerms:
    name: generalTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/generalTerms
    description: The specification of the non-monetary terms for the Credit Derivative
      Transaction, including the buyer and seller and selected items from the ISDA
      2014 Credit Definition article II, such as the reference obligation and related
      terms.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:generalTerms
    owner: CreditDefaultPayout
    domain_of:
    - CreditDefaultPayout
    range: GeneralTerms
    required: true
    inlined: true
    inlined_as_list: true
  protectionTerms:
    name: protectionTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/protectionTerms
    description: Specifies the terms for calculating a payout to protect the buyer
      of the swap in the case of a qualified credit event. These terms include the
      applicable credit events, the reference obligation, and in the case of a CDS
      on mortgage-backed securities, the floatingAmountEvents.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:protectionTerms
    owner: CreditDefaultPayout
    domain_of:
    - CreditDefaultPayout
    range: ProtectionTerms
    multivalued: true
    inlined: true
    inlined_as_list: true
  transactedPrice:
    name: transactedPrice
    definition_uri: https://w3id.org/lmodel/common_domain_model/transactedPrice
    description: The qualification of the price at which the contract has been transacted,
      in terms of market fixed rate, initial points, market price and/or quotation
      style. In FpML, those attributes are positioned as part of the fee leg.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:transactedPrice
    owner: CreditDefaultPayout
    domain_of:
    - CreditDefaultPayout
    range: TransactedPrice
    inlined: true
    inlined_as_list: true
  indexReferenceInformation:
    name: indexReferenceInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/indexReferenceInformation
    description: This attribute contains all the terms relevant to the underlying
      Index.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:indexReferenceInformation
    owner: GeneralTerms
    domain_of:
    - GeneralTerms
    range: CreditIndex
    inlined: true
    inlined_as_list: true
  basketReferenceInformation:
    name: basketReferenceInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/basketReferenceInformation
    description: This attribute contains all the terms relevant to defining the Credit
      Default Swap Basket.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:basketReferenceInformation
    owner: GeneralTerms
    domain_of:
    - GeneralTerms
    range: BasketReferenceInformation
    inlined: true
    inlined_as_list: true
  additionalTerm:
    name: additionalTerm
    definition_uri: https://w3id.org/lmodel/common_domain_model/additionalTerm
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: This attribute is used for representing information contained in
      the Additional Terms field of the 2003 Master Credit Derivatives confirm.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:additionalTerm
    owner: GeneralTerms
    domain_of:
    - GeneralTerms
    range: string
    multivalued: true
  modifiedEquityDelivery:
    name: modifiedEquityDelivery
    definition_uri: https://w3id.org/lmodel/common_domain_model/modifiedEquityDelivery
    description: Value of this attribute set to 'true' indicates that modified equity
      delivery is applicable.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:modifiedEquityDelivery
    owner: GeneralTerms
    domain_of:
    - GeneralTerms
    range: boolean
  rateSpecification:
    name: rateSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/rateSpecification
    description: The specification of the rate value(s) applicable to the contract
      using either a floating rate calculation, a single fixed rate, a fixed rate
      schedule, or an inflation rate calculation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:rateSpecification
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: RateSpecification
    inlined: true
    inlined_as_list: true
    any_of:
    - range: FixedRateSpecification
    - range: FloatingRateSpecification
    - range: InflationRateSpecification
  paymentDelay:
    name: paymentDelay
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentDelay
    description: Applicable to CDS on MBS to specify whether payment delays are applicable
      to the fixed Amount. RMBS typically have a payment delay of 5 days between the
      coupon date of the reference obligation and the payment date of the synthetic
      swap. CMBS do not, on the other hand, with both payment dates being on the 25th
      of each month.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:paymentDelay
    owner: SettlementDate
    domain_of:
    - InterestRatePayout
    - SettlementDate
    range: boolean
  resetDates:
    name: resetDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/resetDates
    description: The reset dates schedule, i.e. the dates on which the new observed
      index value is applied for each period and the interest rate hence begins to
      accrue.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:resetDates
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: ResetDates
    inlined: true
    inlined_as_list: true
  discountingMethod:
    name: discountingMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/discountingMethod
    description: The parameters specifying any discounting conventions that may apply.
      This element must only be included if discounting applies.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:discountingMethod
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: DiscountingMethod
    inlined: true
    inlined_as_list: true
  compoundingMethod:
    name: compoundingMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/compoundingMethod
    description: If one or more calculation period contributes to a single payment
      amount this element specifies whether compounding is applicable and, if so,
      what compounding method is to be used. This element must only be included when
      more than one calculation period contributes to a single payment amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:compoundingMethod
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: CompoundingMethodEnum
  cashflowRepresentation:
    name: cashflowRepresentation
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashflowRepresentation
    description: The cashflow representation of the swap stream.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:cashflowRepresentation
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: CashflowRepresentation
    inlined: true
    inlined_as_list: true
  stubPeriod:
    name: stubPeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/stubPeriod
    description: The stub calculation period amount parameters. This element must
      only be included if there is an initial or final stub calculation period. Even
      then, it must only be included if either the stub references a different floating
      rate tenor to the regular calculation periods, or if the stub is calculated
      as a linear interpolation of two different floating rate tenors, or if a specific
      stub rate or stub amount has been negotiated.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:stubPeriod
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: StubPeriod
    inlined: true
    inlined_as_list: true
  bondReference:
    name: bondReference
    definition_uri: https://w3id.org/lmodel/common_domain_model/bondReference
    description: Reference to a bond underlier to represent an asset swap or Condition
      Precedent Bond.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:bondReference
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: BondReference
    inlined: true
    inlined_as_list: true
  floatingAmount:
    name: floatingAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/floatingAmount
    description: Floating Amount Calculation
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:floatingAmount
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: string
  spreadCalculationMethod:
    name: spreadCalculationMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/spreadCalculationMethod
    description: 'Method by which spread is calculated. For example on an asset swap:
      ''ParPar'' or ''Proceeds'' may be the method indicated.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:spreadCalculationMethod
    owner: InterestRatePayout
    domain_of:
    - InterestRatePayout
    range: SpreadCalculationMethodEnum
  totalRatio:
    name: totalRatio
    definition_uri: https://w3id.org/lmodel/common_domain_model/totalRatio
    description: Specifies the total actual dividend payout ratio associated with
      the equity underlier. A ratio of 90% should be expressed at 0.90.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:totalRatio
    owner: DividendPayoutRatio
    domain_of:
    - DividendPayoutRatio
    range: decimal
    required: true
  cashRatio:
    name: cashRatio
    definition_uri: https://w3id.org/lmodel/common_domain_model/cashRatio
    description: Specifies the cash actual dividend payout ratio associated with the
      equity underlier. A ratio of 90% should be expressed at 0.90.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:cashRatio
    owner: DividendPayoutRatio
    domain_of:
    - DividendPayoutRatio
    range: decimal
  nonCashRatio:
    name: nonCashRatio
    definition_uri: https://w3id.org/lmodel/common_domain_model/nonCashRatio
    description: Specifies the non cash actual dividend payout ratio associated with
      the equity underlier. A ratio of 90% should be expressed at 0.90.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:nonCashRatio
    owner: DividendPayoutRatio
    domain_of:
    - DividendPayoutRatio
    range: decimal
  interestShortfallReimbursement:
    name: interestShortfallReimbursement
    definition_uri: https://w3id.org/lmodel/common_domain_model/interestShortfallReimbursement
    description: 'An additional Fixed Payment Event. Corresponds to the payment by
      or on behalf of the Issuer of an actual interest amount in respect to the reference
      obligation that is greater than the expected interest amount. ISDA 2003 Term:
      Interest Shortfall Reimbursement.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:AdditionalFixedPayments.interestShortfallReimbursement
    slot_uri: common_domain_model:interestShortfallReimbursement
    owner: AdditionalFixedPayments
    domain_of:
    - AdditionalFixedPayments
    range: boolean
  principalShortfallReimbursement:
    name: principalShortfallReimbursement
    definition_uri: https://w3id.org/lmodel/common_domain_model/principalShortfallReimbursement
    description: 'An additional Fixed Payment Event. Corresponds to the payment by
      or on behalf of the Issuer of an actual principal amount in respect to the reference
      obligation that is greater than the expected principal amount. ISDA 2003 Term:
      Principal Shortfall Reimbursement.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:AdditionalFixedPayments.principalShortfallReimbursement
    slot_uri: common_domain_model:principalShortfallReimbursement
    owner: AdditionalFixedPayments
    domain_of:
    - AdditionalFixedPayments
    range: boolean
  writedownReimbursement:
    name: writedownReimbursement
    definition_uri: https://w3id.org/lmodel/common_domain_model/writedownReimbursement
    description: 'An Additional Fixed Payment. Corresponds to the payment by or on
      behalf of the issuer of an amount in respect to the reference obligation in
      reduction of the prior writedowns. ISDA 2003 Term: Writedown Reimbursement.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:AdditionalFixedPayments.writedownReimbursement
    slot_uri: common_domain_model:writedownReimbursement
    owner: AdditionalFixedPayments
    domain_of:
    - AdditionalFixedPayments
    range: boolean
  basketName:
    name: basketName
    definition_uri: https://w3id.org/lmodel/common_domain_model/basketName
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: The name of the basket expressed as a free format string. FpML does
      not define usage rules for this element.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:BasketReferenceInformation.basketName
    slot_uri: common_domain_model:basketName
    owner: BasketReferenceInformation
    domain_of:
    - BasketReferenceInformation
    range: string
  basketId:
    name: basketId
    definition_uri: https://w3id.org/lmodel/common_domain_model/basketId
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: A CDS basket identifier.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:BasketReferenceInformation.basketId
    slot_uri: common_domain_model:basketId
    owner: BasketReferenceInformation
    domain_of:
    - BasketReferenceInformation
    range: string
    multivalued: true
  referencePool:
    name: referencePool
    definition_uri: https://w3id.org/lmodel/common_domain_model/referencePool
    description: This element contains all the reference pool items to define the
      reference entity and reference obligation(s) in the basket.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:BasketReferenceInformation.referencePool
    slot_uri: common_domain_model:referencePool
    owner: BasketReferenceInformation
    domain_of:
    - BasketReferenceInformation
    range: ReferencePool
    required: true
    inlined: true
    inlined_as_list: true
  nthToDefault:
    name: nthToDefault
    definition_uri: https://w3id.org/lmodel/common_domain_model/nthToDefault
    description: N th reference obligation to default triggers payout.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:BasketReferenceInformation.nthToDefault
    slot_uri: common_domain_model:nthToDefault
    owner: BasketReferenceInformation
    domain_of:
    - BasketReferenceInformation
    range: integer
  mthToDefault:
    name: mthToDefault
    definition_uri: https://w3id.org/lmodel/common_domain_model/mthToDefault
    description: M th reference obligation to default to allow representation of N
      th to M th defaults.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    close_mappings:
    - fpml_5_10:BasketReferenceInformation.mthToDefault
    slot_uri: common_domain_model:mthToDefault
    owner: BasketReferenceInformation
    domain_of:
    - BasketReferenceInformation
    range: integer
  interestShortfall:
    name: interestShortfall
    definition_uri: https://w3id.org/lmodel/common_domain_model/interestShortfall
    description: 'A floating rate payment event. With respect to any Reference Obligation
      Payment Date, either (a) the non-payment of an Expected Interest Amount or (b)
      the payment of an Actual Interest Amount that is less than the Expected Interest
      Amount. ISDA 2003 Term: Interest Shortfall.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:interestShortfall
    owner: FloatingAmountEvents
    domain_of:
    - FloatingAmountEvents
    range: InterestShortFall
    inlined: true
    inlined_as_list: true
  floatingAmountProvisions:
    name: floatingAmountProvisions
    definition_uri: https://w3id.org/lmodel/common_domain_model/floatingAmountProvisions
    description: Specifies the floating amount provisions associated with the floatingAmountEvents.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:floatingAmountProvisions
    owner: FloatingAmountEvents
    domain_of:
    - FloatingAmountEvents
    range: FloatingAmountProvisions
    inlined: true
    inlined_as_list: true
  additionalFixedPayments:
    name: additionalFixedPayments
    definition_uri: https://w3id.org/lmodel/common_domain_model/additionalFixedPayments
    description: Specifies the events that will give rise to the payment additional
      fixed payments.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:additionalFixedPayments
    owner: FloatingAmountEvents
    domain_of:
    - FloatingAmountEvents
    range: AdditionalFixedPayments
    inlined: true
    inlined_as_list: true
  wacCapInterestProvision:
    name: wacCapInterestProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/wacCapInterestProvision
    description: As specified by the ISDA Supplement for use with trades on mortgage-backed
      securities, 'WAC Cap' means a weighted average coupon or weighted average rate
      cap provision (however defined in the Underlying Instruments) of the Underlying
      Instruments that limits, increases or decreases the interest rate or interest
      entitlement, as set out in the Underlying Instruments on the Effective Date
      without regard to any subsequent amendment The presence of the element with
      value set to 'true' signifies that the provision is applicable. From a usage
      standpoint, this provision is typically applicable in the case of CMBS and not
      applicable in case of RMBS trades.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:wacCapInterestProvision
    owner: FloatingAmountProvisions
    domain_of:
    - FloatingAmountProvisions
    range: boolean
  stepUpProvision:
    name: stepUpProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/stepUpProvision
    description: As specified by the ISDA Standard Terms Supplement for use with trades
      on mortgage-backed securities. The presence of the element with value set to
      'true' signifies that the provision is applicable. If applicable, the applicable
      step-up terms are specified as part of that ISDA Standard Terms Supplement.
      From a usage standpoint, this provision is typically applicable in the case
      of RMBS and not applicable in case of CMBS trades.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:stepUpProvision
    owner: FloatingAmountProvisions
    domain_of:
    - FloatingAmountProvisions
    range: boolean
  interestShortfallCap:
    name: interestShortfallCap
    definition_uri: https://w3id.org/lmodel/common_domain_model/interestShortfallCap
    description: 'Specifies the nature of the interest Shortfall cap (i.e. Fixed Cap
      or Variable Cap) in the case where it is applicable. ISDA 2003 Term: Interest
      Shortfall Cap.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:interestShortfallCap
    owner: InterestShortFall
    domain_of:
    - InterestShortFall
    range: InterestShortfallCapEnum
    required: true
  compounding:
    name: compounding
    definition_uri: https://w3id.org/lmodel/common_domain_model/compounding
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:compounding
    owner: InterestShortFall
    domain_of:
    - InterestShortFall
    range: boolean
    required: true
  rateSource:
    name: rateSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/rateSource
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: The rate source in the case of a variable cap.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:rateSource
    owner: InterestShortFall
    domain_of:
    - InterestShortFall
    range: FloatingRateIndexEnum
  floatingAmountEvents:
    name: floatingAmountEvents
    definition_uri: https://w3id.org/lmodel/common_domain_model/floatingAmountEvents
    description: This element contains the ISDA terms relating to the floating rate
      payment events and the implied additional fixed payments, applicable to the
      credit derivatives transactions on mortgage-backed securities with pay-as-you-go
      or physical settlement.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:floatingAmountEvents
    owner: ProtectionTerms
    domain_of:
    - ProtectionTerms
    range: FloatingAmountEvents
    inlined: true
    inlined_as_list: true
  referenceEntity:
    name: referenceEntity
    definition_uri: https://w3id.org/lmodel/common_domain_model/referenceEntity
    description: 'The corporate or sovereign entity which is subject to the swap transaction
      and any successor that assumes all or substantially all of its contractual and
      other obligations. Reference Entities cannot be senior or subordinated. It is
      the obligations of the Reference Entities that can be senior or subordinated.
      ISDA 2014 Credit definitions article II section 2.1: `Reference Entity` means
      the entity specified as such in the related Confirmation.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:referenceEntity
    owner: ReferencePair
    domain_of:
    - ReferenceInformation
    - ReferencePair
    range: LegalEntity
    required: true
    inlined: true
    inlined_as_list: true
  referenceObligation:
    name: referenceObligation
    definition_uri: https://w3id.org/lmodel/common_domain_model/referenceObligation
    description: 'The Reference Obligation is a financial instrument that is either
      issued or guaranteed by the reference entity. It serves to clarify the precise
      reference entity protection is being offered upon, and its legal position with
      regard to other related firms (parents/subsidiaries). Furthermore the Reference
      Obligation is ALWAYS deliverable and establishes the Pari Passu ranking (as
      the deliverable bonds must rank equal to the reference obligation). ISDA 2003
      Term: Reference Obligation.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:referenceObligation
    owner: ReferencePair
    domain_of:
    - ReferenceInformation
    - ReferencePair
    range: ReferenceObligation
    multivalued: true
    inlined: true
    inlined_as_list: true
  noReferenceObligation:
    name: noReferenceObligation
    definition_uri: https://w3id.org/lmodel/common_domain_model/noReferenceObligation
    description: Used to indicate that there is no Reference Obligation associated
      with this Credit Default Swap and that there will never be one.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:noReferenceObligation
    owner: ReferencePair
    domain_of:
    - ReferenceInformation
    - ReferencePair
    range: boolean
  unknownReferenceObligation:
    name: unknownReferenceObligation
    definition_uri: https://w3id.org/lmodel/common_domain_model/unknownReferenceObligation
    description: Used to indicate that the Reference obligation associated with the
      Credit Default Swap is currently not known. This is not valid for Legal Confirmation
      purposes, but is valid for earlier stages in the trade life cycle (e.g. Broker
      Confirmation).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:unknownReferenceObligation
    owner: ReferenceInformation
    domain_of:
    - ReferenceInformation
    range: boolean
  allGuarantees:
    name: allGuarantees
    definition_uri: https://w3id.org/lmodel/common_domain_model/allGuarantees
    description: 'Indicates whether an obligation of the Reference Entity, guaranteed
      by the Reference Entity on behalf of a non-Affiliate, is to be considered an
      Obligation for the purpose of the transaction. It will be considered an obligation
      if allGuarantees is applicable (true) and not if allGuarantees is inapplicable
      (false). ISDA 2003 Term: All Guarantees.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:allGuarantees
    owner: ReferenceInformation
    domain_of:
    - ReferenceInformation
    range: boolean
  referencePrice:
    name: referencePrice
    definition_uri: https://w3id.org/lmodel/common_domain_model/referencePrice
    description: 'Used to determine (a) for physically settled trades, the Physical
