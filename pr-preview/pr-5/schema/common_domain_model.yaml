  NotificationTimeElection:
    name: NotificationTimeElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/NotificationTimeElection
    description: A class to specify the notification time election by the respective
      parties to the agreement.
    notes:
    - ISDA CSD_IM_English_2016 paragraph "13 General Principles" clause "(d)(iii)"
      name "Notification Time"
    - ISDA CSA_IM_Japanese_2016 paragraph "13 General Principles" clause "(e)(iii)"
      name "Notification Time"
    - ISDA CSA_IM_NewYork_2016 paragraph "13 General Principles" clause "(d)(iii)"
      name "Notification Time"
    comments:
    - "Rosetta condition: NotificationTimeElectionChoice \u2014 required choice notificationTime,\
      \ customNotification"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSD_IM_English_2016
    - isda:CSA_IM_Japanese_2016
    - isda:CSA_IM_NewYork_2016
    exact_mappings:
    - common_domain_model:NotificationTimeElection
    slots:
    - NotificationTimeElection_party
    - NotificationTimeElection_notificationTime
    - customNotification
    - localBusinessDay
