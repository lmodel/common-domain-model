    in_subset:
    - cdm_legaldocumentation_master
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
    exact_mappings:
    - common_domain_model:MasterAgreementElections
    class_uri: common_domain_model:MasterAgreementElections
  GlobalMasterRepoAgreement:
    name: GlobalMasterRepoAgreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/GlobalMasterRepoAgreement
    description: The set of elections that define a GMRA
    in_subset:
    - cdm_legaldocumentation_master_icma
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_icma
    exact_mappings:
    - common_domain_model:GlobalMasterRepoAgreement
    is_a: MasterAgreementBase
    class_uri: common_domain_model:GlobalMasterRepoAgreement
  MasterAgreement:
    name: MasterAgreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreement
    description: The set of elections that define an ISDA Master Agreement.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:MasterAgreement
    narrow_mappings:
    - gist:Agreement
    is_a: MasterAgreementBase
    slots:
    - automaticEarlyTermination
    - terminationCurrency
    - addressForNotices
    - nonContractualObligations
    - MasterAgreement_creditSupportDocument
    - MasterAgreement_creditSupportProvider
    - specifiedEntities
    slot_usage:
      creditSupportDocument:
        name: creditSupportDocument
        description: Identification of party specific Credit Support Documents applicable
          to the document.
        range: CreditSupportDocument
        required: true
        multivalued: false
      creditSupportProvider:
        name: creditSupportProvider
        description: Identification of party specific Credit Support Providers applicable
          to the document.
        range: CreditSupportProvider
        required: true
        multivalued: false
    class_uri: common_domain_model:MasterAgreement
  AutomaticEarlyTermination:
    name: AutomaticEarlyTermination
    definition_uri: https://w3id.org/lmodel/common_domain_model/AutomaticEarlyTermination
    description: A class to specify the Automatic Early Termination provision applicable
      to a Master Agreement.
    notes:
    - ISDA ISDA_MA_1998 section "6(a)"
    - ISDA ISDA_MA_2002 section "6(a)"
    comments:
    - "Rosetta condition: FallbackAET \u2014 if fallbackAET = True then partyElection\
      \ -> isApplicable all = False"
    - "Rosetta condition: Indemnity \u2014 if fallbackAET = False and partyElection\
      \ -> isApplicable all = False then indemnity = False"
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    see_also:
    - isda:ISDA_MA_1998
    - isda:ISDA_MA_2002
    exact_mappings:
    - common_domain_model:AutomaticEarlyTermination
    close_mappings:
    - fpml_5_10:AutomaticEarlyTermination
    slots:
    - fallbackAET
    - indemnity
    - AutomaticEarlyTermination_partyElection
    slot_usage:
      partyElection:
        name: partyElection
        description: The party election specific to the Automatic Early Termination
          Clause.
        range: AutomaticEarlyTerminationElection
        required: false
    class_uri: common_domain_model:AutomaticEarlyTermination
  AutomaticEarlyTerminationElection:
    name: AutomaticEarlyTerminationElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/AutomaticEarlyTerminationElection
    description: A class to specify the party elections specific to the Automatic
      Early Termination Clause.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:AutomaticEarlyTerminationElection
    close_mappings:
    - fpml_5_10:AutomaticEarlyTerminationElection
    slots:
    - AutomaticEarlyTerminationElection_party
    - AutomaticEarlyTerminationElection_isApplicable
    slot_usage:
      party:
        name: party
        description: The party for which the Automatic Early Termination provisions
          are being specified.
        range: Party
        required: true
      isApplicable:
        name: isApplicable
        description: A boolean election to specify whether the Automatic Early Termination
          provisions of Section 6(a) are applicable (True) or not applicable (False).
    class_uri: common_domain_model:AutomaticEarlyTerminationElection
  TerminationCurrency:
    name: TerminationCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/TerminationCurrency
    description: Specifies how the Termination Currency for the agreement will be
      determined.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:TerminationCurrency
    slots:
    - statedTerminationCurrency
    - partyOptionTerminationCurrency
    class_uri: common_domain_model:TerminationCurrency
  TerminationCurrencySelection:
    name: TerminationCurrencySelection
    definition_uri: https://w3id.org/lmodel/common_domain_model/TerminationCurrencySelection
    description: Specifies Termination Currency where a currency is stated at the
      time the agreement is entered into.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:TerminationCurrencySelection
    slots:
    - statedCurrency
    - fallbackCurrency
    - TerminationCurrencySelection_partyElection
    - bothAffected
    slot_usage:
      partyElection:
        name: partyElection
        description: Specifies different termination currencies to apply depending
          on which party or parties are the Defaulting Party Affected Party(ies).
        range: PartyTerminationCurrencySelection
        required: false
    class_uri: common_domain_model:TerminationCurrencySelection
  PartyOptionTerminationCurrency:
    name: PartyOptionTerminationCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyOptionTerminationCurrency
    description: Specifies mechanism for Termination currency to be selected by the
      Non-defaulting Party/party which is not the Affected Party.
    comments:
    - "Rosetta condition: TerminationCurrencyCondition \u2014 if terminationCurrencyCondition\
      \ = TerminationCurrencyConditionEnum -> Specified then terminationCurrencySpecifiedCondition\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:PartyOptionTerminationCurrency
    slots:
    - bothAffectedTermCurrencyOption
    - terminationCurrencySpecifiedCondition
    - terminationCurrencyCondition
    class_uri: common_domain_model:PartyOptionTerminationCurrency
    rules:
    - preconditions:
        slot_conditions:
          terminationCurrencyCondition:
            name: terminationCurrencyCondition
            equals_string: Specified
      postconditions:
        slot_conditions:
          terminationCurrencySpecifiedCondition:
            name: terminationCurrencySpecifiedCondition
            required: true
      description: A validation rule to ensure that Termination Currency alternative
        conditions are specified when required.
  PartyTerminationCurrencySelection:
    name: PartyTerminationCurrencySelection
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyTerminationCurrencySelection
    description: Specifies the termination currency to be used by a party when it
      is the Non-Defaulting Party or the Party which is not the Affected Party.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:PartyTerminationCurrencySelection
    slots:
    - PartyTerminationCurrencySelection_party
    - statedPartyCurrency
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: Party
        required: true
    class_uri: common_domain_model:PartyTerminationCurrencySelection
  SpecifiedEntities:
    name: SpecifiedEntities
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpecifiedEntities
    description: A provision that allows each party to specify its Specified Entities
      for certain Events of Default and Termination Events.
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:SpecifiedEntities
    slots:
    - specifiedEntityClause
    - specifiedEntity
    class_uri: common_domain_model:SpecifiedEntities
  SpecifiedEntity:
    name: SpecifiedEntity
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpecifiedEntity
    description: The party specific election of Specified Entities for the Event of
      Default or Termination Event specified.
    comments:
    - "Rosetta condition: SpecifiedEntity \u2014 if specifiedEntityTerms = SpecifiedEntityTermsEnum\
      \ -> NamedSpecifiedEntity then specifiedEntity exists"
    - "Rosetta condition: MaterialSubsidiary \u2014 if specifiedEntityTerms = SpecifiedEntityTermsEnum\
      \ -> MaterialSubsidiary then materialSubsidiaryTerms exists"
    - "Rosetta condition: OtherSpecifiedEntity \u2014 if specifiedEntityTerms = SpecifiedEntityTermsEnum\
      \ -> OtherSpecifiedEntity then otherSpecifiedEntityTerms exists"
    in_subset:
    - cdm_legaldocumentation_master_isda
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isda
    exact_mappings:
    - common_domain_model:SpecifiedEntity
    slots:
    - SpecifiedEntity_party
    - specifiedEntityTerms
    - SpecifiedEntity_specifiedEntity
    - materialSubsidiaryTerms
    - otherSpecifiedEntityTerms
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: Party
        required: true
      specifiedEntity:
        name: specifiedEntity
        description: The specified entities for the Event of Default or Termination
          Event specified.
        range: LegalEntity
        required: false
    class_uri: common_domain_model:SpecifiedEntity
    rules:
    - preconditions:
        slot_conditions:
          specifiedEntityTerms:
            name: specifiedEntityTerms
            equals_string: NamedSpecifiedEntity
      postconditions:
        slot_conditions:
          specifiedEntity:
            name: specifiedEntity
            required: true
      description: A validation rule to ensure that a SpecifiedEntity is specified
        when required.
    - preconditions:
        slot_conditions:
          specifiedEntityTerms:
            name: specifiedEntityTerms
            equals_string: MaterialSubsidiary
      postconditions:
        slot_conditions:
          materialSubsidiaryTerms:
            name: materialSubsidiaryTerms
            required: true
      description: A validation rule to ensure that Material Subsidiary terms are
        specified when required.
    - preconditions:
        slot_conditions:
          specifiedEntityTerms:
            name: specifiedEntityTerms
            equals_string: OtherSpecifiedEntity
      postconditions:
        slot_conditions:
          otherSpecifiedEntityTerms:
            name: otherSpecifiedEntityTerms
            required: true
      description: A validation rule to ensure that non standard Specified Entity
        terms are provided when required.
  GlobalMasterSecuritiesLendingAgreement:
    name: GlobalMasterSecuritiesLendingAgreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/GlobalMasterSecuritiesLendingAgreement
    description: The set of elections that define a GMSLA.
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:GlobalMasterSecuritiesLendingAgreement
    is_a: MasterAgreementBase
    slots:
    - GlobalMasterSecuritiesLendingAgreement_collateral
    - GlobalMasterSecuritiesLendingAgreement_baseCurrency
    - eventsOfDefault
    slot_usage:
      collateral:
        name: collateral
        description: The definitions regarding collateral relating to the GMSLA.
        range: CollateralSpecification
        required: true
      baseCurrency:
        name: baseCurrency
        description: The definitions regarding base currency determinations relating
          to the GMSLA.
        range: BaseCurrency
    class_uri: common_domain_model:GlobalMasterSecuritiesLendingAgreement
  CollateralSpecification:
    name: CollateralSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralSpecification
    description: The definitions regarding collateral relating to the GMSLA.
    comments:
    - "Rosetta condition: StandardMarketCondition \u2014 if standardDefinitionOfMarketValueUsed\
      \ <> True then definitionOfMarketValueNonStandard exists"
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:CollateralSpecification
    close_mappings:
    - fpml_5_10:CollateralSpecification
    slots:
    - standardDefinitionOfMarketValueUsed
    - definitionOfMarketValueNonStandard
    - aggregation
    - nettingObligationsApply
    - failureToDevliverIndemnityApplies
    - CollateralSpecification_notificationTime
    slot_usage:
      notificationTime:
        name: notificationTime
        description: What is the notification time of the GMSLA?
        range: BusinessCenterTime
    class_uri: common_domain_model:CollateralSpecification
    rules:
    - preconditions:
        slot_conditions:
          standardDefinitionOfMarketValueUsed:
            name: standardDefinitionOfMarketValueUsed
            none_of:
            - equals_string_in:
              - 'True'
      postconditions:
        slot_conditions:
          definitionOfMarketValueNonStandard:
            name: definitionOfMarketValueNonStandard
            required: true
      description: A validation rule to ensure that if the standard definition of
        market value is not used, then the definition is provided.
      comments:
      - 'Rosetta negation: standardDefinitionOfMarketValueUsed <> True'
  BaseCurrency:
    name: BaseCurrency
    definition_uri: https://w3id.org/lmodel/common_domain_model/BaseCurrency
    description: The definitions regarding base currency determinations relating to
      the GMSLA.
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:BaseCurrency
    close_mappings:
    - fpml_5_10:BaseCurrency
    slots:
    - BaseCurrency_baseCurrency
    - baseCurrencyMustBeFreelyConvertible
    - baseCurrencyIfOriginalNotFreelyConvertible
    slot_usage:
      baseCurrency:
        name: baseCurrency
        description: The base currency as defined in the GMSLA.
        range: CurrencyCodeEnum
    class_uri: common_domain_model:BaseCurrency
  EventsOfDefaultElection:
    name: EventsOfDefaultElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventsOfDefaultElection
    description: The specific party elections for events of default.
    comments:
    - "Rosetta condition: AutomaticEarlyTerminationMustBeApplicable \u2014 if automaticEarlyTerminationInModifiedForm\
      \ or automaticEarlyTerminationSpecifiedSeparatelyForEachPrinciple then automaticEarlyTerminationApplies\
      \ = Applicable"
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:EventsOfDefaultElection
    slots:
    - EventsOfDefaultElection_party
    - automaticEarlyTerminationApplies
    - existingLoans
    - automation
    - automaticEarlyTerminationSpecifiedSeparatelyForEachPrinciple
    - automaticEarlyTerminationRequiredDueToSystemOfLaw
    - automaticEarlyTerminationInModifiedForm
    - automaticEarlyTerminationOther
    slot_usage:
      party:
        name: party
        description: The specified party.
        range: CounterpartyRoleEnum
        required: true
    class_uri: common_domain_model:EventsOfDefaultElection
  EventsOfDefault:
    name: EventsOfDefault
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventsOfDefault
    description: The definitions regarding any different events of default relating
      to the GMSLA.
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:EventsOfDefault
    slots:
    - EventsOfDefault_partyElection
    slot_usage:
      partyElection:
        name: partyElection
        description: The specified events of default elections for the respective
          parties signing the GMSLA.
        range: EventsOfDefaultElection
    class_uri: common_domain_model:EventsOfDefault
  Aggregation:
    name: Aggregation
    definition_uri: https://w3id.org/lmodel/common_domain_model/Aggregation
    description: The definitions for whether aggregation applies to the GMSLA, and
      if so how it applies.
    in_subset:
    - cdm_legaldocumentation_master_isla
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    exact_mappings:
    - common_domain_model:Aggregation
    close_mappings:
    - fpml_5_10:Aggregation
    slots:
    - aggregationType
    - loansCanBeGrouped
    - otherDetails
    class_uri: common_domain_model:Aggregation
  TransactionAdditionalTerms:
    name: TransactionAdditionalTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransactionAdditionalTerms
    description: Additional specification for the extraordinary events that may affect
      a trade and the related contractual rights and obligation of the parties when
      this happens. Such terms are typically required to extend the economics terms,
      for the purpose of producing the final legal contractual form of the Transaction.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:TransactionAdditionalTerms
    slots:
    - equityAdditionalTerms
    - foreignExchangeAdditionalTerms
    - commoditiesAdditionalTerms
    - creditAdditionalTerms
    - interestRateAdditionalTerms
    - digitalAssetAdditionalTerms
    class_uri: common_domain_model:TransactionAdditionalTerms
  EquityAdditionalTerms:
    name: EquityAdditionalTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/EquityAdditionalTerms
    description: Transaction AdditionalTerms that apply to Equity asset class.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:EquityAdditionalTerms
    slots:
    - extraordinaryEvents
    - determinationTerms
    - substitutionProvision
    class_uri: common_domain_model:EquityAdditionalTerms
  UnderlierSubstitutionProvision:
    name: UnderlierSubstitutionProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/UnderlierSubstitutionProvision
    description: Where parties describe any substitution terms.
    comments:
    - "Rosetta condition: DisputingPartyCannotHaveOriginalRole \u2014 whoMaySubstitute\
      \ all <> disputingParty"
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:UnderlierSubstitutionProvision
    slots:
    - whoMaySubstitute
    - substitutionBeSpokeTerms
    - substitutionTriggerEvents
    - disputingParty
    class_uri: common_domain_model:UnderlierSubstitutionProvision
  ExtraordinaryEvents:
    name: ExtraordinaryEvents
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExtraordinaryEvents
    description: Where the underlying is shares, defines market events affecting the
      issuer of those shares that may require the terms of the transaction to be adjusted.
    notes:
    - ISDA SecurityEquitySwapConfirmation_2018
    - ISDA EquityDerivativesDefinitions_2002
    comments:
    - "Rosetta condition: ExtraordinaryEventsChoice \u2014 required choice additionalDisruptionEvents,\
      \ failureToDeliver"
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    see_also:
    - isda:SecurityEquitySwapConfirmation_2018
    - isda:EquityDerivativesDefinitions_2002
    exact_mappings:
    - common_domain_model:ExtraordinaryEvents
    slots:
    - ExtraordinaryEvents_additionalBespokeTerms
    - mergerEvents
    - tenderOfferEvents
    - compositionOfCombinedConsideration
    - indexAdjustmentEvents
    - additionalDisruptionEvents
    - failureToDeliver
    - representations
    - nationalizationOrInsolvency
    - delisting
    slot_usage:
      additionalBespokeTerms:
        name: additionalBespokeTerms
        description: Where parties may optionnaly describe any extra bespoke agreements,
          in regards of the standardized Extraordinary Events.
        range: Clause
        multivalued: true
    class_uri: common_domain_model:ExtraordinaryEvents
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            additionalDisruptionEvents:
              name: additionalDisruptionEvents
              required: true
        - slot_conditions:
            failureToDeliver:
              name: failureToDeliver
              required: true
      description: condition to represent an FpML choice construct.
  AdditionalDisruptionEvents:
    name: AdditionalDisruptionEvents
    definition_uri: https://w3id.org/lmodel/common_domain_model/AdditionalDisruptionEvents
    description: A type for defining the Additional Disruption Events.
    notes:
    - ISDA EquityDerivativesDefinitions_2002
    comments:
    - "Rosetta condition: MaximumStockLoanRate \u2014 if maximumStockLoanRate exists\
      \ then maximumStockLoanRate >= 0 and maximumStockLoanRate <= 1"
    - "Rosetta condition: InitialStockLoanRate \u2014 if initialStockLoanRate exists\
      \ then initialStockLoanRate >= 0 and initialStockLoanRate <= 1"
    - "Rosetta condition: DisruptionEventsDeterminingParty \u2014 if determiningParty\
      \ exists then determiningParty = AncillaryRoleEnum -> DisruptionEventsDeterminingParty"
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    see_also:
    - isda:EquityDerivativesDefinitions_2002
    exact_mappings:
    - common_domain_model:AdditionalDisruptionEvents
    close_mappings:
    - fpml_5_10:AdditionalDisruptionEvents
    slots:
    - changeInLaw
    - failureToDeliver
    - insolvencyFiling
    - hedgingDisruption
    - increasedCostOfHedging
    - foreignOwnershipEvent
    - lossOfStockBorrow
    - maximumStockLoanRate
    - increasedCostOfStockBorrow
    - initialStockLoanRate
    - determiningParty
    - AdditionalDisruptionEvents_additionalBespokeTerms
    slot_usage:
      additionalBespokeTerms:
        name: additionalBespokeTerms
        description: Where parties may optionnaly describe any extra bespoke agreements,
          in regards of the standardized Extraordinary Events.
        range: Clause
        multivalued: true
    class_uri: common_domain_model:AdditionalDisruptionEvents
    rules:
    - preconditions:
        slot_conditions:
          maximumStockLoanRate:
            name: maximumStockLoanRate
            required: true
      postconditions:
        slot_conditions:
          maximumStockLoanRate:
            name: maximumStockLoanRate
            minimum_value: 0
            maximum_value: 1
      description: ' FpML specifies the maximumStockLoanRate as a RestrictedPercentage,
        meaning that its value is comprised between 0 and 1.'
    - preconditions:
        slot_conditions:
          initialStockLoanRate:
            name: initialStockLoanRate
            required: true
      postconditions:
        slot_conditions:
          initialStockLoanRate:
            name: initialStockLoanRate
            minimum_value: 0
            maximum_value: 1
      description: ' FpML specifies the initialStockLoanRate as a RestrictedPercentage,
        meaning that its value is comprised between 0 and 1.'
  Clause:
    name: Clause
    definition_uri: https://w3id.org/lmodel/common_domain_model/Clause
    description: A type for documenting additional clause that cannot yet be represented
      with the model and yet needed for a digital representation of the agreement.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:Clause
    close_mappings:
    - fpml_5_10:Clause
    slots:
    - Clause_identifier
    - terms
    - subcomponents
    slot_usage:
      identifier:
        name: identifier
        description: The  name or identifier associated to this clause.
        range: string
        required: false
        multivalued: false
    class_uri: common_domain_model:Clause
  MasterConfirmationBase:
    name: MasterConfirmationBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterConfirmationBase
    description: Legal agreement specification for General Terms and Elections that
      are applicable across multiple confirmations and are referenced by these confirmations.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:MasterConfirmationBase
    class_uri: common_domain_model:MasterConfirmationBase
  BrokerConfirmation:
    name: BrokerConfirmation
    definition_uri: https://w3id.org/lmodel/common_domain_model/BrokerConfirmation
    description: Identifies the market sector in which the trade has been arranged.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
    - common_domain_model:BrokerConfirmation
    slots:
    - BrokerConfirmation_brokerConfirmationType
    slot_usage:
      brokerConfirmationType:
        name: brokerConfirmationType
        description: The type of broker confirmation executed between the parties.
        required: true
    class_uri: common_domain_model:BrokerConfirmation
  EquitySwapMasterConfirmation2018:
    name: EquitySwapMasterConfirmation2018
    definition_uri: https://w3id.org/lmodel/common_domain_model/EquitySwapMasterConfirmation2018
    description: Specification for the General Terms and Relationship Supplement Elections
      as provided in the 2018 ISDA CDM Equity Confirmation for Security Equity Swap.
    in_subset:
    - cdm_legaldocumentation_transaction
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_transaction
    exact_mappings:
