    definition_uri: https://w3id.org/lmodel/common_domain_model/calculationStyle
    description: Indicates the style of how the inflation index calculates the payment
      (e.g. YearOnYear, ZeroCoupon).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:calculationStyle
    owner: InflationRateSpecification
    domain_of:
    - InflationRateSpecification
    range: InflationCalculationStyleEnum
  finalPrincipalExchangeCalculation:
    name: finalPrincipalExchangeCalculation
    definition_uri: https://w3id.org/lmodel/common_domain_model/finalPrincipalExchangeCalculation
    description: To be specified only for products that embed a redemption payment.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:finalPrincipalExchangeCalculation
    owner: InflationRateSpecification
    domain_of:
    - InflationRateSpecification
