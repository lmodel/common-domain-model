            required: true
      description: If no Day valuation methodology is defined, additional language
        must be specified.
  FinalReturns:
    name: FinalReturns
    definition_uri: https://w3id.org/lmodel/common_domain_model/FinalReturns
    description: A clause providing that final return collateral is to be provided
      without consideration of any Minimum Transfer Amount and collateral haircut.
    comments:
    - "Rosetta condition: AdditionalLanguage \u2014 if applicable then additionalLanguage\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:FinalReturns
    slots:
    - FinalReturns_applicable
    - FinalReturns_additionalLanguage
    slot_usage:
      applicable:
        name: applicable
        description: Defines if the clause is applicable to this agreement or any
          other exceptions.
        required: false
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:FinalReturns
    rules:
    - preconditions:
        slot_conditions:
          applicable:
            name: applicable
            equals_string: 'True'
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: The additional language should be qualified only if the clause
        is specified as applicable.
  CSAValuationDate:
    name: CSAValuationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/CSAValuationDate
    description: Specifies the date on which the value of collateral or exposure are
      calculated in accordance with the agreement.
    comments:
    - "Rosetta condition: CalendarDay \u2014 if date = ValuationDateDateEnum -> CalendarDay\
      \ then calendarDay exists else calendarDay is absent"
    - "Rosetta condition: AdditionalLanguage \u2014 if date is absent or frequency\
      \ is absent then additionalLanguage exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CSAValuationDate
    close_mappings:
    - fpml_5_10:CSAValuationDate
    slots:
    - CSAValuationDate_date
    - CSAValuationDate_day
    - calendarDay
    - CSAValuationDate_frequency
    - CSAValuationDate_additionalLanguage
    slot_usage:
      date:
        name: date
        description: Defines whether a date is defined by a certain day of the week
          or a particular date in the month. If not specified here, then additional
          language must be used.
        range: ValuationDateDateEnum
        required: false
        multivalued: false
      day:
        name: day
        description: Specific day(s) or day of the week, if any, specified for Valuation
          Time.
        range: ValuationDateDayEnum
      frequency:
        name: frequency
        description: Defines the regularity of the date specified for the Valuation
          Date.
        range: ValuationDateFrequencyEnum
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:CSAValuationDate
    rules:
    - preconditions:
        slot_conditions:
          date:
            name: date
            equals_string: CalendarDay
      postconditions:
        slot_conditions:
          calendarDay:
            name: calendarDay
            required: true
      description: If a specific calendar day is specified, it must be defined.
    - preconditions:
        any_of:
        - slot_conditions:
            date:
              name: date
              required: false
        - slot_conditions:
            frequency:
              name: frequency
              required: false
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: If no methodology is defined, additional language must be specified.
  ValuationAgent:
    name: ValuationAgent
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationAgent
    description: Details of the party valuating the collateral to be delivered or
      returned.
    comments:
    - "Rosetta condition: AdditionalLanguage \u2014 if party is absent then additionalLanguage\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ValuationAgent
    slots:
    - ValuationAgent_party
    - ValuationAgent_valuationAgent
    - ValuationAgent_additionalLanguage
    slot_usage:
      party:
        name: party
        description: Specification of which party calculating the value of collateral
          to be delivered or returned.
        range: CalculationValuationAgentPartyEnum
      valuationAgent:
        name: valuationAgent
        description: Specifies how the Valuation Agent is determined.
        range: ValuationAgentDeterminationEnum
        required: false
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:ValuationAgent
    rules:
    - preconditions:
        slot_conditions:
          party:
            name: party
            required: false
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: If no party is defined, additional language must be used to specify
        the elective party.
  ExposureScope:
    name: ExposureScope
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExposureScope
    description: Optionally, for each party, specifies the amendments to the included
      coverage in the calculation of Exposure.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ExposureScope
    slots:
    - ExposureScope_partyElection
    slot_usage:
      partyElection:
        name: partyElection
        description: Defines the electice scope for a specific party.
        range: LegacyExposureScopeElection
        required: false
    class_uri: common_domain_model:ExposureScope
  LegacyExposureScopeElection:
    name: LegacyExposureScopeElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyExposureScopeElection
    description: Specification of amendments to the calculation of Exposure in terms
      of the Transactions and Products covered.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:LegacyExposureScopeElection
    slots:
    - LegacyExposureScopeElection_party
    - excludedTransactions
    - excludedProducts
    - LegacyExposureScopeElection_additionalLanguage
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: CounterpartyRoleEnum
        required: true
      additionalLanguage:
        name: additionalLanguage
        description: The bespoke/additional language that might be specified by the
          parties to the legal agreement.
    class_uri: common_domain_model:LegacyExposureScopeElection
  ExcludedProducts:
    name: ExcludedProducts
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExcludedProducts
    description: Description of the relevant derivative transactions excluded from
      the calculation of exposure.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ExcludedProducts
    slots:
    - ExcludedProducts_product
    - branch
    - ExcludedProducts_excluded
    slot_usage:
      product:
        name: product
        description: Description of the relevant derivative transactions excluded
          from the calculation of exposure.
        range: ExposureScopeProductEnum
        required: false
        multivalued: true
      excluded:
        name: excluded
        description: A flag to indicate whether transactions entered into by a specific
          branch with respect to the relevant party are excluded; set to True if excluded,
          false if included.
        range: boolean
        required: true
    class_uri: common_domain_model:ExcludedProducts
  CreditSupportAmount:
    name: CreditSupportAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportAmount
    description: 'The total amount one counterparty must deliver to the other at any
      time: the combination of the Exposure to that party and the net Independent
      Amounts it must post, minus any agreed Threshold.'
    comments:
    - "Rosetta condition: AdditionalLanguage \u2014 if creditSupportAmount = CreditSupportAmountEnum\
      \ -> NonStandardOther then additionalLanguage exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportAmount
    slots:
    - CreditSupportAmount_creditSupportAmount
    - CreditSupportAmount_additionalLanguage
    slot_usage:
      creditSupportAmount:
        name: creditSupportAmount
        description: Specifies whether the meaning of credit support amount follows
          the pre-print definition or deviates from the standard (either based on
          a rating or some other methodology).
        range: CreditSupportAmountEnum
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:CreditSupportAmount
    rules:
    - preconditions:
        slot_conditions:
          creditSupportAmount:
            name: creditSupportAmount
            equals_string: NonStandardOther
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: If a Non Standard Other definition is defined, additional language
        must be specified.
  LegacyResolutionAlternative:
    name: LegacyResolutionAlternative
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyResolutionAlternative
    description: Alternative procedures to those in the pre-print for resolving collateral
      related disputes.
    comments:
    - "Rosetta condition: AdditionalLanguage \u2014 if resolutionAlternative is absent\
      \ then additionalLanguage exists"
    - "Rosetta condition: SplitDifferenceAmount \u2014 if resolutionAlternative =\
      \ LegacyResolutionAlternativeEnum -> SplitDifference then amount exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:LegacyResolutionAlternative
    slots:
    - resolutionAlternative
    - LegacyResolutionAlternative_amount
    - LegacyResolutionAlternative_additionalLanguage
    slot_usage:
      amount:
        name: amount
        description: The maximum amount to which the difference between the calculations
          by the valuation agent and disputing party can be split, where Split the
          Difference is elected.
        required: false
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:LegacyResolutionAlternative
    rules:
    - preconditions:
        slot_conditions:
          resolutionAlternative:
            name: resolutionAlternative
            required: false
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: If no resolution alternative procedure is defined, additional language
        must be specified.
    - preconditions:
        slot_conditions:
          resolutionAlternative:
            name: resolutionAlternative
            equals_string: SplitDifference
      postconditions:
        slot_conditions:
          amount:
            name: amount
            required: true
      description: If the resolution is to split the difference, then the amount concerned
        should be specified.
  ResolutionValue:
    name: ResolutionValue
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResolutionValue
    description: Methodology for resolving disputes in respect of the determination
      of the value of collateral.
    comments:
    - "Rosetta condition: OtherValues \u2014 if cash = ValueCashEnum -> Other or securities\
      \ = ValueSecuritiesEnum -> Other then additionalLanguage exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:ResolutionValue
    slots:
    - cash
    - securities
    - fallback
    - ResolutionValue_additionalLanguage
    slot_usage:
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:ResolutionValue
  CollateralTransferTiming:
    name: CollateralTransferTiming
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralTransferTiming
    description: Specification of transfer / settlement timing for cash and securities
      collateral assuming that the notice is provided before the Notification Time
      (and with a 1LBD lag introduced if the notice is delivered after the Notification
      Time), and that securities allow for a further Local Business Day for transfer
      / settlement.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CollateralTransferTiming
    close_mappings:
    - fpml_5_10:CollateralTransferTiming
    slots:
    - transferSettlementTiming
    - collateralTransferTimingDefinition
    class_uri: common_domain_model:CollateralTransferTiming
  TransferSettlementTiming:
    name: TransferSettlementTiming
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferSettlementTiming
    description: Specification of transfer / settlement timing for cash and securities
      collateral assuming that the notice is provided before the Notification Time
      (and with a 1LBD lag introduced if the notice is delivered after the Notification
      Time), and that securities allow for a further Local Business Day for transfer
      / settlement.
    comments:
    - "Rosetta condition: OtherValues \u2014 if cashCollateralTransferSettlementTime\
      \ = CashCTSTimeEnum -> Other or securititesCollateralTransferSettlementTime\
      \ = SecuritiesCTSTimeEnum -> Other then additionalLanguage exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:TransferSettlementTiming
    slots:
    - cashCollateralTransferSettlementTime
    - securititesCollateralTransferSettlementTime
    - TransferSettlementTiming_additionalLanguage
    slot_usage:
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:TransferSettlementTiming
  CollateralTransferTimingDefinition:
    name: CollateralTransferTimingDefinition
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralTransferTimingDefinition
    description: Bespoke language removing the pre-print requirement to transfer legal
      title of securities collateral through written instructions to the relevant
      depository institution or other securities intermediaries solely for the purposes
      of the 1994 New York Law Credit Support Annex.
    comments:
    - "Rosetta condition: ApplicableLanguage \u2014 if isApplicable = False then additionalLanguage\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CollateralTransferTimingDefinition
    close_mappings:
    - fpml_5_10:CollateralTransferTimingDefinition
    slots:
    - CollateralTransferTimingDefinition_isApplicable
    - CollateralTransferTimingDefinition_additionalLanguage
    slot_usage:
      isApplicable:
        name: isApplicable
        description: A boolean flag to represent bespoke amendment to the pre-print
          definition of Transfer.
        required: false
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:CollateralTransferTimingDefinition
    rules:
    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'False'
      postconditions:
        slot_conditions:
          additionalLanguage:
            name: additionalLanguage
            required: true
      description: Additional language is required when a bespoke amendment is used.
  CollateralValueMethod:
    name: CollateralValueMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralValueMethod
    description: Details how particular types of collateral are valued (other than
      in respect of a default).
    comments:
    - "Rosetta condition: OtherValues \u2014 if cashCollateral = ValueCashEnum ->\
      \ Other or securitiesCollateral = ValueSecuritiesEnum -> Other then additionalLanguage\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CollateralValueMethod
    close_mappings:
    - fpml_5_10:CollateralValueMethod
    slots:
    - cashCollateral
    - securitiesCollateral
    - CollateralValueMethod_additionalLanguage
    slot_usage:
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:CollateralValueMethod
  CreditSupportDocument:
    name: CreditSupportDocument
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportDocument
    description: Identification of party specific Credit Support Documents applicable
      to the document.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportDocument
    slots:
    - creditSupportDocumentElection
    class_uri: common_domain_model:CreditSupportDocument
  CreditSupportDocumentElection:
    name: CreditSupportDocumentElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportDocumentElection
    description: The party election of Credit Support Provider(s), if any.
    comments:
    - "Rosetta condition: CreditSupportDocument \u2014 if creditSupportDocumentTerms\
      \ = CreditSupportDocumentTermsEnum -> Specified then (creditSupportDocument\
      \ exists and creditSupportDocumentTypes is absent) or (creditSupportDocument\
      \ is absent and creditSupportDocumentTypes exists)"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportDocumentElection
    slots:
    - CreditSupportDocumentElection_party
    - creditSupportDocumentTerms
    - creditSupportDocumentTypes
    - creditSupportDocument
    - bespokeCreditSuppportDocument
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: Party
        required: true
    class_uri: common_domain_model:CreditSupportDocumentElection
  CreditSupportProvider:
    name: CreditSupportProvider
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportProvider
    description: Identification of party specific Credit Support Providers applicable
      to the document.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportProvider
    slots:
    - creditSupportProviderElection
    class_uri: common_domain_model:CreditSupportProvider
  CreditSupportProviderElection:
    name: CreditSupportProviderElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportProviderElection
    description: The party election of Credit Support Provider(s), if any.
    comments:
    - "Rosetta condition: CreditSupportProvider \u2014 if creditSupportProviderTerms\
      \ = CreditSupportProviderTermsEnum -> Specified then creditSupportProvider exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportProviderElection
    slots:
    - CreditSupportProviderElection_party
    - creditSupportProviderTerms
    - creditSupportProvider
    - bespokeCreditSuppportProvider
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: Party
        required: true
    class_uri: common_domain_model:CreditSupportProviderElection
    rules:
    - preconditions:
        slot_conditions:
          creditSupportProviderTerms:
            name: creditSupportProviderTerms
            equals_string: Specified
      postconditions:
        slot_conditions:
          creditSupportProvider:
            name: creditSupportProvider
            required: true
      description: A validation rule to ensure that a Credit Support Provider is specified
        when required.
  SpecifiedConditionOrAccessCondition:
    name: SpecifiedConditionOrAccessCondition
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpecifiedConditionOrAccessCondition
    description: Specifies the events elected by the parties that are deemed an Access
      Condition (for Initial Margin CSA) or a Specified Condition (for Variation Margin
      and Legacy CSA), which, if triggered, may temporarily or permanently suspend
      rights to rehypothecate, transfer, or substitute collateral.
    notes:
    - ISDA CSA_NewYork_1994 paragraph "13" clause "(d)"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_NewYork_1994
    exact_mappings:
    - common_domain_model:SpecifiedConditionOrAccessCondition
    slots:
    - SpecifiedConditionOrAccessCondition_isApplicable
    - SpecifiedConditionOrAccessCondition_partyElection
    - SpecifiedConditionOrAccessCondition_additionalLanguage
    slot_usage:
      isApplicable:
        name: isApplicable
        description: Indicates whether events that could temporarily or permanently
          suspend rights to rehypothecate, transfer or substitute collateral are applicable.
          If applicable,'True'. If not applicable,'False'.
      partyElection:
        name: partyElection
        description: The party specific elections.
        range: SpecifiedOrAccessConditionPartyElection
        required: false
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:SpecifiedConditionOrAccessCondition
  SpecifiedOrAccessConditionPartyElection:
    name: SpecifiedOrAccessConditionPartyElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpecifiedOrAccessConditionPartyElection
    description: The party specific elections in respect to the Specified Condition
      and Access Condition clause.
    comments:
    - "Rosetta condition: AdditionalTerminationEvent \u2014 if specifiedOrAccessCondition\
      \ any = CSASpecifiedOrAccessConditionEnum -> AdditionalTerminationEvents then\
      \ additionalTerminationEvent exists else additionalTerminationEvent is absent"
    - "Rosetta condition: SpecifiedAdditionalTerminationEvent \u2014 if additionalTerminationEvent\
      \ any = AdditionalTerminationEventEnum -> AsSpecified then specifiedAdditionalTerminationEvent\
      \ exists else specifiedAdditionalTerminationEvent is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:SpecifiedOrAccessConditionPartyElection
    slots:
    - SpecifiedOrAccessConditionPartyElection_party
    - specifiedOrAccessCondition
    - additionalTerminationEvent
    - specifiedAdditionalTerminationEvent
    slot_usage:
      party:
        name: party
        description: Identifies the party making the election.
        range: CounterpartyRoleEnum
        required: true
    class_uri: common_domain_model:SpecifiedOrAccessConditionPartyElection
  LegacyIndependentAmount:
    name: LegacyIndependentAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyIndependentAmount
    description: Sets out the additional amount of collateral that is required to
      be delivered by that party irrespective of the mark-to-market exposure under
      the related Transactions. It may take the form of a fixed amount, or be determined
      using credit ratings.
    notes:
    - ISDA CSA_NewYork_1994 paragraph "13" clause "(b)(iv)(A)"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_NewYork_1994
    exact_mappings:
    - common_domain_model:LegacyIndependentAmount
    slots:
    - LegacyIndependentAmount_partyElection
    - LegacyIndependentAmount_additionalLanguage
    slot_usage:
      partyElection:
        name: partyElection
        description: The party specific elections for the Independent Amount clause.
        range: LegacyIndependentAmountParty
      additionalLanguage:
        name: additionalLanguage
        description: The additional language that might be specified by the parties
          to the legal agreement.
    class_uri: common_domain_model:LegacyIndependentAmount
  LegacyIndependentAmountParty:
    name: LegacyIndependentAmountParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyIndependentAmountParty
    description: The party specific elections for the Independent Amount clause.
    comments:
    - "Rosetta condition: LegacyIAMethod \u2014 required choice fixedAmount, ratingsBased,\
      \ ratingsXExposure"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:LegacyIndependentAmountParty
    slots:
    - LegacyIndependentAmountParty_party
    - LegacyIndependentAmountParty_isApplicable
    - LegacyIndependentAmountParty_fixedAmount
    - LegacyIndependentAmountParty_ratingsBased
    - ratingsXExposure
    slot_usage:
      party:
        name: party
        description: Identifies the Party making the election.
        range: CounterpartyRoleEnum
        required: true
      isApplicable:
        name: isApplicable
        description: Specifies whether Independent Amount is applicable to the elected
          party. If applicable, 'True', and if not applicable then 'False'.
      fixedAmount:
        name: fixedAmount
        description: Indicates the Independent Amount is specified as a fixed amount.
        range: Money
      ratingsBased:
        name: ratingsBased
        description: Indicates the Independent Amount is determined using a credit
          rating.
        range: LegacyIndependentAmountRatingsBased
    class_uri: common_domain_model:LegacyIndependentAmountParty
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            fixedAmount:
              name: fixedAmount
              required: true
        - slot_conditions:
            ratingsBased:
              name: ratingsBased
              required: true
        - slot_conditions:
            ratingsXExposure:
              name: ratingsXExposure
              required: true
      description: Ensures that the Independent Amount is specified as only one of
        Fixed Amount, Ratings Based or RatingsXExposure.
  IndependentAmountRatings:
    name: IndependentAmountRatings
    definition_uri: https://w3id.org/lmodel/common_domain_model/IndependentAmountRatings
    description: A logical container designed to hold a set of related data. In this
      case, designed to hold a set of information required when Independent Amount
      is determined using credit ratings.
    comments:
    - "Rosetta condition: RestrictCompare \u2014 if compare exists then compare =\
      \ IndependentAmountCompareEnum -> Compare or compare = IndependentAmountCompareEnum\
      \ -> Lowest or compare = IndependentAmountCompareEnum -> Highest"
    - "Rosetta condition: NamedAffiliate \u2014 if ratedParty = RatedPartyEnum ->\
      \ NamedAffiliate then namedAffiliate exists else namedAffiliate is absent"
    - "Rosetta condition: NamedEntity \u2014 if ratedParty = RatedPartyEnum -> NamedEntity\
      \ then namedEntity exists else namedEntity is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:IndependentAmountRatings
    slots:
    - IndependentAmountRatings_compare
    - IndependentAmountRatings_ratedParty
    - IndependentAmountRatings_namedAffiliate
    - IndependentAmountRatings_namedEntity
    - ratingType
    slot_usage:
      compare:
        name: compare
        description: Specifies how multiple credit ratings are compared when determining
          the applicable Independent Amount, and whether that measure is highest,
          lowest, or a comparison of either.
        range: IndependentAmountCompareEnum
        required: true
      ratedParty:
        name: ratedParty
        description: Specifies the party to whom the rating agency rating applies
          to for the purposes of determining the Independent Amount.
        required: true
      namedAffiliate:
        name: namedAffiliate
        range: LegalEntity
      namedEntity:
        name: namedEntity
        range: LegalEntity
    class_uri: common_domain_model:IndependentAmountRatings
    rules:
    - preconditions:
        slot_conditions:
          ratedParty:
            name: ratedParty
            equals_string: NamedAffiliate
      postconditions:
        slot_conditions:
          namedAffiliate:
            name: namedAffiliate
            required: true
      description: Ensures Named Affiliate is provided where the Rated Party is Named
        Affiliate.
    - preconditions:
        slot_conditions:
          ratedParty:
            name: ratedParty
            equals_string: NamedEntity
      postconditions:
        slot_conditions:
          namedEntity:
            name: namedEntity
            required: true
      description: Ensures Named Entity is provided where the Rated Party is Named
        Entity.
  LegacyIndependentAmountRatingsBased:
    name: LegacyIndependentAmountRatingsBased
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegacyIndependentAmountRatingsBased
    description: Specifies that the Independent Amount is determined using a credit
      rating.
    comments:
    - "Rosetta condition: RestrictCompare \u2014 if compare exists then compare =\
      \ IndependentAmountCompareEnum -> Lowest or compare = IndependentAmountCompareEnum\
      \ -> Highest"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:LegacyIndependentAmountRatingsBased
    is_a: IndependentAmountRatings
    slots:
