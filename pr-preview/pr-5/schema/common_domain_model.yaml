      BRL_PTAX_COMMERCIAL_BRL05:
        text: BRL_PTAX_COMMERCIAL_BRL05
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian
          Real/U.S. Dollar commercial rate, expressed as the amount of Brazilian Reais
          per one U.S. Dollar, for settlement in two Business Days (where such days
          are Business Days in both Sao Paulo and New York) reported by the Banco
