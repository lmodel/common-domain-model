  ClosedStateEnum:
    name: ClosedStateEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ClosedStateEnum
    description: The enumerated values to specify what led to the contract or execution
      closure.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Allocated:
        text: Allocated
        description: The execution or contract has been allocated.
      Cancelled:
        text: Cancelled
        description: The execution or contract has been cancelled.
      Exercised:
        text: Exercised
        description: The (option) contract has been exercised.
      Expired:
        text: Expired
        description: The (option) contract has expired without being exercised.
      Matured:
        text: Matured
        description: The contract has reached its contractual termination date.
      Novated:
        text: Novated
        description: The contract has been novated. This state applies to the stepped-out
          contract component of the novation event.
      Terminated:
        text: Terminated
        description: The contract has been subject of an early termination event.
  PositionStatusEnum:
    name: PositionStatusEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PositionStatusEnum
    description: Enumeration to describe the different (risk) states of a Position,
      whether executed, settled, matured...etc
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - http://www.fpml.org/coding-scheme/position-status
    permissible_values:
      Executed:
        text: Executed
        description: The position has been executed, which is the point at which risk
          has been transferred.
      Formed:
        text: Formed
        description: Contract has been formed, in case position is on a contractual
          product.
      Settled:
        text: Settled
        description: The position has settled, in case product is subject to settlement
          after execution, such as securities.
      Cancelled:
        text: Cancelled
        description: The position has been cancelled, in case of a cancellation event
          following an execution.
      Closed:
        text: Closed
        description: The position has been closed, in case of a termination event.
  AvailableInventoryTypeEnum:
    name: AvailableInventoryTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AvailableInventoryTypeEnum
    description: Enumeration to describe the type of AvailableInventory
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    permissible_values:
      AvailableToLend:
        text: AvailableToLend
        description: Where a lender is broadcasting the securities that they have
          available to lend
      RequestToBorrow:
        text: RequestToBorrow
        description: Where a party is asking a lender if they have specific securities
          available for them to borrow
  CreditLimitTypeEnum:
    name: CreditLimitTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditLimitTypeEnum
    description: The enumeration values to qualify the type of credit limits.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-limit-type
    permissible_values:
      CS01:
        text: CS01
        description: The type of credit line expressed in CS01. The sensitivity with
          respect to changes in the CDS spread.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#CS01
      DV01:
        text: DV01
        description: The type of credit line expressed in DV01. The dollar value of
          a one basis point decrease in interest rates. It shows the change in a bond's
          price compared to a decrease in the bond's yield.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#DV01
      IM:
        text: IM
        description: The type of credit line expressed in Initial Margin value.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#IM
      Notional:
        text: Notional
        description: The type of credit line expressed in Notional amount.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#Notional
      NPV:
        text: NPV
        description: The type of credit line expressed as a Net Present Value.
      PV01:
        text: PV01
        description: The type of credit line expressed in PV01. The value of a one
          dollar or one basis point annuity.
        meaning: http://www.fpml.org/coding-scheme/credit-limit-type-1-1#PV01
  EventTimestampQualificationEnum:
    name: EventTimestampQualificationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventTimestampQualificationEnum
    description: The enumeration values to qualify the timestamps that can be associated
      with a lifecycle event. The reason for such approach is that the experience
      of integrating the DTCC and CME data representations suggests that a wide set
      of timestamps are currently utilized among service providers, while there is
      not at present an objective set of criteria that could help suggest a defined
      set of timestamps as part of the CDM. Implementers are expected to evaluate
      the current enumeration values to determine whether those meet their requirements.
      If not, they are expected to engage with the CDM team to evaluate the addition
      of further value(s) to this enumeration, which will then participate to the
      development of a compendium for further evaluation at a later point in order
      to determine whether this modeling is appropriate.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    permissible_values:
      clearingDateTime:
        text: clearingDateTime
        description: The date and time on the trade was cleared.
      clearingConfirmationDateTime:
        text: clearingConfirmationDateTime
        description: The date and time on which trade was confirmed as cleared.
      clearingReceiptDateTime:
        text: clearingReceiptDateTime
        description: The date and time on which trade was received by Clearing Body.
      clearingSubmissionDateTime:
        text: clearingSubmissionDateTime
        description: The date and time on which the event was submitted for clearing.
      confirmationDateTime:
        text: confirmationDateTime
        description: The date and time on which the event was confirmed.
      eventCreationDateTime:
        text: eventCreationDateTime
        description: The date and time on which the event was created.
      eventExpirationDateTime:
        text: eventExpirationDateTime
        description: The date and time on which the event will be considered expired.
      eventProcessingDateTime:
        text: eventProcessingDateTime
        description: The date and time on which the event was processed.
      eventSentDateTime:
        text: eventSentDateTime
        description: The date and time on which the event was sent.
      eventSubmittedDateTime:
        text: eventSubmittedDateTime
        description: The date and time on which the event was submitted.
      executionDateTime:
        text: executionDateTime
        description: The date and time on which the trade execution was performed.
      transactionCreationDateTime:
        text: transactionCreationDateTime
        description: 'The date and time on which the transaction has been created.
          This timestamp is specified as such by the CME ClearPort Matched IRS Trade
          submission API specification: ''The transaction date time of the trade.
          Represents the date & time on which the trade was initially generated either
          by CME Clearing or firm. The transaction date time may be assigned by CME
          Clearing at the point the trade is reported as cleared. Transaction date
          time can also be provided by an external submitter of the trade at the point
          the trade is submitted.'''
  LimitLevelEnum:
    name: LimitLevelEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/LimitLevelEnum
    description: 'The enumeration values to specify the level at which the limit is
      set: customer business, proprietary business or account level. This is part
      of the CME specification for clearing credit limits, although not specified
