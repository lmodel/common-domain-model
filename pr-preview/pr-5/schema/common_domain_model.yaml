    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralInterestCalculationParameters
    description: Represents parameters for calculating the amount the floating interest
      calculation, e.g.  for a single currency or defaults for all currencies.
    comments:
    - "Rosetta condition: InterestRate \u2014 required choice fixedRate, floatingRate"
    - "Rosetta condition: DCF \u2014 dayCountFraction = DayCountFractionEnum -> ACT_360\
      \ or dayCountFraction = DayCountFractionEnum -> ACT_365_FIXED"
    - "Rosetta condition: CompoundingBC1 \u2014 if compoundingType = CompoundingTypeEnum\
      \ -> Business then compoundingBusinessCenter exists"
    - "Rosetta condition: CompoundingBC2 \u2014 if compoundingType <> CompoundingTypeEnum\
      \ -> Business then compoundingBusinessCenter is absent"
    in_subset:
    - cdm_product_collateral
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - common_domain_model:CollateralInterestCalculationParameters
    close_mappings:
    - fpml_5_10:CollateralInterestCalculationParameters
    slots:
    - CollateralInterestCalculationParameters_fixedRate
    - CollateralInterestCalculationParameters_floatingRate
    - inBaseCurrency
    - compoundingType
    - compoundingBusinessCenter
    - CollateralInterestCalculationParameters_dayCountFraction
    - CollateralInterestCalculationParameters_rounding
    - roundingFrequency
    - withholdingTaxRate
    slot_usage:
      fixedRate:
        name: fixedRate
        description: Specifies the applicable fixed rate  if used.
        required: false
      floatingRate:
        name: floatingRate
        description: Specifies the floating interest rate to be used.
        range: CollateralAgreementFloatingRate
        multivalued: false
      dayCountFraction:
        name: dayCountFraction
        description: Specifies the day count fraction to use for that currency.
      rounding:
        name: rounding
        description: Specifies the rounding rules for settling in that currency.
        range: Rounding
    class_uri: common_domain_model:CollateralInterestCalculationParameters
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            fixedRate:
              name: fixedRate
              required: true
        - slot_conditions:
            floatingRate:
              name: floatingRate
              required: true
      description: InterestRate
    - preconditions:
        slot_conditions:
          compoundingType:
            name: compoundingType
            equals_string: Business
      postconditions:
        slot_conditions:
          compoundingBusinessCenter:
            name: compoundingBusinessCenter
            required: true
      description: CompoundingBC1
    - preconditions:
        slot_conditions:
          compoundingType:
