  CompoundingTypeEnum:
    name: CompoundingTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CompoundingTypeEnum
    description: The enumerated values to specify how the compounding calculation
      is done
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      None:
        text: None
        description: Compounding is not applicable
      Business:
        text: Business
        description: Compounding is done only on business days, i.e. not compounded
          each day on weekends or holidays.
      Calendar:
        text: Calendar
        description: Compounding is done on each calendar day.
  RoundingFrequencyEnum:
    name: RoundingFrequencyEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RoundingFrequencyEnum
    description: How often is rounding performed
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      Daily:
        text: Daily
        description: Rounding is done on each day
      PeriodEnd:
        text: PeriodEnd
        description: Rounding is done only at the end of the period
  DayCountFractionEnum:
    name: DayCountFractionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DayCountFractionEnum
    description: The enumerated values to specify the day count fraction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime_daycount
    permissible_values:
      ACT_360:
        text: ACT_360
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (v), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (e) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (d).
        aliases:
        - ACT/360
      ACT_365L:
        text: ACT_365L
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (ix), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (i).
        aliases:
        - ACT/365L
      ACT_364:
        text: ACT_364
        description: Per CFTC definitions.
        aliases:
        - ACT/364
      ACT_365_FIXED:
        text: ACT_365_FIXED
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (iv), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (d) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (c).
        aliases:
        - ACT/365.FIXED
      ACT_ACT_AFB:
        text: ACT_ACT_AFB
        description: The Fixed/Floating Amount will be calculated in accordance with
          the 'BASE EXACT/EXACT' day count fraction, as defined in the 'Definitions
          Communes plusieurs Additifs Techniques' published by the Association Francaise
          des Banques in September 1994.
        aliases:
        - ACT/ACT.AFB
      ACT_ACT_ICMA:
        text: ACT_ACT_ICMA
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (iii), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (c). This day count fraction code is applicable for transactions
          booked under the 2021 ISDA Definitions and the 2006 ISDA Definitions. Transactions
          under the 2000 ISDA Definitions should use the ACT/ACT.ISMA code instead.
        aliases:
        - ACT/ACT.ICMA
      ACT_ACT_ISDA:
        text: ACT_ACT_ISDA
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (ii), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (b) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (b). Note that going from FpML
          2.0 Recommendation to the FpML 3.0 Trial Recommendation the code in FpML
          2.0 'ACT/365.ISDA' became 'ACT/ACT.ISDA'.
        aliases:
        - ACT/ACT.ISDA
      ACT_ACT_ISMA:
        text: ACT_ACT_ISMA
        description: The Fixed/Floating Amount will be calculated in accordance with
          Rule 251 of the statutes, by-laws, rules and recommendations of the International
          Securities Market Association, as published in April 1999, as applied to
          straight and convertible bonds issued after December 31, 1998, as though
          the Fixed/Floating Amount were the interest coupon on such a bond. This
          day count fraction code is applicable for transactions booked under the
          2000 ISDA Definitions. Transactions under the 2021 ISDA Definitions and
          the 2006 ISDA Definitions should use the ACT/ACT.ICMA code instead.
        aliases:
        - ACT/ACT.ISMA
      CAL_252:
        text: CAL_252
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (x). Supercedes BUS/252, the number of Business Days in the Calculation
          Period or Compounding Period in respect of which payment is being made divided
          by 252.
        aliases:
        - CAL/252
      _1_1:
        text: _1_1
        description: Per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (a) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (a).
        aliases:
        - 1/1
      _30E_360:
        text: _30E_360
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (vii), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (g) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (f). Note that the algorithm
          defined for this day count fraction has changed between the 2000 ISDA Definitions
          and 2006 ISDA Definitions. See Introduction to the 2006 ISDA Definitions
          for further information relating to this change.
        aliases:
        - 30E/360
      _30E_360_ISDA:
        text: _30E_360_ISDA
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (viii), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (h). Note the algorithm for this day count fraction under the
          2006 ISDA Definitions is designed to yield the same results in practice
          as the version of the 30E/360 day count fraction defined in the 2000 ISDA
          Definitions. See Introduction to the 2006 ISDA Definitions for further information
          relating to this change.
        aliases:
        - 30E/360.ISDA
      _30_360:
        text: _30_360
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (vi), per 2006 ISDA Definitions, Section 4.16. Day Count Fraction,
          paragraph (f) or Annex to the 2000 ISDA Definitions (June 2000 Version),
          Section 4.16. Day Count Fraction, paragraph (e).
        aliases:
        - 30/360
      RBA_BOND_BASIS:
        text: RBA_BOND_BASIS
        description: Per 2021 ISDA Definitions, Section 4.6.1 Day Count Fraction,
          paragraph (xi), the calculation mechanics are driven deterministically by
          the Calculation Period Frequency (i.e. 0.25 if it is three months, 0.5 if
          it is 6 months, 1 if it is a year), except that if the first Calculation
          Period or the final Calculation Period is less than the Calculation Period
          Frequency, Actual/Actual (ISDA) shall apply to that Calculation Period
        aliases:
        - RBA Bond Basis
  AveragingWeightingMethodEnum:
    name: AveragingWeightingMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingWeightingMethodEnum
    description: The enumerated values to specify the method of calculation to be
      used when averaging rates. Per ISDA 2000 Definitions, Section 6.2. Certain Definitions
      Relating to Floating Amounts.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    permissible_values:
      Unweighted:
        text: Unweighted
        description: The arithmetic mean of the relevant rates for each reset date.
      Weighted:
        text: Weighted
        description: The arithmetic mean of the relevant rates in effect for each
          day in a calculation period calculated by multiplying each relevant rate
          by the number of days such relevant rate is in effect, determining the sum
          of such products and dividing such sum by the number of days in the calculation
          period.
  AveragingCalculationMethodEnum:
    name: AveragingCalculationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AveragingCalculationMethodEnum
    description: Specifies enumerations for the type of averaging calculation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    permissible_values:
      Arithmetic:
        text: Arithmetic
        description: Refers to the calculation of an average by taking the sum of
          observations divided by the count of observations.
      Geometric:
        text: Geometric
        description: Refers to the calculation of an average by taking the nth root
          of the product of n observations.
      Harmonic:
        text: Harmonic
        description: Refers to the calculation of an average by taking the reciprocal
          of the arithmetic mean of the reciprocals of the observations.
  RoundingDirectionEnum:
    name: RoundingDirectionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RoundingDirectionEnum
    description: The enumerated values to specify the rounding direction and precision
      to be used in the rounding of a number.  Used by function cdm.base.math.RoundToPrecision.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    permissible_values:
      Up:
        text: Up
        description: A fractional number will be rounded up to the specified number
          of decimal places (the precision). For example, 5.21 and 5.25 rounded up
          to 1 decimal place are 5.3 and 5.3 respectively.
      Down:
        text: Down
        description: A fractional number will be rounded down to the specified number
          of decimal places (the precision). For example, 5.29 and 5.25 rounded down
          to 1 decimal place are 5.2 and 5.2 respectively.
      Nearest:
        text: Nearest
        description: A fractional number will be rounded either up or down to the
          specified number of decimal places (the precision) depending on its value.
          For example, 5.24 would be rounded down to 5.2 and 5.25 would be rounded
          up to 5.3 if a precision of 1 decimal place were specified.
  RoundingModeEnum:
    name: RoundingModeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RoundingModeEnum
    description: The enumerated values to specify the rounding direction when rounding
      of a number to nearest.  Used by function cdm.base.math.RoundToNearest.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    permissible_values:
      Down:
        text: Down
        description: A number will be rounded down to the specified nearest number.
          For example, 529 rounded down to the nearest 10 is 520.
      Up:
        text: Up
        description: A number will be rounded up to the specified nearest number.
          For example, 521 rounded up to the nearest 10 is 530.
  QuantifierEnum:
    name: QuantifierEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/QuantifierEnum
    description: Represents the enumerated values to specify a logical quantification,
      i.e. either All or Any.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
    permissible_values:
      All:
        text: All
        description: Specifies that the condition in the scope of the quantifier is
          true of every member of the domain i.e. every one of the elements in scope.
      Any:
        text: Any
        description: Specifies that the condition in the scope of the quantifier is
          true of at least one member of the domain i.e. one or more of the elements
          in scope.
  CompareOp:
    name: CompareOp
    definition_uri: https://w3id.org/lmodel/common_domain_model/CompareOp
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_math
