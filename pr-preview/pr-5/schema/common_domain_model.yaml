    slot_usage:
      isApplicable:
        name: isApplicable
        description: Japanese Securities Provisions are applicable when True and Not
          Applicable when False.
    class_uri: common_domain_model:JapaneseSecuritiesProvisions
    rules:
    - preconditions:
        slot_conditions:
          relevantProvisionsElection:
            name: relevantProvisionsElection
            equals_string: 'True'
      postconditions:
