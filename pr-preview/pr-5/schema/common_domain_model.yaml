    definition_uri: https://w3id.org/lmodel/common_domain_model/commodityBusinessCalendar
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:BusinessCenters.commodityBusinessCalendar
    slot_uri: common_domain_model:commodityBusinessCalendar
