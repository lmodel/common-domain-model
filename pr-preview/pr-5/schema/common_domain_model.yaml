        text: NorthAmericanInsurance
        description: Entity Type of North American Insurance.
        meaning: http://www.fpml.org/coding-scheme/entity-type-1-0#NorthAmericanInsurance
      NorthAmericanInvestmentGrade:
        text: NorthAmericanInvestmentGrade
        description: Entity Type of North American Investment Grade.
        meaning: http://www.fpml.org/coding-scheme/entity-type-1-0#NorthAmericanInvestmentGrade
      Singaporean:
        text: Singaporean
        description: Entity Type of Singaporean.
        meaning: http://www.fpml.org/coding-scheme/entity-type-1-0#Singaporean
      WesternEuropean:
        text: WesternEuropean
        description: Entity Type of Western European.
        meaning: http://www.fpml.org/coding-scheme/entity-type-1-0#WesternEuropean
      WesternEuropeanInsurance:
        text: WesternEuropeanInsurance
        description: Entity Type of Western European Insurance.
        meaning: http://www.fpml.org/coding-scheme/entity-type-1-0#WesternEuropeanInsurance
  PayerReceiverEnum:
    name: PayerReceiverEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PayerReceiverEnum
    description: The enumerated values to specify an interest rate stream payer or
      receiver party.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    permissible_values:
      Payer:
        text: Payer
        description: The party identified as the stream payer.
      Receiver:
        text: Receiver
        description: The party identified as the stream receiver.
  AccountTypeEnum:
    name: AccountTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AccountTypeEnum
    description: The enumeration values to qualify the type of account.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - http://www.fpml.org/coding-scheme/account-type
    permissible_values:
      AggregateClient:
        text: AggregateClient
        description: Aggregate client account, as defined under ESMA MiFIR.
        meaning: http://www.fpml.org/coding-scheme/account-type-1-1#AggregateClient
      Client:
        text: Client
        description: The account contains trading activity or positions that belong
          to a client of the firm that opened the account.
        meaning: http://www.fpml.org/coding-scheme/account-type-1-1#Client
      House:
        text: House
        description: The account contains proprietary trading activity or positions,
          belonging to the firm that is the owner of the account.
        meaning: http://www.fpml.org/coding-scheme/account-type-1-1#House
  NaturalPersonRoleEnum:
    name: NaturalPersonRoleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/NaturalPersonRoleEnum
    description: The enumerated values for the natural person's role.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    related_mappings:
    - iso29100:PIIPrincipal
    - oscal:Role
    permissible_values:
      Broker:
        text: Broker
        description: The person who arranged with a client to execute the trade.
      Buyer:
        text: Buyer
        description: Acquirer of the legal title to the financial instrument.
      DecisionMaker:
        text: DecisionMaker
        description: The party or person with legal responsibility for authorization
          of the execution of the transaction.
      ExecutionWithinFirm:
        text: ExecutionWithinFirm
        description: Person within the firm who is responsible for execution of the
          transaction.
      InvestmentDecisionMaker:
        text: InvestmentDecisionMaker
        description: Person who is responsible for making the investment decision.
      Seller:
        text: Seller
        description: Seller of the legal title to the financial instrument.
      Trader:
        text: Trader
        description: The person who executed the trade.
  PersonIdentifierTypeEnum:
    name: PersonIdentifierTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PersonIdentifierTypeEnum
    description: The enumeration values associated with person identifier sources.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    permissible_values:
      ARNU:
        text: ARNU
        description: Alien Registration Number, number assigned by a social security
          agency to identify a non-resident person.
      CCPT:
        text: CCPT
        description: Passport Number, number assigned by an authority to identify
          the passport number of a person.
      CUST:
        text: CUST
        description: Customer Identification Number, number assigned by an issuer
          to identify a customer.
      DRLC:
        text: DRLC
        description: Drivers License Number, number assigned by an authority to identify
          a driver's license.
      EMPL:
        text: EMPL
        description: Employee Identification Number, number assigned by a registration
          authority to an employee.
      NIDN:
        text: NIDN
        description: National Identity Number, number assigned by an authority to
          identify the national identity number of a person..
      SOSE:
        text: SOSE
        description: Social Security Number, number assigned by an authority to identify
          the social security number of a person.
      TXID:
        text: TXID
        description: Tax Identification Number, number assigned by a tax authority
          to identify a person.
      NPID:
        text: NPID
        description: Natural Person Identifier. To identify the person who is acting
          as private individual, not as business entity. Used for regulatory reporting.
      PLID:
        text: PLID
        description: Privacy Law Identifier. It refers to the DMO Letter No. 17-16,
          http://www.cftc.gov/idc/groups/public/@lrlettergeneral/documents/letter/17-16.pdf
  EntityIdentifierTypeEnum:
    name: EntityIdentifierTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/EntityIdentifierTypeEnum
    description: The enumeration values associated with legal entity identifier sources.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    permissible_values:
      REDID:
        text: REDID
        description: The Reference Entity Database identifier.
      CountryCode:
        text: CountryCode
        description: The ISO 3166 Country Code.
      Other:
        text: Other
        description: Used when the identifier type is not otherwise in this enumerated
          list because it is internal or other reasons.  The source can be identified
          in the scheme which is part of the identifier attribute.
    inherits:
    - PartyIdentifierTypeEnum
  PartyIdentifierTypeEnum:
    name: PartyIdentifierTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyIdentifierTypeEnum
    description: The enumeration values associated with party identifier sources.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    permissible_values:
      BIC:
        text: BIC
        description: The Bank Identifier Code.
      LEI:
        text: LEI
        description: The ISO 17442:2012 Legal Entity Identifier.
      MIC:
        text: MIC
        description: The ISO 10383 Market Identifier Code (MIC).
  PartyRoleEnum:
    name: PartyRoleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyRoleEnum
    description: The enumerated values for the party role. The enumerated values go
      beyond the FpML partyRoleScheme as they also include elements that are part
      of the FpML Trade, such as the Barrier Determination Agent and the Hedging Party.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    exact_mappings:
    - http://www.fpml.org/coding-scheme/party-role
    related_mappings:
    - oscal:Role
    permissible_values:
      Accountant:
        text: Accountant
        description: Organization responsible for preparing the accounting for the
          trade.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Accountant
      AgentLender:
        text: AgentLender
        description: An agent who lends securities of its principals under stock lending
          arrangements.
      AllocationAgent:
        text: AllocationAgent
        description: The organization responsible for supplying the allocations for
          a trade to be allocated to multiple accounts/organizations.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#AllocationAgent
      ArrangingBroker:
        text: ArrangingBroker
        description: 'The organization that arranged the trade, i.e. brought together
          the counterparties.  Synonyms/Alternatives: Inter-dealer broker, agent.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ArrangingBroker
      BarrierDeterminationAgent:
        text: BarrierDeterminationAgent
        description: The party specified in the related confirmation as Barrier Determination
          Agent.
      BeneficialOwner:
        text: BeneficialOwner
        description: The party that lends out securities under stock lending arrangements
          via an Agent Lender.
      Beneficiary:
        text: Beneficiary
        description: Organization that suffers the economic benefit of the trade.  The
          beneficiary may be distinct from the principal/counterparty - an example
          occurs when a hedge fund trades via a prime broker; in this case the principal
          is the prime broker, but the beneficiary is the hedge fund.  This can be
          represented as a payer/receiver account in the name of the hedge fund, but
          it is also possible to add the party role of 'Beneficiary' at the partyTradeInformation
          level.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Beneficiary
      BookingParty:
        text: BookingParty
        description: The entity for which the organization supporting the trade's
          processing has booked/recorded the trade. This is used in non-reporting
          workflows situations in which the trade doesn\'t need to be reported but
          a firm still wants to specify their own side.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#BookingParty
      Borrower:
        text: Borrower
        description: The party that borrows securities under stock lending arrangements.
      Buyer:
        text: Buyer
        description: Acquirer of the legal title to the financial instrument. In the
          case of an option, the buyer is the holder of the option. In the case of
          a swap or forward, the buyer will be determined by industry best practice.  This
          does not refer to an investor or investment manager or other organization
          on what is typically called  the 'Buy side'; for that, see the 'Client'
          role. Corresponds to 'Buyer' as defined in certain regulations such as ESMA
          MiFID II/MIFIR RTS 22 field 9.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Buyer
      BuyerDecisionMaker:
        text: BuyerDecisionMaker
        description: The party or person who, having legal authority to act on behalf
          of the trade counterparty acting as Buyer as defined in this coding scheme,
          made the decision to acquire the financial instrument. Corresponds to 'buyer
          decision maker' as defined in ESMA\'s MIFIR RTS 23 report. This does not
          refer to the decision maker for what is traditionally called the 'Buy side';
          for that, see the 'Client Decision Maker' role.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#BuyerDecisionMaker
      Chargor:
        text: Chargor
        description: The party that provides credit support under English Law.
      ClearingClient:
        text: ClearingClient
        description: An organization that clears trades through a clearing house,
          via a clearing broker (member of the clearing house) who acts as an agent
          on its behalf. The term 'client' refers to the organization\'s role in the
          clearing process in relation to its clearing broker, and not whether it
          is a price maker or taker in the execution process.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ClearingClient
      ClearingExceptionParty:
        text: ClearingExceptionParty
        description: A party to the trade that claims a clearing exception, such as
          an end-user exception under Dodd-Frank Act provisions.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ClearingExceptionParty
      ClearingFirm:
        text: ClearingFirm
        description: 'Organization that submits the trade to a clearing house on behalf
          of the principal. Synonyms/alternates: Futures Commission Merchant (FCM),
          Clearing Broker, Clearing Member Firm. Some implementations use ''Clearing
          Broker'' as synonym.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ClearingFirm
      ClearingOrganization:
        text: ClearingOrganization
        description: The organization that acts as a central counterparty to clear
          a derivatives contract.  This is used to represent the role of Central Counterparties
          (CCPs) or Derivative Clearing Organizations (DCOs).  Sometimes called 'ClearingService'.
          Some implementations also use the term 'Clearer'.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ClearingOrganization
      Client:
        text: Client
        description: Client as defined under ESMA MIFIR. This is generally the investor
          or other client of an investment firm, and is synonymous with the Beneficiary
          in many circumstances.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Client
      ClientDecisionMaker:
        text: ClientDecisionMaker
        description: The party or person who, having legal authority to act on behalf
          of a trade counterparty, made the decision to acquire or sell the financial
          instrument.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ClientDecisionMaker
      ConfirmationPlatform:
        text: ConfirmationPlatform
        description: Organization serving as a financial intermediary for the purposes
          of electronic confirmation or providing services for post-processing of
          transactional data.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ConfirmationPlatform
      ContractualParty:
        text: ContractualParty
        description: A party to a contractual document.  If the intended usage relates
          to the context of the trade lifecycle, more specific annotations have been
          defined which might be more appropriate.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ContractualParty
      CounterPartyAffiliate:
        text: CounterPartyAffiliate
        description: Organization officially attached to the counterparty. e.g. partner,
          branch, subsidiary.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#CounterPartyAffiliate
      CounterPartyUltimateParent:
        text: CounterPartyUltimateParent
        description: The topmost entity or organization, within the corporate hierarchy,
          responsible for the reporting party.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#CounterPartyUltimateParent
      Counterparty:
        text: Counterparty
        description: 'An economic counterparty to the trade. Synonym: principal.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Counterparty
      CreditSupportProvider:
        text: CreditSupportProvider
        description: Organization that enhances the credit of another organization
          (similar to guarantor, but may not fully guarantee the obligation).
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#CreditSupportProvider
      Custodian:
        text: Custodian
        description: Organization that maintains custody of the asset represented
          by the trade on behalf of the owner/principal.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Custodian
      DataSubmitter:
        text: DataSubmitter
        description: Entity submitting the transaction report to the competent authority.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#DataSubmitter
      DeterminingParty:
        text: DeterminingParty
        description: The party referenced is specified in the contract confirmation
          as Determination Party.
      DisputingParty:
        text: DisputingParty
        description: Organization that is disputing the trade or transaction.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#DisputingParty
      DocumentRepository:
        text: DocumentRepository
        description: A marketplace organization which purpose is to maintain document
          records.  If the intended usage relates to the context of the trade lifecycle,
          more specific annotations have been defined which might be more appropriate.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#DocumentRepository
      ExecutingBroker:
        text: ExecutingBroker
        description: The (generally sell-side) organization that executed the trade;
          the price-making party.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ExecutingBroker
      ExecutingEntity:
        text: ExecutingEntity
        description: Entity executing the transaction.  If the transaction is executed
          directly by the reporting party, it will be the reporting party.  If it
          is executed by an execution agent or an affiliated party on behalf of the
          reporting party, it will be that affiliate or agent.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ExecutingEntity
      ExecutionAgent:
        text: ExecutionAgent
        description: The (generally buy-side) organization that acts to execute trades
          on behalf of an investor. Typically this is an investment manager or asset
          manager, and also makes the investment decisions for the investor. If required,
          a separate InvestmentDecision role can be specified to distinguish that
          the party making the investment decision is different.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ExecutionAgent
      ExecutionFacility:
        text: ExecutionFacility
        description: 'The facility, exchange, or market where the trade was executed.
          Synonym: Swap Execution Facility, Designated Contract Market, Execution
          Venue.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ExecutionFacility
      Guarantor:
        text: Guarantor
        description: Organization that backs (guarantees) the credit risk of the trade.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Guarantor
      HedgingParty:
        text: HedgingParty
        description: The ISDA Hedging Party that is specified in the related confirmation
          as Hedging, or if no Hedging Party is specified, either party to the contract.
      Lender:
        text: Lender
        description: The party that lends out securities under stock lending arrangements
          as principal.
      MarginAffiliate:
        text: MarginAffiliate
        description: "Margin affiliate as defined by U.S. margin and capital rules\
          \ \xA723.151."
      OrderTransmitter:
        text: OrderTransmitter
        description: 'The entity transmitting the order to the reporting firm. Synonym:
          Transmitting Firm.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#OrderTransmitter
      Pledgor:
        text: Pledgor
        description: The party that provides credit support under New York Law.
      PrimeBroker:
        text: PrimeBroker
        description: The organization that takes on or took on the credit risk for
          this trade by stepping in between the two economic parties (without a central
          counterparty clearing mechanism).
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#PrimeBroker
      PriorTradeRepository:
        text: PriorTradeRepository
        description: The trade repository at which the trade was reported previous
          to the current trade repository.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#PriorTradeRepository
      PTRRServiceProvider:
        text: PTRRServiceProvider
        description: The party that acts as either a portfolio compression or portfolio
          rebalancing service provider, as defined under ESMA MIFIR
      PublicationVenue:
        text: PublicationVenue
        description: The reporting service (whether trade repository, market data
          service, or exchange/facility/venue data distribution service) that published
          the report of this trade.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#PublicationVenue
      ReportingParty:
        text: ReportingParty
        description: The party with the regulatory responsibility to report this trade.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ReportingParty
      ReportingPartyAffiliate:
        text: ReportingPartyAffiliate
        description: Organization officially attached to the reporting party  e.g.
          partner, branch, subsidiary.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ReportingPartyAffiliate
      ReportingPartyUltimateParent:
        text: ReportingPartyUltimateParent
        description: The topmost entity or organization, within the corporate hierarchy,
          responsible for the reporting party.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#ReportingPartyUltimateParent
      Seller:
        text: Seller
        description: 'A counterparty in a trade, which performs in one of the following
          capacities: 1) it transfers or agrees to transfer in the future an instrument
          or title to that instrument in exchange for payment, 2) it writes a derivatives
          instrument such as an option or a swap in which it provides risk protection
          to the buyer. This does not refer to the broker/dealer or other organization
          on what is typically called  the ''Sell side''; for that, see the ''Executing
          Broker'' role. Corresponds to ''Seller'' as defined in certain regulations
          such as ESMA MiFID II/MIFIR RTS 22 field 16.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#Seller
      SellerDecisionMaker:
        text: SellerDecisionMaker
        description: The party or person who, having legal authority to act on behalf
          of the trade counterparty acting as Seller as defined in this coding scheme,
          made the decision to sell the financial instrument. Corresponds to 'seller
          decision maker' as defined in ESMA\'s MIFIR RTS 23 report. This does not
          refer to the decision maker for what is traditionally called the 'Sell side';
          for that, see the 'Trader' person role.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#SellerDecisionMaker
      SecuredParty:
        text: SecuredParty
        description: The party that receives credit support under New York or English
          Law.
      SettlementAgent:
        text: SettlementAgent
        description: The organization that makes or receives payments on behalf of
          the given principal party.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#SettlementAgent
      TradeRepository:
        text: TradeRepository
        description: An organization that maintains records of the trade for regulatory
          reporting purposes.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#TradeRepository
      TradeSource:
        text: TradeSource
        description: The organization that originally supplied the record of the trade.
          In the context of regulatory reporting, it is the submitter of the trade
          record to a regulator or TR.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#TradeSource
      TradingManager:
        text: TradingManager
        description: 'The entity responsible for managing the assets/investments of
          this party.  Synonym:  Asset Manager, Investment Manager, Trading Advisory.'
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#TradingManager
      TradingPartner:
        text: TradingPartner
        description: An entity with which this party trades from time to time, ie.
          with which it acts as a counterparty on some transactions.   This role is
          used for static reference data, not individual transactions.
        meaning: http://www.fpml.org/coding-scheme/party-role-4-0#TradingPartner
      TripartyAgent:
        text: TripartyAgent
        description: A third party entity that acts as an intermediary and provides
          automated clearing, settlement, allocation, valuation and reporting services.
      ThirdPartyCustodian:
        text: ThirdPartyCustodian
        description: A third-party providing custody, settlement, segregation and
          reporting services.
  AncillaryRoleEnum:
    name: AncillaryRoleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AncillaryRoleEnum
    description: Defines the enumerated values to specify the ancillary roles to the
      transaction. The product is agnostic to the actual parties involved in the transaction,
      with the party references abstracted away from the product definition and replaced
      by the AncillaryRoleEnum. The AncillaryRoleEnum can then be positioned in the
      product and the AncillaryParty type, which is positioned outside of the product
      definition, allows the AncillaryRoleEnum to be associated with an actual party
      reference.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    related_mappings:
    - oscal:Role
    permissible_values:
      DisruptionEventsDeterminingParty:
        text: DisruptionEventsDeterminingParty
        description: Specifies the party which determines additional disruption events.
      ExtraordinaryDividendsParty:
        text: ExtraordinaryDividendsParty
        description: Specifies the party which determines if dividends are extraordinary
          in relation to normal levels.
      PredeterminedClearingOrganizationParty:
        text: PredeterminedClearingOrganizationParty
        description: Specifies the clearing organization (CCP, DCO) which the trade
          should be cleared.
      ExerciseNoticeReceiverPartyManual:
        text: ExerciseNoticeReceiverPartyManual
        description: Specifies the party to which notice of a manual exercise should
          be given.
      ExerciseNoticeReceiverPartyOptionalEarlyTermination:
        text: ExerciseNoticeReceiverPartyOptionalEarlyTermination
        description: Specifies the party to which notice of a optional early termination
          exercise should be given.
      ExerciseNoticeReceiverPartyCancelableProvision:
        text: ExerciseNoticeReceiverPartyCancelableProvision
        description: Specifies the party to which notice of a cancelable provision
          exercise should be given.
      ExerciseNoticeReceiverPartyExtendibleProvision:
        text: ExerciseNoticeReceiverPartyExtendibleProvision
        description: Specifies the party to which notice of a extendible provision
          exercise should be given.
      CalculationAgentIndependent:
        text: CalculationAgentIndependent
        description: Specifies the party responsible for performing calculation agent
          duties as defined in the applicable product definition.
      CalculationAgentOptionalEarlyTermination:
        text: CalculationAgentOptionalEarlyTermination
        description: Specifies the party responsible for performing calculation agent
          duties associated with an optional early termination.
      CalculationAgentMandatoryEarlyTermination:
        text: CalculationAgentMandatoryEarlyTermination
        description: Specifies the party responsible for performing calculation agent
          duties associated with an mandatory early termination.
      CalculationAgentFallback:
        text: CalculationAgentFallback
        description: Specifies the party responsible for deciding the fallback rate.
  TelephoneTypeEnum:
    name: TelephoneTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TelephoneTypeEnum
    description: The enumerated values to specify the type of telephone number, e.g.
      work vs. mobile.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_party
    permissible_values:
      Work:
        text: Work
        description: A number used primarily for work-related calls. Includes home
          office numbers used primarily for work purposes.
      Mobile:
        text: Mobile
        description: A number on a mobile telephone that is often or usually used
          for work-related calls. This type of number can be used for urgent work
          related business when a work number is not sufficient to contact the person
          or firm.
      Fax:
        text: Fax
        description: A number used primarily for work-related facsimile transmissions.
      Personal:
        text: Personal
        description: A number used primarily for non work-related calls. (Normally
          this type of number would be used only as an emergency backup number, not
          as a regular course of business).
  ConfirmationStatusEnum:
    name: ConfirmationStatusEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ConfirmationStatusEnum
    description: Enumeration for the different types of confirmation status.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Confirmed:
        text: Confirmed
      Unconfirmed:
        text: Unconfirmed
  AffirmationStatusEnum:
    name: AffirmationStatusEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AffirmationStatusEnum
    description: Enumeration for the different types of affirmation status.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Affirmed:
        text: Affirmed
      Unaffirmed:
        text: Unaffirmed
  ExecutionTypeEnum:
    name: ExecutionTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ExecutionTypeEnum
    description: The enumerated values to specify how a contract has been executed,
      e.g. electronically, verbally, ...
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - http://www.fpml.org/coding-scheme/execution-type
    permissible_values:
      Electronic:
        text: Electronic
        description: Execution via electronic execution facility, derivatives contract
          market, or other electronic message such as an instant message.
        meaning: http://www.fpml.org/coding-scheme/execution-type-1-0#Electronic
      OffFacility:
        text: OffFacility
        description: Bilateral execution between counterparties not pursuant to the
          rules of a SEF or DCM.
      OnVenue:
        text: OnVenue
        description: Execution via a platform that may or may not be covered by a
          regulatory defintion. OnVenue is intended to distinguish trades executed
          on a trading platform from those executed via phone, email or messaging
          apps. The role and details of the venue are included in the party attribute
          of the trade. The general rule is that if the parties utilitzed the services
          of the platform to execute the trade then it would be considered OnVenue.
  ActionEnum:
    name: ActionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ActionEnum
    description: The enumeration values to specify the actions associated with transactions.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      New:
        text: New
        description: A new instance of a transaction event, which is also characterized
          by the fact that the eventIdentifier has an associated version 1.
      Correct:
        text: Correct
        description: A correction of a prior instance of the transaction event. The
          eventIdentifier has an associated version greater than 1.
      Cancel:
        text: Cancel
        description: A cancellation of a prior instance of the transaction event.
          The eventIdentifier has an associated version greater than 1.
  AssetTransferTypeEnum:
    name: AssetTransferTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetTransferTypeEnum
    description: The qualification of the type of asset transfer.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      FreeOfPayment:
        text: FreeOfPayment
        description: The transfer of assets takes place without a corresponding exchange
          of payment.
  EventIntentEnum:
    name: EventIntentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventIntentEnum
    description: The enumeration values to qualify the intent associated with a transaction
      event.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Allocation:
        text: Allocation
        description: The intent is to allocate one or more trades as part of an allocated
          block trade.
      CashFlow:
        text: CashFlow
        description: The intent is to designate a stand-alone cash transfer as a result
          of Trade contracual terms e.g. incurred by payout for instance a Performance
          Amount or a Floating Rate Amount. The particular CashFlow at stake shall
          be further specified in priceTransferEnum or transferTypeEnum. For clarity,
          such intentEnum value shall not be used whenever a cash transfer is not
          stand-alone but is instead embedded in another Event as part of the composable
          modelling e.g. Decrease with Fees, Cross-Currency Notional Reset, etc. or
          any other Event whenever including a cash transfer with other features.
          For clarity, a principal payment related to a Principal Exhange is excluded
          as well, because a dedicated intentEnum value exists for this event i.e.
          PrincipalExchange value.
      Clearing:
        text: Clearing
        description: The intent is to clear the contract.
      Compression:
        text: Compression
        description: The intent is to compress multiple trades as part of a netting
          or compression event.
      ContractFormation:
        text: ContractFormation
        description: The intent is to form a contract from an execution.
      ContractTermsAmendment:
        text: ContractTermsAmendment
        description: The intent is to amend the terms of the contract through renegotiation.
      CorporateActionAdjustment:
        text: CorporateActionAdjustment
        description: The intent is to take into effect the occurrence of a Corporate
          Action and the particular Corporate Action at stake shall be further specified
          in CorporateActionTypeEnum.
      CreditEvent:
        text: CreditEvent
        description: The intent is to take into effect the occurrence of a Credit
          Event.
      Decrease:
        text: Decrease
        description: The intent is to Decrease the quantity or notional of the contract.
      EarlyTerminationProvision:
        text: EarlyTerminationProvision
        description: The intent is to fully unwind the Trade, as a result of the application
          of Trade contractual terms (e.g. an obligation to do so before Termination
          Date as part of any kind of Early Termination terms) as defined within the
          CDM EarlyTerminationProvision data type. Accordingly, increase and decrease
          of positions which result from negotiation by the parties shall not be designated
          by such intentEnum. For clarity, partial exercise of an option before its
          expiration date is excluded as well, though related to Trade contract terms,
          because a dedicated intentEnum value exists for this event i.e. OptionExercise
          value.
      Increase:
        text: Increase
        description: The intent is to Increase the quantity or notional of the contract.
      IndexTransition:
        text: IndexTransition
        description: 'The intent is to replace an interest rate index by another one
          during the life of a trade and add a transition spread on top of this index
          (and on top of the spreads already defined in the trade, if any). '
      NotionalReset:
        text: NotionalReset
        description: The intent is to increase or to decrease the notional of the
          Trade, in accordance with Notional Reset features e.g. could apply for Cross
          Currency Swaps, Equity Performance Swaps, etc.
      NotionalStep:
        text: NotionalStep
        description: The intent is to increase or to decrease the notional of the
          Trade, in accordance with Step features attached to a Payout Quantity.
      Novation:
        text: Novation
        description: The intent is to novate the contract.
      ObservationRecord:
        text: ObservationRecord
        description: The intent is to record any kind of stand-alone obervervations
          e.g. internal data recording, usage of CDM for recording and/or exchanging
          data as part of pricing 'consensus' processing, etc. For clarity, such intentEnum
          value shall not be used whenever an observation is not stand-alone but is
          instead embedded in another Event as part of the composable modelling e.g.
          CashFlow to which an observation of prices is associated, etc.
      OptionExercise:
        text: OptionExercise
        description: 'The intent is to Exercise a contract that is made of one or
          several option payout legs. For clarity, such intentEnum value shall not
          be used whenever an optional right is exercised in relation with a Trade
          which composition includes other types of payout legs e.g. right to call
          or to cancel before Termination Date as part of any kind of Early Termination
          terms other than genuine bermuda or american style features described in
          option payout. '
      OptionalExtension:
        text: OptionalExtension
        description: The intent is to extend the trade through exercise of an optional
          right as defined within the CDM OptionProvision data type.
      OptionalCancellation:
        text: OptionalCancellation
        description: The intent is to cancel the trade through exercise of an optional
          right as defined within the CDM OptionProvision data type.
      PortfolioRebalancing:
        text: PortfolioRebalancing
        description: The intent is to rebalance a portfolio, by inserting new derivatives
          transactions into portfolios of participants to reduce risks linked to those
          trades. These are offsetting trades that rebalance relationships between
          different counterparties when it comes to exposure of portfolios to certain
          types of risk, such as interest rate risk.
      PrincipalExchange:
        text: PrincipalExchange
        description: The intent is to pay or to receive a cash transfer, in accordance
          with Principal Exchange features.
      Reallocation:
        text: Reallocation
        description: The intent is to reallocate one or more trades as part of an
          allocated block trade.
      Repurchase:
        text: Repurchase
        description: The intent is to close a repo transaction through repurchase.
  PositionEventIntentEnum:
    name: PositionEventIntentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PositionEventIntentEnum
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      PositionCreation:
        text: PositionCreation
        description: The intent is to form a position from a fully formed contract.
      CorporateActionAdjustment:
        text: CorporateActionAdjustment
        description: The intent is to take into effect the occurrence of a Corporate
          Action and the particular Corporate Action at stake shall be further specified
          in CorporateActionTypeEnum.
      Decrease:
        text: Decrease
        description: The intent is to Decrease the quantity of the position.
      Increase:
        text: Increase
        description: The intent is to Increase the quantity of the position.
      Transfer:
        text: Transfer
        description: The intent is to transfer the position to another clearing member.
      OptionExercise:
        text: OptionExercise
        description: The intent is to Exercise a position or part of a position.
      Valuation:
        text: Valuation
        description: The intent is to update the valuation of the position.
  RecordAmountTypeEnum:
    name: RecordAmountTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RecordAmountTypeEnum
    description: The enumeration of the account level for the billing summary.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      AccountTotal:
        text: AccountTotal
      GrandTotal:
        text: GrandTotal
      ParentTotal:
        text: ParentTotal
  TransferStatusEnum:
    name: TransferStatusEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferStatusEnum
    description: The enumeration values to specify the transfer status.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Disputed:
        text: Disputed
        description: The transfer is disputed.
      Instructed:
        text: Instructed
        description: The transfer has been instructed.
      Pending:
        text: Pending
        description: The transfer is pending instruction.
      Settled:
        text: Settled
        description: The transfer has been settled.
      Netted:
        text: Netted
        description: The transfer has been netted into a separate Transfer.
  InstructionFunctionEnum:
    name: InstructionFunctionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/InstructionFunctionEnum
    description: The enumeration values indicating the BusinessEvent function associated
      input instructions.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Execution:
        text: Execution
      ContractFormation:
        text: ContractFormation
      QuantityChange:
        text: QuantityChange
      Renegotiation:
        text: Renegotiation
      Compression:
        text: Compression
  CallTypeEnum:
    name: CallTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CallTypeEnum
    description: Represents the enumeration values that indicate the intended status
      of message type, such as expected call, notification of a call or a margin call.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      MarginCall:
        text: MarginCall
        description: Identifies an actionable Margin Call.
      Notification:
        text: Notification
        description: Identifies a notification of a Margin Call for legal obligation
          to notify other party to initiate a margin call when notifying party is
          calculation or valuation agent.
      ExpectedCall:
        text: ExpectedCall
        description: Identifies an expected Margin Call instruction for either party
          to notify the other or their service provider of an expected margin call
          movement.
  MarginCallActionEnum:
    name: MarginCallActionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarginCallActionEnum
    description: Represents the enumeration values to identify the collateral action
      instruction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Delivery:
        text: Delivery
        description: Indicates an instruction of a new collateral asset delivery.
      Return:
        text: Return
        description: Indicates an instruction for a return of a principals collateral
          asset delivery.
  CollateralStatusEnum:
    name: CollateralStatusEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralStatusEnum
    description: Represents the enumeration list to identify the settlement status
      of the collateral.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      FullAmount:
        text: FullAmount
        description: Indicates the collateral balance amount in full, inclusive of
          any pre-agreed collateral positions in transit for settlement.
      SettledAmount:
        text: SettledAmount
        description: Indicates the collateral is settled and not an in transit pre-agreed
          collateral amount/s.
      InTransitAmount:
        text: InTransitAmount
        description: Indicates collateral amount in transit settlement cycle only,
          excluding settled collateral amount/s.
  MarginCallResponseTypeEnum:
    name: MarginCallResponseTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarginCallResponseTypeEnum
    description: Represents the enumeration values to define the response type to
      a margin call.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      AgreeinFull:
        text: AgreeinFull
        description: Specifies a 'Full Agreement' to Margin Call.
      PartiallyAgree:
        text: PartiallyAgree
        description: Specifies a 'Partial agreement' to Margin Call.
      Dispute:
        text: Dispute
        description: Specifies a 'Full Dispute' to a Margin call.
  RegMarginTypeEnum:
    name: RegMarginTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RegMarginTypeEnum
    description: Represents the enumeration values to specify the margin type in relation
      to bilateral or regulatory obligation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      VM:
        text: VM
        description: Indicates Variation Margin
      RegIM:
        text: RegIM
        description: Indicates Regulatory Initial Margin
      NonRegIM:
        text: NonRegIM
        description: Indicates Non Regulatory Initial margin or independent amount
  RegIMRoleEnum:
    name: RegIMRoleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RegIMRoleEnum
    description: Represents the enumeration values to specify the role of the party
      in relation to a regulatory initial margin call.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Pledgor:
        text: Pledgor
        description: Indicates 'Pledgor' party of initial margin call.
      Secured:
        text: Secured
        description: Indicates 'Secured' party of initial margin call.
  HaircutIndicatorEnum:
    name: HaircutIndicatorEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/HaircutIndicatorEnum
    description: Represents the enumeration indicators to specify if an asset or group
      of assets valuation is based on any valuation treatment haircut.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      PreHaircut:
        text: PreHaircut
        description: Indicates Pre haircut value
      PostHaircut:
        text: PostHaircut
        description: Indicates Post haircut value
  PerformanceTransferTypeEnum:
    name: PerformanceTransferTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PerformanceTransferTypeEnum
    description: The enumerated values to specify the origin of a performance transfer
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      Commodity:
        text: Commodity
      Correlation:
        text: Correlation
      Dividend:
        text: Dividend
      Equity:
        text: Equity
      Interest:
        text: Interest
      Volatility:
        text: Volatility
      Variance:
        text: Variance
  CorporateActionTypeEnum:
    name: CorporateActionTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CorporateActionTypeEnum
    description: The enumerated values to specify the origin of a corporate action
      transfer.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    permissible_values:
      CashDividend:
        text: CashDividend
        description: Corporate action triggered by the distribution of a cash dividend.
      StockDividend:
        text: StockDividend
        description: Corporate action triggered by the distribution of a stock dividend.
      StockSplit:
        text: StockSplit
        description: Corporate action triggered by a stock split. A stock split or
          stock divide increases the number of shares in a public company. The price
          is adjusted such that the before and after market capitalization of the
          company remains the same and dilutiondoes not occur. The value maps closely
          to the ISO code (SPLF) defined as a distribution of subsidiary stock to
          the shareholders of the parent company without a surrender of shares.
      ReverseStockSplit:
        text: ReverseStockSplit
        description: Corporate action triggered by a reverse split. A reverse stock
          split or reverse split is a process by a company of issuing to each shareholder
          in that company a smaller number of new shares in proportion to that shareholder's
          original shares that are subsequently canceled. A reverse stock split is
          also called a stock merge. The reduction in the number of issued shares
          is accompanied by a proportional increase in the share price. The value
          maps closely to the ISO code (SPLR) defined as a decrease in a company's
          number of outstanding equities without any change in the shareholder's equity
          or the aggregate market value at the time of the split. Equity price and
          nominal value are increased accordingly.
      SpinOff:
        text: SpinOff
        description: Corporate action triggered by a spin Off. A spin-out, also known
          as a spin-off or a starburst, refers to a type of corporate action where
          a company splits off sections of itself as a separate business. The value
          maps closely to the ISO code (SOFF) defined as a a distribution of subsidiary
          stock to the shareholders of the parent company without a surrender of shares.
          Spin-off represents a form of divestiture usually resulting in an independent
          company or in an existing company. For example, demerger, distribution,
          unbundling.
      Merger:
        text: Merger
        description: Corporate action triggered by a merger. Mergers and acquisitions
          (abbreviated M&A) is an aspect of corporate strategy, corporate finance
          and management dealing with the buying, selling, dividing and combining
          of different companies and similar entities that can help an enterprise
          grow rapidly in its sector or location of origin, or a new field or new
          location, without creating a subsidiary, other child entity or using a joint
          venture. The distinction between a merger and an acquisition has become
          increasingly blurred in various respects (particularly in terms of the ultimate
          economic outcome), although it has not completely disappeared in all situations.
          The value maps closely to the ISO code (MRGR) defined as an offer made to
          shareholders, normally by a third party, requesting them to sell (tender)
          or exchange their equities.
      Delisting:
        text: Delisting
        description: Corporate action triggered by the removal of a security from
          a stock exchange.
      StockNameChange:
        text: StockNameChange
        description: Corporate action triggered by a change in the name used to trade
          the security.
      StockIdentifierChange:
        text: StockIdentifierChange
        description: Corporate action triggered by a change in the code used to trade
          the security.
      RightsIssue:
        text: RightsIssue
        description: Corporate action triggered by an issuance to shareholders of
          rights to purchase additional shares at a discount.
      Takeover:
        text: Takeover
        description: Corporate action triggered by a takeover. A takeover is the purchase
          of onecompany (the target) by another (the acquirer, or bidder). The value
          maps to the ISO code (TEND) but is finer grained than TEND which emcompasses
          Tender/Acquisition/Takeover/Purchase Offer/Buyback. ISO defines the TEND
          code as an offer made to shareholders, normally by a third party, requesting
          them to sell (tender) or exchange their equities.
      StockReclassification:
        text: StockReclassification
        description: Corporate action triggered by a Stock Reclassification.
      BonusIssue:
        text: BonusIssue
        description: Corporate action triggered by a bonus issue. A bonus issue or
          bonus share is a free share of stock given to current shareholders in a
          company, based upon the number of shares that the shareholder already owns.
          While the issue of bonus shares increases the total number of shares issued
          and owned, it does not change the value of the company. The value maps closely
          to the ISO code (BONU) defined as a bonus, scrip or capitalisation issue.
          Security holders receive additional assets free of payment from the issuer,
          in proportion to their holding.
      ClassAction:
        text: ClassAction
        description: Corporate action triggered by a Class Action. An action where
          an individual represents a group in a court claim. The judgment from the
          suit is for all the members of the group (class). The value maps closely
          to the ISO code (CLSA) defined as the situation where interested parties
          seek restitution for financial loss. The security holder may be offered
          the opportunity to join a class action proceeding and would need to respond
          with an instruction.
      EarlyRedemption:
        text: EarlyRedemption
        description: Corporate action triggered by an early redemption. The value
          maps closely to the ISO code (MCAL) defined as the redemption of an entire
          issue outstanding of securities, for example, bonds, preferred equity, funds,
          by the issuer or its agent, for example, asset manager, before final maturity.
      Liquidation:
        text: Liquidation
        description: Corporate action triggered by a liquidation. When a business
          or firm is terminated or bankrupt, its assets are sold (liquidated) and
          the proceeds pay creditors. Any leftovers are distributed to shareholders.
          The value maps closely to the ISO code (LIQU) defined as a distribution
          of cash, assets or both. Debt may be paid in order of priority based on
          preferred claims to assets specified by the security.
      BankruptcyOrInsolvency:
        text: BankruptcyOrInsolvency
        description: Corporate action triggered by bankruptcy, insolvency filing or
          insolvency of the issuer of the Security.
      IssuerNationalization:
        text: IssuerNationalization
        description: Corporate action triggered by the nationalization of the issuer
          of the Security.
      Relisting:
        text: Relisting
        description: Corporate action triggered by the relisting of a security from
          the original stock exchange to another exchange.
      BespokeEvent:
        text: BespokeEvent
        description: Corporate Action which is separately agreed between the parties
          and/or described elsewhere in the document (for instance in bespoke term
          described in string type objects present in some root attributes of Agreement
          type).
  CreditEventTypeEnum:
    name: CreditEventTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditEventTypeEnum
    description: Represents the enumerated values to specify a credit event type.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - http://www.fpml.org/coding-scheme/credit-event-type
    permissible_values:
      Bankruptcy:
        text: Bankruptcy
        description: 'The reference entity has been dissolved or has become insolvent.
          It also covers events that may be a precursor to insolvency such as instigation
          of bankruptcy or insolvency proceedings. Sovereign trades are not subject
          to Bankruptcy as ''technically'' a Sovereign cannot become bankrupt. ISDA
          2003 Term: Bankruptcy.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#Bankruptcy
      DistressedRatingsDowngrade:
        text: DistressedRatingsDowngrade
        description: Results from the fact that the rating of the reference obligation
          is downgraded to a distressed rating level. From a usage standpoint, this
          credit event is typically not applicable in case of RMBS trades.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#DistressedRatingsDowngrade
      FailureToPay:
        text: FailureToPay
        description: 'This credit event triggers, after the expiration of any applicable
          grace period, if the reference entity fails to make due payments in an aggregrate
          amount of not less than the payment requirement on one or more obligations
          (e.g. a missed coupon payment). ISDA 2003 Term: Failure to Pay.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPay
      FailureToPayInterest:
        text: FailureToPayInterest
        description: 'Corresponds to the failure by the Reference Entity to pay an
          expected interest amount or the payment of an actual interest amount that
          is less than the expected interest amount. ISDA 2003 Term: Failure to Pay
          Interest.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPayInterest
      FailureToPayPrincipal:
        text: FailureToPayPrincipal
        description: 'Corresponds to the failure by the Reference Entity to pay an
          expected principal amount or the payment of an actual principal amount that
          is less than the expected principal amount. ISDA 2003 Term: Failure to Pay
          Principal.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#FailureToPayPrincipal
      GovernmentalIntervention:
        text: GovernmentalIntervention
        description: 'A governmental intervention is an event resulting from an action
          by a governmental authority that materially impacts the reference entity''s
          obligations, such as an interest rate reduction, principal reduction, deferral
          of interest or principal, change in priority ranking, or change in currency
          or composition of payment. ISDA 2014 Term: Governmental Intervention.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#GovernmentalIntervention
      ImpliedWritedown:
        text: ImpliedWritedown
        description: Results from the fact that losses occur to the underlying instruments
          that do not result in reductions of the outstanding principal of the reference
          obligation.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ImpliedWritedown
      MaturityExtension:
        text: MaturityExtension
        description: Results from the fact that the underlier fails to make principal
          payments as expected.
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#MaturityExtension
      ObligationAcceleration:
        text: ObligationAcceleration
        description: 'One or more of the obligations have been declared due and payable
          before they would otherwise have been due and payable as a result of, or
          on the basis of, the occurrence of a default, event of default or other
          similar condition or event other than failure to pay (preferred by the market
          over Obligation Default, because more definitive and encompasses the definition
          of Obligation Default - this is more favorable to the Seller). Subject to
          the default requirement amount. ISDA 2003 Term: Obligation Acceleration.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ObligationAcceleration
      ObligationDefault:
        text: ObligationDefault
        description: 'One or more of the obligations have become capable of being
          declared due and payable before they would otherwise have been due and payable
          as a result of, or on the basis of, the occurrence of a default, event of
          default or other similar condition or event other than failure to pay. ISDA
          2003 Term: Obligation Default.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#ObligationDefault
      RepudiationMoratorium:
        text: RepudiationMoratorium
        description: 'The reference entity, or a governmental authority, either refuses
          to recognise or challenges the validity of one or more obligations of the
          reference entity, or imposes a moratorium thereby postponing payments on
          one or more of the obligations of the reference entity. Subject to the default
          requirement amount. ISDA 2003 Term: Repudiation/Moratorium.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#RepudiationMoratorium
      Restructuring:
        text: Restructuring
        description: 'A restructuring is an event that materially impacts the reference
          entity''s obligations, such as an interest rate reduction, principal reduction,
          deferral of interest or principal, change in priority ranking, or change
          in currency or composition of payment. ISDA 2003 Term: Restructuring.'
        meaning: http://www.fpml.org/coding-scheme/credit-event-type-1-0#Restructuring
      Writedown:
        text: Writedown
        description: Results from the fact that the underlier writes down its outstanding
          principal amount.
