    description: ' A class to specify whether Amendment to Minimum Transfer Amount
      language is applicable or not.'
    comments:
    - "Rosetta condition: AmendmentNotApplicable \u2014 if isApplicable = False then\
      \ effectiveDate is absent and partyElections is absent"
    in_subset:
    - cdm_legaldocumentation_csa
