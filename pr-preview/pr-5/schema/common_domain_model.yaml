  BusinessDayConventionEnum:
    name: BusinessDayConventionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessDayConventionEnum
    description: The enumerated values to specify the convention for adjusting any
      relevant date if it would otherwise fall on a day that is not a valid business
      day.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      FOLLOWING:
        text: FOLLOWING
        description: The non-business date will be adjusted to the first following
          day that is a business day
      FRN:
        text: FRN
        description: Per 2000 ISDA Definitions, Section 4.11. FRN Convention; Eurodollar
          Convention. FRN is included here as a type of business day convention although
          it does not strictly fall within ISDA's definition of a Business Day Convention
          and does not conform to the simple definition given above.
      MODFOLLOWING:
        text: MODFOLLOWING
        description: The non-business date will be adjusted to the first following
          day that is a business day unless that day falls in the next calendar month,
          in which case that date will be the first preceding day that is a business
          day.
      PRECEDING:
        text: PRECEDING
        description: The non-business day will be adjusted to the first preceding
          day that is a business day.
      MODPRECEDING:
        text: MODPRECEDING
        description: The non-business date will be adjusted to the first preceding
          day that is a business day unless that day falls in the previous calendar
          month, in which case that date will be the first following day that us a
          business day.
      NEAREST:
        text: NEAREST
        description: The non-business date will be adjusted to the nearest day that
          is a business day - i.e. if the non-business day falls on any day other
          than a Sunday or a Monday, it will be the first preceding day that is a
          business day, and will be the first following business day if it falls on
          a Sunday or a Monday.
      NONE:
        text: NONE
        description: The date will not be adjusted if it falls on a day that is not
          a business day.
      NotApplicable:
        text: NotApplicable
        description: The date adjustments conventions are defined elsewhere, so it
          is not required to specify them here.
  DayOfWeekEnum:
    name: DayOfWeekEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DayOfWeekEnum
    description: The enumerated values to specify a day of the seven-day week.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
