    - preconditions:
        slot_conditions:
          cashRatio:
            name: cashRatio
            required: true
      postconditions:
        slot_conditions:
          cashRatio:
            name: cashRatio
            minimum_value: 0
            maximum_value: 1
      description: The cash dividend payout ratio should be comprised between 0 and
        100%, meaning 0 and 1.
    - preconditions:
        slot_conditions:
          nonCashRatio:
            name: nonCashRatio
            required: true
      postconditions:
        slot_conditions:
          nonCashRatio:
            name: nonCashRatio
            minimum_value: 0
            maximum_value: 1
      description: The non cash dividend payout ratio should be comprised between
        0 and 100%, meaning 0 and 1.
  AdditionalFixedPayments:
