  CurrencyCodeEnum:
    name: CurrencyCodeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CurrencyCodeEnum
    description: Union of the enumerated values defined by the International Standards
      Organization (ISO) and the FpML nonISOCurrencyScheme which consists of offshore
      and historical currencies (https://www.fpml.org/coding-scheme/non-iso-currency),
      as of 28-Oct-2016.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CNH:
        text: CNH
        description: Offshore Chinese Yuan traded in Hong Kong.
      CNT:
        text: CNT
        description: Offshore Chinese Yuan traded in Taiwan.
      GGP:
        text: GGP
        description: Guernsey Pound.
      IMP:
        text: IMP
        description: Isle of Man Pound.
      JEP:
        text: JEP
        description: Jersey Pound.
      KID:
        text: KID
        description: Tuvaluan Dollar.
      MCF:
        text: MCF
        description: Monegasque Franc.
      SML:
        text: SML
        description: Sammarinese Lira.
      VAL:
        text: VAL
        description: Vatican Lira.
    inherits:
    - ISOCurrencyCodeEnum
  CollateralEntityTypeEnum:
    name: CollateralEntityTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralEntityTypeEnum
    description: Represents an enumeration list to identify the type of entity issuing
      or guaranteeing the collateral asset.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      SupraNational:
        text: SupraNational
        description: Specifies international organisations and multilateral banks,
          entities constituted by treaties or with multiple sovereign members includes
          Multilateral development Banks.
      SovereignCentralBank:
        text: SovereignCentralBank
        description: Specifies Sovereign, Government Debt Securities including Central
          Banks.
      QuasiGovernment:
        text: QuasiGovernment
        description: Specifies institutions or bodies, typically constituted by statute,
          with a function mandated by the government and subject to government supervision
          inclusive of profit- and non-profit making bodies. Includes the US Agencies
          and GSEs and the EU concept of public sector entities. Excluding any entities
          which are also Regional Government.
      RegionalGovernment:
        text: RegionalGovernment
        description: Specifies Regional Governments including states within countries,
          local authorities and municipalities.
      Corporate:
        text: Corporate
        description: Specifies corporate bodies including Banks.
      Fund:
        text: Fund
        description: Specifies a vehicle (with or without separate legal personality)
          designed for the purposes of collective investment towards a defined investment
          goal.
      SpecialPurposeVehicle:
        text: SpecialPurposeVehicle
        description: Specifies a vehicle setup for the purpose of acquisition and
          financing of specific assets on a limited recourse basis. E.g. asset backed
          securities, including securitisations.
  SupraNationalIssuerTypeEnum:
    name: SupraNationalIssuerTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SupraNationalIssuerTypeEnum
    description: Represents an enumeration list to identify the type of supranational
      entity issuing the asset.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      InternationalOrganisation:
        text: InternationalOrganisation
        description: Specifies International Financial Institution.
      MultilateralBank:
        text: MultilateralBank
        description: Specifies Multilateral Bank or Multilateral Development Bank.
  CreditRiskEnum:
    name: CreditRiskEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditRiskEnum
    description: Represents an enumeration list to identify tranched or untranched
      credit risk.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      TranchedCreditRisk:
        text: TranchedCreditRisk
        description: Indicates tranched credit risk, including securitizations.
      UntranchedCreditRisk:
        text: UntranchedCreditRisk
        description: Indicates tranched credit risk, including repackagings.
  SecurityTypeEnum:
    name: SecurityTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SecurityTypeEnum
    description: Represents an enumeration list to indentify the type of a security.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Debt:
        text: Debt
        description: Identifies a security as a fixed income security of debt issued
          and securitized as a tradable asset.
      Equity:
        text: Equity
        description: Identifies a security as an Equity value of holding of shares
          in listed company.
      Fund:
        text: Fund
        description: Identifies a security as representing holding in an investment
          fund.
      Warrant:
        text: Warrant
        description: "Identifies a security as a Warrant that give the right, but\
          \ not the obligation, to buy or sell a security \u2014 most commonly an\
          \ equity \u2014 at a certain price before expiration, or to receive the\
          \ cash equivalent."
      Certificate:
        text: Certificate
        description: Identifies a security as one that that offers a derivative-based
          economic return which is not structured as a bond, an equity or a warrant.
          Note that this security type is not a Certificate of Deposit (aka CD).
  PutCallEnum:
    name: PutCallEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PutCallEnum
    description: The enumerated values to specify the types of listed derivative options.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Put:
        text: Put
        description: A put option gives the holder the right to sell the underlying
          asset by a certain date for a certain price.
      Call:
        text: Call
        description: A call option gives the holder the right to buy the underlying
          asset by a certain date for a certain price.
  EquityTypeEnum:
    name: EquityTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/EquityTypeEnum
    description: Represents an enumeration list to identify the type of Equity.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Ordinary:
        text: Ordinary
        description: Identifies an Equity of Common stocks and shares.
      NonConvertiblePreference:
        text: NonConvertiblePreference
        description: Identifies an Equity of Non-Convertible Preference, Shares which
          hold priority to receive capital return in event of issuer liquidation.
      DepositaryReceipt:
        text: DepositaryReceipt
        description: Identifies a negotiable depositary receipt certificate issued
          by a bank representing shares in a foreign company traded on a local stock
          exchange.
      ConvertiblePreference:
        text: ConvertiblePreference
        description: Identifies an Equity of Convertible Preference, a stock which
          can be converted into a predetermined number of common shares and holds
          priority to receive capital return in event of issuer liquidation.
  DepositaryReceiptTypeEnum:
    name: DepositaryReceiptTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DepositaryReceiptTypeEnum
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      ADR:
        text: ADR
        description: American Depositary Receipts. Identifies a depositary receipt
          that are issued only by U.S. banks for foreign stocks that are traded on
          a U.S. exchange.
      GDR:
        text: GDR
        description: Global Depositary Receipts. Identifies a depositary receipt that
          is listed on European and other international exchanges.
      IDR:
        text: IDR
        description: Indian Depositary Receipts. Identifies a depositary receipt that
          are issued only by domestic depositories for foreign stocks that are traded
          on an Indian exchange.
      EDR:
        text: EDR
        description: European Depositary Receipts. Identifies a depositary receipt
          that are issued only by European banks for foreign stocks that are traded
          on a European exchange.
  FundProductTypeEnum:
    name: FundProductTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FundProductTypeEnum
    description: Represents an enumeration list to identify the fund product type.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      MoneyMarketFund:
        text: MoneyMarketFund
        description: Denotes a fund that invests only in highly liquid near-term instruments
          such as cash, cash equivalent securities, and high credit rating debt instruments
          with a short-term maturity.
      ExchangeTradedFund:
        text: ExchangeTradedFund
        description: Denotes an investment fund consisting of stocks, bonds, and/or
          other assets that is passively managed and traded on a stock exchange.
      MutualFund:
        text: MutualFund
        description: Denotes an investment fund consisting of stocks, bonds, and/or
          other assets that is actively managed and can only be purchased or sold
          through the investment manager.
      OtherFund:
        text: OtherFund
        description: Denotes a fund that is not an Exchange Traded Fund, Money Market
          Fund or Mutual Fund.
  MaturityTypeEnum:
    name: MaturityTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MaturityTypeEnum
    description: Represents an enumeration list to identify the Maturity.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      RemainingMaturity:
        text: RemainingMaturity
        description: Denotes a period from now until maturity date.
      OriginalMaturity:
        text: OriginalMaturity
        description: Denotes a period from issuance until maturity date.
      FromIssuance:
        text: FromIssuance
        description: Denotes a period from issuance date until now.
  SecuredTypeEnum:
    name: SecuredTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SecuredTypeEnum
    description: Specifies the type of secured debt.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      AssetBacked:
        text: AssetBacked
        description: Debt instrument with periodic income payments and value derived
          from or backed by a specified pool of underlying assets.
      CollateralizedObligation:
        text: CollateralizedObligation
        description: Complex product that is backed by a pool of loans and other assets
          and sold to institutional investors.
      CoveredBonds:
        text: CoveredBonds
        description: Specifies a debt obligations issued by credit institutions which
          offer a so-called double-recourse protection to bondholders.
  AssetBackedEnum:
    name: AssetBackedEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetBackedEnum
    description: Specifies the underlying asset or asset pool securing an Asset Backed
      debt instrument.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      HomeEquity:
        text: HomeEquity
        description: When the asset(s) backing the debt are home equity loans, in
          which the borrower uses the equity of their home as collateral.
      AutoLoan:
        text: AutoLoan
        description: When the asset(s) backing the debt are auto loans.
      StudentLoan:
        text: StudentLoan
        description: When the asset(s) backing the debt are student loans.
      CreditCard:
        text: CreditCard
        description: When the asset(s) backing the debt are credit card loans.
      Property:
        text: Property
        description: When the asset(s) backing the debt are property, typically when
          the debt is a mortgage loan.
      Mortgage:
        text: Mortgage
        description: When the asset(s) backing the debt instrument is a pool of mortgage
          loans, e.g. for a mortgage backed security.
      Other:
        text: Other
        description: Any other asset which generates receivables for an Asset Backed
          Security.
  PropertyTypeEnum:
    name: PropertyTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PropertyTypeEnum
    description: Specifies different types of property.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Commercial:
        text: Commercial
        description: Commercial property.
      Residential:
        text: Residential
        description: Residential property.
  CollateralizedObligationEnum:
    name: CollateralizedObligationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CollateralizedObligationEnum
    description: Specifies the type of Collateralized Obligation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CDO:
        text: CDO
        description: Collateralized Debt Obligation.
      CMO:
        text: CMO
        description: Collateralized Mortgage Obligation.
      CLO:
        text: CLO
        description: Collateralized Loan Obligation.
      CBO:
        text: CBO
        description: Collateralized Bond Obligation.
  CoveredBondEnum:
    name: CoveredBondEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CoveredBondEnum
    description: Specifies the type of Covered Bond.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Pfandbriefe:
        text: Pfandbriefe
        description: German bank debenture collateralized by long-term assets.
      JumboPfandbriefe:
        text: JumboPfandbriefe
        description: Pfandbriefe with an issuing syndicate and a minimum issuance
          volume of EUR 1 billion.
  DebtSeniorityEnum:
    name: DebtSeniorityEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DebtSeniorityEnum
    description: Specifies the order of repayment in the event of a sale or bankruptcy
      of the issuer or a related party (eg guarantor).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Secured:
        text: Secured
        description: Denotes debt which is secured over assets of the issuer or a
          related party (eg guarantor).
      Senior:
        text: Senior
        description: Denotes debt  which ranks pari passu with all other unsecured
          creditors of the issuer.
      Subordinated:
        text: Subordinated
        description: Denotes debt  owed to an unsecured creditor that in the event
          of a liquidation can only be paid after the claims of secured and senior
          creditors have been met.
  DebtInterestEnum:
    name: DebtInterestEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DebtInterestEnum
    description: Represents an enumeration list that specifies the general rule for
      periodic interest rate payment.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Fixed:
        text: Fixed
        description: Denotes payment calculated with reference to a fixed interest
          rate.
      Floating:
        text: Floating
        description: Denotes payment calculated with reference to a floating interest
          rate.
      InflationLinked:
        text: InflationLinked
        description: Denotes payment calculated with reference to one or more specified
          inflation rates.
      IndexLinked:
        text: IndexLinked
        description: Denotes payment calculated with reference to one or more price
          or other indices (other than inflation rates).
      InterestOnly:
        text: InterestOnly
        description: Denotes a stripped bond representing only the interest component.
      OtherStructured:
        text: OtherStructured
        description: Denotes payment calculated with reference to other underlyings
          (not being floating interest rates, inflation rates or indices) or with
          a non-linear relationship to floating interest rates, inflation rates or
          indices.
      InverseFloating:
        text: InverseFloating
        description: Denotes payment calculated with reference to the inverse of a
          floating interest rate.
      ZeroCoupon:
        text: ZeroCoupon
        description: Denotes a zero coupon bond that does not pay intetrest.
  DebtPrincipalEnum:
    name: DebtPrincipalEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DebtPrincipalEnum
    description: Represents an enumeration list that specifies the general rule for
      repayment of principal.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Bullet:
        text: Bullet
        description: Denotes that the principal is paid all at once on maturity of
          the debt insrument. Bullet debt instruments cannot be redeemed early by
          an issuer, which means they are non-callable.
      Callable:
        text: Callable
        description: Denotes that the principal on the debt can be repaid early, in
          whole or in part, at the option of the issuer.
      Puttable:
        text: Puttable
        description: Denotes that the principal on the debt can be repaid early, in
          whole or in part, at the option of the holder.
      Amortising:
        text: Amortising
        description: Denotes that the principal on the debt is paid down regularly,
          along with its interest expense over the life of the debt instrument.  Includes
          amortising instruments with a bullet balance repayment at maturity.
      InflationLinked:
        text: InflationLinked
        description: Denotes that the principal on the debt is calculated with reference
          to one or more specified inflation rates.
      IndexLinked:
        text: IndexLinked
        description: Denotes that the  principal on the debt is calculated with reference
          to one or more price or other indices (other than inflation rates).
      OtherStructured:
        text: OtherStructured
        description: Denotes that the  principal on the debt is calculated with reference
          to other underlyings (not being floating interest rates, inflation rates
          or indices) or with a non-linear relationship to floating interest rates,
          inflation rates or indices.
      PrincipalOnly:
        text: PrincipalOnly
        description: Denotes a stripped bond representing only the principal component.
  RedemptionTypeEnum:
    name: RedemptionTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RedemptionTypeEnum
    description: Specifies the contractual redemption or conversion features associated
      with a debt security.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Convertible:
        text: Convertible
        description: Specifies a debt instrument that can be converted into common
          shares.
      Exchangeable:
        text: Exchangeable
        description: Specifies a debt security that can be converted to equity in
          a company other than the issuing company.
      ContingentConvertible:
        text: ContingentConvertible
        description: Specifies a debt security that can be converted into equity if
          a pre-defined trigger event occurs.
      Sinkable:
        text: Sinkable
        description: Specifies a debt security that requires the issuer to periodically
          set aside money to buy back portions of the debt.
      Extraordinary:
        text: Extraordinary
        description: Specifies a debt security that can be redeemed early if certain
          extraordinary events occur.
  RedemptionPartyEnum:
    name: RedemptionPartyEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RedemptionPartyEnum
    description: Specifies the redeeming party of a debt security.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Holder:
        text: Holder
        description: Specifies the holder of a debt security.
      Issuer:
        text: Issuer
        description: Specifies the issuer of a debt security.
  AssetTypeEnum:
    name: AssetTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AssetTypeEnum
    description: Represents an enumeration list to identify the asset type.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      Security:
        text: Security
        description: Identifies negotiable financial instrument of monetary value
          with an issue ownership position.
      Cash:
        text: Cash
        description: Identifies cash in a currency form.
      Commodity:
        text: Commodity
        description: Identifies basic good used in commerce that is interchangeable
          with other goods of the same type.
      ListedDerivative:
        text: ListedDerivative
        description: Identifies an asset as a listed derivative on an exchange.
      Loan:
        text: Loan
        description: An asset that represents a loan or borrow obligation.
      LetterOfCredit:
        text: LetterOfCredit
        description: Identifies an asset as a letter of credit or documentary credit/
          bankers commercial credit.  A payment mechanism used in international trade
          to provide economic guarantee of payment by a creditworthy issuer for payment
          of exported goods.
      Other:
        text: Other
        description: Identifies other asset types.
  MoneyMarketTypeEnum:
    name: MoneyMarketTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MoneyMarketTypeEnum
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CommercialPaper:
        text: CommercialPaper
      CertificateOfDeposit:
        text: CertificateOfDeposit
  DeliveryNearbyTypeEnum:
    name: DeliveryNearbyTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeliveryNearbyTypeEnum
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    permissible_values:
      CalculationPeriod:
        text: CalculationPeriod
        description: Describes the reference contract as the one that pertains to
          the month-year of the calculation period. If used, the nearby count is expected
          to be 0.
      NearbyMonth:
        text: NearbyMonth
        description: Specifies that the reference delivery date of the underlying
          Commodity shall be the expiration date of the futures contract in the nth
          nearby month.
      NearbyWeek:
        text: NearbyWeek
        description: Specifies that the reference delivery date of the underlying
          Commodity shall be the expiration date of the futures contract in the nth
          nearby week.
