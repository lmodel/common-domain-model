      fxHaircutPercentage:
        name: fxHaircutPercentage
        description: Specifies an FX haircut applied to a specific asset which is
          agreed between the parties (for example, if pledgor eligible collateral
          is not denominated in the termination currency or under other specified
          cases in collateral support documents both for initial margin and variation
          margin).The percentage value is expressed as the discount haircut to the
          value of the collateral- as an example an 8% FX haircut would be expressed
          as 0.08.
      additionalHaircutPercentage:
        name: additionalHaircutPercentage
        description: 'Specifies a percentage value of any additional haircut to be
          applied to a collateral asset,the percentage value is expressed as the discount
          haircut to the value of the collateral- as an example a 5% haircut would
          be expressed as 0.05. '
    class_uri: common_domain_model:CollateralValuationTreatment
    rules:
    - preconditions:
        slot_conditions:
          haircutPercentage:
            name: haircutPercentage
            required: true
      postconditions:
        slot_conditions:
          haircutPercentage:
            name: haircutPercentage
            minimum_value: 0
            maximum_value: 1
      description: A data rule to validate that if a Valuation Percentage is specified
        it should be greater than or equal to 0 and less than 1.
    - preconditions:
        slot_conditions:
          marginPercentage:
            name: marginPercentage
            required: true
      postconditions:
        slot_conditions:
          marginPercentage:
            name: marginPercentage
            minimum_value: 1
      description: A data rule to validate that if a Margin Percentage is specified
        it should be greater than 1.
    - preconditions:
        slot_conditions:
          fxHaircutPercentage:
            name: fxHaircutPercentage
            required: true
      postconditions:
        slot_conditions:
          fxHaircutPercentage:
            name: fxHaircutPercentage
            minimum_value: 0
            maximum_value: 1
      description: A data rule to validate that if an FX Haircut Percentage is specified
        it should be between 0 and less than 1.
    - preconditions:
        slot_conditions:
          additionalHaircutPercentage:
            name: additionalHaircutPercentage
            required: true
      postconditions:
        slot_conditions:
          additionalHaircutPercentage:
            name: additionalHaircutPercentage
            minimum_value: 0
            maximum_value: 1
      description: A data rule to validate that if an FX Haircut Percentage is specified
        it should be between 0 and  less than 1.
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            haircutPercentage:
              name: haircutPercentage
              required: true
        - slot_conditions:
            marginPercentage:
              name: marginPercentage
              required: true
      description: Choice rule requiring that either a haircut percentage or margin
        percentage is specified.
  EligibleCollateralSpecification:
    name: EligibleCollateralSpecification
    definition_uri: https://w3id.org/lmodel/common_domain_model/EligibleCollateralSpecification
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"CloneEligibleCollateralWithChangedTreatment","description":"Creates
          a new Eligible Collateral Specification based on an input specification
          but with one changed criteria and with one changed treatment.","inputs":[{"name":"inputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"changedCriteria","type":"CollateralCriteria","cardinality":"1..1"},{"name":"changedTreatment","type":"CollateralTreatment","cardinality":"1..1"}],"output":{"name":"outputSpecification","type":"EligibleCollateralSpecification","cardinality":"1..1"}},{"name":"CheckEligibilityForProduct","inputs":[{"name":"specifications","type":"EligibleCollateralSpecification","cardinality":"1..*"},{"name":"product","type":"TransferableProduct","cardinality":"0..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"0..1"},"code_implementation":true},{"name":"CheckEligibilityByDetails","description":"This
          function when presented with a set of Asset and Issuer details to be potentially
          posted as collateral, will check against a set of given Eligibility Criteria
          or Basket (EligibleCollateralSpecification) to determine which collateral
          meets the eligibility and can be used/posted for delivery.","inputs":[{"name":"specification","type":"EligibleCollateralSpecification","cardinality":"1..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"eligibilityResult","type":"CheckEligibilityResult","cardinality":"1..1"}}]'
    description: Represents a set of criteria used to specify eligible collateral.
    comments:
    - "Rosetta func: CloneEligibleCollateralWithChangedTreatment \u2014 Creates a\
      \ new Eligible Collateral Specification based on an input specification but\
      \ with one changed criteria and with one changed treatment."
    - 'Rosetta func: CheckEligibilityForProduct'
    - "Rosetta func: CheckEligibilityByDetails \u2014 This function when presented\
      \ with a set of Asset and Issuer details to be potentially posted as collateral,\
      \ will check against a set of given Eligibility Criteria or Basket (EligibleCollateralSpecification)\
      \ to determine which collateral meets the eligibility and can be used/posted\
      \ for delivery."
    in_subset:
    - cdm_product_collateral
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - common_domain_model:EligibleCollateralSpecification
    slots:
    - EligibleCollateralSpecification_identifier
    - EligibleCollateralSpecification_party
    - EligibleCollateralSpecification_counterparty
    - EligibleCollateralSpecification_criteria
    - EligibleCollateralSpecification_partyRole
    slot_usage:
      identifier:
        name: identifier
        description: Specifies the identifier(s) to uniquely identify eligible collateral
          or a set of eligible collateral, such as a schedule or equivalant for an
          identity issuer.
        range: Identifier
        required: false
        inlined_as_list: true
      party:
        name: party
        description: The parties associated with the specification.
        range: Party
        multivalued: true
      counterparty:
        name: counterparty
        description: Specification of the roles of the counterparties to the specification.
        required: false
      criteria:
        name: criteria
        description: Represents a set of criteria used to specify eligible collateral.
        range: EligibleCollateralCriteria
        required: true
        multivalued: true
      partyRole:
        name: partyRole
        description: Specifies the role(s) that each of the party(s) is playing in
          the context of the specification, eg Payor or Receiver.
        multivalued: true
    class_uri: common_domain_model:EligibleCollateralSpecification
    tree_root: true
