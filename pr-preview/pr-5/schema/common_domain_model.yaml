        description: Denotes a value as the Index price reported in or by the relevant
          Price Source as specified in the relevant Confirmation.
      MeanOfBidAndAsk:
        text: MeanOfBidAndAsk
        description: Denotes a value as the Average of the Bid and Ask prices reported
          in or by the relevant Price Source as specified in the relevant Confirmation.
      LocationalMarginal:
        text: LocationalMarginal
        description: Denotes a value as the Locational Marginal price reported in
          or by the relevant Price Source as specified in the relevant Confirmation.
      Low:
        text: Low
        description: Denotes a value as the Low price reported in or by the relevant
          Price Source as specified in the relevant Confirmation.
      MarginalHourly:
        text: MarginalHourly
        description: Denotes a value as the Marginal Hourly price reported in or by
          the relevant Price Source as specified in the relevant Confirmation.
      MarketClearing:
        text: MarketClearing
        description: Denotes a value as the Market Clearing price reported in or by
          the relevant Price Source as specified in the relevant Confirmation.
      MeanOfHighAndLow:
        text: MeanOfHighAndLow
        description: Denotes a value as the Average of the High and Low prices reported
          in or by the relevant Price Source as specified in the relevant Confirmation.
      Morning:
        text: Morning
        description: Denotes a value as the Morning fixing reported in or by the relevant
          Price Source as specified in the relevant Confirmation.
      Official:
        text: Official
        description: Denotes a value as the Official price reported in or by the relevant
