  CreditIndex:
    name: CreditIndex
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditIndex
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Specification of an index based on credit risk, typically composed
      using corporate debt instruments in a region or industry sector, e.g. the iTraxx
      indices.
    comments:
    - "Rosetta condition: IndexSeries \u2014 if indexSeries exists then indexSeries\
      \ >= 0"
    - "Rosetta condition: IndexAnnexVersion \u2014 if indexAnnexVersion exists then\
      \ indexAnnexVersion >= 0"
    - "Rosetta condition: IndexFactor \u2014 if indexFactor exists then indexFactor\
      \ >= 0 and indexFactor <= 1"
    - "Rosetta condition: CreditAssetClass \u2014 assetClass = AssetClassEnum -> Credit"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:CreditIndex
    is_a: IndexBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    - IndexBase_name
    - provider
    - IndexBase_assetClass
    - indexSeries
    - indexAnnexVersion
    - indexAnnexDate
    - indexAnnexSource
    - excludedReferenceEntity
    - CreditIndex_tranche
    - settledEntityMatrix
    - indexFactor
    - CreditIndex_seniority
    slot_usage:
      tranche:
        name: tranche
        description: This element contains CDS tranche terms.
        range: Tranche
      seniority:
        name: seniority
        description: Seniority of debt instruments comprising the index.
        range: CreditSeniorityEnum
    class_uri: common_domain_model:CreditIndex
    rules:
    - preconditions:
        slot_conditions:
          indexSeries:
            name: indexSeries
            required: true
      postconditions:
        slot_conditions:
          indexSeries:
            name: indexSeries
            minimum_value: 0
      description: FpML specifies the type associated to indexSeries as a positive
        integer.
    - preconditions:
        slot_conditions:
          indexAnnexVersion:
            name: indexAnnexVersion
            required: true
      postconditions:
        slot_conditions:
          indexAnnexVersion:
            name: indexAnnexVersion
            minimum_value: 0
      description: FpML specifies the type associated to indexVersion as a positive
        integer.
    - preconditions:
        slot_conditions:
          indexFactor:
            name: indexFactor
            required: true
      postconditions:
        slot_conditions:
          indexFactor:
            name: indexFactor
            minimum_value: 0
            maximum_value: 1
      description: Index factor is expressed as a decimal and should be a positive
        number between o and 1.
  EquityIndex:
    name: EquityIndex
    definition_uri: https://w3id.org/lmodel/common_domain_model/EquityIndex
