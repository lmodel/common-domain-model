  ApplicabilityOfElectionEnum:
    name: ApplicabilityOfElectionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ApplicabilityOfElectionEnum
    description: The potential options for specifying whether a particular election
      applies in a GMSLA.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    permissible_values:
      Applicable:
        text: Applicable
        description: The election is applicable.
      NotApplicable:
        text: NotApplicable
        description: The election is not applicable.
      NotSpecified:
        text: NotSpecified
        description: The applicability of the election has not been specified.
  AggregationSpecificationEnum:
    name: AggregationSpecificationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/AggregationSpecificationEnum
    description: The potential options for specifying whether mark to market value
      of collateral is determined on an aggregated or loan by loan basis.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master_isla
    permissible_values:
      Aggregated:
        text: Aggregated
        description: The market value is determined on an aggregated basis.
      LoanByLoan:
        text: LoanByLoan
        description: The market value is determined on a loan by loan basis.
      AggregatedAndLoanByLoan:
        text: AggregatedAndLoanByLoan
        description: The market value is determined on an aggregated basis for some
          loans but on a Loan by Loan basis for others.
      NotSpecified:
        text: NotSpecified
        description: It is not specified how the market value is determined.
