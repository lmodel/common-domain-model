    description: Describes the resource that contains the media representation of
      a business event (i.e used for stating the Publicly Available Information).
      For example, can describe a file or a URL that represents the event. This type
      is an extended version of a type defined by RIXML (www.rixml.org).  Rosetta
      restricts the FpML implementation by not providing the ability to associated
      a document in hexadecimalBinary or base64Binary until such time that actual
      use cases will come up.
    comments:
    - "Rosetta condition: ResourceChoice \u2014 optional choice string, url"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:Resource
    slots:
    - resourceId
    - resourceType
    - language
    - sizeInBytes
    - length
    - mimeType
    - Resource_name
    - comments
    - string
    - url
    slot_usage:
      name:
        name: name
        description: The name of the resource.  It is specified as a NormalizedString
          in FpML.
    class_uri: common_domain_model:Resource
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            string:
              name: string
              required: true
        - slot_conditions:
            url:
              name: url
              required: true
      description: Choice rule to represent an FpML choice construct. Note that FpML
        also provides the ability to have hexadecimalBinary or base64Binary, which
        have not been implemented in Rosetta until we see actual use cases.
  ResourceLength:
    name: ResourceLength
    definition_uri: https://w3id.org/lmodel/common_domain_model/ResourceLength
    description: A class to indicate the length of the resource.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:ResourceLength
    slots:
    - lengthUnit
    - lengthValue
    class_uri: common_domain_model:ResourceLength
  AgreementTerms:
    name: AgreementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/AgreementTerms
    description: Specification of the content of a legal agreement.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:AgreementTerms
    close_mappings:
    - fpml_5_10:AgreementTerms
    slots:
    - agreement
    - clauseLibrary
    - AgreementTerms_counterparty
    slot_usage:
      counterparty:
        name: counterparty
        description: Specification of the roles of the counterparties to the agreement.
    class_uri: common_domain_model:AgreementTerms
  LegalAgreement:
    name: LegalAgreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegalAgreement
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: The specification of a legal agreement between two parties, being
      negotiated or having been executed. This includes the baseline information and
      the optional specialised elections
    comments:
    - "Rosetta condition: ConsistentlyExecutedAgreements \u2014 if relatedAgreements\
      \ exists and agreementDate exists then relatedAgreements -> agreementDate exists"
    - "Rosetta condition: AgreementVerification \u2014 if agreementTerms -> agreement\
      \ -> securityAgreementElections exists then legalAgreementIdentification ->\
      \ agreementName -> agreementType = LegalAgreementTypeEnum -> SecurityAgreement\
      \ else if agreementTerms -> agreement -> creditSupportAgreementElections exists\
      \ then legalAgreementIdentification -> agreementName -> creditSupportAgreementType\
      \ = CreditSupportAgreementTypeEnum -> CreditSupportAnnex or legalAgreementIdentification\
      \ -> agreementName -> creditSupportAgreementType = CreditSupportAgreementTypeEnum\
      \ -> CreditSupportDeed else if agreementTerms -> agreement -> collateralTransferAgreementElections\
      \ exists then legalAgreementIdentification -> agreementName -> creditSupportAgreementType\
      \ = CreditSupportAgreementTypeEnum -> CollateralTransferAgreement else if agreementTerms\
      \ -> agreement -> masterAgreementSchedule exists then legalAgreementIdentification\
      \ -> agreementName -> agreementType = LegalAgreementTypeEnum -> MasterAgreement"
    - "Rosetta condition: AgreementType \u2014 required choice agreementTerms, umbrellaAgreement"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:LegalAgreement
    is_a: LegalAgreementBase
    slots:
    - agreementDate
    - LegalAgreementBase_effectiveDate
    - LegalAgreementBase_identifier
    - legalAgreementIdentification
    - contractualParty
    - otherParty
    - attachment
    - agreementTerms
    - relatedAgreements
    - umbrellaAgreement
    class_uri: common_domain_model:LegalAgreement
    tree_root: true
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            agreementTerms:
              name: agreementTerms
              required: true
        - slot_conditions:
            umbrellaAgreement:
              name: umbrellaAgreement
              required: true
      description: Either the Agreement Terms (i.e. a bilateral or one way agreement)
        or an Umbrella Agreement (i.e. an agreement where multiple parties and variations
        of terms are described within a single document but represent multiple agreements
        for operational purposes) should be included, but not both.
  LegalAgreementBase:
    name: LegalAgreementBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegalAgreementBase
    description: Specifies the legal agreement baseline information, being negotiated
      or having been executed. It excludes specialized elections
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:LegalAgreementBase
    slots:
    - agreementDate
    - LegalAgreementBase_effectiveDate
    - LegalAgreementBase_identifier
    - legalAgreementIdentification
    - contractualParty
    - otherParty
    - attachment
    slot_usage:
      effectiveDate:
        name: effectiveDate
        description: The date on which, or as of which, the agreement is effective,
          if different from the agreement date. It is expected that it will most often
          correspond to the agreement date, although there could be situations where
          the parties will explicitly agree on a distinct effective date.
      identifier:
        name: identifier
        description: The legal agreement identifier. Several identifiers can be specified.
        range: Identifier
        required: false
        inlined_as_list: true
    class_uri: common_domain_model:LegalAgreementBase
  LegalAgreementIdentification:
    name: LegalAgreementIdentification
    definition_uri: https://w3id.org/lmodel/common_domain_model/LegalAgreementIdentification
    description: 'Specifies the type of legal agreement, identified via a set of composable
      attributes: agreementName, publisher, governing law and version, e.g. ISDA 2013
      Standard Credit Support Annex English Law.'
    comments:
    - "Rosetta condition: CSAMarginType \u2014 if agreementName -> creditSupportAgreementMarginType\
      \ exists then agreementName -> creditSupportAgreementType exists and vintage\
      \ >= 2016"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:LegalAgreementIdentification
    slots:
    - LegalAgreementIdentification_governingLaw
    - agreementName
    - publisher
    - vintage
    slot_usage:
      governingLaw:
        name: governingLaw
        description: The law governing the legal agreement, e.g. English Law, New
          York Law or Japanese Law.
    class_uri: common_domain_model:LegalAgreementIdentification
  AgreementName:
    name: AgreementName
    definition_uri: https://w3id.org/lmodel/common_domain_model/AgreementName
    description: Specifies the agreement name through an agreement type and optional
      detailed sub agreement type.
    comments:
    - "Rosetta condition: AgreementType \u2014 if agreementType <> LegalAgreementTypeEnum\
      \ -> Other then otherAgreement is absent else if agreementType <> LegalAgreementTypeEnum\
      \ -> MasterAgreement then masterAgreementType is absent else if agreementType\
      \ <> LegalAgreementTypeEnum -> MasterConfirmation then masterConfirmationType\
      \ is absent and masterConfirmationAnnexType is absent else if agreementType\
      \ <> LegalAgreementTypeEnum -> Confirmation then contractualDefinitionsType\
      \ is absent and contractualTermsSupplement is absent and contractualMatrix is\
      \ absent"
    - "Rosetta condition: CreditSupportAgreement \u2014 if agreementType = LegalAgreementTypeEnum\
      \ -> CreditSupportAgreement then creditSupportAgreementType exists"
    - "Rosetta condition: MasterConfirmation \u2014 if masterConfirmationAnnexType\
      \ exists then masterConfirmationType exists"
    - "Rosetta condition: CSAMarginType \u2014 if creditSupportAgreementMarginType\
      \ exists then creditSupportAgreementType exists"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:AgreementName
    close_mappings:
    - fpml_5_10:AgreementName
    slots:
    - agreementType
    - creditSupportAgreementType
    - creditSupportAgreementMarginType
    - contractualDefinitionsType
    - contractualTermsSupplement
    - contractualMatrix
    - masterAgreementType
    - masterConfirmationType
    - masterConfirmationAnnexType
    - otherAgreement
    - brokerConfirmationType
    class_uri: common_domain_model:AgreementName
    rules:
    - preconditions:
        slot_conditions:
          agreementType:
            name: agreementType
            equals_string: CreditSupportAgreement
      postconditions:
        slot_conditions:
          creditSupportAgreementType:
            name: creditSupportAgreementType
            required: true
      description: A condition to ensure that the credit supoort agreement type is
        specified when required.
    - preconditions:
        slot_conditions:
          masterConfirmationAnnexType:
            name: masterConfirmationAnnexType
            required: true
      postconditions:
        slot_conditions:
          masterConfirmationType:
            name: masterConfirmationType
            required: true
      description: If a master confirmation annex type is specified a master confirmation
        type must exist.
    - preconditions:
        slot_conditions:
          creditSupportAgreementMarginType:
            name: creditSupportAgreementMarginType
            required: true
      postconditions:
        slot_conditions:
          creditSupportAgreementType:
            name: creditSupportAgreementType
            required: true
      description: A condition to ensure that CSA margin type is only specified if
        a credit support agreemnt type is specified.
  UmbrellaAgreement:
    name: UmbrellaAgreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/UmbrellaAgreement
    description: Specifies the set of agreements, the parties of which are set within
      UmbrellaAgreementSet, beyond the two contracting parties to that agreement.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:UmbrellaAgreement
    slots:
    - agreementSet
    class_uri: common_domain_model:UmbrellaAgreement
  UmbrellaAgreementParty:
    name: UmbrellaAgreementParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/UmbrellaAgreementParty
    description: Specifies the entities that are part of the umbrella agreement.
    comments:
    - "Rosetta condition: ParentParty \u2014 if partyRole = UmbrellaPartyRoleEnum\
      \ -> Sleeve then parentParty exists"
    - "Rosetta condition: UmbrellaParty \u2014 required choice party, nonLegalEntity"
    - "Rosetta condition: NonLegalEntityParent \u2014 if nonLegalEntity exists then\
      \ parentParty exists"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:UmbrellaAgreementParty
    slots:
    - UmbrellaAgreementParty_party
    - actingAs
    - UmbrellaAgreementParty_partyRole
    - nonLegalEntity
    - parentParty
    slot_usage:
      party:
        name: party
        description: Specifies the party to the umbrella agreement
        range: Party
      partyRole:
        name: partyRole
        description: Represents the legal role that each defined entity to the agreement
          performs within the structure of that agreement.
        range: UmbrellaPartyRoleEnum
    class_uri: common_domain_model:UmbrellaAgreementParty
    rules:
    - preconditions:
        slot_conditions:
          partyRole:
            name: partyRole
            equals_string: Sleeve
      postconditions:
        slot_conditions:
          parentParty:
            name: parentParty
            required: true
      description: Specifies that certain defined roles require that a parent party
        is identified.
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            party:
              name: party
              required: true
        - slot_conditions:
            nonLegalEntity:
              name: nonLegalEntity
              required: true
      description: Only a Party or a non-Legal entity can be set.
    - preconditions:
        slot_conditions:
          nonLegalEntity:
            name: nonLegalEntity
            required: true
      postconditions:
        slot_conditions:
          parentParty:
            name: parentParty
            required: true
      description: Non-Legal entity must have a Parent Party.
  NonLegalEntity:
    name: NonLegalEntity
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonLegalEntity
    description: Specifies a non-legal entity that exists in the agreement with a
      defined relationship to a Legal entity to the agreement
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:NonLegalEntity
    slots:
    - NonLegalEntity_identifier
    - NonLegalEntity_identifierType
    slot_usage:
      identifier:
        name: identifier
        description: Specifies the unique identifier value for a non-legal entity
          such as a sleeve, or sub account, that is a party to the agreement and has
          a relationship with a legal entity defined on the agreement.
        range: string
        multivalued: false
      identifierType:
        name: identifierType
        description: Specifies the Identifier type for a non-Legal entity to the agreement,
          for example the use of an alert code to uniquely identify a non-Legal entity.
        range: string
    class_uri: common_domain_model:NonLegalEntity
  UmbrellaAgreementSet:
    name: UmbrellaAgreementSet
    definition_uri: https://w3id.org/lmodel/common_domain_model/UmbrellaAgreementSet
    description: Represents the groups of agreement term elections that exist within
      the agreement and to which entities that particular group of elections apply.
      Where all entities under the umbrella have the same set of elections only one
      agreement set will exist. At least one agreement set must be defined for an
      Umbrella agreement
    comments:
    - "Rosetta condition: ExcludeGMSLA \u2014 agreement -> masterAgreementElections\
      \ -> islaGmsla is absent"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:UmbrellaAgreementSet
    slots:
    - agreement
    - UmbrellaAgreementSet_party
    - additionalLanguage
    slot_usage:
      party:
        name: party
        description: Specifies the underlying parties to the agreement that either
          act as legal parties to the agreement or represent legal constructs that
          are managed by a party to the agreement but do not represent a Legal Entity
          as of themselves.
        range: UmbrellaAgreementParty
        required: true
        multivalued: true
    class_uri: common_domain_model:UmbrellaAgreementSet
  ContactInformationElection:
    name: ContactInformationElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/ContactInformationElection
    description: Specifies the party reference and the associated contact information.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:ContactInformationElection
    slots:
    - ContactInformationElection_partyReference
    - primaryContactInformation
    slot_usage:
      partyReference:
        name: partyReference
        description: The party to which the election and details apply.
        range: CounterpartyRoleEnum
    class_uri: common_domain_model:ContactInformationElection
  NoticeInformationElection:
    name: NoticeInformationElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/NoticeInformationElection
    description: Specifies the party reference and the associated notice and contact
      information.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:NoticeInformationElection
    is_a: ContactInformationElection
    slots:
    - ContactInformationElection_partyReference
    - primaryContactInformation
    - additionalContactInformation
    class_uri: common_domain_model:NoticeInformationElection
  NoticeContactInformation:
    name: NoticeContactInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/NoticeContactInformation
    description: Specifies notice information including address and, optionally, an
      associated person. This type also supports the ISDA CSA representation as a
      single string, through the address attribute in Contact Information.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:NoticeContactInformation
    is_a: ContactInformation
    slots:
    - telephone
    - address
    - email
    - webPage
    - naturalPerson
    - additionalInformation
    class_uri: common_domain_model:NoticeContactInformation
  TransferInformationElection:
    name: TransferInformationElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferInformationElection
    description: Specifies the party reference and the associated transfer & contact
      information.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:TransferInformationElection
    is_a: ContactInformationElection
    slots:
    - ContactInformationElection_partyReference
    - primaryContactInformation
    class_uri: common_domain_model:TransferInformationElection
  TransferContactInformation:
    name: TransferContactInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransferContactInformation
    description: Specifies transfer information including address and, optionally,
      an associated account. This type also supports the ISDA CSA representation as
      a single string, through the address attribute in Contact Information.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:TransferContactInformation
    is_a: ContactInformation
    slots:
    - telephone
    - address
    - email
    - webPage
    - TransferContactInformation_account
    - TransferContactInformation_additionalInformation
    slot_usage:
      account:
        name: account
        description: Specifies the account infomation for transfers to a party.
        multivalued: true
      additionalInformation:
        name: additionalInformation
        description: Additional transfer information.
    class_uri: common_domain_model:TransferContactInformation
  OtherAgreementTerms:
    name: OtherAgreementTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/OtherAgreementTerms
    description: 'A class to specify a related legal agreement. For example, ISDA
      2016 Credit Support Annex for Initial Margin, paragraph 13, General Principles,
      (s): Other CSA and Japanese Law CSA (VM). | ISDA 2016 Credit Support Annex for
      Variation Margin, paragraph 13, (o): Other CSA.'
    comments:
    - "Rosetta condition: LegalDocumentNotSpecified \u2014 if isSpecified = False\
      \ then legalDocument is absent"
    - "Rosetta condition: LegalDocumentSpecified \u2014 if isSpecified = True then\
      \ legalDocument exists"
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:OtherAgreementTerms
    slots:
    - isSpecified
    - legalDocument
    class_uri: common_domain_model:OtherAgreementTerms
    rules:
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'False'
      postconditions:
        slot_conditions:
          legalDocument:
            name: legalDocument
            required: false
      description: A data rule to enforce that the related legal agreement should
        not be referenced if it is deemed as not specified as part of the boolean
        attribute.
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'True'
      postconditions:
        slot_conditions:
          legalDocument:
            name: legalDocument
            required: true
      description: A data rule to enforce that the related legal agreement should
        be referenced if it is deemed as specified as part of the boolean attribute.
  Agreement:
    name: Agreement
    definition_uri: https://w3id.org/lmodel/common_domain_model/Agreement
    description: Specification of the standard set of terms that define a legal agreement.
    in_subset:
    - cdm_legaldocumentation_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_common
    exact_mappings:
    - common_domain_model:Agreement
    - gist:Agreement
    close_mappings:
    - fpml_5_10:Agreement
    slots:
    - creditSupportAgreementElections
    - collateralTransferAgreementElections
    - securityAgreementElections
    - masterAgreementSchedule
    - transactionAdditionalTerms
    - masterAgreementElections
    class_uri: common_domain_model:Agreement
  CreditSupportAgreementInitialMarginElections:
    name: CreditSupportAgreementInitialMarginElections
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportAgreementInitialMarginElections
    description: The set of elections which specify an Initial Margin Credit Support
      Annex or Deed.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportAgreementInitialMarginElections
    is_a: CreditSupportAgreementElectionsBase
    slots:
    - baseAndEligibleCurrency
    - conditionsPrecedent
    - substitution
    - disputeResolution
    - holdingAndUsingPostedCollateral
    - distributionAndInterestPayment
    - otherEligibleAndPostedSupport
    - demandsAndNotices
    - additionalRepresentations
    - masterAgreementDatedAsOfDate
    - finalReturns
    - regime
    - oneWayProvisions
    - generalSimmElections
    - identifiedCrossCurrencySwap
    - sensitivityMethodologies
    - fxHaircutCurrency
    - postingObligations
    - substitutedRegime
    - coveredTransactions
    - rightsEvents
    - custodyArrangements
    - otherAgreements
    - terminationCurrencyAmendment
    - minimumTransferAmountAmendment
    - interpretationTerms
    - processAgent
    - appropriatedCollateralValuation
    - jurisdictionRelatedTerms
    - additionalAmendments
    - additionalBespokeTerms
    - trustSchemeAddendum
    - clientAssetSourcebookAdditionalLanguage
    - creditSupportObligations
    - calculationAndTiming
    class_uri: common_domain_model:CreditSupportAgreementInitialMarginElections
  CreditSupportAgreementVariationMarginElections:
    name: CreditSupportAgreementVariationMarginElections
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportAgreementVariationMarginElections
    description: The set of elections which specify a Variation Margin Credit Support
      Annex or Deed.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportAgreementVariationMarginElections
    is_a: CreditSupportAgreementElectionsBase
    slots:
    - baseAndEligibleCurrency
    - conditionsPrecedent
    - substitution
    - disputeResolution
    - holdingAndUsingPostedCollateral
    - distributionAndInterestPayment
    - otherEligibleAndPostedSupport
    - demandsAndNotices
    - additionalRepresentations
    - masterAgreementDatedAsOfDate
    - finalReturns
    - fxHaircutCurrency
    - exchangeDate
    - CreditSupportAgreementVariationMarginElections_coveredTransactions
    - creditSupportOffsets
    - custodyArrangements
    - addressesForTransfer
    - otherAgreements
    - securityInterestForObligations
    - CreditSupportAgreementVariationMarginElections_creditSupportObligations
    - CreditSupportAgreementVariationMarginElections_calculationAndTiming
    slot_usage:
      coveredTransactions:
        name: coveredTransactions
        required: true
      creditSupportObligations:
        name: creditSupportObligations
        range: CreditSupportObligationsVariationMargin
      calculationAndTiming:
        name: calculationAndTiming
        range: CalculationAndTimingVariationMargin
    class_uri: common_domain_model:CreditSupportAgreementVariationMarginElections
  CreditSupportAgreementLegacyElections:
    name: CreditSupportAgreementLegacyElections
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSupportAgreementLegacyElections
    description: The set of elections which specify a Legacy (1994 or 1995) Credit
      Support Annex or Deed.
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:CreditSupportAgreementLegacyElections
    is_a: CreditSupportAgreementElectionsBase
    slots:
    - baseAndEligibleCurrency
    - conditionsPrecedent
    - substitution
    - disputeResolution
    - holdingAndUsingPostedCollateral
    - distributionAndInterestPayment
    - otherEligibleAndPostedSupport
    - demandsAndNotices
    - additionalRepresentations
    - masterAgreementDatedAsOfDate
    - finalReturns
    - exchangeDate
    - addressesForTransfer
    - CreditSupportAgreementLegacyElections_securityInterestForObligations
    - singlePostingParty
    - CreditSupportAgreementLegacyElections_creditSupportObligations
    - CreditSupportAgreementLegacyElections_calculationAndTiming
    slot_usage:
      securityInterestForObligations:
        name: securityInterestForObligations
        required: false
      creditSupportObligations:
        name: creditSupportObligations
        range: CreditSupportObligationsLegacy
      calculationAndTiming:
        name: calculationAndTiming
        range: CalculationAndTimingLegacy
    class_uri: common_domain_model:CreditSupportAgreementLegacyElections
  CreditSupportAgreementElectionsBase:
    name: CreditSupportAgreementElectionsBase
