  bankruptcy:
    name: bankruptcy
    definition_uri: https://w3id.org/lmodel/common_domain_model/bankruptcy
    description: 'A credit event. The reference entity has been dissolved or has become
      insolvent. It also covers events that may be a precursor to insolvency such
      as instigation of bankruptcy or insolvency proceedings. Sovereign trades are
      not subject to Bankruptcy as ''technically'' a Sovereign cannot become bankrupt.
      ISDA 2003 Term: Bankruptcy.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:bankruptcy
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  failureToPayPrincipal:
    name: failureToPayPrincipal
    definition_uri: https://w3id.org/lmodel/common_domain_model/failureToPayPrincipal
    description: 'A credit event. Corresponds to the failure by the Reference Entity
      to pay an expected principal amount or the payment of an actual principal amount
      that is less than the expected principal amount. ISDA 2003 Term: Failure to
      Pay Principal.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:failureToPayPrincipal
    owner: FloatingAmountEvents
    domain_of:
    - CreditEvents
    - FloatingAmountEvents
    range: boolean
  failureToPayInterest:
    name: failureToPayInterest
    definition_uri: https://w3id.org/lmodel/common_domain_model/failureToPayInterest
    description: 'A credit event. Corresponds to the failure by the Reference Entity
      to pay an expected interest amount or the payment of an actual interest amount
      that is less than the expected interest amount. ISDA 2003 Term: Failure to Pay
      Interest.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:failureToPayInterest
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  obligationDefault:
    name: obligationDefault
    definition_uri: https://w3id.org/lmodel/common_domain_model/obligationDefault
    description: 'A credit event. One or more of the obligations have become capable
      of being declared due and payable before they would otherwise have been due
      and payable as a result of, or on the basis of, the occurrence of a default,
      event of default or other similar condition or event other than failure to pay.
      ISDA 2003 Term: Obligation Default.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:obligationDefault
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  obligationAcceleration:
    name: obligationAcceleration
    definition_uri: https://w3id.org/lmodel/common_domain_model/obligationAcceleration
    description: 'A credit event. One or more of the obligations have been declared
      due and payable before they would otherwise have been due and payable as a result
      of, or on the basis of, the occurrence of a default, event of default or other
      similar condition or event other than failure to pay (preferred by the market
      over Obligation Default, because more definitive and encompasses the definition
      of Obligation Default - this is more favorable to the Seller). Subject to the
      default requirement amount. ISDA 2003 Term: Obligation Acceleration.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:obligationAcceleration
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  repudiationMoratorium:
    name: repudiationMoratorium
    definition_uri: https://w3id.org/lmodel/common_domain_model/repudiationMoratorium
    description: 'A credit event. The reference entity, or a governmental authority,
      either refuses to recognise or challenges the validity of one or more obligations
      of the reference entity, or imposes a moratorium thereby postponing payments
      on one or more of the obligations of the reference entity. Subject to the default
      requirement amount. ISDA 2003 Term: Repudiation/Moratorium.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:repudiationMoratorium
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  restructuring:
    name: restructuring
    definition_uri: https://w3id.org/lmodel/common_domain_model/restructuring
    description: 'A credit event. A restructuring is an event that materially impacts
      the reference entity''s obligations, such as an interest rate reduction, principal
      reduction, deferral of interest or principal, change in priority ranking, or
      change in currency or composition of payment. ISDA 2003 Term: Restructuring.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:restructuring
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: Restructuring
    inlined: true
    inlined_as_list: true
  governmentalIntervention:
    name: governmentalIntervention
    definition_uri: https://w3id.org/lmodel/common_domain_model/governmentalIntervention
    description: 'A credit event. A governmental intervention is an event resulting
      from an action by a governmental authority that materially impacts the reference
      entity''s obligations, such as an interest rate reduction, principal reduction,
      deferral of interest or principal, change in priority ranking, or change in
      currency or composition of payment. ISDA 2014 Term: Governmental Intervention.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:governmentalIntervention
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  distressedRatingsDowngrade:
    name: distressedRatingsDowngrade
    definition_uri: https://w3id.org/lmodel/common_domain_model/distressedRatingsDowngrade
    description: A credit event. Results from the fact that the rating of the reference
      obligation is down-graded to a distressed rating level. From a usage standpoint,
      this credit event is typically not applicable in case of RMBS trades.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:distressedRatingsDowngrade
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  maturityExtension:
    name: maturityExtension
    definition_uri: https://w3id.org/lmodel/common_domain_model/maturityExtension
    description: A credit event. Results from the fact that the underlier fails to
      make principal payments as expected.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:maturityExtension
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: boolean
  writedown:
    name: writedown
    definition_uri: https://w3id.org/lmodel/common_domain_model/writedown
    description: A credit event. Results from the fact that the underlier writes down
      its outstanding principal amount.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:writedown
    owner: FloatingAmountEvents
    domain_of:
    - CreditEvents
    - FloatingAmountEvents
    range: boolean
  impliedWritedown:
    name: impliedWritedown
    definition_uri: https://w3id.org/lmodel/common_domain_model/impliedWritedown
    description: A credit event. Results from the fact that losses occur to the underlying
      instruments that do not result in reductions of the outstanding principal of
      the reference obligation.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:impliedWritedown
    owner: FloatingAmountEvents
    domain_of:
    - CreditEvents
    - FloatingAmountEvents
    range: boolean
  defaultRequirement:
    name: defaultRequirement
    definition_uri: https://w3id.org/lmodel/common_domain_model/defaultRequirement
    description: 'In relation to certain credit events, serves as a threshold for
      Obligation Acceleration, Obligation Default, Repudiation/Moratorium and Restructuring.
      Market standard is USD 10,000,000 (JPY 1,000,000,000 for all Japanese Yen trades).
      This is applied on an aggregate or total basis across all Obligations of the
      Reference Entity. Used to prevent technical/operational errors from triggering
      credit events. ISDA 2003 Term: Default Requirement.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:defaultRequirement
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: Money
    inlined: true
    inlined_as_list: true
  creditEventNotice:
    name: creditEventNotice
    definition_uri: https://w3id.org/lmodel/common_domain_model/creditEventNotice
    description: 'A specified condition to settlement. An irrevocable written or verbal
      notice that describes a credit event that has occurred. The notice is sent from
      the notifying party (either the buyer or the seller) to the counterparty. It
      provides information relevant to determining that a credit event has occurred.
      This is typically accompanied by Publicly Available Information. ISDA 2003 Term:
      Credit Event Notice.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:creditEventNotice
    owner: CreditEvents
    domain_of:
    - CreditEvents
    range: CreditEventNotice
    inlined: true
    inlined_as_list: true
  notifyingParty:
    name: notifyingParty
    definition_uri: https://w3id.org/lmodel/common_domain_model/notifyingParty
    description: 'The notifying party is the party that notifies the other party when
      a credit event has occurred by means of a credit event notice. If more than
      one party is referenced as being the notifying party then either party may notify
      the other of a credit event occurring. ISDA 2003 Term: Notifying Party.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:notifyingParty
    owner: CreditEventNotice
    domain_of:
    - CreditEventNotice
    range: CounterpartyRoleEnum
    required: true
    multivalued: true
  gracePeriodExtension:
    name: gracePeriodExtension
    definition_uri: https://w3id.org/lmodel/common_domain_model/gracePeriodExtension
    description: 'If this element is specified, indicates whether or not a grace period
      extension is applicable. ISDA 2003 Term: Grace Period Extension Applicable.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:gracePeriodExtension
    owner: FailureToPay
    domain_of:
    - FailureToPay
    range: GracePeriodExtension
    inlined: true
    inlined_as_list: true
  paymentRequirement:
    name: paymentRequirement
    definition_uri: https://w3id.org/lmodel/common_domain_model/paymentRequirement
    description: 'Specifies a threshold for the failure to pay credit event. Market
      standard is USD 1,000,000 (JPY 100,000,000 for Japanese Yen trades) or its equivalent
      in the relevant obligation currency. This is applied on an aggregate basis across
      all Obligations of the Reference Entity. Intended to prevent technical/operational
      errors from triggering credit events. ISDA 2003 Term: Payment Requirement'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:paymentRequirement
    owner: FailureToPay
    domain_of:
    - FailureToPay
    range: Money
    inlined: true
    inlined_as_list: true
  gracePeriod:
    name: gracePeriod
    definition_uri: https://w3id.org/lmodel/common_domain_model/gracePeriod
    description: 'The number of calendar or business days after any due date that
      the reference entity has to fulfil its obligations before a failure to pay credit
      event is deemed to have occurred. ISDA 2003 Term: Grace Period.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:gracePeriod
    owner: GracePeriodExtension
    domain_of:
    - GracePeriodExtension
    range: Offset
    inlined: true
    inlined_as_list: true
  standardPublicSources:
    name: standardPublicSources
    definition_uri: https://w3id.org/lmodel/common_domain_model/standardPublicSources
    description: If this element is specified and set to 'true', indicates that ISDA
      defined Standard Public Sources are applicable.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:standardPublicSources
    owner: PubliclyAvailableInformation
    domain_of:
