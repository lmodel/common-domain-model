        description: The Spot Rate for a Rate Calculation Date will be the Ukrainian
          Hryvnia/U.S. Dollar Specified Rate for U.S. Dollars, expressed as the amount
          of Ukrainian Hryvnia per one U.S. Dollar, for settlement on the same Business
          Day, as published on EMTA's website (www.emta.org) at approximately 2:00
          p.m., Kiev time, or as soon thereafter as practicable, on that Rate Calculation
          Date. The Spot Rate shall be calculated by EMTA (or a service provider EMTA
          may select in its sole discretion) pursuant to the EMTA UAH Indicative Survey
          Methodology (which means a methodology, dated as of March 16, 2009, as amended
          from time to time, for a centralized industry-wide survey of financial institutions
          that are active participants in the Ukrainian Hryvnia / U.S. Dollar markets
          for the purpose of determining the EMTA UAH Indicative Survey Rate).
        aliases:
        - UAH.EMTA.INDICATIVE.SURVEY.RATE/UAH03
      UAH_EMTA_INDUSTRY_SURVEY_RATE_UAH02:
        text: UAH_EMTA_INDUSTRY_SURVEY_RATE_UAH02
        description: The Spot Rate for a Rate Calculation Date will be the Ukrainian
          Hryvnia/U.S. Dollar Specified Rate for U.S. Dollars expressed as the amount
          of Ukrainian Hryvnia per one U.S. Dollar, for settlement on the same Business
          Day calculated by Thomson Reuters pursuant to the EMTA UAH Industry Survey
          Methodology, which rate appears on EMTA's website (www.emta.org) and on
          Thomson Reuters Page EMTAUAHFIX at approximately 11:30 am, Kiev time, on
          that Rate Calculation Date. The 'EMTA UAH Industry Survey Methodology' as
          used herein means the methodology dated as of March 16, 2009, for a centralized
          industry wide survey of financial institutions in the Ukrainian Hryvnia/U.S.
          Dollar spot market for the purposes of determining the EMTA UAH Industry
          Survey Rate.
        aliases:
        - UAH.EMTA.INDUSTRY.SURVEY.RATE/UAH02
      UAH_GFI_UAH01:
        text: UAH_GFI_UAH01
        description: The Spot Rate for a Rate Calculation Date will be the Ukrainian
          Hryvnia/U.S. Dollar spot rate, expressed as the amount of Ukrainian Hryvnia
          per one U.S. Dollar, for settlement on the same Business Day reported by
          GFI Brokers on Thomson Reuters Page GFIU by 9:30 am, London time, on that
          Rate Calculation Date.
        aliases:
        - UAH.GFI/UAH01
      VEF_FIX_VEF01:
        text: VEF_FIX_VEF01
        description: The Spot Rate for a Rate Calculation Date will be the midpoint
          of the Venezuelan Bolivar /U.S. Dollar Tipo de Cambio De Referencia buying
          and selling rates, expressed as the amount of Venezuelan Bolivar per one
          U.S. Dollar, for settlement in two Business Days reported by the Banco Central
          de Venezuela (www.bcv.org.ve) at approximately 5:00 p.m., Caracas time,
          on that Rate Calculation Date.
        aliases:
        - VEF.FIX/VEF01
      VND_ABS_VND01:
        text: VND_ABS_VND01
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese
          Dong/U.S. Dollar spot rate at 11:00 a.m., Singapore time, expressed as the
          amount of Vietnamese Dong per one U.S. Dollar, for settlement in two Business
          Days reported by the Association of Banks in Singapore, which appears on
          the Reuters Screen ABSIRFIX01 Page to the right of the caption 'Spot' under
          the column 'VND' at approximately 11:30 a.m., Singapore time, on that Rate
          Calculation Date.
        aliases:
        - VND.ABS/VND01
      VND_FX_VND02:
        text: VND_FX_VND02
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese
          Dong/U.S. Dollar spot rate expressed as the amount of Vietnamese Dong per
          one U.S. Dollar, for settlement in two Business Days which appears on Reuters
          Screen VNDFIX=VN Page under the caption 'Spot' and to the right of the caption
          'Average' at approximately 11:00 am, Hanoi time, on that Rate Calculation
          Date.
        aliases:
        - VND.FX/VND02
      VND_SFEMC_INDICATIVE_SURVEY_RATE_VND03:
        text: VND_SFEMC_INDICATIVE_SURVEY_RATE_VND03
        description: The Spot Rate for a Rate Calculation Date will be the Vietnamese
          Dong/U.S. Dollar Specified Rate for U.S. Dollars, expressed as the amount
          of Vietnamese Dong per one U.S. Dollar, for settlement in two Business Days,
          as published on SFEMC's website (www.sfemc.org) at approximately 3:30 p.m.,
          Singapore time, or as soon as thereafter as practicable, on that Rate Calculation
          Date. The Spot Rate shall be calculated by SFEMC (or a service provider
          SFEMC may select in its sole discretion) pursuant to the SFEMC VND Indicative
          Survey Methodology (which means a methodology, dated as of July 14, 2008,
          as amended from time to time, for a centralized industry-wide survey of
          financial institutions that are active participants in the Vietnamese Dong/U.S.
          Dollar markets for the purpose of determining the SFEMC VND Indicative Survey
          Rate).
        aliases:
        - VND.SFEMC.INDICATIVE.SURVEY.RATE/VND03
  PartyDeterminationEnum:
    name: PartyDeterminationEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PartyDeterminationEnum
    description: The enumerated values to specify how a calculation agent will be
      determined.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      ExercisingParty:
        text: ExercisingParty
        description: The party that gives notice of exercise. Per 2000 ISDA Definitions,
          Section 11.1. Parties, paragraph (d).
      NonExercisingParty:
        text: NonExercisingParty
        description: The party that is given notice of exercise. Per 2000 ISDA Definitions,
          Section 11.1. Parties, paragraph (e).
      AsSpecifiedInMasterAgreement:
        text: AsSpecifiedInMasterAgreement
        description: The Calculation Agent is determined by reference to the relevant
          master agreement.
      AsSpecifiedInStandardTermsSupplement:
        text: AsSpecifiedInStandardTermsSupplement
        description: The Calculation Agent is determined by reference to the relevant
          standard terms supplement.
      Both:
        text: Both
        description: Both parties with joined rights to be a calculation agent.
  PriceTypeEnum:
    name: PriceTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceTypeEnum
    description: Provides enumerated values for types of prices in the Price data
      type in order to explain how to interpret the amount and use it in calculations.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      AssetPrice:
        text: AssetPrice
        description: Denotes a price expressed as a cash amount in a given currency
          to purchase a unit of an asset (e.g. a security or a commodity).
      Premium:
        text: Premium
        description: Denotes the amount payable by the buyer to the seller for an
          option. The premium is paid on the specified premium payment date or on
          each premium payment date if specified.
      Correlation:
        text: Correlation
        description: Denotes a price expressed as the weighted average of all pairwise
          correlation coefficients.
      Dividend:
        text: Dividend
        description: Denotes a price expressed as the dividend payment from a index
          or share.
      ExchangeRate:
        text: ExchangeRate
        description: Denotes a rate to convert one currency or other measure of value
          to another. Foreign Exchange rates are represented in decimals, e.g. {amount,
          unitOfAmount, PerUnitOfAmount} = [1.23, USD, GBP] = USD 1.23 for every 1
          GBP.
      InterestRate:
        text: InterestRate
        description: Denotes a price expressed as a rate to be applied to quantity/notional
          amount and represented as decimal, e.g. {amount, unitOfAmount, PerUnitOfAmount}
          = [0.08, EUR, EUR] = 8%  of the EUR notional quantity/amount or 8 cents
          for every EUR of notional amount.
      Variance:
        text: Variance
        description: Denotes a price expressed as the the arithmetic average of the
          squared differences from the mean value of an observable price.
      Volatility:
        text: Volatility
        description: Denotes a price expressed as the the square root of the arithmetic
          average of the squared differences from the mean value of an observable
          price.
  PriceSubTypeEnum:
    name: PriceSubTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceSubTypeEnum
    description: Provides a list of possible sub types of the chosen price type, used
      in conjunction with the PriceTypeEnum.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      Fee:
        text: Fee
        description: The lending fee associated with borrowing a security.
      Rebate:
        text: Rebate
        description: 'Denotes any rebate that is attributed to the cashflow. For example,
          where a lender will provide a rebate on the cash given to them by the borrower
          as collateral on a securities lending trade. '
  PremiumTypeEnum:
    name: PremiumTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PremiumTypeEnum
    description: The enumerated values to specify the premium type for forward start
      options.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      PrePaid:
        text: PrePaid
      PostPaid:
        text: PostPaid
      Variable:
        text: Variable
      Fixed:
        text: Fixed
  PriceOperandEnum:
    name: PriceOperandEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceOperandEnum
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      AccruedInterest:
        text: AccruedInterest
      Commission:
        text: Commission
      ForwardPoint:
        text: ForwardPoint
  CsaTypeEnum:
    name: CsaTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CsaTypeEnum
    description: 'How is the Creadit Support Annex defined for this transaction as
      defined in the 2021 ISDA Definitions, section 18.2.1 '
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    permissible_values:
      NoCSA:
        text: NoCSA
        description: There is no CSA applicable
        aliases:
        - NoCSA
      ExistingCSA:
        text: ExistingCSA
        description: Thre is an existing Credit Support Annex
        aliases:
        - ExistingCSA
      ReferenceVMCSA:
        text: ReferenceVMCSA
        description: There is a bilateral Credit Support Annex specific to the transaction
        aliases:
        - ReferenceVMCSA
  CalculationMethodEnum:
    name: CalculationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationMethodEnum
    description: What calculation type is required, averaging or compounding. This
      enumeration is used to represent the definitions of modular calculated rates
      as described in the 2021 ISDA Definitions, section 7.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    permissible_values:
      Averaging:
        text: Averaging
        description: Averaging, i.e. arithmetic averaging.
      Compounding:
        text: Compounding
        description: Compounding, i.e. geometric averaging following an ISDA defined
          formula.
      CompoundedIndex:
        text: CompoundedIndex
        description: A rate based on an index that is computed by a rate administrator.  The
          user is responsible for backing out the rate by applying a simple formula.
  InflationCalculationMethodEnum:
    name: InflationCalculationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/InflationCalculationMethodEnum
    description: Indicates how to use the inflation index to calculate the payment
      (e.g. Ratio, Return, Spread). Added for Inflation Asset Swap
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    permissible_values:
      Ratio:
        text: Ratio
        description: (Inflation Index Final / Inflation Index Base). Inflation Index
          Final is inflation index for Reference Month that is the Lag number of months
          prior to Payment Date (subject to interpolation). Inflation Index Base subject
          to the Calculation Style. Used in inflation asset swaps to calculate the
          inflation coupons and principal exchange.
      Return:
        text: Return
        description: (Inflation Index Final / Inflation Index Base -1). Inflation
          Index Final is the inflation index for Reference Month that is the Lag number
          of months prior to Payment Date (subject to interp). Inflation Index Base
          subject to the Calculation Style. Used in market standard ZC Inflation swaps.
      Spread:
        text: Spread
        description: Inflation Index Final - Inflation Index Base). Inflation Index
          Final is Index for Ref month the Lag months prior to Payment Date (subject
          to interp). Inflation Index Base subject to the Calculation Style. Typically
          used for fixing locks.
  InflationCalculationStyleEnum:
    name: InflationCalculationStyleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/InflationCalculationStyleEnum
    description: Indicates the style of how the inflation index calculates the payment
      (e.g. YearOnYear, ZeroCoupon).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    permissible_values:
      YearOnYear:
        text: YearOnYear
        description: YearOnYear means Inflation Index Base is the inflation index
          for Reference Month that is 12 months prior to Inflation Index Final (subject
          to interpolation). Inflation Index Base is cashflow dependent.
      ZeroCoupon:
        text: ZeroCoupon
        description: ZeroCoupon means Inflation Index Base used in the CalculationMethod
          is the inflation index for the Reference Month that is the lag number of
          months prior to Effective Date in the case of a swap, or Bond Interest Accrual
          Date in the case of an Asset Swap (subject to interpolation). Inflation
          Index Base has the same value for each inflation cashflow and Principal
          Exchange calculation within the trade.
  ObservationPeriodDatesEnum:
    name: ObservationPeriodDatesEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ObservationPeriodDatesEnum
    description: The enumerated values to specify whether rate calculations occur
      relative to the first or last day of a calculation period. Done in uppercase
      due to a bug in code generation. This enumeration is used to represent the definitions
      of modular calculated rates as described in the 2021 ISDA Definitions, section
      7.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    permissible_values:
      SetInAdvance:
        text: SetInAdvance
        description: Calculations occur relative to the first day of a calculation
          period.
      Standard:
        text: Standard
        description: Calculations occur relative to the last day of a calculation
          period (set in arrears).
      FixingDate:
        text: FixingDate
        description: Calculations occur relative to a previously defined reset date,
          e.g. for a fallback rate.
  CalculationShiftMethodEnum:
    name: CalculationShiftMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationShiftMethodEnum
    description: ' the specific calculation method, e.g. lookback. This enumeration
      is used to represent the definitions of modular calculated rates as described
      in the 2021 ISDA Definitions, section 7.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_calculatedrate
    permissible_values:
      Lookback:
        text: Lookback
        description: Calculations and weighting are done with respect to the calculation
          period, but observations are shifted back by several days.
      ObservationPeriodShift:
        text: ObservationPeriodShift
        description: the observation period is shifted by several days prior to rate
          setting, and weightings are done with respect to the obseration period.
      RateCutOff:
        text: RateCutOff
        description: Calculations cut the rate off several business days prior to
          rate setting (Lockout).
      NoShift:
        text: NoShift
        description: calculations occur without any shifting, e.g. OIS Compounding/Basic
          Averaging style.
  FloatingRateIndexCategoryEnum:
    name: FloatingRateIndexCategoryEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexCategoryEnum
    description: Top level ISDA FRO category.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    permissible_values:
      ScreenRate:
        text: ScreenRate
        description: The rate is observed directly from a screen.
        aliases:
        - Screen Rate
      Calculated:
        text: Calculated
        description: The rate is calculated by the calculation agents from multiple
          observations.
        aliases:
        - Calculated Rate
      ReferenceBanks:
        text: ReferenceBanks
        description: The rate is obtained by polling several other banks.
        aliases:
        - Reference Banks Rate
  FloatingRateIndexStyleEnum:
    name: FloatingRateIndexStyleEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexStyleEnum
    description: Second level ISDA FRO category.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    permissible_values:
      AverageFRO:
        text: AverageFRO
        description: An ISDA-defined calculated rate done using arithmetic averaging.
        aliases:
        - Average FRO
      CompoundedIndex:
        text: CompoundedIndex
        description: A published index calculated using compounding.
        aliases:
        - Compounded Index
      Index:
        text: Index
        description: A published index using a methodology defined by the publisher,
          e.g. S&P 500.
        aliases:
        - Index
      Other:
        text: Other
        description: Other
        aliases:
        - Other
      Overnight:
        text: Overnight
        description: Overnight Rate
        aliases:
        - Overnight Rate
      PublishedAverage:
        text: PublishedAverage
        description: ' A published rate computed using an averaging methodology.'
        aliases:
        - Published Average Rate
      SpecifiedFormula:
        text: SpecifiedFormula
        description: Specified Formula
        aliases:
        - Specified Formula
      SwapRate:
        text: SwapRate
        description: A rate representing the market rate for swaps of a given maturity.
        aliases:
        - Swap Rate
      TermRate:
        text: TermRate
        description: A rate specified over a given term, such as a libor-type rate.
        aliases:
        - Term Rate
  FloatingRateIndexCalculationMethodEnum:
    name: FloatingRateIndexCalculationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/FloatingRateIndexCalculationMethodEnum
    description: 3rd level ISDA FRO category.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset_fro
    permissible_values:
      OISCompound:
        text: OISCompound
        description: A calculation methodology using the ISDA-defined OIS compounding
          formula.
        aliases:
        - OIS Compounding
      Average:
        text: Average
        description: A calculation methodology using the arithmetic mean.
        aliases:
        - Overnight Averaging
      Compounded:
        text: Compounded
        description: Compounded Index
        aliases:
        - Compounded Index
      AllInCompounded:
        text: AllInCompounded
        description: All-In Compounded Index
        aliases:
        - All-In Compounded Index
  TimeTypeEnum:
    name: TimeTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TimeTypeEnum
    description: The enumerated values to specify points in the day when option exercise
      and valuation can occur.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_common
    permissible_values:
      Close:
        text: Close
        description: The official closing time of the exchange on the valuation date.
      Open:
        text: Open
        description: The official opening time of the exchange on the valuation date.
      OSP:
        text: OSP
        description: The time at which the official settlement price is determined.
      SpecificTime:
        text: SpecificTime
        description: The time specified in the element equityExpirationTime or valuationTime
          (as appropriate).
      XETRA:
        text: XETRA
        description: The time at which the official settlement price (following the
          auction by the exchange) is determined by the exchange.
      DerivativesClose:
        text: DerivativesClose
        description: The official closing time of the derivatives exchange on which
          a derivative contract is listed on that security underlier.
      AsSpecifiedInMasterConfirmation:
        text: AsSpecifiedInMasterConfirmation
        description: The time is determined as provided in the relevant Master Confirmation.
  DeterminationMethodEnum:
    name: DeterminationMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DeterminationMethodEnum
    description: The enumerated values to specify the method according to which an
      amount or a date is determined.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_common
    exact_mappings:
    - http://www.fpml.org/coding-scheme/determination-method
    permissible_values:
      AgreedInitialPrice:
        text: AgreedInitialPrice
        description: Agreed separately between the parties.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#AgreedInitialPrice
      AsSpecifiedInMasterConfirmation:
        text: AsSpecifiedInMasterConfirmation
        description: As specified in Master Confirmation.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#AsSpecifiedInMasterConfirmation
      CalculationAgent:
        text: CalculationAgent
        description: Determined by the Calculation Agent.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#CalculationAgent
      ClosingPrice:
        text: ClosingPrice
        description: Official Closing Price.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#ClosingPrice
      DividendCurrency:
        text: DividendCurrency
        description: Determined by the Currency of Equity Dividends.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#DividendCurrency
      ExpiringContractLevel:
        text: ExpiringContractLevel
        description: The initial Index Level is the level of the Expiring Contract
          as provided in the Master Confirmation.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#ExpiringContractLevel
      HedgeExecution:
        text: HedgeExecution
        description: Determined by the Hedging Party.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#HedgeExecution
      IssuerPaymentCurrency:
        text: IssuerPaymentCurrency
        description: Issuer Payment Currency.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#IssuerPaymentCurrency
      NAV:
        text: NAV
        description: Net Asset Value.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#NAV
      OpenPrice:
        text: OpenPrice
        description: Opening Price of the Market.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#OpenPrice
      OSPPrice:
        text: OSPPrice
        description: OSP Price.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#OSPPrice
      SettlementCurrency:
        text: SettlementCurrency
        description: Settlement Currency.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#SettlementCurrency
      StrikeDateDetermination:
        text: StrikeDateDetermination
        description: Date on which the strike is determined in respect of a forward
          starting swap.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#StrikeDateDetermination
      TWAPPrice:
        text: TWAPPrice
        description: Official TWAP Price.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#TWAPPrice
      TWAPVE:
        text: TWAPVE
        description: TWAP VE Price.
      TWAPVEExcludingClose:
        text: TWAPVEExcludingClose
        description: TWAP VE Calculated by Excluding Closing price.
      ValuationTime:
        text: ValuationTime
        description: Price determined at valuation time.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#ValuationTime
      VWAPPrice:
        text: VWAPPrice
        description: Official VWAP Price.
        meaning: http://www.fpml.org/coding-scheme/determination-method-3-4#VWAPPrice
      VWAPVE:
        text: VWAPVE
        description: VWAP VE Price.
      VWAPVEExcludingClose:
        text: VWAPVEExcludingClose
        description: VWAP VE Calculated by Excluding Closing price.
  IndexEventConsequenceEnum:
    name: IndexEventConsequenceEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/IndexEventConsequenceEnum
    description: The enumerated values to specify the consequences of Index Events.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    permissible_values:
      CalculationAgentAdjustment:
        text: CalculationAgentAdjustment
        description: Calculation Agent Adjustment.
      NegotiatedCloseOut:
        text: NegotiatedCloseOut
        description: Negotiated Close Out.
      CancellationAndPayment:
        text: CancellationAndPayment
        description: Cancellation and Payment.
      RelatedExchange:
        text: RelatedExchange
        description: Related Exchange.
  MarketDisruptionEnum:
    name: MarketDisruptionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/MarketDisruptionEnum
    description: The enumerated values to specify the handling of an averaging date
      market disruption for an equity derivative transaction.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - http://www.fpml.org/coding-scheme/market-disruption
    permissible_values:
      ModifiedPostponement:
        text: ModifiedPostponement
        description: As defined in section 6.7 paragraph (c) sub-paragraph (iii) of
          the ISDA 2002 Equity Derivative definitions.
        meaning: http://www.fpml.org/coding-scheme/market-disruption-1-0#ModifiedPostponement
      Omission:
        text: Omission
        description: As defined in section 6.7 paragraph (c) sub-paragraph (i) of
          the ISDA 2002 Equity Derivative definitions.
        meaning: http://www.fpml.org/coding-scheme/market-disruption-1-0#Omission
      Postponement:
        text: Postponement
        description: As defined in section 6.7 paragraph (c) sub-paragraph (ii) of
          the ISDA 2002 Equity Derivative definitions.
        meaning: http://www.fpml.org/coding-scheme/market-disruption-1-0#Postponement
  TriggerTypeEnum:
    name: TriggerTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TriggerTypeEnum
    description: The enumerated values to specify whether an option will trigger or
      expire depending upon whether the spot rate is above or below the barrier rate.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    permissible_values:
      EqualOrLess:
        text: EqualOrLess
        description: The underlier price must be equal to or less than the Trigger
          level.
      EqualOrGreater:
        text: EqualOrGreater
        description: The underlier price must be equal to or greater than the Trigger
          level.
      Equal:
        text: Equal
        description: The underlier price must be equal to the Trigger level.
      Less:
        text: Less
        description: The underlier price must be less than the Trigger level.
      Greater:
        text: Greater
        description: The underlier price must be greater than the Trigger level.
  TriggerTimeTypeEnum:
    name: TriggerTimeTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/TriggerTimeTypeEnum
    description: The enumerated values to specify the time of day which would be considered
      for valuing the knock event.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    permissible_values:
      Closing:
        text: Closing
        description: The close of trading on a day would be considered for valuation.
      Anytime:
        text: Anytime
        description: At any time during the Knock Determination period (continuous
          barrier).
  ShareExtraordinaryEventEnum:
    name: ShareExtraordinaryEventEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ShareExtraordinaryEventEnum
    description: The enumerated values to specify the consequences of extraordinary
      events relating to the underlying.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    permissible_values:
      AlternativeObligation:
        text: AlternativeObligation
        description: The trade continues such that the underlying now consists of
          the New Shares and/or the Other Consideration, if any, and the proceeds
          of any redemption, if any, that the holder of the underlying Shares would
          have been entitled to.
      CancellationAndPayment:
        text: CancellationAndPayment
        description: The trade is cancelled and a cancellation fee will be paid by
          one party to the other.
      OptionsExchange:
        text: OptionsExchange
        description: The trade will be adjusted by the Calculation Agent in accordance
          with the adjustments made by any exchange on which options on the underlying
          are listed.
      CalculationAgent:
        text: CalculationAgent
        description: The Calculation Agent will determine what adjustment is required
          to offset any change to the economics of the trade. If the Calculation Agent
          cannot achieve this, the trade goes to Cancellation and Payment with the
          Calculation Agent deciding on the value of the cancellation fee. Adjustments
          may not be made to account solely for changes in volatility, expected dividends,
          stock loan rate or liquidity.
      ModifiedCalculationAgent:
        text: ModifiedCalculationAgent
        description: The Calculation Agent will determine what adjustment is required
          to offset any change to the economics of the trade. If the Calculation Agent
          cannot achieve this, the trade goes to Cancellation and Payment with the
          Calculation Agent deciding on the value of the cancellation fee. Adjustments
          to account for changes in volatility, expected dividends, stock loan rate
          or liquidity are allowed.
      PartialCancellationAndPayment:
        text: PartialCancellationAndPayment
        description: Applies to Basket Transactions. The portion of the Basket made
          up by the affected Share will be cancelled and a cancellation fee will be
          paid from one party to the other. The remainder of the trade continues.
      Component:
        text: Component
        description: If this is a Share-for-Combined merger event (Shares are replaced
          with New Shares and Other Consideration), then different treatment can be
          applied to each component if the parties have specified this.
  RestructuringEnum:
    name: RestructuringEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RestructuringEnum
    description: The enumerated values to specify the form of the restructuring credit
      event that is applicable to the credit default swap.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    exact_mappings:
    - http://www.fpml.org/coding-scheme/restructuring
    permissible_values:
      ModModR:
        text: ModModR
        description: 'Restructuring (Section 4.7) and Modified Restructuring Maturity
          Limitation and Conditionally Transferable Obligation (2014 Definitions:
          Section 3.31, 2003 Definitions: 2.32) apply.'
        meaning: http://www.fpml.org/coding-scheme/restructuring-1-1#ModModR
      ModR:
        text: ModR
        description: 'Restructuring (Section 4.7) and Restructuring Maturity Limitation
          and Fully Transferable Obligation (2014 Definitions: Section 3.31, 2003
          Definitions: 2.32) apply.'
        meaning: http://www.fpml.org/coding-scheme/restructuring-1-1#ModR
      R:
        text: R
        description: Restructuring as defined in the applicable ISDA Credit Derivatives
          Definitions. (2003 or 2014).
        meaning: http://www.fpml.org/coding-scheme/restructuring-1-1#R
  BankHolidayTreatmentEnum:
    name: BankHolidayTreatmentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/BankHolidayTreatmentEnum
    description: Defines whether the bank holidays are treated as weekdays or weekends
      in terms of delivery profile in the context of commodity products, in particular
      those with peak or off-peak delivery profiles.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      AsWeekday:
        text: AsWeekday
        description: Bank holidays treated as weekdays.
      AsWeekend:
        text: AsWeekend
        description: Bank holidays treated as weekends.
  CompoundingMethodEnum:
    name: CompoundingMethodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CompoundingMethodEnum
    description: The enumerated values to specify the type of compounding, e.g. flat,
      straight.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Flat:
        text: Flat
        description: Flat compounding. Compounding excludes the spread. Note that
          the first compounding period has it's interest calculated including any
          spread then subsequent periods compound this at a rate excluding the spread.
      None:
        text: None
        description: No compounding is to be applied.
      Straight:
        text: Straight
        description: Straight compounding. Compounding includes the spread.
      SpreadExclusive:
        text: SpreadExclusive
        description: Spread Exclusive compounding.
  DayDistributionEnum:
    name: DayDistributionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DayDistributionEnum
    description: Denotes the method by which the pricing days are distributed across
      the pricing period.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      All:
        text: All
      First:
        text: First
      Last:
        text: Last
      Penultimate:
        text: Penultimate
  DiscountingTypeEnum:
    name: DiscountingTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DiscountingTypeEnum
    description: The enumerated values to specify the method of calculating discounted
      payment amounts. This enumerations combines the FpML DiscountingTypeEnum and
      FraDiscountingEnum enumerations.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Standard:
        text: Standard
        description: As specified by the 2006 ISDA Definitions, Section 8.4. Discounting,
          paragraph (a).
      FRA:
        text: FRA
        description: As specified by the 2006 ISDA Definitions, Section 8.4. Discounting,
          paragraph (b).
      FRAYield:
        text: FRAYield
        description: As specified by the 2006 ISDA Definitions, Section 8.4. Discounting,
          paragraph (e).
      AFMA:
        text: AFMA
        description: As specified by the Australian Financial Markets Association
          (AFMA) OTC Financial Product Conventions. This discounting method should
          not be used for a trade documented under a legal framework where the 2006
          ISDA Definitions have been incorporated.
  DividendAmountTypeEnum:
    name: DividendAmountTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendAmountTypeEnum
    description: The enumerated values to specify whether the dividend is paid with
      respect to the Dividend Period.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      RecordAmount:
        text: RecordAmount
        description: The record date for a dividend occurs during a dividend period.
      ExAmount:
        text: ExAmount
        description: The ex-date for a dividend occurs during a dividend period.
      PaidAmount:
        text: PaidAmount
        description: The payment date for a dividend occurs during a dividend period.
      AsSpecifiedInMasterConfirmation:
        text: AsSpecifiedInMasterConfirmation
        description: The Amount is determined as provided in the relevant Master Confirmation.
  DividendCompositionEnum:
    name: DividendCompositionEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendCompositionEnum
    description: The enumerated values to specify how the composition of Dividends
      is to be determined.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      EquityAmountReceiverElection:
        text: EquityAmountReceiverElection
        description: The Equity Amount Receiver determines the composition of dividends
          (subject to conditions).
      CalculationAgentElection:
        text: CalculationAgentElection
        description: The Calculation Agent determines the composition of dividends
          (subject to conditions).
  DividendDateReferenceEnum:
    name: DividendDateReferenceEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendDateReferenceEnum
    description: The enumerated values to specify the date by reference to which the
      dividend will be paid.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      AdHocDate:
        text: AdHocDate
        description: The dividend date will be specified ad-hoc by the parties, typically
          on the dividend ex-date.
      CashSettlementPaymentDate:
        text: CashSettlementPaymentDate
        description: If 'Dividend Payment Date(s)' is specified in the Transaction
          Supplement as 'Cash Settlement Payment Date', then the Dividend Payment
          Date in respect of a Dividend Amount shall be the Cash Settlement Payment
          Date relating to the end of the Dividend Period during which the Shares
          commenced trading 'ex' the relevant dividend on the Exchange.
      CashSettlePaymentDateExDiv:
        text: CashSettlePaymentDateExDiv
        description: "If 'Dividend Payment Date(s)' is specified in the Transaction\
          \ Supplement as 'Cash Settlement Payment Date \u2013 Ex Dividend'', then\
          \ the Dividend Payment Date in respect of a Dividend Amount shall be the\
          \ Cash Settlement Payment Date relating to the end of the Dividend Period\
          \ during which the Shares commenced trading 'ex' the relevant dividend on\
          \ the Exchange."
      CashSettlePaymentDateIssuerPayment:
        text: CashSettlePaymentDateIssuerPayment
        description: "If 'Dividend Payment Date(s)' is specified in the Transaction\
          \ Supplement as 'Cash Settlement Payment Date \u2013 Issuer Payment', then\
          \ the Dividend Payment Date in respect of a Dividend Amount shall be the\
          \ Cash Settlement Payment Date relating to the end of the Dividend Period\
          \ during which the issuer pays the relevant dividend to a holder of record\
          \ provided that in the case where the Equity Amount Payer is the party specified\
          \ to be the sole Hedging Party and the Hedging Party has not received the\
          \ Dividend Amount by such date, then the date falling a number of Currency\
          \ Business Days as specified in the Cash Settlement Payment Date after actual\
          \ receipt by the Hedging Party of the Received Ex Amount or Paid Ex Amount\
          \ (as applicable)."
      CumulativeEquityExDiv:
        text: CumulativeEquityExDiv
        description: Total of dividends which go ex, paid on next following Equity
          Payment Date, which is immediately following the Dividend Period during
          which the Shares commence trading ex-dividend on the Exchange.
      CumulativeEquityPaid:
        text: CumulativeEquityPaid
        description: Total of paid dividends, paid on next following Equity Payment
          Date, which is immediately following the Dividend Period during which the
          dividend is paid by the Issuer to the holders of record of a Share.
      CumulativeEquityExDivBeforeReset:
        text: CumulativeEquityExDivBeforeReset
        description: Total of paid dividends, paid on next following Equity Payment
          Date, which is immediately following the Dividend Ex Date, unless the Dividend
          Ex Date is between the Equity Valuation and Payment Date in which case the
          dividend is deferred to the following Equity Payment Date
      CumulativeEquityPaidBeforeReset:
        text: CumulativeEquityPaidBeforeReset
        description: Total of paid dividends, paid on next following Equity Payment
          Date, which is immediately following the Dividend Pay Date, unless the Dividend
          Pay Date is between the Equity Valuation and Payment Date (not including
          the Valuation Date) in which case the dividend is deferred to the following
          Equity Payment Date
      CumulativeEquityPaidInclReset:
        text: CumulativeEquityPaidInclReset
        description: Total of paid dividends, paid on next following Equity Payment
          Date, which is immediately following the Dividend Pay Date, unless the Dividend
          Pay Date is between the Equity Valuation and Payment Date (including the
          Valuation Date) in which case the dividend is deferred to the following
          Equity Payment Date
      CumulativeInterestExDiv:
        text: CumulativeInterestExDiv
        description: Total of dividends which go ex, paid on next following Interest
          Payment Date, which is immediately following the Dividend Period during
          which the Shares commence trading ex-dividend on the Exchange, or where
          the date on which the Shares commence trading ex-dividend is a Payment Date,
          such Payment Date.
      CumulativeInterestPaid:
        text: CumulativeInterestPaid
        description: Total of paid dividends, paid on next following Interest Payment
          Date, which is immediately following the Dividend Period during which the
          dividend is paid by the Issuer to the holders of record of a Share.
      CumulativeInterestPaidInclReset:
        text: CumulativeInterestPaidInclReset
        description: Total of paid dividends, paid on next following Interest Payment
          Date, which is immediately following the Dividend Pay Date, unless the Dividend
          Pay Date is between the Equity Valuation and Payment Date (including the
          Valuation Date) in which case the dividend is deferred to the following
          Interest Payment Date.
      CumulativeInterestPaidBeforeReset:
        text: CumulativeInterestPaidBeforeReset
        description: Total of paid dividends, paid on next following Interest Payment
          Date, which is immediately following the Dividend Pay Date, unless the Dividend
          Pay Date is between the Equity Valuation and Payment Date (not including
          the Valuation Date) in which case the dividend is deferred to the following
          Interest Payment Date.
      DividendPaymentDate:
        text: DividendPaymentDate
        description: Date on which the dividend will be paid by the issuer.
      DividendValuationDate:
        text: DividendValuationDate
        description: In respect of each Dividend Period, the relevant Dividend Valuation
          Date.
      EquityPaymentDate:
        text: EquityPaymentDate
        description: Equity payment date of the swap.
      ExDate:
        text: ExDate
        description: Date on which a holder of the security is entitled to the dividend.
      FloatingAmountPaymentDate:
        text: FloatingAmountPaymentDate
        description: If 'Dividend Payment Date(s)' is specified in the Transaction
          Supplement as 'Floating Amount Payment Date', then the Dividend Payment
          Date in respect of a Dividend Amount shall be the first Payment Date falling
          at least one Settlement Cycle after the date that the Shares have commenced
          trading 'ex' the relevant dividend on the Exchange.
      FollowingPaymentDate:
        text: FollowingPaymentDate
        description: The next payment date of the swap.
      RecordDate:
        text: RecordDate
        description: Date on which the dividend will be recorded in the books of the
          paying agent.
      SharePayment:
        text: SharePayment
        description: If 'Dividend Payment Date(s)' is specified in the Transaction
          Supplement as 'Share Payment', then the Dividend Payment Date in respect
          of a Dividend Amount shall fall on a date on or before the date that is
          two (or any other number that is specified in the Transaction Supplement)
          Currency Business Days following the day on which the Issuer of the Shares
          pays the relevant dividend to holders of record of the Shares.
      TerminationDate:
        text: TerminationDate
        description: Termination date of the swap.
      TradeDate:
        text: TradeDate
        description: Trade date of the swap
      UnwindOrEquityExDiv:
        text: UnwindOrEquityExDiv
        description: Pays a fraction of the Dividend Amount on each Unwind Trade Settlement
          Date which occurs after the Dividend Ex Date, until position is fully unwound
          OR on the next Equity Pay Date after the Dividend Pay Date. This will be
          whichever date comes first or a combination of both.
      UnwindOrEquityPaid:
        text: UnwindOrEquityPaid
        description: Pays a fraction of the Dividend Amount on each Unwind Trade Settlement
          Date which occurs after the Dividend Pay Date, until position is fully unwound
          OR on the next Equity Pay Date after the Dividend Pay Date. This will be
          whichever date comes first or a combination of both.
      UnwindOrInterestExDiv:
        text: UnwindOrInterestExDiv
        description: Pays a fraction of the Dividend Amount on each Unwind Trade Settlement
          Date which occurs after the Dividend Ex Date, until position is fully unwound
          OR on the next Interest Pay Date after the Dividend Ex Date. This will be
          whichever date comes first or a combination of both.
      UnwindOrInterestPaid:
        text: UnwindOrInterestPaid
        description: Pays a fraction of the Dividend Amount on each Unwind Trade Settlement
          Date which occurs after the Dividend Pay Date, until position is fully unwound
          OR on the next Interest Pay Date after the Dividend Pay Date. This will
          be whichever date comes first or a combination of both.
      UnwindExDiv:
        text: UnwindExDiv
        description: Pays a fraction of the total on each Unwind Trade Settlement
          Date which occurs after the Dividend Ex Date, until trade is fully unwound.
      UnwindPaid:
        text: UnwindPaid
        description: Pays a fraction of the total on each Unwind Trade Settlement
          Date which occurs after the Dividend Pay Date, until trade is fully unwound.
  DividendEntitlementEnum:
    name: DividendEntitlementEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendEntitlementEnum
    description: The enumerated values to specify the date on which the receiver of
      the equity payout is entitled to the dividend.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      ExDate:
        text: ExDate
        description: Dividend entitlement is on the dividend ex-date.
      RecordDate:
        text: RecordDate
        description: Dividend entitlement is on the dividend record date.
  DividendPeriodEnum:
    name: DividendPeriodEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/DividendPeriodEnum
    description: '2002 ISDA Equity Derivatives Definitions: First Period, Second Period
      |'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      FirstPeriod:
        text: FirstPeriod
        description: '2002 ISDA Equity Derivatives Definitions: First Period means
          each period from, and including, one Cash Settlement Payment Date or Settlement
          Date, as the case may be, to, but excluding, the next following Cash Settlement
          Payment Date or Settlement Date, as the case may be, except that (i) the
          initial Dividend Period will commence on, and include, the Clearance System
          Business Day that is one Settlement Cycle following the Trade Date and (ii)
          the final Dividend Period will end on, but exclude, the final Cash Settlement
          Payment Date or Settlement Date, as the case may be.'
      SecondPeriod:
        text: SecondPeriod
        description: '2002 ISDA Equity Derivatives Definitions: Second Period means
          each period from, but excluding, one Valuation Date to, and including, the
          next Valuation Date, except that (i) the initial Dividend Period will commence
          on, but exclude, the Trade Date and (ii) the final Dividend Period will
          end on, and include, the final Valuation Date or, in respect of a Physically-settled
          Forward Transaction to which Variable Obligation is not applicable, the
          date that is one Settlement Cycle prior to the Settlement Date.'
  IndexAnnexSourceEnum:
    name: IndexAnnexSourceEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/IndexAnnexSourceEnum
    description: The enumerated values to specify the CDX index annex source.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - http://www.fpml.org/coding-scheme/cdx-index-annex-source
    permissible_values:
      MasterConfirmation:
        text: MasterConfirmation
        description: As defined in the relevant form of Master Confirmation applicable
          to the confirmation of Dow Jones CDX indices.
        meaning: http://www.fpml.org/coding-scheme/cdx-index-annex-source-1-0#MasterConfirmation
      Publisher:
        text: Publisher
        description: As defined in the relevant form of Master Confirmation applicable
          to the confirmation of Dow Jones CDX indices.
        meaning: http://www.fpml.org/coding-scheme/cdx-index-annex-source-1-0#Publisher
  InterestShortfallCapEnum:
    name: InterestShortfallCapEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/InterestShortfallCapEnum
    description: The enumerated values to specify the interest shortfall cap, applicable
      to mortgage derivatives.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Fixed:
        text: Fixed
      Variable:
        text: Variable
  LoadTypeEnum:
    name: LoadTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/LoadTypeEnum
    description: Specifies the load type of the delivery.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      BaseLoad:
        text: BaseLoad
        description: Base load
      PeakLoad:
        text: PeakLoad
        description: Peak load
      OffPeak:
        text: OffPeak
        description: Off-peak load
      BlockHours:
        text: BlockHours
        description: Block Hours
      Shaped:
        text: Shaped
        description: Shaped
      GasDay:
        text: GasDay
        description: Gas Day
      Other:
        text: Other
        description: Other
  NegativeInterestRateTreatmentEnum:
    name: NegativeInterestRateTreatmentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/NegativeInterestRateTreatmentEnum
    description: The enumerated values to specify the method of calculating payment
      obligations when a floating rate is negative (either due to a quoted negative
      floating rate or by operation of a spread that is subtracted from the floating
      rate).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      NegativeInterestRateMethod:
        text: NegativeInterestRateMethod
        description: Negative Interest Rate Method. Per 2000 ISDA Definitions, Section
          6.4 Negative Interest Rates, paragraphs (b) and (c).
      ZeroInterestRateMethod:
        text: ZeroInterestRateMethod
        description: Zero Interest Rate Method. Per 2000 ISDA Definitions, Section
          6.4. Negative Interest Rates, paragraphs (d) and (e).
      ZeroInterestRateExcludingSpreadMethod:
        text: ZeroInterestRateExcludingSpreadMethod
        description: Per 2021 ISDA Definitions section 6.8.6
  NonCashDividendTreatmentEnum:
    name: NonCashDividendTreatmentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/NonCashDividendTreatmentEnum
    description: The enumerated values to specify the treatment of Non-Cash Dividends.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      PotentialAdjustmentEvent:
        text: PotentialAdjustmentEvent
        description: The treatment of any non-cash dividend shall be determined in
          accordance with the Potential Adjustment Event provisions.
      CashEquivalent:
        text: CashEquivalent
        description: Any non-cash dividend shall be treated as a Declared Cash Equivalent
          Dividend.
  RateTreatmentEnum:
    name: RateTreatmentEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RateTreatmentEnum
    description: The enumerated values to specify the methods for converting rates
      from one basis to another.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      BondEquivalentYield:
        text: BondEquivalentYield
        description: Bond Equivalent Yield. Per Annex to the 2000 ISDA Definitions
          (June 2000 Version), Section 7.3. Certain General Definitions Relating to
          Floating Rate Options, paragraph (g).
      MoneyMarketYield:
        text: MoneyMarketYield
        description: Money Market Yield. Per Annex to the 2000 ISDA Definitions (June
          2000 Version), Section 7.3. Certain General Definitions Relating to Floating
          Rate Options, paragraph (h).
  ReturnTypeEnum:
    name: ReturnTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReturnTypeEnum
    description: The enumerated values to specify the type of return associated the
      equity payout.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      Price:
        text: Price
        description: Price return, i.e. excluding dividends.
      Total:
        text: Total
        description: Total return, i.e. including dividend and price components.
  SettledEntityMatrixSourceEnum:
    name: SettledEntityMatrixSourceEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettledEntityMatrixSourceEnum
    description: The enumerated values to specify the relevant settled entity matrix
      source.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - http://www.fpml.org/coding-scheme/settled-entity-matrix-source
    permissible_values:
      ConfirmationAnnex:
        text: ConfirmationAnnex
        description: The Relevant Settled Entity Matrix shall be the list agreed for
          this purpose by the parties. The list is not included as part of the electronic
          confirmation.
        meaning: http://www.fpml.org/coding-scheme/settled-entity-matrix-source-1-0#ConfirmationAnnex
      NotApplicable:
        text: NotApplicable
        description: The term is not applicable.
        meaning: http://www.fpml.org/coding-scheme/settled-entity-matrix-source-1-0#NotApplicable
      Publisher:
        text: Publisher
        description: The Settled Entity Matrix published by the Index Publisher.
        meaning: http://www.fpml.org/coding-scheme/settled-entity-matrix-source-1-0#Publisher
  SpreadScheduleTypeEnum:
    name: SpreadScheduleTypeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SpreadScheduleTypeEnum
    description: The enumerated values to specify a long or short spread value.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
    - http://www.fpml.org/coding-scheme/spread-schedule-type
    permissible_values:
      Long:
        text: Long
        description: Represents a Long Spread Schedule. Spread schedules defined as
          'Long' will be applied to Long Positions.
        meaning: http://www.fpml.org/coding-scheme/spread-schedule-type-1-0#Long
      Short:
        text: Short
        description: Represents a Short Spread Schedule. Spread schedules defined
          as 'Short' will be applied to Short Positions.
        meaning: http://www.fpml.org/coding-scheme/spread-schedule-type-1-0#Short
  RollSourceCalendarEnum:
    name: RollSourceCalendarEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RollSourceCalendarEnum
    description: Used in conjunction with an exchange-based pricing source. Identifies
      a date source calendar from which the pricing dates and thus roll to the next
      contract will be based off (e.g. pricing is based on the NYMEX WTI First Nearby
      Futures Contract, if Future is chosen, the pricing will roll to the next futures
      contract on expiration, if ListedOption is chosen, the pricing will roll to
      the next futures contract on the Option expiration date which is three business
      days before the expiration of the NYMEX WTI futures contract.) Omitting this
      element will result in the default behavior expected with the pricing source
      described within the commodity element.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    permissible_values:
      ListedOption:
        text: ListedOption
      Future:
        text: Future
  CreditSeniorityEnum:
    name: CreditSeniorityEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditSeniorityEnum
    description: Seniority of debt instruments comprising the index.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    exact_mappings:
