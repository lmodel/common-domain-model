      postconditions:
        slot_conditions:
          value:
            name: value
            required: true
      description: If we have a name then we must also have a value.
    - preconditions:
        slot_conditions:
          value:
            name: value
            required: true
      postconditions:
        slot_conditions:
          name:
            name: name
            required: true
      description: If we have a value then we must also have a name.
