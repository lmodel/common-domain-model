  EligibleCollateralCriteria:
    name: EligibleCollateralCriteria
    definition_uri: https://w3id.org/lmodel/common_domain_model/EligibleCollateralCriteria
    description: Represents a set of criteria used to specify eligible collateral.
    comments:
    - "Rosetta condition: ConcentrationLimitTypeIssueOSAmountDebtOnly \u2014 if treatment\
      \ -> concentrationLimit -> concentrationLimitCriteria -> concentrationLimitType\
      \ only-element = ConcentrationLimitTypeEnum -> IssueOutstandingAmount then CriteriaMatchesSecurityType(collateralCriteria,\
      \ Debt) or (treatment -> concentrationLimit extract CriteriaMatchesSecurityType(\
      \ item -> concentrationLimitCriteria -> collateralCriteria, Debt )) all = True"
    - "Rosetta condition: ConcentrationLimitTypeMarketCapEquityOnly \u2014 if treatment\
      \ -> concentrationLimit -> concentrationLimitCriteria -> concentrationLimitType\
      \ only-element = ConcentrationLimitTypeEnum -> MarketCapitalisation then CriteriaMatchesSecurityType(collateralCriteria,\
      \ Equity) or (treatment -> concentrationLimit extract CriteriaMatchesSecurityType(\
      \ item -> concentrationLimitCriteria -> collateralCriteria, Equity )) all =\
      \ True"
    - "Rosetta condition: AverageTradingVolumeEquityOnly \u2014 if treatment -> concentrationLimit\
      \ -> concentrationLimitCriteria -> averageTradingVolume exists then CriteriaMatchesSecurityType(collateralCriteria,\
      \ Equity) or (treatment -> concentrationLimit extract CriteriaMatchesSecurityType(\
      \ item -> concentrationLimitCriteria -> collateralCriteria, Equity )) all =\
      \ True"
    in_subset:
    - cdm_product_collateral
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - common_domain_model:EligibleCollateralCriteria
    related_mappings:
    - gist:Specification
    is_a: CollateralCriteriaBase
    slots:
    - collateralCriteria
    - appliesTo
    - restrictTo
    - ratingPriorityResolution
    - EligibleCollateralCriteria_treatment
    slot_usage:
      treatment:
        name: treatment
        description: Identifies the treatment of specified collateral, e.g., haircuts,holding
          limits or exclusions.
        required: true
    class_uri: common_domain_model:EligibleCollateralCriteria
  CollateralTreatment:
