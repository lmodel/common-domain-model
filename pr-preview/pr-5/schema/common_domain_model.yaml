    inlined: true
    inlined_as_list: true
  hourMinuteTime:
    name: hourMinuteTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/hourMinuteTime
    description: A time specified in hh:mm:ss format where the second component must
      be '00', e.g. 11am would be represented as 11:00:00.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:BusinessCenterTime.hourMinuteTime
    slot_uri: common_domain_model:hourMinuteTime
    owner: BusinessCenterTime
    domain_of:
    - BusinessCenterTime
    range: time
    required: true
  businessDayConvention:
    name: businessDayConvention
    definition_uri: https://w3id.org/lmodel/common_domain_model/businessDayConvention
    description: The convention for adjusting a date if it would otherwise fall on
      a day that is not a business day, as specified by an ISDA convention (e.g. Following,
      Precedent).
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:BusinessDateRange.businessDayConvention
    slot_uri: common_domain_model:businessDayConvention
    owner: FxFixingDate
    domain_of:
    - BusinessDateRange
    - BusinessDayAdjustments
    - RelativeDateOffset
    - FinalCalculationPeriodDateAdjustment
    - FxFixingDate
    range: BusinessDayConventionEnum
    required: true
  businessCenters:
    name: businessCenters
    definition_uri: https://w3id.org/lmodel/common_domain_model/businessCenters
    description: The business center(s), specified either explicitly or by reference
      to those specified somewhere else in the instance document.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    close_mappings:
    - fpml_5_10:BusinessDateRange.businessCenters
    slot_uri: common_domain_model:businessCenters
    owner: FxFixingDate
    domain_of:
    - BusinessDateRange
    - BusinessDayAdjustments
    - RelativeDateOffset
    - BusinessDayOffset
    - ParametricDates
    - FxFixingDate
    range: BusinessCenters
    inlined: true
    inlined_as_list: true
  startDate:
    name: startDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/startDate
    description: The first date of a date range.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:startDate
    owner: CalculationPeriodData
    domain_of:
    - DateRange
    - AveragingSchedule
    - PeriodicDates
    - FroHistory
    - AssetDeliveryPeriods
    - DividendPeriod
    - CalculationPeriodData
    range: date
    required: true
  endDate:
    name: endDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/endDate
    description: The last date of a date range.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:endDate
    owner: CalculationPeriodData
    domain_of:
    - DateRange
    - AveragingSchedule
    - PeriodicDates
    - CustodianEvent
    - FroHistory
    - AssetDeliveryPeriods
    - DividendPeriod
    - CalculationPeriodData
    range: date
    required: true
  date:
    name: date
    definition_uri: https://w3id.org/lmodel/common_domain_model/date
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:date
    owner: CSAValuationDate
    domain_of:
    - DateList
    - DatedValue
    - CalculateTransferInstruction
    - OtherAgreement
    - AmendmentEffectiveDate
    - CSAValuationDate
    range: date
    required: true
    multivalued: true
  dateTime:
    name: dateTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/dateTime
    description: The CDM specifies that the zoned date time is to be expressed in
      accordance with ISO 8601, either as UTC as an offset to UTC.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:dateTime
    owner: WeightedAveragingObservation
    domain_of:
    - DateTimeList
    - AggregationParameters
    - EventTimestamp
    - WeightedAveragingObservation
    range: datetime
    required: true
    multivalued: true
  periodMultiplier:
    name: periodMultiplier
    definition_uri: https://w3id.org/lmodel/common_domain_model/periodMultiplier
    description: A time period multiplier, e.g. 1, 2, or 3. If the period value is
      T (Term) then period multiplier must contain the value 1.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:periodMultiplier
    owner: Velocity
    domain_of:
    - Frequency
    - Period
    - Velocity
    range: integer
    required: true
  period:
    name: period
    definition_uri: https://w3id.org/lmodel/common_domain_model/period
    description: A time period, e.g. a day, week, month, year or term of the stream.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:period
    owner: AverageTradingVolume
    domain_of:
    - Frequency
    - Period
    - PeriodBound
    - CalculationFrequency
    - Velocity
    - AverageTradingVolume
    range: PeriodExtendedEnum
    required: true
  dayType:
    name: dayType
    definition_uri: https://w3id.org/lmodel/common_domain_model/dayType
    description: In the case of an offset specified as a number of days, this element
      defines whether consideration is given as to whether a day is a good business
      day or not. If a day type of business days is specified then non-business days
      are ignored when calculating the offset. The financial business centers to use
      for determination of business days are implied by the context in which this
      element is used. This element must only be included when the offset is specified
      as a number of days. If the offset is zero days then the dayType element should
      not be included.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:dayType
    owner: ParametricDates
    domain_of:
    - Offset
    - PeriodicDates
    - ParametricDates
    range: DayTypeEnum
  offset:
    name: offset
    definition_uri: https://w3id.org/lmodel/common_domain_model/offset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:offset
    owner: CollateralInterestNotification
    domain_of:
    - CustomisableOffset
    - CollateralInterestNotification
    range: Offset
    inlined: true
    inlined_as_list: true
  customProvision:
    name: customProvision
    definition_uri: https://w3id.org/lmodel/common_domain_model/customProvision
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    slot_uri: common_domain_model:customProvision
    owner: ConditionsPrecedent
    domain_of:
    - CustomisableOffset
    - AmendmentEffectiveDate
    - ConditionsPrecedent
    range: string
  periodSkip:
    name: periodSkip
    definition_uri: https://w3id.org/lmodel/common_domain_model/periodSkip
    description: The number of periods in the referenced date schedule that are between
