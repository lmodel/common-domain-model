    - "Rosetta condition: AdditionalLanguage \u2014 if day is absent then additionalLanguage\
      \ exists"
    - "Rosetta condition: DayAndTime \u2014 if day exists then time exists else time\
      \ is absent and item -> location is absent and hourminutetime is absent and\
