    description: Defines the enumerated values to specify the nature of a location
      identifier.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_identifier
    permissible_values:
      DeliveryPoint:
        text: DeliveryPoint
        description: The physical or virtual point at which the commodity will be
          delivered.
      EntryPoint:
        text: EntryPoint
        description: The physical or virtual point at which the commodity enters a
          transportation system.
      InterconnectionPoint:
        text: InterconnectionPoint
        description: Identification of the border(s) or border point(s) of a transportation
          contract.
      WithdrawalPoint:
        text: WithdrawalPoint
        description: The physical or virtual point at which the commodity is withdrawn
          from a transportation system.
      DeliveryZone:
        text: DeliveryZone
        description: The zone covering potential delivery points for the commodity
      BuyerHub:
        text: BuyerHub
        description: The hub code of the buyer.
      SellerHub:
        text: SellerHub
        description: The hub code of the seller.
