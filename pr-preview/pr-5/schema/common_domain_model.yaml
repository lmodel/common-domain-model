        value: '[{"name":"CheckAgencyRating","inputs":[{"name":"agencyRatings","type":"AgencyRatingCriteria","cardinality":"0..1"},{"name":"query","type":"EligibilityQuery","cardinality":"1..1"}],"output":{"name":"isEqual","type":"boolean","cardinality":"1..1"}}]'
