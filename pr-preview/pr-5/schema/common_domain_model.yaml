  MasterAgreementSchedule:
    name: MasterAgreementSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreementSchedule
    description: The set of elections which specify a Master Agreement.
    in_subset:
    - cdm_legaldocumentation_master
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
    exact_mappings:
    - common_domain_model:MasterAgreementSchedule
    slots:
    - clause
    class_uri: common_domain_model:MasterAgreementSchedule
  MasterAgreementClause:
    name: MasterAgreementClause
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreementClause
    description: Defines clauses that make up a Master Agreement.
    in_subset:
    - cdm_legaldocumentation_master
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
    exact_mappings:
    - common_domain_model:MasterAgreementClause
    slots:
    - MasterAgreementClause_identifer
    - MasterAgreementClause_name
    - MasterAgreementClause_counterparty
    - MasterAgreementClause_otherParty
    - variant
    slot_usage:
      identifer:
        name: identifer
        description: Unique identifier for the clause.
        range: MasterAgreementClauseIdentifierEnum
      name:
        name: name
        description: Optional textual description of the clause.
      counterparty:
        name: counterparty
        description: Optional counterparty role. This can be used where a clause needs
          to be assigned to a specific party on the agreement based upon their role
          i.e. Party A or Party B.
        range: CounterpartyRoleEnum
        required: false
      otherParty:
        name: otherParty
        description: Optional party. This can be required for umbrella agreements
          where a clause may need to be assigned to a specific party who may or may
          not be on the agreement.
        range: PartyRoleEnum
    class_uri: common_domain_model:MasterAgreementClause
  MasterAgreementClauseVariant:
    name: MasterAgreementClauseVariant
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreementClauseVariant
    description: Sets the details for a specific variant associated to a clause in
      a Master Agreement.
    in_subset:
    - cdm_legaldocumentation_master
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
    exact_mappings:
    - common_domain_model:MasterAgreementClauseVariant
    slots:
    - MasterAgreementClauseVariant_identifier
    - MasterAgreementClauseVariant_name
    - MasterAgreementClauseVariant_counterparty
    - MasterAgreementClauseVariant_otherParty
    - MasterAgreementClauseVariant_variableSet
    slot_usage:
      identifier:
        name: identifier
        description: Unique identifier for this variant.
        range: MasterAgreementVariantIdentifierEnum
        multivalued: false
      name:
        name: name
        description: Optional textual description of the variant.
      counterparty:
        name: counterparty
        description: Optional counterparty role. This can be used where a clause needs
          to assign a different variant to the different parties on the agreement
          based upon their role i.e. Party A or Party B.
        range: CounterpartyRoleEnum
        required: false
      otherParty:
        name: otherParty
        description: Optional party. This can be used where a clause needs to assign
          different variants to different parties who may or may not be on the agreement.
        range: PartyRoleEnum
      variableSet:
        name: variableSet
        description: For some variants of some clauses additional details are required
          to work out what has been elected. This array can be used to define the
          name and value of these variables. Please refer to the agreement documentation
          for more details of the variables that are available for any clause.
        range: MasterAgreementVariableSet
    class_uri: common_domain_model:MasterAgreementClauseVariant
  MasterAgreementVariableSet:
    name: MasterAgreementVariableSet
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreementVariableSet
    description: Defines a type where additional variables associated to clauses and
      their variants can be described.
    comments:
    - "Rosetta condition: VariableSetExists \u2014 if variableSet exists then name\
      \ is absent and value is absent"
    - "Rosetta condition: VariableSetNesting \u2014 if variableSet -> variableSet\
      \ exists then variableSet -> variableSet -> variableSet is absent"
    - "Rosetta condition: NameMustExist \u2014 if name exists then value exists"
    - "Rosetta condition: ValueMustExist \u2014 if value exists then name exists"
    in_subset:
    - cdm_legaldocumentation_master
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_master
    exact_mappings:
    - common_domain_model:MasterAgreementVariableSet
    slots:
    - MasterAgreementVariableSet_variableSet
    - MasterAgreementVariableSet_name
    - MasterAgreementVariableSet_value
    slot_usage:
      variableSet:
        name: variableSet
        description: For some variants a table of variables is required. To support
          this use case we need to be able to specify variables within variables.
          Including a variable set here gives us infinite nesting opportunities -
          realistically we are only ever expecting that a table would need to be defined
          for any particular clause, so we would expect two levels of nesting as a
          maximum i.e. variableSet->variableSet->name/value.
        range: MasterAgreementVariableSet
      name:
        name: name
        description: The name of the variable.
      value:
        name: value
        description: The value for this variable.
        range: string
    class_uri: common_domain_model:MasterAgreementVariableSet
    rules:
    - preconditions:
        slot_conditions:
          variableSet:
            name: variableSet
            required: true
      postconditions:
        slot_conditions:
          name:
            name: name
            required: false
          value:
            name: value
            required: false
      description: If we have a variableSet then we must not have any name/value pairs
        at this level.
    - preconditions:
        slot_conditions:
          name:
            name: name
            required: true
      postconditions:
        slot_conditions:
          value:
            name: value
            required: true
      description: If we have a name then we must also have a value.
    - preconditions:
        slot_conditions:
          value:
            name: value
            required: true
      postconditions:
        slot_conditions:
          name:
            name: name
            required: true
      description: If we have a value then we must also have a name.
  MasterAgreementBase:
    name: MasterAgreementBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/MasterAgreementBase
    description: A set of elections that can be shared across master agreement types
      - this should be built upon for specific contracts.
