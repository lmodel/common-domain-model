        description: The parties involved in the position, including the Clearing
          Organization.
        range: Party
        multivalued: true
      partyRole:
        name: partyRole
        description: Represents the role each specified party takes in the position.
        multivalued: true
    class_uri: common_domain_model:CounterpartyPosition
  PositionBase:
    name: PositionBase
    definition_uri: https://w3id.org/lmodel/common_domain_model/PositionBase
    description: Base class to describe a Position, which could be a group of products
      (e.g. trade portfolio) or a group of assets (e.g. collateral portfolio).
    comments:
    - "Rosetta condition: ProductOrAsset \u2014 required choice product, asset"
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:PositionBase
    slots:
    - PositionBase_priceQuantity
    - PositionBase_product
    - asset
    - cashBalance
    - PositionBase_tradeReference
    slot_usage:
      priceQuantity:
        name: priceQuantity
        description: Position with many price quantities.
      product:
        name: product
        description: The product underlying the position.
        range: Product
        required: false
      tradeReference:
        name: tradeReference
        description: Reference to the Contract, in case product is contractual and
          the contract has been formed.
        range: TradeState
        multivalued: false
    class_uri: common_domain_model:PositionBase
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            product:
              name: product
              required: true
        - slot_conditions:
            asset:
              name: asset
              required: true
      description: A Position must either refer to a grouping by product or a grouping
        by asset.
  Position:
    name: Position
    definition_uri: https://w3id.org/lmodel/common_domain_model/Position
    description: A Position describes how much of a given Product is being held and
      constitutes the atomic element of a Portfolio.
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:Position
    is_a: PositionBase
    slots:
    - PositionBase_priceQuantity
    - PositionBase_product
    - asset
    - cashBalance
    - PositionBase_tradeReference
    class_uri: common_domain_model:Position
  PortfolioState:
    name: PortfolioState
    definition_uri: https://w3id.org/lmodel/common_domain_model/PortfolioState
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"EvaluatePortfolioState","description":"Function specification
          to evaluate a portfolio''s aggregation parameters and return a new portfolio
          state containing aggregated positions.","inputs":[{"name":"portfolio","type":"Portfolio","cardinality":"1..1"}],"output":{"name":"portfolioState","type":"PortfolioState","cardinality":"1..1"},"code_implementation":true}]'
    description: State-full representation of a Portfolio that describes all the positions
      held at a given time, in various states which can be either traded, settled,
      etc., with lineage information to the previous state
    comments:
    - "Rosetta condition: Initialisation \u2014 if lineage -> portfolioStateReference\
      \ is absent then positions is absent and lineage -> eventReference is absent"
    - "Rosetta condition: NonTransferable \u2014 positions -> product -> NonTransferableProduct\
      \ exists"
    - "Rosetta func: EvaluatePortfolioState \u2014 Function specification to evaluate\
      \ a portfolio's aggregation parameters and return a new portfolio state containing\
      \ aggregated positions."
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:PortfolioState
    slots:
    - positions
    - lineage
    class_uri: common_domain_model:PortfolioState
  AggregationParameters:
    name: AggregationParameters
    definition_uri: https://w3id.org/lmodel/common_domain_model/AggregationParameters
    description: ' Parameters to be used to filter events that are relevant to a given
      portfolio in order to calculate the state of this portfolio. The attributes
      correspond to all the possible aggregation criteria that can be used and these
      criteria can be combined. All the attributes are optional.'
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:AggregationParameters
    close_mappings:
    - fpml_5_10:AggregationParameters
    slots:
    - AggregationParameters_dateTime
    - totalPosition
    - positionStatus
    - AggregationParameters_party
    - AggregationParameters_product
    - AggregationParameters_productQualifier
    - tradeReference
    slot_usage:
      dateTime:
        name: dateTime
        description: To aggregate as of a particular date
        multivalued: false
      party:
        name: party
        description: To aggregate based on a selection of party(ies) / legal entity(ies).
        range: Party
        multivalued: true
      product:
        name: product
        description: To aggregate based on a selection of products.
        required: false
        multivalued: true
      productQualifier:
        name: productQualifier
        description: To aggregate based on a selection of product type(s).
        multivalued: true
    class_uri: common_domain_model:AggregationParameters
  Portfolio:
    name: Portfolio
    definition_uri: https://w3id.org/lmodel/common_domain_model/Portfolio
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"EvaluatePortfolioState","description":"Function specification
          to evaluate a portfolio''s aggregation parameters and return a new portfolio
          state containing aggregated positions.","inputs":[{"name":"portfolio","type":"Portfolio","cardinality":"1..1"}],"output":{"name":"portfolioState","type":"PortfolioState","cardinality":"1..1"},"code_implementation":true}]'
    description: ' A Portfolio represents an aggregation of multiple Positions, by
      describing the parameters that this Portfolio should be aggregated based on.
      The resulting PortfolioState is calculated using these aggregation parameters
      as inputs, by aggregating all the Events that are relevant to this Portfolio.
      The concept of Portfolio works at all levels in the model: from the highest
      for a given LegalEntity for instance, to the lowest to account for security
      substitutions in a secutity financing transaction. As such, Portfolio can be
      used either above or below the Contract level.'
    comments:
    - "Rosetta func: EvaluatePortfolioState \u2014 Function specification to evaluate\
      \ a portfolio's aggregation parameters and return a new portfolio state containing\
      \ aggregated positions."
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:Portfolio
    slots:
    - aggregationParameters
    - portfolioState
    class_uri: common_domain_model:Portfolio
  Inventory:
    name: Inventory
    definition_uri: https://w3id.org/lmodel/common_domain_model/Inventory
    description: A data type that can be used to describe an inventory of securities.
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:Inventory
    slots:
    - inventoryRecord
    class_uri: common_domain_model:Inventory
  InventoryRecord:
    name: InventoryRecord
    definition_uri: https://w3id.org/lmodel/common_domain_model/InventoryRecord
    description: An individual piece of inventory. This represents a single security.
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:InventoryRecord
    slots:
    - identifer
    - security
    class_uri: common_domain_model:InventoryRecord
  AvailableInventory:
    name: AvailableInventory
    definition_uri: https://w3id.org/lmodel/common_domain_model/AvailableInventory
    description: A data type that can be used to describe the inventory of securities
      that a party holds. The securities are held in the AvailableInventoryRecord,
      with each item in the array being an individual security and its associated
      criteria. Criteria can include the quantity available, the rate at which the
      security is available to borrow at, as well as other details that can affect
      the decision as to whether a party wants to utilise the securities listed.
    comments:
    - "Rosetta condition: ValidPartyRole \u2014 IsValidPartyRole( partyRole, [PartyRoleEnum\
      \ -> AgentLender, PartyRoleEnum -> BeneficialOwner, PartyRoleEnum -> Borrower,\
      \ PartyRoleEnum -> Custodian, PartyRoleEnum -> Lender] )"
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:AvailableInventory
    close_mappings:
    - fpml_5_10:AvailableInventory
    slots:
    - availableInventoryType
    - AvailableInventory_identifer
    - comment
    - messageInformation
    - AvailableInventory_party
    - AvailableInventory_partyRole
    - availableInventoryRecord
    slot_usage:
      identifer:
        name: identifer
        description: Unique identifier for this group. This can be used to uniquely
          identify a group of inventory records.
        required: false
      party:
        name: party
        description: Defines all parties involved for the list of inventory records
          in this set of inventory. For example, when used to describe securities
          lending availability, this could hold the sender of the availability, the
          intended recipient, the beneficial owner(s), the lender (which may differ
          from the sender as the lender may have the same piece of availability going
          through multiple agents), an agent or a venue.
        range: Party
        multivalued: true
      partyRole:
        name: partyRole
        description: Defines the role(s) that party(ies) may have in relation to the
          inventory.
        multivalued: true
    class_uri: common_domain_model:AvailableInventory
    tree_root: true
  AvailableInventoryRecord:
    name: AvailableInventoryRecord
    definition_uri: https://w3id.org/lmodel/common_domain_model/AvailableInventoryRecord
    description: An individual piece of available inventory. This represents a single
      security and its associated criteria. The criteria are used to describe any
      restrictions on the securities.
    comments:
    - "Rosetta condition: InterestRate \u2014 if interestRate exists then interestRate\
      \ -> priceType = PriceTypeEnum -> InterestRate"
    - "Rosetta condition: ValidPartyRole \u2014 IsValidPartyRole( partyRole, [PartyRoleEnum\
      \ -> AgentLender, PartyRoleEnum -> BeneficialOwner, PartyRoleEnum -> Custodian,\
      \ PartyRoleEnum -> Lender] )"
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:AvailableInventoryRecord
    close_mappings:
    - fpml_5_10:AvailableInventoryRecord
    is_a: InventoryRecord
    slots:
    - identifer
    - security
    - expirationDateTime
    - AvailableInventoryRecord_collateral
    - AvailableInventoryRecord_partyRole
    - AvailableInventoryRecord_quantity
    - interestRate
    - dividendTerms
    - AvailableInventoryRecord_comment
    slot_usage:
      collateral:
        name: collateral
        description: The type of collateral can often be required when determining
          if the piece of availability being described is suitable for a party.
        range: CollateralProvisions
        multivalued: true
      partyRole:
        name: partyRole
        description: An individual security may be held by several agents. Including
          the party role at this level allows us to reference the party holding this
          specific item.
        multivalued: true
      quantity:
        name: quantity
        description: The quantity of the security
      comment:
        name: comment
        description: Optional comment for this specific piece of inventory.
    class_uri: common_domain_model:AvailableInventoryRecord
  SecurityLocate:
    name: SecurityLocate
    definition_uri: https://w3id.org/lmodel/common_domain_model/SecurityLocate
    description: A locate is an approval from a broker that needs to be obtained prior
      to effecting a short sale in an equity security. Similar to security availability,
      a borrower can request a single or multiple securities, but at least one must
      be requested.
    comments:
    - "Rosetta condition: RequestOneSecurityMinimum \u2014 availableInventoryRecord\
      \ exists"
    in_subset:
    - cdm_event_position
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_position
    exact_mappings:
    - common_domain_model:SecurityLocate
    is_a: AvailableInventory
    slots:
    - availableInventoryType
    - AvailableInventory_identifer
    - comment
    - messageInformation
    - AvailableInventory_party
    - AvailableInventory_partyRole
    - availableInventoryRecord
    class_uri: common_domain_model:SecurityLocate
    tree_root: true
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          availableInventoryRecord:
            name: availableInventoryRecord
            required: true
      description: A locate must request the availability of at least one security.
  CreditLimitInformation:
    name: CreditLimitInformation
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditLimitInformation
    description: A class to represent the credit limit utilisation information.
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:CreditLimitInformation
    slots:
    - limitApplicable
    class_uri: common_domain_model:CreditLimitInformation
  CreditLimitUtilisation:
    name: CreditLimitUtilisation
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditLimitUtilisation
    description: Credit limit utilisation breakdown by executed trades and pending
      orders.
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:CreditLimitUtilisation
    slots:
    - executed
    - pending
    class_uri: common_domain_model:CreditLimitUtilisation
  CreditLimitUtilisationPosition:
    name: CreditLimitUtilisationPosition
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditLimitUtilisationPosition
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:CreditLimitUtilisationPosition
    slots:
    - shortPosition
    - longPosition
    - global_
    class_uri: common_domain_model:CreditLimitUtilisationPosition
  CustomisedWorkflow:
    name: CustomisedWorkflow
    definition_uri: https://w3id.org/lmodel/common_domain_model/CustomisedWorkflow
    description: In its initial iteration, this class is meant to support the DTCC
      TIW workflow information.
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:CustomisedWorkflow
    slots:
    - itemName
    - itemValue
    class_uri: common_domain_model:CustomisedWorkflow
  WorkflowStepApproval:
    name: WorkflowStepApproval
    definition_uri: https://w3id.org/lmodel/common_domain_model/WorkflowStepApproval
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_ProposedWorkflowStep","description":"Represents the
          proposal to create a business event that results in a workflow step containing
          an instruction, message details, identifiers, event timestamps, parties
          and accounts. The optional previous workflow step input provides workflow
          lineage to where there has been a correction or cancellation to the proposed
          step. The action is constrained so that when a previous workflow step is
          specified, the valid actions are as follows; New -> Correct and Correct
          -> Cancel. When a previous workflow is not specified, the action must be
          New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"proposedEvent","type":"EventInstruction","cardinality":"1..1"},{"name":"approval","type":"WorkflowStepApproval","cardinality":"0..*"}],"output":{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}}]'
    description: 'Party approvals associated to the current WorkflowStep. '
    comments:
    - "Rosetta func: Create_ProposedWorkflowStep \u2014 Represents the proposal to\
      \ create a business event that results in a workflow step containing an instruction,\
      \ message details, identifiers, event timestamps, parties and accounts. The\
      \ optional previous workflow step input provides workflow lineage to where there\
      \ has been a correction or cancellation to the proposed step. The action is\
      \ constrained so that when a previous workflow step is specified, the valid\
      \ actions are as follows; New -> Correct and Correct -> Cancel. When a previous\
      \ workflow is not specified, the action must be New."
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:WorkflowStepApproval
    slots:
    - approved
    - WorkflowStepApproval_party
    - rejectedReason
    - WorkflowStepApproval_timestamp
    slot_usage:
      party:
        name: party
        description: Reference to the Party who is approving/rejecting this workflow
          step
        range: Party
        required: true
      timestamp:
        name: timestamp
        description: Timestamp of the approval
        range: EventTimestamp
    class_uri: common_domain_model:WorkflowStepApproval
  WorkflowStep:
    name: WorkflowStep
    definition_uri: https://w3id.org/lmodel/common_domain_model/WorkflowStep
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_WorkflowStep","description":"Function to create a
          workflow step with a business event and associated details about the message,
          identifiers, event timestamps, parties and accounts involved in the step.
          The function should be used when there is already a fully formed business
          event with the action set to signify that the step is new, or a correction/cancellation
          of a previous step. The action is constrained so that when a previous workflow
          step is specified, the valid actions are as follows; New -> New, New ->
          Correct, New -> Cancel, Correct -> Correct and Correct -> Cancel. When a
          previous workflow is not specified, the action must be New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"businessEvent","type":"BusinessEvent","cardinality":"0..1"}],"output":{"name":"workflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_AcceptedWorkflowStep","description":"Represents
          the acceptance of a proposed instruction that results in a workflow step
          containing a business event, message details, identifiers, event timestamps,
          parties and accounts. The previous workflow step input must exist to provide
          workflow lineage. The instruction from the previous workflow step should
          be used with a [creation BusinessEvent] function to create the input business
          event passed into this function e.g. PartyChangeInstruction from the previous
          step is used with Create_PartyChange to produce the business event which
          should used as an input to this step.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"},{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"acceptedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_AcceptedWorkflowStepFromInstruction","description":"Represents
          the acceptance of a proposed instruction that results in a workflow step
          containing a business event, message details, identifiers, event timestamps,
          parties and accounts. The previous workflow step input must exist to provide
          workflow lineage. The instruction from the previous workflow step should
          be used with a [creation BusinessEvent] function to create the input business
          event passed into this function e.g. PartyChangeInstruction from the previous
          step is used with Create_PartyChange to produce the business event which
          should used as an input to this step.","inputs":[{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}],"output":{"name":"acceptedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_ProposedWorkflowStep","description":"Represents
          the proposal to create a business event that results in a workflow step
          containing an instruction, message details, identifiers, event timestamps,
          parties and accounts. The optional previous workflow step input provides
          workflow lineage to where there has been a correction or cancellation to
          the proposed step. The action is constrained so that when a previous workflow
          step is specified, the valid actions are as follows; New -> Correct and
          Correct -> Cancel. When a previous workflow is not specified, the action
          must be New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"proposedEvent","type":"EventInstruction","cardinality":"1..1"},{"name":"approval","type":"WorkflowStepApproval","cardinality":"0..*"}],"output":{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_RejectedWorkflowStep","description":"Represents
          the rejection of a proposed instruction that results in a workflow step
          containing the rejection flag, message details, identifiers, event timestamps,
          parties and accounts involved in the step. The previous workflow step input
          must exist to provide workflow lineage. This function will be further developed
          to provide the reasons for rejection.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}],"output":{"name":"rejectedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_Workflow","description":"Function
          to create a Workflow from a list of WorkflowStep.","inputs":[{"name":"steps","type":"WorkflowStep","cardinality":"1..*"}],"output":{"name":"workflow","type":"Workflow","cardinality":"1..1"}}]'
    description: A workflow step represents the state of a business event. The workflow
      step contains a reference to a previous WorkflowStep in order to preserve lineage.
      A workflow step is accepted if it contains a business event, proposed if proposedEvent
      is present and is rejected if the rejected flag is set.
    comments:
    - "Rosetta condition: WorkflowStepStatus \u2014 (businessEvent exists and nextEvent\
      \ -> instruction is absent and rejected is absent) or (nextEvent -> instruction\
      \ exists and businessEvent is absent and rejected is absent) or (rejected exists\
      \ and businessEvent is absent and nextEvent is absent) or (proposedEvent exists\
      \ and nextEvent is absent and rejected is absent) or (previousWorkflowStep exists\
      \ and action = ActionEnum -> Cancel)"
    - "Rosetta condition: CounterpartyPositionBusinessEventOrBusinessEventOrProposedEventChoice\
      \ \u2014 required choice counterpartyPositionBusinessEvent, businessEvent, proposedEvent"
    - "Rosetta func: Create_WorkflowStep \u2014 Function to create a workflow step\
      \ with a business event and associated details about the message, identifiers,\
      \ event timestamps, parties and accounts involved in the step. The function\
      \ should be used when there is already a fully formed business event with the\
      \ action set to signify that the step is new, or a correction/cancellation of\
      \ a previous step. The action is constrained so that when a previous workflow\
      \ step is specified, the valid actions are as follows; New -> New, New -> Correct,\
      \ New -> Cancel, Correct -> Correct and Correct -> Cancel. When a previous workflow\
      \ is not specified, the action must be New."
    - "Rosetta func: Create_AcceptedWorkflowStep \u2014 Represents the acceptance\
      \ of a proposed instruction that results in a workflow step containing a business\
      \ event, message details, identifiers, event timestamps, parties and accounts.\
      \ The previous workflow step input must exist to provide workflow lineage. The\
      \ instruction from the previous workflow step should be used with a [creation\
      \ BusinessEvent] function to create the input business event passed into this\
      \ function e.g. PartyChangeInstruction from the previous step is used with Create_PartyChange\
      \ to produce the business event which should used as an input to this step."
    - "Rosetta func: Create_AcceptedWorkflowStepFromInstruction \u2014 Represents\
      \ the acceptance of a proposed instruction that results in a workflow step containing\
      \ a business event, message details, identifiers, event timestamps, parties\
      \ and accounts. The previous workflow step input must exist to provide workflow\
      \ lineage. The instruction from the previous workflow step should be used with\
      \ a [creation BusinessEvent] function to create the input business event passed\
      \ into this function e.g. PartyChangeInstruction from the previous step is used\
      \ with Create_PartyChange to produce the business event which should used as\
      \ an input to this step."
    - "Rosetta func: Create_ProposedWorkflowStep \u2014 Represents the proposal to\
      \ create a business event that results in a workflow step containing an instruction,\
      \ message details, identifiers, event timestamps, parties and accounts. The\
      \ optional previous workflow step input provides workflow lineage to where there\
      \ has been a correction or cancellation to the proposed step. The action is\
      \ constrained so that when a previous workflow step is specified, the valid\
      \ actions are as follows; New -> Correct and Correct -> Cancel. When a previous\
      \ workflow is not specified, the action must be New."
    - "Rosetta func: Create_RejectedWorkflowStep \u2014 Represents the rejection of\
      \ a proposed instruction that results in a workflow step containing the rejection\
      \ flag, message details, identifiers, event timestamps, parties and accounts\
      \ involved in the step. The previous workflow step input must exist to provide\
      \ workflow lineage. This function will be further developed to provide the reasons\
      \ for rejection."
    - "Rosetta func: Create_Workflow \u2014 Function to create a Workflow from a list\
      \ of WorkflowStep."
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:WorkflowStep
    slots:
    - businessEvent
    - counterpartyPositionBusinessEvent
    - proposedEvent
    - rejected
    - approval
    - previousWorkflowStep
    - nextEvent
    - WorkflowStep_messageInformation
    - WorkflowStep_timestamp
    - eventIdentifier
    - action
    - WorkflowStep_party
    - WorkflowStep_account
    - WorkflowStep_lineage
    - creditLimitInformation
    - workflowState
    slot_usage:
      messageInformation:
        name: messageInformation
        description: 'Contains all information pertaining the FpML messaging header '
      timestamp:
        name: timestamp
        description: The set of timestamp(s) associated with the event as a collection
          of [dateTime, qualifier].
        range: EventTimestamp
        multivalued: true
      party:
        name: party
        description: The specification of the event parties. This attribute is optional,
          as not applicable to certain events (e.g. most of the observations).
        range: Party
        multivalued: true
      account:
        name: account
        description: Optional account information that could be associated to the
          event.
        multivalued: true
      lineage:
        name: lineage
        description: The lineage attribute provides a linkage among lifecycle events
          through the globalKey hash value. One example is when a given lifecycle
          event is being corrected or cancelled. In such case, each subsequent event
          will have lineage into the prior version of that event. The second broad
          use case is when an event has a dependency upon either another event (e.g.
          the regular payment associated with a fix/float swap will have a lineage
          into the reset event, which will in turn have a lineage into the observation
          event for the floating rate and the contract) or a contract (e.g. the exercise
          of an option has a lineage into that option).
        deprecated: Deprecated in CDM
        required: false
    class_uri: common_domain_model:WorkflowStep
    tree_root: true
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            counterpartyPositionBusinessEvent:
              name: counterpartyPositionBusinessEvent
              required: true
        - slot_conditions:
            businessEvent:
              name: businessEvent
              required: true
        - slot_conditions:
            proposedEvent:
              name: proposedEvent
              required: true
      description: Choice rule to control that either positionBusinessEvent is present,
        businessEvent is present or proposedEvent is present, but not more than one
        at the same time.
  Workflow:
    name: Workflow
    definition_uri: https://w3id.org/lmodel/common_domain_model/Workflow
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_Workflow","description":"Function to create a Workflow
          from a list of WorkflowStep.","inputs":[{"name":"steps","type":"WorkflowStep","cardinality":"1..*"}],"output":{"name":"workflow","type":"Workflow","cardinality":"1..1"}}]'
    description: A collection of workflow steps which together make up an entire workflow
      sequence.
    comments:
    - "Rosetta func: Create_Workflow \u2014 Function to create a Workflow from a list\
      \ of WorkflowStep."
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:Workflow
    related_mappings:
    - gist:Task
    slots:
    - steps
    class_uri: common_domain_model:Workflow
  EventInstruction:
    name: EventInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_ProposedWorkflowStep","description":"Represents the
          proposal to create a business event that results in a workflow step containing
          an instruction, message details, identifiers, event timestamps, parties
          and accounts. The optional previous workflow step input provides workflow
          lineage to where there has been a correction or cancellation to the proposed
          step. The action is constrained so that when a previous workflow step is
          specified, the valid actions are as follows; New -> Correct and Correct
          -> Cancel. When a previous workflow is not specified, the action must be
          New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"proposedEvent","type":"EventInstruction","cardinality":"1..1"},{"name":"approval","type":"WorkflowStepApproval","cardinality":"0..*"}],"output":{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}}]'
    description: Specifies instructions to create a BusinessEvent.
    comments:
    - "Rosetta condition: CorporateAction \u2014 if corporateActionIntent exists then\
      \ intent = EventIntentEnum -> CorporateActionAdjustment"
    - "Rosetta func: Create_ProposedWorkflowStep \u2014 Represents the proposal to\
      \ create a business event that results in a workflow step containing an instruction,\
      \ message details, identifiers, event timestamps, parties and accounts. The\
      \ optional previous workflow step input provides workflow lineage to where there\
      \ has been a correction or cancellation to the proposed step. The action is\
      \ constrained so that when a previous workflow step is specified, the valid\
      \ actions are as follows; New -> Correct and Correct -> Cancel. When a previous\
      \ workflow is not specified, the action must be New."
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:EventInstruction
    slots:
    - EventInstruction_intent
    - corporateActionIntent
    - eventDate
    - eventTime
    - EventInstruction_effectiveDate
    - effectiveTime
    - packageInformation
    - instruction
    slot_usage:
      intent:
        name: intent
        description: The intent attribute is meant to be specified when the event
          qualification cannot be programmatically inferred from the event features.
          As a result it is only associated with those primitives that can give way
          to such ambiguity, the quantityChange being one of those. An example of
          such is a reduction in the trade notional, which could be interpreted as
          either a trade correction (unless a maximum period of time post-event is
          specified as part of the qualification), a partial termination or a portfolio
          rebalancing in the case of an equity swap. On the other hand, an event such
          as the exercise is not expected to have an associated intent as there should
          not be ambiguity.
        range: EventIntentEnum
        required: false
      effectiveDate:
        name: effectiveDate
        description: The date on which the event contractually takes effect, when
          different from the event date.
    class_uri: common_domain_model:EventInstruction
  EventTimestamp:
    name: EventTimestamp
    definition_uri: https://w3id.org/lmodel/common_domain_model/EventTimestamp
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_WorkflowStep","description":"Function to create a
          workflow step with a business event and associated details about the message,
          identifiers, event timestamps, parties and accounts involved in the step.
          The function should be used when there is already a fully formed business
          event with the action set to signify that the step is new, or a correction/cancellation
          of a previous step. The action is constrained so that when a previous workflow
          step is specified, the valid actions are as follows; New -> New, New ->
          Correct, New -> Cancel, Correct -> Correct and Correct -> Cancel. When a
          previous workflow is not specified, the action must be New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"businessEvent","type":"BusinessEvent","cardinality":"0..1"}],"output":{"name":"workflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_AcceptedWorkflowStep","description":"Represents
          the acceptance of a proposed instruction that results in a workflow step
          containing a business event, message details, identifiers, event timestamps,
          parties and accounts. The previous workflow step input must exist to provide
          workflow lineage. The instruction from the previous workflow step should
          be used with a [creation BusinessEvent] function to create the input business
          event passed into this function e.g. PartyChangeInstruction from the previous
          step is used with Create_PartyChange to produce the business event which
          should used as an input to this step.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"},{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"acceptedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_ProposedWorkflowStep","description":"Represents
          the proposal to create a business event that results in a workflow step
          containing an instruction, message details, identifiers, event timestamps,
          parties and accounts. The optional previous workflow step input provides
          workflow lineage to where there has been a correction or cancellation to
          the proposed step. The action is constrained so that when a previous workflow
          step is specified, the valid actions are as follows; New -> Correct and
          Correct -> Cancel. When a previous workflow is not specified, the action
          must be New.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"party","type":"Party","cardinality":"0..*"},{"name":"account","type":"Account","cardinality":"0..*"},{"name":"previousWorkflowStep","type":"WorkflowStep","cardinality":"0..1"},{"name":"action","type":"ActionEnum","cardinality":"1..1"},{"name":"proposedEvent","type":"EventInstruction","cardinality":"1..1"},{"name":"approval","type":"WorkflowStepApproval","cardinality":"0..*"}],"output":{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}},{"name":"Create_RejectedWorkflowStep","description":"Represents
          the rejection of a proposed instruction that results in a workflow step
          containing the rejection flag, message details, identifiers, event timestamps,
          parties and accounts involved in the step. The previous workflow step input
          must exist to provide workflow lineage. This function will be further developed
          to provide the reasons for rejection.","inputs":[{"name":"messageInformation","type":"MessageInformation","cardinality":"0..1"},{"name":"timestamp","type":"EventTimestamp","cardinality":"1..*"},{"name":"eventIdentifier","type":"Identifier","cardinality":"1..*"},{"name":"proposedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}],"output":{"name":"rejectedWorkflowStep","type":"WorkflowStep","cardinality":"1..1"}}]'
    description: A class to represent the various set of timestamps that can be associated
      with lifecycle events, as a collection of [dateTime, qualifier].
    comments:
    - "Rosetta func: Create_WorkflowStep \u2014 Function to create a workflow step\
      \ with a business event and associated details about the message, identifiers,\
      \ event timestamps, parties and accounts involved in the step. The function\
      \ should be used when there is already a fully formed business event with the\
      \ action set to signify that the step is new, or a correction/cancellation of\
      \ a previous step. The action is constrained so that when a previous workflow\
      \ step is specified, the valid actions are as follows; New -> New, New -> Correct,\
      \ New -> Cancel, Correct -> Correct and Correct -> Cancel. When a previous workflow\
      \ is not specified, the action must be New."
    - "Rosetta func: Create_AcceptedWorkflowStep \u2014 Represents the acceptance\
      \ of a proposed instruction that results in a workflow step containing a business\
      \ event, message details, identifiers, event timestamps, parties and accounts.\
      \ The previous workflow step input must exist to provide workflow lineage. The\
      \ instruction from the previous workflow step should be used with a [creation\
      \ BusinessEvent] function to create the input business event passed into this\
      \ function e.g. PartyChangeInstruction from the previous step is used with Create_PartyChange\
      \ to produce the business event which should used as an input to this step."
    - "Rosetta func: Create_ProposedWorkflowStep \u2014 Represents the proposal to\
      \ create a business event that results in a workflow step containing an instruction,\
      \ message details, identifiers, event timestamps, parties and accounts. The\
      \ optional previous workflow step input provides workflow lineage to where there\
      \ has been a correction or cancellation to the proposed step. The action is\
      \ constrained so that when a previous workflow step is specified, the valid\
      \ actions are as follows; New -> Correct and Correct -> Cancel. When a previous\
      \ workflow is not specified, the action must be New."
    - "Rosetta func: Create_RejectedWorkflowStep \u2014 Represents the rejection of\
      \ a proposed instruction that results in a workflow step containing the rejection\
      \ flag, message details, identifiers, event timestamps, parties and accounts\
      \ involved in the step. The previous workflow step input must exist to provide\
      \ workflow lineage. This function will be further developed to provide the reasons\
      \ for rejection."
    in_subset:
    - cdm_event_workflow
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_workflow
    exact_mappings:
    - common_domain_model:EventTimestamp
    slots:
    - EventTimestamp_dateTime
    - qualification
    slot_usage:
      dateTime:
        name: dateTime
        multivalued: false
    class_uri: common_domain_model:EventTimestamp
