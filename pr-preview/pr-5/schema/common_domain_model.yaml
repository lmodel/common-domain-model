    range: boolean
  publicSource:
    name: publicSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/publicSource
    description: 'A public information source, e.g. a particular newspaper or electronic
      news service, that may publish relevant information used in the determination
      of whether or not a credit event has occurred. ISDA 2003 Term: Public Source.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:publicSource
    owner: PubliclyAvailableInformation
    domain_of:
    - PubliclyAvailableInformation
    range: string
    multivalued: true
  specifiedNumber:
    name: specifiedNumber
    definition_uri: https://w3id.org/lmodel/common_domain_model/specifiedNumber
    description: 'The minimum number of the specified public information sources that
      must publish information that reasonably confirms that a credit event has occurred.
      The market convention is two. ISDA 2003 Term: Specified Number.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:specifiedNumber
    owner: PubliclyAvailableInformation
    domain_of:
    - PubliclyAvailableInformation
    range: integer
  restructuringType:
    name: restructuringType
    definition_uri: https://w3id.org/lmodel/common_domain_model/restructuringType
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: Specifies the type of restructuring that is applicable.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:restructuringType
    owner: Restructuring
    domain_of:
    - Restructuring
    range: RestructuringEnum
  multipleHolderObligation:
    name: multipleHolderObligation
    definition_uri: https://w3id.org/lmodel/common_domain_model/multipleHolderObligation
    description: 'In relation to a restructuring credit event, unless multiple holder
      obligation is not specified restructurings are limited to multiple holder obligations.
      A multiple holder obligation means an obligation that is held by more than three
      holders that are not affiliates of each other and where at least two thirds
      of the holders must agree to the event that constitutes the restructuring credit
      event. ISDA 2003 Term: Multiple Holder Obligation.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:multipleHolderObligation
    owner: Restructuring
    domain_of:
    - Restructuring
    range: boolean
  multipleCreditEventNotices:
    name: multipleCreditEventNotices
    definition_uri: https://w3id.org/lmodel/common_domain_model/multipleCreditEventNotices
    description: 'Presence of this element and value set to ''true'' indicates that
      Section 3.9 of the 2003 Credit Derivatives Definitions shall apply. Absence
      of this element indicates that Section 3.9 shall not apply. NOTE: Not allowed
      under ISDA Credit 1999.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_event
    slot_uri: common_domain_model:multipleCreditEventNotices
    owner: Restructuring
    domain_of:
    - Restructuring
    range: boolean
