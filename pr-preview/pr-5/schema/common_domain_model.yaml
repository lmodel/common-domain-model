    - standardisedException
    - simmExceptionApplicable
    - SimmException_asSpecified
    slot_usage:
      asSpecified:
        name: asSpecified
        description: The Standard Initial Margin Model exception when specified as
          a customized approach by the party.
    class_uri: common_domain_model:SimmException
  SimmVersion:
    name: SimmVersion
    definition_uri: https://w3id.org/lmodel/common_domain_model/SimmVersion
    description: A class to specify the ISDA SIMM version that applies to the ISDA
      2018 CSA for Initial Margin.
    notes:
    - ISDA CSA_IM_2018 paragraph "13 General Principles" clause "(ee)(1)"
    comments:
    - "Rosetta condition: VersionNotSpecified \u2014 if isSpecified = False then partyVersion\
      \ is absent"
    - "Rosetta condition: VersionSpecified \u2014 if isSpecified = True then partyVersion\
      \ exists"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2018
    exact_mappings:
    - common_domain_model:SimmVersion
    slots:
    - SimmVersion_isSpecified
    - partyVersion
    - SimmVersion_asSpecified
    slot_usage:
      isSpecified:
        name: isSpecified
        description: A boolean attribute to determine whether the SIMM version is
          specified for the purpose of the legal agreement.
        required: false
      asSpecified:
        name: asSpecified
        description: The SIMM version exception when specified as a customized approach
          by the party.
    class_uri: common_domain_model:SimmVersion
    rules:
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'False'
      postconditions:
        slot_conditions:
          partyVersion:
            name: partyVersion
            required: false
      description: A data rule to enforce that the version attribute should be absent
        when the SIMM version is stated as not specified for the CSA.
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'True'
      postconditions:
        slot_conditions:
          partyVersion:
            name: partyVersion
            required: true
      description: A data rule to enforce that the version attribute should be specified
        when the SIMM version is stated as specified for the CSA.
  SubstitutedRegime:
    name: SubstitutedRegime
    definition_uri: https://w3id.org/lmodel/common_domain_model/SubstitutedRegime
    description: A class to specify each party's election with respect to the Substituted
      Regimes that will be applicable...
    comments:
    - "Rosetta condition: SubstitutedRegimeChoice \u2014 required choice regime, additionalRegime"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    exact_mappings:
    - common_domain_model:SubstitutedRegime
    slots:
    - SubstitutedRegime_regime
    - additionalRegime
    - SubstitutedRegime_regimeTerms
    slot_usage:
      regime:
        name: regime
        description: The applicable regulatory regime, as specified through an enumeration.
        range: RegulatoryRegimeEnum
        required: false
      regimeTerms:
        name: regimeTerms
        description: Specifies the applicability of the Substituted Regime as denoted
          in the Substituted Regime Table as part of certain legal agreements, such
          as the ISDA 2016 and 2018 CSA for Initial Margin.
        range: SubstitutedRegimeTerms
    class_uri: common_domain_model:SubstitutedRegime
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            regime:
              name: regime
              required: true
        - slot_conditions:
            additionalRegime:
              name: additionalRegime
              required: true
      description: The applicable regime should be specified either as an enumeration
        or as an additional regime specified by the parties.
  SubstitutedRegimeTerms:
    name: SubstitutedRegimeTerms
    definition_uri: https://w3id.org/lmodel/common_domain_model/SubstitutedRegimeTerms
    description: Specifies the applicability of the Substituted Regime as denoted
      in the Substituted Regime Table as part of certain legal agreements, such as
      such as the ISDA 2016 and 2018 CSA for Initial Margin.
    in_subset:
    - cdm_legaldocumentation_csa
