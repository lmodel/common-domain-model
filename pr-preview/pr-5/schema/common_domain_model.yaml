  Instruction:
    name: Instruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/Instruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_PairOffInstruction","description":"Creates a set
          of instructions to pair-off a set of trades based on a pair reference. A
          package component is created based on that pair reference and the list of
          identifiers for the underlying trades. That package component is then added
          onto the execution details of every underlying trade. The existing trades
          are not terminated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"2..*"},{"name":"pairReference","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"Instruction","cardinality":"1..*"}},{"name":"Create_BusinessEvent","description":"Creates
          a business event from instructions containing primitive instructions and
          optionally a trade state.","inputs":[{"name":"instruction","type":"Instruction","cardinality":"1..*"},{"name":"intent","type":"EventIntentEnum","cardinality":"0..1"},{"name":"eventDate","type":"date","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"1..1"}],"output":{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}}]'
    description: Instruction to a function that will be used to perform a business
      event
    comments:
    - "Rosetta condition: ExclusiveSplitPrimitive \u2014 if primitiveInstruction ->\
      \ split exists then primitiveInstruction -> split only exists"
    - "Rosetta condition: NewTrade \u2014 (if primitiveInstruction -> execution exists\
      \ then before is absent else True) and (if before is absent then primitiveInstruction\
      \ -> execution exists else True)"
    - "Rosetta func: Create_PairOffInstruction \u2014 Creates a set of instructions\
      \ to pair-off a set of trades based on a pair reference. A package component\
      \ is created based on that pair reference and the list of identifiers for the\
      \ underlying trades. That package component is then added onto the execution\
      \ details of every underlying trade. The existing trades are not terminated."
    - "Rosetta func: Create_BusinessEvent \u2014 Creates a business event from instructions\
      \ containing primitive instructions and optionally a trade state."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:Instruction
    slots:
    - primitiveInstruction
    - before
    class_uri: common_domain_model:Instruction
    tree_root: true
  PrimitiveInstruction:
    name: PrimitiveInstruction
    definition_uri: https://w3id.org/lmodel/common_domain_model/PrimitiveInstruction
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_Split","description":"Defines the logic for splitting
          a trade into separate copies. The split instruction contains a breakdown
          into N set of primitive instructions. Each set contains the primitive instructions
          to be applied to each post-split trade, eventually producing N trades. The
          split function underpins a number of business events such as clearing or
          allocation.","inputs":[{"name":"breakdown","type":"PrimitiveInstruction","cardinality":"1..*"},{"name":"originalTrade","type":"TradeState","cardinality":"1..1"}],"output":{"name":"splitTrade","type":"TradeState","cardinality":"1..*"}},{"name":"Create_RollPrimitiveInstruction","description":"Creates
          the primitive instructions for a trade roll. A trade roll consists in closing
          an existing trade and entering into a new one which has the same characteristics
          as the old one, except with an extended termination date and (possibly)
          a different price.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveRollDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"terminationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_OnDemandRateChangePrimitiveInstruction","description":"Creates
          a full primitive instruction for an on-demand rate change event. A rate
          change consists in closing the original trade and opening a new one with
          the same details as the original one, but with a new rate (price) and effective
          date. The business event logic checks that there is only 1 rate price in
          the original trade to be updated.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"agreedRate","type":"number","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_CancellationPrimitiveInstruction","description":"Creates
          a primitive instruction for early cancellation.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newRepurchasePrice","type":"number","cardinality":"0..1"},{"name":"cancellationDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_ShapingInstruction","description":"Creates
          a set of instructions to shape a trade based on shaped quantities and a
          package ID. The original trade is closed and split into (smaller) shaped
          trades based on a set of trade lots containing the shaped quantities and
          an identifier for each shaped trade. A package component is created based
          on the package ID and the list of identifiers for the shaped trades. That
          package component is then added onto the execution details of every shaped
          trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"tradeLots","type":"TradeLot","cardinality":"2..*"},{"name":"shapeIdentifier","type":"Identifier","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_PartialDeliveryPrimitiveInstruction","description":"Creates
          the primitive instruction for partial delivery of a repo transaction at
          settlement.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"deliveredPriceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_RepricePrimitiveInstruction","description":"Creates
          the primitive instructions for a repricing that alters the cash amount of
          the trade. Transaction value and variation margin are processed separately
          as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newCashValue","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_AdjustmentPrimitiveInstruction","description":"Creates
          the primitive instructions for a repricing that alters the collateral quantity
          and value of the trade. Transaction value and variation margin are processed
          separately as are transfers of cash and securities.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"newAllinPrice","type":"number","cardinality":"1..1"},{"name":"newAssetQuantity","type":"number","cardinality":"1..1"},{"name":"effectiveRepriceDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_SubstitutionPrimitiveInstruction","description":"Creates
          the primitive instructions for a substitution of collateral by replacing
          the assetpayout of the trade.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"},{"name":"priceQuantity","type":"PriceQuantity","cardinality":"1..*"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"NewTradeInstructionOnlyExists","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"1..1"}],"output":{"name":"result","type":"boolean","cardinality":"1..1"}},{"name":"Create_OnDemandInterestPaymentPrimitiveInstruction","description":"An
          instruction to make a interium interest payment by adding a payout leg to
          the deal.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"interestAmount","type":"Money","cardinality":"1..1"},{"name":"settlementDate","type":"SettlementDate","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TerminationInstruction","description":"Creates
          the relevant primitive instruction for a termination, which consists in
          a quantity change to bring the quantity to zero.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"}],"output":{"name":"instruction","type":"PrimitiveInstruction","cardinality":"1..1"}},{"name":"Create_TradeState","description":"Creates
          a single trade state by applying primitive instructions to an existing trade
          state (optional in case an execution instruction is included). The primitive
          instructions are applied in the following order: Always first: - execution,
          if it exists, otherwise a before state must be provided The following 3
          can be executed in any order, because they touch separate components of
          the trade: - quantity change - terms change - party change Always last:
          - contract formation, otherwise the contract could be invalid.","inputs":[{"name":"primitiveInstruction","type":"PrimitiveInstruction","cardinality":"0..1"},{"name":"before","type":"TradeState","cardinality":"0..1"}],"output":{"name":"after","type":"TradeState","cardinality":"1..1"}}]'
    description: A Primitive Instruction describes the inputs required to pass into
      the corresponding PrimitiveEvent function.
    comments:
    - "Rosetta func: Create_Split \u2014 Defines the logic for splitting a trade into\
      \ separate copies. The split instruction contains a breakdown into N set of\
      \ primitive instructions. Each set contains the primitive instructions to be\
      \ applied to each post-split trade, eventually producing N trades. The split\
      \ function underpins a number of business events such as clearing or allocation."
    - "Rosetta func: Create_RollPrimitiveInstruction \u2014 Creates the primitive\
      \ instructions for a trade roll. A trade roll consists in closing an existing\
      \ trade and entering into a new one which has the same characteristics as the\
      \ old one, except with an extended termination date and (possibly) a different\
      \ price."
    - "Rosetta func: Create_OnDemandRateChangePrimitiveInstruction \u2014 Creates\
      \ a full primitive instruction for an on-demand rate change event. A rate change\
      \ consists in closing the original trade and opening a new one with the same\
      \ details as the original one, but with a new rate (price) and effective date.\
      \ The business event logic checks that there is only 1 rate price in the original\
      \ trade to be updated."
    - "Rosetta func: Create_CancellationPrimitiveInstruction \u2014 Creates a primitive\
      \ instruction for early cancellation."
    - "Rosetta func: Create_ShapingInstruction \u2014 Creates a set of instructions\
      \ to shape a trade based on shaped quantities and a package ID. The original\
      \ trade is closed and split into (smaller) shaped trades based on a set of trade\
      \ lots containing the shaped quantities and an identifier for each shaped trade.\
      \ A package component is created based on the package ID and the list of identifiers\
      \ for the shaped trades. That package component is then added onto the execution\
      \ details of every shaped trade."
    - "Rosetta func: Create_PartialDeliveryPrimitiveInstruction \u2014 Creates the\
      \ primitive instruction for partial delivery of a repo transaction at settlement."
    - "Rosetta func: Create_RepricePrimitiveInstruction \u2014 Creates the primitive\
      \ instructions for a repricing that alters the cash amount of the trade. Transaction\
      \ value and variation margin are processed separately as are transfers of cash\
      \ and securities."
    - "Rosetta func: Create_AdjustmentPrimitiveInstruction \u2014 Creates the primitive\
      \ instructions for a repricing that alters the collateral quantity and value\
      \ of the trade. Transaction value and variation margin are processed separately\
      \ as are transfers of cash and securities."
    - "Rosetta func: Create_SubstitutionPrimitiveInstruction \u2014 Creates the primitive\
      \ instructions for a substitution of collateral by replacing the assetpayout\
      \ of the trade."
    - 'Rosetta func: NewTradeInstructionOnlyExists'
    - "Rosetta func: Create_OnDemandInterestPaymentPrimitiveInstruction \u2014 An\
      \ instruction to make a interium interest payment by adding a payout leg to\
      \ the deal."
    - "Rosetta func: Create_TerminationInstruction \u2014 Creates the relevant primitive\
      \ instruction for a termination, which consists in a quantity change to bring\
      \ the quantity to zero."
    - "Rosetta func: Create_TradeState \u2014 Creates a single trade state by applying\
      \ primitive instructions to an existing trade state (optional in case an execution\
      \ instruction is included). The primitive instructions are applied in the following\
      \ order: Always first: - execution, if it exists, otherwise a before state must\
      \ be provided The following 3 can be executed in any order, because they touch\
      \ separate components of the trade: - quantity change - terms change - party\
      \ change Always last: - contract formation, otherwise the contract could be\
      \ invalid."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:PrimitiveInstruction
    slots:
    - contractFormation
    - execution
    - exercise
    - partyChange
    - quantityChange
    - reset
    - split
    - termsChange
    - transfer
    - indexTransition
    - stockSplit
    - observation
    - valuation
    class_uri: common_domain_model:PrimitiveInstruction
  BusinessEvent:
    name: BusinessEvent
    definition_uri: https://w3id.org/lmodel/common_domain_model/BusinessEvent
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_Return","description":"Defines the process of partially
          or fully returning a Security Lending Transaction.","inputs":[{"name":"tradeState","type":"TradeState","cardinality":"1..1"},{"name":"returnInstruction","type":"ReturnInstruction","cardinality":"1..1"},{"name":"returnDate","type":"date","cardinality":"1..1"}],"output":{"name":"returnEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"Qualify_Substitution","description":"Qualification
          of a collateral substitution event.","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"is_event","type":"boolean","cardinality":"1..1"}},{"name":"Create_BusinessEvent","description":"Creates
          a business event from instructions containing primitive instructions and
          optionally a trade state.","inputs":[{"name":"instruction","type":"Instruction","cardinality":"1..*"},{"name":"intent","type":"EventIntentEnum","cardinality":"0..1"},{"name":"eventDate","type":"date","cardinality":"1..1"},{"name":"effectiveDate","type":"date","cardinality":"1..1"}],"output":{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}},{"name":"ExtractBeforeEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractOpenEconomicTerms","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"economicTerms","type":"EconomicTerms","cardinality":"0..1"}},{"name":"ExtractBeforeTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}},{"name":"ExtractAfterTrade","inputs":[{"name":"businessEvent","type":"BusinessEvent","cardinality":"1..1"}],"output":{"name":"trade","type":"Trade","cardinality":"0..1"}}]'
    description: A business event represents a life cycle event of a trade. The combination
      of the state changes results in a qualifiable life cycle event. An example of
      a Business Event is a PartialTermination which is a defined by a quantity change
      primitive event.
    comments:
    - "Rosetta condition: EventDate \u2014 eventDate exists"
    - "Rosetta func: Create_Return \u2014 Defines the process of partially or fully\
      \ returning a Security Lending Transaction."
