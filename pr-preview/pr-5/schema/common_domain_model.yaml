  BillingSummary:
    name: BillingSummary
    definition_uri: https://w3id.org/lmodel/common_domain_model/BillingSummary
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"Create_BillingSummary","description":"Creates a billing
          summary to be included in a Security Lending Billing Invoice.","inputs":[{"name":"billingRecord","type":"BillingRecord","cardinality":"1..*"}],"output":{"name":"billingSummary","type":"BillingSummary","cardinality":"1..1"},"code_implementation":true}]'
    description: Specifies individual summaries within a billing invoice.
    comments:
    - "Rosetta condition: GrandTotal \u2014 if summaryAmountType = RecordAmountTypeEnum\
      \ -> GrandTotal then summaryTransfer exists and summaryTransfer ->> payerReceiver\
      \ is absent"
    - "Rosetta condition: ParentTotal \u2014 if summaryAmountType = RecordAmountTypeEnum\
      \ -> ParentTotal then summaryTransfer ->> payerReceiver exists and summaryTransfer\
      \ ->> payerReceiver -> payerAccountReference is absent and summaryTransfer ->>\
      \ payerReceiver -> receiverAccountReference is absent"
    - "Rosetta condition: AccountTotal \u2014 if summaryAmountType = RecordAmountTypeEnum\
      \ -> AccountTotal then summaryTransfer ->> payerReceiver -> payerAccountReference\
      \ exists and summaryTransfer ->> payerReceiver -> receiverAccountReference exists"
    - "Rosetta func: Create_BillingSummary \u2014 Creates a billing summary to be\
      \ included in a Security Lending Billing Invoice."
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:BillingSummary
    close_mappings:
    - fpml_5_10:BillingSummary
    slots:
    - summaryTransfer
    - summaryAmountType
    class_uri: common_domain_model:BillingSummary
