    - preconditions:
        slot_conditions:
          asCalculationAgent:
            name: asCalculationAgent
            equals_string: 'False'
      postconditions:
        slot_conditions:
          bespokeCalculationTimeTerms:
            name: bespokeCalculationTimeTerms
            required: true
      description: A data rule to enforce that the Calculation Time for Initial Margin
