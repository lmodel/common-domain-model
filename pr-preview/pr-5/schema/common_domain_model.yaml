        required: false
    class_uri: common_domain_model:PartyCustomisedWorkflow
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            partyName:
              name: partyName
              required: true
        - slot_conditions:
            partyReference:
              name: partyReference
              required: true
      description: The identification of the party to which the PartyCustomisedWorkflow
        pertains to can be done through either a party reference or the party name.
  Velocity:
    name: Velocity
    definition_uri: https://w3id.org/lmodel/common_domain_model/Velocity
    in_subset:
    - cdm_event_workflow
