          the terms change instruction that updates the payout with the new substitution
          payout.","inputs":[{"name":"product","type":"NonTransferableProduct","cardinality":"1..1"},{"name":"effectiveDate","type":"AdjustableOrRelativeDate","cardinality":"1..1"},{"name":"newCollateralPortfolio","type":"CollateralPortfolio","cardinality":"1..1"}],"output":{"name":"termsChangeInstruction","type":"TermsChangeInstruction","cardinality":"1..1"}}]'
    description: Represents common attributes to define the details of collateral
      assets, to be used in margin call messaging and contribute to collateral balances
      e.g securities in a collateral account.
    comments:
    - "Rosetta func: Create_SubstitutionPrimitiveInstruction \u2014 Creates the primitive\
      \ instructions for a substitution of collateral by replacing the assetpayout\
      \ of the trade."
    - "Rosetta func: Create_SubstitutionInstruction \u2014 Creates the terms change\
      \ instruction that updates the payout with the new substitution payout."
    in_subset:
