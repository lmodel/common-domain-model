      Inflation Derivatives Definitions, sections 1.3 and 1.8.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:fallbackBondApplicable
    owner: InflationRateSpecification
