    - partyRole
    - tradeId
    slot_usage:
      counterparty:
        name: counterparty
        description: The new counterparty who is stepping into the trade. The stepping
          out counterparty is inferred based on the counterparty role that is being
          updated.
        multivalued: false
      ancillaryParty:
        name: ancillaryParty
        description: Specifies an ancillary party to be added onto the new transaction,
          e.g. the original executing party in an allocation.
        range: AncillaryParty
    class_uri: common_domain_model:PartyChangeInstruction
  TradeState:
    name: TradeState
