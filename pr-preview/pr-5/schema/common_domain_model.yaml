  PriceQuantity:
    name: PriceQuantity
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceQuantity
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"InterestRateObservableCondition","description":"Implementation
          for PriceQuantity.InterestRateObservable condition.","inputs":[{"name":"pq","type":"PriceQuantity","cardinality":"1..1"}],"output":{"name":"valid","type":"boolean","cardinality":"0..1"}}]'
    description: Defines a settlement as an exchange between two parties of a specified
      quantity of an asset (the quantity) against a specified quantity of another
      asset (the price). The settlement is optional and can be either cash or physical.
      The quantity can additionally be specified in terms of one or more currency
      amounts. In the case of non-cash products, the settlement of the price/quantity
      would not be specified here and instead would be delegated to the product mechanics,
      as parameterised by the price/quantity values.
    comments:
    - "Rosetta condition: NonCurrencyQuantities \u2014 (quantity count - quantity\
      \ -> unit -> currency count) <= 1 or (observable -> Asset -> Commodity exists\
      \ and quantity -> unit -> capacityUnit exists and (quantity count - quantity\
      \ -> unit -> currency count) <= 2)"
    - "Rosetta condition: ArithmeticOperator \u2014 if observable -> Index -> InterestRateIndex\
      \ exists and price exists then price -> arithmeticOperator exists"
    - "Rosetta condition: InterestRateObservable \u2014 InterestRateObservableCondition"
    - "Rosetta func: InterestRateObservableCondition \u2014 Implementation for PriceQuantity.InterestRateObservable\
      \ condition."
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:PriceQuantity
    slots:
    - PriceQuantity_price
    - PriceQuantity_quantity
    - observable
    - PriceQuantity_effectiveDate
    slot_usage:
      price:
        name: price
        description: Specifies a price to be used for trade amounts and other purposes.
        range: PriceSchedule
        multivalued: true
      quantity:
        name: quantity
        description: Specifies a quantity to be associated with an event, for example
          a trade amount.
        range: NonNegativeQuantitySchedule
        multivalued: true
      effectiveDate:
        name: effectiveDate
        description: Specifies the date at which the price and quantity become effective.
          This day may be subject to adjustment in accordance with a business day
          convention, or could be specified as relative to a trade date, for instance.
          Optional cardinality, as the effective date is usually specified in the
          product definition, so it may only need to be specified as part of the PriceQuantity
          in an increase/decrease scenario for an existing trade.
        range: AdjustableOrRelativeDate
    class_uri: common_domain_model:PriceQuantity
  PriceComposite:
    name: PriceComposite
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceComposite
    description: Defines the inputs required to calculate a price as a simple composite
      of 2 other values. The inputs consist of 2 numbers and a simple arithmetic operator.
      This generic data type applies to a variety of use cases where a price is obtained
      by simple composition, e.g. dirty = clean + accrued (Bond), forward rate = spot
      rate + forward point (FX) etc.
    comments:
    - "Rosetta condition: ArithmeticOperator \u2014 if operandType = PriceOperandEnum\
      \ -> ForwardPoint or operandType = PriceOperandEnum -> AccruedInterest then\
      \ arithmeticOperator = ArithmeticOperationEnum -> Add or arithmeticOperator\
      \ = ArithmeticOperationEnum -> Subtract"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:PriceComposite
    slots:
    - baseValue
    - operand
    - arithmeticOperator
    - operandType
    class_uri: common_domain_model:PriceComposite
  PriceSchedule:
    name: PriceSchedule
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceSchedule
    annotations:
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"FilterPrice","description":"Filter list of prices based
          on price type.","inputs":[{"name":"prices","type":"PriceSchedule","cardinality":"0..*"},{"name":"priceType","type":"PriceTypeEnum","cardinality":"1..1"},{"name":"arithmeticOperators","type":"ArithmeticOperationEnum","cardinality":"0..*"},{"name":"priceExpression","type":"PriceExpressionEnum","cardinality":"0..1"}],"output":{"name":"price","type":"PriceSchedule","cardinality":"0..1"}}]'
    description: 'Specifies the price of a financial instrument in a trade as a schedule
      of measures. A price generically expresses the value of an exchange as a ratio:
      it measures the amount of one thing needed to be exchanged for 1 unit of another
      thing (e.g. cash in a specific currency in exchange for a bond or share). This
      generic representation can be used to support any type of financial price beyond
      just cash price: e.g. an interest rate, a foreign exchange rate, etc. This data
      type is generically based on a schedule and can also be used to represent a
      price as a single value.'
    comments:
    - "Rosetta condition: UnitOfAmountExists \u2014 if priceType = Variance or priceType\
      \ = Volatility or priceType = Correlation then unit is absent and perUnitOf\
      \ is absent else unit exists and perUnitOf exists"
    - "Rosetta condition: PositiveAssetPrice \u2014 if (priceType = ExchangeRate or\
      \ priceType = AssetPrice) and arithmeticOperator is absent then value > 0 or\
      \ datedValue -> value all > 0"
    - "Rosetta condition: PositiveSpotRate \u2014 if (priceType = ExchangeRate or\
      \ priceType = AssetPrice) and composite -> baseValue exists then composite ->\
      \ baseValue > 0"
    - "Rosetta condition: PositivePremium \u2014 if priceType = Premium then value\
      \ > 0"
    - "Rosetta condition: CurrencyUnitForInterestRate \u2014 if priceType = PriceTypeEnum\
      \ -> InterestRate then unit -> currency exists"
    - "Rosetta condition: Choice \u2014 optional choice arithmeticOperator, composite"
    - "Rosetta condition: Premium \u2014 if premiumType exists then priceType = Premium"
    - "Rosetta condition: ArithmeticOperator \u2014 arithmeticOperator <> Subtract\
      \ and arithmeticOperator <> Divide"
    - "Rosetta condition: SpreadPrice \u2014 if arithmeticOperator = Add then priceType\
      \ = AssetPrice or priceType = InterestRate"
    - "Rosetta condition: ForwardPoint \u2014 if composite -> operandType = ForwardPoint\
      \ then priceType = ExchangeRate"
    - "Rosetta condition: AccruedInterest \u2014 if composite -> operandType = AccruedInterest\
      \ then priceType = AssetPrice"
    - "Rosetta condition: InterestRateFeeType \u2014 if priceSubType = Fee or priceSubType\
      \ = Rebate then priceType = InterestRate"
    - "Rosetta func: FilterPrice \u2014 Filter list of prices based on price type."
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:PriceSchedule
    is_a: MeasureSchedule
    slots:
    - value
    - unit
    - datedValue
    - perUnitOf
    - priceType
    - priceSubType
    - priceExpression
    - composite
    - PriceSchedule_arithmeticOperator
    - premiumType
    slot_usage:
      arithmeticOperator:
        name: arithmeticOperator
        description: (Optionally) When the price is to be understood as an operator
          to apply to an observable, i.e. a spread, multiplier or min/max.
        required: false
    class_uri: common_domain_model:PriceSchedule
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            arithmeticOperator:
              name: arithmeticOperator
              required: true
        - slot_conditions:
            composite:
              name: composite
              required: true
      description: The price can be specified mutually exclusively as an operator
        (e.g. a spread or multiplier) or a composite.
    - preconditions:
        slot_conditions:
          premiumType:
            name: premiumType
            required: true
      postconditions:
        slot_conditions:
          priceType:
            name: priceType
            equals_string: Premium
      description: If we are applying a premium to the price then we must define this
        as a premium in priceType.
  Price:
    name: Price
    definition_uri: https://w3id.org/lmodel/common_domain_model/Price
    description: Specifies a price as a single value to be associated to a financial
      product. This data type extends PriceSchedule and requires that only the amount
      value exists.
    comments:
    - "Rosetta condition: AmountOnlyExists \u2014 value exists and datedValue is absent"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:Price
    related_mappings:
    - gist:Magnitude
    is_a: PriceSchedule
    slots:
    - value
    - unit
    - datedValue
    - perUnitOf
    - priceType
    - priceSubType
    - priceExpression
    - composite
    - PriceSchedule_arithmeticOperator
    - premiumType
    class_uri: common_domain_model:Price
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          value:
            name: value
            required: true
          datedValue:
            name: datedValue
            required: false
      description: The amount must exist when the price represents a single value,
        and steps must be absent.
  Basket:
    name: Basket
    definition_uri: https://w3id.org/lmodel/common_domain_model/Basket
    description: Defines a custom basket by referencing an identifier and its constituents.
    comments:
    - "Rosetta condition: AssetType \u2014 assetType = Security"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:Basket
    is_a: AssetBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    - basketConstituent
    class_uri: common_domain_model:Basket
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          assetType:
            name: assetType
            equals_string: Security
      description: Asset type must be Security.
  BasketConstituent:
    name: BasketConstituent
    definition_uri: https://w3id.org/lmodel/common_domain_model/BasketConstituent
    description: Identifies the constituents of the basket
    comments:
    - "Rosetta condition: BasketsOfBaskets \u2014 Basket is absent"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:BasketConstituent
    close_mappings:
    - fpml_5_10:BasketConstituent
    is_a: Observable
    slots:
    - BasketConstituent_quantity
    - initialValuationPrice
    - interimValuationPrice
    - finalValuationPrice
    slot_usage:
      quantity:
        name: quantity
        description: Specifies a quantity schedule to be associated to an individual
          underlier that is a basket constituent. The multiple cardinality is aligned
          to the one of the PriceQuantity->quantity that this quantity is referencing.
        range: NonNegativeQuantitySchedule
        multivalued: true
    class_uri: common_domain_model:BasketConstituent
    rules:
    - preconditions: {}
      postconditions:
        slot_conditions:
          Basket:
            name: Basket
            required: false
      description: To prevent endless looping, baskets of baskets are not supported.
  InformationSource:
    name: InformationSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/InformationSource
    description: A class defining the source for a piece of information (e.g. a rate
      fix or an FX fixing). The attribute names have been adjusted from FpML to address
      the fact that the information is not limited to rates.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:InformationSource
    slots:
    - sourceProvider
    - sourcePage
    - sourcePageHeading
    class_uri: common_domain_model:InformationSource
  Money:
    name: Money
    definition_uri: https://w3id.org/lmodel/common_domain_model/Money
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Defines a monetary amount in a specified currency.
    comments:
    - "Rosetta condition: CurrencyUnitExists \u2014 unit -> currency exists"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:Money
    close_mappings:
    - gist:Magnitude
    is_a: Quantity
    slots:
    - value
    - unit
    - datedValue
    - multiplier
    - frequency
    class_uri: common_domain_model:Money
  QuotedCurrencyPair:
    name: QuotedCurrencyPair
    definition_uri: https://w3id.org/lmodel/common_domain_model/QuotedCurrencyPair
    description: A class that describes the composition of a rate that has been quoted
      or is to be quoted. This includes the two currencies and the quotation relationship
      between the two currencies and is used as a building block throughout the FX
      specification.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:QuotedCurrencyPair
    slots:
    - currency1
    - currency2
    - quoteBasis
    class_uri: common_domain_model:QuotedCurrencyPair
  Curve:
    name: Curve
    definition_uri: https://w3id.org/lmodel/common_domain_model/Curve
    deprecated: Deprecated in CDM
    comments:
    - "Rosetta condition: Curve \u2014 one-of"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:Curve
    slots:
    - interestRateCurve
    - commodityCurve
    class_uri: common_domain_model:Curve
    rules:
    - preconditions: {}
      description: Curve
      comments:
      - 'Rosetta one-of: exactly one slot must be present.'
  InterestRateCurve:
    name: InterestRateCurve
    definition_uri: https://w3id.org/lmodel/common_domain_model/InterestRateCurve
    deprecated: Deprecated in CDM
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:InterestRateCurve
    slots:
    - floatingRateIndex
    - tenor
    class_uri: common_domain_model:InterestRateCurve
  TransactedPrice:
    name: TransactedPrice
    definition_uri: https://w3id.org/lmodel/common_domain_model/TransactedPrice
    description: ' A class to represent the transacted price attributes that are positioned
      as part of the FpML FeeLeg.'
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:TransactedPrice
    slots:
    - marketFixedRate
    - initialPoints
    - marketPrice
    - quotationStyle
    class_uri: common_domain_model:TransactedPrice
  ReferenceSwapCurve:
    name: ReferenceSwapCurve
    definition_uri: https://w3id.org/lmodel/common_domain_model/ReferenceSwapCurve
    description: A complex type used to specify the option and convertible bond option
      strike when expressed in reference to a swap curve.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:ReferenceSwapCurve
    slots:
    - swapUnwindValue
    - makeWholeAmount
    class_uri: common_domain_model:ReferenceSwapCurve
  MakeWholeAmount:
    name: MakeWholeAmount
    definition_uri: https://w3id.org/lmodel/common_domain_model/MakeWholeAmount
    description: A class to specify the amount to be paid by the buyer of the option
      if the option is exercised prior to the Early Call Date (typically applicable
      to the convertible bond options).
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:MakeWholeAmount
    is_a: SwapCurveValuation
    slots:
    - floatingRateIndex
    - SwapCurveValuation_indexTenor
    - spread
    - side
    - interpolationMethod
    - earlyCallDate
    class_uri: common_domain_model:MakeWholeAmount
  SwapCurveValuation:
    name: SwapCurveValuation
    definition_uri: https://w3id.org/lmodel/common_domain_model/SwapCurveValuation
    description: A class to specify a valuation swap curve, which is used as part
      of the strike construct for the bond and convertible bond options.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:SwapCurveValuation
    slots:
    - floatingRateIndex
    - SwapCurveValuation_indexTenor
    - spread
    - side
    slot_usage:
      indexTenor:
        name: indexTenor
        description: The ISDA Designated Maturity, i.e. the tenor of the floating
          rate.
    class_uri: common_domain_model:SwapCurveValuation
  ValuationDates:
    name: ValuationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationDates
    description: Defines how and when a performance type option or performance type
      swap is to be valued, including initial, interim and final valuation dates.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:ValuationDates
    slots:
    - initialValuationDate
    - interimValuationDate
    - finalValuationDate
    class_uri: common_domain_model:ValuationDates
  PerformanceValuationDates:
    name: PerformanceValuationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/PerformanceValuationDates
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: Defines how and when a performance type option or performance type
      swap is to be valued.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:PerformanceValuationDates
    slots:
    - determinationMethod
    - PerformanceValuationDates_valuationDates
    - PerformanceValuationDates_valuationDate
    - PerformanceValuationDates_valuationTime
    - valuationTimeType
    slot_usage:
      valuationDates:
        name: valuationDates
        description: '2018 ISDA CDM Equity Confirmation for Security Equity Swap:
          Pricing Date'
        range: AdjustableRelativeOrPeriodicDates
        required: false
      valuationDate:
        name: valuationDate
        description: '2018 ISDA CDM Equity Confirmation for Security Equity Swap:
          Pricing Date'
        range: AdjustableOrRelativeDate
        required: false
      valuationTime:
        name: valuationTime
        description: The specific time of day at which the calculation agent values
          the underlying. The SpecificTime is the only case when the valuationTime
          (time + business center location  e.g. 10:00:00 USNY) should be provided.
          You should be able to provide just the valuationTime without valuationTimeType,
          which infer that this is a specific time.
        range: BusinessCenterTime
        required: false
    class_uri: common_domain_model:PerformanceValuationDates
  FxRateSourceFixing:
    name: FxRateSourceFixing
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxRateSourceFixing
    description: Describes a rate source to be fixed and the date the fixing occurs
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FxRateSourceFixing
    slots:
    - settlementRateSource
    - fixingDate
    class_uri: common_domain_model:FxRateSourceFixing
  FxInformationSource:
    name: FxInformationSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxInformationSource
    description: Information source specific to Foreign Exchange products.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FxInformationSource
    is_a: InformationSource
    slots:
    - sourceProvider
    - sourcePage
    - sourcePageHeading
    - fixingTime
    class_uri: common_domain_model:FxInformationSource
  FallbackReferencePrice:
    name: FallbackReferencePrice
    definition_uri: https://w3id.org/lmodel/common_domain_model/FallbackReferencePrice
    description: The method, prioritised by the order it is listed in this element,
      to get a replacement rate for the disrupted settlement rate option.
    comments:
    - "Rosetta condition: MaximumDaysOfPostponement \u2014 if valuationPostponement\
      \ exists then valuationPostponement -> maximumDaysOfPostponement > 0"
    - "Rosetta condition: FallbackCalculationAgent \u2014 if calculationAgentDetermination\
      \ -> calculationAgentParty exists then calculationAgentDetermination -> calculationAgentParty\
      \ = AncillaryRoleEnum -> CalculationAgentFallback"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FallbackReferencePrice
    slots:
    - valuationPostponement
    - fallBackSettlementRateOption
    - fallbackSurveyValuationPostponement
    - calculationAgentDetermination
    class_uri: common_domain_model:FallbackReferencePrice
  ValuationPostponement:
    name: ValuationPostponement
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationPostponement
    description: Specifies how long to wait to get a quote from a settlement rate
      option upon a price source disruption.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:ValuationPostponement
    slots:
    - maximumDaysOfPostponement
    class_uri: common_domain_model:ValuationPostponement
  FxRate:
    name: FxRate
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxRate
    description: 'A class describing the rate of a currency conversion: pair of currency,
      quotation mode and exchange rate.'
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FxRate
    slots:
    - FxRate_quotedCurrencyPair
    - rate
    slot_usage:
      quotedCurrencyPair:
        name: quotedCurrencyPair
        description: Defines the two currencies for an FX trade and the quotation
          relationship between the two currencies.
    class_uri: common_domain_model:FxRate
  FxSpotRateSource:
    name: FxSpotRateSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxSpotRateSource
    description: A class defining the rate source and fixing time for an FX rate.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FxSpotRateSource
    slots:
    - primarySource
    - secondarySource
    class_uri: common_domain_model:FxSpotRateSource
  RateObservation:
    name: RateObservation
    definition_uri: https://w3id.org/lmodel/common_domain_model/RateObservation
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A class defining parameters associated with an individual observation
      or fixing. This class forms part of the cashflow representation of a stream.
    comments:
    - "Rosetta condition: PositiveObservationWeight \u2014 if observationWeight exists\
      \ then observationWeight >= 0"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:RateObservation
    slots:
    - RateObservation_resetDate
    - adjustedFixingDate
    - observedRate
    - treatedRate
    - observationWeight
    - rateReference
    - forecastRate
    - treatedForecastRate
    slot_usage:
      resetDate:
        name: resetDate
        description: The reset date.
        required: false
    class_uri: common_domain_model:RateObservation
    rules:
    - preconditions:
        slot_conditions:
          observationWeight:
            name: observationWeight
            required: true
      postconditions:
        slot_conditions:
          observationWeight:
            name: observationWeight
            minimum_value: 0
      description: FpML specifies observationWeight as a positive integer.
  CreditNotation:
    name: CreditNotation
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditNotation
    description: Represents a class to specify the credit notation as the combination
      of agency, notation, scale and debt type qualifications.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:CreditNotation
    slots:
    - agency
    - notation
    - scale
    - debt
    - outlook
    - creditWatch
    class_uri: common_domain_model:CreditNotation
  CreditNotations:
    name: CreditNotations
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditNotations
    description: Represents the credit rating notation higher level construct, which
      provides the ability to specify multiple rating notations.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:CreditNotations
    slots:
    - creditNotation
    - creditNotations
    class_uri: common_domain_model:CreditNotations
  CreditRatingDebt:
    name: CreditRatingDebt
    definition_uri: https://w3id.org/lmodel/common_domain_model/CreditRatingDebt
    description: Specifies the credit rating debt type(s) associated with the credit
      rating notation and scale. When several debt types are specified, they must
      be qualified through an 'any' or 'all'.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:CreditRatingDebt
    slots:
    - CreditRatingDebt_debtType
    - debtTypes
    slot_usage:
      debtType:
        name: debtType
        description: Specifies when there is only one debt type. FpML doesn't specify
          values in relation to the associated scheme, which is hence not specified
          as an enumeration as part of the CDM.
        range: string
    class_uri: common_domain_model:CreditRatingDebt
  MultipleCreditNotations:
    name: MultipleCreditNotations
    definition_uri: https://w3id.org/lmodel/common_domain_model/MultipleCreditNotations
    description: Represetns a class to specify multiple credit notations alongside
      a conditional 'any' or 'all' qualifier.
    comments:
    - "Rosetta condition: ReferenceAgency \u2014 if mismatchResolution = CreditNotationMismatchResolutionEnum\
      \ -> ReferenceAgency then referenceAgency exists"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:MultipleCreditNotations
    slots:
    - condition
    - MultipleCreditNotations_creditNotation
    - mismatchResolution
    - referenceAgency
    slot_usage:
      creditNotation:
        name: creditNotation
        description: At least two credit notations much be specified.
        required: true
        multivalued: true
    class_uri: common_domain_model:MultipleCreditNotations
    rules:
    - preconditions:
        slot_conditions:
          mismatchResolution:
            name: mismatchResolution
            equals_string: ReferenceAgency
      postconditions:
        slot_conditions:
          referenceAgency:
            name: referenceAgency
            required: true
      description: If the mismatch resolution is ReferenceAgency, ensure that the
        reference agency is specified.
  MultipleDebtTypes:
    name: MultipleDebtTypes
    definition_uri: https://w3id.org/lmodel/common_domain_model/MultipleDebtTypes
    description: Represents a class to specify multiple credit debt types alongside
      a conditional 'any' or 'all' qualifier.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:MultipleDebtTypes
    slots:
    - MultipleDebtTypes_condition
    - MultipleDebtTypes_debtType
    slot_usage:
      condition:
        name: condition
        description: An enumerated attribute, to qualify whether All or Any debt type
          applies.
      debtType:
        name: debtType
        description: The type of debt, e.g. long term debt, deposit, ... FpML doesn't
          specific a scheme value, hence no enumeration is specified as part of the
          CDM. At least two debt types much be specified.
        range: string
        required: true
        multivalued: true
    class_uri: common_domain_model:MultipleDebtTypes
  FxSettlementRateSource:
    name: FxSettlementRateSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/FxSettlementRateSource
    description: The source of the Foreign Exchange settlement rate.
    comments:
    - "Rosetta condition: FxSettlementRateSourceChoice \u2014 required choice settlementRateOption,\
      \ nonstandardSettlementRate"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:FxSettlementRateSource
    slots:
    - FxSettlementRateSource_settlementRateOption
    - nonstandardSettlementRate
    slot_usage:
      settlementRateOption:
        name: settlementRateOption
        description: Indicates that an officially defined rate settlement rate option
          will be the used for the fixing.
        range: string
    class_uri: common_domain_model:FxSettlementRateSource
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            settlementRateOption:
              name: settlementRateOption
              required: true
        - slot_conditions:
            nonstandardSettlementRate:
              name: nonstandardSettlementRate
              required: true
      description: FxSettlementRateSourceChoice
  CalculationAgent:
    name: CalculationAgent
    definition_uri: https://w3id.org/lmodel/common_domain_model/CalculationAgent
    description: A class defining the ISDA calculation agent responsible for performing
      duties as defined in the applicable product definitions.
    comments:
    - "Rosetta condition: CalculationAgentChoice \u2014 optional choice calculationAgentParty,\
      \ calculationAgentPartyEnum"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:CalculationAgent
    close_mappings:
    - fpml_5_10:CalculationAgent
    slots:
    - calculationAgentParty
    - calculationAgentPartyEnum
    - calculationAgentBusinessCenter
    class_uri: common_domain_model:CalculationAgent
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            calculationAgentParty:
              name: calculationAgentParty
              required: true
        - slot_conditions:
            calculationAgentPartyEnum:
              name: calculationAgentPartyEnum
              required: true
      description: Choice rule to represent an FpML choice construct.
  SettlementRateOption:
    name: SettlementRateOption
    definition_uri: https://w3id.org/lmodel/common_domain_model/SettlementRateOption
    description: Defines the settlement rate option to use for fixing in case of cash
      settlement. Currently only applicable to foreign exchange fixing in case of
      cross-currency settlement.
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:SettlementRateOption
    slots:
    - SettlementRateOption_settlementRateOption
    - SettlementRateOption_priceSourceDisruption
    slot_usage:
      settlementRateOption:
        name: settlementRateOption
        description: The rate source for the conversion to the settlement currency.
          This source is specified through a scheme that reflects the terms of the
          Annex A to the 1998 FX and Currency Option Definitions.
        range: SettlementRateOptionEnum
        required: true
      priceSourceDisruption:
        name: priceSourceDisruption
        description: An attribute defining the parameters to get a new quote when
          a settlement rate option is disrupted.
        range: PriceSourceDisruption
    class_uri: common_domain_model:SettlementRateOption
  MultipleValuationDates:
    name: MultipleValuationDates
    definition_uri: https://w3id.org/lmodel/common_domain_model/MultipleValuationDates
    comments:
    - "Rosetta condition: BusinessDaysThereafter \u2014 if businessDaysThereafter\
      \ exists then businessDaysThereafter >= 0"
    - "Rosetta condition: NumberValuationDates \u2014 if numberValuationDates exists\
      \ then numberValuationDates >= 0"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:MultipleValuationDates
    is_a: SingleValuationDate
    slots:
    - businessDays
    - businessDaysThereafter
    - numberValuationDates
    class_uri: common_domain_model:MultipleValuationDates
    rules:
    - preconditions:
        slot_conditions:
          businessDaysThereafter:
            name: businessDaysThereafter
            required: true
      postconditions:
        slot_conditions:
          businessDaysThereafter:
            name: businessDaysThereafter
            minimum_value: 0
      description: FpML specifies businessDaysThereafter as a PositiveInteger.
    - preconditions:
        slot_conditions:
          numberValuationDates:
            name: numberValuationDates
            required: true
      postconditions:
        slot_conditions:
          numberValuationDates:
            name: numberValuationDates
            minimum_value: 0
      description: FpML specifies numberValuationDates as a PositiveInteger.
  SingleValuationDate:
    name: SingleValuationDate
    definition_uri: https://w3id.org/lmodel/common_domain_model/SingleValuationDate
    description: A class to specify the number of business days after satisfaction
      of all conditions to settlement.
    comments:
    - "Rosetta condition: NonNegativeBusinessDays \u2014 if businessDays exists then\
      \ businessDays >= 0"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:SingleValuationDate
    slots:
    - businessDays
    class_uri: common_domain_model:SingleValuationDate
    rules:
    - preconditions:
        slot_conditions:
          businessDays:
            name: businessDays
            required: true
      postconditions:
        slot_conditions:
          businessDays:
            name: businessDays
            minimum_value: 0
      description: FpML specifies businessDays as a NonNegativeInteger.
  ValuationSource:
    name: ValuationSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationSource
    description: A class describing the method for obtaining a settlement rate, specified
      through either an information source (page), a settlement rate option (fixing)
      or by using quotes from reference banks.
    comments:
    - "Rosetta condition: InformationSource \u2014 required choice informationSource,\
      \ settlementRateOption, referenceBanks, dealerOrCCP"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:ValuationSource
    slots:
    - ValuationSource_quotedCurrencyPair
    - ValuationSource_informationSource
    - ValuationSource_settlementRateOption
    - referenceBanks
    - dealerOrCCP
    slot_usage:
      quotedCurrencyPair:
        name: quotedCurrencyPair
        description: Defines the two currencies for an FX trade and the quotation
          relationship between the two currencies.  This attribute was formerly part
          of 'fxSettlementTerms', which is now being harmonised into a common 'CashSettlementTerms'
          that includes a 'ValuationDate'.
        required: false
      informationSource:
        name: informationSource
        description: The information source where a published or displayed market
          rate will be obtained, e.g. Telerate Page 3750.
        range: FxSpotRateSource
      settlementRateOption:
        name: settlementRateOption
        description: The rate option to use for the fixing. Currently only applicable
          to foreign exchange fixing in case of cross-currency settlement.
    class_uri: common_domain_model:ValuationSource
    rules:
    - preconditions: {}
      postconditions:
        exactly_one_of:
        - slot_conditions:
            informationSource:
              name: informationSource
              required: true
        - slot_conditions:
            settlementRateOption:
              name: settlementRateOption
              required: true
        - slot_conditions:
            referenceBanks:
              name: referenceBanks
              required: true
        - slot_conditions:
            dealerOrCCP:
              name: dealerOrCCP
              required: true
      description: An information source must be provided.
  PriceSourceDisruption:
    name: PriceSourceDisruption
    definition_uri: https://w3id.org/lmodel/common_domain_model/PriceSourceDisruption
    description: 'A data defining:  the parameters used to get a price quote to replace
      the settlement rate option that is disrupted.'
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:PriceSourceDisruption
    slots:
    - PriceSourceDisruption_fallbackReferencePrice
    slot_usage:
      fallbackReferencePrice:
        name: fallbackReferencePrice
        range: FallbackReferencePrice
        required: true
    class_uri: common_domain_model:PriceSourceDisruption
  ValuationMethod:
    name: ValuationMethod
    definition_uri: https://w3id.org/lmodel/common_domain_model/ValuationMethod
    description: Specifies the parameters required to obtain a valuation, including
      the source, quotation method (bid, mid etc.) and any applicable quotation amount.
    comments:
    - "Rosetta condition: FpML_cd_37 \u2014 if (quotationAmount -> unit -> currency\
      \ exists and minimumQuotationAmount -> unit -> currency exists) and quotationAmount\
      \ -> unit -> currency = minimumQuotationAmount -> unit -> currency then quotationAmount\
      \ -> value > minimumQuotationAmount -> value"
    - "Rosetta condition: Dealer \u2014 if quotationAmount exists or minimumQuotationAmount\
      \ exists then valuationSource -> dealerOrCCP -> legalEntity exists"
    in_subset:
    - cdm_observable_asset
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_observable_asset
    exact_mappings:
    - common_domain_model:ValuationMethod
    slots:
    - valuationSource
    - quotationMethod
    - valuationMethod
    - quotationAmount
    - minimumQuotationAmount
    - cashCollateralValuationMethod
    class_uri: common_domain_model:ValuationMethod
  CashCollateralValuationMethod:
    name: CashCollateralValuationMethod
