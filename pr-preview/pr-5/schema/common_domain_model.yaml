          (b) the final Calculation Period for the party will end on, but exclude,
          the Termination Date.","inputs":[{"name":"calculationPeriodDates","type":"CalculationPeriodDates","cardinality":"1..1"},{"name":"date","type":"date","cardinality":"1..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"1..1"},"code_implementation":true},{"name":"CalculationPeriods","description":"2006
          ISDA Definition Section 4.13. ''Calculation Period'' means, in respect of
          a Swap Transaction and a party, each period from, and including, one Period
          End Date of that party to, but excluding, the next following applicable
          Period End Date during the Term of the Swap Transaction, except that (a)
          the initial Calculation Period for the party will commence on, and include,
          the Effective Date and (b) the final Calculation Period for the party will
          end on, but exclude, the Termination Date.","inputs":[{"name":"calculationPeriodDates","type":"CalculationPeriodDates","cardinality":"1..1"}],"output":{"name":"result","type":"CalculationPeriodData","cardinality":"0..*"},"code_implementation":true}]'
    description: 'A data for:  defining the parameters used to generate the calculation
      period dates schedule, including the specification of any initial or final stub
      calculation periods. A calculation period schedule consists of an optional initial
      stub calculation period, one or more regular calculation periods and an optional
      final stub calculation period. In the absence of any initial or final stub calculation
      periods, the regular part of the calculation period schedule is assumed to be
      between the effective date and the termination date. No implicit stubs are allowed,
      i.e. stubs must be explicitly specified using an appropriate combination of
      firstPeriodStartDate, firstRegularPeriodStartDate and lastRegularPeriodEndDate.'
    comments:
    - "Rosetta condition: FpML_ird_16 \u2014 if firstRegularPeriodStartDate exists\
      \ then terminationDate -> adjustableDate -> unadjustedDate > firstRegularPeriodStartDate"
    - "Rosetta condition: FpML_ird_17 \u2014 if lastRegularPeriodEndDate exists then\
      \ terminationDate -> adjustableDate -> unadjustedDate > lastRegularPeriodEndDate"
    - "Rosetta condition: FpML_ird_18 \u2014 if firstRegularPeriodStartDate exists\
      \ and lastRegularPeriodEndDate exists then lastRegularPeriodEndDate > firstRegularPeriodStartDate"
    - "Rosetta condition: FpML_ird_20 \u2014 if lastRegularPeriodEndDate exists then\
      \ lastRegularPeriodEndDate > effectiveDate -> adjustableDate -> unadjustedDate"
    - "Rosetta condition: FpML_ird_21 \u2014 if firstPeriodStartDate exists and effectiveDate\
      \ exists then firstPeriodStartDate -> adjustableDate -> unadjustedDate < effectiveDate\
      \ -> adjustableDate -> unadjustedDate"
    - "Rosetta condition: FpML_ird_22 \u2014 if firstPeriodStartDate exists and firstRegularPeriodStartDate\
      \ exists then firstPeriodStartDate -> adjustableDate -> unadjustedDate < firstRegularPeriodStartDate"
    - "Rosetta func: CalculationPeriod \u2014 2006 ISDA Definition Section 4.13. 'Calculation\
      \ Period' means, in respect of a Swap Transaction and a party, each period from,\
      \ and including, one Period End Date of that party to, but excluding, the next\
      \ following applicable Period End Date during the Term of the Swap Transaction,\
      \ except that (a) the initial Calculation Period for the party will commence\
      \ on, and include, the Effective Date and (b) the final Calculation Period for\
      \ the party will end on, but exclude, the Termination Date."
    - "Rosetta func: CalculationPeriods \u2014 2006 ISDA Definition Section 4.13.\
      \ 'Calculation Period' means, in respect of a Swap Transaction and a party,\
      \ each period from, and including, one Period End Date of that party to, but\
      \ excluding, the next following applicable Period End Date during the Term of\
      \ the Swap Transaction, except that (a) the initial Calculation Period for the\
      \ party will commence on, and include, the Effective Date and (b) the final\
      \ Calculation Period for the party will end on, but exclude, the Termination\
      \ Date."
    in_subset:
    - cdm_product_common_schedule
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_common_schedule
    exact_mappings:
    - common_domain_model:CalculationPeriodDates
    close_mappings:
    - fpml_5_10:CalculationPeriodDates
    slots:
    - CalculationPeriodDates_effectiveDate
    - terminationDate
    - calculationPeriodDatesAdjustments
    - firstPeriodStartDate
    - firstRegularPeriodStartDate
    - firstCompoundingPeriodEndDate
    - lastRegularPeriodEndDate
    - stubPeriodType
    - calculationPeriodFrequency
    slot_usage:
      effectiveDate:
        name: effectiveDate
        description: The first day of the terms of the trade. This day may be subject
          to adjustment in accordance with a business day convention.
        range: AdjustableOrRelativeDate
    class_uri: common_domain_model:CalculationPeriodDates
    rules:
    - preconditions:
        slot_conditions:
          firstRegularPeriodStartDate:
            name: firstRegularPeriodStartDate
            required: true
          lastRegularPeriodEndDate:
            name: lastRegularPeriodEndDate
            required: true
