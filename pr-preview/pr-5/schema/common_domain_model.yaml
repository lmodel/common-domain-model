      postconditions:
        slot_conditions:
          calculationDateImTerms:
            name: calculationDateImTerms
            required: false
      description: A data rule to enforce that Additional Calculation Date Terms should
        be absent when not applicable.
  BespokeCalculationTime:
    name: BespokeCalculationTime
    definition_uri: https://w3id.org/lmodel/common_domain_model/BespokeCalculationTime
    description: A class to specify additional Calculation Time terms for the purposes
      of Initial Margin.
    comments:
    - "Rosetta condition: AsCalculationAgentIm \u2014 if asCalculationAgent = True\
