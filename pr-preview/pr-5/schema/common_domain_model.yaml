    definition_uri: https://w3id.org/lmodel/common_domain_model/inflationLag
    description: An off-setting period from the payment date which determines the
      reference period for which the inflation index is observed.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:inflationLag
    owner: InflationRateSpecification
    domain_of:
    - InflationRateSpecification
    range: Offset
    required: true
    inlined: true
    inlined_as_list: true
  indexSource:
    name: indexSource
    definition_uri: https://w3id.org/lmodel/common_domain_model/indexSource
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: The reference source such as Reuters or Bloomberg. FpML specifies
      indexSource to be of type rateSourcePageScheme, but without specifying actual
      values.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:indexSource
    owner: InflationRateSpecification
    domain_of:
    - InflationRateSpecification
