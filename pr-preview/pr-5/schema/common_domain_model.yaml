  PeriodExtendedEnum:
    name: PeriodExtendedEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/PeriodExtendedEnum
    description: The enumerated values to specify a time period containing the additional
      value of Term.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_datetime
    permissible_values:
      H:
        text: H
        description: Hour
      D:
        text: D
        description: Day
      W:
        text: W
        description: Week
      M:
        text: M
        description: Month
      Y:
        text: Y
        description: Year
      T:
        text: T
        description: Term. The period commencing on the effective date and ending
          on the termination date. The T period always appears in association with
          periodMultiplier = 1, and the notation is intended for use in contexts where
          the interval thus qualified (e.g. accrual period, payment period, reset
          period, ...) spans the entire term of the trade.
      C:
        text: C
        description: CalculationPeriod - the period corresponds to the calculation
          period   For example, used in the Commodity Markets to indicate that a reference
          contract is the one that corresponds to the period of the calculation period.
