  Collateral:
    name: Collateral
    definition_uri: https://w3id.org/lmodel/common_domain_model/Collateral
    annotations:
      metadata_key:
        tag: metadata_key
        value: true
    description: A type for defining the obligations of the counterparty subject to
      credit support requirements.
    comments:
    - "Rosetta condition: CollateralExists \u2014 independentAmount exists or collateralPortfolio\
      \ exists"
    - "Rosetta condition: CollateralProvisions \u2014 if collateralPortfolio exists\
      \ then collateralProvisions exists"
    - "Rosetta condition: Collateralchoice \u2014 optional choice independentAmount,\
      \ portfolioIdentifier, collateralPortfolio"
    in_subset:
    - cdm_product_collateral
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_collateral
    exact_mappings:
    - common_domain_model:Collateral
    close_mappings:
    - fpml_5_10:Collateral
    slots:
    - Collateral_independentAmount
    - Collateral_portfolioIdentifier
    - Collateral_collateralPortfolio
    - collateralProvisions
    slot_usage:
      independentAmount:
        name: independentAmount
        description: 'Independent Amount is an amount that usually less creditworthy
          counterparties are asked to provide. It can either be a fixed amount or
          a percentage of the Transaction''s value. The Independent Amount can be:
          (i) transferred before any trading between the parties occurs (as a deposit
          at a third party''s account or with the counterparty) or (ii) callable after
          trading has occurred (typically because a downgrade has occurred). In situation
          (i), the Independent Amount is not included in the calculation of Exposure,
          but in situation (ii), it is included in the calculation of Exposure. Thus,
          for situation (ii), the Independent Amount may be transferred along with
          any collateral call. Independent Amount is a defined term in the ISDA Credit
          Support Annex. (''with respect to a party, the amount specified as such
          for that party in Paragraph 13; if no amount is specified, zero'').'
        range: IndependentAmount
        required: false
      portfolioIdentifier:
        name: portfolioIdentifier
        description: A list of identifiers pointing to the collateral portfolios which
          contain the collateral which covers a trade.
        multivalued: true
      collateralPortfolio:
        name: collateralPortfolio
        description: 'The collateral portfolios which contain the collateral which
          covers a trade. (NB: this can be provided by reference to a global key for
          each CollateralPortfolio object)'
        multivalued: true
    class_uri: common_domain_model:Collateral
    rules:
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            independentAmount:
              name: independentAmount
              required: true
        - slot_conditions:
            collateralPortfolio:
              name: collateralPortfolio
              required: true
      description: Collateral must represent either a simple independent amount or
        full collateral portfolio.
    - preconditions:
        slot_conditions:
          collateralPortfolio:
            name: collateralPortfolio
            required: true
      postconditions:
        slot_conditions:
          collateralProvisions:
            name: collateralProvisions
            required: true
      description: When a collateral portfolio is provided, collateral provisions
        must exists that govern this collateral.
    - preconditions: {}
      postconditions:
        any_of:
        - slot_conditions:
            independentAmount:
              name: independentAmount
              required: true
        - slot_conditions:
            portfolioIdentifier:
              name: portfolioIdentifier
              required: true
        - slot_conditions:
            collateralPortfolio:
              name: collateralPortfolio
              required: true
      description: Collateralchoice
