    class_uri: common_domain_model:SubstitutionPartyElection
  TerminationCurrencyAmendment:
    name: TerminationCurrencyAmendment
    definition_uri: https://w3id.org/lmodel/common_domain_model/TerminationCurrencyAmendment
    description: A class to specify the Amendment to Termination Currency elections
      by the parties to the agreement.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(t)" name "Amendment
      to Termination Currency."
    comments:
    - "Rosetta condition: Applicability \u2014 if isApplicable = False then effectiveDate\
      \ is absent and partyElection is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:TerminationCurrencyAmendment
    slots:
    - TerminationCurrencyAmendment_isApplicable
    - TerminationCurrencyAmendment_effectiveDate
    - TerminationCurrencyAmendment_partyElection
    slot_usage:
      isApplicable:
        name: isApplicable
        description: The qualification of whether the Amendment to Termination Currency
          is deemed applicable by the parties (True) or not (False).
      effectiveDate:
        name: effectiveDate
        description: The effective date of the Amendment to Termination Currency.
          This date can be specified as either an actual date, a specific date (e.g.
          the annex date) or as a custom provision.
        range: AmendmentEffectiveDate
      partyElection:
        name: partyElection
        description: The parties' Amendment Currency election.
        range: TerminationCurrencyElection
        required: false
    class_uri: common_domain_model:TerminationCurrencyAmendment
    rules:
    - preconditions:
        slot_conditions:
          isApplicable:
            name: isApplicable
            equals_string: 'False'
      postconditions:
        slot_conditions:
          effectiveDate:
            name: effectiveDate
            required: false
          partyElection:
            name: partyElection
            required: false
      description: The Amendment to Termination Currency elections only apply when
        the Amendment to Termination Currency is deemed applicable by the parties.
  TerminationCurrencyElection:
    name: TerminationCurrencyElection
    definition_uri: https://w3id.org/lmodel/common_domain_model/TerminationCurrencyElection
    description: A class to specify the Amendment to Termination Currency election
      by the parties to the agreement.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(t)(A) & (B)"
    comments:
    - "Rosetta condition: CurrencyElection \u2014 if isSpecified = False then currency\
      \ is absent"
    in_subset:
    - cdm_legaldocumentation_csa
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    see_also:
    - isda:CSA_IM_2016
    exact_mappings:
    - common_domain_model:TerminationCurrencyElection
    slots:
    - TerminationCurrencyElection_party
    - TerminationCurrencyElection_isSpecified
    - TerminationCurrencyElection_currency
    slot_usage:
      party:
        name: party
        description: The elective party.
        range: CounterpartyRoleEnum
        required: true
        multivalued: true
      isSpecified:
        name: isSpecified
        description: The qualification of whether the Termination Currency is specified
          in this document (True) or in an Eligible Support Credit Support (IM) Schedule
          (False).
      currency:
        name: currency
        description: The Termination Currency associated with the party that referenced
          as part of this class. The list of valid currencies is not presently positioned
          as an enumeration as part of the CDM because that scope is limited to the
          values specified by ISDA and FpML. As a result, implementers have to make
          reference to the relevant standard, such as the ISO 4217 standard for currency
          codes.
    class_uri: common_domain_model:TerminationCurrencyElection
    rules:
    - preconditions:
        slot_conditions:
          isSpecified:
            name: isSpecified
            equals_string: 'False'
      postconditions:
        slot_conditions:
          currency:
            name: currency
            required: false
      description: A Termination Currency election should only exist when required
        by the affected parties election.
