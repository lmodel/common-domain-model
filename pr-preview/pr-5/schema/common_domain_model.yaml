    annotations:
      metadata_key:
        tag: metadata_key
        value: true
      rosetta_functions:
        tag: rosetta_functions
        value: '[{"name":"CalculationPeriod","description":"2006 ISDA Definition Section
          4.13. ''Calculation Period'' means, in respect of a Swap Transaction and
          a party, each period from, and including, one Period End Date of that party
          to, but excluding, the next following applicable Period End Date during
