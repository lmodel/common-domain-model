          from time to time, for a centralized industry-wide survey of financial institutions
          in Brazil that are active participants in the Brazilian Real/U.S. Dollar
          spot markets for the purpose of determining the EMTA BRL Industry Survey
          Rate).
        aliases:
        - BRL.EMTA.INDUSTRY.SURVEY.RATE/BRL12
      BRL_OFFICIAL_RATE_BRL02:
        text: BRL_OFFICIAL_RATE_BRL02
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian
          Real/U.S. Dollar Specified Rate, expressed as the amount of Brazilian Reais
          per one U.S. Dollar, for settlement in two Business Days (where such days
          are Business Days in both Sao Paulo and New York) reported by the Banco
          Central do Brasil in the 'Diario Oficial da Uniao' on the first Business
          Day following that Rate Calculation Date.
        aliases:
        - BRL.OFFICIAL.RATE/BRL02
      BRL_PCOT_COMMERCIAL_BRL03:
        text: BRL_PCOT_COMMERCIAL_BRL03
        description: The Spot Rate for a Rate Calculation Date will be the Brazilian
          Real/U.S. Dollar commercial rate, expressed as the amount of Brazilian Reais
          per one U.S. Dollar, for settlement in two Business Days (where such days
          are Business Days in both Sao Paulo and New York) reported by the Banco
