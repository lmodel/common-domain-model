    is_a: InstrumentBase
    slots:
    - identifier
    - taxonomy
    - isExchangeListed
    - exchange
    - relatedExchange
    - assetType
    - securityType
    - debtType
    - equityType
    - fundType
    class_uri: common_domain_model:Security
    rules:
    - preconditions:
        slot_conditions:
          securityType:
            name: securityType
            none_of:
            - equals_string_in:
              - Debt
      postconditions:
        slot_conditions:
          debtType:
            name: debtType
            required: false
      description: DebtSubType
      comments:
      - 'Rosetta negation: securityType <> Debt'
    - preconditions:
        slot_conditions:
          securityType:
            name: securityType
            none_of:
            - equals_string_in:
              - Equity
      postconditions:
        slot_conditions:
          equityType:
            name: equityType
            required: false
      description: EquitySubType
      comments:
      - 'Rosetta negation: securityType <> Equity'
    - preconditions:
        slot_conditions:
          securityType:
            name: securityType
            none_of:
            - equals_string_in:
              - Fund
      postconditions:
        slot_conditions:
          fundType:
            name: fundType
            required: false
      description: FundSubType
      comments:
      - 'Rosetta negation: securityType <> Fund'
    - preconditions: {}
      postconditions:
        slot_conditions:
          assetType:
            name: assetType
            equals_string: Security
      description: Asset type must be Security.
