      whether or not the obligation is quoted, listed or ordinarily purchased and
      sold on an exchange. ISDA 2003 Term: Listed.'
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_credit
    slot_uri: common_domain_model:listed
