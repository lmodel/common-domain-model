    definition_uri: https://w3id.org/lmodel/common_domain_model/ExceptionEnum
    description: Values to specify the normalized exceptions applicable to an Initial
      Margin CSA.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles"
    - ISDA CSA_IM_2018 paragraph "13 General Principles"
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    permissible_values:
      Applicable:
        text: Applicable
        description: The election is applicable.
      NotApplicable:
        text: NotApplicable
        description: The election is not applicable.
      Other:
        text: Other
        description: An alternative approach is described in the document as follows.
  SensitivitiesEnum:
    name: SensitivitiesEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/SensitivitiesEnum
    description: Values to specify the methodology according to which sensitivities
      to (i) equity indices, funds and ETFs, and (ii) commodity indices are computed.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" clause "(gg)(2)"
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    permissible_values:
      Alternative:
        text: Alternative
        description: The parties agree that in respect of the relevant sensitivities,
          the delta is allocated back to individual constituents.
      Standard:
        text: Standard
        description: The relevant sensitivities are addressed by the standard preferred
          approach where the entire delta is put into the applicable asset class/category.
  RegulatoryRegimeEnum:
    name: RegulatoryRegimeEnum
    definition_uri: https://w3id.org/lmodel/common_domain_model/RegulatoryRegimeEnum
    description: Values to specify the regulatory regimes.
    notes:
    - ISDA CSA_IM_2016 paragraph "13 General Principles" name "Regime"
    - ISDA CSA_IM_2018 paragraph "13 General Principles" name "Regime"
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_legaldocumentation_csa
    permissible_values:
      AustraliaMarginRules:
        text: AustraliaMarginRules
        description: Australian Prudential Standard CPS 226 Margining and risk mitigation
          for non-centrally cleared derivatives.
        aliases:
        - Australia
      CanadaMarginRules:
        text: CanadaMarginRules
        description: Guideline E-22, Margin Requirements for Non-Centrally Cleared
          Derivatives issued by the Canadian Office of the Superintendent of Financial
          Institutions in February 2016.
        aliases:
        - Canada
      CFTC_MarginRules:
        text: CFTC_MarginRules
        description: Margin requirements adopted by the U.S. Commodity Futures Trading
          Commission pursuant to CEA  4s(e).
        aliases:
        - CFTC
      EMIR_MarginRules:
        text: EMIR_MarginRules
        description: Regulation (EU) No 648/2012 of the European Parliament and of
          the Council of 4 July 2012 on OTC derivatives, central counterparties and
          trade repositories (including the EMIR RTS, which means the published regulatory
          technical standards on risk-mitigation techniques for OTC-derivative contracts
          not cleared by a CCP under Article 11(15) of EMIR).
        aliases:
        - EMIR
      HongKongMarginRules:
        text: HongKongMarginRules
        description: Chapter CR-G-14 'Non-centrally Cleared OTC Derivatives Transactions  Margin
          and Other Risk Mitigation Standards' in the Banking Supervisory Policy Manual
          issued by the Hong Kong Monetary Authority.
        aliases:
        - Hong Kong
      JapanMarginRules:
        text: JapanMarginRules
        description: Margin rules adopted by the Financial Services Agency of Japan
          pursuant to Article 40, Item 2 of the Financial Instruments and Exchange
          Act (kinyuu shouhin torihiki hou) (Act No. 25 of 1948) and by the Ministry
          of Agriculture, Forestry and Fisheries and the Ministry of Economy, Trade
          and Industry pursuant to the Commodity Derivatives Act (shouhin sakimono
          torihiki hou) (Act No. 239 of 1950) (including their subordinated regulations
          and the related supervisory guidelines).
        aliases:
        - Japan
      US_PrudentialMarginRules:
        text: US_PrudentialMarginRules
        description: Margin requirements adopted by a 'prudential regulator' (as defined
          in CEA  1a(39)) pursuant to CEA  4s(e) and Exchange Act  15F(e).
        aliases:
        - Prudential
      SEC_MarginRules:
        text: SEC_MarginRules
        description: Margin requirements adopted by the U.S. Securities and Exchange
          Commission pursuant to Exchange Act  15F(e).
        aliases:
        - SEC
      SingaporeMarginRules:
        text: SingaporeMarginRules
        description: Guidelines on Margin Requirements for Non-centrally Cleared OTC
          Derivatives Contracts issued by the Monetary Authority of Singapore (MAS)
          pursuant to section 321 of the Securities and Futures Act, Chapter 289 of
          Singapore.
        aliases:
        - Singapore
      SwitzerlandMarginRules:
        text: SwitzerlandMarginRules
        description: Margin rules adopted by the Swiss Federal Council pursuant to
          Article 110-111 of the Financial Market Infrastructure Act as well as Articles
          100 to 107 and Annexes 3 to 5 of the Financial Market Infrastructure Ordinance.
        aliases:
        - Switzerland
      BrazilMarginRules:
        text: BrazilMarginRules
        description: The Central Bank of Brazil margin requirements adopted pursuant
          to Resolution no. 4,662, of 25 May 2018, enacted by the National Monetary
          Council.
        aliases:
        - Brazil
      UnitedKingdomMarginRules:
        text: UnitedKingdomMarginRules
        description: EMIR (including, for the avoidance of doubt, the EMIR RTS) as
          it forms part of UK domestic law by virtue of section 3 of the European
          Union (Withdrawal) Act 2018 (as amended) (the EUWA) (including any amendments
          made to such legislation when it is brought into UK domestic law pursuant
          to section 8 of the EUWA or any regulations made thereunder), and which,
          for the avoidance of doubt, shall be subject to the interpretation provision
          in Paragraph [11(g)].3.
        aliases:
        - United Kingdom
      SouthAfricaMarginRules:
        text: SouthAfricaMarginRules
        description: the requirements contained in Joint Standard 2 of 2020 made in
          terms of the South African Financial Sector Regulation Act, 2017.
        aliases:
        - South Africa
      SouthKoreaMarginRules:
        text: SouthKoreaMarginRules
        description: Margin requirements adopted by the Korean Financial Services
          Commission and Financial Supervisory Service pursuant to the Guidelines
          on Margin Requirements for Non-Centrally Cleared OTC Derivatives Transactions,
          which are expected to be incorporated into the Financial Investment Services
          and Capital Markets Act.
        aliases:
        - South Korea
      HongKongSFCMarginRules:
        text: HongKongSFCMarginRules
        description: Part III of Schedule 10 to Code of Conduct for Persons Licensed
          by or Registered with the Securities and Futures Commission of Hong Kong.
        aliases:
        - Hong Kong SFC
