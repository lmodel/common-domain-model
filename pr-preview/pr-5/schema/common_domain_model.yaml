  EligibilityToHoldCollateral:
    name: EligibilityToHoldCollateral
    definition_uri: https://w3id.org/lmodel/common_domain_model/EligibilityToHoldCollateral
    description: Specifies the conditions under which a party and its custodian(s)
      are entitled to hold collateral.
    notes:
