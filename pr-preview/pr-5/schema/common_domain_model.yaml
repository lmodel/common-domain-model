  ClosedState:
    name: ClosedState
    definition_uri: https://w3id.org/lmodel/common_domain_model/ClosedState
    description: ' A class to qualify the closed state of an execution or a contract
      through the combination or a state (e.g. terminated, novated) and a set of dates:
      activity date, effective date and, when relevant, last payment date.'
    in_subset:
    - cdm_event_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_event_common
    exact_mappings:
    - common_domain_model:ClosedState
    close_mappings:
    - fpml_5_10:ClosedState
    slots:
    - ClosedState_state
    - activityDate
    - ClosedState_effectiveDate
    - lastPaymentDate
    slot_usage:
      state:
        name: state
        description: The qualification of what gave way to the contract or execution
          closure, e.g. allocation, termination, ...
        range: ClosedStateEnum
        required: true
      effectiveDate:
        name: effectiveDate
        description: The date on which the closing event contractually takes effect,
          when different from the activity date. When an explicit event effective
          date attribute is associated with the closing event, it will be that date.
          In the case of a cancellation event, it will be the date on which the cancelled
          event took place.
