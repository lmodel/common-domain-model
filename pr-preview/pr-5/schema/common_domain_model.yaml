    - "Rosetta condition: EquitySubType \u2014 if securityType <> Equity then equityType\
      \ is absent"
    - "Rosetta condition: FundSubType \u2014 if securityType <> Fund then fundType\
      \ is absent"
    - "Rosetta condition: AssetType \u2014 assetType = Security"
    in_subset:
    - cdm_base_staticdata_asset_common
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_base_staticdata_asset_common
    see_also:
    - icma:GMRA
    exact_mappings:
