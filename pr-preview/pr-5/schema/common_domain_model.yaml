  mainPublication:
    name: mainPublication
    definition_uri: https://w3id.org/lmodel/common_domain_model/mainPublication
    annotations:
      metadata_scheme:
        tag: metadata_scheme
        value: true
    description: The current main publication source such as relevant web site or
      a government body. FpML specifies mainPublication to be of type mainPublicationSource,
      but without specifying actual values.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:mainPublication
    owner: InflationRateSpecification
    domain_of:
    - InflationRateSpecification
    range: string
    required: true
  initialIndexLevel:
    name: initialIndexLevel
    definition_uri: https://w3id.org/lmodel/common_domain_model/initialIndexLevel
    description: Initial known index level for the first calculation period.
    from_schema: https://w3id.org/lmodel/common-domain-model/cdm_product_asset
    slot_uri: common_domain_model:initialIndexLevel
    owner: InflationRateSpecification
    domain_of:
